    <script>
        let currentMode = 'thionline'; let currentBtn = null;
        
        function setMode(mode) {
            currentMode = mode;
            // Desktop buttons
            const commonClass = 'px-3 py-1 text-xs font-medium text-gray-500 rounded hover:bg-gray-200 transition-all';
            const activeClass = 'px-3 py-1 text-xs font-semibold rounded shadow-sm bg-white text-blue-700 transition-all';
            const activeGreenClass = 'px-3 py-1 text-xs font-semibold rounded shadow-sm bg-white text-green-700 transition-all';
            const activePurpleClass = 'px-3 py-1 text-xs font-semibold rounded shadow-sm bg-white text-purple-700 transition-all';

            const btnOnline = document.getElementById('btn-mode-online');
            const btnCauhoi = document.getElementById('btn-mode-cauhoi');
            const btnHdg = document.getElementById('btn-mode-hdg');

            if(btnOnline) btnOnline.className = mode === 'thionline' ? activePurpleClass : commonClass;
            if(btnCauhoi) btnCauhoi.className = mode === 'cauhoi' ? activeClass : commonClass;
            if(btnHdg) btnHdg.className = mode === 'hdg' ? activeGreenClass : commonClass;
            
            // Mobile select
            const mobileSelect = document.querySelector('select[onchange="setMode(this.value)"]');
            if(mobileSelect) mobileSelect.value = mode;

            if(currentBtn) loadFrame(currentBtn, null);
        }

        function loadFrame(btn, overrideUrl) {
            currentBtn = btn;
            document.querySelectorAll('.tool-btn').forEach(b => {
                b.classList.remove('bg-blue-100', 'text-blue-700', 'font-medium', 'border-blue-400');
                b.classList.add('border-transparent');
                b.querySelector('svg').classList.remove('text-blue-600');
            });
            btn.classList.add('bg-blue-100', 'text-blue-700', 'font-medium', 'border-blue-400');
            btn.classList.remove('border-transparent');
            btn.querySelector('svg').classList.add('text-blue-600');
            
            let url = btn.getAttribute('data-url-cauhoi');
            const hdg = btn.getAttribute('data-hdg');
            const online = btn.getAttribute('data-thionline');

            if(currentMode === 'hdg') {
                if(hdg) url = hdg;
                else { alert('Chưa có file Hướng Dẫn Giải cho bài này!'); setMode('cauhoi'); return; }
            } else if (currentMode === 'thionline') {
                if(online) url = online;
                else { 
                    alert('Chưa có file Thi Online cho bài này (Vui lòng chạy lại Moon HTML Generator)!'); 
                    setMode('cauhoi'); 
                    return; 
                }
            }

            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('error-msg').style.display = 'none';
            const iframe = document.getElementById('main-frame');
            iframe.src = url; 
            iframe.classList.remove('hidden');
            iframe.onerror = function() { document.getElementById('error-msg').style.display = 'block'; }
            
            // Auto close sidebar on mobile after selection
            if(window.innerWidth < 1024) {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('overlay').classList.remove('active');
            }
        }
        
        function printIframe() {
            const iframe = document.getElementById('main-frame');
            if(!iframe.src || iframe.classList.contains('hidden')) return alert('Chọn bài để in');
            try { iframe.contentWindow.focus(); iframe.contentWindow.print(); } catch(e) { window.open(iframe.src, '_blank'); }
        }
        
        function toggleGroup(header) {
            header.classList.toggle('active'); header.nextElementSibling.classList.toggle('open');
        }
        
        // Desktop Toggle
        function toggleSidebarDesktop() {
            document.getElementById('sidebar').classList.toggle('sidebar-closed');
            document.getElementById('arrow-icon').classList.toggle('arrow-rotate');
        }
        
        // Mobile Toggle
        function toggleSidebarMobile() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
        
        function expandAll() {
            document.querySelectorAll('.group-content').forEach(el => el.classList.add('open'));
            document.querySelectorAll('.group-header').forEach(el => el.classList.add('active'));
        }
        
        function collapseAll() {
            document.querySelectorAll('.group-content').forEach(el => el.classList.remove('open'));
            document.querySelectorAll('.group-header').forEach(el => el.classList.remove('active'));
        }
        
        document.getElementById('search-input').addEventListener('keyup', function(e) {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.tool-btn').forEach(btn => {
                const match = btn.getAttribute('data-search').includes(term);
                btn.style.display = match ? 'flex' : 'none';
                if(match && term) {
                    let p = btn.closest('.group-content');
                    while(p) { p.classList.add('open'); if(p.previousElementSibling) p.previousElementSibling.classList.add('active'); p = p.parentElement.closest('.group-content'); }
                }
            });
        });
    </script>
