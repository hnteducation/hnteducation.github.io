        .virtual-numpad {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; border-top: 1px solid #e5e7eb;
            padding: 10px; z-index: 100;

 \u0111em v\u1ec1 cho h\u1eafn?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>D\u1ef1a v\u00e0o c\u00e2u v\u0103n: \u201cNhu\u031bng lo\u0300ng tham cu\u0309a y kho\u0302ng \u0111a\u0301y, ho\u031bn n\u01b0\u0303a y \u0111u\u031b\u01a1\u0323c sinh ra \u0111\u00ea\u0309 ha\u0300nh ha\u0323, thu\u0300 ghe\u0301t He\u0302-ra-cle\u0301t, cho ne\u0302n y c\u01b0\u0301 pha\u0309i nghi\u0303 h\u00ea\u0301t vi\u1eb9\u0302c na\u0300y \u0111\u00ea\u0301n vi\u1eb9\u0302c kha\u0301c \u0111\u00ea\u0309 b\u0103\u0301t He\u0302-ra-cle\u0301t la\u0300m.\u201d<br>\u2192 L\u00f2ng tham v\u00e0 s\u1ef1 th\u00f9 gh\u00e9t khi\u1ebfn \u01a0-ri-xt\u00ea b\u1eaft H\u00ea-ra-cl\u00e9t \u0111o\u1ea1t \u0111\u00e0n b\u00f2 c\u1ee7a G\u00ea-ri-\u00f4ng \u0111em v\u1ec1 cho h\u1eafn.", "key": "D", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590599, "lessonId": 0, "a": "L\u00f2ng n\u00e0ng s\u1eedng s\u1ed1t.", "b": "N\u00e0ng \u0111\u1ebfn ng\u1ed3i tr\u01b0\u1edbc m\u1eb7t Uy-l\u00edt-x\u01a1.", "c": "N\u00e0ng kh\u00f4ng bi\u1ebft n\u00ean \u0111\u1ee9ng xa xa h\u1ecfi chuy\u1ec7n ng\u01b0\u1eddi ch\u1ed3ng y\u00eau qu\u00fd c\u1ee7a m\u00ecnh hay n\u00ean l\u1ea1i g\u1ea7n, \u00f4m l\u1ea5y \u0111\u1ea7u, c\u1ea7m l\u1ea5y tay ng\u01b0\u1eddi m\u00e0 h\u00f4n.", "d": "L\u00f2ng n\u00e0ng r\u1ea5t \u0111\u1ed7i ph\u00e2n v\u00e2n.", "bookId": 1086551, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cN\u00f3i xong, n\u00e0ng b\u01b0\u1edbc xu\u1ed1ng l\u1ea7u. L\u00f2ng n\u00e0ng r\u1ea5t \u0111\u1ed7i ph\u00e2n v\u00e2n: n\u00e0ng kh\u00f4ng bi\u1ebft n\u00ean \u0111\u1ee9ng xa xa h\u1ecfi chuy\u1ec7n ng\u01b0\u1eddi ch\u1ed3ng y\u00eau qu\u00fd c\u1ee7a m\u00ecnh hay n\u00ean l\u1ea1i g\u1ea7n, \u00f4m l\u1ea5y \u0111\u1ea7u, c\u1ea7m l\u1ea5y tay ng\u01b0\u1eddi m\u00e0 h\u00f4n? Khi v\u00e0o \u0111\u1ebfn nh\u00e0, b\u01b0\u1edbc qua ng\u01b0\u1ee1ng c\u1eeda b\u1eb1ng \u0111\u00e1, n\u00e0ng \u0111\u1ebfn ng\u1ed3i tr\u01b0\u1edbc m\u1eb7t Uy-l\u00edt-x\u01a1, d\u01b0\u1edbi \u00e1nh l\u1eeda h\u1ed3ng, d\u1ef1a v\u00e0o b\u1ee9c t\u01b0\u1eddng \u0111\u1ed1i di\u1ec7n, c\u00f2n Uy-l\u00edt-x\u01a1 th\u00ec ng\u1ed3i t\u1ef1a v\u00e0o m\u1ed9t c\u00e1i c\u1ed9t cao, m\u1eaft nh\u00ecn xu\u1ed1ng \u0111\u1ea5t, \u0111\u1ee3i xem b\u00e2y gi\u1edd t\u1eadn m\u1eaft tr\u00f4ng th\u1ea5y m\u00ecnh r\u1ed3i, ng\u01b0\u1eddi v\u1ee3 cao qu\u00fd c\u1ee7a m\u00ecnh s\u1ebd n\u00f3i g\u00ec v\u1edbi m\u00ecnh. Nh\u01b0ng n\u00e0ng v\u1eabn ng\u1ed3i l\u1eb7ng thinh tr\u00ean gh\u1ebf h\u1ed3i l\u00e2u, l\u00f2ng s\u1eedng s\u1ed1t, khi th\u00ec \u0111\u0103m \u0111\u0103m \u00e2u y\u1ebfm nh\u00ecn ch\u1ed3ng, khi l\u1ea1i kh\u00f4ng nh\u1eadn ra ch\u1ed3ng d\u01b0\u1edbi b\u1ed9 \u00e1o qu\u1ea7n r\u00e1ch m\u01b0\u1edbp.\u201d</i><br><div style=\"text-align: right;\">(S\u1eed thi Hy L\u1ea1p, <i>Uy-l\u00edt-x\u01a1 tr\u1edf v\u1ec1</i>, theo <i>Ng\u1eef v\u0103n 10 N\u00e2ng cao</i>, t\u1eadp 2, NXB Gi\u00e1o d\u1ee5c Vi\u1ec7t Nam, 2011)</div>Chi ti\u1ebft n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>mi\u00eau t\u1ea3 t\u00e2m tr\u1ea1ng c\u1ee7a nh\u00e2n v\u1eadt \u201cn\u00e0ng\u201d (P\u00ea-n\u00ea-l\u1ed1p)?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft \u201cN\u00e0ng \u0111\u1ebfn ng\u1ed3i tr\u01b0\u1edbc m\u1eb7t Uy-l\u00edt-x\u01a1\u201d ch\u1ec9 l\u00e0 m\u1ed9t h\u00e0nh \u0111\u1ed9ng, kh\u00f4ng mi\u00eau t\u1ea3 tr\u1ef1c ti\u1ebfp t\u00e2m tr\u1ea1ng c\u1ee7a nh\u00e2n v\u1eadt.\n", "key": "B", "isVideo": true, "score": 0, "order": 2, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590600, "lessonId": 0, "a": "Ph\u00e9p li\u1ec7t k\u00ea.", "b": "Ph\u00e9p n\u00f3i qu\u00e1.", "c": "Ph\u00e9p \u0111\u1ed1i l\u1eadp.", "d": "Ph\u00e9p \u1ea9n d\u1ee5.", "bookId": 1086552, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cN\u1eb1m nghe ti\u1ebfng tr\u1ed1ng, tr\u1ed1ng canh ba,<br>V\u1eeba gi\u1ea5c chi\u00eam bao ch\u1ee3t t\u1ec9nh ra.<br><b>Thi\u00ean h\u1ea1 d\u1ec5 th\u01b0\u1eddng \u0111ang ng\u1ee7 c\u1ea3,<br>Vi\u1ec7c g\u00ec m\u00e0 th\u1ee9c m\u1ed9t m\u00ecnh ta.\u201d</b></i><br><div style=\"text-align: right;\">(Tr\u1ea7n T\u1ebf X\u01b0\u01a1ng, <i>Ch\u1ee3t gi\u1ea5c</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Bi\u1ec7n ph\u00e1p tu t\u1eeb n\u00e0o \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong hai d\u00f2ng th\u01a1 in \u0111\u1eadm?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nHai d\u00f2ng th\u01a1 in \u0111\u1eadm s\u1eed d\u1ee5ng ph\u00e9p \u0111\u1ed1i l\u1eadp:<br>\n- thi\u00ean h\u1ea1 (m\u1ecdi ng\u01b0\u1eddi) \u2013 m\u1ed9t m\u00ecnh ta (c\u00e1 nh\u00e2n)<br>\n- \u0111ang ng\u1ee7 c\u1ea3 (tr\u1ea1ng th\u00e1i ngh\u1ec9 ng\u01a1i, v\u00f4 t\u01b0) -  th\u1ee9c (tr\u1ea1ng th\u00e1i c\u00f4 \u0111\u01a1n, tr\u1eb1n tr\u1ecdc, suy t\u01b0)<br>\n\u2192 S\u1ef1 \u0111\u1ed1i l\u1eadp n\u00e0y l\u00e0m n\u1ed5i b\u1eadt s\u1ef1 kh\u00e1c bi\u1ec7t gi\u1eefa t\u00e1c gi\u1ea3 v\u00e0 m\u1ecdi ng\u01b0\u1eddi xung quanh, nh\u1ea5n m\u1ea1nh t\u00e2m tr\u1ea1ng c\u00f4 \u0111\u01a1n, thao th\u1ee9c c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh.\n", "key": "C", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590602, "lessonId": 0, "a": "M\u1ecdi nh\u00e0 l\u1eadp mi\u1ebfu \u1edf ph\u00eda T\u00e2y ph\u1ee7 \u0110\u00f4 h\u1ed9 m\u00e0 th\u1edd c\u00fang.", "b": "M\u1edbi ch\u1ebft \u0111\u00e3 hi\u1ec3n linh, th\u01b0\u1eddng hi\u1ec7n h\u00ecnh trong \u0111\u00e1m d\u00e2n qu\u00ea.", "c": "M\u1ecdi nh\u00e0 c\u00f3 vi\u1ec7c g\u00ec t\u1edbi mi\u1ebfu \u1edf ph\u00eda T\u00e2y ph\u1ee7 \u0110\u00f4 h\u1ed9 c\u1ea7u xin, kh\u00f4ng c\u00f3 \u0111i\u1ec1u g\u00ec l\u00e0 kh\u00f4ng linh \u1ee9ng.", "d": "Ngh\u00ecn xe v\u1ea1n ng\u1ef1a bay tr\u00ean kho\u1ea3ng ng\u1ecdn c\u00e2y n\u00f3c nh\u00e0.", "bookId": 1086553, "comments": 0, "bookmarks": 3, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cKhi H\u01b0ng m\u1edbi ch\u1ebft \u0111\u00e3 hi\u1ec3n linh, th\u01b0\u1eddng hi\u1ec7n h\u00ecnh trong \u0111\u00e1m d\u00e2n qu\u00ea. Ngh\u00ecn xe v\u1ea1n ng\u1ef1a bay tr\u00ean kho\u1ea3ng ng\u1ecdn c\u00e2y n\u00f3c nh\u00e0. M\u1ecdi ng\u01b0\u1eddi ng\u1ea9ng l\u00ean th\u00ec th\u1ea5y r\u1ef1c r\u1ee1 nh\u01b0 m\u00e2y k\u1ebft n\u0103m m\u00e0u, v\u0103ng v\u1eb3ng ti\u1ebfng \u0111\u00e0n ti\u1ebfng s\u00e1o \u1edf tr\u00ean tr\u1eddi, l\u1ea1i c\u00f3 ti\u1ebfng h\u00f2 h\u00e9t, b\u00f3ng c\u1edd ti\u1ebfng tr\u1ed1ng, ki\u1ec7u c\u00e1ng s\u00e1ng r\u1ef1c, t\u1ea5t c\u1ea3 \u0111\u1ec1u nh\u00ecn th\u1ea5y \u0111\u01b0\u1ee3c r\u00e0nh r\u00e0nh. Ph\u00e0m trong th\u00f4n \u1ea5p c\u00f3 vi\u1ec7c s\u1ee3 h\u00e3i, vi\u1ec7c vui m\u1eebng th\u00ec tr\u01b0\u1edbc \u0111\u00e3 c\u00f3 b\u1eadc d\u1ecb nh\u00e2n ban \u0111\u00eam \u0111\u1ebfn b\u1ea3o cho ng\u01b0\u1eddi h\u00e0o tr\u01b0\u1edfng bi\u1ebft. M\u1ecdi nh\u00e0 cho l\u00e0 th\u1ea7n, l\u1eadp mi\u1ebfu \u1edf ph\u00eda T\u00e2y ph\u1ee7 \u0110\u00f4 h\u1ed9 m\u00e0 th\u1edd c\u00fang, c\u1ea7u t\u1ea1nh c\u1ea7u m\u01b0a, kh\u00f4ng c\u00f3 \u0111i\u1ec1u g\u00ec l\u00e0 kh\u00f4ng linh \u1ee9ng.\u201d</i><br>(L\u00fd T\u1ebf Xuy\u00ean, <i>B\u1ed1 C\u00e1i \u0110\u1ea1i V\u01b0\u01a1ng</i>, theo <i>Vi\u1ec7t \u0111i\u1ec7n u linh t\u1eadp</i>, NXB V\u0103n h\u1ecdc, 2008)<br>Chi ti\u1ebft n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>ph\u1ea3i l\u00e0 y\u1ebfu t\u1ed1 k\u00ec \u1ea3o trong \u0111o\u1ea1n tr\u00edch?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft \u201cM\u1ecdi nh\u00e0 l\u1eadp mi\u1ebfu \u1edf ph\u00eda T\u00e2y ph\u1ee7 \u0110\u00f4 h\u1ed9 m\u00e0 th\u1edd c\u00fang\u201d l\u00e0 h\u00e0nh \u0111\u1ed9ng th\u1ef1c t\u1ebf th\u1ec3 hi\u1ec7n l\u00f2ng bi\u1ebft \u01a1n, s\u1ef1 t\u00f4n k\u00ednh c\u1ee7a ng\u01b0\u1eddi d\u00e2n \u0111\u1ed1i v\u1edbi H\u01b0ng, kh\u00f4ng ph\u1ea3i l\u00e0 y\u1ebfu t\u1ed1 k\u00ec \u1ea3o trong \u0111o\u1ea1n tr\u00edch.\n", "key": "A", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590605, "lessonId": 0, "a": "S\u1eed d\u1ee5ng l\u1ed1i v\u0103n bi\u1ec1n ng\u1eabu, ph\u00e9p \u0111\u1ed1i, ph\u00e9p li\u1ec7t k\u00ea,...", "b": "Ng\u1ee3i ca tinh th\u1ea7n ch\u1ee7 \u0111\u1ed9ng c\u1ee7a Tr\u01b0\u01a1ng T\u01b0\u1edbng qu\u00e2n trong c\u00f4ng cu\u1ed9c \u0111\u00e1nh gi\u1eb7c ngo\u1ea1i x\u00e2m.", "c": "L\u00ean \u00e1n t\u1ed9i \u00e1c c\u1ee7a th\u1ef1c d\u00e2n Ph\u00e1p.", "d": "Ca ng\u1ee3i chi\u1ebfn c\u00f4ng c\u1ee7a Tr\u01b0\u01a1ng T\u01b0\u1edbng qu\u00e2n.", "bookId": 1086554, "comments": 0, "bookmarks": 7, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cR\u1ea1ch L\u00e1 , G\u00f2 C\u00f4ng  m\u1ea5y tr\u1eadn, gi\u1eb7c th\u1ea5y \u0111\u00e3 kinh;<br>C\u1eeda Kh\u1ea9u , Tr\u1ea1i C\u00e1  m\u1ea5y n\u01a1i, ai nghe ch\u1eb3ng h\u00e3i.<br>Chi \u0111\u1ee3i quan h\u1ed9 t\u00e0o bi\u00ean s\u1ed5, l\u01b0\u01a1ng ti\u1ec1n nh\u00e0 ru\u1ed9ng, cho m\u1ed9t c\u00e2u h\u00e1o ngh\u0129a l\u1ea1c quy\u00ean;<br>Chi nh\u1ecdc quan v\u00f5 kh\u1ed1 b\u00ecnh c\u00e2n, thu\u1ed1c \u0111\u1ea1n ghe bu\u00f4n, quy\u1ec1n b\u1ed1n ch\u1eef gian th\u01b0\u01a1ng \u0111\u1ea1o t\u1ea3i.</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u0110\u00ecnh Chi\u1ec3u, <i>\u0110i\u1ebfu Tr\u01b0\u01a1ng T\u01b0\u1edbng qu\u00e2n  v\u0103n</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 15, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Ph\u01b0\u01a1ng \u00e1n n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>th\u1ec3 hi\u1ec7n \u0111\u00fang n\u1ed9i dung, ngh\u1ec7 thu\u1eadt c\u1ee7a \u0111o\u1ea1n tr\u00edch?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch ng\u1ee3i ca l\u00f2ng y\u00eau n\u01b0\u1edbc, \u00fd ch\u00ed ki\u00ean c\u01b0\u1eddng v\u00e0 nh\u1eefng chi\u1ebfn c\u00f4ng hi\u1ec3n h\u00e1ch c\u1ee7a Tr\u01b0\u01a1ng T\u01b0\u1edbng qu\u00e2n qua c\u00e1c tr\u1eadn \u0111\u00e1nh \u1edf R\u1ea1ch L\u00e1, G\u00f2 C\u00f4ng, C\u1eeda Kh\u1ea9u, Tr\u1ea1i C\u00e1 trong cu\u1ed9c kh\u00e1ng chi\u1ebfn ch\u1ed1ng Ph\u00e1p x\u00e2m l\u01b0\u1ee3c.<br>\n\u2192 \u0110o\u1ea1n tr\u00edch kh\u00f4ng th\u1ec3 hi\u1ec7n n\u1ed9i dung l\u00ean \u00e1n t\u1ed9i \u00e1c c\u1ee7a th\u1ef1c d\u00e2n Ph\u00e1p.\n", "key": "C", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590609, "lessonId": 0, "a": "Kh\u00f4ng c\u00f3 t\u00e0u.", "b": "D\u00e2n c\u00f9 lao kh\u00f4ng \u0111\u01b0\u1ee3c xem h\u00e1t.", "c": "Kh\u00f4ng c\u00f3 xe h\u01a1i.", "d": "C\u00f9 lao c\u00f3 \u0111\u1ebfn ba c\u00e1i l\u00e0ng, ba c\u00e1i ch\u1ee3.", "bookId": 1086555, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cT\u00f4i sinh ra tr\u00ean m\u1ed9t c\u00f9 lao gi\u1eefa s\u00f4ng Ti\u1ec1n. N\u00f3i l\u00e0 c\u00f9 lao n\u1ed5i l\u00ean gi\u1eefa con s\u00f4ng nh\u01b0ng c\u0169ng l\u1edbn l\u1eafm - c\u00f9 lao c\u00f3 \u0111\u1ebfn ba l\u00e0ng: M\u1ef9 T\u00e2n, M\u1ef9 Ph\u00fa, M\u1ef9 H\u00f2a. Ba l\u00e0ng c\u00f3 ba c\u00e1i ch\u1ee3, ch\u1eb3ng thua ai. M\u1ed7i l\u00e0ng c\u00f3 m\u1ed9t c\u00e1i tr\u01b0\u1eddng, d\u00f9 c\u1ed9t c\u00e2y, m\u00e1i l\u00e1 c\u0169ng l\u00e0 tr\u01b0\u1eddng, thua \u1edf n\u01a1i kh\u00e1c l\u00e0 kh\u00f4ng c\u00f3 xe h\u01a1i, nh\u01b0ng c\u00f3 xe ng\u1ef1a, xu\u1ed3ng ghe th\u00ec kh\u00f4ng \u0111\u00e2u b\u1eb1ng. T\u00e0u kh\u00f4ng c\u00f3, nh\u01b0ng ng\u00e0y n\u00e0o l\u0169 nh\u1ecf c\u0169ng lao xu\u1ed1ng th\u1ea5y t\u00e0u ch\u1ea1y l\u00ean ch\u1ea1y xu\u1ed1ng - c\u00e1i th\u00fa vui c\u1ee7a l\u0169 nh\u1ecf ch\u00fang t\u00f4i l\u00e0 nh\u00ecn s\u00f3ng v\u00e0 l\u00fac t\u1eafm th\u00ec \u0111\u01b0\u1ee3c nhoi s\u00f3ng m\u1ed7i khi c\u00f3 m\u1ed9t con t\u00e0u ch\u1ea1y qua b\u1ebfn. C\u00e1i m\u00e0 d\u00e2n c\u00f9 lao t\u00f4i th\u1ea5y thi\u1ebfu nh\u1ea5t l\u00e0 kh\u00f4ng \u0111\u01b0\u1ee3c xem h\u00e1t.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Quang S\u00e1ng, <i>T\u00f4i th\u00edch l\u00e0m vua</i>, theo <i>baovannghe.vn</i>)</div>Chi ti\u1ebft n\u00e0o ph\u1ea3n \u00e1nh s\u1ef1 thi\u1ebfu th\u1ed1n \u1edf g\u00f3c \u0111\u1ed9 v\u0103n ho\u00e1 tinh th\u1ea7n n\u01a1i c\u00f9 lao n\u01a1i nh\u00e2n v\u1eadt \u201ct\u00f4i\u201d sinh s\u1ed1ng?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft: </b><br>\n\u0110o\u1ea1n tr\u00edch mi\u00eau t\u1ea3 cu\u1ed9c s\u1ed1ng tr\u00ean m\u1ed9t c\u00f9 lao gi\u1eefa s\u00f4ng Ti\u1ec1n, n\u01a1i nh\u00e2n v\u1eadt \u201ct\u00f4i\u201d sinh ra. Nh\u00e2n v\u1eadt \u201ct\u00f4i\u201d \u0111\u00e3 li\u1ec7t k\u00ea nh\u1eefng \u0111i\u1ec1u ki\u1ec7n s\u1ed1ng \u1edf c\u00f9 lao c\u1ee7a m\u00ecnh, bao g\u1ed3m c\u1ea3 nh\u1eefng m\u1eb7t t\u1ed1t v\u00e0 m\u1eb7t thi\u1ebfu s\u00f3t. Trong \u0111\u00f3, \u0111i\u1ec1u thi\u1ebfu th\u1ed1n nh\u1ea5t m\u00e0 ng\u01b0\u1eddi d\u00e2n c\u1ea3m nh\u1eadn ch\u00ednh l\u00e0 kh\u00f4ng \u0111\u01b0\u1ee3c xem h\u00e1t \u2013 m\u1ed9t ho\u1ea1t \u0111\u1ed9ng gi\u1ea3i tr\u00ed quan tr\u1ecdng.<br>\n\u2192 Chi ti\u1ebft ph\u1ea3n \u00e1nh s\u1ef1 thi\u1ebfu th\u1ed1n v\u1ec1 v\u0103n h\u00f3a tinh th\u1ea7n \u1edf c\u00f9 lao l\u00e0 \u201cC\u00e1i m\u00e0 d\u00e2n c\u00f9 lao t\u00f4i th\u1ea5y thi\u1ebfu nh\u1ea5t l\u00e0 kh\u00f4ng \u0111\u01b0\u1ee3c xem h\u00e1t.\u201d\n", "key": "B", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590612, "lessonId": 0, "a": "\u201cCho tu\u1ed5i thanh xu\u00e2n s\u00e1ng b\u1eebng l\u00ean nh\u01b0 ng\u1ecdc\u201d", "b": "\u201cV\u00e0 cho ch\u00e2n ta \u0111i t\u1edbi cu\u1ed1i \u0111\u1ea5t\u201d", "c": "\u201cTa h\u00e1t m\u00e3i b\u00e0i ca \u0110\u1ea5t N\u01b0\u1edbc\u201d", "d": "\u201cCh\u00fang con chi\u1ebfn \u0111\u1ea5u cho Ng\u01b0\u1eddi s\u1ed1ng m\u00e3i\u201d", "bookId": 1086556, "comments": 6, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u0110\u1ea5t n\u01b0\u1edbc<br>Ta h\u00e1t m\u00e3i b\u00e0i ca \u0110\u1ea5t N\u01b0\u1edbc<br>Cho tu\u1ed5i thanh xu\u00e2n s\u00e1ng b\u1eebng l\u00ean nh\u01b0 ng\u1ecdc<br>Cho m\u1eaft ta nh\u00ecn t\u1eadn c\u00f9ng tr\u1eddi<br>V\u00e0 cho ch\u00e2n ta \u0111i t\u1edbi cu\u1ed1i \u0111\u1ea5t<br>\u00d4i T\u1ed5 qu\u1ed1c m\u00e0 ta y\u00eau qu\u00fd nh\u1ea5t<br>Ch\u00fang con chi\u1ebfn \u0111\u1ea5u cho Ng\u01b0\u1eddi s\u1ed1ng m\u00e3i<br>Vi\u1ec7t Nam \u01a1i!\u201d</i><br><div style=\"text-align: right;\">(Nam H\u00e0, <i>Ch\u00fang con chi\u1ebfn \u0111\u1ea5u</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>C\u00e2u th\u01a1 n\u00e0o trong \u0111o\u1ea1n th\u01a1 th\u1ec3 hi\u1ec7n kh\u00e1t v\u1ecdng d\u00e2ng hi\u1ebfn, hi sinh v\u00ec s\u1ef1 tr\u01b0\u1eddng t\u1ed3n v\u0129nh c\u1eedu c\u1ee7a \u0111\u1ea5t n\u01b0\u1edbc?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u00e2u th\u01a1 \u201cCh\u00fang con chi\u1ebfn \u0111\u1ea5u cho Ng\u01b0\u1eddi s\u1ed1ng m\u00e3i\u201d th\u1ec3 hi\u1ec7n r\u00f5 kh\u00e1t v\u1ecdng d\u00e2ng hi\u1ebfn, hy sinh c\u1ee7a th\u1ebf h\u1ec7 con ch\u00e1u cho s\u1ef1 tr\u01b0\u1eddng t\u1ed3n c\u1ee7a \u0111\u1ea5t n\u01b0\u1edbc. \u201cNg\u01b0\u1eddi\u201d \u1edf \u0111\u00e2y l\u00e0 T\u1ed5 qu\u1ed1c Vi\u1ec7t Nam, l\u00e0 \u0111\u1ea5t n\u01b0\u1edbc m\u00e0 \u201cta y\u00eau qu\u00fd nh\u1ea5t\u201d. T\u1eeb \u201cchi\u1ebfn \u0111\u1ea5u\u201d th\u1ec3 hi\u1ec7n s\u1ef1 s\u1eb5n s\u00e0ng \u0111\u1ed1i m\u1eb7t v\u1edbi kh\u00f3 kh\u0103n, nguy hi\u1ec3m, th\u1eadm ch\u00ed hy sinh t\u00ednh m\u1ea1ng \u0111\u1ec3 b\u1ea3o v\u1ec7 T\u1ed5 qu\u1ed1c. C\u1ee5m t\u1eeb \u201cs\u1ed1ng m\u00e3i\u201d th\u1ec3 hi\u1ec7n mong mu\u1ed1n \u0111\u1ea5t n\u01b0\u1edbc s\u1ebd t\u1ed3n t\u1ea1i m\u00e3i m\u00e3i, tr\u01b0\u1eddng t\u1ed3n c\u00f9ng th\u1eddi gian.\n", "key": "D", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590616, "lessonId": 0, "a": "\u0110o\u1ea1n tr\u00edch nh\u1ea5n m\u1ea1nh v\u00e0o t\u00e1c h\u1ea1i c\u1ee7a vi\u1ec7c l\u1ea1m d\u1ee5ng \u0111i\u1ec7n tho\u1ea1i th\u00f4ng minh.", "b": "\u0110o\u1ea1n tr\u00edch b\u00e0y t\u1ecf n\u1ed7i lo l\u1eafng, tr\u0103n tr\u1edf tr\u01b0\u1edbc vi\u1ec7c l\u1ea1m d\u1ee5ng \u0111i\u1ec7n tho\u1ea1i th\u00f4ng minh.", "c": "\u0110i\u1ec7n tho\u1ea1i th\u00f4ng minh c\u00f3 t\u00e1c \u0111\u1ed9ng ti\u00eau c\u1ef1c t\u1edbi ng\u01b0\u1eddi tr\u1ebb.", "d": "\u0110o\u1ea1n tr\u00edch \u0111\u00e1nh gi\u00e1 cao l\u1ee3i \u00edch c\u1ee7a \u0111i\u1ec7n tho\u1ea1i th\u00f4ng minh.", "bookId": 1086557, "comments": 4, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cCho d\u00f9 \u0111i\u1ec7n tho\u1ea1i th\u00f4ng minh c\u00f3 t\u00ednh n\u0103ng b\u00e1o cho b\u1ea1n th\u1eddi l\u01b0\u1ee3ng b\u1ea1n b\u1ecf ra cho m\u1ea1ng x\u00e3 h\u1ed9i m\u1ed7i ng\u00e0y, t\u0103ng gi\u1ea3m bao nhi\u00eau ph\u1ea7n tr\u0103m so v\u1edbi tu\u1ea7n tr\u01b0\u1edbc, r\u1ea5t \u00edt ng\u01b0\u1eddi nh\u1eadn ra ch\u1ee9ng nghi\u1ec7n m\u1ea1ng c\u1ee7a b\u1ea3n th\u00e2n. \u0110i\u1ec7n tho\u1ea1i \u0111\u00e3 th\u00e0nh thi\u1ebft b\u1ecb b\u1ea5t ly th\u00e2n. M\u1ed9t \u0111\u1ee9a tr\u1ebb c\u1ee7a th\u1ebf h\u1ec7 Alpha th\u01b0\u1eddng hay c\u00e1u k\u1ec9nh m\u1ed9t c\u00e1ch v\u00f4 th\u1ee9c v\u00e0o th\u1eddi \u0111i\u1ec3m li\u1ec1n sau khi b\u1ecb d\u1ee9t kh\u1ecfi thi\u1ebft b\u1ecb k\u1ebft n\u1ed1i.\u201d</i><br><div style=\"text-align: right;\">(H\u00e0 Nh\u00e2n, <i>Hoa h\u1ecdc tr\u00f2</i>, s\u1ed1 1398, ra ng\u00e0y 19/12/2022, tr.3)</div>Nh\u1eadn x\u00e9t n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>\u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n trong \u0111o\u1ea1n tr\u00edch?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\u0110o\u1ea1n tr\u00edch n\u00f3i v\u1ec1 vi\u1ec7c con ng\u01b0\u1eddi \u2013 \u0111\u1eb7c bi\u1ec7t l\u00e0 tr\u1ebb em th\u1ebf h\u1ec7 Alpha \u2013 d\u1ec5 nghi\u1ec7n \u0111i\u1ec7n tho\u1ea1i th\u00f4ng minh v\u00e0 c\u00f3 nh\u1eefng ph\u1ea3n \u1ee9ng ti\u00eau c\u1ef1c khi b\u1ecb t\u00e1ch kh\u1ecfi thi\u1ebft b\u1ecb.<br>\u2192 \u0110o\u1ea1n tr\u00edch kh\u00f4ng th\u1ec3 hi\u1ec7n n\u1ed9i dung \u0111\u00e1nh gi\u00e1 cao l\u1ee3i \u00edch c\u1ee7a \u0111i\u1ec7n tho\u1ea1i th\u00f4ng minh.", "key": "D", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590624, "lessonId": 0, "a": "Th\u00e1i t\u1eed c\u0169ng kh\u00f4ng \u0111\u1ec3 cho t\u00ecm hi\u1ec3u s\u00e2u h\u01a1n nguy\u00ean nh\u00e2n khi\u1ebfn m\u00ecnh b\u1ecb m\u1ea5t tr\u00ed.", "b": "Th\u00e1i t\u1eed c\u0169ng bi\u1ebft m\u00ecnh b\u1ecb m\u1ea5t tr\u00ed, nh\u01b0ng duy\u00ean do t\u1ea1i \u0111\u00e2u th\u00ec nh\u1ea5t \u0111\u1ecbnh Ng\u01b0\u1eddi kh\u00f4ng n\u00f3i.", "c": "Th\u00e1i t\u1eed c\u1ee9 \u0111\u00e1nh tr\u1ed1ng l\u1ea3ng b\u1eb1ng nh\u1eefng c\u01a1n \u0111i\u00ean kh\u00f4n kh\u00e9o.", "d": "Th\u00e1i t\u1eed tr\u1ea3 l\u1eddi nh\u1eefng c\u00e2u h\u1ecfi c\u1ee7a R\u00f4dencran v\u00e0 Ghin\u0111\u01a1nxt\u01a1n huy\u00ean thuy\u00ean, d\u00e0i d\u00f2ng.", "bookId": 1086558, "comments": 0, "bookmarks": 7, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cVUA - Th\u1ebf trong khi chuy\u1ec7n tr\u00f2 c\u00f9ng th\u00e1i t\u1eed, c\u00e1c khanh l\u1ea1i kh\u00f4ng l\u1ef1a \u0111\u01b0\u1ee3c c\u01a1 h\u1ed9i n\u00e0o \u0111\u1ec3 t\u00ecm hi\u1ec3u t\u1ea1i sao ng\u01b0\u1eddi r\u1ed1i lo\u1ea1n t\u00e2m th\u1ea7n, \u0111\u1ec3 cho chu\u1ed7i ng\u00e0y xanh \u00eam \u0111\u1eb9p b\u1ecb tan n\u00e1t v\u00ec nh\u1eefng c\u01a1n \u0111i\u00ean d\u1eef d\u1ed9i, hi\u1ec3m ngh\u00e8o hay sao?<br>R\u00d4DENCRAN - T\u00e2u B\u1ec7 h\u1ea1, th\u00e1i t\u1eed c\u0169ng bi\u1ebft m\u00ecnh b\u1ecb m\u1ea5t tr\u00ed, nh\u01b0ng duy\u00ean do t\u1ea1i \u0111\u00e2u th\u00ec nh\u1ea5t \u0111\u1ecbnh ng\u01b0\u1eddi kh\u00f4ng n\u00f3i.<br>GHIN\u0110\u01a0NXT\u01a0N - Th\u1ef1c ra th\u00ec th\u00e1i t\u1eed c\u0169ng kh\u00f4ng \u0111\u1ec3 cho t\u00ecm hi\u1ec3u s\u00e2u h\u01a1n. Ng\u01b0\u1eddi c\u1ee9 \u0111\u00e1nh tr\u1ed1ng l\u1ea3ng b\u1eb1ng nh\u1eefng c\u01a1n \u0111i\u00ean kh\u00f4n kh\u00e9o, m\u1ed7i khi ch\u00fang th\u1ea7n t\u00ecm c\u00e1ch g\u1ee3i Ng\u01b0\u1eddi t\u1ecf b\u00e0y th\u1ef1c tr\u1ea1ng t\u00e2m h\u1ed3n m\u00ecnh.<br>HO\u00c0NG H\u1eacU - Th\u00e1i t\u1eed ti\u1ebfp c\u00e1c khanh c\u00f3 t\u1eed t\u1ebf kh\u00f4ng?<br>R\u00d4DENCRAN - Th\u01b0a, th\u1eadt \u0111\u00fang nh\u01b0 m\u1ed9t ng\u01b0\u1eddi l\u1ecbch thi\u1ec7p.<br>GHIN\u0110\u01a0NXT\u01a0N - Nh\u01b0ng b\u00ean trong v\u1eabn c\u00f3 v\u1ebb g\u00ec g\u01b0\u1ee3ng g\u1ea1o.<br>R\u00d4DENCRAN - Ng\u01b0\u1eddi h\u1ecfi r\u1ea5t \u00edt, nh\u01b0ng tr\u1ea3 l\u1eddi nh\u1eefng c\u00e2u h\u1ecfi c\u1ee7a ch\u00fang th\u1ea7n th\u00ec huy\u00ean thuy\u00ean d\u00e0i d\u00f2ng.\u201d</i><br><div style=\"text-align: right;\">(William Shakespeare, <i>Hamlet</i>, theo <i>William Shakespeare Tuy\u1ec3n t\u1eadp t\u00e1c ph\u1ea9m</i>, NXB S\u00e2n kh\u1ea5u, 2006)</div>Trong \u0111o\u1ea1n tr\u00edch, bi\u1ec3u hi\u1ec7n n\u00e0o sau \u0111\u00e2y cho th\u1ea5y nh\u00e2n v\u1eadt th\u00e1i t\u1eed (Hamlet) gi\u1ed1ng ng\u01b0\u1eddi \u0111i\u00ean?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nTrong v\u1edf k\u1ecbch Hamlet c\u1ee7a Shakespeare, Hamlet gi\u1ea3 \u0111i\u00ean \u0111\u1ec3 che gi\u1ea5u \u00fd \u0111\u1ecbnh tr\u1ea3 th\u00f9 c\u1ee7a m\u00ecnh. H\u00e0nh vi c\u1ee7a Hamlet \u0111\u00f4i khi khi\u1ebfn ng\u01b0\u1eddi kh\u00e1c ngh\u0129 r\u1eb1ng ch\u00e0ng th\u1eadt s\u1ef1 m\u1ea5t tr\u00ed, nh\u01b0ng th\u1ef1c ch\u1ea5t \u0111\u00f3 ch\u1ec9 l\u00e0 m\u1ed9t c\u00e1ch \u0111\u00e1nh l\u1ea1c h\u01b0\u1edbng. :<br>\n\u2192 Th\u00e1i t\u1eed tr\u1ea3 l\u1eddi nh\u1eefng c\u00e2u h\u1ecfi c\u1ee7a R\u00f4dencran v\u00e0 Ghin\u0111\u01a1nxt\u01a1n huy\u00ean thuy\u00ean, d\u00e0i d\u00f2ng l\u00e0 bi\u1ec3u hi\u1ec7n gi\u1ed1ng ng\u01b0\u1eddi \u0111i\u00ean nh\u1ea5t v\u00ec c\u00e1ch n\u00f3i huy\u00ean thuy\u00ean, d\u00e0i d\u00f2ng, kh\u00f4ng ki\u1ec3m so\u00e1t \u0111\u01b0\u1ee3c l\u1eddi n\u00f3i l\u00e0 m\u1ed9t \u0111\u1eb7c \u0111i\u1ec3m d\u1ec5 th\u1ea5y \u1edf ng\u01b0\u1eddi b\u1ecb r\u1ed1i lo\u1ea1n t\u00e2m th\u1ea7n.\n", "key": "D", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590626, "lessonId": 0, "a": "Tr\u1eef t\u00ecnh, t\u1ea3 th\u1ef1c.", "b": "Tr\u00e0o ph\u00fang, tr\u1eef t\u00ecnh.", "c": "T\u1ef1 s\u1ef1, ch\u00e2m bi\u1ebfm.", "d": "T\u1ea3 th\u1ef1c, tr\u00e0o ph\u00fang.", "bookId": 1086559, "comments": 7, "bookmarks": 22, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTh\u1eeba chu thu\u1eadn thu\u1ef7 v\u00e3ng Ung Ninh ,<br>H\u0129nh \u0111i\u1ebfu thuy\u1ec1n lan t\u1ef1 gi\u1ea3o h\u00ecnh;<br>L\u01b0\u1ee1ng ng\u1ea1n h\u01b0\u01a1ng th\u00f4n tr\u00f9 m\u1eadt th\u1eadm,<br>Giang t\u00e2m ng\u01b0 ph\u1ee7 \u0111i\u1ebfu thuy\u1ec1n khinh.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>B\u00e1n l\u1ed9 th\u00e1p thuy\u1ec1n ph\u00f3 Ung</i>)</div>D\u1ecbch ngh\u0129a:<br><i>\u201c\u0110\u00e1p thuy\u1ec1n xu\u00f4i d\u00f2ng \u0111i Ung Ninh,<br>Ch\u00e2n b\u1ecb treo l\u00ean gi\u00e0n thuy\u1ec1n nh\u01b0 t\u1ed9i h\u00ecnh treo c\u1ed5;<br>L\u00e0ng x\u00f3m hai b\u00ean s\u00f4ng th\u1eadt l\u00e0 \u0111\u00f4ng \u0111\u00fac,<br>Gi\u1eefa l\u00f2ng s\u00f4ng, thuy\u1ec1n c\u00e2u c\u1ee7a \u00f4ng ch\u00e0i l\u01b0\u1edbt nh\u1eb9.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>Gi\u1eefa \u0111\u01b0\u1eddng \u0111\u00e1p thuy\u1ec1n \u0111i Ung Ninh</i>, theo <i>Nh\u1eadt k\u00ed trong t\u00f9</i>, NXB Ch\u00ednh tr\u1ecb qu\u1ed1c gia - S\u1ef1 th\u1eadt, 2015)</div>B\u00e0i th\u01a1 v\u1eadn d\u1ee5ng k\u1ebft h\u1ee3p c\u00e1c b\u00fat ph\u00e1p ngh\u1ec7 thu\u1eadt n\u00e0o?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nB\u00e0i th\u01a1 v\u1eadn d\u1ee5ng k\u1ebft h\u1ee3p c\u00e1c b\u00fat ph\u00e1p ngh\u1ec7 thu\u1eadt:<br>\n- T\u1ea3 th\u1ef1c: B\u00e0i th\u01a1 ghi l\u1ea1i ch\u00e2n th\u1ef1c ho\u00e0n c\u1ea3nh kh\u1eafc nghi\u1ec7t c\u1ee7a ng\u01b0\u1eddi t\u00f9 c\u00e1ch m\u1ea1ng - ch\u00e2n b\u1ecb treo tr\u00ean gi\u00e0n thuy\u1ec1n c\u00f9ng c\u1ea3nh l\u00e0ng x\u00f3m hai b\u1edd \u0111\u00f4ng \u0111\u00fac, thuy\u1ec1n c\u00e2u l\u01b0\u1edbt nh\u1eb9.<br>\n- Tr\u1eef t\u00ecnh: Trong t\u00ecnh c\u1ea3nh kh\u1ed5 c\u1ef1c \u1ea5y, Ng\u01b0\u1eddi v\u1eabn c\u1ea3m nh\u1eadn \u0111\u01b0\u1ee3c v\u1ebb \u0111\u1eb9p thi\u00ean nhi\u00ean v\u00e0 cu\u1ed9c s\u1ed1ng xung quanh c\u1ee7a ng\u01b0\u1eddi d\u00e2n \u1edf Ung Ninh (L\u00e0ng x\u00f3m hai b\u00ean s\u00f4ng th\u1eadt l\u00e0 \u0111\u00f4ng \u0111\u00fac/ Gi\u1eefa l\u00f2ng s\u00f4ng, thuy\u1ec1n c\u00e2u c\u1ee7a \u00f4ng ch\u00e0i l\u01b0\u1edbt nh\u1eb9).\n", "key": "A", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590627, "lessonId": 0, "a": "\u0110o\u1ea1n tr\u00edch c\u00f3 hi\u1ec7n t\u01b0\u1ee3ng vi ph\u1ea1m quy t\u1eafc ng\u00f4n ng\u1eef th\u00f4ng th\u01b0\u1eddng.", "b": "B\u1ee9c tranh \u0111\u00eam trong \u0111o\u1ea1n tr\u00edch r\u1ed9n r\u00e0ng b\u1edfi r\u1ea5t nhi\u1ec1u thanh \u00e2m.", "c": "Kh\u00f4ng gian \u0111\u01b0\u1ee3c kh\u1eafc ho\u1ea1 trong \u0111o\u1ea1n tr\u00edch l\u00e0 kh\u00f4ng gian \u1edf ch\u1ed1n l\u00e0ng qu\u00ea.", "d": "Nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh trong \u0111o\u1ea1n tr\u00edch l\u00e0 m\u1ed9t ng\u01b0\u1eddi nh\u1ea1y c\u1ea3m v\u00e0 n\u1eb7ng l\u00f2ng v\u1edbi qu\u00ea h\u01b0\u01a1ng.", "bookId": 1086560, "comments": 4, "bookmarks": 11, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u0110\u00e3 l\u00e2u. \u0110\u00eam nay m\u1edbi ng\u1ee7 \u0111\u00eam l\u1ea1i \u1edf ng\u00f4i nh\u00e0 tu\u1ed5i th\u01a1. \u0110\u00eam l\u00e0ng qu\u00ea thanh v\u1eafng t\u0129nh l\u1eb7ng ch\u1eb3ng kh\u00e1c g\u00ec ng\u00e0y m\u00ecnh c\u00f2n nh\u1ecf.<br>Su\u1ed1t \u0111\u00eam nghe ti\u1ebfng nh\u00e3n ch\u00edn r\u1ee5ng. Ti\u1ebfng lanh canh l\u00e0 r\u01a1i tr\u00ean m\u00e1i t\u00f4n. Ti\u1ebfng l\u1ed9c c\u1ed9c l\u00e0 r\u01a1i xu\u1ed1ng s\u00e2n g\u1ea1ch. Ti\u1ebfng l\u1ed9p b\u1ed9p l\u00e0 r\u01a1i xu\u1ed1ng \u0111\u1ea5t v\u01b0\u1eddn. Ti\u1ebfng nh\u00e3n r\u1ee5ng th\u1ea3ng th\u1ed1t trong \u0111\u00eam. Nghe th\u1eadt hoang v\u1eafng tr\u1ed1ng kh\u00f4ng.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Linh Khi\u1ebfu, <i>Nh\u00e3n r\u1ee5ng</i>, theo <i>baovannghe.vn</i>)</div>Nh\u1eadn x\u00e9t n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>n\u00eau \u0111\u00fang n\u1ed9i dung, h\u00ecnh th\u1ee9c ngh\u1ec7 thu\u1eadt c\u1ee7a \u0111o\u1ea1n tr\u00edch tr\u00ean?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- \u0110o\u1ea1n tr\u00edch c\u00f3 hi\u1ec7n t\u01b0\u1ee3ng ph\u00e1 v\u1ee1 quy t\u1eafc ng\u00f4n ng\u1eef th\u00f4ng th\u01b0\u1eddng:<br>\n+ S\u1eed d\u1ee5ng c\u00e2u \u0111\u1eb7c bi\u1ec7t: \u201c\u0110\u00e3 l\u00e2u.\u201d<br>\n+ T\u1ec9nh l\u01b0\u1ee3c th\u00e0nh ph\u1ea7n ch\u00ednh c\u1ee7a c\u00e2u: \u201c\u0110\u00eam nay m\u1edbi ng\u1ee7 \u0111\u00eam l\u1ea1i \u1edf ng\u00f4i nh\u00e0 tu\u1ed5i th\u01a1.\u201d, \u201cSu\u1ed1t \u0111\u00eam nghe ti\u1ebfng nh\u00e3n ch\u00edn r\u1ee5ng.\u201d\u2026<br>\n- Kh\u00f4ng gian \u0111\u01b0\u1ee3c kh\u1eafc ho\u1ea1 trong \u0111o\u1ea1n tr\u00edch l\u00e0 kh\u00f4ng gian \u1edf ch\u1ed1n l\u00e0ng qu\u00ea th\u1ec3 hi\u1ec7n qua nh\u1eefng h\u00ecnh \u1ea3nh:  \u201cng\u00f4i nh\u00e0 tu\u1ed5i th\u01a1\u201d, \u201c\u0111\u00eam l\u00e0ng qu\u00ea thanh v\u1eafng\u201d, c\u00e2y nh\u00e3n, \u201cs\u00e2n g\u1ea1ch\u201d, \u201cm\u00e1i t\u00f4n\u201d, \u201cv\u01b0\u1eddn\u201d,\u2026<br>\n- Nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh trong \u0111o\u1ea1n tr\u00edch l\u00e0 m\u1ed9t ng\u01b0\u1eddi nh\u1ea1y c\u1ea3m v\u00e0 n\u1eb7ng l\u00f2ng v\u1edbi qu\u00ea h\u01b0\u01a1ng: Nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh tr\u1edf l\u1ea1i qu\u00ea h\u01b0\u01a1ng v\u00e0 c\u1ea3m nh\u1eadn r\u1ea5t tinh t\u1ebf t\u1eebng \u00e2m thanh nh\u1ecf nh\u1ea5t c\u1ee7a tr\u00e1i nh\u00e3n r\u1ee5ng, th\u1ec3 hi\u1ec7n s\u1ef1 nh\u1ea1y c\u1ea3m qua vi\u1ec7c ph\u00e2n bi\u1ec7t r\u00f5 \u201clanh canh\u201d, \u201cl\u1ed9c c\u1ed9c\u201d, \u201cl\u1ed9p b\u1ed9p\u201d. \u0110\u1ed3ng th\u1eddi, n\u1ed7i x\u00fac \u0111\u1ed9ng khi \u201c\u0111\u00eam nay m\u1edbi ng\u1ee7 \u0111\u00eam l\u1ea1i \u1edf ng\u00f4i nh\u00e0 tu\u1ed5i th\u01a1\u201d cho th\u1ea5y t\u00ecnh c\u1ea3m g\u1eafn b\u00f3 s\u00e2u n\u1eb7ng v\u1edbi qu\u00ea nh\u00e0.<br>\n\u2192 Nh\u1eadn x\u00e9t \u201cB\u1ee9c tranh \u0111\u00eam trong \u0111o\u1ea1n tr\u00edch r\u1ed9n r\u00e0ng b\u1edfi r\u1ea5t nhi\u1ec1u thanh \u00e2m\u201d l\u00e0 kh\u00f4ng ch\u00ednh x\u00e1c v\u00ec \u0111o\u1ea1n tr\u00edch m\u00f4 t\u1ea3 m\u1ed9t \u0111\u00eam l\u00e0ng qu\u00ea thanh v\u1eafng, t\u0129nh l\u1eb7ng \u0111\u1ebfn \u201choang v\u1eafng tr\u1ed1ng kh\u00f4ng\u201d. Nh\u1eefng ti\u1ebfng nh\u00e3n r\u1ee5ng l\u1ebb t\u1ebb, th\u01b0a th\u1edbt vang l\u00ean ch\u1ec9 c\u00e0ng l\u00e0m n\u1ed5i b\u1eadt s\u1ef1 t\u0129nh l\u1eb7ng c\u1ee7a kh\u00f4ng gian. Chu\u1ed7i \u00e2m thanh \u1ea5y kh\u00f4ng t\u1ea1o n\u00ean s\u1ef1 r\u1ed9n r\u00e0ng m\u00e0 \u0111\u01b0\u1ee3c d\u00f9ng \u0111\u1ec3 nh\u1ea5n m\u1ea1nh v\u1ebb v\u1eafng l\u1eb7ng, t\u0129nh m\u1ecbch c\u1ee7a bu\u1ed5i \u0111\u00eam \u1edf l\u00e0ng qu\u00ea.\n", "key": "B", "isVideo": true, "score": 0, "order": 11, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590629, "lessonId": 0, "a": "<i>H\u1ed3n b\u01b0\u1edbm m\u01a1 ti\u00ean</i> (Kh\u00e1i H\u01b0ng), <i>Ng\u1ee5c trung nh\u1eadt k\u00ed</i> (H\u1ed3 Ch\u00ed Minh), <i>Mua danh</i> (Nam Cao).", "b": "<i>Truy\u1ec7n Ki\u1ec1u</i> (Nguy\u1ec5n Du), <i>S\u1ed1ng m\u00f2n</i> (Nam Cao), <i>T\u1eaft \u0111\u00e8n</i> (Ng\u00f4 T\u1ea5t T\u1ed1).", "c": "<i>Tr\u0103ng s\u00e1ng</i> (Nam Cao), <i>B\u1ec9 v\u1ecf</i> (Nguy\u00ean H\u1ed3ng), <i>M\u1ea5t c\u00e1i v\u00ed</i> (Nguy\u1ec5n C\u00f4ng Hoan).", "d": "<i>T\u1eeb \u1ea5y</i> (T\u1ed1 H\u1e 3, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590632, "lessonId": 0, "a": "th\u1ef1c hi\u1ec7n.", "b": "ch\u1ebf t\u00e1c.", "c": "t\u00e1c gi\u1ea3.", "d": "Cu\u1ed1n s\u00e1ch.", "bookId": 1086564, "comments": 2, "bookmarks": 6, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<u>Cu\u1ed1n s\u00e1ch</u> c\u1ee7a nh\u00f3m <u>t\u00e1c gi\u1ea3</u> tr\u1ebb \u0111ang \u0111\u01b0\u1ee3c <u>th\u1ef1c hi\u1ec7n</u> \u1edf kh\u00e2u <u>ch\u1ebf t\u00e1c</u>.<br>T\u1eeb n\u00e0o b\u1ecb d\u00f9ng sai trong c\u00e2u tr\u00ean?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>- T\u1eeb \u201cch\u1ebf t\u00e1c\u201d sai v\u1ec1 ng\u1eef ngh\u0129a. \u201cCh\u1ebf t\u00e1c\u201d c\u00f3 ngh\u0129a l\u00e0 s\u1eed d\u1ee5ng nguy\u00ean v\u1eadt li\u1ec7u v\u00e0 s\u1ee9c s\u00e1ng t\u1ea1o \u0111\u1ec3 l\u00e0m ra (th\u01b0\u1eddng l\u00e0 s\u1ea3n ph\u1ea9m tinh x\u1ea3o, r\u1ea5t qu\u00fd gi\u00e1), th\u01b0\u1eddng d\u00f9ng cho t\u1ea1o ra c\u00e1c v\u1eadt c\u1ee5 th\u1ec3, th\u1ee7 c\u00f4ng, m\u1ef9 ngh\u1ec7, t\u00e1c ph\u1ea9m ngh\u1ec7 thu\u1eadt, kh\u00f4ng ph\u00f9 h\u1ee3p v\u1edbi vi\u1ec7c l\u00e0m s\u00e1ch.<br>- S\u1eeda l\u1ea1i: Cu\u1ed1n s\u00e1ch c\u1ee7a nh\u00f3m t\u00e1c gi\u1ea3 tr\u1ebb \u0111ang \u0111\u01b0\u1ee3c th\u1ef1c hi\u1ec7n \u1edf kh\u00e2u <b>bi\u00ean so\u1ea1n.</b>", "key": "B", "isVideo": true, "score": 0, "order": 15, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590634, "lessonId": 0, "a": "Sai v\u1ec1 d\u00f9ng t\u1eeb.", "b": "Sai ng\u1eef ph\u00e1p.", "c": "Sai quy chi\u1ebfu.", "d": "Sai logic.", "bookId": 1086565, "comments": 12, "bookmarks": 10, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>V\u00ec gia \u0111\u00ecnh c\u00f3 \u0111i\u1ec1u ki\u1ec7n nh\u01b0ng t\u00f4i kh\u00f4ng mua \u0111\u01b0\u1ee3c chi\u1ebfc xe y\u00eau th\u00edc : false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590689, "lessonId": 0, "a": "Ngay t\u1eeb ng\u00e0y \u0111\u1ea7u xu\u00e2n, gia \u0111\u00ecnh \u0111\u01b0\u1ee3c x\u00f4ng \u0111\u1ea5t nh\u01b0 \u0111\u01b0\u1ee3c truy\u1ec1n ni\u1ec1m tin \u1eaft t\u1ea5n t\u00e0i t\u1ea5n l\u1ed9c trong n\u0103m.", "b": "X\u1ee9 n\u00e0y, ng\u01b0\u1eddi ta ch\u1ec9 c\u1ea7n s\u1ed1ng t\u1ed1t, s\u1ed1ng t\u1eed t\u1ebf, \u0111\u00f3 \u0111\u00e3 l\u00e0 ph\u00fac ph\u1ea7n c\u1ee7a m\u00ecnh r\u1ed3i.", "c": "Tuy t\u00f4i ch\u0103m ch\u1ec9 h\u1ecdc h\u00e0nh nh\u01b0ng k\u1ebft qu\u1ea3 c\u1ee7a t\u00f4i r\u1ea5t t\u1ed1t.", "d": "Nh\u1eefng con c\u00e1, con t\u00f4m tr\u00ean v\u00f9ng n\u01b0\u1edbc r\u1ed9ng theo th\u01b0\u1ee3ng ngu\u1ed3n tr\u00e0n v\u1ec1 s\u1ebd nu\u00f4i \u0111\u1eddi d\u00e2n x\u1ee9 n\u00e0y qua c\u01a1n ng\u1eadp ng\u1ee5a.", "bookId": 1086569, "comments": 0, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Ch\u1ec9 ra c\u00e2u sai trong c\u00e1c c\u00e2u sau:", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- C\u00e2u \u201cTuy t\u00f4i ch\u0103m ch\u1ec9 h\u1ecdc h\u00e0nh nh\u01b0ng k\u1ebft qu\u1ea3 c\u1ee7a t\u00f4i r\u1ea5t t\u1ed1t.\u201d sai v\u1ec1 logic do d\u00f9ng sai c\u1eb7p quan h\u1ec7 t\u1eeb. \u201cTuy - nh\u01b0ng\u201d d\u00f9ng \u0111\u1ec3 n\u1ed1i hai m\u1ec7nh \u0111\u1ec1 tr\u00e1i ng\u01b0\u1ee3c nhau nh\u01b0ng n\u1ed9i dung hai m\u1ec7nh \u0111\u1ec1 \u201cch\u0103m ch\u1ec9 h\u1ecdc h\u00e0nh\u201d v\u00e0 \u201ck\u1ebft qu\u1ea3 c\u1ee7a t\u00f4i r\u1ea5t t\u1ed1t\u201d kh\u00f4ng \u0111\u1ed1i l\u1eadp nhau m\u00e0 l\u00e0 m\u1ed1i quan h\u1ec7 ch\u1ec9 nguy\u00ean nh\u00e2n - k\u1ebft qu\u1ea3.<br>\n- S\u1eeda l\u1ea1i: <b>V\u00ec</b> t\u00f4i ch\u0103m ch\u1ec9 h\u1ecdc h\u00e0nh <b>n\u00ean </b>k\u1ebft qu\u1ea3 c\u1ee7a t\u00f4i r\u1ea5t t\u1ed1t.\n", "key": "C", "isVideo": true, "score": 0, "order": 20, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 21 \u0111\u1ebfn 25", "content": "\u201cC\u00e1c nh\u00e0 nghi\u00ean c\u1ee9u tr\u01b0\u1eddng \u0111\u1ea1i h\u1ecdc Iowa khuy\u1ebfn ngh\u1ecb m\u1ecdi b\u1ec7nh nh\u00e2n c\u1ea7n xem x\u00e9t c\u00e1c m\u1ee9c ho\u1ea1t \u0111\u1ed9ng th\u1ec3 ch\u1ea5t c\u1ee7a m\u00ecnh \u0111\u1ec3 gi\u1ea3m b\u1ec7nh t\u1eadt, sau khi h\u1ecd t\u00ecm th\u1ea5y m\u1ed1i li\u00ean h\u1ec7 gi\u1eefa ho\u1ea1t \u0111\u1ed9ng th\u1ec3 ch\u1ea5t v\u00e0 c\u00e1c b\u1ec7nh m\u00e3n t\u00ednh.<br> Nghi\u00ean c\u1ee9u n\u00e0y - do Ph\u00f3 gi\u00e1o s\u01b0 Lucas Carr, Khoa S\u1ee9c kh\u1ecfe v\u00e0 th\u1ec3 ch\u1ea5t ng\u01b0\u1eddi, d\u1eabn d\u1eaft - \u0111\u00e3 ki\u1ec3m tra ph\u1ea3n h\u1ed3i c\u1ee7a h\u01a1n 7.000 b\u1ec7nh nh\u00e2n t\u1ea1i trung t\u00e2m Y t\u1ebf ch\u0103m s\u00f3c s\u1ee9c kh\u1ecfe \u0110\u1ea1i h\u1ecdc Iowa t\u1eeb m\u1ed9t b\u1ea3ng h\u1ecfi v\u1ec1 m\u1ee9c ho\u1ea1t \u0111\u1ed9ng th\u1ec3 ch\u1ea5t c\u1ee7a h\u1ecd.<br>T\u1eeb ph\u1ea7n tr\u1ea3 l\u1eddi c\u1ee7a c\u00e1c b\u1ec7nh nh\u00e2n, c\u00e1c nh\u00e0 nghi\u00ean c\u1ee9u ph\u00e1t hi\u1ec7n ra nh\u1eefng ng\u01b0\u1eddi c\u00f3 c\u00e1c m\u1ee9c ho\u1ea1t \u0111\u1ed9ng th\u1ec3 ch\u1ea5t cao nh\u1ea5t - ngh\u0129a l\u00e0 h\u1ecd t\u1eadp luy\u1ec7n t\u1eeb v\u1eeba ph\u1ea3i \u0111\u1ebfn m\u1ea1nh m\u1ebd \u00edt nh\u1ea5t 150 ph\u00fat m\u1ed7i tu\u1ea7n - \u0111\u00e3 l\u00e0m gi\u1ea3m \u0111i nguy c\u01a1 r\u1ee7i ro th\u1ea5p h\u01a1n m\u1ed9t c\u00e1ch \u0111\u00e1ng k\u1ec3 v\u1ec1 m\u1eb7t th\u1ed1ng k\u00ea 19 \u0111i\u1ec1u ki\u1ec7n g\u00e2y b\u1ec7nh m\u00e3n t\u00ednh, bao g\u1ed3m b\u1ec7nh tim m\u1ea1ch, ung th\u01b0, h\u00f4 h\u1ea5p v\u00e0 ti\u1ec3u \u0111\u01b0\u1eddng.<br>Ph\u00e1t hi\u1ec7n n\u00e0y c\u00f2n \u0111\u1ec1 xu\u1ea5t c\u00e1c b\u1ec7nh nh\u00e2n \u00edt ho\u1ea1t \u0111\u1ed9ng th\u1ec3 ch\u1ea5t - ngh\u0129a l\u00e0 t\u1eeb \u00edt \u0111\u1ebfn kh\u00f4ng t\u1eadp luy\u1ec7n trong v\u00f2ng m\u1ed9t tu\u1ea7n - l\u00e0m gia t\u0103ng nguy c\u01a1 ph\u00e1t tri\u1ec3n m\u1ed9t b\u1ec7nh m\u00e3n t\u00ednh.<br>Tr\u00ean c\u01a1 s\u1edf nh\u1eefng k\u1ebft qu\u1ea3 \u0111\u00f3, c\u00e1c nh\u00e0 nghi\u00ean c\u1ee9u Iowa \u0111\u1ec1 xu\u1ea5t c\u00e1c h\u1ec7 th\u1ed1ng ch\u0103m s\u00f3c s\u1ee9c kh\u1ecfe cung c\u1ea5p th\u00f4ng tin v\u1ec1 c\u00e1c d\u1ecbch v\u1ee5 ch\u0103m s\u00f3c s\u1ee9c kh\u1ecfe cho c\u00e1c b\u1ec7nh nh\u00e2n kh\u00f4ng ho\u1ea1t \u0111\u1ed9ng th\u1ec3 ch\u1ea5t g\u1eb7p nhi\u1ec1u nguy c\u01a1 r\u1ee7i ro nh\u1ea5t.<br>\u201cTrong m\u00f4i tr\u01b0\u1eddng ch\u0103m s\u00f3c s\u1ee9c kh\u1ecfe c\u1ee7a ch\u00fang ta, kh\u00f4ng d\u1ec5 g\u00ec \u0111\u1ec3 m\u1ed9t b\u00e1c s\u0129 bi\u1ebft \u0111\u01b0\u1ee3c th\u00f4ng tin \u0111\u1ec3 gi\u00fap c\u00e1c b\u1ec7nh nh\u00e2n ho\u1ea1t \u0111\u1ed9ng th\u1ec3 ch\u1ea5t nhi\u1ec1u h\u01a1n\u201d, Carr n\u00f3i. \u201cV\u00e0 do \u0111\u00f3, v\u1edbi c\u00e1c b\u1ec7nh nh\u00e2n c\u00f3 k\u1ec3 l\u1ea1i nh\u1eefng c\u00e1c ho\u1ea1t \u0111\u1ed9ng th\u1ec3 ch\u1ea5t \u00edt \u1ecfi c\u1ee7a h\u1ecd, ch\u00fang ta c\u1ea7n nh\u1eefng ph\u01b0\u01a1ng \u00e1n \u0111\u1ec3 d\u1ec5 d\u00e0ng k\u1ebft n\u1ed1i h\u1ecd v\u1edbi nh\u1eefng d\u1ecbch v\u1ee5 h\u1ed7 tr\u1ee3 nh\u01b0 nh\u1eefng \u201ctoa thu\u1ed1c\u201d r\u00e8n luy\u1ec7n s\u1ee9c kh\u1ecfe v\u00e0/ ho\u1eb7c c\u1ed9ng \u0111\u1ed3ng c\u00e1c chuy\u00ean gia s\u1ee9c kh\u1ecfe\u201d.<br>Ph\u1ea7n l\u1edbn c\u00e1c b\u1ec7nh vi\u1ec7n \u1edf M\u1ef9 \u0111\u1ec1u kh\u00f4ng h\u1ecfi c\u00e1c b\u1ec7nh nh\u00e2n v\u1ec1 ho\u1ea1t \u0111\u1ed9ng th\u1ec3 ch\u1ea5t c\u1ee7a h\u1ecd v\u00e0 kh\u00f4ng c\u00f3 h\u1ec7 th\u1ed1ng b\u1ec7nh vi\u1ec7n n\u00e0o \u1edf Trung T\u00e2y l\u00e0m \u0111i\u1ec1u \u0111\u00f3, theo c\u00e1c nh\u00e0 nghi\u00ean c\u1ee9u. Trong nghi\u00ean c\u1ee9u n\u00e0y, Carr \u0111\u00e3 h\u1ee3p t\u00e1c v\u1edbi Britt Marcussen, m\u1ed9t chuy\u00ean gia y h\u1ecdc gia \u0111\u00ecnh \u1edf UI Health Care, \u0111\u1ec3 x\u00e2y d\u1ef1ng b\u1ea3ng h\u1ecfi v\u1ec1 vi\u1ec7c c\u00e1c b\u1ec7nh nh\u00e2n \u0111\u1ebfn c\u00e1c ph\u00f2ng kh\u00e1m s\u1ee9c kh\u1ecfe h\u1eb1ng n\u0103m. Nghi\u00ean c\u1ee9u n\u00e0y \u0111\u00e3 \u0111\u01b0\u1ee3c th\u1ef1c hi\u1ec7n t\u1eeb th\u00e1ng 11/2017 \u0111\u1ebfn th\u00e1ng 12/2022.<br>Cu\u1ed9c kh\u1ea3o s\u00e1t D\u1ea5u hi\u1ec7u quan tr\u1ecdng c\u1ee7a t\u1eadp th\u1ec3 d\u1ee5c n\u00e0y h\u1ecfi c\u00e1c b\u1ec7nh nh\u00e2n hai c\u00e2u h\u1ecfi m\u00e0 h\u1ecd c\u1ea7n tr\u1ea3 l\u1eddi theo b\u1ea3ng:<br>\u2022\t\u201cTrung b\u00ecnh, b\u1ea1n t\u1eadp luy\u1ec7n t\u1eeb trung b\u00ecnh \u0111\u1ebfn m\u1ea1nh m\u1ebd (gi\u1ed1ng nh\u01b0 \u0111i b\u1ed9 nhanh) bao nhi\u00eau ng\u00e0y m\u1ed9t tu\u1ea7n?\u201d (t\u1eeb 0 \u0111\u1ebfn 7 ng\u00e0y) <br>\u2022\t\u201cT\u00ednh trung b\u00ecnh, b\u1ea1n t\u1eadp bao nhi\u00eau ph\u00fat \u1edf c\u1ea5p \u0111\u1ed9 n\u00e0y?\u201d <br>Carr v\u00e0 nh\u00f3m nghi\u00ean c\u1ee9u \u0111\u1ec1 xu\u1ea5t th\u1ef1c hi\u1ec7n cu\u1ed9c kh\u1ea3o s\u00e1t v\u1edbi m\u1ecdi b\u1ec7nh nh\u00e2n.<br>\u201cCu\u1ed9c kh\u1ea3o s\u00e1t hai c\u00e2u h\u1ecfi n\u00e0y ch\u1ec9 l\u1ea5y m\u1ea5t \u1edf m\u1ed7i b\u1ec7nh nh\u00e2n kho\u1ea3ng 30 gi\u00e2y \u0111\u1ec3 ho\u00e0n th\u00e0nh, v\u00ec v\u1eady kh\u00f4ng khi\u1ebfn h\u1ecd kh\u00f3 ch\u1ecbu l\u1eafm. Tuy nhi\u00ean n\u00f3 \u0111\u00e3 \u0111\u1ee7 n\u00f3i v\u1edbi ch\u00fang t\u00f4i r\u1ea5t nhi\u1ec1u v\u1ec1 t\u1ed5ng th\u1ec3 s\u1ee9c kh\u1ecfe c\u1ee7a b\u1ec7nh nh\u00e2n\u201d, Carr n\u00f3i.<br>C\u00e1c nh\u00e0 nghi\u00ean c\u1ee9u c\u0169ng so s\u00e1nh c\u00e1c k\u1ebft qu\u1ea3 t\u1eeb c\u00e1c b\u1ec7nh nh\u00e2n \u0111\u00e3 ho\u00e0n th\u00e0nh cu\u1ed9c kh\u1ea3o s\u00e1t v\u1edbi h\u01a1n 33.000 ng\u01b0\u1eddi ch\u01b0a t\u1eebng tham gia v\u00e0o b\u1ea5t c\u1ee9 cu\u1ed9c kh\u1ea3o s\u00e1t n\u00e0o c\u1ee7a b\u1ec7nh vi\u1ec7n. H\u1ecd ph\u00e1t hi\u1ec7n ra, c\u00e1c b\u1ec7nh nh\u00e2n tham gia kh\u1ea3o s\u00e1t tr\u1ebb h\u01a1n v\u00e0 c\u00f3 s\u1ee9c kh\u1ecfe t\u1ed1t h\u01a1n so v\u1edbi nh\u1eefng b\u1ec7nh nh\u00e2n kh\u00f4ng tr\u1ea3 l\u1eddi c\u00e2u h\u1ecfi, d\u1ef1a tr\u00ean vi\u1ec7c ph\u00e2n t\u00edch c\u00e1c b\u1ec7nh \u00e1n \u0111i\u1ec7n t\u1eed c\u1ee7a m\u1ecdi b\u1ec7nh nh\u00e2n.<br>Trong khi m\u1ed1i li\u00ean h\u1ec7 gi\u1eefa ho\u1ea1t \u0111\u1ed9ng th\u1ec3 ch\u1ea5t v\u00e0 vi\u1ec7c gi\u1ea3m thi\u1ec3u nguy c\u01a1 m\u1eafc b\u1ec7nh m\u00e3n t\u00ednh \u0111\u00e3 \u0111\u01b0\u1ee3c hi\u1ec3u kh\u00e1 r\u00f5 th\u00ec c\u00e1c nh\u00e0 nghi\u00ean c\u1ee9u cho bi\u1ebft nghi\u00ean c\u1ee9u n\u00e0y nh\u1ea5n m\u1ea1nh v\u00e0o gi\u00e1 tr\u1ecb c\u1ee7a vi\u1ec7c kh\u1ea3o s\u00e1t c\u00e1c b\u1ec7nh nh\u00e2n v\u1ec1 c\u00e1c m\u1ee9c \u0111\u1ed9 ho\u1ea1t \u0111\u1ed9ng th\u1ec3 ch\u1ea5t c\u1ee7a h\u1ecd.<br>\u201cCh\u00fang t\u00f4i tin t\u01b0\u1edfng, ph\u00e1t hi\u1ec7n n\u00e0y l\u00e0 m\u1ed9t k\u1ebft qu\u1ea3 cho th\u1ea5y c\u00e1c b\u1ec7nh nh\u00e2n d\u00e0nh th\u1eddi gian t\u1edbi c\u00e1c bu\u1ed5i ki\u1ec3m tra s\u1ee9c kh\u1ecfe h\u1eb1ng n\u0103m c\u0169ng d\u00e0nh nhi\u1ec1u th\u1eddi gian h\u01a1n cho c\u00e1c h\u00e0nh vi gi\u00fap gia t\u0103ng s\u1ee9c kh\u1ecfe c\u0169ng nh\u01b0 c\u00e1c ho\u1ea1t \u0111\u1ed9ng th\u1ec3 ch\u1ea5t\u201d, Carr n\u00f3i.<br>Trong m\u1ed9t nghi\u00ean c\u1ee9u li\u00ean quan, xu\u1ea5t b\u1ea3n tr\u00ean <i>Journal of Physical Activity and Health</i> v\u00e0o th\u00e1ng tr\u01b0\u1edbc, nh\u00f3m nghi\u00ean c\u1ee9u c\u1ee7a Carr \u0111\u00e3 ph\u00e1t hi\u1ec7n ra khi nh\u1eefng nh\u00e0 cung c\u1ea5p d\u1ecbch v\u1ee5 s\u1ee9c kh\u1ecfe t\u00ednh h\u00f3a \u0111\u01a1n t\u01b0 v\u1ea5n t\u1eadp luy\u1ec7n cho c\u00e1c b\u1ec7nh nh\u00e2n, c\u00e1c h\u00f3a \u0111\u01a1n \u0111\u00f3 \u0111\u00e3 \u0111\u01b0\u1ee3c c\u00e1c c\u00f4ng ty b\u1ea3o hi\u1ec3m s\u1ee9c kh\u1ecfe tr\u1ea3 kinh ph\u00ed t\u1edbi 95%.<br>\u201cPh\u00e1t hi\u1ec7n c\u1ee7a ch\u00fang t\u00f4i \u0111\u00e3 gi\u00fap \u0111\u1ec1 xu\u1ea5t m\u00e3 t\u00ednh ph\u00ed cho c\u00e1c ho\u1ea1t \u0111\u1ed9ng th\u1ec3 ch\u1ea5t \u0111\u01b0\u1ee3c \u0111\u1ec1 xu\u1ea5t \u0111\u01b0\u1ee3c ho\u00e0n l\u1ea1i \u1edf m\u1ee9c cao khi c\u00e1c nh\u00e0 cung c\u1ea5p d\u1ecbch v\u1ee5 \u0111\u1ec1 xu\u1ea5t kinh ph\u00ed, qua \u0111\u00f3 l\u00e0m c\u1ee7ng c\u1ed1 \u00fd t\u01b0\u1edfng v\u1ec1 vi\u1ec7c th\u1ef1c hi\u1ec7n c\u00e1c kh\u1ea3o s\u00e1t ho\u1ea1t \u0111\u1ed9ng th\u1ec3 ch\u1ea5t v\u00e0 c\u00e1c d\u1ecbch v\u1ee5 t\u01b0 v\u1ea5n\u201d, Carr n\u00f3i.\u201d<br><div style=\"text-align: right;\">(Nguy\u1ec5n Thanh <i>d\u1ecbch t\u1eeb</i> University of Iowa, <i>Th\u00f3i quen n\u0103ng \u0111\u1ed9ng l\u00e0m gi\u1ea3m \u0111\u00e1ng k\u1ec3 19 b\u1ec7nh m\u00e3n t\u00ednh</i>, theo <i>tiasang.com.vn</i>)</div>", "listQuestion": [{"questionId": 21590758, "lessonId": 0, "a": "K\u1ebft n\u1ed1i v\u1edbi nh\u1eefng d\u1ecbch v\u1ee5 h\u1ed7 tr\u1ee3 r\u00e8n luy\u1ec7n s\u1ee9c kh\u1ecfe v\u00e0/ ho\u1eb7c c\u1ed9ng \u0111\u1ed3ng c\u00e1c chuy\u00ean gia s\u1ee9c kh\u1ecfe.", "b": "Tr\u1ea3 l\u1eddi b\u1ea3ng h\u1ecfi v\u1ec1 vi\u1ec7c c\u00e1c b\u1ec7nh nh\u00e2n \u0111\u1ebfn c\u00e1c ph\u00f2ng kh\u00e1m s\u1ee9c kh\u1ecfe h\u1eb1ng n\u0103m.", "c": "Xem x\u00e9t c\u00e1c m\u1ee9c ho\u1ea1t \u0111\u1ed9ng th\u1ec3 ch\u1ea5t c\u1ee7a m\u00ecnh \u0111\u1ec3 gi\u1ea3m b\u1ec7nh t\u1eadt.", "d": "Cung c\u1ea5p d\u1ecbch v\u1ee5 s\u1ee9c kh\u1ecfe t\u00ednh h\u00f3a \u0111\u01a1n t\u01b0 v\u1ea5n t\u1eadp luy\u1ec7n cho c\u00e1c b\u1ec7nh nh\u00e2n.", "bookId": 1086570, "comments": 4, "bookmarks": 8, "likes": 0, "shares": 0, "typeId": 0, "questionText": "C\u00e1c nh\u00e c3u l\u1ed9 s\u1ef1 th\u00e2n m\u1eadt d\u1ecbu d\u00e0ng, \u0111\u1ed3ng th\u1eddi c\u0169ng gi\u1eef ri\u00eang cho An m\u1ed9t s\u1ef1 b\u00ed m\u1eadt t\u00f4n nghi\u00eam. Hu\u1ec7 ch\u01b0a t\u1eebng bao gi\u1edd g\u1eb7p s\u1ef1 ho\u00e0 \u0111i\u1ec7u nh\u01b0 v\u1eady gi\u1eefa hai \u0111\u00f2i h\u1ecfi g\u1ea7n nh\u01b0 m\u00e2u thu\u1eabn l\u00e0 s\u1ef1 c\u1edfi m\u1edf th\u00e2n t\u00ecnh v\u00e0 s\u1ef1 g\u00f3i gh\u00e9m ki\u00eau h\u00e3nh, n\u01a1i m\u1ed9t ng\u01b0\u1eddi con g\u00e1i. C\u1eadu c\u0169ng ng\u1ea1c nhi\u00ean khi th\u1ea5y c\u00f4 g\u00e1i c\u00f3 d\u00e1ng \u0111i\u1ec7u trang nh\u00e3 th\u00e2n m\u1eadt \u1ea5y c\u00f2n gi\u1eef nguy\u00ean n\u00e9t tr\u1ebb th\u01a1 tr\u00ean khu\u00f4n m\u1eb7t. N\u01b0\u1edbc da \u1eedng s\u00e1ng tr\u00ean \u0111\u00f4i m\u00e1 b\u1ea7u b\u0129nh. C\u00e1i m\u00f4i tr\u00ean m\u1ecdng. Ch\u1ec9 tr\u1eeb \u0111\u00f4i m\u1eaft bu\u1ed3n tr\u01b0\u1edbc tu\u1ed5i. Hu\u1ec7 ngh\u0129 c\u00f3 l\u1ebd nh\u1edd \u0111\u00f4i m\u1eaft \u1ea5y m\u00e0 khu\u00f4n m\u1eb7t v\u00e0 c\u1eed ch\u1ec9 c\u1ee7a An ho\u00e0 h\u1ee3p nhau, ti\u1ebft ra m\u1ed9t s\u1ee9c h\u1ea5p d\u1eabn l\u1ea1 l\u00f9ng. C\u1eadu \u0111au kh\u1ed5 c\u00f4ng nh\u1eadn gi\u1eefa c\u00e1i \u0111\u1eb9p xa l\u1ea1 \u1ea5y v\u00e0 m\u00ecnh c\u00f3 m\u1ed9t h\u1ed1 c\u00e1ch bi\u1ec7t trang nghi\u00eam; c\u1eadu kh\u00f4ng th\u1ec3 n\u00f3i g\u00ec th\u00eam, kh\u00f4ng th\u1ec3 ph\u00e1c m\u1ed9t c\u1eed ch\u1ec9 nh\u1ecf, v\u00ec b\u1ea5t c\u1ee9 h\u00e0nh \u0111\u1ed9ng n\u00e0o c\u1ee7a c\u1eadu c\u0169ng tr\u1edf th\u00e0nh v\u1ee5ng v\u1ec1, th\u1eeba th\u00e3i tr\u01b0\u1edbc v\u1ebb \u0111\u1eb9p to\u00e0n b\u00edch \u1ea5y. V\u00e0 l\u1ea7n \u0111\u1ea7u ti\u00ean trong \u0111\u1eddi, c\u1eadu th\u1ea5y l\u00fang t\u00fang, th\u1ea5t v\u1ecdng cho s\u1ef1 v\u1ee5ng d\u1ea1i c\u1ee7a m\u00ecnh.\u201d<br><div style=\"text-align: right;\">(Nguy\u1ec5n M\u1ed9ng Gi\u00e1c, <i>S\u00f4ng C\u00f4n m\u00f9a l\u0169</i>, theo <i         let userAnswers = {}; // Store: { qId: value }
        let isSubmitted = false;
        let examMode = 'practice'; // 'practice' or 'exam'
        let startTime = Date.now();
        let timerInterval;
        let activeInput = null; // Track input đang focus để bàn phím ảo nhập vào

        // --- INIT ---
        window.onload = function() {
            renderExam();
            startTimer();
            document.getElementById('mode-select').addEventListener('change', (e) => {
                if(isSubmitted) return;
                if(confirm('Đổi chế độ sẽ làm mới lại trạng thái hiển thị (không mất bài làm). Tiếp tục?')) {
                    examMode = e.target.value;
                    renderExam(false); 
                } else {
                    e.target.value = examMode;
                }
            });

            // Ẩn bàn phím khi click ra ngoài
            document.addEventListener('click', (e) => {
                const numpad = document.getElementById('virtual-numpad');
                const isInput = e.target.classList.contains('char-input');
                const isNumpad = numpad.contains(e.target);
                
                if (!isInput && !isNumpad) {
                    numpad.classList.remove('active');
                    activeInput = null;
                }
            });
        };

        // --- TIMER LOGIC ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- SCROLL HELPER (SỬA LỖI MỤC LỤC DESKTOP) ---
        function scrollToQuestion(qKey) {
            const el = document.getElementById(`question-${qKey}`);
            if (el) {
                // Scroll native với offset (do header fixed)
                // Sử dụng phương pháp cũ nhưng chắc chắn hoạt động hơn scrollIntoView trên container cuộn
                // Lấy tọa độ tương đối so với viewport
                const yOffset = -80; // Trừ header
                const y = el.getBoundingClientRect().top + window.pageYOffset + yOffset;
                
                window.scrollTo({top: y, behavior: 'smooth'});
                
                // Highlight hiệu ứng
                el.classList.add('ring-2', 'ring-moon', 'ring-offset-2');
                setTimeout(() => el.classList.remove('ring-2', 'ring-moon', 'ring-offset-2'), 1500);
            }
            // Đóng mobile palette nếu đang mở
            document.getElementById('mobile-palette').classList.add('hidden');
        }

            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; 
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

                    `;
                    container.appendChild(gDiv);

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;

                    const qKey = `q_${gIdx}_${qIdx}`;
                    const qType = q.normalizedType;
                    
                    // -- Palette Item (FIX ONCLICK SCOPE) --

                    palBtn.id = `pal_${qKey}`;
                    
                    // Gán sự kiện click trực tiếp thay vì chuỗi string HTML để tránh lỗi scope
                    palBtn.addEventListener('click', function() { scrollToQuestion(qKey); });
                    
                    palDesk.appendChild(palBtn.cloneNode(true)); // Desktop clone cần gán lại event nếu cloneNode ko copy event
                    // Clone node không copy event listener. Phải tạo 2 nút riêng hoặc gán lại.
                    // Cách tốt nhất: tạo chuỗi HTML hoặc append element.
                    // Ở đây để đơn giản ta gán onclick bằng attribute string cho chắc ăn
                    palBtn.setAttribute('onclick', `scrollToQuestion('${qKey}')`);
                    
                    // Sau khi set attribute, append lại
                    palDesk.innerHTML = palDesk.innerHTML; // Reset để xoá nút cũ? Không nên.
                    // Code cũ append child.
                    
                    // Fix triệt để: Tạo string HTML cho palette
                    // (Đã sửa ở dưới)
                });
            });
            
            // Render lại từ đầu để tối ưu
            palDesk.innerHTML = '';
            palMob.innerHTML = '';
            container.innerHTML = '';
            globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`;
                    const qType = q.normalizedType;

                    // Palette Buttons
                    const btnClass = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    const btnHtml = `<button id="pal_${qKey}" onclick="scrollToQuestion('${qKey}')" class="${btnClass}">${qId}</button>`;
                    
                    palDesk.innerHTML += btnHtml;
                    palMob.innerHTML += btnHtml;

                    // Question Card
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'question-card bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // TYPE 0: MCQ
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { 
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; 
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // TYPE 1 & 3: FILL KEY
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const chars = userVal.split('');
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let boxesHtml = '<div class="flex gap-2 justify-start items-center">';
                        for(let i=0; i<4; i++) {
                            const char = chars[i] || '';
                            boxesHtml += `<input type="text" maxlength="1" 
                                class="char-input" 
                                data-index="${i}" 
                                data-key="${qKey}" 
                                value="${char}" 
                                readonly 
                                onclick="activateNumpad(this, '${qKey}')"
                                ${isSubmitted ? 'disabled' : ''} 
                            />`;
                        }
                        
                        if(examMode === 'practice' && !isSubmitted) {
                             boxesHtml += `<button onclick="checkFillAnswer('${qKey}')" class="ml-2 px-3 py-2 bg-blue-100 text-blue-700 font-bold rounded-lg text-sm hover:bg-blue-200 transition-colors">Kiểm tra</button>`;
                             // Nút xem lời giải cho practice
                             boxesHtml += `<button onclick="toggleSolution('${qKey}')" class="ml-2 px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button>`;
                        }
                        boxesHtml += '</div>';

                        let feedbackHtml = "";
                        if(isSubmitted) {
                             const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                             if(isCorrect) {
                                feedbackHtml = `<div class="mt-2 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                             } else {
                                feedbackHtml = `<div class="mt-2 text-red-600 text-sm">✗ Sai. Đáp án: <span class="font-bold">${correctVal}</span></div>`;
                             }
                        } else if (examMode === 'practice') {
                             feedbackHtml = `<div id="feedback-${qKey}" class="mt-2 text-sm font-bold hidden"></div>`;
                        }

                        html += `
                        <div class="flex flex-col relative">
                            ${boxesHtml}
                            ${feedbackHtml}
                        </div>`;
                    }

                    // TYPE 2: TRUE/FALSE
                    else if(qType === '2') {
                         html += `<div class="overflow-hidden border rounded-lg">
                            <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                                <tr>
                                    <th scope="col" class="px-3 py-3 w-10 text-center">Ý</th>
                                    <th scope="col" class="px-3 py-3">Nội dung</th>
                                    <th scope="col" class="px-3 py-3 w-32 text-center">Chọn Đ/S</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; 
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; 
                                const userChoice = userObj[pIdx]; 
                                
                                let trClass = "bg-white hover:bg-gray-50";
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) trClass = "bg-green-50";
                                    else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
