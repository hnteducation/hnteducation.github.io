, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21586414, "lessonId": 0, "a": "4.", "b": "5.", "c": "6.", "d": "7.", "bookId": 1086354, "comments": 2, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Gi\u1ea3 s\u1eed kh\u00f4ng bi\u1ebft ti\u1ec1n ch\u1ea5t \u0111i\u1ec1u ch\u1ebf X l\u00e0 pentan-2-ol. Ch\u1ec9 d\u1ef1a v\u00e0p ph\u1ed5 IR, ph\u00e2n t\u1eed kh\u1ed1i v\u00e0 th\u00e0nh ph\u1ea7n c\u1ee7a X g\u1ed3m 3 nguy\u00ean t\u1ed1 C, H, O v\u1edbi ph\u1ea7n tr\u0103m kh\u1ed1i l\u01b0\u1ee3ng c\u00e1c nguy\u00ean t\u1ed1 l\u1ea7n l\u01b0\u1ee3t l\u00e0 69,77%, 11,63%, 18,60%. S\u1ed1 c\u00f4ng th\u1ee9c c\u1ea5u t\u1ea1o c\u1ee7a h\u1ee3p ch\u1ea5t X ph\u00f9 h\u1ee3p v\u1edbi c\u00e1c d\u1eef ki\u1ec7n c\u1ee7a \u0111\u1ec1 b\u00e0i l\u00e0 bao nhi\u00eau?", "answer": "G\u1ecdi c\u00f4ng th\u1ee9c c\u1ee7a h\u1ee3p ch\u1ea5t X c\u00f3 d\u1ea1ng : C<sub>x</sub>H<sub>y</sub>O<sub>z</sub><br>C\u00f3 : Ph\u1ea7n tr\u0103m kh\u1ed1i l\u01b0\u1ee3ng c\u00e1c nguy\u00ean t\u1ed1 C, H, O l\u1ea7n l\u01b0\u1ee3t l\u00e0: 69,77%, 11,63%, 18,60%.<br>=> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/f969e678-cb13-4b5b-ad9a-a5597015fe93.png\"/><br>=> C\u00f4ng th\u1ee9c \u0111\u01a1n gi\u1ea3n nh\u1ea5t c\u1ee7a X l\u00e0 : (C<sub>5</sub>H<sub>10</sub>O)<sub>n</sub><br>D\u1ef1a v\u00e0o ph\u1ed5 MS ta c\u00f3 kh\u1ed1i l\u01b0\u1ee3ng ph\u00e2n t\u1eed c\u1ee7a X l\u00e0 : 56<br>=> (12 . 5 + 10 . 1 + 16 . 1) . n = 56 => n = 1 <br>V\u1eady X c\u00f3 c\u00f4ng th\u1ee9c ph\u00e2n t\u1eed l\u00e0 : C5H10O<br><br><b>1. \u0110\u1ed3ng ph\u00e2n Aldehyde (c\u00f3 nh\u00f3m -CHO)</b><br>\u2022\t<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/855c7529-1b0f-4bf8-b633-ca168f600474.png\"/>: Pentanal<rb><br>\u2022\t<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/bccfab5e-2740-4401-8c e, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19883379, "lessonId": 0, "a": "E<sub>M</sub> = E<sub>N</sub>.", "b": "E<sub>M</sub> &gt; E<sub>N</sub>.", "c": "E<sub>M</sub> &lt; E<sub>N</sub>.", "d": "T\u1ea5t c\u1ea3 \u0111\u1ec1u sai.", "bookId": 748399, "comments": 0, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Trong h\u00ecnh \u1ea3nh \u0111\u01b0\u1eddng s\u1ee9c \u0111i\u1ec7n g\u00e2y b\u1edfi hai \u0111i\u1ec7n t\u00edch \u0111i\u1ec3m. G\u1ecdi E<sub>M</sub> v\u00e0 E<sub>N</sub> l\u1ea7n l\u01b0\u1ee3t l\u00e0 c\u01b0\u1eddng \u0111\u1ed9 \u0111i\u1ec7n tr\u01b0\u1eddng t\u1ea1i M v\u00e0 N. K\u1ebft lu\u1eadn n\u00e0o sau \u0111\u00e2y l\u00e0 \u0111\u00fang?", "answer": "T\u1ea1i N c\u00e1c \u0111\u01b0\u1eddng s\u1ee9c d\u00e0y h\u01a1n, do \u0111\u00f3:<br>E<sub>M</sub> &lt; E<sub>N</sub>", "key": "C", "isVideo": true, "score": 0, "order": 108, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u h\u1ecfi t\u1eeb 109 \u0111\u1ebfn 111", "content": "<i>Trypanosome </i>l\u00e0 m\u1ed9t chi k\u00ed sinh tr\u00f9ng g\u00e2y b\u1ec7nh ng\u1ee7 ch\u00e2u Phi \u1edf ng\u01b0\u1eddi, c\u00f3 kh\u1ea3 n\u0103ng thay \u0111\u1ed5i l\u1edbp glycoprotein b\u1ec1 m\u1eb7t \u0111\u1ec3 \u0111\u00e1nh l\u1eeba h\u1ec7 mi\u1ec5n d\u1ecbch c\u1ee7a v\u1eadt ch\u1ee7. Promoter c\u1ee7a gene chi ph\u1ed1i kh\u1ea3 n\u0103ng thay \u0111\u1ed5i tr\u00ean (gene VSG) c\u00f3 th\u1ec3 \u0111\u01b0\u1ee3c \u0111\u1ecbnh v\u1ecb b\u1eb1ng c\u00e1ch x\u00e1c \u0111\u1ecbnh kho\u1ea3ng c\u00e1ch t\u1eeb v\u1ecb tr\u00ed b\u1eaft \u0111\u1ea7u phi\u00ean m\u00e3 \u0111\u1ebfn \u0111i\u1ec3m m\u00e0 ARN polymerase b\u1ecb \u1ee9c ch\u1ebf b\u1edfi pyrimidine dimer khi x\u1eed l\u00fd v\u1edbi tia UV. C\u00e1c gene m\u00e3 h\u00f3a rARN 18S; 5,8S v\u00e0 28S (c\u00f9ng n\u1eb1m tr\u00ean m\u1ed9t \u0111\u01a1n v\u1ecb phi\u00ean m\u00e3 duy nh\u1ea5t c\u00f3 k\u00edch th\u01b0\u1edbc 8kb \u2013 H\u00ecnh 1) \u0111\u01b0\u1ee3c d\u00f9ng \u0111\u1ec3 ki\u1ec3m tra h\u1ec7 th\u1ed1ng \u0111o \u0111\u1ea1c tr\u01b0\u1edbc khi ti\u1ebfn h\u00e0nh th\u00ed nghi\u1ec7m v\u1edbi gene VSG. C\u00e1c rARN \u0111\u01b0\u1ee3c tinh s\u1ea1ch t\u1eeb c\u00e1c l\u00f4 t\u1ebf b\u00e0o (x\u1eed l\u00fd li\u1ec1u l\u01b0\u1ee3ng UV t\u0103ng d\u1ea7n) v\u00e0 \u0111\u00e1nh d\u1ea5u ph\u00f3ng x\u1ea1, sau \u0111\u00f3 lai v\u1edbi c\u00e1c \u0111o\u1ea1n m\u1ed3i 1, 2, 3, 4 (v\u1ecb tr\u00ed b\u1eaft m\u1ed3i th\u1ec3 hi\u1ec7n \u1edf H\u00ecnh 1). Ngo\u00e0i ra, gene m\u00e3 h\u00f3a rARN 5S (c\u00f3 k\u00edch th\u01b0\u1edbc r\u1ea5t nh\u1ecf v\u00e0 t\u00e1ch bi\u1ec7t v\u1edbi c\u00e1c gene rARN c\u00f2n l\u1ea1i) c\u0169ng \u0111\u01b0\u1ee3c d\u00f9ng l\u00e0m \u0111\u1ed1i ch\u1ee9ng \u0111\u1ec3 so s\u00e1nh v\u1edbi c\u00e1c gene tr\u00ean. K\u1ebft qu\u1ea3 th\u00ed nghi\u1ec7m \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n \u1edf H\u00ecnh 2. Khi ti\u1ebfn h\u00e0nh th\u00ed nghi\u1ec7m v\u1edbi gene VSG, d\u1eef li\u1ec7u ch\u1ec9 ra qu\u00e1 tr\u00ecnh phi\u00ean m\u00e3 \u0111\u1ebfn \u0111o\u1ea1n \u0111\u1ea7u exon th\u1ee9 nh\u1ea5t c\u1ee7a gene b\u1eaft \u0111\u1ea7u b\u1ecb \u1ee9c ch\u1ebf ho\u00e0n to\u00e0n nhanh h\u01a1n 7 l\u1ea7n so v\u1edbi v\u1ecb tr\u00ed DNA b\u1eaft v\u00e0o \u0111o\u1ea1n m\u1ed3i 4<br><img src=\"https://asset.moon.vn/img/chat/large/2025/11/6e74437f-f952-434a-9d8b-b2defdd98162.jpg\" data-filename=\"\" style=\"width: 100%; max-width: 600px;\">", "listQuestion": [{"questionId": 21563374, "lessonId": 0, "a": "\u0110\u1ec3 t\u0103ng c\u01b0\u1eddng kh\u1ea3 n\u0103ng b\u00e1m d\u00ednh v\u00e0o t\u1ebf b\u00e0o v\u1eadt ch\u1ee7.", "b": "\u0110\u1ec3 ng\u0103n ch\u1eb7n s\u1ef1 nh\u1eadn di\u1ec7n c\u1ee7a c\u00e1c kh\u00e1ng th\u1ec3 t\u1eeb h\u1ec7 mi\u1ec5n d\u1ecbch v\u1eadt ch\u1ee7.", "c": "\u0110\u1ec3 c\u1ea3i thi\u1ec7n qu\u00e1 tr\u00ecnh sinh s\u1ea3n b\u00ean trong v\u1eadt ch\u1ee7.", "d": "\u0110\u1ec3 gi\u1ea3m thi\u1ec3u s\u1ef1 ti\u00eau di\u1ec7t c\u1ee7a b\u1ea1ch c\u1ea7u \u0111\u1ed1i v\u1edbi k\u00fd sinh tr\u00f9ng.", "bookId": 1084602, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "T\u1ea1i sao Trypanosome c\u00f3 kh\u1ea3 n\u0103ng thay \u0111\u1ed5i l\u1edbp glycoprotein b\u1ec1 m\u1eb7t \u0111\u1ec3 \u0111\u00e1nh l\u1eeba h\u1ec7 mi\u1ec5n d\u1ecbch c\u1ee7a v\u1eadt ch\u1ee7?", "answer": "Trypanosome c\u00f3 kh\u1ea3 n\u0103ng thay \u0111\u1ed5i glycoprotein b\u1ec1 m\u1eb7t \u0111\u1ec3 tr\u00e1nh b\u1ecb nh\u1eadn di\u1ec7n v\u00e0 t\u1ea5n c\u00f4ng b\u1edfi h\u1ec7 mi\u1ec5n d\u1ecbch c\u1ee7a v\u1eadt ch\u1ee7. Khi h\u1ec7 mi\u1ec5n d\u1ecbch ph\u00e1t hi\u1ec7n v\u00e0 t\u1ea1o ra kh\u00e1ng th\u1ec3 ch\u1ed1ng l\u1ea1i m\u1ed9t ki\u1ec3u glycoprotein, Trypanosome s\u1ebd nhanh ch\u00f3ng thay \u0111\u1ed5i c\u1ea5u tr\u00fac glycoprotein c\u1ee7a m\u00ecnh, gi\u00fap ch\u00fang t\u1ed3n t\u1ea1i v\u00e0 ti\u1ebfp t\u1ee5c sinh tr\u01b0\u1edfng trong c\u01a1 th\u1ec3 v\u1eadt ch\u1ee7.", "key": "B", "isVideo": true, "score": 0, "order": 109, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21563381, "lessonId": 0, "a": "Gene c\u00f3 k\u00edch th\u01b0\u1edbc c\u00e0ng l\u1edbn, tia UV c\u00e0ng \u00edt g\u00e2y t\u00e1c \u0111\u1ed9ng \u0111\u1ebfn s\u1ef1 phi\u00ean m\u00e3 do ARN polymerase di chuy\u1ec3n nhanh h\u01a1n.", "b": "Tia UV ch\u1ec9 t\u00e1c \u0111\u1ed9ng l\u00ean nh\u1eefng gene ng\u1eafn v\u00ec ARN polymerase b\u1ecb d\u1eebng l\u1ea1i ngay sau khi b\u1eaft \u0111\u1ea7u phi\u00ean m\u00e3.", "c": "Gene c\u00f3 k\u00edch th\u01b0\u1edbc c\u00e0ng l\u1edbn (c\u00e0ng d\u00e0i) th\u00ec m\u1ee9c \u0111\u1ed9 t\u00e1c \u0111\u1ed9ng c\u1ee7a tia UV c\u00e0ng cao.", "d": "T\u00e1c \u0111\u1ed9ng \u1ee9c ch\u1ebf c\u1ee7a tia UV kh\u00f4ng li\u00ean quan \u0111\u1ebfn \u0111\u1ed9 d\u00e0i c\u1ee7a gene m\u00e0 ph\u1ee5 thu\u1ed9c ho\u00e0n to\u00e0n v\u00e0o lo\u1ea1i nucleotide trong gene.", "bookId": 1084603, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "D\u1ef1a v\u00e0o H\u00ecnh 2, c\u00f3 th\u1ec3 r\u00fat ra k\u1ebft lu\u1eadn g\u00ec v\u1ec1 m\u1ed1i t\u01b0\u01a1ng quan gi\u1eefa \u0111\u1ed9 d\u00e0i c\u1ee7a gene v\u00e0 t\u00e1c \u0111\u1ed9ng \u1ee9c ch\u1ebf phi\u00ean m\u00e3 c\u1ee7a tia UV?", "answer": "V\u00ec t\u1eeb H\u00ecnh 2, khi kho\u1ea3ng c\u00e1ch gi\u1eefa promoter v\u00e0 \u0111o\u1ea1n m\u1ed3i t\u0103ng d\u1ea7n (1 \u2192 2 \u2192 3 \u2192 4) th\u00ec li\u1ec1u l\u01b0\u1ee3ng tia UV g\u00e2y gi\u1ea3m phi\u00ean m\u00e3 \u0111\u1ebfn m\u1ed9t m\u1ee9c nh\u1ea5t \u0111\u1ecbnh n\u00e0o \u0111\u00f3 c\u00e0ng th\u1ea5p, \u0111i\u1ec1u n\u00e0y c\u00f3 th\u1ec3 do khi chi\u1ec1u d\u00e0i gene c\u00e0ng l\u1edbn th\u00ec s\u1ed1 l\u01b0\u1ee3ng c\u1eb7p AT ho\u1eb7c GC k\u1ec1 c\u1ea1nh nhau c\u00e0ng nhi\u1ec1u \u2192 t\u0103ng nguy\u00ean li\u1ec7u g\u00e2y n\u00ean \u0111\u1ed9t bi\u1ebfn b\u1edfi tia UV (pyrimidine dimer ng\u0103n c\u1ea3n s\u1ef1 ho\u1ea1t \u0111\u1ed9ng ti\u1ebfp t\u1ee5c c\u1ee7a ARN polymerase \u2192 \u1ee9c ch\u1ebf phi\u00ean m\u00e3).", "key": "C", "isVideo": true, "score": 0, "order": 110, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21563386, "lessonId": 0, "a": "7kb.", "b": "14kb.", "c": "35kb.", "d": "49kb.", "bookId": 1084604, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "U\u1edbc t\u00ednh kho\u1ea3ng c\u00e1ch t\u1eeb promoter \u0111\u1ebfn exon th\                                 let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
