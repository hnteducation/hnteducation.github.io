ible", "c": "such", "d": "feedback", "bookId": 743723, "comments": 0, "bookmarks": 12, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<u> Isn't</u> she too <u>sensible</u> to handle <u>such</u> direct <u>feedback</u> without feeling upset?", "answer": "<i><b>Ki\u1ebfn th\u1ee9c v\u1ec1 T\u1eeb v\u1ef1ng</b></i><br>Ta c\u00f3 <br>sensible (adj): h\u1ee3p l\u00fd, th\u1ef1c t\u1ebf<br>sensitive (adj): nh\u1ea1y c\u1ea3m<br>D\u1ef1a v\u00e0o c\u00e2u g\u1ed1c, c\u00e2u s\u1ebd mang ngh\u0129a l\u00e0 ng\u01b0\u1eddi n\u00e0y qu\u00e1 \"th\u1ef1c t\u1ebf\" ho\u1eb7c \"h\u1ee3p l\u00fd\" \u0111\u1ec3 c\u1ea3m th\u1ea5y bu\u1ed3n khi nh\u1eadn ph\u1ea3n h\u1ed3i tr\u1ef1c ti\u1ebfp =&gt; \u0111i\u1ec1u n\u00e0y kh\u00f4ng ph\u00f9 h\u1ee3p v\u1edbi ng\u1eef c\u1ea3nh \u0111ang n\u00f3i v\u1ec1 c\u1ea3m x\u00fac<br>=&gt; kh\u00f4ng d\u00f9ng <b>sensible </b>\u0111\u1ec3 n\u00f3i v\u1ec1 c\u1ea3m x\u00fac<br>=&gt; \u0110\u00e1p \u00e1n B<br>=&gt; S\u1eeda: <b>sensible </b>th\u00e0nh <b>sensitive<br></b>", "key": "B", "isVideo": true, "score": 0, "order": 39, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19872476, "lessonId": 0, "a": "Jane's birthday", "b": "so", "c": "are going to buy", "d": "the", "bookId": 743959, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "It's <u>Jane's birthday</u> tomorrow, <u>so</u> we <u>are going to buy</u> her <u>the</u> bunch of flowers.", "answer": "<b><i>Ki\u1ebfn th\u1ee9c v\u1ec1 M\u1ea1o t\u1eeb</i></b><br>M\u1ea1o t\u1eeb <strong data-start=\"321\" data-end=\"330\">\"the\"</strong>&nbsp;\u0111\u01b0\u1ee3c d\u00f9ng khi ng\u01b0\u1eddi n\u00f3i v\u00e0 ng\u01b0\u1eddi nghe \u0111\u1ec1u bi\u1ebft \u0111\u00f3 l\u00e0 g\u00ec<br>D\u1ef1a v\u00e0o ng\u1eef c\u1ea3nh, \u0111\u1ec1 b\u00e0i \u0111ang n\u00f3i chung v\u1ec1 m\u1ed9t b\u00f3 hoa chung chung ch\u01b0a \u0111\u01b0\u1ee3c x\u00e1c \u0111\u1ecbnh tr\u01b0\u1edbc<br>=&gt; \u0110\u00e1p \u00e1n D<br>=&gt; S\u1eeda: <b>the </b>th\u00e0nh <b>a<br>T\u1ea1m d\u1ecbch:&nbsp;</b>Ng\u00e0y mai l\u00e0 sinh nh\u1eadt c\u1ee7a Jane, v\u00ec v\u1eady ch\u00fang t\u00f4i s\u1ebd mua cho c\u00f4 \u1ea5y m\u1ed9t b\u00f3 hoa", "key": "D", "isVideo": true, "score": 0, "order": 40, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 41-45: Which of the following best restates each of the given sentences? ", "content": "", "listQuestion": [{"questionId": 19871998, "lessonId": 0, "a": "Jack suggested that I confess my love to Sophia face-to-face.", "b": "Jack advised that I confess my love to Sophia face-to-face.", "c": "Jack asked me why I hadn\u2019t confessed my love to Sophia face-to-face.", "d": "Jack wondered why I don't confess my love to Sophia face-to-face.", "bookId": 743891, "comments": 0, "bookmarks": 4, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cWhy don\u2019t you confess your love to Sophia face-to-face?\u201d asked Jack.", "answer": "<div><b>Ki\u1ebfn th\u1ee9c v\u1ec1 c\u00e2u t\u01b0\u1eddng thu\u1eadt - c\u00e2u \u0111\u1ec1 ngh\u1ecb, khuy\u00ean b\u1ea3o</b></div><div><b>T\u1ea1m d\u1ecbch c\u00e2u g\u1ed1c</b>: \u201cSao c\u1eadu kh\u00f4ng b\u00e0y t\u1ecf t\u00ecnh c\u1ea3m c\u1ee7a m\u00ecnh v\u1edbi Sophia tr\u1ef1c ti\u1ebfp nh\u1ec9?\u201d Jack h\u1ecfi.</div><div><b>- X\u00e9t 4 \u0111\u00e1p \u00e1n:</b></div><div><b>A. Jack suggested that I confess my love to Sophia face-to-face.</b></div><div><i>(Jack g\u1ee3i \u00fd r\u1eb1ng t\u00f4i b\u00e0y t\u1ecf t\u00ecnh c\u1ea3m c\u1ee7a m\u00ecnh v\u1edbi Sophia tr\u1ef1c ti\u1ebfp.)</i></div><div>\u21d2 <b>\u0110\u00fang</b> v\u00ec \u0111\u1ed9ng t\u1eeb \"suggest\" ph\u00f9 h\u1ee3p \u0111\u1ec3 di\u1ec5n \u0111\u1ea1t \u00fd g\u1ee3i \u00fd nh\u01b0 tro 2: Read the passage carefully.", "content": "1. Australia is no stranger to wildfires, but this season has been unprecedented in scale and intensity - and the summer is far from over. This country\u2019s deadly fires have been fueled by a combination of extreme heat, prolonged drought and strong winds. The country is in the grip of a heatwave, with record-breaking temperatures over the last three months. In mid-December, the nation saw the hottest day in history - the average temperature was 41.9 degrees Celsius. These conditions, which show few signs of <b>abating </b>in the next few weeks, have been accompanied by brisk winds which fan the flames and push the smoke across Australia\u2019s major cities. Authorities say that wind speeds have been recorded at 60 miles per hour. All this follows the country\u2019s driest spring since records began 120 years ago, with much of New South Wales and Queensland experiencing rainfall shortfalls since early 2017. Trees, shrubs, and grasslands have turned into the perfect tinder for flames. <br>2. Bushfires are a regular feature in Australia\u2019s calendar- often triggered by natural causes such as lightning strikes - and cannot be blamed on climate change or rising greenhouse gas emissions alone. But experts say that the changing climate is the key to understanding the ferocity of this year\u2019s blazes- hotter, drier conditions are making <b>these phenomena</b> longer and much more dangerous. And Australia\u2019s climate is definitely changing. According to the country\u2019s Bureau of Meteorology, temperatures have already risen by more than one degree Celsius since 1920 - with much of the increase taking place since 1950. <br>3. So far the response has been largely reactive - aimed at evacuating residents to safety and stopping the blazes from spreading. Australia relies on hundreds of thousands of volunteer firefighters, who have been working around the clock to try and bring the fires under control for months. But in the long term, experts have said that there should be a review of building standards in bushfire zones to create resilient homes and larger buffer zones between the bush and properties. <br><div style=\"text-align: right;\"><i>(Adapted from https://www.telegraph.co.uk/)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 10469831, "lessonId": 0, "a": "Effects of wildfires in Australia on people", "b": "Causes and solutions to wildfires in Australia", "c": "Climate change and its effect on the Australian wildfires", "d": "Australia's deadliest wildfires", "bookId": 290450, "comments": 0, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Which of the following best reflects the main topic of the passage?", "answer": "C\u00e2u h\u1ecfi: <b>C\u00e2u n\u00e0o sau \u0111\u00e2y th\u00edch h\u1ee3p nh\u1ea5t \u0111\u1ec3 l\u00e0m ti\u00eau \u0111\u1ec1 cho \u0111o\u1ea1n v\u0103n ? </b><br>A. \u1ea2nh h\u01b0\u1edfng c\u1ee7a ch\u00e1y r\u1eebng \u1edf \u00dac t\u1edbi con ng\u01b0\u1eddi<br>B. Nguy\u00ean nh\u00e2n c\u1ee7a ch\u00e1y r\u1eebng \u1edf \u00dac v\u00e0 h\u01b0\u1edbng kh\u1eafc ph\u1ee5c<br>C. Bi\u1ebfn \u0111\u1ed5i kh\u00ed h\u1eadu v\u00e0 \u1ea3nh h\u01b0\u1edfng c\u1ee7a n\u00f3 \u0111\u1ebfn ch\u00e1y r\u1eebng \u1edf \u00dac<br>D. Nh\u1eefng v\u1ee5 ch\u00e1y r\u1eebng kinh ho\u00e0ng nh\u1ea5t n\u01b0\u1edbc \u00dac<br>- <b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin \u0111o\u1ea1n v\u0103n \u0111\u1ea7u: </b><br>\u201cThis country\u2019s deadly fires have been fueled by a combination of extreme heat, prolonged drought and strong winds. The country is in the grip of a heatwave, with record-breaking temperatures over the last three months\u201d (N\u1eafng n\u00f3ng kh\u1eafc nghi\u1ec7t, h\u1ea1n h\u00e1n k\u00e9o d\u00e0i v\u00e0 gi\u00f3 m\u1ea1nh \u0111\u00e3 g\u00e2y ra nh\u1eefng \u0111\u00e1m ch\u00e1y kinh ho\u00e0ng t\u1ea1i \u00dac. \u0110\u1ea5t n\u01b0\u1edbc n\u00e0y \u0111ang ph\u1ea3i h\u1ee9ng ch\u1ecbu m\u1ed9t \u0111\u1ee3t n\u1eafng n\u00f3ng v\u1edbi nhi\u1ec7t \u0111\u1ed9 k\u1ef7 l\u1ee5c trong ba th\u00e1ng qua.) <br>\u21d2 \u0110o\u1ea1n n\u00e0y n\u00f3i v\u1ec1 \u201ccauses to wildlife in Australia\u201d (nguy\u00ean nh\u00e2n g\u00e2y ra ch\u00e1y r\u1eebng \u1edf \u00dac) <br>- <b>D\u1ef1a v\u00e0o th\u00f4ng tin \u0111o\u1ea1n v\u0103n cu\u1ed1i: </b><br>+)  So far the response has been largely reactive - aimed at evacuating residents to safety and stopping the blazes from spreading. <i>(Gi\u1ea3i ph\u00e1p \u0111\u01b0a d\u00e2n c\u01b0 \u0111\u1ebfn n\u01a1i an to\u00e0n v\u00e0 ng\u0103n ch\u1eb7n \u0111\u00e1m ch\u00e1y lan r\u1ed9ng.) <br></i>+) Australia relies on hundreds of thousands of volunteer firefighters, who have been working around the clock to try and bring the fires under control for months.<i> (H\u00e0ng tr\u0103m ngh\u00ecn l\u00ednh c\u1ee9u h\u1ecfa nh\u1eefng ng\u01b0\u1eddi l\u00e0m vi\u1ec7c su\u1ed1t ng\u00e0y \u0111\u00eam \u0111\u1ec3 ki\u1ec3m so\u00e1t \u0111\u00e1m ch\u00e1y trong su\u1ed1t m\u1ea5y th\u00e1ng qua.) </i><br>+) There should be a review of building standards in bushfire zones to create resilient homes and larger buffer zones between the bush and properties. <i>(C\u1ea7n xem x\u00e9t l\u1ea1i c\u00e1c ti\u00eau chu\u1ea9n x\u00e2y d\u1ef1ng trong khu v\u1ef1c ch\u00e1y r\u1eebng \u0111\u1ec3 t\u1ea1o ra nh\u1eefng ng\u00f4i nh\u00e0 c\u00f3 kh\u1ea3 n\u0103ng ch\u1ed1ng ch\u1ecbu v\u00e0 t\u1ea1o ra v\u00f9ng \u0111\u1ec7m l\u1edbn h\u01a1n gi\u1eefa nh\u1eefng b\u1ee5i c\u00e2y c\u1ed1i v\u00e0 c\u1ee7a c\u1ea3i v\u1eadt ch\u1ea5t.) </i><br>\u21d2 \u0110o\u1ea1n n\u00e0y n\u00f3i v\u1ec1 \u201csolutions to wildlife in Australia\u201d (<i>nguy\u00ean nh\u00e2n g\u00e2y ra ch\u00e1y r\u1eebng \u1edf \u00dac</i>).", "key": "B", "isVideo": true, "score": 0, "order": 46, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21581807, "lessonId": 0, "a": "The fires are likely a result of a normal weather pattern.", "b": "The combination of extreme heat, drought, and wind has made the wildfires more intense.", "c": "The wildfires have mostly been caused by human activity.", "d": "The fires have been contained due to favorable weather conditions.", "bookId": 1086050, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 1, what can be inferred about the conditions leading to the wildfires in Australia this season?", "answer": "<b>Theo \u0111o\u1ea1n 1, c\u00f3 th\u1ec3 suy lu\u1eadn g\u00ec v\u1ec1 \u0111i\u1ec1u ki\u1ec7n d\u1eabn \u0111\u1ebfn ch\u00e1y r\u1eebng \u1edf \u00dac n\u0103m nay?\n</b><br>A. C\u00e1c \u0111\u00e1m ch\u00e1y c\u00f3 th\u1ec3 l\u00e0 k\u1ebft qu\u1ea3 c\u1ee7a m\u1ed9t m\u00f4 h\u00ecnh th\u1eddi ti\u1ebft b\u00ecnh th\u01b0\u1eddng.\n<br>B. S\u1ef1 k\u1ebft h\u1ee3p c\u1ee7a nhi\u1ec7t \u0111\u1ed9 c\u1ef1c cao, h\u1ea1n h\u00e1n v\u00e0 gi\u00f3 \u0111\u00e3 l\u00e0m cho ch\u00e1y r\u1eebng d\u1eef d\u1ed9i h\u01a1n.\n<br>C. C\u00e1c v\u1ee5 ch\u00e1y r\u1eebng ch\u1ee7 y\u1ebfu do con ng\u01b0\u1eddi g\u00e2y ra.\n<br>D. C\u00e1c \u0111\u00e1m ch\u00e1y \u0111\u00e3 \u0111\u01b0\u1ee3c ki\u1ec3m so\u00e1t nh\u1edd \u0111i\u1ec1u ki\u1ec7n th\u1eddi ti\u1ebft thu\u1eadn l\u1ee3i.\n<br><br><b>D\u1ef1a v\u00e0o th\u00f4ng tin:\n</b><br>The country\u2019s deadly fires have been fueled by a combination of extreme heat, prolonged drought and strong winds.<br><i>(C\u00e1c v\u1ee5 ch\u00e1y ch\u1ebft ng\u01b0\u1eddi \u1edf n\u01b0\u1edbc n\u00e0y \u0111\u01b0\u1ee3c th\u00fac \u0111\u1ea9y b\u1edfi s\u1ef1 k\u1ebft h\u1ee3p c\u1ee7a nhi\u1ec7t \u0111\u1ed9 c\u1ef1c cao, h\u1ea1n h\u00e1n k\u00e9o d\u00e0i v\u00e0 gi\u00f3 m\u1ea1nh.)\n\n</i>", "key": "B", "isVideo": false, "score": 0, "order": 47, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21581945, "lessonId": 0, "a": "becoming bigger", "b": "becoming less intense", "c": "become more severe", "d": "becoming smaller", "bookId": 1086051, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The word <b>abating </b>in paragraph 1 is closest in meaning to _________.", "answer": "<b>T\u1eeb \u201cabating\u201d g\u1ea7n ngh\u0129a nh\u1ea5t v\u1edbi t\u1eeb n\u00e0o?\n</b><br><b>A. </b>tr\u1edf n\u00ean l\u1edbn h\u01a1n\n<br><b>B.</b> gi\u1ea3m b\u1edbt c\u01b0\u1eddng \u0111\u1ed9\n<br><b>C. </b>nghi\u00eam tr\u1ecdng h\u01a1n\n<br><b>D. </b>tr\u1edf n\u00ean nh\u1ecf h\u01a1n\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o ng\u1eef c\u1ea3nh: \n</b><br>These conditions, which show few signs of abating in the next few weeks..\n<br><i>(\u0110i\u1ec1u ki\u1ec7n n\u00e0y kh\u00f4ng c\u00f3 d\u1ea5u hi\u1ec7u gi\u1ea3m b\u1edbt trong v\u00e0i tu\u1ea7n t\u1edbi...)\n</i>", "key": "B", "isVideo": false, "score": 0, "order": 48, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582055, "lessonId": 0, "a": "The country will suffer from another heatwave in the next three months.", "b": "41.9 degrees Celsius is the average temperature of the hottest month in history.", "c": "For the last 120 years, this given season has been the driest in this country.", "d": "The rainfall in many parts of New South Wales and Queensland increases each year.", "bookId": 1086052, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 1, which of the following is true?", "answer": "<b>\u0110i\u1ec1u n\u00e0o sau \u0111\u00e2y l\u00e0 \u0111\u00fang theo \u0111o\u1ea1n 1?\n</b><br><b>A.</b> S\u1ebd c\u00f3 th\u00eam m\u1ed9t \u0111\u1ee3t s\u00f3ng nhi\u1ec7t trong ba th\u00e1ng t\u1edbi.\n<br><b>B.</b> 41,9\u00b0C l\u00e0 nhi\u1ec7t \u0111\u1ed9 trung b\u00ecnh c\u1ee7a th\u00e1ng n\u00f3ng nh\u1ea5t trong l\u1ecbch s\u1eed\n<br><b>C.</b> \u0110\u00e2y l\u00e0 m\u00f9a xu\u00e2n kh\u00f4 h\u1ea1n nh\u1ea5t trong 120 n\u0103m qua\n<br><b>D.</b> L\u01b0\u1ee3ng m\u01b0a \u1edf New South Wales v\u00e0 Queensland t\u0103ng l\u00ean m\u1ed7i n\u0103m\n<br><b><br>D\u1ef1a v\u00e0o th\u00f4ng tin:\n</b><br>All this follows the country\u2019s driest spring since records began 120 years ago.\n<br><i>(T\u1ea5t c\u1ea3 \u0111i\u1ec1u n\u00e0y x\u1ea3y ra sau m\u00f9a xu\u00e2n kh\u00f4 h\u1ea1n nh\u1ea5t k\u1ec3 t\u1eeb khi d\u1eef li\u1ec7u \u0111\u01b0\u1ee3c ghi nh\u1eadn c\u00e1ch \u0111\u00e2y 120 n\u0103m.)\n</i>", "key": "C", "isVideo": false, "score": 0, "order": 49, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582136, "lessonId": 0, "a": "the changing climate", "b": "the blazes", "c": "Australia\u2019s bushfires", "d": "lightning strikes", "bookId": 1086053, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The phrase <b>these phenomena</b> in paragraph 2 refers to __________.", "answer": "<b>\u201cthese phenomena\u201d trong \u0111o\u1ea1n 2 \u00e1m ch\u1ec9 \u0111i\u1ec1u g\u00ec?\n</b><br><b>A.</b> Bi\u1ebfn \u0111\u1ed5i kh\u00ed h\u1eadu\n<br><b>B.</b> C\u00e1c \u0111\u00e1m ch\u00e1y\n<br><b>C.</b> Ch\u00e1y r\u1eebng \u1edf \u00dac\n<br><b>D.</b> S\u00e9t \u0111\u00e1nh\n<br><br><b>D\u1ef1a v\u00e0o ng\u1eef c\u1ea3nh c\u00e2u:\n</b><br>Bushfires are a regular feature in Australia's calendar - often triggered by natural causes such as lightning strikes - and cannot be blamed on climate change or rising greenhouse gas emissions alone. Experts say that the changing climate is the key to understanding the ferocity of this year\u2019s blazes - hotter, drier conditions are making <b>these phenomena</b> longer and much more dangerous.\n<br><i>(Ch\u00e1y r\u1eebng l\u00e0 hi\u1ec7n t\u01b0\u1ee3ng th\u01b0\u1eddng xuy\u00ean di\u1ec5n ra h\u00e0ng n\u0103m \u1edf \u00dac - th\u01b0\u1eddng x\u1ea3y ra do c\u00e1c nguy\u00ean nh\u00e2n t\u1ef1 nhi\u00ean nh\u01b0 s\u00e9t \u0111\u00e1nh - v\u00e0 kh\u00f4ng th\u1ec3 \u0111\u1ed5 l\u1ed7i cho bi\u1ebfn \u0111\u1ed5i kh\u00ed h\u1eadu hay ch\u1ec9 ri\u00eang vi\u1ec7c t\u0103ng ph\u00e1t th\u1ea3i kh\u00ed nh\u00e0 k\u00ednh. C\u00e1c chuy\u00ean gia n\u00f3i r\u1eb1ng bi\u1ebfn \u0111\u1ed5i kh\u00ed h\u1eadu ch\u00ednh l\u00e0 y\u1ebfu t\u1ed1 ch\u00ednh gi\u00fap gi\u1ea3i th\u00edch s\u1ef1 d\u1eef d\u1ed9i c\u1ee7a c\u00e1c \u0111\u00e1m ch\u00e1y n\u0103m nay \u2013 c\u00e1c \u0111i\u1ec1u ki\u1ec7n n\u00f3ng h\u01a1n, kh\u00f4 h\u01a1n \u0111ang khi\u1ebfn <b>nh\u1eefng hi\u1ec7n t\u01b0\u1ee3ng n\u00e0y</b> k\u00e9o d\u00e0i h\u01a1n v\u00e0 nguy hi\u1ec3m h\u01a1n.)\n</i><br><br><b>=&gt; Hi\u1ec7n t\u01b0\u1ee3ng \u0111\u01b0\u1ee3c nh\u1eafc \u0111\u1ebfn tr\u01b0\u1edbc \u0111\u00f3 l\u00e0 c\u00e1c \u0111\u00e1m ch\u00e1y n\u0103m nay.\n</b>", "key": "B", "isVideo": false, "score": 0, "order": 50, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582140, "lessonId": 0, "a": "evacuating residents to safety", "b": "extinguish the fire at the point of origin", "c": "prevent the fire from spreading", "d": "mobilizing volunteer firefighters", "bookId": 1086054, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The following are the responses for wildfires in Australia mentioned in paragraph 3, except  ___________.", "answer": "<b>C\u00e2u n\u00e0o KH\u00d4NG ph\u1ea3i l\u00e0 m\u1ed9t ph\u1ea3n \u1ee9ng v\u1edbi ch\u00e1y r\u1eebng theo \u0111o\u1ea1n 3?\n</b><br><b>A.</b> S\u01a1 t\u00e1n ng\u01b0\u1eddi d\u00e2n \u0111\u1ebfn n\u01a1i an to\u00e0n\n<br><b>B.</b> D\u1eadp t\u1eaft l\u1eeda ngay t\u1eeb l\u00fac m\u1edbi b\u1eaft \u0111\u1ea7u\n<br><b>C.</b> Ng\u0103n ch\u1eb7n l\u1eeda lan r\u1ed9ng\n<br><b>D.</b> Huy \u0111\u1ed9ng l\u00ednh c\u1ee9u h\u1ecfa t\u00ecnh nguy\u1ec7n\n<br><br><b>D\u1ef1a v\u00e0o c\u00e1c th\u00f4ng tin:\n</b><br>- So far the response has been largely reactive - aimed at evacuating residents to safety and stopping the blazes from spreading. <i>(Cho \u0111\u1ebfn nay, ph\u1ea3n \u1ee9ng \u0111\u1ed1i v\u1edbi c\u00e1c \u0111\u00e1m ch\u00e1y ph\u1ea7n l\u1edbn l\u00e0 mang t\u00ednh \u1ee9ng ph\u00f3 \u2013 ch\u1ee7 y\u1ebfu nh\u1eb1m s\u01a1 t\u00e1n ng\u01b0\u1eddi d\u00e2n \u0111\u1ebfn n\u01a1i an to\u00e0n v\u00e0 ng\u0103n ch\u1eb7n l\u1eeda lan r\u1ed9ng.)\n</i><br>- Australia relies on hundreds of thousands of volunteer firefighters,&nbsp;<i>(\u00dac d\u1ef1a v\u00e0o h\u00e0ng tr\u0103m ng\u00e0n l\u00ednh c\u1ee9u h\u1ecfa t\u00ecnh nguy\u1ec7n.)\n</i><br><br><b>=&gt; \u00dd A, C, D \u0111\u1ec1u \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp.</b>", "key": "B", "isVideo": false, "score": 0, "order": 51, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582143, "lessonId": 0, "a": "Increasing the number of volunteer firefighters", "b": "Reassessing building standards in bushfire zones", "c": "Constructing homes in areas invulnerable to fires", "d": "Expanding evacuation procedures", "bookId": 1086055, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 3, what do experts suggest for improving bushfire safety in the future?", "answer": "<b>C\u00e1c chuy\u00ean gia \u0111\u1ec1 xu\u1ea5t g\u00ec \u0111\u1ec3 c\u1ea3i thi\u1ec7n an to\u00e0n ch\u00e1y r\u1eebng?\n</b><br><b>A.</b> T\u0103ng s\u1ed1 l\u01b0\u1ee3ng l\u00ednh c\u1ee9u h\u1ecfa t\u00ecnh nguy\u1ec7n\n<br><b>B.</b> Xem x\u00e9t l\u1ea1i ti\u00eau chu\u1ea9n x\u00e2y d\u1ef1ng\n<br><b>C.</b> X\u00e2y nh\u00e0 \u1edf khu v\u1ef1c kh\u00f4ng b\u1ecb ch\u00e1y r\u1eebng\n<br><b>D</b>. M\u1edf r\u1ed9ng c\u00e1c bi\u1ec7n ph\u00e1p s\u01a1 t\u00e1n\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin:\n</b><br>There should be a review of <b>building standards</b> in bushfire zones. <br><i>(C\u1ea7n xem x\u00e9t l\u1ea1i <b>ti\u00eau chu\u1ea9n x\u00e2y d\u1ef1ng</b> trong c\u00e1c khu v\u1ef1c d\u1ec5 b\u1ecb ch\u00e1y r\u1eebng.)\n</i>", "key": "B", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully.", "content": "1. The phenomenon of global tourism has ushered in an era of unprecedented cultural exchange, fundamentally altering the dynamics of local communities worldwide. This multifaceted interaction between tourists and host populations has sparked a complex dialogue about cultural identity, authenticity, and the preservation of indigenous traditions in the face of globalization.<br>2. One of the most salient effects of tourism on local cultures is the <b>commodification of cultural practices and artifacts</b>. As destinations seek to capitalize on their unique heritage, traditional rituals, crafts, and customs are often packaged and presented for tourist consumption. While this can lead to economic benefits and a renewed interest in cultural preservation, it also risks <b>trivializing </b>complex cultural elements, reducing them to mere spectacles or souvenirs.<br>3. The influx of foreign visitors and their accompanying values and behaviors can exert significant pressure on local communities to adapt. This cultural adaptation can manifest in various ways, from changes in local dress and cuisine to shifts in language use and social norms. In some cases, this leads to a homogenization of cultures, as destinations begin to cater more to international tastes and expectations, potentially eroding the very uniqueness that initially attracted visitors.<br>4. However, it would be overly simplistic to view tourism\u2019s impact on local cultures as purely negative. Many communities have found ways to leverage tourism as a means of cultural revitalization and empowerment. By sharing their heritage with visitors, some groups have strengthened their own sense of identity and pride in their traditions. Additionally, the economic benefits of tourism can provide resources for cultural preservation efforts that might otherwise be unfeasible.<br>5. The concept of \u201cglocalization\u201d has emerged as a potential framework for understanding and managing the interaction between global tourism and local cultures. This approach emphasizes the importance of maintaining local distinctiveness while engaging with global trends and markets. Successful examples of glocalization in tourism often involve community-led initiatives that allow locals to maintain control over how their culture is presented and shared with visitors.<br>6. As the global tourism industry continues to evolve, particularly in the wake of technological advancements and changing travel patterns, the relationship between tourists and host communities remains dynamic. The challenge lies in fostering forms of tourism that promote genuine cultural exchange and understanding while safeguarding the integrity and authenticity of local traditions.<br><div style=\"text-align: right;\"><i>(Source: https://www.ielts.net/)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21582161, "lessonId": 0, "a": "The Evolution of Global Tourism", "b": "Global Tourism and Its Effects on Local Cultures", "c": "The Impact of Tourism on Local Communities", "d": "Globalization and Cultural Identity", "bookId": 1086056, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title of the passage can be ________.", "answer": "<b>Ti\u00eau \u0111\u1ec1 n\u00e0o ph\u00f9 h\u1ee3p nh\u1ea5t v\u1edbi b\u00e0i \u0111\u1ecdc?</b><br>A. S\u1ef1 ph\u00e1t tri\u1ec3n c\u1ee7a du l\u1ecbch to\u00e0n c\u1ea7u<br>B. Du l\u1ecbch to\u00e0n c\u1ea7u v\u00e0 t\u00e1c \u0111\u1ed9ng c\u1ee7a n\u00f3 \u0111\u1ed1i v\u1edbi v\u0103n h\u00f3a \u0111\u1ecba ph\u01b0\u01a1ng<br>C. \u1ea2nh h\u01b0\u1edfng c\u1ee7a du l\u1ecbch \u0111\u1ebfn c\u00e1c c\u1ed9ng \u0111\u1ed3ng \u0111\u1ecba ph\u01b0\u01a1ng<br>D. To\u00e0n c\u1ea7u h\u00f3a v\u00e0 b\u1ea3n s\u1eafc v\u0103n h\u00f3a<br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin</b><br>The phenomenon of global tourism has ushered in an era of unprecedented cultural exchange, fundamentally altering the dynamics of local communities worldwide<br>(<i>Du l\u1ecbch to\u00e0n c\u1ea7u \u0111\u00e3 m\u1edf ra m\u1ed9t k\u1ef7 nguy\u00ean trao \u0111\u1ed5i v\u0103n h\u00f3a ch\u01b0a t\u1eebng c\u00f3, l\u00e0m thay \u0111\u1ed5i s\u00e2u s\u1eafc s\u1ef1 t\u01b0\u01a1ng t\u00e1c gi\u1eefa c\u00e1c c\u1ed9ng \u0111\u1ed3ng \u0111\u1ecba ph\u01b0\u01a1ng tr\u00ean to\u00e0n th\u1ebf gi\u1edbi</i>)", "key": "B", "isVideo": false, "score": 0, "order": 53, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582165, "lessonId": 0, "a": "maintaining cultural traditions in their original form without alteration", "b": "transforming cultural traditions and objects into products for selling", "c": "reinforcing the genuine character and originality of cultural practices", "d": "communities abstaining from or opposing tourism initiatives", "bookId": 1086057, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The phrase <b>commodification of cultural practices and artifacts</b> in paragraph 2 means ________.", "answer": "<b>\u201cCommodification of cultural practices and artifacts\u201d c\u00f3 ngh\u0129a l\u00e0 g\u00ec?</b><br>A. Gi\u1eef nguy\u00ean truy\u1ec1n th\u1ed1ng v\u0103n h\u00f3a m\u00e0 kh\u00f4ng thay \u0111\u1ed5i.<br>B. Bi\u1ebfn \u0111\u1ed5i t\u1eadp qu\u00e1n v\u00e0 hi\u1ec7n v\u1eadt v\u0103n h\u00f3a th\u00e0nh s\u1ea3n ph\u1ea9m \u0111\u1ec3 b\u00e1n<br>C. C\u1ee7ng c\u1ed1 t\u00ednh x\u00e1c th\u1ef1c v\u00e0 b\u1ea3n g\u1ed1c c\u1ee7a c\u00e1c t\u1eadp qu\u00e1n v\u0103n h\u00f3a<br>D. C\u1ed9ng \u0111\u1ed3ng t\u1eeb ch\u1ed1i ho\u1eb7c ch\u1ed1ng l\u1ea1i du l\u1ecbch<br><b>C\u0103n c\u1ee9 v\u00e0o ng\u1eef c\u1ea3nh</b><br>&nbsp;One of the most salient effects of tourism on local cultures is the&nbsp;<b style=\"\">commodification of cultural practices and artifacts...t</b>raditional rituals, crafts, and customs are often packaged and presented for tourist consumption<br><u>(</u><i>M\u1ed9t trong nh\u1eefng t\u00e1c \u0111\u1ed9ng n\u1ed5i b\u1eadt nh\u1ea5t c\u1ee7a du l\u1ecbch \u0111\u1ed1i v\u1edbi v\u0103n h\u00f3a \u0111\u1ecba ph\u01b0\u01a1ng l\u00e0&nbsp;vi\u1ec7c <b>th\u01b0\u01a1ng m\u1ea1i h\u00f3a c\u00e1c t\u1eadp qu\u00e1n v\u00e0 hi\u1ec7n v\u1eadt v\u0103n h\u00f3a...</b>c\u00e1c nghi l\u1ec5 truy\u1ec1n th\u1ed1ng, ngh\u1ec1 th\u1ee7 c\u00f4ng v\u00e0 phong t\u1ee5c th\u01b0\u1eddng \u0111\u01b0\u1ee3c \u0111\u00f3ng g\u00f3i v\u00e0 tr\u00ecnh b\u00e0y \u0111\u1ec3 ph\u1ee5c v\u1ee5 nhu c\u1ea7u c\u1ee7a du kh\u00e1ch</i><u>)</u>", "key": "B", "isVideo": false, "score": 0, "order": 54, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582169, "lessonId": 0, "a": "downplaying", "b": "celebrating", "c": "honoring", "d": "exaggerating", "bookId": 1086058, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 2, the word <b>trivializing </b>can be replaced by ________.", "answer": "<b>T\u1eeb \u201ctrivializing\u201d c\u00f3 th\u1ec3 thay b\u1eb1ng t\u1eeb n\u00e0o?</b><br><span data-start=\"4563\" data-end=\"4581\" style=\"\">A.&nbsp;</span>L\u00e0m gi\u1ea3m t\u1ea7m quan tr\u1ecdng<br><span data-start=\"4625\" data-end=\"4643\" style=\"\">B.&nbsp;</span>T\u00f4n vinh<br><span data-start=\"4661\" data-end=\"4676\" style=\"\">C. </span>Vinh danh<br><span data-start=\"4695\" data-end=\"4714\" style=\"\">D. </span>Ph\u00f3ng \u0111\u1ea1i<br><b>D\u1ef1a v\u00e0o ng\u1eef c\u1ea3nh c\u00e2u</b><br>It also risks <b>trivializing </b>complex cultural elements, reducing them to mere spectacles or souvenirs<br>(<i>N\u00f3 c\u0169ng c\u00f3 nguy c\u01a1 l\u00e0m <b>\u0111\u01a1n gi\u1ea3n h\u00f3a</b> qu\u00e1 m\u1ee9c c\u00e1c y\u1ebfu t\u1ed1 v\u0103n h\u00f3a ph\u1ee9c t\u1ea1p, bi\u1ebfn ch\u00fang th\u00e0nh nh\u1eefng <span data-start=\"4956\" data-end=\"5003\" style=\"\">m\u00e0n tr\u00ecnh di\u1ec5n ho\u1eb7c h\u00e0ng l\u01b0u ni\u1ec7m \u0111\u01a1n thu\u1ea7n</span></i>)", "key": "A", "isVideo": false, "score": 0, "order": 55, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582171, "lessonId": 0, "a": "Alterations in societal conventions within local communities", "b": "The modification or incorporation of native linguistic practices", "c": "The emergence of contemporary styles in clothing", "d": "Advancements of long-standing cultural customs", "bookId": 1086059, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 3,which of the following is NOT identified as a challenge caused by tourism?", "answer": "<b>Th\u00e1ch th\u1ee9c n\u00e0o KH\u00d4NG \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp l\u00e0 do du l\u1ecbch g\u00e2y ra?</b><br>A. Thay \u0111\u1ed5i c\u00e1c quy \u01b0\u1edbc x\u00e3 h\u1ed9i trong c\u1ed9ng \u0111\u1ed3ng \u0111\u1ecba ph\u01b0\u01a1ng<br>B. Thay \u0111\u1ed5i ho\u1eb7c ti\u1ebfp thu c\u00e1c t\u1eadp qu\u00e1n ng\u00f4n ng\u1eef b\u1ea3n \u0111\u1ecba<br>C. S\u1ef1 xu\u1ea5t hi\u1ec7n c\u1ee7a phong c\u00e1ch th\u1eddi trang hi\u1ec7n \u0111\u1ea1i<br>D. S\u1ef1 ph\u00e1t tri\u1ec3n c\u1ee7a c\u00e1c phong t\u1ee5c v\u0103n h\u00f3a l\u00e2u \u0111\u1eddi<br><b>C\u0103n c\u1ee9 v\u00e0o c\u00e1c th\u00f4ng tin</b><br>This cultural adaptation can manifest in various ways, from c<b>hanges in local dress and cuisine</b> to <b>shifts in language use and social norms</b><br>(<i>S\u1ef1 th\u00edch nghi n\u00e0y c\u00f3 th\u1ec3 bi\u1ec3u hi\u1ec7n theo nhi\u1ec1u c\u00e1ch, t\u1eeb t<b>hay \u0111\u1ed5i trong trang ph\u1ee5c v\u00e0 \u1ea9m th\u1ef1c</b> \u0111\u1ecba ph\u01b0\u01a1ng \u0111\u1ebfn s\u1ef1 t<b>hay \u0111\u1ed5i trong vi\u1ec7c s\u1eed d\u1ee5ng ng\u00f4n ng\u1eef</b> v\u00e0 <b>chu\u1ea9n m\u1ef1c x\u00e3 h\u1ed9i</b></i>)<br>=&gt; \u00dd A, B, C \u0111\u1ec1u \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp.", "key": "D", "isVideo": false, "score": 0, "order": 56, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582173, "lessonId": 0, "a": "tourism can be used to revitalize and empower communities", "b": "communities may develop a stronger sense of pride in their cultural traditions", "c": "tourism does not necessarily guarantee economic prosperity at all times", "d": "revenue generated by tourism can be allocated to support efforts aimed at preserving cultural legacies", "bookId": 1086060, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 4, it is NOT mentioned that ________.", "answer": "<b>\u0110i\u1ec1u n\u00e0o KH\u00d4NG \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp trong \u0111o\u1ea1n 4?</b><br>A. Du l\u1ecbch c\u00f3 th\u1ec3 \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng \u0111\u1ec3 ph\u1ee5c h\u1ed3i v\u00e0 trao quy\u1ec1n cho c\u1ed9ng \u0111\u1ed3ng<br>B. C\u00e1c c\u1ed9ng \u0111\u1ed3ng c\u00f3 th\u1ec3 ph\u00e1t tri\u1ec3n \u00fd th\u1ee9c t\u1ef1 h\u00e0o v\u1ec1 truy\u1ec1n th\u1ed1ng v\u0103n h\u00f3a c\u1ee7a h\u1ecd<br>C. Du l\u1ecbch kh\u00f4ng ph\u1ea3i l\u00fac n\u00e0o c\u0169ng \u0111\u1ea3m b\u1ea3o s\u1ef1 th\u1ecbnh v\u01b0\u1ee3ng kinh t\u1ebf.<br>D. Doanh thu t\u1eeb du l\u1ecbch c\u00f3 th\u1ec3 h\u1ed7 tr\u1ee3 c\u00e1c n\u1ed7 l\u1ef1c b\u1ea3o t\u1ed3n v\u0103n h\u00f3a.<br><b>C\u0103n c\u1ee9 v\u00e0o c\u00e1c th\u00f4ng tin:</b><br>- Many communities have found ways to leverage tourism as a means of cultural revitalization and empowerment (<i>Nhi\u1ec1u c\u1ed9ng \u0111\u1ed3ng \u0111\u00e3 t\u00ecm ra c\u00e1ch t\u1eadn d\u1ee5ng du l\u1ecbch nh\u01b0 m\u1ed9t ph\u01b0\u01a1ng ti\u1ec7n h\u1ed3i sinh v\u00e0 c\u1ee7ng c\u1ed1 b\u1ea3n s\u1eafc v\u0103n h\u00f3a</i>)<br>- By sharing their heritage with visitors, some groups have strengthened their own sense of identity and pride in their traditions (<i>B\u1eb1ng c\u00e1ch chia s\u1ebb di s\u1ea3n c\u1ee7a m\u00ecnh v\u1edbi du kh\u00e1ch, m\u1ed9t s\u1ed1 nh\u00f3m \u0111\u00e3 c\u1ee7ng c\u1ed1 l\u00f2ng t\u1ef1 h\u00e0o v\u00e0 \u00fd th\u1ee9c v\u1ec1 b\u1ea3n s\u1eafc v\u0103n h\u00f3a c\u1ee7a h\u1ecd</i>)<br>- the economic benefits of tourism can provide resources for cultural preservation efforts that might otherwise be unfeasible (<i>l\u1ee3i \u00edch kinh t\u1ebf t\u1eeb du l\u1ecbch c\u00f3 th\u1ec3 cung c\u1ea5p ngu\u1ed3n l\u1ef1c \u0111\u1ec3 b\u1ea3o t\u1ed3n v\u0103n h\u00f3a m\u00e0 n\u1ebfu kh\u00f4ng c\u00f3 nh\u1eefng n\u1ed7 l\u1ef1c n\u00e0y c\u00f3 th\u1ec3 kh\u00f3 th\u1ef1c hi\u1ec7n)</i><br>=&gt; \u00dd A, B, D \u0111\u1ec1u \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp.", "key": "C", "isVideo": false, "score": 0, "order": 57, "fillKey": "", "yourKey": "", "isTested         }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
