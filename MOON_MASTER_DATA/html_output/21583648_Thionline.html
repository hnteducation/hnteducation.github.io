cy made me participate in a volunteer programme this summer.", "bookId": 743824, "comments": 2, "bookmarks": 35, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\"How about participating in a volunteer programme this summer?\" said Lucy.", "answer": "<div><b>Ki\u1ebfn th\u1ee9c vi\u1ebft l\u1ea1i c\u00e2u - C\u00e2u t\u01b0\u1eddng thu\u1eadt</b></div><div><b>X\u00e9t 4 \u0111\u00e1p \u00e1n:&nbsp;</b></div><div>A. Lucy suggested me to participate in a volunteer programme this summer.</div><div><i>(Lucy g\u1ee3i \u00fd t\u00f4i tham gia m\u1ed9t ch\u01b0\u01a1ng tr\u00ecnh t\u00ecnh nguy\u1ec7n v\u00e0o m\u00f9a h\u00e8 n\u00e0y.)</i></div><div>\u21d2Sai v\u00ec c\u1ea5u tr\u00fac \"<b>S + suggest sb to infinitive</b>\" kh\u00f4ng \u0111\u00fang trong ti\u1ebfng Anh. C\u1ea5u tr\u00fac \u0111\u00fang l\u00e0: <b>S + suggest doing something</b></div><div>B.&nbsp; Lucy asked me why not participate in a volunteer programme this summer.</div><div><i>(Lucy h\u1ecfi t\u00f4i t\u1ea1i sao kh\u00f4ng tham gia ch\u01b0\u01a1ng tr\u00ecnh t\u00ecnh nguy\u1ec7n v\u00e0o m\u00f9a h\u00e8 n\u00e0y.)</i></div><div>\u21d2Sai v\u00ec \"How about\" kh\u00f4ng \u0111\u01b0\u1ee3c chuy\u1ec3n th\u00e0nh c\u00e2u h\u1ecfi \"why not.\" Ngo\u00e0i ra, \"asked\" kh\u00f4ng ph\u00f9 h\u1ee3p v\u1edbi ngh\u0129a g\u1ee3i \u00fd c\u1ee7a c\u00e2u g\u1ed1c.</div><div>C. Lucy suggested my participation in a volunteer programme this summer.</div><div><i>(Lucy g\u1ee3i \u00fd t\u00f4i tham gia m\u1ed9t ch\u01b0\u01a1ng tr\u00ecnh t\u00ecnh nguy\u1ec7n v\u00e0o m\u00f9a h\u00e8 n\u00e0y.)</i></div><div>\u21d2 \u0110\u00fang v\u00ec c\u1ea5u tr\u00fac \u201c<b>S + suggest + noun/noun phrase</b>\u201d c\u0169ng \u0111\u01b0\u1ee3c d\u00f9ng \u0111\u1ec3 \u0111\u01b0a ra l\u1eddi g\u1ee3i \u00fd.&nbsp;</div><div>D.&nbsp; Lucy made me participate in a volunteer programme this summer.</div><div><i>(Lucy \u0111\u00e3 b\u1eaft t\u00f4i tham gia m\u1ed9t ch\u01b0\u01a1ng tr\u00ecnh t\u00ecnh nguy\u1ec7n v\u00e0o m\u00f9a h\u00e8 n\u00e0y.)</i></div><div>\u21d2 Sai v\u00ec c\u00e2u n\u00e0y mang t\u00ednh ch\u1ea5t b\u1eaft bu\u1ed9c, kh\u00f4ng mang t\u00ednh ch\u1ea5t g\u1ee3i \u00fd. Ta c\u00f3 c\u1ea5u tr\u00fac: <b>S + make + sb/sth + V (infinitive)</b>: khi\u1ebfn ho\u1eb7c b\u1eaft bu\u1ed9c ai \u0111\u00f3/\u0111i\u1ec1u g\u00ec \u0111\u00f3 l\u00e0m c\u00e1i g\u00ec</div>", "key": "C", "isVideo": true, "score": 0, "order": 45, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 46-52: Read the passage carefully.", "content": "1. There is an insidious irony to climate change. When it gets hotter, more and more people are using their air conditioners, which in turn contributes to global warming. Air conditioner sales are surging worldwide, especially in emerging economies such as China, India and Indonesia, where rising incomes make air conditioners more <b>affordable </b>and a warmer, more humid climate makes them a necessity. <br>2. Keeping buildings cool contributes to global warming in two ways. Air conditioners not only run on electricity, but they can release chemicals with a strong heat-trapping effect as well. Air conditioners account for 16 percent of total electricity used in residential and commercial buildings around the world. <b>This </b>is significantly less than emissions caused by heating buildings - heaters run on natural gas, oil or electricity. Globally, there are over two billion air conditioner units in use today. The units precisely control the temperature and humidity in shops, laboratories or server rooms. They ensure that people feel as comfortable on a transatlantic flight as they do at home. But all that comes at a cost. Unless we switch to fully renewable electricity, the boom in air conditioning will generate more emissions and contribute to global warming, making hot summers even hotter. <br>3. With every new air conditioner installed, the risk of a leak increases. The technology behind modern air conditioners hasn't changed significantly since 1902 when the air conditioner unit sent air through coils filled with cold water, and cooled the air while removing moisture from the room. All air conditioners use refrigerant, a cold substance that absorbs the heat inside a building. The leakage of so-called fluorinated gases was particularly high by 2014. It accounted for about three percent of all greenhouse gas emissions in Europe, so the European Union adopted a law to cap the amounts of gases sold. <br><div style=\"text-align: right;\"><i>(Adapted from https://www.wired.co.uk/)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 10470059, "lessonId": 0, "a": "Primary reasons for global warming", "b": "Staying cool leads to global warming", "c": "Air-conditioners: the main factor of global warming", "d": "Effects of overusing air-conditioners", "bookId": 290610, "comments": 0, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Which is the best title of this passage?", "answer": "<b>Ti\u00eau \u0111\u1ec1 ph\u00f9 h\u1ee3p nh\u1ea5t c\u1ee7a \u0111o\u1ea1n v\u0103n n\u00e0y l\u00e0 g\u00ec? <br></b>A. Nh\u1eefng nguy\u00ean nh\u00e2n ch\u00ednh d\u1eabn \u0111\u1ebfn hi\u1ec7n t\u01b0\u1ee3ng n\u00f3ng l\u00ean to\u00e0n c\u1ea7u<br>B. Vi\u1ec7c gi\u1eef m\u00e1t d\u1eabn \u0111\u1ebfn hi\u1ec7n t\u01b0\u1ee3ng n\u00f3ng l\u00ean to\u00e0n c\u1ea7u<br>C. M\u00e1y \u0111i\u1ec1u h\u00f2a: nh\u00e2n t\u1ed1 ch\u00ednh g\u00e2y ra hi\u1ec7n t\u01b0\u1ee3ng n\u00f3ng l\u00ean to\u00e0n c\u1ea7u<br>D. T\u00e1c h\u1ea1i c\u1ee7a vi\u1ec7c l\u1ea1m d\u1ee5ng \u0111i\u1ec1u h\u00f2a<br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin \u0111o\u1ea1n 1 v\u00e0 2<br></b>When it gets hotter, more and more people are using their air conditioners, which in turn contributes to global warming.<i>(Khi th\u1eddi ti\u1ebft tr\u1edf n\u00ean n\u00f3ng h\u01a1n, ng\u00e0y c\u00e0ng c\u00f3 nhi\u1ec1u ng\u01b0\u1eddi s\u1eed d\u1ee5ng m\u00e1y \u0111i\u1ec1u h\u00f2a, \u0111i\u1ec1u n\u00e0y g\u00f3p ph\u1ea7n l\u00e0m tr\u00e1i \u0111\u1ea5t n\u00f3ng l\u00ean.</i>)Keeping buildings cool contributes to global warming in two ways.(<i>Gi\u1eef cho c\u00e1c t\u00f2a nh\u00e0 lu\u00f4n m\u00e1t m\u1ebb g\u00f3p ph\u1ea7n v\u00e0o s\u1ef1 n\u00f3ng l\u00ean to\u00e0n c\u1ea7u theo hai c\u00e1ch.</i>)<br>\u21d2 <b>Ta th\u1ea5y tuy b\u00e0i \u0111\u1ec1 c\u1eadp \u0111\u1ebfn \u0111i\u1ec1u h\u00f2a, nh\u01b0ng c\u00e1i \u0111i\u1ec1u h\u00f2a kh\u00f4ng l\u00e0 nguy\u00ean nh\u00e2n g\u00e2y n\u00f3ng l\u00ean to\u00e0n c\u1ea7u. Nguy\u00ean nh\u00e2n ch\u00ednh l\u00e0 nhu c\u1ea7u l\u00e0m m\u00e1t c\u1ee7a con ng\u01b0\u1eddi.</b>", "key": "B", "isVideo": true, "score": 0, "order": 46, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583685, "lessonId": 0, "a": "Higher incomes and warmer climates", "b": "Subsidies for energy-efficient cooling systems", "c": "A global drop in air conditioner prices", "d": "Better availability of renewable energy options", "bookId": 1086191, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What factors have driven the increase in air conditioner sales in nations such as China, India, and Indonesia, as mentioned in paragraph 1?", "answer": "<b>Nh\u1eefng y\u1ebfu t\u1ed1 n\u00e0o \u0111\u00e3 th\u00fac \u0111\u1ea9y s\u1ef1 gia t\u0103ng doanh s\u1ed1 b\u00e1n \u0111i\u1ec1u h\u00f2a kh\u00f4ng kh\u00ed \u1edf c\u00e1c qu\u1ed1c gia nh\u01b0 Trung Qu\u1ed1c, \u1ea4n \u0110\u1ed9 v\u00e0 Indonesia, nh\u01b0 \u0111\u00e3 \u0111\u1ec1 c\u1eadp trong \u0111o\u1ea1n v\u0103n 1?</b><br><b>A.</b> Thu nh\u1eadp cao h\u01a1n v\u00e0 kh\u00ed h\u1eadu \u1ea5m h\u01a1n<br>< itioners not only run on electricity, but they can release chemicals with a strong heat-trapping effect as well\n<br><i>(Vi\u1ec7c gi\u1eef cho c\u00e1c t\u00f2a nh\u00e0 m\u00e1t m\u1ebb \u0111\u00f3ng g\u00f3p v\u00e0o s\u1ef1 n\u00f3ng l\u00ean to\u00e0n c\u1ea7u theo hai c\u00e1ch. \u0110i\u1ec1u h\u00f2a kh\u00f4ng kh\u00ed kh\u00f4ng ch\u1ec9 <u>s\u1eed d\u1ee5ng \u0111i\u1ec7n</u> m\u00e0 c\u00f2n c\u00f3 th\u1ec3 <u>ph\u00e1t ra c\u00e1c h\u00f3a ch\u1ea5t c\u00f3 t\u00e1c d\u1ee5ng gi\u1eef nhi\u1ec7t m\u1ea1nh m\u1ebd</u>.)\n</i>", "key": "B", "isVideo": false, "score": 0, "order": 49, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583695, "lessonId": 0, "a": "the figure for electricity consumed by air conditioners", "b": "the emission of air conditioners", "c": "the percentage of heat-trapping effect released by air conditioners", "d": "the demand for air conditioning and refrigeration systems", "bookId": 1086194, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The word <b>This </b>in the passage 2 refers to ____________.", "answer": "<b>T\u1eeb \"This\" trong \u0111o\u1ea1n v\u0103n 2 \u00e1m ch\u1ec9 __________.\n</b><br><b>A.</b> con s\u1ed1 v\u1ec1 l\u01b0\u1ee3ng \u0111i\u1ec7n ti\u00eau th\u1ee5 b\u1edfi \u0111i\u1ec1u h\u00f2a kh\u00f4ng kh\u00ed\n<br><b>B.</b> l\u01b0\u1ee3ng kh\u00ed th\u1ea3i t\u1eeb \u0111i\u1ec1u h\u00f2a kh\u00f4ng kh\u00ed\n<br><b>C.</b> t\u1ef7 l\u1ec7 c\u1ee7a hi\u1ec7u \u1ee9ng gi\u1eef nhi\u1ec7t ph\u00e1t ra t\u1eeb \u0111i\u1ec1u h\u00f2a kh\u00f4ng kh\u00ed\n<br><b>D.</b> nhu c\u1ea7u v\u1ec1 h\u1ec7 th\u1ed1ng \u0111i\u1ec1u h\u00f2a v\u00e0 l\u00e0m l\u1ea1nh\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o ng\u1eef c\u1ea3nh:\n</b><br>Air conditioners account for 16 percent of total electricity used in residential and commercial buildings around the world. 11\u00e2y b\u1ecb gi\u1edbi h\u1ea1n \u1edf Ch\u00e2u \u00c2u.\n<br><b><br>C\u0103n c\u1ee9 v\u00e0o c\u00e1c th\u00f4ng tin:\n</b><br>- They can release chemicals with a strong heat-trapping effect <i>(\u0110i\u1ec1u h\u00f2a kh\u00f4ng kh\u00ed c\u00f3 th\u1ec3 ph\u00e1t ra c\u00e1c h\u00f3a ch\u1ea5t c\u00f3 <u>t\u00e1c d\u1ee5ng gi\u1eef nhi\u1ec7t</u> m\u1ea1nh m\u1ebd)\n</i><br>- The technology behind modern air conditioners hasn't changed significantly since 1902 <i>(C\u00f4ng ngh\u1ec7 c\u1ee7a c\u00e1c \u0111i\u1ec1u h\u00f2a kh\u00f4ng kh\u00ed hi\u1ec7n \u0111\u1ea1i <u>ch\u01b0a thay \u0111\u1ed5i nhi\u1ec1u</u> k\u1ec3 t\u1eeb n\u0103m 1902)\n</i><br>- All air conditioners use refrigerant, a cold substance that absorbs the heat inside a building <i>(T\u1ea5t c\u1ea3 c\u00e1c \u0111i\u1ec1u h\u00f2a kh\u00f4ng kh\u00ed \u0111\u1ec1u <u>s\u1eed d\u1ee5ng ch\u1ea5t l\u00e0m l\u1ea1nh</u>, m\u1ed9t ch\u1ea5t l\u1ea1nh <u>h\u1ea5p th\u1ee5 nhi\u1ec7t b\u00ean trong t\u00f2a nh\u00e0</u>)\n</i><br>=&gt; \u00dd A, B, C \u0111\u1ec1u \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp\n", "key": "D", "isVideo": false, "score": 0, "order": 51, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583711, "lessonId": 0, "a": "using renewable electricity could be one solution to slow global warming", "b": "there are two ways to keep buildings cool", "c": "air conditioners make people feel much more comfortable", "d": "the number of air-conditioners has become more and more increasing nowadays", "bookId": 1086196, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "It can be implied from the passage that __________.", "answer": "<b>C\u00f3 th\u1ec3 suy ra t\u1eeb \u0111o\u1ea1n v\u0103n r\u1eb1ng __________.\n</b><br><b>A.</b> s\u1eed d\u1ee5ng \u0111i\u1ec7n t\u00e1i t\u1ea1o c\u00f3 th\u1ec3 l\u00e0 m\u1ed9t gi\u1ea3i ph\u00e1p \u0111\u1ec3 l\u00e0m ch\u1eadm s\u1ef1 n\u00f3ng l\u00ean to\u00e0n c\u1ea7u\n<br><b>B.</b> c\u00f3 hai c\u00e1ch \u0111\u1ec3 gi\u1eef m\u00e1t cho c\u00e1c t\u00f2a nh\u00e0\n<br><b>C.</b> \u0111i\u1ec1u h\u00f2a kh\u00f4ng kh\u00ed l\u00e0m cho m\u1ecdi ng\u01b0\u1eddi c\u1ea3m th\u1ea5y tho\u1ea3i m\u00e1i h\u01a1n r\u1ea5t nhi\u1ec1u\n<br><b>D. </b>s\u1ed1 l\u01b0\u1ee3ng \u0111i\u1ec1u h\u00f2a kh\u00f4ng kh\u00ed ng\u00e0y c\u00e0ng t\u0103ng l\u00ean hi\u1ec7n nay\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin \u0111o\u1ea1n:</b><br>Unless we switch to fully renewable electricity, the boom in air conditioning will generate more emissions and contribute to global warming\n<br><i>(Tr\u1eeb khi ch\u00fang ta chuy\u1ec3n sang s\u1eed d\u1ee5ng ho\u00e0n to\u00e0n \u0111i\u1ec7n t\u00e1i t\u1ea1o, s\u1ef1 b\u00f9ng n\u1ed5 c\u1ee7a \u0111i\u1ec1u h\u00f2a s\u1ebd t\u1ea1o ra nhi\u1ec1u kh\u00ed th\u1ea3i h\u01a1n v\u00e0 g\u00f3p ph\u1ea7n v\u00e0o s\u1ef1 n\u00f3ng l\u00ean to\u00e0n c\u1ea7u.)\n</i><br>=&gt; \u0110i\u1ec7n t\u00e1i t\u1ea1o c\u00f3 th\u1ec3 l\u00e0m gi\u1ea3m s\u1ef1 n\u00f3ng l\u00ean to\u00e0n c\u1ea7u\n", "key": "A", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully.", "content": "1. Mass media, encompassing television, radio, newspapers, and the internet, has profoundly influenced the entertainment industry in various ways. With the advent of digital technology and the rise of the internet, the way people consume entertainment has dramatically changed, reshaping both content and delivery methods.<br>2. One significant impact of mass media on entertainment is the <b>democratization of content creation</b>. In the past, major studios and networks held a monopoly over what audiences could access. Today, platforms like YouTube, TikTok, and various streaming services allow individuals to create and distribute their content. This shift has not only diversified the types of entertainment available but also enabled marginalized voices to share their stories and perspectives.<br>3. Additionally, mass media has facilitated the globalization of entertainment. Films, music, and television shows from different cultures can now reach audiences around the world almost instantaneously. This cross-cultural exchange has led to the blending of genres and styles, creating new forms of entertainment that reflect a more interconnected world. For example, the popularity of K-pop globally illustrates how mass media can introduce local entertainment phenomena to international markets, influencing trends and preferences across borders.<br>4. Moreover, the role of social media in shaping entertainment cannot be understated. Platforms like Instagram and Twitter allow fans to engage with their favorite celebrities and creators directly, fostering a sense of community and involvement. Viral trends often dictate what content becomes popular, impacting how entertainment is produced and marketed. This immediate feedback loop between creators and audiences has transformed traditional marketing strategies, making them more interactive and responsive to viewer preferences.<br>5. However, the influence of mass media on entertainment is not without its drawbacks. The pressure to produce content that goes viral can lead to a focus on <b>sensationalism </b>over quality. This trend may result in the proliferation of shallow content that prioritizes clickbait over substance, potentially diminishing the overall quality of entertainment available to audiences.<br>6. In conclusion, mass media has had a profound impact on the entertainment industry, changing how content is created, consumed, and marketed. While it has opened up opportunities for diverse voices and global exchanges, it has also introduced challenges that creators must navigate. As technology continues to evolve, the relationship between mass media and entertainment will likely grow even more complex.<br><div style=\"text-align: right;\"><i>(Adapted from the Real Ielts)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21583735, "lessonId": 0, "a": "The Globalization of Entertainment", "b": "The Evolution of Mass Media in Entertainment", "c": "The Rise of Social Media in Content Creation", "d": "How the Internet Has Revolutionized Television", "bookId": 1086197, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title for the passage can be ________.", "answer": "<b>Ti\u00eau \u0111\u1ec1 ph\u00f9 h\u1ee3p nh\u1ea5t cho \u0111o\u1ea1n v\u0103n l\u00e0 g\u00ec?\n</b><br><br><b>A. </b>To\u00e0n c\u1ea7u h\u00f3a ng\u00e0nh gi\u1ea3i tr\u00ed <br><b>=&gt; Sai</b>, v\u00ec b\u00e0i kh\u00f4ng ch\u1ec9 n\u00f3i v\u1ec1 to\u00e0n c\u1ea7u h\u00f3a m\u00e0 c\u00f2n \u0111\u1ec1 c\u1eadp \u0111\u1ebfn nhi\u1ec1u kh\u00eda c\u1ea1nh kh\u00e1c nh\u01b0 t\u1ea1o n\u1ed9i dung, m\u1ea1ng x\u00e3 h\u1ed9i, v\u00e0 ti\u1ebfp th\u1ecb\n\n<br><br><b>B.</b> S\u1ef1 ph\u00e1t tri\u1ec3n c\u1ee7a truy\u1ec1n th\u00f4ng \u0111\u1ea1i ch\u00fang trong gi\u1ea3i tr\u00ed <br><b>=&gt; \u0110\u00fang</b>, v\u00ec b\u00e0i vi\u1ebft ch\u1ee7 y\u1ebfu t\u1eadp trung v\u00e0o c\u00e1ch truy\u1ec1n th\u00f4ng \u0111\u1ea1i ch\u00fang thay \u0111\u1ed5i ng\u00e0nh gi\u1ea3i tr\u00ed theo nhi\u1ec1u kh\u00eda c\u1ea1nh kh\u00e1c nhau\n\n<br><br><b>C.</b> S\u1ef1 ph\u00e1t tri\u1ec3n c\u1ee7a m\u1ea1ng x\u00e3 h\u1ed9i trong vi\u1ec7c t\u1ea1o n\u1ed9i dung <br><b>=&gt; Sai</b>, v\u00ec b\u00e0i kh\u00f4ng ch\u1ec9 n\u00f3i v\u1ec1 m\u1ea1ng x\u00e3 h\u1ed9i m\u00e0 c\u00f2n c\u00f3 nhi\u1ec1u y\u1ebfu t\u1ed1 kh\u00e1c nh\u01b0 phim \u1ea3nh, truy\u1ec1n h\u00ecnh, v\u00e0 s\u1ef1 to\u00e0n c\u1ea7u h\u00f3a\n\n<br><br><b>D.</b> C\u                     else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
