    <script>
        const EXAM_DATA = [{"title": "", "content": "", "listQuestion": [{"questionId": 21597704, "lessonId": 0, "a": "N\u1ed1i ng\u00f4i cha, ti\u1ebfp t\u1ee5c c\u00f4ng vi\u1ec7c x\u00e2y th\u00e0nh c\u1ee7a vua cha.", "b": "Qu\u1ef5t c\u00f4ng b\u1ed9i \u01b0\u1edbc, do\u1ea1 x\u1ebbo tai c\u1eaft m\u0169i c\u00e1c v\u1ecb th\u1ea7n \u0111\u00e3 t\u1edbi h\u1ed9 tr\u00ec x\u00e2y th\u00e0nh.", "c": "M\u1eddi th\u1ea7n Ap\u00f4l\u00f4ng v\u00e0 th\u1ea7n P\u00f4d\u00eai\u0111\u00f4ng t\u1edbi x\u00e2y gi\u00fap.", "d": "Bi\u1ebft \u01a1n, tri \u00e2n hai v\u1ecb th\u1ea7n Ap\u00f4l\u00f4ng v\u00e0 P\u00f4d\u00eai\u0111\u00f4ng v\u00ec \u0111\u00e3 gi\u00fap m\u00ecnh x\u00e2y th\u00e0nh.", "bookId": 1088337, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cIl\u00f4x c\u00f3 hai ng\u01b0\u1eddi con, m\u1ed9t trai t\u00ean g\u1ecdi Laom\u00ea\u0111\u00f4ng, m\u1ed9t g\u00e1i t\u00ean g\u1ecdi Th\u00eamixt\u00ea. S\u1ef1 nghi\u1ec7p x\u00e2y th\u00e0nh c\u1ee7a Il\u00f4x m\u1edbi xong \u0111\u01b0\u1ee3c ph\u1ea7n ch\u00ednh tr\u00ean ng\u1ecdn \u0111\u1ed3i c\u00f2n \u1edf d\u01b0\u1edbi ch\u00e2n \u0111\u1ed3i th\u00ec ch\u01b0a l\u00e0m \u0111\u01b0\u1ee3c ch\u00fat g\u00ec. Laom\u00ea\u0111\u00f4ng l\u00ean n\u1ed1i ng\u00f4i cha ti\u1ebfp t\u1ee5c c\u00f4ng cu\u1ed9c x\u00e2y th\u00e0nh. Nh\u00e0 vua m\u1eddi th\u1ea7n Ap\u00f4l\u00f4ng v\u00e0 th\u1ea7n P\u00f4d\u00eai\u0111\u00f4ng t\u1edbi x\u00e2y gi\u00fap. Nh\u01b0ng khi c\u00e1c v\u1ecb th\u1ea7n n\u00e0y ho\u00e0n th\u00e0nh c\u00f4ng vi\u1ec7c th\u00ec Laom\u00ea\u0111\u00f4ng l\u1ea1i qu\u1ef5t c\u00f4ng b\u1ed9i \u01b0\u1edbc, kh\u00f4ng trao t\u1ea5t c\u1ea3 s\u1ed1 s\u00fac v\u1eadt do \u0111\u00e0n s\u00fac v\u1eadt c\u1ee7a m\u00ecnh sinh \u0111\u1ebb ra trong n\u0103m \u1ea5y nh\u01b0 \u0111\u00e3 h\u1ee9a. Ch\u1eb3ng nh\u1eefng th\u1ebf, Laom\u00ea\u0111\u00f4ng l\u1ea1i c\u00f2n \u0111e do\u1ea1 s\u1ebd x\u1ebbo tai c\u1eaft m\u0169i hai v\u1ecb th\u1ea7n, n\u1ebfu c\u00e1c v\u1ecb c\u1ee9 l\u1eb1ng nh\u1eb1ng \u0111\u00f2i c\u00f4ng x\u00e1 m\u00e3i.\u201d</i><br><div style=\"text-align: right;\">(Th\u1ea7n tho\u1ea1i Hy L\u1ea1p, <i>Th\u00e0nh T\u01a1roa</i>, NXB V\u0103n ho\u00e1, 2002)</div>Chi ti\u1ebft n\u00e0o trong \u0111o\u1ea1n tr\u00edch t\u00f4 \u0111\u1eadm t\u00ednh c\u00e1ch n\u1ed5i b\u1eadt c\u1ee7a nh\u00e2n v\u1eadt Laom\u00ea\u0111\u00f4ng?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft \u201cqu\u1ef5t c\u00f4ng b\u1ed9i \u01b0\u1edbc\u201d, do\u1ea1 \u201cx\u1ebbo tai c\u1eaft m\u0169i\u201d hai v\u1ecb th\u1ea7n Ap\u00f4l\u00f4ng v\u00e0 P\u00f4d\u00eai\u0111\u00f4ng \u0111\u00e3 th\u1ec3 hi\u1ec7n r\u00f5 t\u00ednh c\u00e1ch x\u1ea5u x\u00ed, tham lam c\u1ee7a nh\u00e2n v\u1eadt Laom\u00ea\u0111\u00f4ng. Anh ta \u0111\u00e3 kh\u00f4ng nh\u1eefng kh\u00f4ng gi\u1eef l\u1eddi h\u1ee9a, tham lam m\u00e0 c\u00f2n ng\u1ea1o m\u1ea1n v\u00e0 coi th\u01b0\u1eddng ng\u01b0\u1eddi kh\u00e1c.\n", "key": "B", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597705, "lessonId": 0, "a": "V\u00ec Ng\u1ecdc Ho\u00e0ng mu\u1ed1n con g\u00e1i tr\u01b0\u1edfng th\u00e0nh h\u01a1n d\u01b0\u1edbi tr\u1ea7n gian.", "b": "V\u00ec tr\u1ea7n gian nhi\u1ec1u \u0111i\u1ec1u th\u00fa v\u1ecb, h\u1ea5p d\u1eabn.", "c": "V\u00ec n\u00e0ng ph\u00f3ng t\u00fang ngang b\u01b0\u1edbng, kh\u00f4ng ch\u1ecbu theo khu\u00f4n ph\u00e9p nh\u00e0 tr\u1eddi, Ng\u1ecdc Ho\u00e0ng mu\u1ed1n tr\u1ecb t\u1ed9i \u0111\u1ec3 con g\u00e1i tu t\u1ec9nh.", "d": "V\u00ec c\u00f4ng ch\u00faa Li\u1ec5u H\u1ea1nh tr\u00e1i m\u1ec7nh vua cha.", "bookId": 1088338, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNg\u00e0y x\u01b0a \u1edf tr\u00ean thi\u00ean \u0111\u00ecnh c\u00f3 c\u00f4 con g\u00e1i Ng\u1ecdc Ho\u00e0ng t\u00ean l\u00e0 Li\u1ec5u H\u1ea1nh. T\u00ednh t\u00ecnh c\u00f4 ph\u00f3ng t\u00fang ngang b\u01b0\u1edbng, kh\u00f4ng ch\u1ecbu theo khu\u00f4n ph\u00e9p nh\u00e0 tr\u1eddi. Ng\u1ecdc Ho\u00e0ng h\u1ebft l\u00f2ng d\u1ea1y d\u1ed7 nh\u01b0ng v\u00f4 \u00edch, c\u00f4 ch\u1ee9ng n\u00e0o v\u1eabn gi\u1eef t\u1eadt \u1ea5y. Gi\u1eadn v\u00ec trong nh\u00e0 c\u00f3 con g\u00e1i h\u01b0 kh\u00f4ng th\u1ec3 l\u00e0m v\u00ec cho thi\u00ean h\u1ea1, Ng\u1ecdc Ho\u00e0ng quy\u1ebft tr\u1ecb t\u1ed9i \u0111\u1ec3 cho con tu t\u1ec9nh. Nh\u00e2n m\u1ed9t l\u1ea7n Li\u1ec5u H\u1ea1nh ph\u1ea1m l\u1ed7i, Ng\u1ecdc Ho\u00e0ng b\u00e8n \u0111\u00e0y n\u00e0ng xu\u1ed1ng tr\u1ea7n trong ba n\u0103m.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u0110\u1ed5ng Chi, <i>S\u1ef1 t\u00edch C\u00f4ng ch\u00faa Li\u1ec5u H\u1ea1nh</i>, theo <i>Kho t\u00e0ng truy\u1ec7n c\u1ed5 t\u00edch Vi\u1ec7t Nam</i>, t\u1eadp 1, NXB Gi\u00e1o d\u1ee5c, 2000)</div>V\u00ec sao Li\u1ec5u H\u1ea1nh b\u1ecb gi\u00e1ng xu\u1ed1ng tr\u1ea7n?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nTheo \u0111o\u1ea1n tr\u00edch, c\u00f4ng ch\u00faa Li\u1ec5u H\u1ea1nh c\u00f3 t\u00ednh t\u00ecnh ph\u00f3ng t\u00fang, ngang b\u01b0\u1edbng v\u00e0 kh\u00f4ng ch\u1ecbu theo khu\u00f4n ph\u00e9p c\u1ee7a nh\u00e0 tr\u1eddi. Ng\u1ecdc Ho\u00e0ng \u0111\u00e3 nhi\u1ec1u l\u1ea7n d\u1ea1y d\u1ed7 nh\u01b0ng kh\u00f4ng c\u00f3 k\u1ebft qu\u1ea3. V\u00ec v\u1eady, khi Li\u1ec5u H\u1ea1nh ph\u1ea1m l\u1ed7i, Ng\u1ecdc Ho\u00e0ng \u0111\u00e3 quy\u1ebft \u0111\u1ecbnh \u0111\u00e0y n\u00e0ng xu\u1ed1ng tr\u1ea7n gian trong ba n\u0103m \u0111\u1ec3 n\u00e0ng c\u00f3 c\u01a1 h\u1ed9i tu t\u1ec9nh v\u00e0 thay \u0111\u1ed5i t\u00ednh c\u00e1ch.\n", "key": "C", "isVideo": true, "score": 0, "order": 2, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597707, "lessonId": 0, "a": "\u201cl\u00eanh \u0111\u00eanh\u201d.", "b": "\u201ct\u1ea5p t\u00eanh\u201d.", "c": "\u201cb\u1eadp b\u1ec1nh\u201d.", "d": "\u201cn\u1ed5i n\u00eanh\u201d.", "bookId": 1088339, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cChi\u1ebfc b\u00e1ch  bu\u1ed3n v\u00ec ph\u1eadn n\u1ed5i n\u00eanh,<br>Gi\u1eefa d\u00f2ng ngao ng\u00e1n n\u1ed7i l\u00eanh \u0111\u00eanh.<br>L\u01b0ng  khoang  t\u00ecnh ngh\u0129a d\u01b0\u1eddng lai l\u00e1ng,<br>N\u1eeda m\u1ea1n  phong ba lu\u1ed1ng b\u1eadp b\u1ec1nh.<br>C\u1ea7m l\u00e1i m\u1eb7c ai l\u0103m \u0111\u1ed7 b\u1ebfn,<br>Dong l\u00e8o  th\u00e2y  k\u1ebb r\u1eafp xu\u00f4i gh\u1ec1nh.<br>\u1ea4y ai th\u0103m v\u00e1n  cam l\u00f2ng v\u1eady,<br>Ng\u00e1n n\u1ed7i \u00f4m \u0111\u00e0n  nh\u1eefng t\u1ea5p t\u00eanh .\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Xu\u00e2n H\u01b0\u01a1ng, <i>T\u1ef1 t\u00ecnh</i>, b\u00e0i 3, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>T\u1eeb n\u00e0o <b>kh\u00f4ng </b>c\u00f9ng ngh\u0129a v\u1edbi c\u00e1c t\u1eeb c\u00f2n l\u1ea1i?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>- t\u1ea5p t\u00eanh: c\u00f3 c\u1eed ch\u1ec9, \u0111i\u1ec7u b\u1ed9 l\u1ed9 r\u00f5 \u00fd mu\u1ed1n l\u00e0m ngay vi\u1ec7c g\u00ec \u0111\u00f3 khi th\u1eadt ra ch\u01b0a \u0111\u1ee7 \u0111i\u1ec1u ki\u1ec7n, ch\u01b0a \u0111\u1ebfn l\u00fac (h\u00e0m \u00fd ch\u00ea bai).<br>- \u201cl\u00eanh \u0111\u00eanh\u201d, \u201cb\u1eadp b\u1ec1nh\u201d, \u201cn\u1ed5i n\u00eanh\u201d: \u0111\u1ec1u g\u1ee3i t\u1ea3 s\u1ef1 tr\u00f4i n\u1ed5i tr\u00ean m\u1eb7t n\u01b0\u1edbc, kh\u00f4ng c\u00f3 h\u01b0\u1edbng, c\u00f3 \u0111\u00edch nh\u1ea5t \u0111\u1ecbnh.", "key": "B", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597715, "lessonId": 0, "a": "\u00d4ng \u0110o\u00e1n l\u00fac thi\u1ebfu th\u1eddi t\u00ednh r\u1ea5t l\u1ed7 \u0111\u1ed9n, h\u1ecdc su\u1ed1t ng\u00e0y \u0111\u00eam c\u0169ng kh\u00f4ng thu\u1ed9c \u0111\u01b0\u1ee3c m\u1ed9t d\u00f2ng ch\u1eef.", "b": "Sau c\u01a1n m\u01a1, \u0110o\u00e1n t\u1ec9nh d\u1eady b\u1ee5ng v\u1eabn c\u00f2n th\u1ea5y h\u01a1i \u0111au.", "c": "V\u1ecb th\u1ea7n nh\u00e2n gi\u00e1ng xu\u1ed1ng, l\u1ea5y dao r\u1ea1ch v\u00e0o b\u1ee5ng \u0110o\u00e1n, moi tr\u00e1i tim ra n\u1ea1o h\u1ebft nh\u1eefng ch\u1ea5t v\u1ea9n \u0111\u1ee5c.", "d": "T\u1eeb \u0111\u00eam n\u1eb1m m\u1ed9ng tr\u1edf \u0111i th\u00ec \u0110o\u00e1n h\u1ecdc m\u1ed9t bi\u1ebft m\u01b0\u1eddi.", "bookId": 1088340, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u00d4ng \u0110o\u00e1n ng\u01b0\u1eddi l\u00e0ng M\u1ed9 Tr\u1ea1ch l\u00e0 con trai quan Ho\u00e0ng gi\u00e1p B\u1ea1t T\u1ee5y ng\u00e0y tr\u01b0\u1edbc, l\u00fac thi\u1ebfu th\u1eddi t\u00ednh r\u1ea5t l\u1ed7 \u0111\u1ed9n, h\u1ecdc su\u1ed1t ng\u00e0y \u0111\u00eam c\u0169ng kh\u00f4ng thu\u1ed9c \u0111\u01b0\u1ee3c m\u1ed9t d\u00f2ng ch\u1eef, th\u00e0nh ra khi \u0111\u00e3 17 tu\u1ed5i \u0111\u1ea7u m\u00e0 v\u1eabn d\u1ed1t \u0111\u1eb7c c\u00e1n mai. C\u1eadu th\u1ea5y m\u00ecnh kh\u00f4ng c\u00f3 khi\u1ebfu h\u1ecdc n\u00ean \u0111\u1ecbnh xoay sang ngh\u1ec1 kh\u00e1c.<br>Ch\u1eb3ng ng\u1edd b\u1ed7ng c\u00f3 m\u1ed9t \u0111\u00eam c\u1eadu n\u1eb1m m\u01a1 th\u1ea5y m\u1ed9t v\u1ecb th\u1ea7n nh\u00e2n t\u1ef1 l\u01b0ng ch\u1eebng tr\u1eddi gi\u00e1ng xu\u1ed1ng, l\u1ea5y dao r\u1ea1ch v\u00e0o b\u1ee5ng c\u1eadu, moi tr\u00e1i tim ra n\u1ea1o h\u1ebft nh\u1eefng ch\u1ea5t v\u1ea9n \u0111\u1ee5c, \u0111\u1ebfn khi gi\u1eadt m\u00ecnh t\u1ec9nh d\u1eady b\u1ee5ng v\u1eabn c\u00f2n th\u1ea5y h\u01a1i \u0111au, nh\u01b0ng c\u1eadu cho l\u00e0 \u0111i\u1ec1m t\u1ed1t n\u00ean s\u00e1ng h\u00f4m sau c\u1eadu li\u1ec1n s\u1eeda l\u1ec5 b\u00e1i t\u1ea1, r\u1ed3i cha m\u1eb9 c\u0169ng s\u1eeda l\u1ec5 khai t\u00e2m \u0111\u1ec3 d\u1ea1y c\u1eadu h\u1ecdc. L\u1ea1 thay t\u1eeb \u0111\u1ea5y tr\u1edf \u0111i th\u00ec c\u1eadu h\u1ecdc m\u1ed9t bi\u1ebft m\u01b0\u1eddi, d\u1ea7n d\u1ea7n n\u1ed5i ti\u1ebfng l\u00e0 ng\u01b0\u1eddi hay ch\u1eef, r\u1ed3i g\u1eb7p khoa thi c\u1eadu l\u1ea1i chi\u1ebfm lu\u00f4n.\u201d</i><br><div style=\"text-align: right;\">(V\u0169 Ph\u01b0\u01a1ng \u0110\u1ec1, <i>\u0110\u01b0\u1ee3c th\u1ea7n khai t\u00e2m, v\u0103n ch\u01b0\u01a1ng n\u1ed5i ti\u1ebfng kh\u1eafp thi\u00ean h\u1ea1</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 6, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Chi ti\u1ebft n\u00e0o <b>kh\u00f4ng </b>ph\u1ea3i l\u00e0 chi ti\u1ebft k\u00ec \u1ea3o?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft \u201c\u00d4ng \u0110o\u00e1n l\u00fac thi\u1ebfu th\u1eddi t\u00ednh r\u1ea5t l\u1ed7 \u0111\u1ed9n, h\u1ecdc su\u1ed1t ng\u00e0y \u0111\u00eam c\u0169ng kh\u00f4ng thu\u1ed9c \u0111\u01b0\u1ee3c m\u1ed9t d\u00f2ng ch\u1eef\u201d m\u00f4 t\u1ea3 v\u1ec1 t\u00ednh c\u00e1ch v\u00e0 kh\u1ea3 n\u0103ng h\u1ecdc t\u1eadp c\u1ee7a \u00f4ng \u0110o\u00e1n khi c\u00f2n nh\u1ecf.  \u0110\u00e2y l\u00e0 m\u1ed9t chi ti\u1ebft th\u1ef1c t\u1ebf, kh\u00f4ng mang y\u1ebfu t\u1ed1 hoang \u0111\u01b0\u1eddng, k\u00ec \u1ea3o m\u00e0 kh\u00f4ng th\u1ec3 gi\u1ea3i th\u00edch \u0111\u01b0\u1ee3c b\u1eb1ng logic th\u00f4ng th\u01b0\u1eddng.\n", "key": "A", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597724, "lessonId": 0, "a": "X\u00f3t xa, nu\u1ed1i ti\u1ebfc.", "b": "Th\u01b0\u01a1ng y\u00eau, ti\u1ebfc nh\u1edb.", "c": "Ng\u1ee3i ca, k\u00ednh tr\u1ecdng.", "d": "Ai o\u00e1n, bi lu\u1ef5.", "bookId": 1088341, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cAnh h\u00f9ng th\u00e0 th\u00e1c ch\u1eb3ng \u0111\u1ea7u T\u00e2y,<br>M\u1ed9t gi\u1ea5c sa tr\u01b0\u1eddng ph\u1eadn c\u0169ng may.<br>Vi\u00ean \u0111\u1ea1n ngh\u1ecbch th\u1ea7n  treo tr\u01b0\u1edbc m\u1eaft,<br>L\u01b0\u1ee1i g\u01b0\u01a1m \u0111\u1ecbch kh\u00e1i  n\u1eafm trong tay.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u0110\u00ecnh Chi\u1ec3u, <i>\u0110i\u1ebfu Ba Tri \u0110\u1ed1c binh Phan c\u00f4ng tr\u1eadn vong</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 15, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Gi\u1ecdng \u0111i\u1ec7u ch\u1ee7 \u0111\u1ea1o c\u1ee7a \u0111o\u1ea1n th\u01a1 l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n th\u01a1 s\u1eed d\u1ee5ng nh\u1eefng h\u00ecnh \u1ea3nh v\u00e0 ng\u00f4n t\u1eeb m\u1ea1nh m\u1ebd \u0111\u1ec3 ca ng\u1ee3i v\u00e0 th\u1ec3 hi\u1ec7n l\u00f2ng k\u00ednh tr\u1ecdng \u0111\u1ed1i v\u1edbi ng\u01b0\u1eddi anh h\u00f9ng \u0111\u00e3 hy sinh v\u00ec \u0111\u1ea5t n\u01b0\u1edbc. C\u00e1c c\u00e2u th\u01a1 th\u1ec3 hi\u1ec7n tinh th\u1ea7n ki\u00ean trung, b\u1ea5t khu\u1ea5t c\u1ee7a ng\u01b0\u1eddi anh h\u00f9ng, th\u00e0 ch\u1ebft ch\u1ee9 kh\u00f4ng ch\u1ecbu khu\u1ea5t ph\u1ee5c tr\u01b0\u1edbc k\u1ebb th\u00f9.<br>\n\u2192 Gi\u1ecdng \u0111i\u1ec7u ch\u1ee7 \u0111\u1ea1o c\u1ee7a \u0111o\u1ea1n th\u01a1 l\u00e0 ng\u1ee3i ca, k\u00ednh tr\u1ecdng.\n", "key": "C", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597732, "lessonId": 0, "a": "L\u00e0ng qu\u00ea.", "b": "Th\u1ecb th\u00e0nh.", "c": "Mi\u1ec1n n\u00fai.", "d": "Mi\u1ec1n bi\u1ec3n.", "bookId": 1088342, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNh\u00e0 b\u00e0 n\u1eb1m s\u00e2u trong m\u1ed9t con ng\u00f5 t\u1ed1i, \u1ea9m \u01b0\u1edbt, nh\u1ecf, chi\u1ec1u ngang ch\u1ec9 v\u1eeba m\u1ed9t chi\u1ebfc xe \u0111\u1ea1p, xe m\u00e1y. H\u1ec5 c\u00f3 xe m\u00e1y t\u1eeb trong \u0111i ra, t\u1eeb ngo\u00e0i \u0111i v\u00e0o, \u0111\u1ec1u ph\u1ea3i b\u1eadt \u0111\u00e8n, b\u1ea5m c\u00f2i toe toe, xe \u0111\u1ea1p th\u00ec b\u1ea5m chu\u00f4ng, g\u00f5 v\u00e0o g\u00e1c ba ga ti\u1ebfng l\u1ea1ch x\u1ea1ch r\u00f5 to, \u0111\u1ec1 ph\u00f2ng \u0111\u1ea7u kia c\u00f3 ng\u01b0\u1eddi \u0111i t\u1edbi, g\u1eb7p nhau, kh\u00f4ng tr\u00e1nh n\u1ed5i. Ph\u00eda b\u00ean tr\u00ean tr\u1ea7n, ch\u1ec9 ch\u1eebng h\u01a1n m\u1ed9t t\u1ea7m v\u1edbi, nh\u1eefng gia \u0111\u00ecnh \u1edf tr\u00ean t\u1ea7ng hai \u0111\u1ec1u r\u1ee7 nhau \u0111ua ra. V\u00e0 h\u1ecd \u0111\u1ec1u b\u1ed1 tr\u00ed b\u1ebfp, nh\u00e0 v\u1ec7 sinh \u1edf \u0111\u1ea5y. Trong c\u00e1c h\u00e0nh lang hun h\u00fat, b\u00e9, ch\u1eadt, c\u00e1c gian ph\u00f2ng kh\u00f4ng b\u1eadt \u0111\u00e8n t\u1ed1i nh\u01b0 b\u01b0ng, nghe r\u00f5 n\u01b0\u1edbc r\u00ed r\u00e1ch su\u1ed1t ng\u00e0y \u0111\u00eam. Thi tho\u1ea3ng, \u0111ang l\u00f2 d\u00f2 \u0111i ra \u0111\u01b0\u1eddng, ch\u1ee3t nghe ti\u1ebfng n\u01b0\u1edbc \u00e0o m\u1ed9t c\u00e1i, x\u1ed1i x\u1ea3, quy\u1ebft li\u1ec7t, b\u00e0 l\u1ea1i gi\u1eadt th\u00f3t, t\u01b0\u1edfng n\u01b0\u1edbc \u0111\u00e3 \u0111\u1ed5 \u01b0\u1edbt h\u1ebft t\u1eeb \u0111\u1ea7u \u0111\u1ebfn ch\u00e2n.\u201d</i><br><div style=\"text-align: right;\">(\u0110\u1ed7 B\u00edch Thu\u00fd, <i>S\u01b0\u01a1ng kh\u00f3i m\u1ecbt m\u1edd</i>, theo <i>nhandan.vn</i>)</div>Kh\u00f4ng gian \u0111\u01b0\u1ee3c mi\u00eau t\u1ea3 trong \u0111o\u1ea1n tr\u00edch l\u00e0 kh\u00f4ng gian \u1edf \u0111\u00e2u?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch mi\u00eau t\u1ea3 m\u1ed9t kh\u00f4ng gian s\u1ed1ng ch\u1eadt h\u1eb9p, t\u1ed1i t\u0103 0e2n kh\u00f4ng,<br>\u0110i l\u00f9ng gi\u1eb7c \u0111\u00e1nh.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3ng Nguy\u00ean, <i>Nh\u1edb</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>K\u1ec9 ni\u1ec7m n\u00e0o \u0111\u01b0\u1ee3c t\u00e1i hi\u1ec7n trong \u0111o\u1ea1n th\u01a1 tr\u00ean?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n th\u01a1 tr\u00ean t\u00e1i hi\u1ec7n l\u1ea1i nh\u1eefng k\u1ef7 ni\u1ec7m v\u1ec1 th\u1eddi k\u1ef3 kh\u00e1ng chi\u1ebfn ch\u1ed1ng Ph\u00e1p c\u1ee7a nh\u1eefng ng\u01b0\u1eddi l\u00ednh. H\u1ecd xu\u1ea5t th\u00e2n t\u1eeb nhi\u1ec1u mi\u1ec1n qu\u00ea kh\u00e1c nhau, g\u1eb7p nhau khi c\u00f2n ch\u01b0a bi\u1ebft ch\u1eef, c\u00f9ng nhau h\u1ecdc qu\u00e2n s\u1ef1 v\u00e0 tham gia chi\u1ebfn \u0111\u1ea5u. <br>\n\u2192 \u0110o\u1ea1n th\u01a1 t\u00e1i hi\u1ec7n cu\u1ed9c tr\u00f2 chuy\u1ec7n v\u1ec1 k\u1ec9 ni\u1ec7m chi\u1ebfn \u0111\u1ea5u c\u1ee7a nh\u1eefng ng\u01b0\u1eddi l\u00ednh.\n", "key": "D", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597740, "lessonId": 0, "a": "Hai v\u1ecb linh m\u1ee5c, ch\u00fa b\u00e9 h\u00e1t l\u1ec5.", "b": "\u01a0-gien v\u00e0 Cri-xt\u00f4-ph\u01a1.", "c": "Ti\u1ebfng kh\u00f3c v\u00e0 n\u01b0\u1edbc m\u1eaft.", "d": "C\u1ed7 xe \u0111\u01b0a \u0111\u00e1m.", "bookId": 1088344, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cHai v\u1ecb linh m\u1ee5c, ch\u00fa b\u00e9 h\u00e1t l\u1ec5 v\u00e0 ng\u01b0\u1eddi b\u00f5 \u0111i \u0111\u1ebfn, h\u1ecd ti\u1ebfn h\u00e0nh t\u1ea5t c\u1ea3 c\u00e1c nghi l\u1ec5 x\u1ee9ng \u0111\u00e1ng v\u1edbi gi\u00e1 ti\u1ec1n b\u1ea3y m\u01b0\u01a1i ph\u01a1-r\u0103ng trong m\u1ed9t th\u1eddi k\u00ec m\u00e0 t\u00f4n gi\u00e1o kh\u00f4ng l\u1ea5y g\u00ec l\u00e0m gi\u00e0u l\u1eafm \u0111\u1ec3 c\u1ea7u kinh l\u00e0m ph\u00fac. C\u00e1c v\u1ecb nh\u00e0 \u0111\u1ea1o h\u00e1t m\u1ed9t b\u00e0i th\u00e1nh thi, b\u00e0i kinh Li-be-ra , b\u00e0i kinh \u0110\u01a1 pr\u00f4-phun-\u0111i . Nghi l\u1ec5 c\u1eed h\u00e0nh m\u1ea5t hai m\u01b0\u01a1i ph\u00fat. Ch\u1ec9 c\u00f3 m\u1ed7i m\u1ed9t c\u1ed7 xe \u0111\u01b0a \u0111\u00e1m cho m\u1ed9t v\u1ecb linh m\u1ee5c v\u00e0 m\u1ed9t ch\u00fa b\u00e9 h\u00e1t l\u1ec5, h\u1ecd thu\u1eadn \u0111\u1ec3 \u01a0-gien v\u00e0 Cri-xt\u00f4-ph\u01a1 l\u00ean ng\u1ed3i c\u00f9ng.<br>- Kh\u00f4ng c\u00f3 ng\u01b0\u1eddi \u0111\u01b0a \u0111\u00e1m. - V\u1ecb linh m\u1ee5c n\u00f3i. - Ch\u00fang ta c\u00f3 th\u1ec3 \u0111i nhanh \u0111\u1ec3 kh\u1ecfi ch\u1eadm tr\u1ec5, \u0111\u00e3 n\u0103m gi\u1edd r\u01b0\u1ee1i.\u201d</i><br><div style=\"text-align: right;\">(Ban-d\u1eafc, <i>L\u00e3o G\u00f4-ri-\u00f4</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 12</i>, NXB \u0110\u1ea1i h\u1ecdc Hu\u1ebf, 2024)</div>\u0110i\u1ec1u g\u00ec sau \u0111\u00e2y v\u1eafng m\u1eb7t trong \u0111\u00e1m tang (l\u00e3o G\u00f4-ri-\u00f4)?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch m\u00f4 t\u1ea3 \u0111\u00e1m tang c\u1ee7a l\u00e3o G\u00f4-ri-\u00f4, \u0111\u00e1m tang di\u1ec5n ra kh\u00e1 nhanh ch\u00f3ng v\u00e0 \u0111\u01a1n gi\u1ea3n, v\u1edbi s\u1ef1 tham gia c\u1ee7a hai v\u1ecb linh m\u1ee5c, ch\u00fa b\u00e9 h\u00e1t l\u1ec5, \u01a0-gien v\u00e0 Cri-xt\u00f4-ph\u01a1 nh\u01b0ng tuy\u1ec7t nhi\u00ean kh\u00f4ng h\u1ec1 c\u00f3 ti\u1ebfng kh\u00f3c v\u00e0 n\u01b0\u1edbc m\u1eaft c\u1ee7a ng\u01b0\u1eddi th\u00e2n l\u00e3o hay m\u1ed9t ng\u01b0\u1eddi n\u00e0o kh\u00e1c. \n", "key": "C", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597745, "lessonId": 0, "a": "Am-m\u1ed1t Phi-\u00f4-r\u00f4-v\u00edch kh\u00f4ng chuy\u00ean ch\u00fa gi\u1ea3i quy\u1ebft c\u00e1c khi\u1ebfu n\u1ea1i c\u1ee7a d\u00e2n.", "b": "Am-m\u1ed1t Phi-\u00f4-r\u00f4-v\u00edch kh\u00f4ng m\u1eddi Th\u1ecb tr\u01b0\u1edfng \u0111\u1ebfn d\u00f9ng b\u1eefa chi\u1ec1u c\u00f3 th\u1ecbt ng\u1ed7ng.", "c": "Am-m\u1ed1t Phi-\u00f4-r\u00f4-v\u00edch quy\u1ebft \u0111\u1ecbnh l\u00e0m th\u1ecbt c\u1ea3 \u0111\u00e0n ng\u1ed7ng cho b\u1eefa chi\u1ec1u nay.", "d": "Am-m\u1ed1t Phi-\u00f4-r\u00f4-v\u00edch kh\u00f4ng ch\u00fa \u00fd coi s\u00f3c, qu\u1ea3n l\u00ed nhi\u1ec7m s\u1edf trang nghi\u00eam.", "bookId": 1088345, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTH\u1eca TR\u01af\u1edeNG: C\u00f2n \u00f4ng n\u1eefa, \u00f4ng Am-m\u1ed1t Phi-\u00f4-r\u00f4-v\u00edch, t\u00f4i mu\u1ed1n khuy\u00ean \u00f4ng n\u00ean ch\u00fa \u00fd tr\u00f4ng nom t\u00f2a \u00e1n qu\u1eadn. Tr\u01b0\u1edbc to\u00e0 \u00e1n, ch\u1ed7 nh\u1eefng ng\u01b0\u1eddi \u0111\u1ebfn khi\u1ebfu n\u1ea1i th\u01b0\u1eddng \u0111\u1ee3i \u0111\u1ec3 ra to\u00e0, b\u1ecdn g\u00e1c tr\u1ee5 s\u1edf l\u1ea1i nu\u00f4i c\u1ea3 m\u1ed9t \u0111\u00e0n ng\u1ed7ng \u0111\u1ec3 cho ng\u1ed7ng l\u1edbn ng\u1ed7ng con ch\u1ea1y l\u0103ng qu\u0103ng lu\u1ed3n c\u1ea3 v\u00e0o ch\u00e2n, v\u00e0o c\u1eb3ng ng\u01b0\u1eddi ta. Vi\u1ec7c ch\u00fa \u00fd \u0111\u1ebfn sinh ho\u1ea1t c\u1ee7a gia \u0111\u00ecnh c\u1ed1 nhi\u00ean l\u00e0 h\u1ebft s\u1ee9c \u0111\u00e1ng khen, v\u00e0 ai c\u1ea5m b\u1ecdn g\u00e1c kh\u00f4ng \u0111\u01b0\u1ee3c nu\u00f4i ng\u1ed7ng kia ch\u1ee9? Nh\u01b0ng, \u00f4ng th\u1ea5y \u0111\u1ea5y, nu\u00f4i ng\u1ed7ng \u1edf m\u1ed9t ch\u1ed7 nh\u01b0 th\u1ebf th\u1ef1c ch\u1eb3ng c\u00f2n ra th\u1ec3 th\u1ed1ng g\u00ec... Tr\u01b0\u1edbc \u0111\u00e2y, t\u00f4i \u0111\u1ecbnh n\u00f3i cho \u00f4ng bi\u1ebft, nh\u01b0ng kh\u00f4ng hi\u1ec1u sao, t\u00f4i qu\u00ean khu\u1ea5y \u0111i m\u1ea5t.<br>AM-M\u1ed0T PHI-\u00d4-\u0110\u00d4-R\u00d4-V\u00cdCH: \u1ea4y, ch\u00ednh ng\u00e0y h\u00f4m nay, t\u00f4i s\u1ebd ra l\u1ec7nh cho v\u00e0o b\u1ebfp t\u1ea5t c\u1ea3 \u0111\u00e0n ng\u1ed7ng. N\u1ebfu \u00f4ng vui l\u00f2ng, xin m\u1eddi \u00f4ng \u0111\u1ebfn d\u00f9ng t\u1ea1m b\u1eefa chi\u1ec1u.\u201d</i><br><div style=\"text-align: right;\">(N. G\u00f4-g\u00f4n, <i>Quan thanh tra</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 12</i>, NXB \u0110\u1ea1i h\u1ecdc Hu\u1ebf, 2024)</div>Th\u1ecb tr\u01b0\u1edfng nh\u1eafc nh\u1edf Am-m\u1ed1t Phi-\u00f4-r\u00f4-v\u00edch v\u1ec1 \u0111i\u1ec1u g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nTh\u1ecb tr\u01b0\u1edfng nh\u1eafc nh\u1edf Am-m\u1ed1t Phi-\u00f4-r\u00f4-v\u00edch v\u1ec1 vi\u1ec7c \u00f4ng n\u00e0y nu\u00f4i ng\u1ed7ng ngay t\u1ea1i t\u00f2a \u00e1n, n\u01a1i l\u00e0m vi\u1ec7c c\u1ee7a \u00f4ng. Vi\u1ec7c nu\u00f4i ng\u1ed7ng \u1edf m\u1ed9t n\u01a1i c\u00f4ng c\u1ed9ng nh\u01b0 v\u1eady g\u00e2y m\u1ea5t tr\u1eadt t\u1ef1 v\u00e0 kh\u00f4ng ph\u00f9 h\u1ee3p v\u1edbi m\u1ed9t n\u01a1i l\u00e0m vi\u1ec7c h\u00e0nh ch\u00ednh. \u0110i\u1ec1u n\u00e0y cho th\u1ea5y Am-m\u1ed1t Phi-\u00f4-r\u00f4-v\u00edch l\u01a1 l\u00e0, kh\u00f4ng qu\u1ea3n l\u00ed t\u1ed1t nhi\u1ec7m s\u1edf c\u1ee7a m\u00ecnh.\n", "key": "D", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597755, "lessonId": 0, "a": "\u1ee6ng h\u1ed9, t\u00e1n th\u01b0\u1edfng.", "b": "C\u1ea3m k\u00edch, tr\u00e2n tr\u1ecdng.", "c": "Ho\u00e0i nghi, \u0111\u1ec1 ph\u00f2ng.", "d": "Ch\u00e2m bi\u1ebfm, tr\u00e0o ph\u00fang.", "bookId": 1088346, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cKh\u1ea3ng kh\u00e1i T\u00e2n D\u01b0\u01a1ng M\u1ea1c ban tr\u01b0\u1edfng,<br>Gi\u1ea3i nang m\u00e3i ph\u1ea1n c\u1ea5p t\u00f9 nh\u00e2n.<br>V\u0103n gian gi\u1ea3i ph\u01b0\u1ee3c c\u1ea5p tha th\u1ee5y,<br>B\u1ea5t d\u1ee5ng uy quy\u1ec1n, ch\u1ec9 d\u1ee5ng \u00e2n.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>T\u00e2n D\u01b0\u01a1ng ng\u1ee5c trung h\u00e0i</i>)</div>D\u1ecbch ngh\u0129a:<br><i>\u201cBan tr\u01b0\u1edfng h\u1ecd M\u1ea1c \u1edf T\u00e2n D\u01b0\u01a1ng l\u00e0 ng\u01b0\u1eddi h\u00e0o hi\u1ec7p.<br>T\u1ef1 xu\u1ea5t ti\u1ec1n t\u00fai mua c\u01a1m cho t\u00f9 nh\u00e2n.<br>\u0110\u00eam \u0111\u1ebfn, c\u1edfi tr\u00f3i cho h\u1ecd ng\u1ee7,<br>Kh\u00f4ng d\u00f9ng uy quy\u1ec1n, ch\u1ec9 d\u00f9ng \u00e2n t\u00ecnh.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>Ch\u00e1u b\u00e9 trong ng\u1ee5c T\u00e2n D\u01b0\u01a1ng</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Gi\u1ecdng \u0111i\u1ec7u ch\u1ee7 \u0111\u1ea1o c\u1ee7a b\u00e0i th\u01a1 tr\u00ean l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nB\u00e0i th\u01a1 th\u1ec3 hi\u1ec7n s\u1ef1 tr\u00e2n tr\u1ecdng \u0111\u1ed1i v\u1edbi t\u1ea5m l\u00f2ng nh\u00e2n h\u1eadu c\u1ee7a vi\u00ean ban tr\u01b0\u1edfng h\u1ecd M\u1ea1c \u1edf nh\u00e0 t\u00f9 T\u00e2n D\u01b0\u01a1ng. Ng\u01b0\u1eddi ban tr\u01b0\u1edfng \u0111\u00e3 \u0111\u1ed1i x\u1eed t\u1eed t\u1ebf v\u1edbi t\u00f9 nh\u00e2n, mua c\u01a1m cho h\u1ecd \u0103n v\u00e0 c\u1edfi tr\u00f3i v\u00e0o ban \u0111\u00eam \u0111\u1ec3 h\u1ecd ng\u1ee7 tho\u1ea3i m\u00e1i.<br>\n\u2192 Gi\u1ecdng \u0111i\u1ec7u ch\u1ee7 \u0111\u1ea1o c\u1ee7a b\u00e0i th\u01a1 l\u00e0 c\u1ea3m k\u00edch, tr\u00e2n tr\u1ecdng.\n", "key": "B", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597769, "lessonId": 0, "a": "L\u00e3ng m\u1ea1n, tr\u00ed t\u01b0\u1edfng t\u01b0\u1ee3ng phong ph\u00fa.", "b": "H\u1ed3n nhi\u00ean, trong tr\u1ebbo.", "c": "Can tr\u01b0\u1eddng, d\u0169ng c\u1ea3m.", "d": "Tr\u1ebb trung, tinh ngh\u1ecbch.", "bookId": 1088347, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cH\u00e0nh qu\u00e2n ban \u0111\u00eam gi\u1eefa c\u00e1nh \u0111\u1ed3ng t\u1ed1i \u0111en nh\u01b0 m\u1ef1c, \u0111eo n\u1eb7ng, m\u1ec7t, nh\u01b0ng khoan kho\u00e1i bi\u1ebft ch\u1eebng n\u00e0o. Th\u00e1ng 4, \u0111om \u0111\u00f3m bay ra s\u00e1ng lung linh trong c\u1ecf, tr\u00ean nh\u1eefng b\u1ee5i c\u00e2y \u01b0\u1edbt h\u01a1i s\u01b0\u01a1ng. B\u1ed7ng ngh\u0129, \u0111om \u0111\u00f3m c\u00f3 t\u00ean ri\u00eang kh\u00f4ng nh\u1ec9, con \u0111ang l\u01b0\u1ee3n d\u01b0\u1edbi d\u00f2ng su\u1ed1i c\u1ea1n h\u1eb3n t\u00ean l\u00e0 Ki\u1ec1u Di\u1ec5m v\u00ec n\u00f3 trong s\u00e1ng v\u00e0 hi\u1ec1n d\u1ecbu l\u1ea1 l\u00f9ng, v\u00ec n\u00f3 l\u1ea5p l\u00e1nh, l\u1ea5p l\u00e1nh \u0111\u1ebfn kinh ng\u1ea1c \u0111\u1ea5y b\u1ea1n \u01a1i.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n V\u0103n Th\u1ea1c, <i>M\u00e3i m\u00e3i tu\u1ed5i hai m\u01b0\u01a1i</i>, NXB Thanh ni\u00ean, 2005)</div>\u0110o\u1ea1n v\u0103n th\u1ec3 hi\u1ec7n v\u1ebb \u0111\u1eb9p n\u00e0o trong t\u00e2m h\u1ed3n nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n v\u0103n tr\u00ean th\u1ec3 hi\u1ec7n t\u00e2m h\u1ed3n l\u00e3ng m\u1ea1n v\u00e0 tr\u00ed t\u01b0\u1edfng t\u01b0\u1ee3ng phong ph\u00fa c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh. D\u00f9 \u0111ang h\u00e0nh qu\u00e2n v\u1ea5t v\u1ea3 trong \u0111\u00eam t\u1ed1i, nh\u00e2n v\u1eadt v\u1eabn c\u1ea3m nh\u1eadn \u0111\u01b0\u1ee3c v\u1ebb \u0111\u1eb9p lung linh c\u1ee7a thi\u00ean nhi\u00ean, th\u1eadm ch\u00ed c\u00f2n t\u01b0\u1edfng t\u01b0\u1ee3ng v\u1ec1 c\u00e1i t\u00ean \u201cKi\u1ec1u Di\u1ec5m\u201d cho con \u0111om \u0111\u00f3m.\n", "key": "A", "isVideo": true, "score": 0, "order": 11, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597774, "lessonId": 0, "a": "\u201cTr\u01b0\u1edfng gi\u1ea3 h\u1ecdc l\u00e0m sang\u201d (M\u00f4-li-e), \u201cT\u00f4i v\u00e0 ch\u00fang ta\u201d (L\u01b0u Quang V\u0169), \u201cCon nai \u0111en\u201d (Nguy\u1ec5n \u0110\u00ecnh Thi).", "b": "\u201cR\u00f4-m\u00ea-\u00f4 v\u00e0 Giu-li-\u00e9t\u201d (S\u1ebfch-xpia), \u201cB\u1ec7nh s\u0129\u201d (L\u01b0u Quang V\u0169), \u201cL\u00e3o h\u00e0 ti\u1ec7n\u201d (M\u00f4-li-e).", "c": "\u201cH\u0103m-l\u00e9t\u201d (S\u1ebfch-xpia), \u201cV\u0169 Nh\u01b0 T\u00f4\u201d (Nguy\u1ec5n Huy T\u01b0\u1edfng), \u201cC\u00e1i b\u00f3ng tr\u00ean t\u01b0\u1eddng\u201d (Nguy\u1ec5n \u0110\u00ecnh Thi).", "d": "\u201cQuan thanh tra\u201d (G\u00f4-g\u00f4n), \u201cH\u1ed3n Tr\u01b0\u01a1ng Ba, da h\u00e0ng th\u1ecbt\u201d (L\u01b0u Quang V\u0169), \u201cL\u01a1 X\u00edt\u201d (Co\u00f3c-n\u00e2y).", "bookId": 1088348, "comments": 0, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "D\u00f2ng n\u00e0o sau \u0111\u00e2y n\u00eau t\u00ean nh\u1eefng t\u00e1c ph\u1ea9m c\u00f9ng l\u00e0 bi k\u1ecbch?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u201cH\u0103m-l\u00e9t\u201d (S\u1ebfch-xpia), \u201cV\u0169 Nh\u01b0 T\u00f4\u201d (Nguy\u1ec5n Huy T\u01b0\u1edfng), \u201cC\u00e1i b\u00f3ng tr\u00ean t\u01b0\u1eddng\u201d (Nguy\u1ec5n \u0110\u00ecnh Thi) l\u00e0 ba t\u00e1c ph\u1ea9m c\u00f9ng thu\u1ed9c ki\u1ec3u lo\u1ea1i bi k\u1ecbch.\n", "key": "C", "isVideo": true, "score": 0, "order": 12, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597776, "lessonId": 0, "a": "B\u00e1t \u0111\u1ee7a, \u0111\u00e8n \u0111i\u1ec7n, rau c\u1ecf.", "b": "Son ph\u1ea5n, gi\u01b0\u1eddng chi\u1ebfu, tr\u0103n m\u00e0n.", "c": "Tranh \u1ea3nh, s\u00e1ch v\u1ee1, qu\u1ea7n \u00e1o.", "d": "Xoong n\u1ed3i, ch\u1ea3o ch\u1edbp, c\u1ed1c ch\u00e9n.", "bookId": 1088349, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "D\u00f2ng n\u00e0o d\u01b0\u1edbi \u0111\u00e2y c\u00f3 c\u00e1c t\u1eeb vi\u1ebft \u0111\u00fang ch\u00ednh t\u1ea3?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- D\u00f2ng c\u00f3 c\u00e1c t\u1eeb vi\u1ebft \u0111\u00fang ch\u00ednh t\u1ea3 l\u00e0: Xoong n\u1ed3i, ch\u1ea3o ch\u1edbp, c\u1ed1c ch\u00e9n.<br>\n- Nh\u1eefng t\u1eeb sai ch\u00ednh t\u1ea3: b\u00e1t \u0111\u1ee7a, tr\u0103n m\u00e0n, s\u00e1ch v\u1ee1.<br>\n- S\u1eeda l\u1ea1i: b\u00e1t \u0111\u0169a, ch\u0103n m\u00e0n, s\u00e1ch v\u1edf.\n", "key": "D", "isVideo": true, "score": 0, "order": 13, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597779, "lessonId": 0, "a": "C\u00e2u chuy\u1ec7n t\u1ebfu t\u00e1o xua tan \u0111i \u00edt nhi\u1ec1u c\u00e1i kh\u00f4ng kh\u00ed u \u00e1m trong c\u0103n nh\u00e0 nh\u1ecf.", "b": "Ch\u1ecb b\u00e1n v\u00e9 s\u1ed1 l\u01b0\u1ee3n l\u1edd quanh qu\u00e1n nh\u1eadu, hi v\u1ecdng b\u00e1n th\u00eam \u0111\u01b0\u1ee3c ch\u00fat n\u1eefa.", "c": "Nh\u1eefng c\u00e1nh hoa b\u1eaft \u0111\u1ea7u dun d\u1ea9y trong s\u01b0\u01a1ng l\u1ea1nh.", "d": "Ng\u01b0\u1eddi m\u1eb9 tr\u1ebb y\u00ean l\u1eb7ng ng\u1ed3i \u0111\u00f3 h\u1ed3i l\u00e2u, ng\u1eafm gi\u1ea5c ng\u1ee7 c\u1ee7a con.", "bookId": 1088350, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "C\u00e2u n\u00e0o d\u01b0\u1edbi \u0111\u00e2y ch\u1ee9a t\u1eeb vi\u1ebft sai ch\u00ednh t\u1ea3?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>- C\u00e2u  \u201cNh\u1eefng c\u00e1nh hoa b\u1eaft \u0111\u1ea7u dun d\u1ea9y trong s\u01b0\u01a1ng l\u1ea1nh.\u201d ch\u1ee9a t\u1eeb \u201cdun d\u1ea9y\u201d sai ch\u00ednh t\u1ea3.<br>- S\u1eeda l\u1ea1i: Nh\u1eefng c\u00e1nh hoa b\u1eaft \u0111\u1ea7u <b>run r\u1ea9y</b> trong s\u01b0\u01a1ng l\u1ea1nh.", "key": "C", "isVideo": true, "score": 0, "order": 14, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597782, "lessonId": 0, "a": "\u0111o\u00e0nh \u0111o\u1ea1ch.", "b": "Chi\u1ec1u mu\u1ed9n.", "c": "gi\u1ecf c\u00e1.", "d": "th\u1eb1ng b\u00e9.", "bookId": 1088351, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<u>Chi\u1ec1u mu\u1ed9n</u>, <u>th\u1eb1ng b\u00e9</u> mang v\u1ec1 m\u1ed9t <u>gi\u1ecf c\u00e1</u> c\u00f2n gi\u00e3y <u>\u0111o\u00e0nh \u0111o\u1ea1ch</u>.<br>T\u1eeb n\u00e0o b\u1ecb d\u00f9ng sai trong c\u00e2u tr\u00ean?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>- T\u1eeb \u201c\u0111o\u00e0nh \u0111o\u1ea1ch\u201d sai ch\u00ednh t\u1ea3.<br>- S\u1eeda l\u1ea1i: Chi\u1ec1u mu\u1ed9n, th\u1eb1ng b\u00e9 mang v\u1ec1 m\u1ed9t gi\u1ecf c\u00e1 c\u00f2n gi\u00e3y <b>\u0111\u00e0nh \u0111\u1ea1ch</b>.", "key": "A", "isVideo": true, "score": 0, "order": 15, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597784, "lessonId": 0, "a": "Sai v\u1ec1 d\u00f9ng t\u1eeb.", "b": "Sai ng\u1eef ph\u00e1p.", "c": "Sai quy chi\u1ebfu.", "d": "Sai logic.", "bookId": 1088352, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Vi\u00ean c\u1ea3nh s\u00e1t b\u1eaft ng\u01b0\u1eddi g\u00e2y tai n\u1ea1n giao th\u00f4ng r\u1ed3i b\u1ecf ch\u1ea1y. <br>X\u00e1c \u0111\u1ecbnh l\u1ed7i sai trong c\u00e2u tr\u00ean.", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- C\u00e2u sai quy chi\u1ebfu, khi\u1ebfn c\u00e2u hi\u1ec3u theo hai ngh\u0129a:<br>\n+ Vi\u00ean c\u1ea3nh s\u00e1t b\u1ecf ch\u1ea1y.<br>\n+ Ng\u01b0\u1eddi g\u00e2y tai n\u1ea1n giao th\u00f4ng b\u1ecf ch\u1ea1y.<br>\n- S\u1eeda l\u1ea1i: Ng\u01b0\u1eddi g\u00e2y tai n\u1ea1n giao th\u00f4ng r\u1ed3i b\u1ecf ch\u1ea1y \u0111\u00e3 b\u1ecb vi\u00ean c\u1ea3nh s\u00e1t b\u1eaft gi\u1eef.\n", "key": "C", "isVideo": true, "score": 0, "order": 16, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597786, "lessonId": 0, "a": "\u0110o\u00e0n c\u00f4ng t\u00e1c \u0111\u00e3 xu\u1ed1ng c\u01a1 s\u1edf l\u00e0m vi\u1ec7c v\u1edbi c\u00e1n b\u1ed9 x\u00e3!", "b": "H\u00e0ng lo\u1ea1t c\u00f4ng nh\u00e2n xin ngh\u1ec9 vi\u1ec7c do l\u01b0\u01a1ng th\u1ea5p khi\u1ebfn \u0111\u1eddi s\u1ed1ng gia \u0111\u00ecnh kh\u00f3 kh\u0103n.", "c": "C\u0169ng nh\u01b0 bao ng\u01b0\u1eddi ph\u1ee5 n\u1eef kh\u00e1c, d\u00ec c\u0169ng m\u01a1 m\u1ed9ng c\u00f3 m\u1ed9t m\u00e1i \u1ea5m gia \u0111\u00ecnh, c\u00f3 m\u1ed9t b\u1edd vai \u0111\u00e0n \u00f4ng \u0111\u1ec3 n\u01b0\u01a1ng t\u1ef1a, c\u00f3 nh\u1eefng \u0111\u1ee9a con th\u01a1 b\u00e9.", "d": "T\u00f4i c\u00f3 hai ng\u01b0\u1eddi anh trai v\u00e0 hai c\u00f4 em g\u00e1i, t\u1ea5t c\u1ea3 \u0111\u1ec1u h\u1ecdc tr\u01b0\u1eddng l\u00e0ng.", "bookId": 1088353, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "C\u00e2u n\u00e0o d\u01b0\u1edbi \u0111\u00e2y l\u00e0 c\u00e2u \u0111\u00fang?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:<br></b>\n- Lo\u1ea1i A v\u00ec m\u1eafc l\u1ed7i sai d\u1ea5u c\u00e2u. \u0110\u00e2y l\u00e0 c\u00e2u tr\u1ea7n thu\u1eadt v\u00ec th\u1ebf d\u00f9ng d\u1ea5u ch\u1ea5m than l\u00e0 kh\u00f4ng ch\u00ednh x\u00e1c.<br>\n- Lo\u1ea1i B v\u00ec c\u00e2u m\u1eafc l\u1ed7i m\u01a  logic ng\u1eef ngh\u0129a.", "b": "C\u00e2u m\u1eafc l\u1ed7i d\u00f9ng t\u1eeb.", "c": "C\u00e2u sai c\u1ea5u t\u1ea1o ng\u1eef ph\u00e1p.", "d": "C\u00e2u m\u1eafc l\u1ed7i d\u1ea5u c\u00e2u.", "bookId": 1088355, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cT\u00f4i tin v\u00e0o th\u00e0nh c\u00f4ng c\u1ee7a ch\u00ednh m\u00ecnh, c\u0169ng nh\u01b0 t\u00f4i tin v\u00e0o s\u1ef1 \u1ee7ng h\u1ed9, c\u1ee7a m\u1ecdi ng\u01b0\u1eddi.\u201d<br>Nh\u1eadn \u0111\u1ecbnh n\u00e0o v\u1ec1 c\u00e2u tr\u00ean l\u00e0 \u0111\u00fang?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- C\u00e2u m\u1eafc l\u1ed7i d\u1ea5u c\u00e2u, d\u00f9ng th\u1eeba d\u1ea5u ph\u1ea9y \u1edf c\u1ee5m \u201cs\u1ef1 \u1ee7ng h\u1ed9, c\u1ee7a m\u1ecdi ng\u01b0\u1eddi\u201d.<br>\n- S\u1eeda l\u1ea1i: T\u00f4i tin v\u00e0o th\u00e0nh c\u00f4ng c\u1ee7a ch\u00ednh m\u00ecnh, c\u0169ng nh\u01b0 t\u00f4i tin v\u00e0o s\u1ef1 \u1ee7ng h\u1ed9 c\u1ee7a m\u1ecdi ng\u01b0\u1eddi.\n", "key": "D", "isVideo": true, "score": 0, "order": 19, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597790, "lessonId": 0, "a": "Gi\u00f3 v\u1eabn th\u1ed5i ngo\u00e0i hi\u00ean, n\u1eafng v\u1eabn hanh hao ngo\u00e0i \u00f4 c\u1eeda nh\u1ecf.", "b": "T\u00f4i ng\u1ee7 thi\u1ebfp \u0111i, l\u00fac ch\u1ee3t t\u1ec9nh xem \u0111\u1ed3ng h\u1ed3 m\u1edbi h\u01a1n m\u01b0\u1eddi gi\u1edd.", "c": "Kh\u00f3m h\u1ed3ng nhung \u0111ang khoe s\u1eafc v\u00e0ng \u0111\u1eb9p m\u00ea h\u1ed3n.", "d": "Tr\u0103ng R\u1eb1m th\u00e1ng B\u1ea3y m\u00e0 nh\u01b0 l\u00e0 \u0111\u00e3 Trung Thu, trong veo v\u00e0 lung linh s\u00e1ng.", "bookId": 1088356, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Ch\u1ec9 ra c\u00e2u sai trong c\u00e1c c\u00e2u sau:", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- C\u00e2u \u201cKh\u00f3m h\u1ed3ng nhung \u0111ang khoe s\u1eafc v\u00e0ng \u0111\u1eb9p m\u00ea h\u1ed3n.\u201d sai logic. Hoa h\u1ed3ng nhung c\u00f3 m\u00e0u \u0111\u1ecf nh\u01b0ng c\u00e2u l\u1ea1i n\u00f3i \u201ckhoe s\u1eafc v\u00e0ng\u201d khi\u1ebfn c\u00e2u phi logic.<br>\n- S\u1eeda l\u1ea1i: Kh\u00f3m h\u1ed3ng nhung \u0111ang khoe s\u1eafc <b>\u0111\u1ecf</b> \u0111\u1eb9p m\u00ea h\u1ed3n\n", "key": "C", "isVideo": true, "score": 0, "order": 20, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 21 \u0111\u1ebfn 25", "content": "\u201cM\u1ed9t nghi\u00ean c\u1ee9u m\u1edbi tr\u00ean t\u1ea1p ch\u00ed <i>Science </i>t\u1eeb c\u00e1c nh\u00e0 khoa h\u1ecdc \u0110\u1ea1i h\u1ecdc Massachusetts Amherst v\u00e0 \u0110\u1ea1i h\u1ecdc Cincinnati \u0111\u00e3 l\u1eadp b\u1ea3n \u0111\u1ed3 s\u1ef1 thay \u0111\u1ed5i c\u1ee7a s\u00f4ng tr\u00ean to\u00e0n c\u1ea7u trong 35 n\u0103m qua. K\u1ebft qu\u1ea3 cho th\u1ea5y, 44% c\u00e1c con s\u00f4ng l\u1edbn nh\u1ea5t \u1edf h\u1ea1 l\u01b0u ch\u1ee9ng ki\u1ebfn s\u1ef1 gi\u1ea3m l\u01b0u l\u01b0\u1ee3ng n\u01b0\u1edbc, trong khi 17% c\u00e1c con s\u00f4ng nh\u1ecf \u1edf th\u01b0\u1ee3ng ngu\u1ed3n l\u1ea1i t\u0103ng. C\u00e1c thay \u0111\u1ed5i n\u00e0y \u1ea3nh h\u01b0\u1edfng l\u1edbn \u0111\u1ebfn l\u0169 l\u1ee5t, h\u1ec7 sinh th\u00e1i, th\u1ee7y \u0111i\u1ec7n v\u00e0 ngu\u1ed3n cung n\u01b0\u1edbc ng\u1ecdt.<br>Dongmei Feng - t\u00e1c gi\u1ea3 ch\u00ednh c\u1ee7a nghi\u00ean c\u1ee9u, ph\u00f3 gi\u00e1o s\u01b0 t\u1ea1i \u0110\u1ea1i h\u1ecdc Cincinnati v\u00e0 c\u1ef1u tr\u1ee3 l\u00ed gi\u00e1o s\u01b0 nghi\u00ean c\u1ee9u t\u1ea1i ph\u00f2ng th\u00ed nghi\u1ec7m Fluvial@UMass do \u0111\u1ed3ng t\u00e1c gi\u1ea3 Colin Gleason - Gi\u00e1o s\u01b0 Ph\u00e1t tri\u1ec3n Chuy\u00ean m\u00f4n ng\u00e0nh k\u0129 thu\u1eadt d\u00e2n d\u1ee5ng v\u00e0 m\u00f4i tr\u01b0\u1eddng t\u1ea1i \u0110\u1ea1i h\u1ecdc Massachusetts Amherst \u0111i\u1ec1u h\u00e0nh, gi\u1ea3i th\u00edch r\u1eb1ng c\u00e1c n\u1ed7 l\u1ef1c tr\u01b0\u1edbc \u0111\u00e2y nh\u1eb1m \u0111\u1ecbnh l\u01b0\u1ee3ng s\u1ef1 thay \u0111\u1ed5i c\u1ee7a c\u00e1c con s\u00f4ng theo th\u1eddi gian ch\u1ec9 t\u1eadp trung v\u00e0o c\u00e1c \u0111o\u1ea1n s\u00f4ng c\u1ee5 th\u1ec3 ho\u1eb7c m\u1ed9t ph\u1ea7n l\u01b0u v\u1ef1c ph\u00eda sau c\u1ee7a m\u1ed9t con s\u00f4ng.<br>\u201cNh\u01b0ng nh\u01b0 ch\u00fang ta \u0111\u00e3 bi\u1ebft, c\u00e1c con s\u00f4ng kh\u00f4ng t\u1ed3n t\u1ea1i m\u1ed9t c\u00e1ch c\u00f4 l\u1eadp,\u201d b\u00e0 n\u00f3i. \u201cV\u00ec v\u1eady, ngay c\u1ea3 khi ch\u00fang ta quan t\u00e2m \u0111\u1ebfn m\u1ed9t \u0111\u1ecba \u0111i\u1ec3m c\u1ee5 th\u1ec3, ch\u00fang ta c\u0169ng ph\u1ea3i xem x\u00e9t c\u00e1ch n\u00f3 b\u1ecb \u1ea3nh h\u01b0\u1edfng b\u1edfi c\u1ea3 th\u01b0\u1ee3ng ngu\u1ed3n l\u1eabn h\u1ea1 ngu\u1ed3n. Ch\u00fang t\u00f4i nh\u00ecn nh\u1eadn h\u1ec7 th\u1ed1ng s\u00f4ng nh\u01b0 m\u1ed9t t\u1ed5ng th\u1ec3, m\u1ed9t h\u1ec7 th\u1ed1ng k\u1ebft n\u1ed1i m\u1ed9t c\u00e1ch h\u1eefu c\u01a1\u201d.<br>Colin Gleason, \u0111\u1ed3ng t\u00e1c gi\u1ea3, gi\u1ea3i th\u00edch r\u1eb1ng ph\u01b0\u01a1ng ph\u00e1p truy\u1ec1n th\u1ed1ng \u0111o l\u01b0u l\u01b0\u1ee3ng s\u00f4ng b\u1eb1ng c\u00e1ch k\u00e9o d\u1ee5ng c\u1ee5 \u0111o tr\u00ean m\u1eb7t n\u01b0\u1edbc ch\u1ec9 cung c\u1ea5p d\u1eef li\u1ec7u h\u1ea1n ch\u1ebf t\u1ea1i m\u1ed9t \u0111i\u1ec3m c\u1ee5 th\u1ec3. \u00d4ng \u01b0\u1edbc t\u00ednh, hi\u1ec7n nay ch\u1ec9 c\u00f3 d\u1eef li\u1ec7u l\u01b0u l\u01b0\u1ee3ng c\u1ee7a kho\u1ea3ng 10-15.000 \u0111o\u1ea1n s\u00f4ng tr\u00ean to\u00e0n th\u1ebf gi\u1edbi.<br>\u0110\u1ec3 gi\u1ea3i quy\u1ebft h\u1ea1n ch\u1ebf n\u00e0y, Feng v\u00e0 Gleason s\u1eed d\u1ee5ng d\u1eef li\u1ec7u v\u1ec7 tinh v\u00e0 m\u00f4 h\u00ecnh m\u00e1y t\u00ednh \u0111\u1ec3 \u0111o l\u01b0u l\u01b0\u1ee3ng c\u1ee7a 3 tri\u1ec7u \u0111o\u1ea1n s\u00f4ng tr\u00ean to\u00e0n c\u1ea7u, li\u00ean t\u1ee5c trong 35 n\u0103m. Gleason nh\u1eadn \u0111\u1ecbnh: \u201cM\u1ed9t s\u1ed1 s\u00f4ng thay \u0111\u1ed5i t\u1edbi 5-10% m\u1ed7i n\u0103m, m\u1ed9t t\u1ed1c \u0111\u1ed9 r\u1ea5t nhanh. Gi\u1edd \u0111\u00e2y, ch\u00fang ta c\u00f3 th\u1ec3 bi\u1ebft r\u00f5 nh\u1eefng con s\u00f4ng n\u00e0o kh\u00f4ng c\u00f2n nh\u01b0 tr\u01b0\u1edbc.\u201d<br>Nhi\u1ec1u s\u00f4ng l\u1edbn \u1edf h\u1ea1 l\u01b0u ch\u1ee9ng ki\u1ebfn s\u1ef1 gi\u1ea3m l\u01b0u l\u01b0\u1ee3ng n\u01b0\u1edbc, g\u00e2y thi\u1ebfu h\u1ee5t n\u01b0\u1edbc u\u1ed1ng v\u00e0 t\u01b0\u1edbi ti\u00eau. Gleason \u0111\u1eb7t c\u00e2u h\u1ecfi: \u201cC\u00e1c c\u1ed9ng \u0111\u1ed3ng d\u1ef1a v\u00e0o s\u00f4ng \u0111\u1ec3 l\u1ea5y n\u01b0\u1edbc c\u00f3 th\u1ec3 duy tr\u00ec b\u1ec1n v\u1eefng kh\u00f4ng? S\u00f4ng c\u00f3 th\u1ec3 h\u1ed7 tr\u1ee3 m\u1edf r\u1ed9ng \u0111\u00f4 th\u1ecb v\u00e0 s\u1ea3n xu\u1ea5t n\u00f4ng nghi\u1ec7p kh\u00f4ng?\u201d<br>L\u01b0u l\u01b0\u1ee3ng gi\u1ea3m c\u00f2n l\u00e0m gi\u1ea3m kh\u1ea3 n\u0103ng v\u1eadn chuy\u1ec3n tr\u1ea7m t\u00edch \u1edf l\u00f2ng s\u00f4ng, \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn vi\u1ec7c h\u00ecnh th\u00e0nh \u0111\u1ed3ng b\u1eb1ng ch\u00e2u th\u1ed5. \u0110i\u1ec1u n\u00e0y \u0111\u1eb7c bi\u1ec7t nghi\u00eam tr\u1ecdng khi c\u00e1c \u0111\u1eadp th\u1ee7y \u0111i\u1ec7n hi\u1ec7n \u0111\u1ea1i \u0111\u00e3 h\u1ea1n ch\u1ebf tr\u1ea7m t\u00edch di chuy\u1ec3n, l\u00e0m suy y\u1ebfu vai tr\u00f2 ch\u1ed1ng l\u1ea1i n\u01b0\u1edbc bi\u1ec3n d\u00e2ng c\u1ee7a c\u00e1c \u0111\u1ed3ng b\u1eb1ng n\u00e0y.<br>Ng\u01b0\u1ee3c l\u1ea1i, 17% s\u00f4ng th\u01b0\u1ee3ng ngu\u1ed3n, th\u01b0\u1eddng g\u1ea7n n\u00fai, l\u1ea1i ch\u1ee9ng ki\u1ebfn s\u1ef1 gia t\u0103ng l\u01b0u l\u01b0\u1ee3ng. Tuy nhi\u00ean, \u0111i\u1ec1u n\u00e0y kh\u00f4ng \u0111\u1ed3ng \u0111\u1ec1u v\u00ec 10% s\u00f4ng nh\u1ecf \u0111ang gi\u1ea3m. L\u01b0u l\u01b0\u1ee3ng t\u0103ng d\u1eabn \u0111\u1ebfn l\u0169 l\u1ee5t l\u1edbn h\u01a1n, v\u1edbi s\u1ed1 l\u01b0\u1ee3ng tr\u1eadn l\u0169 l\u1edbn t\u0103ng 42%. Gleason nh\u1ea5n m\u1ea1nh, nh\u1eefng l\u0169 l\u1ee5t n\u00e0y, nh\u01b0 \u0111\u00e3 x\u1ea3y ra \u1edf Vermont, M\u1ef9 g\u00e2y thi\u1ec7t h\u1ea1i nghi\u00eam tr\u1ecdng cho con ng\u01b0\u1eddi nh\u01b0ng l\u1ea1i mang l\u1ea1i l\u1ee3i \u00edch cho h\u1ec7 sinh th\u00e1i nh\u01b0 b\u1ed5 sung ch\u1ea5t dinh d\u01b0\u1ee1ng v\u00e0 h\u1ed7 tr\u1ee3 c\u00e1 di c\u01b0.<br>S\u1ef1 gia t\u0103ng l\u01b0u l\u01b0\u1ee3ng \u1edf th\u01b0\u1ee3ng ngu\u1ed3n c\u0169ng \u0111\u1eb7t ra th\u00e1ch th\u1ee9c cho th\u1ee7y \u0111i\u1ec7n, \u0111\u1eb7c bi\u1ec7t \u1edf c\u00e1c n\u01b0\u1edbc nh\u01b0 Nepal hay Bhutan. Feng ch\u1ec9 ra, \u201cL\u01b0u l\u01b0\u1ee3ng t\u0103ng m\u1ea1nh g\u00e2y x\u00f3i m\u00f2n v\u00e0 v\u1eadn chuy\u1ec3n tr\u1ea7m t\u00edch nhi\u1ec1u h\u01a1n, d\u1ec5 l\u00e0m t\u1eafc ngh\u1ebdn c\u00e1c nh\u00e0 m\u00e1y th\u1ee7y \u0111i\u1ec7n.\u201d<br>Bi\u1ebfn \u0111\u1ed5i kh\u00ed h\u1eadu v\u00e0 ho\u1ea1t \u0111\u1ed9ng c\u1ee7a con ng\u01b0\u1eddi l\u00e0 nguy\u00ean nh\u00e2n ch\u00ednh g\u00e2y ra nh\u1eefng thay \u0111\u1ed5i n\u00e0y. L\u01b0\u1ee3ng m\u01b0a gia t\u0103ng v\u00e0 tuy\u1ebft tan nhanh h\u01a1n \u1edf v\u00f9ng n\u00fai cao g\u00f3p ph\u1ea7n v\u00e0o hi\u1ec7n t\u01b0\u1ee3ng tr\u00ean. C\u00e1c ho\u1ea1t \u0111\u1ed9ng nh\u01b0 khai th\u00e1c n\u01b0\u1edbc s\u00f4ng \u0111\u1ec3 t\u01b0\u1edbi ti\u00eau hay x\u1ea3 th\u1ea3i c\u0169ng \u1ea3nh h\u01b0\u1edfng kh\u00f4ng nh\u1ecf.\u201d<br><div style=\"text-align: right;\">(Kim Dung l\u01b0\u1ee3c d\u1ecbch, <i>B\u1ea3n \u0111\u1ed3 c\u1ea3nh quan s\u00f4ng to\u00e0n c\u1ea7u: L\u0169, thi\u1ebfu n\u01b0\u1edbc v\u00e0 l\u00fan \u0111\u1ed3ng b\u1eb1ng</i>, theo <i>tiasang.com.vn</i>)</div>", "listQuestion": [{"questionId": 21597926, "lessonId": 0, "a": "M\u1ed efng thay \u0111\u1ed5i\u201d l\u00e0 k\u1ebft qu\u1ea3.\n", "key": "D", "isVideo": true, "score": 0, "order": 24, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597946, "lessonId": 0, "a": "\u201cg\u00e2y thi\u1ebfu h\u1ee5t\u201d.", "b": "\u201cl\u00e0m gi\u1ea3m\u201d.", "c": "\u201ccung c\u1ea5p\u201d.", "d": "\u201cl\u00e0m suy y\u1ebfu\u201d.", "bookId": 1088361, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "T\u1eeb ng\u1eef n\u00e0o <b>kh\u00f4ng </b>c\u00f9ng nh\u00f3m v\u1edbi c\u00e1c t\u1eeb ng\u1eef c\u00f2n l\u1ea1i?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- g\u00e2y thi\u1ebfu h\u1ee5t/ l\u00e0m gi\u1ea3m/ l\u00e0m suy y\u1ebfu: \u0111\u1ec1u mang \u00fd ngh\u0129a ti\u00eau c\u1ef1c, ch\u1ec9 s\u1ef1 gi\u1ea3m s\u00fat.<br>\n- cung c\u1ea5p: mang \u00fd ngh\u0129a t\u00edch c\u1ef1c, ch\u1ec9 s\u1ef1 b\u1ed5 sung, t\u0103ng th\u00eam.\n", "key": "C", "isVideo": true, "score": 0, "order": 25, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 26 \u0111\u1ebfn 30", "content": "\u201cC\u00f4ng vi\u1ec7c l\u00e0m \u0103n c\u1ee7a cha t\u00f4i m\u1ed7i ng\u00e0y c\u00e0ng kh\u00f3 kh\u0103n h\u01a1n. Chi\u1ebfc xe b\u00f2 c\u1ee7a cha t\u00f4i kh\u00f4ng th\u1ec3 c\u1ea1nh tranh \u0111\u01b0\u1ee3c v\u1edbi m\u1ed9t \u0111\u00e0n xe lam v\u00e0 xe c\u00f4ng n\u00f4ng \u1edf c\u00e1i th\u1ecb tr\u1ea5n b\u00e9 x\u00edu n\u00e0y. R\u1ed3i m\u1ed9t tai ho\u1ea1 m\u1edbi gi\u00e1ng xu\u1ed1ng \u0111\u1ea7u gia \u0111\u00ecnh t\u00f4i. Con b\u00f2 k\u00e9o c\u1ee7a cha t\u00f4i b\u1ecb b\u1ec7nh l\u0103n ra ch\u1ebft. Cha t\u00f4i l\u1ea1i l\u00e2m v\u00e0o nh\u1eefng cu\u1ed9c say kh\u00f4ng bi\u1ebft g\u00ec. Khi say, cha kh\u00f3c v\u00e0 ch\u1eedi m\u1eb9. Nh\u01b0ng s\u00e1ng s\u00e1ng, cha t\u00f4i v\u1eabn d\u1eady r\u1ea5t s\u1edbm. Cha t\u00f4i xin \u0111\u01b0\u1ee3c ch\u00e2n b\u1ed1c v\u00e1c ngo\u00e0i b\u1ebfn xe th\u1ecb tr\u1ea5n. C\u1ea3 ng\u00e0y ch\u1ec9 c\u00f3 hai \u0111\u1ebfn ba chuy\u1ebfn xe. V\u00ec v\u1eady, cha t\u00f4i l\u00e0m b\u1ea5t k\u00ec vi\u1ec7c g\u00ec \u0111\u1ec3 c\u00f3 ti\u1ec1n duy tr\u00ec s\u1ef1 s\u1ed1ng c\u1ee7a gia \u0111\u00ecnh t\u00f4i.<br>T\u1ed1i t\u1ed1i, u\u1ed1ng r\u01b0\u1ee3u say, cha t\u00f4i ch\u1eedi m\u1eb9 v\u00e0 l\u1ea1i d\u00f9ng c\u00e1n ch\u1ed5i \u0111\u00e1nh t\u00f4i. Khi cha \u0111\u00e1nh, kh\u00f4ng bao gi\u1edd t\u00f4i b\u1ecf ch\u1ea1y. Hai tay t\u00f4i \u00f4m l\u1ea5y \u0111\u1ea7u \u0111\u1ec3 cho cha \u0111\u00e1nh. \u0110\u00e1nh t\u00f4i xong, cha l\u1ea1i d\u1eady s\u1edbm ra b\u1ebfn xe. R\u1ed3i cha t\u00f4i tr\u1edf v\u1ec1 nh\u00e0 khi tr\u1eddi x\u1ea9m t\u1ed1i. Khi t\u00f4i x\u1edbi c\u01a1m cho cha, cha t\u00f4i nh\u00ecn c\u00e1nh tay t\u00f4i v\u00e0 l\u1ea1i h\u1ecfi:<br>- Tay con l\u00e0m sao th\u1ebf?<br>T\u00f4i t\u00ecm m\u1ecdi l\u00ed do \u0111\u1ec3 n\u00f3i d\u1ed1i cha. T\u00f4i kh\u00f4ng bao gi\u1edd mu\u1ed1n n\u00f3i v\u1edbi cha r\u1eb1ng: nh\u1eefng v\u1ebft t\u00edm tr\u00ean tay t\u00f4i l\u00e0 do cha \u0111\u00e1nh. C\u00f3 m\u1ed9t l\u1ea7n b\u1ecb cha h\u1ecfi, t\u00f4i cu\u1ed1ng qu\u00e1, v\u1ed9i n\u00f3i:<br>- Th\u1eb1ng Tu\u1ea5n \u0111\u00e1nh.<br>Cha t\u00f4i d\u1eb1n b\u00e1t c\u01a1m v\u00e0 g\u1ea7m l\u00ean:<br>- Sao m\u00e0y \u0111\u00e1nh ch\u1ecb nh\u01b0 th\u1ebf, h\u1ea3 Tu\u1ea5n? Ai t\u1eafm r\u1eeda cho m\u00e0y? Ai n\u1ea5u c\u01a1m cho m\u00e0y? Ai ru m\u00e0y ng\u1ee7?<br>Th\u1eb1ng em t\u00f4i b\u1ecb m\u1eafng oan, \u00f2a kh\u00f3c. \u0110\u1ebfn khi \u0111\u00e3 ng\u1ee7 t\u00f4i v\u1eabn nghe ti\u1ebfng n\u1ea5c c\u1ee7a em t\u00f4i.\u201d<br><di                                     if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; 
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // TYPE 1 & 3: FILL KEY
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const chars = userVal.split('');
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let boxesHtml = '<div class="flex gap-2 justify-start items-center">';
                        for(let i=0; i<4; i++) {
                            const char = chars[i] || '';
                            boxesHtml += `<input type="text" maxlength="1" 
                                class="char-input" 
                                data-index="${i}" 
                                data-key="${qKey}" 
                                value="${char}" 
                                readonly 
                                onclick="activateNumpad(this, '${qKey}')"
                                ${isSubmitted ? 'disabled' : ''} 
                            />`;
                        }
                        
                        if(examMode === 'practice' && !isSubmitted) {
                             boxesHtml += `<button onclick="checkFillAnswer('${qKey}')" class="ml-2 px-3 py-2 bg-blue-100 text-blue-700 font-bold rounded-lg text-sm hover:bg-blue-200 transition-colors">Kiểm tra</button>`;
                             // Nút xem lời giải cho practice
                             boxesHtml += `<button onclick="toggleSolution('${qKey}')" class="ml-2 px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button>`;
                        }
                        boxesHtml += '</div>';

                        let feedbackHtml = "";
                        if(isSubmitted) {
                             const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                             if(isCorrect) {
                                feedbackHtml = `<div class="mt-2 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                             } else {
                                feedbackHtml = `<div class="mt-2 text-red-600 text-sm">✗ Sai. Đáp án: <span class="font-bold">${correctVal}</span></div>`;
                             }
                        } else if (examMode === 'practice') {
                             feedbackHtml = `<div id="feedback-${qKey}" class="mt-2 text-sm font-bold hidden"></div>`;
                        }

                        html += `
                        <div class="flex flex-col relative">
                            ${boxesHtml}
                            ${feedbackHtml}
                        </div>`;
                    }

                    // TYPE 2: TRUE/FALSE
                    else if(qType === '2') {
                         html += `<div class="overflow-hidden border rounded-lg">
                            <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                                <tr>
                                    <th scope="col" class="px-3 py-3 w-10 text-center">Ý</th>
                                    <th scope="col" class="px-3 py-3">Nội dung</th>
                                    <th scope="col" class="px-3 py-3 w-32 text-center">Chọn Đ/S</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; 
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; 
                                const userChoice = userObj[pIdx]; 
                                
                                let trClass = "bg-white hover:bg-gray-50";
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) trClass = "bg-green-50";
                                    else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
