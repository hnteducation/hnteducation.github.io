    <script>
        const EXAM_DATA = [{"title": "", "content": "", "listQuestion": [{"questionId": 21605040, "lessonId": 0, "a": "\u0110oa\u0300n ngu\u031b\u01a1\u0300i ke\u0301o t\u01a1\u0301i ru\u1ecd\u0302ng l\u00e2\u0300y co\u0301 chu\u00f4\u0301i mo\u0323c.", "b": "C\u00e2y ko\u031b-pa cao, ca\u0302y ko\u031b-lo\u031bng ngo\u0323n \u0111u\u0323ng t\u01a1\u0301i M\u1ea1\u0306t Tr\u01a1\u0300i.", "c": "G\u00f4\u0301c ca\u0302y k\u01a1-l\u01a1ng v\u01b0\u0300a tro\u0300n m\u1ecd\u0302t thoi chi\u0309.", "d": "\u0110o\u00e0n ng\u01b0\u1eddi t\u01a1\u0301i vu\u0300ng ba\u0300 Ho\u031b-bu\u0301t, ba\u0300 Ho\u031b-tang \u0111ang d\u1eb9\u0302t va\u0309i.", "bookId": 1088727, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cCa\u0309 \u0111oa\u0300n ngu\u031b\u01a1\u0300i lu\u0303 lu\u031b\u01a1\u0323t ke\u0301o t\u01a1\u0301i ru\u1ecd\u0302ng l\u00e2\u0300y co\u0301 chu\u00f4\u0301i mo\u0323c, \u0111\u00ea\u0301n tha\u0301c \u0110ang hoa n\u01a1\u0309, t\u01b0\u0300 b\u01a1\u0300 so\u0302ng l\u01a1\u0301n, g\u00f4\u0301c ca\u0302y xoa\u0300i nga\u0309 nghie\u0302ng. Ho\u0323 ke\u0301o t\u01a1\u0301i vu\u0300ng ba\u0300 Ho\u031b-bu\u0301t, ba\u0300 Ho\u031b-tang \u0111ang d\u1eb9\u0302t va\u0309i, nhi\u0300n th\u00e2\u0301y ma\u0301i nha\u0300 me\u0323 \u0110ung, me\u0323 \u0110ai , th\u00e2\u0301y ca\u0302y ko\u031b-pa cao, ca\u0302y ko\u031b-lo\u031bng ngo\u0323n \u0111u\u0323ng t\u01a1\u0301i M\u1ea1\u0306t Tr\u01a1\u0300i. Xing Nha\u0303 \u0111o g\u00f4\u0301c ca\u0302y v\u01b0\u0300a tro\u0300n m\u1ecd\u0302t thoi chi\u0309. G\u00f4\u0301c ca\u0302y ko\u031b-lo\u031bng l\u01a1\u0301n \u0111\u00ea\u0301n n\u00f4\u0303i pha\u0309i \u0111i vo\u0300ng m\u1ecd\u0302t na\u0306m m\u01a1\u0301i gia\u0301p g\u00f4\u0301c, na\u0306m tha\u0301ng m\u01a1\u0301i mu\u0301t ca\u0300nh, la\u0301 da\u0300i ho\u031bn m\u1ecd\u0302t d\u1ea1\u0306m ca\u0301nh chim bay.\u201d</i><br><div style=\"text-align: right;\">(S\u1eed thi Gia Rai,<i> Xing Nh\u00e3</i>, theo<i> V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>Chi ti\u1ebft n\u00e0o <b>kh\u00f4ng </b>ph\u1ea3i l\u00e0 chi ti\u1ebft k\u00ec \u1ea3o trong \u0111o\u1ea1n tr\u00edch?", "answer": "<b>\u0110\u00e1p \u00e1n: A\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>Chi ti\u1ebft \u201c\u0110o\u00e0n ng\u01b0\u1eddi k\u00e9o t\u1edbi ru\u1ed9ng l\u1ea7y c\u00f3 chu\u1ed1i m\u1ecdc.\u201d l\u00e0 ch\u1ec9 m\u00f4 t\u1ea3 h\u00ecnh \u1ea3nh \u0111o\u00e0n ng\u01b0\u1eddi k\u00e9o \u0111\u1ebfn m\u1ed9t \u0111\u1ecba \u0111i\u1ec3m nh\u1ea5t \u0111\u1ecbnh, kh\u00f4ng ch\u1ee9a y\u1ebfu t\u1ed1 k\u00ec \u1ea3o.\n", "key": "A", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605045, "lessonId": 0, "a": "T\u1eeb con m\u1eaft b\u00ean tr\u00e1i c\u1ee7a Nhi\u00eau V\u01b0\u01a1ng.", "b": "T\u1eeb t\u00e2m c\u1ee7a B\u00e0n C\u1ed5.", "c": "T\u1eeb con m\u1eaft b\u00ean ph\u1ea3i c\u1ee7a Nhi\u00eau V\u01b0\u01a1ng.", "d": "T\u1eeb \u0111\u1ea7u c\u1ee7a Nhi\u00eau V\u01b0\u01a1ng.", "bookId": 1088728, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cThu\u1edf h\u1ed7n mang ch\u01b0a c\u00f3 g\u00ec \u0111\u01b0\u1ee3c t\u1ea1o l\u1eadp ch\u1ec9 m\u1edbi c\u00f3 hai \u0111\u1ea5ng c\u00f9ng th\u00e0nh h\u00ecnh m\u1ed9t l\u01b0\u1ee3t l\u00e0 Nhi\u00eau V\u01b0\u01a1ng (t\u1ee9c Ng\u1ecdc Ho\u00e0ng) v\u00e0 B\u00e0n C\u1ed5. Nhi\u00eau V\u01b0\u01a1ng c\u00f3 ba tr\u0103m s\u00e1u con m\u1eaft, B\u00e0n C\u1ed5 c\u00f3 ba tr\u0103m s\u00e1u th\u00e2n h\u00ecnh.<br>Con m\u1eaft b\u00ean tr\u00e1i c\u1ee7a Nhi\u00eau V\u01b0\u01a1ng sinh ra m\u1eb7t tr\u1eddi (d\u01b0\u01a1ng), con m\u1eaft b\u00ean ph\u1ea3i sinh ra m\u1eb7t tr\u0103ng (\u00e2m), \u0111\u1ea7u l\u00e0m th\u00e0nh tr\u1eddi, ch\u00e2n l\u00e0m th\u00e0nh \u0111\u1ea5t. C\u00f2n lo\u00e0i ng\u01b0\u1eddi th\u00ec do t\u00e2m c\u1ee7a B\u00e0n C\u1ed5 m\u00e0 sinh ra, trong \u0111\u00f3 c\u00f3 B\u00e0n V\u0169.\u201d</i><br><div style=\"text-align: right;\">(Th\u1ea7n tho\u1ea1i M\u00e1n, <i>T\u1ea1o l\u1eadp v\u0169 tr\u1ee5,</i> NXB S\u00e1ng t\u1ea1o, 1970)</div>Theo \u0111o\u1ea1n tr\u00edch, lo\u00e0i ng\u01b0\u1eddi sinh ra t\u1eeb \u0111\u00e2u?<br>", "answer": "<b>\u0110\u00e1p \u00e1n: B\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>D\u1ef1a v\u00e0o c\u00e2u v\u0103n: \u201cC\u00f2n lo\u00e0i ng\u01b0\u1eddi th\u00ec do t\u00e2m c\u1ee7a B\u00e0n C\u1ed5 m\u00e0 sinh ra, trong \u0111\u00f3 c\u00f3 B\u00e0n V\u0169.\u201d\n<br>\u2192 Theo \u0111o\u1ea1n tr\u00edch, lo\u00e0i ng\u01b0\u1eddi sinh ra t\u1eeb t\u00e2m c\u1ee7a B\u00e0n C\u1ed5.\n", "key": "B", "isVideo": true, "score": 0, "order": 2, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605050, "lessonId": 0, "a": "L\u1eddi th\u01a1 \u0111\u1eadm m\u00e0u s\u1eafc suy t\u01b0, chi\u00eam nghi\u1ec7m.", "b": "Ng\u00f4n ng\u1eef gi\u1ea3n d\u1ecb, m\u1ed9c m\u1ea1c, g\u1ea7n v\u1edbi l\u1eddi \u0103n ti\u1ebfng n\u00f3i c\u1ee7a nh\u00e2n d\u00e2n.", "c": "V\u1eadn d\u1ee5ng nhi\u1ec1u th\u00e0nh ng\u1eef, t\u1ee5c ng\u1eef d\u00e2n gian \u0111\u1ec3 \u0111\u01b0a v\u00e0o l\u1eddi th\u01a1.", "d": "Ng\u00f4n ng\u1eef trang tr\u1ecdng, c\u1ed5 \u0111i\u1ec3n.", "bookId": 1088729, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u1ede b\u1ea7u th\u00ec d\u00e1ng \u1eaft n\u00ean tr\u00f2n,<br>X\u1ea5u t\u1ed1t \u0111\u1ec1u th\u00ec r\u1eafp khu\u00f4n.<br>L\u00e2n c\u1eadn nh\u00e0 gi\u00e0u no b\u1eefa c\u00e1m,<br>B\u1ea1n b\u00e8 k\u1ebb tr\u1ed9m ph\u1ea3i \u0111au \u0111\u00f2n.<br>Ch\u01a1i c\u00f9ng \u0111\u1ee9a d\u1ea1i n\u00ean b\u1ea7y d\u1ea1i,<br>K\u1ebft m\u1ea5y ng\u01b0\u1eddi kh\u00f4n h\u1ecdc n\u1ebft kh\u00f4n.<br>\u1ede \u0111\u1ea5ng th\u1ea5p th\u00ec n\u00ean \u0111\u1ea5ng th\u1ea5p,<br>\u0110en g\u1ea7n m\u1ef1c, \u0111\u1ecf g\u1ea7n son.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Tr\u00e3i, <i>B\u1ea3o k\u00ednh c\u1ea3nh gi\u1edbi, b\u00e0i 21, </i>theo <i>Nguy\u1ec5n Tr\u00e3i th\u01a1 v\u00e0 \u0111\u1eddi,</i> NXB V\u0103n h\u1ecdc, 2016)</div>Nh\u1eadn x\u00e9t n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>\u0111\u00fang v\u1ec1 ng\u00f4n ng\u1eef c\u1ee7a b\u00e0i th\u01a1?", "answer": "<b>\u0110\u00e1p \u00e1n: D\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>B\u00e0i th\u01a1 kh\u00f4ng s\u1eed d\u1ee5ng ng\u00f4n ng\u1eef trang tr\u1ecdng, c\u1ed5 \u0111i\u1ec3n m\u00e0 s\u1eed d\u1ee5ng nhi\u1ec1u t\u1eeb ng\u1eef quen thu\u1ed9c, d\u1ec5 hi\u1ec3u v\u00e0 nh\u1eefng h\u00ecnh \u1ea3nh g\u1ea7n g\u0169i v\u1edbi \u0111\u1eddi s\u1ed1ng d\u00e2n gian.\n", "key": "D", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605058, "lessonId": 0, "a": "Gi\u1ecfi vi\u1ec7c n\u00f4ng tang.", "b": "Hi\u1ec1n m\u00e0 \u0111a tr\u00ed.", "c": "Trang m\u1ea1o k\u00ec v\u0129.", "d": "Gi\u1ecfi vi\u1ec7c c\u1eeda nh\u00e0.", "bookId": 1088730, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cT\u00f4 Ng\u1ecdc hi\u1ec1n m\u00e0 \u0111a tr\u00ed, gi\u1ecfi vi\u1ec7c c\u1eeda nh\u00e0, l\u1ea1i c\u00e0ng gi\u1ecfi vi\u1ec7c n\u00f4ng tang, cho n\u00ean gia s\u1ea3n ng\u00e0y m\u1ed9t nhi\u1ec1u, m\u00f4n h\u1ea1 ng\u00e0y m\u1ed9t \u0111\u00f4ng, tr\u01b0\u1edbc sinh hai trai, sau sinh hai g\u00e1i. Con tr\u01b0\u1edfng l\u00e0 B\u00e1o S\u01a1n, con th\u1ee9 l\u00e0 K\u1ef3 S\u01a1n, \u0111\u1ec1u c\u00f3 trang m\u1ea1o k\u00ec v\u0129, \u0111\u1ebfn khi l\u1edbn l\u00ean, v\u0103n m\u00f4 v\u0169 to\u00e1n, kh\u00f4ng g\u00ec l\u00e0 kh\u00f4ng \u0111\u1ea7y \u0111\u1ee7. Mai \u0110\u1ebf m\u1eebng v\u00ec trong nh\u00e0 c\u00f3 \u0111i\u1ec1m vui, vi\u1ec7c trong vi\u1ec7c ngo\u00e0i kh\u00f4ng c\u00f3 g\u00ec l\u00e0 kh\u00f4ng quan t\u00e2m.\u201d</i><br><div style=\"text-align: right;\">(L\u00fd T\u1ebf Xuy\u00ean,<i> H\u01b0\u01a1ng L\u00e3m Mai \u0110\u1ebf k\u00ed,</i> theo <i>Vi\u1ec7t \u0111i\u1ec7n u linh t\u1eadp</i>, NXB V\u0103n h\u1ecdc, 2008)</div>N\u00e0ng T\u00f4 Ng\u1ecdc <b>kh\u00f4ng </b>c\u00f3 \u0111\u1eb7c \u0111i\u1ec3m n\u00e0o sau \u0111\u00e2y?", "answer": "<b>\u0110\u00e1p \u00e1n: C\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>D\u1ef1a v\u00e0o c\u00e2u v\u0103n: \u201cT\u00f4 Ng\u1ecdc hi\u1ec1n m\u00e0 \u0111a tr\u00ed, gi\u1ecfi vi\u1ec7c c\u1eeda nh\u00e0, l\u1ea1i c\u00e0ng gi\u1ecfi vi\u1ec7c n\u00f4ng tang, cho n\u00ean gia s\u1ea3n ng\u00e0y m\u1ed9t nhi\u1ec1u, m\u00f4n h\u1ea1 ng\u00e0y m\u1ed9t \u0111\u00f4ng, tr\u01b0\u1edbc sinh hai trai, sau sinh hai g\u00e1i.\u201d\n<br>\u2192 Nh\u00e2n v\u1eadt n\u00e0ng T\u00f4 Ng\u1ecdc kh\u00f4ng c\u00f3 \u0111\u1eb7c \u0111i\u1ec3m: trang m\u1ea1o k\u00ec v\u0129.\n", "key": "C", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605064, "lessonId": 0, "a": "L\u1eafc b\u1ea7u r\u01b0\u1ee3u d\u1ed1c nghi\u00eang non n\u01b0\u1edbc.", "b": "Gi\u01b0\u01a1ng tay T\u1ea1o r\u1eafp xoay c\u01a1n kh\u00ed s\u1ed1.", "c": "B\u01b0ng m\u1eaft tr\u1ea7n toan \u0111\u1eadp c\u1eeda ph\u00f9 \u0111\u1ed3.", "d": "H\u00f3ng t\u00fai th\u01a1 nong h\u1ebft gi\u00f3 tr\u0103ng v\u00e0o.", "bookId": 1088731, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cL\u1eafc b\u1ea7u r\u01b0\u1ee3u d\u1ed1c nghi\u00eang non n\u01b0\u1edbc l\u1ea1i, ch\u00e9n ti\u1ebfu \u0111\u00e0m m\u1eddi m\u1ecdc Tr\u00edch Ti\u00ean ,<br>H\u00f3ng t\u00fai th\u01a1 nong h\u1ebft gi\u00f3 tr\u0103ng v\u00e0o, c\u01a1n x\u01b0\u1edbng ho\u1ea1 th\u00ec th\u1ea7m L\u00e3o \u0110\u1ed7 ,<br>T\u01b0\u01a1i n\u00e9t m\u1eb7t th\u01b0 sinh l\u1ed3 l\u1ed9, b\u01b0ng m\u1eaft tr\u1ea7n toan \u0111\u1eadp c\u1eeda ph\u00f9 \u0111\u1ed3 <br>R\u1eeda bu\u1ed3ng gan du t\u1eed nh\u01a1n nh\u01a1n, gi\u01b0\u01a1ng tay T\u1ea1o r\u1eafp xoay c\u01a1n kh\u00ed s\u1ed1 \u201d</i><br><div style=\"text-align: right;\">(Cao B\u00e1 Qu\u00e1t,<i> T\u00e0i t\u1eed \u0111a c\u00f9ng ph\u00fa</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam, t\u1eadp 14,</i> NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Ho\u00e0i b\u00e3o c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n qua chi ti\u1ebft n\u00e0o?<br>", "answer": "<b>\u0110\u00e1p \u00e1n: B\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>Chi ti\u1ebft \u201cGi\u01b0\u01a1ng tay T\u1ea1o r\u1eafp xoay c\u01a1n kh\u00ed s\u1ed1.\u201d th\u1ec3 hi\u1ec7n r\u00f5 nh\u1ea5t ho\u00e0i b\u00e3o c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh. \u201cT\u1ea1o\u201d \u1edf \u0111\u00e2y l\u00e0 T\u1ea1o h\u00f3a, l\u00e0 tr\u1eddi \u0111\u1ea5t c\u00f2n \u201cxoay c\u01a1n kh\u00ed s\u1ed1\u201d th\u1ec3 hi\u1ec7n tham v\u1ecdng thay \u0111\u1ed5i v\u1eadn m\u1ec7nh, xoay chuy\u1ec3n c\u00e0n kh\u00f4n c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh.\n", "key": "B", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605070, "lessonId": 0, "a": "X\u00f3t xa, th\u01b0\u01a1ng c\u1ea3m.", "b": "D\u1eedng d\u01b0ng, v\u00f4 t\u00e2m.", "c": "Th\u1ea5u hi\u1ec3u, \u0111\u1ed3ng c\u1ea3m, y\u00eau th\u01b0\u01a1ng.", "d": "Ng\u1ee3i ca, tr\u00e2n tr\u1ecdng.", "bookId": 1088732, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cChi\u1ebfn tr\u01b0\u1eddng ng\u00e0y c\u00e0ng g\u0103ng. M\u1ea5y th\u00e1ng t\u00f4i m\u1edbi m\u00f2 m\u1eabm v\u1ec1 th\u0103m \u0111\u01b0\u1ee3c v\u00e0i gi\u1edd r\u1ed3i \u0111i. M\u1ed7i l\u1ea7n \u0111i t\u00f4i l\u1ea1i mang v\u1ec1 \u00edt \u0111\u1ed3 \u0103n cho anh em, v\u00e0 kh\u00f4ng bao gi\u1edd qu\u00ean c\u00e1i h\u01a1i \u00e2m \u1ea5m v\u00e0 c\u1ea3m gi\u00e1c ng\u01b0a ng\u1ee9a tr\u00ean da m\u1eb7t. \u00c0, h\u00ecnh nh\u01b0 t\u00f4i ch\u01b0a bao gi\u1edd th\u1ea5y v\u1ee3 t\u00f4i kh\u00f3c. Tr\u01b0\u1edbc m\u1eb7t t\u00f4i ch\u1ec9 to\u00e0n l\u00e0 \u0111\u1ed9ng vi\u00ean, c\u01b0\u1eddi t\u01b0\u01a1i nh\u01b0 hoa coi b\u1ed9 c\u1ee9ng c\u1ecfi l\u1eafm, nh\u01b0ng nh\u00ecn trong m\u1eaft, t\u00f4i bi\u1ebft c\u00f4 ta c\u00f2n \u0111\u1ec3 d\u00e0nh n\u01b0\u1edbc m\u1eaft. L\u00e1t n\u1eefa t\u00f4i \u0111i, tha h\u1ed3 \u00fap m\u1eb7t xu\u1ed1ng gi\u01b0\u1eddng. Nh\u1eefng \u0111au kh\u1ed5 trong l\u00f2ng c\u0169ng nh\u01b0 ngo\u00e0i th\u1ec3 x\u00e1c ch\u1eb3ng bao gi\u1edd ng\u01b0\u1eddi \u0111\u00e0n b\u00e0 t\u1ed1t n\u1ebft l\u1ea1i d\u1ec5 d\u00e0ng th\u1ed5 l\u1ed9 v\u1edbi ch\u1ed3ng anh \u1ea1.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Thi, <i>Im l\u1eb7ng,</i> theo <i>vannghequandoi.com.vn</i>)</div><div style=\"text-align: left;\">\u0110o\u1ea1n v\u0103n b\u1ed9c l\u1ed9 t\u00ecnh c\u1ea3m, c\u1ea3m x\u00fac n\u00e0o c\u1ee7a ng\u01b0\u1eddi ch\u1ed3ng d\u00e0nh cho ng\u01b0\u1eddi v\u1ee3?</div>", "answer": "<b>\u0110\u00e1p \u00e1n: C\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>\u0110o\u1ea1n v\u0103n th\u1ec3 hi\u1ec7n s\u1ef1 th\u1ea5u hi\u1ec3u v\u00e0 t\u00ecnh c\u1ea3m y\u00eau th\u01b0\u01a1ng c\u1ee7a ng\u01b0\u1eddi ch\u1ed3ng d\u00e0nh cho v\u1ee3. Anh nh\u1eadn ra v\u1ee3 lu\u00f4n t\u1ecf ra c\u1ee9ng c\u1ecfi, vui v\u1ebb \u0111\u1ec3 \u0111\u1ed9ng vi\u00ean ch\u1ed3ng, nh\u01b0ng \u1ea9n s\u00e2u b\u00ean trong l\u00e0 nh\u1eefng n\u1ed7i \u0111au, nh\u1eefng gi\u1ecdt n\u01b0\u1edbc m\u1eaft k\u00ecm n\u00e9n. Anh nh\u1eadn ra t\u1eebng bi\u1ec3u hi\u1ec7n nh\u1ecf c\u1ee7a v\u1ee3, hi\u1ec3u \u0111\u01b0\u1ee3c nh\u1eefng hy sinh th\u1ea7m l\u1eb7ng c\u1ee7a v\u1ee3. \u0110i\u1ec1u n\u00e0y cho th\u1ea5y s\u1ef1 y\u00eau th\u01b0\u01a1ng, tr\u00e2n tr\u1ecdng m\u00e0 ng\u01b0\u1eddi ch\u1ed3ng d\u00e0nh cho ng\u01b0\u1eddi v\u1ee3 t\u1ea3o t\u1ea7n, gi\u00e0u t\u00ecnh c\u1ea3m v\u00e0 \u0111\u1ee9c hy sinh c\u1ee7a m\u00ecnh.\n", "key": "C", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605073, "lessonId": 0, "a": "\u00c1o tr\u1eafng nh\u1ea5t.", "b": "Ranh m\u00e3nh.", "c": "Tinh ngh\u1ecbch.", "d": "C\u00e1i mi\u1ec7ng ngoa.", "bookId": 1088733, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cC\u00f3 l\u1ebd n\u00e0o anh l\u1ea1i m\u00ea em<br>M\u1ed9t c\u00f4 g\u00e1i kh\u00f4ng nh\u00ecn r\u00f5 m\u1eb7t<br>\u00d0\u1ea1i \u0111\u1ed9i thanh ni\u00ean \u0111i l\u1ea5p h\u1ed1 bom<br>\u00c1o em h\u00ecnh nh\u01b0 tr\u1eafng nh\u1ea5t<br><br>Ng\u01b0\u1eddi tinh ngh\u1ecbch l\u00e0 anh d\u1ec5 th\u00e2n<br>B\u1edfi v\u00ec th\u1ebf c\u00f3 em \u0111\u1ee9ng g\u1ea7n<br>Em \u1edf Th\u1ea1ch Kim sao l\u1ea1i l\u1eeba anh n\u00f3i l\u00e0 \u201cTh\u1ea1ch Nh\u1ecdn\u201d<br>\u00d0\u00eam ranh m\u00e3nh ng\u0103n c\u00e1i nh\u00ecn \u0111\u01b0a \u0111\u00f3n<br><br>Em \u0111\u00f3ng c\u1ecdc r\u00e0o quanh h\u1ed1 bom<br>C\u00e1i mi\u1ec7ng em ngoa cho b\u1ea1n c\u01b0\u1eddi gi\u00f2n<br>Ti\u1ebfng H\u00e0 T\u0129nh nghe bu\u1ed3n c\u01b0\u1eddi \u0111\u00e1o \u0111\u1ec3<br>Anh l\u1eb7ng ng\u01b0\u1eddi nh\u01b0 tr\u00f4i trong ti\u1ebfng ru.</i><br><div style=\"text-align: right;\">(Ph\u1ea1m Ti\u1ebfn Du\u1eadt, <i>G\u1eedi em c\u00f4 g\u00e1i thanh ni\u00ean xung phong,</i> theo<i> dantri.com.vn</i>)</div>\u0110\u1eb7c \u0111i\u1ec3m n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>thu\u1ed9c v\u1ec1 c\u00f4 g\u00e1i thanh ni\u00ean xung phong?<br>", "answer": "<b>\u0110\u00e1p \u00e1n: B\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>C\u00e2u th\u01a1 \u201c\u00d0\u00eam ranh m\u00e3nh ng\u0103n c\u00e1i nh\u00ecn \u0111\u01b0a \u0111\u00f3n\u201d cho th\u1ea5y \u201cranh m\u00e3nh\u201d l\u00e0 \u0111\u1eb7c \u0111i\u1ec3m c\u1ee7a \u0111\u00eam t\u1ed1i, kh\u00f4ng thu\u1ed9c v\u1ec1 c\u00f4 g\u00e1i thanh ni\u00ean xung phong.\n", "key": "B", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605079, "lessonId": 0, "a": "T\u01b0\u1edbng m\u1ea1o kh\u00f4i ng\u00f4, \u0111\u1eaby \u0111\u00e0.", "b": "Ng\u1ea7m c\u00f3 \u00fd mu\u1ed1n c\u01b0\u1edbp ng\u00f4i Th\u1ebf t\u1eed.", "c": "\u0110\u1ed1i \u0111\u00e1p g\u00e3y g\u1ecdn.", "d": "D\u00e1ng \u0111i\u1ec7u nghi\u00eam ch\u1ec9nh.", "bookId": 1088734, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cL\u00fac V\u01b0\u01a1ng t\u1eed C\u00e1n \u0111\u1ea7y tu\u1ed5i t\u00f4i, c\u1ed1t c\u00e1ch t\u01b0\u1edbng m\u1ea1o kh\u00f4i ng\u00f4, \u0111\u1eaby \u0111\u00e0 kh\u00e1c h\u1eb3n ng\u01b0\u1eddi th\u01b0\u1eddng. \u0110\u1ebfn khi bi\u1ebft n\u00f3i, V\u01b0\u01a1ng t\u1eed C\u00e1n \u0111\u1ed1i \u0111\u00e1p g\u00e3y g\u1ecdn, c\u1eed ch\u1ec9 kh\u00f4ng kh\u00e1c g\u00ec ng\u01b0\u1eddi l\u1edbn. M\u1ed7i khi c\u00e1c quan v\u0103n v\u00f5 v\u00e0o th\u0103m, v\u01b0\u01a1ng t\u1eed ti\u1ebfp \u0111\u00f3n v\u1edbi d\u00e1ng \u0111i\u1ec7u nghi\u00eam ch\u1ec9nh. C\u00f3 ng\u01b0\u1eddi c\u00e1ch h\u00e0ng n\u0103m m\u1edbi g\u1eb7p, V\u01b0\u01a1ng t\u1eed c\u0169ng nh\u1edb r\u1ea5t r\u00f5 h\u1ecd, t\u00ean k\u1ec3 l\u1ea1i chuy\u1ec7n c\u0169 vanh v\u00e1ch. Ch\u00faa sai quan t\u1eeb h\u00e0n l\u00e0m b\u00e0i t\u1ee5ng 16 ch\u1eef, \u0111\u1ec3 vi\u00ean a b\u1ea3o  d\u1ea1y truy\u1ec1n mi\u1ec7ng cho v\u01b0\u01a1ng t\u1eed. V\u01b0\u01a1ng t\u1eed ch\u1ec9 nghe qua m\u1ed9t l\u01b0\u1ee3t l\u00e0 \u0111\u1ecdc thu\u1ed9c li\u1ec1n. Th\u1ea5y v\u1eady ch\u00faa c\u00e0ng qu\u00fd V\u01b0\u01a1ng t\u1eed C\u00e1n b\u1ed9i ph\u1ea7n. C\u0169ng do \u0111\u00f3, Th\u1ecb Hu\u1ec7 m\u1edbi ng\u1ea7m c\u00f3 \u00fd mu\u1ed1n c\u01b0\u1edbp ng\u00f4i Th\u1ebf t\u1eed.\u201d</i><br><div style=\"text-align: right;\">(Ng\u00f4 gia v\u0103n ph\u00e1i, <i>Ho\u00e0ng L\u00ea nh\u1ea5t th\u1ed1ng ch\u00ed,</i> NXB V\u0103n h\u1ecdc, 2005)</div>Chi ti\u1ebft n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>mi\u00eau t\u1ea3 \u0111\u1eb7c \u0111i\u1ec3m c\u1ee7a V\u01b0\u01a1ng t\u1eed C\u00e1n?", "answer": "<b>\u0110\u00e1p \u00e1n: B\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>Trong \u0111o\u1ea1n tr\u00edch, V\u01b0\u01a1ng t\u1eed C\u00e1n \u0111\u01b0\u1ee3c mi\u00eau t\u1ea3 l\u00e0 ng\u01b0\u1eddi c\u00f3 c\u1ed1t c\u00e1ch t\u01b0\u1edbng m\u1ea1o kh\u00f4i ng\u00f4, \u0111\u1eaby \u0111\u00e0, \u0111\u1ed1i \u0111\u00e1p g\u00e3y g\u1ecdn, d\u00e1ng \u0111i\u1ec7u nghi\u00eam ch\u1ec9nh.\n<br>\u2192 V\u01b0\u01a1ng t\u1eed C\u00e1n kh\u00f4ng ng\u1ea7m c\u00f3 \u00fd mu\u1ed1n c\u01b0\u1edbp ng\u00f4i Th\u1ebf t\u1eed.\n", "key": "B", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605086, "lessonId": 0, "a": "D\u1eedng d\u01b0ng, l\u1ea1nh l\u00f9ng.", "b": "Th\u1ea5u hi\u1ec3u, \u0111\u1ed3ng c\u1ea3m.", "c": "C\u0103m gi\u1eadn, t\u1ee9c t\u1ed1i.", "d": "Khoan dung, \u0111\u1ed9 l\u01b0\u1ee3ng.", "bookId": 1088735, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cBAXANI\u00d4 - \u0110\u00f3 l\u00e0 qu\u00fd ng\u00e0i Ant\u00f4ni\u00f4.<br>SAIL\u00d4C (n\u00f3i ri\u00eang) - Tr\u00f4ng r\u00f5 ra v\u1ebb m\u1ed9t t\u00ean t\u00e0i ph\u00fa gi\u1ea3o quy\u1ec7t! Ta gh\u00e9t h\u1eafn v\u00ec h\u1eafn theo \u0111\u1ea1o C\u01a1 \u0111\u1ed1c, nh\u01b0ng ta c\u00f2n gh\u00e9t h\u1eafn nhi\u1ec1u h\u01a1n n\u1eefa v\u00ec h\u1eafn ngu d\u1ea1i \u0111\u00ea h\u00e8n, cho vay ti\u1ec1n kh\u00f4ng l\u1ea5y l\u00e3i, l\u00e0m cho l\u1ee3i su\u1ea5t c\u1ee7a ti\u1ec1n b\u1ea1c \u1edf V\u01a1nid\u01a1 n\u00e0y s\u1ee5t xu\u1ed1ng. M\u1ed9t ng\u00e0y n\u00e0o \u0111\u00f3, ta m\u00e0 t\u00f3m \u0111\u01b0\u1ee3c h\u1eafn h\u1edf c\u01a1, ph\u1ea3i bi\u1ebft l\u00e0 ta s\u1ebd tr\u1ea3 m\u1ed7i h\u1eadn th\u00f9 l\u00e2u \u0111\u1eddi c\u1ee7a ta \u0111\u1ed1i v\u1edbi h\u1eafn cho th\u1ecfa thu\u00ea! H\u1eafn th\u00f9 gh\u00e9t d\u00e2n t\u1ed9c th\u1ea7n th\u00e1nh c\u1ee7a b\u1ecdn ta, v\u00e0 ngay \u1edf nh\u1eefng n\u01a1i c\u00e1c l\u00e1i bu\u00f4n t\u1ee5 t\u1eadp \u0111\u00f4ng nh\u1ea5t, h\u1eafn th\u00f3a m\u1ea1 ta, th\u00f3a m\u1ea1 c\u00e1c c\u00f4ng vi\u1ec7c giao d\u1ecbch c\u1ee7a ta, nh\u1eefng l\u1eddi l\u00e3i ch\u00ednh \u0111\u00e1ng c\u1ee7a ta, m\u00e0 h\u1eafn g\u1ecdi l\u00e0 l\u00e3i n\u1eb7ng. Ta m\u00e0 tha cho h\u1eafn, th\u00ec c\u1ee9 xin cho n\u00f2i gi\u1ed1ng c\u1ee7a ta b\u1ecb nguy\u1ec1n r\u1ee7a!\u201d</i><br><div style=\"text-align: right;\">(William Shakespeare, <i>Ng\u01b0\u1eddi l\u00e1i bu\u00f4n th\u00e0nh V\u01a1nid\u01a1,</i> theo <i style=\"\">Tuy\u1ec3n t\u1eadp t\u00e1c ph\u1ea9m - William Shakespeare</i>, NXB S\u00e2n kh\u1ea5u, 2006)</div>L\u1eddi tho\u1ea1i c\u1ee7a Sail\u1ed1c b\u1ed9c l\u1ed9 th\u00e1i \u0111\u1ed9 n\u00e0o \u0111\u1ed1i Ant\u00f4ni\u00f4?", "answer": "<b>\u0110\u00e1p \u00e1n: C<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>L\u1eddi tho\u1ea1i c\u1ee7a Sail\u1ed1c ch\u1ee9a \u0111\u1ef1ng nh\u1eefng t\u1eeb ng\u1eef th\u1ec3 hi\u1ec7n r\u00f5 s\u1ef1 c\u0103m gh\u00e9t v\u00e0 t\u1ee9c t\u1ed1i \u0111\u1ed1i v\u1edbi Ant\u00f4ni\u00f4: <i>ta gh\u00e9t h\u1eafn, ta s\u1ebd tr\u1ea3 m\u1ed7i h\u1eadn th\u00f9 l\u00e2u \u0111\u1eddi c\u1ee7a ta \u0111\u1ed1i v\u1edbi h\u1eafn cho th\u1ecfa thu\u00ea, ta m\u00e0 tha cho h\u1eafn, th\u00ec c\u1ee9 xin cho n\u00f2i gi\u1ed1ng c\u1ee7a ta b\u1ecb nguy\u1ec1n r\u1ee7a</i>\u2026", "key": "C", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605092, "lessonId": 0, "a": "Th\u1ec3 th\u01a1 l\u1ee5c b\u00e1t; ng\u00f4n ng\u1eef gi\u1ea3n d\u1ecb, m\u1ed9c m\u1ea1c; h\u00ecnh \u1ea3nh gi\u00e0u \u00fd ngh\u0129a bi\u1ec3u tr\u01b0ng.", "b": "\u0110o\u1ea1n th\u01a1 c\u00f3 s\u1ef1 k\u1ebft h\u1ee3p y\u1ebfu t\u1ed1 tr\u1eef t\u00ecnh v\u1edbi t\u1ef1 s\u1ef1.", "c": "\u0110o\u1ea1n th\u01a1 ch\u1ee9a \u0111\u1ef1ng th\u00f4ng \u0111i\u1ec7p: L\u00f2ng y\u00eau gi\u1ed1ng n\u00f2i v\u00e0 tinh th\u1ea7n \u0111o\u00e0n k\u1ebft l\u00e0 s\u1ee9c m\u1ea1nh \u0111\u1ec3 \u0111\u00e1nh \u0111u\u1ed5i b\u00e8 l\u0169 x\u00e2m l\u0103ng.", "d": "C\u1ed1t truy\u1ec7n bi\u1ebfn ho\u00e1 ph\u1ee9c t\u1ea1p.", "bookId": 1088736, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<div style=\"text-align: center;\"><i>\u201cT\u1ed5 ong l\u1ee7ng l\u1eb3ng tr\u00ean c\u00e0nh,</i></div><i><div style=\"text-align: center;\"><i>Trong \u0111\u1ea7y m\u1eadt nh\u1ed9ng, ngon l\u00e0nh l\u1eafm thay!</i></div><div style=\"text-align: center;\"><i>C\u00e1o gi\u00e0 nh\u00e8 nh\u1eb9 l\u00ean c\u00e2y,</i></div><div style=\"text-align: center;\"><i>\u0110\u1ecbnh r\u1eb1ng l\u1ea5y \u0111\u01b0\u1ee3c \u0103n ngay cho gi\u00f2n.</i></div><div style=\"text-align: center;\"><i>Ong th\u1ea5y c\u00e1o mu\u1ed1n c\u01b0\u1edbp con,</i></div><div style=\"text-align: center;\"><i>K\u00e9o nhau x\u00fam l\u1ea1i v\u00e2y tr\u00f2n c\u00e1o ta.</i></div><div style=\"text-align: center;\"><i>Ch\u00e2m \u0111\u1ea7u, ch\u00e2m m\u1eaft c\u00e1o gi\u00e0,</i></div><div style=\"text-align: center;\"><i>C\u00e1o gi\u00e0 \u0111au qu\u00e1 ph\u1ea3i sa xu\u1ed1ng r\u1ed3i.</i></div><div style=\"text-align: center;\"><i>Ong kia y\u00eau gi\u1ed1ng, y\u00eau n\u00f2i,</i></div><div style=\"text-align: center;\"><i>\u0110\u1ed3ng t\u00e2m, h\u1ee3p l\u1ef1c \u0111u\u1ed5i lo\u00e0i c\u00e1o \u0111i.\u201d</i></div></i><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh,<i> Con c\u00e1o v\u00e0 t\u1ed5 ong</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Nh\u1eadn x\u00e9t n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>\u0111\u00fang v\u1edbi \u0111o\u1ea1n th\u01a1 tr\u00ean?<br>", "answer": "<b>\u0110\u00e1p \u00e1n: D\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>C\u1ed1t truy\u1ec7n trong \u0111o\u1ea1n th\u01a1 kh\u00f4ng bi\u1ebfn ho\u00e1 ph\u1ee9c t\u1ea1p m\u00e0 r\u1ea5t \u0111\u01a1n gi\u1ea3n, ch\u1ec9 k\u1ec3 v\u1ec1 cu\u1ed9c \u0111\u1ed1i \u0111\u1ea7u gi\u1eefa \u0111\u00e0n ong v\u00e0 c\u00e1o gi\u00e0, c\u00e1o \u0111\u1ecbnh c\u01b0\u1edbp t\u1ed5 ong, ong \u0111o\u00e0n k\u1ebft ch\u1ed1ng l\u1ea1i v\u00e0 \u0111u\u1ed5i \u0111\u01b0\u1ee3c c\u00e1o.\n", "key": "D", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605096, "lessonId": 0, "a": "\u201cT\u00f4i\u201d v\u00e3i m\u1ed9t nh\u00fam g\u1ea1o nh\u1ecf d\u00e0nh s\u1eb5n cho b\u1ea7y chim s\u1ebb.", "b": "T\u1eeb h\u00f4m c\u00f3 ti\u1ebfng s\u00fang n\u1ed5, b\u1ea7y chim s\u1ebb \u0111\u00e3 kh\u00f4ng tr\u1edf l\u1ea1i tr\u01b0\u1edbc c\u1eeda s\u1ed5.", "c": "M\u1ed9t g\u00e3 du \u0111\u00e3ng b\u1eafn v\u00e0o l\u0169 chim s\u1ebb tr\u00ean v\u00f2m c\u00e2y long n\u00e3o.", "d": "B\u1ea7y s\u1ebb n\u0103m b\u1ea3y con \u1edf \u0111\u00e2u bay \u0111\u1ebfn ki\u1ebfm \u0103n n\u01a1i h\u00e0nh lang tr\u01b0\u1edbc c\u1eeda s\u1ed5.", "bookId": 1088737, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cV\u00e0o kho\u1ea3ng gi\u1eefa bu\u1ed5i s\u00e1ng v\u1eabn th\u01b0\u1eddng c\u00f3 m\u1ed9t b\u1ea7y s\u1ebb n\u0103m b\u1ea3y con \u1edf \u0111\u00e2u bay \u0111\u1ebfn ki\u1ebfm \u0103n n\u01a1i h\u00e0nh lang tr\u01b0\u1edbc c\u1eeda s\u1ed5 nh\u00e0 t\u00f4i, \u1edf \u0111\u00f3 t\u00f4i \u0111\u00e3 v\u00e3i m\u1ed9t nh\u00fam g\u1ea1o nh\u1ecf d\u00e0nh s\u1eb5n cho ch\u00fang; l\u00e2n la quen d\u1ea7n \u0111\u1ebfn n\u1ed7i ch\u00fang v\u00e0o h\u1eb3n trong nh\u00e0, quanh qu\u1ea9n ngay ch\u1ed7 t\u00f4i ng\u1ed3i l\u00e0m vi\u1ec7c. Th\u1ebf r\u1ed3i m\u1ed9t h\u00f4m \u0111ang m\u1ea3i vi\u1ebft th\u00ecnh l\u00ecnh t\u00f4i nghe m\u1ed9t ti\u1ebfng \u201c\u0111o\u00e0ng\u201d vang l\u00ean n\u01a1i v\u00f2m l\u00e1 c\u00e2y long n\u00e3o tr\u01b0\u1edbc h\u00e0nh lang, b\u1ea7y chim s\u1ebb \u0111ang nh\u1eb7t g\u1ea1o g\u1ea7n \u0111\u1ea5y c\u1ea5t c\u00e1nh bay v\u00f9 \u0111i nh\u01b0 nh\u1eefng b\u00f3ng n\u1eafng. Nh\u00ecn xu\u1ed1ng \u0111\u01b0\u1eddng, t\u00f4i th\u1ea5y m\u1ed9t g\u00e3 du \u0111\u00e3ng \u0111ang v\u00e1c s\u00fang b\u1eafn chim l\u1eefng th\u1eefng b\u1ecf \u0111i. L\u0169 tr\u1ebb con nh\u1eb7t mang l\u00ean cho t\u00f4i xem chi\u1ebfn l\u1ee3i ph\u1ea9m c\u1ee7a g\u00e3 \u0111\u1ec3 l\u1ea1i d\u01b0\u1edbi g\u1ed1c c\u00e2y long n\u00e3o, m\u1ed9t con chim \u00e9n l\u1ea1c l\u00f5ng n\u00e0o \u0111\u00e3 b\u1ecb b\u1eafn ch\u1ebft, m\u1ea5y gi\u1ecdt m\u00e1u r\u1ec9 ra tr\u00ean c\u00e1i \u1ee9c \u0111en xanh c\u1ee7a n\u00f3. \u0110i\u1ec1u \u0111\u00e1ng bu\u1ed3n l\u00e0 t\u1eeb h\u00f4m c\u00f3 ti\u1ebfng s\u00fang n\u1ed5, b\u1ea7y chim s\u1ebb \u0111\u00e3 kh\u00f4ng tr\u1edf l\u1ea1i tr\u01b0\u1edbc c\u1eeda s\u1ed5 ph\u00f2ng t\u00f4i n\u1eefa, chuy\u1ec7n v\u1eeba m\u1edbi x\u1ea3y ra trong m\u00f9a xu\u00e2n v\u1eeba qua. Mong sao l\u0169 chim nh\u1ecf \u0111\u00e1ng y\u00eau c\u1ee7a t\u00f4i \u0111\u1eebng gi\u1eef m\u1ed9t k\u1ec9 ni\u1ec7m x\u1ea5u v\u1ec1 t\u00f4i, r\u1eb1ng ch\u00ednh t\u00f4i \u0111\u00e3 gi\u0103ng s\u1eb5n m\u1ed9t c\u00e1i b\u1eaby \u0111\u1ec3 \u0111\u1ecbnh gi\u1ebft ch\u00fang.\u201d</i><br><div style=\"text-align: right;\">(Ho\u00e0ng Ph\u1ee7 Ng\u1ecdc T\u01b0\u1eddng, <i>Th\u00e0nh ph\u1ed1 v\u00e0 chim</i>, theo<i> tapchisonghuong.com.vn</i>)</div>Chi ti\u1ebft n\u00e0o minh ch\u1ee9ng cho l\u1ed1i \u1ee9ng x\u1eed t\u00e0n b\u1ea1o c\u1ee7a con ng\u01b0\u1eddi v\u1edbi thi\u00ean nhi\u00ean?", "answer": "<b>\u0110\u00e1p \u00e1n: C\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>Chi ti\u1ebft \u201cM\u1ed9t g\u00e3 du \u0111\u00e3ng b\u1eafn v\u00e0o l\u0169 chim s\u1ebb tr\u00ean v\u00f2m c\u00e2y long n\u00e3o.\u201d l\u00e0 minh ch\u1ee9ng cho l\u1ed1i \u1ee9ng x\u1eed t\u00e0n b\u1ea1o c\u1ee7a con ng\u01b0\u1eddi v\u1edbi thi\u00ean nhi\u00ean. G\u00e3 du \u0111\u00e3ng \u0111\u00e3 gi\u1ebft h\u1ea1i chim s\u1ebb m\u1ed9t c\u00e1ch t\u00e0n b\u1ea1o, kh\u00f4ng th\u01b0\u01a1ng ti\u1ebfc.\n", "key": "C", "isVideo": true, "score": 0, "order": 11, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605099, "lessonId": 0, "a": "\u201c\u1ee8c Trai thi t\u1eadp\u201d.", "b": "\u201cQu\u1ed1c \u00e2m thi t\u1eadp\u201d.", "c": "\u201cB\u1ea1ch V\u00e2n am thi t\u1eadp\u201d.", "d": "\u201cQu\u00e2n trung t\u1eeb m\u1ec7nh t\u1eadp\u201d.", "bookId": 1088738, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "D\u00f2ng n\u00e0o sau \u0111\u00e2y n\u00eau t\u00ean t\u00e1c ph\u1ea9m <b>kh\u00f4ng </b> u1eb9p. C\u00e1c polymer n\u00e0y c\u00f3 th\u1ec3 ph\u00e2n h\u1ee7y th\u00e0nh \u0111\u01b0\u1eddng v\u00e0 axit amin v\u00f4 h\u1ea1i.<br>N\u0103m 2019, Ana Jaklenec, tr\u01b0\u1edfng nh\u00f3m nghi\u00ean c\u1ee9u t\u1ea1i Vi\u1ec7n Nghi\u00ean c\u1ee9u Ung th\u01b0 T\u00edch h\u1ee3p Koch c\u1ee7a MIT v\u00e0 c\u00e1c c\u1ed9ng s\u1ef1 \u0111\u00e3 t\u00ecm ra m\u1ed9t v\u1eadt li\u1ec7u polymer, \u0111\u01b0\u1ee3c g\u1ecdi l\u00e0 BMC, c\u00f3 th\u1ec3 d\u00f9ng \u0111\u1ec3 b\u1ecdc vitamin A v\u00e0 c\u00e1c ch\u1ea5t dinh d\u01b0\u1ee1ng thi\u1ebft y\u1ebfu kh\u00e1c. H\u1ecd c\u0169ng ph\u00e1t hi\u1ec7n ra nh\u1eefng ng\u01b0\u1eddi \u0103n b\u00e1nh m\u00ec l\u00e0m t\u1eeb b\u1ed9t m\u00ec \u0111\u01b0\u1ee3c b\u1ed5 sung s\u1eaft b\u1ecdc trong polymer c\u00f3 l\u01b0\u1ee3ng s\u1eaft trong c\u01a1 th\u1ec3 t\u0103ng l\u00ean.<br>Tuy nhi\u00ean, BMC l\u1ea1i kh\u00f4ng ph\u00e2n h\u1ee7y \u0111\u01b0\u1ee3c. \u0110\u1ec3 thi\u1ebft k\u1ebf m\u1ed9t v\u1eadt li\u1ec7u thay th\u1ebf th\u00e2n thi\u1ec7n h\u01a1n v\u1edbi m\u00f4i tr\u01b0\u1eddng, nh\u00f3m chuy\u1ec3n sang m\u1ed9t lo\u1ea1i polymer kh\u00e1c l\u00e0 poly (beta-amino esters) c\u00f3 kh\u1ea3 n\u0103ng ph\u00e2n h\u1ee7y sinh h\u1ecdc th\u00e0nh \u0111\u01b0\u1eddng v\u00e0 axit amin.<br>B\u1eb1ng c\u00e1ch thay \u0111\u1ed5i th\u00e0nh ph\u1ea7n c\u1ee7a c\u00e1c kh\u1ed1i x\u00e2y d\u1ef1ng v\u1eadt li\u1ec7u polymer, c\u00e1c nh\u00e0 nghi\u00ean c\u1ee9u c\u00f3 th\u1ec3 \u0111i\u1ec1u ch\u1ec9nh c\u00e1c \u0111\u1eb7c t\u00ednh nh\u01b0 t\u00ednh k\u1ecb n\u01b0\u1edbc, \u0111\u1ed9 b\u1ec1n c\u01a1 h\u1ecdc v\u00e0 \u0111\u1ed9 nh\u1ea1y pH. Sau khi t\u1ea1o ra n\u0103m phi\u00ean b\u1ea3n v\u1eadt li\u1ec7u kh\u00e1c nhau, nh\u00f3m \u0111\u00e3 th\u1eed nghi\u1ec7m v\u00e0 x\u00e1c \u0111\u1ecbnh m\u1ed9t lo\u1ea1i c\u00f3 th\u00e0nh ph\u1ea7n t\u1ed1i \u01b0u cho c\u00e1c \u1ee9ng d\u1ee5ng vi nh\u1ef1a, bao g\u1ed3m kh\u1ea3 n\u0103ng h\u00f2a tan khi ti\u1ebfp x\u00fac v\u1edbi m\u00f4i tr\u01b0\u1eddng axit nh\u01b0 trong d\u1ea1 d\u00e0y.<br>Nh\u00f3m \u0111\u00e3 ch\u1ee9ng minh c\u00e1c h\u1ea1t n\u00e0y c\u00f3 th\u1ec3 b\u1ecdc vitamin A, vitamin D, vitamin E, vitamin C, k\u1ebdm v\u00e0 s\u1eaft - nh\u1eefng ch\u1ea5t dinh d\u01b0\u1ee1ng nh\u1ea1y c\u1ea3m v\u1edbi t\u00e1c \u0111\u1ed9ng c\u1ee7a nhi\u1ec7t v\u00e0 \u00e1nh s\u00e1ng, nh\u01b0ng khi \u0111\u01b0\u1ee3c b\u1ecdc trong c\u00e1c h\u1ea1t, ch\u00fang c\u00f3 th\u1ec3 ch\u1ecbu \u0111\u01b0\u1ee3c nhi\u1ec7t \u0111\u1ed9 s\u00f4i trong hai gi\u1edd.<br>H\u1ecd c\u0169ng ch\u1ec9 ra r\u1eb1ng, ngay c\u1ea3 khi \u0111\u01b0\u1ee3c l\u01b0u tr\u1eef trong s\u00e1u th\u00e1ng \u1edf nhi\u1ec7t \u0111\u1ed9 v\u00e0 \u0111\u1ed9 \u1ea9m cao, h\u01a1n m\u1ed9t n\u1eeda l\u01b0\u1ee3ng vitamin \u0111\u01b0\u1ee3c b\u1ecdc v\u1eabn kh\u00f4ng b\u1ecb ph\u00e1 h\u1ee7y. C\u00e1c nh\u00e0 nghi\u00ean c\u1ee9u c\u00f2n ki\u1ec3m tra t\u00ednh an to\u00e0n c\u1ee7a c\u00e1c h\u1ea1t b\u1eb1ng c\u00e1ch cho ti\u1ebfp x\u00fac v\u1edbi c\u00e1c t\u1ebf b\u00e0o ru\u1ed9t ng\u01b0\u1eddi v\u00e0 \u0111o t\u00e1c \u0111\u1ed9ng c\u1ee7a ch\u00fang l\u00ean t\u1ebf b\u00e0o. \u1ede li\u1ec1u l\u01b0\u1ee3ng \u0111\u01b0\u1ee3c d\u00f9ng \u0111\u1ec3 b\u1ed5 sung cho th\u1ef1c ph\u1ea9m, h\u1ecd kh\u00f4ng nh\u1eadn th\u1ea5y b\u1ea5t k\u00ec t\u1ed5n th\u01b0\u01a1ng n\u00e0o \u0111\u1ed1i v\u1edbi c\u00e1c t\u1ebf b\u00e0o.<br>\u0110\u1ec3 \u0111\u00e1nh gi\u00e1 kh\u1ea3 n\u0103ng thay th\u1ebf h\u1ea1t vi nh\u1ef1a trong c\u00e1c s\u1ea3n ph\u1ea9m l\u00e0m s\u1ea1ch, c\u00e1c nh\u00e0 nghi\u00ean c\u1ee9u \u0111\u00e3 tr\u1ed9n c\u00e1c h\u1ea1t n\u00e0y v\u1edbi ch\u1ea5t t\u1ea1o b\u1ecdt x\u00e0 ph\u00f2ng. K\u1ebft qu\u1ea3, h\u1ed7n h\u1ee3p m\u1edbi c\u00f3 th\u1ec3 x\u00f3a m\u1ef1c t\u1eeb b\u00fat l\u00f4ng d\u1ea7u v\u00e0 b\u00fat k\u1ebb m\u1eaft kh\u00f4ng th\u1ea5m n\u01b0\u1edbc kh\u1ecfi da hi\u1ec7u qu\u1ea3 h\u01a1n x\u00e0 ph\u00f2ng th\u00f4ng th\u01b0\u1eddng.<br>H\u1ecd c\u0169ng ph\u00e1t hi\u1ec7n x\u00e0 ph\u00f2ng tr\u1ed9n v\u1edbi vi nh\u1ef1a hi\u1ec7u qu\u1ea3 h\u01a1n m\u1ed9t lo\u1ea1i ch\u1ea5t t\u1ea9y r\u1eeda ch\u1ee9a vi h\u1ea1t polyethylene. H\u01a1n n\u1eefa, c\u00e1c h\u1ea1t ph\u00e2n h\u1ee7y sinh h\u1ecdc m\u1edbi h\u1ea5p th\u1ee5 t\u1ed1t h\u01a1n c\u00e1c nguy\u00ean t\u1ed1 \u0111\u1ed9c h\u1ea1i ti\u1ec1m t\u00e0ng nh\u01b0 kim lo\u1ea1i n\u1eb7ng.<br>C\u00e1c nh\u00e0 nghi\u00ean c\u1ee9u \u0111ang ti\u1ebfp t\u1ee5c th\u1eed nghi\u1ec7m c\u00e1c vi h\u1ea1t n\u00e0y nh\u01b0 m\u1ed9t ch\u1ea5t t\u1ea9y r\u1eeda v\u00e0 c\u00e1c \u1ee9ng d\u1ee5ng ti\u1ec1m n\u0103ng kh\u00e1c, \u0111\u1ed3ng th\u1eddi l\u00ean k\u1ebf ho\u1ea1ch th\u1ef1c hi\u1ec7n m\u1ed9t th\u1eed nghi\u1ec7m quy m\u00f4 nh\u1ecf tr\u00ean ng\u01b0\u1eddi trong n\u0103m nay. H\u1ecd c\u0169ng \u0111ang thu th\u1eadp d\u1eef li\u1ec7u an to\u00e0n \u0111\u1ec3 n\u1ed9p \u0111\u01a1n xin ph\u00e2n lo\u1ea1i GRAS (\u0111\u01b0\u1ee3c coi l\u00e0 an to\u00e0n) t\u1eeb C\u01a1 quan Qu\u1ea3n l\u00ed Th\u1ef1c ph\u1ea9m v\u00e0 D\u01b0\u1ee3c ph\u1ea9m Hoa K\u1ef3 v\u00e0 l\u00ean k\u1ebf ho\u1ea1ch cho m\u1ed9t th\u1eed nghi\u1ec7m l\u00e2m s\u00e0ng v\u1ec1 th\u1ef1c ph\u1ea9m b\u1ed5 sung c\u00e1c h\u1ea1t n\u00e0y.<br>Nh\u00f3m nghi\u00ean c\u1ee9u hi v\u1ecdng kh\u00e1m ph\u00e1 c\u1ee7a h\u1ecd s\u1ebd gi\u00fap gi\u1ea3m \u0111\u00e1ng k\u1ec3 l\u01b0\u1ee3ng vi nh\u1ef1a th\u1ea3i ra m\u00f4i tr\u01b0\u1eddng t\u1eeb c\u00e1c s\u1ea3n ph\u1ea9m s\u1ee9c kh\u1ecfe v\u00e0 l\u00e0m \u0111\u1eb9p.\u201d<br><div style=\"text-align: right;\">(Nguy\u1ec5n Nam, <i>Ph\u00e1t tri\u1ec3n v\u1eadt li\u1ec7u th\u00e2n thi\u1ec7n v\u1edbi m\u00f4i tr\u01b0\u1eddng \u0111\u1ec3 thay th\u1ebf c\u00e1c h\u1ea1t vi nh\u1ef1a</i>, theo <i>tiasang.com.vn</i>)</div>", "listQuestion": [{"questionId": 21605140, "lessonId": 0, "a": "Vi nh\u1ef1a c\u00f3 trong n\u01b0\u1edbc, th\u1ee9c \u0103n.", "b": "Vi nh\u1ef1a h\u00ecnh th\u00e0nh t\u1eeb ares": 0, "typeId": 0, "questionText": "Th\u00f4ng tin n\u00e0o sau \u0111\u00e2y kh\u1eb3ng \u0111\u1ecbnh t\u00e1c \u0111\u1ed9ng t\u00edch c\u1ef1c t\u1eeb h\u1ea1t vi nh\u1ef1a poly (beta-amino esters) trong c\u00f4ng ngh\u1ec7 s\u1ea3n xu\u1ea5t m\u0129 ph\u1ea9m?", "answer": "<b>\u0110\u00e1p \u00e1n: C\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>Th\u00f4ng tin \u201cgi\u1ea3m \u0111\u00e1ng k\u1ec3 l\u01b0\u1ee3ng vi nh\u1ef1a th\u1ea3i ra m\u00f4i tr\u01b0\u1eddng t\u1eeb c\u00e1c s\u1ea3n ph\u1ea9m s\u1ee9c kh\u1ecfe v\u00e0 l\u00e0m \u0111\u1eb9p\u201d \u0111\u00e3 kh\u1eb3ng \u0111\u1ecbnh t\u00e1c \u0111\u1ed9ng t\u00edch c\u1ef1c t\u1eeb h\u1ea1t vi nh\u1ef1a poly (beta-amino esters) trong c\u00f4ng ngh\u1ec7 s\u1ea3n xu\u1ea5t m\u0129 ph\u1ea9m, gi\u00fap t\u1ea1o ra c\u00e1c lo\u1ea1i m\u0129 ph\u1ea9m th\u00e2n thi\u1ec7n v\u1edbi m\u00f4i tr\u01b0\u1eddng.\n", "key": "C", "isVideo": true, "score": 0, "order": 23, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605147, "lessonId": 0, "a": "B\u1edfi v\u1eady.", "b": "Do \u0111\u00f3.", "c": "Th\u00eam n\u1eefa.", "d": "Song.", "bookId": 1088750, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cTuy nhi\u00ean, BMC l\u1ea1i kh\u00f4ng ph\u00e2n h\u1ee7y \u0111\u01b0\u1ee3c.\u201d<br>T\u1eeb n\u00e0o sau \u0111\u00e2y c\u00f3 th\u1ec3 thay th\u1ebf cho t\u1eeb \u201ctuy nhi\u00ean\u201d m\u00e0 <b>kh\u00f4ng </b>l\u00e0m bi\u1ebfn \u0111\u1ed5i ngh\u0129a c\u1ee7a c\u00e2u tr\u00ean?", "answer": "<b>\u0110\u00e1p \u00e1n: D\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>T\u1eeb \u201csong\u201d t\u01b0\u01a1ng t\u1ef1 v\u1edbi t\u1eeb \u201ctuy nhi\u00ean, c\u00f9ng bi\u1ec3u th\u1ecb m\u1ed1i quan h\u1ec7 t\u01b0\u01a1ng ph\u1ea3n \u0111\u1ed1i l\u1eadp.\n", "key": "D", "isVideo": true, "score": 0, "order": 24, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605151, "lessonId": 0, "a": "\u201cc\u00e1c nh\u00e0 nghi\u00ean c\u1ee9u\u201d.", "b": "\u201cc\u00f3 th\u1ec3 \u0111i\u1ec1u ch\u1ec9nh\u201d.", "c": "\u201cB\u1eb1ng c\u00e1ch thay \u0111\u1ed5i th\u00e0nh ph\u1ea7n c\u1ee7a c\u00e1c kh\u1ed1i x\u00e2y d\u1ef1ng v\u1eadt li\u1ec7u polymer\u201d.", "d": "\u201cc\u00e1c \u0111\u1eb7c t\u00ednh nh\u01b0 t\u00ednh k\u1ecb n\u01b0\u1edbc, \u0111\u1ed9 b\u1ec1n c\u01a1 h\u1ecdc v\u00e0 \u0111\u1ed9 nh\u1ea1y pH\u201d.", "bookId": 1088751, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cB\u1eb1ng c\u00e1ch thay \u0111\u1ed5i th\u00e0nh ph\u1ea7n c\u1ee7a c\u00e1c kh\u1ed1i x\u00e2y d\u1ef1ng v\u1eadt li\u1ec7u polymer, c\u00e1c nh\u00e0 nghi\u00ean c\u1ee9u c\u00f3 th\u1ec3 \u0111i\u1ec1u ch\u1ec9nh c\u00e1c \u0111\u1eb7c t\u00ednh nh\u01b0 t\u00ednh k\u1ecb n\u01b0\u1edbc, \u0111\u1ed9 b\u1ec1n c\u01a1 h\u1ecdc v\u00e0 \u0111\u1ed9 nh\u1ea1y pH.\u201d<br>X\u00e1c \u0111\u1ecbnh th\u00e0nh ph\u1ea7n tr\u1ea1ng ng\u1eef c\u1ee7a c\u00e2u.", "answer": "<b>\u0110\u00e1p \u00e1n: C\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>C\u1ee5m t\u1eeb \u201cB\u1eb1ng c\u00e1ch thay \u0111\u1ed5i th\u00e0nh ph\u1ea7n c\u1ee7a c\u00e1c kh\u1ed1i x\u00e2y d\u1ef1ng v\u1eadt li\u1ec7u polymer\u201d l\u00e0 tr\u1ea1ng ng\u1eef c\u1ee7a c\u00e2u, b\u1ed5 sung th\u00f4ng tin v\u1ec1 c\u00e1ch th\u1ee9c th\u1ef1c hi\u1ec7n h\u00e0nh \u0111\u1ed9ng.\n", "key": "C", "isVideo": true, "score": 0, "order": 25, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 26 \u0111\u1ebfn 30", "content": "\u201cC\u00f2n m\u1ed9t ch\u1eef c\u0169ng \u0111\u1eadp cho tan<br>D\u00f9 m\u1ed9t ch\u1eef c\u0169ng kh\u00f4ng \u0111\u1ec3 s\u00f3t!<br>V\u00f9ng qu\u00ea n\u00e0o c\u00f2n d\u00e2n ca d\u00e2n v\u0169<br>V\u00f9ng qu\u00ea n\u00e0o c\u00f2n th\u1edd c\u00fang H\u00f9ng V\u01b0\u01a1ng<br>V\u00f9ng qu\u00ea n\u00e0o c\u00f2n l\u01b0u truy\u1ec1n ca dao t\u1ee5c ng\u1eef<br>V\u00f9ng qu\u00ea n\u00e0o c\u00f2n k\u1ec3 chuy\u1ec7n S\u01a1n Tinh, Thu\u1ef7 Tinh, Th\u00e1nh Gi\u00f3ng<br>H\u00e3y cho qu\u00e2n tri\u1ec7t h\u1ea1<br>D\u00f9 v\u00f9ng th\u1ea5p v\u00f9ng cao<br>Kinh th\u00e0nh hay x\u00f3m b\u1ea3n<br>Ph\u00e1 thuy\u1ec1n kh\u00f4ng \u0111\u1ec3 v\u00e1n<br>\u0110\u1ed1t di\u1ec1u kh\u00f4ng \u0111\u1ec3 d\u00e2y<br>\u0110\u1ed5 tr\u1ea7u kh\u00f4ng \u0111\u1ec3 khay<br>Nh\u1ed5 c\u1ecf kh\u00f4ng \u0111\u1ec3 r\u1ec5!<br>T\u00e1m m\u01b0\u01a1i v\u1ea1n qu\u00e2n Minh ph\u1ee7 b\u00f3ng m\u00e2y \u0111en<br>Treo c\u00e1i ch\u1ebft tr\u01b0\u1edbc t\u1eebng c\u1ed5ng ng\u00f5<br>C\u00e1i ch\u1ebft \u0111\u1ebfn b\u1eb1ng l\u0169 kh\u00e1t m\u00e1u hai ch\u00e2n<br>C\u00e1i ch\u1ebft \u0111\u1ebfn b\u1eb1ng m\u0169i g\u01b0\u01a1m, m\u0169i gi\u00e1o<br>C\u00e1i ch\u1ebft \u0111\u1ebfn t\u1eeb d\u00e2y th\u1eebng d\u00e2y ch\u00e3o<br>C\u00e1i ch\u1ebft \u0111\u1ebfn t\u1eeb c\u00e1i \u00f4, c\u00e1i m\u0169<br>Ch\u00fang th\u00e8m kh\u00e1t \u0111\u1ea5t \u0111ai<br>Th\u00e8m b\u1ea1c v\u00e0ng ch\u00e2u b\u00e1u<br>Ng\u1ea9ng \u0111\u1ea7u l\u00ean ch\u1ec9 th\u1ea5y m\u00e2y \u0111en<br>M\u00e2y \u0111en \u00f9a v\u00e0o t\u1eebng c\u00e1nh c\u1eeda<br>Ph\u1ee7 l\u00ean t\u1eebng \u00e1nh m\u1eaft<br>Ph\u1ee7 l\u00ean tr\u00ean gi\u1ecdng n\u00f3i ti\u1ebfng c\u01b0\u1eddi<br>Ph\u1ee7 con \u0111\u01b0\u1eddng xu\u1ed1ng s\u00f4ng g\u00e1nh n\u01b0\u1edbc<br>Ph\u1ee7 con \u0111\u01b0\u1eddng g\u00e1nh ban mai ra ch\u1ee3\u201d<br><div style=\"text-align: right;\">(Nguy\u1ec5n Minh Khi\u00eam, <i>L\u00ea L\u1ee3i m\u00e0i g\u01b0\u01a1m</i>,             const container = document.getElementById('exam-content');
            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; // Clear to re-render
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

            let globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                // Render Group Header
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`; // Unique Key for storage
                    const qType = q.normalizedType;
                    
                    // -- Palette Item --
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop
                    palMob.appendChild(palBtn); // Add to Mobile

                    // -- Question Card --
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    // Header: Question Number
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    // Interaction Area
                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // === TYPE 0: MCQ ===
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            // Logic hiển thị kết quả
                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { // Chọn đúng
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { // Đúng nhưng không chọn (hiện đáp án khi nộp)
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { // Chọn sai
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; // Hiện đáp án đúng sau khi nộp dù chưa làm
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // === TYPE 1 & 3: FILL KEY ===
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let inputClass = "w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all font-mono";
                        let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
