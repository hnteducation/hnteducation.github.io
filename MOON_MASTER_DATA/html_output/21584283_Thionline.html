k doesn\u2019t feature is a swimming pool.", "b": "The park features everything, including a swimming pool.", "c": "The park features not only all recreational facilities but also a swimming pool.", "d": "A swimming pool is the only recreational facility featured in the park.", "bookId": 743504, "comments": 0, "bookmarks": 4, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The park features all types of recreational facilities except a swimming pool.", "answer": "<div><b>T\u1ea1m d\u1ecbch:</b> C\u00f4ng vi\u00ean c\u00f3 t\u1ea5t c\u1ea3 c\u00e1c lo\u1ea1i c\u01a1 s\u1edf gi\u1ea3i tr\u00ed ngo\u1ea1i tr\u1eeb h\u1ed3 b\u01a1i.</div><div>A. C\u00f4ng vi\u00ean kh\u00f4ng c\u00f3 h\u1ed3 b\u01a1i.&nbsp;</div><div>\u21d2 \u0110\u00fang ngh\u0129a</div><div>B. C\u00f4ng vi\u00ean c\u00f3 m\u1ecdi th\u1ee9, bao g\u1ed3m c\u1ea3 h\u1ed3 b\u01a1i.</div><div>\u21d2 Sai ngh\u0129a</div><div>C. C\u00f4ng vi\u00ean kh\u00f4ng ch\u1ec9 c\u00f3 t\u1ea5t c\u1ea3 c\u00e1c c\u01a1 s\u1edf gi\u1ea3i tr\u00ed m\u00e0 c\u00f2n c\u00f3 h\u1ed3 b\u01a1i.</div><div>\u21d2 Sai ngh\u0129a</div><div>D. H\u1ed3 b\u01a1i l\u00e0 c\u01a1 s\u1edf gi\u1ea3i tr\u00ed duy nh\u1ea5t c\u00f3 trong c\u00f4ng vi\u00ean</div><div>\u21d2 Sai ngh\u0129a</div>", "key": "A", "isVideo": false, "score": 0, "order": 45, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 46-52: Read the passage carefully.", "content": "1. We're always advised to wash fruits and vegetables thoroughly before consuming them, especially since modern agriculture often relies heavily on pesticides to maintain fresh produce. But even with careful washing, how can we really be sure that our produce is safe and free from these invisible chemicals? It's a question that has puzzled many- and one that a young scientist has set out to solve with an innovative device that detects pesticide residue.<br><br>2. \tFourteen-year-old Sirish Subash from Snellville, Georgia, took first place in the nation's premier middle school science competition, the 3M and Discovery Education Challenge, held in St. Paul, Minnesota. For his invention, Sirish has been recognized as America's Top Young Scientist. Citing data from the Food and Drug Administration (FDA), Sirish demonstrated how 70.6% of produce items contain pesticide residues. These remnants, if consumed by living beings, can lead to serious diseases such as brain cancer, leukemia, Alzheimer's, and Parkinson's disease.<br><br>3.\tUnconvinced that washing alone could remove pesticide residues, Sirish developed PestiSCAND, a device designed to detect <b>lingering</b> pesticides even after produce is washed. PestiSCAND uses a noninvasive technique known as spectrophotometry, which involves shining light onto produce and then analyzing the reflected light with AI to detect any pesticides present.<br><br>4. \tAccording to reports, Sirish invested nearly 11 months in creating this innovative technology. To evaluate PestiSCAND's effectiveness, he tested the AI-powered handheld detector on spinach and tomatoes, achieving an accuracy rate of over 85%. This level of precision met the project's goals for both speed and effectiveness, as confirmed by 3M. The device could be highly beneficial as farmers increasingly rely on chemicals to boost crop production to meet demand.<br><br>5. \tTo use it, users will need to download a phone app, point PestiSCAND at the fruit or vegetable, and tap the scan button. If the scanner detects pesticides, the fruit or vegetable needs more rinsing. The device earned him the 25,000 USD grand prize this year's 3M Young Scientist Challenge, surpassing nine other finalists. While the technology is still in <b>its</b> early stages, Subash eventually hopes to create a version that can detect hundreds of different pesticides and measure the amount remaining after an initial wash, helping users decide if additional rinsing is needed.\n<br><div style=\"text-align: right;\"><i><br>Source: Times of India (https://timesofindia.indiatimes.com</i>)</div>", "listQuestion": [{"questionId": 21584313, "lessonId": 0, "a": "highlight the achievements of a young scientist and his innovative invention", "b": "explain the dangers of pesticide residues on fruits and vegetables", "c": "describe how spectrophotometry is used in pesticide detection", "d": "discuss the process of agricultural pesticide usage and its effects", "bookId": 1086245, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The main purpose of the passage is to _____.", "answer": "<b>C\u00e2u h\u1ecfi: M\u1ee5c \u0111\u00edch ch\u00ednh c\u1ee7a \u0111o\u1ea1n v\u0103n l\u00e0 _____.\n</b><br><b>A.</b> n\u00eau b\u1eadt th\u00e0nh t\u1ef1u c\u1ee7a m\u1ed9t nh\u00e0 khoa h\u1ecdc tr\u1ebb v\u00e0 ph\u00e1t minh s\u00e1ng t\u1ea1o c\u1ee7a c\u1eadu \u1ea5y\n<br><b>B.</b> gi\u1ea3i th\u00edch c\u00e1c m\u1ed1i nguy hi\u1ec3m c\u1ee7a d\u01b0 l\u01b0\u1ee3ng thu\u1ed1c tr\u1eeb s\u00e2u tr\u00ean tr\u00e1i c\u00e2y v\u00e0 rau c\u1ee7\n<br><b>C.</b> m\u00f4 t\u1ea3 c\u00e1ch quang ph\u1ed5 k\u1ebf \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng \u0111\u1ec3 ph\u00e1t hi\u1ec7n thu\u1ed1c tr\u1eeb s\u00e2u\n<br><b>D.</b> th\u1ea3o lu\u1eadn v\u1ec1 quy tr\u00ecnh s\u1eed d\u1ee5ng thu\u1ed1c tr\u1eeb s\u00e2u trong n\u00f4ng nghi\u1ec7p v\u00e0 t\u00e1c \u0111\u1ed9ng c\u1ee7a n\u00f3\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o nh\u1eefng th\u00f4ng tin sau:\n</b><br>+) \"Fourteen-year-old Sirish Subash ... took first place in the nation's premier middle school science competition.\" <br><i>(Sirish Subash, 14 tu\u1ed5i \u0111\u1ebfn t\u1eeb Snellville, Georgia, \u0111\u00e3 gi\u00e0nh gi\u1ea3i nh\u1ea5t trong cu\u1ed9c thi khoa h\u1ecdc c\u1ea5p trung h\u1ecdc c\u01a1 s\u1edf h\u00e0ng \u0111\u1ea7u to\u00e0n qu\u1ed1c)\n</i><br><br>+) \"Sirish developed PestiSCAND, a device designed to detect lingering pesticides even after produce is washed.\" <br><i>(Sirish \u0111\u00e3 ph\u00e1t tri\u1ec3n PestiS CAND, m\u1ed9t thi\u1ebft b\u1ecb \u0111\u01b0\u1ee3c thi\u1ebft k\u1ebf \u0111\u1ec3 ph\u00e1t hi\u1ec7n thu\u1ed1c tr\u1eeb s\u00e2u c\u00f2n s\u00f3t l\u1ea1i ngay c\u1ea3 sau khi s\u1ea3n ph\u1ea9m \u0111\u00e3 \u0111\u01b0\u1ee3c r\u1eeda s\u1ea1ch.)\n<br></i><br>+) \"The device earned him the $25,000 grand prize...\" <br><i>(Thi\u1ebft b\u1ecb n\u00e0y \u0111\u00e3 mang v\u1ec1 cho anh gi\u1ea3i th\u01b0\u1edfng l\u1edbn tr\u1ecb gi\u00e1 25.000 \u0111\u00f4 la\u2026)</i>", "key": "A", "isVideo": false, "score": 0, "order": 46, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21584315, "lessonId": 0, "a": "Sirish Subash won a national science competition", "b": "Sirish cited FDA data about pesticide residues in produce", "c": "70.6% of produce items have been reported to contain pesticide residues", "d": "Sirish's device was able to completely remove pesticide residues", "bookId": 1086246, "comments": 1, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 2, it is NOT mentioned that _____.", "answer": "<b>\u0110o\u1ea1n 2 KH\u00d4NG \u0111\u1ec1 c\u1eadp \u0111\u1ebfn \u0111i\u1ec1u g\u00ec?\n</b><br><b>A.</b> Sirish Subash \u0111\u00e3 chi\u1ebfn th\u1eafng m\u1ed9t cu\u1ed9c thi khoa h\u1ecdc c\u1ea5p qu\u1ed1c gia.\n<br><b>B.</b> Sirish \u0111\u00e3 tr\u00edch d\u1eabn d\u1eef li\u1ec7u t\u1eeb FDA v\u1ec1 d\u01b0 l\u01b0\u1ee3ng thu\u1ed1c tr\u1eeb s\u00e2u trong th\u1ef1c ph\u1ea9m.\n<br><b>C.</b> 70,6% c\u00e1c lo\u1ea1i s\u1ea3n ph\u1ea9m n\u00f4ng nghi\u1ec7p \u0111\u00e3 \u0111\u01b0\u1ee3c b\u00e1o c\u00e1o c\u00f3 ch\u1ee9a d\u01b0 l\u01b0\u1ee3ng thu\u1ed1c tr\u1eeb s\u00e2u.\n<br><b>D.</b> Thi\u1ebft b\u1ecb c\u1ee7a Sirish c\u00f3 th\u1ec3 lo\u1ea1i b\u1ecf ho\u00e0n to\u00e0n d\u01b0 l\u01b0\u1ee3ng thu\u1ed1c tr\u1eeb s\u00e2u.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o nh\u1eefng th\u00f4ng tin sau:\n</b><br><b>\u21d2 Ph\u01b0\u01a1ng \u00e1n A:</b> \u201cFourteen-year-old Sirish Subash from Snellville, Georgia, took first place in the nation's premier middle school science competition, the 3M and Discovery Education Challenge\u2026\u201d <br><i>(Thi\u1ebft b\u1ecb n\u00e0y \u0111\u00e3 mang v\u1ec1 cho c\u1eadu gi\u1ea3i th\u01b0\u1edfng \u201cSirish Subash, 14 tu\u1ed5i \u0111\u1ebfn t\u1eeb Snellville, Georgia, \u0111\u00e3 gi\u00e0nh gi\u1ea3i nh\u1ea5t trong cu\u1ed9c thi khoa h\u1ecdc d\u00e0nh cho h\u1ecdc sinh trung h\u1ecdc c\u01a1 s\u1edf h\u00e0ng \u0111\u1ea7u qu\u1ed1c gia, 3M v\u00e0 Discovery Education Challenge\u2026\u201d gi\u1ea3i th\u01b0\u1edfng l\u1edbn tr\u1ecb gi\u00e1 25.000 \u0111\u00f4 la\u2026)\n</i><br><br><b>\u21d2 Ph\u01b0\u01a1ng \u00e1n B, C:</b> \u201cCiting data from the Food and Drug Administration (FDA), Sirish demonstrated how 70.6% of produce items contain pesticide residues.\u201d <br><i>(D\u1eabn ch\u1ee9ng d\u1eef li\u1ec7u t\u1eeb C\u1ee5c Qu\u1ea3n l\u00fd Th\u1ef1c ph\u1ea9m v\u00e0 D\u01b0\u1ee3c ph\u1ea9m (FDA), Sirish ch\u1ee9ng minh 70,6% s\u1ea3n ph\u1ea9m n\u00f4ng s\u1ea3n c\u00f3 ch\u1ee9a d\u01b0 l\u01b0\u1ee3ng thu\u1ed1c tr\u1eeb s\u00e2u.)</i>", "key": "A", "isVideo": false, "score": 0, "order": 47, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21584321, "lessonId": 0, "a": "persistent", "b": "negligible", "c": "immediate", "d": "accidental", "bookId": 1086247, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 3, the word <b>lingering </b>could best be replaced by ______.", "answer": "<div><b>C\u00e2u h\u1ecfi: Trong \u0111o\u1ea1n 3, t\u1eeb \"lingering\" c\u00f3 th\u1ec3 \u0111\u01b0\u1ee3c thay th\u1ebf t\u1e ssential. Poaching and the illegal sale of wildlife products, such as ivory and rhino horn, have driven some species to the brink of extinction. International agreements, like the Convention on International Trade in Endangered Species of Wild Fauna and Flora (CITES), aim to curb this practice by regulating the global trade of wildlife and their products. Additionally, many countries have established strict laws and penalties to <b>deter </b>poaching and trafficking.<br>5. One of the more recent approaches to conservation is the use of technology. Drones, camera traps, and satellite tracking systems are being deployed to monitor wildlife populations and poaching activity in real time. For instance, drones are being used in African savannas to monitor herds of elephants and spot potential poaching threats. Camera traps allow scientists to observe elusive species in remote areas, providing valuable data on their behavior and population sizes.<br><div style=\"text-align: right;\"><i>(Adapted from The real Ielts)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21584338, "lessonId": 0, "a": "Modern Solutions for Biodiversity Loss", "b": "Strategies for Global Wildlife Conservation", "c": "Technology's Role in Preserving Wildlife", "d": "Habitat Restoration: A New Frontier in Conservation", "bookId": 1086252, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title of the passage could be _______.", "answer": "<b>Ti\u00eau \u0111\u1ec1 ph\u00f9 h\u1ee3p nh\u1ea5t cho b\u00e0i \u0111\u1ecdc l\u00e0 ______.\n</b><br><b>A. </b>C\u00e1c gi\u1ea3i ph\u00e1p hi\u1ec7n \u0111\u1ea1i \u0111\u1ec3 gi\u1ea3m thi\u1ec3u s\u1ef1 m\u1ea5t \u0111a d\u1ea1ng sinh h\u1ecdc\n<br><b>B.</b> C\u00e1c chi\u1ebfn l\u01b0\u1ee3c b\u1ea3o t\u1ed3n \u0111\u1ed9ng v\u1eadt hoang d\u00e3 tr\u00ean to\u00e0n th\u1ebf gi\u1edbi\n<br><b>C.</b> Vai tr\u00f2 c\u1ee7a c\u00f4ng ngh\u1ec7 trong                         const chars = userVal.split('');
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let boxesHtml = '<div class="flex gap-2 justify-start items-center">';
                        for(let i=0; i<4; i++) {
                            const char = chars[i] || '';
                            boxesHtml += `<input type="text" maxlength="1" 
                                class="char-input" 
                                data-index="${i}" 
                                data-key="${qKey}" 
                                value="${char}" 
                                readonly 
                                onclick="activateNumpad(this, '${qKey}')"
                                ${isSubmitted ? 'disabled' : ''} 
                            />`;
                        }
                        
                        if(examMode === 'practice' && !isSubmitted) {
                             boxesHtml += `<button onclick="checkFillAnswer('${qKey}')" class="ml-2 px-3 py-2 bg-blue-100 text-blue-700 font-bold rounded-lg text-sm hover:bg-blue-200 transition-colors">Kiểm tra</button>`;
                             // Nút xem lời giải cho practice
                             boxesHtml += `<button onclick="toggleSolution('${qKey}')" class="ml-2 px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button>`;
                        }
                        boxesHtml += '</div>';

                        let feedbackHtml = "";
                        if(isSubmitted) {
                             const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                             if(isCorrect) {
                                feedbackHtml = `<div class="mt-2 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                             } else {
                                feedbackHtml = `<div class="mt-2 text-red-600 text-sm">✗ Sai. Đáp án: <span class="font-bold">${correctVal}</span></div>`;
                             }
                        } else if (examMode === 'practice') {
                             feedbackHtml = `<div id="feedback-${qKey}" class="mt-2 text-sm font-bold hidden"></div>`;
                        }

                        html += `
                        <div class="flex flex-col relative">
                            ${boxesHtml}
                            ${feedbackHtml}
                        </div>`;
                    }

                    // TYPE 2: TRUE/FALSE
                    else if(qType === '2') {
                         html += `<div class="overflow-hidden border rounded-lg">
                            <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                                <tr>
                                    <th scope="col" class="px-3 py-3 w-10 text-center">Ý</th>
                                    <th scope="col" class="px-3 py-3">Nội dung</th>
                                    <th scope="col" class="px-3 py-3 w-32 text-center">Chọn Đ/S</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; 
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; 
                                const userChoice = userObj[pIdx]; 
                                
                                let trClass = "bg-white hover:bg-gray-50";
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) trClass = "bg-green-50";
                                    else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
