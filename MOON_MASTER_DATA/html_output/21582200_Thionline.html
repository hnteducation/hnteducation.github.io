", "bookId": 290301, "comments": 16, "bookmarks": 19, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The new law <u>requires that</u> everyone <u>has</u> <u>his</u> car <u>checked</u> at least twice a month.", "answer": "<b><i>Ki\u1ebfn th\u1ee9c v\u1ec1 c\u00e2u gi\u1ea3 \u0111\u1ecbnh</i></b><br><b>require that + S + V (bare-infinitive) <br></b> \"has\" (B) sai v\u00ec \u0111\u1ed9ng t\u1eeb trong m\u1ec7nh \u0111\u1ec1 gi\u1ea3 \u0111\u1ecbnh ph\u1ea3i \u1edf d\u1ea1ng nguy\u00ean m\u1eabu (bare infinitive).<br>\u21d2 <b>S\u1eeda l\u1ed7i</b>: <b>has \u21d2 have</b><br><b>T\u1ea1m d\u1ecbch:</b> Lu\u1eadt m\u1edbi y\u00eau c\u1ea7u m\u1ecdi ng\u01b0\u1eddi ph\u1ea3i ki\u1ec3m tra xe \u00edt nh\u1ea5t hai l\u1ea7n m\u1ed9t th\u00e1ng.", "key": "B", "isVideo": true, "score": 0, "order": 37, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19871990, "lessonId": 0, "a": "With", "b": "approaching", "c": "the", "d": "to be finalized", "bookId": 743889, "comments": 3, "bookmarks": 8, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<u>With</u> the deadline <u>approaching</u>, I need to get <u>the</u> reports <u>to be finalized</u> by tomorrow afternoon.", "answer": "<div><b>Ki\u1ebfn th\u1ee9c v\u1ec1 c\u1ea5u tr\u00fac \u201cget sth done\u201d</b></div><div>- Ta c\u00f3 c\u1ea5u tr\u00fac \u201c<b>S + have/get + something done</b>\u201d: nh\u1edd, thu\u00ea, y\u00eau c\u1ea7u ai \u0111\u00f3 l\u00e0m g\u00ec.</div><div>\u21d2D\u1ef1a v\u00e0o c\u1ea5u tr\u00fac, ta ph\u1ea3i s\u1eeda \u201c<b>to be finalized</b>\u201d th\u00e0nh \u201c<b>finalized</b>\u201d</div><div><b>T\u1ea1m d\u1ecbch</b>: Do th\u1eddi h\u1ea1n n\u1ed9p \u0111ang \u0111\u1ebfn g\u1ea7n, t\u00f4i c\u1ea7n ph\u1ea3i ho\u00e0n thi\u1ec7n b\u00e1o c\u00e1o v\u00e0o chi\u1ec1u mai.</div><div>\u21d2 Do \u0111\u00f3, D l\u00e0 \u0111\u00e1p \u00e1n ch\u00ednh x\u00e1c.&nbsp;</div>", "key": "D", "isVideo": true, "score": 0, "order": 38, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10469547, "lessonId": 0, "a": "along", "b": "are", "c": "among", "d": "tourist destinations.", "bookId": 290317, "comments": 0, "bookmarks": 24, "likes": 0, "shares": 0, "typeId": 0, "questionText": "California, <u>along</u>with Florida and Hawaii, <u>are</u> <u>among</u> the most popular US <u>tourist destinations</u>.", "answer": "<b><i>Ki\u1ebfn th\u1ee9c v\u1ec1 S\u1ef1 h\u00f2a h\u1ee3p gi\u1eefa ch\u1ee7 ng\u1eef v\u00e0 \u0111\u1ed9ng t\u1eeb</i></b><br>C\u00e1c danh t\u1eeb n\u1ed1i nhau b\u1eb1ng: as well as, with, together with, <b>along with</b>, accompanied by  th\u00ec chia \u0111\u1ed9ng t\u1eeb theo danh t\u00ect ph\u00eda tr\u01b0\u1edbc.<br>\u21d2 \u0110\u1ed9ng t\u1eeb ch\u00ednh trong c\u00e2u ph\u1ea3i chia h\u00f2a h\u1ee3p v\u1edbi danh t\u1eeb tr\u01b0\u1edbc  \u201calong with\u201d l\u00e0 \u201cCalifornia\u201d.<br>S\u1eeda l\u1ed7i: <b>are \u21d2 is</b><br><b>T\u1ea1m d\u1ecbch:</b> California, c\u00f9ng v\u1edbi Florida v\u00e0 Hawaii, l\u00e0 m\u1ed9t trong nh\u1eefng \u0111i\u1ec3m \u0111\u1ebfn du l\u1ecbch n\u1ed5i ti\u1ebfng nh\u1ea5t n\u01b0\u1edbc M\u1ef9", "key": "B", "isVideo": true, "score": 0, "order": 39, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10469965, "lessonId": 0, "a": "was traveling", "b": "the", "c": "crashed", "d": "a", "bookId": 290179, "comments": 0, "bookmarks": 5, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Last summer, John <u>was traveling</u> to Manchester by <u>the</u> car when he <u>crashed</u> the car into <u>a</u> tree.", "answer": "<b><i>Ki\u1ebfn th\u1ee9c v\u1ec1 m\u1ea1o t\u1eeb </i><br></b>Khi n\u00f3i v\u1ec1 \u0111i b\u1eb1ng ph\u01b0\u01a1ng ti\u1ec7n g\u00ec, ta kh\u00f4ng th\u00eam \u201cthe\u201d: <b>by bus, by car, by taxi,...</b><br>\u21d2 S\u1eeda l\u1ed7i: by the car \u21d2 by car<br><b>T\u1ea1m d\u1ecbch: </b>M\u00f9a h\u00e8 n\u0103m ngo\u00e1i, John \u0111ang \u0111i \u00f4 t\u00f4 \u0111\u1ebfn Manchester th\u00ec xe anh \u1ea5y \u0111\u00e2m v\u00e0o m\u1ed9t c\u00e1i c\u00e2y.", "key": "B", "isVideo": true, "score": 0, "order": 40, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 41-45: Which of the following best restates each of the given sentences? ", "content": "", "listQuestion": [{"questionId": 19871672, "lessonId": 0, "a": "Typhoon Yagi must have been very bad, or else all the flights wouldn\u2019t have been cancelled.", "b": "It\u2019s certainly due to Typhoon Yagi that has caused all the flights to be cancelled.", "c": "Typhoon Yagi can be an obvious reason for the current cancellation of all the flights.", "d": "It\u2019s certainly Typhoon Yagi which had resulted in all the flights\u2019 cancellation.", "bookId": 743856, "comments": 0, "bookmarks": 5, "likes": 0, "shares": 0, "typeId": 0, "questionText": "It\u2019s certain that all the flights have been cancelled because of Typhoon Yagi.", "answer": "<div><b>Ki\u1ebfn th\u1ee9c v\u1ec1 di\u1ec5n \u0111\u1ea1t c\u00e2u - c\u00e2u \u0111\u1ed3ng ngh\u0129a</b></div><div><b>T\u1ea1m d\u1ecbch c\u00e2u g\u1ed1c</b>: Ch\u1eafc ch\u1eafn r\u1eb1ng t\u1ea5t c\u1ea3 c\u00e1c chuy\u1ebfn bay \u0111\u00e3 b\u1ecb h\u1ee7y v\u00ec c\u01a1n b\u00e3o Yagi.</div><div><b>- X\u00e9t 4 \u0111\u00e1p \u00e1n:&nbsp;</b></div><div>A. Typhoon Yagi must have been very bad, or else all the flights wouldn\u2019t have been cancelled.</div><div><i>(B\u00e3o Yagi ch\u1eafc h\u1eb3n r\u1ea5t kh\u1ee7ng khi\u1ebfp, n\u1ebfu kh\u00f4ng th\u00ec t\u1ea5t c\u1ea3 c\u00e1c chuy\u1ebfn bay \u0111\u00e3 kh\u00f4ng b\u1ecb h\u1ee7y.)</i></div><div>\u21d2<b>Sai ngh\u0129a</b> v\u00ec \u0111\u00e3 l\u00e0m thay \u0111\u1ed5i \u00fd ngh\u0129a c\u1ee7a c\u00e2u g\u1ed1c, chuy\u1ec3n t\u1eeb nguy\u00ean nh\u00e2n ch\u1eafc ch\u1eafn sang gi\u1ea3 \u0111\u1ecbnh. Ta c\u00f3 c\u1ea5u tr\u00fac: <b>S + must have P2</b>: d\u00f9ng di\u1ec5n \u0111\u1ea1t s\u1ef1 suy lu\u1eadn logic trong qu\u00e1 kh\u1ee9.</div><div>B. It\u2019s certainly due to Typhoon Yagi that has caused all the flights to be cancelled.</div><div><i>(Ch\u1eafc ch\u1eafn l\u00e0 do c\u01a1n b\u00e3o Yagi \u0111\u00e3 khi\u1ebfn t\u1ea5t c\u1ea3 c\u00e1c chuy\u1ebfn bay b\u1ecb h\u1ee7y.)</i></div><div>\u21d2 <b>C\u00e2u n\u00e0y \u0111\u00fang</b> v\u00ec \"<b>due to Typhoon Yagi</b>\" t\u01b0\u01a1ng \u0111\u01b0\u01a1ng v\u1edbi \"<b>because of Typhoon Yagi</b>\" trong c\u00e2u g\u1ed1c. C\u1ea5u tr\u00fac, \"<b>It\u2019s certainly... that has caused...</b>\" gi\u1eef nguy\u00ean \u00fd ngh\u0129a ch\u1eafc ch\u1eafn t\u1eeb c\u00e2u g\u1ed1c.</div><div>C. Typhoon Yagi can be an obvious reason for the current cancellation of all the flights.</div><div><i>(B\u00e3o Yagi c\u00f3 th\u1ec3 l\u00e0 l\u00fd do r\u00f5 r\u00e0ng cho vi\u1ec7c h\u1ee7y b\u1ecf t\u1ea5t c\u1ea3 c\u00e1c chuy\u1ebfn bay hi\u1ec7n nay.)</i></div><div>\u21d2 <b>C\u00e2u n\u00e0y sai</b> v\u00ec c\u1ee5m \"<b>can be</b>\" ch\u1ec9 kh\u1ea3 n\u0103ng, kh\u00f4ng di\u1ec5n \u0111\u1ea1t s\u1ef1 ch\u1eafc ch\u1eafn nh\u01b0 \"<b>It\u2019s certain</b>\" trong c\u00e2u g\u1ed1c.</div><div>D. It\u2019s certainly Typhoon Yagi which had resulted in all the flights\u2019 cancellation.</div><div><i>(Ch\u1eafc ch\u1eafn l\u00e0 c\u01a1n b\u00e3o Yagi \u0111\u00e3 khi\u1ebfn t\u1ea5t c\u1ea3 c\u00e1c chuy\u1ebfn bay b\u1ecb h\u1ee7y)</i></div><div>\u21d2 <b>C\u00e2u n\u00e0y sai</b> v\u00ec c\u1ee5m \u201c<b>had resulted</b>\" s\u1eed d\u1ee5ng th\u00ec qu\u00e1 kh\u1ee9 ho\u00e0n th\u00e0nh, kh\u00f4ng ph\u00f9 h\u1ee3p v\u00ec n c\u00e0ng t\u1ed1n nhi\u1ec1u x\u0103ng.", "key": "A", "isVideo": true, "score": 0, "order": 42, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10469673, "lessonId": 0, "a": "I used to take the bus to come back to my hometown within an hour.", "b": "I usually spend one hour to take the bus to come back to my hometown.", "c": "I get used to spending up to an hour to coming back to my hometown by bus.", "d": "An hour is the length of time for me to come back to my hometown by bus.", "bookId": 290385, "comments": 9, "bookmarks": 29, "likes": 0, "shares": 0, "typeId": 0, "questionText": "It usually takes me an hour to take the bus to come back to my hometown.", "answer": "<b>T\u1ea1m d\u1ecbch:</b> T\u00f4i th\u01b0\u1eddng m\u1ea5t m\u1ed9t gi\u1edd \u0111\u1ec3 b\u1eaft xe bu\u00fdt v\u1ec1 qu\u00ea.<br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:</b><br>A. T\u00f4i \u0111\u00e3 t\u1eebng b\u1eaft xe bu\u00fdt \u0111\u1ec3 v\u1ec1 qu\u00ea trong v\u00f2ng m\u1ed9t gi\u1edd.<br>\u21d2 Sai v\u1ec1 th\u00ec. Ta c\u00f3 <b>used to V</b> \u0111\u1ec3 n\u00f3i v\u1ec1 1 th\u00f3i quen, tr\u1ea1ng th\u00e1i, s\u1ef1 ki\u1ec7n \u0111\u00e3 t\u1eebng x\u1ea3y ra trong qu\u00e1 kh\u1ee9 nh\u01b0ng \u0111\u00e3 ch\u1ea5m d\u1ee9t v\u00e0 kh\u00f4ng c\u00f2n \u0111\u00fang \u1edf hi\u1ec7n t\u1ea1i n\u1eefa <br>B. T\u00f4i th\u01b0\u1eddng d\u00e0nh m\u1ed9t gi\u1edd \u0111\u1ec3 b\u1eaft xe bu\u00fdt v\u1ec1 qu\u00ea.<br>\u21d2 Sai \u1edf gi\u1edbi t\u1eeb \u201cto\u201d. Ta c\u00f3: <b>spend time doing something</b>: s\u1eed d\u1ee5ng th\u1eddi gian cho vi\u1ec7c g\u00ec \u0111\u00f3<br>C. T\u00f4i \u0111\u00e3 quen v\u1edbi vi\u1ec7c d\u00e0nh t\u1edbi m\u1ed9t gi\u1edd \u0111\u1ec3 v\u1ec1 qu\u00ea b\u1eb1ng xe bu\u00fdt.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang. Ta c\u00f3: <b>get used to V-ing</b>: d\u1ea7n quen v\u1edbi vi\u1ec7c g\u00ec.<br>D. M\u1ed9t gi\u1edd l\u00e0 kho\u1ea3ng th\u1eddi gian \u0111\u1ec3 t\u00f4i v\u1ec1 qu\u00ea b\u1eb1ng xe bu\u00fdt.<br>\u21d2 Kh\u00f4ng d\u00f9ng c\u00e1ch di\u1ec5n \u0111\u1ea1t nh\u01b0 n\u00e0y", "key": "C", "isVideo": true, "score": 0, "order": 43, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19873109, "lessonId": 0, "a": "It is believed that water pollution is mainly to blame for industrial waste.", "b": "It is believed that industrial waste is held responsible for water pollution.", "c": "Industrial waste is believed to result from water pollution.", "d": "Industrial waste is believed to have caused high levels of water pollution.", "bookId": 745995, "comments": 0, "bookmarks": 9, "likes": 0, "shares": 0, "typeId": 0, "questionText": "They believe that industrial waste is the major cause of water pollution.", "answer": "<b>C\u00e2u g\u1ed1c:&nbsp;</b>H\u1ecd tin r\u1eb1ng ch\u1ea5t th\u1ea3i c\u00f4ng nghi\u1ec7p l\u00e0 nguy\u00ean nh\u00e2n ch\u00ednh g\u00e2y \u00f4 nhi\u1ec5m n\u01b0\u1edbc.<br>A.&nbsp;Ng\u01b0\u1eddi ta tin r\u1eb1ng \u00f4 nhi\u1ec5m n\u01b0\u1edbc ch\u1ee7 y\u1ebfu l\u00e0 nguy\u00ean nh\u00e2n g\u00e2y ra ch\u1ea5t th\u1ea3i c\u00f4ng nghi\u1ec7p. =&gt; Sai v\u00ec ng\u01b0\u1ee3c ngh\u0129a so v\u1edbi c\u00e2u g\u1ed1c<br><br>B.&nbsp;Ng\u01b0\u1eddi ta tin r\u1eb1ng ch\u1ea5t th\u1ea3i c\u00f4ng nghi\u1ec7p b\u1ecb coi l\u00e0 nguy\u00ean nh\u00e2n g\u00e2y \u00f4 nhi\u1ec5m n\u01b0\u1edbc =&gt; \u0110\u00fang<br><br>C.&nbsp;Ng\u01b0\u1eddi ta tin r\u1eb1ng ch\u1ea5t th\u1ea3i c\u00f4ng nghi\u1ec7p l\u00e0 k\u1ebft qu\u1ea3 c\u1ee7a \u00f4 nhi\u1ec5m n\u01b0\u1edbc. =&gt; Sai v\u00ec ng\u01b0\u1ee3c ngh\u0129a so v\u1edbi c\u00e2u g\u1ed1c<br><br>D.&nbsp;Ng\u01b0\u1eddi ta tin r\u1eb1ng ch\u1ea5t th\u1ea3i c\u00f4ng nghi\u1ec7p \u0111\u00e3 g\u00e2y ra m\u1ee9c \u0111\u1ed9 \u00f4 nhi\u1ec5m n\u01b0\u1edbc cao =&gt; Sai v\u00ec c\u00e2u g\u1ed1c kh\u00f4ng n\u00f3i m\u1ee9c \u0111\u1ed9 \u00f4 nhi\u1ec5m c\u1ee7a n\u01b0\u1edbc<br>=&gt; \u0110\u00e1p \u00e1n B<br><i>- <b>blame for sth:</b> ch\u1ecbu tr\u00e1ch nhi\u1ec7m cho \u0111i\u1ec1u g\u00ec<br>-&nbsp;<strong data-start=\"1310\" data-end=\"1341\">be held responsible for sth</strong>: b\u1ecb coi l\u00e0 nguy\u00ean nh\u00e2n/g\u00e1nh tr\u00e1ch nhi\u1ec7m v\u1ec1 \u0111i\u1ec1u g\u00ec<br>-&nbsp;<strong data-start=\"1473\" data-end=\"1492\">result from sth</strong>: l\u00e0 k\u1ebft qu\u1ea3 c\u1ee7a \u0111i\u1ec1u g\u00ec</i><br>", "key": "B", "isVideo": true, "score": 0, "order": 44, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19872341, "lessonId": 0, "a": "No other class I have taken was as tough nor as fascinating as public speaking.", "b": "No other class I have taken was harder nor less fun than public speaking.", "c": "All of the classes I have taken are more difficult and fascinating than public speaking.", "d": "All of the classes I have taken are easier than and as fun as public speaking.", "bookId": 743922, "comments": 1, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Of all the classes I have attended, public speaking is the hardest but most fun.", "answer": "<b>C\u00e2u g\u1ed1c:&nbsp;</b>Trong t\u1ea5t c\u1ea3 c\u00e1c l\u1edbp h\u1ecdc m\u00e0 t\u00f4i \u0111\u00e3 tham gia, m\u00f4n n\u00f3i tr\u01b0\u1edbc c\u00f4ng ch\u00fang l\u00e0 kh\u00f3 nh\u1ea5t nh\u01b0ng c\u0169ng th\u00fa v\u1ecb nh\u1ea5t.<br>A.&nbsp;Kh\u00f4ng c\u00f3 l\u1edbp h\u1ecdc n\u00e0o t\u00f4i \u0111\u00e3 tham gia kh\u00f3 kh\u0103n ho\u1eb7c th\u00fa v\u1ecb nh\u01b0 m\u00f4n n\u00f3i tr\u01b0\u1edbc c\u00f4ng ch\u00fang =&gt; \u0110\u00fang<br><br>B.&nbsp;Kh\u00f4ng c\u00f3 l\u1edbp h\u1ecdc n\u00e0o t\u00f4i \u0111\u00e3 tham gia kh\u00f3 h\u01a1n ho\u1eb7c k\u00e9m th\u00fa v\u1ecb h\u01a1n m\u00f4n n\u00f3i tr\u01b0\u1edbc c\u00f4ng ch\u00fang. =&gt; Sai ngh\u0129a<br><br>C.&nbsp;T\u1ea5t c\u1ea3 c\u00e1c l\u1edbp h\u1ecdc t\u00f4i \u0111\u00e3 tham gia \u0111\u1ec1u kh\u00f3 h\u01a1n v\u00e0 th\u00fa v\u1ecb h\u01a1n m\u00f4n n\u00f3i tr\u01b0\u1edbc c\u00f4ng ch\u00fang. =&gt; Sai ngh\u0129a<br><br>D.&nbsp;T\u1ea5t c\u1ea3 c\u00e1c l\u1edbp h\u1ecdc t\u00f4i \u0111\u00e3 tham gia \u0111\u1ec1u d\u1ec5 h\u01a1n v\u00e0 c\u0169ng th\u00fa v\u1ecb nh\u01b0 m\u00f4n n\u00f3i tr\u01b0\u1edbc c\u00f4ng ch\u00fang. =&gt; Sai ngh\u0129a<br>=&gt; \u0110\u00e1p \u00e1n A", "key": "A", "isVideo": false, "score": 0, "order": 45, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 46-52: Read the passage carefully.", "content": "1. Green-space facilities are contributing to an important extent to the quality of the urban environment. Fortunately, it is no longer necessary that every lecture or every book about this subject has to start with the proof of this idea. At present, it is generally accepted, although more as a self-evident statement than on the basis of a closely-reasoned scientific proof. The recognition of the importance of green- spaces in the urban environment is a first step on the right way; this does not mean, however, that sufficient details are known about the functions of green- space in towns and about the way in which the inhabitants are using these spaces. As to this rather complex subject I shall, within the scope of this lecture, enter into one aspect only, namely the recreational function of green-space facilities.<br>2. The theoretical separation of living, working, traffic, and recreation which for many years has been used in town-and-country planning, has in my opinion resulted in <b>disproportionate </b>attention for forms of recreation far from home, whereas there was relatively little attention for improvement of recreational possibilities in the direct neighborhood of the home. We have come to the conclusion that <b>this</b> is not right, because an important part of the time which we do not spend sleeping or working, is used for activities at and around the home. So it is obvious that recreation in the open air has to begin at the street door of the house.<br>3. The urban environment has to offer as many recreational activities as possible, and the design of these has to be such that more obligatory activities can also have a recreational aspect. The very best standard of living is nothing if it is not possible to take a pleasant walk in the district, if the children cannot be allowed to play in the streets, because the risks of traffic are too great if during shopping you can nowhere find a spot for enjoying for a moment the nice weather, in short, if you only feel yourself at home after the street-door of your house is closed after you.<br><div style=\"text-align: right;\"><i>(Source: http://www.jiandati.com/q/4bBbbB)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21582230, "lessonId": 0, "a": "high quality of life leads to the development of recreational activities", "b": "more attention should be paid for developing forms of recreation near home", "c": "priority must be given to the development of obligatory activities", "d": "green-space facilities should be better exploited to improve the quality of life", "bookId": 1086065, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The main idea of this passage is that ___________.", "answer": "<b>\u00dd ch\u00ednh c\u1ee7a \u0111o\u1ea1n v\u0103n n\u00e0y l\u00e0 g\u00ec?\n</b><br><b>A.</b> Ch\u1ea5t l\u01b0\u1ee3ng s\u1ed1ng cao d\u1eabn \u0111\u1ebfn s\u1ef1 ph\u00e1t tri\u1ec3n c\u1ee7a c\u00e1c ho\u1ea1t \u0111\u1ed9ng gi\u1ea3i tr\u00ed. <br><b>=&gt; Sai.</b>&nbsp;V\u00ec m\u1eb7c d\u00f9 b\u00e0i vi\u1ebft c\u00f3 nh\u1eafc \u0111\u1ebfn c\u00e1c ho\u1ea1t \u0111\u1ed9ng gi\u1ea3i tr\u00ed, nh\u01b0ng kh\u00f4ng c\u00f3 s\u1ef1 li\u00ean k\u1ebft tr\u1ef1c ti\u1ebfp gi\u1eefa ch\u1ea5t l\u01b0\u1ee3ng s\u1ed1ng cao v\u00e0 s\u1ef1 ph\u00e1t tri\u1ec3n c\u1ee7a c\u00e1c ho\u1ea1t \u0111\u1ed9ng gi\u1ea3i tr\u00ed\n\n<br><br><b>B.</b> C\u1ea7n ch\u00fa \u00fd h\u01a1n \u0111\u1ebfn vi\u1ec7c ph\u00e1t tri\u1ec3n c\u00e1c h\u00ecnh th\u1ee9c gi\u1ea3i tr\u00ed g\u1ea7n nh\u00e0. <br><b>=&gt; Sai.</b> \u0110\u00e1p \u00e1n n\u00e0y ch\u1ec9 \u0111\u00fang m\u1ed9t ph\u1ea7n v\u00ec \u0111o\u1ea1n v\u0103n c\u00f3 nh\u1eafc \u0111\u1ebfn vi\u1ec7c c\u1ea7n ch\u00fa \u00fd h\u01a1n \u0111\u1ebfn c\u00e1c ho\u1ea1t \u0111\u1ed9ng gi\u1ea3i tr\u00ed g\u1ea7n nh\u00e0 (\u0111o\u1ea1n 2)\n\n<br><br><b>C.</b> C\u1ea7n \u01b0u ti\u00ean ph\u00e1t tri\u1ec3n c\u00e1c ho\u1ea1t \u0111\u1ed9ng b\u1eaft bu\u1ed9c. <br><b>=&gt; Sai.</b> B\u00e0i vi\u1ebft kh\u00f4ng n\u00f3i v\u1ec1 vi\u1ec7c \u01b0u ti\u00ean c\u00e1c ho\u1ea1t \u0111\u1ed9ng b\u1eaft bu\u1ed9c, m\u00e0 v\u1ec1 vi\u1ec7c l\u00e0m th\u1ebf n\u00e0o \u0111\u1ec3 c\u00e1c c\u01a1 h\u1ed9i gi\u1ea3i tr\u00ed g\u1ea7n nh\u00e0 c\u00f3 th\u1ec3 ph\u00e1t tri\u1ec3n v\u00e0 mang l\u1ea1i l\u1ee3i \u00edch cho ch\u1ea5t l\u01b0\u1ee3ng s\u1ed1ng\n\n<br><br><b>D.</b> C\u1ea7n khai th\u00e1c t\u1ed1t c\u00e1c c\u01a1 s\u1edf kh\u00f4ng gian xanh \u0111\u1ec3 c\u1ea3i thi\u1ec7n ch\u1ea5t l\u01b0\u1ee3ng cu\u1ed9c s\u1ed1ng. <br><b>=&gt; \u0110\u00fang.</b>", "key": "D", "isVideo": false, "score": 0, "order": 46, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582232, "lessonId": 0, "a": "is usually ignored", "b": "remains unknown", "c": "is partially recognized", "d": "has been fully recognized", "bookId": 1086066, "comments": 0, "bookma is far from home.", "c": "Relatively little attention for recreational possibilities.", "d": "The improvement of recreational possibilities in the neighborhood.", "bookId": 1086068, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 2, what can the theoretical separation of living, working, traffic, and recreation lead to?", "answer": "<b>Theo \u0111o\u1ea1n 2, s\u1ef1 ph\u00e2n chia l\u00fd thuy\u1ebft gi\u1eefa s\u1ed1ng, l\u00e0m vi\u1ec7c, giao th\u00f4ng v\u00e0 gi\u1ea3i tr\u00ed c\u00f3 th\u1ec3 d\u1eabn \u0111\u1ebfn?\n</b><br><b>A.</b> S\u1ef1 m\u1ea5t c\u00e2n \u0111\u1ed1i trong c\u00e1c c\u01a1 s\u1edf gi\u1ea3i tr\u00ed trong khu v\u1ef1c.\n<br><b>B.</b> C\u00e1c c\u01a1 s\u1edf gi\u1ea3i tr\u00ed xa nh\u00e0.\n<br><b>C. </b>\u00cdt ch\u00fa \u00fd \u0111\u1ebfn c\u00e1c kh\u1ea3 n\u0103ng gi\u1ea3i tr\u00ed.\n<br><b>D.</b> C\u1ea3i thi\u1ec7n kh\u1ea3 n\u0103ng gi\u1ea3i tr\u00ed trong khu v\u1ef1c.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin:</b><br>&nbsp;There was relatively little attention for improvement of recreational possibilities in the direct neighborhood of the home.<br><i>(C\u00f3 \u00edt s\u1ef1 ch\u00fa \u00fd \u0111\u1ebfn vi\u1ec7c c\u1ea3i thi\u1ec7n c\u00e1c kh\u1ea3 n\u0103ng gi\u1ea3i tr\u00ed ngay trong khu v\u1ef1c g\u1ea7n nh\u00e0.)\n</i>", "key": "C", "isVideo": false, "score": 0, "order": 49, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582251, "lessonId": 0, "a": "insufficient", "b": "unbalanced", "c": "disaffected", "d": "unreasonable", "bookId": 1086069, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The underlined word <b>disproportionate </b>in paragraph 2 is closest in meaning to __________.", "answer": "<b>T\u1eeb \u201cdisproportionate\u201d trong \u0111o\u1ea1n 2 g\u1ea7n ngh\u0129a nh\u1ea5t v\u1edbi\n</b><br><b>A.</b> insufficient (adj) kh\u00f4ng \u0111\u1ee7\n<br><b>B.</b> unbalanced (adj) m\u1ea5t c\u00e2n b\u1eb1ng\n<br><b>C.</b> disaffected (adj) th\u1ea5t v\u1ecdng\n<br><b>D.</b> unreasonable (adj) phi l\u00fd\n<br><br><b>D\u1ef1a v\u00e0o ng\u1eef c\u1ea3nh c\u00e2u:\n</b><br>The theoretical separation of living, working, traffic, and recreation which for many years has been used in town-and-country planning, has in my opinion resulted in disproportionate attention for forms of recreation far from home\n<br><i>(Vi\u1ec7c ph\u00e2n chia l\u00fd thuy\u1ebft gi\u1eefa s\u1ed1ng, l\u00e0m vi\u1ec7c, giao th\u00f4ng v\u00e0 gi\u1ea3i tr\u00ed, v\u1ed1n \u0111\u00e3 \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong quy ho\u1ea1ch \u0111\u00f4 th\u1ecb v\u00e0 n\u00f4ng th\u00f4n trong nhi\u1ec1u n\u0103m qua, theo t\u00f4i \u0111\u00e3 d\u1eabn \u0111\u1ebfn s\u1ef1 ch\u00fa tr\u1ecdng qu\u00e1 m\u1ee9c v\u00e0o c\u00e1c h\u00ecnh th\u1ee9c gi\u1ea3i tr\u00ed xa nh\u00e0.)\n<br></i><br>=&gt; \"<b>Disproportionate</b>\" c\u00f3 ngh\u0129a l\u00e0 <b>m\u1ea5t c\u00e2n b\u1eb1ng\n</b>", "key": "B", "isVideo": false, "score": 0, "order": 50, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582254, "lessonId": 0, "a": "The separation of living, working, traffic, and recreation in urban planning", "b": "The idea that recreation should always be far from home", "c": "The imbalance in attention given to distant recreational spaces versus local ones", "d": "The general concept of urban planning itself", "bookId": 1086070, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The word <b>this </b>in paragraph 2 refers to ______.", "answer": "<b>T\u1eeb \"this\" trong \u0111o\u1ea1n 2 \u00e1m ch\u1ec9 \u0111\u1ebfn __________.\n</b><br><b>A.</b> S\u1ef1 ph\u00e2n chia l\u00fd thuy\u1ebft gi\u1eefa s\u1ed1ng, l\u00e0m vi\u1ec7c, giao th\u00f4ng v\u00e0 gi\u1ea3i tr\u00ed trong quy ho\u1ea1ch \u0111\u00f4 th\u1ecb\n<br><b>B.</b> \u00dd t\u01b0\u1edfng r\u1eb1ng gi\u1ea3i tr\u00ed lu\u00f4n ph\u1ea3i xa nh\u00e0\n<br><b>C.</b> S\u1ef1 m\u1ea5t c\u00e2n \u0111\u1ed1i trong s\u1ef1 ch\u00fa tr\u1ecdng \u0111\u1ebfn c\u00e1c kh\u00f4ng gian gi\u1ea3i tr\u00ed xa v\u00e0 g\u1ea7n\n<br><b>D.</b> Kh\u00e1i ni\u1ec7m chung v\u1ec1 quy ho\u1ea1ch \u0111\u00f4 th\u1ecb\n<br><br><b>D\u1ef1a v\u00e0o ng\u1eef c\u1ea3nh c\u00e2u:\n</b><br>The theoretical separation of living, working, traffic, and recreation which for many years has been used in town-and-country planning, has in my opinion resulted in disproportionate attention for forms of recreation far from home, whereas there was relatively little attention for improvement of recreational possibilities in the direct neighborhood of the home. We have come to the conclusion that this is not right.<br><i>(Vi\u1ec7c ph\u00e2n chia l\u00fd thuy\u1ebft gi\u1eefa s\u1ed1ng, l\u00e0m vi\u1ec7c, giao th\u00f4ng v\u00e0 gi\u1ea3i tr\u00ed, v\u1ed1n \u0111\u00e3 \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong quy ho\u1ea1ch \u0111\u00f4 th\u1ecb v\u00e0 n\u00f4ng th\u00f4n trong nhi\u1ec1u n\u0103m qua, theo t\u00f4i \u0111\u00e3 d\u1eabn \u0111\u1ebfn s\u1ef1 ch\u00fa tr\u1ecdng qu\u00e1 m\u1ee9c v\u00e0o c\u00e1c h\u00ecnh th\u1ee9c gi\u1ea3i tr\u00ed xa nh\u00e0, trong khi l\u1ea1i \u00edt ch\u00fa \u00fd \u0111\u1ebfn vi\u1ec7c c\u1ea3i thi\u1ec7n c\u00e1c kh\u1ea3 n\u0103ng gi\u1ea3i tr\u00ed ngay g\u1ea7n khu v\u1ef1c sinh s\u1ed1ng. Ch\u00fang ta \u0111\u00e3 \u0111i \u0111\u1ebfn k\u1ebft lu\u1eadn r\u1eb1ng \u0111i\u1ec1u n\u00e0y l\u00e0 kh\u00f4ng \u0111\u00fang.)\n</i><br><br>=&gt; T\u1eeb \"<b>this</b>\" \u00e1m ch\u1ec9 \u0111\u1ebfn <b>s\u1ef1 m\u1ea5t c\u00e2n \u0111\u1ed1i trong s\u1ef1 ch\u00fa tr\u1ecdng \u0111\u1ebfn gi\u1ea3i tr\u00ed xa nh\u00e0 so v\u1edbi gi\u1ea3i tr\u00ed g\u1ea7n nh\u00e0.</b>", "key": "C", "isVideo": false, "score": 0, "order": 51, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582257, "lessonId": 0, "a": "the convenience of shopping over outdoor activities", "b": "the integration of recreational opportunities into everyday urban life", "c": "the isolation of recreational spaces away from residential areas", "d": "the elimination of all traffic to make urban areas safer", "bookId": 1086071, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "From the third paragraph, it can be inferred that the author values ________.", "answer": "<b>T\u1eeb \u0111o\u1ea1n th\u1ee9 ba, c\u00f3 th\u1ec3 suy lu\u1eadn r\u1eb1ng t\u00e1c gi\u1ea3 coi tr\u1ecdng:\n</b><br><b>A.</b> Ti\u1ec7n l\u1ee3i trong vi\u1ec7c mua s\u1eafm h\u01a1n c\u00e1c ho\u1ea1t \u0111\u1ed9ng ngo\u00e0i tr\u1eddi.\n<br><b>B. </b>S\u1ef1 t\u00edch h\u1ee3p c\u00e1c c\u01a1 h\u1ed9i gi\u1ea3i tr\u00ed v\u00e0o cu\u1ed9c s\u1ed1ng \u0111\u00f4 th\u1ecb h\u00e0ng ng\u00e0y.\n<br><b>C.</b> S\u1ef1 c\u00e1ch ly c\u00e1c kh\u00f4ng gian gi\u1ea3i tr\u00ed xa khu v\u1ef1c d\u00e2n c\u01b0.\n<br><b>D.</b> Vi\u1ec7c lo\u1ea1i b\u1ecf ho\u00e0n to\u00e0n giao th\u00f4ng \u0111\u1ec3 l\u00e0m cho c\u00e1c khu v\u1ef1c \u0111\u00f4 th\u1ecb an to\u00e0n h\u01a1n.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin:\n</b><br>The urban environment has to offer as many recreational activities as possible.<br><i>(M\u00f4i tr\u01b0\u1eddng \u0111\u00f4 th\u1ecb ph\u1ea3i cung c\u1ea5p c\u00e0ng nhi\u1ec1u ho\u1ea1t \u0111\u1ed9ng gi\u1ea3i tr\u00ed c\u00e0ng t\u1ed1t.)\n</i>", "key": "B", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully.", "content": "1. Sports have long been a powerful tool in shaping and reflecting national identity. The relationship between sports and national identity is complex, intertwined with historical, cultural, and political contexts. Through sporting events, nations not only showcase their athletic prowess but also their unity, values, and sense of pride. This phenomenon is evident in various forms, from the Olympic Games to local football matches, where the influence of sports on national identity is unmistakable.<br>2. One of the most significant ways sports influence national identity is through the creation of a shared sense of pride and belonging. When athletes represent their country on the global stage, they become symbols of national strength and capability. Victories are celebrated not just as individual achievements but as collective triumphs that elevate the nation\u2019s status in the world. For example, when a nation wins a gold medal at the Olympics, the entire country often shares in the glory, fostering a sense of unity and national pride. This shared experience can strengthen the bond between citizens, making them feel part of something greater than themselves.<br>3. Furthermore, sports can serve as a <b>unifying force</b> in nations with diverse populations. In countries with multiple ethnic, linguistic, or cultural groups, sports can act as a common ground where differences are set aside in favor of a shared national identity. The World Cup, for instance, often sees people from all walks of life coming together to support their national team, regardless of their background. This temporary suspension of differences can reinforce the idea of a single, unified national identity, at least in the context of the sporting event.<br>4. However, the influence of sports on national identity is not always positive or straightforward. In some cases, sports can exacerbate divisions within a nation. For instance, when a particular region or ethnic group feels underrepresented in a national team, it can lead to feelings of exclusion and resentment. This was evident in the former Yugoslavia, where sports teams often mirrored the ethnic tensions that eventually led to the country\u2019s breakup. In such cases, rather than unifying the nation, sports can highlight and even deepen existing divisions.<br>5. Moreover, the commercialization of sports has also had an impact on national identity. The increasing influence of global brands and sponsorships in sports can sometimes <b>dilute </b>the connection between a team and its national identity. For example, when athletes represent a multinational corporation as much as their country, the line between national pride and commercial interest can become blurred. This commercialization can lead to a situation where the primary motivation for participating in sports shifts from representing one\u2019s country to achieving personal or financial gain, potentially weakening the role of sports in fostering national identity.<br><div style=\"text-align: right;\"><i>(Adapted from the real Ielts)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21582267, "lessonId": 0, "a": "The Benefits and Challenges of Sports", "b": "How Sports Shape National Identity", "c": "Sports: A Tool for National Development", "d": "The Influence of Sports on National Identity", "bookId": 1086072, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title of the passage can be ________.", "answer": "<b>Ti\u00eau \u0111\u1ec1 ph\u00f9 h\u1ee3p nh\u1ea5t cho \u0111o\u1ea1n v\u0103n n\u00e0y l\u00e0 g\u00ec?\n</b><br><b>A.</b> L\u1ee3i \u00edch v\u00e0 th\u1eed th\u00e1ch c\u1ee7a th\u1ec3 thao <br><b>=&gt; Sai.</b> \u0110o\u1ea1n v\u0103n kh\u00f4ng t\u1eadp trung v\u00e0o vi\u1ec7c ph\u00e2n t\u00edch nh\u1eefng l\u1ee3i \u00edch v\u00e0 th\u00e1ch th\u1ee9c n\u00e0y m\u1ed9t c\u00e1ch s\u00e2u s\u1eafc         function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- SCROLL HELPER (SỬA LỖI MỤC LỤC DESKTOP) ---
        function scrollToQuestion(qKey) {
            const el = document.getElementById(`question-${qKey}`);
            if (el) {
                // Scroll native với offset (do header fixed)
                // Sử dụng phương pháp cũ nhưng chắc chắn hoạt động hơn scrollIntoView trên container cuộn
                // Lấy tọa độ tương đối so với viewport
                const yOffset = -80; // Trừ header
                const y = el.getBoundingClientRect().top + window.pageYOffset + yOffset;
                
                window.scrollTo({top: y, behavior: 'smooth'});
                
                // Highlight hiệu ứng
                el.classList.add('ring-2', 'ring-moon', 'ring-offset-2');
                setTimeout(() => el.classList.remove('ring-2', 'ring-moon', 'ring-offset-2'), 1500);
            }
            // Đóng mobile palette nếu đang mở
            document.getElementById('mobile-palette').classList.add('hidden');
        }

        // --- RENDER ENGINE ---
        function renderExam(reset = false) {
            const container = document.getElementById('exam-content');
            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; 
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

            let globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`;
                    const qType = q.normalizedType;
                    
                    // -- Palette Item (FIX ONCLICK SCOPE) --
                    // Sử dụng arrow function trong JS string template cẩn thận
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    
                    // Gán sự kiện click trực tiếp thay vì chuỗi string HTML để tránh lỗi scope
                    palBtn.addEventListener('click', function() { scrollToQuestion(qKey); });
                    
                    palDesk.appendChild(palBtn.cloneNode(true)); // Desktop clone cần gán lại event nếu cloneNode ko copy event
                    // Clone node không copy event listener. Phải tạo 2 nút riêng hoặc gán lại.
                    // Cách tốt nhất: tạo chuỗi HTML hoặc append element.
                    // Ở đây để đơn giản ta gán onclick bằng attribute string cho chắc ăn
                    palBtn.setAttribute('onclick', `scrollToQuestion('${qKey}')`);
                    
                    // Sau khi set attribute, append lại
                    palDesk.innerHTML = palDesk.innerHTML; // Reset để xoá nút cũ? Không nên.
                    // Code cũ append child.
                    
                    // Fix triệt để: Tạo string HTML cho palette
                    // (Đã sửa ở dưới)
                });
            });
            
            // Render lại từ đầu để tối ưu
            palDesk.innerHTML = '';
            palMob.innerHTML = '';
            container.innerHTML = '';
            globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`;
                    const qType = q.normalizedType;

                    // Palette Buttons
                    const btnClass = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    const btnHtml = `<button id="pal_${qKey}" onclick="scrollToQuestion('${qKey}')" class="${btnClass}">${qId}</button>`;
                    
                    palDesk.innerHTML += btnHtml;
                    palMob.innerHTML += btnHtml;

                    // Question Card
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'question-card bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // TYPE 0: MCQ
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { 
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; 
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // TYPE 1 & 3: FILL KEY
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const chars = userVal.split('');
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let boxesHtml = '<div class="flex gap-2 justify-start items-center">';
                        for(let i=0; i<4; i++) {
                            const char = chars[i] || '';
                            boxesHtml += `<input type="text" maxlength="1" 
                                class="char-input" 
                                data-index="${i}" 
                                data-key="${qKey}" 
                                value="${char}" 
                                readonly 
                                onclick="activateNumpad(this, '${qKey}')"
                                ${isSubmitted ? 'disabled' : ''} 
                            />`;
                        }
                        
                        if(examMode === 'practice' && !isSubmitted) {
                             boxesHtml += `<button onclick="checkFillAnswer('${qKey}')" class="ml-2 px-3 py-2 bg-blue-100 text-blue-700 font-bold rounded-lg text-sm hover:bg-blue-200 transition-colors">Kiểm tra</button>`;
                             // Nút xem lời giải cho practice
                             boxesHtml += `<button onclick="toggleSolution('${qKey}')" class="ml-2 px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button>`;
                        }
                        boxesHtml += '</div>';

                        let feedbackHtml = "";
                        if(isSubmitted) {
                             const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                             if(isCorrect) {
                                feedbackHtml = `<div class="mt-2 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                             } else {
                                feedbackHtml = `<div class="mt-2 text-red-600 text-sm">✗ Sai. Đáp án: <span class="font-bold">${correctVal}</span></div>`;
                             }
                        } else if (examMode === 'practice') {
                             feedbackHtml = `<div id="feedback-${qKey}" class="mt-2 text-sm font-bold hidden"></div>`;
                        }

                        html += `
                        <div class="flex flex-col relative">
                            ${boxesHtml}
                            ${feedbackHtml}
                        </div>`;
                    }

                    // TYPE 2: TRUE/FALSE
                    else if(qType === '2') {
                         html += `<div class="overflow-hidden border rounded-lg">
                            <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                                <tr>
                                    <th scope="col" class="px-3 py-3 w-10 text-center">Ý</th>
                                    <th scope="col" class="px-3 py-3">Nội dung</th>
                                    <th scope="col" class="px-3 py-3 w-32 text-center">Chọn Đ/S</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; 
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; 
                                const userChoice = userObj[pIdx]; 
                                
                                let trClass = "bg-white hover:bg-gray-50";
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) trClass = "bg-green-50";
                                    else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
