    <script>
        const EXAM_DATA = [{"title": "", "content": "", "listQuestion": [{"questionId": 21600917, "lessonId": 0, "a": "Nhanh nh\u1eb9n, m\u01b0u tr\u00ed, s\u1ee9c v\u00f3c.", "b": "M\u1ea1nh m\u1ebd, \u00fd ch\u00ed, ki\u00ean gan.", "c": "Ki\u00ean c\u01b0\u1eddng, d\u0169ng c\u1ea3m, tr\u01b0\u1ee3ng ngh\u0129a.", "d": "B\u1ea3n l\u0129nh, gan d\u1ea1, trung h\u1eadu.", "bookId": 1088457, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTanat\u00f4x v\u1edbi \u0111\u00f4i c\u00e1nh to r\u1ed9ng lu\u00f4n lu\u00f4n xo\u00e8 ra c\u1ee5p v\u00e0o \u0111\u1ec3 tr\u00e1nh nh\u1eefng \u0111\u00f2n c\u1ee7a H\u00earaclex. B\u1eb1ng c\u00e1ch \u1ea5y y c\u00f2n t\u1ea1o ra nh\u1eefng lu\u1ed3ng gi\u00f3 l\u1ea1nh l\u00e0m cho H\u00earaclex kh\u00f4ng th\u1ec3 giao \u0111\u1ea5u v\u1edbi y m\u1ed9t c\u00e1ch thu\u1eadn l\u1ee3i \u0111\u01b0\u1ee3c. Ch\u01b0a h\u1ebft, y c\u00f2n phun \u00e2m kh\u00ed n\u1eb7ng n\u1ec1 v\u00e0o m\u1eb7t H\u00earaclex, d\u00f9ng \u0111\u00f4i tay c\u00f3 nh\u1eefng m\u00f3ng nh\u1ecdn d\u00e0i v\u00e0 s\u1eafc c\u00e0o c\u1ea5u tr\u00ean ng\u1ef1c H\u00earaclex \u0111\u1ec3 cho kh\u00ed l\u1ea1nh th\u1ea5m v\u00e0o. H\u00earaclex giao \u0111\u1ea5u v\u1edbi Tanat\u00f4x th\u1eadt v\u1ea5t v\u1ea3. <b>Nh\u01b0ng r\u1ed3i cu\u1ed1i c\u00f9ng l\u1ee3i d\u1ee5ng m\u1ed9t s\u01a1 h\u1edf c\u1ee7a y, H\u00earaclex \u0111\u00e3 t\u00fam \u0111\u01b0\u1ee3c \u0111\u00f4i c\u00e1nh c\u1ee7a Tanat\u00f4x b\u1ebb qu\u1eb7t v\u1ec1 ph\u00eda sau r\u1ed3i l\u1ea5y d\u00e2y tr\u00f3i ch\u1eb7t l\u1ea1i.</b> \u0110o\u1ea1n ch\u00e0ng vung thanh g\u01b0\u01a1m d\u00e0i v\u00e0 cong c\u1ee7a th\u1ea7n Hermex l\u00ean toan k\u1ebft li\u1ec5u \u0111\u1eddi g\u00e3 th\u1ea7n Ch\u1ebft kinh t\u1edfm n\u00e0y.\u201d</i><br><div style=\"text-align: right;\">(Th\u1ea7n tho\u1ea1i Hy L\u1ea1p, \u0110o\u1ea1t b\u1ea7y ng\u1ef1a c\u00e1i c\u1ee7a \u0110i\u00f4me\u0111, NXB V\u0103n ho\u00e1, 2002)</div>C\u00e2u v\u0103n in \u0111\u1eadm g\u1ee3i t\u1ea3 nh\u1eefng v\u1ebb \u0111\u1eb9p n\u00e0o c\u1ee7a H\u00earaclex?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u00e2u v\u0103n \u201cNh\u01b0ng r\u1ed3i cu\u1ed1i c\u00f9ng l\u1ee3i d\u1ee5ng m\u1ed9t s\u01a1 h\u1edf c\u1ee7a y, H\u00earaclex \u0111\u00e3 t\u00fam \u0111\u01b0\u1ee3c \u0111\u00f4i c\u00e1nh c\u1ee7a Tanat\u00f4x b\u1ebb qu\u1eb7t v\u1ec1 ph\u00eda sau r\u1ed3i l\u1ea5y d\u00e2y tr\u00f3i ch\u1eb7t l\u1ea1i.\u201d g\u1ee3i t\u1ea3 nh\u1eefng v\u1ebb \u0111\u1eb9p sau c\u1ee7a H\u00earaclex:<br>\n- Nhanh nh\u1eb9n: N\u1eafm b\u1eaft th\u1eddi c\u01a1, ch\u1edbp l\u1ea5y s\u01a1 h\u1edf c\u1ee7a \u0111\u1ed1i ph\u01b0\u01a1ng.<br>\n- M\u01b0u tr\u00ed: C\u00f3 chi\u1ebfn thu\u1eadt, bi\u1ebft c\u00e1ch kh\u1eafc ch\u1ebf \u0111\u1ed1i th\u1ee7.<br>\n- S\u1ee9c v\u00f3c: \u0110\u1ee7 s\u1ee9c m\u1ea1nh \u0111\u1ec3 kh\u1ed1ng ch\u1ebf v\u00e0 tr\u00f3i ch\u1eb7t Tanat\u00f4x.\n", "key": "A", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21600931, "lessonId": 0, "a": "Ra-ma s\u1ee3 tai ti\u1ebfng.", "b": "L\u1eddi n\u00f3i c\u1ee7a Ra-ma: \u201c\u0110\u1ec3 tr\u1ea3 th\u00f9 s\u1ef1 l\u0103ng nh\u1ee5c, ta \u0111\u00e3 l\u00e0m nh\u1eefng g\u00ec m\u00e0 m\u1ed9t con ng\u01b0\u1eddi ph\u1ea3i l\u00e0m: ta \u0111\u00e3 ti\u00eau di\u1ec7t Ra-va-na.\u201d.", "c": "L\u00f2ng Ra-ma \u0111au nh\u01b0 dao c\u1eaft.", "d": "Gia-na-ki m\u1edf tr\u00f2n \u0111\u00f4i m\u1eaft \u0111\u1eabm l\u1ec7.", "bookId": 1088458, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNghe nh\u1eefng l\u1eddi \u0111\u00f3, Gia-na-ki  m\u1edf tr\u00f2n \u0111\u00f4i m\u1eaft \u0111\u1eabm l\u1ec7. Th\u1ea5y ng\u01b0\u1eddi \u0111\u1eb9p khu\u00f4n m\u1eb7t b\u00f4ng sen v\u1edbi nh\u1eefng cu\u1ed9n t\u00f3c l\u01b0\u1ee3n s\u00f3ng \u0111\u1ee9ng tr\u01b0\u1edbc m\u1eb7t m\u00ecnh, l\u00f2ng Ra-ma \u0111au nh\u01b0 dao c\u1eaft. Nh\u01b0ng v\u00ec s\u1ee3 tai ti\u1ebfng, ch\u00e0ng b\u00e8n n\u00f3i v\u1edbi n\u00e0ng, tr\u01b0\u1edbc m\u1eb7t nh\u1eefng ng\u01b0\u1eddi kh\u00e1c: \u201c\u0110\u1ec3 tr\u1ea3 th\u00f9 s\u1ef1 l\u0103ng nh\u1ee5c, ta \u0111\u00e3 l\u00e0m nh\u1eefng g\u00ec m\u00e0 m\u1ed9t con ng\u01b0\u1eddi ph\u1ea3i l\u00e0m: ta \u0111\u00e3 ti\u00eau di\u1ec7t Ra-va-na. [...]\u201d.\u201d</i><br><div style=\"text-align: right;\">(S\u1eed thi \u1ea4n \u0110\u1ed9, Ra-ma-ya-na, theo Ng\u1eef v\u0103n 10, t\u1eadp 1, NXB Gi\u00e1o d\u1ee5c Vi\u1ec7t Nam, 2011)</div>Chi ti\u1ebft n\u00e0o h\u00e9 l\u1ed9 t\u00ecnh c\u1ea3m c\u00e1 nh\u00e2n Ra-ma d\u00e0nh cho Gia-na-ki?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft \u201cl\u00f2ng Ra-ma \u0111au nh\u01b0 dao c\u1eaft\u201d cho th\u1ea5y Ra-ma v\u1eabn c\u00f2n r\u1ea5t y\u00eau Gia-na-ki v\u00e0 ch\u00e0ng \u0111ang v\u00f4 c\u00f9ng \u0111au kh\u1ed5 khi ph\u1ea3i \u0111\u1ed1i x\u1eed l\u1ea1nh nh\u1ea1t v\u1edbi n\u00e0ng.<br>\n\u2192 Chi ti\u1ebft h\u00e9 l\u1ed9 t\u00ecnh c\u1ea3m c\u00e1 nh\u00e2n Ra-ma d\u00e0nh cho Gia-na-ki (Xi-ta) l\u00e0 \u201cl\u00f2ng Ra-ma \u0111au nh\u01b0 dao c\u1eaft\u201d.\n", "key": "C", "isVideo": true, "score": 0, "order": 2, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21600949, "lessonId": 0, "a": "Th\u1ea5t ng\u00f4n tr\u01b0\u1eddng thi\u00ean.", "b": "Th\u1ea5t ng\u00f4n t\u1ee9 tuy\u1ec7t \u0110\u01b0\u1eddng lu\u1eadt.", "c": "Th\u1ea5t ng\u00f4n b\u00e1t c\u00fa \u0110\u01b0\u1eddng lu\u1eadt.", "d": "Th\u1ea5t ng\u00f4n b\u00e1t c\u00fa \u0110\u01b0\u1eddng lu\u1eadt xen l\u1ee5c ng\u00f4n.", "bookId": 1088459, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cN\u0103m gian nh\u00e0 c\u1ecf th\u1ea5p le te,<br>Ng\u00f5 t\u1ed1i \u0111\u00eam s\u00e2u \u0111\u00f3m l\u1eadp lo\u00e8.<br>L\u01b0ng gi\u1eadu ph\u1ea5t ph\u01a1 m\u00e0u kh\u00f3i nh\u1ea1t,<br>L\u00e0n ao l\u00f3ng l\u00e1nh b\u00f3ng tr\u0103ng loe.<br>Da tr\u1eddi ai nhu\u1ed9m m\u00e0 xanh ng\u1eaft?<br>M\u1eaft l\u00e3o kh\u00f4ng v\u1ea7y c\u0169ng \u0111\u1ecf hoe.<br>R\u01b0\u1ee3u ti\u1ebfng r\u1eb1ng hay, hay ch\u1eb3ng m\u1ea5y.<br>\u0110\u1ed9 n\u0103m ba ch\u00e9n \u0111\u00e3 say nh\u00e8.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Khuy\u1ebfn, Thu \u1ea9m, theo V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>B\u00e0i th\u01a1 \u0111\u01b0\u1ee3c vi\u1ebft theo th\u1ec3 th\u01a1 n\u00e0o?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nB\u00e0i th\u01a1 c\u00f3 8 c\u00e2u, m\u1ed7i c\u00e2u 7 ch\u1eef v\u00e0 tu\u00e2n th\u1ee7 \u0111\u00fang theo lu\u1eadt b\u1eb1ng tr\u1eafc, ni\u00eam lu\u1eadt c\u1ee7a th\u01a1 \u0110\u01b0\u1eddng.<br>\n\u2192 B\u00e0i th\u01a1 \u0111\u01b0\u1ee3c vi\u1ebft theo th\u1ec3 th\u01a1 th\u1ea5t ng\u00f4n b\u00e1t c\u00fa \u0110\u01b0\u1eddng lu\u1eadt.\n", "key": "C", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21600953, "lessonId": 0, "a": "T\u00f4 \u0110\u1ecbnh.", "b": "Tr\u01b0ng Tr\u1eafc.", "c": "Tr\u01b0ng Nh\u1ecb.", "d": "Thi S\u00e1ch.", "bookId": 1088460, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<div style=\"text-align: left;\"><i>\u201cS\u1eed ghi t\u00ean ch\u1ecb l\u00e0 Tr\u1eafc, em l\u00e0 Nh\u1ecb, v\u1ed1n h\u1ecd H\u00f9ng, l\u00e0 con g\u00e1i quan L\u1ea1c t\u01b0\u1edbng \u1edf Giao Ch\u00e2u ta, ng\u01b0\u1eddi huy\u1ec7n M\u00ea Linh, thu\u1ed9c Phong Ch\u00e2u. Ch\u1ecb l\u1ea5y Thi S\u00e1ch, ng\u01b0\u1eddi huy\u1ec7n Chu Di\u00eau. S\u00e1ch l\u00e0 ng\u01b0\u1eddi c\u00f3 d\u0169ng l\u01b0\u1ee3c, chu\u1ed9ng h\u00e0o kh\u00ed. Th\u1ea5y ch\u1eebng c\u01a1 s\u1ef1, quan Th\u1ee9 s\u1eed l\u00e0 T\u00f4 \u0110\u1ecbnh b\u00e8n \u0111\u1eb7t v\u00e0o ph\u00e9p, bu\u1ed9c t\u1ed9i Thi S\u00e1ch m\u00e0 h\u00e3m h\u1ea1i. Ch\u1ecb gi\u1eadn l\u1eafm, c\u00f9ng v\u1edbi em c\u1eed binh \u0111\u00e1nh \u0111u\u1ed5i T\u00f4 \u0110\u1ecbnh, c\u00f4ng h\u00e3m Giao Ch\u00e2u. Do \u0111\u00f3 c\u00e1c qu\u1eadn Nh\u1eadt Nam, H\u1ee3p Ph\u1ed1, C\u1eedu Ch\u00e2n nghe tin b\u00e8n h\u01b0\u1edfng \u1ee9ng, l\u01b0\u1ee3c \u0111\u1ecbnh \u0111\u01b0\u1ee3c h\u01a1n s\u00e1u m\u01b0\u01a1i l\u0103m th\u00e0nh \u1edf c\u00f5i L\u0129nh Ngo\u1ea1i, t\u1ef1 l\u1eadp l\u00e0m vua \u0111\u1ea5t Vi\u1ec7t, \u0111\u00f3ng \u1edf Chu Di\u00eau, r\u1ed3i x\u01b0ng l\u00e0 h\u1ecd Tr\u01b0ng.\u201d</i></div><div style=\"text-align: right;\">(L\u00fd T\u1ebf Xuy\u00ean, <i>Nh\u1ecb Tr\u01b0ng phu nh\u00e2n</i>, theo <i>Vi\u1ec7t \u0111i\u1ec7n u linh t\u1eadp</i>, NXB V\u0103n h\u1ecdc, 2008)</div>Nh\u00e2n v\u1eadt \u0111\u01b0\u1ee3c t\u1eadp trung kh\u1eafc ho\u1ea1 trong \u0111o\u1ea1n tr\u00edch tr\u00ean l\u00e0 ai?<br>", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n v\u0103n gi\u1edbi thi\u1ec7u hai ch\u1ecb em Tr\u01b0ng Tr\u1eafc v\u00e0 Tr\u01b0ng Nh\u1ecb, nh\u01b0ng ch\u1ee7 y\u1ebfu t\u1eadp trung kh\u1eafc ho\u1ea1 nh\u00e2n v\u1eadt Tr\u01b0ng Tr\u1eafc - ng\u01b0\u1eddi l\u00e3nh \u0111\u1ea1o cu\u1ed9c kh\u1edfi ngh\u0129a v\u00e0 tr\u1edf th\u00e0nh n\u1eef v\u01b0\u01a1ng \u0111\u1ea7u ti\u00ean c\u1ee7a n\u01b0\u1edbc Vi\u1ec7t.\n", "key": "B", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21600974, "lessonId": 0, "a": "C\u1ea3m gi\u00e1c v\u1ea5t v\u01a1 v\u1ea5t v\u01b0\u1edfng, kh\u00f4ng bi\u1ebft c\u00f9ng ai chuy\u1ec7n tr\u00f2.", "b": "B\u00fai t\u00f3c c\u1ee7 h\u00e0nh, bu\u00f4ng qu\u1ea7n l\u00e1 t\u1ecda, g\u1eadt g\u00f9 tay \u0111\u0169a ch\u1ea1m tay ch\u00e9n.", "c": "Hay lam hay l\u00e0m, th\u1eaft l\u01b0ng b\u00f3 que, x\u1eafn v\u00e1y quai c\u1ed3ng.", "d": "\u0110\u1ee1 \u0111\u1ea7n v\u1ee3 m\u1ecdi vi\u1ec7c trong gia \u0111\u00ecnh.", "bookId": 1088461, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNh\u00e0 ch\u1ec9n  c\u0169ng ngh\u00e8o thay! Nh\u1edd \u0111\u01b0\u1ee3c b\u00e0 hay lam hay l\u00e0m, th\u1eaft l\u01b0ng b\u00f3 que, x\u1eafn v\u00e1y quai c\u1ed3ng, t\u1ea5t t\u1ea3 ch\u00e2n nam \u0111\u00e1 ch\u00e2n chi\u00eau, v\u00ec t\u1edb \u0111\u1ee1 \u0111\u1ea7n trong m\u1ecdi vi\u1ec7c.<br><br>B\u00e0 \u0111i \u0111\u00e2u v\u1ed9i m\u1ea5y! \u0110\u1ec3 cho l\u00e3o v\u1ea5t v\u01a1 v\u1ea5t v\u01b0\u1edfng, b\u00fai t\u00f3c c\u1ee7 h\u00e0nh, bu\u00f4ng qu\u1ea7n l\u00e1 t\u1ecda, g\u1eadt g\u00f9 tay \u0111\u0169a ch\u1ea1m tay ch\u00e9n, c\u00f9ng ai k\u1ec3 l\u1ec3 chuy\u1ec7n tr\u0103m n\u0103m.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Khuy\u1ebfn, <i>C\u00e2u \u0111\u1ed1i kh\u00f3c v\u1ee3</i>, theo<i> T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div><br>Chi ti\u1ebft n\u00e0o b\u1ed9c l\u1ed9 n\u1ed7i tr\u1ed1ng tr\u1ea3i, c\u00f4 \u0111\u01a1n c\u1ee7a ng\u01b0\u1eddi ch\u1ed3ng khi v\u1ee3 qua \u0111\u1eddi?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft c\u1ea3m gi\u00e1c v\u1ea5t v\u01a1 v\u1ea5t v\u01b0\u1edfng, kh\u00f4ng bi\u1ebft c\u00f9ng ai chuy\u1ec7n tr\u00f2 b\u1ed9c l\u1ed9 n\u1ed7i tr\u1ed1ng tr\u1ea3i, c\u00f4 \u0111\u01a1n c\u1ee7a ng\u01b0\u1eddi ch\u1ed3ng khi v\u1ee3 qua \u0111\u1eddi. C\u1ea3m gi\u00e1c \u201cv\u1ea5t v\u01a1 v\u1ea5t v\u01b0\u1edfng\u201d g\u1ee3i t\u1ea3 s\u1ef1 l\u1ea1c l\u00f5ng, m\u1ea5t ph\u01b0\u01a1ng h\u01b0\u1edbng, nh\u01b0 ng\u01b0\u1eddi m\u1ea5t \u0111i ch\u1ed7 d\u1ef1a tinh th\u1ea7n \u0111\u1ed3ng th\u1eddi cho th\u1ea5y n\u1ed7i c\u00f4 \u0111\u01a1n c\u1ee7a ng\u01b0\u1eddi ch\u1ed3ng khi kh\u00f4ng c\u00f2n ng\u01b0\u1eddi b\u1ea1n \u0111\u1eddi \u0111\u1ec3 chia s\u1ebb nh\u1eefng c\u00e2u chuy\u1ec7n bu\u1ed3n vui trong cu\u1ed9c \u0111\u1eddi.\n", "key": "A", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21600983, "lessonId": 0, "a": "Qu\u1ea3ng giao, x\u1edfi l\u1edfi.", "b": "Nh\u1ea1y c\u1ea3m, d\u1ec5 t\u1ed5n th\u01b0\u01a1ng.", "c": "\u00cdch k\u1ec9, nh\u1ecf nhen, hay \u0111\u1ed1 k\u1ecb.", "d": "R\u1ee5t r\u00e8, nh\u00fat nh\u00e1t.", "bookId": 1088462, "comments": 0, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cT\u00f4i \u0111\u00e3 bi\u1ebft Ho\u00e0ng v\u1eabn c\u00f3 t\u00ednh t\u1ef1 nhi\u00ean \u201c\u0111\u00e1\u201d b\u1ea1n m\u1ed9t c\u00e1ch \u0111\u1ed9t ng\u1ed9t, v\u00ec nh\u1eefng c\u1edb m\u00e0 ch\u1ec9 m\u00ecnh anh bi\u1ebft. C\u00f3 khi ch\u1ec9 l\u00e0 v\u00ec m\u1ed9t t\u00e1c ph\u1ea9m c\u1ee7a ng\u01b0\u1eddi b\u1ea1n \u1ea5y \u0111\u01b0\u1ee3c c\u1ea3m t\u00ecnh c\u1ee7a m\u1ed9t nh\u00e0 ph\u00ea b\u00ecnh \u0111\u00e3 ch\u00ea m\u1ed9t v\u00e0i t\u00e1c ph\u1ea9m c\u1ee7a anh. C\u00f3 khi c\u0169ng ch\u1eb3ng c\u1ea7n \u0111\u1ebfn th\u1ebf. Anh c\u00f3 th\u1ec3 l\u00e0 m\u1ed9t ng\u01b0\u1eddi b\u1ea1n r\u1ea5t th\u00e2n c\u1ee7a anh Ho\u00e0ng khi anh ch\u1ec9 l\u00e0 m\u1ed9t nh\u00e0 v\u0103n \u1edf t\u1ec9nh xa ch\u1ec9 g\u00f3p m\u1eb7t v\u1edbi H\u00e0 N\u1ed9i b\u1eb1ng nh\u1eefng b\u00e0i g\u1eedi v\u1ec1 \u0111\u0103ng b\u00e1o, nh\u01b0ng n\u1ebfu anh l\u1ea1i v\u1ec1 s\u1ed1ng h\u1eb3n \u1edf Th\u1ee7 \u0111\u00f4, giao thi\u1ec7p v\u1edbi \u00edt nhi\u1ec1u nh\u00e0 v\u0103n kh\u00e1c, anh s\u1ebd kh\u00f4ng ph\u1ea3i l\u00e0 b\u1ea1n anh Ho\u00e0ng n\u1eefa. C\u00f3 l\u1ebd anh Ho\u00e0ng bi\u1ebft c\u00e1i gi\u1edbi v\u0103n ngh\u1ec7 s\u0129 H\u00e0 N\u1ed9i ch\u1eedi anh nhi\u1ec1u qu\u00e1.\u201d</i><br><div style=\"text-align: right;\">(Nam Cao, <i>\u0110\u00f4i m\u1eaft</i>, theo<i> baovannghe.vn</i>)</div>T\u00ednh c\u00e1ch n\u00e0o c\u1ee7a nh\u00e2n v\u1eadt Ho\u00e0ng \u0111\u01b0\u1ee3c mi\u00eau t\u1ea3 trong \u0111o\u1ea1n v\u0103n tr\u00ean?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nNh\u00e2n v\u1eadt Ho\u00e0ng \u0111\u01b0\u1ee3c mi\u00eau t\u1ea3 trong \u0111o\u1ea1n v\u0103n l\u00e0 m\u1ed9t ng\u01b0\u1eddi \u00edch k\u1ec9, nh\u1ecf nhen v\u00e0 hay \u0111\u1ed1 k\u1ecb, \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n qua c\u00e1c chi ti\u1ebft:<br>\n+ \u201c\u0110\u00e1\u201d b\u1ea1n \u0111\u1ed9t ng\u1ed9t v\u00ec t\u00e1c ph\u1ea9m c\u1ee7a b\u1ea1n \u0111\u01b0\u1ee3c m\u1ed9t nh\u00e0 ph\u00ea b\u00ecnh y\u00eau th\u00edch (m\u00e0 ng\u01b0\u1eddi n\u00e0y t\u1eebng ch\u00ea t\u00e1c ph\u1ea9m c\u1ee7a Ho\u00e0ng).<br>\n+ Xa l\u00e1nh nh\u1eefng ng\u01b0\u1eddi b\u1ea1n v\u0103n khi h\u1ecd t\u1eeb t\u1ec9nh xa chuy\u1ec3n v\u1ec1 H\u00e0 N\u1ed9i v\u00e0 c\u00f3 giao thi\u1ec7p v\u1edbi c\u00e1c nh\u00e0 v\u0103n kh\u00e1c.<br>\n+ B\u1ecb gi\u1edbi v\u0103n ngh\u1ec7 s\u0129 H\u00e0 N\u1ed9i ch\u1eedi nhi\u1ec1u qu\u00e1.\n", "key": "C", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21600994, "lessonId": 0, "a": "\u201cR\u1eebng l\u1ea1 \u00e0o \u00e0o l\u00e1 \u0111\u1ecf\u201d.", "b": "\u201cB\u1ee5i Tr\u01b0\u1eddng S\u01a1n nho\u00e0 tr\u1eddi l\u1eeda\u201d.", "c": "\u201cH\u1eb9n g\u1eb7p nh\u00e9 gi\u1eefa S\u00e0i G\u00f2n...\u201d.", "d": "\u201cVai \u00e1o b\u1ea1c qu\u00e0ng s\u00fang tr\u01b0\u1eddng\u201d.", "bookId": 1088463, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<div style=\"text-align: center;\"><b>L\u00e1 \u0111\u1ecf</b></div><div style=\"text-align: center;\">(Nguy\u1ec5n \u0110\u00ecnh Thi)</div><div style=\"text-align: center;\"><i>G\u1eb7p em tr\u00ean cao l\u1ed9ng gi\u00f3</i></div><div style=\"text-align: center;\"><i>R\u1eebng l\u1ea1 \u00e0o \u00e0o l\u00e1 \u0111\u1ecf</i></div><div style=\"text-align: center;\"><i><br></i></div><div style=\"text-align: center;\"><i>Em \u0111\u1ee9ng b\u00ean \u0111\u01b0\u1eddng nh\u01b0 qu\u00ea h\u01b0\u01a1ng</i></div><div style=\"text-align: center;\"><i>Vai \u00e1o b\u1ea1c qu\u00e0ng s\u00fang tr\u01b0\u1eddng</i></div><div style=\"text-align: center;\"><i><br></i></div><div style=\"text-align: center;\"><i>\u0110o\u00e0n qu\u00e2n v\u1eabn \u0111i v\u1ed9i v\u00e3</i></div><div style=\"text-align: center;\"><i>B\u1ee5i Tr\u01b0\u1eddng S\u01a1n nho\u00e0 tr\u1eddi l\u1eeda</i></div><div style=\"text-align: center;\"><i><br></i></div><div style=\"text-align: center;\"><i>Ch\u00e0o em, em g\u00e1i ti\u1ec1n ph\u01b0\u01a1ng</i></div><div style=\"text-align: center;\"><i>H\u1eb9n g\u1eb7p nh\u00e9 gi\u1eefa S\u00e0i G\u00f2n...</i></div><div style=\"text-align: center;\">1974</div><div style=\"text-align: right;\">(Theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>D\u00f2ng th\u01a1 n\u00e0o b\u1ed9c l\u1ed9 kh\u00e1t v\u1ecdng v\u00e0 ni\u1ec1m tin th\u1ed1ng nh\u1ea5t \u0111\u1ea5t n\u01b0\u1edbc?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nD\u00f2ng th\u01a1 \u201cH\u1eb9n g\u1eb7p nh\u00e9 gi\u1eefa S\u00e0i G\u00f2n...\u201d b\u1ed9c l\u1ed9 kh\u00e1t v\u1ecdng v\u00e0 ni\u1ec1m tin th\u1ed1ng nh\u1ea5t \u0111\u1ea5t n\u01b0\u1edbc. S\u00e0i G\u00f2n l\u00fac b\u1ea5y gi\u1edd v\u1eabn c\u00f2n n\u1eb1m d\u01b0\u1edbi s\u1ef1 ki\u1ec3m so\u00e1t c\u1ee7a ch\u00ednh quy\u1ec1n Vi\u1ec7t Nam C\u1ed9ng h\u00f2a, vi\u1ec7c h\u1eb9n g\u1eb7p \u1edf S\u00e0i G\u00f2n cho th\u1ea5y ni\u1ec1m tin v\u00e0o ng\u00e0y \u0111\u1ea5t n\u01b0\u1edbc th\u1ed1ng nh\u1ea5t, B\u1eafc Nam sum h\u1ecdp m\u1ed9t nh\u00e0.\n", "key": "C", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601001, "lessonId": 0, "a": "Ngo\u1ea1i h\u00ecnh.", "b": "L\u1eddi n\u00f3i.", "c": "\u00dd ngh\u0129.", "d": "H\u00e0nh \u0111\u1ed9ng.", "bookId": 1088464, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u1ede \u0111\u00e2y th\u1ea5y t\u00e2m h\u1ed3n th\u1eadt \u0111\u01a1n gi\u1ea3n, s\u1ef1 suy ngh\u0129 th\u1eb3ng b\u0103ng. C\u1ea3 ng\u00e0y \u0111\u00eam \u0111\u1ea7u \u00f3c ch\u1ec9 t\u1eadp trung lo l\u1eeba nhau v\u1edbi n\u00f3 t\u1eebng mi\u1ebfng trong tr\u00f2 ch\u01a1i \u00fa tim ch\u1ebft ng\u01b0\u1eddi, c\u00f2n th\u00ec gi\u1edd \u0111\u00e2u m\u00e0 v\u1ea9n v\u01a1 c\u00e1i kh\u00e1c? M\u1ea5y anh ch\u00e0ng tr\u00ed gi\u1ea3, tr\u00ed th\u1ee9c g\u00ec \u0111\u00f3 \u1edf ngo\u00e0i \u0111\u1ea5y n\u1ebfu mu\u1ed1n h\u1ebft ch\u00e1n \u0111\u1eddi, ch\u00e1n s\u1ed1ng, mu\u1ed1n \u0111i t\u00ecm c\u00e1i b\u1ea5t di b\u1ea5t d\u1ecbch t\u1eadn c\u00f9ng c\u1ee7a s\u1ef1 s\u1ed1ng th\u00ec xin m\u1eddi v\u00e0o \u0111\u00e2y. Ch\u1ec9 m\u1ed9t ng\u00e0y th\u00f4i, c\u00e1i \u0111\u1ea7u s\u1ebd c\u1ee5 th\u1ec3 l\u00e0nh m\u1ea1nh ngay. Linh suy ngh\u0129 \u0111i\u1ec1u n\u00e0y m\u1ed9t c\u00e1ch th\u00fa v\u1ecb.\u201d</i><br><div style=\"text-align: right;\">(Chu Lai, <i>N\u1eafng \u0111\u1ed3ng b\u1eb1ng</i>, NXB Lao \u0111\u1ed9ng, 2019)</div>Nh\u00e2n v\u1eadt Linh trong \u0111o\u1ea1n tr\u00edch \u0111\u01b0\u1ee3c kh\u1eafc ho\u1ea1 qua ph\u01b0\u01a1ng di\u1ec7n n\u00e0o?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch th\u1ec3 hi\u1ec7n d\u00f2ng suy ngh\u0129 n\u1ed9i t\u00e2m c\u1ee7a nh\u00e2n v\u1eadt Linh v\u1ec1 th\u1ef1c t\u1ebf chi\u1ebfn tr\u01b0\u1eddng kh\u1ed1c li\u1ec7t, n\u01a1i m\u00e0 con ng\u01b0\u1eddi bu\u1ed9c ph\u1ea3i t\u1eadp trung to\u00e0n b\u1ed9 t\u00e2m tr\u00ed \u0111\u1ec3 \u0111\u1ed1i ph\u00f3 v\u1edbi s\u1ef1 s\u1ed1ng v\u00e0 c\u00e1i ch\u1ebft. C\u00e1c chi ti\u1ebft nh\u01b0 \u201ct\u00e2m h\u1ed3n th\u1eadt \u0111\u01a1n gi\u1ea3n\u201d, \u201cs\u1ef1 suy ngh\u0129 th\u1eb3ng b\u0103ng\u201d, \u201c\u0111\u1ea7u \u00f3c ch\u1ec9 t\u1eadp trung lo l\u1eeba nhau\u201d, \u201ch\u1ebft ch\u00e1n \u0111\u1eddi, ch\u00e1n s\u1ed1ng\u201d, \u201cc\u00e1i \u0111\u1ea7u s\u1ebd c\u1ee5 th\u1ec3 l\u00e0nh m\u1ea1nh ngay\u201d \u0111\u1ec1u l\u00e0 nh\u1eefng suy ngh\u0129, \u0111\u00e1nh gi\u00e1 c\u1ee7a Linh v\u1ec1 m\u00f4i tr\u01b0\u1eddng xung quanh v\u00e0 v\u1ec1 ch\u00ednh b\u1ea3n th\u00e2n m\u00ecnh.\n", "key": "C", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601010, "lessonId": 0, "a": "Gi\u1ec5u c\u1ee3t.", "b": "B\u1ea5t b\u00ecnh.", "c": "\u0110\u1ea3 k\u00edch.", "d": "Ch\u00e2m bi\u1ebfm.", "bookId": 1088465, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cHO\u00c0NG VI\u1ec6T - C\u00e1i k\u1ebf ho\u1ea1ch s\u1ea3n xu\u1ea5t \u1ea5y \u1edf \u0111\u00e2u ra, anh Ch\u00ednh ?<br>NGUY\u1ec4N CH\u00cdNH - \u1ede c\u1ea5p tr\u00ean \u1ea1.<br>HO\u00c0NG VI\u1ec6T - Nh\u01b0ng c\u1ea5p tr\u00ean d\u1ef1a v\u00e0o \u0111\u00e2u m\u00e0 ra c\u00e1i k\u1ebf ho\u1ea1ch \u0111\u00f3?<br>NGUY\u1ec4N CH\u00cdNH - C\u00f3 l\u1ebd... d\u1ef1a v\u00e0o k\u1ebf ho\u1ea1ch \u1edf c\u1ea5p tr\u00ean cao h\u01a1n, d\u0129 nhi\u00ean !<br>HO\u00c0NG VI\u1ec6T - <b>C\u1ea5p tr\u00ean cao h\u01a1n l\u1ea1i d\u1ef1a v\u00e0o c\u1ea5p tr\u00ean cao h\u01a1n n\u1eefa, ngh\u0129a l\u00e0 c\u00e1c k\u1ebf ho\u1ea1ch \u0111\u01b0\u1ee3c \u0111\u1ec1 ra m\u1ed9t c\u00e1ch ng\u01b0\u1ee3c \u0111\u1eddi. </b>\u0110\u00e1ng l\u1ebd ph\u1ea3i do t\u1eeb c\u01a1 s\u1edf \u0111\u01b0a l\u00ean, d\u1ef1a tr\u00ean kh\u1ea3 n\u0103ng c\u01a1 s\u1edf v\u00e0 y\u00eau c\u1ea7u c\u1ee7a th\u1ecb tr\u01b0\u1eddng... C\u00e1c \u0111\u1ed3ng ch\u00ed, t\u1eeb nay ch\u00fang ta s\u1ebd ch\u1ee7 \u0111\u1ed9ng \u0111\u1eb7t ra k\u1ebf ho\u1ea1ch c\u1ee7a ch\u00ednh ch\u00fang ta.\u201d</i><br><div style=\"text-align: right;\">(L\u01b0u Quang V\u0169, <i>T\u00f4i v\u00e0 ch\u00fang ta</i>, theo <i>Ng\u1eef v\u0103n 9</i>, t\u1eadp 2, NXB Gi\u00e1o d\u1ee5c Vi\u1ec7t Nam, 2013)</div>Th\u00e1i \u0111\u1ed9 n\u00e0o c\u1ee7a Ho\u00e0ng Vi\u1ec7t \u0111\u01b0\u1ee3c b\u1ed9 l\u1ed9 trong c\u00e2u n\u00f3i in \u0111\u1eadm?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u00e2u n\u00f3i \u201cC\u1ea5p tr\u00ean cao h\u01a1n l\u1ea1i d\u1ef1a v\u00e0o c\u1ea5p tr\u00ean cao h\u01a1n n\u1eefa, ngh\u0129a l\u00e0 c\u00e1c k\u1ebf ho\u1ea1ch \u0111\u01b0\u1ee3c \u0111\u1ec1 ra m\u1ed9t c\u00e1ch ng\u01b0\u1ee3c \u0111\u1eddi\u201d th\u1ec3 hi\u1ec7n r\u00f5 s\u1ef1 b\u1ea5t b\u00ecnh c\u1ee7a Ho\u00e0ng Vi\u1ec7t tr\u01b0\u1edbc c\u00e1ch l\u00e0m vi\u1ec7c quan li\u00eau, thi\u1ebfu th\u1ef1c t\u1ebf. Anh kh\u00f4ng \u0111\u1ed3ng t\u00ecnh v\u1edbi vi\u1ec7c c\u00e1c k\u1ebf ho\u1ea1ch \u0111\u01b0\u1ee3c \u0111\u01b0a ra t\u1eeb c\u1ea5p tr\u00ean m\u1ed9t c\u00e1ch m\u00e1y m\u00f3c, kh\u00f4ng d\u1ef1a tr\u00ean t\u00ecnh h\u00ecnh th\u1ef1c t\u1ebf c\u1ee7a c\u01a1 s\u1edf.\n", "key": "B", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601022, "lessonId": 0, "a": "D\u00f2ng th\u1ee9 nh\u1ea5t.", "b": "D\u00f2ng th\u1ee9 hai.", "c": "D\u00f2ng th\u1ee9 ba.", "d": "D\u00f2ng th\u1ee9 t\u01b0.", "bookId": 1088466, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNgo\u1ea1i c\u1ea3m Hoa thi\u00ean t\u00e2n l\u00e3nh nhi\u1ec7t,<br>N\u1ed9i th\u01b0\u01a1ng Vi\u1ec7t \u0111\u1ecba c\u1ef1u s\u01a1n h\u00e0.<br>Ng\u1ee5c trung h\u1ea1i b\u1ec7nh ch\u00e2n t\u00e2n kh\u1ed5!<br>B\u1ea3n \u01b0ng th\u1ed1ng kh\u1ed1c kh\u01b0\u1edbc cu\u1ed3ng ca.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>B\u1ec7nh tr\u1ecdng</i>)</div>D\u1ecbch ngh\u0129a:<br><i>\u201cNgo\u1ea1i c\u1ea3m v\u00ec c\u01a1n n\u00f3ng l\u1ea1nh m\u1edbi \u1edf tr\u1eddi Hoa,<br>N\u1ed9i th\u01b0\u01a1ng v\u00ec c\u1ea3nh non s\u00f4ng c\u0169 c\u1ee7a \u0111\u1ea5t Vi\u1ec7t.<br>Trong t\u00f9 m\u00e0 m\u1eafc b\u1ec7nh, th\u1eadt l\u00e0 cay \u0111\u1eafng!<br>V\u1ed1n \u0111\u00e1ng \u0111au kh\u00f3c, m\u00e0 ta c\u1ee9 h\u00e1t tr\u00e0n.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>B\u1ec7nh n\u1eb7ng</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>D\u00f2ng th\u01a1 n\u00e0o b\u1ed9c l\u1ed9 t\u00ecnh c\u1ea3m y\u00eau n\u01b0\u1edbc trong con ng\u01b0\u1eddi H\u1ed3 Ch\u00ed Minh.", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nD\u00f2ng th\u01a1 \u201cN\u1ed9i th\u01b0\u01a1ng v\u00ec c\u1ea3nh non s\u00f4ng c\u0169 c\u1ee7a \u0111\u1ea5t Vi\u1ec7t\u201d n\u00e0o b\u1ed9c l\u1ed9 t\u00ecnh c\u1ea3m y\u00eau n\u01b0\u1edbc trong con ng\u01b0\u1eddi H\u1ed3 Ch\u00ed Minh. \u201cN\u1ed9i th\u01b0\u01a1ng\u201d c\u00f3 ngh\u0129a l\u00e0 n\u1ed7i \u0111au trong l\u00f2ng, xu\u1ea5t ph\u00e1t t\u1eeb vi\u1ec7c non s\u00f4ng \u0111\u1ea5t n\u01b0\u1edbc b\u1ecb x\u00e2m l\u01b0\u1ee3c, th\u1ec3 hi\u1ec7n s\u1ef1 day d\u1ee9t, tr\u0103n tr\u1edf c\u1ee7a B\u00e1c v\u1ec1 v\u1eadn m\u1ec7nh d\u00e2n t\u1ed9c.\n", "key": "B", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601044, "lessonId": 0, "a": "Ph\u00e1p.", "b": "Vi\u1ec7t Nam.", "c": "Nh\u1eadt B\u1ea3n.", "d": "Trung Qu\u1ed1c.", "bookId": 1088467, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cR\u1ea5t nhi\u1ec1u ki\u1ec1u d\u00e2n v\u00e0 v\u00f5 quan ngo\u1ea1i qu\u1ed1c trong b\u1ed9 \u0111\u1ed3 len \u1ea5m \u00e1p, sang tr\u1ecdng t\u1ecfa ra nh\u1eefng h\u01b0\u01a1ng th\u01a1m ng\u00e0o ng\u1ea1t c\u1ee7a n\u01b0\u1edbc hoa v\u00e0 c\u1ee7a y\u00ean h\u01b0\u01a1ng. Nh\u1eefng chi\u1ebfc \u00e1o kho\u00e1c tr\u1eafng nh\u01b0 tuy\u1ebft tr\u00ean vai nh\u1eefng thi\u1ebfu n\u1eef Vi\u1ec7t Nam hay nh\u1eefng thi\u1ebfu ph\u1ee5 m\u1edbi t\u1eeb mi\u1ec1n B\u1eafc xu\u1ed1ng \u0111\u00e2y, th\u1ea5p tho\u00e1ng trong nh\u1eefng chi\u1ebfc xe h\u01a1i ki\u1ec3u l\u1ea1, b\u00f3ng lo\u00e1ng, x\u1ecbch m\u00e1y, t\u1eeb t\u1eeb \u0111i trong ph\u1ed1. M\u1eb7c d\u1ea7u t\u1ea5t c\u1ea3 nh\u1eefng s\u1ef1 \u0111\u00e3 x\u1ea3y ra, m\u1ed9t v\u00f5 quan Nh\u1eadt B\u1ea3n v\u1eabn l\u1eabm li\u1ec7t ng\u1ed3i trong m\u1ed9t chi\u1ebfc xe h\u01a1i bu\u00f4ng mui v\u1edbi g\u01b0\u01a1m v\u00e0 g\u0103ng tay tr\u1eafng, r\u1ebd qua m\u1ed9t c\u1ed5ng ch\u00e0o c\u00f3 h\u00ecnh thanh thi\u00ean b\u1ea1ch nh\u1eadt v\u00e0 h\u00e0ng ch\u1eef Hoan h\u00f4 \u0110\u1ed3ng minh.\u201d</i><br><div style=\"text-align: right;\">(Tr\u1ea7n \u0110\u0103ng, <i>M\u1ed9t l\u1ea7n t\u1edbi Th\u1ee7 \u0111\u00f4</i>, theo <i>nguoihanoi.vn</i>)</div>T\u1eeb <i>ngo\u1ea1i qu\u1ed1c</i> (in \u0111\u1eadm) trong \u0111o\u1ea1n v\u0103n ch\u1ec9 \u0111\u1ed1i t\u01b0\u1ee3ng n\u00e0o?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nTrong \u0111o\u1ea1n v\u0103n, t\u00e1c gi\u1ea3 m\u00f4 t\u1ea3 \u201cki\u1ec1u d\u00e2n v\u00e0 v\u00f5 quan ngo\u1ea1i qu\u1ed1c\u201d \u0111ang xu\u1ea5t hi\u1ec7n tr\u00ean ph\u1ed1. Ngay sau \u0111\u00f3, \u0111o\u1ea1n v\u0103n nh\u1eafc tr\u1ef1c ti\u1ebfp \u0111\u1ebfn \u201cm\u1ed9t v\u00f5 quan Nh\u1eadt B\u1ea3n\u201d \u2013 chi ti\u1ebft n\u00e0y cho th\u1ea5y nh\u00f3m \u201cv\u00f5 quan ngo\u1ea1i qu\u1ed1c\u201d n\u00f3i \u0111\u1ebfn \u1edf tr\u00ean ch\u00ednh l\u00e0 ng\u01b0\u1eddi Nh\u1eadt, l\u1ef1c l\u01b0\u1ee3ng \u0111ang hi\u1ec7n di\u1ec7n t\u1ea1i Vi\u1ec7t Nam trong b\u1ed1i c\u1ea3nh l\u1ecbch s\u1eed l\u00fac b\u1ea5y gi\u1edd.<br>\n\u2192 T\u1eeb ngo\u1ea1i qu\u1ed1c (in \u0111\u1eadm) trong \u0111o\u1ea1n v\u0103n ch\u1ec9 ng\u01b0\u1eddi Nh\u1eadt B\u1ea3n.\n", "key": "C", "isVideo": true, "score": 0, "order": 11, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601045, "lessonId": 0, "a": "\u201cTh\u00e1nh T\u00f4ng di th\u1ea3o\u201d (L\u00ea Th\u00e1nh T\u00f4ng), \u201cTruy\u1ec1n k\u00ec m\u1ea1n l\u1ee5c\u201d (Nguy\u1ec5n D\u1eef), \u201cTruy\u1ec1n k\u00ec t\u00e2n ph\u1ea3\u201d (\u0110o\u00e0n Th\u1ecb \u0110i\u1ec3m).", "b": "\u201cVi\u1ec7t \u0111i\u1ec7n u linh t\u1eadp\u201d (L\u00fd T\u1ebf Xuy\u00ean), \u201cHo\u00e0ng L\u00ea nh\u1ea5t th\u1ed1ng ch\u00ed\u201d (Ng\u00f4 gia v\u0103n ph\u00e1i), \u201cQu\u1ed1c \u00e2m thi t\u1eadp\u201d (Nguy\u1ec5n Tr\u00e3i).", "c": "\u201cNam \u00d4ng m\u1ed9ng l\u1ee5c\u201d (H\u1ed3 Nguy\u00ean Tr\u1eebng), \u201c\u1ee8c Trai thi t\u1eadp\u201d (Nguy\u1ec5n Tr\u00e3i), \u201cB\u1eafc h\u00e0nh t\u1ea1p l\u1ee5c\u201d (Nguy\u1ec5n Du).", "d": "\u201cLi\u00eau Trai ch\u00ed d\u1ecb\u201d (B\u1ed3 T\u00f9ng Linh), \u201cB\u1ea1ch V\u00e2n qu\u1ed1c ng\u1eef thi\u201d (Nguy\u1ec5n B\u1ec9nh Khi\u00eam), \u201cNam trung t\u1ea1p ng\u00e2m\u  "normalizedType": "0"}, {"questionId": 21601051, "lessonId": 0, "a": "Ng\u1ecdn \u0111\u00e8n d\u1ea7u leo l\u00e9t tr\u00ean b\u00e0n kh\u00f4ng \u0111\u1ee7 soi r\u00f5 g\u01b0\u01a1ng m\u1eb7t \u1ee7 \u00ea c\u1ee7a hai ng\u01b0\u1eddi.", "b": "Gi\u1eefa l\u00e0n kh\u00f3i m\u1edd m\u1ecbt b\u1ed1c l\u00ean t\u1eeb nh\u1eefng thanh c\u1ee7i th\u00f4ng \u1ea9m, Kh\u1ea3i m\u01a1 h\u1ed3 nh\u00ecn th\u1ea5y b\u00f3ng ng\u01b0\u1eddi l\u1eb7ng l\u1ebd \u0111\u1ee9ng tr\u00ean tri\u1ec1n d\u1ed1c.", "c": "Ngh\u00e8o \u0111\u00f3i l\u00e0 k\u1ebb th\u00f9 c\u1ee7a D\u01b0\u01a1ng nh\u01b0ng c\u0169ng l\u1ea1i ch\u00ednh l\u00e0 \u0111\u1ed9ng l\u1ef1c gi\u00fap anh v\u01b0\u1ee3t qua m\u1ecdi kh\u00f3 kh\u0103n gian kh\u1ed5.", "d": "B\u1ecb gi\u1eadt con b\u00fap b\u00ea b\u1ea5t ng\u1edd, con b\u00e9 d\u00e3y n\u1ea3y l\u00ean.", "bookId": 1088470, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "C\u00e2u n\u00e0o d\u01b0\u1edbi \u0111\u00e2y ch\u1ee9a t\u1eeb vi\u1ebft sai ch\u00ednh t\u1ea3?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- C\u00e2u \u201cB\u1ecb gi\u1eadt con b\u00fap b\u00ea b\u1ea5t ng\u1edd, con b\u00e9 d\u00e3y n\u1ea3y l\u00ean.\u201d c\u00f3 t\u1eeb \u201cd\u00e3y n\u1ea3y\u201d sai ch\u00ednh t\u1ea3.<br>\n- S\u1eeda l\u1ea1i: B\u1ecb gi\u1eadt con b\u00fap b\u00ea b\u1ea5t ng\u1edd, con b\u00e9 gi\u00e3y n\u1ea3y l\u00ean.\n", "key": "D", "isVideo": true, "score": 0, "order": 14, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601058, "lessonId": 0, "a": "xu\u1ea5t nh\u1eadp kh\u1ea9u.", "b": "kinh ng\u1ea1ch.", "c": "n\u01b0\u1edbc ta.", "d": "h\u00e0ng ho\u00e1.", "bookId": 1088471, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "N\u0103m nay, t\u1ed5ng <u>kinh ng\u1ea1ch</u> <u>xu\u1ea5t nh\u1eadp kh\u1ea9u</u> <u>h\ adu \u1ea5y r\u1ea5t hay g\u1eb7p may.\n", "key": "D", "isVideo": true, "score": 0, "order": 16, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601066, "lessonId": 0, "a": "Ng\u00f4i nh\u00e0 c\u0169 t\u01b0\u1eddng v\u00f4i bong tr\u00f3c loang l\u1ed5, m\u00e1i ng\u00f3i t\u01b0\u01a1i m\u00e0u.", "b": "Mai n\u00e0y, t\u00f4i s\u1ebd l\u00ean th\u00e0nh ph\u1ed1, t\u00ecm m\u1ed9t c\u00f4ng vi\u1ec7c ph\u00f9 h\u1ee3p \u0111\u1ec3 \u0111\u1ee1 \u0111\u1ea7n m\u1eb9 t\u00f4i.", "c": "D\u00f9 r\u1ea5t m\u1ec7t nh\u01b0ng con b\u00e9 v\u1eabn c\u1ed1 n\u1eb1m b\u1ec7t tr\u00ean gi\u01b0\u1eddng.", "d": "M\u1ea5y ai bi\u1ebft \u0111\u01b0\u1ee3c nh\u1eefng s\u1ee3i t\u01a1 tr\u1eafng d\u1ec7t n\u00ean m\u1eaft tr\u1eddi th\u00e1ng t\u01b0 c\u00f3 t\u1eeb hoa g\u1ea1o th\u00e1ng ba?", "bookId": 1088473, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "C\u00e2u n\u00e0o d\u01b0\u1edbi \u0111\u00e2y l\u00e0 c\u00e2u \u0111\u00fang?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- Lo\u1ea1i A v\u00ec c\u00e2u sai logic. \u201cNg\u00f4i nh\u00e0 c\u0169\u201d kh\u00f4ng th\u1ec3 c\u00f3 \u201cm\u00e1i ng\u00f3i t\u01b0\u01a1i m\u00e0u\u201d.<br>\n- Lo\u1ea1i C v\u00ec c\u00e2u sai logic. C\u1eb7p quan h\u1ec7 t\u1eeb \u201cd\u00f9 - nh\u01b0ng\u201d d\u00f9ng \u0111\u1ec3 n\u1ed1i hai m\u1ec7nh \u0111\u1ec1 c\u00f3 quan h\u1ec7 \u0111\u1ed1i l\u1eadp nhau nh\u01b0ng \u201cr\u1ea5t m\u1ec7t\u201d v\u00e0 \u201cc\u1ed1 n\u1eb1m b\u1ec7 tr\u00ean gi\u01b0\u1eddng\u2019 kh\u00f4ng h\u1ec1 \u0111\u1ed1i l\u1eadp m\u00e0 b\u1ed5 sung cho nhau. H\u01a1n n\u1eefa, t\u1eeb \u201cc\u1ed1\u201d di\u1ec5n t\u1ea3 h\u00e0nh \u0111\u1ed9ng ph\u1ea3i b\u1ecf nhi\u1ec1u s\u1ee9c l\u1ef1c \u0111\u1ec3 l\u00e0m m\u1ed9t vi\u1ec7c g\u00ec \u0111\u00f3 nh\u01b0ng \u201cn\u1eb1m b\u1ec7t\u201d l\u00e0 h\u00e0nh gic ng\u1eef ngh\u0129a.", "b": "C\u00e2u m\u1eafc l\u1ed7i d\u00f9ng t\u1eeb.", "c": "C\u00e2u sai c\u1ea5u t\u1ea1o ng\u1eef ph\u00e1p.", "d": "C\u00e2u m\u1eafc l\u1ed7i d\u1ea5u c\u00e2u.", "bookId": 1088475, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cTr\u00ean m\u1eb7t \u0111\u1ea5t l\u1edfm ch\u1edfm.\u201d<br>Nh\u1eadn \u0111\u1ecbnh n\u00e0o v\u1ec1 c\u00e2u tr\u00ean l\u00e0 \u0111\u00fang?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- C\u00e2u m\u1eafc l\u1ed7i sau c\u1ea5u t\u1ea1o ng\u1eef ph\u00e1p, ch\u1ec9 c\u00f3 tr\u1ea1ng ng\u1eef v\u00e0 thi\u1ebfu th\u00e0nh ph\u1ea7n n\u00f2ng c\u1ed1t c\u00e2u.<br>\n- S\u1eeda l\u1ea1i: Tr\u00ean m\u1eb7t \u0111\u1ea5t xu\u1ea5t hi\u1ec7n nh\u1eefng vi\u00ean \u0111\u00e1 l\u1edfm ch\u1edfm.\n", "key": "C", "isVideo": true, "score": 0, "order": 19, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601075, "lessonId": 0, "a": "Tr\u1eddi cao l\u1ea5p l\u00e1nh sao, \u0111\u00eam m\u00e1t m\u1ebb, kh\u00e1c h\u1eb3n v\u1edbi h\u1ed3i tr\u01b0a.", "b": "Trong chi\u1ebfc h\u00f2m nh\u1ecf, nh\u1eefng cu\u1ed1n s\u00e1ch ng\u1ea3 m\u00e0u.", "c": "T\u00f4i kh\u00f4ng r\u00f5 v\u00ec sao l\u1ea1i y\u00eau v\u1ebb \u0111\u1eb9p c\u1ee7a t\u00e0n l\u1eeda \u0111\u1ebfn th\u1ebf.", "d": "B\u1ed1 \u0111\u00e3 r\u1ea5t vui v\u00e0 r\u01b0ng r\u01b0ng khi nh\u00ecn th\u1ea5y con x\u00fang x\u00ednh trong b\u1ed9 qu\u1ea7n \u00e1o \u0111\u1ed3ng ph\u1ee5c c\u1ee7a nh\u00e0 tr\u01b0\u1eddng.", "bookId": 1088476, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Ch\u1ec9 ra c\u00e2u sai trong c\u00e1c c\u00e2u sau", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- C\u00e2u \u201cTrong chi\u1ebfc h\u00f2m nh\u1ecf, nh\u1eefng cu\u1ed1n s\u00e1ch ng\u1ea3 m\u00e0u.\u201d ch\u1ec9 c\u00f3 tr\u1ea1ng ng\u1eef v\u00e0 ch\u1ee7 ng\u1eef, c\u00e2u thi\u1ebfu v\u1ecb ng\u1eef.<br>\n- S\u1eeda l\u1ea1i: Trong chi\u1ebfc h\u00f2m nh\u1ecf, nh\u1eefng cu\u1ed1n s\u00e1ch ng\u1ea3 m\u00e0u \u0111\u01b0\u1ee3c s\u1eafp x\u1ebfp g\u1ecdn g\u00e0ng.\n", "key": "B", "isVideo": true, "score": 0, "order": 20, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 21 \u0111\u1ebfn 25", "content": "\u201cV\u00e0o th\u00e1ng 8/2024, t\u1ea1p ch\u00ed <i>Cosmos </i>- m\u1ed9t t\u1ea1p ch\u00ed khoa h\u1ecdc \u0111\u1ea1i ch\u00fang c\u00f3 \u1ea3nh h\u01b0\u1edfng c\u1ee7a \u00dac - th\u1ea5y r\u1eb1ng m\u00ecnh kh\u00f4ng ch\u1ec9 \u0111\u01b0a tin m\u00e0 c\u00f2n tr\u1edf th\u00e0nh ngu\u1ed3n th\u00f4ng tin. Thu\u1ed9c s\u1edf h\u1eefu c\u1ee7a NXB CSIRO (Commonwealth Scientific and Industrial Research Organisation T\u1ed5 ch\u1ee9c Nghi\u00ean c\u1ee9u Khoa h\u1ecdc v\u00e0 C\u00f4ng nghi\u1ec7p Kh\u1ed1i th\u1ecbnh v\u01b0\u1ee3ng chung) - m\u1ed9t ph\u1ea7n c\u1ee7a c\u01a1 quan khoa h\u1ecdc qu\u1ed1c gia \u00dac - <i>Cosmos </i>\u0111\u00e3 \u0111\u0103ng tr\u00ean trang web c\u1ee7a m\u00ecnh m\u1ed9t lo\u1ea1t b\u00e0i \u0111\u01b0\u1ee3c vi\u1ebft b\u1eb1ng tr\u00ed tu\u1ec7 nh\u00e2n t\u1ea1o t\u1ea1o sinh v\u1edbi t\u00ean g\u1ecdi \u201cNg\u01b0\u1eddi gi\u1ea3i th\u00edch\u201d, nh\u01b0 m\u1ed9t ph\u1ea7n c\u1ee7a m\u1ed9t th\u00ed nghi\u1ec7m do Qu\u1ef9 Walkley (m\u1ed9t t\u1ed5 ch\u1ee9c phi l\u1ee3i nhu\u1eadn \u0111\u1ed9c l\u1eadp c\u1ee7a \u00dac) t\u00e0i tr\u1ee3. V\u1edbi c\u00e1c ch\u1ee7 \u0111\u1ec1 nh\u01b0 l\u1ed7 \u0111en v\u00e0 b\u1ed3n ch\u1ee9a carbon, n\u1ed9i dung c\u00e1c b\u00e0i do AI vi\u1ebft \u0111\u00e3 \u0111\u01b0\u1ee3c ki\u1ec3m tra th\u1ef1c t\u1ebf t\u1eeb kho l\u01b0u tr\u1eef c\u1ee7a t\u1ea1p ch\u00ed g\u1ed3m h\u01a1n 15.000 b\u00e0i vi\u1ebft tr\u01b0\u1edbc \u0111\u00e2y. M\u1ee5c \u0111\u00edch c\u1ee7a th\u1eed nghi\u1ec7m n\u00e0y l\u00e0 nh\u1eb1m ph\u1ee7 nh\u1eadn n\u1ed7i lo v\u1ec1 th\u00f4ng tin sai l\u1ec7ch do AI t\u1ea1o ra. Nh\u01b0ng \u00edt nh\u1ea5t m\u1ed9t trong nh\u1eefng b\u00e0i vi\u1ebft nh\u01b0 th\u1ebf \u0111\u00e3 c\u00f3 ch\u1ee9a th\u00f4ng tin kh\u00f4ng ch\u00ednh x\u00e1c.<br>Nh\u1eefng ng\u01b0\u1eddi ch\u1ec9 tr\u00edch, ch\u1eb3ng h\u1ea1n nh\u01b0 Jackson Ryan (ph\u00f3ng vi\u00ean Khoa h\u1ecdc v\u00e0 C\u00f4ng ngh\u1ec7 c\u1ee7a \u0111\u01a1n v\u1ecb Khoa h\u1ecdc <i>ABC</i>) \u0111\u00e3 l\u00ean \u00e1n th\u1eed nghi\u1ec7m c\u1ee7a <i>Cosmos </i>l\u00e0 l\u00e0m suy y\u1ebfu v\u00e0 h\u1ea1 th\u1ea5p gi\u00e1 tr\u1ecb c\u1ee7a b\u00e1o ch\u00ed khoa h\u1ecdc ch\u1ea5t l\u01b0\u1ee3ng cao. Ryan vi\u1ebft tr\u00ean blog Substack c\u1ee7a m\u00ecnh r\u1eb1ng AI kh\u00f4ng ch\u1ec9 b\u1ecba ra m\u1ecdi th\u1ee9 v\u00e0 t\u1ef1 \u0111\u00e0o t\u1ea1o b\u1ea3n th\u00e2n tr\u00ean c\u00e1c t\u00e0i li\u1ec7u c\u00f3 b\u1ea3n quy\u1ec1n m\u00e0 \u201cph\u1ea7n l\u1edbn c\u00f2n \u0111\u01b0a ra m\u1ed9t ki\u1ec3u v\u0103n xu\u00f4i l\u1ea1nh l\u00f9ng, nh\u00e0m ch\u00e1n\u201d. Nhi\u1ec1u c\u1ef1u nh\u00e2n vi\u00ean c\u1ee7a t\u1ea1p ch\u00ed c\u0169ng ph\u00e0n n\u00e0n v\u1edbi <i>ABC News</i> (ngu\u1ed3n th\u00f4ng tin \u0111\u00e1ng tin c\u1eady nh\u1ea5t c\u1ee7a \u00dac) l\u00e0 kh\u00f4ng bi\u1ebft g\u00ec v\u1ec1 th\u1eed nghi\u1ec7m n\u00e0y v\u00ec n\u00f3 di\u1ec5n ra ch\u1ec9 v\u00e0i th\u00e1ng sau khi t\u1ea1p ch\u00ed sa th\u1ea3i n\u0103m trong s\u1ed1 t\u00e1m nh\u00e2n vi\u00ean c\u1ee7a m\u00ecnh.<br>S\u1ef1 c\u1ed1 <i>Cosmos </i>l\u00e0 l\u1eddi nh\u1eafc nh\u1edf ch\u00fang ta \u0111ang \u1edf giai \u0111o\u1ea1n \u0111\u1ea7u c\u1ee7a vi\u1ec7c s\u1eed d\u1ee5ng AI t\u1ea1o sinh trong truy\u1ec1n th\u00f4ng khoa h\u1ecdc. AI r\u1ea5t d\u1ec5 m\u1eafc l\u1ed7i v\u00e0 g\u00f3p ph\u1ea7n v\u00e0o l\u00e0n s\u00f3ng th\u00f4ng tin sai l\u1ec7ch tr\u1ef1c tuy\u1ebfn, c\u00f3 kh\u1ea3 n\u0103ng g\u00e2y t\u1ed5n h\u1ea1i \u0111\u1ebfn x\u00e3 h\u1ed9i hi\u1ec7n \u0111\u1ea1i, n\u01a1i khoa h\u1ecdc v\u00e0 c\u00f4ng ngh\u1ec7 \u0111\u1ecbnh h\u00ecnh n\u00ean r\u1ea5t nhi\u1ec1u kh\u00eda c\u1ea1nh trong cu\u1ed9c s\u1ed1ng c\u1ee7a ch\u00fang ta. Truy\u1ec1n th\u00f4ng khoa h\u1ecdc ch\u00ednh x\u00e1c, ch\u1ea5t l\u01b0\u1ee3ng cao l\u00e0 \u0111i\u1ec1u c\u1ea7n thi\u1ebft, \u0111\u1eb7c bi\u1ec7t l\u00e0 n\u1ebfu ch\u00fang ta mu\u1ed1n kh\u01a1i d\u1eady s\u1ef1 quan t\u00e2m c\u1ee7a c\u00f4ng ch\u00fang \u0111\u1ed1i v\u1edbi v\u1eadt l\u00ed v\u00e0 khuy\u1ebfn kh\u00edch nhi\u1ec1u ng\u01b0\u1eddi h\u01a1n n\u1eefa tham gia v\u00e0o ng\u00e0nh khoa h\u1ecdc n\u00e0y.\u201d<br><div style=\"text-align: right;\">(Nguy\u1ec5n B\u00e1 \u00c2n d\u1ecbch, <i>AI c\u00f3 th\u1ef1c s\u1ef1 th\u00fac \u0111\u1ea9y truy\u1ec1n th\u00f4ng khoa h\u1ecdc?</i>, theo <i>tiasang.com.vn</i>)</div>", "listQuestion": [{"questionId": 21601091, "lessonId": 0, "a": "Sa th\u1ea3i n\u0103m trong s\u1ed1 t\u00e1m nh\u00e2n vi\u00ean c\u1ee7a m\u00ecnh.", "b": "\u0110\u0103ng tr\u00ean trang web c\u1ee7a m\u00ecnh m\u1ed9t lo\u1ea1t b\u00e0i \u0111\u01b0\u1ee3c vi\u1ebft b\u1eb1ng tr\u00ed tu\u1ec7 nh\u00e2n t\u1ea1o t\u1ea1o sinh v\u1edbi t\u00ean g\u1ecdi \u201cNg\u01b0\u1eddi gi\u1ea3i th\u00edch\u201d.", "c": "Ph\u1ee7 nh\u1eadn n\u1ed7i lo v\u1ec1 th\u00f4ng tin sai l\u1ec7ch do AI t\u1ea1o ra.", "d": "Xu\u1ea5t b\u1ea3n nh\u1eefng b\u00e0i b\u00e1o khoa h\u1ecdc ch\u1ea5t l\u01b0\u1ee3ng cao.", "bookId": 1088477, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "T\u1ea1p ch\u00ed <i>Cosmos</i> \u0111\u00e3 th\u1ef1c hi\u1ec7n th\u00ed nghi\u1ec7m g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nD\u1ef1a v\u00e0o th\u00f4ng tin trong c\u00e2u: \u201c\u2026 Cosmos \u0111\u00e3 \u0111\u0103ng tr\u00ean t g v\u1ebd l\u00ean m\u1ed7i g\u00f3c t\u01b0\u1eddng m\u1ed9t con m\u00e8o, m\u1eaft con n\u00e0o c\u0169ng xanh l\u00e9t g\u01b0\u1eddm g\u01b0\u1eddm khi\u1ebfn l\u0169 chu\u1ed9t t\u1eebng ch\u1ea1y r\u1ea7m r\u1ea7m nh\u01b0 b\u00e3o quanh nh\u00e0 ph\u1ea3i n\u1eb1m im th\u00edt. Anh v\u1ebd m\u1ed9t con s\u00e2u \u0111\u1eb7t l\u00ean b\u1eadu c\u1eeda, chim t\u1eeb \u0111\u00e2u s\u00e0 xu\u1ed1ng m\u1ed5 li\u00ean h\u1ed3i. Anh v\u1ebd t\u00f4m, con t\u00f4m t\u01b0\u01a1i r\u00f3i nh\u01b0 \u0111ang c\u1ef1a qu\u1eady mu\u1ed1n b\u00f2. Anh v\u1ebd c\u00e2y, c\u00e1i c\u00e2y hi\u1ec3n hi\u1ec7n nh\u01b0 s\u1edd \u0111\u01b0\u1ee3c v\u00e0o g\u00e2n l\u00e1 v\u00e0 nh\u1eefng \u0111\u01b0\u1eddng x\u00f9 x\u00ec n\u1ee9t n\u1ebb \u1edf th\u00e2n, s\u1eafc s\u1ea3o \u0111\u1ebfn t\u1eebng chi ti\u1ebft.<br>Phong th\u01b0\u1eddng \u0111\u1eafm \u0111u\u1ed1i v\u00e0o tranh t\u1ea3 thi\u00ean nhi\u00ean, trong \u0111\u00f3 anh d\u1ed3n nhi\u1ec1u tinh l\u1ef1c nh\u1ea5t v\u00e0o vi\u1ec7c t\u1ea3 n\u1eafng. Nh\u1eefng v\u0169ng n\u1eafng hanh v\u00e0ng \u0111\u1ecdng gi\u1eefa r\u1eebng hoang, nh\u1eefng \u0111\u1ed1m n\u1eafng v\u00e0ng h\u01b0\u01a1m r\u1edbt tr\u00ean t\u1ea3ng \u0111\u00e1, v\u1ec7t n\u1eafng m\u1ecfng tang b\u00e1m v\u00e0o k\u1ebd l\u00e1, h\u1ea1t n\u1eafng l\u00f3e tr\u00ean m\u1ea1ng nh\u1ec7n v\u00e0 long lanh trong \u0111\u00f4i c\u00e1nh chu\u1ed3n chu\u1ed3n... s\u1eafc \u0111\u1ed9 n\u00e0o c\u0169ng \u0111\u01b0\u1ee3c \u0111\u1eb7c t\u1ea3 tinh vi khi\u1ebfn Phong c\u00f3 th\u00eam bi\u1ec7t danh \u201cng\u01b0\u1eddi g\u1ecdi h\u1ed3n c\u1ee7a n\u1eafng\u201d. Anh ch\u1ec9 v\u1ea9y ra v\u00e0i n\u00e9t, ng\u01b0\u1eddi xem c\u0169ng ph\u00e2n bi\u1ec7t \u0111\u01b0\u1ee3c c\u1ea3nh b\u00ecnh minh hay c\u1ea3nh chi\u1ec1u t\u00e0. Phong t\u1ea3 gi\u00f3 c\u0169ng v\u00e0o b\u1eadc k\u00ec t\u00e0i. Gi\u00f3 hiu hiu, xao x\u00e1c, gi\u00f3 l\u1ed3ng l\u1ed9ng, \u00e0o \u00e0o... c\u1ee9 nh\u00ecn v\u00e0o c\u00e2y c\u1ecf trong         let examMode = 'practice'; // 'practice' or 'exam'

        let timerInterval;

                    e.target.value = examMode;
                }
            });
        };

        // --- TIMER LOGIC ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);

                    const qId = q.order || q.Order || globalIdx;

                    // -- Palette Item --
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop
                    palMob.appendChild(palBtn); // Add to Mobile

                    // -- Question Card --
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    // Header: Question Number
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    // Interaction Area
                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // === TYPE 0: MCQ ===
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            // Logic hiển thị kết quả
                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { // Chọn đúng
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { // Đúng nhưng không chọn (hiện đáp án khi nộp)
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { // Chọn sai
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; // Hiện đáp án đúng sau khi nộp dù chưa làm
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // === TYPE 1 & 3: FILL KEY ===
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let inputClass = "w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all font-mono";
                        let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
