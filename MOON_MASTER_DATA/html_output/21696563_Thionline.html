3ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/0578a475-cb06-4777-881b-69b71222c8df.png\"/> \n<br><font color=\"#0b9ff3\"><b>Y\u00eau c\u1ea7u b\u00e0i to\u00e1n:</b></font> T\u1ea1i v\u1ecb tr\u00ed m\u00e1y bay \u0111\u1ea1t \u0111\u1ed9 cao 2 kilomet so v\u1edbi m\u1eb7t \u0111\u1ea5t, t\u00ednh qu\u00e3ng \u0111\u01b0\u1eddng m\u00e1y bay \u0111\u00e3 bay \u0111\u01b0\u1ee3c.<br><img src=\"https://asset.moon.vn/img/chat/large/2025/12/d794f9f8-8541-4dcf-9964-763cda574175.jpg\" data-filename=\"\" style=\"max-width: 600px; height: 251.57px; width: 537px;\">\n<br>G\u1ecdi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/da11e34d-4c35-46b6-818b-17a50b5e2bbe.png\"/> l\u00e0 v\u1ecb tr\u00ed m\u00e1y bay \u0111\u1ea1t \u0111\u1ed9 cao 2 kilomet so v\u1edbi m\u1eb7t \u0111\u1ea5t sau khi chuy\u1ec3n h\u01b0\u1edbng bay t\u1eeb <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/16de655c-9ecb-4d90-af47-6a5591f43347.png\"/> Khi \u0111\u00f3 qu\u00e3ng \u0111\u01b0\u1eddng m\u00e1y bay \u0111\u00e3 bay b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/a0cc3db4-804d-4161-a9b7-7a0a4c00e463.png\"/>\n<br>Ta c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/ffe07edd-120f-47fc-bef0-ed15e18d2b78.png\"/><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/d6e4a931-4acc-4ddb-bd9a-3d448006510b.png\"/>\n<br>\u0110\u1ec3 t\u00ednh \u0111\u01b0\u1ee3c qu\u00e3ng \u0111\u01b0\u1eddng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/6d30214d-2c13-43eb-91cd-51b167240f11.png\"/> ta c\u1ea7n x\u00e1c \u0111\u1ecbnh t\u1ecda \u0111\u1ed9 \u0111i\u1ec3m <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/80ac8b82-ea17-49e4-b952-fae642ed3d28.png\"/> \n<br>V\u00ec <img style = \"vertical-alig f37f9-a754-4ef6-86f3-a66af16c7071.png\"/>\n<br><b>\u0110i\u1ec1n \u0111\u00e1p \u00e1n: 6236.\n</b>", "key": " ", "isVideo": true, "score": 0, "order": 4, "fillKey": "6236", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.5, "plans": [], "answerPlans": [], "normalizedType": "1"}, {"questionId": 21646810, "lessonId": 0, "a": "", "b": "", "c": "", "d": "", "bookId": 1095559, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 1, "questionText": "M\u1ed9t b\u1ec3 n\u01b0\u1edbc c\u00f3 d\u1ea1ng h\u00ecnh ch\u00f3p c\u1ee5t t\u1ee9 gi\u00e1c \u0111\u1ec1u c\u00f3 chi\u1ec1u cao <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/19dfca28-e079-499f-a268-11b7a6cc0e13.png\"/> \u0111\u00e1y b\u1ec3 l\u00e0 h\u00ecnh vu\u00f4ng c\u1ea1nh 10 cm v\u00e0 mi\u1ec7ng b\u1ec3 l\u00e0 h\u00ecnh vu\u00f4ng c\u1ea1nh 20 cm. M\u1ed9t vi\u00ean bi s\u1eaft h\u00ecnh c\u1ea7u kh\u00f4ng n\u1ed5i b\u00e1n k\u00ednh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/36c7b468-70e4-4aba-9253-8b2f3a5131b8.png\"/> \u0111\u1eb7t d\u01b0\u1edbi \u0111\u00e1y b\u1ec3 n\u01b0\u1edbc. Ban \u0111\u1ea7u b\u1ec3 c\u1ea1n, sau \u0111\u00f3 n\u01b0\u1edbc \u0111\u01b0\u1ee3c \u0111\u1ed5 v\u00e0o b\u1ec3 v\u1edbi t\u1ed1c \u0111\u1ed9 kh\u00f4ng \u0111\u1ed5i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/71ac9929-71c2-4f96-ae40-77cc8222081f.png\"/> T\u1ed1c \u0111\u1ed9 d\u00e2ng l\u00ean c\u1ee7a m\u1ef1c n\u01b0\u1edbc trong b\u1ec3 khi vi\u00ean bi s\u1eaft ng\u1eadp m\u1ed9t n\u1eeda trong n\u01b0\u1edbc l\u00e0 bao nhi\u00eau cm/s (<i>k\u1ebft qu\u1ea3 l\u00e0m tr\u00f2n \u0111\u1ebfn h\u00e0ng ph\u1ea7n tr\u0103m</i>).<br><img src=\"https://asset.moon.vn/img/chat/large/2025/12/a73b2924-3848-4008-9cce-2067d43f0dad.jpg\" data-filename=\"\" style=\"max-width: 600px; height: 250.081px; width: 371px;\">", "answer": "<b><font color=\"#fc0707\">N\u1ed9i dung ki\u1ebfn th\u1ee9c: </font></b> To\u00e1n l\u1edbp 12 (H\u00e0m s\u1ed1 + \u1ee8ng d\u1ee5ng c\u1ee7a t\u00edch ph\u00e2n).\n<br> <b><font color=\"#fc0707\">M\u1ee9c \u0111\u1ed9: </font></b>  V\u1eadn d\u1ee5ng (9+).\n<br><b><font color=\"#099fe3\">Gi\u1ea3 thi\u1ebft: \n</font></b><br>B\u1ec3 n\u01b0\u1edbc h\u00ecnh ch\u00f3p c\u1ee5t t\u1ee9 gi\u00e1c \u0111\u1ec1u: chi\u1ec1u cao b\u1ec3 l\u00e0 40 cm; c\u1ea1nh \u0111\u00e1y nh\u1ecf l\u00e0 10 cm; c\u1ea1nh \u0111\u00e1y l\u1edbn (mi\u1ec7ng b\u1ec3) l\u00e0 20 cm. \n<br>M\u1ed9t vi\u00ean bi h\u00ecnh c\u1ea7u b\u00e1n k\u00ednh 4 cm \u0111\u1eb7t d\u01b0\u1edbi \u0111\u00e1y b\u1ec3. \n<br>Ban \u0111\u1ea7u b\u1ec3 c\u1ea1n, sau \u0111\u00f3 n\u01b0\u1edbc \u0111\u01b0\u1ee3c \u0111\u1ed5 v\u00e0o b\u1ec3 v\u1edbi t\u1ed1c \u0111\u1ed9 kh\u00f4ng \u0111\u1ed5i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/abced3c7-a380-445a-b554-0f81d6ac61dc.png\"/> t\u1ee9c t\u1ed1c \u0111\u1ed9 t\u0103ng th\u1ec3 t\u00edch l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/f07985ca-46de-492e-9b33-1b4d9a05b071.png\"/>\n<br><b><font color=\"#049bf9\">Y\u00eau c\u1ea7u b\u00e0i to\u00e1n:</font></b> T\u00ednh t\u1ed1c \u0111\u1ed9 d\u00e2ng l\u00ean c\u1ee7a m\u1ef1c n\u01b0\u1edbc <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/59de6c55-c3f6-4375-a2aa-3f1e6e7e5902.png\"/> trong b\u1ec3 khi vi\u00ean bi s\u1eaft ng\u1eadp m\u1ed9t n\u1eeda trong n\u01b0\u1edbc (\u0111\u01a1n v\u1ecb cm/s, k\u1ebft qu\u1ea3 l\u00e0m tr\u00f2n \u0111\u1ebfn h\u00e0ng ph\u1ea7n tr\u0103m). T\u1ee9c t\u00ednh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/ad2769cd-ba23-47a9-8f1f-ab14c1178450.png\"/> khi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7877f6c6-1423-4236-91c4-da21189fb763.png\"/> (v\u00ec khi vi\u00ean bi s\u1eaft ng\u1eadp 1 n\u1eeda trong n\u01b0\u1edbc th\u00ec chi\u1ec1u cao c\u1ee7a m\u1ef1c n\u01b0\u1edbc l\u00fac n\u00e0y b\u1eb1ng b\u00e1n k\u00ednh c\u1ee7a vi\u00ean bi v\u00e0 b\u1eb1ng 4 cm).\n<br>Khi \u0111\u00f3, ta c\u1ea7n t\u00ednh th\u1ec3 t\u00edch c\u1ee7a n\u01b0\u1edbc trong b\u1ec3 theo chi\u1ec1u cao <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/475598f0-5293-405d-93de-8cf8ec012dbd.png\"/> l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/038cd4e1-faec-4b31-886b-458870ea7016.png\"/> Suy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/e9a42c9a-c992-4b64-82a2-4ab29b9df5d9.png\"/> \n<br>M\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/a0d04961-e618-4046-a579-df892cb4f4e7.png\"/> n\u00ean suy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/6c011981-0daf-48d1-8ba0-7c90e372eb23.png\"/>\n\n<br>Th\u1ec3 t\u00edch n\u01b0\u1edbc t\u1ea1i th\u1eddi \u0111i\u1ec3m <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/55e60466-7f84-4a26-a3a5-74b5c7c98a0e.png\"/> gi\u00e2y b\u1eb1ng th\u1ec3 t\u00edch h\u00ecnh ch\u00f3p c\u1ee5t (c\u00f3 chi\u1ec1u cao <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/b910f8d9-f354-442b-a306-b04de78086bb.png\"/> tr\u1eeb \u0111i th\u1ec3 t\u00edch c\u1ee7a kh\u1ed1i ch\u1ecfm c\u1ea7u (b\u1ecb ng\u1eadp trong n\u01b0\u1edbc) c\u00f3 chi\u1ec1u cao <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/77724216-6364-4af5-9991-74d3f5cc8ddf.png\"/> l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/539d6e17-d8dd-4433-93a9-3a70298bf46a.png\"/>\n<br>\u00c1p d\u1ee5ng c\u00f4ng th\u1ee9c t\u00ednh nhanh th\u1ec3 t\u00edch c\u1ee7a kh\u1ed1i ch\u1ecfm c\u1ea7u: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/4354dff6-8640-4c20-934e-62af96c60d60.png\"/> v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/c9e9ce01-be6f-426b-a088-2c0c4e7cc974.png\"/> l\u00e0 b\u00e1n k\u00ednh v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7d80ac78-b9a9-4f3e-9744-d304e45c297c.png\"/> l\u00e0 chi\u1ec1u cao. <br>(<i><font color=\"#fc560d\">C\u00e1c em c\u00f3 th\u1ec3 xem video l\u00ed thuy\u1ebft th\u1ea7y ch\u1ec9 ra c\u00f4ng th\u1ee9c kh\u1ed1i ch\u1ecfm c\u1ea7u \u1edf d\u01b0\u1edbi nh\u00e9!</font></i>)\n<br>Suy ra th\u1ec3 t\u00edch ch\u1ecfm c\u1ea7u (ph\u1ea7n ng\u1eadp trong n\u01b0\u1edbc) l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/49ec0010-6f7f-4b02-9971-4c89256148ac.png\"/>\n<br>Ti\u1ebfp \u0111\u1ebfn ta s\u1ebd t\u00ednh th\u1ec3 t\u00edch h\u00ecnh ch\u00f3p c\u1ee5t (n\u01b0\u1edbc) b\u1eb1ng 2 c\u00e1ch:\n<br><b><font color=\"#e011ae\"><u>C\u00e1ch 1:</u></font></b> S\u1eed d\u1ee5ng <b>c\u00f4ng th\u1ee9c t\u00ednh nhanh</b> th\u1ec3 t\u00edch ch\u00f3p c\u1ee5t: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/6d002c9e-aa09-4069-8c2b-3d6e0c19b803.png\"/>\n<br>Th\u1ec3 t\u00edch ch\u00f3p c\u1ee5t c\u00f3 chi\u1ec1u cao l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/36dfe121-55d8-4585-b61c-af5e9510b6b7.png\"/> \u0111\u00e1y nh\u1ecf l\u00e0 h\u00ecnh vu\u00f4ng c\u1ea1nh 10 cm c\u00f3 di\u1ec7n t\u00edch l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/6b7682d4-f734-4970-9ec4-0589fefb276c.png\"/> \u0111\u00e1y l\u1edbn l\u00e0 h\u00ecnh vu\u00f4ng c\u1ea1nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/57166eba-8a89-4a3f-ba64-557099528eba.png\"/><br><img src=\"https://asset.moon.vn/img/chat/large/2025/12/ed43ab83-0191-4e8e-a0d4-2277e2757430.jpg\" data-filename=\"\" style=\"max-width: 600px; height: 388.594px; width: 437px;\">\n \n<br>Minh h\u1ecda m\u1eb7t c\u1eaft c\u1ee7a b\u1ec3 n\u01b0\u1edbc, d\u1ef1ng v\u00e0 k\u00ed hi\u1ec7u c\u00e1c \u0111i\u1ec3m nh\u01b0 h\u00ecnh v\u1ebd (\u0111o\u1ea1n th\u1eb3ng m\u00e0u cam l\u00e0 c\u1ea1nh \u0111\u00e1y l\u1edbn <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/e0cc8e83-66d2-49f2-87cc-1110e7cc6b47.png\"/> c\u1ee7a m\u1eb7t n\u01b0\u1edbc).\n<br>V\u00ec m\u1eb7t n\u01b0\u1edbc song song v\u1edbi hai m\u1eb7t \u0111\u00e1y b\u1ec3 n\u00ean ta d\u1ec5 d\u00e0ng ch\u1ee9ng minh \u0111\u01b0\u1ee3c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/0ffa3025-4d3d-4d26-bf2a-5182f1f0b74b.png\"/>\n<br>Suy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/801882e6-98a4-4a47-bb31-1bb3bd5c2210.png\"/><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/0ab5cc02-877f-4bc6-b81d-ba6bd0b3c68e.png\"/><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/6bff4356-c28a-4731-aee6-9357dacff512.png\"/> suy ra c\u1ea1nh c\u1ee7a \u0111\u00e1y l\u1edbn l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/413fdd9e-ed46-4782-95eb-4dff3d970598.png\"/>\n<br>Di\u1ec7n t\u00edch c\u1ee7a \u0111\u00e1y l\u1edbn l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/96a3a548-604f-466e-b74c-85606afb331e.png\"/>\n<br>V\u1eady th\u1ec3 t\u00edch ch\u00f3p c\u1ee5t l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/c10bf4f5-5010-4227-a37a-eba27ef5428a.png\"/><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/4585bf9d-9bab-40da-b514-4f7a71bb4c51.png\"/><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/88ce3c8b-9537-4b82-8432-319ed267fe0a.png\"/><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/da53dd52-9a68-4052-b657-74c9cac77557.png\"/><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/f0f6d08b-06aa-468f-a464-0b4c545035f8.png\"/>\n<br><b><font color=\"#e011ae\"><u>C\u00e1ch 2:</u></font></b> T\u00ednh th\u1ec3 t\u00edch ch\u00f3p c\u1ee5t b\u1eb1ng <b>t\u00edch ph\u00e2n\n</b><br><b><i><font color=\"#03bd1a\">Nh\u1eafc l\u1ea1i:</font></i></b> C\u1eaft m\u1ed9t v\u1eadt th\u1ec3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/86ac3fd4-39d8-48e8-b015-37a3ef2413d0.png\"/> b\u1edfi hai m\u1eb7t ph\u1eb3ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7aa943ac-b17b-4b36-9a7f-eabecd67cf2c.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/6771d3c0-80e0-448b-92b2-d1510bed4586.png\"/> vu\u00f4ng g\u00f3c v\u1edbi tr\u1ee5c Ox l\u1ea7n l\u01b0\u1ee3t t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/b72859b6-873d-4035-b060-6a6fad9b3758.png\"/>. M\u1ed9t m\u1eb7t ph\u1eb3ng tu\u1ef3 \u00fd vu\u00f4ng g\u00f3c v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/bd8a12f8-528c-4fd9-9a87-69e983808e6f.png\"/> t\u1ea1i \u0111i\u1ec3m <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/151fd636-0d27-482c-a9f4-e4a3284ae277.png\"/> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/465b9630-dc79-461e-9573-b07e50367f9f.png\"/> c\u1eaft <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/44004917-cf59-4e9c-b2cf-6ceee1827dd8.png\"/> theo thi\u1ebft di\u1ec7n l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/29b27e6c-60ed-4854-8ef7-75587fe35f5d.png\"/> Khi \u0111\u00f3 th\u1ec3 t\u00edch v\u1eadt th\u1ec3 l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/21084a75-0e1a-4bf0-bb94-bb53a38882af.png\"/>\n<br>Quan s\u00e1t b\u1ec3 n\u01b0\u1edbc, ta th\u1ea5y n\u01b0\u1edbc trong b\u1ec3 gi\u1edbi h\u1ea1n b\u1edfi hai m\u1eb7t ph\u1eb3ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/05a3ba61-cb95-4e10-81ce-7bdcfd1b1aac.png\"/> v\u00e0 c\u00f3 thi\u1ebft di\u1ec7n (\u0111\u01b0\u1ee3c c\u1eaft theo m\u1eb7t c\u1eaft ngang) l\u00e0 h\u00ecnh vu\u00f4ng c\u1ea1nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/25febb46-9cae-4064-be2f-ccf865341181.png\"/> n\u00ean c\u00f3 th\u1ec3 t\u00edch l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/9e0fee03-9604-430f-8588-f1e9c7bda6c8.png\"/>\n<br>L\u1eb7p l\u1ea1i c\u00e1ch t\u00ednh nh\u01b0 c\u00e1ch 1, ta thu \u0111\u01b0\u1ee3c \u0111\u1ed9 d\u00e0i c\u1ea1nh \u0111\u00e1y l\u1edbn c\u1ee7a ch\u00f3p c\u1ee5t l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/24bd0d3e-27a6-4ac1-aa99-aefb052a1f99.png\"/> v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/02004b9d-7895-470e-a3ad-7903874c11db.png\"/> l\u00e0 chi\u1ec1u cao c\u1ee7a n\u01b0\u1edbc trong b\u1ec3.\n<br>Suy ra th\u1ec3 t\u00edch v\u1eadt th\u1ec3 l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/3cee4b2b-fef6-4305-938d-a8e9f3c2ea2b.png\"/><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7e3b2cdd-5577-4ca6-8c53-c55031338629.png\"/><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/6a48def7-b45a-4d63-b6b0-5cbadeb2df87.png\"/><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7fd56e7c-b6b0-490f-b9a1-fe97cd1f36cb.png\"/><img                 const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');

                document.getElementById('timer-mobile').innerText = `${m}:${s}`;

        }

        // --- SCROLL HELPER (SỬA LỖI MỤC LỤC DESKTOP) ---
        function scrollToQuestion(qKey) {
            const el = document.getElementById(`question-${qKey}`);
            if (el) {
                // Scroll native với offset (do header fixed)
                // Sử dụng phương pháp cũ nhưng chắc chắn hoạt động hơn scrollIntoView trên container cuộn

                const yOffset = -80; // Trừ header
                const y = el.getBoundingClientRect().top + window.pageYOffset + yOffset;
                
                window.scrollTo({top: y, behavior: 'smooth'});

                    // Gán sự kiện click trực tiếp thay vì chuỗi string HTML để tránh lỗi scope

                    palDesk.appendChild(palBtn.cloneNode(true)); // Desktop clone cần gán lại event nếu cloneNode ko copy event

                    palBtn.setAttribute('onclick', `scrollToQuestion('${qKey}')`);

                    // Code cũ append child.
                    
                    // Fix triệt để: Tạo string HTML cho palette

                });
            });

                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
