    <script>
        const EXAM_DATA = [{"title": "", "content": "", "listQuestion": [{"questionId": 21598000, "lessonId": 0, "a": "Ngu\u1ed3n g\u1ed1c c\u1ee7a lo\u00e0i ng\u01b0\u1eddi.", "b": "C\u00e2u chuy\u1ec7n t\u00ecnh y\u00eau \u0111\u1ea7u ti\u00ean c\u1ee7a lo\u00e0i ng\u01b0\u1eddi.", "c": "\u00dd \u0111\u1ecbnh t\u1ea1o ra lo\u00e0i ng\u01b0\u1eddi c\u1ee7a Tr\u1eddi.", "d": "T\u00ecnh y\u00eau c\u1ee7a ng\u01b0\u1eddi Nam, ng\u01b0\u1eddi N\u1eef.", "bookId": 1088367, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cHai ng\u01b0\u1eddi Nam, N\u1eef \u0111\u1ea7u ti\u00ean xu\u1ea5t hi\u1ec7n tr\u00ean m\u1eb7t \u0111\u1ea5t kh\u00f4ng c\u00f3 cha m\u1eb9, v\u00ec h\u1ecd do \u0111\u1ea5t n\u1eb7n ra. T\u1ef1 cho l\u00e0 hai anh em, mu\u1ed1n l\u1ea5y nhau, m\u1ed7i ng\u01b0\u1eddi \u0111\u1ee9ng tr\u00ean m\u1ed9t ng\u1ecdn n\u00fai l\u0103n xu\u1ed1ng m\u1ed9t h\u00f2n \u0111\u00e1. \u0110\u00e1 c\u1ee7a ng\u01b0\u1eddi con g\u00e1i l\u0103n xu\u1ed1ng d\u01b0\u1edbi th\u1ea5p, h\u00f2n \u0111\u00e1 c\u1ee7a ng\u01b0\u1eddi con trai l\u0103n theo ch\u1ed3ng l\u00ean, H\u1ecd l\u1ea1i l\u0103n hai c\u00e1i s\u00e0ng, k\u1ebft qu\u1ea3 c\u0169ng nh\u01b0 tr\u01b0\u1edbc. H\u1ecd l\u1ea1i l\u1ea5y m\u1ed7i ng\u01b0\u1eddi m\u1ed9t chi\u1ebfc gi\u00e0y tung l\u00ean kh\u00f4ng, hai chi\u1ebfc c\u00f9ng r\u01a1i xu\u1ed1ng d\u00ednh li\u1ec1n v\u1edbi nhau. Hai ng\u01b0\u1eddi l\u1ea1i \u0111\u1ed1t l\u1eeda tr\u00ean hai qu\u1ea3 n\u00fai, kh\u00f3i bay l\u00ean tr\u1eddi qu\u1ea5n qu\u00edt l\u1ea5y nhau.<br>Sau v\u1ee5 th\u1eed \u00fd tr\u1eddi l\u1ea7n th\u1ee9 t\u01b0 \u0111\u00f3, hai ng\u01b0\u1eddi k\u1ebft l\u00e0m v\u1ee3 ch\u1ed3ng. \u00cdt l\u00e2u sau ng\u01b0\u1eddi N\u1eef mang thai v\u00e0 \u0111\u1ebb ra m\u1ed9t qu\u1ea3 b\u1ea7u \u0111\u1ea7y h\u1ed9t, m\u1ed7i h\u1ed9t h\u00f3a th\u00e0nh m\u1ed9t ng\u01b0\u1eddi.\u201d</i><br><div style=\"text-align: right;\">(Th\u1ea7n tho\u1ea1i L\u00f4 L\u00f4, <i>Hai ng\u01b0\u1eddi \u0111\u1ea7u ti\u00ean l\u1ea5y nhau</i>, theo NXB S\u00e1ng t\u1ea1o, 1970)</div>N\u1ed9i dung ch\u00ednh c\u1ee7a truy\u1ec7n l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>Truy\u1ec7n k\u1ec3 v\u1ec1 hai ng\u01b0\u1eddi nam n\u1eef \u0111\u1ea7u ti\u00ean xu\u1ea5t hi\u1ec7n tr\u00ean tr\u00e1i \u0111\u1ea5t kh\u00f4ng c\u00f3 cha m\u1eb9, do \u0111\u1ea5t n\u1eb7n ra. H\u1ecd k\u1ebft l\u00e0m v\u1ee3 ch\u1ed3ng v\u00e0 sinh ra m\u1ed9t qu\u1ea3 b\u1ea7u \u0111\u1ea7y h\u1ea1t, m\u1ed7i h\u1ea1t h\u00f3a th\u00e0nh m\u1ed9t ng\u01b0\u1eddi, t\u1eeb \u0111\u00f3 t\u1ea1o ra lo\u00e0i ng\u01b0\u1eddi.<br>\u2192 N\u1ed9i dung ch\u00ednh c\u1ee7a truy\u1ec7n l\u00e0 ngu\u1ed3n g\u1ed1c c\u1ee7a lo\u00e0i ng\u01b0\u1eddi.<br>", "key": "A", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21598006, "lessonId": 0, "a": "Uy-l\u00edt-x\u01a1 b\u01b0\u1edbc ra t\u1eeb ph\u00f2ng t\u1eafm, tr\u00f4ng ch\u00e0ng \u0111\u1eb9p nh\u01b0 m\u1ed9t v\u1ecb th\u1ea7n.", "b": "Uy-l\u00edt-x\u01a1 \u0111\u1ec1 ngh\u1ecb \u0111\u01b0\u1ee3c k\u00ea cho m\u1ed9t chi\u1ebfc gi\u01b0\u1eddng \u0111\u1ec3 ng\u1ee7 m\u1ed9t m\u00ecnh nh\u01b0 b\u1ea5y l\u00e2u nay.", "c": "Uy-l\u00edt-x\u01a1 tr\u1edf v\u1ec1 gia \u0111\u00ecnh sau hai m\u01b0\u01a1i n\u0103m xa nh\u00e0 \u0111\u1eb1ng \u0111\u1eb5ng.", "d": "Uy-l\u00edt-x\u01a1 ng\u1ed3i \u0111\u1ed1i di\u1ec7n v\u1edbi P\u00ea-n\u00ea-l\u1ed1p, c\u1ea3m ph\u1ee5c tr\u00e1i tim s\u1eaft \u0111\u00e1 c\u1ee7a P\u00ea-n\u00ea-l\u1ed1p.", "bookId": 1088368, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cKhi Uy-l\u00edt-x\u01a1 t\u1eeb ph\u00f2ng t\u1eafm b\u01b0\u1edbc ra, tr\u00f4ng ng\u01b0\u1eddi \u0111\u1eb9p nh\u01b0 m\u1ed9t v\u1ecb th\u1ea7n. Ng\u01b0\u1eddi l\u1ea1i tr\u1edf v\u1ec1 ch\u1ed7 c\u0169, ng\u1ed3i \u0111\u1ed1i di\u1ec7n v\u1edbi P\u00ea-n\u00ea-l\u1ed1p, tr\u00ean chi\u1ebfc gh\u1ebf b\u00e0nh ban n\u00e3y, r\u1ed3i n\u00f3i v\u1edbi n\u00e0ng:<br>- Kh\u1ed1n kh\u1ed5! H\u1eb3n l\u00e0 c\u00e1c th\u1ea7n tr\u00ean n\u00fai \u00d4-lem-p\u01a1 \u0111\u00e3 ban cho n\u00e0ng m\u1ed9t tr\u00e1i tim s\u1eaft \u0111\u00e1 h\u01a1n ai h\u1ebft trong \u0111\u00e1m \u0111\u00e0n b\u00e0 y\u1ebfu \u0111u\u1ed1i, v\u00ec m\u1ed9t ng\u01b0\u1eddi kh\u00e1c ch\u1eafc kh\u00f4ng bao gi\u1edd c\u00f3 gan ng\u1ed3i c\u00e1ch xa ch\u1ed3ng nh\u01b0 th\u1ebf, khi ch\u1ed3ng \u0111i bi\u1ec1n bi\u1ec7t hai m\u01b0\u01a1i n\u0103m tr\u1eddi, tr\u1ea3i qua bao n\u1ed7i gian tru\u00e2n, nay m\u1edbi tr\u1edf v\u1ec1 x\u1ee9 s\u1edf. Th\u00f4i, gi\u00e0 \u01a1i! Gi\u00e0 h\u00e3y k\u00ea cho t\u00f4i m\u1ed9t chi\u1ebfc gi\u01b0\u1eddng \u0111\u1ec3 t\u00f4i ng\u1ee7 m\u1ed9t m\u00ecnh, nh\u01b0 b\u1ea5y l\u00e2u nay, v\u00ec tr\u00e1i tim trong ng\u1ef1c n\u00e0ng kia l\u00e0 s\u1eaft.\u201d</i><br><div style=\"text-align: right;\">(S\u1eed thi Hy L\u1ea1p, <i>\u00d4-\u0111i-x\u00ea</i>, theo <i>Ng\u1eef v\u0103n 10</i>, t\u1eadp 1, NXB Gi\u00e1o d\u1ee5c Vi\u1ec7t Nam, 2011)</div>Chi ti\u1ebft n\u00e0o b\u1ed9c l\u1ed9 l\u00f2ng thu\u1ef7 chung tr\u1ecdn v\u1eb9n Uy-l\u00edt-x\u01a1 d\u00e0nh cho P\u00ea-n\u00ea-l\u1ed1p?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft Uy-l\u00edt-x\u01a1 \u0111\u1ec1 ngh\u1ecb \u0111\u01b0\u1ee3c k\u00ea cho m\u1ed9t chi\u1ebfc gi\u01b0\u1eddng \u0111\u1ec3 ng\u1ee7 m\u1ed9t m\u00ecnh nh\u01b0 b\u1ea5y l\u00e2u nay ng\u1ea7m \u00fd n\u00f3i v\u1edbi P\u00ea-n\u00ea-l\u1ed1p - v\u1ee3 ch\u00e0ng - v\u1ec1 l\u00f2ng thu\u1ef7 chung tr\u1ecdn v\u1eb9n ch\u00e0ng v\u1eabn lu\u00f4n gi\u1eef g\u00ecn su\u1ed1t hai m\u01b0\u01a1i n\u0103m xa c\u00e1ch. Chi ti\u1ebft \u201ct\u00f4i ng\u1ee7 m\u1ed9t m\u00ecnh, nh\u01b0 b\u1ea5y l\u00e2u nay\u201d (\u201cb\u1ea5y l\u00e2u nay\u201d l\u00e0 su\u1ed1t hai m\u01b0\u01a1i n\u0103m xa nh\u00e0) l\u00e0 b\u1eb1ng ch\u1ee9ng c\u1ee7a l\u00f2ng thu\u1ef7 chung tr\u1ecdn v\u1eb9n m\u00e0 Uy-l\u00edt-x\u01a1 d\u00e0nh cho P\u00ea-n\u00ea-l\u1ed1p.\n", "key": "B", "isVideo": true, "score": 0, "order": 2, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21598012, "lessonId": 0, "a": "T\u1ee7i h\u1ed5.", "b": "Bu\u1ed3n th\u01b0\u01a1ng.", "c": "\u0110\u1ea3 k\u00edch.", "d": "Tr\u00e0o l\u1ed9ng.", "bookId": 1088369, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cC\u0169ng ch\u1eb3ng gi\u00e0u m\u00e0 c\u0169ng ch\u1eb3ng sang.<br>Ch\u1eb3ng g\u00e0y ch\u1eb3ng b\u00e9o ch\u1ec9 l\u00e0ng nh\u00e0ng.<br>C\u1edd \u0111\u01b0\u01a1ng d\u1edf cu\u1ed9c kh\u00f4ng c\u00f2n n\u01b0\u1edbc.<br>B\u1ea1c ch\u1eeda th\u00e2u canh \u0111\u00e3 ch\u1ea1y l\u00e0ng.<br>M\u1edf mi\u1ec7ng n\u00f3i ra g\u00e0n b\u00e1t s\u00e1ch,<br>M\u1ec1m m\u00f4i ch\u00e9n m\u00e3i t\u00edt cung thang.<br>Ngh\u0129 m\u00ecnh l\u1ea1i g\u1edbm cho m\u00ecnh nh\u1ec9<br>Th\u1ebf c\u0169ng xanh, c\u0169ng b\u1ea3ng v\u00e0ng .</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Khuy\u1ebfn, <i>T\u1ef1 tr\u00e0o</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Gi\u1ecdng \u0111i\u1ec7u ch\u1ee7 \u0111\u1ea1o c\u1ee7a b\u00e0i th\u01a1 l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nB\u00e0i th\u01a1 \u201cT\u1ef1 tr\u00e0o\u201d c\u1ee7a Nguy\u1ec5n Khuy\u1ebfn \u0111\u01b0\u1ee3c vi\u1ebft b\u1eb1ng gi\u1ecdng \u0111i\u1ec7u tr\u00e0o l\u1ed9ng \u0111\u1ec3 t\u1ef1 gi\u1ec5u c\u1ee3t, ch\u00e2m bi\u1ebfm ch\u00ednh b\u1ea3n th\u00e2n m\u00ecnh. Nh\u00e0 th\u01a1 t\u1ef1 gi\u1ec5u b\u1ea3n th\u00e2n b\u1eb1ng nh\u1eefng h\u00ecnh \u1ea3nh v\u1eeba h\u00e0i h\u01b0\u1edbc, v\u1eeba chua ch\u00e1t: ch\u1eb3ng gi\u00e0u, ch\u1eb3ng sang, ch\u1ec9 l\u00e0ng nh\u00e0ng,\u2026\n", "key": "D", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21598023, "lessonId": 0, "a": "Ng\u01b0\u1eddi g\u1eb7p ti\u00ean.", "b": "Ng\u01b0\u1eddi ho\u00e1 th\u00e1nh.", "c": "Ng\u01b0\u1eddi ch\u1ebft s\u1ed1ng l\u1ea1i.", "d": "Ng\u01b0\u1eddi ch\u1ebft \u0111\u1ea7u thai.", "bookId": 1088370, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cGi\u1eefa l\u00fac \u1ea5y th\u00ec \u1edf trong l\u00e0ng c\u00f3 anh h\u00e0ng th\u1ecbt \u1ed1m ch\u1ebft v\u1eeba m\u1edbi ch\u00f4n xong, \u00f4ng gi\u00e0 nghe n\u00f3i li\u1ec1n b\u1ea3o b\u00e1c Tr\u01b0\u01a1ng Ba g\u00e1i d\u1eabn \u0111\u1ebfn m\u1ea3 anh h\u00e0ng th\u1ecbt, b\u1ea3o b\u00e1c \u0111\u00e0o l\u00ean r\u1ed3i n\u1eady v\u00e1n thi\u00ean ra, \u0111\u1ec3 \u00f4ng l\u00e0m ph\u00e9p th\u00e2u h\u1ed3n Tr\u01b0\u01a1ng Ba cho nh\u1eadp v\u00e0o x\u00e1c anh h\u00e0ng th\u1ecbt. Ch\u1ec9 m\u1ed9t ph\u00fat sau th\u00ec anh h\u00e0ng th\u1ecbt ng\u1ed3i nh\u1ecfm ngay d\u1eady, m\u00e0 \u00f4ng l\u00e3o kia \u0111\u00e3 bi\u1ebfn \u0111i t\u1ef1 l\u00fac n\u00e0o, ch\u1eb3ng th\u1ea5y b\u00f3ng v\u00eda \u0111\u00e2u n\u1eefa, hai ng\u01b0\u1eddi m\u1eebng r\u1ee1 d\u1eaft d\u00edu nhau v\u1ec1.\u201d</i><br><div style=\"text-align: right;\">(V\u0169 Ph\u01b0\u01a1ng \u0110\u1ec1, <i>H\u1ecd Tr\u01b0\u01a1ng cao c\u1edd, nh\u1eadn bi\u1ebft l\u00e3o ti\u00ean \u1edf trong tr\u1ea7n th\u1ebf</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 6, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>M\u00f4-t\u00edp k\u00ec \u1ea3o \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong \u0111o\u1ea1n truy\u1ec7n tr\u00ean l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nTrong \u0111o\u1ea1n tr\u00edch, Tr\u01b0\u01a1ng Ba \u0111\u00e3 ch\u1ebft, nh\u01b0ng nh\u1edd ph\u00e9p thu\u1eadt c\u1ee7a \u00f4ng l\u00e3o m\u00e0 h\u1ed3n Tr\u01b0\u01a1ng Ba nh\u1eadp v\u00e0o x\u00e1c anh h\u00e0ng th\u1ecbt v\u1eeba m\u1edbi ch\u00f4n, khi\u1ebfn anh h\u00e0ng th\u1ecbt s\u1ed1ng d\u1eady. \u0110\u00e2y l\u00e0 m\u1ed9t y\u1ebfu t\u1ed1 hoang \u0111\u01b0\u1eddng, k\u00ec \u1ea3o th\u01b0\u1eddng th\u1ea5y trong c\u00e1c truy\u1ec7n c\u1ed5 d\u00e2n gian nh\u1eb1m t\u0103ng th\u00eam s\u1ef1 h\u1ea5p d\u1eabn v\u00e0 k\u1ecbch t\u00ednh cho c\u00e2u chuy\u1ec7n.<br>\n\u2192 M\u00f4-t\u00edp k\u00ec \u1ea3o \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong \u0111o\u1ea1n truy\u1ec7n l\u00e0 ng\u01b0\u1eddi ch\u1ebft s\u1ed1ng l\u1ea1i.\n", "key": "C", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21598028, "lessonId": 0, "a": "Ta h\u0103m h\u1edf ch\u00ed trai h\u1ed3 th\u1ec9 b\u1edfi \u0111\u1ee3i th\u1eddi cho n\u1ea5n n\u00e1 nh\u00e2n duy\u00ean.", "b": "Qua n\u1ea5m c\u1ecf xanh, t\u01b0\u1edfng ng\u01b0\u1eddi ph\u1eadn b\u1ea1c, s\u00f9i s\u1ee5t hai h\u00e0ng t\u00ecnh l\u1ec7, gi\u00e3i b\u1ea7y m\u1ed9t b\u1ee9c kh\u1ed1c v\u0103n.", "c": "Hoa r\u01a1i l\u00e1 r\u1ee5ng, ng\u1ecdc n\u00e1t ch\u00e2u ch\u00ecm.", "d": "M\u00ecnh long \u0111ong th\u00e2n g\u00e1i li\u1ec5u b\u1ed3 v\u00ec gi\u1eadn ph\u1eadn h\u00f3a ngang t\u00e0ng t\u00ednh m\u1ec7nh.", "bookId": 1088371, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTa h\u0103m h\u1edf ch\u00ed trai h\u1ed3 th\u1ec9  b\u1edfi \u0111\u1ee3i th\u1eddi cho n\u1ea5n n\u00e1 nh\u00e2n duy\u00ean, m\u00ecnh long \u0111ong th\u00e2n g\u00e1i li\u1ec5u b\u1ed3  v\u00ec gi\u1eadn ph\u1eadn h\u00f3a ngang t\u00e0ng t\u00ednh m\u1ec7nh .<br>Cho \u0111\u1ebfn n\u1ed7i hoa r\u01a1i l\u00e1 r\u1ee5ng, ng\u1ecdc n\u00e1t ch\u00e2u ch\u00ecm; chua x\u00f3t c\u0169ng v\u00ec \u0111\u00e2u?<br>Nay qua n\u1ea5m c\u1ecf xanh, t\u01b0\u1edfng ng\u01b0\u1eddi ph\u1eadn b\u1ea1c, s\u00f9i s\u1ee5t hai h\u00e0ng t\u00ecnh l\u1ec7, gi\u00e3i b\u1ea7y m\u1ed9t b\u1ee9c kh\u1ed1c v\u0103n  \u0111\u1ed1t xu\u1ed1ng tuy\u1ec1n \u0111\u00e0i , t\u1ecf c\u00f9ng n\u01b0\u01a1ng t\u1eed.\u201d</i><br><div style=\"text-align: right;\">(Ph\u1ea1m Th\u00e1i, <i>V\u0103n t\u1ebf Tr\u01b0\u01a1ng Qu\u1ef3nh Nh\u01b0</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Di\u1ec5n \u0111\u1ea1t n\u00e0o b\u1ed9c l\u1ed9 n\u1ed7i l\u00f2ng, c\u1ea3m x\u00fac c\u1ee7a nh\u00e2n v\u1eadt \u201cta\u201d \u0111\u1ed1i v\u1edbi ng\u01b0\u1eddi \u0111\u00e3 khu\u1ea5t?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nDi\u1ec5n \u0111\u1ea1t \u201cQua n\u1ea5m c\u1ecf xanh, t\u01b0\u1edfng ng\u01b0\u1eddi ph\u1eadn b\u1ea1c, s\u00f9i s\u1ee5t hai h\u00e0ng t\u00ecnh l\u1ec7, gi\u00e3i b\u1ea7y m\u1ed9t b\u1ee9c kh\u1ed1c v\u0103n.\u201d th\u1ec3 hi\u1ec7n r\u00f5 nh\u1ea5t n\u1ed7i l\u00f2ng v\u00e0 c\u1ea3m x\u00fac c\u1ee7a nh\u00e2n v\u1eadt \u201cta\u201d \u0111\u1ed1i v\u1edbi ng\u01b0\u1eddi \u0111\u00e3 khu\u1ea5t. C\u00e1c chi ti\u1ebft \u201cs\u00f9i s\u1ee5t hai h\u00e0ng t\u00ecnh l\u1ec7\u201d v\u00e0 \u201cgi\u00e3i b\u1ea7y m\u1ed9t b\u1ee9c kh\u1ed1c v\u0103n\u201d tr\u1ef1c ti\u1ebfp s\u1ef1 \u0111au \u0111\u1edbn v\u00e0 h\u00e0nh \u0111\u1ed9ng b\u00e0y t\u1ecf n\u1ed7i l\u00f2ng m\u00ecnh v\u1edbi ng\u01b0\u1eddi \u0111\u00e3 khu\u1ea5t c\u1ee7a nh\u00e2n v\u1eadt \u201cta\u201d. \n", "key": "B", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21598034, "lessonId": 0, "a": "\u201cCanh t\u01b0\u201d.", "b": "\u201cTr\u1eddi l\u1ea1nh.\u201d", "c": "\u201c\u0110\u00eam thi\u00eang m\u00eanh m\u00f4ng, hoang s\u01a1.\u201d", "d": "\u201cG\u00f2 \u0111\u1ed1ng hi\u1ec7n ra, \u1ea9n m\u1ea5t.\u201d", "bookId": 1088372, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cCanh t\u01b0.<br>Tr\u1eddi l\u1ea1nh. Tr\u0103ng su\u00f4ng, nh\u1ea1t. S\u01b0\u01a1ng d\u00e0y \u0111\u1eb7c, lo\u00e3ng d\u1ea7n bay b\u1ed3ng b\u1ec1nh ngo\u00e0i c\u00e1nh \u0111\u1ed3ng. G\u00f2 \u0111\u1ed1ng hi\u1ec7n ra, \u1ea9n m\u1ea5t. Gi\u00f3 d\u01b0\u1edbi s\u00f4ng n\u1ed5i l\u00ean, hun h\u00fat th\u1ed5i v\u00e0o hang h\u1ed1c ch\u1ed3n, c\u00e1o, m\u00e8o hoang. C\u00e1nh \u0111\u1ed3ng Mi\u00eau Linh hoang v\u1eafng, d\u00e0i ra, r\u1ed9ng h\u01a1n, xa r\u1ee3n. \u0110\u00eam thi\u00eang m\u00eanh m\u00f4ng, hoang s\u01a1.\u201d</i><br><div style=\"text-align: right;\">(S\u01b0\u01a1ng Nguy\u1ec7t Minh, <i>Mi\u00eau linh</i>, theo <i>thanhnien.vn</i>)</div>C\u00e2u v\u0103n n\u00e0o trong \u0111o\u1ea1n tr\u00edch vi ph\u1ea1m quy t\u1eafc ng\u00f4n ng\u1eef th\u00f4ng th\u01b0\u1eddng?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u201cCanh t\u01b0.\u201d l\u00e0 c\u00e2u \u0111\u1eb7c bi\u1ec7t v\u1edbi c\u00e2u t\u1ea1o ch\u1ec9 g\u1ed3m m\u1ed9t c\u1ee5m t\u1eeb.<br>\n\u2192 C\u00e2u \u201cCanh t\u01b0.\u201d ph\u00e1 v\u1ee1 quy t\u1eafc ng\u00f4n ng\u1eef th\u00f4ng th\u01b0\u1eddng.\n", "key": "A", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21598038, "lessonId": 0, "a": "L\u1eddi chia tay.", "b": "L\u1eddi h\u1eb9n \u01b0\u1edbc ch\u1edd \u0111\u1ee3i.", "c": "L\u1eddi b\u1ed9c b\u1ea1ch t\u00ecnh y\u00eau th\u1ea7m k\u00edn.", "d": "L\u1eddi ch\u00fac b\u00ecnh an.", "bookId": 1088373, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cGi\u1ea5u m\u1ed9t ch\u00f9m hoa sau chi\u1ebfc kh\u0103n tay,<br>C\u00f4 g\u00e1i ng\u1eadp ng\u1eebng sang nh\u00e0 h\u00e0ng x\u00f3m<br>B\u00ean \u1ea5y c\u00f3 ng\u01b0\u1eddi ng\u00e0y mai ra tr\u1eadn.<br><br>H\u1ecd ng\u1ed3i im kh\u00f4ng bi\u1ebft n\u00f3i n\u0103ng chi<br>M\u1eaft ch\u1ee3t t\u00ecm nhau r\u1ed3i l\u1ea1i quay \u0111i<br>N\u00e0o ai \u0111\u00e3 m\u1ed9t l\u1ea7n d\u00e1m n\u00f3i?\u201d</i><br><div style=\"text-align: right;\">(Phan Th\u1ecb Thanh Nh\u00e0n, <i>H\u01b0\u01a1ng th\u1ea7m</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>\u201cN\u00e0o ai \u0111\u00e3 m\u1ed9t l\u1ea7n d\u00e1m n\u00f3i?\u201d, c\u00f4 g\u00e1i v\u00e0 ch\u00e0ng trai ch\u01b0a d\u00e1m n\u00f3i v\u1edbi nhau \u0111i\u1ec1u g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u00e2u th\u01a1 \u201cN\u00e0o ai \u0111\u00e3 m\u1ed9t l\u1ea7n d\u00e1m n\u00f3i?\u201d th\u1ec3 hi\u1ec7n s\u1ef1 ng\u1eadp ng\u1eebng, e ng\u1ea1i c\u1ee7a c\u1ea3 c\u00f4 g\u00e1i v\u00e0 ch\u00e0ng trai trong vi\u1ec7c b\u00e0y t\u1ecf t\u00ecnh c\u1ea3m th\u1ea7m k\u00edn c\u1ee7a m\u00ecnh d\u00e0nh cho \u0111\u1ed1i ph\u01b0\u01a1ng. H\u1ecd ng\u1ed3i b\u00ean nhau, nh\u01b0ng kh\u00f4ng ai d\u00e1m n\u00f3i ra nh\u1eefng l\u1eddi y\u00eau th\u01b0\u01a1ng ch\u1ea5t ch\u1ee9a trong l\u00f2ng.<br>\n\u2192 C\u00f4 g\u00e1i v\u00e0 ch\u00e0ng trai ch\u01b0a d\u00e1m n\u00f3i l\u1eddi b\u1ed9c b\u1ea1ch t\u00ecnh y\u00eau th\u1ea7m k\u00edn l\u00e2u nay.\n", "key": "C", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21598041, "lessonId": 0, "a": "C\u1eed ch\u1ec9, h\u00e0nh \u0111\u1ed9ng.", "b": "C\u00e1i nh\u00ecn c\u1ee7a nh\u00e2n v\u1eadt kh\u00e1c.", "c": "Ngo\u1ea1i h\u00ecnh.", "d": "L\u1eddi \u0111\u1ed1i tho\u1ea1i.", "bookId": 1088374, "comments": 2, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTh\u1ee9 tr\u00e1nh \u0111\u01b0\u1ee3c c\u00e1i n\u1ea1n nghe Oanh m\u1ed9t \u0111\u00f4i khi l\u1ea1i gi\u1edf c\u00e1i gi\u1ecdng danh ngh\u0129a v\u1edbi y, Nh\u01b0ng c\u0169ng v\u00ec th\u1ebf m\u00e0 Oanh ch\u1eb3ng c\u00f2n c\u1ea7n ph\u1ea3i gi\u1eef g\u00ecn g\u00ec, y d\u1ea7n d\u1ea7n ph\u00f4 b\u1ebft t\u1ea5t c\u1ea3 b\u1ed9 m\u1eb7t th\u1eadt c\u1ee7a y ra; y l\u1ea1i c\u00e0ng \u0111\u00e1ng gh\u00e9t. San qu\u1ea3 quy\u1ebft r\u1eb1ng Oanh \u0111\u1ebfm t\u1eebng b\u00e1t c\u01a1m m\u1ed7i ng\u01b0\u1eddi \u0103n, Oanh ch\u1ec9 \u0103n v\u1ed9i v\u00e0ng m\u1ed7i ba l\u01b0\u1ee3t x\u1edbi r\u1ed3i nh\u00ecn nh\u1eefng ng\u01b0\u1eddi kh\u00e1c \u0103n, \u0111\u1ec3 nh\u1eefng ng\u01b0\u1eddi kh\u00e1c ng\u01b0\u1ee3ng m\u00e0 kh\u00f4ng \u0103n \u0111\u01b0\u1ee3c. Ch\u01b0a bao gi\u1edd Th\u1ee9 ng\u1edd r\u1eb1ng Oanh c\u00f3 th\u1ec3 \u00e1c v\u00e0 nh\u1ecf nhen \u0111\u1ebfn th\u1ebf. Nh\u01b0ng Th\u1ee9 c\u0169ng ch\u1ee3t nh\u1edb ra r\u1eb1ng \u0111\u00e3 c\u00f3 l\u1ea7n Oanh h\u1ecfi Th\u1ee9 \u0103n m\u1ed7i b\u1eefa m\u1ea5y l\u01b0\u1ee3t c\u01a1m. M\u1ed9t l\u1ea7n kh\u00e1c Oanh t\u1ecf \u00fd th\u1ea5y l\u00e0m l\u1ea1 v\u00ec Th\u1ee9 \u0103n kho\u1ebb th\u1ebf m\u00e0 g\u1ea7y g\u00f2 v\u00e0 nh\u00e2n ti\u1ec7n khoe r\u1eb1ng m\u00ecnh ch\u1ec9 \u0103n m\u1ed7i b\u1eefa ba l\u01b0\u1ee3t x\u1edbi v\u1ed9i, c\u00f3 \u0111\u00f3i m\u1ed9t ch\u00fat c\u0169ng kh\u00f4ng \u0103n n\u1eefa.\u201d</i><br><div style=\"text-align: right;\">(Nam Cao, <i>S\u1ed1ng m\u00f2n</i>, NXB H\u1ed9i Nh\u00e0 v\u0103n, 2006)</div>Nh\u00e2n v\u1eadt Oanh trong \u0111o\u1ea1n tr\u00edch ch\u1ee7 y\u1ebfu \u0111\u01b0\u1ee3c kh\u1eafc ho\u1ea1 b\u1eb1ng c\u00e1ch n\u00e0o?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nNh\u00e2n v\u1eadt Oanh trong \u0111o\u1ea1n tr\u00edch ch\u1ee7 y\u1ebfu \u0111\u01b0\u1ee3c kh\u1eafc h\u1ecda qua c\u00e1i nh\u00ecn, suy ngh\u0129 v\u00e0 nh\u1eadn x\u00e9t c\u1ee7a nh\u00e2n v\u1eadt Th\u1ee9. Nh\u1eefng nh\u1eadn x\u00e9t, \u0111\u00e1nh gi\u00e1 c\u1ee7a Th\u1ee9 v\u1ec1 Oanh \u0111\u00e3 mang \u0111\u1ebfn m\u1ed9t g\u00f3c nh\u00ecn v\u1ec1 t\u00ednh c\u00e1ch v\u00e0 con ng\u01b0\u1eddi c\u1ee7a Oanh.<br>\n\u2192 Nh\u00e2n v\u1eadt Oanh trong \u0111o\u1ea1n tr\u00edch ch\u1ee7 y\u1ebfu \u0111\u01b0\u1ee3c kh\u1eafc ho\u1ea1 qua c\u00e1i nh\u00ecn c\u1ee7a nh\u00e2n v\u1eadt kh\u00e1c.\n", "key": "B", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21598051, "lessonId": 0, "a": "Trung th\u00e0nh v\u1edbi nh\u00e0 vua.", "b": "C\u00f3 \u0111\u1ecba v\u1ecb x\u00e3 h\u1ed9i.", "c": "C\u00f3 th\u1ef1c t\u00e0i, c\u00f3 kh\u00e1t v\u1ecdng d\u1ef1ng x\u00e2y \u0111\u1ea5t n\u01b0\u1edbc.", "d": "C\u00f3 \u00fd th\u1ee9c trau d\u1ed3i ngh\u1ec1 nghi\u1ec7p.", "bookId": 1088375, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cT\u01af\u01a0NG D\u1ef0C: - Vua c\u1ea7n \u0111\u1ebfn th\u00ec th\u1ea7n d\u00e2n ph\u1ea3i x\u1ea3 th\u00e2n l\u00e0m vi\u1ec7c k\u00ec \u0111\u1ebfn ch\u1ebft th\u00ec th\u00f4i.<br>V\u0168 NH\u01af T\u00d4: - Nh\u01b0ng x\u1eed \u0111\u00e3i th\u1ebf th\u00ec ai mu\u1ed1n trau d\u1ed3i ngh\u1ec1 nghi\u1ec7p? K\u00ednh s\u0129 m\u1edbi \u0111\u1eafc s\u0129...<br>L\u00ca T\u01af\u01a0NG D\u1ef0C: - K\u00ednh s\u0129 \u0111\u1eafc s\u0129, mi l\u00e0 s\u0129 \u0111\u1ea5y \u01b0. Mi d\u00e1m t\u1ef1 ph\u1ee5 l\u00e0 s\u0129 th\u1ea3o n\u00e0o mi kh\u00f4ng s\u1ee3 ch\u1ebft.<br>V\u0168 NH\u01af T\u00d4: - S\u0129 m\u00e0 kh\u00f4ng c\u00f3 ch\u00e2n t\u00e0i th\u00ec ti\u1ec7n nh\u00e2n kh\u00f4ng b\u00e0n. Anh em ti\u1ec7n nh\u00e2n c\u00f2n c\u00f3 nh\u1eefng nguy\u1ec7n v\u1ecdng s\u00e2u xa h\u01a1n \u0111\u1ed1i v\u1edbi n\u01b0\u1edbc. Ho\u00e0ng th\u01b0\u1ee3ng qu\u00e1 nh\u1ea7m v\u1ec1 ch\u1eef s\u0129. M\u1ed9t \u00f4ng quan tr\u1ecb d\u00e2n, v\u1edbi m\u1ed9t ng\u01b0\u1eddi th\u1ee3 gi\u1ecfi, x\u00e2y nh\u1eefng l\u00e2u \u0111\u00e0i tr\u00e1ng quan, \u0111i\u1ec3m xuy\u1ebft cho \u0111\u1ea5t n\u01b0\u1edbc, ti\u1ec7n nh\u00e2n ch\u01b0a bi\u1ebft ng\u01b0\u1eddi n\u00e0o m\u1edbi \u0111\u00e1ng g\u1ecdi l\u00e0 s\u0129.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Huy T\u01b0\u1edfng, <i>V\u0169 Nh\u01b0 T\u00f4</i>, theo <i>vnu.edu.vn</i>)</div>Ph\u1ea9m c\u00e1ch k\u1ebb s\u0129 theo V\u0169 Nh\u01b0 T\u00f4 ph\u1ea3i nh\u01b0 th\u1ebf n\u00e0o?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nPh\u1ea9m c\u00e1ch k\u1ebb s\u0129 theo V\u0169 Nh\u01b0 T\u00f4 \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n r\u00f5 trong l\u1eddi tho\u1ea1i: \u201cS\u0129 m\u00e0 kh\u00f4ng c\u00f3 ch\u00e2n t\u00e0i th\u00ec ti\u1ec7n nh\u00e2n kh\u00f4ng b\u00e0n. Anh em ti\u1ec7n nh\u00e2n c\u00f2n c\u00f3 nh\u1eefng nguy\u1ec7n v\u1ecdng s\u00e2u xa h\u01a1n \u0111\u1ed1i v\u1edbi n\u01b0\u1edbc.\u201d<br>\n\u2192 Ph\u1ea9m c\u00e1ch k\u1ebb s\u0129 theo V\u0169 Nh\u01b0 T\u00f4 ph\u1ea3i c\u00f3 th\u1ef1c t\u00e0i, c\u00f3 kh\u00e1t v\u1ecdng d\u1ef1ng x\u00e2y \u0111\u1ea5t n\u01b0\u1edbc.\n", "key": "C", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21598056, "lessonId": 0, "a": "\u0110\u00f3 l\u00e0 cu\u1ed9c g\u1eb7p g\u1ee1 c\u1ee7a c\u00e1i \u0111\u1eb9p v\u1edbi c\u00e1i \u0111\u1eb9p.", "b": "Gi\u1eefa ng\u01b0\u1eddi t\u00f9 c\u1ed9ng s\u1ea3n v\u00e0 hoa h\u1ed3ng c\u00f3 nhi\u1ec1u \u0111\u1ed3ng \u0111i\u1ec7u, \u0111\u1ed3ng c\u1ea3m \u0111\u1ec3 d\u1ec5 d\u00e0ng s\u1ebb chia.", "c": "Ng\u01b0\u1eddi t\u00f9 c\u1ed9ng s\u1ea3n c\u00f3 th\u1ec3 tr\u00f2 chuy\u1ec7n v\u1edbi h\u01b0\u01a1ng hoa h\u1ed3ng.", "d": "Ch\u1ec9 c\u00f3 ng\u01b0\u1eddi t\u00f9 c\u1ed9ng s\u1ea3n v\u1edbi t\u00e2m h\u1ed3n ngh\u1ec7 s\u0129 v\u00e0 t\u1ea5m l\u00f2ng bao dung, nh\u00e2n \u00e1i m\u1edbi kh\u00f4ng \u201cv\u00f4 t\u00ecnh\u201d v\u1edbi c\u00e1i \u0111\u1eb9p - hoa h\u1ed3ng.", "bookId": 1088376, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cMai kh\u00f4i hoa khai, hoa h\u1ef1u t\u1ea1,<br>Hoa khai, hoa t\u1ea1 l\u01b0\u1ee1ng v\u00f4 t\u00ecnh.<br>Hoa h\u01b0\u01a1ng th\u1ea5u nh\u1eadp lung m\u00f4n l\u00ed,<br>H\u01b0\u1edbng t\u1ea1i lung nh\u00e2n t\u1ed1 b\u1ea5t b\u00ecnh.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>V\u00e3n c\u1ea3nh</i>)</div>D\u1ecbch ngh\u0129a:<br><i>\u201cHoa h\u1ed3ng n\u1edf, hoa h\u1ed3ng l\u1ea1i t\u00e0n,<br>Hoa n\u1edf, hoa t\u00e0n \u0111\u1ec1u v\u00f4 t\u00ecnh c\u1ea3 hai.<br>H\u01b0\u01a1ng th\u01a1m c\u1ee7a hoa c\u00f2n bay th\u1ea5u v\u00e0o trong lao,<br>Bay t\u1edbi ng\u01b0\u1eddi t\u00f9, t\u1ed1 n\u1ed7i b\u1ea5t b\u00ecnh.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>C\u1ea3nh chi\u1ec1u h\u00f4m</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>\u00dd ki\u1ebfn n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>nh\u1eadn x\u00e9t \u0111\u00fang v\u1ec1 n\u1ed9i dung \u00fd ngh\u0129a hai c\u00e2u cu\u1ed1i c\u1ee7a b\u00e0i th\u01a1.", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nHai c\u00e2u cu\u1ed1i c\u1ee7a b\u00e0i th\u01a1 nh\u1ea5n m\u1ea1nh s\u1ef1 \u0111\u1ed1i l\u1eadp gi\u1eefa c\u00e1i \u0111\u1eb9p (hoa h\u1ed3ng, h\u01b0\u01a1ng th\u01a1m) v\u00e0 ho\u00e0n c\u1ea3nh t\u00f9 \u0111\u00e0y. H\u01b0\u01a1ng hoa v\u01b0\u1ee3t qua song s\u1eaft nh\u00e0 lao, t\u00ecm \u0111\u1ebfn ng\u01b0\u1eddi t\u00f9 c\u1ed9ng s\u1ea3n \u0111\u1ec3 \u0111\u01b0\u1ee3c tri \u00e2m, \u0111\u1ed3ng \u0111i\u1ec7u, \u0111\u01b0\u1ee3c th\u1ea5u c\u1ea3m (v\u00ec ch\u1ec9 c\u00f3 ng\u01b0\u1eddi t\u00f9 m\u1edbi c\u00f3 t\u00e2m h\u1ed3n \u0111\u1eb9p \u0111\u1ec3 tri nh\u1eadn \u0111\u01b0\u1ee3c h\u01b0\u01a1ng th\u01a1m c\u1ee7a hoa h\u1ed3ng) v\u00e0 c\u0169ng l\u00e0 \u0111\u1ec3 s\u1ebb chia v\u1edbi ho\u00e0n c\u1ea3nh b\u0129 c\u1ef1c m\u00e0 ng\u01b0\u1eddi t\u00f9 \u0111ang ph\u1ea3i tr\u1ea3i qua. \u0110\u00f3 l\u00e0 cu\u1ed9c g\u1eb7p g\u1ee1 c\u1ee7a c\u00e1i \u0111\u1eb9p v\u1edbi c\u00e1i \u0111\u1eb9p.\n", "key": "C", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21598066, "lessonId": 0, "a": "\u201cTrung \u0111\u1ed9i tr\u01b0\u1edfng B\u00ednh ch\u1ed1ng ki\u1ebfm y\u00ean l\u1eb7ng nh\u00ecn l\u00ean \u0111\u1ed3n.\u201d.", "b": "\u201cAnh c\u00f3 m\u1ed9t t\u00e2m s\u1ef1: n\u0103m ngo\u00e1i ch\u01b0a l\u1eadp c\u00f4ng.\u201d.", "c": "\u201cTr\u1eadn n\u00e0y l\u00fac \u0111\u1ea7u ch\u1ec9 c\u00f2n m\u1ed9t nhi\u1ec7m v\u1ee5 ph\u1ee5.\u201d.", "d": "\u201cM\u1ed9t qu\u00e2n nh\u00e2n ch\u00ednh quy, l\u1eddi n\u00f3i, c\u1eed ch\u1ec9 hi\u00ean ngang \u0111\u00fang m\u1ef1c.\u201d.", "bookId": 1088377, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTrung \u0111\u1ed9i tr\u01b0\u1edfng B\u00ednh ch\u1ed1ng ki\u1ebfm y\u00ean l\u1eb7ng nh\u00ecn l\u00ean \u0111\u1ed3n. Anh c\u00f3 m\u1ed9t t\u00e2m s\u1ef1: n\u0103m ngo\u00e1i ch\u01b0a l\u1eadp c\u00f4ng. Tr\u1eadn P.T. v\u00ec m\u1ed9t s\u1ef1 kh\u00f4ng may, c\u00f2n mang ti\u1ebfng l\u00e0 d\u00e1t. Tr\u1eadn n\u00e0y l\u00fac \u0111\u1ea7u ch\u1ec9 c\u00f2n m\u1ed9t nhi\u1ec7m v\u1ee5 ph\u1ee5. Kh\u00f4ng ng\u1edd \u0111\u1ee3t xung k\u00edch cu\u1ed1i c\u00f9ng v\u1edbi ng\u01b0\u1eddi c\u1ee7a hai \u0111\u1ea1i \u0111\u1ed9i ph\u1ed1i h\u1ee3p l\u1ea1i \u0111\u1ebfn anh tr\u1ef1c ti\u1ebfp ch\u1ec9 huy. Trung \u0111\u1ed9i tr\u01b0\u1edfng B\u00ednh tr\u1ebb, khu\u00f4n m\u1eb7t \u0111\u1ec1u \u0111\u1eb7n, da h\u01a1i t\u00e1i, m\u1ed9t n\u00e9t nh\u1ecf thanh tr\u00ean m\u00e9p, ki\u1ebfm d\u00e0i, gi\u00e0y \u0111inh, phong th\u00e1i nh\u01b0 m\u1ed9t v\u00f5 quan Nh\u1eadt. M\u1ed9t qu\u00e2n nh\u00e2n ch\u00ednh quy, l\u1eddi n\u00f3i, c\u1eed ch\u1ec9 hi\u00ean ngang \u0111\u00fang m\u1ef1c.\u201d</i><br><div style=\"text-align: right;\">(Tr\u1ea7n \u0110\u0103ng, <i>Tr\u1eadn ph\u1ed1 R\u00e0ng</i>, theo <i>vanvn.vn</i>)</div>C\u00e2u v\u0103n n\u00e0o b\u1ed9c l\u1ed9 c\u1ea3m t\u00ecnh c\u1ee7a ng\u01b0\u1eddi vi\u1ebft \u0111\u1ed1i v\u1edbi trung \u0111\u1ed9i tr\u01b0\u1edfng B\u00ednh?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u00e2u \u201cM\u1ed9t qu\u00e2n nh\u00e2n ch\u00ednh quy, l\u1eddi n\u00f3i, c\u1eed ch\u1ec9 hi\u00ean ngang \u0111\u00fang m\u1ef1c.\u201d th\u1ec3 hi\u1ec7n s\u1ef1 ng\u01b0\u1ee1ng m\u1ed9 v\u00e0 c\u1ea3m t\u00ecnh c\u1ee7a ng\u01b0\u1eddi vi\u1ebft \u0111\u1ed1i v\u1edbi trung \u0111\u1ed9i tr\u01b0\u1edfng B\u00ednh. C\u00e2u v\u0103n g\u1ee3i l\u00ean h\u00ecnh \u1ea3nh m\u1ed9t ng\u01b0\u1eddi l\u00ednh chu\u1ea9n m\u1ef1c, b\u1ea3n l\u0129nh, \u0111\u00e1ng k\u00ednh tr\u1ecdng.\n", "key": "D", "isVideo": true, "score": 0, "order": 11, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21598068, "lessonId": 0, "a": "H\u1ed3 Xu\u00e2n H\u01b0\u01a1ng, B\u00e0 Huy\u1ec7n Thanh Quan, Xu\u00e2n Qu\u1ef3nh.", "b": "Nguy\u1ec5n Tr\u00e3i, Nguy\u1ec5n Du, Nguy\u1ec5n \u0110\u00ecnh Chi\u1ec3u.", "c": "Nguy\u1ec5n B\u1ec9nh Khi\u00eam, Nguy\u1ec5n C\u00f4ng Tr\u1ee9, H\u1ed3 Ch\u00ed Minh.", "d": "Nguy\u1ec5n Khuy\u1ebfn, Tr\u1ea7n T\u1ebf X\u01b0\u01a1ng, Ho\u00e0ng C\u1ea7m.", "bookId": 1088378, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "D\u00f2ng n\u00e0o sau \u0111\u00e2y n\u00eau t\u00ean nh\u1eefng t\u00e1c gi\u1ea3 c\u00f9ng thu\u1ed9c th\u1eddi k\u00ec v\u0103n h\u1ecdc trung \u0111\u1ea1i?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nH\u1ed3 Xu\u00e2n H\u01b0\u01a1ng, B\u00e0 Huy\u1ec7n Thanh Quan, Nguy\u1ec5n Tr\u00e3i, Nguy\u1ec5n Du, Nguy\u1ec5n \u0110\u00ecnh Chi\u1ec3u, Nguy\u1ec5n B\u1ec9nh Khi\u00eam, Nguy\u1ec5n C\u00f4ng Tr\u1ee9, Nguy\u1ec5n Khuy\u1ebfn, Tr\u1ea7n T\u1ebf X\u01b0\u01a1ng l\u00e0 c\u00e1c t\u00e1c gi\u1ea3 thu\u1ed9c th\u1eddi k\u00ec v\u0103n h\u1ecdc trung \u0111\u1ea1i.<br>\nXu\u00e2n Qu\u1ef3nh, H\u1ed3 Ch\u00ed Minh, Ho\u00e0ng C\u1ea7m l\u00e0 c\u00e1c t\u00e1c gi\u1ea3 thu\u1ed9c th\u1eddi k\u00ec v\u0103n h\u1ecdc hi\u1ec7n \u0111\u1ea1i.<br>\n\u2192 B l\u00e0 \u0111\u00e1p \u00e1n \u0111\u00fang.\n", "key": "B", "isVideo": true, "score": 0, "order": 12, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21598071, "lessonId": 0, "a": "Ph\u1ed1 x\u00e1, \u0111\u01b0\u1eddng s\u00e1, xe c\u1ed9.", "b": "Nh\u00e0 tr\u1ecd, k\u00ed t\u00fac s\u00e1, kh\u00e1ch s\u1ea1n.", "c": "Trung c\u01b0, c\u0103n h\u1ed9, nh\u00e0 c\u1eeda.", "d": "Nh\u00e0 r\u00f4ng, nh\u00e0 x\u00e0n, nh\u00e0 \u01b0ng.", "bookId": 1088379, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "D\u00f2ng n\u00e0o d\u01b0\u1edbi \u0111\u00e2y c\u00f3 c\u00e1c t\u1eeb vi\u1ebft \u0111\u00fang ch\u00ednh t\u1ea3?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- D\u00f2ng c\u00f3 c\u00e1c t\u1eeb vi\u1ebft \u0111\u00fang ch\u00ednh t\u1ea3 l\u00e0: Ph\u1ed1 x\u00e1, \u0111\u01b0\u1eddng s\u00e1, xe c\u1ed9.<br>\n- Nh\u1eefng t\u1eeb sai ch\u00 p m\u00ea h\u1ed3n.\u201d m\u1eafc l\u1ed7i m\u01a1 h\u1ed3, khi\u1ebfn c\u00e2u c\u00f3 th\u1ec3 hi\u1ec3u theo hai ngh\u0129a:<br>\n+ Nh\u1eefng b\u00f4ng hoa \u0111\u1eb9p m\u00ea h\u1ed3n.<br>\n+ Chi\u1ebfc b\u00ecnh g\u1ed1m m\u00e0u n\u00e2u \u0111\u1ea5t \u0111\u1eb9p m\u00ea h\u1ed3n.<br>\n- S\u1eeda l\u1ea1i: Nh\u1eefng b\u00f4ng hoa \u0111\u1eb9p m\u00ea h\u1ed3n \u0111\u01b0\u1ee3c c\u1eafm trong chi\u1ebfc b\u00ecnh g\u1ed1m m\u00e0u n\u00e2u \u0111\u1ea5t.\n", "key": "A", "isVideo": true, "score": 0, "order": 20, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 21 \u0111\u1ebfn 25", "content": "\u201cNh\u01b0ng h\u00ecnh m\u1eabu nam t\u00ednh \u0111\u01b0\u1ee3c Nguy\u1ec5n Vi\u1ec7t H\u00e0 t\u1eadp trung x\u00e2y d\u1ef1ng h\u01a1n c\u1ea3 l\u00e0 nam t\u00ednh l\u00ed t\u01b0\u1edfng \u201ctinh hoa\u201d \u0111\u1ea5t kinh k\u00ec (m\u00e0 c\u1ee5 th\u1ec3 h\u01a1n l\u00e0 \u201ctrong v\u00f2ng b\u00e1n k\u00ednh m\u1ed9t ki-l\u00f4-m\u00e9t quanh h\u1ed3 Ho\u00e0n Ki\u1ebfm\u201d l\u00e0 \u201ccon giai \u1edf nh\u1eefng ph\u1ed1 mang t\u00ean \u201cH\u00e0ng\u201d \u0111\u01b0\u01a1ng nhi\u00ean \u0111\u1eb7c s\u1ea3n sang tr\u1ecdng \u0111\u1ea5t k\u1ebb ch\u1ee3\u201d). M\u1eabu h\u00ecnh \u201ccon giai ph\u1ed1 c\u1ed5\u201d n\u00e0y \u0111\u01b0\u1ee3c Nguy\u1ec5n Vi\u1ec7t H\u00e0 mi\u00eau t\u1ea3 nh\u01b0 m\u1ed9t \u0111\u1eb7c s\u1ea3n c\u1ee7a \u0111\u1ea5t th\u1ecb th\u00e0nh, nh\u1eefng k\u1ebb v\u00ec \u201cd\u00ednh d\u00e1ng t\u1edbi bu\u00f4n b\u00e1n, th\u1eadm ch\u00ed ch\u1ec9 l\u00e0 ch\u1ee9ng ki\u1ebfn\u201d m\u00e0 \u201cho\u1ea1t b\u00e1t kho\u00e1ng \u0111\u1ea1t l\u1eabn l\u1ed9n c\u1ea3 ti\u1ec3u x\u1ea3o l\u01b0u manh\u201d. \u0110\u1eb7c \u0111i\u1ec3m chung c\u1ee7a \u201cb\u1ecdn n\u00e0y\u201d l\u00e0 nh\u1ea5t lo\u1ea1t \u0111\u1ec1u \u201cm\u00ea g\u00e1i s\u1edbm\u201d, v\u00e0, th\u01b0\u1eddng kh\u00f4ng c\u1ed1 c\u00f4ng theo \u0111u\u1ed5i nghi\u1ec7p h\u1ecdc h\u00e0nh, b\u1edfi gi\u00e1 tr\u1ecb v\u0103n h\u00f3a c\u1ee7a h\u1ecd h\u1ed9i t\u1ee5 \u1edf l\u1ed1i s\u1ed1ng (phong c\u00e1ch s\u1ed1ng). Th\u1eddi tr\u1ebb th\u00ec \u201cquy\u1ebfn r\u0169\u201d v\u1edbi m\u00e1i t\u00f3c d\u00e0i v\u00e0 ng\u00f3n t\u00e0i l\u1ebb \u201cb\u1eadp b\u00f9ng ghi ta \u0111i\u00eau luy\u1ec7n t\u00e1n g\u00e1i\u201d, \u0111\u1ebfn tu\u1ed5i trung ni\u00ean th\u00ec c\u1ed1t c\u00e1ch to\u00e1t l\u00ean t\u1eeb phong th\u00e1i \u201cthong th\u1ea3 \u0103n, tinh t\u1ebf m\u1eb7c, ch\u1ea7m ch\u1eadm s\u1ed1ng\u201d. H\u1ecd s\u00e0nh s\u1ecfi trong c\u00e1ch \u0103n, c\u00e1ch \u1edf, nh\u01b0ng \u0111i\u1ec1u \u0111\u00e1ng n\u00f3i l\u00e0: \u201cB\u1ecdn h\u1ecd ch\u1eb3ng ch\u1ecbu l\u00e0 g\u00ec, s\u1ed1ng b\u1ea1c nh\u01b0\u1ee3c ngh\u1ec7 s\u0129 n\u1eeda m\u00f9a, r\u1ed3i tr\u1ea3 \u01a1n H\u00e0 N\u1ed9i b\u1eb1ng c\u00e1ch quy\u1ebft li\u1ec7t t\u1ef1 nu\u00f4i cho m\u00ecnh nh\u1eefng th\u00f3i quen c\u1ee7a bao \u0111\u1eddi H\u00e0 N\u1ed9i\u201d. D\u1ec5 th\u1ea5y, m\u1eabu h\u00ecnh nam t\u00ednh tinh hoa n\u00e0y c\u00f3 s\u1ef1 t\u01b0\u01a1ng \u0111\u1ed3ng kh\u00e1 l\u1edbn v\u1edbi h\u00ecnh m\u1eabu \u201cnh\u00e0 nho t\u00e0i t\u1eed\u201d (hay \u201cnh\u00e0 nho quen cu\u1ed9c s\u1ed1ng \u0111\u00f4 th\u1ecb\u201d, \u201ct\u00e0i t\u1eed\u201d, \u201cnh\u00e0 nho t\u00e0i hoa\u201d, v\u00e0 \u1edf m\u1ed9t m\u1ee9c \u0111\u1ed9 n\u00e0o \u0111\u00f3 l\u00e0 \u201cnh\u1eefng nh\u00e0 nho ch\u00e1n n\u1ea3n\u201d trong \u0111\u1ecbnh ngh\u0129a c\u1ee7a Tr\u1ea7n \u0110\u00ecnh H\u01b0\u1ee3u). D\u00f9 t\u01b0 t\u01b0\u1edfng h\u1ec7 \u0111\u01b0\u01a1ng nhi\u00ean c\u00f3 s\u1ef1 kh\u00e1c bi\u1ec7t, nh\u01b0ng v\u1edbi h\u1ecd, b\u1eb1ng c\u1ea5p, h\u1ecdc v\u1ea5n hay tr\u00e1ch nhi\u1ec7m x\u00e3 h\u1ed9i c\u0169ng b\u1ecb xem nh\u1eb9 \u0111\u1ec3 nh\u01b0\u1eddng ch\u1ed7 cho c\u00e1i t\u00f4i r\u1ea5t \u201cng\u00f4ng\u201d, c\u00e1i \u0111\u1eb9p v\u00e0 s\u1ef1 l\u00e3ng m\u1ea1n \u0111a t\u00ecnh \u0111\u01b0\u1ee3c \u0111\u1eb7t l\u00ean tr\u00ean nh\u1eefng kh\u00eda c\u1ea1nh kh\u00e1c, v\u00e0 \u0111\u1eb7c bi\u1ec7t, h\u1ecd c\u0169ng ch\u1ee7 \u0111\u1ed9ng \u201cxa r\u1eddi qu\u1ef9 \u0111\u1ea1o ch\u00ednh th\u1ed1ng\u201d, kh\u01b0\u1edbc t\u1eeb vi\u1ec7c ch\u1ea1y theo nh\u1eefng h\u1ec7 gi\u00e1 tr\u1ecb th\u1ecbnh h\u00e0nh (trong th\u1eddi \u0111\u01b0\u01a1ng \u0111\u1ea1i l\u00e0 b\u1eb1ng c\u1ea5p, quy\u1ec1n v\u00e0 ti\u1ec1n) m\u00e0 ph\u1ea7n \u0111\u00f4ng \u0111ang theo \u0111u\u1ed5i. Tr\u00e1i l\u1ea1i, h\u1ecd t\u1eadp trung v\u00e0o nh\u1eefng tr\u1ea3i nghi\u1ec7m c\u00f3 th\u1ec3 \u0111em t\u1edbi c\u1ea3m gi\u00e1c \u201ckho\u00e1i th\u00fa\u201d r\u1ea5t c\u00e1 nh\u00e2n. C\u00e1i \u201ct\u00f4i\u201d cao ng\u1ea1o \u1ea5y, b\u1edfi th\u1ebf, k\u0129 t\u00ednh v\u00e0 s\u00e0nh s\u1ecfi t\u1eeb c\u00e1ch \u0103n n\u1ebft m\u1eb7c. Ch\u1eb3ng h\u1ea1n, so v\u1edbi \u0111\u00e1m \u0111\u00e0n \u00f4ng \u201cc\u00f4ng ch\u1ee9c trung l\u01b0u\u201d th\u01b0\u1eddng \u0103n s\u00e1ng \u201c\u1edf c\u00e1c qu\u00e1n c\u00e0 ph\u00ea m\u00e1y l\u1ea1nh (...) an to\u00e0n ph\u1eb3ng phiu kh\u00f4ng \u0111\u1ebfn n\u1ed7i qu\u00e1 t\u1ec7 nh\u01b0ng ch\u1eb3ng bao gi\u1edd l\u00e0 xu\u1ea5t s\u1eafc\u201d, \u201cc\u00e1c tay th\u1ecb d\u00e2n gi\u00e0 s\u00e0nh \u0111i\u1ec7u\u201d kh\u00f3 t\u00ednh ch\u1ecdn \u201cc\u00e1c qu\u00e1n g\u00e1nh c\u0169 k\u0129 v\u1ec9a h\u00e8, h\u1ea7u h\u1ebft \u0111\u1ec1u khu\u1ea5t kh\u00fac trong lam nham ph\u1ed1 c\u1ed5\u201d.<br><div style=\"text-align: right;\">(\u0110\u1eb7ng Th\u1ecb Th\u00e1i H\u00e0, <i>V\u0103n xu\u00f4i Nguy\u1ec5n Vi\u1ec7t H\u00e0 t\u1eeb g\u00f3c nh\u00ecn ph\u00ea b\u00ecnh gi\u1edbi</i>, theo <i>vanvn.vn</i>)</div>", "listQuestion": [{"questionId": 21598101, "lessonId": 0 .33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21598118, "lessonId": 0, "a": "V\u1ebb nam t\u00ednh l\u00ed t\u01b0\u1edfng trong h\u00ecnh t\u01b0\u1ee3ng ng\u01b0\u1eddi \u0111\u00e0n \u00f4ng \u1edf s\u00e1ng t\u00e1c c\u1ee7a Nguy\u1ec5n Vi\u1ec7t H\u00e0.", "b": "C\u00e1i \u201ct\u00f4i\u201d c\u1ee7a gi\u1edbi tinh hoa H\u00e0 N\u1ed9i trong s\u00e1ng t\u00e1c c\u1ee7a Nguy\u1ec5n Vi\u1ec7t H\u00e0.", "c": "M\u1eabu h\u00ecnh \u201ccon giai ph\u1ed1 c\u1ed5\u201d trong s\u00e1ng t\u00e1c c\u1ee7a Nguy\u1ec5n Vi\u1ec7t H\u00e0.", "d": "N\u1ebft \u0103n \u1edf c\u1ee7a gi\u1edbi \u0111\u00e0n \u00f4ng H\u00e0 N\u1ed9i trong s\u00e1ng t\u00e1c c\u1ee7a Nguy\u1ec5n Vi\u1ec7t H\u00e0.", "bookId": 1088391, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u0110\u1ed1i t\u01b0\u1ee3ng b\u00e0n lu\u1eadn trong \u0111o\u1ea1n tr\u00edch tr\u00ean l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch t\u1eadp trung ph\u00e2n t\u00edch, \u0111\u00e1nh gi\u00e1 h\u00ecnh t\u01b0\u1ee3ng \u201ccon giai ph\u1ed1 c\u1ed5\u201d - m\u1ed9t m\u1eabu h\u00ecnh nam t\u00ednh \u0111\u1eb7c tr\u01b0ng trong c\u00e1c t\u00e1c ph\u1ea9m c\u1ee7a Nguy\u1ec5n Vi\u1ec7t H\u00e0.<br>\n\u2192 \u0110\u1ed1i t\u01b0\u1ee3ng b\u00e0n lu\u1eadn trong \u0111o\u1ea1n tr\u00edch l\u00e0 m\u1eabu h\u00ecnh \u201ccon giai ph\u1ed1 c\u1ed5\u201d trong s\u00e1ng t\u00e1c c\u1ee7a Nguy\u1ec5n Vi\u1ec7t H\u00e0.\n", "key": "C", "isVideo": true, "score": 0, "order": 25, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 26 \u0111\u1ebfn 30", "content": "\u201cNhi\u00ean m\u01b0\u1eddi s\u00e1u, m\u00e1i t\u00f3c ch\u1edbm vai. C\u00f4 g\u00e1i \u0111ang hong c\u00e1 tr\u00ean v\u1ec9 tre tr\u01b0\u1edbc n\u1eafng. C\u00e1 bi\u1ec3n \u0111\u01b0\u1ee3c m\u1ed5 ru\u1ed9t, ng\u00e2m trong n\u01b0\u1edbc m\u1eafm ho\u1eb7c x\u00e1t mu\u1ed1i. N\u1eafng v\u00e0 gi\u00f3 l\u00e0m cho c\u00e1 mau kh\u00f4. Nh\u1eefng con c\u00e1 ngon nh\u1ea5t m\u1eb9 mang \u0111i \u0111\u1ed5i g\u1ea1o, \u0111\u1ed5i rau. Gi\u00f3 bi\u1ec3n th\u1ed5i t\u00f3c bay tr\u00ean m\u00e1, v\u1ea7ng ng\u1ef1c con g\u00e1i nh\u00f4 cao tr\u00ean y\u1ebfm \u00e1o kh\u00f4ng c\u1ea7n gi\u1eef \u00fd.<br>Nhi\u00ean \u0111\u00e3 th\u00e0nh thi\u1ebfu n\u1eef. Nh\u1eefng gi\u1ea5c m\u01a1 tu\u1ed5i th\u01a1 kh\u00f4ng c\u00f2n xu\u1ea5t hi\u1ec7n trong gi\u1ea5c ng\u1ee7 c\u1ee7a n\u00e0ng. Ng\u01b0\u1eddi con g\u00e1i v\u1ea1n ch\u00e0i b\u1ed7ng th\u1ea5y m\u00ecnh nh\u01b0 \u0111\u1ee9ng gi\u1eefa v\u00f9ng \u0111\u1ea5t hoang s\u01a1, kh\u00f4ng gian bao la, n\u01a1i bi\u1ec3n xanh ti\u1ebfp gi\u00e1p v\u1edbi b\u1ea7u tr\u1eddi. N\u00e0ng c\u1ea5t c\u00e1nh bay l\u00ean nh\u01b0 lo\u00e0i chim bi\u1ec3n.<br>T\u1eebng \u0111\u00e0n c\u00e1 b\u01a1i l\u1ed9i trong bi\u1ec3n n\u01b0\u1edbc. C\u00e1 tr\u00edch, c\u00e1 n\u1ee5c, c\u00e1 thu \u0103n n\u1ed5i; c\u00e1 m\u1ed1i, c\u00e1 tr\u00e1p, c\u00e1 l\u01b0\u01a1ng \u0103n gi\u1eefa; c\u00e1 \u0111u\u1ed1i, c\u00e1 b\u01a1n \u0103n \u0111\u00e1y. Cha m\u1eb9 Nhi\u00ean \u0111\u00e1nh c\u00e1 thu\u00ea cho ch\u1ee7 ng\u01b0. Nh\u1eefng con thuy\u1ec1n bu\u1ed3m c\u0103ng tr\u00ean bi\u1ec3n, \u0111\u1ea3o \u0111\u00e1 l\u00f4 x\u00f4 nh\u01b0 b\u00e0y th\u1ea1ch tr\u1eadn. \u00d0\u1ea3o \u0111\u00e1 tho\u1eaft \u1ea9n, tho\u1eaft hi\u1ec7n, bi\u1ebfn \u0111\u1ed5i kh\u00f4ng ng\u1eebng, nh\u00ecn m\u1ed7i h\u01b0\u1edbng, m\u1ed7i kh\u00e1c. Nhi\u00ean h\u1ecfi cha:<br>- N\u01a1i \u0111\u00e2y nhi\u1ec1u \u0111\u1ea3o \u0111\u00e1, ng\u01b0\u1eddi hay th\u1ea7n ti\u00ean s\u1eafp \u0111\u1eb7t v\u1eady cha?<br>Ng\u01b0\u1eddi cha t\u0129nh l\u1eb7ng m\u1ed9t h\u1ed3i.<br>- Ta kh\u00f4ng bi\u             EXAM_DATA.forEach((group, gIdx) => {
                // Render Group Header
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`; // Unique Key for storage
                    const qType = q.normalizedType;
                    
                    // -- Palette Item --
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop
                    palMob.appendChild(palBtn); // Add to Mobile

                    // -- Question Card --
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    // Header: Question Number
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    // Interaction Area
                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // === TYPE 0: MCQ ===
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            // Logic hiển thị kết quả
                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { // Chọn đúng
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { // Đúng nhưng không chọn (hiện đáp án khi nộp)
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { // Chọn sai
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; // Hiện đáp án đúng sau khi nộp dù chưa làm
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // === TYPE 1 & 3: FILL KEY ===
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let inputClass = "w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all font-mono";
                        let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
