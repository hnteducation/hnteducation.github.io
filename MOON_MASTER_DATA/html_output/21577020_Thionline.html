n A<br>=&gt; S\u1eeda: <b>lose </b>th\u00e0nh <b>loose&nbsp;</b>/lu\u02d0s/ (adj) l\u1ecfng l\u1ebbo, r\u1eddi r\u1ea1c<br>T\u1ea1m d\u1ecbch: C\u00e1t r\u1eddi \u1edf b\u00e3i bi\u1ec3n khi\u1ebfn vi\u1ec7c \u0111i b\u1ed9 tr\u1edf n\u00ean kh\u00f3 kh\u0103n, v\u00ec n\u00f3 tr\u01b0\u1ee3t d\u01b0\u1edbi ch\u00e2n c\u00f4 \u1ea5y v\u1edbi m\u1ed7i b\u01b0\u1edbc \u0111i", "key": "A", "isVideo": true, "score": 0, "order": 36, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577063, "lessonId": 0, "a": "Because", "b": "what", "c": "so hard", "d": "bored", "bookId": 1085911, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<u>Because</u> he got poor scores in the exam, <u>what</u> he had studied <u>so hard</u> for, he felt very <u>bored</u>.", "answer": "<b>Ph\u00e2n t\u00edch ng\u1eef c\u1ea3nh:</b> M\u1ec7nh \u0111\u1ec1 \u201che had studied so hard for\u201d b\u1ed5 sung th\u00f4ng tin cho \u201cthe exam\u201d. C\u1ea7n \u0111i\u1ec1n m\u1ed9t \u0111\u1ea1i t\u1eeb quan h\u1ec7 thay th\u1ebf cho v\u1eadt, trong khi \u0111\u00f3, \u201cwhat\u201d kh\u00f4ng ph\u1ea3i \u0111\u1ea1i t\u1eeb quan h\u1ec7.\n\n\n\n<br><br><b>S\u1eeda l\u1ed7i:</b> what /w\u0252t/: \u0111i\u1ec1u m\u00e0 \u2192 which /w\u026at\u0283/: c\u00e1i m\u00e0 (\u0111\u1ea1i t\u1eeb quan h\u1ec7 thay th\u1ebf cho v\u1eadt).\n\n<br><br><b>T\u1ea1m d\u1ecbch:</b> V\u00ec anh \u1ea5y \u0111\u1ea1t \u0111i\u1ec3m k\u00e9m trong k\u1ef3 thi, \u0111i\u1ec1u m\u00e0 anh \u1ea5y \u0111\u00e3 h\u1ecdc h\u00e0nh ch\u0103m ch\u1ec9 cho n\u00f3 khi\u1ebfn anh \u1ea5y c\u1ea3m th\u1ea5y r\u1ea5t ch\u00e1n n\u1ea3n.", "key": "B", "isVideo": true, "score": 0, "order": 37, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10470043, "lessonId": 0, "a": "for which", "b": "keeping", "c": "are", "d": "don\u2019t", "bookId": 290601, "comments": 0, "bookmarks": 14, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The fruits <u>for which</u> need <u>keeping</u> in cool temperatures <u>are</u> sweeter than those that <u>don\u2019t</u>.", "answer": "<b><i>Ki\u1ebfn th\u1ee9c M\u1ec7nh \u0111\u1ec1 quan h\u1ec7 </i><br></b>Khi d\u00f9ng \u0111\u1ea1i t\u1eeb quan h\u1ec7 \u201cwhich\u201d l\u00e0m ch\u1ee7 ng\u1eef, ta kh\u00f4ng th\u00eam gi\u1edbi t\u1eeb \u0111\u1eb1ng tr\u01b0\u1edbc: <b>N (thing) + Which + V + O</b><br><b>*Ghi ch\u00fa: for which = why: ch\u1ec9 l\u00fd do<br></b>\u21d2 S\u1eeda l\u1ed7i: <b style=\"\">for which \u21d2 which</b><br><b>T\u1ea1m d\u1ecbch: </b>Nh\u1eefng lo\u1ea1i tr\u00e1i c\u00e2y c\u1ea7n b\u1ea3o qu\u1ea3n \u1edf nhi\u1ec7t \u0111\u1ed9 m\u00e1t s\u1ebd ng\u1ecdt h\u01a1n nh\u1eefng lo\u1ea1i kh\u00f4ng c\u1ea7n b\u1ea3o qu\u1ea3n.", "key": "A", "isVideo": true, "score": 0, "order": 38, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10469868, "lessonId": 0, "a": "statistics", "b": "is", "c": "participate in", "d": "experiment", "bookId": 290460, "comments": 0, "bookmarks": 13, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to the <u>statistics</u>, only 10% of the volunteers <u>is</u> physically fit to <u>participate in</u> the next <u>experiment</u>.", "answer": "<b><i>Ki\u1ebfn th\u1ee9c v\u1ec1 S\u1ef1 h\u00f2a h\u1ee3p gi\u1eefa ch\u1ee7 ng\u1eef v\u00e0 \u0111\u1ed9ng t\u1eeb </i><br></b>Hai danh t\u1eeb n\u1ed1i nhau b\u1eb1ng \"of\": n\u1ebfu danh t\u1eeb ph\u00eda tr\u01b0\u1edbc l\u00e0 <b>\"some, all, most, majority, enough, minority, half, ph\u00e2n s\u1ed1, ph\u1ea7n tr\u0103m\".</b>... th\u00ec chia theo danh t\u1eeb ph\u00eda sau.<br>\u21d2 \u201cthe volunteers\u201d l\u00e0 danh t\u1eeb s\u1ed1 nhi\u1ec1u<br>\u21d2 V s\u1ed1 nhi\u1ec1u<br>S\u1eeda l\u1ed7i<b>: is \u21d2 are</b><br><b>T\u1ea1m d\u1ecbch</b>: Theo th\u1ed1ng k\u00ea, ch\u1ec9 c\u00f3 10% t\u00ecnh nguy\u1ec7n vi\u00ean c\u00f3 \u0111\u1ee7 s\u1ee9c kh\u1ecfe \u0111\u1ec3 tham gia th\u00ed nghi\u1ec7m ti\u1ebfp theo.", "key": "B", "isVideo": true, "score": 0, "order": 39, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577066, "lessonId": 0, "a": "did", "b": "worked", "c": "so", "d": "buy", "bookId": 1085912, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Paul <u>did</u> a lot of money when he <u>worked</u> in a bar last summer, <u>so</u> he could <u>buy</u> a new phone.", "answer": "<b>Ph\u00e2n t\u00edch ng\u1eef c\u1ea3nh:</b> C\u00e2u n\u00f3i v\u1ec1 vi\u1ec7c Paul ki\u1ebfm \u0111\u01b0\u1ee3c nhi\u1ec1u ti\u1ec1n. \u201cDo money\u201d kh\u00f4ng ph\u1ea3i c\u1ee5m t\u1eeb \u0111\u00fang, ph\u1ea3i l\u00e0 \u201cmake money\u201d.\n\n\n\n<br><br><b>S\u1eeda l\u1ed7i:</b> did /d\u026ad/: l\u00e0m \u2192 made /me\u026ad/: ki\u1ebfm \u0111\u01b0\u1ee3c.\n\n<br><br><b>T\u1ea1m d\u1ecbch</b>: Paul \u0111\u00e3 ki\u1ebfm \u0111\u01b0\u1ee3c kh\u00e1 nhi\u1ec1u ti\u1ec1n khi l\u00e0m vi\u1ec7c \u1edf qu\u00e1n bar m\u00f9a h\u00e8 n\u0103m ngo\u00e1i, n\u00ean anh \u1ea5y c\u00f3 th\u1ec3 mua m\u1ed9t chi\u1ebfc \u0111i\u1ec7n tho\u1ea1i m\u1edbi.\n\n", "key": "A", "isVideo": true, "score": 0, "order": 40, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 41-45: Which of the following best restates each of the given sentences? ", "content": "", "listQuestion": [{"questionId": 21577071, "lessonId": 0, "a": "Our school must visit the Vietnam Museum of Ethnology next month.", "b": "Our school needs to visit the Vietnam Museum of Ethnology next month.", "c": "Our school should visit the Vietnam Museum of Ethnology next month.", "d": "Our school might visit the Vietnam Museum of Ethnology next month.", "bookId": 1085913, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "It\u2019s possible that our school will visit the Vietnam Museum of Ethnology next month.", "answer": "<b>T\u1ea1m d\u1ecbch:</b> C\u00f3 kh\u1ea3 n\u0103ng tr\u01b0\u1eddng ch\u00fang t\u00f4i s\u1ebd \u0111\u1ebfn th\u0103m B\u1ea3o t\u00e0ng D\u00e2n t\u1ed9c h\u1ecdc Vi\u1ec7t Nam v\u00e0o th\u00e1ng sau.\n\n<br><br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:\n</b><br><b>A.</b> Our school must visit the Vietnam Museum of Ethnology next month.\n<br><i>(Tr\u01b0\u1eddng ch\u00fang t\u00f4i ph\u1ea3i \u0111\u1ebfn th\u0103m B\u1ea3o t\u00e0ng D\u00e2n t\u1ed9c h\u1ecdc Vi\u1ec7t Nam v\u00e0o th\u00e1ng sau.)\n</i><br><b>=&gt; Sai</b>. \u201cMust\u201d di\u1ec5n t\u1ea3 ngh\u0129a v\u1ee5, trong khi c\u00e2u g\u1ed1c ch\u1ec9 n\u00f3i v\u1ec1 kh\u1ea3 n\u0103ng c\u00f3 th\u1ec3 x\u1ea3y ra.\n\n<br><br><b>B.</b> Our school needs to visit the Vietnam Museum of Ethnology next month.\n<br><i>(Tr\u01b0\u1eddng ch\u00fang t\u00f4i c\u1ea7n \u0111\u1ebfn th\u0103m B\u1ea3o t\u00e0ng D\u00e2n t\u1ed9c h\u1ecdc Vi\u1ec7t Nam v\u00e0o th\u00e1ng sau.)\n</i><br><b>=&gt; Sai</b>. \u201cNeeds to\u201d mang ngh\u0129a c\u1ea7n thi\u1ebft ph\u1ea3i l\u00e0m, kh\u00e1c v\u1edbi kh\u1ea3 n\u0103ng c\u00f3 th\u1ec3 x\u1ea3y ra.\n\n<br><br><b>C.</b> Our school should visit the Vietnam Museum of Ethnology next month.\n<br><i>(Tr\u01b0\u1eddng ch\u00fang t\u00f4i n\u00ean \u0111\u1ebfn th\u0103m B\u1ea3o t\u00e0ng D\u00e2n t\u1ed9c h\u1ecdc Vi\u1ec7t Nam v\u00e0o th\u00e1ng sau.)\n</i><br><b>=&gt; Sai</b>. \u201cShould\u201d di\u1ec5n t\u1ea3 l\u1eddi khuy\u00ean ho\u1eb7c s\u1ef1 \u0111\u1ec1 xu\u1ea5t, kh\u00f4ng ph\u1ea3i kh\u1ea3 n\u0103ng.\n\n<br><br><b>D.</b> Our school might visit the Vietnam Museum of Ethnology next month.\n<br><i>(Tr\u01b0\u1eddng ch\u00fang t\u00f4i c\u00f3 th\u1ec3 s\u1ebd \u0111\u1ebfn th\u0103m B\u1ea3o t\u00e0ng D\u00e2n t\u1ed9c h\u1ecdc Vi\u1ec7t Nam v\u00e0o th\u00e1ng sau.)\n</i><br><b>=&gt; \u0110\u00fang</b>. \u201cMight\u201d bi\u1ec3u th\u1ecb kh\u1ea3 n\u0103ng c\u00f3 th\u1ec3 x\u1ea3y ra trong t\u01b0\u01a1ng lai.\n", "key": "D", "isVideo": true, "score": 0, "order": 41, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577073, "lessonId": 0, "a": "She doesn\u2019t have much free time, so she can\u2019t travel around the world.", "b": "She traveled around the world because she had free time.", "c": "She always travels around the world even when she is busy.", "d": "She wishes she\u2019ll have more free time to travel around the world.", "bookId": 1085914, "comments": 0, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "She would travel around the world if she had more free time.", "answer": "<b>T\u1ea1m d\u1ecbch:</b> C\u00f4 \u1ea5y s\u1ebd \u0111i v\u00f2ng quanh th\u1ebf gi\u1edbi n\u1ebfu c\u00f3 nhi\u1ec1u th\u1eddi gian r\u1ea3nh h\u01a1n.\n\n<br><br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:\n</b><br><b>A.</b> She doesn\u2019t have much free time, so she can\u2019t travel around the world.\n<br><i>(C\u00f4 \u1ea5y kh\u00f4ng c\u00f3 nhi\u1ec1u th\u1eddi gian r\u1ea3nh, n\u00ean kh\u00f4ng th\u1ec3 \u0111i v\u00f2ng quanh th\u1ebf gi\u1edbi.)\n</i><br><b>=&gt; \u0110\u00fang.\n\n</b><br><br><b>B.</b> She traveled around the world because she had free time.\n<br><i>(C\u00f4 \u1ea5y \u0111\u00e3 \u0111i v\u00f2ng quanh th\u1ebf gi\u1edbi v\u00ec c\u00f3 th\u1eddi gian r\u1ea3nh.)\n</i><br><b>=&gt; Sai</b>. C\u00e2u g\u1ed1c l\u00e0 gi\u1ea3 \u0111\u1ecbnh, c\u00f2n \u0111\u00e2y l\u00e0 di\u1ec5n t\u1ea3 qu\u00e1 kh\u1ee9 c\u00f3 th\u1eadt.\n\n<br><br><b>C.</b> She always travels around the world even when she is busy.\n<br><i>(C\u00f4 \u1ea5y lu\u00f4n \u0111i v\u00f2ng quanh th\u1ebf gi\u1edbi ngay c\u1ea3 khi b\u1eadn r\u1ed9n.)\n<br></i><b>=&gt; Sai</b>. C\u00e2u g\u1ed1c n\u00f3i c\u00f4 \u1ea5y kh\u00f4ng th\u1ec3 \u0111i v\u00ec thi\u1ebfu th\u1eddi gian, c\u00e2u n\u00e0y n\u00f3i c\u00f4 \u1ea5y lu\u00f4n \u0111i.\n\n<br><br><b>D.</b> She wishes she\u2019ll have more free time to travel around the world.\n<br><i>(C\u00f4 \u1ea5y \u01b0\u1edbc s\u1ebd c\u00f3 nhi\u1ec1u th\u1eddi gian r\u1ea3nh h\u01a1n \u0111\u1ec3 \u0111i v\u00f2ng quanh th\u1ebf gi\u1edbi.)\n</i><br><b>=&gt; Sai</b>. Trong c\u00e2u \u01b0\u1edbc v\u1ec1 \u0111i\u1ec1u kh\u00f4ng c\u00f3 th\u1eadt, kh\u00f4ng d\u00f9ng \u201cwill\u201d, ph\u1ea3i l\u00e0 \u201chad more free time\u201d.\n", "key": "A", "isVideo": true, "score": 0, "order": 42, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10470375, "lessonId": 0, "a": "There was not enough time to hold the meeting.", "b": "The meeting was cancelled because people wanted to get away.", "c": "The meeting was planned to start in a short time.", "d": "The meeting lasted much longer than usual.", "bookId": 290727, "comments": 0, "bookmarks": 4, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<b>The meeting was put off because of the limited time.</b>", "answer": "<b>T\u1ea1m d\u1ecbch: Cu\u1ed9c h\u1ecdp \u0111\u00e3 b\u1ecb ho\u00e3n l\u1ea1i v\u00ec th\u1eddi gian c\u00f3 h\u1ea1n. <br>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n<br></b>A. Kh\u00f4ng c\u00f3 \u0111\u1ee7 th\u1eddi gian \u0111\u1ec3 t\u1ed5 ch\u1ee9c cu\u1ed9c h\u1ecdp.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang. C\u1ea5u tr\u00fac: <b>S + V + enough + Noun + (for sb) + to V</b>: C\u00f3 \u0111\u1ee7 g\u00ec \u0111\u1ec3 l\u00e0m g\u00ec<br>B. Cu\u1ed9c h\u1ecdp b\u1ecb h\u1ee7y v\u00ec m\u1ecdi ng\u01b0\u1eddi mu\u1ed1n \u0111i xa.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. L\u00fd do h\u1ee7y cu\u1ed9c h\u1ecdp l\u00e0 v\u00ec v\u1ea5n \u0111\u1ec1 th\u1eddi gian.<br>C. Cu\u1ed9c h\u1ecdp d\u1ef1 ki\u1ebfn s\u1ebd b\u1eaft \u0111\u1ea7u trong th\u1eddi gian ng\u1eafn.<br>\u21d2 Sai v\u1ec1 ngh\u0129a<br>D. Cu\u1ed9c h\u1ecdp k\u00e9o d\u00e0i h\u01a1n b\u00ecnh th\u01b0\u1eddng r\u1ea5t nhi\u1ec1u.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. Cu\u1ed9c h\u1ecdp ch\u01b0a \u0111\u01b0\u1ee3c di\u1ec5n ra.", "key": "A", "isVideo": true, "score": 0, "order": 43, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19872605, "lessonId": 0, "a": "She asked her team members what they had achieved in Q2 of the year and was satisfied to know it.", "b": "She expressed her satisfaction with things they had achieved in Q2 of the year.", "c": "She complimented her team members for the achievements in Q2 of the year.", "d": "She wanted her team members to tell her what things they had achieved in Q2 of the year.", "bookId": 743999, "comments": 0, "bookmarks": 6, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cI am satisfied with what we have achieved in Q2 of the year.\u201d She said to her team members.", "answer": "<b>C\u00e2u g\u1ed1c:&nbsp;</b>T\u00f4i h\u00e0i l\u00f2ng v\u1edbi nh\u1eefng g\u00ec ch\u00fang ta \u0111\u00e3 \u0111\u1ea1t \u0111\u01b0\u1ee3c trong Qu\u00fd 2 c\u1ee7a n\u0103m.\" C\u00f4 \u1ea5y n\u00f3i v\u1edbi c\u00e1c th\u00e0nh vi\u00ean trong nh\u00f3m<br>A.&nbsp;C\u00f4 \u1ea5y \u0111\u00e3 h\u1ecfi c\u00e1c th\u00e0nh vi\u00ean trong nh\u00f3m v\u1ec1 nh\u1eefng g\u00ec h\u1ecd \u0111\u00e3 \u0111\u1ea1t \u0111\u01b0\u1ee3c trong Qu\u00fd 2 c\u1ee7a n\u0103m v\u00e0 c\u1ea3m th\u1ea5y h\u00e0i l\u00f2ng khi bi\u1ebft \u0111\u01b0\u1ee3c \u0111i\u1ec1u \u0111\u00f3. =&gt; Sai v\u00ec c\u00e2u g\u1ed1c kh\u00f4ng ph\u1ea3i l\u00e0 c\u00e2u y\u00eau c\u1ea7u hay h\u1ecfi m\u00e0 ch\u1ec9 l\u00e0 s\u1ef1 th\u1ec3 hi\u1ec7n s\u1ef1 h\u00e0i l\u00f2ng<br><br>B.&nbsp;C\u00f4 \u1ea5y th\u1ec3 hi\u1ec7n s\u1ef1 h\u00e0i l\u00f2ng v\u1edbi nh\u1eefng g\u00ec h\u1ecd \u0111\u00e3 \u0111\u1ea1t \u0111\u01b0\u1ee3c trong Qu\u00fd 2 c\u1ee7a n\u0103m. =&gt; \u0110\u00fang<br><br>C.&nbsp;C\u00f4 \u1ea5y khen ng\u1ee3i c\u00e1c th\u00e0nh vi\u00ean trong nh\u00f3m v\u00ec nh\u1eefng th\u00e0nh t\u00edch \u0111\u00e3 \u0111\u1ea1t \u0111\u01b0\u1ee3c trong Qu\u00fd 2 c\u1ee7a n\u0103m. =&gt; Sai. C\u00e2u g\u1ed1c kh\u00f4ng c\u00f3 \u00fd khen ng\u1ee3i m\u00e0 ch\u1ec9 n\u00f3i r\u1eb1ng c\u00f4 \u1ea5y c\u1ea3m th\u1ea5y h\u00e0i l\u00f2ng<br><br>D.&nbsp;C\u00f4 \u1ea5y mu\u1ed1n c\u00e1c th\u00e0nh vi\u00ean trong nh\u00f3m cho c\u00f4 bi\u1ebft nh\u1eefng g\u00ec h\u1ecd \u0111\u00e3 \u0111\u1ea1t \u0111\u01b0\u1ee3c trong Qu\u00fd 2 c\u1ee7a n\u0103m. =&gt; Sai.&nbsp;C\u00e2u g\u1ed1c kh\u00f4ng c\u00f3 y\u1ebfu t\u1ed1 y\u00eau c\u1ea7u ho\u1eb7c mong mu\u1ed1n th\u00f4ng tin t\u1eeb c\u00e1c th\u00e0nh vi\u00ean trong nh\u00f3m<br>=&gt; \u0110\u00e1p \u00e1n B", "key": "B", "isVideo": true, "score": 0, "order": 44, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10469852, "lessonId": 0, "a": "So angry the teacher was that none of the students dared to say a word.", "b": "Such angry was the teacher that none of the students dared to say a word.", "c": "So anger was the teacher that none of the students dared to say a word.", "d": "Such was the teacher's anger that none of the students dared to say a word.", "bookId": 290145, "comments": 4, "bookmarks": 49, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The teacher was so angry that none of the students dared to say a word.", "answer": "<b>T\u1ea1m d\u1ecbch</b>: Th\u1ea7y gi\u00e1o t\u1ee9c gi\u1eadn \u0111\u1ebfn n\u1ed7i kh\u00f4ng h\u1ecdc sinh n\u00e0o d\u00e1m n\u00f3i l\u1eddi n\u00e0o.<br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n: </b><br>A. Sai c\u1ea5u tr\u00fac \u0111\u1ea3o v\u1edbi \u201cso...that\u201d: <b>So + adj/adv + S + V + that + S + V</b>: qu\u00e1...\u0111\u1ebfn n\u1ed7i m\u00e0...<br>B. Sai v\u00ec sau \u201csuch\u201d kh\u00f4ng d\u00f9ng v\u1edbi t\u00ednh t\u1eeb<br>C. Sai v\u00ec sau \u201cso\u201d kh\u00f4ng d\u00f9ng v\u1edbi danh t\u1eeb <br>D. Th\u1ea7y gi\u00e1o t\u1ee9c gi\u1eadn \u0111\u1ebfn m\u1ee9c kh\u00f4ng c\u00f3 h\u1ecdc sinh n\u00e0o d\u00e1m n\u00f3i m\u1ed9t l\u1eddi.<br>=&gt; C\u1ea5u tr\u00fac \u0111\u1ea3o v\u1edbi \u201csuch...that\u201d:<b> Such + to be + adj + N + that + S +V: qu\u00e1...\u0111\u1ebfn n\u1ed7i m\u00e0...</b>", "key": "D", "isVideo": true, "score": 0, "order": 45, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 46-52: Read the passage carefully.", "content": "1. The world\u2019s forests are under threat. As well as being logged for timber and cleared to make way for agriculture, rising global temperatures are causing more intense wildfires. This year is set to be the hottest on record and has been the worst on record in terms of fires in boreal forests worldwide.<br>2. Reforestation is essential in the fight against climate change and to protect biodiversity, but planting saplings by hand can be slow and labor-intensive. In recent years, drones have begun to be used to drop seeds onto land deforested by wildfires; a company called Mast Reforestation, formerly DroneSeed, has applied this method in the western United States and beyond, and World Wildlife Fund has used specialized drones to restore rural bushland in Australia. But for a reforest to regrow, dropped seeds have to get into the soil and germinate, and that can be a challenge.<br>3. Researchers from Morphing Matter Lab at Carnegie Mellon University, in Pennsylvania, might have an answer. Inspired by nature\u2019s own design, the lab has created an \u201cE-seed\u201d carrier that is intended to be dropped by drones and drilled into the soil. But <b>remarkably</b>, the carrier doesn\u2019t need an energy source to drill into the ground \u2013 it\u2019s made from a material that \u201cself-drills\u201d in response to rain.<br>4. Lab director Lining Yao and her colleagues looked at erodium seeds for inspiration. The seeds of this genus of plants have a coil-like \u201cdrill\u201d that changes shape when wet, using a \u201ctail\u201d to prop itself up and push more effectively into the ground. The team created a seed carrier based on the same principle, made from white oak wood that naturally responds to changes in humidity. <b>They </b>chemically treated the wood to make it more flexible when wet, as well as softer and denser so it expands more effectively. Erodium has a single tail, but the seed carrier has three, making it easier to drill into soil.<br>5. According to research Yao published in the journal Nature, the carrier has an \u201c80% drilling success rate on flat land,\u201d making it more effective than erodium seeds in the same conditions. After the carrier burrows, the seed is protected from animals and the natural elements, improving its chances of germination.<br><div style=\"text-align: right;\"><i>(Source: CNN)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21577077, "lessonId": 0, "a": "Innovations in drone technology for agriculture", "b": "The impact of agriculture on biodiversity loss", "c": "Protecting forests from wildfires using new techniques", "d": "Chemical treatment of seeds to improve growth", "bookId": 1085915, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title of the passage can be ________.", "answer": "<b>Ti\u00eau \u0111\u1ec1 ph\u00f9 h\u1ee3p nh\u1ea5t cho \u0111o\u1ea1n v\u0103n c\u00f3 th\u1ec3 l\u00e0 ________.\n</b><br><b> A.</b> Nh\u1eefng \u0111\u1ed5i m\u1edbi trong c\u00f4ng ngh\u1ec7 m\u00e1y bay kh\u00f4ng ng\u01b0\u1eddi l\u00e1i ph\u1ee5c v\u1ee5 n\u00f4ng nghi\u1ec7p<br><b> =&gt; \u0110\u00fang\n\n</b><br><br><b> B. </b>\u1ea2nh h\u01b0\u1edfng c\u1ee7a n\u00f4ng nghi\u1ec7p \u0111\u1ed1i v\u1edbi s\u1ef1 suy gi\u1ea3m \u0111a d\u1ea1ng sinh h\u1ecdc\n<br>=&gt; B\u00e0i t\u1eadp trung v\u00e0o ph\u01b0\u01a1ng ph\u00e1p t\u00e1i tr\u1ed3ng r\u1eebng v\u00e0 c\u00f4ng ngh\u1ec7, kh\u00f4ng ph\u00e2n t\u00edch t\u00e1c \u0111\u1ed9ng ti\u00eau c\u1ef1c c\u1ee7a n\u00f4ng nghi\u1ec7p l\u00ean \u0111a d\u1ea1ng sinh h\u1ecdc.\n\n<br><br><b> C.</b> B\u1ea3o v\u1ec7 r\u1eebng kh\u1ecfi ch\u00e1y r\u1eebng b\u1eb1ng c\u00e1c k\u1ef9 thu\u1eadt m\u1edbi\n<br>=&gt; Kh\u00f4ng t\u1eadp trung mi\u00eau t\u1ea3 c\u00e1c k\u1ef9 thu\u1eadt \u0111\u1ec3 b\u1ea3o v\u1ec7 kh\u1ecfi ch\u00e1y r\u1eebng\n\n <br><br><b>D.</b> X\u1eed l\u00fd h\u1ea1t gi\u1ed1ng b\u1eb1ng h\u00f3a ch\u1ea5t \u0111\u1ec3 c\u1ea3i thi\u1ec7n kh\u1ea3 n\u0103ng sinh tr\u01b0\u1edfng\n<br>=&gt; B\u00e0i n\u00f3i v\u1ec1 x\u1eed l\u00fd h\u00f3a h\u1ecdc g\u1ed7 \u0111\u1ec3 thay \u0111\u1ed5i t\u00ednh ch\u1ea5t v\u1eadt li\u1ec7u c\u1ee7a carrier, kh\u00f4ng ph\u1ea3i \u201cx\u1eed l\u00fd h\u00f3a h\u1ecdc h\u1ea1t gi\u1ed1ng \u0111\u1ec3 c\u1ea3i thi\u1ec7n t\u0103ng tr\u01b0\u1edfng\u201d.\n\n\n<br><br><br><b>Gi\u1ea3i th\u00edch:\n</b><br><b>\u0110o\u1ea1n 1:</b> N\u00eau v\u1ea5n \u0111\u1ec1 \u2014 r\u1eebng tr\u00ean th\u1ebf gi\u1edbi \u0111ang b\u1ecb \u0111e d\u1ecda do khai th\u00e1c g\u1ed7, n\u00f4ng nghi\u1ec7p, v\u00e0 ch\u00e1y r\u1eebng.\n<br><b>\u0110o\u1ea1n 2:</b> Gi\u1edbi thi\u1ec7u c\u00f4ng ngh\u1ec7 d\u00f9ng m\u00e1y bay kh\u00f4ng ng\u01b0\u1eddi l\u00e1i (drone) \u0111\u1ec3 th\u1ea3 h\u1ea1t gi\u1ed1ng nh\u1eb1m t\u00e1i t\u1ea1o r\u1eebng nhanh h\u01a1n, nh\u01b0ng c\u0169ng ch\u1ec9 ra h\u1ea1n ch\u1ebf l\u00e0 h\u1ea1t gi\u1ed1ng kh\u00f3 n\u1ea3y m\u1ea7m n\u1ebfu kh\u00f4ng v\u00e0o \u0111\u01b0\u1ee3c \u0111\u1ea5t.\n<br><b>\u0110o\u1ea1n 3:</b> Gi\u1edbi thi\u1ec7u s\u00e1ng ch\u1ebf c\u1ee7a Morphing Matter Lab \u2013 thi\u1ebft b\u1ecb \u201cE-seed\u201d c\u00f3 th\u1ec3 t\u1ef1 khoan xu\u1ed1ng \u0111\u1ea5t nh\u1edd m\u01b0a, kh\u00f4ng c\u1ea7n n\u0103ng l\u01b0\u1ee3ng ngo\u00e0i.\n<br><b>\u0110o\u1ea1n 4:</b> Gi\u1ea3i th\u00edch nguy\u00ean l\u00fd ho\u1ea1t \u0111\u1ed9ng c\u1ee7a E-seed, l\u1ea5y c\u1ea3m h\u1ee9ng t\u1eeb h\u1ea1t gi\u1ed1ng t\u1ef1 khoan trong t\u1ef1 nhi\u00ean (erodium) v\u00e0 d\u00f9ng g\u1ed7 s\u1ed3i tr\u1eafng \u0111\u01b0\u1ee3c x\u1eed l\u00fd h\u00f3a h\u1ecdc.\n<br><b>\u0110o\u1ea1n 5: </b>Tr\u00ecnh b\u00e0y hi\u1ec7u qu\u1ea3 th\u1ef1c nghi\u1ec7m: E-seed c\u00f3 t\u1ef7 l\u1ec7 khoan xu\u1ed1ng \u0111\u1ea5t 80%, gi\u00fap h\u1ea1t gi\u1ed1ng \u0111\u01b0\u1ee3c b\u1ea3o v\u1ec7 kh\u1ecfi \u0111\u1ed9ng v\u1eadt v\u00e0 thi\u00ean nhi\u00ean, t\u0103ng kh\u1ea3 n\u0103ng n\u1ea3y m\u1ea7m.\n<br><br><b>=&gt; To\u00e0n b\u00e0i n\u00f3i v\u1ec1 m\u1ed9t ph\u00e1t minh c\u00f4ng ngh\u1ec7 m\u1edbi \u2013 \u201cE-seed\u201d \u2013 \u0111\u01b0\u1ee3c th\u1ea3 b\u1eb1ng m\u00e1y bay kh\u00f4ng ng\u01b0\u1eddi l\u00e1i (drone) \u0111\u1ec3 t\u00e1i tr\u1ed3ng r\u1eebng hi\u1ec7u qu\u1ea3 h\u01a1n, n\u00ean ti\u00eau \u0111\u1ec1 ph\u00f9 h\u1ee3p nh\u1ea5t l\u00e0 A.</b>", "key": "A", "isVideo": false, "score": 0, "order": 46, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577078, "lessonId": 0, "a": "It costs a lot to buy and transport saplings.", "b": "It demands considerable time and physical effort.", "c": "It is labor-intensive but often ineffective in harsh soils.", "d": "It requires drones to be effective.", "bookId ted a seed carrier based on the same principle, made from white oak wood that naturally responds to changes in humidity. They chemically treated the wood to make it more flexible when wet...\u201d <br><i>(D\u1ef1a tr\u00ean nguy\u00ean l\u00fd \u0111\u00f3, nh\u00f3m \u0111\u00e3 t\u1ea1o ra m\u1ed9t thi\u1ebft b\u1ecb mang h\u1ea1t l\u00e0m t\u1eeb g\u1ed7 s\u1ed3i tr\u1eafng, v\u1ed1n t\u1ef1 nhi\u00ean c\u00f3 kh\u1ea3 n\u0103ng ph\u1ea3n \u1ee9ng v\u1edbi \u0111\u1ed9 \u1ea9m. H\u1ecd \u0111\u00e3 x\u1eed l\u00fd h\u00f3a h\u1ecdc \u0111\u1ec3 g\u1ed7 tr\u1edf n\u00ean m\u1ec1m d\u1ebbo h\u01a1n khi \u01b0\u1edbt\u2026)\n\n\n</i><br><br><b>B.</b> N\u00f3 c\u00f3 ba \u0111u\u00f4i gi\u00fap th\u00e2m nh\u1eadp \u0111\u1ea5t t\u1ed1t h\u01a1n.\n<br><b>=&gt; \u0110\u00fang\n</b><br><b>C\u0103n c\u1ee9 \u0111o\u1ea1n 4: </b> \u201cErodium has a single tail, but the seed carrier has three, making it easier to drill into soil.\u201d <br><i>(H\u1ea1t erodium ch\u1ec9 c\u00f3 m\u1ed9t \u0111u\u00f4i, nh\u01b0ng thi\u1ebft b\u1ecb E-seed c\u00f3 ba \u0111u\u00f4i, gi\u00fap n\u00f3 khoan v\u00e0o \u0111\u1ea5t d\u1ec5 h\u01a1n.)\n\n\n</i><br><br><b>C. </b>N\u00f3 c\u1ea7n m\u1ed9t ngu\u1ed3n n\u0103ng l\u01b0\u1ee3ng b\u00ean ngo\u00e0i \u0111\u1ec3 ho\u1ea1t \u0111\u1ed9ng.\n<br><b>=&gt; Sai</b>, ng\u01b0\u1ee3c v\u1edbi b\u00e0i\n<br><b>C\u0103n c\u1ee9 \u0111o\u1ea1n 3:</b> \u201cBut remarkably, the carrier doesn\u2019t need an energy source to drill into the ground \u2013 it\u2019s made from a material that \u201cself-drills\u201d in response to rain.\u201d <br>&nbsp;<i>(Nh\u01b0ng \u0111i\u1ec1u \u0111\u00e1ng kinh ng\u1ea1c l\u00e0 thi\u1ebft b\u1ecb n\u00e0y kh\u00f4ng c\u1ea7n ngu\u1ed3n n\u0103ng l\u01b0\u1ee3ng b\u00ean ngo\u00e0i \u0111\u1ec3 khoan xu\u1ed1ng \u0111\u1ea5t \u2013 n\u00f3 \u0111\u01b0\u1ee3c l\u00e0m t\u1eeb m\u1ed9t lo\u1ea1i v\u1eadt li\u1ec7u c\u00f3 kh\u1ea3 n\u0103ng \u201ct\u1ef1 khoan\u201d khi g\u1eb7p m\u01b0a.)\n\n\n\n</i><br><br><b>D.</b> N\u00f3 b\u1ea3o v\u1ec7 h\u1ea1t gi\u1ed1ng kh\u1ecfi c\u00e1c m\u1ed1i \u0111e d\u1ecda t\u1ef1 nhi\u00ean sau khi khoan xu\u1ed1ng \u0111\u1ea5t.\n<br><b>=&gt; \u0110\u00fang\n</b><br><b>C\u0103n c\u1ee9 \u0111o\u1ea1n 5:</b> \u201cAfter the carrier burrows, the seed is protected from animals and the natural elements, improving its chances of germination.\u201d\n<br><i> (Sau khi khoan xu\u1ed1ng \u0111\u1ea5t, h\u1ea1t gi\u1ed1ng \u0111\u01b0\u1ee3c b\u1ea3o v\u1ec7 kh\u1ecfi \u0111\u1ed9ng v\u1eadt v\u00e0 t\u00e1c \u0111\u1ed9ng t\u1ef1 nhi\u00ean, t\u1eeb \u0111\u00f3 t\u0103ng kh\u1ea3 n\u0103ng n\u1ea3y m\u1ea7m.)</i>", "key": "C", "isVideo": false, "score": 0, "order": 50, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577083, "lessonId": 0, "a": "Erodium seeds", "b": "White oak trees", "c": "The tails of the seed carrier", "d": "Lab director Lining Yao and her colleagues", "bookId": 1085920, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The word They in paragraph 4 refers to _______.", "answer": "<b>T\u1eeb They trong \u0111o\u1ea1n 4 \u00e1m ch\u1ec9 ________.\n</b><br><b>A.</b> H\u1ea1t gi\u1ed1ng Erodium\n<br><b>B.</b> C\u00e2y s\u1ed3i tr\u1eafng\n<br><b>C.</b> Nh\u1eefng chi\u1ebfc \u201c\u0111u\u00f4i\u201d c\u1ee7a h\u1ea1t gi\u1ed1ng E-seed\n<br><b>D.</b> Gi\u00e1m \u0111\u1ed1c ph\u00f2ng th\u00ed nghi\u1ec7m Lining Yao v\u00e0 c\u00e1c \u0111\u1ed3ng nghi\u1ec7p c\u1ee7a c\u00f4\n\n<br><br><b>T\u1ea1m d\u1ecbch:</b>  \u201cLab director Lining Yao and her colleagues looked at erodium seeds for inspiration\u2026 They chemically treated the wood to make it more flexible when wet...\u201d \n<br><i>(Gi\u00e1m \u0111\u1ed1c ph\u00f2ng th\u00ed nghi\u1ec7m Lining Yao v\u00e0 c\u00e1c \u0111\u1ed3ng nghi\u1ec7p \u0111\u00e3 l\u1ea5y c\u1ea3m h\u1ee9ng t\u1eeb h\u1ea1t gi\u1ed1ng c\u1ee7a c\u00e2y erodium \u2026. H\u1ecd \u0111\u00e3 x\u1eed l\u00fd h\u00f3a h\u1ecdc \u0111\u1ec3 g\u1ed7 tr\u1edf n\u00ean m\u1ec1m d\u1ebbo h\u01a1n khi \u01b0\u1edbt\u2026)\n\n\n<br></i><br><b>=&gt; \u201cthey\u201d thay cho \u201cLab director Lining Yao and her colleagues\u201d \n</b>", "key": "D", "isVideo": false, "score": 0, "order": 51, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577084, "lessonId": 0, "a": "It helps seeds enter the soil and germinate efficiently while reducing manual labor.", "b": "It allows seeds to be planted without using drones or human intervention at all.", "c": "It ensures that trees grow faster than seeds planted using conventional methods.", "d": "It prevents environmental threats such as wildfires in reforested areas.", "bookId": 1085921, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What can be seen as the main advantage of the \u201cE-seed\u201d carrier compared with traditional reforestation methods?", "answer": "<b>L\u1ee3i th\u1ebf ch\u00ednh c\u1ee7a thi\u1ebft b\u1ecb mang h\u1ea1t gi\u1ed1ng \u201cE-seed\u201d so v\u1edbi ph\u01b0\u01a1ng ph\u00e1p tr\u1ed3ng r\u1eebng truy\u1ec1n th\u1ed1ng l\u00e0 g\u00ec?\n</b><br><b>A</b>. N\u00f3 gi\u00fap h\u1ea1t gi\u1ed1ng \u0111i v\u00e0o \u0111\u1ea5t v\u00e0 n\u1ea3y m\u1ea7m hi\u1ec7u qu\u1ea3 h\u01a1n \u0111\u1ed3ng th\u1eddi gi\u1ea3m c\u00f4ng lao \u0111\u1ed9ng th\u1ee7 c\u00f4ng.\n<br><b>=&gt; \u0110\u00fang\n\n\n</b><br><br><b>B.</b> N\u00f3 cho ph\u00e9p tr\u1ed3ng h\u1ea1t gi\u1ed1ng ho\u00e0n to\u00e0n kh\u00f4ng c\u1ea7n m\u00e1y bay kh\u00f4ng ng\u01b0\u1eddi l\u00e1i hay con ng\u01b0\u1eddi.\n<br><b>=&gt; Sai,</b> v\u00ec v\u1eabn c\u1ea7n.\n<br>\u0110o\u1ea1n 3 n\u00f3i: \u201cthe lab has created an \u201cE-seed\u201d carrier that is intended to be dropped by drones\u201d (nh\u00f3m \u0111\u00e3 t\u1ea1o ra m\u1ed9t thi\u1ebft b\u1ecb mang h\u1ea1t gi\u1ed1ng \u201cE-seed\u201d \u0111\u01b0\u1ee3c thi\u1ebft k\u1ebf \u0111\u1ec3 th\u1ea3 b\u1edfi m\u00e1y bay kh\u00f4ng ng\u01b0\u1eddi l\u00e1i v\u00e0 t\u1ef1 khoan xu\u1ed1ng \u0111\u1ea5t.)\n\n\n<br><br><b>C.</b> N\u00f3 \u0111\u1ea3m b\u1ea3o c\u00e2y ph\u00e1t tri\u1ec3n nhanh h\u01a1n so v\u1edbi h\u1ea1t \u0111\u01b0\u1ee3c tr\u1ed3ng theo c\u00e1ch th\u00f4ng th\u01b0\u1eddng.\n<br><b>=&gt; Sai</b> v\u00ec kh\u00f4ng kh\u1eb3ng \u0111\u1ecbnh s\u1ebd ph\u00e1t tri\u1ec3n nhanh h\u01a1n. B\u00e0i n\u00eau t\u1ef7 l\u1ec7 khoan th\u00e0nh c\u00f4ng 80% tr\u00ean m\u1eb7t ph\u1eb3ng v\u00e0 t\u0103ng c\u01a1 h\u1ed9i n\u1ea3y m\u1ea7m (\u0111o\u1ea1n 5).<br><br><b>D.</b> N\u00f3 ng\u0103n ch\u1eb7n c\u00e1c m\u1ed1i \u0111e d\u1ecda m\u00f4i tr\u01b0\u1eddng nh\u01b0 ch\u00e1y r\u1eebng \u1edf khu v\u1ef1c tr\u1ed3ng l\u1ea1i r\u1eebng.\n<br><b>=&gt; Sai</b> v\u00ec kh\u00f4ng \u0111\u1ec1 c\u1eadp\n\n\n<br><br><b>C\u0103n c\u1ee9:\n</b><br><b>\u0110o\u1ea1n 2:</b> \u201cplanting saplings by hand can be slow and labor-intensive.\u201d\n<br><i>(Tr\u1ed3ng c\u00e2y non b\u1eb1ng tay c\u00f3 th\u1ec3 ch\u1eadm v\u00e0 t\u1ed1n nhi\u1ec1u c\u00f4ng s\u1ee9c.)</i> -&gt; n\u00eau v\u1ea5n \u0111\u1ec1 ph\u01b0\u01a1ng ph\u00e1p truy\u1ec1n th\u1ed1ng t\u1ed1n c\u00f4ng.\n\n<br><br><b>\u0110o\u1ea1n 3:</b> \u201cthe carrier doesn\u2019t need an energy source to drill into the ground \u2013 it\u2019s made from a material that \u2018self-drills\u2019 in response to rain.\u201d <br><i>(Thi\u1ebft b\u1ecb mang n\u00e0y kh\u00f4ng c\u1ea7n ngu\u1ed3n n\u0103ng l\u01b0\u1ee3ng \u0111\u1ec3 khoan xu\u1ed1ng \u0111\u1ea5t \u2014 n\u00f3 \u0111\u01b0\u1ee3c l\u00e0m t\u1eeb v\u1eadt li\u1ec7u c\u00f3 th\u1ec3 \u201ct\u1ef1 khoan\u201d khi g\u1eb7p m\u01b0a.)</i> -&gt; n\u00eau c\u01a1 ch\u1ebf gi\u00fap h\u1ea1t t\u1ef1 v\u00e0o \u0111\u1ea5t m\u00e0 kh\u00f4ng c\u1ea7n c\u00f4ng s\u1ee9c th\u1ee7 c\u00f4ng.\n\n<br><br><b>\u0110o\u1ea1n 5:</b> \u201cAfter the carrier burrows, the seed is protected from animals and the natural elements, improving its chances of germination.\u201d<br><i>(Sau khi thi\u1ebft b\u1ecb khoan xu\u1ed1ng \u0111\u1ea5t, h\u1ea1t gi\u1ed1ng \u0111\u01b0\u1ee3c b\u1ea3o v\u1ec7 kh\u1ecfi \u0111\u1ed9ng v\u1eadt v\u00e0 t\u00e1c \u0111\u1ed9ng t\u1ef1 nhi\u00ean, t\u0103ng kh\u1ea3 n\u0103ng n\u1ea3y m\u1ea7m.)</i> -&gt; n\u00eau l\u1ee3i \u00edch tr\u1ef1c ti\u1ebfp cho vi\u1ec7c n\u1ea3y m\u1ea7m.", "key": "A", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully.", "content": "1. Crime-fighting technology is getting more sophisticated and rightly so. The police need to be equipped for the 21st century. In Britain we\u2019ve already got the world\u2019s biggest DNA database. By next year the state will have access to the genetic data of 4.25m people: one British-based person in 14. Hundreds of thousands of those on the database will never have been charged with a crime.<br>2. Professor Mike Press, who has spent the past decade studying how design can contribute to crime reduction, said that, in order for CCTV to have any effect, it must be used in a targeted way. For example, a scheme in Manchester records every licence plate at the entrance of a shopping complex and alerts police when one is found to belong to an untaxed or stolen car. This is an effective example of monitoring, he said. CCTV can also have the opposite effect of that intended, by giving citizens a false sense of security and encouraging them to be careless with property and personal safety. Professor Press believes that much of the increase is driven by the marketing efforts of security companies who promote the crime-reducing benefits of their products. He described it as a \u2018lazy approach to crime prevention\u2019 and said that authorities should instead be focusing on how to alter the environment to reduce crime.<br>3. But in reality, this is not what is happening. Instead, police are considering using more technology. Police forces have recently begun experimenting with cameras in their helmets. The footage will be stored on police computers, along with the footage from thousands of CCTV cameras and millions of pictures from number plate recognition cameras used increasingly to check up on motorists.<br>4. And now another type of technology is being introduced. It\u2019s called the Microdrone and it\u2019s a toy-sized remote-control craft that hovers above streets or crowds to film what\u2019s going on beneath. The Microdrone has already been used to monitor rock festivals, but its supplier has also been in discussions to supply it to the Metropolitan Police, and Soca, the Serious Organised Crime Agency. The drones are small enough to be unnoticed by people on the ground when they are flying at 350 ft. <b>They </b>contain high-resolution video surveillance equipment and an infrared night vision capability, so even in darkness they give their operators a bird\u2019s-eye view of locations while remaining virtually <b>undetectable</b>.<br><div style=\"text-align: right;\"><i>(Source: https://ieltsmaterial.com/)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21577089, "lessonId": 0, "a": "The Ethical Concerns of High-tech Crime Fighting Tools", "b": "Advances in Crime-Fighting Technology", "c": "Microdrone: The Future of Policing", "d": "The Role of CCTV in Crime Reduction", "bookId": 1085922, "comments": 2, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title of the passage can be _____.", "answer": "<b>Ti\u00eau \u0111\u1ec1 hay nh\u1ea5t cho \u0111o\u1ea1n v\u0103n l\u00e0 g\u00ec?</b><br>A. Nh\u1eefng lo ng\u1ea1i v\u1ec1 \u0111\u1ea1o \u0111\u1ee9c c\u1ee7a c\u00e1c c\u00f4ng c\u1ee5 ch\u1ed1ng t\u1ed9i ph\u1ea1m c\u00f4ng ngh\u1ec7 cao =&gt; <b>Sai</b>.&nbsp;\u0110o\u1ea1n v\u0103n kh\u00f4ng t\u1eadp trung v\u00e0o c\u00e1c lo ng\u1ea1i \u0111\u1ea1o \u0111\u1ee9c v\u1ec1 c\u00e1c c\u00f4ng c\u1ee5 n\u00e0y, m\u00e0 ch\u1ee7 y\u1ebfu b\u00e0n v\u1ec1 c\u00f4ng ngh\u1ec7 v\u00e0 c\u00e1ch ch\u00fang \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong ph\u00f2ng ch\u1ed1ng t\u1ed9i ph\u1ea1m<br><br data-start=\"166\" data-end=\"169\">B. Nh\u1eefng ti\u1ebfn b\u1ed9 trong c\u00f4ng ngh\u1ec7 ch\u1ed1ng t\u1ed9i ph\u1ea1m =&gt; <b>\u0110\u00fang&nbsp;</b><br><br data-start=\"216\" data-end=\"219\">C. Microdrone: T\u01b0\u01a1ng lai c\u1ee7a l\u1ef1c l\u01b0\u1ee3ng c\u1ea3nh s\u00e1t =&gt; <b>Sai</b>. Ti\u00eau \u0111\u1ec1 n\u00e0y t\u1eadp trung qu\u00e1 nhi\u1ec1u v\u00e0o microdrones, trong khi \u0111o\u1ea1n v\u0103n c\u00f2n \u0111\u1ec1 c\u1eadp \u0111\u1ebfn nhi\u1ec1u c\u00f4ng ngh\u1ec7 kh\u00e1c nh\u01b0 DNA, CCTV, v\u00e0 camera m\u0169 b\u1ea3o hi\u1ec3m<br><br>D. Vai tr\u00f2 c\u1ee7a CCTV trong vi\u1ec7c gi\u1ea3m t\u1ed9i ph\u1ea1m =&gt; <b>Sai</b>. Ti\u00eau \u0111\u1ec1 n\u00e0y ch\u1ec9 t\u1eadp trung v\u00e0o vai tr\u00f2 c\u1ee7a CCTV trong vi\u1ec7c gi\u1ea3m t\u1ed9i ph\u1ea1m, nh\u01b0ng \u0111o\u1ea1n v\u0103n c\u00f2n \u0111\u1ec1 c\u1eadp \u0111\u1ebfn nhi\u1ec1u c\u00f4ng ngh\u1ec7 kh\u00e1c ngo\u00e0i CCTV.", "key": "B", "isVideo": false, "score": 0, "order": 53, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577090, "lessonId": 0, "a": "4.25 million CCTV cameras.", "b": "more data about DNA than any other countries", "c": "the most sophisticated crime-fighting technology", "d": "access to the genetic data of one in fourteen people living in Britain", "bookId": 1085923, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 1, Britain has already got _____.", "answer": "<b>Trong \u0111o\u1ea1n 1, n\u01b0\u1edbc Anh \u0111\u00e3 c\u00f3 __________.</b><br>A. 4,25 tri\u1ec7u camera CCTV.<br data-start=\"407\" data-end=\"410\">B. nhi\u1ec1u d\u1eef li\u1ec7u v\u1ec1 ADN h\u01a1n b\u1ea5t k\u1ef3 qu\u1ed1c gia n\u00e0o kh\u00e1c.<br data-start=\"463\" data-end=\"466\">C. c\u00f4ng ngh\u1ec7 ch\u1ed1ng t\u1ed9i ph\u1ea1m tinh vi nh\u1ea5t.<br data-start=\"507\" data-end=\"510\">D. quy\u1ec1n truy c\u1eadp v\u00e0o d\u1eef li\u1ec7u di truy\u1ec1n c\u1ee7a m\u1ed9t trong m\u01b0\u1eddi b\u1ed1n ng\u01b0\u1eddi s\u1ed1ng \u1edf Anh.<br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin</b><br>In Britain we\u2019ve already got the world\u2019s biggest DNA database<br><i>(\u1ede Anh, ch\u00fang ta \u0111\u00e3 c\u00f3 c\u01a1 s\u1edf d\u1eef li\u1ec7u ADN l\u1edbn nh\u1ea5t th\u1ebf gi\u1edbi)</i>.", "key": "B", "isVideo": false, "score": 0, "order": 54, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577092, "lessonId": 0, "a": "illustrate how targeted monitoring can be effective in crime prevention", "b": "highlight the flaws in using CCTV for general surveillance", "c": "emphasize the use of technology in all public areas", "d": "prove that untaxed and stolen cars are the main focus of CCTV systems", "bookId": 1085924, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 2, the author mentioned the scheme of recording every license plate in Manchester to _____.", "answer": "<b>Trong \u0111o\u1ea1n 2, t\u00e1c gi\u1ea3 \u0111\u1ec1 c\u1eadp \u0111\u1ebfn k\u1ebf ho\u1ea1ch ghi l\u1ea1i m\u1ecdi bi\u1ec3n s\u1ed1 xe \u1edf Manchester \u0111\u1ec3 __________.</b><br>A. minh h\u1ecda c\u00e1ch gi\u00e1m s\u00e1t c\u00f3 m\u1ee5c ti\u00eau c\u00f3 th\u1ec3 hi\u1ec7u qu\u1ea3 trong vi\u1ec7c ng\u0103n ch\u1eb7n t\u1ed9i ph\u1ea1m.<br data-start=\"794\" data-end=\"797\">B. l\u00e0m n\u1ed5i b\u1eadt nh\u1eefng sai s\u00f3t khi s\u1eed d\u1ee5ng CCTV \u0111\u1ec3 gi\u00e1m s\u00e1t chung.<br data-start=\"861\" data-end=\"864\">C. nh\u1ea5n m\u1ea1nh vi\u1ec7c s\u1eed d\u1ee5ng c\u00f4ng ngh\u1ec7 \u1edf t\u1ea5t c\u1ea3 c\u00e1c khu v\u1ef1c c\u00f4ng c\u1ed9ng.<br data-start=\"931\" data-end=\"934\">D. ch\u1ee9ng minh r\u1eb1ng xe kh\u00f4ng \u0111\u00f3ng thu\u1ebf v\u00e0 xe b\u1ecb \u0111\u00e1nh c\u1eafp l\u00e0 tr\u1ecdng t\u00e2m ch\u00ednh c\u1ee7a h\u1ec7 th\u1ed1ng CCTV.<br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin</b><br>For example, a scheme in Manchester records every licence plate at the entrance of a shopping complex and alerts police when one is found to belong to an untaxed or stolen car. This is an effective example of monitoring<br><i>(V\u00ed d\u1ee5, m\u1ed9t h\u1ec7 th\u1ed1ng \u1edf Manchester ghi l\u1ea1i m\u1ecdi bi\u1ec3n s\u1ed1 xe khi ch\u00fang \u0111i v\u00e0o m\u1ed9t khu mua s\u1eafm v\u00e0 c\u1ea3nh b\u00e1o c\u1ea3nh s\u00e1t n\u1ebfu xe \u0111\u00f3 thu\u1ed9c v\u1ec1 m\u1ed9t ng\u01b0\u1eddi ch\u01b0a n\u1ed9p thu\u1ebf ho\u1eb7c l\u00e0 xe b\u1ecb \u0111\u00e1nh c\u1eafp. \u0110\u00e2y l\u00e0 m\u1ed9t v\u00ed d\u1ee5 v\u1ec1 </i><u style=\"font-style: italic;\">gi\u00e1m s\u00e1t hi\u1ec7u qu\u1ea3</u><i>)</i>.", "key": "A", "isVideo": false, "score": 0, "order": 55, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577093, "lessonId": 0, "a": "Video calls and emails", "b": "Footage from police body cams and drones", "c": "Personal mobile phones of motorists", "d": "Footage from thousands of CCTV cameras", "bookId": 1085925, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 3, besides footage from helmet cameras, what is anoth ely replaced traditional policing methods", "bookId": 1085926, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "It can be seen in paragraphs 3 and 4 that ______.", "answer": "<b>C\u00f3 th\u1ec3 th\u1ea5y trong \u0111o\u1ea1n 3 v\u00e0 4 r\u1eb1ng __________.</b><br>A. C\u1ea3nh s\u00e1t do d\u1ef1 trong vi\u1ec7c \u00e1p d\u1ee5ng c\u00e1c c\u00f4ng ngh\u1ec7 gi\u00e1m s\u00e1t m\u1edbi.<br>B. C\u1ea3nh s\u00e1t ng\u00e0y c\u00e0ng \u0111\u00e1nh gi\u00e1 v\u00e0 \u00e1p d\u1ee5ng c\u00e1c c\u00f4ng ngh\u1ec7 gi\u00e1m s\u00e1t ti\u00ean ti\u1ebfn.<br>C. Vi\u1ec7c s\u1eed d\u1ee5ng microdrone b\u1ecb h\u1ea1n ch\u1ebf trong vi\u1ec7c gi\u00e1m s\u00e1t c\u00e1c l\u1ec5 h\u1ed9i \u00e2m nh\u1ea1c rock.<br>D. C\u00f4ng ngh\u1ec7 gi\u00e1m s\u00e1t \u0111\u00e3 ho\u00e0n to\u00e0n thay th\u1ebf c\u00e1c ph\u01b0\u01a1ng ph\u00e1p c\u1ea3nh s\u00e1t truy\u1ec1n th\u1ed1ng.<br><b>C\u0103n c\u1ee9 v\u00e0o c\u00e1c th\u00f4ng tin</b><br>- Police forces have recently begun experimenting with cameras in their helmets <i>(C\u00e1c l\u1ef1c l\u01b0\u1ee3ng c\u1ea3nh s\u00e1t g\u1ea7n \u0111\u00e2y \u0111\u00e3 b\u1eaft \u0111\u1ea7u th\u1eed nghi\u1ec7m camera g\u1eafn tr\u00ean m\u0169 b\u1ea3o hi\u1ec3m)<br>-&nbsp;</i>The Microdrone has already been used to monitor rock festivals<i> (Microdrone \u0111\u00e3 \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng \u0111\u1ec3 gi\u00e1m s\u00e1t c\u00e1c l\u1ec5 h\u1ed9i \u00e2m nh\u1ea1c rock)<br>=&gt; C</i>\u1ea3nh s\u00e1t \u0111ang th\u1eed nghi\u1ec7m v\u1edbi camera m\u0169 b\u1ea3o hi\u1ec3m v\u00e0 s\u1eed d\u1ee5ng microdrones, cho th\u1ea5y h\u1ecd \u0111ang ng\u00e0y c\u00e0ng \u00e1p d\u1ee5ng c\u00e1c c\u00f4ng ngh\u1ec7 gi\u00e1m s\u00e1t ti\u00ean ti\u1ebfn.", "key": "B", "isVideo": false, "score": 0, "order": 57, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId":                         html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
