\"/> hai \u0111\u01b0\u1eddng ch\u00e9o vu\u00f4ng g\u00f3c, do \u0111\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/1135846b-b62d-4c5f-877a-fe673e9368eb.png\"/> t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/60b53e77-075c-4a81-951f-9871c7c9dce7.png\"/>, suy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/4d53d9cb-6d92-4f63-b7c4-5c8fb4117c79.png\"/>.<br>H\u00ecnh thoi c\u00f3 m\u1ed9t g\u00f3c vu\u00f4ng l\u00e0 h\u00ecnh vu\u00f4ng, n\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/2acb745d-01fe-4557-8862-fa94be36b1aa.png\"/> l\u00e0 h\u00ecnh vu\u00f4ng.<br>\u2705 <b>K\u1ebft lu\u1eadn: Ch\u1ecdn \u0111\u00e1p \u00e1n <b>D</b>.</b><br>", "key": "D", "isVideo": true, "score": 0, "order": 12, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.5, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Ph\u1ea7n 2. C\u00e2u tr\u1eafc nghi\u1ec7m \u0111\u00fang sai\nTh\u00ed sinh tr\u1ea3 l\u1eddi t\u1eeb c\u00e2u 13 \u0111\u1ebfn c\u00e2u 16. Trong m\u1ed7i \u00fd \u1edf m\u1ed7i c\u00e2u, th\u00ed sinh ch\u1ecdn \u0111\u00fang ho\u1eb7c sai.", "content": "", "listQuestion": [{"questionId": 21214097, "lessonId": 0, "a": "", "b": "", "c": "", "d": "", "bookId": 1057241, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 2, "questionText": "Cho t\u1ee9 gi\u00e1c ABCD bi\u1ebft s\u1ed1 \u0111o c\u1ee7a c\u00e1c g\u00f3c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f3615661-96bd-426b-b506-25ef390cf23d.png\"/> t\u1ec9 l\u1ec7 thu\u1eadn v\u1edbi 4; 3; 2; 1. <br>\tM\u1ed7i ph\u00e1t bi\u1ec3u sau \u0111\u00e2y l\u00e0 \u0111\u00fang hay sai?", "answer": "<img src=\"https://asset.moon.vn/img/chat/large/2025/10/ae9af7f9-4930-4b99-a30c-28942d67fad9.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br>\n\n<b>Ph\u00e1t bi\u1ec3u 1:</b> \u201c<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d7b57c04-20be-4ddf-be2b-f18eb7c4fcc4.png\"/>.\u201d<br>\n\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nSo s\u00e1nh c\u00e1c gi\u00e1 tr\u1ecb g\u00f3c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/695591cb-9d0a-4912-b1ce-4ba21527e6df.png\"/> theo t\u1ec9 l\u1ec7 \u0111\u00e3 cho <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ca491c2f-97d4-4cef-ad4b-45a9fc2328e1.png\"/>.<br>\n\u270d\ufe0f <b>L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nTr\u01b0\u1edbc h\u1ebft, ta c\u1ea7n t\u00ecm s\u1ed1 \u0111o 4 g\u00f3c c\u1ee7a t\u1ee9 gi\u00e1c:<br>\n* T\u1ed5ng 4 g\u00f3c trong t\u1ee9 gi\u00e1c: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/9c19a943-8898-4c4f-bdd4-f47900abac1e.png\"/>.<br>\n* Theo \u0111\u1ec1 b\u00e0i, c\u00e1c g\u00f3c t\u1ec9 l\u1ec7 v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/fbfebe17-2a4d-4abc-a5f0-d768c4069306.png\"/>. Ta \u00e1p d\u1ee5ng t\u00ednh ch\u1ea5t d\u00e3y t\u1ec9 s\u1ed1 b\u1eb1ng nhau:<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6e2ac332-5d4a-4090-a671-43279524405b.png\"/>.<br>\n* V\u1eady:<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/9bbe04d5-0ca4-4f84-a878-73760d9a10b7.png\"/><br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/9426c57d-53d1-41f5-b47a-aa4bcfbc50fd.png\"/><br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/fc2c57c5-9563-4a92-ba27-923242230df8.png\"/><br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ca01b912-019f-47e3-810b-36142a297322.png\"/>.<br>\nSo s\u00e1nh c\u00e1c gi\u00e1 tr\u1ecb tr\u00ean, ta th\u1ea5y: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/52a2fb2e-28e2-4f73-a154-f0e3b0ba9316.png\"/>.<br>\nDo \u0111\u00f3, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/9fc7351d-d500-43d9-be34-92a31ffb0af3.png\"/>, ng\u01b0\u1ee3c l\u1ea1i v\u1edbi ph\u00e1t bi\u1ec3u \u0111\u00e3 cho.<br>\n\u2705 <b>K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u sai.</b><br>\n\n<br>\n\n<b>Ph\u00e1t bi\u1ec3u 2:</b> \u201c<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/5933fe20-648b-4f71-81e2-e0a68d8a5924.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d64ee1a7-d3aa-4c68-9b64-9c1e44cfbdce.png\"/>.\u201d<br>\n\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\n\u0110\u1ed1i chi\u1ebfu c\u00e1c gi\u00e1 tr\u1ecb g\u00f3c trong ph\u00e1t bi\u1ec3u v\u1edbi c\u00e1c gi\u00e1 tr\u1ecb \u0111\u00e3 t\u00ednh \u0111\u01b0\u1ee3c \u1edf ph\u1ea7n tr\u00ean.<br>\n\u270d\ufe0f <b>L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nTa c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ec77c756-d1bb-40a5-82c2-847de13f0156.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/473793fc-91d7-40d3-95f7-03fb92465e87.png\"/>.<br>\nPh\u00e1t bi\u1ec3u \u0111\u01b0a ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/5e3d1d77-fdd8-4eef-8e98-0ad749365ed4.png\"/> (\u0111\u00fang) v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/987b2e24-8a56-4982-a270-350990441fd9.png\"/> (sai).<br>\nDo \u0111\u00f3, to\u00e0n b\u1ed9 ph\u00e1t bi\u1ec3u kh\u00f4ng ch\u00ednh x\u00e1c.<br>\n\u2705 <b>K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 2 l\u00e0 ph\u00e1t bi\u1ec3u sai.</b><br>\n\n<br>\n\n<b>Ph\u00e1t bi\u1ec3u 3:</b> \u201cG\u00f3c ngo\u00e0i t\u1e                                         <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
