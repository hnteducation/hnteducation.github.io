u00ean?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n v\u0103n t\u1eadp trung m\u00f4 t\u1ea3 v\u1ec1 qu\u00e1i v\u1eadt O-th\u1ed1t, bao g\u1ed3m:<br>\n+ Ngu\u1ed3n g\u1ed1c, lai l\u1ecbch: con c\u1ee7a Ti-ph\u00f4ng v\u00e0 \u00c9c-khi-na; anh em v\u1edbi Hi-\u0111r\u01a1 v\u00e0 X\u00e9c-be.<br>\n+ \u0110\u1eb7c \u0111i\u1ec3m: hai \u0111\u1ea7u, th\u00ednh tai, th\u00ednh m\u0169i, tinh m\u1eaft.<br>\n+ M\u1ee9c \u0111\u1ed9 kh\u1ee7ng khi\u1ebfp: g\u00e2y tai ho\u1ea1 kinh ho\u00e0ng cho nh\u00e2n d\u00e2n T\u00ea-b\u00ea.<br>\n\u2192 B l\u00e0 \u0111\u00e1p \u00e1n \u0111\u00fang.\n", "key": "B", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601316, "lessonId": 0, "a": "Tr\u00e0 Vinh l\u00e0 m\u1ed9t v\u00f9ng bi\u1ec3n c\u1ea3.", "b": "Ng\u01b0\u1eddi d\u1eaft d\u00edu nhau ra \u0111\u00e2y ch\u0103m ch\u00fat l\u00e0m \u0103n, l\u00faa khoai l\u00fac n\u00e0o c\u0169ng \u0111\u1ea7y n\u1ed3i, cu\u1ed9c s\u1ed1ng tr\u1edf n\u00ean vui t\u01b0\u01a1i h\u01a1n tr\u01b0\u1edbc.", "c": "Ph\u1eadt h\u00f3a ph\u00e9p l\u00e0m cho bi\u1ec3n n\u1ed5i l\u00ean th\u00e0nh nh\u1eefng d\u1ea3i \u0111\u1ea5t n\u1ed1i li\u1ec1n v\u1edbi b\u1edd, nh\u1eefng gi\u1ea3i \u0111\u1ea5t n\u00e0y \u0111\u1eb7c bi\u1ec7t r\u1ea5t m\u1ea7u m\u1ee1.", "d": "Tr\u00ean b\u1edd bi\u1ec3n, Ng\u01b0\u1eddi s\u1ed1ng r\u1ea5t c\u01a1 c\u1ef1c.", "bookId": 1088518, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNg\u00e0y \u1ea5y, v\u00f9ng \u0111\u1ea5t m\u00e0 b\u00e2y gi\u1edd l\u00e0 Tr\u00e0 Vinh c\u00f2n l\u00e0 m\u1ed9t v\u00f9ng bi\u1ec3n c\u1ea3. Tr\u00ean b\u1edd bi\u1ec3n, Ng\u01b0\u1eddi s\u1ed1ng r\u1ea5t c\u01a1 c\u1ef1c. Ph\u1eadt th\u1ea5y v\u1eady th\u01b0\u01a1ng t\u00ecnh, b\u00e8n h\u00f3a ph\u00e9p l\u00e0m cho bi\u1ec3n n\u1ed5i l\u00ean th\u00e0nh nh\u1eefng d\u1ea3i \u0111\u1ea5t n\u1ed1i li\u1ec1n v\u1edbi b\u1edd. Nh\u1eefng gi\u1ea3i \u0111\u1ea5t n\u00e0y \u0111\u1eb7c bi\u1ec7t r\u1ea5t m\u1ea7u m\u1ee1. V\u00ec th\u1ebf, Ng\u01b0\u1eddi d\u1eaft d\u00edu nhau ra \u0111\u00e2y ch\u0103m ch\u00fat l\u00e0m \u0103n, l\u00faa khoai l\u00fac n\u00e0o c\u0169ng \u0111\u1ea7y n\u1ed3i, cu\u1ed9c s\u1ed1ng tr\u1edf n\u00ean vui t\u01b0\u01a1i h\u01a1n tr\u01b0\u1edbc.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u0110\u1ed5ng Chi, <i>Ao Ph\u1eadt</i>, theo <i>Kho t\u00e0ng truy\u1ec7n c\u1ed5 t\u00edch Vi\u1ec7t Nam</i>, t\u1eadp 1, NXB Gi\u00e1o d\u1ee5c, 2000)</div>Ch\u1ec9 ra chi ti\u1ebft k\u00ec \u1ea3o trong \u0111o\u1ea1n tr\u00edch.", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft \u201cPh\u1eadt h\u00f3a ph\u00e9p l\u00e0m cho bi\u1ec3n n\u1ed5i l\u00ean th\u00e0nh nh\u1eefng d\u1ea3i \u0111\u1ea5t n\u1ed1i li\u1ec1n v\u1edbi b\u1edd, nh\u1eefng d\u1ea3i \u0111\u1ea5t n\u00e0y \u0111\u1eb7c bi\u1ec7t r\u1ea5t m\u1ea7u m\u1ee1.\u201d mang \u0111\u1eadm m\u00e0u s\u1eafc k\u00ec \u1ea3o th\u1ec3 hi\u1ec7n th\u00f4ng qua h\u00e0nh d\u00f9ng ph\u00e9p thu\u1eadt \u0111\u1ec3 bi\u1ebfn \u0111\u1ed5i c\u1ea3 m\u1ed9t v\u00f9ng bi\u1ec3n th\u00e0nh \u0111\u1ea5t li\u1ec1n m\u00e0u m\u1ee1 c\u1ee7a Ph\u1eadt.\n", "key": "C", "isVideo": true, "score": 0, "order": 2, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601321, "lessonId": 0, "a": "Th\u1ea5t ng\u00f4n b\u00e1t c\u00fa \u0110\u01b0\u1eddng lu\u1eadt xen l\u1ee5c ng\u00f4n.", "b": "Song th\u1ea5t l\u1ee5c b\u00e1t.", "c": "Th\u1ea5t ng\u00f4n b\u00e1t c\u00fa \u0110\u01b0\u1eddng lu\u1eadt.", "d": "Th\u1ea5t ng\u00f4n t\u1ee9 tuy\u1ec7t \u0110\u01b0\u1eddng lu\u1eadt.", "bookId": 1088519, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cGi\u00e0u ng\u01b0\u1eddi h\u1ecdp, kh\u00f3 ng\u01b0\u1eddi tan,<br>Hai \u1ea5y b\u1eb1ng l\u1ec1 s\u1ef1 th\u1ebf gian.<br>Nh\u1eefng k\u1ebb \u00e2n c\u1ea7n khi ph\u00fa qu\u00fd,<br>Ho\u00e0 ai bao n\u1eb7c thu\u1edf gian nan.<br>L\u1ec1u kh\u00f4ng con c\u00e1i b\u1eb1ng t\u00ecnh ph\u1ee5,<br>B\u1ebfp l\u1ea1nh anh tam bi\u1ebfng h\u1ecfi han.<br>L\u00f2ng th\u1ebf b\u1ea1c \u0111en d\u1ea7u n\u00f3 bi\u1ebfn,<br>Ta g\u00ecn nh\u00e2n ngh\u0129a ch\u1edb lo\u00e0n \u0111an.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Tr\u00e3i, <i>B\u1ea3o k\u00ednh c\u1ea3nh gi\u1edbi, b\u00e0i 12</i>, theo <i>Nguy\u1ec5n Tr\u00e3i th\u01a1 v\u00e0 \u0111\u1eddi</i>, NXB V\u0103n h\u1ecdc, 2016)</div>Nh\u1eadn \u0111\u1ecbnh n\u00e0o sau \u0111\u00e2y n\u00eau \u0111\u00fang th\u1ec3 th\u01a1 c\u1ee7a b\u00e0i th\u01a1?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nB\u00e0i th\u01a1 c\u00f3 8 c\u00e2u, m\u1ed7i c\u00e2u 7 ch\u1eef, ri\u00eang c\u00e2u \u0111\u1ea7u ti\u00ean c\u00f3 6 ch\u1eef v\u00e0 tu\u00e2n theo lu\u1eadt b\u1eb1ng tr\u1eafc v\u00e0 gieo v\u1ea7n c\u1ee7a th\u1ec3 th\u01a1 th\u1ea5t ng\u00f4n b\u00e1t c\u00fa \u0110\u01b0\u1eddng lu\u1eadt.<br>\n\u2192 B\u00e0i th\u01a1 vi\u1ebft theo th\u1ec3 th\u01a1 th\u1ea5t ng\u00f4n b\u00e1t c\u00fa \u0110\u01b0\u1eddng lu\u1eadt xen l\u1ee5c ng\u00f4n.\n", "key": "A", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601322, "lessonId": 0, "a": "Vi\u00ean quan, \u0111\u1ea7u \u0111\u1ed9i m\u0169 vu\u00f4ng, c\u00f3 v\u00e0i m\u01b0\u01a1i ng\u01b0\u1eddi theo h\u1ea7u, tay c\u1ea7m m\u1ed9t t\u1ea5m kim b\u00e0i.", "b": "Vi\u00ean quan d\u1eabn Sinh \u0111i quanh co, qua kh\u00f4ng bi\u1ebft bao nhi\u00eau l\u00e2u \u0111\u00e0i, cung \u0111i\u1ec7n.", "c": "Sinh \u0111\u00f3i qu\u00e1, n\u1eb1m ng\u1ee7 thi\u1ebfp \u0111i.", "d": "Sinh \u0111\u1ebfn m\u1ed9t t\u00f2a cung \u0111i\u1ec7n b\u1eb1ng v\u00e0ng.", "bookId": 1088520, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cSinh \u0111\u00f3i qu\u00e1, n\u1eb1m ng\u1ee7 thi\u1ebfp \u0111i. Ch\u1ee3t anh m\u1ed9ng th\u1ea5y m\u1ed9t vi\u00ean quan, \u0111\u1ea7u \u0111\u1ed9i m\u0169 vu\u00f4ng, c\u00f3 v\u00e0i m\u01b0\u01a1i ng\u01b0\u1eddi theo h\u1ea7u, tay c\u1ea7m m\u1ed9t t\u1ea5m kim b\u00e0i, tr\u00ean c\u00f3 m\u1ea5y ch\u1eef \u201cS\u1eafc truy\u1ec1n ph\u00f2 m\u00e3 v\u00e0o ch\u1ea7u\u201d.Chu Sinh b\u00e8n \u0111i theo vi\u00ean quan, \u0111i kho\u1ea3ng n\u0103m d\u1eb7m th\u1ea5y cung \u0111i\u1ec7n san s\u00e1t, qu\u1ea3 l\u00e0 n\u01a1i \u1edf c\u1ee7a b\u1eadc vua ch\u00faa. Vi\u00ean quan d\u1eabn anh \u0111i quanh co, qua kh\u00f4ng bi\u1ebft bao nhi\u00eau l\u00e2u \u0111\u00e0i, cung \u0111i\u1ec7n, kh\u00f3 m\u00e0 k\u1ec3 h\u1ebft. B\u1ed7ng anh \u0111\u1ebfn m\u1ed9t t\u00f2a cung \u0111i\u1ec7n b\u1eb1ng v\u00e0ng, c\u1ed9t son ch\u1ea1m tr\u1ed5, s\u00e2n \u0111\u1ea7y pha l\u00ea, b\u1eadc th\u1ec1m t\u00f4 r\u1ed3ng, b\u00ecnh phong v\u1ebd ph\u01b0\u1ee3ng, m\u00e1i nh\u00e0 l\u00e1t b\u1eb1ng ng\u00f3i b\u1ea1c, gi\u1eefa nh\u00e0 r\u1ee7 m\u1ed9t t\u1ea5m r\u00e8m ch\u00e2u.\u201d</i><br><div style=\"text-align: right;\">(L\u00ea Th\u00e1nh T\u00f4ng, <i>Duy\u00ean l\u1ea1 hoa qu\u1ed1c</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam,</i> t\u1eadp 4, NXB Khoa h\u1ecdc x\u00e3 h\u1ed9i, 2000)</div>Chi ti\u1ebft n\u00e0o l\u00e0 chi ti\u1ebft t\u1ea3 th\u1ef1c trong \u0111o\u1ea1n tr\u00edch?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n \u201cSinh \u0111\u00f3i qu\u00e1, n\u1eb1m ng\u1ee7 thi\u1ebfp \u0111i.\u201d l\u00e0 m\u1ed9t chi ti\u1ebft t\u1ea3 th\u1ef1c, ph\u1ea3n \u00e1nh t\u00ecnh tr\u1ea1ng th\u1ef1c t\u1ebf c\u1ee7a nh\u00e2n v\u1eadt Chu Sinh: \u0111\u00f3i, m\u1ec7t v\u00e0 ng\u1ee7 thi\u1ebfp \u0111i.\n", "key": "C", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601331, "lessonId": 0, "a": "\u1ea8n d\u1ee5, ho\u00e1n d\u1ee5, n\u00f3i qu\u00e1.", "b": "Ph\u00e9p \u0111\u1ed1i, ph\u00e9p \u0111i\u1ec7p, li\u1ec7t k\u00ea.", "c": "N\u00f3i gi\u1ea3m n\u00f3i tr\u00e1nh, c\u00e2u h\u1ecfi tu t\u1eeb.", "d": "So s\u00e1nh, nh\u00e2n ho\u00e1, ch\u00eam xen.", "bookId": 1088521, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTr\u1ea3i m\u01b0\u1eddi m\u1ea5y n\u0103m ch\u1ea7y kh\u1ed1n kh\u00f3, b\u1ecb kh\u1ea3o, b\u1ecb t\u00f9, b\u1ecb \u0111\u00e0y, b\u1ecb gi\u1ebft, tr\u1ebb gi\u00e0 nghe n\u00e0o xi\u1ebft \u0111\u1ebfm t\u00ean;<br>\u0110em ba t\u1ea5c h\u01a1i m\u1ecdn b\u1ecf li\u1ec1u, ho\u1eb7c s\u00f4ng, ho\u1eb7c bi\u1ec3n, ho\u1eb7c n\u00fai, ho\u1eb7c r\u1eebng, quen l\u1ea1 th\u1ea3y \u0111\u1ec1u r\u01a1i n\u01b0\u1edbc m\u1eaft.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u0110\u00ecnh Chi\u1ec3u, <i>T\u1ebf L\u1ee5c T\u1ec9nh s\u0129 d\u00e2n tr\u1eadn vong v\u0103n</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 15, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>C\u00e1c bi\u1ec7n ph\u00e1p tu t\u1eeb n\u00e0o \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong \u0111o\u1ea1n v\u0103n?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u00e1c bi\u1ec7n ph\u00e1p tu t\u1eeb \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong \u0111o\u1ea1n v\u0103n l\u00e0:<br>\n- Ph\u00e9p \u0111\u1ed1i: Hai c\u00e2u trong \u0111o\u1ea1n tr\u00edch c\u00f3 k\u1ebft c\u1ea5u \u0111\u1ed1i x\u1ee9ng v\u1ec1 m\u1eb7t h\u00ecnh th\u1ee9c v\u00e0 n\u1ed9i dung (Tr\u1ea3i m\u01b0\u1eddi m\u1ea5y n\u0103m ch\u1ea7y kh\u1ed1n kh\u00f3 - \u0110em ba t\u1ea5c h\u01a1i m\u1ecdn b\u1ecf li\u1ec1u; B\u1ecb kh\u1ea3o, b\u1ecb t\u00f9, b\u1ecb \u0111\u00e0y, b\u1ecb gi\u1ebft - Ho\u1eb7c s\u00f4ng, ho\u1eb7c bi\u1ec3n, ho\u1eb7c n\u00fai, ho\u1eb7c r\u1eebng; Tr\u1ebb gi\u00e0 nghe n\u00e0o xi\u1ebft \u0111\u1ebfm t\u00ean - Quen l\u1ea1 th\u1ea3y \u0111\u1ec1u r\u01a1i n\u01b0\u1edbc m\u1eaft).<br>\n- Ph\u00e9p \u0111i\u1ec7p:<br>\n+ \u0110i\u1ec7p t\u1eeb \u201cb\u1ecb\u201d nh\u1ea5n m\u1ea1nh t\u00ednh ch\u1ea5t ph\u1ea3i ch\u1ecbu s\u1ef1 t\u00e1c \u0111\u1ed9ng li\u00ean ti\u1ebfp t\u1eeb k\u1ebb th\u00f9.<br>\n+ \u0110i\u1ec7p t\u1eeb \u201cho\u1eb7c\u201d g\u1eafn v\u1edbi c\u00e1c t\u00ecnh th\u1ebf gieo neo, hi\u1ec3m \u0111\u1ed9c kh\u00e1c nhau m\u00e0 ng\u01b0\u1eddi d\u00e2n ph\u1ea3i ch\u1ecbu \u0111\u1ef1ng.<br>\n- Li\u1ec7t k\u00ea: n\u00eau ra c\u00e1c h\u00ecnh th\u1ee9c \u0111\u00e0n \u00e1p (kh\u1ea3o, t\u00f9, \u0111\u00e0y, gi\u1ebft) v\u00e0 nh\u1eefng n\u01a1i hi sinh c\u1ee7a nh\u0129a s\u0129 (s\u00f4ng, bi\u1ec3n, n\u00fai, r\u1eebng).\n", "key": "B", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601427, "lessonId": 0, "a": "G\u00e3 l\u0103n l\u00ea nh\u01b0 con ch\u00f3 b\u1ecb tr\u00fang b\u1ea3 d\u01b0\u1edbi s\u00e0n nh\u00e0.", "b": "G\u00e3 nh\u00ecn tr\u00e2n tr\u1ed1i v\u00e0o b\u1ea3n \u00e1n d\u00e0nh cho m\u00ecnh.", "c": "G\u00e3 ngh\u0129 ph\u1ea3i \u0111\u1ed1i di\u1ec7n v\u1edbi s\u1ef1 th\u1eadt m\u00e0 t\u00ecm c\u00e1ch gi\u1ea3i quy\u1ebft.", "d": "G\u00e3 vo vi\u00ean t\u1edd gi\u1ea5y, tr\u00fat v\u00e0o \u0111\u00f3 nh\u1eefng n\u1ed7i h\u1eadn v\u00f4 c\u1edb r\u1ed3i th\u1eb3ng tay v\u1ee9t v\u00e0o th\u00f9ng r\u00e1c.", "bookId": 1088522, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cSau khi nh\u1eadn t\u1edd k\u1ebft qu\u1ea3 gi\u1ed1ng nh\u01b0 m\u1ed9t \u00e1n t\u1eed, g\u00e3 kh\u00f4ng d\u00e1m tin. G\u00e3 vo vi\u00ean t\u1edd gi\u1ea5y, tr\u00fat v\u00e0o \u0111\u00f3 nh\u1eefng n\u1ed7i h\u1eadn v\u00f4 c\u1edb r\u1ed3i th\u1eb3ng tay v\u1ee9t v\u00e0o th\u00f9ng r\u00e1c. G\u00e3 g\u1ecdi \u0111\u00e1m b\u1ea1n \u0111i lolotica gi\u1ea3i xui. Khi \u0111\u00e1m b\u1ea1n th\u1ea3 g\u00e3 \u0111\u00e3 m\u1ec1m nh\u0169n nh\u01b0 s\u1ee3i b\u00fan v\u1ec1 \u0111\u1ebfn nh\u00e0 v\u00e0 l\u01b0\u1ee3n \u0111i s\u1ea1ch b\u00e1ch th\u00ec nh\u1eefng c\u01a1n \u0111au th\u1ed1c ng\u01b0\u1ee3c t\u1eeb d\u1ea1 d\u00e0y l\u00ean t\u00ecm \u0111\u1ebfn g\u00e3. G\u00e3 l\u0103n l\u00ea nh\u01b0 con ch\u00f3 b\u1ecb tr\u00fang b\u1ea3 d\u01b0\u1edbi s\u00e0n nh\u00e0, d\u00e3i r\u1edbt \u0111\u1ea7y m\u1ed3m, ru\u1ed9t nh\u01b0 s\u1eafp b\u1edf r\u1eefa ra, nh\u1eefng t\u01b0\u1edfng c\u00f3 th\u1ec3 ch\u1ebft ngay \u0111i \u0111\u01b0\u1ee3c. H\u00f4m sau, khi \u0111\u00e3 t\u1ec9nh t\u00e1o h\u01a1n, t\u0129nh tr\u00ed h\u01a1n, g\u00e3 l\u1eb3ng l\u1eb7ng moi t\u1eeb th\u00f9ng r\u00e1c t\u1edd gi\u1ea5y nh\u00e0u nh\u0129 l\u00ean. G\u00e3 nh\u00ecn tr\u00e2n tr\u1ed1i v\u00e0o b\u1ea3n \u00e1n d\u00e0nh cho m\u00ecnh. G\u00e3 kh\u00f4ng th\u1ec3 \u201ck\u1ec7 cha \u0111\u1eddi\u201d. Ph\u1ea3i \u0111\u1ed1i di\u1ec7n v\u1edbi s\u1ef1 th\u1eadt m\u00e0 t\u00ecm c\u00e1ch gi\u1ea3i quy\u1ebft v\u00ec \u0111\u1eb1ng n\u00e0o ng\u00e0y mai g\u00e3 c\u0169ng kh\u00f4ng th\u1ec3 ch\u1ebft ngay \u0111\u01b0\u1ee3c. Ph\u1ea3i s\u1ed1ng v\u00e0 hi v\u1ecdng!\u201d</i><br><div style=\"text-align: right;\">(Phong \u0110i\u1ec7p,<i> Ban mai l\u1ea1nh</i>, theo <i>thanhnien.vn</i>)</div><br>Chi ti\u1ebft n\u00e0o cho th\u1ea5y b\u1ea3n l\u0129nh v\u00e0 t\u00ecnh y\u00eau s\u1ef1 s\u1ed1ng \u1edf nh\u00e2n v\u1eadt \u201cg\u00e3\u201d?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:<br></b>\nChi ti\u1ebft \u201cG\u00e3 ngh\u0129 ph\u1ea3i \u0111\u1ed1i di\u1ec7n v\u1edbi s\u1ef1 th\u1eadt m\u00e0 t\u00ecm c\u00e1ch gi\u1ea3i quy\u1ebft.\u201d cho th\u1ea5y b\u1ea3n l\u0129nh v\u00e0 t\u00ecnh y\u00eau s\u1ef1 s\u1ed1ng \u1edf nh\u00e2n v\u1eadt \u201cg\u00e3\u201d. Thay v\u00ec tr\u1ed1n tr\u00e1nh, g\u00e3 ch\u1ecdn \u0111\u1ed1i di\u1ec7n v\u1edbi s\u1ef1 th\u1eadt ph\u0169 ph\u00e0ng. G\u00e3 ch\u1ea5p nh\u1eadn \u201cb\u1ea3n \u00e1n\u201d v\u00e0 t\u00ecm c\u00e1ch gi\u1ea3i quy\u1ebft v\u1ea5n \u0111\u1ec1.\n", "key": "C", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601435, "lessonId": 0, "a": "\u201ccho ban mai chim nh\u1ea1n b\u00e1o tin xu\u00e2n ... ng\u01b0\u1eddi c\u0169ng cho nh\u1ef1a \u1ea5m\u201d.", "b": "\u201c\u00f4i s\u00f4ng H\u1ed3ng, m\u1eb9 c\u1ee7a ta \u01a1i ... bao \u0111i\u1ec1u b\u00ed m\u1eadt\u201d.", "c": "\u201cbao kho v\u00e0ng c\u1ed5 t\u00edch ... bao doi c\u00e1t ng\u1ea7m trong l\u00f2ng ng\u01b0\u1eddi phi\u00eau b\u1ea1t\u201d.", "d": "\u201cng\u01b0\u1eddi qu\u1eb1n qu\u1ea1i d\u01b0\u1edbi m\u01b0a d\u1ea7m n\u1eafng g\u1eaft\u201d.", "bookId": 1088523, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u00f4i s\u00f4ng H\u1ed3ng, m\u1eb9 c\u1ee7a ta \u01a1i<br>ng\u01b0\u1eddi ch\u1ee9a ch\u1ea5t trong l\u00f2ng<br>bao \u0111i\u1ec1u b\u00ed m\u1eadt<br>bao kho v\u00e0ng c\u1ed5 t\u00edch<br>bao ti\u1ebfng r\u00ean nh\u1ecdc nh\u1eb1n<br>bao xo\u00e1y n\u01b0\u1edbc r\u00e9o s\u00f4i trong ng\u1ef1c r\u1ed9ng c\u1ee7a ng\u01b0\u1eddi<br>bao doi c\u00e1t ng\u1ea7m trong l\u00f2ng ng\u01b0\u1eddi phi\u00eau b\u1ea1t<br>ng\u01b0\u1eddi qu\u1eb1n qu\u1ea1i d\u01b0\u1edbi m\u01b0a d\u1ea7m n\u1eafng g\u1eaft<br>cho ban mai chim nh\u1ea1n b\u00e1o tin xu\u00e2n<br>cho \u0111\u01a1n s\u01a1 h\u1ea1t g\u1ea1o tr\u1eafng ng\u1ea7n<br>c\u1ea3 nh\u00e0nh d\u00e2u b\u00e9 xanh<br>ng\u01b0\u1eddi c\u0169ng cho nh\u1ef1a \u1ea5m</i><br><div style=\"text-align: right;\">(L\u01b0u Quang V\u0169, <i>S\u00f4ng H\u1ed3ng</i>, theo<i> V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10,</i> NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>Nh\u1eefng d\u00f2ng th\u01a1 n\u00e0o trong \u0111o\u1ea1n th\u01a1 ch\u1ea5t ch\u1ee9a x\u00fac c\u1ea3m ng\u1ee3i ca c\u00f4ng \u01a1n c\u1ee7a s\u00f4ng H\u1ed3ng v\u00e0 l\u00f2ng bi\u1ebft \u01a1n c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nNh\u1eefng d\u00f2ng th\u01a1 ch\u1ea5t ch\u1ee9a x\u00fac c\u1ea3m ng\u1ee3i ca c\u00f4ng \u01a1n c\u1ee7a s\u00f4ng H\u1ed3ng v\u00e0 l\u00f2ng bi\u1ebft \u01a1n c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh tr\u01b0\u1edbc nh\u1eefng \u0111i\u1ec1u t\u1ed1t \u0111\u1eb9p m\u00e0 d\u00f2ng s\u00f4ng mang \u0111\u1ebfn cho con ng\u01b0\u1eddi:<br>\n+ cho ban mai chim nh\u1ea1n b\u00e1o tin xu\u00e2n: D\u00f2ng s\u00f4ng mang \u0111\u1ebfn s\u1ef1 s\u1ed1ng t\u01b0\u01a1i m\u1edbi.<br>\n+ cho \u0111\u01a1n s\u01a1 h\u1ea1t g\u1ea1o tr\u1eafng ng\u1ea7n: D\u00f2ng s\u00f4ng mang ph\u00f9 sa b\u1ed3i \u0111\u1eafp ru\u1ed9ng \u0111\u1ed3ng, ch\u1eaft chiu n\u00ean h\u1ea1t l\u00faa v\u00e0ng, h\u1ea1t g\u1ea1o tr\u1eafng th\u01a1m.<br>\n+ c\u1ea3 nh\u00e0nh d\u00e2u b\u00e9 xanh ng\u01b0\u1eddi c\u0169ng cho nh\u1ef1a \u1ea5m: D\u00f2ng s\u00f4ng t\u01b0\u1edbi t\u1eafm cho c\u00e2y c\u1ed1i c\u1ed9i c\u00e0nh, mang d\u01b0\u1ee1ng ch\u1ea5t nu\u00f4i t\u1eebng nh\u00e1nh canh ng\u1ecdn c\u1ecf.<br>\n\u2192 Nh\u1eefng c\u00e2u th\u01a1 tr\u00ean th\u1ec3 hi\u1ec7n l\u00f2ng bi\u1ebft \u01a1n c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh \u0111\u1ed1i v\u1edbi s\u00f4ng H\u1ed3ng - \u201cng\u01b0\u1eddi m\u1eb9 ph\u00f9 sa c\u1ee7a v\u00f9ng v\u0103n ho\u00e1 x\u1ee9 s\u1edf\u201d (m\u01b0\u1ee3n c\u00e1ch Ho\u00e0ng Ph\u1ee7 Ng\u1ecdc T\u01b0\u1eddng vi\u1ebft v\u1ec1 s\u00f4ng H\u01b0\u01a1ng).\n", "key": "A", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601438, "lessonId": 0, "a": "Nh\u1eefng h\u1ed3 n\u01b0\u1edbc ph\u1ee7 k\u00edn th\u1ee9 rong b\u00e8o l\u00e2u \u0111\u1eddi.", "b": "Nh\u1eefng ng\u01b0\u1eddi Digan ph\u1ea3i m\u1ea5t s\u00e1u th\u00e1ng tr\u1eddi \u0111i thuy\u1ec1n tr\u00ean con \u0111\u01b0\u1eddng th\u1ee7y \u1ea5y.", "c": "Nh\u1eefng con v\u1eadt c\u00f3 n\u01b0\u1edbc da m\u1ec1m m\u1ea1i, c\u00f3 \u0111\u1ea7u v\u00e0 c\u1ed5 c\u1ee7a ng\u01b0\u1eddi ph\u1ee5 n\u1eef.", "d": "M\u1ed9t th\u1ebf gi\u1edbi \u0111\u1ea7m l\u1ea7y r\u1ed9ng m\u00eanh m\u00f4ng m\u00e0 theo nh\u01b0 l\u1eddi ch\u1ee9ng c\u1ee7a nh\u1eefng ng\u01b0\u1eddi Digan th\u00ec n\u00f3 kh\u00f4ng c\u00f3 b\u1edd b\u1ebfn.", "bookId": 1088524, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u1ede ph\u00eda nam l\u00e0 nh\u1eefng h\u1ed3 n\u01b0\u1edbc ph\u1ee7 k\u00edn th\u1ee9 rong b\u00e8o l\u00e2u \u0111\u1eddi v\u00e0 c\u1ea3 m\u1ed9t th\u1ebf gi\u1edbi \u0111\u1ea7m l\u1ea7y r\u1ed9ng m\u00eanh m\u00f4ng m\u00e0 theo nh\u01b0 l\u1eddi ch\u1ee9ng c\u1ee7a nh\u1eefng ng\u01b0\u1eddi Digan th\u00ec n\u00f3 kh\u00f4ng c\u00f3 b\u1edd b\u1ebfn. \u0110\u1ea7m l\u1ea7y m\u00eanh m\u00f4ng \u1ea5y bi\u1ebfn m\u1ea5t v\u1ec1 ph\u00eda t\u00e2y v\u1edbi m\u1ed9t m\u1eb7t n\u01b0\u1edbc tr\u1eafng x\u00f3a tr\u1ea3i \u0111\u1ebfn n\u01a1i s\u1eafc n\u01b0\u1edbc l\u1eabn v\u00e0o m\u00e0u tr\u1eddi, l\u00e0 n\u01a1i c\u00f3 nh\u1eefng con v\u1eadt c\u00f3 n\u01b0\u1edbc da m\u1ec1m m\u1ea1i, c\u00f3 \u0111\u1ea7u v\u00e0 c\u1ed5 c\u1ee7a ng\u01b0\u1eddi ph\u1ee5 n\u1eef. V\u1edbi m\u00e3nh l\u1ef1c c\u1ee7a b\u1ed9 v\u00fa kh\u1ed5ng l\u1ed3, ch\u00fang v\u1eabn th\u01b0\u1eddng l\u00e0m cho ng\u01b0\u1eddi \u0111i bi\u1ec3n m\u1ea5t m\u1ea1ng. Nh\u1eefng ng\u01b0\u1eddi Digan ph\u1ea3i m\u1ea5t s\u00e1u th\u00e1ng tr\u1eddi \u0111i thuy\u1ec1n tr\u00ean con \u0111\u01b0\u1eddng th\u1ee7y \u1ea5y \u0111\u1ec3 cu\u1ed1i c\u00f9ng g\u1eb7p m\u1ed9t doi \u0111\u1ea5t li\u1ec1n l\u00e0 n\u01a1i nh\u1eefng con l\u1eeba c\u1ee7a ng\u01b0\u1eddi \u0111\u01b0a th\u01b0 qua l\u1ea1i.\u201d</i><br><div style=\"text-align: right;\">(Gabriel Garcia Marquez, <i>Tr\u0103m n\u0103m c\u00f4 \u0111\u01a1n</i>, NXB V\u0103n h\u1ecdc, 2000)</div>Ch\u1ec9 ra chi ti\u1ebft hoang \u0111\u01b0\u1eddng, k\u00ec \u1ea3o trong \u0111o\u1ea1n tr\u00edch.", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft \u201cNh\u1eefng con v\u1eadt c\u00f3 n\u01b0\u1edbc da m\u1ec1m m\u1ea1i, c\u00f3 \u0111\u1ea7u v\u00e0 c\u1ed5 c\u1ee7a ng\u01b0\u1eddi ph\u1ee5 n\u1eef.\u201d mang y\u1ebfu t\u1ed1 hoang \u0111\u01b0\u1eddng, k\u00ec \u1ea3o v\u00ec n\u00f3 mi\u00eau t\u1ea3 nh\u1eefng sinh v\u1eadt kh\u00f4ng c\u00f3 th\u1eadt trong th\u1ebf gi\u1edbi th\u1ef1c t\u1ebf, mang \u0111\u1eb7c \u0111i\u1ec3m c\u1ee7a c\u1ea3 ng\u01b0\u1eddi v\u00e0 \u0111\u1ed9ng v\u1eadt.\n", "key": "C", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601449, "lessonId": 0, "a": "\u201cTh\u00e2n thi\u1ebfu n\u1eef nh\u01b0 hoa ch\u00edn chi\u1ebfng\u201d.", "b": "\u201cCha \u0111\u1eb7t \u0111\u00e2u, con xin ng\u1ed3i \u0111\u1ea5y.\u201d.", "c": "\u201cCon bi\u1ebft \u0111\u00e2u th\u1eafm \u0111\u1eadu phai ch\u1eebng\u201d.", "d": "\u201cSinh con l\u00e0 g\u00e1i nh\u01b0 h\u1ea1t m\u01b0a sa\u201d.", "bookId": 1088525, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cL\u00c3O SAY: \u01a0 n\u00e0y V\u00e2n!<br>C\u00f3 Kim Nham th\u1eadt \u0111\u1ea5ng Nho phong<br>\u0110\u00e3 sang \u0111\u00e2y \u0111\u1ecbnh h\u1ecfi con c\u00f9ng<br>D\u00f9 c\u00f3 \u01b0ng th\u00ec con kh\u00e1 n\u00f3i<br>K\u1ebbo ra l\u00f2ng cha \u00e9p duy\u00ean con.<br>XU\u00dd V\u00c2N: - Tr\u00ecnh l\u1ea1y cha,<br>Sinh con l\u00e0 g\u00e1i nh\u01b0 h\u1ea1t m\u01b0a sa<br>H\u1ea1t b\u00e3i c\u00e1t, h\u1ea1t sa xu\u1ed1ng gi\u1ebfng<br>Th\u00e2n thi\u1ebfu n\u1eef nh\u01b0 hoa ch\u00edn chi\u1ebfng<br>Hoa thi\u1ec1m ch\u00e2u, hoa n\u1edf tr\u00ean r\u1eebng<br>Con bi\u1ebft \u0111\u00e2u th\u1eafm \u0111\u1eadu phai ch\u1eebng<br>Cha \u0111\u1eb7t \u0111\u00e2u, con xin ng\u1ed3i \u0111\u1ea5y.\u201d</i><br><div style=\"text-align: right;\">(Ch\u00e8o c\u1ed5, <i>Kim Nham</i>, theo<i> V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>D\u00f2ng n\u00e0o trong l\u1eddi n\u00f3i c\u1ee7a Xu\u00fd V\u00e2n ch\u1ee9ng t\u1ecf n\u00e0ng \u01b0ng thu\u1eadn l\u1ea5y Kim Nham?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u00e2u n\u00f3i \u201cCha \u0111\u1eb7t \u0111\u00e2u, con xin ng\u1ed3i \u0111\u1ea5y.\u201d th\u1ec3 hi\u1ec7n r\u00f5 s\u1ef1 \u01b0ng thu\u1eadn c\u1ee7a X\u00fay V\u00e2n trong vi\u1ec7c l\u1ea5y Kim Nham. C\u00e2u n\u00f3i n\u00e0y th\u1ec3 hi\u1ec7n s\u1ef1 v\u00e2ng l\u1eddi, ch\u1ea5p nh\u1eadn s\u1ef1 s\u1eafp \u0111\u1eb7t c\u1ee7a cha m\u1eb9 trong h\u00f4n nh\u00e2n, m\u1ed9t quan ni\u1ec7m ph\u1ed5 bi\u1ebfn trong x\u00e3 h\u1ed9i phong ki\u1ebfn. \n", "key": "B", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601460, "lessonId": 0, "a": "D\u00f2ng th\u1ee9 nh\u1ea5t.", "b": "D\u00f2ng th\u1ee9 hai.", "c": "D\u00f2ng th\u1ee9 ba.", "d": "D\u00f2ng th\u1ee9 t\u01b0.", "bookId": 1088526, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cMang mang tr\u01b0\u1eddng d\u1ea1 b\u1ea5t n\u0103ng mi\u00ean,<br>Ng\u00e3 t\u1ed1 t\u00f9 thi b\u00e1ch k\u1ec9 thi\u00ean.<br>T\u1ed1 li\u1ec5u nh\u1ea5t thi\u00ean th\u01b0\u1eddng c\u00e1c b\u00fat,<br>T\u00f2ng lung m\u00f4n v\u1ecdng t\u1ef1 do thi\u00ean.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>B\u1ea5t mi\u00ean d\u1ea1</i>)</div>D\u1ecbch ngh\u0129a:<br><i>\u201cM\u00eanh mang c\u1ea3nh \u0111\u00eam d\u00e0i, kh\u00f4ng ng\u1ee7 \u0111\u01b0\u1ee3c,<br>Th\u01a1 t\u00f9 ta vi\u1ebft \u0111\u00e3 h\u01a1n tr\u0103m b\u00e0i.<br>L\u00e0m xong m\u1ed7i b\u00e0i l\u1ea1i th\u01b0\u1eddng g\u00e1c b\u00fat,<br>Nh\u00ecn qua c\u1eeda t\u00f9 ng\u00f3ng tr\u1eddi t\u1ef1 do.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh,<i> \u0110\u00eam kh\u00f4ng ng\u1ee7</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>D\u00f2ng n\u00e0o trong b\u00e0i th\u01a1 b\u1ed9c l\u1ed9 khao kh\u00e1t t\u1ef1 do c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh?<br>", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nD\u00f2ng th\u01a1 \u201cNh\u00ecn qua c\u1eeda t\u00f9 ng\u00f3ng tr\u1eddi t\u1ef1 do\u201d tr\u1ef1c ti\u1ebfp th\u1ec3 hi\u1ec7n kh\u00e1t v\u1ecdng t\u1ef1 do ch\u00e1y b\u1ecfng c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh. D\u00f9 b\u1ecb giam c\u1ea7m, t\u00e2m h\u1ed3n v\u00e0 \u00fd ch\u00ed c\u1ee7a ng\u01b0\u1eddi t\u00f9 v\u1eabn h\u01b0\u1edbng v\u1ec1 b\u1ea7u tr\u1eddi t\u1ef1 do, th\u1ec3 hi\u1ec7n tinh th\u1ea7n l\u1ea1c quan v\u00e0 ni\u1ec1m tin v\u00e0o t\u01b0\u01a1ng lai.\n", "key": "D", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601462, "lessonId": 0, "a": "D\u1ecbch v\u1ee5 chuy\u1ec3n ph\u00e1t trong \u0111\u1ea1i d\u1ecbch.", "b": "Kh\u1ea3 n\u0103ng \u1ee9ng ph\u00f3 nhanh nh\u1ea1y c\u1ee7a con ng\u01b0\u1eddi trong \u0111\u1ea1i d\u1ecbch.", "c": "T\u00ecnh ng\u01b0\u1eddi trong \u0111\u1ea1i d\u1ecbch.", "d": "Th\u1ef1c tr\u1ea1ng cung \u1ee9ng h\u00e0ng ho\u00e1 trong \u0111\u1ea1i d\u1ecbch.", "bookId": 1088527, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNh\u1eefng ng\u00e0y ch\u1ee3 An Nh\u01a1n, si\u00eau th\u1ecb B\u00e1ch H\u00f3a Xanh \u0111\u00f3ng c\u1eeda, chu\u1ed7i cung \u1ee9ng b\u1ecb ng\u01b0ng tr\u1ec7, b\u00e0 con, b\u1ea1n b\u00e8, h\u1ecdc tr\u00f2 \u1edf Hu\u1ebf, Qu\u1ea3ng Ng\u00e3i, \u0110\u00e0 L\u1ea1t, Pleiku, Tuy H\u00f2a, V\u0129nh Long, Th\u00e0nh ph\u1ed1 H\u1ed3 Ch\u00ed Minh t\u00ecm c\u00e1ch g\u1eedi th\u1ef1c ph\u1ea9m, rau qu\u1ea3 ti\u1ebfp t\u1ebf. V\u1ec1 \u0111\u00e2y \u0111\u1ea5t l\u1ea1, nh\u01b0ng d\u1ea7n l\u1ea1i c\u00f3 ng\u01b0\u1eddi quen t\u1eadn t\u00ecnh gi\u00fap \u0111\u1ee1. Ch\u1ec9 c\u1ea7n nh\u1eafn tin, m\u1ea5y ch\u00e1u g\u00e1i c\u00f9ng x\u00f3m s\u1eb5n l\u00f2ng mua gi\u00fap th\u1ecbt c\u00e1, rau qu\u1ea3, thu\u1ed1c t\u00e2y \u0111em \u0111\u1ebfn t\u1eadn nh\u00e0. M\u1ed7i l\u1ea7n shipper ch\u1edf h\u00e0ng \u0111\u1ebfn \u0111\u1ea7u h\u1ebbm th\u00ec c\u00e1c anh d\u00e2n ph\u00f2ng t\u00ecnh nguy\u1ec7n x\u00e1ch \u0111\u1ed3 v\u00e0o cho \u00f4ng gi\u00e1o. Trong ba tu\u1ea7n cao \u0111i\u1ec3m c\u1ee7a d\u1ecbch b\u1ec7nh, m\u1ed9t nh\u00e0 l\u00e1ng gi\u1ec1ng v\u1eadn \u0111\u1ed9ng \u0111\u01b0\u1ee3c ba xe t\u1ea3i ch\u1edf \u0111\u1ea7y \u1eafp g\u1ea1o m\u00ec, th\u1ef1c ph\u1ea9m, rau qu\u1ea3 ph\u00e1t t\u1eb7ng cho b\u00e0 con trong khu ph\u1ed1.\u201d</i><br><div style=\"text-align: right;\">(Hu\u1ef3nh Nh\u01b0 Ph\u01b0\u01a1ng, <i>V\u1ec1 n\u01a1i \u0111\u1ea5t l\u1ea1 ng\u01b0\u1eddi quen</i>, theo <i>vanvn.vn</i>)</div>N\u1ed9i dung ch\u00ednh c\u1ee7a \u0111o\u1ea1n tr\u00edch tr\u00ean l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch n\u00f3i v\u1ec1 nh\u1eefng h\u00e0nh \u0111\u1ed9ng gi\u00fap \u0111\u1ee1, chia s\u1ebb c\u1ee7a m\u1ecdi ng\u01b0\u1eddi d\u00e0nh cho nhau trong th\u1eddi gian d\u1ecbch b\u1ec7nh.<br>\n\u2192 N\u1ed9i dung ch\u00ednh c\u1ee7a \u0111o\u1ea1n tr\u00edch l\u00e0 t\u00ecnh ng\u01b0\u1eddi trong \u0111\u1ea1i d\u1ecbch.\n", "key": "C", "isVideo": true, "score": 0, "order": 11, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601466, "lessonId": 0, "a": "\u201cNh\u00e0 th\u1edd \u0110\u1ee9c B\u00e0 Pari\u201d (V. Huy-g\u00f4), \u201cT\u1ea5n tr\u00f2 \u0111\u1eddi\u201d (H. Ban-d\u1eafc), \u201cCh\u00ed Ph\u00e8o\u201d (Nam Cao).", "b": "\u201cHo\u00e0ng L\u00ea nh\u1ea5t th\u1ed1ng ch\u00ed (Ng\u00f4 gia v\u0103n ph\u00e1i), \u201cS\u1ed1 \u0111\u1ecf (V\u0169 Tr\u1ecdng Ph\u1ee5ng), \u201cChi\u1ebfn tranh v\u00e0 ho\u00e0 b\u00ecnh\u201d (L. T\u00f4n-xt\u00f4i).", "c": "\u201cB\u1ebfn kh\u00f4ng ch\u1ed3ng\u201d (D\u01b0\u01a1ng H\u01b0\u1edbng), \u201cN\u1ed7i bu\u1ed3n chi\u1ebfn tranh\u201d (B\u1ea3o Ninh), \u201c\u00d4ng gi\u00e0 v\u00e0 bi\u1ec3n c\u1ea3\u201d (\u01a0. H\u00ea-ming-u\u00ea).", "d": "\u201cNh\u1eefng ng\u01b0\u1eddi kh\u1ed1n kh\u1ed5\u201d (V. Huy-g\u00f4), \u201cS\u1ed1ng m\u00f2n\u201d (Nam Cao), \u201cM\u00f9a l\u00e1 r\u1ee5ng trong v\u01b0\u1eddn\u201d (Ma V\u0103n Kh\u00e1ng).", "bookId": 1088528, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "D\u00f2ng n\u00e0o sau \u0111\u00e2y n\u00eau t\u00ean nh\u1eefng t\u00e1c ph\u1ea9m <b>kh\u00f4ng </b>c\u00f9ng th\u1ec3 lo\u1ea1i ti\u1ec3u thuy\u1ebft?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- Nh\u00e0 th\u1edd \u0110\u1ee9c B\u00e0 Pari l\u00e0 ti\u1ec3u thuy\u1ebft c\u1ee7a v\u0103n h\u00e0o Ph\u00e1p V. Huy-g\u00f4. T\u00e1c ph\u1ea9m ra \u0111\u1eddi xu\u1ea5t ph\u00e1t t\u1eeb vi\u1ec7c t\u00e1c gi\u1ea3 mu\u1ed1n vi\ e, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 21 \u0111\u1ebfn 25", "content": "\u201cNh\u00f3m c\u00e1c vi khu\u1ea9n nh\u01b0 Enterobacteriaceae, bao g\u1ed3m Klebsiella pneumoniae, Shigella, E. coli..., \u0111\u1ec1u c\u00f3 \u1edf m\u1ee9c th\u1ea5p trong h\u1ec7 vi sinh \u0111\u01b0\u1eddng ru\u1ed9t c\u1ee7a ng\u01b0\u1eddi kh\u1ecfe m\u1ea1nh. Tuy nhi\u00ean n\u1ebfu ch\u00fang \u1edf m\u1ee9c cao, do nhi\u1ec1u nguy\u00ean nh\u00e2n, v\u00ed d\u1ee5 nh\u01b0 vi\u00eam nhi\u1ec5m trong c\u01a1 th\u1ec3 ho\u1eb7c \u0103n th\u1ef1c ph\u1ea9m \u00f4 nhi\u1ec5m - ch\u00fang c\u00f3 th\u1ec3 d\u1eabn \u0111\u1ebfn \u0111au \u1ed1m ho\u1eb7c b\u1ec7nh t\u1eadt. Trong nh\u1eefng tr\u01b0\u1eddng h\u1ee3p x\u1ea5u, vi\u1ec7c c\u00f3 qu\u00e1 nhi\u1ec1u Enterobacteriaceae trong \u0111\u01b0\u1eddng ru\u1ed9t c\u0169ng c\u00f3 th\u1ec3 l\u00e0 m\u1ed1i nguy hi\u1ec3m.<br>C\u00e1c nh\u00e0 nghi\u00ean c\u1ee9u \u0111\u00e3 s\u1eed d\u1ee5ng c\u00e1c c\u00e1ch t\u00ednh to\u00e1n, bao g\u1ed3m c\u1ea3 AI \u0111\u1ec3 ph\u00e2n t\u00edch th\u00e0nh ph\u1ea7n h\u1ec7 vi sinh \u0111\u01b0\u1eddng ru\u1ed9t c\u1ee7a h\u01a1n 12.000 ng\u01b0\u1eddi trong kh\u1eafp 45 qu\u1ed1c gia t\u1eeb nh\u1eefng m\u1eabu ph\u00e2n c\u1ee7a h\u1ecd. C\u00e1c nh\u00e0 nghi\u00ean c\u1ee9u ph\u00e1t hi\u1ec7n ra \u201cd\u1ea5u hi\u1ec7u\u201d h\u1ec7 vi sinh c\u1ee7a m\u1ed9t ng\u01b0\u1eddi c\u00f3 th\u1ec3 gi\u00fap d\u1ef1 \u0111o\u00e1n \u0111\u01b0\u1eddng ru\u1ed9t c\u1ee7a h\u1ecd c\u00f3 b\u1ecb Enterobacteriaceae chi\u1ebfm l\u0129nh hay kh\u00f4ng. K\u1ebft qu\u1ea3 n\u00e0y nh\u1ea5t qu\u00e1n trong c\u00e1c tr\u1ea1ng th\u00e1i kh\u00e1c nhau c\u1ee7a s\u1ee9c kh\u1ecfe v\u00e0 c\u00e1c v\u1ecb tr\u00ed \u0111\u1ecba l\u00ed.<br>H\u1ecd nh\u1eadn di\u1ec7n \u0111\u01b0\u1ee3c 135 lo\u00e0i vi sinh \u0111\u01b0\u1eddng ru\u1ed9t \u0111\u01b0\u1ee3c t\u00ecm th\u1ea5y ph\u1ed5 bi\u1ebfn khi thi\u1ebfu Enterobacteriaceae, gi\u1ed1ng nh\u01b0 b\u1ea3o v\u1ec7 kh\u1ecfi s\u1ef1 l\u00e2y nhi\u1ec5m.<br>N\u1ed5i ti\u1ebfng b\u1eadc nh\u1ea5t trong c\u00e1c lo\u00e0i vi sinh \u0111\u01b0\u1eddng ru\u1ed9t c\u00f3 t\u00e1c d\u1ee5ng b\u1ea3o v\u1ec7 l\u00e0 nh\u00f3m vi khu\u1ea9n Faecalibacterium, v\u1ed1n t\u1ea1o ra c\u00e1c h\u1ee3p ch\u1ea5t c\u00f3 l\u1ee3i g\u1ecdi l\u00e0 c\u00e1c acids b\u00e9o chu\u1ed7i ng\u1eafn b\u1eb1ng vi\u1ec7c ph\u00e1 v\u1ee1 ch\u1ea5t x\u01a1 trong c\u00e1c th\u1ef1c ph\u1ea9m ch\u00fang ta \u0103n. N\u00f3 \u0111\u01b0\u1ee3c coi l\u00e0 b\u1ea3o v\u1ec7 ch\u00fang ta ch\u1ed1ng l\u1ea1i s\u1ef1 l\u00e2y truy\u1ec1n c\u1ee7a vi khu\u1ea9n Enterobacteriaceae c\u00f3 kh\u1ea3 n\u0103ng g\u00e2y b\u1ec7nh.<br>C\u00e1c nh\u00e0 nghi\u00ean c\u1ee9u \u0111\u1ec1 xu\u1ea5t l\u00e0 vi\u1ec7c \u0103n nhi\u1ec1u ch\u1ea5t x\u01a1 trong ch\u1ebf \u0111\u1ed9 \u0103n c\u1ee7a ch\u00fang ta s\u1ebd gi\u00fap t\u0103ng tr\u01b0\u1edfng c\u00e1c t\u1ebf b\u00e0o t\u1ed1t - v\u00e0 \u0111\u00e1nh b\u1eadt k\u1ebb x\u1ea5u \u0111\u1ec3 gi\u1ea3m thi\u1ec3u nguy c\u01a1 r\u1ee7i ro b\u1ec7nh t\u1eadt.<br>Ng\u01b0\u1ee3c l\u1ea1i, vi\u1ec7c c\u00f3 probiotics - v\u1ed1n kh\u00f4ng thay \u0111\u1ed5i m\u1ed9t c\u00e1ch tr\u1ef1c ti\u1ebfp m\u00f4i tr\u01b0\u1eddng trong ru\u1ed9t - c\u00f3 th\u1ec3 \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn kh\u1ea3 n\u0103ng l\u00e2y nhi\u1ec5m Enterobacteriaceae.<br>K\u1ebft qu\u1ea3 n\u00e0y \u0111\u01b0\u1ee3c xu\u1ea5t b\u1ea3n tr\u00ean t\u1ea1p ch\u00ed <i>Nature Microbiology.</i><br>\u201cK\u1ebft qu\u1ea3 c\u1ee7a ch\u00fang t\u00f4i cho th\u1ea5y nh\u1eefng g\u00ec ch\u00fang ta \u0103n c\u00f3 ti\u1ec1m n\u0103ng r\u1ea5t quan tr\u1ecdng trong vi\u1ec7c ki\u1ec3m so\u00e1t kh\u1ea3 n\u0103ng l\u00e2y nhi\u1ec5m m\u1ed9t ph\u1ea1m vi vi khu\u1ea9n, bao g\u1ed3m E. coli v\u00e0 Klebsiella pneumoniae, b\u1edfi v\u00ec s\u1ef1 thay \u0111\u1ed5i m\u00f4i tr\u01b0\u1eddng ru\u1ed9t c\u1ee7a ch\u00fang ra s\u1ebd khi\u1ebfn n\u00f3 tr\u1edf n\u00ean kh\u00f3 s\u1ed1ng v\u1edbi nh\u1eefng k\u1ebb x\u00e2m l\u1ea5n\u201d, theo TS. Alexandre Almeida, m\u1ed9t nh\u00e0 nghi\u00ean c\u1ee9u \u0110\u1ea1i h\u1ecdc Cambridge v\u00e0 l\u00e0 t\u00e1c gi\u1ea3 ch\u00ednh c\u1ee7a nghi\u00ean c\u1ee9u.<br>Anh c\u0169ng cho bi\u1ebft th\u00eam \u201cB\u1eb1ng vi\u1ec7c \u0103n c\u00e1c lo\u1ea1i th\u1ef1c ph\u1ea9m nh\u01b0 rau, \u0111\u1eadu, ng\u0169 c\u1ed1c nguy\u00ean h\u1ea1t, ch\u00fang ta c\u00f3 th\u1ec3 cung c\u1ea5p v\u1eadt li\u1ec7u th\u00f4 cho vi khu\u1ea9n d\u1ea1 d\u00e0y c\u1ee7a ch\u00fang ta \u0111\u1ec3 t\u1ea1o ra c\u00e1c acid chu\u1ed7i ng\u1eafn - c\u00e1c th\u00e0nh ph\u1ea7n c\u00f3 th\u1ec3 b\u1ea3o v\u1ec7 ch\u00fang ta kh\u1ecfi c\u00e1c m\u1ea7m b\u1ec7nh\u201d.<br>Vi\u00eam ph\u1ed5i do Klebsiella c\u00f3 th\u1ec3 l\u00e0 nguy\u00ean nh\u00e2n d\u1eabn \u0111\u1ebfn c\u00e1c b\u1ec7nh ph\u1ed5i, vi\u00eam m\u00e0ng n\u00e3o v\u00e0 c\u00e1c b\u1ec7nh kh\u00e1c. C\u1ea3nh b\u00e1o tr\u00ean to\u00e0n c\u1ea7u v\u1ec1 kh\u00e1ng kh\u00e1ng sinh v\u1edbi m\u1ea7m b\u1ec7nh n\u00e0y \u0111ang ng\u00e0y m\u1ed9t gia t\u0103ng c\u00f3 th\u1ec3 khi\u1ebfn c\u00e1c nh\u00e0 khoa h\u1ecdc ph\u1ea3i t\u00ecm c\u00e1ch m\u1edbi \u0111\u1ec3 c\u00f3 th\u1ec3 ki\u1ec3m so\u00e1t t\u00ecnh tr\u1ea1ng n\u00e0y, c\u00f9ng v\u1edbi c\u00e1c lo\u1ea1i vi khu\u1ea9n l\u00e2y nhi\u1ec5m kh\u00e1c.<br>\u201cV\u1edbi c\u00e1c t\u1ec9 l\u1ec7 kh\u00e1ng kh\u00e1ng sinh gia t\u0103ng, ng\u00e0y c\u00e0ng c\u00f3 \u00edt nh\u1eefng l\u1ef1a ch\u1ecdn \u0111i\u1ec1u tr\u1ecb c\u00f3 s\u1eb5n cho ch\u00fang ta. C\u00e1ch ti\u1ebfp c\u1eadn t\u1ed1t nh\u1ea5t b\u00e2y gi\u1edd l\u00e0 ng\u0103n ng\u1eeba l\u1ea5y nhi\u1ec5m ngay t\u1eeb b\u01b0\u1edbc \u0111\u1ea7u ti\u00ean v\u00e0 ch\u00fang ta c\u00f3 th\u1ec3 l\u00e0m \u0111\u01b0\u1ee3c vi\u1ec7c \u0111\u00f3 b\u1eb1ng vi\u1ec7c gi\u1ea3m thi\u1ec3u c\u01a1 h\u1ed9i cho c\u00e1c vi khu\u1ea9n g\u00e2y b\u1ec7nh \u0111\u00f3 t\u1ea5n c\u00f4ng \u0111\u01b0\u1eddng ru\u1ed9t c\u1ee7a ch\u00fang ta\u201d, Almeida n\u00f3i.\u201d<br><div style=\"text-align: right;\">(Thanh H\u01b0\u01a1ng d\u1ecbch t\u1eeb <i>University of Cambridge, Th\u1ef1c ph\u1ea9m gi\u00e0u ch\u1ea5t x\u01a1 c\u00f3 th\u1ec3 gi\u00fap ng\u0103n s\u1ef1 t\u0103ng tr\u01b0\u1edfng c\u1ee7a vi khu\u1ea9n \u0111\u01b0\u1eddng ru\u1ed9t c\u00f3 h\u1ea1i,</i> theo <i>tiasang.com.vn</i>)</div>", "listQuestion": [{"questionId": 21601506, "lessonId": 0, "a": "Vi khu\u1ea9n E. coli \u1edf m\u1ee9c cao trong h\u1ec7 vi sinh \u0111\u01b0\u1eddng ru\u1ed9t c\u1ee7a ng\u01b0\u1eddi kh\u1ecfe m\u1ea1nh.", "b": "C\u00e1c lo\u1ea1i th\u1ef1c ph\u1ea9m nh\u01b0 rau, \u0111\u1eadu, ng\u0169 c\u1ed1c nguy\u00ean h\u1ea1t c\u00f3 th\u1ec3 cung c\u1ea5p v\u1eadt li\u1ec7u th\u00f4 cho vi khu\u1ea9n d\u1ea1 d\u00e0y.", "c": "Faecalibacterium l\u00e0 nh\u00f3m vi khu\u1ea9n c\u00f3 l\u1ee3i cho \u0111\u01b0\u1eddng ru\u1ed9t.", "d": "Qu\u00e1 nhi\u1ec1u Enterobacteriaceae trong \u0111\u01b0\u1eddng ru\u1ed9t c\u0169ng c\u00f3 th\u1ec3 l\u00e0 m\u1ed1i nguy hi\u1ec3m.", "bookId": 1088537, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Th\u00f4ng tin n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>c\u00f3 trong \u0111o\u1ea1n tr\u00edch?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nD\u1ef1a v\u00e0o th\u00f4ng tin trong c\u00e2u: \u201cNh\u00f3m c\u00e1c vi khu\u1ea9n nh\u01b0 Enterobacteriaceae, bao g\u1ed3m Klebsiella pneumoniae, Shigella, E. coli..., \u0111\u1ec1u c\u00f3 \u1edf m\u1ee9c th\u1ea5p trong h\u1ec7 vi sinh \u0111\u01b0\u1eddng ru\u1ed9t c\u1ee7a ng\u01b0\u1eddi kh\u1ecfe m\u1ea1nh.\u201d<br>\n\u2192 Vi khu\u1ea9n E. coli \u1edf m\u1ee9c cao trong h\u1ec7 vi sinh \u0111\u01b0\u1eddng ru\u1ed9t c\u1ee7a ng\u01b0\u1eddi kh\u1ecfe m\u1ea1nh l\u00e0 th\u00f4ng tin kh\u00f4ng c\u00f3 tr b1ng vi\u1ec7c \u0103n c\u00e1c lo\u1ea1i th\u1ef1c ph\u1ea9m nh\u01b0 rau, \u0111\u1eadu, ng\u0169 c\u1ed1c nguy\u00ean h\u1ea1t, ch\u00fang ta c\u00f3 th\u1ec3 cung c\u1ea5p v\u1eadt li\u1ec7u th\u00f4 cho vi khu\u1ea9n d\u1ea1 d\u00e0y c\u1ee7a ch\u00fang ta \u0111\u1ec3 t\u1ea1o ra c\u00e1c acid chu\u1ed7i ng\u1eafn - c\u00e1c th\u00e0nh ph\u1ea7n c\u00f3 th\u1ec3 b\u1ea3o v\u1ec7 ch\u00fang ta kh\u1ecfi c\u00e1c m\u1ea7m b\u1ec7nh.", "d": "Vi\u1ec7c \u0103n nhi\u1ec1u ch\u1ea5t x\u01a1 trong ch\u1ebf \u0111\u1ed9 \u0103n c\u1ee7a ch\u00fang ta s\u1ebd gi\u00fap t\u0103ng tr\u01b0\u1edfng c\u00e1c t\u1ebf b\u00e0o t\u1ed1t - v\u00e0 \u0111\u00e1nh b\u1eadt k\u1ebb x\u1ea5u \u0111\u1ec3 gi\u1ea3m thi\u1ec3u nguy c\u01a1 r\u1ee7i ro b\u1ec7nh t\u1eadt.", "bookId": 1088539, "comments": 0, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "D\u1eef li\u1ec7u n\u00e0o sau \u0111\u00e2y l\u00e0 d\u1eef li\u1ec7u th\u1ee9 c\u1ea5p?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nD\u1eef li\u1ec7u \u201cVi\u1ec7c \u0103n nhi\u1ec1u ch\u1ea5t x\u01a1 trong ch\u1ebf \u0111\u1ed9 \u0103n c\u1ee7a ch\u00fang ta s\u1ebd gi\u00fap t\u0103ng tr\u01b0\u1edfng c\u00e1c t\u1ebf b\u00e0o t\u1ed1t - v\u00e0 \u0111\u00e1nh b\u1eadt k\u1ebb x\u1ea5u \u0111\u1ec3 gi\u1ea3m thi\u1ec3u nguy c\u01a1 r\u1ee7i ro b\u1ec7nh t\u1eadt.\u201d l\u00e0 d\u1eef li\u1ec7u th\u1ee9 c\u1ea5p v\u00ec \u0111\u00e2y kh\u00f4ng ph\u1ea3i l\u00e0 d\u1eef li\u1ec7u \u0111\u01b0\u1ee3c thu th\u1eadp t\u1eeb ngu\u1ed3n \u0111\u1ea7u ti\u00ean, nguy\u00ean g\u1ed1c.\n", "key": "D", "isVideo": true, "score": 0, "order": 23, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601511, "lessonId": 0, "a": "\u0110\u1eb3ng l\u1eadp.", "b": "T\u0103ng ti\u1ebfn.", "c": "Gi\u1ea3 thi\u1ebft - k\u1ebft qu\u1ea3.", "d": "Nh\u00e2n - qu\u1ea3.", "bookId": 1088540, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cTuy nhi\u00ean n\u1ebfu ch\u00fang \u1edf m\u1ee9c cao, do nhi\u1ec1u nguy\u00ean nh\u00e2n, v\u00ed d\u1ee5 nh\u01b0 vi\u00eam nhi\u1ec5m trong c\u01a1 th\u1ec3 ho\u1eb7c \u0103n th\u1ef1c ph\u1ea9m \u00f4 nhi\u1ec5m - ch\u00fang c\u00f3 th\u1ec3 d\u1eabn \u0111\u1ebfn \u0111au \u1ed1m ho\u1eb7c b\u1ec7nh t\u1eadt.\u201d<br>X\u00e1c \u0111\u1ecbnh quan h\u1ec7 \u00fd ngh\u0129a gi\u1eefa c\u00e1c v\u1ebf trong c\u00e2u tr\u00ean.", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nM\u1ed1i quan h\u1ec7 \u00fd ngh\u0129a gi\u1eefa c\u00e1c v\u1ebf c\u00e2u l\u00e0 gi\u1ea3 thi\u1ebft \u2013 k\u1ebft qu\u1ea3: <br>\n- V\u1ebf th\u1ee9 nh\u1ea5t \u201cn\u1ebfu ch\u00fang \u1edf m\u1ee9c cao, do nhi\u1ec1u nguy\u00ean nh\u00e2n, v\u00ed d\u1ee5 nh\u01b0 vi\u00eam nhi\u1ec5m trong c\u01a1 th\u1ec3 ho\u1eb7c \u0103n th\u1ef1c ph\u1ea9m \u00f4 nhi\u1ec5m\u201d l\u00e0 gi\u1ea3 thi\u1ebft.<br>\n- V\u1ebf th\u1ee9 hai \u201cch\u00fang c\u00f3 th\u1ec3 d\u1eabn \u0111\u1ebfn \u0111au \u1ed1m ho\u1eb7c b\u1ec7nh t\u1eadt\u201d l\u00e0 k\u1ebft qu\u1ea3.\n", "key": "C", "isVideo": true, "score": 0, "order": 24, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601516, "lessonId": 0, "a": "\u201cc\u00f3 th\u1ec3 l\u00e0 nguy\u00ean nh\u00e2n\u201d.", "b": "\u201cVi\u00eam ph\u1ed5i do Klebsiella\u201d.", "c": "\u201cd\u1eabn \u0111\u1ebfn c\u00e1c b\u1ec7nh ph\u1ed5i, vi\u00eam m\u00e0ng n\u00e3o\u201d.", "d": "\u201cv\u00e0 c\u00e1c b\u1ec7nh kh\u00e1c\u201d.", "bookId": 1088541, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cVi\u00eam ph\u1ed5i do Klebsiella c\u00f3 th\u1ec3 l\u00e0 nguy\u00ean nh\u00e2n d\u1eabn \u0111\u1ebfn c\u00e1c b\u1ec7nh ph\u1ed5i, vi\u00eam m\u00e0ng n\u00e3o v\u00e0 c\u00e1c b\u1ec7nh kh\u00e1c.\u201dX\u00e1c \u0111\u1ecbnh ch\u1ee7 ng\u1eef c\u1ee7a c\u00e2u v\u0103n tr\u00ean.", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nCh\u1ee7 ng\u1eef c\u1ee7a c\u00e2u v\u0103n l\u00e0 \u201cVi\u00eam ph\u1ed5i do Klebsiella\u201d.\n", "key": "B", "isVideo": true, "score": 0, "order": 25, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 26 \u0111\u1ebfn 30", "content": "<div style=\"text-align: center;\"><b>Lau bi\u00ean gi\u1edbi</b></div><b><div style=\"text-align: center;\"><b>(Th\u1ea1ch Qu\u1ef3)</b></div></b><div style=\"text-align: center;\">Nh\u1eefng b\u00f4ng lau tr\u00ean \u0111\u1ec9nh L\u00e3o S\u01a1n</div><div style=\"text-align: center;\">X\u00e0o x\u1ea1c l\u00e1 v\u00e0 ph\u1ea5t ph\u01a1 trong gi\u00f3</div><div style=\"text-align: center;\">Nh\u1eefng b\u00f4ng lau b\u00ean c\u1ed9t m\u1ed1c bi\u00ean c\u01b0\u01a1ng</div><div style=\"text-align: center;\">Bao x\u01b0\u01a1ng tr\u1eafng v\u00e0 m\u00e1u ng\u01b0\u1eddi \u0111\u00e3 \u0111\u1ed5?</div><div style=\"text-align: center;\"><br></div><div style=\"text-align: center;\">\u0110\u1ea5t n\u01b0\u1edbc t\u00f4i nh\u00e0nh c\u00e2y, ng\u1ecdn c\u1ecf</div><div style=\"text-align: center;\">C\u0169ng ngh\u00ecn n\u0103m x\u01b0\u01a1ng tr\u1eafng m\u00e1u h\u1ed3ng</div><div style=\"text-align: center;\">Nh\u1eefng b\u00f4ng lau x\u1ea1c x\u00e0o trong gi\u00f3</div><div style=\"text-align: center;\">Lau tr\u1eafng n\u00f3i \u0111i\u1ec1u g\u00ec ai c\u00f3 nghe kh\u00f4ng?</div><div style=\"text-align: center;\"><br></div><div style=\"text-align: center;\">M\u1ed9t d\u1ea3i bi\u00ean c\u01b0\u01a1ng n\u00fai hi\u1ec1n, s\u00f4ng v\u1eafng</div><div style=\"text-align: center;\">Lau trong chi\u1ec1u gi\u00f3 th\                             <tbody class="divide-y divide-gray-200">`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; 
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; 
                                const userChoice = userObj[pIdx]; 
                                
                                let trClass = "bg-white hover:bg-gray-50";
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) trClass = "bg-green-50";
                                    else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
