641, "comments": 0, "bookmarks": 19, "likes": 0, "shares": 0, "typeId": 0, "questionText": "After <u>visiting</u> the hospital wards, he <u>became</u> more aware of the infections <u>spreaded</u> by physicians from sick patients to healthy <u>patients</u>.", "answer": "<b><i>Ki\u1ebfn th\u1ee9c T\u1eeb v\u1ef1ng </i><br></b>Ta c\u00f3 \u201cspread\u201d l\u00e0 \u0111\u1ed9ng t\u1eeb b\u1ea5t quy t\u1eafc v\u00ec n\u00f3 gi\u1eef nguy\u00ean d\u1ea1ng khi chuy\u1ec3n sang th\u1ec3 qu\u00e1 kh\u1ee9.<br>S\u1eeda l\u1ed7i:<b> spreaded \u21d2 spread</b><br><b>T\u1ea1m d\u1ecbch:</b> Sau khi \u0111\u1ebfn th\u0103m c\u00e1c ph\u00f2ng b\u1ec7nh vi\u1ec7n, anh \u1ea5y \u0111\u00e3 hi\u1ec3u r\u00f5 h\u01a1n v\u1ec1 c\u00e1c b\u1ec7nh nhi\u1ec5m tr\u00f9ng l\u00e2y lan do b\u00e1c s\u0129 t\u1eeb b\u1ec7nh nh\u00e2n \u1ed1m sang b\u1ec7nh nh\u00e2n kh\u1ecfe m\u1ea1nh.", "key": "C", "isVideo": true, "score": 0, "order": 40, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 41-45: Which of the following best restates each of the given sentences? ", "content": "", "listQuestion": [{"questionId": 19872700, "lessonId": 0, "a": "Employees can choose whether or not to wear ID cards during work time.", "b": "ID cards of all employees must be worn while on the job.", "c": "Employees are advised to wear ID cards during work time.", "d": "ID cards should be worn by employees when they enter the company.", "bookId": 744022, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "It is mandatory for all employees to wear ID cards during work time.", "answer": "<b>C\u00e2u g\u1ed1c: </b>T\u1ea5t c\u1ea3 nh\u00e2n vi\u00ean b\u1eaft bu\u1ed9c ph\u1ea3i \u0111eo th\u1ebb ID trong gi\u1edd l\u00e0m vi\u1ec7c<br>A.&nbsp;Nh\u00e2n vi\u00ean c\u00f3 th\u1ec3 ch\u1ecdn c\u00f3 \u0111eo ho\u1eb7c kh\u00f4ng \u0111eo th\u1ebb ID s": 0, "shares": 0, "typeId": 0, "questionText": "\u201cWould you like to visit me for a few days, Michael?\u201d asked Julia.", "answer": "<b>T\u1ea1m d\u1ecbch:</b> \u201cAnh c\u00f3 mu\u1ed1n \u0111\u1ebfn th\u0103m t\u00f4i v\u00e0i ng\u00e0y kh\u00f4ng, Michael?\u201d Julia h\u1ecfi.<br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n <br></b>A. Julia m\u1eddi Michael \u0111\u1ebfn nh\u00e0 c\u00f4 \u1ea5y v\u00e0i ng\u00e0y.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang.<br>Ta c\u00f3 <b>Would you like to V = invite sb to V</b>: m\u1eddi ai l\u00e0m g\u00ec<br>B. Julia h\u1ecfi li\u1ec7u Michael c\u00f3 th\u1ec3 \u0111\u1ebfn th\u0103m c\u00f4 \u1ea5y v\u00e0i ng\u00e0y kh\u00f4ng.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. \u0110\u00e2y l\u00e0 c\u00e2u m\u1eddi, kh\u00f4ng ph\u1ea3i h\u1ecfi v\u1ec1 kh\u1ea3 n\u0103ng c\u00f3 th\u1ec3 \u0111\u1ebfn hay kh\u00f4ng.<br>C\u00e2u t\u01b0\u1eddng thu\u1eadt \u1edf d\u1ea1ng c\u00e2u h\u1ecfi YES-NO: <b>S + asked + O + if/whether + S + V</b><br>C. Julia h\u1ecfi Michael li\u1ec7u c\u00f4 \u1ea5y c\u00f3 mu\u1ed1n \u0111\u1ebfn th\u0103m c\u00f4 \u1ea5y v\u00e0i ng\u00e0y kh\u00f4ng.<br>\u21d2 Sai v\u1ec1 ngh\u0129a v\u00ec \u0111\u1ec1 b\u00e0i l\u00e0 l\u1eddi m\u1eddi, kh\u00f4ng ph\u1ea3i c\u00e2u h\u1ecfi.<br>D. Julia nh\u1eafc Michael v\u1ec1 chuy\u1ebfn th\u0103m nh\u00e0 c\u00f4 \u1ea5y v\u00e0i ng\u00e0y.<br>\u21d2 Sai v\u1ec1 ngh\u0129a.", "key": "A", "isVideo": true, "score": 0, "order": 42, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10469878, "lessonId": 0, "a": "The book is interesting enough for Mark to lend her last week.", "b": "It is an interesting book which Mark lent Hana last week.", "c": "The book which Mark lent Hana last week is too interesting to read.", "d": "The book that Mark lent Hana last week interests her a lot.", "bookId": 290467, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Hana is very interested in the book Mark lent her last week.", "answer": "<b>T\u1ea1m d\u1ecbch</b>: Hana r\u1ea5t h\u1ee9ng th\u00fa v\u1edbi cu\u1ed1n s\u00e1ch Mark cho c\u00f4 m\u01b0\u1ee3n tu\u1ea7n tr\u01b0\u1edbc. <br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n<br></b>A. Cu\u1ed1n s\u00e1ch \u0111\u1ee7 th\u00fa v\u1ecb \u0111\u1ec3 Mark cho c\u00f4 \u1ea5y m\u01b0\u1ee3n v\u00e0o tu\u1ea7n tr\u01b0\u1edbc.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. Mark cho Hana m\u01b0\u1ee3n, v\u00e0 c\u00f4 \u1ea5y th\u00edch. Kh\u00f4ng ph\u1ea3i s\u00e1ch hay th\u00ec Mark m\u1edbi \u0111\u01b0a.<br>C\u1ea5u tr\u00fac: <b>be adj enough for sb to do sth:</b> \u0110\u1ee7 \u0111\u1ec3 l\u00e0m g\u00ec<br>B. \u0110\u00f3 l\u00e0 m\u1ed9t cu\u1ed1n s\u00e1ch th\u00fa v\u1ecb m\u00e0 Mark cho Hana m\u01b0\u1ee3n tu\u1ea7n tr\u01b0\u1edbc.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. Hana h\u1ee9ng th\u00fa v\u1edbi cu\u1ed1n s\u00e1ch ch\u1ee9 kh\u00f4ng ph\u1ea3i cu\u1ed1n s\u00e1ch hay, th\u00fa v\u1ecb.<br>C. Cu\u1ed1n s\u00e1ch m\u00e0 Mark cho Hana m\u01b0\u1ee3n tu\u1ea7n tr\u01b0\u1edbc qu\u00e1 th\u00fa v\u1ecb n\u00ean c\u00f4 \u1ea5y kh\u00f4ng th\u1ec3 \u0111\u1ecdc.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. <br>D. Cu\u1ed1n s\u00e1ch m\u00e0 Mark cho Hana m\u01b0\u1ee3n tu\u1ea7n tr\u01b0\u1edbc khi\u1ebfn c\u00f4 r\u1ea5t th\u00edch th\u00fa.", "key": "D", "isVideo": true, "score": 0, "order": 43, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10469879, "lessonId": 0, "a": "The farmers in the village appeared happy in the sake of poverty.", "b": "Poor though the farmers in the village were, they lived happily.", "c": "Despite their poverty, the farmers in the village seemed happy.", "d": "The happiness of the farmers in the village remained unchangeable regardless of poverty.", "bookId": 290468, "comments": 1, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Although the farmers in the village were very poor, they seemed happy.", "answer": "<b>T\u1ea1m d\u1ecbch</b>: M\u1eb7c d\u00f9 nh\u1eefng ng\u01b0\u1eddi n\u00f4ng d\u00e2n trong l\u00e0ng r\u1ea5t ngh\u00e8o nh\u01b0ng h\u1ecd c\u00f3 v\u1ebb h\u1ea1nh ph\u00fac. <br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n<br></b>A. Nh\u1eefng ng\u01b0\u1eddi n\u00f4ng d\u00e2n trong l\u00e0ng t\u1ecf ra h\u1ea1nh ph\u00fac v\u00ec ngh\u00e8o \u0111\u00f3i.<br>\u21d2 Sai c\u1ea5u tr\u00fac v\u00e0 ngh\u0129a<br>Ta c\u00f3: <b>for the sake of</b>: v\u00ec l\u1ee3i \u00edch c\u1ee7a<br>B. Nh\u1eefng ng\u01b0\u1eddi n\u00f4ng d\u00e2n trong l\u00e0ng tuy ngh\u00e8o nh\u01b0ng h\u1ecd s\u1ed1ng h\u1ea1nh ph\u00fac.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. H\u1ecd tr\u00f4ng c\u00f3 v\u1ebb h\u1ea1nh ph\u00fac, kh\u00f4ng ph\u1ea3i s\u1ed1ng h\u1ea1nh ph\u00fac.<br>\u0110\u1ea3o ng\u1eef v\u1edbi \u201cthough\u201d: <b>Although/Even though/Though + S1 + V1 + Adv/Adj, S2 + V2</b> <br>C. M\u1eb7c d\u00f9 ngh\u00e8o kh\u00f3 nh\u01b0ng nh\u1eefng ng\u01b0\u1eddi n\u00f4ng d\u00e2n trong l\u00e0ng d\u01b0\u1eddng nh\u01b0 v\u1eabn h\u1ea1nh ph\u00fac.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang. <br>C\u1ea5u tr\u00fac: <b>Despite/In spite of + N/NP/V-ing, S + V + </b>\u2026: m\u1eb7c d\u00f9<br>D. Ni\u1ec1m h\u1ea1nh ph\u00fac c\u1ee7a nh\u1eefng ng\u01b0\u1eddi n\u00f4ng d\u00e2n trong l\u00e0ng v\u1eabn kh\u00f4ng h\u1ec1 thay \u0111\u1ed5i d\u00f9 c\u00f3 ngh\u00e8o \u0111\u00f3i.<br>\u21d2 Sai v\u1ec1 ngh\u0129a.", "key": "C", "isVideo": true, "score": 0, "order": 44, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10469880, "lessonId": 0, "a": "I didn\u2019t help you to decorate your house because I had no idea that you were doing it.", "b": "I am planning to help you to decorate your house whenever you are ready.", "c": "Let me know when you are going to decorate your house.", "d": "You didn\u2019t tell me you needed help decorating your house, otherwise I\u2019d have assisted you.", "bookId": 290469, "comments": 0, "bookmarks": 3, "likes": 0, "shares": 0, "typeId": 0, "questionText": "If I had known you needed a hand decorating your house, I would have helped you.", "answer": "<b>T\u1ea1m d\u1ecbch</b>: N\u1ebfu t\u00f4i bi\u1ebft b\u1ea1n c\u1ea7n gi\u00fap trang tr\u00ed nh\u00e0 c\u1eeda th\u00ec t\u00f4i \u0111\u00e3 gi\u00fap b\u1ea1n r\u1ed3i. <br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n</b><br>A. T\u00f4i kh\u00f4ng gi\u00fap b\u1ea1n trang tr\u00ed nh\u00e0 v\u00ec t\u00f4i kh\u00f4ng bi\u1ebft b\u1ea1n \u0111ang l\u00e0m vi\u1ec7c \u0111\u00f3.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. T\u00e1c gi\u1ea3 bi\u1ebft b\u1ea1n trang tr\u00ed nh\u00e0 nh\u01b0ng v\u00ec b\u1ea1n kh\u00f4ng n\u00f3i c\u1ea7n ng\u01b0\u1eddi gi\u00fap.<br>B. T\u00f4i d\u1ef1 \u0111\u1ecbnh gi\u00fap b\u1ea1n trang tr\u00ed ng\u00f4i nh\u00e0 c\u1ee7a b\u1ea1n b\u1ea5t c\u1ee9 khi n\u00e0o b\u1ea1n s\u1eb5n s\u00e0ng.<br>\u21d2 Sai v\u1ec1 ngh\u0129a.<br>C. H\u00e3y cho t\u00f4i bi\u1ebft khi n\u00e0o b\u1ea1n \u0111\u1ecbnh trang tr\u00ed ng\u00f4i nh\u00e0 c\u1ee7a m\u00ecnh.<br>\u21d2 Sai v\u1ec1 ngh\u0129a<br>D. B\u1ea1n \u0111\u00e3 kh\u00f4ng n\u00f3i v\u1edbi t\u00f4i r\u1eb1ng b\u1ea1n c\u1ea7n gi\u00fap trang tr\u00ed ng\u00f4i nh\u00e0 c\u1ee7a m\u00ecnh, n\u1ebfu kh\u00f4ng t\u00f4i \u0111\u00e3 h\u1ed7 tr\u1ee3 b\u1ea1n.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang. <br>C\u1ea5u tr\u00fac:<b> S + Ved, otherwise + S + would + have + Vp2</b>: gi\u1ea3 \u0111\u1ecbnh \u0111i\u1ec1u kh\u00f4ng c\u00f3 th\u1eadt trong qu\u00e1 kh\u1ee9", "key": "D", "isVideo": true, "score": 0, "order": 45, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 46-52: Read the passage carefully.", "content": "1. Charles Darwin was born in 1809 in Shrewsbury, England. His father, a doctor, had high hopes that his son would earn a medical degree at Edinburgh University in Scotland, where he enrolled at the age of sixteen. It turned out that Darwin was more interested in natural history than medicine\u2014it was said that the sight of blood made him sick to his stomach. While he continued his studies in theology at Cambridge, it was his focus on natural history that became his passion.<br>2. In 1831, Darwin <b>embarked </b>on a voyage aboard a ship of the British Royal Navy, the HMS Beagle, employed as a naturalist. Darwin spent much of the trip on land collecting samples of plants, animals, rocks, and fossils. He packed all of his specimens into crates and sent them back to England aboard other vessels.<br>3. Upon his return to England in 1836, Darwin\u2019s work continued. Studies of his samples and notes from the trip led to groundbreaking scientific discoveries. Fossils he collected were shared with paleontologists and geologists, leading to advances in the understanding of the processes that shape the Earth\u2019s surface. Darwin\u2019s analysis of the plants and animals he gathered led him to question how species form and change over time. This work convinced him of the insight that he is most famous for\u2014natural selection. The theory of natural selection says that individuals of a species are more likely to survive in their environment and pass on their genes to the next generation when they inherit traits from <b>their </b>parents that are best suited for that specific environment. In this way, such traits become more widespread in the species and can lead eventually to the development of a new species.<br>4. In 1859, Darwin published his thoughts about evolution and natural selection in <i>On the Origin of Species</i>. It was as popular as it was controversial. The book convinced many people that species change over time\u2014a lot of time\u2014suggesting that the planet was much older than what was commonly believed at the time: six thousand years.<br>5. Charles Darwin died in 1882 at the age of seventy-three. He is buried in Westminster Abbey in London, England.<br><div style=\"text-align: right;\"><i>(https://education.nationalgeographic.or)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21577761, "lessonId": 0, "a": "Darwin\u2019s Journey: From Theology to Evolution", "b": "The voyage of the HMS Beagle and its role in science", "c": "The role of fossils in Charles Darwin\u2019s scientific research", "d": "The debates and controversies caused by Darwin\u2019s ideas", "bookId": 1086021, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Which of the following is the best title for the passage?", "answer": "<b>Ti\u00eau \u0111\u1ec1 n\u00e0o sau \u0111\u00e2y l\u00e0 ph\u00f9 h\u1ee3p nh\u1ea5t cho \u0111o\u1ea1n v\u0103n?\n</b><br><b>A.</b> H\u00e0nh tr\u00ecnh c\u1ee7a Darwin: T\u1eeb th\u1ea7n h\u1ecdc \u0111\u1ebfn thuy\u1ebft ti\u1ebfn h\u00f3a\n<br><b>=&gt; \u0110\u00fang</b> v\u00ec b\u00e0i vi\u1ebft k\u1ec3 l\u1ea1i qu\u00e1 tr\u00ecnh Darwin t\u1eeb khi h\u1ecdc th\u1ea7n h\u1ecdc \u0111\u1ebfn l\u00fac h\u00ecnh th\u00e0nh thuy\u1ebft ti\u1ebfn h\u00f3a.\n\n\n<br><br><b>B.</b> Chuy\u1ebfn h\u1ea3i tr\u00ecnh c\u1ee7a t\u00e0u HMS Beagle v\u00e0 vai tr\u00f2 c\u1ee7a n\u00f3 trong khoa h\u1ecdc\n<br><b>=&gt; Sai</b> v\u00ec chuy\u1ebfn \u0111i ch\u1ec9 l\u00e0 m\u1ed9t ph\u1ea7n trong c\u00e2u chuy\u1ec7n, kh\u00f4ng ph\u1ea3i to\u00e0n b\u1ed9 n\u1ed9i dung.\n\n<br><br><b>C.</b> Vai tr\u00f2 c\u1ee7a h\u00f3a th\u1ea1ch trong nghi\u00ean c\u1ee9u khoa h\u1ecdc c\u1ee7a Charles Darwin\n<br><b>=&gt; Sai </b>v\u00ec h\u00f3a th\u1ea1ch ch\u1ec9 \u0111\u01b0\u1ee3c nh\u1eafc \u0111\u1ebfn nh\u01b0 m\u1ed9t trong nhi\u1ec1u lo\u1ea1i m\u1eabu v\u1eadt Darwin thu th\u1eadp, kh\u00f4ng ph\u1ea3i tr\u1ecdng t\u00e2m c\u1ee7a b\u00e0i.\n\n\n<br><br><b>D.</b> Nh\u1eefng cu\u1ed9c tranh lu\u1eadn v\u00e0 tranh c\u00e3i do c\u00e1c \u00fd t\u01b0\u1edfng c\u1ee7a Darwin g\u00e2y ra\n<br><b>=&gt; Sai</b>, b\u00e0i kh\u00f4ng t\u1eadp trung v\u00e0o tranh c\u00e3i\n\n<br><br><b>Ta c\u00f3:\n</b><br><b>\u0110o\u1ea1n 1:</b> Gi\u1edbi thi\u1ec7u v\u1ec1 tu\u1ed5i th\u01a1 v\u00e0 con \u0111\u01b0\u1eddng h\u1ecdc t\u1eadp c\u1ee7a Darwin \u2014 \u00f4ng \u0111\u01b0\u1ee3c k\u1ef3 v\u1ecdng h\u1ecdc y nh\u01b0ng l\u1ea1i say m\u00ea l\u1ecbch s\u1eed t\u1ef1 nhi\u00ean h\u01a1n th\u1ea7n h\u1ecdc.\n<br><b>\u0110o\u1ea1n 2:</b> M\u00f4 t\u1ea3 chuy\u1ebfn h\u1ea3i tr\u00ecnh tr\u00ean t\u00e0u HMS Beagle, n\u01a1i Darwin thu th\u1eadp nhi\u1ec1u m\u1eabu v\u1eadt th\u1ef1c v\u1eadt, \u0111\u1ed9ng v\u1eadt v\u00e0 h\u00f3a th\u1ea1ch, \u0111\u1eb7t n\u1ec1n m\u00f3ng cho c\u00e1c nghi\u00ean c\u1ee9u sau n\u00e0y.\n<br><b>\u0110o\u1ea1n 3:</b> Sau khi tr\u1edf v\u1ec1 Anh, \u00f4ng ph\u00e2n t\u00edch c\u00e1c m\u1eabu v\u1eadt v\u00e0 ghi ch\u00e9p, t\u1eeb \u0111\u00f3 ph\u00e1t tri\u1ec3n h\u1ecdc thuy\u1ebft ch\u1ecdn l\u1ecdc t\u1ef1 nhi\u00ean gi\u1ea3i th\u00edch c\u00e1ch lo\u00e0i ti\u1ebfn h\u00f3a.\n<br><b>\u0110o\u1ea1n 4:</b> N\u0103m 1859, Darwin c\u00f4ng b\u1ed1 t\u00e1c ph\u1ea9m \u201cOn the Origin of Species\u201d, tr\u00ecnh b\u00e0y thuy\u1ebft ti\u1ebfn h\u00f3a, g\u00e2y ch\u00fa \u00fd v\u00e0 tranh lu\u1eadn v\u00ec \u0111i ng\u01b0\u1ee3c ni\u1ec1m tin ph\u1ed5 bi\u1ebfn v\u1ec1 tu\u1ed5i c\u1ee7a Tr\u00e1i \u0110\u1ea5t.\n<br><b>\u0110o\u1ea1n 5:</b> K\u1ebft th\u00fac b\u1eb1ng th\u00f4ng tin v\u1ec1 c\u00e1i ch\u1ebft v\u00e0 n\u01a1i an t\u00e1ng c\u1ee7a Darwin, t\u00f4n vinh \u00f4ng nh\u01b0 m\u1ed9t nh\u00e0 khoa h\u1ecdc v\u0129 \u0111\u1ea1i.\n<br><br><b>=&gt; \u00dd ch\u00ednh: H\u00e0nh tr\u00ecnh c\u1ee7a Darwin t\u1eeb h\u1ecdc th\u1ea7n h\u1ecdc \u0111\u1ebfn khi h\u00ecnh th\u00e0nh v\u00e0 c\u00f4ng b\u1ed1 thuy\u1ebft ti\u1ebfn h\u00f3a \u2014 qu\u00e1 tr\u00ecnh chuy\u1ec3n \u0111\u1ed5i t\u01b0 t\u01b0\u1edfng mang t\u00ednh c\u00e1ch m\u1ea1ng.</b>", "key": "A", "isVideo": false, "score": 0, "order": 46, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577765, "lessonId": 0, "a": "He thought the medical studies were too hard.", "b": "Seeing blood made him feel sick.", "c": "He wanted to focus on theology instead.", "d": "He preferred spending time observing animals and nature.", "bookId": 1086022, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 1, why did Darwin lose interest in pursuing a medical degree?", "answer": "<b>Theo \u0111o\u1ea1n 1, t\u1ea1i sao Darwin m\u1ea5t h\u1ee9ng th\u00fa v\u1edbi vi\u1ec7c theo h\u1ecdc y khoa?\n</b><br><b>A.</b> \u00d4ng cho r\u1eb1ng vi\u1ec7c h\u1ecdc y qu\u00e1 kh\u00f3.\n<br><b>B.</b> Vi\u1ec7c nh\u00ecn th\u1ea5y m\u00e1u khi\u1ebfn \u00f4ng c\u1ea3m th\u1ea5y bu\u1ed3n n\u00f4n.\n<br><b>C.</b> \u00d4ng mu\u1ed1n t\u1eadp trung v\u00e0o th\u1ea7n h\u1ecdc thay v\u00ec y h\u1ecdc.\n<br><b>D.</b> \u00d4ng th\u00edch d\u00e0nh th\u1eddi gian quan s\u00e1t \u0111\u1ed9ng v\u1eadt v\u00e0 thi\u00ean nhi\u00ean h\u01a1n.\n\n\n<br><br><u>C\u0103n c\u1ee9:</u> \u201cit was said that the sight of blood made him sick to his stomach.\u201d <br><i>(ng\u01b0\u1eddi ta n\u00f3i r\u1eb1ng ch\u1ec9 c\u1ea7n nh\u00ecn th\u1ea5y m\u00e1u c\u0169ng khi\u1ebfn \u00f4ng bu\u1ed3n n\u00f4n.)\n</i><br><br><b>=&gt; L\u00fd do \u00f4ng kh\u00f4ng mu\u1ed1n h\u1ecdc y l\u00e0 v\u00ec b\u1ecb bu\u1ed3n n\u00f4n khi nh\u00ecn th\u1ea5y m\u00e1u, ch\u1ee9 kh\u00f4ng ph\u1ea3i v\u00ec h\u1ecdc kh\u00f3 hay v\u00ec ch\u1ecdn ng\u00e0nh kh\u00e1c.\n\n</b>", "key": "B", "isVideo": false, "score": 0, "order": 47, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577767, "lessonId": 0, "a": "set off", "b": "dropped by", "c": "turned down", "d": "gave up", "bookId": 1086023, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 2, the phrase <b>embarked </b>on is closest in meaning to _____.", "answer": "<b>Trong \u0111o\u1ea1n 2, c\u1ee5m t\u1eeb \u201cembarked on\u201d c\u00f3 ngh\u0129a g\u1ea7n nh\u1ea5t v\u1edbi _____.\n</b><br><b>A.</b> set off /set \u0252f/ (v) kh\u1edfi h\u00e0nh, b\u1eaft \u0111\u1ea7u chuy\u1ebfn \u0111i\n<br><b>B.</b> dropped by /dr\u0252pt ba\u026a/ (v) gh\u00e9 qua\n<br><b>C.</b> turned down /t\u025c\u02d0nd da\u028an/ (v) t\u1eeb ch\u1ed1i\n<br><b>D.</b> gave up /\u0261e\u026av \u028cp/ (v) t\u1eeb b\u1ecf\n\n<br><b><br>C\u0103n c\u1ee9 th\u00f4ng tin:</b> \n\u201cIn 1831, Darwin embarked on a voyage aboard a ship of the British Royal Navy\u2026\u201d\n<br><b>T\u1ea1m d\u1ecbch:</b> N\u0103m 1831, Darwin b\u1eaft \u0111\u1ea7u chuy\u1ebfn h\u1ea3i h\u00e0nh tr\u00ean m\u1ed9t con t\u00e0u c\u1ee7a H\u1ea3i qu\u00e2n Ho\u00e0ng gia Anh\u2026\n<br><br>=&gt;  \u201c<b>embarked on a voyage</b>\u201d = <b>b\u1eaft \u0111\u1ea7u m\u1ed9t chuy\u1ebfn \u0111i</b> \u2192 \u0111\u1ed3ng ngh\u0129a v\u1edbi <b>set off</b>.", "key": "A", "isVideo": false, "score": 0, "order": 48, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577770, "lessonId": 0, "a": "Evolution happens by chance and randomly", "b": "Natural selection shows how species change over time", "c": "Fossils help people understand the history of the Earth", "d": "Species were created by a divine or supernatural power", "bookId": 1086024, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What is the main idea that Darwin is best known for, as mentioned in paragraph 3?", "answer": "<b>\u00dd ch\u00ednh m\u00e0 Darwin \u0111\u01b0\u1ee3c bi\u1ebft \u0111\u1ebfn nhi\u1ec1u nh\u1ea5t, nh\u01b0 \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp trong \u0111o\u1ea1n 3, l\u00e0 g\u00ec?\n</b><br><b>A. </b>Ti\u1ebfn h\u00f3a x\u1ea3y ra m\u1ed9t c\u00e1ch ng\u1eabu nhi\u00ean v\u00e0 t\u00ecnh c\u1edd.\n<br><b>B.</b> Ch\u1ecdn l\u1ecdc t\u1ef1 nhi\u00ean cho th\u1ea5y c\u00e1ch c\u00e1c lo\u00e0i thay \u0111\u1ed5i theo th\u1eddi gian.\n<br><b>C.</b> H\u00f3a th\u1ea1ch gi\u00fap con ng\u01b0\u1eddi hi\u1ec3u \u0111\u01b0\u1ee3c l\u1ecbch s\u1eed c\u1ee7a Tr\u00e1i \u0110\u1ea5t.\n<br><b>D.</b> C\u00e1c lo\u00e0i \u0111\u01b0\u1ee3c t\u1ea1o ra b\u1edfi m\u1ed9t quy\u1ec1n n\u0103ng th\u1ea7n th\u00e1nh ho\u1eb7c si\u00eau nhi\u00ean.\n\n<br><br><b>C\u0103n c\u1ee9 th\u00f4ng tin:</b> \u201cThis work convinced him of the insight that he is most famous for\u2014natural selection. The theory of natural selection says that individuals of a species are more likely to survive\u2026 and can lead eventually to the development of a new species.\u201d\n<br><b>T\u1ea1m d\u1ecbch:</b> C\u00f4ng tr\u00ecnh n\u00e0y \u0111\u00e3 khi\u1ebfn \u00f4ng tin t\u01b0\u1edfng v\u00e0o ph\u00e1t hi\u1ec7n m\u00e0 \u00f4ng n\u1ed5i ti\u1ebfng nh\u1ea5t \u2013 ch\u1ecdn l\u1ecdc t\u1ef1 nhi\u00ean. H\u1ecdc thuy\u1ebft ch\u1ecdn l\u1ecdc t\u1ef1 nhi\u00ean cho r\u1eb1ng c\u00e1c c\u00e1 th\u1ec3 trong c\u00f9ng m\u1ed9t lo\u00e0i c\u00f3 kh\u1ea3 n\u0103ng s\u1ed1ng s\u00f3t cao h\u01a1n\u2026 v\u00e0 cu\u1ed1i c\u00f9ng c\u00f3 th\u1ec3 d\u1eabn \u0111\u1ebfn s\u1ef1 ph\u00e1t tri\u1ec3n c\u1ee7a m\u1ed9t lo\u00e0i m\u1edbi.\n\n<br><br><b>=&gt; \u00dd ch\u00ednh m\u00e0 Darwin n\u1ed5i ti\u1ebfng nh\u1ea5t ch\u00ednh l\u00e0 ch\u1ecdn l\u1ecdc t\u1ef1 nhi\u00ean, gi\u1ea3i th\u00edch c\u00e1ch c\u00e1c lo\u00e0i thay \u0111\u1ed5i theo th\u1eddi gian.</b>", "key": "B", "isVideo": false, "score": 0, "order": 49, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577773, "lessonId": 0, "a": "traits\u2019", "b": "individuals\u2019", "c": "next generation\u2019s", "d": "species\u2019", "bookId": 1086025, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The word <b>their </b>in paragraph 3 refers to _____.", "answer": "<b>T\u1eeb \u201ctheir\u201d trong \u0111o\u1ea1n 3 \u00e1m ch\u1ec9 \u0111\u1ebfn _____.\n</b><br><b>A.</b> c\u00e1c \u0111\u1eb7c \u0111i\u1ec3m\n<br><b>B.</b> c\u00e1c c\u00e1 th\u1ec3\n<br><b>C.</b> th\u1ebf h\u1ec7 k\u1ebf ti\u1ebfp\n<br><b>D.</b> c\u00e1c lo\u00e0i\n\n<br><br><b>C\u0103n c\u1ee9:</b> \u201cThe theory of natural selection says that individuals of a species are more likely to survive in their environment and pass on their genes to the next generation when they inherit traits from their parents that are best suited for that specific environment.\u201d \n<br><b>T\u1ea1m d\u1ecbch: </b>Thuy\u1ebft ch\u1ecdn l\u1ecdc t\u1ef1 nhi\u00ean cho r\u1eb1ng c\u00e1c c\u00e1 th\u1ec3 trong c\u00f9ng m\u1ed9t lo\u00e0i c\u00f3 nhi\u1ec1u kh\u1ea3 n\u0103ng s\u1ed1ng s\u00f3t trong m\u00f4i tr\u01b0\u1eddng c\u1ee7a ch\u00fang v\u00e0 truy\u1ec1n l\u1ea1i gen cho th\u1ebf h\u1ec7 ti\u1ebfp theo khi ch\u00fang th\u1eeba h\u01b0\u1edfng nh\u1eefng \u0111\u1eb7c \u0111i\u1ec3m t\u1eeb cha m\u1eb9 ph\u00f9 h\u1ee3p nh\u1ea5t v\u1edbi m\u00f4i tr\u01b0\u1eddng c\u1ee5 th\u1ec3 \u0111\u00f3.\n\n\n<br><br>\u2192 \u201ctheir parents\u201d = cha m\u1eb9 c\u1ee7a nh\u1eefng c\u00e1 th\u1ec3 (individuals).\n<br>=&gt; \u201c<b>their</b>\u201d \u00e1m ch\u1ec9 \u201c<b>c\u00e1c c\u00e1 th\u1ec3</b>\u201d (individuals).", "key": "B", "isVideo": false, "score": 0, "order": 50, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questi kmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577779, "lessonId": 0, "a": "species undergo changes over long periods", "b": "the Earth is much older than six thousand years", "c": "the idea of evolution was widely accepted", "d": "the process of evolution takes a long period of time", "bookId": 1086027, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 4, Darwin\u2019s book <i>On the Origin of Species</i> does NOT argue that _________.", "answer": "<b>Trong \u0111o\u1ea1n 4, cu\u1ed1n s\u00e1ch On the Origin of Species (V\u1ec1 ngu\u1ed3n g\u1ed1c c\u00e1c lo\u00e0i) c\u1ee7a Darwin kh\u00f4ng cho r\u1eb1ng ________.</b><br><b>A.</b> C\u00e1c lo\u00e0i thay \u0111\u1ed5i trong su\u1ed1t th\u1eddi gian d\u00e0i.<br><b>=&gt; C\u00f3 \u0111\u1ec1 c\u1eadp</b>: \u201cspecies change over time\u201d<br><br><b>B. </b>Tr\u00e1i \u0110\u1ea5t c\u1ed5 h\u01a1n s\u00e1u ngh\u00ecn n\u0103m r\u1ea5t nhi\u1ec1u.<br><b>=&gt; C\u00f3 \u0111\u1ec1 c\u1eadp</b>: \u201cthe planet was much older than what was commonly believed at the time: six thousand years\u201d <br><i>(Tr\u00e1i \u0110\u1ea5t c\u1ed5 x\u01b0a h\u01a1n r\u1ea5t nhi\u1ec1u so v\u1edbi quan ni\u1ec7m ph\u1ed5 bi\u1ebfn l\u00fac b\u1ea5y gi\u1edd \u2014 ch\u1ec9 kho\u1ea3ng s\u00e1u ngh\u00ecn n\u0103m tu\u1ed5i)</i><br><br><b>C.</b> \u00dd t\u01b0\u1edfng v\u1ec1 ti\u1ebfn h\u00f3a \u0111\u01b0\u1ee3c ch\u1ea5p nh\u1eadn r\u1ed9ng r\u00e3i.<br><b>=&gt; Sai</b> v\u00ec n\u00f3 <b>g\u00e2y nhi\u1ec1u tranh c\u00e3i</b><br><u>C\u0103n c\u1ee9</u>: \u201cIt was as popular as it was <b><u>controversial</u></b>\u201d <br><i>(Cu\u1ed1n s\u00e1ch n\u00e0y v\u1eeba ph\u1ed5 bi\u1ebfn v\u1eeba <b><u>g\u00e2y tranh c\u00e3i</u></b>.)</i><br><br><b>D.</b> Qu\u00e1 tr\u00ecnh ti\u1ebfn h\u00f3a di\u1ec5n ra trong m\u1ed9t kho\u1ea3ng th\u1eddi gian d\u00e0i.<br><b>=&gt; C\u00f3 \u0111\u1ec1 c\u1eadp</b>: \u201cspecies change over time - a lot of time\u201d <br><i>(c\u00e1c lo\u00e0i c\u00f3 th\u1ec3 thay \u0111\u1ed5i theo th\u1eddi gian - m\u1ea5t r\u1ea5t nhi\u1ec1u th\u1eddi gian)<br></i><br><b>C\u0103n c\u1ee9:</b><br> In 1859, Darwin published his thoughts about evolution and natural selection in On the Origin of Species. It was as popular as it was controversial. The book convinced many people that <b>species change over time</b>\u2014a lot of time\u2014suggesting that the planet was much older than what was commonly believed at the time: six thousand years.<br>(<i>N\u0103m 1859, Darwin c\u00f4ng b\u1ed1 c\u00e1c \u00fd t\u01b0\u1edfng c\u1ee7a m\u00ecnh v\u1ec1 ti\u1ebfn h\u00f3a v\u00e0 ch\u1ecdn l\u1ecdc t\u1ef1 nhi\u00ean trong cu\u1ed1n \u201cNgu\u1ed3n g\u1ed1c c\u00e1c lo\u00e0i\u201d. Cu\u1ed1n s\u00e1ch n\u00e0y v\u1eeba ph\u1ed5 bi\u1ebfn v\u1eeba g\u00e2y tranh c\u00e3i d\u1eef d\u1ed9i. N\u00f3 thuy\u1ebft ph\u1ee5c nhi\u1ec1u ng\u01b0\u1eddi tin r\u1eb1ng <b>c\u00e1c lo\u00e0i c\u00f3 th\u1ec3 thay \u0111\u1ed5i theo th\u1eddi gian</b> - m\u1ea5t r\u1ea5t nhi\u1ec1u th\u1eddi gian, \u0111\u1ed3ng th\u1eddi g\u1ee3i \u00fd r\u1eb1ng Tr\u00e1i \u0110\u1ea5t c\u1ed5 x\u01b0a h\u01a1n r\u1ea5t nhi\u1ec1u so v\u1edbi quan ni\u1ec7m ph\u1ed5 bi\u1ebfn l\u00fac b\u1ea5y gi\u1edd \u2014 ch\u1ec9 kho\u1ea3ng s\u00e1u ngh\u00ecn n\u0103m tu\u1ed5i.)</i>", "key": "C", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully.", "content": "1. In recent decades, the push for gender equality in the workplace has gained significant momentum. Organizations worldwide are recognizing the importance of creating diverse and inclusive environments where all employees, regardless of gender, can thrive and contribute to their full potential. However, despite notable progress, challenges persist, and the journey towards true gender parity in professional settings continues.<br>2. One of the most visible indicators of progress has been the increasing number of women in leadership positions. Many companies have implemented policies to promote female talent, resulting in more women occupying executive roles and board positions. This shift not only provides role models for aspiring female professionals but also brings diverse perspectives to decision-making processes, which can lead to more innovative and inclusive business strategies.<br>3. Efforts to close the gender pay gap have also gained traction. Numerous countries have passed legislation requiring companies to report on gender pay disparities, putting pressure on organizations to address wage inequalities. Some forward-thinking companies have taken proactive steps, conducting internal audits and implementing corrective measures to ensure <b>equitable </b>compensation across genders.<br>4. Work-life balance initiatives have emerged as another crucial aspect of gender equality in the workplace. Recognizing that women often bear a disproportionate share of family responsibilities, many employers now offer flexible working arrangements, parental leave policies, and on-site childcare facilities. These measures not only support working parents but also challenge traditional gender roles by encouraging men to take a more active role in family life.<br>5. Despite these positive developments, significant challenges remain. Unconscious bias continues to influence hiring, promotion, and day-to-day interactions in the workplace. Women still face barriers in male-dominated industries and struggle to break through the \u201c<b>glass ceiling</b>\u201d in many organizations. Additionally, the COVID-19 pandemic has highlighted and, in some cases, exacerbated gender inequalities, with women more likely to have lost jobs or taken on increased caregiving responsibilities.<br>6. Looking ahead, achieving true gender equality in the workplace will require ongoing commitment and action from employers, policymakers, and society as a whole. This includes addressing deep-rooted cultural norms, implementing and enforcing robust anti-discrimination policies, and fostering inclusive workplace cultures that value diversity in all its forms.<br>7. As we progress towards a more equitable future, it\u2019s clear that gender equality in the workplace is not just a matter of fairness but also a key driver of economic growth and social progress. By harnessing the full potential of all individuals, regardless of gender, organizations and societies can unlock new levels of innovation, productivity, and prosperity.<br><div style=\"text-align: right;\"><i>(Source: https://www.ielts.net/)</i></div><i>Choose an option (A, B, C, or D) that best answers each question. </i>", "listQuestion": [{"questionId": 21577788, "lessonId": 0, "a": "Challenges in Modern Business Practices", "b": "The Role of Technology in Gender Equality", "c": "Gender Equality in the Workplace: Progress and Challenges", "d": "Inclusive Policies for Employers in the workplace", "bookId": 1086028, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title for the passage is ________.", "answer": "<b>Ti\u00eau \u0111\u1ec1 ph\u00f9 h\u1ee3p nh\u1ea5t cho b\u00e0i \u0111\u1ecdc l\u00e0 g\u00ec?\n</b><br><b>A.</b> Nh\u1eefng th\u00e1ch th\u1ee9c trong th\u1ef1c ti\u1ec5n kinh doanh hi\u1ec7n \u0111\u1ea1i <br><b>=&gt; Sai</b> v\u00ec b\u00e0i t\u1eadp trung v\u00e0o b\u00ecnh \u0111\u1eb3ng gi\u1edbi, kh\u00f4ng ph\u1ea3i c\u00e1c v\u1ea5n \u0111\u1ec1 chung trong kinh doanh.<br><br><b>B.</b> Vai tr\u00f2 c\u1ee7a c\u00f4ng ngh\u1ec7 trong b\u00ecnh \u0111\u1eb3ng gi\u1edbi <br><b>=&gt; Sai</b> v\u00ec b\u00e0i kh\u00f4ng nh\u1eafc \u0111\u1ebfn c\u00f4ng ngh\u1ec7.<br><br><b>C.</b> B\u00ecnh \u0111\u1eb3ng gi\u1edbi t\u1ea1i n\u01a1i l\u00e0m vi\u1ec7c: Ti\u1ebfn b\u1ed9 v\u00e0 th\u00e1ch th\u1ee9c <br><b>=&gt; \u0110\u00fang\n\n</b><br><br><b>D. </b>Ch\u00ednh s\u00e1ch to\u00e0n di\u1ec7n cho nh\u00e0 tuy\u1ec3n d\u1ee5ng t\u1ea1i n\u01a1i l\u00e0m vi\u1ec7c <br><b>=&gt; Sai</b> v\u00ec \u0111\u00e2y ch\u1ec9 l\u00e0 1 ph\u1ea7n trong n\u1ed9i dung to\u00e0n b\u00e0i, b\u00e0i \u0111\u1ec1 c\u1eadp \u0111\u1ebfn nhi\u1ec1u y\u1ebfu t\u1ed1 kh\u00e1c ngo\u00e0i ch\u00ednh s\u00e1ch c\u1ee7a nh\u00e0 tuy\u1ec3n d\u1ee5ng.", "key": "C", "isVideo": false, "score": 0, "order": 53, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577794, "lessonId": 0, "a": "helps reduce workplace inequality by offering role models for aspiring professionals", "b": "negatively impacts traditional business strategies", "c": "leads to a lack of diverse perspectives in decision-making", "d": "contributes to innovative and inclusive business strategies", "bookId": 1086029, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 2, increasing the number of women in leadership roles ________.", "answer": "<b>Theo \u0111o\u1ea1n 2, vi\u1ec7c t\u0103ng s\u1ed1 l\u01b0\u1ee3ng ph\u1ee5 n\u1eef trong vai tr\u00f2 l\u00e3nh \u0111\u1ea1o gi\u00fap g\u00ec?\n</b><br><b>A.</b> Gi\u00fap gi\u1ea3m b\u1ea5t b\u00ecnh \u0111\u1eb3ng t\u1ea1i n\u01a1i l\u00e0m vi\u1ec7c b\u1eb1ng c\u00e1ch cung c\u1ea5p h\u00ecnh m\u1eabu cho c\u00e1c chuy\u00ean gia t\u01b0\u01a1ng lai\n<br><b>B.</b> \u1ea2nh h\u01b0\u1edfng ti\u00eau c\u1ef1c \u0111\u1ebfn chi\u1ebfn l\u01b0\u1ee3c kinh doanh truy\u1ec1n th\u1ed1ng.\n<br><b>C.</b> D\u1eabn \u0111\u1ebfn thi\u1ebfu quan \u0111i\u1ec3m \u0111a d\u1ea1ng trong qu\u00e1 tr\u00ecnh ra quy\u1ebft \u0111\u1ecbnh\n<br><b>D.</b> \u0110\u00f3ng g\u00f3p v\u00e0o chi\u1ebfn l\u01b0\u1ee3c kinh doanh s\u00e1ng t\u1ea1o v\u00e0 to\u00e0n di\u1ec7n\n<br><br><b>C                 if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`;
                    const qType = q.normalizedType;
                    
                    // -- Palette Item (FIX ONCLICK SCOPE) --
                    // Sử dụng arrow function trong JS string template cẩn thận
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    
                    // Gán sự kiện click trực tiếp thay vì chuỗi string HTML để tránh lỗi scope
                    palBtn.addEventListener('click', function() { scrollToQuestion(qKey); });
                    
                    palDesk.appendChild(palBtn.cloneNode(true)); // Desktop clone cần gán lại event nếu cloneNode ko copy event
                    // Clone node không copy event listener. Phải tạo 2 nút riêng hoặc gán lại.
                    // Cách tốt nhất: tạo chuỗi HTML hoặc append element.
                    // Ở đây để đơn giản ta gán onclick bằng attribute string cho chắc ăn
                    palBtn.setAttribute('onclick', `scrollToQuestion('${qKey}')`);
                    
                    // Sau khi set attribute, append lại
                    palDesk.innerHTML = palDesk.innerHTML; // Reset để xoá nút cũ? Không nên.
                    // Code cũ append child.
                    
                    // Fix triệt để: Tạo string HTML cho palette
                    // (Đã sửa ở dưới)
                });
            });
            
            // Render lại từ đầu để tối ưu
            palDesk.innerHTML = '';
            palMob.innerHTML = '';
            container.innerHTML = '';
            globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`;
                    const qType = q.normalizedType;

                    // Palette Buttons
                    const btnClass = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    const btnHtml = `<button id="pal_${qKey}" onclick="scrollToQuestion('${qKey}')" class="${btnClass}">${qId}</button>`;
                    
                    palDesk.innerHTML += btnHtml;
                    palMob.innerHTML += btnHtml;

                    // Question Card
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'question-card bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // TYPE 0: MCQ
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { 
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; 
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // TYPE 1 & 3: FILL KEY
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const chars = userVal.split('');
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let boxesHtml = '<div class="flex gap-2 justify-start items-center">';
                        for(let i=0; i<4; i++) {
                            const char = chars[i] || '';
                            boxesHtml += `<input type="text" maxlength="1" 
                                class="char-input" 
                                data-index="${i}" 
                                data-key="${qKey}" 
                                value="${char}" 
                                readonly 
                                onclick="activateNumpad(this, '${qKey}')"
                                ${isSubmitted ? 'disabled' : ''} 
                            />`;
                        }
                        
                        if(examMode === 'practice' && !isSubmitted) {
                             boxesHtml += `<button onclick="checkFillAnswer('${qKey}')" class="ml-2 px-3 py-2 bg-blue-100 text-blue-700 font-bold rounded-lg text-sm hover:bg-blue-200 transition-colors">Kiểm tra</button>`;
                             // Nút xem lời giải cho practice
                             boxesHtml += `<button onclick="toggleSolution('${qKey}')" class="ml-2 px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button>`;
                        }
                        boxesHtml += '</div>';

                        let feedbackHtml = "";
                        if(isSubmitted) {
                             const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                             if(isCorrect) {
                                feedbackHtml = `<div class="mt-2 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                             } else {
                                feedbackHtml = `<div class="mt-2 text-red-600 text-sm">✗ Sai. Đáp án: <span class="font-bold">${correctVal}</span></div>`;
                             }
                        } else if (examMode === 'practice') {
                             feedbackHtml = `<div id="feedback-${qKey}" class="mt-2 text-sm font-bold hidden"></div>`;
                        }

                        html += `
                        <div class="flex flex-col relative">
                            ${boxesHtml}
                            ${feedbackHtml}
                        </div>`;
                    }

                    // TYPE 2: TRUE/FALSE
                    else if(qType === '2') {
                         html += `<div class="overflow-hidden border rounded-lg">
                            <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                                <tr>
                                    <th scope="col" class="px-3 py-3 w-10 text-center">Ý</th>
                                    <th scope="col" class="px-3 py-3">Nội dung</th>
                                    <th scope="col" class="px-3 py-3 w-32 text-center">Chọn Đ/S</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; 
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; 
                                const userChoice = userObj[pIdx]; 
                                
                                let trClass = "bg-white hover:bg-gray-50";
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) trClass = "bg-green-50";
                                    else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
