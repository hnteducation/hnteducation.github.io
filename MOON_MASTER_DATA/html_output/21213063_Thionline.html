cc968b1b3b3b.png\"/>.<br>\nDo \u0111\u00f3, hai \u0111o\u1ea1n th\u1eb3ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/675654f1-52b0-4eed-a025-f245634d238b.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/bf0db6b9-1490-48bc-a527-13a4450821ed.png\"/> t\u1ec9 l\u1ec7 v\u1edbi hai \u0111o\u1ea1n th\u1eb3ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/f4b7a55f-fb00-47a9-9318-0d790b8566b1.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/5756de22-58a9-46ce-8fa4-f4a4f612119b.png\"/>.<br>\n\n<b>\u2705 K\u1ebft lu\u1eadn: Ch\u1ecdn \u0111\u00e1p \u00e1n A.</b><br>\n", "key": "A", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.5, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21215310, "lessonId": 0, "a": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/3bdfb26f-cce6-4b00-aa63-0cfd8cb4cee3.png\"/>", "b": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/4e4dfa18-0b08-4865-b7e2-e94d53a35e01.png\"/>", "c": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/f8ba1eeb-3365-4875-bac2-9bea90645dd0.png\"/>", "d": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/e5fd79dc-4a4a-4eab-a9d9-f2a463ddffc5.png\"/>", "bookId": 1057350, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Cho h\u00ecnh v\u1ebd, bi\u1ebft <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/1feeae07-c290-405e-b053-db727d0e67fb.png\"/> Kh\u1eb3ng \u0111\u1ecbnh n\u00e0o sau \u0111\u00e2y <b>sai</b>?<br><img src=\"https://asset.moon.vn/img/chat/large/2025/9/c80007ab-3d4c-41a4-b68c-5617c2ece998.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\">", "answer": "<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\n\u00c1p d\u1ee5ng \u0111\u1ecbnh l\u00fd Thal\u00e8s v\u00e0 h\u1ec7 qu\u1ea3 c\u1ee7a \u0111\u1ecbnh l\u00fd Thal\u00e8s trong tam gi\u00e1c:<br>\nN\u1ebfu m\u1ed9t \u0111\u01b0\u1eddng th\u1eb3ng c\u1eaft hai c\u1ea1nh c\u1ee7a m\u1ed9t tam gi\u00e1c v\u00e0 song song v\u1edbi c\u1ea1nh c\u00f2n l\u1ea1i th\u00ec:<br>\n1. N\u00f3 \u0111\u1ecbnh ra tr\u00ean hai c\u1ea1nh \u0111\u00f3 nh\u1eefng \u0111o\u1ea1n th\u1eb3ng t\u01b0\u01a1ng \u1ee9ng t\u1ec9 l\u1ec7 (\u0111\u1ecbnh l\u00fd Thal\u00e8s).<br>\n2. N\u00f3 t\u1ea1o th\u00e0nh m\u1ed9t tam gi\u00e1c m\u1edbi c\u00f3 ba c\u1ea1nh t\u01b0\u01a1ng \u1ee9ng t\u1ec9 l\u1ec7 v\u1edbi ba c\u1ea1nh c\u1ee7a tam gi\u00e1c \u0111\u00e3 cho (h\u1ec7 qu\u1ea3).<br>\n\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nX\u00e9t <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/6cbf769b-ff79-4f0c-9d76-9e36590e4a7d.png\"/> c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7d13dc06-9f28-4085-8c1d-d28a2dc2729d.png\"/>, theo \u0111\u1ecbnh l\u00fd Thal\u00e8s v\u00e0 h\u1ec7 qu\u1ea3, ta c\u00f3 c\u00e1c t\u1ec9 l\u1ec7 th\u1ee9c sau:<br>\nTheo \u0111\u1ecbnh l\u00fd Thal\u00e8s: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/d257aa20-b778-442a-aeef-f14c85b96a5a.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/26a77d9c-8c92-4b87-a638-8b437e75d1ac.png\"/>.<br>\nTheo h\u1ec7 qu\u1ea3 \u0111\u1ecbnh l\u00fd Thal\u00e8s: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/17525202-503c-46e8-b125-f4505be1db59.png\"/>.<br>\n\nB\u00e2y gi\u1edd ta x\u00e9t t\u1eebng \u0111\u00e1p \u00e1n:<br>\n<b>\u0110\u00e1p \u00e1n A:</b> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/90c64a7f-308c-4de3-b60d-9656e9ada72e.png\"/>. \u0110\u00e2y l\u00e0 ngh\u1ecbch \u0111\u1ea3o c\u1ee7a t\u1ec9 l\u1ec7 th\u1ee9c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/2ab36dd4-c3b3-4f87-9970-0cd60b8ae7d1.png\"/> (\u0111\u00fang theo \u0111\u1ecbnh l\u00fd Thal\u00e8s). Do \u0111\u00f3 A \u0111\u00fang.<br>\n<b>\u0110\u00e1p \u00e1n B:</b> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/8d0d80cd-6d86-42c2-aadf-5b5466e6008b.png\"/>. T\u1eeb t\u1ec9 l\u1ec7 th\u1ee9c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/3929668d-a10d-4092-ae0c-e3f3a127eccd.png\"/>, ta \u0111\u1ed5i ch\u1ed7 trung t\u1ec9 (\u0111\u1ed5i ch\u1ed7 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/215d3cf2-3935-4b70-ac6d-197d2133daeb.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/fb778dfb-8330-4bb7-86b8-45f002c8c383.png\"/>), \u0111\u01b0\u1ee3c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/502a7670-760d-46b0-9a47-7dda17d980f0.png\"/>. Do \u0111\u00f3 B \u0111\u00fang.<br>\n<b>\u0110\u00e1p \u00e1n D:</b> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/da94a371-c29d-40f5-b00a-2ae62e099c90.png\"/>. \u0110\u00e2y ch\u00ednh l\u00e0 h\u1ec7 qu\u1ea3 c\u1ee7a \u0111\u1ecbnh l\u00fd Thal\u00e8s. Do \u0111\u00f3 D \u0111\u00fang.<br>\n<b>\u0110\u00e1p \u00e1n C:</b> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/a048dbea-9367-49b5-839c-242afbd31b41.png\"/>.<br>\nV\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/afd04b5c-2a00-4c47-bb44-c58e7db9e81f.png\"/> n\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/99803326-032e-4d9f-9b88-927878e29938.png\"/>.<br>\nV\u00ec <img style rtical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/ba359c30-1984-4b33-9031-ac5fc8e02f08.png\"/><br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/ed2cd865-33ff-470e-95ea-fa162cbadc39.png\"/><br>\n\n<b>\u2705 K\u1ebft lu\u1eadn: Ch\u1ecdn \u0111\u00e1p \u00e1n B.</b><br>\n", "key": "B", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.5, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21215811, "lessonId": 0, "a": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/e2339e7b-b596-41c6-9781-7148b93cae7f.png\"/>", "b": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/88862f4f-b1aa-4266-905c-cf5a6b164bca.png\"/>", "c": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/b3301ebd-54da-4145-9616-7ecff6312800.png\"/>", "d": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/a529f02b-eb40-4795-a369-7ed90e736fd2.png\"/>", "bookId": 1057352, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Cho h\u00ecnh v\u1ebd. T\u00ednh c\u00e1c gi\u00e1 tr\u1ecb x, y.<br><img src=\"https://asset.moon.vn/img/chat/large/2025/10/62659f8d-d89d-47c8-8bdd-3061e1726ae5.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\">", "answer": "<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>1. Ch\u1ee9ng minh song song: S\u1eed d\u1ee5ng quan h\u1ec7 t\u1eeb vu\u00f4ng g\u00f3c \u0111\u1ebfn song song (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/9bdff192-119e-4dce-908b-43a894e4c6ff.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/c35f884d-c236-4fa0-a6b3-8b5536cc39fe.png\"/> n\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.m , "d": "", "bookId": 1057361, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 2, "questionText": "Cho <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/c4242a36-46cf-4f02-a6ef-b7c6c72e32da.png\"/> \u0111\u01b0\u1eddng th\u1eb3ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/bcfc8e43-04f7-4381-9939-b83419e3856d.png\"/> c\u1eaft hai c\u1ea1nh AB v\u00e0 AC l\u1ea7n l\u01b0\u1ee3t t\u1ea1i hai \u0111i\u1ec3m M v\u00e0 N v\u1edbi c\u00e1c k\u00edch th\u01b0\u1edbc cho nh\u01b0 tr\u00ean h\u00ecnh v\u1ebd.<br><img src=\"https://asset.moon.vn/img/chat/large/2025/10/a388137b-3638-4d12-9505-a4d0a697cdda.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br>\tM\u1ed7i ph\u00e1t bi\u1ec3u sau \u0111\u00e2y l\u00e0 \u0111\u00fang hay sai?", "answer": "\n\n<b>Ph\u00e1t bi\u1ec3u 1</b><br>\n<b>N\u1ed9i dung:</b> \u0110\u01b0\u1eddng th\u1eb3ng a \u0111\u1ecbnh ra tr\u00ean hai c\u1ea1nh AB v\u00e0 AC c\u00e1c \u0111o\u1ea1n th\u1eb3ng t\u01b0\u01a1ng \u1ee9ng t\u1ec9 l\u1ec7.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b> S\u1eed d\u1ee5ng \u0111\u1ecbnh l\u00ed Thal\u00e8s trong tam gi\u00e1c.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nTheo \u0111\u1ecbnh l\u00ed Thal\u00e8s: N\u1ebfu m\u1ed9t \u0111\u01b0\u1eddng th\u1eb3ng song song v\u1edbi m\u1ed9t c\u1ea1nh c\u1ee7a tam gi\u00e1c v\u00e0 c\u1eaft hai c\u1ea1nh c\u00f2n l\u1ea1i th\u00ec n\u00f3 \u0111\u1ecbnh ra tr\u00ean hai c\u1ea1nh \u0111\u00f3 nh\u1eefng \u0111o\u1ea1n th\u1eb3ng t\u01b0\u01a1ng \u1ee9ng t\u1ec9 l\u1ec7.<br>\nV\u00ec \u0111\u1ec1 b\u00e0i cho \u0111\u01b0\u1eddng th\u1eb3ng a // BC v\u00e0 c\u1eaft AB, AC n\u00ean ph\u00e1t bi\u1ec3u n\u00e0y ho\u00e0n to\u00e0n tr\u00f9ng kh\u1edbp v\u1edbi n\u1ed9i dung \u0111\u1ecbnh l\u00ed.<br>\n<b>\u2705 K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u <b>\u0110\u00fang</b>.<br><br>\n\n<b>Ph\u00e1t bi\u1ec3u 2</b><br>\n<b>N\u1ed9i dung:</b> &frac{AM}{MB} = &frac{NC}{AN}<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b> \u00c1p d\u1ee5ng c\u00f4ng th\u1ee9c t\u1ec9 l\u1ec7 th\u1ee9c c\u1ee7a \u0111\u1ecbnh l\u00ed Thal\u00e8s.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nTheo \u0111\u1ecbnh l\u00ed Thal\u00e8s (v\u00ec MN // BC), t\u1ec9 l\u1ec7 \u0111\u00fang l\u00e0 &frac{AM}{MB} = &frac{AN}{NC}.<br>\nTrong khi \u0111\u00f3, ph\u00e1t bi\u1ec3u \u0111\u01b0a ra l\u00e0 &frac{AM}{MB} = &frac{NC}{AN} (b\u1ecb ngh\u1ecbch \u0111\u1ea3o v\u1ebf ph\u1ea3i).<br>\nKi\u1ec3m tra b\u1eb1ng s\u1ed1: V\u1ebf tr\u00e1i &frac{AM}{MB} = x/5, v\u1ebf ph\u1ea3i &frac{NC}{AN} = 10/4 = 2.5.<br>\nT\u1ec9 l\u1ec7 \u0111\u00fang ph\u1ea3i l\u00e0 &frac{AN}{NC} = 4/10 = 0.4. Do \u0111\u00f3 bi\u1ec3u th\u1ee9c n\u00e0y sai.<br>\n<b>\u2705 K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 2 l\u00e0 ph\u00e1t bi\u1ec3u <b>Sai</b>.<br><br>\n\n<b>Ph\u00e1t bi\u1ec3u 3</b><br>\n<b>N\u1ed9i dung:</b> MB * AC = AB * NC<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b> S\u1eed d\u1ee5ng h\u1ec7 qu\u1ea3 \u0111\u1ecbnh l\u00ed Thal\u00e8s ho\u1eb7c t\u00ednh to\u00e1n tr\u1ef1c ti\u1ebfp \u0111\u1ed9 d\u00e0i c\u00e1c c\u1ea1nh.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nC\u00e1ch 1: Theo h\u1ec7 qu\u1ea3 \u0111\u1ecbnh l\u00ed Thal\u00e8s, &frac{MB}{AB} = &frac{NC}{AC}. Nh\u00e2n ch\u00e9o hai v\u1ebf, MB * AC = AB * NC.<br>\nC\u00e1ch 2: T\u00ednh s\u1ed1 \u0111o. Tr\u01b0\u1edbc ti\u00ean t\u00ecm x (t\u1eeb ph\u00e1t bi\u1ec3u 4: x = 2).<br>\nAB = AM + MB = 2 + 5 = 7, AC = AN + NC = 4 + 10 = 14.<br>\nThay s\u1ed1: MB * AC = 5 * 14 = 70, AB * NC = 7 * 10 = 70. Hai v\u1ebf b\u1eb1ng nhau.<br>\n<b>\u2705 K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 3 l\u00e0 ph\u00e1t bi\u1ec3u <b>\u0110\u00fang</b>.<br><br>\n\n<b>Ph\u00e1t bi\u1ec3u 4</b><br>\n<b>N\u1ed9i dung:</b> x = 2<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b> Thi\u1ebft l\u1eadp t\u1ec9 l\u1ec7 th\u1ee9c theo \u0111\u1ecbnh l\u00ed Thal\u00e8s \u0111\u1ec3 t\u00ecm \u1ea9n x.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nV\u00ec a // BC n\u00ean &frac{AM}{MB} = &frac{AN}{NC}.<br>\nThay s\u1ed1: &frac{x}{5} = &frac{4}{10}. Suy ra x = 20/10 = 2.<br>\n<b>\u2705 K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 4 l\u00e0 ph\u00e1t bi\u1ec3u <b>\u0110\u00fang</b>.\n", "key": " ", "isVideo": true, "score": 0, "order": 13, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.5, "plans": [{"lessonId": 0, "questionId": 21215874, "planId": 21215876, "content": "\u0110\u01b0\u1eddng th\u1eb3ng a \u0111\u1ecbnh ra tr\u00ean hai c\u1ea1nh AB v\u00e0 AC c\u00e1c \u0111o\u1ea1n th\u1eb3ng t\u01b0\u01a1ng \u1ee9ng t\u1ec9 l\u1ec7.", "key": "1", "planName": " ", "order": 0, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21215874, "planId": 21215875, "content": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/d4d34b68-476a-4489-a379-b66bc9bd446f.png\"/> ", "key": "0", "planName": " ", "order": 1, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21215874, "planId": 21215877, "content": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/fd7e542d-a704-4ff7-b13f-3033dfdbed38.png\"/> ", "key": "1", "planName": " ", "order": 2, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21215874, "planId": 21215878, "content": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/6c3d1646-2df8-425d-aa94-4e1806e8c98f.png\"/>", "key": "1", "planName": " ", "order": 3, "yourKey": "", "isTested": false}], "answerPlans": [], "normalizedType": "2"}, {"questionId": 21215885, "lessonId": 0, "a": "", "b": "", "c": "", "d": "", "bookId": 1057362, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 2, "questionText": "Cho tam gi\u00e1c ABC, \u0111\u01b0\u1eddng th\u1eb3ng d c\u1eaft AB, AC l\u1ea7n l\u01b0\u1ee3t t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/77f51b82-216f-4fbf-bbf5-9bcadcad5b43.png\"/><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/e5d80c0b-d625-4464-8923-9553be6552f1.png\"/> sao cho <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7d9a892c-c3c6-475d-9e3b-b2cc07124311.png\"/><br><img src=\"https://asset.moon.vn/img/chat/large/2025/9/fa0a53a3-a098-4eae-9dd9-08f970cd983e.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br>M\u1ed7i ph\u00e1t bi\u1ec3u sau \u0111\u00e2y l\u00e0 \u0111\u00fang hay sai?", "answer": "\n\n<b>Ph\u00e1t bi\u1ec3u 1</b><br>\n<b>N\u1ed9i dung:</b> d // BC<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b> S\u1eed d\u1ee5ng \u0110\u1ecbnh l\u00ed Thal\u00e8s \u0111\u1ea3o.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nTheo \u0110\u1ecbnh l\u00ed Thal\u00e8s \u0111\u1ea3o: N\u1ebfu m\u1ed9t \u0111\u01b0\u1eddng th\u1eb3ng c\u1eaft hai c\u1ea1nh c\u1ee7a tam gi\u00e1c v\u00e0 \u0111\u1ecbnh ra tr\u00ean hai c\u1ea1nh n\u00e0y nh\u1eefng \u0111o\u1ea1n th\u1eb3ng t\u01b0\u01a1ng \u1ee9ng t\u1ec9 l\u1ec7 th\u00ec \u0111\u01b0\u1eddng th\u1eb3ng \u0111\u00f3 song song v\u1edbi c\u1ea1nh c\u00f2n l\u1ea1i.<br>\nSuy ra B'C' // BC hay d // BC.<br>\n<b>\u2705 K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u <b>\u0110\u00fang</b>.<br><br>\n\n<b>Ph\u00e1t bi\u1ec3u 2</b><br>\n<b>N\u1ed9i dung:</b> B'B = C'C<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b> Ph\u00e2n t\u00edch t\u1ec9 l\u1ec7 th\u1ee9c.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nTheo Thal\u00e8s, c\u00e1c \u0111o\u1ea1n th\u1eb3ng t\u01b0\u01a1ng \u1ee9ng t\u1ec9 l\u1ec7 ch\u1ee9 kh\u00f4ng b\u1eb1ng nhau: &frac{BB'}{AB} = &frac{CC'}{AC}.<br>\n\u0110\u1eb3ng th\u1ee9c BB' = CC' ch\u1ec9 x\u1ea3y ra khi AB = AC (tam gi\u00e1c c\u00e2n). V\u1edbi tam gi\u00e1c th\u01b0\u1eddng, \u0111i\u1ec1u n\u00e0y kh\u00f4ng \u0111\u00fang.<br>\n<b>\u2705 K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 2 l\u00e0 ph\u00e1t bi\u1ec3u <b>Sai</b>.<br><br>\n\n<b>Ph\u00e1t bi\u1ec3u 3</b><br>\n<b>N\u1ed9i dung:</b> &frac{AB'}{B'B} = &frac{B'C'}{C'C}<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b> S\u1eed d\u1ee5ng \u0111\u1ecbnh l\u00ed Thal\u00e8s.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nV\u00ec d // BC, theo Thal\u00e8s: &frac{AB'}{B'B} = &frac{AC'}{C'C}.<br>\nPh\u00e1t bi\u1ec3u \u0111\u1ec1 b\u00e0i \u0111\u01b0a ra l\u00e0 &frac{B'C'}{C'C} thay cho AC', hai \u0111o\u1ea1n n\u00e0y th\u01b0\u1eddng kh\u00f4ng b\u1eb1ng nhau.<br>\n<b>\u2705 K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 3 l\u00e0 ph\u00e1t bi\u1ec3u <b>Sai</b>.<br><br>\n\n<b>Ph\u00e1t bi\u1ec3u 4</b><br>\n<b>N\u1ed9i dung:</b> BB' * AC = CC' * AB<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b> Bi\u1ebfn \u0111\u1ed5i t\u1ec9 l\u1ec7 th\u1ee9c t\u1eeb gi\u1ea3 thi\u1ebft.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nT\u1eeb gi\u1ea3 thi\u1ebft: &frac{AB'}{AB} = &frac{AC'}{AC}<br>\n1 - &frac{AB'}{AB} = 1 - &frac{AC'}{AC} => &frac{BB'}{AB} = &frac{CC'}{AC}<br>\nNh\u00e2n ch\u00e9o: BB' * AC = CC' * AB.<br>\n<b>\u2705 K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 4 l\u00e0 ph\u00e1t bi\u1ec3u <b>\u0110\u00fang</b>.\n", "key": " ", "isVideo": true, "score": 0, "order": 14, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.5, "plans": [{"lessonId": 0, "questionId": 21215885, "planId": 21215886, "content": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/06b1a55b-6283-4dc1-9463-09a7f1660e47.png\"/>", "key": "1", "planName": " ", "order": 0, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21215885, "planId": 21215889, "content": "<img style = \"vertical-align:middle\" src= \"https://asset.moon hi ti\u1ebft:</b><br>\nQuan s\u00e1t h\u00ecnh v\u1ebd, tr\u00ean c\u1ea1nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/2fd6d705-eb0f-4c71-92a8-0ced7961bc0d.png\"/>, \u0111o\u1ea1n <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/38048618-c043-4d9f-ada4-d3c7ac6d6d17.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/6836ad85-0e01-4b2e-9484-fabd3f3b2420.png\"/> c\u00f3 k\u00fd hi\u1ec7u gi\u1ed1ng nhau n\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/a4c5b9f9-220e-4387-a6b4-e818635a3dc9.png\"/> l\u00e0 trung \u0111i\u1ec3m c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7fa7da7e-5031-4892-977e-c6e5927c5404.png\"/>.<br>\nT\u01b0\u01a1ng t\u1ef1, tr\u00ean c\u1ea1nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/1231a6cd-943c-448e-80ae-4ec6d2540f1e.png\"/>, \u0111o\u1ea1n <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/b8138fe7-72b2-47b1-8a2b-ab92927b4444.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/ecc566bc-8e92-484d-b8bf-15f84e919663.png\"/> c\u00f3 k\u00fd hi\u1ec7u gi\u1ed1ng nhau n\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/70e9708f-2882-4f0a-b6f9-e29e41ac08d5.png\"/> l\u00e0 trung \u0111i\u1ec3m c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/35090e14-4b25-4728-81e5-7fa0033f9786.png\"/>.<br>\n\u0110o\u1ea1n th\u1eb3ng n\u1ed1i trung \u0111i\u1ec3m hai c\u1ea1nh c\u1ee7a tam gi\u00e1c g\u1ecdi l\u00e0 \u0111\u01b0\u1eddng trung b\u00ecnh.<br>\nDo \u0111\u00f3, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/c6571830-84fe-4e66-91e8-a57d46c6231d.png\"/> l\u00e0 \u0111\u01b0\u1eddng trung b\u00ecnh c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/5bbc770f-b7b7-4862-b4a6-5e3871af82d5.png\"/>.<br>\n<b>\u2705 K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u <b>\u0110\u00fang</b>.<br><br>\n\n<b>Ph\u00e1t bi\u1ec3u 2</b><br>\n<b>N\u1ed9i dung:</b> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/68634293-e2d5-4e50-befc-17d47faabd23.png\"/>.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b> S\u1eed d\u1ee5ng t\u00ednh ch\u1ea5t \u0111\u01b0\u1eddng trung b\u00ecnh c\u1ee7a tam gi\u00e1c.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nTheo h\u00ecnh v\u1ebd, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/aa9e864b-3f7a-4e6d-95d2-f8b731c44500.png\"/> l\u00e0 trung \u0111i\u1ec3m c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/cb7378aa-4b4d-41dc-a97c-d98830ae703d.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/3ca4d36f-d5f7-4e16-ae0a-4b2b72377376.png\"/> l\u00e0 trung \u0111i\u1ec3m c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/fc1f9a4d-dcde-4650-b842-5150e3461a89.png\"/> (do <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/64500d6a-7ca4-4aa5-bef9-a46021ddbf13.png\"/>).<br>\nSuy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/0fe9c2cc-df02-439d-aa0f-0cb309c55581.png\"/> l\u00e0 \u0111\u01b0\u1eddng trung b\u00ecnh c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/930a1b5d-faa1-4dea-98dc-3948d6dce44b.png\"/> (\u1ee9ng v\u1edbi c\u1ea1nh \u0111\u00e1y <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/531d504e-089b-458f-ae5b-e8c14299dee0.png\"/>).<br>\nTheo t\u00ednh ch\u1ea5t \u0111\u01b0\u1eddng             document.getElementById('mode-select').addEventListener('change', (e) => {
                if(isSubmitted) return;
                if(confirm('Đổi chế độ sẽ làm mới lại trạng thái hiển thị (không mất bài làm). Tiếp tục?')) {
                    examMode = e.target.value;
                    renderExam(false); // Re-render without resetting answers
                } else {
                    e.target.value = examMode;
                }
            });
        };

        // --- TIMER LOGIC ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- RENDER ENGINE ---
        function renderExam(reset = false) {
            const container = document.getElementById('exam-content');
            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; // Clear to re-render
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

            let globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                // Render Group Header
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`; // Unique Key for storage
                    const qType = q.normalizedType;
                    
                    // -- Palette Item --
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop
                    palMob.appendChild(palBtn); // Add to Mobile

                    // -- Question Card --
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    // Header: Question Number
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    // Interaction Area
                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // === TYPE 0: MCQ ===
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            // Logic hiển thị kết quả
                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { // Chọn đúng
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { // Đúng nhưng không chọn (hiện đáp án khi nộp)
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { // Chọn sai
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; // Hiện đáp án đúng sau khi nộp dù chưa làm
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // === TYPE 1 & 3: FILL KEY ===
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let inputClass = "w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all font-mono";
                        let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
