0 h\u00ecnh ch\u1eef nh\u1eadt.", "c": "M l\u00e0 trung \u0111i\u1ec3m c\u1ee7a BD.", "d": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/60f28138-d6b5-41ab-96a9-56961753e7ce.png\"/>", "bookId": 1057300, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Cho h\u00ecnh thang vu\u00f4ng ABCD c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ebdbd953-d471-4185-9539-a3232d983091.png\"/> G\u1ecdi M l\u00e0 trung \u0111i\u1ec3m c\u1ee7a AC v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7ef13176-311c-49b8-97d5-fad5f036828b.png\"/> Kh\u1eb3ng \u0111\u1ecbnh n\u00e0o sau \u0111\u00e2y<b> sai</b>?", "answer": "<img src=\"https://asset.moon.vn/img/chat/large/2025/10/e920ea71-f20c-438d-ba87-65aefbf8aac2.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br>\n\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nS\u1eed d\u1ee5ng t\u00ednh ch\u1ea5t c\u1ee7a \u0111\u01b0\u1eddng trung tuy\u1ebfn trong tam gi\u00e1c v\u00e0 d\u1ea5u hi\u1ec7u nh\u1eadn bi\u1ebft h\u00ecnh ch\u1eef nh\u1eadt. Trong tam gi\u00e1c, n\u1ebfu \u0111\u01b0\u1eddng trung tuy\u1ebfn \u1ee9ng v\u1edbi m\u1ed9t c\u1ea1nh b\u1eb1ng m\u1ed9t n\u1eeda c\u1ea1nh \u0111\u00f3 th\u00ec tam gi\u00e1c vu\u00f4ng t\u1ea1i \u0111\u1ec9nh \u0111\u1ed1i di\u1ec7n. T\u1eeb \u0111\u00f3 suy ra t\u00ednh ch\u1ea5t c\u1ee7a t\u1ee9 gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/56b6f0a2-7185-4527-8b45-38628105e1ab.png\"/>.<br><br>\n\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\n<b>Ph\u00e2n t\u00edch tam gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a835826c-cfb1-4048-baa9-2864185451c9.png\"/>:</b><br>\nX\u00e9t <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/3159cec6-cafa-4595-b111-81ebdb39cffa.png\"/>, ta c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/9939a323-27ab-44d5-adaa-3d1dab306ed5.png\"/> l\u00e0 trung \u0111i\u1ec3m c\u1ee7a c\u1ea1nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/5ae40c8a-2fb5-48b3-b29b-6742ec9bd167.png\"/>.<br>\n\u0110\u01b0\u1eddng th\u1eb3ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ab974f49-1b11-4463-8913-9f0f3e80b727.png\"/> l\u00e0 \u0111\u01b0\u1eddng trung tuy\u1ebfn \u1ee9ng v\u1edbi c\u1ea1nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/92addc8b-b1bc-4673-840b-95dd61014034.png\"/>.<br>\nTheo gi\u1ea3 thi\u1ebft, ta c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/65e745b8-7473-4e20-8d63-3469d3018c9d.png\"/>.<br>\nTrong m\u1ed9t tam gi\u00e1c, n\u1ebfu \u0111\u01b0\u1eddng trung tuy\u1ebfn \u1ee9ng v\u1edbi m\u1ed9t c\u1ea1nh b\u1eb1ng m\u1ed9t n\u1eeda c\u1ea1nh \u0111\u00f3, th\u00ec tam gi\u00e1c \u0111\u00f3 l\u00e0 tam gi\u00e1c vu\u00f4ng t\u1ea1i \u0111\u1ec9nh \u0111\u1ed1i di\u1ec7n.<br>\nSuy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/15625cfc-15a1-444a-b216-dd12219f937c.png\"/> vu\u00f4ng t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/70140283-f5c2-4a5d-8895-54ec24a2a662.png\"/>, hay <b><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/89c87170-05d2-4835-b429-cbc570b67fb9.png\"/>.</b><br><br>\n\n<b>Ph\u00e2n t\u00edch h\u00ecnh thang <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/3c73634b-de02-438c-a715-c3827aadd5ec.png\"/>:</b><br>\nBan \u0111\u1ea7u, ta c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/21969203-57b8-4d27-b11b-37bebcfd69b3.png\"/> l\u00e0 h\u00ecnh thang vu\u00f4ng v\u1 6f21e74d82d9.png\"/> c\u1eaft nhau t\u1ea1i E (<i>nh\u01b0 h\u00ecnh v\u1ebd</i>).<br><img src=\"https://asset.moon.vn/img/chat/large/2025/10/46b8936f-4ff5-4927-b934-11e51d718360.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br>M\u1ed7i ph\u00e1t bi\u1ec3u sau \u0111\u00e2y l\u00e0 \u0111\u00fang hay sai?", "answer": "<b>Ph\u00e1t bi\u1ec3u 1:</b> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/080efde7-ddc2-4a8a-bf40-f77d97e1028a.png\"/><br>\n\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b> S\u1eed d\u1ee5ng \u0111\u1ecbnh l\u00fd t\u1ed5ng 4 g\u00f3c c\u1ee7a m\u1ed9t t\u1ee9 gi\u00e1c. T\u1ed5ng 4 g\u00f3c trong c\u1ee7a m\u1ed9t t\u1ee9 gi\u00e1c lu\u00f4n b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/843df124-64e2-4f72-9009-ee1591308481.png\"/>.<br>\n\u270d\ufe0f <b>L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nX\u00e9t t\u1ee9 gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/871511a3-6631-4424-8b39-4c4447536adb.png\"/>, ta c\u00f3:<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0ab1565a-5271-4892-b00f-b621bc5cae76.png\"/><br>\n(Hay <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ce70ac25-c71e-4535-bcbc-6dffc79fee50.png\"/>)<br>\nThay s\u1ed1 \u0111o \u0111\u00e3 bi\u1ebft:<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/16e9e1fc-fda5-4027-a141-84e856fb5701.png\"/><br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/e5b683e1-27a0-4967-89d9-ed07935e01a5.png\"/><br>\nSuy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/47c58678-59f0-46da-9501-01536159183d.png\"/><br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/4133a5bd-41c6-4fa5-83fe-3c1550b18c0a.png\"/><br>\n\u2705 <b>K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u <b>\u0111\u00fang</b>.<br>\n\n<b>Ph\u00e1t bi\u1ec3u 2:</b> T\u1ed5ng s\u1ed1 \u0111o g\u00f3c ngo\u00e0i t\u1ea1i \u0111\u1ec9nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0f0f138f-a49d-4cf2-b387-748868c1edff.png\"/> v\u00e0 \u0111\u1ec9nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a4d07cf7-d8b3-4e03-9bf8-408b96766a4d.png\"/> l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0179de43-f99c-4883-b822-244c3ee730a4.png\"/>.<br>\n\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b> S\u1eed d\u1ee5ng t\u00ednh ch\u1ea5t c\u1ee7a g\u00f3c ngo\u00e0i v\u00e0 g\u00f3c trong k\u1ec1 b\u00f9 (t\u1ed5ng b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/e0d390ef-f75f-48f4-811a-dd900dd9ecb7.png\"/>).<br>\n\u270d\ufe0f <b>L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nG\u00f3c ngo\u00e0i t\u1ea1i \u0111\u1ec9nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/9757fc28-717a-40ce-8099-6991250d4f50.png\"/> = <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b85451d7-0e0b-4fe1-a100-cd7a619fcf1e.png\"/>.<br>\nG\u00f3c ngo\u00e0i t\u1ea1i \u0111\u1ec9nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a0257d40-c930-4a8f-97f0-3589147766f5.png\"/> = <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/167bfac2-e52e-4519-8d37-26a953c46537.png\"/>.<br>\nT\u1ed5ng hai g\u00f3c ngo\u00e0i n\u00e0y l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/71e0acec-b735-440d-a1b7-d2008f13aa3d.png\"/>.<br>\nPh\u00e1t bi\u1ec3u n\u00e0y n\u00f3i t\u1ed5ng l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/c6cfd024-294c-4e2a-af74-37f13aec7381.png\"/>.<br>\n\u2705 <b>K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 2 l\u00e0 ph\u00e1t bi\u1ec3u <b>sai</b>.<br>\n\n<b>Ph\u00e1t bi\u1ec3u 3:</b> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/c4863b95-5e1d-433b-a10f-c7cc08081f99.png\"/>.<br>\n\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b> S\u1eed d\u1ee5ng \u0111\u1ecbnh l\u00fd t\u1ed5ng 3 g\u00f3c c\u1ee7a m\u1ed9t tam gi\u00e1c. T\u1ed5ng 3 g\u00f3c trong c\u1ee7a m\u1ed9t tam gi\u00e1c lu\u00f4n b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b6f9bc0c-fcc4-40e6-b688-52d039ba42bb.png\"/>.<br>\n\u270d\ufe0f <b>L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nC\u00e1c g\u00f3c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0071c199-f2b5-43b7-b5bc-56190a040a93.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/905f3050-0f35-40bb-9a89-e5533a70398d.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b0be7bf1-ae7e-4bd8-a94e-40e69fcae21d.png\"/> l\u00e0 ba g\u00f3c trong c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0c23eeba-114e-43d1-9094-7a157fe6239b.png\"/>.<br>\nTheo \u0111\u1ecbnh l\u00fd, ta lu\u00f4n c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/599c6e42-7ff9-4da7-bfd2-2facbb140959.png\"/>.<br>\nPh\u00e1t bi\u1ec3u n\u00e0y n\u00f3i t\u1ed5ng l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/e2dfc6e1-448e-408e-89ce-ff23b800f2c6.png\"/>.<br>\n\u2705 <b>K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 3 l\u00e0 ph\u00e1t bi\u1ec3u <b>sai</b>.<br>\n\n<b>Ph\u00e1t bi\u1ec3u 4:</b> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/84b11dc2-874a-476b-a464-868f91e861e1.png\"/>.<br>\n\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b> S\u1eed swerPlans": [], "normalizedType": "2"}, {"questionId": 21214278, "lessonId": 0, "a": "", "b": "", "c": "", "d": "", "bookId": 1057302, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 2, "questionText": "Cho tam gi\u00e1c ABC c\u00e2n t\u1ea1i A c\u00f3 BH v\u00e0 CK l\u00e0 hai \u0111\u01b0\u1eddng cao c\u1ee7a tam gi\u00e1c.  <br>\tM\u1ed7i ph\u00e1t bi\u1ec3u sau \u0111\u00e2y l\u00e0 \u0111\u00fang hay sai?", "answer": "<img src=\"https://asset.moon.vn/img/chat/large/2025/10/1a5363f6-02e0-49d9-bece-6bc3ab06b0e9.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br><b>Ph\u00e1t bi\u1ec3u 1:</b> T\u1ee9 gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/22c1bb09-4fbf-4cf4-a444-2b38f836c39b.png\"/> l\u00e0 h\u00ecnh thang vu\u00f4ng.<br>\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b> \u0110\u1ec3 l\u00e0 h\u00ecnh thang vu\u00f4ng, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/58e3d0f1-c6e0-4acc-8970-c17db4f75ef9.png\"/> tr\u01b0\u1edbc h\u1ebft ph\u1ea3i l\u00e0 h\u00ecnh thang (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a9aff6c3-b983-4c5d-a611-b4924dc2debe.png\"/>) v\u00e0 c\u00f3 m\u1ed9t g\u00f3c \u1edf \u0111\u00e1y b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/17e98776-40a6-46a3-87b0-19796fa8bbb9.png\"/> (v\u00ed d\u1ee5: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/cfd654b1-34ac-4439-9bfa-28808faf3d6f.png\"/> ho\u1eb7c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/582fc852-0f58-4416-9e96-de7a7a343ec5.png\"/>).<br>\u270d\ufe0f <b>L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>1. Suy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/581e0a4c-6608-4e48-928a-0acc4578e43a.png\"/> l\u00e0 h\u00ecnh thang \u1edf Ph\u00e1t bi\u1ec3u 4 (do <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b52f7186-0691-49ac-bde7-6d5ea80e361d.png\"/>).<br>2. X\u00e9t <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b0db29ac-f7f6-4c46-9cbd-543ffa7372aa.png\"/> c\u00e2n t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/194ea223-9f0e-44d4-a002-bb6f1c389bd0.png\"/>, ta c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/9c55f754-8c90-4269-b5b8-a0d02f23981c.png\"/> (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b837dfb1-fd51-4771-9ac0-43dfa11c4feb.png\"/>).<br>3. N\u1ebfu h\u00ecnh thang <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/5c6c10bd-8731-43cc-b795-4b1d63691894.png\"/> l\u00e0 h\u00ecnh thang vu\u00f4ng th\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0fdb2b47-f89a-456c-a67c-5f2ea8b08695.png\"/>.<br>4. Suy ra t\u1ed5ng ba g\u00f3c trong <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/5eabb2bd-c1a7-4204-9fbe-83daf2cb70f3.png\"/> l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/749fa91e-1f39-4bf2-b5de-c455cda2c8ab.png\"/>, m\u00e2u thu\u1eabn v\u1edbi \u0111\u1ecbnh l\u00fd t\u1ed5ng ba g\u00f3c trong tam gi\u00e1c (b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/1eebe3cd-1ff8-4d32-a0bc-5086ad9d7bc1.png\"/>).<br>5. N\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0b7e82d0-d9df-42f0-92e2-f515e379079e.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0c64789f-9501-4e0b-9cd1-3fc4a3728785.png\"/> kh\u00f4ng th\u1ec3 b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/3e0904e7-7f3a mg style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/fbd1d63a-f89d-4d17-abc3-bcf3fa6cff20.png\"/>.<br>T\u1eeb c\u00e2u (a), <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6a9f738a-1c83-42f4-9cc5-a19c62143ade.png\"/>.<br>Do \u0111\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/36a0a74a-2007-4f00-b2d5-f7ec1e6c5cf5.png\"/>.<br>V\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/c3f7540f-bccc-4b4d-a412-52bd63b46f85.png\"/> l\u00e0 tam gi\u00e1c \u0111\u1ec1u, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/31cbcc2f-0053-433e-8ec8-93ad9c72a9cf.png\"/>.<br>Do \u0111\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/45b588a1-e398-46aa-abfd-3eec7d189b3c.png\"/>.<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/965b77e8-4eb0-4622-a59d-f296c7df2423.png\"/> l\u00e0 tam gi\u00e1c c\u00e2n c\u00f3 g\u00f3c t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d669a49f-0796-4424-81d4-d69cd46e134c.png\"/> b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/3d9f27c0-0e04-43df-831b-f15ffa1d0bf2.png\"/>.<br>Do \u0111\u00f3, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/33566d0a-7a20-4266-9ffb-3141f757a21c.png\"/> l\u00e0 tam gi\u00e1c \u0111\u1ec1u. (\u0110pcm)<br>", "key": " ", "isVideo": true, "score": 0, "order": 20, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.5, "plans": [], "answerPlans": [], "normalizedType": "1"}]}];
        let userAnswers = {}; // Store: { qId: value }
        let isSubmitted = false;
        let examMode = 'practice'; // 'practice' or 'exam'
        let startTime = Date.now();
        let timerInterval;

        // --- INIT ---
        window.onload = function() {
            renderExam();
            startTimer();
            document.getElementById('mode-select').addEventListener('change', (e) => {
                if(isSubmitted) return;
                if(confirm('Đổi chế độ sẽ làm mới lại trạng thái hiển thị (không mất bài làm). Tiếp tục?')) {
                    examMode = e.target.value;
                    renderExam(false); // Re-render without resetting answers
                } else {
                    e.target.value = examMode;
                }
            });
        };

        // --- TIMER LOGIC ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- RENDER ENGINE ---
        function renderExam(reset = false) {
            const container = document.getElementById('exam-content');
            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; // Clear to re-render
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

            let globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                // Render Group Header
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`; // Unique Key for storage
                    const qType = q.normalizedType;
                    
                    // -- Palette Item --
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop
                    palMob.appendChild(palBtn); // Add to Mobile

                    // -- Question Card --
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    // Header: Question Number
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    // Interaction Area
                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // === TYPE 0: MCQ ===
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            // Logic hiển thị kết quả
                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { // Chọn đúng
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { // Đúng nhưng không chọn (hiện đáp án khi nộp)
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { // Chọn sai
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; // Hiện đáp án đúng sau khi nộp dù chưa làm
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // === TYPE 1 & 3: FILL KEY ===
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let inputClass = "w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all font-mono";
                        let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
