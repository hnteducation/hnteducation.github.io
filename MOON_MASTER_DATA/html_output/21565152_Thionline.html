    <script>
        const EXAM_DATA = [{"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 103 \u0111\u1ebfn 105", "content": "Tr\u01b0\u1edbc \u0111\u00e2y, kem, b\u00e1nh quy v\u00e0 c\u00e1c lo\u1ea1i \u0111\u1ed3 ng\u1ecdt kh\u00e1c \u0111\u01b0\u1ee3c coi l\u00e0 th\u1ef1c ph\u1ea9m c\u1ea5m k\u1ecb v\u1edbi nh\u1eefng ng\u01b0\u1eddi m\u1eafc b\u1ec7nh ti\u1ec3u \u0111\u01b0\u1eddng. Tuy nhi\u00ean, khoa h\u1ecdc th\u1ef1c ph\u1ea9m ng\u00e0y c\u00e0ng ti\u1ebfn b\u1ed9, \u0111\u1ed3 ng\u1ecdt \u0111\u01b0\u1ee3c ch\u1ea5p nh\u1eadn l\u00e0 m\u1ed9t ph\u1ea7n trong kh\u1ea9u ph\u1ea7n \u0103n c\u1ee7a ng\u01b0\u1eddi ti\u1ec3u \u0111\u01b0\u1eddng. C\u00e1c ch\u1ea5t t\u1ea1o ng\u1ecdt g\u00f3p ph\u1ea7n m\u1edf r\u1ed9ng s\u1ef1 l\u1ef1a ch\u1ecdn th\u1ef1c ph\u1ea9m cho ng\u01b0\u1eddi ti\u1ec3u \u0111\u01b0\u1eddng \u0111\u01b0\u1ee3c g\u1ecdi l\u00e0 \u0111\u01b0\u1eddng r\u01b0\u1ee3u, trong \u0111\u00f3 c\u00f3 sorbitol, c\u00f4ng th\u1ee9c c\u1ea5u t\u1ea1o \u0111\u01b0\u1ee3c bi\u1ec3u di\u1ec5n nh\u01b0 sau:<br><img src=\"https://asset.moon.vn/img/chat/large/2025/11/b1fbb493-217d-4883-90d6-8cdeb43a4d20.jpg\" data-filename=\"\" style=\"width: 50%; max-width: 600px;\"><br>\u0110\u01b0\u1eddng r\u01b0\u1ee3u kh\u00f4ng h\u1ea5p th\u1ee5 ho\u00e0n to\u00e0n trong qu\u00e1 tr\u00ecnh ti\u00eau ho\u00e1, do \u0111\u00f3 cung c\u1ea5p \u00edt n\u0103ng l\u01b0\u1ee3ng h\u01a1n c\u00e1c carbohydrate kh\u00e1c. \u0110\u01b0\u1eddng r\u01b0\u1ee3u c\u00f3 trong tr\u00e1i c\u00e2y, \u0111\u01b0\u1ee3c s\u1ea3n xu\u1ea5t th\u01b0\u01a1ng m\u1ea1i \u0111\u1ec3 s\u1eed d\u1ee5ng trong k\u1eb9o, b\u00e1nh, k\u1eb9o cao su kh\u00f4ng \u0111\u01b0\u1eddng,\u2026 Sorbitol \u0111\u01b0\u1ee3c d\u00f9ng trong y h\u1ecdc \u0111\u1ec3 l\u00e0m thu\u1ed1c nhu\u1eadn tr\u00e0ng v\u1edbi m\u1ee5c \u0111\u00edch \u0111i\u1ec1u tr\u1ecb tri\u1ec7u ch\u1ee9ng t\u00e1o b\u00f3n v\u00e0 x\u1ebfp v\u00e0o nh\u00f3m thu\u1ed1c nhu\u1eadn tr\u00e0ng th\u1ea9m th\u1ea5u. Ngo\u00e0i ra, \u0111\u00e2y c\u00f2n l\u00e0 h\u1ee3p ch\u1ea5t d\u00f9ng \u0111\u1ec3 gi\u1eef \u0111\u1ed9 \u1ea9m, t\u1ea1o k\u1ebft c\u1ea5u v\u00e0 t\u0103ng v\u1ecb ng\u1ecdt cho s\u1ea3n ph\u1ea9m \u0111\u1ed3ng th\u1eddi h\u1ed7 tr\u1ee3 s\u1ee9c kh\u1ecfe r\u0103ng mi\u1ec7ng v\u00e0 h\u1ec7 ti\u00eau h\u00f3a.<br>Qu\u00e1 tr\u00ecnh \u0111i\u1ec1u ch\u1ebf sorbitol nh\u01b0 sau:<br><img src=\"https://asset.moon.vn/img/chat/large/2025/11/1ca306aa-e52b-42e3-a94d-6cb49f9e714e.jpg\" data-filename=\"\" style=\"width: 50%; max-width: 600px;\">", "listQuestion": [{"questionId": 21586464, "lessonId": 0, "a": "Fructose.", "b": "Maltose.", "c": "Glucose.", "d": "Saccharose.", "bookId": 1086358, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Carbohydrate n\u00e0o \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng \u0111\u1ec3 \u0111i\u1ec1u ch\u1ebf sorbitol?", "answer": "\u2022  <b>D\u1eef ki\u1ec7n t\u1eeb s\u01a1 \u0111\u1ed3 ph\u1ea3n \u1ee9ng:</b> H\u00ecnh \u1ea3nh minh h\u1ecda qu\u00e1 tr\u00ecnh \u0111i\u1ec1u ch\u1ebf sorbitol (ch\u1ea5t 2) t\u1eeb m\u1ed9t carbohydrate (ch\u1ea5t 1) b\u1eb1ng c\u00e1ch cho t\u00e1c d\u1ee5ng v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/c1a3465f-5cf7-4d7b-a5a2-de342bcc06c6.png\"/>.<br><br>\n\u2022  <b>Ph\u00e2n t\u00edch c\u1ea5u t\u1ea1o:</b> Ch\u1ea5t (1) c\u00f3 c\u00f4ng th\u1ee9c c\u1ea5u t\u1ea1o l\u00e0 m\u1ed9t polyhydroxy aldehyde v\u1edbi 6 nguy\u00ean t\u1eed carbon. \u0110\u00e2y ch\u00ednh l\u00e0 c\u1ea5u t\u1ea1o c\u1ee7a Glucose.<br><br>=> Khi d\u1eabn kh\u00ed <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/b428c2cd-d175-49ee-b0a4-ce68613d266c.png\"/> v\u00e0o dung d\u1ecbch glucose (x\u00fac t\u00e1c Ni, \u0111un n\u00f3ng), nh\u00f3m ch\u1ee9c aldehyde (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/ec01bd4c-565b-403b-b8d5-c6ceca15cd06.png\"/>) s\u1ebd b\u1ecb kh\u1eed th\u00e0nh nh\u00f3m alcohol b\u1eadc m\u1ed9t (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/122db443-c251-49d1-99bd-5f2b935f7447.png\"/>), t\u1ea1o ra Sorbitol.<br><br><b><font color=\"#d50000\">\n=> \u0110\u00e1p \u00e1n \u0111\u00fang: C. Glucose.\n</font></b>", "key": "C", "isVideo": true, "score": 0, "order": 103, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21586467, "lessonId": 0, "a": "(a), (c).", "b": "(b), (c).", "c": "(a), (b).", "d": "(b), (d).", "bookId": 1086359, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Cho c\u00e1c ph\u00e1t bi\u1ec3u sau:<br>(a) Sorbitol l\u00e0 alcohol \u0111a ch\u1ee9c.<br>(b) Ph\u1ea3n \u1ee9ng \u0111i\u1ec1u ch\u1ebf sorbitol l\u00e0 ph\u1ea3n \u1ee9ng oxi ho\u00e1 kh\u1eed.<br>(c) C\u1ea3 ch\u1ea5t 1 v\u00e0 2 \u0111\u1ec1u ph\u1ea3n \u1ee9ng v\u1edbi Cu(OH)<sub>2</sub>/OH<sup>\u2013</sup> \u0111un n\u00f3ng, thu \u0111\u01b0\u1ee3c k\u1ebft t\u1ee7a m\u00e0u \u0111\u1ecf g\u1ea1ch.<br>(d) 1 mol sorbitol ph\u1ea3n \u1ee9ng v\u1edbi t\u1ed1i \u0111a 5 mol NaOH.<br>C\u00e1c ph\u00e1t bi\u1ec3u \u0111\u00fang l\u00e0", "answer": "<b>Ph\u00e2n t\u00edch c\u00e1c ph\u00e1t bi\u1ec3u:</b><br><b>\u2714\ufe0f(a) Sorbitol l\u00e0 alcohol \u0111a ch\u1ee9c \u2192 \u0110\u00daNG.</b><br>\no\tD\u1ef1a v\u00e0o c\u00f4ng th\u1ee9c c\u1ea5u t\u1ea1o c\u1ee7a sorbitol (ch\u1ea5t 2), ta th\u1ea5y ph\u00e2n t\u1eed n\u00e0y c\u00f3 ch\u1ee9a 6 nh\u00f3m ch\u1ee9c hydroxyl (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/b3c7c714-a553-4f63-81d1-10d904bd945b.png\"/>) li\u00ean k\u1ebft v\u1edbi 6 nguy\u00ean t\u1eed carbon. H\u1ee3p ch\u1ea5t c\u00f3 t\u1eeb hai nh\u00f3m <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/71771346-beb4-4de3-bf0b-753cb5a6fb22.png\"/> tr\u1edf l\u00ean g\u1eafn v\u00e0o c\u00e1c nguy\u00ean t\u1eed carbon kh\u00e1c nhau \u0111\u01b0\u1ee3c g\u1ecdi l\u00e0 alcohol \u0111a ch\u1ee9c.<br><br><b>\u2714\ufe0f(b) Ph\u1ea3n \u1ee9ng \u0111i\u1ec1u ch\u1ebf sorbitol l\u00e0 ph\u1ea3n \u1ee9ng oxi h\u00f3a \u2013 kh\u1eed \u2192 \u0110\u00daNG.</b><br>\no\tTrong qu\u00e1 tr\u00ecnh \u0111i\u1ec1u ch\u1ebf, glucose (ch\u1ea5t 1) ph\u1ea3n \u1ee9ng v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/42752fd4-840a-4a06-a112-522de2532511.png\"/>.<br>\no\t\u1ede \u0111\u00e2y, nguy\u00ean t\u1eed hydrogen c\u00f3 s\u1ed1 oxi h\u00f3a t\u0103ng t\u1eeb <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/99a00e01-6f6e-4665-8254-6367eaf0f587.png\"/> l\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/3935294b-1e3f-48bc-9922-a37cc754f5c5.png\"/> (trong sorbitol), \u0111\u00f3ng vai tr\u00f2 l\u00e0 ch\u1ea5t kh\u1eed. Nh\u00f3m ch\u1ee9c aldehyde (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/5a207bc1-31df-4340-8e80-22a3fe5c7e0b.png\"/>) trong glucose nh\u1eadn hydrogen \u0111\u1ec3 chuy\u1ec3n th\u00e0nh nh\u00f3m alcohol b\u1eadc m\u1ed9t (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/1e8cf845-73cd-4095-86c2-9b2baf7c9348.png\"/>), t\u1ee9c l\u00e0 glucose \u0111\u00f3ng vai tr\u00f2 l\u00e0 ch\u1ea5t oxi h\u00f3a. V\u00ec c\u00f3 s\u1ef1 thay \u0111\u1ed5i s\u1ed1 oxi h\u00f3a, \u0111\u00e2y l\u00e0 ph\u1ea3n \u1ee9ng oxi h\u00f3a \u2013 kh\u1eed.<br><br><b>\u274c(c) C\u1ea3 ch\u1ea5t 1 v\u00e0 2 \u0111\u1ec1u ph\u1ea3n \u1ee9ng v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/1f45da3a-cf3f-4265-ac0f-da2306c71deb.png\"/> \u0111un n\u00f3ng, thu \u0111\u01b0\u1ee3c k\u1ebft t\u1ee7a m\u00e0u \u0111\u1ecf g\u1ea1ch \u2192 SAI.</b><br>\no\tCh\u1ea5t 1 (Glucose): Do c\u00f3 nh\u00f3m ch\u1ee9c aldehyde (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/08542790-571d-44b6-8c1b-3a019fafafd6.png\"/>), khi \u0111un n\u00f3ng v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/59148475-e7e2-494b-a77c-d9149fcc6dc0.png\"/> trong m\u00f4i tr\u01b0\u1eddng ki\u1ec1m s\u1ebd t\u1ea1o ra k\u1ebft t\u1ee7a \u0111\u1ecf g\u1ea1ch (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/42f10a24-3d5a-4243-8497-84df4b11e2ef.png\"/>).<br>\no\tCh\u1ea5t 2 (Sorbitol): M\u1eb7c d\u00f9 l\u00e0 alcohol \u0111a ch\u1ee9c c\u00f3 c\u00e1c nh\u00f3m <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/29861697-e777-4399-84d6-0e3527668c5d.png\"/> li\u1ec1n k\u1ec1 n\u00ean c\u00f3 th\u1ec3 h\u00f2a tan <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/b94b9c53-e329-4f7d-aa92-d6152cab2089.png\"/> \u1edf nhi\u1ec7t \u0111\u1ed9 th\u01b0\u1eddng t\u1ea1o dung d\u1ecbch m\u00e0u xanh lam, nh\u01b0ng n\u00f3 kh\u00f4ng c\u00f3 nh\u00f3m aldehyde n\u00ean kh\u00f4ng t\u1ea1o \u0111\u01b0\u1ee3c k\u1ebft t\u1ee7a \u0111\u1ecf g\u1ea1ch khi \u0111un n\u00f3ng.<br><br><b>\u274c(d) 1 mol sorbitol ph\u1ea3n \u1ee9ng v\u1edbi t\u1ed1i \u0111a 5 mol <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/104d6564-4176-44d6-85ce-97970096fbd2.png\"/> \u2192 SAI.</b><br>\no\tNh\u00f3m ch\u1ee9c alcohol (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/80a7d848-475a-48c5-8d37-d03aeea24e06.png\"/>) kh\u00f4ng ph\u1ea3n \u1ee9ng v\u1edbi dung d\u1ecbch ki\u1ec1m nh\u01b0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/67db6c17-e65d-45bf-8219-103e084c6c54.png\"/>. Do \u0111\u00f3, sorbitol kh\u00f4ng ph\u1ea3n \u1ee9ng v\u1e ge/2025/11/466f04b8-7d3f-4267-944d-17a03a39445a.jpg\" data-filename=\"\" style=\"width: 50%; max-width: 600px;\"><br><b>H\u00ecnh 1. V\u00f2ng \u0111\u1eddi c\u1ee7a s\u00e2u b\u1ed9t</b><br>\u1ede th\u00ed nghi\u1ec7m th\u1ee9 nh\u1ea5t, nh\u00f3m sinh vi\u00ean nu\u00f4i c\u00e1c con s\u00e2u b\u1ed9t trong c\u00f9ng \u0111i\u1ec1u ki\u1ec7n v\u00e0 \u0111o kho\u1ea3ng th\u1eddi gian d\u00e0i nh\u1ea5t v\u00e0 ng\u1eafn nh\u1eaft c\u1ee7a t\u1eebng giai \u0111o\u1ea1n. K\u1ebft qu\u1ea3 \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n trong h\u00ecnh 2.<br> <img src=\"https://asset.moon.vn/img/chat/large/2025/11/7216bd43-e332-4c5b-9da7-acd396718ea7.jpg\" data-filename=\"\" style=\"width: 50%; max-width: 600px;\"><br>Trong th\u00ed nghi\u1ec7m hai, c\u00e1c sinh vi\u00ean chia s\u00e2u b\u1ed9t ra l\u00e0m 4 nh\u00f3m, m\u1ed7i nh\u00f3m ch\u1ec9 cho \u0103n m\u1ed9t lo\u1ea1i th\u1ee9c \u0103n v\u00e0 sau \u0111\u00f3 \u0111o c\u00e1c ch\u1ec9 s\u1ed1 g\u1ed3m: chi\u1ec1u d\u00e0i \u1ea5u tr\u00f9ng ban \u0111\u1ea7u, th\u1eddi gian \u1edf giai \u0111o\u1ea1n \u1ea5u tr\u00f9ng v\u00e0 nh\u1ed9ng, chi\u1ec1u d\u00e0i tr\u01b0\u1edfng th\u00e0nh. K\u1ebft qu\u1ea3 \u0111\u01b0\u1ee3c ghi l\u1ea1i trong b\u1ea3ng 1 <br><b>B\u1ea3ng 1. K\u1ebft qu\u1ea3 th\u00ed nghi\u1ec7m 2</b><br><img src=\"https://asset.moon.vn/img/chat/large/2025/11/d0a5b088-fa0d-461a-857b-57ea91a3f570.jpg\" data-filename=\"\" style=\"width: 100%; max-width: 600px;\">", "listQuestion": [{"questionId": 21565171, "lessonId": 0, "a": "T\u00e1o.", "b": "C\u00e0 r\u1ed1t.", "c": "Y\u1ebfn m\u1ea1ch.", "d": "L\u00faa m\u00ec.", "bookId": 1084621, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Nh\u00f3m s\u00e2u b\u1ed9t \u0103n lo\u1ea1i th\u1ee9c \u0103n n\u00e0o th\u00ec con tr\u01b0\u1edfng th\u00e0nh s\u1ebd c\u00f3 k\u00edch th\u01b0\u1edbc l\u1edbn nh\u1ea5t?", "answer": "Nh\u00f3m s\u00e2u b\u1ed9t \u0103n l\u00faa m\u00ec c\u00f3 chi\u1ec1u d\u00e0i trung b\u00ecnh i gian trung b\u00ecnh c\u1ee7a giai \u0111o\u1ea1n \u1ea5u tr\u00f9ng l\u00e0 bao nhi\u00eau ng\u00e0y?", "answer": "\u1ede th\u00ed nghi\u1ec7m 2, nh\u00f3m s\u00e2u b\u1ed9t \u0111\u01b0\u1ee3c nu\u00f4i b\u1eb1ng l\u00faa m\u00ec c\u00f3 th\u1eddi gian trung b\u00ecnh c\u1ee7a giai \u0111o\u1ea1n \u1ea5u tr\u00f9ng l\u00e0 57,2 ng\u00e0y", "key": "D", "isVideo": true, "score": 0, "order": 111, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u h\u1ecfi t\u1eeb 112 \u0111\u1ebfn 114", "content": "D\u1ef1 ki\u1ebfn, sau s\u00e1p nh\u1eadp TPHCM m\u1edbi c\u00f3 di\u1ec7n t\u00edch h\u01a1n 6.772 km<sup>2</sup> (\u0111\u1ea1t h\u01a1n 135% so v\u1edbi ti\u00eau chu\u1ea9n); d\u00e2n s\u1ed1 h\u01a1n 13,7 tri\u1ec7u ng\u01b0\u1eddi (\u0111\u1ea1t 979 % so v\u1edbi ti\u00eau chu\u1ea9n), h\u00ecnh th\u00e0nh si\u00eau \u0111\u00f4 th\u1ecb l\u1edbn nh\u1ea5t c\u1ee7a c\u1ea3 n\u01b0\u1edbc. \u0110\u1ed3ng th\u1eddi, TPHCM sau s\u00e1p nh\u1eadp s\u1ebd th\u1ef1c hi\u1ec7n m\u1ed9t s\u1ed1 nhi\u1ec7m v\u1ee5 tr\u1ecdng t\u00e2m theo m\u1ee5c ti\u00eau ph\u00e1t tri\u1ec3n nhanh, b\u1ec1n v\u1eefng, t\u1ea1o b\u01b0\u1edbc \u0111\u1ed9t ph\u00e1, lan t\u1ecfa trong ph\u00e1t tri\u1ec3n kinh t\u1ebf v\u00f9ng, li\u00ean v\u00f9ng \u0111\u01b0\u1ee3c B\u1ed9 Ch\u00ednh tr\u1ecb giao t\u1ea1i Ngh\u1ecb quy\u1ebft s\u1ed1 24 v\u1ec1 ph\u00e1t tri\u1ec3n kinh t\u1ebf - x\u00e3 h\u1ed9i v\u00e0 b\u1ea3o \u0111\u1ea3m qu\u1ed1c ph\u00f2ng, an ninh v\u00f9ng \u0110\u00f4ng Nam B\u1ed9 \u0111\u1ebfn n\u0103m 2030, t\u1ea7m nh\u00ecn \u0111\u1ebfn n\u0103m 2045.<br><div style=\"text-align: right;\"><i>(Ngu\u1ed3n: dantri.com.vn)</i></div>", "listQuestion": [{"questionId": 21587471, "lessonId": 0, "a": "L\u00e0 \u0111\u00f4 th\u1ecb \u0111\u00f4ng d\u00e2n v\u00e0 r\u1ed9ng nh\u1ea5t Vi\u1ec7t Nam.", "b": "L\u00e0 trung t\u00e2m h\u00e0nh ch\u00ednh m\u1edbi c\u1ee7a v\u00f9ng B\u1eafc Trung B\u1ed9.", "c": "C\u00f3 quy m\u00f4 d\u00e2n s\u1ed1 t\u01b0\u01a1ng \u0111\u01b0\u01a1ng H\u00e0 N\u1ed9i.", "d": "Ph\u00e1t tri\u1ec3n d\u1ef1a ho\u00e0n to\u00e0n v\u00e0o khu v\u1ef1c n\u00f4ng nghi\u1ec7p.", "bookId": 1086499, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "T\u1eeb d\u1eef li\u1ec7u tr\u00ean c\u00f3 th\u1ec3 th\u1ea5y, TPHCM sau s\u00e1p nh\u1eadp s\u1ebd c\u00f3 \u0111\u1eb7c \u0111i\u1ec3m n\u1ed5i b\u1eadt n\u00e0o?", "answer": "", "key": "A", "isVideo": false, "score": 0, "order": 112, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21587478, "lessonId": 0, "a": "2.041 ng\u01b0\u1eddi/km\u00b2.", "b": "4.900 ng\u01b0\u1eddi/km\u00b2.", "c": "10.000 ng\u01b0\u1eddi/km\u00b2.", "d": "20.400 ng\u01b0\u1eddi/km\u00b2.", "bookId": 1086500, "comments": 3, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<div style=\"text-align: justify;\">N\u1ebfu coi di\u1ec7n t\u00edch trung b\u00ecnh \u0111\u1ea7u ng\u01b0\u1eddi c\u1ee7a TPHCM sau s\u00e1p nh\u1eadp l\u00e0 0,00049 km\u00b2/ng\u01b0\u1eddi, th\u00ec m\u1eadt \u0111\u1ed9 d\u00e2n s\u1ed1 c\u1ee7a si\u00eau \u0111\u00f4 th\u1ecb n\u00e0y x\u1ea5p x\u1ec9</div>", "answer": "\u2192 1 \u00f7 0,00049 \u2248 2 041\u2009(ng\u01b0\u1eddi/km<sup>2</sup>)", "key": "A", "isVideo": false, "score": 0, "order": 113, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21587486, "lessonId": 0, "a": "Qu\u1ef9 \u0111\u1ea5t n\u00f4ng nghi\u1ec7p d\u01b0 th\u1eeba kh\u00f4ng s\u1eed d\u1ee5ng h\u1ebft.", "b": "Gia t\u0103ng \u00e1p l\u1ef1c h\u1ea1 t\u1ea7ng \u2013 m\u00f4i tr\u01b0\u1eddng \u0111\u00f4 th\u1ecb v\u00e0 ph\u00e2n h\u00f3a gi\u00e0u ngh\u00e8o.", "c": "Thi\u1ebfu lao \u0111\u1ed9ng tr\u00ecnh \u0111\u1ed9 cao do d\u00e2n s\u1ed1 gi\u1ea3m.", "d": "M\u1ea5t v\u1ecb th\u1ebf trung t\u00e2m v\u00f9ng kinh t\u1ebf tr\u1ecdng \u0111i\u1ec3m ph\u00eda Nam.", "bookId": 1086501, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Sau khi s\u00e1p nh\u1eadp, TPHCM tr\u1edf th\u00e0nh si\u00eau \u0111\u00f4 th\u1ecb c\u00f3 quy m\u00f4 d\u00e2n s\u1ed1 v\u00e0 di\u1ec7n t\u00edch l\u1edbn nh\u1ea5t c\u1ea3 n\u01b0\u1edbc. Th\u00e1ch th\u1ee9c l\u1edbn nh\u1ea5t m\u00e0 th\u00e0nh ph\u1ed1 c\u00f3 th\u1ec3 ph\u1ea3i \u0111\u1ed1i m\u1eb7t trong qu\u00e1 tr\u00ecnh ph\u00e1t tri\u1ec3n nhanh, b\u1ec1n v\u1eefng l\u00e0 g\u00ec?", "answer": "", "key": "B", "isVideo": false, "score": 0, "order": 114, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 115 \u0111\u1ebfn 117:", "content": "\u1ede Vi\u1ec7t Nam, th\u1eddi k\u00ec qu\u00e1 \u0111\u1ed9 l\u00ean ch\u1ee7 ngh\u0129a x\u00e3 h\u1ed9i \u0111\u01b0\u1ee3c nh\u1eadn th\u1ee9c m\u1edbi b\u1eaft \u0111\u1ea7u t\u1eeb H\u1ed9i ngh\u1ecb Trung \u01b0\u01a1ng 6 (9 - 1979) nhi\u1ec7m k\u00ec \u0110\u1ea1i h\u1ed9i IV c\u1ee7a \u0110\u1ea3ng (12- 1976) v\u00e0 ti\u1ebfp t\u1ee5c t\u1ea1i \u0110\u1ea1i h\u1ed9i V (3-1982). \u0110\u1ebfn \u0110\u1ea1i h\u1ed9i VI (12 - 1986), nh\u1eadn th\u1ee9c m\u1edbi v\u1ec1 th\u1eddi k\u00ec qu\u00e1 \u0111\u1ed9 l\u00ean ch\u1ee7 ngh\u0129a x\u00e3 h\u1ed9i \u0111\u01b0\u1ee3c nh\u1eadn th\u1ee9c s\u00e2u s\u1eafc v\u00e0 to\u00e0n di\u1ec7n h\u01a1n m\u1ed9t b\u01b0\u1edbc, \u0111\u01b0\u1eddng l\u1ed1i \u0111\u1ed5i m\u1edbi \u0111\u1ea5t n\u01b0\u1edbc th\u1ef1c s\u1ef1 \u0111i v\u00e0o cu\u1ed9c s\u1ed1ng. <br>T\u1ea1i c\u00e1c \u0111\u1ea1i h\u1ed9i ti\u1ebfp theo (\u0110\u1ea1i h\u1ed9i VII - 1991, \u0110\u1ea1i h\u1ed9i VIII - 1996, \u0110\u1ea1i h\u1ed9i IX - 2001, \u0110\u1ea1i h\u1ed9i X - 2006, \u0110\u1ea1i h\u1ed9i XI - 2011, \u0110\u1ea1i h\u1ed9i XII - 2016, \u0110\u1ea1i h\u1ed9i XIII - 2021), nh\u1eadn th\u1ee9c v\u1ec1 con \u0111\u01b0\u1eddng \u0111i l\u00ean ch\u1ee7 ngh\u0129a x\u00e3 h\u1ed9i Vi\u1ec7t Nam ti\u1ebfp t\u1ee5c \u0111\u01b0\u1ee3c c\u1ee7ng c\u1ed1; \u0111\u01b0\u1eddng l\u1ed1i \u0111\u1ed5i m\u1edbi \u0111\u1ea5t n\u01b0\u1edbc \u0111i l\u00ean ch\u1ee7 ngh\u0129a x\u00e3 h\u1ed9i c\u1ee7a \u0110\u1ea3ng kh\u00f4ng ng\u1eebng \u0111\u01b0\u1ee3c \u0111i\u1ec1u ch\u1ec9nh, b\u1ed5 sung.<br>\u0110\u1ea3ng C\u1ed9ng s\u1ea3n Vi\u1ec7t Nam \u0111\u00e3 nh\u1ea5n m\u1ea1nh: \u0110\u1ed5i m\u1edbi \u0111\u1ea5t n\u01b0\u1edbc \u0111i l\u00ean ch\u1ee7 ngh\u0129a x\u00e3 h\u1ed9i \u201c<i>kh\u00f4ng ph\u1ea3i l\u00e0 thay \u0111\u1ed5i m\u1ee5c ti\u00eau ch\u1ee7 ngh\u0129a x\u00e3 h\u1ed9i m\u00e0 l\u00e0m cho m\u1ee5c ti\u00eau \u1ea5y \u0111\u01b0\u1ee3c th\u1ef1c hi\u1ec7n c\u00f3 hi\u1ec7u qu\u1ea3 b\u1eb1ng nh\u1eefng quan \u0111i\u1ec3m \u0111\u00fang \u0111\u1eafn v\u1ec1 ch\u1ee7 ngh\u0129a x\u00e3 h\u1ed9i, nh\u1eefng h\u00ecnh th\u1ee9c, b\u01b0\u1edbc \u0111i v\u00e0 bi\u1ec7n ph\u00e1p th\u00edch h\u1ee3p</i>\".<br><div style=\"text-align: right;\">(Ban T\u01b0 t\u01b0\u1edfng - V\u0103n h\u00f3a Trung \u01b0\u01a1ng, <i>Nh\u1eefng n\u1ed9i dung c\u1ea7n n\u1eafm v\u1eefng v\u1ec1 Ngh\u1ecb quy\u1ebft H\u1ed9i ngh\u1ecb l\u1ea7n th\u1ee9 7 Ban Ch\u1ea5p h\u00e0nh Trung \u01b0\u01a1ng \u0110\u1ea3ng kh\u00f3a VI</i>,</div><div style=\"text-align: right;\">H\u00e0 N\u1ed9i, th\u00e1ng 10/1989, tr.20)</div>", "listQuestion": [{"questionId": 19897890, "lessonId": 0, "a": "\u0110\u1ed5i m\u1edbi l\u00e0 s\u1ef1 s\u1ed1ng c\u00f2n c\u1ee7a ch\u1ee7 ngh\u0129a x\u00e3 h\u1ed9i, ph\u00f9 h\u1ee3p v\u1edbi th\u1eddi \u0111\u1ea1i.", "b": "\u0110\u1ed5i m\u1edbi \u0111\u01b0\u1ee3c ti\u1ebfn h\u00e0nh to\u00e0n di\u1ec7n v\u00e0 \u0111\u1ed3ng b\u1ed9, kinh t\u1ebf l\u00e0 tr\u1ecdng t\u00e2m.", "c": "\u0110\u1ed5i m\u1edbi b\u1eaft \u0111\u1ea7u t\u1eeb \u0111\u1ed5i m\u1edbi t\u01b0 duy nh\u1eb1m thay \u0111\u1ed5i m\u1ee5c ti\u00eau chi\u1ebfn l\u01b0\u1ee3c.", "d": "Kh\u00f4ng ph\u1ea3i l\u00e0 s\u1ef1 thay \u0111\u1ed5i m\u1ee5c ti\u00eau, ph\u01b0\u01a1ng h\u01b0\u1edbng chi\u1ebfn l\u01b0\u1ee3c \u0111i l\u00ean.", "bookId": 758247, "comments": 1, "bookmarks": 7, "likes": 0, "shares": 0, "typeId": 0, "questionText": "N\u1ed9i dung n\u00e0o sau \u0111\u00e2y nh\u1eadn th\u1ee9c <b>kh\u00f4ng </b>\u0111\u00fang v\u1ec1 c\u00f4ng cu\u1ed9c \u0110\u1ed5i m\u1edbi c\u1ee7a Vi\u1ec7t Nam (t\u1eeb n\u0103m 1986)?", "answer": "", "key": "C", "isVideo": false, "score": 0, "order": 115, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19897895, "lessonId": 0, "a": "theo m\u00f4 h\u00ecnh ph\u01b0\u01a1ng T\u00e2y.", "b": "\u0111\u00fang \u0111\u1eafn v\u00e0 s\u00e1ng t\u1ea1o.", "c": "d\u1ef1a tr\u00ean y\u1ebfu t\u1ed1 ngo\u1ea1i l\u1ef1c.", "d": "c\u01a1 b\u1ea3n b\u1ea3o \u0111\u1ea3m ph\u00f9 h\u1ee3p.", "bookId": 758248, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Th\u1ef1c ti\u1ec5n \u0111\u1ea5t n\u01b0\u1edbc t\u1eeb 1986 \u0111\u1ebfn nay cho th\u1ea5y, t\u01b0 duy \u0110\u1ed5i m\u1edbi c\u1ee7a \u0110\u1ea3ng l\u00e0", "answer": "", "key": "B", "isVideo": false, "score": 0, "order": 116, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19897897, "lessonId": 0, "a": "To\u00e0n c\u1ea7u h\u00f3a.", "b": "\u0110a c\u1ef1c nhi\u1ec1u trung t\u00e2m.", "c": "H\u00f2a ho\u00e3n \u0110\u00f4ng \u2013 T\u00e2y.", "d": "Khu v\u1ef1c h\u00f3a.", "bookId": 758255, "comments": 6, "bookmarks": 7, "likes": 0, "shares": 0, "typeId": 0, "questionText": "C\u00f4ng cu\u1ed9c \u0110\u1ed5i m\u1edbi \u0111\u1ea5t n\u01b0\u1edbc c\u1ee7a Vi\u1ec7t Nam \u0111\u01b0\u1ee3c ti\u1ebfn h\u00e0nh trong b\u1ed1i c\u1ea3nh qu\u1ed1c t\u1ebf \u0111ang di\u1ec5n ra xu th\u1ebf n\u00e0o sau \u0111\u00e2y?", "answer": "", "key": "A", "isVideo": false, "score": 0, "order": 117, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 118 \u0111\u1ebfn 120:", "content": "Th\u1ef1c hi\u1ec7n c\u00e1c ch\u00ednh s\u00e1ch d\u00e2n t\u1ed9c, th\u00f4ng qua c\u00e1c Ch\u01b0\u01a1ng tr\u00ecnh 135, x\u00e2y d\u1ef1ng n\u00f4ng th\u00f4n m\u1edbi, nh\u1eefng n\u0103m qua huy\u1ec7n Nh\u01b0 Xu\u00e2n \u0111\u00e3 \u0111\u1ea7u t\u01b0 x\u00e2y d\u1ef1ng 50 c\u00f4ng tr\u00ecnh k\u1ebft c\u1ea5u h\u1ea1 t\u1ea7ng, v\u1edbi t\u1ed5ng ngu\u1ed3n v\u1ed1n 21 t\u1ef7 \u0111\u1ed3ng cho c\u00e1c x\u00e3 mi\u1ec1n n\u00fai. \u0110\u1ed3ng th\u1eddi, th\u1ef1c hi\u1ec7n nhi\u1ec1u gi\u1ea3i ph\u00e1p h\u1ed7 tr\u1ee3 \u0111\u1ed3ng b\u00e0o ti\u1ebfp c\u1eadn v\u00e0 h\u01b0\u1edfng l\u1ee3i t\u1eeb c\u00e1c d\u1ecbch v\u1ee5 c\u01a1 b\u1ea3n; tri\u1ec3n khai l\u1ed3ng gh\u00e9p c\u00f3 hi\u1ec7u qu\u1ea3 c\u00e1c ch\u01b0\u01a1ng tr\u00ecnh, d\u1ef1 \u00e1n, t\u1ea1o c\u01a1 h\u1ed9i t\u1ed1t nh\u1ea5t cho \u0111\u1ed3ng b\u00e0o ph\u1ea5n \u0111\u1ea5u v\u01b0\u01a1n l\u00ean tho\u00e1t ngh\u00e8o. 5 n\u0103m qua, huy\u1ec7n \u0111\u00e3 h\u1ed7 tr\u1ee3 ph\u00e1t tri\u1ec3n s\u1ea3n xu\u1ea5t cho 1.500 l\u01b0\u1ee3t h\u1ed9 ngh\u00e8o, c\u1eadn ngh\u00e8o v\u1edbi t\u1ed5ng s\u1ed1 kinh ph\u00ed tr\u00ean 5,6 t\u1ef7 \u0111\u1ed3ng; h\u1ed7 tr\u1ee3 tr\u1ef1c ti\u1ebfp cho g\u1ea7n 38.000 l\u01b0\u1ee3t ng\u01b0\u1eddi ngh\u00e8o, v\u1edbi t\u1ed5ng kinh ph\u00ed tr\u00ean 3,6 t\u1ef7 \u0111\u1ed3ng ... \u0110\u1ebfn nay, v\u00f9ng \u0111\u1ed3ng b\u00e0o d\u00e2n t\u1ed9c thi\u1ec3u s\u1ed1 \u0111\u00e3 ph\u00e1t tri\u1ec3n c\u00e1c lo\u1ea1i c\u00e2y tr\u1ed3ng c\u00f3 gi\u00e1 tr\u1ecb kinh t\u1ebf cao, nh\u01b0: ng\u00f4 l\u1ea5y h\u1ea1t, ng\u00f4 m\u1eadt \u0111\u1ed9 d\u00e0y l\u00e0m th\u1ee9c \u0103n ch\u0103n nu\u00f4i tr\u00ean di\u1ec7n t\u00edch 80 ha \u1edf x\u00e3 Thanh S\u01a1n, Thanh Xu\u00e2n, 250 ha ch\u00e8 \u1edf C\u00e1t T\u00e2n; duy tr\u00ec 200 ha l\u00faa n\u0103ng su\u1ea5t, ch\u1ea5t l\u01b0\u1ee3ng, hi\u1ec7u qu\u1ea3 cao \u1edf Thanh Phong ... Ch\u0103n nu\u00f4i ph\u00e1t tri\u1ec3n theo h\u01b0\u1edbng trang tr\u1ea1i, gia tr\u1ea1i t\u1eadp trung, \u1ee9ng d\u1ee5ng c\u00f4ng ngh\u1ec7 cao; c\u00f4ng nghi\u1ec7p, ti\u1ec3u th\u1ee7 c\u00f4ng nghi\u1ec7p, d\u1ecbch v\u1ee5 c\u00f3 s\u1ef1 t\u0103ng tr\u01b0\u1edfng nhanh.<br><div style=\"text-align: right;\">(Ngu\u1ed3n: <i>B\u00e1o D\u00e2n tr\u00ed</i>)</div>", "listQuestion": [{"questionId": 19886560, "lessonId": 0, "a": "Gi\u00fap r\u00fat ng\u1eafn kho\u1ea3ng c\u00e1ch gi\u1eefa c\u00e1c d\u00e2n t\u1ed9c.", "b": "Nh\u1eb1m khai th\u00e1c tri\u1ec7t \u0111\u1ec3 ngu\u1ed3n t\u00e0i nguy\u00ean.", "c": "Th\u1ec3 hi\u1ec7n tinh th\u1ea7n t\u01b0\u01a1ng th\u00e2n, t\u01b0\u01a1ng \u00e1i.", "d": "Gi\u00fap c\u00e1c d\u00e2n t\u1ed9c gi\u1ea3i quy\u1ebft n\u1ea1n \u0111\u00f3i gi\u00e1p h\u1ea1t.", "bookId": 749816, "comments": 0, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Nh\u1eefng ch\u00ednh s\u00e1ch nh\u1eb1m ph\u00e1t tri\u1ec3n v\u00f9ng \u0111\u1ed3ng b\u00e0o d\u00e2n t\u1ed9c thi\u1ec3u s\u1ed1 \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp trong th\u00f4ng tin tr\u00ean s\u1ebd c\u00f3 t\u00e1c \u0111\u1ed9ng nh\u01b0 th\u1ec3 n\u00e0o \u01                                     <th scope="col" class="px-3 py-3 w-10 text-center">Ý</th>
                                    <th scope="col" class="px-3 py-3">Nội dung</th>
                                    <th scope="col" class="px-3 py-3 w-32 text-center">Chọn Đ/S</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; 
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; 
                                const userChoice = userObj[pIdx]; 
                                
                                let trClass = "bg-white hover:bg-gray-50";
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) trClass = "bg-green-50";
                                    else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
