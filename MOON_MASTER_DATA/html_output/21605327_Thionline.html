\u1eb7c ch\u1edb lo toan.\u201d.", "b": "\u201cN\u1eb1m c\u00f3 chi\u1ebfu ch\u0103n, cho \u1ea5m \u00e1p,\u201d.", "c": "\u201c\u0102n th\u00ec canh c\u00e1, ch\u1edb kh\u00f4 khan.\u201d.", "d": "\u201cM\u00ecnh th\u00e1c th\u00ec n\u00ean m\u1ecdi c\u1ee7a tan.\u201d.", "bookId": 1088996, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cC\u1eafp n\u1eafp  l\u00e0m chi h\u1ee1i th\u1ebf gian,<br><br>C\u00f3 th\u00ec \u0103n m\u1eb7c ch\u1edb lo toan.<br><br>\u0110\u00f4ng hi\u1ec1m gi\u00e1 l\u1ea1nh ch\u1eb1m m\u1ec1n k\u00e9p,<br><br>H\u1ea1 l\u1ec7 m\u1ed3 h\u00f4i k\u1ebft \u00e1o \u0111\u01a1n.<br><br>N\u1eb1m c\u00f3 chi\u1ebfu ch\u0103n, cho \u1ea5m \u00e1p,<br><br>\u0102n th\u00ec canh c\u00e1, ch\u1edb kh\u00f4 khan.<br><br>Ph\u00fac d\u1ea7u hay \u0111\u1ebfn tr\u0103m tu\u1ed5i,<br><br>M\u00ecnh th\u00e1c th\u00ec n\u00ean m\u1ecdi c\u1ee7a tan.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Tr\u00e3i, <i>B\u1ea3o k\u00ednh c\u1ea3nh gi\u1edbi,</i> b\u00e0i 7, theo <i>Nguy\u1ec5n Tr\u00e3i th\u01a1 v\u00e0 \u0111\u1eddi</i>, NXB V\u0103n h\u1ecdc, 2016)</div><br>D\u00f2ng th\u01a1 n\u00e0o mang \u00fd v\u1ecb tri\u1ebft l\u00ed trong b\u00e0i th\u01a1?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nD\u00f2ng th\u01a1 \u201cM\u00ecnh th\u00e1c th\u00ec n\u00ean m\u1ecdi c\u1ee7a tan.\u201d n\u00f3i v\u1ec1 s\u1ef1 v\u00f4 th\u01b0\u1eddng c\u1ee7a cu\u1ed9c \u0111\u1eddi r\u1eb1ng m\u1ecdi t\u00e0i s\u1ea3n, c\u1ee7a c\u1ea3i v\u1eadt ch\u1ea5t \u0111\u1ec1u tr\u1edf n\u00ean v\u00f4 ngh\u0129a khi con ng\u01b0\u1eddi qua \u0111\u1eddi. \u0110\u00e2y l\u00e0 m\u1ed9t tri\u1ebft l\u00fd nh\u00e2n sinh s\u00e2u s\u1eafc, nh\u1ea5n m\u1ea1nh s\u1ef1 t\u1ea1m b\u1ee3 c\u1ee7a nh\u1eefng th\u1ee9 v\u1eadt ch\u1ea5t v\u00e0 nh\u1eafc nh\u1edf con ng\u01b0\u1eddi kh\u00f4ng n\u00ean qu\u00e1 coi tr\u1ecdng c\u1ee7a c\u1ea3i, t\u00e0i s\u1ea3n \u1edf \u0111\u1eddi.\n", "key": "D", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605348, "lessonId": 0, "a": "C\u00f3c phun n\u1ecdc xanh \u0111\u1ec3 ch\u1ed1ng l\u1ea1i l\u0169 g\u00e0 v\u1ecbt \u0111\u1ebfn tr\u00eau gh\u1eb9o.", "b": "Gh\u00e9t \u0111\u00e0n ki\u1ebfn \u0111\u1ed1t ng\u01b0\u1eddi ta, th\u00ec l\u00e8 l\u01b0\u1ee1i \u0111\u1edbp li\u1ec1n.", "c": "M\u1eb7c \u00e1o v\u1ea3i th\u00f4, \u1edf n\u01a1i k\u00edn \u0111\u00e1o.", "d": "C\u00e1c lo\u00e0i v\u1eadt kh\u00f4ng t\u1ed1t \u0111\u1ec1u kh\u00f4ng \u0111\u00e1m \u0111\u1ebfn g\u1ea7n c\u00f3c.", "bookId": 1088997, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cT\u1eeb khi xu\u1ed1ng tr\u1ea7n, c\u00f3c v\u1eabn gi\u1eef \u0111\u01b0\u1ee3c b\u1ea3n l\u0129nh tr\u1eddi sinh: m\u1eb7c \u00e1o v\u1ea3i th\u00f4, \u1edf n\u01a1i k\u00edn \u0111\u00e1o. Gh\u00e9t \u0111\u00e0n ki\u1ebfn \u0111\u1ed1t ng\u01b0\u1eddi ta, th\u00ec l\u00e8 l\u01b0\u1ee1i \u0111\u1edbp li\u1ec1n. Th\u1ea5y gi\u1ed1ng giun u\u1ed1ng n\u01b0\u1edbc m\u1ea1ch, th\u00ec h\u00e1 mi\u1ec7ng nu\u1ed1t ngay. Khi kh\u00f4ng l\u00e0m nh\u1eefng vi\u1ec7c \u1ea5y, c\u00f3c ng\u1eadm mi\u1ec7ng ng\u1ed3i y\u00ean, kh\u00f4ng th\u00edch chi c\u1ea3. C\u00f3c phun n\u1ecdc xanh \u0111\u1ec3 ch\u1ed1ng l\u1ea1i l\u0169 g\u00e0 v\u1ecbt \u0111\u1ebfn tr\u00eau gh\u1eb9o. N\u1ecdc \u0111\u1ea5y nhi\u1ec5m v\u00e0o ch\u1ed7 n\u00e0o th\u00ec da ch\u1ed7 \u1ea5y ph\u1ed3ng l\u00ean, r\u1ed3i n\u1ee9t v\u1ee1 ra. V\u00ec v\u1eady, c\u00e1c lo\u00e0i v\u1eadt kh\u00f4ng t\u1ed1t \u0111\u1ec1u kh\u00f4ng \u0111\u00e1m \u0111\u1ebfn g\u1ea7n c\u00f3c.\u201d</i><br><div style=\"text-align: right;\">(L\u00ea Th\u00e1nh T\u00f4ng, <i>B\u00e0i k\u00ed d\u00f2ng d\u00f5i c\u00f3c t\u00eda</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 4, NXB Khoa h\u1ecdc x\u00e3 h\u1ed9i, 2000)</div><br>Chi ti\u1ebft n\u00e0o kh\u1eafc ho\u1ea1 t\u00ednh c\u00e1ch gh\u00e9t chuy\u1ec7n tai \u00e1c, x\u1ea5u xa c\u1ee7a c\u00f3c?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nChi ti\u1ebft \u201cgh\u00e9t \u0111\u00e0n ki\u1ebfn \u0111\u1ed1t ng\u01b0\u1eddi ta, th\u00ec l\u00e8 l\u01b0\u1ee1i \u0111\u1edbp li\u1ec1n\u201d th\u1ec3 hi\u1ec7n th\u00e1i \u0111\u1ed9 c\u1ee7a c\u00f3c \u0111\u1ed1i v\u1edbi \u0111i\u1ec1u x\u1ea5u xa. H\u00e0nh \u0111\u1ed9ng \u201cl\u00e8 l\u01b0\u1ee1i \u0111\u1edbp li\u1ec1n\u201d cho th\u1ea5y c\u00f3c gh\u00e9t chuy\u1ec7n tai \u00e1c v\u00e0 ngay l\u1eadp t\u1ee9c c\u00f3 h\u00e0nh \u0111\u1ed9ng lo\u1ea1i tr\u1eeb \u0111i\u1ec1u \u00e1c, \u0111i\u1ec1u x\u1ea5u \u0111\u00f3 (\u0111\u00e0n ki\u1ebfn \u0111\u1ed1t ng\u01b0\u1eddi).\n", "key": "B", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605351, "lessonId": 0, "a": "\u0110o\u1ea1n th\u01a1 ph\u00e1c ho\u1ea1 b\u1eefa ti\u1ec7c linh \u0111\u00ecnh \u1edf tr\u1ea1m T\u00e2y H\u00e0; c\u00e1c m\u00f3n cao l\u01b0\u01a1ng m\u0129 v\u1ecb th\u1eeba m\u1ee9a \u00ea h\u1ec1, b\u1ecb \u0111\u1ed5 b\u1ecf; ch\u00f3 h\u00e0ng x\u00f3m c\u0169ng ng\u00e1n.", "b": "T\u00e1c gi\u1ea3 s\u1eed d\u1ee5ng th\u00e0nh c\u00f4ng b\u00fat ph\u00e1p t\u01b0\u01a1ng ph\u1ea3n, \u0111\u1ed1i l\u1eadp.", "c": "L\u1eddi th\u01a1 l\u00e3ng m\u1ea1n, bay b\u1ed5ng, th\u1ec3 hi\u1ec7n x\u00fac c\u1ea3m x\u00f3t th\u01b0\u01a1ng c\u1ee7a ng\u01b0\u1eddi vi\u1ebft t\u1edbi m\u1eb9 con ng\u01b0\u1eddi \u0103n xin.", "d": "\u0110\u1ed1i l\u1eadp v\u1edbi b\u1eefa ti\u1ec7c xa hoa, l\u00e3ng ph\u00ed l\u00e0 h\u00ecnh \u1ea3nh m\u1eb9 con nh\u00e0 kia \u0111\u00f3i r\u00e1ch b\u00ean \u0111\u01b0\u1eddng.", "bookId": 1088998, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cT\u1ea1c ti\u00eau T\u00e2y H\u00e0 d\u1ecbch,<br><br>Cung c\u1ee5 h\u00e0 tr\u01b0\u01a1ng ho\u00e0ng!<br><br><br><br>L\u1ed9c c\u00e2n t\u1ea1p ng\u01b0 x\u00ed,<br><br>M\u00e3n tr\u00e1c tr\u1ea7n tr\u01b0 d\u01b0\u01a1ng.<br><br>Tr\u01b0\u1edfng quan b\u1ea5t h\u1ea1 tr\u1ee3,<br><br>Ti\u1ec3u m\u00f4n ch\u1ec9 l\u01b0\u1ee3c th\u01b0\u1eddng.<br><br><br><br>B\u00e1t kh\u00ed v\u00f4 c\u1ed1 t\u00edch,<br><br>L\u00e2n c\u1ea9u y\u1ebfm cao l\u01b0\u01a1ng.<br><br>B\u1ea5t tri quan \u0111\u1ea1o th\u01b0\u1ee3ng,<br><br>H\u1eefu th\u1eed c\u00f9ng nhi n\u01b0\u01a1ng.<br><br>Th\u00f9y nh\u00e2n t\u1ea3 th\u1eed \u0111\u1ed3,<br><br>Tr\u00ec d\u0129 ph\u1ee5ng qu\u00e2n v\u01b0\u01a1ng.\u201d<br><br>D\u1ecbch ngh\u0129a:<br><br>\u201c\u0110\u00eam qua \u1edf nh\u00e0 tr\u1ea1m T\u00e2y H\u00e0,<br><br>Ti\u1ec7c t\u00f9ng b\u00e0y bi\u1ec7n qu\u00e1 ph\u00f4 tr\u01b0\u01a1ng.<br><br><br><br>G\u00e2n h\u01b0\u01a1u c\u00f9ng v\u00e2y c\u00e1,<br><br>\u0110\u1ea7y b\u00e0n l\u00e0 c\u00e1c m\u00f3n th\u1ecbt d\u00ea, th\u1ecbt l\u1ee3n.<br><br>C\u00e1c quan l\u1edbn ch\u1eb3ng bu\u1ed3n \u0111\u1ee5ng \u0111\u0169a,<br><br>B\u1ecdn t\u00f9y t\u00f9ng c\u0169ng ch\u1ec9 n\u1ebfm qua.<br><br><br><br>\u0110\u1ed5 b\u1ecf ch\u1eb3ng h\u1ec1 ti\u1ebfc,<br><br>Ch\u00f3 h\u00e0ng x\u00f3m c\u0169ng ng\u00e1n m\u00f3n ngon.<br><br>\u0110\u00e2u bi\u1ebft tr\u00ean \u0111\u01b0\u1eddng c\u00e1i quan,<br><br>C\u00f3 m\u1eb9 con nh\u00e0 kia c\u00f9ng qu\u1eabn th\u1ea3m th\u01b0\u01a1ng!<br><br>Ai s\u1ebd v\u1ebd b\u1ee9c tranh n\u00e0y,<br><br>\u0110\u1ec3 d\u00e2ng l\u00ean \u0111\u1ea5ng qu\u00e2n v\u01b0\u01a1ng!\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Du, <i>S\u1edf ki\u1ebfn h\u00e0nh</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div><br>Nh\u1eadn x\u00e9t n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>\u0111\u00fang v\u1edbi \u0111o\u1ea1n th\u01a1 tr\u00ean?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\n\u0110o\u1ea1n th\u01a1 s\u1eed d\u1ee5ng b\u00fat ph\u00e1p hi\u1ec7n th\u1ef1c, ph\u01a1i b\u00e0y s\u1ef1 \u0111\u1ed1i l\u1eadp gay g\u1eaft gi\u1eefa c\u1ea3nh s\u1ed1ng xa hoa, l\u00e3ng ph\u00ed c\u1ee7a quan l\u1ea1i v\u1edbi c\u1ea3nh \u0111\u1eddi kh\u1ed1n kh\u1ed5, c\u00f9ng qu\u1ea7n c\u1ee7a ng\u01b0\u1eddi d\u00e2n. Do \u0111\u00f3 l\u1eddi th\u01a1 kh\u00f4ng l\u00e3ng m\u1ea1n, bay b\u1ed5ng m\u00e0 mang t\u00ednh ph\u00ea ph\u00e1n, t\u1ed1 c\u00e1o th\u1ef1c tr\u1ea1ng b\u1ea5t c\u00f4ng trong x\u00e3 h\u1ed9i hi\u1ec7n th\u1eddi.\n", "key": "C", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605357, "lessonId": 0, "a": "Gi\u1ecdng n\u00f3i c\u1ee7a ch\u1ecb b\u00e1n thu\u1ed1c l\u00e1 ng\u1ecdt ng\u00e0o h\u01a1n, g\u00e2y xao xuy\u1ebfn m\u1ea1nh h\u01a1n v\u00e0o b\u1ea9m sinh nh\u1ea1y c\u1ea3m c\u1ee7a t\u00f4i.", "b": "C\u00e1i th\u00f3i m\u01a1 m\u1ed9ng v\u1eb7t th\u01b0\u1eddng ng\u00e0y c\u1ee7a t\u00f4i l\u1ea1i bay b\u1ed5ng \u0111i \u0111\u00e2u m\u1ea5t.", "c": "T\u00f4i kh\u00f4ng nghe l\u1eddi n\u00f3i c\u1ee7a ch\u1ecb vang v\u1ecdng m\u01a1 h\u1ed3 t\u1eeb m\u1ed9t gi\u1ea5c chi\u00eam bao bu\u1ed3n.", "d": "Ng\u01b0\u1eddi c\u1ea7m b\u00fat \u0111\u1eebng bao gi\u1edd \u0111\u00e1nh m\u1ea5t c\u00e1i \u0111i\u1ec3m t\u1ef1a \u0111\u00e1ng tin c\u1eady c\u1ee7a m\u00ecnh l\u00e0 n\u1ed7i \u0111au kh\u1ed5 l\u1edbn c\u1ee7a s\u1ed1 \u0111\u00f4ng th\u1ea7m l\u1eb7ng.", "bookId": 1088999, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cKhi b\u1eaft \u0111\u1ea7u x\u01b0ng ch\u1ecb, g\u1ecdi t\u00f4i b\u1eb1ng em, gi\u1ecdng n\u00f3i c\u1ee7a ch\u1ecb b\u00e1n thu\u1ed1c l\u00e1 ng\u1ecdt ng\u00e0o h\u01a1n, g\u00e2y xao xuy\u1ebfn m\u1ea1nh h\u01a1n v\u00e0o b\u1ea9m sinh nh\u1ea1y c\u1ea3m c\u1ee7a t\u00f4i. Nh\u01b0ng l\u1ea1 thay, c\u00e1i th\u00f3i m\u01a1 m\u1ed9ng v\u1eb7t th\u01b0\u1eddng ng\u00e0y c\u1ee7a t\u00f4i l\u1ea1i bay b\u1ed5ng \u0111i \u0111\u00e2u m\u1ea5t. T\u00f4i kh\u00f4ng nghe l\u1eddi n\u00f3i c\u1ee7a ch\u1ecb vang v\u1ecdng m\u01a1 h\u1ed3 t\u1eeb m\u1ed9t gi\u1ea5c chi\u00eam bao bu\u1ed3n. T\u00f4i nghe \u0111\u00f3 l\u00e0 l\u1eddi r\u0103n d\u1ea1y r\u1ea5t nghi\u00eam c\u00f3 gi\u00e1 tr\u1ecb th\u1ee9c t\u1ec9nh cao c\u1ee7a m\u1ed9t hi\u1ec7n th\u1ef1c \u0111au bu\u1ed3n nh\u1eafc nh\u1edf ng\u01b0\u1eddi c\u1ea7m b\u00fat \u0111\u1eebng bao gi\u1edd \u0111\u00e1nh m\u1ea5t c\u00e1i \u0111i\u1ec3m t\u1ef1a \u0111\u00e1ng tin c\u1eady c\u1ee7a m\u00ecnh l\u00e0 n\u1ed7i \u0111au kh\u1ed5 l\u1edbn c\u1ee7a s\u1ed1 \u0111\u00f4ng th\u1ea7m l\u1eb7ng.\u201d</i><br><div style=\"text-align: right;\">(Trang Th\u1ebf Hy, <i>Ti\u1ebfng kh\u00f3c v\u00e0 ti\u1ebfng h\u00e1t</i>, theo <i>V\u1ebft th\u01b0\u01a1ng th\u1ee9 13</i>, NXB Tr\u1ebb, 2011)</div><br>Nh\u1eadn th\u1ee9c v\u1ec1 c\u00f4ng vi\u1ec7c vi\u1ebft v\u0103n \u0111\u01b0\u1ee3c ng\u01b0\u1eddi vi\u1ebft th\u1ec3 hi\u1ec7n qua chi ti\u1ebft n\u00e0o?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nChi ti\u1ebft \u201cNg\u01b0\u1eddi c\u1ea7m b\u00fat \u0111\u1eebng bao gi\u1edd \u0111\u00e1nh m\u1ea5t c\u00e1i \u0111i\u1ec3m t\u1ef1a \u0111\u00e1ng tin c\u1eady c\u1ee7a m\u00ecnh l\u00e0 n\u1ed7i \u0111au kh\u1ed5 l\u1edbn c\u1ee7a s\u1ed1 \u0111\u00f4ng th\u1ea7m l\u1eb7ng.\u201d th\u1ec3 hi\u1ec7n nh\u1eadn th\u1ee9c s\u00e2u s\u1eafc c\u1ee7a ng\u01b0\u1eddi vi\u1ebft v\u1ec1 tr\u00e1ch nhi\u1ec7m c\u1ee7a ng\u01b0\u1eddi c\u1ea7m b\u00fat. Nh\u00e0 v\u0103n kh\u00f4ng n\u00ean ch\u00ecm \u0111\u1eafm trong m\u01a1 m\u1ed9ng h\u00e3o huy\u1ec1n, m\u00e0 ph\u1ea3i g\u1eafn b\u00f3 v\u1edbi hi\u1ec7n th\u1ef1c \u0111\u1eddi s\u1ed1ng, v\u1edbi n\u1ed7i \u0111au kh\u1ed5 c\u1ee7a nh\u1eefng con ng\u01b0\u1eddi nh\u1ecf b\u00e9 trong x\u00e3 h\u1ed9i.\n", "key": "D", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605359, "lessonId": 0, "a": "Nh\u00e2n ho\u00e1, \u1ea9n d\u1ee5.", "b": "Ph\u00e9p \u0111i\u1ec7p, li\u1ec7t k\u00ea, \u1ea9n d\u1ee5.", "c": "Nh\u00e2n ho\u00e1, so s\u00e1nh, li\u1ec7t k\u00ea.", "d": "Ph\u00e9p \u0111i\u1ec7p, so s\u00e1nh.", "bookId": 1089000, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNh\u1eefng ng\u01b0 d\u00e2n tr\u00ean \u0111\u1ea5t n\u01b0\u1edbc t\u00f4i<br><br>Nguy\u1ec7n l\u00e0m \u201cc\u1ed9t m\u1ed1c s\u1ed1ng\u201d<br><br>Ng\u00e0n v\u1ea1n \u201cc\u1ed9t m\u1ed1c s\u1ed1ng\u201d<br><br>C\u1ea3 tri\u1ec7u \u201cc\u1ed9t m\u1ed1c s\u1ed1ng\u201d<br><br>Tr\u00ean bi\u1ec3n s\u00f3ng<br><br>Tr\u00ean \u0111\u00e1 ng\u1ea7m<br><br>Tr\u00ean \u0111\u1ea3o ch\u00ecm \u0111\u1ea3o n\u1ed5i<br><br>Tr\u00ean t\u1ef1 do l\u00e3nh h\u1ea3i Vi\u1ec7t Nam t\u00f4i\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Tr\u1ecdng T\u1ea1o, <i>Bi\u1ec3n m\u1eb7n</i>, theo <i>dantri.com.vn</i>)</div><br>N\u1ed9i dung bao tr\u00f9m c\u1ee7a \u0111o\u1ea1n th\u01a1 tr\u00ean l\u00e0 g\u00ec?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\n\u0110o\u1ea1n th\u01a1 s\u1eed d\u1ee5ng c\u00e1c bi\u1ec7n ph\u00e1p tu t\u1eeb:<br>\nPh\u00e9p \u0111i\u1ec7p: C\u1ee5m t\u1eeb \u201cc\u1ed9t m\u1ed1c s\u1ed1ng\u201d v\u00e0 t\u1eeb \u201ctr\u00ean\u201d \u0111\u01b0\u1ee3c l\u1eb7p l\u1ea1i nhi\u1ec1u l\u1ea7n, t\u00f4 \u0111\u1eadm \u1ea5n t\u01b0\u1ee3ng v\u1ec1 ch\u1ee7 quy\u1ec1n bi\u1ec3n \u0111\u1ea3o qu\u00ea h\u01b0\u01a1ng.<br>\nLi\u1ec7t k\u00ea: K\u1ec3 t\u00ean nh\u1eefng \u0111\u1ecba \u0111i\u1ec3m (bi\u1ec3n s\u00f3ng, \u0111\u00e1 ng\u1ea7m, \u0111\u1ea3o ch\u00ecm \u0111\u1ea3o n\u1ed5i, t\u1ef1 do l\u00e3nh h\u1ea3i Vi\u1ec7t Nam) \u0111\u1ec3 l\u00e0m n\u1ed5i b\u1eadt ph\u1ea1m vi r\u1ed9ng l\u1edbn m\u00e0 ng\u01b0 d\u00e2n hi\u1ec7n di\u1ec7n.<br>\n\u1ea8n d\u1ee5: H\u00ecnh \u1ea3nh \u201cc\u1ed9t m\u1ed1c s\u1ed1ng\u201d \u1ea9n d\u1ee5 cho nh\u1eefng ng\u01b0\u1eddi ng\u01b0 d\u00e2n ki\u00ean c\u01b0\u1eddng, b\u00e1m bi\u1ec3n, kh\u1eb3ng \u0111\u1ecbnh ch\u1ee7 quy\u1ec1n l\u00e3nh th\u1ed5.\n", "key": "B", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605366, "lessonId": 0, "a": "Ngh\u1ecb lu\u1eadn.", "b": "T\u1ef1 s\u1ef1.", "c": "Bi\u1ec3u c\u1ea3m.", "d": "Mi\u00eau t\u1ea3.", "bookId": 1089001, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cHo\u1eb7c \u0111\u00fang h\u01a1n l\u00e0 c\u1ea3 ng\u01b0\u1eddi h\u1eafn l\u00e0 m\u1ed9t kh\u1ed1i nh\u0103n. M\u1ed9t c\u00e1i \u0111\u1ea7u to t\u01b0\u1edbng l\u1edfm ch\u1edfm t\u00f3c \u0111\u1ecf qu\u1ea1ch; gi\u1eefa \u0111\u00f4i vai l\u00e0 c\u00e1i b\u01b0\u1edbu k\u1ebfch x\u00f9 l\u00e0m \u0111\u1eb1ng tr\u01b0\u1edbc ng\u1ef1c nh\u01b0 nh\u00f4 ra; h\u1ec7 th\u1ed1ng \u0111\u00f9i v\u00e0 ch\u00e2n v\u00f2ng ki\u1ec1ng b\u1ebb qu\u1eb9o r\u1ea5t k\u00ec qu\u00e1i, ch\u1ec9 c\u00f3 th\u1ec3 ch\u1ea1m nhau \u1edf \u0111\u1ea7u g\u1ed1i, v\u00e0 nh\u00ecn th\u1eb3ng \u0111\u1eb1ng tr\u01b0\u1edbc, tr\u00f4ng gi\u1ed1ng nh\u01b0 hai l\u01b0\u1ee1i h\u00e1i k\u1ec1 nhau \u1edf ch\u1ed7 tay c\u1ea7m; hai b\u00e0n ch\u00e2n to b\u00e8, hai b\u00e0n tay l\u1edbn kh\u1ee7ng khi\u1ebfp; v\u00e0 c\u00f9ng v\u1edbi c\u1ea3 h\u00ecnh th\u00f9 qu\u00e1i d\u1ecb n\u00e0y, c\u00f2n l\u00e0 m\u1ed9t d\u00e1ng \u0111i \u0111\u00e1ng s\u1ee3, r\u1ea5t m\u1ea1nh m\u1ebd, nhanh nh\u1eb9n v\u00e0 qu\u1ea3 c\u1ea3m, m\u1ed9t ngo\u1ea1i l\u1ec7 k\u00ec l\u1ea1 kh\u00e1c v\u1edbi lu\u1eadt l\u1ec7 mu\u00f4n th\u1ee7a cho r\u1eb1ng s\u1ee9c m\u1ea1nh c\u0169ng nh\u01b0 v\u1ebb \u0111\u1eb9p l\u00e0 k\u1ebft qu\u1ea3 c\u1ee7a h\u00e0i h\u00f2a.\u201d</i><br><div style=\"text-align: right;\">(Victor Hugo, <i>Nh\u00e0 th\u1edd \u0110\u1ee9c B\u00e0 Paris</i>, NXB V\u0103n h\u1ecdc, 2002)</div><br>Ph\u01b0\u01a1ng th\u1ee9c bi\u1ec3u \u0111\u1ea1t ch\u00ednh c\u1ee7a \u0111o\u1ea1n tr\u00edch l\u00e0 g\u00ec?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft: \u0110o\u1ea1n tr\u00edch t\u1eadp trung kh\u1eafc ho\u1ea1 nh\u00e2n v\u1eadt th\u00f4ng qua ngo\u1ea1i h\u00ecnh nh\u1eefng chi ti\u1ebft c\u1ee5 th\u1ec3, sinh \u0111\u1ed9ng nh\u01b0: \u201c\u0111\u1ea7u to t\u01b0\u1edbng l\u1edfm ch\u1edfm t\u00f3c \u0111\u1ecf qu\u1ea1ch\u201d, \u201cb\u01b0\u1edbu k\u1ebfch x\u00f9\u201d, \u201cch\u00e2n v\u00f2ng ki\u1ec1ng b\u1ebb qu\u1eb9o\u201d, \u201cb\u00e0n ch\u00e2n to b\u00e8\u201d, \u201cb\u00e0n tay l\u1edbn kh\u1ee7ng khi\u1ebfp\u201d... \u2192 Ph\u01b0\u01a1ng th\u1ee9c bi\u1ec3u \u0111\u1ea1t ch\u00ednh c\u1ee7a \u0111o\u1ea1n tr\u00edch l\u00e0 mi\u00eau t\u1ea3.", "key": "D", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605372, "lessonId": 0, "a": "C\u00f3 th\u1ec3 vay m\u01b0\u1ee3n ti\u1ec1n nh\u00e0 S\u00f2.", "b": "C\u00f3 th\u1ec3 l\u1ee3i d\u1ee5ng ch\u1ee9c quy\u1ec1n \u0111\u1ec3 moi ti\u1ec1n nh\u00e0 S\u00f2.", "c": "C\u00f3 th\u1ec3 do\u1ea1 d\u1eabm S\u00f2.", "d": "C\u00f3 th\u1ec3 k\u1ebft th\u00e2n v\u1edbi S\u00f2 \u0111\u1ec3 l\u1ee3i d\u1ee5ng.", "bookId": 1089002, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u0110\u1ec0 L\u1ea0I: V\u00e2ng, h\u00f4m nay ch\u1eb3ng th\u1ea5y ai ki\u1ec7n c\u00e1o g\u00ec c\u1ea3. C\u00f2n v\u1ee5 Th\u1ecb H\u1ebfn, Nguy\u1ec5n S\u00f2, quan \u0111\u00e3 \u0111\u1ecbnh d\u1ee9t kho\u00e1t th\u1ebf n\u00e0o ch\u01b0a?<br><br>TRI HUY\u1ec6N: V\u1ee5 \u1ea5y \u00e0? \u00dd th\u1ea7y th\u1ebf n\u00e0o?</i> (kh\u00f4ng \u0111\u1ee3i \u0110\u1ec1 l\u1ea1i tr\u1ea3 l\u1eddi, n\u00f3i lu\u00f4n) <i>T\u00f4i th\u00ec t\u00f4i ngh\u0129 c\u1ee9 \u0111\u1ec3 \u0111u \u0111\u01b0a nh\u01b0 v\u1eady \u0111\u00e3. Th\u1eb1ng S\u00f2 n\u00e0y gi\u00e0u l\u1eafm, ch\u00fang m\u00ecnh c\u00f3 th\u1ec3 \u201c\u1ea5y\u201d \u0111\u01b0\u1ee3c...<br><br>\u0110\u1ec0 L\u1ea0I: V\u00e2ng, ta c\u1ee9 b\u1ea3o l\u00e0 \u0111\u1ec3 tra c\u1ee9u \u0111\u00e3. Th\u01b0a, c\u00f2n th\u1eb1ng \u1ed0c, th\u1eb1ng Ngh\u00eau, L\u00ed tr\u01b0\u1edfng, Th\u1ecb H\u1ebfn th\u00ec li\u1ec7u x\u1eed cho xong, b\u1ecdn n\u00e0y to\u00e0n \u0111\u1ea7u tr\u1ecdc c\u1ea3.<br><br>TRI HUY\u1ec6N: Ph\u1ea3i, n\u1eafm \u0111\u1ee9a c\u00f3 t\u00f3c, ch\u1ee9 ai n\u1eafm k\u1ebb tr\u1ecdc \u0111\u1ea7u</i> (c\u01b0\u1eddi kho\u00e1i tr\u00e1).<i> X\u1eed \u1ed0c n\u0103m n\u0103m t\u00f9, Ngh\u00eau ph\u1ea1t \u0111\u00f2n n\u0103m ch\u1ee5c tr\u01b0\u1ee3ng, L\u00ed tr\u01b0\u1edfng \u0111\u00f2i \u0103n l\u00f3t ph\u1ea1t tr\u1eebng gi\u1edbi  n\u0103m m\u01b0\u01a1i quan ti\u1ec1n.\u201d</i><br><div style=\"text-align: right;\">(Tu\u1ed3ng c\u1ed5,<i> Ngh\u00eau, S\u00f2, \u1ed0c, H\u1ebfn</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div><br>\u201cTh\u1eb1ng S\u00f2 n\u00e0y gi\u00e0u l\u1eafm, ch\u00fang m\u00ecnh c\u00f3 th\u1ec3 \u201c\u1ea5y\u201d \u0111\u01b0\u1ee3c...\u201d<br><br>C\u1ee5m t\u1eeb \u201cc\u00f3 th\u1ec3 \u201c\u1ea5y\u201d \u0111\u01b0\u1ee3c...\u201d ngh\u0129a l\u00e0 g\u00ec?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nC\u1ee5m t\u1eeb \u201cc\u00f3 th\u1ec3 \u201c\u1ea5y\u201d \u0111\u01b0\u1ee3c...\u201d \u00e1m ch\u1ec9 vi\u1ec7c v\u00f2i v\u0129nh, moi ti\u1ec1n t\u1eeb nh\u00e0 S\u00f2. Trong ng\u1eef c\u1ea3nh n\u00e0y, Tri huy\u1ec7n \u0111ang b\u00e0n v\u1edbi \u0110\u1ec1 l\u1ea1i c\u00e1ch th\u1ee9c \u0111\u1ec3 ki\u1ebfm l\u1ee3i t\u1eeb v\u1ee5 ki\u1ec7n c\u1ee7a nh\u00e0 S\u00f2 - m\u1ed9t gia \u0111\u00ecnh gi\u00e0u c\u00f3. \u0110\u00e2y ch\u00ednh l\u00e0 h\u00e0nh vi l\u1ee3i d\u1ee5ng ch\u1ee9 quy\u1ec1n \u0111\u1ec3 tr\u1ee5c l\u1ee3i c\u1ee7a quan Tri huy\u1ec7n v\u00e0 \u0110\u1ec1 l\u1ea1i.<br>\n\u2192 C\u1ee5m t\u1eeb \u201cc\u00f3 th\u1ec3 \u201c\u1ea5y\u201d \u0111\u01b0\u1ee3c...\u201d ngh\u0129a l\u00e0 c\u00f3 th\u1ec3 l\u1ee3i d\u1ee5ng ch\u1ee9c quy\u1ec1n \u0111\u1ec3 moi ti\u1ec1n nh\u00e0 S\u00f2.\n", "key": "B", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605377, "lessonId": 0, "a": "C\u00e1c h\u1ea1 s\u0129 quan ng\u01b0\u1eddi b\u1ea3n x\u1ee9 th\u00ec chen ch\u00fac d\u01b0\u1edbi h\u1ea7m t\u00e0u, c\u00f2n nh\u1eefng h\u1ea1 s\u0129 quan da tr\u1eafng, th\u00ec \u0111\u01b0\u1ee3c \u0111\u01b0\u1eddng ho\u00e0ng n\u1eb1m trong c\u00e1c bu\u1ed3ng d\u00e0nh ri\u00eang.", "b": "T\u00e0uu Ligi\u00ea ch\u1edf 600 l\u00ednh ng\u01b0\u1eddi Mang\u00e1ts\u01a1 t\u1eeb Ph\u00e1p sang Ma\u0111ag\u00e1txca.", "c": "C\u00e1c h\u1ea1 s\u0129 quan ng\u01b0\u1eddi b\u1ea3n x\u1ee9 n\u00f3ng s\u00f4i l\u00ean v\u00ec c\u00e1i n\u1ed3i s\u00fap de.", "d": "Ch\u1ee7 ngh\u0129a t\u01b0 b\u1ea3n ch\u1ec9 coi ng\u01b0\u1eddi da m\u00e0u nh\u01b0 nh\u1eefng k\u1ebb olo maloto.", "bookId": 1089003, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cH\u1ed3i th\u00e1ng n\u0103m, chi\u1ebfc t\u00e0u Ligi\u00ea ch\u1edf 600 l\u00ednh ng\u01b0\u1eddi Mang\u00e1ts\u01a1 t\u1eeb Ph\u00e1p sang Ma\u0111ag\u00e1txca. C\u00e1c h\u1ea1 s\u0129 quan ng\u01b0\u1eddi b\u1ea3n x\u1ee9 th\u00ec chen ch\u00fac d\u01b0\u1edbi h\u1ea7m t\u00e0u, c\u00f2n \u0111\u1ed3ng nghi\u1ec7p c\u1ee7a h\u1ecd, nh\u1eefng h\u1ea1 s\u0129 quan da tr\u1eafng, th\u00ec \u0111\u01b0\u1ee3c \u0111\u01b0\u1eddng ho\u00e0ng n\u1eb1m trong c\u00e1c bu\u1ed3ng d\u00e0nh ri\u00eang. H\u1eb3n nh\u1eefng ng\u01b0\u1eddi anh em kh\u00e1c m\u00e0u da ch\u00fang ta, n\u00f3ng s\u00f4i l\u00ean v\u00ec c\u00e1i n\u1ed3i s\u00fap de n\u1ebfu kh\u00f4ng ph\u1ea3i v\u00ec l\u00ed t\u01b0\u1edfng, v\u00e0 t\u1ec9nh d\u1eady v\u00ec ti\u1ebfng \u0111\u1ed9ng \u1ea7m \u1ea7m c\u1ee7a ch\u00e2n v\u1ecbt quay hay v\u00ec ti\u1ebfng g\u1ecdi c\u1ee7a l\u01b0\u01a1ng tri, c\u00f3 th\u1ec3 suy ngh\u0129 v\u00e0 hi\u1ec3u r\u1eb1ng c\u00e1i ch\u1ee7 ngh\u0129a t\u01b0 b\u1ea3n t\u1ed1t \u0111\u1eb9p kia v\u1eabn coi h\u1ecd v\u00e0 bao gi\u1edd c\u0169ng s\u1ebd ch\u1ec9 coi h\u1ecd nh\u01b0 nh\u1eefng k\u1ebb olo maloto  m\u00e0 th\u00f4i.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>B\u00ecnh \u0111\u1eb3ng</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div><br>Chi ti\u1ebft n\u00e0o cho th\u1ea5y s\u1ef1 ph\u00e2n bi\u1ec7t \u0111\u1ed1i x\u1eed gi\u1eefa ng\u01b0\u1eddi da \u0111en v\u00e0 ng\u01b0\u1eddi da tr\u1eafng?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nChi ti\u1ebft \u201cC\u00e1c h\u1ea1 s\u0129 quan ng\u01b0\u1eddi b\u1ea3n x\u1ee9 th\u00ec chen ch\u00fac d\u01b0\u1edbi h\u1ea7m t\u00e0u, c\u00f2n nh\u1eefng h\u1ea1 s\u0129 quan da tr\u1eafng, th\u00ec \u0111\u01b0\u1ee3c \u0111\u01b0\u1eddng ho\u00e0ng n\u1eb1m trong c\u00e1c bu\u1ed3ng d\u00e0nh ri\u00eang.\u201d th\u1ec3 hi\u1ec7n r\u00f5 s\u1ef1 ph\u00e2n bi\u1ec7t \u0111\u1ed1i x\u1eed v\u1ec1 \u0111i\u1ec1u ki\u1ec7n sinh ho\u1ea1t gi\u1eefa ng\u01b0\u1eddi da \u0111en v\u00e0 ng\u01b0\u1eddi da tr\u1eafng tr\u00ean c\u00f9ng m\u1ed9t con t\u00e0u. Ng\u01b0\u1eddi da tr\u1eafng \u0111\u01b0\u1ee3c h\u01b0\u1edfng nh\u1eefng \u0111i\u1ec1u ki\u1ec7n t\u1ed1t (n\u1eb1m trong c\u00e1c bu\u1ed3ng d\u00e0nh ri\u00eang), trong khi ng\u01b0\u1eddi da \u0111en ph\u1ea3i \u1edf n\u01a1i ch\u1eadt ch\u1ed9i, kh\u1ed5 c\u1ef1c (chen ch\u00fac d\u01b0\u1edbi h\u1ea7m t\u00e0u).\n", "key": "A", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605380, "lessonId": 0, "a": "D\u00ec Ch\u00edn ngh\u00e8o nh\u1ea5t g\u00e1nh.", "b": "Nh\u1eefng g\u00ec Ch\u00edn \u0111em qua l\u00e0m gi\u1ed7, ai c\u0169ng n\u00e2ng niu c\u1ea3m \u0111\u1ed9ng.", "c": "\u0110\u00fang gi\u1ed7 \u00f4ng, d\u00ec b\u1eaft c\u1eb7p v\u1ecbt x\u00e1ch v\u1ec1, c\u00fang \u00f4ng ngo\u1ea1i c\u00e1i m\u00f3n \u00f4ng \u01b0a nh\u1ee9t h\u1ed3i c\u00f2n s\u1ed1ng.", "d": "V\u1ecbt c\u1ee7a d\u00ec Ch\u00edn l\u1edbn l\u00ean nh\u1edd c\u00e1m tr\u1ed9n b\u00e8o, m\u1edb \u1ed1c b\u01b0\u01a1u v\u00e0ng t\u00e1ch v\u1ecf b\u1eb1m nh\u1ecf.", "bookId": 1089004, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cB\u00e0 m\u1eb9 k\u1ec3 h\u1ed3i x\u01b0a d\u00ec Ch\u00edn ngh\u00e8o nh\u1ee9t g\u00e1nh m\u00ecnh. \u00c1ng ch\u1eebng c\u00f2n ba th\u00e1ng n\u1eefa t\u1edbi \u0111\u00e1m gi\u1ed7 b\u00ean nh\u00e0 ngo\u1ea1i, Ch\u00edn \u0111i mua ch\u1ee5c v\u1ecbt con v\u1ec1 nu\u00f4i. V\u1ecbt c\u1ee7a Ch\u00edn l\u1edbn l\u00ean kh\u00f4ng nh\u1edd h\u1ed9t l\u00faa n\u00e0o (th\u1ee9 \u0111\u00f3 d\u00e0nh cho b\u1ed1n mi\u1ec7ng ng\u01b0\u1eddi trong nh\u00e0 c\u00f2n kh\u00f4ng \u0111\u1ee7), d\u00ec nu\u00f4i ch\u00fang b\u1eb1ng c\u00e1m tr\u1ed9n b\u00e8o, cu\u1ed1i chi\u1ec1u c\u00f3 th\u00eam m\u1edb \u1ed1c b\u01b0\u01a1u v\u00e0ng t\u00e1ch v\u1ecf b\u1eb1m nh\u1ecf. \u0110\u00fang gi\u1ed7 d\u00ec b\u1eaft c\u1eb7p v\u1ecbt x\u00e1ch v\u1ec1, c\u00fang \u00f4ng ngo\u1ea1i c\u00e1i m\u00f3n \u00f4ng \u01b0a nh\u1ee9t h\u1ed3i c\u00f2n s\u1ed1ng: v\u1ecbt lu\u1ed9c ch\u1ea5m m\u1eafm g\u1eebng. C\u00f3 n\u0103m v\u1ecbt c\u00f2i v\u00ec \u0103n kh\u00f4ng \u0111\u1ee7 s\u1ee9c, l\u01b0\u1eddn b\u00e9n l\u1eb9m t\u00f3p kh\u00f4. C\u00f3 n\u0103m gi\u00f3 \u0111\u1ed9c l\u00e0m c\u1ea3 b\u1ea7y l\u0103n ra ch\u1ebft h\u1ebft, Ch\u00edn \u0111i c\u00e2u c\u00e1 l\u00f3c mang v\u1ec1 c\u00fang. V\u00e0 nh\u1eefng g\u00ec Ch\u00edn \u0111em qua l\u00e0m gi\u1ed7, ai c\u0169ng n\u00e2ng niu c\u1ea3m \u0111\u1ed9ng. Con c\u00e1 l\u00f3c v\u1edbi c\u00e1i m\u0103ng tre \u1ea5y c\u0169ng c\u00f3 gi\u00e1 tr\u1ecb ngang b\u1eb1ng v\u1edbi con heo quay c\u1eadu Hai ch\u1edf t\u1eeb ngo\u00e0i ch\u1ee3 v\u00f4.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Ng\u1ecdc T\u01b0, <i>\u0110ong t\u1ea5m l\u00f2ng</i>, NXB Tr\u1ebb, 2020)</div><br>Chi ti\u1ebft n\u00e0o cho th\u1ea5y l\u00f2ng hi\u1ebfu th\u1ea3o c\u1ee7a d\u00ec Ch\u00edn?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nChi ti\u1ebft \u201c\u0110\u00fang gi\u1ed7 d\u00ec b\u1eaft c\u1eb7p v\u1ecbt x\u00e1ch v\u1ec1, c\u00fang \u00f4ng ngo\u1ea1i c\u00e1i m\u00f3n \u00f4ng \u01b0a nh\u1ee9t h\u1ed3i c\u00f2n s\u1ed1ng\u201d cho th\u1ea5y l\u00f2ng hi\u1ebfu th\u1ea3o c\u1ee7a d\u00ec Ch\u00edn khi d\u00f9 ngh\u00e8o kh\u00f3, d\u00ec v\u1eabn c\u1ed1 g\u1eafng chu\u1ea9n b\u1ecb m\u00f3n \u0103n m\u00e0 \u00f4ng ngo\u1ea1i y\u00eau th\u00edch nh\u1ea5t \u0111\u1ec3 c\u00fang gi\u1ed7.\n", "key": "C", "isVideo": true, "score": 0, "order": 11, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605409, "lessonId": 0, "a": "Nguy\u1ec5n Tr\u00e3i, Nguy\u1ec5n Du, H\u1ed3 Ch\u00ed Minh.", "b": "Nguy\u1ec5n C\u00f4ng Tr\u1ee9, Cao B\u00e1 Qu\u00e1t, Th\u00e2n Nh\u00e2n Trung.", "c": "Nguy\u1ec5n B\u1ec9nh Khi\u00eam, Nguy\u1ec5n \u0110\u00ecnh Chi\u1ec3u, T\u1ed1 H\u1eefu.", "d": "Xu\u00e2n Di\u1ec7u, Nguy\u1ec5n Tu\u00e2n, Nam Cao.", "bookId": 1089005, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "D\u00f2ng n\u00e0o sau \u0111\u00e2y n\u00eau t\u00ean c\u00e1c t\u00e1c gi\u1ea3 c\u1ee7a th\u1eddi k\u00ec v\u0103n h\u1ecdc trung \u0111\u1ea1i?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nC\u00e1c t\u00e1c gi\u1ea3 Nguy\u1ec5n C\u00f4ng Tr\u1ee9, Cao B\u00e1 Qu\u00e1t, Th\u00e2n Nh\u00e2n Trung thu\u1ed9c th\u1eddi k\u1ef3 v\u0103n h\u1ecdc trung \u0111\u1ea1i Vi\u1ec7t Nam.<br>\nNguy\u1ec5n C\u00f4ng Tr\u1ee9 (1778-1858) l\u00e0 nh\u00e0 ch\u00ednh tr\u1ecb, nh\u00e0 qu\u00e2n s\u1ef1 v\u00e0 nh\u00e0 th\u01a1 n\u1ed5i ti\u1ebfng th\u1eddi nh\u00e0 Nguy\u1ec5n.<br>\nCao B\u00e1 Qu\u00e1t (1808-1855) l\u00e0 nh\u00e0 th\u01a1 c\u00f3 t\u00e0i n\u0103ng v\u00e0 b\u1ea3n l\u0129nh gi\u1eefa th\u1ebf k\u1ef7 19 c\u1ee7a Vi\u1ec7t Nam, \u0111\u01b0\u1ee3c ng\u01b0\u1eddi \u0111\u01b0\u01a1ng th\u1eddi t\u00f4n l\u00e0 Th\u00e1nh Qu\u00e1t.<br>\n- Th\u00e2n Nh\u00e2n Trung (1419-1499) l\u00e0 m\u1ed9t danh s\u0129 Vi\u1ec7t Nam, l\u00e0m quan nh\u00e0 H\u1eadu L\u00ea, l\u00e0 ng\u01b0\u1eddi m\u1edf \u0111\u1ea7u cho m\u1ed9t gia t\u1ed9c khoa b\u1ea3ng, ba \u0111\u1eddi li\u00ean ti\u1ebfp v\u1edbi 4 v\u1ecb \u0111\u1ed7 ti\u1ebfn s\u0129 v\u00e0 \u0111\u1ec1u l\u00e0m quan d\u01b0\u1edbi th\u1eddi vua L\u00ea Th\u00e1nh T\u00f4ng.\n", "key": "B", "isVideo": true, "score": 0, "order": 12, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605411, "lessonId": 0, "a": "L\u1ebfch th\u1ebfch, l\u00e3i su\u1ea5t, kho\u1ea3ng kh\u1eafc.", "b": "L\u1ebfch th\u1ebfch, l\u00e3i xu\u1ea5t, kho\u1ea3nh kh\u1eafc.", "c": "L\u1ebfch th\u1ebfch, l\u00e3i su\u1ea5t, kho\u1ea3nh kh\u1eafc.", "d": "L\u1ebfch thu\u1ebfch, l\u00e3i su\u1ea5t, kho\u1ea3nh kh\u1eafc.", "bookId": 1089006, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "D\u00f2ng n\u00e0o d\u01b0\u1edbi \u0111\u00e2y c\u00f3 c\u00e1c t\u1eeb vi\u1ebft \u0111\u00fang ch\u00ednh t\u1ea3?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nD\u00f2ng c\u00f3 c\u00e1c t\u1eeb vi\u1ebft \u0111\u00fang ch\u00ednh t\u1ea3 l\u00e0: L\u1ebfch th\u1ebfch, l\u00e3i su\u1ea5t, kho\u1ea3nh kh\u1eafc.\n", "key": "C", "isVideo": true, "score": 0, "order": 13, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605413, "lessonId": 0, "a": "C\u00f4 b\u1ea1n nh\u1ecf \u0111ang ngh\u0129 v\u1ec1 r\u1eebng nh\u01b0 m\u1ed9t kho\u1ea3ng xanh trong m\u00e1t c\u00f3 c\u1ecf c\u00e2y, hoa l\u00e1, su\u1ed1i khe, chim ch\u00f3c.", "b": "N\u1ed7i nh\u1edb ng\u01b0\u1eddi y\u00eau lu\u00f4n th\u01b0\u1eddng ch\u1ef1c trong tr\u00e1i tim c\u00f4 g\u00e1i.", "c": "T\u00f4i thao th\u1ee9c su\u1ed1t \u0111\u00eam, h\u00ecnh dung con tr\u00e2u m\u1edbi c\u1ee7a m\u00ecnh.", "d": "M\u1ed9t m\u00f9i th\u01a1m lan t\u1ecfa kh\u1eafp kh\u00f4ng gian ban \u0111\u1ea7u \u0111\u00e3 \u0111\u00e1nh th\u1ee9c kh\u1ee9u gi\u00e1c c\u1ee7a t\u00f4i.", "bookId": 1089007, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "C\u00e2u n\u00e0o d\u01b0\u1edbi \u0111\u00e2y ch\u1ee9a t\u1eeb vi\u1ebft sai ch\u00ednh t\u1ea3?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nC\u00e2u \u201cN\u1ed7i nh\u1edb ng\u01b0\u1eddi y\u00eau lu\u00f4n th\u01b0\u1eddng ch\u1ef1c trong tr\u00e1i tim c\u00f4 g\u00e1i.\u201d c\u00f3 t\u1eeb \u201cth\u01b0\u1eddng ch\u1ef1c\u201d sai ch\u00ednh t\u1ea3.<br>\nS\u1eeda l\u1ea1i: N\u1ed7i nh\u1edb ng\u01b0\u1eddi y\u00eau lu\u00f4n <b>th\u01b0\u1eddng tr\u1ef1c</b> trong tr\u00e1i tim c\u00f4 g\u00e1i.\n", "key": "B", "isVideo": true, "score": 0, "order": 14, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, " 0e0 chuy\u1ec7n b\u00ecnh th\u01b0\u1eddng.", "bookId": 1089013, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Ch\u1ec9 ra c\u00e2u sai trong c\u00e1c c\u00e2u sau:", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nC\u00e2u \u201cKh\u00e1ch h\u00e0ng t\u1eeb ch\u1ed1i mua tr\u01b0\u1edbc khi \u0111\u00e3 th\u1eed l\u00e0 chuy\u1ec7n b\u00ecnh th\u01b0\u1eddng.\u201d sai v\u1ec1 logic. \u201cTr\u01b0\u1edbc khi\u201d di\u1ec5n t\u1ea3 m\u1ed9t h\u00e0nh \u0111\u1ed9ng x\u1ea3y ra tr\u01b0\u1edbc m\u1ed9t m\u1ed1c th\u1eddi gian n\u00e0o \u0111\u00f3 c\u00f2n \u201c\u0111\u00e3 th\u1eed\u201d l\u1ea1i ch\u1ec9 h\u00e0nh \u0111\u1ed9ng \u0111\u00e3 ho\u00e0n th\u00e0nh trong qu\u00e1 kh\u1ee9 khi\u1ebfn c\u00e2u m\u00e2u thu\u1eabn v\u1ec1 m\u1eb7t th\u1eddi gian.\n", "key": "B", "isVideo": true, "score": 0, "order": 20, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 21 \u0111\u1ebfn 25", "content": "\u201cM\u1ed9t c\u00f4ng b\u1ed1 m\u1edbi \u0111\u00e2y c\u1ee7a nh\u00e0 kh\u00ed h\u1eadu h\u1ecdc Alexandra Jahn \u1edf \u0110\u1ea1i h\u1ecdc Colorado Boulder v\u00e0 C\u00e9line Heuz\u00e9 \u1edf \u0110\u1ea1i h\u1ecdc Gothenburg \u1edf Th\u1ee5y \u0110i\u1ec3n \u0111\u00e3 s\u1eed d\u1ee5ng c\u00e1c m\u00f4 h\u00ecnh m\u00e1y t\u00ednh \u0111\u1ec3 d\u1ef1 \u0111o\u00e1n m\u00f9a h\u00e8 \u0111\u1ea7u ti\u00ean B\u1eafc B\u0103ng D\u01b0\u01a1ng c\u00f3 th\u1ec3 kh\u00f4ng c\u00f3 b\u0103ng.<br>Th\u1eadt kh\u00f3 t\u01b0\u1edfng t\u01b0\u1ee3ng \u0111\u1ebfn m\u1ed9t ng\u00e0y B\u1eafc B\u0103ng D\u01b0\u01a1ng kh\u00f4ng c\u00f3 b\u0103ng, v\u00ec \u0111i\u1ec1u n\u00e0y c\u00f3 th\u1ec3 t\u00e1c \u0111\u1ed9ng l\u1edbn \u0111\u1ebfn h\u1ec7 sinh th\u00e1i v\u00e0 kh\u00ed h\u1eadu to\u00e0n c\u1ea7u. D\u00f9 \u201cng\u00e0y \u0111\u1ea7u ti\u00ean kh\u00f4ng c\u00f3 b\u0103ng \u1edf B\u1eafc c\u1ef1c s\u1ebd kh\u00f4ng l\u00e0m thay \u0111\u1ed5i m\u1ecdi th\u1ee9 ngay\u201d, Alexandra Jahn, ph\u00f3 gi\u00e1o s\u01b0 t\u1ea1i Khoa Khoa h\u1ecdc Kh\u00ed quy\u1ec3n v\u00e0 \u0111\u1ea1i d\u01b0\u01a1ng v\u00e0 l\u00e0 nghi\u00ean c\u1ee9u vi\u00ean t\u1ea1i Vi\u1ec7n Nghi\u00ean c\u1ee9u B\u1eafc c\u1ef1c v\u00e0 n\u00fai cao \u0110\u1ea1i h\u1ecdc Colorado Boulder cho bi\u1ebft. \u201cNh\u01b0ng \u0111i\u1ec1u \u0111\u00f3 s\u1ebd cho th\u1ea5y r\u1eb1ng, ch\u00fang ta \u0111\u00e3 thay \u0111\u1ed5i c\u01a1 b\u1ea3n m\u1ed9t trong nh\u1eefng t\u00ednh ch\u1ea5t \u0111\u1eb7c tr\u01b0ng c\u1ee7a m\u00f4i tr\u01b0\u1eddng t\u1ef1 nhi\u00ean \u1edf B\u1eafc B\u0103ng D\u01b0\u01a1ng - v\u1ed1n l\u00e0 n\u01a1i b\u0103ng tuy\u1ebft ph\u1ee7 k\u00edn quanh n\u0103m, do ph\u00e1t th\u1ea3i kh\u00ed nh\u00e0 k\u00ednh\u201d. Ph\u00e1t hi\u1ec7n n\u00e0y \u0111\u00e3 \u0111\u01b0\u1ee3c c\u00f4ng b\u1ed1 tr\u00ean t\u1ea1p ch\u00ed Nature Communications.<br>Tr\u01b0\u1edbc c\u00f4ng b\u1ed1 n\u00e0y, c\u0169ng \u0111\u00e3 c\u00f3 nh\u1eefng nghi\u00ean c\u1ee9u kh\u00e1c v\u1ec1 m\u00f9a h\u00e8 b\u0103ng \u1edf B\u1eafc B\u0103ng D\u01b0\u01a1ng tan, xung quanh m\u1ed1c th\u1eddi gian 2030. H\u1ec7 qu\u1ea3 c\u1ee7a tan b\u0103ng \u1edf B\u1eafc c\u1ef1c \u0111\u1ebfn m\u00f4i tr\u01b0\u1eddng s\u1ed1ng c\u1ee7a con ng\u01b0\u1eddi v\u1eabn \u0111ang l\u00e0 ch\u1ee7 \u0111\u1ec1 \u0111\u01b0\u1ee3c gi\u1edbi nghi\u00ean c\u1ee9u kh\u00ed h\u1eadu tr\u00ean to\u00e0n th\u1ebf gi\u1edbi quan t\u00e2m.<br>Khi Tr\u00e1i \u0111\u1ea5t n\u00f3ng l\u00ean do l\u01b0\u1ee3ng kh\u00ed nh\u00e0 k\u00ednh ng\u00e0y c\u00e0ng t\u0103ng, b\u0103ng bi\u1ec3n \u1edf B\u1eafc B\u0103ng D\u01b0\u01a1ng \u0111\u00e3 tan v\u1edbi t\u1ed1c \u0111\u1ed9 ch\u01b0a t\u1eebng c\u00f3, h\u01a1n 12% m\u1ed7i th\u1eadp ni\u00ean. V\u00e0o th\u00e1ng 9 n\u0103m ngo\u00e1i, Trung t\u00e2m D\u1eef li\u1ec7u b\u0103ng v\u00e0 tuy\u1ebft qu\u1ed1c gia M\u1ef9 \u0111\u00e3 b\u00e1o c\u00e1o l\u01b0\u1ee3ng b\u0103ng bi\u1ec3n B\u1eafc B\u0103ng D\u01b0\u01a1ng th\u1ea5p \u1edf m\u1ee9c t\u1ed1i thi\u1ec3u trong n\u0103m nay - ng\u00e0y c\u00f3 l\u01b0\u1ee3ng n\u01b0\u1edbc bi\u1ec3n \u0111\u00f3ng b\u0103ng \u00edt nh\u1ea5t \u1edf B\u1eafc C\u1ef1c - l\u00e0 m\u1ed9t trong nh\u1eefng m\u1ee9c th\u1ea5p nh\u1ea5t \u0111\u01b0\u1ee3c ghi nh\u1eadn k\u1ec3 t\u1eeb n\u0103m 1978. L\u1edbp b\u0103ng c\u00f2n l\u1ea1i v\u00e0o cu\u1ed1i m\u00f9a h\u00e8 \u0111\u01b0\u1ee3c g\u1ecdi l\u00e0 b\u0103ng bi\u1ec3n nhi\u1ec1u n\u0103m v\u00e0 d\u00e0y h\u01a1n \u0111\u00e1ng k\u1ec3 so v\u1edbi l\u1edbp b\u0103ng theo m\u00f9a. Ch\u1ec9 trong v\u00f2ng kho\u1ea3ng 40 n\u0103m, l\u1edbp b\u0103ng bi\u1ec3n d\u00e0y nhi\u1ec1u n\u0103m \u1edf B\u1eafc B\u0103ng D\u01b0\u01a1ng \u0111\u00e3 gi\u1ea3m ch\u1ec9 c\u00f2n kho\u1ea3ng h\u01a1n 4,28 tri\u1ec7u km<sup>2</sup>, t\u1ee9c l\u00e0 gi\u1ea3m m\u1ed9t ph\u1ea7n ba so v\u1edbi kho\u1ea3ng 6,85 tri\u1ec7u km<sup>2</sup> duy tr\u00ec t\u1eeb 1979 \u0111\u1ebfn 1992. So s\u00e1nh d\u1ec5 h\u00ecnh dung, di\u1ec7n t\u00edch b\u0103ng b\u1ecb m\u1ea5t \u0111i n\u00e0y t\u01b0\u01a1ng \u0111\u01b0\u01a1ng v\u1edbi di\u1ec7n t\u00edch c\u1ee7a \u0111\u1ea5t n\u01b0\u1edbc \u1ea4n \u0110\u1ed9.<br>C\u00e1c nh\u00e0 khoa h\u1ecdc \u0111\u1ecbnh ngh\u0129a, khi B\u1eafc B\u0103ng D\u01b0\u01a1ng c\u00f3 d\u01b0\u1edbi 1 tri\u1ec7u km<sup>2</sup> b\u0103ng l\u00e0 t\u00ecnh tr\u1ea1ng B\u1eafc B\u0103ng D\u01b0\u01a1ng kh\u00f4ng c\u00f3 b\u0103ng. Ng\u01b0\u1ee1ng d\u01b0\u1edbi 1 tri\u1ec7u km2 n\u00e0y ch\u1ec9 t\u01b0\u01a1ng \u0111\u01b0\u01a1ng ch\u01b0a \u0111\u1ebfn m\u1ed9t ph\u1ea7n s\u00e1u l\u01b0\u1ee3ng b\u0103ng v\u00e0o nh\u1eefng n\u0103m 1980, \u0111\u00e1nh d\u1ea5u m\u1ed9t tr\u1ea1ng th\u00e1i ho\u00e0n to\u00e0n m\u1edbi c\u1ee7a h\u1ec7 sinh th\u00e1i B\u1eafc C\u1ef1c, s\u1ebd d\u1eabn t\u1edbi nhi\u1ec1u h\u1eadu qu\u1ea3 v\u1ec1 kh\u00ed h\u1eadu v\u00e0 m\u00f4i tr\u01b0\u1eddng, thay \u0111\u1ed5i c\u01a1 b\u1ea3n trong ho\u1ea1t \u0111\u1ed9ng sinh h\u1ecdc c\u1ee7a \u0111\u1ea1i d\u01b0\u01a1ng m\u00e0 \u0111\u1ebfn nay ch\u01b0a th\u1ec3 \u0111\u00e1nh gi\u00e1 h\u1ebft t\u00e1c \u0111\u1ed9ng. Tr\u01b0\u1edbc ti\u00ean, c\u00e1c lo\u00e0i s\u1ed1ng \u1edf B\u1eafc C\u1ef1c s\u1ebd \u1ea3nh h\u01b0\u1edfng, sau \u0111\u00f3 c\u00e1c lo\u00e0i t\u00f4m c\u00e1 t\u1eeb c\u00e1c v\u00f9ng bi\u1ec3n \u1ea5m c\u0169ng di c\u01b0 d\u1ea7n l\u00ean \u0111\u00e2y. B\u0103ng bi\u1ec3n tan c\u0169ng s\u1ebd g\u00e2y s\u00f3ng bi\u1ec3n l\u1edbn h\u01a1n, x\u00f3i l\u1edf b\u1edd bi\u1ec3n, \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn c\u00e1c c\u1ed9ng \u0111\u1ed3ng ven bi\u1ec3n.\u201d<br><div style=\"text-align: right;\">(B\u1ea3o Nh\u01b0 d\u1ecbch, <i>M\u00f9a h\u00e8 \u0111\u1ea7u ti\u00ean B\u1eafc B\u0103ng D\u01b0\u01a1ng h\u1ea7u nh\u01b0 kh\u00f4ng c\u00f2n b\u0103ng: C\u00f3 th\u1ec3 v\u00e0o 2027</i>, theo <i>tiasang.com.vn</i>)</div>", "listQuestion": [{"questionId": 21605457, "lessonId": 0, "a": "2027.", "b": "2028.", "c": "2029.", "d": "2030.", "bookId": 1089014, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Theo c\u00f4ng b\u1ed1 m\u1edbi \u0111\u00e2y c\u1ee7a c\u00e1c nh\u00e0 kh\u00ed h\u1eadu h\u1ecdc, m\u00f9a h\u00e8 \u0111\u1ea7u ti\u00ean B\u1eafc B\u0103ng D\u01b0\u01a1ng c\u00f3 th\u1ec3 kh\u00f4ng c\u00f3 b\u0103ng c\u00f3 th\u1ec3 l\u00e0 n\u0103m n\u00e0o?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nD\u1ef1a v\u00e0o th\u00f4ng tin trong ph\u1ea7n tr\u00edch d\u1eabn ngu\u1ed3n c\u1ee7a v\u0103n b\u1ea3n: \u201cM\u00f9a h\u00e8 \u0111\u1ea7u ti\u00ean B\u1eafc B\u0103ng D\u01b0\u01a1ng h\u1ea7u nh\u01b0 kh\u00f4ng c\u00f2n b\u0103ng: C\u00f3 th\u1ec3 v\u00e0o 2027\u201d<br>\n\u2192 Theo c\u00f4ng b\u1ed1 m\u1edbi \u0111\u00e2y c\u1ee7a c\u00e1c nh\u00e0 kh\u00ed h\u1eadu         let userAnswers = {}; // Store: { qId: value }
        let isSubmitted = false;
        let examMode = 'practice'; // 'practice' or 'exam'
        let startTime = Date.now();
        let timerInterval;
        let activeInput = null; // Track input đang focus để bàn phím ảo nhập vào

        // --- INIT ---
        window.onload = function() {
            renderExam();
            startTimer();
            document.getElementById('mode-select').addEventListener('change', (e) => {
                if(isSubmitted) return;
                if(confirm('Đổi chế độ sẽ làm mới lại trạng thái hiển thị (không mất bài làm). Tiếp tục?')) {
                    examMode = e.target.value;
                    renderExam(false); 
                } else {
                    e.target.value = examMode;
                }
            });

            // Ẩn bàn phím khi click ra ngoài
            document.addEventListener('click', (e) => {
                const numpad = document.getElementById('virtual-numpad');
                const isInput = e.target.classList.contains('char-input');
                const isNumpad = numpad.contains(e.target);
                
                if (!isInput && !isNumpad) {
                    numpad.classList.remove('active');
                    activeInput = null;
                }
            });
        };

        // --- TIMER LOGIC ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- SCROLL HELPER (SỬA LỖI MỤC LỤC DESKTOP) ---
        function scrollToQuestion(qKey) {
            const el = document.getElementById(`question-${qKey}`);
            if (el) {
                // Scroll native với offset (do header fixed)
                // Sử dụng phương pháp cũ nhưng chắc chắn hoạt động hơn scrollIntoView trên container cuộn
                // Lấy tọa độ tương đối so với viewport
                const yOffset = -80; // Trừ header
                const y = el.getBoundingClientRect().top + window.pageYOffset + yOffset;
                
                window.scrollTo({top: y, behavior: 'smooth'});
                
                // Highlight hiệu ứng
                el.classList.add('ring-2', 'ring-moon', 'ring-offset-2');
                setTimeout(() => el.classList.remove('ring-2', 'ring-moon', 'ring-offset-2'), 1500);
            }
            // Đóng mobile palette nếu đang mở
            document.getElementById('mobile-palette').classList.add('hidden');
        }

        // --- RENDER ENGINE ---
        function renderExam(reset = false) {
            const container = document.getElementById('exam-content');
            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; 
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

            let globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`;
                    const qType = q.normalizedType;
                    
                    // -- Palette Item (FIX ONCLICK SCOPE) --
                    // Sử dụng arrow function trong JS string template cẩn thận
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    
                    // Gán sự kiện click trực tiếp thay vì chuỗi string HTML để tránh lỗi scope
                    palBtn.addEventListener('click', function() { scrollToQuestion(qKey); });
                    
                    palDesk.appendChild(palBtn.cloneNode(true)); // Desktop clone cần gán lại event nếu cloneNode ko copy event
                    // Clone node không copy event listener. Phải tạo 2 nút riêng hoặc gán lại.
                    // Cách tốt nhất: tạo chuỗi HTML hoặc append element.
                    // Ở đây để đơn giản ta gán onclick bằng attribute string cho chắc ăn
                    palBtn.setAttribute('onclick', `scrollToQuestion('${qKey}')`);
                    
                    // Sau khi set attribute, append lại
                    palDesk.innerHTML = palDesk.innerHTML; // Reset để xoá nút cũ? Không nên.
                    // Code cũ append child.
                    
                    // Fix triệt để: Tạo string HTML cho palette
                    // (Đã sửa ở dưới)
                });
            });
            
            // Render lại từ đầu để tối ưu
            palDesk.innerHTML = '';
            palMob.innerHTML = '';
            container.innerHTML = '';
            globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`;
                    const qType = q.normalizedType;

                    // Palette Buttons
                    const btnClass = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    const btnHtml = `<button id="pal_${qKey}" onclick="scrollToQuestion('${qKey}')" class="${btnClass}">${qId}</button>`;
                    
                    palDesk.innerHTML += btnHtml;
                    palMob.innerHTML += btnHtml;

                    // Question Card
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'question-card bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // TYPE 0: MCQ
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { 
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; 
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // TYPE 1 & 3: FILL KEY
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const chars = userVal.split('');
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let boxesHtml = '<div class="flex gap-2 justify-start items-center">';
                        for(let i=0; i<4; i++) {
                            const char = chars[i] || '';
                            boxesHtml += `<input type="text" maxlength="1" 
                                class="char-input" 
                                data-index="${i}" 
                                data-key="${qKey}" 
                                value="${char}" 
                                readonly 
                                onclick="activateNumpad(this, '${qKey}')"
                                ${isSubmitted ? 'disabled' : ''} 
                            />`;
                        }
                        
                        if(examMode === 'practice' && !isSubmitted) {
                             boxesHtml += `<button onclick="checkFillAnswer('${qKey}')" class="ml-2 px-3 py-2 bg-blue-100 text-blue-700 font-bold rounded-lg text-sm hover:bg-blue-200 transition-colors">Kiểm tra</button>`;
                             // Nút xem lời giải cho practice
                             boxesHtml += `<button onclick="toggleSolution('${qKey}')" class="ml-2 px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button>`;
                        }
                        boxesHtml += '</div>';

                        let feedbackHtml = "";
                        if(isSubmitted) {
                             const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                             if(isCorrect) {
                                feedbackHtml = `<div class="mt-2 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                             } else {
                                feedbackHtml = `<div class="mt-2 text-red-600 text-sm">✗ Sai. Đáp án: <span class="font-bold">${correctVal}</span></div>`;
                             }
                        } else if (examMode === 'practice') {
                             feedbackHtml = `<div id="feedback-${qKey}" class="mt-2 text-sm font-bold hidden"></div>`;
                        }

                        html += `
                        <div class="flex flex-col relative">
                            ${boxesHtml}
                            ${feedbackHtml}
                        </div>`;
                    }

                    // TYPE 2: TRUE/FALSE
                    else if(qType === '2') {
                         html += `<div class="overflow-hidden border rounded-lg">
                            <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                                <tr>
                                    <th scope="col" class="px-3 py-3 w-10 text-center">Ý</th>
                                    <th scope="col" class="px-3 py-3">Nội dung</th>
                                    <th scope="col" class="px-3 py-3 w-32 text-center">Chọn Đ/S</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; 
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; 
                                const userChoice = userObj[pIdx]; 
                                
                                let trClass = "bg-white hover:bg-gray-50";
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) trClass = "bg-green-50";
                                    else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
