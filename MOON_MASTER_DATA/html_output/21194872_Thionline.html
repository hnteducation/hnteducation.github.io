ea1n c\u00f2n l\u1ea1i tr\u00ean c\u00e1c c\u1ea1nh c\u0169ng b\u1eb1ng nhau: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7fc27396-b04b-4642-99b5-e9f9d63243cb.png\"/>.<br>3. <b>X\u00e9t c\u00e1c tam gi\u00e1c vu\u00f4ng \u1edf g\u00f3c:</b> So s\u00e1nh c\u00e1c tam gi\u00e1c vu\u00f4ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/fd4e2880-51e0-46a6-8d80-bffba3f26842.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/c0e702bf-11ae-4ebf-90d8-473ca12d13ea.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/e35a1381-1806-4ece-b524-f474b9d3de1a.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ee1182a9-d229-4790-ab68-654d8f1bbae2.png\"/>.<br>4. <b>Suy ra t\u00ednh ch\u1ea5t c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/c9e23c7b-bb22-43e8-8175-87b13352c6b6.png\"/>:</b> D\u1ef1a v\u00e0o s\u1ef1 b\u1eb1ng nhau c\u1ee7a c\u00e1c tam gi\u00e1c \u1edf g\u00f3c, suy ra t\u00ednh ch\u1ea5t v\u1ec1 c\u1ea1nh v\u00e0 g\u00f3c c\u1ee7a t\u1ee9 gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/5a89fd4e-8497-4695-90d3-46f994608e0e.png\"/>.<br><b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>So s\u00e1nh c\u00e1c \u0111o\u1ea1n th\u1eb3ng:<br>G\u1ecdi \u0111\u1ed9 d\u00e0i c\u1ea1nh h\u00ecnh vu\u00f4ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/c405ede0-3256-4d6d-a189-71149cc51506.png\"/> l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b21e9c32-36d9-4c43-850c-92593b590549.png\"/>.<br>\u0110\u1eb7t <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/32b95112-94e9-4652-8ed1-fb656f27c264.png\"/>.<br>Khi \u0111\u00f3: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b4837b2a-35cf-46d3-bd23-ca1779590397.png\"/>.<br>T\u01b0\u01a1ng t\u1ef1: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/18826629-eebb-4e73-8ce1-7649b32577f9.png\"/>.<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d9c446a9-cc8f-43eb-a59b-b4afec23bedf.png\"/>.<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/092aa601-f100-4766-bc9a-90a58335c36c.png\"/>.<br>V\u1eady, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/31b77a8b-e42e-45b8-b726-1d33302b61de.png\"/>.<br>X\u00e9t c\u00e1c tam gi\u00e1c vu\u00f4ng \u1edf g\u00f3c:<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0e78578d-4f12-40d4-a8f9-86f7feebeb84.png\"/>: vu\u00f4ng t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/80c95d44-c4e1-4188-945b-e3d46f0b5f90.png\"/>, c\u1ea1nh g\u00f3c vu\u00f4ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/5fdf410d-8013-4cec-99d1-fe636ea6f1e4.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/192c34a4-e754-4203-9746-dd44e6d3376e.png\"/>.<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0a1b960c-2dc3-4c66-90fd-2d0e4082fc0d.png\"/>: vu\u00f4ng t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f21ff42f-71a6-418c-82e8-15b46d38fba5.png\"/>, c\u1ea1nh g\u00f3c vu\u00f4ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/fde2a727-1cf3-4138-b0db-65a03ea79829.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f524337e-e1e2-4066-a5d9-7bf9f3ddece4.png\"/>.<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/e9001de7-3a5e-40e6-bfe1-b36305080c1c.png\"/>: vu\u00f4ng t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f0f06807-8fad-4533-bfc6-b3b02eeba7b3.png\"/>, c\u1ea1nh g\u00f3c vu\u00f4ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/907793ce-6932-405e-815c-ae3e3607a0cf.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/687b07a8-ef0b-4515-b8e4-1b4367560dce.png\"/>.<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d6937f0d-59ab-4cd1-8d63-e22bb0f37ffc.png\"/>: vu\u00f4ng t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/58134d87-41d3-4831-8094-f72009ff10b2.png\"/>, c\u1ea1nh g\u00f3c vu\u00f4ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/1d298a81-5e0c-4d8f-bfe8-de73cdc161f1.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/1101c497-4eb9-455f-9d28-0b7e8445800c.png\"/>.<br>C\u1ea3 b\u1ed1n tam gi\u00e1c vu\u00f4ng n\u00e0y b\u1eb1ng nhau theo tr\u01b0\u1eddng h\u1ee3p <b>c\u1ea1nh - g\u00f3c - c\u1ea1nh</b> (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/53da3a86-d85c-4463-9364-1ac41fd8eb65.png\"/>).<br>Suy ra t\u00ednh ch\u1ea5t c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/2012d871-149b-4a06-980e-7e51849a7190.png\"/>:<br>C\u1ea1nh: V\u00ec c\u00e1c tam gi\u00e1c vu\u00f4ng \u1edf g\u00f3c b\u1eb1ng nhau, c\u00e1c c\u1ea1nh huy\u1ec1n t\u01b0\u01a1ng \u1ee9ng c\u1ee7a ch\u00fang c\u0169ng b\u1eb1ng nhau: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0d520173-4270-459b-a42e-40b3578cad4a.png\"/>. Do \u0111\u00f3, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7ef30e91-2a82-4564-81ba-40ab3e19e431.png\"/> l\u00e0 m\u1ed9t <b>h\u00ecnh thoi</b>.<br>T\u1eeb <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/c0842a63-a98c-48f5-887c-05166c40796e.png\"/> suy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/cae006d2-b373-4a4b-8cf4-d3de30984ba4.png\"/> (2 g\u00f3c t\u01b0\u01a1ng \u1ee9ng) <br>m\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/eae608db-f371-4213-9f6c-5bae1b3d3f32.png\"/> (2 g\u00f3c ph\u1ee5 nhau)  <br>Suy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/5c9ebebc-0f01-47ad-ad28-f70afd8e4f4e.png\"/> <br>Ta c\u00f3: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b0d4364f-2f9e-46e7-bbb6-1a854f03bbd6.png\"/> <br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/30bc614f-1625-457e-8f04-8a8c56f5627c.png\"/> <br>H\u00ecnh thoi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/5a89abe6-63c6-4fbe-9649-fe1a66afec98.png\"/> c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/be286a92-a392-4e6f-9985-aa75aac7e5e5.png\"/> suy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/48c9d9fa-646f-42e5-902d-44b9949c97d6.png\"/> l\u00e0 h\u00ecnh vu\u00f4ng.  <br><b>\u2705 K\u1ebft lu\u1eadn: Ch\u1ecdn \u0111\u00e1p \u00e1n C.</b>", "key": "C", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 1, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21200347, "lessonId": 0, "a": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6939337e-cf97-474f-9c6b-f481441a066f.png\"/>", "b": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/2c26b177-5d1a-452a-a5c2-7d799c9d9f41.png\"/>", "c": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a8b1808d-0b06-49dc-9417-c32ea1b83512.png\"/>", "d": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a458d127-d38f-4f90-9b37-9d998812e40a.png\"/>", "bookId": 1055549, "comments": 0, "bookmarks": 4, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Cho t\u1ee9 gi\u00e1c ABCD. G\u1ecdi M, N, P, Q l\u1ea7n l\u01b0\u1ee3t l\u00e0 trung \u0111i\u1ec3m c\u1ee7a c\u00e1c c\u1ea1nh AB, BC, CD, DA v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f02b0281-1db3-48eb-97e4-b67b94c048e7.png\"/> Hai \u0111\u01b0\u1eddng ch\u00e9o AC v\u00e0 BD c\u1ea7n th\u1ecfa m\u00e3n \u0111i\u1ec1u ki\u1ec7n g\u00ec \u0111\u1ec3 t\u1ee9 gi\u00e1c MNPQ l\u00e0 h\u00ecnh vu\u00f4ng?", "answer": "<img src=\"https://asset.moon.vn/img/chat/large/2025/10/90dee288-1d53-4b8d-b8ae-3b3fa621d5b3.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><b><br></b>\n\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>1. <b>X\u00e1c \u0111\u1ecbnh h\u00ecnh d\u1ea1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a5af2998-bbb5-4d01-9eb0-85f82561762a.png\"/>:</b> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a8059bc9-78d5-4e74-8d34-113c6aa1890f.png\"/> l\u00e0 trung \u0111i\u1ec3m c\u00e1c c\u1ea1nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/334f1363-a9fb-4849-bde7-e740e09ecb43.png\"/>. Theo \u0111\u1ecbnh l\u00fd Varignon, t\u1ee9 gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7abf8f79-b08e-4405-9007-727cb4c446ff.png\"/> n\u1ed1i c\u00e1c trung \u0111i\u1ec3m lu\u00f4n l\u00e0 m\u1ed9t <b>h\u00ecnh b\u00ecnh h\u00e0nh</b>.<br>2. <b>Li\u00ean h\u1ec7 c\u00e1c c\u1ea1nh c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/2f5ede7a-21e0-46ab-aac7-d88269c0964b.png\"/> v\u1edbi \u0111\u01b0\u1eddng ch\u00e9o <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/cfa6ab0f-6ed8-4343-920f-dea8bd42b134.png\"/>:</b><br>MN l\u00e0 \u0111\u01b0\u1eddng trung b\u00ecnh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6a52ac73-3b8a-45cc-86bb-8aed54f48f29.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/625b726b-1945-43d2-979e-95220a00d32a.png\"/>.<br>MQ l\u00e0 \u0111\u01b0\u1eddng trung b\u00ecnh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7b5e5d93-ef68-47b0-b378-2f1ed083c564.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/9dd0aadc-3376-4183-b8b7-9bc5ae50e665.png\"/>.<br>3. <b>\u0110i\u1ec1u ki\u1ec7n \u0111\u1ec3 h\u00ecnh b\u00ecnh h\u00e0nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/80df272f-b3c5-46d4-a558-5cd7d71121fb.png\"/> l\u00e0 h\u00ecnh vu\u00f4ng:</b> H\u00ecnh b\u00ecnh h\u00e0nh l\u00e0 h\u00ecnh vu\u00f4ng khi n\u00f3 v\u1eeba l\u00e0 h\u00ecnh ch\u1eef nh\u1eadt, v\u1eeba l\u00e0 h\u00ecnh thoi.<br>\u0110i\u1ec1u ki\u1ec7n h\u00ecnh ch\u1eef nh\u1eadt: C\u1ea7n c\u00f3 m\u1ed9t g\u00f3c vu\u00f4ng, v\u00ed d\u1ee5 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0b762584-534b-4541-b3a0-57968b1ce8c2.png\"/>. V\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/06a2962f-0fab-4d27-a5c8-9e4dbb48ba94.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/3b1b5fd3-e0de-4dd8-b12f-4b136271d5df.png\"/>, \u0111i\u1ec1u n\u00e0y x\u1ea3y ra khi v\u00e0 ch\u1ec9 khi hai \u0111\u01b0\u1eddng ch\u00e9o <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/823cd71c-22b3-48c0-b3d0-bf2d32167ac0.png\"/>.<br>\u0110i\u1ec1u ki\u1ec7n h\u00ecnh thoi: C\u1ea7n c\u00f3 hai c\u1ea1nh k\u1ec1 b\u1eb1ng nhau, v\u00ed d\u1ee5 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/124bf5bb-2b3b-47a3-8487-cf9ed181c94e.png\"/>. V\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0cae21d7-c58f-420b-bf3e-680fb85abf17.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6733e2fc-b713-4e46-91d9-6941579ced78.png\"/>, \u0111i\u1ec1u n\u00e0y x\u1ea3y ra khi v\u00e0 ch\u1ec9 khi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/3ee29441-9144-4487-a6ba-4560fe3d6421.png\"/>.<br>4. <b>K\u1ebft h\u1ee3p \u0111i\u1ec1u ki\u1ec7n:</b> \u0110\u1ec3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0d42af3a-a3c5-4940-bf9f-2a43925f6371.png\"/> l\u00e0 h\u00ecnh vu\u00f4ng, c\u1ea3 hai \u0111i\u1ec1u ki\u1ec7n tr\u00ean ph\u1ea3i \u0111\u1ed3ng th\u1eddi x\u1ea3y ra: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/2d091594-465c-4bdd-ab53-96f23ee85051.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7b8736d0-855e-4d4f-a61e-3b89d2953bd6.png\"/>.<br><b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>V\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/389a4bdf-b6be-4ea9-b5e8-94db5e5a0470.png\"/> l\u00e0 trung \u0111i\u1ec3m c\u00e1c c\u1ea1nh, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/e8d1d2f9-6520-4588-819b-cfaa58dc90c4.png\"/> l\u00e0 h\u00ecnh b\u00ecnh h\u00e0nh.<br>C\u00e1c c\u1ea1nh c\u1ee7a h\u00ecnh b\u00ecnh h\u00e0nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/1098de1d-365d-4efc-87e9-a41549c78ef5.png\"/> li\u00ean quan \u0111\u1ebfn \u0111\u01b0\u1eddng ch\u00e9o c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/06ed8d93-e6cf-4712-8f43-43eadf1d0ede.png\"/>:<br>MN = PQ = <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/2eb50a55-0150-49e3-8d1d-8381f031dd9d.png\"/><br>MQ = NP = <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/bf12c529-0f5a-47ed-a40c-34ed7824a3ca.png\"/><br>MN // PQ // AC<br>MQ // NP // BD<br>\u0110\u1ec3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f909da45-1646-4a83-8198-41272f6a93cc.png\"/> l\u00e0 h\u00ecnh vu\u00f4ng, n\u00f3 ph\u1ea3i l\u00e0 h\u00ecnh ch\u1eef nh\u1eadt v\u00e0 h\u00ecnh thoi.<br>MNPQ l\u00e0 h\u00ecnh ch\u1eef nh\u1eadt <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b038da08-1dda-49dc-8a9a-39772171e4f5.png\"/> c\u00f3 m\u1ed9t g\u00f3c vu\u00f4ng (v\u00ed d\u1ee5 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d9f8243c-dda1-43fe-a44f-22697a1157e0.png\"/>) <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/872b4e8f-9511-4186-b928-5c38e11fd29a.png\"/>.<br>MNPQ l\u00e0 h\u00ecnh thoi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/343cf6ae-2afc-444b-83a6-e42be9350d26.png\"/> c\u00e1c c\u1ea1nh b\u1eb1ng nhau (MN=MQ) <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d28cc1f0-2843-4e90-b844-9fa7723447d3.png\"/>.<br>V\u1eady, \u0111\u1ec3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a68b9338-d821-4b82-ae45-a769457f964f.png\"/> l\u00e0 h\u00ecnh vu\u00f4ng, ta c\u1ea7n c\u1ea3 hai \u0111i\u1ec1u ki\u1ec7n: <b><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/2f258980-511c-4899-86f0-d612fe083566.png\"/></b> v\u00e0 <b><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/529aac62-a900-493b-80a8-33604093206b.png\"/></b>.<br><b>\u2705 K\u1ebft lu\u1eadn: Ch\u1ecdn \u0111\u00e1p \u00e1n B.</b>", "key": "B", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 1, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21200349, "lessonId": 0, "a": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f8157d71-f8b7-49fd-b34b-92b6bba6f7c9.png\"/>", "b": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/1fe54bb1-d3ab-4661-9517-0d18f3f6f2cd.png\"/>", "c": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/93be29c0-5c4b-4200-80ce-f8f5d00cd23a.png\"/>", "d": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/816fd7ee-a441-4aac-b3d2-56275aa00432.png\"/>", "bookId": 1055550, "comments": 1, "bookmarks": 5, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Cho tam gi\u00e1c ABC vu\u00f4ng t\u1ea1i A. G\u1ecdi M, N, P l\u1ea7n l\u01b0\u1ee3t l\u00e0 c\u00e1c trung \u0111i\u1ec3m c\u1ee7a AB, BC, AC v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b12c291a-4a82-41fb-872c-8488d471fc94.png\"/> Tam gi\u00e1c ABC c\u1ea7n c\u00f3 th\u00eam \u0111i\u1ec1u ki\u1ec7n g\u00ec \u0111\u1ec3 h\u00ecnh ch\u1eef nh\u1eadt AMNP l\u00e0 h\u00ecnh vu\u00f4ng?", "answer": "<img src=\"https://asset.moon.vn/img/chat/large/2025/10/c14687d4-6e3a-4b57-937b-a4709564f7cb.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br>\n\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\n1. <b>X\u00e1c \u0111\u1ecbnh h\u00ecnh d\u1ea1ng AMNP:</b> D\u1ef1a v\u00e0o gi\u1ea3 thi\u1ebft M, N, P l\u00e0 trung \u0111i\u1ec3m v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/82193ba3-96a6-45b4-b794-6aad628b1b69.png\"/> vu\u00f4ng t\u1ea1i A, ta ch\u1ee9ng minh AMNP l\u00e0 h\u00ecnh ch\u1eef nh\u1eadt.<br>\n2. <b>\u0110i\u1ec1u ki\u1ec7n \u0111\u1ec3 l\u00e0 h\u00ecnh vu\u00f4ng:</b> H\u00ecnh ch\u1eef nh\u1eadt l\u00e0 h\u00ecnh vu\u00f4ng khi c\u00f3 hai c\u1ea1nh k\u1ec1 b\u1eb1ng nhau.<br>\n3. <b>Li\u00ean h\u1ec7 v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a686009a-08d6-48cd-9f8e-4d6d06bd0104.png\"/>:</b> T\u00ecm m\u1ed1i quan h\u1ec7 gi\u1eefa c\u00e1c c\u1ea1nh k\u1ec1 c\u1ee7a AMNP v\u1edbi c\u00e1c c\u1ea1nh c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/098c6986-2814-4a3f-9688-06b806d69d49.png\"/>.<br>\n\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>\nCh\u1ee9ng minh AMNP l\u00e0 h\u00ecnh ch\u1eef nh\u1eadt:<br>\nCho <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b4aa9044-0d00-4079-a599-6228d164a1ae.png\"/> vu\u00f4ng t\u1ea1i A. M, N, P l\u1ea7n l\u01b0\u1ee3t l\u00e0 trung \u0111i\u1ec3m c\u1ee7a AB, BC, AC.<br>\nX\u00e9t t\u1ee9 gi\u00e1c AMNP:<br>\nMN l\u00e0 \u0111\u01b0\u1eddng trung b\u00ecnh c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/dcc822dd-453f-4a1d-a560-a713e59285c0.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/4ae76fdd-f27d-48f9-93c9-160fe725e9a6.png\"/>.<br>\nNP l\u00e0 \u0111\u01b0\u1eddng trung b\u00ecnh c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6faf04ab-7686-43d3-ba52-59150fe848e0.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b5b89532-7758-45c9-ada4-5491c9ebf4c3.png\"/>.<br>\nV\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/4938975f-dddb-4450-8be6-1d1672b07c45.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/4db7597d-dbf0-44f6-8c8d-062d831a263d.png\"/>, t\u1ee9 gi\u00e1c AMNP l\u00e0 h\u00ecnh b\u00ecnh h\u00e0nh.<br>\nH\u00ecnh b\u00ecnh h\u00e0nh AMNP c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/67bc6b66-b0bc-4471-9271-4230b5e87afb.png\"/> (do <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b611a400-24f7-4e22-9116-78982e62a1f5.png\"/> vu\u00f4ng t\u1ea1i A).<br>\nV\u1eady, AMNP l\u00e0 h\u00ecnh ch\u1eef nh\u1eadt.<br>\n\n\u0110i\u1ec1u ki\u1ec7n \u0111\u1ec3 AMNP l\u00e0 h\u00ecnh vu\u00f4ng:<br>\n\u0110\u1ec3 h\u00ecnh ch\u1eef nh\u1eadt AMNP l\u00e0 h\u00ecnh vu\u00f4ng, c\u1ea7n c\u00f3 hai c\u1ea1nh k\u1ec1 b\u1eb1ng nhau, v\u00ed d\u1ee5: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/61976259-9c68-4d41-a0fa-479ea4adef32.png\"/>.<br>\n\nLi\u00ean h\u1ec7 v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/1e4b8a10-bd65-4d52-b3cc-1f722710f3db.png\"/>:<br>\nTa c\u00f3: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/047d8d75-488d-4178-bd51-270c7f7e8b50.png\"/> (M l\u00e0 trung \u0111i\u1ec3m AB) v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/52092315-cf29-447e-a32c-a9c7cfd6611a.png\"/> (P l\u00e0 trung \u0111i\u1ec3m AC).<br>\n\u0110i\u1ec1u ki\u1ec7n <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/eca65fc1-a649-4e4a-9136-8938c4c55e3a.png\"/> t\u01b0\u01a1ng \u0111\u01b0\u01a1ng v\u1edbi:<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f6ac1ab2-c5ed-4b4e-a32f-6a8f1b12d54d.png\"/>.<br>\nV\u1eady, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6f2b2f45-ec60-4bec-afe9-1ebe3fda877b.png\"/> ph\u1ea3i c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new- 1b-4efe-8f92-5b27e7db7cd5.png\"/>. Do \u0111\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/4bf34542-9c68-4f1c-b8ec-e1fd3e27dd7b.png\"/> l\u00e0 <b>h\u00ecnh thoi</b>.<br>\n\nH\u00ecnh thoi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d493107d-437d-4719-969f-5dc0b8a3d481.png\"/> c\u00f3 m\u1ed9t g\u00f3c vu\u00f4ng (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/fb773ff9-74c2-4281-baf6-b3edec6a2106.png\"/>) n\u00ean l\u00e0 <b>h\u00ecnh vu\u00f4ng</b>.<br><b>\n\n\n\u2705 K\u1ebft lu\u1eadn: Ch\u1ecdn \u0111\u00e1p \u00e1n D.</b>", "key": "D", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 1, "plans": [], "answerPlans": [], "normalizedType": "0"}]}];
        let userAnswers = {}; // Store: { qId: value }
        let isSubmitted = false;
        let examMode = 'practice'; // 'practice' or 'exam'
        let startTime = Date.now();
        let timerInterval;

        // --- INIT ---
        window.onload = function() {
            renderExam();
            startTimer();
            document.getElementById('mode-select').addEventListener('change', (e) => {
                if(isSubmitted) return;
                if(confirm('Đổi chế độ sẽ làm mới lại trạng thái hiển thị (không mất bài làm). Tiếp tục?')) {
                    examMode = e.target.value;
                    renderExam(false); // Re-render without resetting answers
                } else {
                    e.target.value = examMode;
                }
            });
        };

        // --- TIMER LOGIC ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- RENDER ENGINE ---
        function renderExam(reset = false) {
            const container = document.getElementById('exam-content');
            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; // Clear to re-render
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

            let globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                // Render Group Header
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`; // Unique Key for storage
                    const qType = q.normalizedType;
                    
                    // -- Palette Item --
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop
                    palMob.appendChild(palBtn); // Add to Mobile

                    // -- Question Card --
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    // Header: Question Number
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    // Interaction Area
                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // === TYPE 0: MCQ ===
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            // Logic hiển thị kết quả
                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { // Chọn đúng
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { // Đúng nhưng không chọn (hiện đáp án khi nộp)
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { // Chọn sai
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; // Hiện đáp án đúng sau khi nộp dù chưa làm
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // === TYPE 1 & 3: FILL KEY ===
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let inputClass = "w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all font-mono";
                        let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
