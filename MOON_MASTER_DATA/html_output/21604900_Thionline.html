\u0111\u00e2y?", "answer": "\u0110o\u1ea1n tr\u00edch k\u1ec3 v\u1ec1 c\u00e2u chuy\u1ec7n ng\u01b0\u1eddi em \u00fat v\u00e0 ch\u1ecb s\u1ed1ng s\u00f3t sau tr\u1eadn \u0111\u1ea1i h\u1ed3ng th\u1ee7y nh\u1edd chi\u1ebfc tr\u1ed1ng g\u1ed7 v\u00e0 c\u00e2y tre. Sau khi xu\u1ed1ng \u0111\u01b0\u1ee3c m\u1eb7t \u0111\u1ea5t, ng\u01b0\u1eddi em \u00fat \u0111\u00e3 n\u00f3i r\u1eb1ng s\u1ebd th\u1edd tre l\u00e0m t\u1ed5 ti\u00ean v\u00ec \u0111\u00e3 c\u1ee9u s\u1ed1ng h\u1ecd. T\u1eeb \u0111\u00f3, ng\u01b0\u1eddi L\u00f4 L\u00f4 th\u1edd tre l\u00e0m v\u1eadt t\u1ed5.<br>\n\u2192 \u0110o\u1ea1n tr\u00edch vi\u1ebft v\u1ec1 l\u00ed do ng\u01b0\u1eddi L\u00f4 L\u00f4 th\u1edd tre l\u00e0m v\u1eadt t\u1ed5.\n", "key": "B", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604918, "lessonId": 0, "a": "L\u0169 l\u1ee5t.", "b": "\u0110\u1ed9ng \u0111\u1ea5t.", "c": "H\u1ea1n h\u00e1n.", "d": "S\u1ea1t l\u1edf n\u00fai \u0111\u1ed3i.", "bookId": 1088698, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cN\u00f3ng qu\u00e1<br>\u0110\u1ea5t x\u00e1c x\u01a1<br>\u0110\u1ea5t c\u1eb1n c\u1ed7i hanh kh\u00f4<br>D\u00e2y s\u1eafn \u00faa h\u1ebft l\u00e1<br>C\u00e2y cau \u00faa h\u1ebft t\u00e0u<br>R\u1eebng v\u00e0u kh\u00f4ng m\u1ecdc m\u0103ng<br>Con chim m\u00f2 xu\u1ed1ng \u0111\u1ea5t<br>Con th\u00fa m\u00f2 xu\u1ed1ng n\u01b0\u1edbc<br>Ch\u00f3 th\u00e8 l\u01b0\u1ee1i<br>R\u00e1i c\u00e1 ch\u1ea1y l\u00ean \u0111\u1ed3i\u201d</i><br><div style=\"text-align: right;\">(S\u1eed thi d\u00e2n t\u1ed9c M\u01b0\u1eddng, <i>\u0110\u1ebb \u0111\u1ea5t \u0111\u1ebb n\u01b0\u1edbc</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>Hi\u1ec7n t\u01b0\u1ee3ng thi\u00ean nhi\u00ean n\u00e0o \u0111\u01b0\u1ee3c t\u00e1i hi\u1ec7n trong \u0111o\u1ea1n tr\u00edch?<br>", "answer": "\u0110o\u1ea1n tr\u00edch mi\u00eau t\u1ea3 t\u00ecnh tr\u1ea1ng th\u1eddi ti\u1ebft n\u00f3ng b\u1ee9c, \u0111\u1ea5t c\u1eb1n c\u1ed7i, c\u1ecf c\u00e2y h\u00e9o \u00faa, c\u00e1c lo\u00e0i v\u1eadt t\u00ecm ki\u1ebfm ngu\u1ed3n n\u01b0\u1edbc v\u00e0 n\u01a1i tr\u00fa \u1ea9n \u0111\u1ec3 tr\u00e1nh n\u00f3ng.<br>\n\u2192 Hi\u1ec7n t\u01b0\u1ee3ng thi\u00ean nhi\u00ean \u0111\u01b0\u1ee3c t\u00e1i hi\u1ec7n trong \u0111o\u1ea1n tr\u00edch l\u00e0 h\u1ea1n h\u00e1n.\n", "key": "C", "isVideo": true, "score": 0, "order": 2, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604921, "lessonId": 0, "a": "\u0110\u1ec1.", "b": "Th\u1ef1c.", "c": "Lu\u1eadn.", "d": "K\u1ebft.", "bookId": 1088699, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNh\u00e0 n\u01b0\u1edbc ba n\u0103m m\u1edf m\u1ed9t khoa ,<br>Tr\u01b0\u1eddng Nam thi l\u1eabn v\u1edbi tr\u01b0\u1eddng H\u00e0 .<br>L\u00f4i th\u00f4i s\u0129 t\u1eed vai \u0111eo l\u1ecd ,<br>\u1eacm o\u1eb9 quan tr\u01b0\u1eddng mi\u1ec7ng th\u00e9t loa.<br>L\u1ecdng  c\u1eafm r\u1ee3p tr\u1eddi quan s\u1ee9 \u0111\u1ebfn ,<br>V\u00e1y l\u00ea qu\u00e9t \u0111\u1ea5t m\u1ee5 \u0111\u1ea7m ra .<br>Nh\u00e2n t\u00e0i \u0111\u1ea5t B\u1eafc n\u00e0o ai \u0111\u00f3,<br>Ngo\u1ea3nh c\u1ed5 m\u00e0 tr\u00f4ng c\u1ea3nh n\u01b0\u1edbc nh\u00e0.\u201d</i><br><div style=\"text-align: right;\">(Tr\u1ea7n T\u1ebf X\u01b0\u01a1ng, <i>V\u1ecbnh khoa thi H\u01b0\u01a1ng,</i> theo<i> T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam,</i> t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Khung c\u1ea3nh nh\u1ed1n nh\u00e1o, nh\u1ed9n nh\u1ea1o ch\u1ed1n tr\u01b0\u1eddng thi \u0111\u01b0\u1ee3c kh\u1eafc ho\u1ea1 qua c\u1eb7p c\u00e2u th\u01a1 n\u00e0o?", "answer": "H\u00ecnh \u1ea3nh nh\u1eefng s\u0129 t\u1eed v\u1edbi d\u00e1ng v\u1ebb l\u00f4i th\u00f4i, nh\u1ebfch nh\u00e1c, vai \u0111eo l\u1ecd m\u1ef1c v\u00e0 h\u00ecnh \u1ea3nh quan tr\u01b0\u1eddng v\u1edbi nh\u1eefng ti\u1ebfng th\u00e9t loa \u1eadm o\u1eb9, th\u1ec3 hi\u1ec7n s\u1ef1 h\u1ed1ng h\u00e1ch, quan li\u00eau, g\u00e2y n\u00e1o lo\u1ea1n tr\u01b0\u1eddng thi trong hai c\u00e2u th\u1ef1c \u0111\u00e3 \u0111\u00e3 kh\u1eafc h\u1ecda r\u00f5 n\u00e9t khung c\u1ea3nh nh\u1ed1n nh\u00e1o, nh\u1ed9n nh\u1ea1o ch\u1ed1n tr\u01b0\u1eddng thi.", "key": "B", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604930, "lessonId": 0, "a": "V\u00ec \u0111\u1ed3 l\u1ec5 h\u1ecfi c\u01b0\u1edbi c\u1ee7a Thu\u1ef7 Tinh kh\u00f4ng h\u1ee3p \u00fd vua H\u00f9ng.", "b": "V\u00ec Thu\u1ef7 Tinh mang l\u1ec5 v\u1eadt \u0111\u1ebfn mu\u1ed9n.", "c": "V\u00ec M\u1ef5 N\u01b0\u01a1ng kh\u00f4ng c\u00f3 t\u00ecnh c\u1ea3m v\u1edbi Thu\u1ef7 Tinh.", "d": "V\u00ec S\u01a1n Tinh \u0111\u01b0\u1ee3c ng\u01b0\u1eddi d\u00e2n \u1ee7ng h\u1ed9.", "bookId": 1088700, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cVua nghe l\u1eddi, h\u1eb9n hai ng\u01b0\u1eddi v\u1ec1 s\u1eeda l\u1ec5. V\u01b0\u01a1ng v\u1ec1, ngay \u0111\u00eam h\u00f4m \u1ea5y s\u1eeda so\u1ea1n c\u00e1c th\u1ee9 v\u00e0ng, b\u1ea1c, ng\u1ecdc qu\u00fd, t\u00ea, voi c\u00f9ng c\u00e1c gi\u1ed1ng chim mu\u00f4ng l\u1ea1, m\u1ed7i th\u1ee9 c\u00f3 t\u1edbi h\u00e0ng tr\u0103m, s\u1edbm h\u00f4m sau \u0111em hi\u1ebfn d\u00e2ng vua.<br>H\u00f9ng V\u01b0\u01a1ng m\u1eebng, g\u1ea3 lu\u00f4n M\u1ef5 N\u01b0\u01a1ng cho V\u01b0\u01a1ng \u0111\u00f3n v\u1ec1 \u1edf L\u00f4i S\u01a1n. \u0110\u1ebfn bu\u1ed5i chi\u1ec1u, Th\u1ee7y Tinh c\u0169ng s\u1eafm \u0111\u1ee7 c\u00e1c th\u1ee9 nh\u01b0 tr\u00e2n ch\u00e2u, \u0111\u1ed3i m\u1ed3i, san h\u00f4 v\u00e0 c\u00e1c gi\u1ed1ng c\u00e1 l\u1ea1, m\u1ed7i th\u1ee9 c\u0169ng t\u1edbi h\u00e0ng tr\u0103m. Nh\u01b0ng \u0111\u1ebfn n\u01a1i th\u00ec S\u01a1n Tinh \u0111\u00e3 l\u1ea5y \u0111\u01b0\u1ee3c M\u1ef5 N\u01b0\u01a1ng \u0111em v\u1ec1 r\u1ed3i. Th\u1ee7y Tinh n\u1ed5i gi\u1eadn b\u00e8n \u0111em qu\u00e2n \u0111u\u1ed5i theo, \u0111\u1ecbnh ph\u00e1 tan L\u00f4i S\u01a1n. Nh\u01b0ng b\u1ea5y gi\u1edd V\u01b0\u01a1ng \u0111\u00e3 d\u1eddi v\u1ec1 \u1edf tr\u00ean n\u00fai T\u1ea3n. Th\u1ee7y Tinh kh\u00f4ng l\u00e0m g\u00ec n\u1ed5i, t\u1eeb \u0111\u00f3 c\u0103m th\u00f9 m\u00e3i, m\u1ed7i n\u0103m v\u00e0o m\u00f9a thu l\u1ea1i d\u00e2ng n\u01b0\u1edbc l\u00ean \u0111\u00e1nh n\u00fai T\u1ea3n Vi\u00ean. D\u00e2n \u1edf v\u00f9ng \u1ea5y c\u00f9ng nhau k\u1ebft g\u1ed7 th\u00e0nh h\u00e0ng r\u00e0o \u0111\u1ec3 l\u00e0m vi\u1ec7n tr\u1ee3, gi\u1eef ch\u00e2n n\u00fai, Th\u1ee7y Tinh kh\u00f4ng ph\u1ea1m t\u1edbi \u0111\u01b0\u1ee3c.\u201d</i><br><div style=\"text-align: right;\">(L\u00fd T\u1ebf Xuy\u00ean, <i>T\u1ea3n Vi\u00ean H\u1ef1u th\u00e1nh Khu\u00f4ng qu\u1ed1c Hi\u1ec3n \u1ee9ng V\u01b0\u01a1ng</i>, theo<i> Vi\u1ec7t \u0111i\u1ec7n u linh t\u1eadp</i>, NXB V\u0103n h\u1ecdc, 2008)</div>V\u00ec sao Thu\u1ef7 Tinh kh\u00f4ng l\u1ea5y \u0111\u01b0\u1ee3c M\u1ef5 N\u01b0\u01a1ng?<br>", "answer": "Theo \u0111o\u1ea1n tr\u00edch, S\u01a1n Tinh \u0111\u00e3 mang l\u1ec5 v\u1eadt \u0111\u1ebfn tr\u01b0\u1edbc v\u00e0 \u0111\u01b0\u1ee3c H\u00f9ng V\u01b0\u01a1ng g\u1ea3 M\u1ef5 N\u01b0\u01a1ng. Khi Th\u1ee7y Tinh \u0111\u1ebfn th\u00ec M\u1ef5 N\u01b0\u01a1ng \u0111\u00e3 theo S\u01a1n Tinh v\u1ec1 n\u00fai T\u1ea3n Vi\u00ean.<br>\n\u2192 Thu\u1ef7 Tinh kh\u00f4ng l\u1ea5y \u0111\u01b0\u1ee3c M\u1ef5 N\u01b0\u01a1ng v\u00ec Thu\u1ef7 Tinh mang l\u1ec5 v\u1eadt \u0111\u1ebfn mu\u1ed9n.\n", "key": "B", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604937, "lessonId": 0, "a": "\u201cN\u01b0\u01a1ng song lu\u1ed1ng ng\u1ea9n ng\u01a1 l\u00f2ng\u201d.", "b": "\u201c\u0110\u00e2u xi\u1ebft k\u1ec3 tr\u0103m s\u1ea7u ngh\u00ecn n\u00e3o\u201d.", "c": "\u201cV\u1eafng ch\u00e0ng \u0111i\u1ec3m ph\u1ea5n, trang h\u1ed3ng v\u1edbi ai?\u201d.", "d": "\u201cBi\u1ebfng c\u1ea7m kim, bi\u1ebfng \u0111\u01b0a thoi\u201d.", "bookId": 1088701, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u0110\u00e2u xi\u1ebft k\u1ec3 tr\u0103m s\u1ea7u ngh\u00ecn n\u00e3o,<br>T\u1eeb n\u1eef c\u00f4ng ph\u1ee5 x\u1ea3o  \u1edf \u0111\u1ec1u ngu\u00f4i.<br>Bi\u1ebfng c\u1ea7m kim, bi\u1ebfng \u0111\u01b0a thoi,<br>Oanh \u0111\u00f4i th\u1eb9n d\u1ec7t, b\u01b0\u1edbm \u0111\u00f4i ng\u1ea1i th\u00f9a.<br>M\u1eb7t bi\u1ebfng t\u00f4, mi\u1ec7ng c\u00e0ng bi\u1ebfng n\u00f3i,<br>S\u1edbm l\u1ea1i chi\u1ec1u d\u00f2i d\u00f5i n\u01b0\u01a1ng song.<br>N\u01b0\u01a1ng song lu\u1ed1ng ng\u1ea9n ng\u01a1 l\u00f2ng,<br>V\u1eafng ch\u00e0ng \u0111i\u1ec3m ph\u1ea5n, trang h\u1ed3ng v\u1edbi ai?\u201d</i><br><div style=\"text-align: right;\">(\u0110\u1eb7ng Tr\u1ea7n C\u00f4n nguy\u00ean t\u00e1c H\u00e1n v\u0103n - Phan Huy \u00cdch di\u1ec5n N\u00f4m, <i>Chinh ph\u1ee5 ng\u00e2m kh\u00fac</i>, theo T<i>\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam,</i> t\u1eadp 13, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>C\u00e2u th\u01a1 n\u00e0o cho th\u1ea5y chinh ph\u1ee5 kh\u00f4ng thi\u1ebft soi g\u01b0\u01a1ng, trang \u0111i\u1ec3m khi v\u1eafng ch\u1ed3ng?", "answer": "C\u00e2u th\u01a1 \u201cV\u1eafng ch\u00e0ng \u0111i\u1ec3m ph\u1ea5n, trang h\u1ed3ng v\u1edbi ai?\u201d th\u1ec3 hi\u1ec7n r\u00f5 r\u00e0ng s\u1ef1 ch\u00e1n n\u1ea3n, kh\u00f4ng c\u00f2n h\u1ee9ng th\u00fa trang \u0111i\u1ec3m c\u1ee7a ng\u01b0\u1eddi chinh ph\u1ee5 khi ch\u1ed3ng \u0111i xa. \u201c\u0110i\u1ec3m ph\u1ea5n, trang h\u1ed3ng\u201d \u0111\u1ec3 l\u00e0m \u0111\u1eb9p cho b\u1ea3n th\u00e2n, nh\u01b0ng v\u00ec v\u1eafng ch\u1ed3ng n\u00ean ng\u01b0\u1eddi chinh ph\u1ee5 kh\u00f4ng c\u00f2n thi\u1ebft tha \u0111\u1ec3 l\u00e0m nh\u1eefng vi\u1ec7c \u0111\u00f3 n\u1eefa.", "key": "C", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604943, "lessonId": 0, "a": "S\u1ea7u n\u00e3o, th\u1ea3m th\u01b0\u01a1ng.", "b": "\u0110au bu\u1ed3n, t\u1ee7i h\u1ed5.", "c": "Bu\u1ed3n th\u01b0\u01a1ng, chua ch\u00e1t.", "d": "Chi\u00eam nghi\u1ec7m, tri\u1ebft l\u00ed.", "bookId": 1088702, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c<b>H\u00f3a ra \u0111i\u1ec1u kh\u00f3 kh\u0103n nh\u1ea5t c\u1ee7a cu\u1ed9c s\u1ed1ng l\u1ea1i l\u00e0 \u1edf ch\u1ed7 ph\u1ea3i \u0111\u1ed1i m\u1eb7t v\u1edbi nh\u1eefng ng\u01b0\u1eddi xung quanh m\u00ecnh. </b>Bu\u1ed3n thay, \u0111\u00f3 c\u0169ng l\u1ea1i l\u00e0 c\u00e1i b\u00ed \u1ea9n, kh\u00f4ng th\u1ec3 bi\u1ebft c\u1ee7a cu\u1ed9c s\u1ed1ng. Ph\u00fang ch\u1ec3nh m\u1ea3ng d\u1ea7n vi\u1ec7c d\u1ea1y h\u1ecdc. Ti\u1ebfp \u0111\u00f3, thay cho nh\u1eefng ch\u1ee7 nh\u1eadt \u0111i b\u1eaft c\u00e1 s\u0103n chim, gi\u00e2y ph\u00fat xu\u1ea5t th\u1ea7n, s\u1ed1ng ngo\u00e0i tr\u1ea7n th\u1ebf hi\u1ebfm hoi l\u00e0 nh\u1eefng ng\u00e0y Ph\u00fang tr\u1eb1n m\u00ecnh trong lao \u0111\u1ed9ng kh\u1ed5 sai: ch\u1eb7t g\u1ed7, h\u00e1i c\u1ee7i, \u0111\u00e1nh gianh, nh\u1eb7t tr\u00e1m, l\u1ea5y m\u0103ng \u0111em b\u00e1n \u1edf ch\u1ee3 huy\u1ec7n.\u201d</i><br><div style=\"text-align: right;\">(Ma V\u0103n Kh\u00e1ng, <i>C\u00e2y b\u1ed3 k\u1ebfp l\u00e1 v\u00e0ng,</i> theo <i>daibieunhandan.vn</i>)</div>C\u00e2u v\u0103n in \u0111\u1eadm trong \u0111o\u1ea1n v\u0103n tr\u00ean mang gi\u1ecdng \u0111i\u1ec7u g\u00ec?", "answer": "C\u00e2u v\u0103n in \u0111\u1eadm th\u1ec3 hi\u1ec7n s\u1ef1 suy ng\u1eabm c\u1ee7a ng\u01b0\u1eddi vi\u1ebft v\u1ec1 b\u1ea3n ch\u1ea5t c\u1ee7a cu\u1ed9c s\u1ed1ng sau nh\u1eefng tr\u1ea3i nghi\u1ec7m c\u1ee7a b\u1ea3n th\u00e2n: \u0111i\u1ec1u kh\u00f3 kh\u0103n nh\u1ea5t c\u1ee7a cu\u1ed9c s\u1ed1ng l\u00e0 \u0111\u1ed1i m\u1eb7t v\u1edbi nh\u1eefng ng\u01b0\u1eddi xung quanh.<br>\n\u2192 C\u00e2u v\u0103n mang gi\u1ecdng \u0111i\u1ec7u chi\u00eam nghi\u1ec7m, tri\u1ebft l\u00ed.\n", "key": "D", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604946, "lessonId": 0, "a": "H\u1ed9i ch\u00e8o.", "b": "C\u1ea3nh l\u1ec5 h\u1ed9i l\u00e0ng ng\u00e0y xu\u00e2n.", "c": "C\u1ea3nh \u0111\u00e1nh c\u1edd ng\u01b0\u1eddi.", "d": "C\u1ea3nh l\u1ec5 ch\u00f9a.", "bookId": 1088703, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u0110\u1ea7u l\u00e0ng \u0111ang gi\u1ee5c tr\u1ed1ng ch\u00e8o<br>Cu\u1ed1i l\u00e0ng \u0111ang v\u00fat l\u00ean nhi\u1ec1u d\u00e2y \u0111u<br>Trai l\u00e0ng c\u1edd \u0111\u00e1m, c\u1edd vua<br>Gi\u00e0 l\u00e0ng s\u1eeda l\u1ec5 l\u00ean ch\u00f9a d\u00e2ng h\u01b0\u01a1ng\u201d</i><br><div style=\"text-align: right;\">(Ph\u1ea1m C\u00f4ng Tr\u1ee9, <i>Th\u00e1ng gi\u00eang</i>, theo<i> nhandan.vn</i>)</div>\u0110o\u1ea1n th\u01a1 kh\u1eafc ho\u1ea1 khung c\u1ea3nh n\u00e0o sau \u0111\u00e2y?", "answer": "\u0110o\u1ea1n th\u01a1 g\u1ee3i t\u1ea3 khung c\u1ea3nh c\u1ee7a m\u1ed9t l\u1ec5 h\u1ed9i l\u00e0ng ng\u00e0y xu\u00e2n v\u1edbi nhi\u1ec1u ho\u1ea1t \u0111\u1ed9ng truy\u1ec1n th\u1ed1ng: h\u00e1t ch\u00e8o, \u0111\u00e1nh \u0111u, \u0111\u00e1nh c\u1edd ng\u01b0\u1eddi, s\u1eafm s\u1eeda l\u1ec5 ch\u00f9a d\u00e2ng h\u01b0\u01a1ng.", "key": "B", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604951, "lessonId": 0, "a": "Ng\u00e2y th\u01a1, m\u01a1 m\u1ed9ng.", "b": "Nh\u1ea1y c\u1ea3m, gi\u00e0u c\u1ea3m x\u00fac.", "c": "Thanh cao, gi\u00e0u \u0111\u1ee9c v\u1ecb tha.", "d": "H\u1ed3n nhi\u00ean, trong tr\u1ebbo.", "bookId": 1088704, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cL\u00e1t sau, c\u00f4 g\u00e1i ch\u1ea1y ra v\u01b0\u1eddn hoa.<br>\u0110i d\u1ecdc nh\u1eefng l\u1ed1i nh\u1ecf r\u1ea3i s\u1ecfi, c\u00f4 h\u00e1i \u0111\u1ea7y tay nh\u1eefng \u0111\u00f3a hoa th\u1ee7y ti\u00ean thanh m\u1ea3nh tr\u1eafng ng\u1ea7n. M\u1ed9t ch\u00f9m t\u1eed \u0111inh h\u01b0\u01a1ng t\u00edm s\u00e0 tr\u00ean c\u00e2y xu\u1ed1ng, \u0111u \u0111\u01b0a, t\u1ecfa h\u01b0\u01a1ng man m\u00e1c. Nh\u1eefng \u0111\u00f3a th\u1ee7y ti\u00ean tr\u1eafng trong, th\u01a1m th\u01a1m, ch\u1ee9a \u0111\u1ea7y s\u01b0\u01a1ng l\u1ea1nh, nh\u1eefng m\u1eaft hoa v\u00e0ng sau h\u00e0ng mi \u0111\u1ecf, nom nh\u01b0 \u0111\u1eabm l\u1ec7.<br>C\u00f4 thi\u1ebfu n\u1eef nghi\u00eang nh\u1eefng \u0111\u00e0i hoa tr\u1eafng ng\u1ea7n v\u00e0o m\u00f4i v\u00e0 u\u1ed1ng nh\u1eefng gi\u1ecdt l\u1ec7 \u1ea5y, mi\u1ec7ng n\u1edf m\u1ed9t n\u1ee5 c\u01b0\u1eddi tinh ngh\u1ecbch.<br>Tu\u1ed5i thanh xu\u00e2n t\u01b0\u01a1i tr\u1ebb v\u00e0 nh\u1eefng \u00e1nh r\u1ea1ng \u0111\u00f4ng \u0111\u1ea7u ti\u00ean c\u1ee7a v\u1ea7ng th\u00e1i d\u01b0\u01a1ng h\u00f2a nhau th\u00e0nh m\u1ed9t kh\u00fac nh\u1ea1c h\u1ea1nh ph\u00fac l\u1edbn lao, \u00f9a v\u00e0o l\u00f2ng c\u00f4 nh\u01b0 c\u1ea7u v\u1ed3ng mu\u00f4n h\u1ed3ng ngh\u00ecn t\u00eda.\u201d</i><br><div style=\"text-align: right;\">(Helena Mniszek, <i>Con h\u1ee7i,</i> NXB V\u0103n h\u1ecdc, 2004)</div>\u0110o\u1ea1n v\u0103n kh\u1eafc ho\u1ea1 v\u1ebb \u0111\u1eb9p n\u00e0o trong t\u00e2m h\u1ed3n c\u00f4 g\u00e1i?", "answer": "\u0110o\u1ea1n v\u0103n kh\u1eafc ho\u1ea1 v\u1ebb \u0111\u1eb9p h\u1ed3n nhi\u00ean, trong tr\u1ebbo trong t\u00e2m h\u1ed3n c\u00f4 g\u00e1i th\u00f4ng qua qua h\u00ecnh \u1ea3nh c\u00f4 ho\u00e0 m\u00ecnh v\u1edbi thi\u00ean nhi\u00ean c\u1ea3nh v\u1eadt. H\u00e0nh \u0111\u1ed9ng \u201cu\u1ed1ng nh\u1eefng gi\u1ecdt l\u1ec7 \u1ea5y\u201d c\u00f9ng \u201cn\u1ee5 c\u01b0\u1eddi tinh ngh\u1ecbch\u201d kh\u1eafc ho\u1ea1 c\u00f4 g\u00e1i v\u1edbi v\u1ebb \u0111\u1eb9p trong tr\u1ebb, v\u00f4 t\u01b0, h\u1ed3n nhi\u00ean \u1edf \u0111\u1ed9 tu\u1ed5i \u0111\u1eb9p nh\u1ea5t c\u1ee7a cu\u1ed9c \u0111\u1eddi.", "key": "D", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604954, "lessonId": 0, "a": "Hi\u1ebfu th\u1ea3o, thu\u1ef7 chung.", "b": "C\u01b0\u01a1ng tr\u1ef1c, ngay th\u1eb3ng.", "c": "D\u1ecbu d\u00e0ng, n\u1ebft na.", "d": "Ki\u00ean c\u01b0\u1eddng, c\u1ee9ng c\u1ecfi.", "bookId": 1088705, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTH\u1eca PH\u01af\u01a0NG (n\u00f3i s\u1eed):<br>Tr\u00ecnh l\u1ea1y m\u1eb9,<br>C\u1eeda nh\u00e0 tan t\u00e1c,<br>L\u00e0ng n\u01b0\u1edbc s\u1ea1ch kh\u00f4ng,<br>M\u1eb9 con ta li bi\u1ec7t \u0111\u00f4ng,<br>M\u1eb9 h\u1ee1i m\u1eb9, t\u00e2m trung  th\u1ea3m thi\u1ebft!<br>M\u1eb9 \u01a1i, c\u00f3 lo\u1ea1n t\u1edbi \u0111\u00e2y,<br>Con xin d\u1eaft m\u1eb9 v\u00e0o ngay trong n\u00e0y.<br>K\u1ebbo con nay c\u00f2n ch\u00fat m\u00e1 h\u1ed3ng,<br>N\u1eefa c\u00f3 gian h\u00f9ng \u0111\u1ea1o tao khang .<br>Tr\u01b0\u1edbc l\u00e0 th\u1ea5t ti\u1ebft c\u00f9ng,<br>Sau con \u0111\u1ec3 m\u1eb9 gi\u1eefa \u0111\u00e0ng ai nu\u00f4i?\u201d</i><br><div style=\"text-align: right;\">(Ch\u00e8o c\u1ed5, <i>Tr\u01b0\u01a1ng Vi\u00ean,</i> theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>Ph\u1ea9m ch\u1ea5t n\u00e0o c\u1ee7a Th\u1ecb Ph\u01b0\u01a1ng \u0111\u01b0\u1ee3c b\u1ed9c l\u1ed9 trong \u0111o\u1ea1n tr\u00edch?<br>", "answer": "Nh\u1eefng ph\u1ea9m ch\u1ea5t c\u1ee7a Th\u1ecb Ph\u01b0\u01a1ng \u0111\u01b0\u1ee3c b\u1ed9c l\u1ed9 trong \u0111o\u1ea1n tr\u00edch l\u00e0:<br>\n- Hi\u1ebfu th\u1ea3o: lo l\u1eafng cho s\u1ef1 an nguy c\u1ee7a m\u1eb9 khi lo\u1ea1n l\u1ea1c x\u1ea3y ra, s\u1ee3 m\u1eb9 ph\u1ea3i kh\u1ed5 s\u1edf, kh\u00f4ng ai ch\u0103m s\u00f3c n\u1ebfu m\u00ecnh g\u1eb7p chuy\u1ec7n kh\u00f4ng may.<br>\n- Th\u1ee7y chung: lo s\u1ee3 b\u1ecb k\u1ebb gian h\u00f9ng h\u00e3m h\u1ea1i, m\u1ea5t \u0111i s\u1ef1 trong tr\u1eafng.\n", "key": "A", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604961, "lessonId": 0, "a": "Lo l\u1eafng, s\u1ed1t ru\u1ed9t t\u00ecnh h\u00ecnh c\u00e1ch m\u1ea1ng c\u1ee7a d\u00e2n t\u1ed9c.", "b": "Mong tin t\u1ee9c c\u1ee7a qu\u00ea nh\u00e0 h\u1eb1ng ng\u00e0y.", "c": "Tha thi\u1ebft v\u1edbi v\u1ebb \u0111\u1eb9p c\u1ee7a thi\u00ean nhi\u00ean.", "d": "Nh\u1edb n\u01b0\u1edbc th\u01b0\u01a1ng nh\u00e0.", "bookId": 1088706, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTh\u1ee5 sao x\u1ea3o ho\u1ea1 Tr\u01b0\u01a1ng Phi t\u01b0\u1ee3ng,<br>X\u00edch nh\u1eadt tr\u01b0\u1eddng minh Quan V\u0169 t\u00e2m;<br>T\u1ed5 qu\u1ed1c chung ni\u00ean v\u00f4 t\u00edn t\u1ee9c,<br>C\u1ed1 h\u01b0\u01a1ng m\u1ed7i nh\u1eadt v\u1ecdng h\u1ed3i \u00e2m.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>T\u1ee9c c\u1ea3nh</i>)</div>D\u1ecbch ngh\u0129a:<br><i>Ng\u1ecdn c\u00e2y kh\u00e9o v\u1ebd h\u00ecnh Tr\u01b0\u01a1ng Phi,<br>M\u1eb7t tr\u1eddi h\u1ed3ng s\u00e1ng m\u00e3i l\u00f2ng Quan V\u0169;<br>Tr\u00f2n n\u0103m kh\u00f4ng \u0111\u01b0\u1ee3c tin t\u1ee9c g\u00ec v\u1ec1 \u0111\u1ea5t n\u01b0\u1edbc,<br>Mong th\u01b0 tr\u1ea3 l\u1eddi c\u1ee7a qu\u00ea nh\u00e0 h\u00e0ng ng\u00e0y.</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>T\u1ee9c c\u1ea3nh,</i> theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam,</i> t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>T\u00e2m tr\u1ea1ng n\u00e0o c\u1ee7a ng\u01b0\u1eddi t\u00f9 c\u1ed9ng s\u1ea3n <b>kh\u00f4ng </b>\u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n trong b\u00e0i th\u01a1?", "answer": "B\u00e0i th\u01a1 th\u1ec3 hi\u1ec7n n\u1ed7i l\u00f2ng c\u1ee7a ng\u01b0\u1eddi t\u00f9 c\u1ed9ng s\u1ea3n lu\u00f4n lo l\u1eafng cho t\u00ecnh h\u00ecnh c\u00e1ch m\u1ea1ng c\u1ee7a d\u00e2n t\u1ed9c. \u0110\u1ed3ng th\u1eddi, ng\u01b0\u1eddi t\u00f9 c\u0169ng mong m\u1ecfi tin t\u1ee9c t\u1eeb qu\u00ea h\u01b0\u01a1ng t\u1eebng ng\u00e0y. To\u00e0n b\u00e0i th\u01a1 th\u1ea5m \u0111\u01b0\u1ee3m t\u00e2m tr\u1ea1ng nh\u1edb n\u01b0\u1edbc th\u01b0\u01a1ng nh\u00e0, kh\u1eafc kho\u1ea3i h\u01b0\u1edbng v\u1ec1 T\u1ed5 qu\u1ed1c th\u00e2n y\u00eau<br>\n\u2192 S\u1ef1 tha thi\u1ebft v\u1edbi v\u1ebb \u0111\u1eb9p c\u1ee7a thi\u00ean nhi\u00ean kh\u00f4ng \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n trong b\u00e0i th\u01a1.\n", "key": "C", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604966, "lessonId": 0, "a": "\u0110\u1ed3 \u0103n ph\u1ea3i ngon, kh\u00f4ng g\u00e2y \u0111\u1ed9c h\u1ea1i.", "b": "\u0110\u1ed3 \u0103n v\u1eeba t\u00fai ti\u1ec1n, gi\u00e1 b\u00ecnh d\u00e2n.", "c": "\u0110\u1ed3 \u0103n ph\u1ea3i to\u00e0n cao l\u01b0\u01a1ng m\u0129 v\u1ecb.", "d": "\u0102n c\u00f2n l\u00e0 v\u1ea5n \u0111\u1ec1 v\u0103n ho\u00e1 d\u00e2n t\u1ed9c.", "bookId": 1088707, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u0102n \u0111\u1ec3 m\u00e0 s\u1ed1ng, nh\u01b0ng s\u1ed1ng m\u00e0 \u0103n kh\u00f4ng ngon th\u00ec kh\u00f3 s\u1ed1ng dai, v\u00ec con ng\u01b0\u1eddi \u0111\u00e2u ph\u1ea3i l\u00e0 c\u00e1i m\u00e1y \u0111\u1ec3 \u0103n, v\u1ea3 l\u1ea1i c\u00e1i m\u00e1y n\u1ebfu ch\u1ea1y v\u1edbi x\u0103ng x\u1ea5u th\u00ec kh\u00f3 ch\u1ea1y b\u1ec1n... \u0102n ph\u1ea3i ngon, v\u00e0 c\u00e1i ngon \u1ea5y n\u00ean mua v\u1edbi gi\u00e1 v\u1eeba ph\u1ea3i. \u0102n c\u00f2n l\u00e0 v\u1ea5n \u0111\u1ec1 \u201cv\u0103n h\u00f3a d\u00e2n t\u1ed9c\u201d, n\u00f3i nh\u01b0 v\u1eady kh\u00f4ng qu\u00e1 \u0111\u00e1ng. M\u1ed7i d\u00e2n t\u1ed9c th\u00edch nh\u1eefng m\u00f3n ri\u00eang, \u0103n m\u00e3i d\u1ec5 ch\u00e1n, nh\u01b0ng l\u00e2u ng\u00e0y kh\u00f4ng \u0103n \u0111\u1ebfn n\u00f3 th\u00ec nh\u1edb nh\u00e0, nh\u1edb \u00f4ng b\u00e0 \u00f4ng v\u1ea3i, nh\u1ea5t l\u00e0 v\u00e0o d\u1ecbp T\u1ebft ho\u1eb7c khi tu\u1ed5i \u0111\u00e3 cao. L\u1eafm c\u1ee7a nhi\u1ec1u ti\u1ec1n nh\u01b0ng v\u1eabn nh\u1edb \u0111\u1ebfn m\u00f3n b\u00ecnh d\u00e2n, \u0103n v\u1edbi b\u1ea1n b\u00e8, trong kh\u00f4ng kh\u00ed ri\u00eang, v\u1eeba t\u00fai ti\u1ec1n, kh\u00f4ng g\u00e2y \u0111\u1ed9c h\u1ea1i.\u201d</i><br><div style=\"text-align: right;\">(S\u01a1n Nam, <i>Lai rai ba m\u00f3n b\u00ecnh d\u00e2n \u1edf S\u00e0i G\u00f2n</i>, theo <i>S\u01a1n Nam \u0111i v\u00e0 ghi nh\u1edb</i>, NXB H\u1ed3ng \u0110\u1ee9c, 2014)</div>Quan ni\u1ec7m v\u1ec1 \u1ea9m th\u1ef1c c\u1ee7a t\u00e1c gi\u1ea3 <b>kh\u00f4ng </b>\u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n \u1edf \u0111i\u1ec1u g\u00ec sau \u0111\u00e2y?<br>", "answer": "\u0110o\u1ea1n tr\u00edch th\u1ec3 hi\u1ec7n quan ni\u1ec7m v\u1ec1 \u1ea9m th\u1ef1c c\u1ee7a S\u01a1n Nam, t\u00e1c gi\u1ea3 cho r\u1eb1ng \u0103n kh\u00f4ng ch\u1ec9 \u0111\u1ec3 s\u1ed1ng m\u00e0 c\u00f2n ph\u1ea3i \u0103n ngon, nh\u01b0ng c\u00e1i ngon \u1ea5y n\u00ean v\u1eeba t\u00fai ti\u1ec1n, kh\u00f4ng c\u1ea7n         let userAnswers = {}; // Store: { qId: value }
        let isSubmitted = false;
        let examMode = 'practice'; // 'practice' or 'exam'
        let startTime = Date.now();
        let timerInterval;

        // --- INIT ---
        window.onload = function() {
            renderExam();
            startTimer();
            document.getElementById('mode-select').addEventListener('change', (e) => {
                if(isSubmitted) return;
                if(confirm('Đổi chế độ sẽ làm mới lại trạng thái hiển thị (không mất bài làm). Tiếp tục?')) {
                    examMode = e.target.value;
                    renderExam(false); // Re-render without resetting answers
                } else {
                    e.target.value = examMode;
                }
            });
        };

        // --- TIMER LOGIC ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- RENDER ENGINE ---
        function renderExam(reset = false) {
            const container = document.getElementById('exam-content');
            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; // Clear to re-render
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

            let globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                // Render Group Header
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`; // Unique Key for storage
                    const qType = q.normalizedType;
                    
                    // -- Palette Item --
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop
                    palMob.appendChild(palBtn); // Add to Mobile

                    // -- Question Card --
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    // Header: Question Number
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>

                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>

                    </div>`;

                    // Interaction Area

                            const val = q[opt];

                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            // Logic hiển thị kết quả
                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { // Chọn đúng
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { // Đúng nhưng không chọn (hiện đáp án khi nộp)
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { // Chọn sai
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; // Hiện đáp án đúng sau khi nộp dù chưa làm
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // === TYPE 1 & 3: FILL KEY ===
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let inputClass = "w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all font-mono";
                        let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
