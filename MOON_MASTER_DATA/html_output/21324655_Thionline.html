1ed3ng/s\u1ea3n ph\u1ea9m.<br>Gi\u00e1 b\u00e1n ban \u0111\u1ea7u: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/53b57ebc-fc1b-4395-b882-1a4e97aa580a.png\"/> \u0111\u1ed3ng/s\u1ea3n ph\u1ea9m.<br>S\u1ed1 l\u01b0\u1ee3ng b\u00e1n \u0111\u01b0\u1ee3c ban \u0111\u1ea7u: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/46f9628c-16cb-46c6-8066-cf0012b8d72f.png\"/> s\u1ea3n ph\u1ea9m/ng\u00e0y.<br>Quy lu\u1eadt thay \u0111\u1ed5i: gi\u1ea3m <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/575e2c17-4a08-4444-98e2-0e28e73375ae.png\"/> \u0111\u1ed3ng/s\u1ea3n ph\u1ea9m <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/e3cad6ed-a38d-48e8-9003-21f8c1ea7af8.png\"/> t\u0103ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/9cb69f77-4202-458a-8e07-c0e8e902a32a.png\"/> s\u1ea3n ph\u1ea9m.<br><b>a) Sai.</b><br>S\u1ed1 ti\u1ec1n gi\u1ea3m so v\u1edbi gi\u00e1 g\u1ed1c:<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/621f13a4-5ea5-41b5-9249-74dd6606b3cc.png\"/> (\u0111\u1ed3ng).<br>S\u1ed1 l\u1ea7n gi\u1ea3m gi\u00e1 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/0017715e-b90c-4f7c-b5da-9e9ca9301a73.png\"/> \u0111\u1ed3ng l\u00e0:<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/98eb62e0-1ac8-4802-a069-ac690ccde08a.png\"/> (l\u1ea7n).<br>S\u1ed1 s\u1ea3n ph\u1ea9m t\u0103ng th\u00eam l\u00e0:<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/f5131aa2-f3df-414f-9191-41629975afeb.png\"/> (s\u1ea3n ph\u1ea9m).<br>T\u1ed5ng s\u1ed1 s\u1ea3n ph\u1ea9m b\u00e1n \u0111\u01b0\u1ee3c l\u00e0:<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/97d32d6f-de01-4498-a8c6-fb89bd112e37.png\"/> (s\u1ea3n ph\u1ea9m/ng\u00e0y).<br>V\u1eady, m\u1ec7nh \u0111\u1ec1 a sai.<br><b>b) \u0110\u00fang.</b><br>Khi ch\u01b0a gi\u1ea3m gi\u00e1, gi\u00e1 b\u00e1n l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/8ba0fa84-4579-40cc-958e-f0ee051ac2e5.png\"/> \u0111\u1ed3ng/s\u1ea3n ph\u1ea9m, v\u00e0 s\u1ed1 l\u01b0\u1ee3ng b\u00e1n \u0111\u01b0\u1ee3c l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/39b4e56d-77ef-40a4-81d8-5669747be590.png\"/> s\u1ea3n ph\u1ea9m/ng\u00e0y.<br>L\u1ee3i nhu\u1eadn tr\u00ean m\u1ed7i s\u1ea3n ph\u1ea9m: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/8fb63603-909c-4f71-b897-9e3997ee1b0d.png\"/> (\u0111\u1ed3ng).<br>T\u1ed5ng l\u1ee3i nhu\u1eadn theo ng\u00e0y:<br>L\u1ee3i nhu\u1eadn <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/ff571001-0fe3-4679-a470-e318a45e33c0.png\"/> (\u0111\u1ed3ng).<br>V\u1eady, m\u1ec7nh \u0111\u1ec1 b \u0111\u00fang.<br><b>c) \u0110\u00fang.</b><br>G\u1ecdi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/49fa23b7-e252-4308-9994-c9f1e63b2953.png\"/> l\u00e0 gi\u00e1 b\u00e1n s\u1ea3n ph\u1ea9m (ngh\u00ecn \u0111\u1ed3ng).\n<br>L\u1ee3i nhu\u1eadn tr\u00ean m\u1ed7i s\u1ea3n ph\u1ea9m l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/79ba0f00-4888-4e20-9371-84862d8f2926.png\"/> (ngh\u00ecn \u0111\u1ed3ng).\n<br>S\u1ed1 ti\u1ec1n gi\u1ea3m so v\u1edbi gi\u00e1 g\u1ed1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/2604cf0c-6bc6-4b59-bf39-b66c47551dd6.png\"/> \u0111\u1ed3ng (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/094c6649-c4c3-4f08-8839-77c7e6690e1f.png\"/> ngh\u00ecn \u0111\u1ed3ng) l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/cf8cac01-6b44-46e8-9966-6fbb4f537e97.png\"/> (ngh\u00ecn \u0111\u1ed3ng).\n<br>S\u1ed1 s\u1ea3n ph\u1ea9m t\u0103ng th\u00eam so v\u1edbi ban \u0111\u1ea7u l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/11f7e3ec-21d3-4226-a4bc-4a73c4dc94f4.png\"/> (s\u1ea3n ph\u1ea9m).<br>S\u1ed1 l\u01b0\u1ee3ng s\u1ea3n ph\u1ea9m b\u00e1n \u0111\u01b0\u1ee3c theo gi\u00e1 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/912d7d03-3cbb-4987-b1e8-2afead56bb2f.png\"/> l\u00e0:<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/2b23b934-8360-4a6a-a99a-d3265316e875.png\"/><br>H\u00e0m l\u1ee3i nhu\u1eadn theo ng\u00e0y <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/66a0ed51-baea-4f90-bd35-1b16bef75dcf.png\"/> l\u00e0:\n<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/8c329ca7-e8ff-46ef-8591-20e22507b427.png\"/> (L\u1ee3i nhu\u1eadn tr\u00ean m\u1ed7i s\u1ea3n ph\u1ea9m).(S\u1ed1 l\u01b0\u1ee3ng s\u1ea3n ph\u1ea9m b\u00e1n \u0111\u01b0\u1ee3c)\n<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/0ba915b4-6231-4d5d-8128-1b00d3da54c9.png\"/>.<br>Kho\u1ea3ng gi\u00e1 tr\u1ecb c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/b93c4df0-f1ef-4cd8-976f-447138a9ed18.png\"/> l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/0b9bb5aa-0e89-46fd-809b-8deaebba88aa.png\"/>.<br>V\u1eady, m\u1ec7nh \u0111\u1ec1 c \u0111\u00fang.<br><b>d) \u0110\u00fang.</b><br>Ta c\u1ea7n t\u00ecm gi\u00e1 tr\u1ecb l\u1edbn nh\u1ea5t c\u1ee7a h\u00e0m s\u1ed1 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/399d0090-c6d5-4d07-9fba-a5cd311b1a1a.png\"/> tr\u00ean \u0111o\u1ea1n <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/6/e0ad4dec-adc1-4e5a-9faa-f40256f4b8ca.png\"/>.<br>M\u1edf r\u1ed9ng bi\             } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
