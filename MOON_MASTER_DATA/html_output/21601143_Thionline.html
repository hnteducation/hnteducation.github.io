        const EXAM_DATA = [{"title": "", "content": "", "listQuestion": [{"questionId": 21601154, "lessonId": 0, "a": "M\u01b0u tr\u00ed.", "b": "T\u00e0i ngh\u1ec7.", "c": "D\u0169ng c\u1ea3m.", "d": "Tr\u01b0\u1ee3ng ngh\u0129a.", "bookId": 1088487, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNgh\u1ec7 \u0111\u1ee9ng th\u1eb3ng gi\u1eefa qu\u1ea3ng tr\u01b0\u1eddng trung \u01b0\u01a1ng, l\u1ea1i gi\u01a1 cung th\u1ea7n, t\u00ean th\u1ea7n l\u00ean, c\u00e1nh gi\u01b0\u01a1ng \u0111\u1ea7y v\u00e0nh tr\u0103ng nh\u1eb1m th\u1eb3ng v\u00e0o m\u1ed9t v\u1ea7ng th\u00e1i d\u01b0\u01a1ng \u1edf gi\u1eefa b\u1ea7u kh\u00f4ng, \u201cv\u00e8o\u201d m\u1ed9t ti\u1ebfng, m\u1ed9t m\u0169i t\u00ean bay \u0111i. Ch\u1eb3ng bao l\u00e2u, th\u1ea5y gi\u1eefa tr\u1eddi m\u1ed9t qu\u1ea3 c\u1ea7u l\u1eeda ch\u00e1y b\u00f9ng, l\u1eeda v\u1ecdt ra lo\u1ea1n x\u1ea1, r\u01a1i xu\u1ed1ng kh\u00f4ng bi\u1ebft bao nhi\u00eau l\u00e0 l\u00f4ng chim s\u1eafc v\u00e0ng, ti\u1ebfp \u0111\u00f3, m\u1ed9t c\u1ee5c g\u00ec \u0111\u1ecf r\u1ef1c \u201cr\u1ea7m r\u1ea7m\u201d r\u01a1i b\u1ecbch tr\u00ean m\u1eb7t \u0111\u1ea5t. M\u1ecdi ng\u01b0\u1eddi ch\u1ea1y c\u1ea3 l\u1ea1i xem, ho\u00e1 ra \u0111\u00f3 l\u00e0 m\u1ed9t con qu\u1ea1 ba ch\u00e2n c\u1ef1c l\u1edbn. M\u1ecdi ng\u01b0\u1eddi s\u1ee3 h\u00e3i nh\u00ecn c\u1ea3 l\u00ean b\u1ea7u tr\u1eddi th\u00ec ph\u00e1t hi\u1ec7n ra ch\u1ec9 c\u00f2n c\u00f3 ch\u00edn M\u1eb7t Tr\u1eddi. Con qu\u1ea1 v\u1eeba b\u1ecb b\u1eafn r\u01a1i t\u00e9 ra ch\u00ednh l\u00e0 m\u1ed9t M\u1eb7t Tr\u1eddi.\u201d</i><br><div style=\"text-align: right;\">(Th\u1ea7n tho\u1ea1i Trung Qu\u1ed1c, <i>H\u1eadu Ngh\u1ec7 b\u1eafn ch\u00edn M\u1eb7t Tr\u1eddi</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>Chi ti\u1ebft \u0111\u1ee9ng th\u1eb3ng gi\u1eefa qu\u1ea3ng tr\u01b0\u1eddng trung \u01b0\u01a1ng, gi\u01b0\u01a1ng cung b\u1eafn tr\u00fang v\u1ea7ng th\u00e1i d\u01b0\u01a1ng \u1edf gi\u1eefa b\u1ea7u kh\u00f4ng kh\u1eafc h\u1ecda \u0111\u1eb7c \u0111i\u1ec3m n\u00e0o c\u1ee7a nh\u00e2n v\u1eadt H\u1eadu Ngh\u1ec7?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft \u201c\u0111\u1ee9ng th\u1eb3ng gi\u1eefa qu\u1ea3ng tr\u01b0\u1eddng trung \u01b0\u01a1ng, gi\u01b0\u01a1ng cung b\u1eafn tr\u00fang v\u1ea7ng th\u00e1i d\u01b0\u01a1ng \u1edf gi\u1eefa b\u1ea7u kh\u00f4ng\u201d cho th\u1ea5y t\u00e0i b\u1eafn cung si\u00eau ph\u00e0m c\u1ee7a H\u1eadu Ngh\u1ec7. \u0110i\u1ec1u n\u00e0y cho th\u1ea5y t\u00e0i ngh\u1ec7 tuy\u1ec7t \u0111\u1ec9nh c\u1ee7a nh\u00e2n v\u1eadt.\n", "key": "B", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601164, "lessonId": 0, "a": "Kh\u1eb3ng \u0111\u1ecbnh Huy\u1ec1n Quang l\u00e0 ng\u01b0\u1eddi kh\u00f4ng ch\u00ednh tr\u1ef1c, ngay th\u1eb3ng.", "b": "Kh\u1eb3ng \u0111\u1ecbnh Huy\u1ec1n Quang \u0111\u01b0\u1ee3c ch\u01b0 Ph\u1eadt b\u1ea3o tr\u1ee3.", "c": "Kh\u1eb3ng \u0111\u1ecbnh Huy\u1ec1n Quang c\u00f3 ph\u00e9p thu\u1eadt.", "d": "Kh\u1eb3ng \u0111\u1ecbnh Huy\u1ec1n Quang ho\u00e0n to\u00e0n trong s\u1ea1ch, v\u00f4 t\u1ed9i, \u0111\u01b0\u1ee3c ch\u01b0 Ph\u1eadt ch\u1ee9ng gi\u00e1m.", "bookId": 1088488, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cKhi s\u1eafp b\u01b0\u1edbc v\u00e0o r\u1ea1p, Huy\u1ec1n Quang bi\u1ebft nh\u00e0 vua c\u1ed1 \u00fd l\u00e0m nh\u1ee5c m\u00ecnh. C\u00e1c m\u00e2m c\u1ed7 m\u1eb7n tanh t\u01b0\u1edfi b\u00e0y tr\u00ean \u0111\u00e0n kia n\u1ebfu kh\u00f4ng ph\u1ea3i l\u00e0 m\u1ed9t s\u1ef1 s\u1ec9 v\u1ea3 th\u00ec c\u00f2n g\u00ec n\u1eefa. L\u1ee5a ho\u00e0ng quy\u1ebfn n\u00f3i l\u00e1i l\u1ea1i r\u00f5 r\u00e0ng \u00e1m ch\u1ec9 hai ti\u1ebfng \u201cHuy\u1ec1n Quang\u201d. Ch\u00e0ng b\u00e8n ng\u1eeda m\u1eb7t l\u00ean tr\u1eddi l\u1edbn ti\u1ebfng kh\u1ea9n:<br>- K\u1ebb \u0111\u1ec7 t\u1eed n\u00e0y n\u1ebfu c\u00f3 \u0111i\u1ec1u g\u00ec b\u1ea5t ch\u00ednh, xin ch\u01b0 Ph\u1eadt cho \u0111\u00e0y xu\u1ed1ng A-t\u00ec \u0111\u1ecba ng\u1ee5c, c\u00f2n n\u1ebfu kh\u00f4ng, th\u00ec xin cho nh\u1eefng c\u1ed7 m\u1eb7n kia h\u00f3a th\u00e0nh chay t\u1ea5t c\u1ea3!<br>T\u1ef1 nhi\u00ean m\u1ed9t tr\u1eadn gi\u00f3 m\u1ea1nh n\u1ed5i l\u00ean, c\u00e1t b\u1ee5i m\u00f9 m\u1ecbt, tr\u1eddi \u0111\u1ea5t t\u1ed1i s\u1ea7m c\u1ea3 l\u1ea1i. M\u1ed9t ch\u1ed1c gi\u00f3 tan, m\u1ecdi ng\u01b0\u1eddi nh\u00ecn l\u00ean \u0111\u00e0n tr\u00e0ng th\u00ec, l\u1ea1 thay, t\u1ea5t c\u1ea3 c\u00e1c m\u00e2m c\u1ed7 m\u1eb7n \u0111\u1ec1u bi\u1ebfn th\u00e0nh c\u1ed7 chay tinh khi\u1ebft th\u01a1m tho, m\u1ecdi tanh t\u01b0\u1edfi \u0111\u1ec1u \u0111\u00e3 b\u1ecb qu\u00e9t s\u1ea1ch t\u1eeb bao gi\u1edd.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u0110\u1ed5ng Chi,<i> Huy\u1ec1n Quang, </i>theo theo<i> Kho t\u00e0ng truy\u1ec7n c\u1ed5 t\u00edch Vi\u1ec7t Nam</i>, t\u1eadp 2, NXB Gi\u00e1o d\u1ee5c, 2000)</div>S\u1ef1 linh \u1ee9ng trong l\u1eddi kh\u1ea5n c\u1ee7a Huy\u1ec1n Quang c\u00f3 \u00fd ngh\u0129a g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nS\u1ef1 linh \u1ee9ng trong l\u1eddi kh\u1ea5n c\u1ee7a Huy\u1ec1n Quang th\u1ec3 hi\u1ec7n s\u1ef1 minh b\u1ea1ch v\u00e0 l\u00f2ng ngay th\u1eb3ng c\u1ee7a \u00f4ng. Vi\u1ec7c c\u00e1c m\u00e2m c\u1ed7 m\u1eb7n h\u00f3a th\u00e0nh c\u1ed7 chay l\u00e0 d\u1ea5u hi\u1ec7u cho th\u1ea5y ch\u01b0 Ph\u1eadt \u0111\u00e3 ch\u1ee9ng gi\u00e1m v\u00e0 minh oan cho \u00f4ng, kh\u1eb3ng \u0111\u1ecbnh r\u1eb1ng \u00f4ng ho\u00e0n to\u00e0n trong s\u1ea1ch, kh\u00f4ng c\u00f3 h\u00e0nh vi b\u1ea5t ch\u00ednh.\n", "key": "D", "isVideo": true, "score": 0, "order": 2, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601181, "lessonId": 0, "a": "\u201cN\u00f4 n\u1ee9c qua ch\u01a1i \u0111\u1ea5t V\u1ecb Ho\u00e0ng,/ \u1ea4y n\u01a1i phong v\u1eadn ch\u1ed1n nhi\u1ec1u quan.\u201d", "b": "\u201cTr\u1eddi kia xui khi\u1ebfn s\u00f4ng n\u00ean b\u00e3i,/ Ai kh\u00e9o xoay ra ph\u1ed1 n\u1eeda l\u00e0ng.\u201d", "c": "\u201cKhua m\u00faa tr\u1ed1ng chu\u00f4ng, ch\u00f9a v\u1eabn v\u1eafng,/ X\u00ec x\u00e8o t\u00f4m t\u00e9p, ch\u1ee3 g\u1ea7n tan.\u201d", "d": "\u201cVi\u1ec7c l\u00e0ng, quan l\u1edbn \u0111i \u0111\u00e2u c\u1ea3?/ Ch\u1ec9 th\u1ea5y d\u0103m ba b\u00e1c x\u00e1c b\u00e0n.\u201d", "bookId": 1088489, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cN\u00f4 n\u1ee9c qua ch\u01a1i \u0111\u1ea5t V\u1ecb Ho\u00e0ng ,<br>\u1ea4y n\u01a1i phong v\u1eadn ch\u1ed1n nhi\u1ec1u quan .<br>Tr\u1eddi kia xui khi\u1ebfn s\u00f4ng n\u00ean b\u00e3i,<br>Ai kh\u00e9o xoay ra ph\u1ed1 n\u1eeda l\u00e0ng .<br>Khua m\u00faa tr\u1ed1ng chu\u00f4ng, ch\u00f9a v\u1eabn v\u1eafng,<br>X\u00ec x\u00e8o t\u00f4m t\u00e9p, ch\u1ee3 g\u1ea7n tan.<br>Vi\u1ec7c l\u00e0ng, quan l\u1edbn \u0111i \u0111\u00e2u c\u1ea3?<br>Ch\u1ec9 th\u1ea5y d\u0103m ba b\u00e1c x\u00e1c b\u00e0n.\u201d</i><br><div style=\"text-align: right;\">(Tr\u1ea7n T\u1ebf X\u01b0\u01a1ng, <i>V\u1ecb Ho\u00e0ng ho\u00e0i c\u1ed5</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>C\u1eb7p c\u00e2u th\u01a1 n\u00e0o t\u00e1i hi\u1ec7n qu\u00e1 tr\u00ecnh \u0111\u00f4 th\u1ecb ho\u00e1 di\u1ec5n ra \u1edf \u0111\u1ea5t V\u1ecb Ho\u00e0ng?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u1eb7p c\u00e2u th\u01a1 \u201cTr\u1eddi kia xui khi\u1ebfn s\u00f4ng n\u00ean b\u00e3i,/ Ai kh\u00e9o xoay ra ph\u1ed1 n\u1eeda l\u00e0ng.\u201d t\u00e1i hi\u1ec7n qu\u00e1 tr\u00ecnh \u0111\u00f4 th\u1ecb h\u00f3a \u1edf \u0111\u1ea5t V\u1ecb Ho\u00e0ng (Nam \u0110\u1ecbnh) th\u00f4ng qua s\u1ef1 thay \u0111\u1ed5i \u0111\u1ecba h\u00ecnh v\u00e0 kh\u00f4ng gian s\u1ed1ng: s\u00f4ng b\u1ecb b\u1ed3i l\u1ea5p th\u00e0nh b\u00e3i v\u00e0 ng\u01b0\u1eddi d\u00e2n bi\u1ebfn b\u00e3i \u0111\u1ea5t \u0111\u00f3 th\u00e0nh ph\u1ed1 x\u00e1 \u0111\u00f4ng \u0111\u00fac. \u0110\u00e2y ch\u00ednh l\u00e0 qu\u00e1 tr\u00ecnh \u0111\u00f4 th\u1ecb h\u00f3a, bi\u1ebfn \u0111\u1ed5i t\u1eeb n\u00f4ng th\u00f4n sang th\u00e0nh th\u1ecb.\n", "key": "B", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601187, "lessonId": 0, "a": "Tr\u1ea7n Anh V\u01b0\u01a1ng \u0111au m\u1eaft \u0111\u00e3 h\u01a1n m\u1ed9t th\u00e1ng, ch\u1eefa thu\u1ed1c kh\u00f4ng hi\u1ec7u qu\u1ea3, ng\u00e0y \u0111\u00eam ch\u00f3i nh\u1ee9c.", "b": "Vua m\u1ed9ng th\u1ea5y m\u1ed9t nh\u00e0 s\u01b0 l\u1ea5y tay xoa v\u00e0o m\u1eaft, t\u1ec9nh m\u1ed9ng m\u1eaft li\u1ec1n h\u1ebft \u0111au, qua v\u00e0i ng\u00e0y th\u00ec kh\u1ecfi h\u1eb3n.", "c": "Vua sai ng\u01b0\u1eddi m\u1eddi s\u01b0 Qu\u00e1n Vi\u00ean \u1edf ch\u00f9a \u0110\u00f4ng S\u01a1n \u0111\u1ebfn.", "d": "Nh\u00e0 s\u01b0 ch\u00f9a \u0110\u00f4ng S\u01a1n t\u00ean l\u00e0 Qu\u00e1n Vi\u00ean.", "bookId": 1088490, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNh\u00e0 s\u01b0 ch\u00f9a \u0110\u00f4ng S\u01a1n  t\u00ean l\u00e0 Qu\u00e1n Vi\u00ean, gi\u1edbi h\u1ea1nh thanh b\u1ea1ch, m\u1eaft tu\u1ec7 v\u1eb9n nhu\u1ea7n , m\u1ea5y ch\u1ee5c n\u0103m kh\u00f4ng xu\u1ed1ng n\u00fai. G\u1eb7p khi Tr\u1ea7n Anh V\u01b0\u01a1ng  \u0111au m\u1eaft \u0111\u00e3 h\u01a1n m\u1ed9t th\u00e1ng, ch\u1eefa thu\u1ed1c kh\u00f4ng hi\u1ec7u qu\u1ea3, ng\u00e0y \u0111\u00eam ch\u00f3i nh\u1ee9c. B\u1ed7ng n\u1eb1m m\u1ed9ng th\u1ea5y m\u1ed9t nh\u00e0 s\u01b0 l\u1ea5y tay xoa v\u00e0o m\u1eaft. Vua h\u1ecfi:<br>- Nh\u00e0 s\u01b0 t\u1eeb \u0111\u00e2u t\u1edbi, t\u00ean l\u00e0 g\u00ec?<br>\u0110\u00e1p:<br>- T\u00f4i l\u00e0 Qu\u00e1n Vi\u00ean, \u0111\u1ebfn c\u1ee9u m\u1eaft vua.<br>T\u1ec9nh m\u1ed9ng, m\u1eaft li\u1ec1n h\u1ebft \u0111au, qua v\u00e0i ng\u00e0y th\u00ec kh\u1ecfi h\u1eb3n. D\u00f2 h\u1ecfi trong gi\u1edbi nh\u00e0 s\u01b0, qu\u1ea3 nhi\u00ean c\u00f3 ng\u01b0\u1eddi t\u00ean l\u00e0 Qu\u00e1n Vi\u00ean \u1edf ch\u00f9a \u0110\u00f4ng S\u01a1n. Sai ng\u01b0\u1eddi m\u1eddi \u0111\u1ebfn, y h\u1ec7t nh\u00e0 s\u01b0 \u0111\u00e3 th\u1ea5y trong m\u1ed9ng.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Nguy\u00ean Tr\u1eebng,<i> Chi\u00eam bao ch\u1eefa b\u1ec7nh</i>, theo <i>Nam \u00d4ng m\u1ed9ng l\u1ee5c</i>, NXB V\u0103n h\u1ecdc, 2008)</div>Ch\u1ec9 ra chi ti\u1ebft k\u00ec \u1ea3o trong \u0111o\u1ea1n tr\u00edch.<br>", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft \u201cVua m\u1ed9ng th\u1ea5y m\u1ed9t nh\u00e0 s\u01b0 l\u1ea5y tay xoa v\u00e0o m\u1eaft, t\u1ec9nh m\u1ed9ng m\u1eaft li\u1ec1n h\u1ebft \u0111au, qua v\u00e0i ng\u00e0y th\u00ec kh\u1ecfi h\u1eb3n.\u201d mang y\u1ebfu t\u1ed1 k\u00ec \u1ea3o. Vi\u1ec7c nh\u00e0 vua m\u01a1 th\u1ea5y nh\u00e0 s\u01b0 ch\u1eefa b\u1ec7nh v\u00e0 sau \u0111\u00f3 b\u1ec7nh t\u00ecnh th\u1ef1c s\u1ef1 thuy\u00ean gi\u1ea3m kh\u00f4ng th\u1ec3 gi\u1ea3i th\u00edch b\u1eb1ng logic th\u00f4ng th\u01b0\u1eddng cho th\u1ea5y \u0111\u00e2y l\u00e0 m\u1ed9t \u0111i\u1ec1u phi th\u1ef1c t\u1ebf, mang \u0111\u1eadm m\u00e0u s\u1eafc k\u00ec \u1ea3o.\n", "key": "B", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601195, "lessonId": 0, "a": "\u201cH\u00f4i tanh ch\u1eb3ng th\u00fa v\u1ecb g\u00ec\u201d.", "b": "\u201cT\u1ea1o v\u1eadt b\u1ea5t th\u1ecb v\u00f4 \u0111\u1ec3 s\u1ef1\u201d.", "c": "\u201c\u0110\u1ee7 vu\u00f4ng tr\u00f2n, t\u01b0\u1ee3ng \u0111\u1ea5t, t\u01b0\u1ee3ng tr\u1eddi\u201d.", "d": "\u201cKh\u1eb3m ho\u1ea1 ph\u00fac, an nguy, t\u1eed ho\u1ea1t\u201d.", "bookId": 1088491, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cH\u00f4i tanh ch\u1eb3ng th\u00fa v\u1ecb g\u00ec,<br>Th\u1ebf m\u00e0 ai c\u0169ng k\u1ebb v\u00ec  ng\u01b0\u1eddi y\u00eau<br>T\u1ea1o v\u1eadt b\u1ea5t th\u1ecb v\u00f4 \u0111\u1ec3 s\u1ef1 <br>B\u00f2n ch\u00e0i ra m\u1ed9t th\u1ee9 qu\u1ea5y ch\u01a1i <br>\u0110\u1ee7 vu\u00f4ng tr\u00f2n, t\u01b0\u1ee3ng \u0111\u1ea5t, t\u01b0\u1ee3ng tr\u1eddi <br>Kh\u1eb3m ho\u1ea1 ph\u00fac, an nguy, t\u1eed ho\u1ea1t \u201c</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n C\u00f4ng Tr\u1ee9,<i> V\u1ecbnh \u0111\u1ed3ng ti\u1ec1n</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>C\u00e2u th\u01a1 n\u00e0o t\u1eadp trung th\u1ec3 hi\u1ec7n s\u1ee9c m\u1ea1nh v\u00f4 h\u00ecnh c\u1ee7a \u0111\u1ed3ng ti\u1ec1n?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u00e2u th\u01a1 \u201cKh\u1eb3m ho\u1ea1 ph\u00fac, an nguy, t\u1eed ho\u1ea1t\u201d mang ngh\u0129a \u0111\u1ed3ng ti\u1ec1n ch\u1ee9a ch\u1ea5t \u0111\u1ea7y \u0111\u1ee7 m\u1ecdi th\u1ee9 ho\u1ea1 ph\u00fac, y\u00ean \u1ed5n nguy hi\u1ec3m, s\u1ed1ng ch\u1ebft. \u0110i\u1ec1u n\u00e0y cho th\u1ea5y \u0111\u1ed3ng ti\u1ec1n c\u00f3 s\u1ee9c m\u1ea1nh to l\u1edbn, c\u00f3 th\u1ec3 chi ph\u1ed1i m\u1ecdi m\u1eb7t c\u1ee7a cu\u1ed9c s\u1ed1ng con ng\u01b0\u1eddi, mang l\u1ea1i c\u1ea3 h\u1ea1nh ph\u00fac l\u1eabn tai h\u1ecda, s\u1ef1 s\u1ed1ng v\u00e0 c\u00e1i ch\u1ebft.\n\u2192 C\u00e2u th\u01a1 \u201cKh\u1eb3m ho\u1ea1 ph\u00fac, an nguy, t\u1eed ho\u1ea1t\u201d t\u1eadp trung th\u1ec3 hi\u1ec7n s\u1ee9c m\u1ea1nh v\u00f4 h\u00ecnh c\u1ee7a \u0111\u1ed3ng ti\u1ec1n.\n", "key": "D", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601205, "lessonId": 0, "a": "L\u0169 tr\u1ebb ch\u0103n tr\u00e2u v\u00e0 nh\u1eefng ng\u01b0\u1eddi th\u00f4n qu\u00ea \u0111ang l\u00fai h\u00fai d\u1ee9t c\u1ecf may.", "b": "Ti\u1ebfng m\u1eb9 da di\u1ebft \u0111\u01b0a t\u00f4i v\u1ec1 d\u00f2ng s\u00f4ng Trinh N\u1eef ng\u00e0y x\u01b0a...", "c": "Tri\u1ec1n s\u00f4ng cao \u0111\u1ea7y hoa c\u1ecf may.", "d": "H\u1ecd v\u00f4 t\u00ecnh v\u1edbi n\u1ed7i \u0111au c\u1ee7a m\u1eb9 con t\u00f4i.", "bookId": 1088492, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cM\u1eb9 d\u1eabn t\u00f4i \u0111i d\u1ecdc tri\u1ec1n s\u00f4ng Trinh N\u1eef. Tri\u1ec1n s\u00f4ng cao \u0111\u1ea7y hoa c\u1ecf may. L\u0169 tr\u1ebb ch\u0103n tr\u00e2u v\u00e0 nh\u1eefng ng\u01b0\u1eddi th\u00f4n qu\u00ea \u0111ang l\u00fai h\u00fai d\u1ee9t c\u1ecf may. H\u1ecd ph\u01a1i c\u1ecf may \u1edf m\u1eb7t \u0111\u00ea \u0111\u1ec3 mang v\u1ec1 \u0111un n\u1ea5u thay cho r\u01a1m r\u1ea1. H\u1ecd v\u00f4 t\u00ecnh v\u1edbi n\u1ed7i \u0111au c\u1ee7a m\u1eb9 con t\u00f4i. M\u1eb9 k\u00e9o t\u00f4i ng\u1ed3i tr\u00ean v\u1ec7 c\u1ecf. Hoa c\u1ecf may ghim \u0111\u1ea7y qu\u1ea7n \u00e1o.<br>- Ch\u00ednh n\u01a1i n\u00e0y m\u1eb9 \u0111\u00e3 g\u1eb7p cha con.<br>T\u00f4i n\u1eb1m tr\u00ean c\u1ecf xanh nghi\u00eang \u0111\u1ea7u v\u00e0o l\u00f2ng m\u1eb9 v\u00e0 nghe m\u1eb9 k\u1ec3. Ti\u1ebfng m\u1eb9 da di\u1ebft \u0111\u01b0a t\u00f4i v\u1ec1 d\u00f2ng s\u00f4ng Trinh N\u1eef ng\u00e0y x\u01b0a...\u201d</i><br><div style=\"text-align: right;\">(S\u01b0\u01a1ng Nguy\u1ec7t Minh,<i> B\u00ean s\u00f4ng Trinh N\u1eef</i>, theo <i>baogiaothong.vn</i>)</div>Chi ti\u1ebft n\u00e0o sau \u0111\u00e2y g\u1ee3i t\u1ea3 kh\u00f4ng gian c\u1ee7a \u0111o\u1ea1n truy\u1ec7n?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft \u201cTri\u1ec1n s\u00f4ng cao \u0111\u1ea7y hoa c\u1ecf may\u201d tr\u1ef1c ti\u1ebfp g\u1ee3i t\u1ea3 kh\u00f4ng gian c\u1ee7a \u0111o\u1ea1n truy\u1ec7n, gi\u00fap ng\u01b0\u1eddi \u0111\u1ecdc h\u00ecnh dung v\u1ec1 c\u1ea3nh v\u1eadt thi\u00ean nhi\u00ean n\u01a1i \u201cm\u1eb9\u201d d\u1eaft \u201ct\u00f4i\u201d \u0111\u1ebfn v\u00e0 k\u1ec3 l\u1ea1i vi\u1ec7c l\u1ea7n \u0111\u1ea7u ti\u00ean m\u1eb9 g\u1eb7p cha.\n", "key": "C", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601209, "lessonId": 0, "a": "So s\u00e1nh, c\u00e2u h\u1ecfi tu t\u1eeb.", "b": "Nh\u00e2n ho\u00e1, so s\u00e1nh.", "c": "Nh\u00e2n ho\u00e1, \u1ea9n d\u1ee5.", "d": "C\u00e2u h\u1ecfi tu t\u1eeb, n\u00f3i qu\u00e1.", "bookId": 1088493, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cL\u1eafng tai nghe \u0111\u00e0n b\u1ea7u<br>Ng\u00e2n d\u00e0i trong \u0111\u00eam th\u00e2u<br>\u00cam \u0111\u1ec1m nh\u01b0 d\u00f2ng su\u1ed1i<br>\u0110\u00e0n ch\u1edf h\u1ed3n v\u1ec1 \u0111\u00e2u?\u201d</i><br><div style=\"text-align: right;\">(L\u1eef Giang, <i>Ti\u1ebfng \u0111\u00e0n b\u1ea7u</i>, theo <i>nhandan.vn</i>)</div>C\u00e1c bi\u1ec7n ph\u00e1p tu t\u1eeb n\u00e0o \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong hai c\u00e2u cu\u1ed1i?<br>", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u00e1c bi\u1ec7n ph\u00e1p tu t\u1eeb \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong hai c\u00e2u cu\u1ed1i l\u00e0:<br>\n- So s\u00e1nh: ti\u1ebfng \u0111\u00e0n b\u1ea7u \u0111\u01b0\u1ee3c so s\u00e1nh v\u1edbi s\u1ef1 \u00eam \u0111\u1ec1m c\u1ee7a d\u00f2ng su\u1ed1i.<br>\n- C\u00e2u h\u1ecfi tu t\u1eeb: C\u00e2u h\u1ecfi \u201c\u0110\u00e0n ch\u1edf h\u1ed3n v\u1ec1 \u0111\u00e2u?\u201d g\u1ee3i l\u00ean c\u1ea3m gi\u00e1c m\u01a1 h\u1ed3 v\u00e0 nh\u1eefng suy t\u01b0 v\u1ec1 \u00e2m thanh c\u1ee7a \u0111\u00e0n b\u1ea7u.\n", "key": "A", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601214, "lessonId": 0, "a": "Bi\u1ec3u c\u1ea3m, ngh\u1ecb lu\u1eadn.", "b": "Mi\u00eau t\u1ea3, thuy\u1ebft minh.", "c": "Thuy\u1ebft minh, bi\u1ec3u c\u1ea3m.", "d": "T\u1ef1 s\u1ef1, mi\u00eau t\u1ea3.", "bookId": 1088494, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cKhi Chi\u00eau Th\u00e0nh V\u01b0\u01a1ng t\u1edbi b\u00e3i t\u1eadp th\u00ec th\u1ea5y Qu\u1ed1c To\u1ea3n c\u1edfi tr\u1ea7n \u0111\u00f3ng kh\u1ed1 \u0111\u1ec3 l\u1ed9 n\u01b0\u1edbc da tr\u1eafng tr\u1ebbo. L\u1ed1 nh\u1ed1 chung quanh l\u00e0 nh\u1eefng trai tr\u00e1ng trong l\u00e0ng, c\u0169ng \u0111\u00f3ng kh\u1ed1 c\u1edfi tr\u1ea7n, m\u00ecnh \u0111en tr\u00f9i tr\u0169i. Ng\u01b0\u1eddi t\u01b0\u1edbng gi\u00e0 c\u0169ng ng\u1ed3i trong \u0111\u00e1m v\u1eadt. Tr\u00f4ng th\u1ea5y Chi\u00eau Th\u00e0nh V\u01b0\u01a1ng, ng\u01b0\u1eddi t\u01b0\u1edbng gi\u00e0 ph\u1ee5c xu\u1ed1ng l\u1ea1y. Ho\u00e0i V\u0103n \u0111ang m\u1ea3i v\u1eadt v\u1edbi m\u1ed9t anh trai l\u00e0ng. Anh n\u00e0y n\u1eb1m d\u00e1n xu\u1ed1ng \u0111\u1ea5t. Ho\u00e0i V\u0103n n\u1eb1m tr\u00ean, nh\u01b0ng loay hoay m\u00e3i, kh\u00f4ng l\u1eadt ng\u1eeda anh kia ra \u0111\u01b0\u1ee3c. Vai v\u00e0 l\u01b0ng Ho\u00e0i V\u0103n \u0111\u1ecf t\u1ea5y, h\u1eb1n l\u00ean nh\u1eefng v\u1ebft ng\u00f3n tay c\u1ee7a \u0111\u1ed1i ph\u01b0\u01a1ng. Chi\u00eau Th\u00e0nh V\u01b0\u01a1ng \u0111\u1ee9ng xem, ng\u1ee9a m\u1eaft n\u00f3i to:<br>- K\u00e9o g\u1ecdng v\u00f3 l\u00ean! \u0110\u00e1nh v\u1eadt ch\u01b0a bi\u1ebft mi\u1ebfng. To\u1ea3n \u0111\u00e1nh mi\u1ebfng g\u1ecdng v\u00f3, mau...<br>B\u1ea5y gi\u1edd Ho\u00e0i V\u0103n m\u1edbi bi\u1ebft l\u00e0 ch\u00fa \u0111\u1ebfn, v\u1ed9i bu\u00f4ng anh b\u1ea1n s\u1ee5p xu\u1ed1ng l\u1ea1y.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Huy T\u01b0\u1edfng, <i>L\u00e1 c\u1edd th\u00eau s\u00e1u ch\u1eef v\u00e0ng</i>, theo <i>Nguy\u1ec5n Huy T\u01b0\u1edfng tuy\u1ec3n t\u1eadp</i>, NXB V\u0103n h\u1ecdc, 2012)</div>\u0110o\u1ea1n v\u0103n k\u1ebft h\u1ee3p v\u1eadn d\u1ee5ng c\u00e1c ph\u01b0\u01a1ng th\u1ee9c bi\u1ec3u \u0111\u1ea1t n\u00e0o?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n v\u0103n k\u1ebft h\u1ee3p v\u1eadn d\u1ee5ng c\u00e1c ph\u01b0\u01a1ng th\u1ee9c bi\u1ec3u \u0111\u1ea1t sau:<br>\n- T\u1ef1 s\u1ef1: \u0110o\u1ea1n v\u0103n k\u1ec3 l\u1ea1i di\u1ec5n bi\u1ebfn s\u1ef1 vi\u1ec7c Chi\u00eau Th\u00e0nh V\u01b0\u01a1ng \u0111\u1ebfn b\u00e3i t\u1eadp v\u00e0 ch\u1ee9ng ki\u1ebfn c\u1ea3nh Ho\u00e0i V\u0103n \u0111\u00e1nh v\u1eadt.<br>\n- Mi\u00eau t\u1ea3: \u0110o\u1ea1n v\u0103n mi\u00eau t\u1ea3 chi ti\u1ebft ngo\u1ea1i h\u00ecnh c\u1ee7a Qu\u1ed1c To\u1ea3n, nh\u1eefng ng\u01b0\u1eddi trai tr\u00e1ng, c\u1ea3nh \u0111\u00e1nh v\u1eadt, v\u00e0 h\u00e0nh \u0111\u1ed9ng c\u1ee7a c\u00e1c nh\u00e2n v\u1eadt.\n", "key": "D", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601229, "lessonId": 0, "a": "\u201c\u1ed2! Th\u1ebf th\u00ec b\u1ed9 \u00e1o n\u00e0y may \u0111\u01b0\u1ee3c \u0111\u1ea5y.\u201d.", "b": "\u201cL\u1ea1i c\u1ea7n ph\u1ea3i b\u1ea3o may hoa xu\u00f4i \u01b0?\u201d.", "c": "\u201cNh\u1eefng ng\u01b0\u1eddi qu\u00fd ph\u00e1i m\u1eb7c \u00e1o ng\u01b0\u1ee3c hoa \u01b0?\u201d.", "d": "\u201cTh\u1ebf n\u00e0y l\u00e0 th\u1ebf n\u00e0o? B\u00e1c may hoa ng\u01b0\u1ee3c m\u1ea5t r\u1ed3i!\u201d.", "bookId": 1088495, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cPH\u00d3 MAY - Th\u01b0a, \u0111\u00e2y l\u00e0 b\u1ed9 l\u1ec5 ph\u1ee5c \u0111\u1eb9p nh\u1ea5t tri\u1ec1u \u0111\u00ecnh v\u00e0 may v\u1eeba m\u1eaft nh\u1ea5t. S\u00e1ng ch\u1ebf ra \u0111\u01b0\u1ee3c m\u1ed9t b\u1ed9 l\u1ec5 ph\u1ee5c trang nghi\u00eam m\u00e0 kh\u00f4ng ph\u1ea3i m\u00e0u \u0111en  th\u1eadt l\u00e0 tuy\u1ec7t t\u00e1c. T\u00f4i th\u00e1ch c\u00e1c th\u1ee3 gi\u1ecfi nh\u1ea5t m\u00e0 l\u00e0m n\u1ed5i \u0111\u1ea5y.<br>\u00d4NG GIU\u1ed0C-\u0110ANH - Th\u1ebf n\u00e0y l\u00e0 th\u1ebf n\u00e0o? B\u00e1c may hoa ng\u01b0\u1ee3c m\u1ea5t r\u1ed3i! <br>PH\u00d3 MAY - N\u00e0o ng\u00e0i c\u00f3 b\u1ea3o l\u00e0 ng\u00e0i mu\u1ed1n may xu\u00f4i hoa \u0111\u00e2u!<br>\u00d4NG GIU\u1ed0C-\u0110ANH - L\u1ea1i c\u1ea7n ph\u1ea3i b\u1ea3o may hoa xu\u00f4i \u01b0?<br>PH\u00d3 MAY - V\u00e2ng, ph\u1ea3i b\u1ea3o ch\u1ee9. V\u00ec nh\u1eefng ng\u01b0\u1eddi qu\u00fd ph\u00e1i  \u0111\u1ec1u m\u1eb7c nh\u01b0 th\u1ebf n\u00e0y c\u1ea3.<br>\u00d4NG GIU\u1ed0C-\u0110ANH - Nh\u1eefng ng\u01b0\u1eddi qu\u00fd ph\u00e1i m\u1eb7c \u00e1o ng\u01b0\u1ee3c hoa \u01b0?<br>PH\u00d3 MAY - Th\u01b0a ng\u00e0i, v\u00e2ng.<br>\u00d4NG GIU\u1ed0C-\u0110ANH - \u1ed2! Th\u1ebf th\u00ec b\u1ed9 \u00e1o n\u00e0y may \u0111\u01b0\u1ee3c \u0111\u1ea5y.\u201d</i><br><div style=\"text-align: right;\">(M\u00f4-li-e,<i> Tr\u01b0\u1edfng gi\u1ea3  h\u1ecdc l\u00e0m sang</i>, theo <i>Ng\u1eef v\u0103n 8</i>, t\u1eadp 2, NXB Gi\u00e1o d\u1ee5c Vi\u1ec7t Nam, 2013)</div>L\u1eddi tho\u1ea1i n\u00e0o c\u1ee7a \u00f4ng Giu\u1ed1c-\u0111anh ch\u1ee9ng t\u1ecf nh\u00e2n v\u1eadt v\u1ed1n kh\u00f4ng thu\u1ed9c v\u1ec1 giai t\u1ea7ng \u201cqu\u00fd ph\u00e1i\u201d?<br>", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nL\u1eddi tho\u1ea1i \u201cNh\u1eefng ng\u01b0\u1eddi qu\u00fd ph\u00e1i m\u1eb7c \u00e1o ng\u01b0\u1ee3c hoa \u01b0?\u201d  th\u1ec3 hi\u1ec7n r\u00f5 s\u1ef1 ng\u1ee1 ng\u00e0ng, b\u1ed1i r\u1ed1i c\u1ee7a \u00f4ng Giu\u1ed1c-\u0111anh khi nghe ph\u00f3 may n\u00f3i r\u1eb1ng \u201cnh\u1eefng ng\u01b0\u1eddi qu\u00fd ph\u00e1i \u0111\u1ec1u m\u1eb7c nh\u01b0 th\u1ebf n\u00e0y\u201d. \u0110i\u1ec1u \u0111\u00f3 ch\u1ee9ng t\u1ecf \u00f4ng kh\u00f4ng th\u1ef1c s\u1ef1 hi\u1ec3u bi\u1ebft v\u1ec1 phong c\u00e1ch \u0103n m\u1eb7c c\u1ee7a gi\u1edbi qu\u00fd t\u1ed9c, m\u00e0 ch\u1ec9 h\u1ecdc \u0111\u00f2i l\u00e0m sang.<br>\n\u2192 L\u1eddi tho\u1ea1i \u201cNh\u1eefng ng\u01b0\u1eddi qu\u00fd ph\u00e1i m\u1eb7c \u00e1o ng\u01b0\u1ee3c hoa \u01b0?\u201d c\u1ee7a \u00f4ng Giu\u1ed1c-\u0111anh ch\u1ee9ng t\u1ecf nh\u00e2n v\u1eadt v\u1ed1n kh\u00f4ng thu\u1ed9c v\u1ec1 giai t\u1ea7ng \u201cqu\u00fd ph\u00e1i\u201d.  \n", "key": "C", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601232, "lessonId": 0, "a": "D\u00f2ng th\u1ee9 nh\u1ea5t.", "b": "D\u00f2ng th\u1ee9 hai.", "c": "D\u00f2ng th\u1ee9 ba.", "d": "D\u00f2ng th\u1ee9 t\u01b0.", "bookId": 1088496, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTh\u01b0\u01a1ng thi\u00ean h\u1eefu \u00fd to\u1ea3 anh h\u00f9ng,<br>B\u00e1t nguy\u1ec7t ti\u00eau ma c\u1ed1c tr\u1ea5t trung.<br>X\u00edch b\u00edch th\u1ed1n \u00e2m, ch\u00e2n kh\u1ea3 t\u00edch?<br>B\u1ea5t tri h\u00e0 nh\u1eadt xu\u1ea5t lao lung?\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>T\u00edch quang \u00e2m</i>)</div>D\u1ecbch ngh\u0129a:<br><i>\u201cTr\u1eddi xanh c\u1ed1 \u00fd h\u00e3m k\u1ebb anh h\u00f9ng,<br>T\u00e1m th\u00e1ng nay m\u00f2n m\u1ecfi trong ch\u1ed1n c\u00f9m g\u00f4ng.<br>T\u1ea5c b\u00f3ng qu\u00fd h\u01a1n th\u01b0\u1edbc ng\u1ecdc, th\u1eadt l\u00e0 \u0111\u00e1ng ti\u1ebfc!<br>Ch\u1eb3ng bi\u1ebft ng\u00e0y n\u00e0o tho\u00e1t kh\u1ecfi v\u00f2ng lao t\u00f9?\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>Ti\u1ebfc ng\u00e0y gi\u1edd, theo T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>D\u00f2ng th\u01a1 n\u00e0o b\u00e0y t\u1ecf t\u00e2m tr\u1ea1ng s\u1ed1t ru\u1ed9t, mong ng\u00e0y tho\u00e1t kh\u1ecfi c\u1ea3nh lao t\u00f9 c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nD\u00f2ng th\u01a1 \u201cB\u1ea5t tri h\u00e0 nh\u1eadt xu\u1ea5t lao lung?\u201d (Ch\u1eb3ng bi\u1ebft ng\u00e0y n\u00e0o tho\u00e1t kh\u1ecfi v\u00f2ng lao t\u00f9?) l\u00e0 m\u1ed9t c\u00e2u h\u1ecfi tu t\u1eeb, th\u1ec3 hi\u1ec7n t\u00e2m tr\u1ea1ng s\u1ed1t ru\u1ed9t, kh\u1eafc kho\u1ea3i, mong m\u1ecfi \u0111\u01b0\u1ee3c t\u1ef1 do c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh.<br>\n\u2192 D\u00f2ng th\u01a1 th\u1ee9 t\u01b0 b\u00e0y t\u1ecf t\u00e2m tr\u1ea1ng s\u1ed1t ru\u1ed9t, mong ng\u00e0y tho\u00e1t kh\u1ecfi c\u1ea3nh lao t\u00f9 c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh.\n", "key": "D", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601237, "lessonId": 0, "a": "L\u1eddi tr\u1ef1c ti\u1ebfp.", "b": "L\u1eddi n\u1eeda tr\u1ef1c ti\u1ebfp.", "c": "L\u1eddi v\u0103n k\u1ec3.", "d": "L\u1eddi b\u00ecnh lu\u1eadn.", "bookId": 1088497, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cC\u00e1 \u00f4ng n\u01b0\u1ee3c, c\u00f9ng v\u00f4 s\u1ed1 th\u1ee9 v\u1eadt ch\u1ea5t tr\u00f4i d\u1ea1t ngang qua, l\u00fac n\u00e0o c\u0169ng gieo v\u00e0o \u0111\u1ea7u t\u1ee5i c\u1ed1 c\u00e2u h\u1ecfi, r\u1eb1ng ch\u00fang t\u1edbi t\u1eeb n\u01a1i ch\u1ed1n xa x\u00f4i n\u00e0o. Nh\u1eefng tr\u00e1i m\u1eafm n\u00e0y \u0111\u00e3 r\u1ee5ng kh\u1ecfi c\u00e2y t\u1eeb h\u1ed3i n\u00e0o m\u00e0 khi t\u1edbi \u0111\u00e2y \u0111\u00e3 m\u1ecdc m\u1ea7m ra r\u1ec5 v\u00e0 b\u1ed9 r\u1ec5 \u0111\u00e3 d\u00e0y ph\u00f9 sa? Nh\u1eefng tr\u00e1i b\u1ea7n ch\u00edn c\u0169ng v\u1eady, tr\u00f4i bao l\u00e2u m\u00e0 r\u00e3 h\u1ea1t n\u01a1i n\u00e0y? Hay ch\u1ee7 nh\u00e2n c\u1ee7a b\u00fap b\u00ea s\u1ee9t c\u00e0ng g\u00e3y g\u1ecdng n\u1ecd, ch\u1eafc con nh\u1ecf c\u0169ng tr\u1ea1c tu\u1ed5i c\u1ed1, ch\u1eafc n\u00f3 th\u01a1m x\u00e0 b\u00f4ng, da tr\u1eafng b\u00f3c, ch\u00e2n mang gu\u1ed1c, m\u1eb7c \u00e1o \u0111\u1ea7m. Hay ch\u1ecb g\u00e1i n\u00e0o t\u1eebng l\u1ea5y c\u00e1i c\u00e0i \u0111\u00f3ng rong r\u00eau kia x\u01b0\u1edbc l\u00ean \u0111\u1ea7u, t\u00f3c ch\u1ecb d\u00e0i \u0111\u1ebfn \u0111\u00e2u. M\u1ed7i m\u1ed9t v\u1eadt \u0111\u1ec1u k\u1ec3 c\u00e2u chuy\u1ec7n ri\u00eang, c\u1ea3 c\u00e1i ch\u00e2n gi\u1ea3 c\u0169ng l\u00e0m b\u1ecdn c\u1ed1 ch\u1ea1nh l\u00f2ng qu\u00e1 \u0111\u1ed7i. Ng\u01b0\u1eddi b\u1ecb m\u1ea5t n\u00f3 ch\u1eafc ph\u1ea3i nh\u1ea3y l\u00f2 c\u00f2 su\u1ed1t t\u1eeb b\u1eefa \u0111\u1ebfn gi\u1edd.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Ng\u1ecdc T\u01b0, <i>Kh\u1edfi \u0111\u1ea7u c\u1ee7a gi\u00f3</i>, theo <i>nguoidothi.net.vn</i>)</div>T\u00e2m tr\u1ea1ng c\u1ee7a c\u00e1c nh\u00e2n v\u1eadt trong \u0111o\u1ea1n tr\u00edch khi nh\u00ecn th\u1ea5y nh\u1eefng v\u1eadt ch\u1ea5t tr\u00f4i d\u1ea1t ngang qua kh\u00fac s\u00f4ng ch\u1ee7 y\u1ebfu \u0111\u01b0\u1ee3c bi\u1ec3u \u0111\u1ea1t b\u1eb1ng h\u00ecnh th\u1ee9c l\u1eddi v\u0103n n\u00e0o?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nTrong \u0111o\u1ea1n tr\u00edch, t\u00e2m tr\u1ea1ng c\u1ee7a c\u00e1c nh\u00e2n v\u1eadt \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n m\u1ed9t c\u00e1ch gi\u00e1n ti\u1ebfp qua l\u1eddi c\u1ee7a ng\u01b0\u1eddi k\u1ec3 chuy\u1ec7n. Khi nh\u00ecn th\u1ea5y nh\u1eefng v\u1eadt ch\u1ea5t tr\u00f4i d\u1ea1t ngang qua kh\u00fac s\u00f4ng, t\u00e2m tr\u1ea1ng c\u1ee7a \u201ct\u1ee5i c\u1ed1\u201d \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n qua nh\u1eefng c\u00e2u h\u1ecfi li\u00ean ti\u1ebfp: \u201cNh\u1eefng tr\u00e1i m\u1eafm n\u00e0y \u0111\u00e3 r\u1ee5ng kh\u1ecfi c\u00e2y t\u1eeb h\u1ed3i n\u00e0o\u2026, \u201cHay ch\u1ee7 nh\u00e2n c\u1ee7a b\u00fap b\u00ea s\u1ee9t c\u00e0ng g\u00e3y g\u1ecdng n\u1ecd\u2026\u201d  Nh\u1eefng c\u00e2u v\u0103n n\u00e0y v\u1eeba l\u00e0 l\u1eddi k\u1ec3 c\u1ee7a ng\u01b0\u1eddi d\u1eabn chuy\u1ec7n, v\u1eeba l\u00e0 t\u00e2m tr\u1ea1ng, suy ngh\u0129 c\u1ee7a c\u00e1c nh\u00e2n v\u1eadt.<br>\n\u2192 T\u00e2m tr\u1ea1ng c\u1ee7a c\u00e1c nh\u00e2n v\u1eadt trong \u0111o\u1ea1n tr\u00edch khi nh\u00ecn th\u1ea5y nh\u1eefng v\u1eadt ch\u1ea5t tr\u00f4i d\u1ea1t ngang qua kh\u00fac s\u00f4ng ch\u1ee7 y\u1ebfu \u0111\u01b0\u1ee3c bi\u1ec3u \u0111\u1ea1t b\u1eb1ng h\u00ecnh th\u1ee9c l\u1eddi v\u0103n n\u1eeda tr\u1ef1c ti\u1ebfp.\n", "key": "B", "isVideo": true, "score": 0, "order": 11, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601239, "lessonId": 0, "a": "\u201cThu \u0111i\u1ebfu\u201d, \u201cTi\u1ebfn s\u0129 gi\u1ea5y\u201d, \u201cH\u1ed9i T\u00e2y\u201d.", "b": "\u201cKh\u00f4ng ch\u1ed3ng m\u00e0 ch\u1eeda\u201d, \u201cL\u1ee1 b\u01b0\u1edbc sang ngang\u201d, \u201cM\u00f9a hoa roi\u201d.", "c": "\u201cThu\u1eadt h\u1ee9ng\u201d, \u201cNg\u00f4n ch\u00ed, \u201cC\u00f4n S\u01a1n ca\u201d.", "d": "\u201c\u0110\u1ed9c Ti\u1ec3u Thanh k\u00ed\u201d, \u201cV\u0103n chi\u00eau h\u1ed3n\u201d, \u201cTruy\u1ec7n Ki\u1ec1u\u201d.", "bookId": 1088498, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "D\u00f2ng n\u00e0o sau \u0111\u00e2y n\u00eau t\u00ean nh\u1eefng t\u00e1c ph\u1ea9m <b>kh\u00f4ng </b>c\u00f9ng thu\u1ed9c m\u1ed9t t\u00e1c gi\u1ea3?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- \u201cKh\u00f4ng ch\u1ed3ng m\u00e0 ch\u1eeda\u201d l\u00e0 b\u00e0i th\u01a1 N\u00f4m c\u1ee7a H\u1ed3 Xu\u00e2n H\u01b0\u01a1ng.<br>\n- \u201cL\u1ee1 b\u01b0\u1edbc sang ngang\u201d \u0111\u01b0\u1ee3c \u0111\u0103ng l\u1ea7n \u0111\u1ea7u tr\u00ean Ti\u1ec3u thuy\u1ebft th\u1ee9 n\u0103m n\u0103m 1939, sau \u0111\u01b0\u1ee3c in trong t\u1eadp th\u01a1 c\u00f9ng t\u00ean c\u1ee7 nh\u00e0 th\u01a1 Nguy\u1ec5n B\u00ednh.<br>\n- \u201cM\u00f9a hoa roi\u201d l\u00e0 b\u00e0i th\u01a1 n\u0103m ch\u1eef c\u1ee7a nh\u00e0 th\u01a1 Xu\u00e2n Qu\u1ef3nh<br>-&gt; B l\u00e0 \u0111\u00e1p \u00e1n \u0111\u00fang.\n", "key": "B", "isVideo": true, "score": 0, "order": 12, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601244, "lessonId": 0, "a": "Ngh\u1ec9 ngh\u01a1i, ngoan ngo\u00e3n, ng\u00f3ng \u0111\u1ee3i.", "b": "Ng\u1edd ngh\u1ec7ch, ng\u1ecdng ng\u1ecbu, ngon ngh\u1ebb.", "c": "L\u00eau ngh\u00eau, ngoe ngu\u1ea9y, nghi ng\u1ea1i.", "d": "Ng\u1ea7n ng\u1eeb, l\u1ed9c ngh\u1ed9c, ng\u1ed5n ngang.", "bookId": 1088499, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "D\u00f2ng n\u00e0o d\u01b0\u1edbi \u0111\u00e2y c\u00f3 c\u00e1c t\u1eeb vi\u1ebft \u0111\u00fang ch\u00ednh t\u1ea3?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- D\u00f2ng c\u00f3 c\u00e1c t\u1eeb vi\u1ebft \u0111\u00fang ch\u00ednh t\u1ea3 l\u00e0: L\u00eau ngh\u00eau, ngoe ngu\u1ea9y, nghi ng\u1ea1i.<br>\n- Nh\u1eefng t\u1eeb vi\u1ebft sai ch\u00ednh t\u1ea3: ngh\u1ec9 ngh\u01a1i, ng\u1ecdng ng\u1ecbu, l\u1ed9c ngh\u1ed9c<br>\n- S\u1eeda l\u1ea1i: ngh\u1ec9 ng\u01a1i, ng\u1ecdng ngh\u1ecbu, l\u1ed9c ng\u1ed9c\n", "key": "C", "isVideo": true, "score": 0, "order": 13, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601245, "lessonId": 0, "a": "Con ch\u00e1u \u00f4ng b\u00 h\u0129a. \u201cCh\u1ec9 huy\u201d th\u01b0\u1eddng d\u00f9ng \u0111\u1ec3 ch\u1ec9 \u0111i\u1ec1u khi\u1ec3n s\u1ef1 ho\u1ea1t \u0111\u1ed9ng c\u1ee7a m\u1ed9t l\u1ef1c l\u01b0\u1ee3ng, m\u1ed9t t\u1eadp th\u1ec3 c\u00f3 t\u1ed5 ch\u1ee9c, kh\u00f4ng ph\u00f9 h\u1ee3p v\u1edbi ng\u1eef c\u1ea3nh c\u00e2u v\u0103n \u0111ang n\u00f3i v\u1ec1 cu\u1ed9c s\u1ed1ng sinh ho\u1ea1t trong gia \u0111\u00ecnh.<br>\n- S\u1eeda l\u1ea1i: Trong nhi\u1ec1u gia \u0111\u00ecnh, nh\u1eefng ng\u00e0y gi\u00e1p T\u1ebft, ng\u01b0\u1eddi v\u1ee3, ng\u01b0\u1eddi m\u1eb9 th\u01b0\u1eddng <b>h\u01b0\u1edbng d\u1eabn </b>ch\u1ed3ng con d\u1ecdn d\u1eb9p, trang ho\u00e0ng nh\u00e0 c\u1eeda.\n", "key": "D", "isVideo": true, "score": 0, "order": 15, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601249, "lessonId": 0, "a": "Sai v\u1ec1 d\u00f9ng t\u1eeb.", "b": "Sai ng\u1eef ph\u00e1p.", "c": "Sai quy chi\u1ebfu.", "d": "Sai logic.", "bookId": 1088502, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Trong b\u00e0i th\u01a1 \u0111\u00e3 b\u1ed9c l\u1ed9 s\u00e2u s\u1eafc n\u1ed7i nh\u1edb qu\u00ea h\u01b0\u01a1ng c\u1ee7a ng\u01b0\u1eddi \u0111i xa.<br>X\u00e1c \u0111\u1ecbnh l\u1ed7i sai trong c\u00e2u tr\u00ean.", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- C\u00e2u sai ng\u1eef ph\u00e1p do thi\u1ebfu ch\u1ee7 ng\u1eef.<br>\n- S\u1eeda l\u1ea1i: Trong b\u00e0i th\u01a1,<b> t\u00e1c gi\u1ea3</b> \u0111\u00e3 b\u1ed9c l\u1ed9 s\u00e2u s\u1eafc n\u1ed7i nh\u1edb qu\u00ea h\u01b0\u01a1ng c\u1ee7a ng\u01b0\u1eddi \u0111i xa. \n", "key": "B", "isVideo": true, "score": 0, "order": 16, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601250, "lessonId": 0, "a": "\u0110\u1ec3 l\u00 ef1c hi\u1ec7n h\u00e0nh \u0111\u1ed9ng \u201chi\u1ec7n di\u1ec7n\u201d.\n", "key": "A", "isVideo": true, "score": 0, "order": 24, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601281, "lessonId": 0, "a": "T\u00f4 \u0111\u1eadm t\u00ecnh c\u1ea3nh kh\u1ed1n kh\u00f3 c\u1ee7a \u0111\u1ed3ng b\u00e0o v\u00f9ng l\u0169.", "b": "Mi\u00eau t\u1ea3 nh\u1eefng gieo neo m\u00e0 nh\u00e2n d\u00e2n v\u00f9ng l\u0169 g\u1eb7p ph\u1ea3i khi thi\u00ean tai gi\u00e1ng ho\u1ea1.", "c": "Kh\u1eafc ho\u1ea1 t\u00ecnh c\u1ea3m gi\u1ea3n d\u1ecb, n\u1ed3ng \u1ea5m, ch\u00e2n th\u00e0nh c\u1ee7a nh\u00e2n d\u00e2n c\u1ea3 n\u01b0\u1edbc d\u00e0nh cho \u0111\u1ed3ng b\u00e0o l\u0169 l\u1ee5t.", "d": "K\u1ec3 t\u00ean c\u00e1c \u0111\u1ed3 d\u00f9ng, v\u1eadt d\u1ee5ng, nhu y\u1ebfu ph\u1ea9m \u0111\u01b0\u1ee3c trang c\u1ea5p cho nh\u00e2n d\u00e2n v\u00f9ng l\u0169.", "bookId": 1088511, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201c\u0110\u00f3 l\u00e0 nh\u1eefng t\u1ea5m b\u00e1nh ch\u01b0ng, nh\u1eefng n\u1eafm c\u01a1m, h\u1ed9p s\u1eefa, nh\u1eefng b\u1ed9 qu\u1ea7n \u00e1o l\u00e0nh l\u1eb7n... \u0111\u01b0\u1ee3c \u0111\u1ed3ng b\u00e0o c\u1ea3 n\u01b0\u1edbc g\u1eedi \u0111\u1ebfn ng\u01b0\u1eddi d\u00e2n v\u00f9ng l\u0169.\u201d<br>Ph\u00e9p li\u1ec7t k\u00ea trong c\u00e2u v\u0103n tr\u00ean c\u00f3 \u00fd ngh\u0129a g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:<br></b>\nC\u00e2u v\u0103n s\u1eed d\u1ee5ng bi\u1ec7n ph\u00e1p tu t\u1eeb li\u1ec7t k\u00ea, k\u1ec3 t\u00ean nh\u1eefng v\u1eadt ph\u1ea9m c\u1ee9u tr\u1ee3 \u0111\u01b0\u1ee3c g\u1eedi \u0111\u1ebfn ng\u01b0\u1eddi d\u00e2n v\u00f9ng l\u0169. \u201cB\u00e1nh ch\u01b0ng, n\u1eafm c\u01a1m, h\u1ed9p s\u1eefa, qu\u1ea7n \u00e1o l\u00e0nh l\u1eb7n\u2026\u201d g\u1ee3i l\u00ean h\u00ecnh \u1ea3nh nh\u1eefng m\u00f3n qu\u00e0 m             const el = document.getElementById(`question-${qKey}`);
            if (el) {
                // Scroll native với offset (do header fixed)
                // Sử dụng phương pháp cũ nhưng chắc chắn hoạt động hơn scrollIntoView trên container cuộn
                // Lấy tọa độ tương đối so với viewport
                const yOffset = -80; // Trừ header
                const y = el.getBoundingClientRect().top + window.pageYOffset + yOffset;
                
                window.scrollTo({top: y, behavior: 'smooth'});
                
                // Highlight hiệu ứng
                el.classList.add('ring-2', 'ring-moon', 'ring-offset-2');
                setTimeout(() => el.classList.remove('ring-2', 'ring-moon', 'ring-offset-2'), 1500);
            }
            // Đóng mobile palette nếu đang mở
            document.getElementById('mobile-palette').classList.add('hidden');
        }

        // --- RENDER ENGINE ---
        function renderExam(reset = false) {
            const container = document.getElementById('exam-content');
            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; 
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

            let globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`;
                    const qType = q.normalizedType;
                    
                    // -- Palette Item (FIX ONCLICK SCOPE) --
                    // Sử dụng arrow function trong JS string template cẩn thận
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    
                    // Gán sự kiện click trực tiếp thay vì chuỗi string HTML để tránh lỗi scope
                    palBtn.addEventListener('click', function() { scrollToQuestion(qKey); });
                    
                    palDesk.appendChild(palBtn.cloneNode(true)); // Desktop clone cần gán lại event nếu cloneNode ko copy event
                    // Clone node không copy event listener. Phải tạo 2 nút riêng hoặc gán lại.
                    // Cách tốt nhất: tạo chuỗi HTML hoặc append element.
                    // Ở đây để đơn giản ta gán onclick bằng attribute string cho chắc ăn
                    palBtn.setAttribute('onclick', `scrollToQuestion('${qKey}')`);
                    
                    // Sau khi set attribute, append lại
                    palDesk.innerHTML = palDesk.innerHTML; // Reset để xoá nút cũ? Không nên.
                    // Code cũ append child.
                    
                    // Fix triệt để: Tạo string HTML cho palette
                    // (Đã sửa ở dưới)
                });
            });
            
            // Render lại từ đầu để tối ưu
            palDesk.innerHTML = '';
            palMob.innerHTML = '';
            container.innerHTML = '';
            globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`;
                    const qType = q.normalizedType;

                    // Palette Buttons
                    const btnClass = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    const btnHtml = `<button id="pal_${qKey}" onclick="scrollToQuestion('${qKey}')" class="${btnClass}">${qId}</button>`;
                    
                    palDesk.innerHTML += btnHtml;
                    palMob.innerHTML += btnHtml;

                    // Question Card
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'question-card bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // TYPE 0: MCQ
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { 
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; 
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // TYPE 1 & 3: FILL KEY
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const chars = userVal.split('');
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let boxesHtml = '<div class="flex gap-2 justify-start items-center">';
                        for(let i=0; i<4; i++) {
                            const char = chars[i] || '';
                            boxesHtml += `<input type="text" maxlength="1" 
                                class="char-input" 
                                data-index="${i}" 
                                data-key="${qKey}" 
                                value="${char}" 
                                readonly 
                                onclick="activateNumpad(this, '${qKey}')"
                                ${isSubmitted ? 'disabled' : ''} 
                            />`;
                        }
                        
                        if(examMode === 'practice' && !isSubmitted) {
                             boxesHtml += `<button onclick="checkFillAnswer('${qKey}')" class="ml-2 px-3 py-2 bg-blue-100 text-blue-700 font-bold rounded-lg text-sm hover:bg-blue-200 transition-colors">Kiểm tra</button>`;
                             // Nút xem lời giải cho practice
                             boxesHtml += `<button onclick="toggleSolution('${qKey}')" class="ml-2 px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button>`;
                        }
                        boxesHtml += '</div>';

                        let feedbackHtml = "";
                        if(isSubmitted) {
                             const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                             if(isCorrect) {
                                feedbackHtml = `<div class="mt-2 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                             } else {
                                feedbackHtml = `<div class="mt-2 text-red-600 text-sm">✗ Sai. Đáp án: <span class="font-bold">${correctVal}</span></div>`;
                             }
                        } else if (examMode === 'practice') {
                             feedbackHtml = `<div id="feedback-${qKey}" class="mt-2 text-sm font-bold hidden"></div>`;
                        }

                        html += `
                        <div class="flex flex-col relative">
                            ${boxesHtml}
                            ${feedbackHtml}
                        </div>`;
                    }

                    // TYPE 2: TRUE/FALSE
                    else if(qType === '2') {
                         html += `<div class="overflow-hidden border rounded-lg">
                            <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                                <tr>
                                    <th scope="col" class="px-3 py-3 w-10 text-center">Ý</th>
                                    <th scope="col" class="px-3 py-3">Nội dung</th>
                                    <th scope="col" class="px-3 py-3 w-32 text-center">Chọn Đ/S</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; 
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; 
                                const userChoice = userObj[pIdx]; 
                                
                                let trClass = "bg-white hover:bg-gray-50";
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) trClass = "bg-green-50";
                                    else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
