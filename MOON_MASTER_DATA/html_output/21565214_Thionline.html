    <script>

exane).<br><br>\n- M\u1ee5c \u0111\u00edch: d\u00f9ng s\u1ef1 kh\u00e1c nhau v\u1ec1 \u0111\u1ed9 tan gi\u1eefa c\u00e1c ch\u1ea5t \u0111\u1ec3 t\u00e1ch l\u1edbp h\u1eefu c\u01a1 (ch\u1ee9a ester) ra kh\u1ecfi l\u1edbp n\u01b0\u1edbc (ch\u1ee9a acid, alcohol d\u01b0, x\u00fac t\u00e1c H\u2082SO\u2084, v.v.).\n", "key": "C", "isVideo": true, "score": 0, "order": 104, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21473307, "lessonId": 0, "a": "50,4 %.", "b": "68,2 %.", "c": "79,1 %.", "d": "99,3 %.", "bookId": 1073383, "comments": 2, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Gi\u1ea3 s\u1eed sau ph\u1ea3n \u1ee9ng ester ho\u00e1, h\u1ed7n h\u1ee3p s\u1ea3n ph\u1ea9m th\u1ef1c t\u1ebf thu \u0111\u01b0\u1ee3c ch\u1ee9a 0,12 mol ester isopentyl acetate, acetic acid d\u01b0 v\u00e0 isopentanol d\u01b0. Ti\u1ebfn h\u00e0nh qu\u00e1 tr\u00ecnh chi\u1ebft:<br>\u25aa Cho h\u1ec7 s\u1ed1 ph\u00e2n b\u1ed1 (distribution coefficient) c\u1ee7a ester: K<sub>ester</sub> = 200. V\u1edbi h\u1ec7 s\u1ed1 K l\u1edbn ch\u1ee9ng minh ester tan t\u1ed1t trong dung m\u00f4i h\u1eefu c\u01a1.<br>\u25aa Sau khi r\u1eeda, ph\u1ea7n ester c\u00f2n l\u1ea1i trong dung m\u00f4i h\u1eefu c\u01a1 \u0111\u01b0\u1ee3c t\u00ednh b\u1eb1ng c\u00f4ng th\u1ee9c:<br><span lang=\"FR\" style=\"font-size:12.0pt;mso-bidi-font-size:\n11.0pt;line-height:120%;font-family:&quot;Times New Roman&quot;,serif;mso-fareast-font-family:\n&quot;MS Mincho&quot;;mso-bidi-theme-font:minor-bidi;mso-ansi-language:FR;mso-fareast-language:\nEN-US;mso-bidi-language:AR-SA\"><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/11/6a64a7d5-3ef7-4aea-b6cd-ada4641c5f04.png\"/></span><br><p class=\"MsoNormal\">\u25aa n<sub>o</sub> l\u00e0 s\u1ed1 mol c\u00f2n l\u1ea1i c\u1ee7a ester trong dung m\u00f4i h\u1eefu c\u01a1<br>\u25aa n l\u00e0 s\u1 e9t kh\u00f4ng \u0111i\u1ec1u ki\u1ec7n cu\u1ed9c chi\u1ebfn tranh ph\u00e1 ho\u1ea1i (11 - 1968). Cu\u1ed9c chi\u1ebfn tranh ph\u00e1 ho\u1ea1i c\u1ee7a M\u1ef9 \u1edf mi\u1ec1n B\u1eafc n\u01b0\u1edbc ta k\u00e9o d\u00e0i su\u1ed1t b\u1ed1n n\u0103m, v\u1edbi m\u1ed9t l\u1ef1c l\u01b0\u1ee3ng kh\u00f4ng qu\u00e2n chi\u1ebfn l\u01b0\u1ee3c v\u00e0 m\u1ed9t b\u1ed9 ph\u1eadn h\u1ea3i qu\u00e2n, v\u1edbi s\u1ed1 l\u01b0\u1ee3ng bom \u0111\u1ea1n r\u1ea5t l\u1edbn, \u0111\u00e3 b\u1ecb th\u1ea5t b\u1ea1i ho\u00e0n to\u00e0n. \u00c2m m\u01b0u c\u1ee7a \u0111\u1ecbch \u0111\u00e1nh ph\u00e1 mi\u1ec1n B\u1eafc \u0111\u1ec3 c\u1ee9u v\u0103n th\u1ebf th\u1ea5t b\u1ea1i c\u1ee7a ch\u00fang \u1edf mi\u1ec1n Nam \u0111\u00e3 b\u1ecb ph\u00e1 s\u1ea3n.<br>Nh\u01b0 v\u1eady l\u00e0, trong l\u00fac cu\u1ed9c chi\u1ebfn tranh c\u1ee5c b\u1ed9 c\u00f2n \u0111ang ti\u1ebfp di\u1ec5n \u1edf mi\u1ec1n Nam, \u0111\u1ecbch \u0111\u00e3 ph\u1ea3i th\u1ea5t b\u1ea1i v\u00e0 ch\u1ea5m d\u1ee9t kh\u00f4ng \u0111i\u1ec1u ki\u1ec7n vi\u1ec7c \u0111\u00e1nh ph\u00e1 mi\u1ec1n B\u1eafc, \u0111\u00f3 l\u00e0 th\u1eafng l\u1ee3i h\u1ebft s\u1ee9c quan tr\u1ecdng v\u1ec1 chi\u1ebfn l\u01b0\u1ee3c c\u1ee7a ta, l\u00e0 th\u1ea5t b\u1ea1i r\u1ea5t n\u1eb7ng n\u1ec1 c\u1ee7a \u0111\u1ecbch\u201d.</i><br><div style=\"text-align: right;\">(<i>Ngh\u1ecb quy\u1ebft s\u1ed1 196-NQ/TW, ng\u00e0y 10/3/1970, H\u1ed9i ngh\u1ecb l\u1ea7n th\u1ee9 18 Ban Ch\u1ea5p h\u00e0nh Trung \u01b0\u01a1ng \u0110\u1ea3ng Lao \u0111\u1ed9ng Vi\u1ec7t Nam v\u1ec1 t\u00ecnh h\u00ecnh v\u00e0 nhi\u1ec7m v\u1ee5</i>)</div>", "listQuestion": [{"questionId": 19897942, "lessonId": 0, "a": "Cu\u1ed9c Ti\u1ebfn c\u00f4ng chi\u1ebfn l\u01b0\u1ee3c xu\u00e2n \u2013 h\u00e8 n\u0103m 1972.", "b": "Cu\u1ed9c T\u1ed5ng ti\u1ebfn c\u00f4ng v\u00e0 n\u1ed5i d\u1eady n\u0103m M\u1eadu Th\u00e2n 1968.", "c": "Chi\u1ebfn th\u1eafng \u201c\u0110i\u1ec7n Bi\u00ean Ph\u1ee7 tr\u00ean kh\u00f4ng\u201d cu\u1ed1i n\u0103m 1972.", "d": "S\u1ef1 k\u1                                 const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
