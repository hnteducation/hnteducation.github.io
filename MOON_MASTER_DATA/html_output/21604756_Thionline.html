    <script>
        const EXAM_DATA = [{"title": "", "content": "", "listQuestion": [{"questionId": 21604772, "lessonId": 0, "a": "Ph\u00ea duy\u1ec7t s\u1edb t\u1ea5u c\u1ee7a c\u00e1c gia \u0111\u00ecnh.", "b": "Ghi ch\u00e9p h\u00e0nh vi c\u1ee7a m\u1ecdi ng\u01b0\u1eddi trong gia \u0111\u00ecnh th\u1ea7n tr\u00f4ng nom.", "c": "Ghi ch\u00e9p l\u1eddi n\u00f3i c\u1ee7a m\u1ecdi ng\u01b0\u1eddi trong gia \u0111\u00ecnh th\u1ea7n tr\u00f4ng nom.", "d": "Hai m\u01b0\u01a1i ba th\u00e1ng Ch\u1ea1p h\u1eb1ng n\u0103m l\u00ean tr\u1eddi t\u00e2u v\u1edbi Ng\u1ecdc Ho\u00e0ng m\u1ecdi vi\u1ec7c do m\u00ecnh cai qu\u1ea3n.", "bookId": 1088874, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTh\u1ea7n B\u1ebfp, c\u0169ng g\u1ecdi l\u00e0 T\u00e1o Qu\u00e2n, c\u00f3 nhi\u1ec7m v\u1ee5 ghi ch\u00e9p nh\u1eefng h\u00e0nh vi v\u00e0 l\u1eddi l\u1ebd c\u1ee7a m\u1ecdi ng\u01b0\u1eddi \u1edf trong gia \u0111\u00ecnh th\u1ea7n tr\u00f4ng nom. M\u1ed7i n\u0103m \u0111\u1ebfn ng\u00e0y hai m\u01b0\u01a1i ba th\u00e1ng Ch\u1ea1p, th\u1ea7n l\u00ean tr\u1eddi \u0111\u1ec3 t\u00e2u m\u1ecdi vi\u1ec7c v\u1edbi Ng\u1ecdc Ho\u00e0ng v\u00e0 c\u0169ng do l\u1eddi trong s\u1edb c\u1ee7a th\u1ea7n m\u00e0 gia \u0111\u00ecnh th\u1ea7n \u1edf trong n\u0103m t\u1edbi s\u1ebd g\u1eb7p s\u1ef1 l\u00e0nh hay d\u1eef.\u201d</i><br><div style=\"text-align: right;\">(Th\u1ea7n tho\u1ea1i Vi\u1ec7t Nam, <i>Th\u1ea7n B\u1ebfp</i>, NXB S\u00e1ng t\u1ea1o, 1970)</div><br>Th\u1ea7n B\u1ebfp <b>kh\u00f4ng </b>th\u1ef1c thi nhi\u1ec7m v\u1ee5 n\u00e0o sau \u0111\u00e2y?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nTheo \u0111o\u1ea1n tr\u00edch, th\u1ea7n B\u1ebfp c\u00f3 nhi\u1ec7m v\u1ee5 ghi ch\u00e9p nh\u1eefng h\u00e0nh vi v\u00e0 l\u1eddi l\u1ebd c\u1ee7a m\u1ecdi ng\u01b0\u1eddi \u1edf trong gia \u0111\u00ecnh th\u1ea7n tr\u00f4ng nom, \u0111\u1ebfn ng\u00e0y hai m\u01b0\u01a1i ba th\u00e1ng Ch\u1ea1p h\u00e0ng n\u0103m, th\u1ea7n l\u00ean tr\u1eddi \u0111\u1ec3 t\u00e2u m\u1ecdi vi\u1ec7c v\u1edbi Ng\u1ecdc Ho\u00e0ng.<br>\n\u2192 Th\u1ea7n B\u1ebfp kh\u00f4ng th\u1ef1c thi nhi\u1ec7m v\u1ee5 ph\u00ea duy\u1ec7t s\u1edb t\u1ea5u c\u1ee7a c\u00e1c gia \u0111\u00ecnh.", "key": "A", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604776, "lessonId": 0, "a": "Con chim pu-p\u00fat.", "b": "V\u00ec kh\u00f4ng ng\u1ee7 \u0111\u01b0\u1ee3c.", "c": "L\u00f2ng th\u01b0\u01a1ng m\u1eb9 nh\u1edb cha.", "d": "Xing Nh\u00e3 c\u00f3 h\u1eb9n t\u1eeb tr\u01b0\u1edbc v\u1edbi B\u01a1-ra Tang.", "bookId": 1088875, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u0110\u00eam h\u00f4m \u1ea5y, Xing Nh\u00e3 tr\u1eb1n tr\u1ecdc m\u00e3i, ng\u1ed3i kh\u00f4ng \u0111\u01b0\u1ee3c, ng\u1ee7 kh\u00f4ng n\u1ed5i, \u0111\u1ee9ng c\u0169ng kh\u00f4ng y\u00ean. Ngo\u00e0i b\u1edd su\u1ed1i, con chim pu-p\u00fat \u0111i\u1ec3m canh t\u1eebng h\u1ed3i d\u00e0i. Xing Nh\u00e3 ra ngo\u00e0i h\u00e8, b\u01b0\u1edbc l\u00ean l\u1ea1i b\u01b0\u1edbc xu\u1ed1ng c\u1ea7u thang. L\u00f2ng th\u01b0\u01a1ng m\u1eb9 nh\u1edb cha \u0111\u00e3 gi\u1ee5c Xing Nh\u00e3 \u0111\u1ebfn nh\u00e0 B\u01a1-ra Tang gi\u1eefa \u0111\u00eam khuya kho\u1eaft.\u201d</i><br><div style=\"text-align: right;\">(S\u1eed thi Gia Rai, <i>Xing Nh\u00e3</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div><br>Theo \u0111o\u1ea1n tr\u00edch, \u0111i\u1ec1u g\u00ec th\u00f4i th\u00fac Xing Nh\u00e3 \u0111\u1ebfn nh\u00e0 B\u01a1-ra Tang gi\u1eefa \u0111\u00eam khuya kho\u1eaft?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nD\u1ef1a v\u00e0o c\u00e2u v\u0103n: \u201cL\u00f2ng th\u01b0\u01a1ng m\u1eb9 nh\u1edb cha \u0111\u00e3 gi\u1ee5c Xing Nh\u00e3 \u0111\u1ebfn nh\u00e0 B\u01a1-ra Tang gi\u1eefa \u0111\u00eam khuya kho\u1eaft.\u201d<br>\n\u2192 Theo \u0111o\u1ea1n tr\u00edch, l\u00f2ng th\u01b0\u01a1ng m\u1eb9 nh\u1edb cha \u0111\u00e3 th\u00f4i th\u00fac Xing Nh\u00e3 \u0111\u1ebfn nh\u00e0 B\u01a1-ra Tang gi\u1eefa \u0111\u00eam khuya kho\u1eaft.", "key": "C", "isVideo": true, "score": 0, "order": 2, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604780, "lessonId": 0, "a": "T\u1eeb th\u1ea5p g\u1ea7n l\u00ean cao xa r\u1ed3i l\u1ea1i xu\u1ed1ng th\u1ea5p g\u1ea7n.", "b": "T\u1eeb cao xa xu\u1ed1ng th\u1ea5p g\u1ea7n r\u1ed3i l\u1ea1i l\u00ean cao xa.", "c": "Linh ho\u1ea1t, kh\u00f4ng theo m\u1ed9t chi\u1ec1u h\u01b0\u1edbng n\u00e0o.", "d": "T\u1eeb tr\u00e1i qua ph\u1ea3i.", "bookId": 1088876, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTr\u1eddi thu xanh ng\u1eaft m\u1ea5y t\u1ea7ng cao,<br>C\u1ea7n tr\u00fac l\u01a1 ph\u01a1 gi\u00f3 h\u1eaft hiu.<br>N\u01b0\u1edbc bi\u1ebfc tr\u00f4ng nh\u01b0 t\u1ea7ng kh\u00f3i ph\u1ee7,<br>Song th\u01b0a \u0111\u1ec3 m\u1eb7c b\u00f3ng tr\u0103ng v\u00e0o.<br>M\u1ea5y ch\u00f9m tr\u01b0\u1edbc gi\u1eadu hoa n\u0103m ngo\u00e1i,<br>M\u1ed9t ti\u1ebfng tr\u00ean kh\u00f4ng ng\u1ed7ng n\u01b0\u1edbc n\u00e0o?<br>Nh\u00e2n h\u1ee9ng c\u0169ng v\u1eeba toan c\u1ea5t b\u00fat,<br>Ngh\u0129 ra l\u1ea1i th\u1eb9n v\u1edbi \u00f4ng \u0110\u00e0o .\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Khuy\u1ebfn, <i>Thu v\u1ecbnh</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>Trong b\u00e0i th\u01a1, \u0111i\u1ec3m nh\u00ecn ngh\u1ec7 thu\u1eadt g\u1eafn li\u1ec1n v\u1edbi khung c\u1ea3nh thi\u00ean nhi\u00ean \u0111\u01b0\u1ee3c di chuy\u1ec3n theo chi\u1ec1u h\u01b0\u1edbng n\u00e0o?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nTrong b\u00e0i th\u01a1, \u0111i\u1ec3m nh\u00ecn ngh\u1ec7 thu\u1eadt g\u1eafn li\u1ec1n v\u1edbi khung c\u1ea3nh thi\u00ean nhi\u00ean \u0111\u01b0\u1ee3c di chuy\u1ec3n theo chi\u1ec1u h\u01b0\u1edbng:<br>\n+ T\u1eeb cao xa: <i>Tr\u1eddi thu xanh ng\u1eaft m\u1ea5y t\u1ea7ng cao </i>\u2192 T\u1ea7m nh\u00ecn h\u01b0\u1edbng l\u00ean tr\u1eddi.<br>\n+ Xu\u1ed1ng th\u1ea5p g\u1ea7n: <i>C\u1ea7n tr\u00fac l\u01a1 ph\u01a1, n\u01b0\u1edbc bi\u1ebfc, song th\u01b0a</i> \u2192 C\u1ea3nh v\u1eadt g\u1ea7n g\u0169i quanh nh\u00e0.<br>\n+ R\u1ed3i l\u1ea1i l\u00ean cao xa: <i>M\u1ed9t ti\u1ebfng tr\u00ean kh\u00f4ng ng\u1ed7ng n\u01b0\u1edbc n\u00e0o? </i>\u2192 Am thanh v\u1ecdng t\u1eeb kh\u00f4ng trung, t\u1ea7m nh\u00ecn l\u1ea1i h\u01b0\u1edbng l\u00ean cao.", "key": "B", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604783, "lessonId": 0, "a": "M\u1ed9t c\u00e1i gi\u01b0\u1eddng th\u1ea5t b\u1ea3o.", "b": "M\u1ed9t khung c\u1eeda son.", "c": "M\u1ed9t c\u00e1i gi\u01b0\u1eddng nh\u1ecf b\u1eb1ng g\u1ed7 \u0111\u00e0n h\u01b0\u01a1ng.", "d": "Nh\u1eefng t\u00f2a cung \u0111i\u1ec7n b\u1eb1ng b\u1ea1c.", "bookId": 1088877, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cSinh \u0111i theo h\u1ecd v\u00e0o, v\u00f2ng quanh m\u1ed9t b\u1ee9c t\u01b0\u1eddng g\u1ea5m, v\u00e0o trong m\u1ed9t khung c\u1eeda son, th\u1ea5y nh\u1eefng t\u00f2a cung \u0111i\u1ec7n b\u1eb1ng b\u1ea1c \u0111\u1ee9ng s\u1eefng, c\u00f3 nh\u1eefng t\u1ea5m bi\u1ec3n \u0111\u1ec1 \u201c\u0110i\u1ec7n Qu\u1ef3nh H\u01b0\u201d, \u201cG\u00e1c Dao Quang\u201d. Tr\u00ean g\u00e1c c\u00f3 b\u00e0 ti\u00ean \u00e1o tr\u1eafng, ng\u1ed3i tr\u00ean m\u1ed9t c\u00e1i gi\u01b0\u1eddng th\u1ea5t b\u1ea3o b\u00ean c\u1ea1nh \u0111\u1eb7t m\u1ed9t c\u00e1i gi\u01b0\u1eddng nh\u1ecf b\u1eb1ng g\u1ed7 \u0111\u00e0n h\u01b0\u01a1ng.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n D\u1eef, <i>Chuy\u1ec7n T\u1eeb Th\u1ee9c l\u1ea5y v\u1ee3 ti\u00ean</i>, theo <i>Truy\u1ec1n k\u00ec m\u1ea1n l\u1ee5c</i>, NXB V\u0103n h\u1ecdc, 2008)</div><br>Kh\u00f4ng gian k\u00ec \u1ea3o trong \u0111o\u1ea1n tr\u00edch \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n qua chi ti\u1ebft n\u00e0o?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nChi ti\u1ebft \u201cNh\u1eefng t\u00f2a cung \u0111i\u1ec7n b\u1eb1ng b\u1ea1c\u201d mang \u0111\u1eadm y\u1ebfu t\u1ed1 k\u1ef3 \u1ea3o v\u00ec cung \u0111i\u1ec7n b\u1eb1ng b\u1ea1c l\u00e0 h\u00ecnh \u1ea3nh kh\u00f4ng c\u00f3 th\u1ef1c, ch\u1ec9 c\u00f3 th\u1ec3 xu\u1ea5t hi\u1ec7n trong th\u1ebf gi\u1edbi th\u1ea7n ti\u00ean.\n", "key": "D", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604787, "lessonId": 0, "a": "\u201c\u00d4i! Th\u00f4i, b\u00e1c \u0111\u1eebng kh\u00f3c n\u1eefa,/ C\u00f3 b\u1eefa \u0103n \u0111\u00e2y, ta c\u00f9ng vui.\u201d.", "b": "\u201c\u0110\u1eddi ng\u01b0\u1eddi nh\u01b0 qu\u00e1n tr\u1ecd,/ M\u1ea5y ai \u0111\u01b0\u1ee3c th\u1ea3nh th\u01a1i\u201d.", "c": "\u201cNh\u1ea9n nha th\u00f4i, ch\u1edb v\u1ed9i nu\u1ed1t\u201d.", "d": "\u201c\u0110ang \u0111\u00f3i m\u00e0 qu\u00e1 no ngay l\u00e0 kh\u00f4ng t\u1ed1t!\u201d.", "bookId": 1088878, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cY! T\u1eed th\u1ea3 h\u01b0u l\u1ec7,<br><br>Nh\u1ea5t qu\u1ef9 d\u1eef t\u1eed hoan.<br><br>Du du ngh\u1ecbch l\u1eef trung,<br><br>B\u00e1ch ni\u00ean th\u00f9y t\u1ef1 khoan.<br><br>M\u1ea1n d\u00e3 m\u1ea1c s\u1eadu y\u1ebft,<br><br>B\u1ea1 doanh phi tr\u00e1ng nhan.\u201d</i><br><br>D\u1ecbch ngh\u0129a:<br><i><br> \u201c\u00d4i! Th\u00f4i, b\u00e1c \u0111\u1eebng kh\u00f3c n\u1eefa,<br><br>C\u00f3 b\u1eefa \u0103n \u0111\u00e2y, ta c\u00f9ng vui.<br><br>\u0110\u1eddi ng\u01b0\u1eddi nh\u01b0 qu\u00e1n tr\u1ecd,<br><br>M\u1ea5y ai \u0111\u01b0\u1ee3c th\u1ea3nh th\u01a1i,<br><br>Nh\u1ea9n nha th\u00f4i, ch\u1edb v\u1ed9i nu\u1ed1t,<br><br>\u0110ang \u0111\u00f3i m\u00e0 qu\u00e1 no ngay l\u00e0 kh\u00f4ng t\u1ed1t!\u201d</i><br><div style=\"text-align: right;\">(Cao B\u00e1 Qu\u00e1t, <i>\u0110\u1ea1o ph\u00f9ng ng\u00e3 phu</i> , theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div><br>Gi\u1ecdng \u0111i\u1ec7u tri\u1ebft l\u00ed \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n r\u00f5 n\u00e9t trong nh\u1eefng d\u00f2ng th\u01a1 n\u00e0o?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nGi\u1ecdng \u0111i\u1ec7u tri\u1ebft l\u00ed \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n r\u00f5 n\u00e9t trong nh\u1eefng d\u00f2ng th\u01a1 \u201c\u0110\u1eddi ng\u01b0\u1eddi nh\u01b0 qu\u00e1n tr\u1ecd,/ M\u1ea5y ai \u0111\u01b0\u1ee3c th\u1ea3nh th\u01a1i\u201d. H\u00ecnh \u1ea3nh \u201c\u0111\u1eddi ng\u01b0\u1eddi nh\u01b0 qu\u00e1n tr\u1ecd\u201d g\u1ee3i suy ng\u1eabm v\u1ec1 s\u1ef1 v\u00f4 th\u01b0\u1eddng c\u1ee7a ki\u1ebfp ng\u01b0\u1eddi, cu\u1ed9c \u0111\u1eddi ch\u1ec9 nh\u01b0 m\u1ed9t ch\u1ed1n d\u1eebng ch\u00e2n t\u1ea1m b\u1ee3. C\u00e2u th\u01a1 \u201cM\u1ea5y ai \u0111\u01b0\u1ee3c th\u1ea3nh th\u01a1i\u201d th\u1ec3 hi\u1ec7n s\u1ef1 chi\u00eam nghi\u1ec7m s\u00e2u s\u1eafc v\u1ec1 nh\u1eefng kh\u00f3 kh\u0103n, v\u1ea5t v\u1ea3 m\u00e0 con ng\u01b0\u1eddi ph\u1ea3i tr\u1ea3i qua trong cu\u1ed9c s\u1ed1ng.", "key": "B", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604792, "lessonId": 0, "a": "Cha lu\u00f4n n\u1eb1m m\u00e9 ngo\u00e0i c\u00f9ng ph\u00eda tay ph\u1ea3i.", "b": "Cha v\u00f2ng tay qua m\u00f4ng th\u1eb1ng b\u00e9.", "c": "N\u00f3 v\u00e0 em g\u00e1i ch\u01b0a bao gi\u1edd \u0111\u01b0\u1ee3c n\u1eb1m trong l\u00f2ng cha.", "d": "M\u1eb9 kh\u00f4ng n\u1eb1m c\u1ea1nh cha m\u00e0 \u0111\u1ebfn b\u00ean n\u1eb1m c\u1ea1nh n\u00f3 ho\u1eb7c l\u00e0 gi\u1eefa n\u00f3 v\u00e0 em g\u00e1i.", "bookId": 1088879, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cCha lu\u00f4n n\u1eb1m m\u00e9 ngo\u00e0i c\u00f9ng ph\u00eda tay ph\u1ea3i. Th\u01b0\u1eddng th\u00ec l\u00e0 cha, r\u1ed3i \u0111\u1ebfn m\u1eb9, \u0111\u1ebfn em trai, em g\u00e1i v\u00e0 sau c\u00f9ng l\u00e0 n\u00f3. C\u0169ng c\u00f3 nh\u1eefng b\u1eadn thay \u0111\u1ed5i, m\u1eb9 kh\u00f4ng n\u1eb1m c\u1ea1nh cha m\u00e0 \u0111\u1ebfn b\u00ean n\u1eb1m c\u1ea1nh n\u00f3 ho\u1eb7c l\u00e0 gi\u1eefa n\u00f3 v\u00e0 em g\u00e1i. Khi \u1ea5y em trai s\u1ebd n\u1eb1m v\u00e0o l\u00f2ng cha. Cha v\u00f2ng tay qua m\u00f4ng th\u1eb1ng b\u00e9. N\u00f3 v\u00e0 em g\u00e1i ch\u01b0a bao gi\u1edd \u0111\u01b0\u1ee3c n\u1eb1m trong l\u00f2ng cha.\u201d</i><br><div style=\"text-align: right;\">(Y Ban, <i>Tr\u00ean \u0111\u1ec9nh gi\u1eddi</i>, theo <i>vanvn.vn</i>)</div><br>Chi ti\u1ebft n\u00e0o cho th\u1ea5y s\u1ef1 thi\u00ean v\u1ecb, th\u00e1i \u0111\u1ed9 \u201ctr\u1ecdng nam khinh n\u1eef\u201d \u1edf ng\u01b0\u1eddi cha?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nChi ti\u1ebft \u201cN\u00f3 v\u00e0 em g\u00e1i ch\u01b0a bao gi\u1edd \u0111\u01b0\u1ee3c n\u1eb1m trong l\u00f2ng cha\u201d cho th\u1ea5y s\u1ef1 thi\u00ean v\u1ecb c\u1ee7a ng\u01b0\u1eddi cha. Trong khi em trai \u0111\u01b0\u1ee3c cha y\u00eau th\u01b0\u01a1ng \u00f4m v\u00e0o l\u00f2ng, th\u00ec hai ch\u1ecb em g\u00e1i l\u1ea1i kh\u00f4ng bao gi\u1edd c\u00f3 \u0111\u01b0\u1ee3c s\u1ef1 quan t\u00e2m, g\u1ea7n g\u0169i \u1ea5y. \u0110i\u1ec1u n\u00e0y cho th\u1ea5y s\u1ef1 b\u1ea5t b\u00ecnh \u0111\u1eb3ng trong c\u00e1ch \u0111\u1ed1i x\u1eed c\u1ee7a ng\u01b0\u1eddi cha, th\u1ec3 hi\u1ec7n r\u00f5 th\u00e1i \u0111\u1ed9 \u201ctr\u1ecdng nam khinh n\u1eef\u201d.", "key": "C", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604795, "lessonId": 0, "a": "\u0110o\u1ea1n th\u01a1 k\u1ebft h\u1ee3p th\u00e0nh c\u00f4ng c\u00e1c c\u00e2u h\u1ecfi tu t\u1eeb v\u00e0 ph\u00e9p \u0111i\u1ec7p.", "b": "\u0110o\u1ea1n th\u01a1 ph\u1ea3n \u00e1nh t\u00ecnh c\u1ea3nh tang t\u00f3c, \u0111au th\u01b0\u01a1ng c\u1ee7a qu\u00ea h\u01b0\u01a1ng \u0111\u1ea5t n\u01b0\u1edbc khi gi\u1eb7c x\u00e2m l\u0103ng.", "c": "\u0110o\u1ea1n th\u01a1 b\u1ed9c l\u1ed9 n\u1ed7i nh\u1edb, ni\u1ec1m \u00e2u lo c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh khi ngh\u0129 \u0111\u1ebfn nh\u1eefng ng\u01b0\u1eddi th\u00e2n c\u1ee7a m\u00ecnh n\u01a1i qu\u00ea nh\u00e0.", "d": "\u0110o\u1ea1n th\u01a1 ch\u1ea5t ch\u1ee9a gi\u1ecdng \u0111i\u1ec7u c\u0103m h\u1eadn, u\u1ea5t \u1ee9c, ph\u1eabn n\u1ed9.", "bookId": 1088880, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cM\u1eb9 t\u00f4i em c\u00f3 g\u1eb7p \u0111\u00e2u kh\u00f4ng<br>Bao x\u00e1c gi\u00e0 nua ng\u1eadp c\u00e1nh \u0111\u1ed3ng<br>T\u00f4i nh\u1edb m\u1ed9t th\u1eb1ng em b\u00e9 nh\u1ecf<br>Bao nhi\u00eau r\u1ed3i x\u00e1c tr\u1ebb tr\u00f4i s\u00f4ng\u201d</i><br><div style=\"text-align: right;\">(Quang D\u0169ng, <i>M\u1eaft ng\u01b0\u1eddi S\u01a1n T\u00e2y</i>, theo <i>qdnd.vn</i>)</div>Nh\u1eadn x\u00e9t n\u00e0o sau \u0111\u00e2y kh\u00f4ng \u0111\u00fang v\u1ec1 \u0111o\u1ea1n th\u01a1 tr\u00ean?", "answer": "", "key": "D", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604801, "lessonId": 0, "a": "Qua l\u1eddi n\u00f3i.", "b": "Qua c\u1eed ch\u1ec9.", "c": "Qua t\u00e2m l\u00ed.", "d": "Qua l\u0103ng k\u00ednh c\u1ee7a c\u00e1c nh\u00e2n v\u1eadt kh\u00e1c.", "bookId": 1088881, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cS\u00e1ng s\u1edbm h\u00f4m sau, B\u00ecnh  l\u1ea1i sai quan \u0111em m\u1ed9t t\u1edd t\u00e2u v\u00e0o tri\u1ec1u, xin cho l\u00e0m l\u1ec5 ngh\u00eanh h\u00f4n. M\u1ed9t m\u1eb7t B\u00ecnh khi\u1ebfn qu\u00e2n l\u00ednh \u0111\u1ee9ng s\u1eafp h\u00e0ng \u1edf hai b\u00ean \u0111\u01b0\u1eddng, t\u1eeb c\u1eeda \u0111i\u1ec7n \u0111\u1ebfn c\u1eeda ph\u1ee7. Trai g\u00e1i trong Kinh nghe tin r\u1ee7 nhau \u0111i xem \u0111\u00f4ng nh\u01b0 ng\u00e0y h\u1ed9i. Ai c\u0169ng cho l\u00e0 vi\u1ec7c hi\u1ebfm c\u00f3 x\u01b0a nay. Khi xe c\u1ee7a c\u00f4ng ch\u00faa t\u1edbi c\u1eeda ph\u1ee7, B\u00ecnh ng\u1ed3i ki\u1ec7u r\u1ed3ng v\u00e0ng ra \u0111\u00f3n, h\u1ebft th\u1ea3y m\u1ecdi th\u1ee9 l\u1ec5 nghi \u0111\u1ec1u theo \u0111\u00fang nh\u01b0 l\u1ec7 th\u01b0\u1eddng \u1edf c\u00e1c nh\u00e0. Sau khi c\u00f4ng ch\u00faa v\u00e0o cung, B\u00ecnh sai \u0111\u1eb7t ti\u1ec7c \u1edf b\u00ean ngo\u00e0i \u0111\u1ec3 th\u1ebft c\u00e1c v\u1ecb ho\u00e0ng th\u00e2n, ho\u00e0ng phi, c\u00f4ng ch\u00faa v\u00e0 c\u00e1c quan v\u0103n v\u00f5 \u0111i \u0111\u01b0a d\u00e2u. Trong ti\u1ec7c m\u1ecdi ng\u01b0\u1eddi \u0111\u1ec1u theo th\u1ee9 b\u1eadc m\u00e0 ng\u1ed3i. Ti\u1ec7c tan B\u00ecnh s\u1eafp ri\u00eang hai tr\u0103m l\u1ea1ng b\u1ea1c, sai quan ng\u1ecf l\u1eddi k\u00ednh t\u1eb7ng c\u00e1c v\u1ecb nh\u00e0 g\u00e1i, v\u00e0 \u0111\u01b0a ti\u1ec5n ra t\u1eadn c\u1eeda ph\u1ee7. <b>C\u00e1c quan ra v\u1ec1, l\u1ea1i h\u1ecdp \u1edf nh\u00e0 c\u00f4ng \u0111\u01b0\u1eddng b\u1ed9 L\u1ec5, ai n\u1ea5y \u0111\u1ec1u khen nh\u00e0 vua k\u00e9n \u0111\u01b0\u1ee3c r\u1ec3 t\u1ed1t, v\u00e0 b\u1ea3o nhau:<br><br>- Th\u1ebf l\u00e0 t\u1eeb nay n\u01b0\u1edbc An Nam ta \u0111\u00e3 c\u00f3 m\u1ed9t n\u01b0\u1edbc d\u00e2u gia.</b>\u201d</i><br><div style=\"text-align: right;\">(Ng\u00f4 gia v\u0103n ph\u00e1i, <i>Ho\u00e0ng L\u00ea nh\u1ea5t th\u1ed1ng ch\u00ed</i>, NXB V\u0103n h\u1ecdc, 2005)</div><br>Nh\u00e2n v\u1eadt B\u00ecnh \u0111\u01b0\u1ee3c kh\u1eafc ho\u1ea1 theo c\u00e1ch n\u00e0o trong nh\u1eefng c\u00e2u v\u0103n in \u0111\u1eadm?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nTrong nh\u1eefng c\u00e2u v\u0103n in \u0111\u1eadm, nh\u00e2n v\u1eadt B\u00ecnh (Nguy\u1ec5n Hu\u1ec7) \u0111\u01b0\u1ee3c kh\u1eafc h\u1ecda th\u00f4ng qua l\u1eddi khen ng\u1ee3i v\u00e0 \u0111\u00e1nh gi\u00e1 c\u1ee7a c\u00e1c quan trong tri\u1ec1u. <br>\n\u2192 Nh\u00e2n v\u1eadt B\u00ecnh \u0111\u01b0\u1ee3c kh\u1eafc ho\u1ea1 qua l\u0103ng k\u00ednh c\u1ee7a c\u00e1c nh\u00e2n v\u1eadt kh\u00e1c trong nh\u1eefng c\u00e2u v\u0103n in \u0111\u1eadm.", "key": "D", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604808, "lessonId": 0, "a": "\u201c\u01af\u1edbc m\u01a1 \u0111\u1eb9p t\u1ef1 n\u00f3 \u0111\u00e3 gi\u00e0u, c\u00f3 c\u1ea7n g\u00ec \u0111\u1ebfn l\u1eddi n\u00f3i; n\u00f3 h\u00e3nh di\u1ec7n v\u1ec1 th\u1ef1c ch\u1ea5t ch\u1ee9 kh\u00f4ng v\u1ec1 nh\u1eefng c\u00e1i t\u00f4 \u0111i\u1ec3m b\u00ean ngo\u00e0i.\u201d.", "b": "\u201cem h\u00e3y \u0111\u1ec3 kh\u00f4ng kh\u00ed quanh \u0111\u00e2y ng\u00e1t h\u01b0\u01a1ng th\u01a1m h\u01a1i th\u1edf c\u1ee7a em, h\u00e3y \u0111\u1ec3 \u0111i\u1ec7u nh\u1ea1c c\u1ee7a ti\u1ebfng n\u00f3i em ca t\u1ee5ng h\u1ea1nh ph\u00fac h\u1eb1ng m\u01a1 \u01b0\u1edbc, m\u00e0 ch\u00fang ta trao cho nhau trong bu\u1ed5i g\u1eb7p g\u1ee1 qu\u00fd b\u00e1u n\u00e0y.\u201d.", "c": "\u201cM\u1ed1i t\u00ecnh ch\u00e2n th\u1eadt c\u1ee7a em l\u1edbn \u0111\u1ebfn n\u1ed7i gi\u00e1 mu\u1ed1n \u0111\u1ebfm m\u1ed9t n\u1eeda kho t\u00e0ng c\u1ee7a em, em c\u0169ng kh\u00f4ng \u0111\u1ebfm n\u1ed5i.\u201d.", "d": "\u201cNh\u1eefng k\u1ebb c\u00f2n \u0111\u1ebfm \u0111\u01b0\u1ee3c c\u1ee7a c\u1ea3i c\u1ee7a m\u00ecnh th\u1eadt h\u00e3y c\u00f2n qu\u00e1 ngh\u00e8o n\u00e0n.\u201d", "bookId": 1088882, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cR\u00d4M\u00ca\u00d4 - Juliet em \u01a1i, n\u1ebfu l\u00f2ng em c\u0169ng tr\u00e0n ng\u1eadp ni\u1ec1m vui nh\u01b0 l\u00f2ng anh, v\u00e0 n\u1ebfu em di\u1ec5n t\u1ea3 \u0111\u01b0\u1ee3c ni\u1ec1m vui \u1ea5y kh\u00e9o h\u01a1n anh, th\u00ec em h\u00e3y \u0111\u1ec3 kh\u00f4ng kh\u00ed quanh \u0111\u00e2y ng\u00e1t h\u01b0\u01a1ng th\u01a1m h\u01a1i th\u1edf c\u1ee7a em, h\u00e3y \u0111\u1ec3 \u0111i\u1ec7u nh\u1ea1c c\u1ee7a ti\u1ebfng n\u00f3i em ca t\u1ee5ng h\u1ea1nh ph\u00fac h\u1eb1ng m\u01a1 \u01b0\u1edbc, m\u00e0 ch\u00fang ta trao cho nhau trong bu\u1ed5i g\u1eb7p g\u1ee1 qu\u00fd b\u00e1u n\u00e0y.<br>JULIET - \u01af\u1edbc m\u01a1 \u0111\u1eb9p t\u1ef1 n\u00f3 \u0111\u00e3 gi\u00e0u, c\u00f3 c\u1ea7n g\u00ec \u0111\u1ebfn l\u1eddi n\u00f3i; n\u00f3 h\u00e3nh di\u1ec7n v\u1ec1 th\u1ef1c ch\u1ea5t ch\u1ee9 kh\u00f4ng v\u1ec1 nh\u1eefng c\u00e1i t\u00f4 \u0111i\u1ec3m b\u00ean ngo\u00e0i. Nh\u1eefng k\u1ebb c\u00f2n \u0111\u1ebfm \u0111\u01b0\u1ee3c c\u1ee7a c\u1ea3i c\u1ee7a m\u00ecnh th\u1eadt h\u00e3y c\u00f2n qu\u00e1 ngh\u00e8o n\u00e0n. M\u1ed1i t\u00ecnh ch\u00e2n th\u1eadt c\u1ee7a em l\u1edbn \u0111\u1ebfn n\u1ed7i gi\u00e1 mu\u1ed1n \u0111\u1ebfm m\u1ed9t n\u1eeda kho t\u00e0ng c\u1ee7a em, em c\u0169ng kh\u00f4ng \u0111\u1ebfm n\u1ed5i.\u201d</i><br><div style=\"text-align: right;\">(William Shakespeare, <i>R\u00f4m\u00ea\u00f4 v\u00e0 Juliet</i>, theo <i>Tuy\u1ec3n t\u1eadp t\u00e1c ph\u1ea9m - William Shakespeare</i>, NXB S\u00e2n kh\u1ea5u, 2006)</div><br>L\u1eddi n\u00f3i n\u00e0o b\u1ed9c l\u1ed9 t\u00ecnh y\u00eau v\u00f4 h\u1ea1n Juliet d\u00e0nh cho R\u00f4m\u00ea\u00f4?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nL\u1eddi n\u00f3i \u201cM\u1ed1i t\u00ecnh ch\u00e2n th\u1eadt c\u1ee7a em l\u1edbn \u0111\u1ebfn n\u1ed7i gi\u00e1 mu\u1ed1n \u0111\u1ebfm m\u1ed9t n\u1eeda kho t\u00e0ng c\u1ee7a em, em c\u0169ng kh\u00f4ng \u0111\u1ebfm n\u1ed5i.\u201d b\u1ed9c l\u1ed9 t\u00ecnh y\u00eau v\u00f4 h\u1ea1n Juliet d\u00e0nh cho R\u00f4m\u00ea\u00f4. Juliet v\u00ed t\u00ecnh y\u00eau c\u1ee7a n\u00e0ng nh\u01b0 m\u1ed9t kho t\u00e0ng v\u00f4 t\u1eadn, \u0111\u1ebfn m\u1ee9c d\u00f9 ch\u1ec9 mu\u1ed1n \u0111\u1ebfm m\u1ed9t n\u1eeda c\u0169ng kh\u00f4ng th\u1ec3, cho th\u1ea5y t\u00ecnh y\u00eau c\u1ee7a n\u00e0ng d\u00e0nh cho R\u00f4m\u00ea\u00f4 l\u00e0 v\u00f4 b\u1edd b\u1ebfn, kh\u00f4ng th\u1ec3 \u0111o l\u01b0\u1eddng \u0111\u01b0\u1ee3c.", "key": "C", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604814, "lessonId": 0, "a": "N\u00f3i qu\u00e1, \u1ea9n d\u1ee5.", "b": "N\u00f3i m\u1ec9a, ngh\u1ecbch ng\u1eef.", "c": "N\u00f3i gi\u1ea3m n\u00f3i tr\u00e1nh, c\u00e2u h\u1ecfi tu t\u1eeb.", "d": "Ph\u00e9p \u0111i\u1ec7p, ph\u00e9p \u0111\u1ed1i.", "bookId": 1088883, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cD\u01b0\u1edbi quy\u1ec1n cai tr\u1ecb c\u1ee7a Ng\u00e0i, d\u00e2n t\u1ed9c Vi\u1ec7t Nam \u0111\u00e3 \u0111\u01b0\u1ee3c h\u01b0\u1edfng ph\u1ed3n vinh th\u1eadt s\u1ef1 v\u00e0 h\u1ea1nh ph\u00fac th\u1eadt s\u1ef1, h\u1ea1nh ph\u00fac \u0111\u01b0\u1ee3c th\u1ea5y nhan nh\u1ea3n kh\u1eafp trong n\u01b0\u1edbc, \u0111\u00e2u \u0111\u00e2u c\u0169ng c\u00f3 nh\u1eefng ty r\u01b0\u1ee3u v\u00e0 ty thu\u1ed1c phi\u1ec7n song song v\u1edbi nh\u1eefng s\u1ef1 b\u1eafn gi\u1ebft h\u00e0ng lo\u1ea1t v\u00e0 nh\u00e0 t\u00f9, n\u1ec1n d\u00e2n ch\u1ee7 v\u00e0 t\u1ea5t c\u1ea3 b\u1ed9 m\u00e1y tinh vi c\u1ee7a n\u1ec1n v\u0103n minh hi\u1ec7n \u0111\u1ea1i, \u0111\u00e3 l\u00e0m cho ng\u01b0\u1eddi Vi\u1ec7t Nam ti\u1ebfn b\u1ed9 nh\u1ea5t ch\u00e2u \u00c1 v\u00e0 sung s\u01b0\u1edbng nh\u1ea5t tr\u1ea7n \u0111\u1eddi.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u00c1i Qu\u1ed1c, <i>L\u00e1 th\u01b0 ng\u1ecf g\u1eedi \u00f4ng Anbe Xar\u00f4</i>, <i>B\u1ed9 tr\u01b0\u1edfng B\u1ed9 Thu\u1ed9c \u0111\u1ecba, theo T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div><br>Bi\u1ec7n ph\u00e1p tu t\u1eeb n\u00e0o \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong \u0111o\u1ea1n v\u0103n tr\u00ean?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\n\u0110o\u1ea1n v\u0103n s\u1eed d\u1ee5ng bi\u1ec7n ph\u00e1p tu t\u1eeb:<br>\n- N\u00f3i m\u1ec9a: \u0110o\u1ea1n v\u0103n s\u1eed d\u1ee5ng gi\u1ecdng \u0111i\u1ec7u m\u1ec9a mai, ch\u00e2m bi\u1ebfm \u0111\u1ec3 t\u1ed1 c\u00e1o s\u1ef1 gi\u1ea3 d\u1ed1i c\u1ee7a ch\u1ebf \u0111\u1ed9 th\u1ef1c d\u00e2n. Nh\u1eefng c\u1ee5m t\u1eeb nh\u01b0 \u201cph\u1ed3n vinh th\u1eadt s\u1ef1 v\u00e0 h\u1ea1nh ph\u00fac th\u1eadt s\u1ef1\u201d, \u201ch\u1ea1nh ph\u00fac \u0111\u01b0\u1ee3c th\u1ea5y nhan nh\u1ea3n kh\u1eafp trong n\u01b0\u1edbc\u201d, \u201cti\u1ebfn b\u1ed9 nh\u1ea5t ch\u00e2u \u00c1 v\u00e0 sung s\u01b0\u1edbng nh\u1ea5t tr\u1ea7n \u0111\u1eddi\u201d \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng \u0111\u1ec3 ch\u1ebf gi\u1ec5u s\u1ef1 tuy\u00ean truy\u1ec1n d\u1ed1i tr\u00e1 c\u1ee7a ch\u00ednh quy\u1ec1n th\u1ef1c d\u00e2n.<br>\n- Ngh\u1ecbch ng\u1eef: H\u00ecnh \u1ea3nh \u201cty r\u01b0\u1ee3u v\u00e0 ty thu\u1ed1c phi\u1ec7n song song v\u1edbi nh\u1eefng s\u1ef1 b\u1eafn gi\u1ebft h\u00e0ng lo\u1ea1t v\u00e0 nh\u00e0 t\u00f9\u201d t\u1ea1o ra s\u1ef1 t\u01b0\u01a1ng ph\u1ea3n, \u201cty r\u01b0\u1ee3u v\u00e0 ty thu\u1ed1c phi\u1ec7n\u201d th\u01b0\u1eddng g\u1eafn v\u1edbi s\u1ef1 h\u01b0\u1edfng th\u1ee5 \u0111\u1ed1i ngh\u1ecbch v\u1edbi  0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604875, "lessonId": 0, "a": "C\u00e2u \u0111\u01a1n.", "b": "C\u00e2u \u0111\u1eb7c bi\u1ec7t.", "c": "C\u00e2u gh\u00e9p.", "d": "C\u00e2u m\u1edf r\u1ed9ng th\u00e0nh ph\u1ea7n v\u1ecb ng\u1eef.", "bookId": 1088898, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cV\u00e0 nh\u1edb.\u201d<br>C\u00e2u tr\u00ean \u0111\u01b0\u1ee3c vi\u1ebft theo ki\u1ec3u c\u00e2u n\u00e0o sau \u0111\u00e2y?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nC\u00e2u \u201cV\u00e0 nh\u1edb.\u201d l\u00e0 c\u00e2u \u0111\u1eb7c bi\u1ec7t, ch\u1ec9 g\u1ed3m m\u1ed9t c\u1ee5m t\u1eeb, kh\u00f4ng c\u00f3 c\u1ea5u t\u1ea1o theo m\u00f4 h\u00ecnh ch\u1ee7 ng\u1eef - v\u1ecb ng\u1eef nh\u01b0 c\u00e1c c\u00e2u th\u00f4ng th\u01b0\u1eddng.\n", "key": "B", "isVideo": true, "score": 0, "order": 25, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 26 \u0111\u1ebfn 30", "content": "\u201c<b>19 - 3 - 48</b>. V\u1eabn m\u01b0a. \u0110\u00eam qua c\u00e0ng m\u01b0a d\u1eef d\u1ed9i h\u01a1n. B\u1ecb n\u01b0\u1edbc l\u1ecdt qua m\u00e0n r\u1ecf v\u00e0o m\u1eb7t, t\u00f4i th\u1ee9c gi\u1ea5c, quay \u0111\u1ea7u l\u1ea1i ph\u00eda ch\u00e2n. C\u1ed1 thu h\u1eb9p ng\u01b0\u1eddi l\u1ea1i \u0111\u1ec3 tr\u00e1nh n\u01b0\u1edbc t\u1eeb tr\u00ean m\u00e1i nh\u00e0 d\u1ed9t xu\u1ed1ng. R\u1ea5t l\u00e2u kh\u00f4ng ng\u1ee7 \u0111\u01b0\u1ee3c. M\u01b0a \u0111\u1ebfn t\u1eebng \u0111\u1ee3t nh\u01b0 \u0111\u1ee3t s\u00f3ng. \u00c0o \u00e0o r\u1ed3i ng\u1edbt, r\u1ed3i l\u1ea1i \u00e0o \u00e0o, r\u1ed3i l\u1ea1i ng\u1edbt. N\u01b0\u1edbc kh\u00f4ng g\u00f5 tr\u1ed1ng tr\u00ean l\u00e1 n\u1eefa. N\u01b0\u1edbc ch\u1ea3y th\u00e0nh th\u00e1c tr\u00ean l\u00e1 r\u1eadm. Ti\u1ebfng d\u00f2ng su\u1ed1i d\u01b0\u1edbi g\u1ea7m s\u00e0n nh\u01b0 m\u1ed9t c\u00e1i nh\u1ecdt v\u1ee1 m\u1ee7, \u0103n loang \u0111\u00eam t\u1ed1i.<br>\u00d4i chao! C\u00e1i gi\u1ed1ng b\u1ecd v\u00f4 h\u00ecnh \u1edf c\u00e1i ch\u0103n b\u00f4ng r\u00e1ch b\u00f2 ra, ng\u1ee9a ran tr\u00ean m\u1eb7t, tr\u00ean c\u1ed5. Kh\u00f4ng sao ng\u1ee7 \u0111\u01b0\u1ee3c. C\u1ed1 nhi\u00ean l\u00e0 l\u1ea1i nh\u1edb \u0111\u1ebfn Li\u00ean, nh\u1edb c\u00e1c con. Nh\u1eefng l\u1ea7n m\u01b0a trong \u0111\u1eddi m\u00ecnh. \u0110\u1eddi m\u00ecnh nh\u01b0 to\u00e0n m\u01b0a c\u1ea3. M\u01b0a v\u00e0o nh\u1eefng d\u1ecbp quan tr\u1ecdng. M\u01b0a v\u00e0o nh\u1eefng ng\u00e0y b\u01b0\u1edbc ra \u0111i. M\u01b0a! M\u01b0a! C\u00e1i \u0111\u00eam m\u01b0a tr\u00ean thuy\u1ec1n m\u00eda. Nh\u1eefng \u0111\u00eam m\u01b0a nh\u00e0 d\u1ed9t trong c\u00e1i l\u1ec1u nh\u00e0 b\u00e0 c\u1ee5 Xoan...<br>Nh\u01b0ng m\u1ed7i l\u00fac ng\u1edbt m\u01b0a, l\u1ea1i nghe ti\u1ebfng s\u00fang n\u1ed5 ran: Ti\u1ebfng s\u00fang \u0111\u00e3 n\u1ed5 ran su\u1ed1t ng\u00e0y h\u00f4m qua; m\u1eb7c d\u1ea7u m\u01b0a. Trong c\u00e1i \u0111\u00eam m\u01b0a t\u1ea7m t\u00e3 n\u00e0y, s\u00fang v\u1eabn n\u1ed5 nh\u01b0 th\u01b0\u1eddng. S\u00fang kh\u00f4ng bi\u1ebft c\u00f3 gi\u1eddi m\u01b0a. L\u00f2ng s\u00fang kh\u00f4ng \u1ec9u x\u1ecbu bao gi\u1edd. \u00d4i s\u00fang! \u00d4i nh\u1eefng c\u00e2y s\u00fang th\u00e9p. \u00d4i nh\u1eefng anh v\u1ec7 qu\u1ed1c qu\u00e2n! T\u00f4i bi\u1ebft c\u00e1c anh nhi\u1ec1u khi ph\u1ea3i nh\u1ecbn c\u01a1m \u0103n ch\u00e1o, \u0111\u1ee9ng d\u01b0\u1edbi m\u01b0a su\u1ed1t ng\u00e0y, su\u1ed1t \u0111\u00eam m\u00e0 \u0111\u00e1nh gi\u1eb7c. L\u00f2ng c\u00e1c anh c\u0169ng l\u00e0 n\u00f2ng s\u00fang th\u00e9p. M\u01b0a c\u00f3 bao gi\u1edd l\u00e0m \u1ec9u x\u1ecbu m\u1ed9t t\u1ea5m l\u00f2ng b\u1eb1ng th\u00e9p t\u00f4i gi\u00e0. T\u00f4i x\u1ea5u h\u1ed5 cho t\u00e2m h\u1ed3n \u1ee7y m\u1ecb c\u1ee7a t\u00f4i. V\u1eabn         let userAnswers = {}; // Store: { qId: value }
        let isSubmitted = false;
        let examMode = 'practice'; // 'practice' or 'exam'
        let startTime = Date.now();
        let timerInterval;

        // --- INIT ---
        window.onload = function() {
            renderExam();
            startTimer();
            document.getElementById('mode-select').addEventListener('change', (e) => {
                if(isSubmitted) return;
                if(confirm('Đổi chế độ sẽ làm mới lại trạng thái hiển thị (không mất bài làm). Tiếp tục?')) {
                    examMode = e.target.value;
                    renderExam(false); // Re-render without resetting answers
                } else {
                    e.target.value = examMode;
                }
            });
        };

        // --- TIMER LOGIC ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- RENDER ENGINE ---
        function renderExam(reset = false) {
            const container = document.getElementById('exam-content');
            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; // Clear to re-render
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

            let globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                // Render Group Header
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`; // Unique Key for storage
                    const qType = q.normalizedType;
                    
                    // -- Palette Item --
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop
                    palMob.appendChild(palBtn); // Add to Mobile

                    // -- Question Card --
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    // Header: Question Number
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    // Interaction Area
                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // === TYPE 0: MCQ ===
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            // Logic hiển thị kết quả
                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { // Chọn đúng
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { // Đúng nhưng không chọn (hiện đáp án khi nộp)
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { // Chọn sai
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; // Hiện đáp án đúng sau khi nộp dù chưa làm
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // === TYPE 1 & 3: FILL KEY ===
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let inputClass = "w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all font-mono";
                        let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
