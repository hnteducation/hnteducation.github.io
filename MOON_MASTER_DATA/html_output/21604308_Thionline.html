        const EXAM_DATA = [{"title": "", "content": "", "listQuestion": [{"questionId": 21604378, "lessonId": 0, "a": "Ngo\u1ea1i h\u00ecnh.", "b": "H\u00e0nh \u0111\u1ed9ng.", "c": "\u00dd ngh\u0129.", "d": "L\u1eddi n\u00f3i.", "bookId": 1088787, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cG\u00ea-ri-\u00f4ng ph\u00f3ng lao li\u00ean ti\u1ebfp v\u00e0o H\u00ea-ra-cl\u00e9t, c\u1ee9 m\u1ed7i l\u1ea7n l\u00e0 ba ng\u1ecdn lao d\u00e0i, nh\u1ecdn ho\u1eaft. Nh\u01b0ng N\u1eef th\u1ea7n A-t\u00ea-na lu\u00f4n lu\u00f4n c\u00f3 m\u1eb7t b\u00ean ng\u01b0\u1eddi con trai c\u1ee7a th\u1ea7n D\u1edbt \u0111\u1ec3 b\u1ea3o h\u1ed9 cho ch\u00e0ng. Kh\u00f4ng m\u1ed9t ng\u1ecdn lao n\u00e0o l\u00e0m x\u00e2y x\u00e1t da th\u1ecbt c\u1ee7a ng\u01b0\u1eddi anh h\u00f9ng. H\u00ea-ra-cl\u00e9t d\u00f9ng nh\u1eefng m\u0169i t\u00ean t\u1ea9m thu\u1ed1c \u0111\u1ed9c b\u1eafn v\u00e0o G\u00ea-ri-\u00f4ng khi\u1ebfn cho h\u1eafn m\u00f9 m\u1eaft v\u00e0 \u0111au \u0111\u1edbn nh\u01b0 \u0111i\u00ean \u0111\u1ea1i. Sau \u0111\u00f3, ch\u00e0ng nh\u1ea3y t\u1edbi d\u00f9ng ch\u00f9y n\u1ec7n tan x\u00e1c h\u1eafn.\u201d</i><br><div style=\"text-align: right;\">(Th\u1ea7n tho\u1ea1i Hy L\u1ea1p, <i>H\u00ea-ra-cl\u00e9t \u0111i \u0111o\u1ea1t \u0111\u00e0n b\u00f2 c\u1ee7a G\u00ea-ri-\u00f4ng</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>Nh\u00e2n v\u1eadt H\u00ea-ra-cl\u00e9t trong \u0111o\u1ea1n tr\u00edch tr\u00ean ch\u1ee7 y\u1ebfu \u0111\u01b0\u1ee3c kh\u1eafc h\u1ecda \u1edf ph\u01b0\u01a1ng di\u1ec7n n\u00e0o?", "answer": "\u0110o\u1ea1n tr\u00edch t\u1eadp trung kh\u1eafc ho\u1ea1 nh\u00e2n v\u1eadt H\u00ea-ra-cl\u00e9t th\u00f4ng qua c\u00e1c h\u00e0nh \u0111\u1ed9ng chi\u1ebfn \u0111\u1ea5u: <i>d\u00f9ng nh\u1eefng m\u0169i t\u00ean t\u1ea9m thu\u1ed1c \u0111\u1ed9c b\u1eafn v\u00e0o G\u00ea-ri-\u00f4ng; nh\u1ea3y t\u1edbi f4ng  thu\u1edf gi\u00f3ng  m\u1ed9t c\u00e0y,<br>S\u1ef1 th\u1ebf bao nhi\u00eau v\u1eabn \u0111\u00e3 khu\u00e2y.<br>B\u1ea3  c\u00e1i tr\u00fac h\u00f2ng ph\u00e2n su\u1ed1i,<br>Qu\u00e9t con am \u0111\u1ec3 ch\u1ee9a m\u00e2y.<br>\u0110\u00eca tham nguy\u1ec7t hi\u1ec7n ch\u0103ng bu\u00f4ng c\u00e1,<br>R\u1eebng ti\u1ebfc chim v\u1ec1 ng\u1ea1i ph\u00e1t c\u00e2y.<br>D\u1ea7u b\u1ee5t - d\u1ea7u ti\u00ean ai k\u1ebb h\u1ecfi,<br>\u00d4ng n\u00e0y \u0111\u00e3 c\u00f3 th\u00fa \u00f4ng n\u00e0y.\u201d</i><br>(Nguy\u1ec5n Tr\u00e3i, <i>M\u1ea1n thu\u1eadt</i>, b\u00e0i 6, <i>Nguy\u1ec5n Tr\u00e3i th\u01a1 v\u00e0 \u0111\u1eddi</i>, NXB V\u0103n h\u1ecdc, 2016)<br>Nh\u1eadn x\u00e9t n\u00e0o <b>kh\u00f4ng </b>\u0111\u00fang v\u1ec1 v\u1ea7n c\u1ee7a b\u00e0i th\u01a1 tr\u00ean?", "answer": "B\u00e0i th\u01a1 vi\u1ebft theo th\u1ec3 th\u01a1 th\u1ea5t ng\u00f4n b\u00e1t c\u00fa \u0110\u01b0\u1eddng lu\u1eadt, gieo v\u1ea7n b\u1eb1ng v\u00e0 v\u1ea7n ch\u00e2n <i>(c\u00e0y \u2013 khu\u00e2y \u2013 m\u00e2y \u2013 c\u00e2y \u2013 n\u00e0y)</i> \u1edf cu\u1ed1i c\u00e1c c\u00e2u 1, 2, 4, 6, 8.<br>\n\u2192 Nh\u1eadn x\u00e9t b\u00e0i th\u01a1 gieo v\u1ea7n tr\u1eafc l\u00e0 kh\u00f4ng ch\u00ednh x\u00e1c.\n", "key": "C", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604399, "lessonId": 0, "a": "Th\u1ea1ch Sanh trong truy\u1ec7n c\u1ed5 t\u00edch \u201cTh\u1ea1ch Sanh\u201d.", "b": "S\u01a1n Tinh trong truy\u1ec1n thuy\u1ebft \u201cS\u01a1n Tinh, Thu\u1ef7 Tinh\u201d.", "c": "Th\u00e1nh Gi\u00f3ng trong truy\u1ec1n thuy\u1ebft \u201cTh\u00e1nh Gi\u00f3ng\u201d.", "d": "Anh Khoai trong truy\u1ec7n c\u1ed5 t\u00edch \u201cC\u00e2y tre tr\u0103m \u0111\u1ed1t\u201d.", "bookId": 1088790, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u1ede n\u01b0\u1edbc An Nam v\u00e0o th\u1eddi nh\u00e0 L\u00fd, c\u00f3 ng\u01b0\u1eddi Thanh H\u00f3a t\u00ean l\u00e0 L\u00ea Ph\u1ee5ng Hi\u1ec3u , d\u00e1ng m\u1ea1o l\u1ea1 th\u01b0\u1eddng, \u0103n u\u1ed1ng g\u1ea5p m\u01b0\u1eddi k\u1ebb kh\u00e1c. M\u1edbi m\u01b0\u1eddi hai m\u01b0\u1eddi ba tu\u1ed5i, th\u00e2n h\u00ecnh \u0111\u00e3 cao b\u1ea3y x\u00edch . Ch\u1ee3t c\u00f3 b\u1ecdn gi\u1eb7c b\u00ean ngo\u00e0i \u0111\u1ebfn x\u00e2m ph\u1ea1m b\u1edd c\u00f5i, b\u1eaft ng\u01b0\u1eddi c\u01b0\u1edbp c\u1ee7a r\u1ea5t nhi\u1ec1u, ng\u01b0\u1eddi trong x\u00f3m l\u00e0ng ho\u1ea3ng h\u1ed1t kh\u00f4ng bi\u1ebft l\u00e0m sao \u0111\u1ed1i ph\u00f3. Ph\u1ee5ng Hi\u1ec3u n\u00f3i v\u1edbi cha m\u1eb9 kh\u00f4ng n\u00ean theo ng\u01b0\u1eddi ta ch\u1ea1y s\u1ea5p ch\u1ea1y ng\u1eeda, ch\u1ec9 c\u1ea7n n\u1ea5u th\u1eadt nhi\u1ec1u c\u01a1m cho con \u0103n m\u1ed9t b\u1eefa no n\u00ea, th\u00ec vi\u1ec7c gi\u1ebft gi\u1eb7c c\u1ee9u d\u00e2n h\u00f4m nay d\u1ec5 nh\u01b0 tr\u1edf b\u00e0n tay.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Nguy\u00ean Tr\u1eebng, <i>D\u0169ng l\u1ef1c phi th\u01b0\u1eddng</i>, theo <i>Nam \u00d4ng m\u1ed9ng l\u1ee5c</i>, NXB V\u0103n h\u1ecdc, 2008)</div>Nh\u00e2n v\u1eadt L\u00ea Ph\u1ee5ng Hi\u1ec3u trong \u0111o\u1ea1n truy\u1ec7n gi\u1ed1ng nh\u00e2n v\u1eadt n\u00e0o trong v\u0103n h\u1ecdc d\u00e2n gian?", "answer": "Nh\u00e2n v\u1eadt L\u00ea Ph\u1ee5ng Hi\u1ec3u trong \u0111o\u1ea1n truy\u1ec7n \u0111\u01b0\u1ee3c kh\u1eafc h\u1ecda v\u1edbi nh\u1eefng \u0111\u1eb7c \u0111i\u1ec3m: t\u01b0\u1edbng m\u1ea1o kh\u00e1c th\u01b0\u1eddng, \u0103n kh\u1ecfe, s\u1ee9c l\u1ef1c phi th\u01b0\u1eddng, c\u00f3 tinh th\u1ea7n \u0111\u00e1nh gi\u1eb7c c\u1ee9u n\u01b0\u1edbc. Nh\u1eefng \u0111\u1eb7c \u0111i\u1ec3m n\u00e0y t\u01b0\u01a1ng \u0111\u1ed3ng v\u1edbi nh\u00e2n v\u1eadt Th\u00e1nh Gi\u00f3ng trong truy\u1ec1n thuy\u1ebft c\u00f9ng t\u00ean.", "key": "C", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604409, "lessonId": 0, "a": "T\u01b0\u01a1ng \u0111\u1ed3ng.", "b": "T\u0103ng ti\u1ebfn.", "c": "Nh\u00e2n - qu\u1ea3.", "d": "T\u01b0\u01a1ng ph\u1ea3n.", "bookId": 1088791, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cN\u00e0o l\u1ed1i d\u1ea1o v\u01b0\u1eddn hoa n\u0103m ngo\u00e1i,<br>\u0110\u00f3a h\u1ed3ng \u0111\u00e0o h\u00e1i bu\u1ed5i c\u00f2n xanh.<br>Tr\u00ean g\u00e1c ph\u01b0\u1ee3ng, d\u01b0\u1edbi l\u1ea7u oanh,<br>G\u1ed1i du ti\u00ean  \u1edf h\u00e3y r\u00e0nh r\u00e0nh song song.<br>B\u00e2y gi\u1edd \u0111\u00e3 ra l\u00f2ng r\u1ebb r\u00fang,<br>\u0110\u1ec3 th\u00e2n n\u00e0y c\u1ecf \u00fang t\u01a1 m\u00e0nh <br>\u0110\u00f4ng qu\u00e2n  sao kh\u00e9o b\u1ea5t t\u00ecnh ,<br>C\u00e0nh hoa t\u00e0n nguy\u1ec7t  b\u1ef1c m\u00ecnh ho\u00e0i xu\u00e2n .</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Gia Thi\u1ec1u, <i>Cung o\u00e1n ng\u00e2m kh\u00fac</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 13, NXB</div><div style=\"text-align: right;\">Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Ch\u1ec9 ra quan h\u1ec7 \u00fd ngh\u0129a gi\u1eefa b\u1ed1n d\u00f2ng tr\u01b0\u1edbc v\u00e0 b\u1ed1n d\u00f2ng sau.", "answer": "- B\u1ed1n d\u00f2ng th\u01a1 \u0111\u1ea7u mi\u00eau t\u1ea3 nh\u1eefng k\u1ec9 ni\u1ec7m \u0111\u1eb9p \u0111\u1ebd, h\u1ea1nh ph\u00fac c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh. \u0110\u00f3 l\u00e0 nh\u1eefng ng\u00e0y th\u00e1ng t\u01b0\u01a1i \u0111\u1eb9p khi \u0111\u01b0\u1ee3c d\u1ea1o ch\u01a1i trong v\u01b0\u1eddn hoa, cu\u1ed9c s\u1ed1ng \u00eam \u0111\u1ec1m tr\u00ean g\u00e1c ph\u01b0\u1ee3ng, l\u1ea7u oanh c\u00f9ng t\u00ecnh y\u00eau m\u1eb7n h\u1ed3ng, \u00e1i \u00e2n.<br>\n- B\u1ed1n d\u00f2ng th\u01a1 sau mi\u00eau t\u1ea3 khung c\u1ea3nh hi\u1ec7n t\u1ea1i v\u1edbi n\u1ed7i c\u00f4 \u0111\u01a1n, bu\u1ed3n t\u1ee7i v\u00e0 \u0111\u1eafng cay. Ng\u01b0\u1eddi cung n\u1eef b\u1ecb r\u1ebb r\u00fang, th\u00e2n x\u00e1c h\u00e9o m\u00f2n v\u00ec b\u1ecb l\u00e3ng qu\u00ean. \u0110\u00f3 ch\u00ednh l\u00e0 hi\u1ec7n th\u1ef1c \u0111\u1ea7y ph\u0169 ph\u00e0ng, \u0111au kh\u1ed5 c\u1ee7a ng\u01b0\u1eddi cung n\u1eef \u0111\u00e3 b\u1ecb ru\u1ed3ng b\u1ecf.<br>\n\u2192 M\u1ed1i quan h\u1ec7 \u00fd ngh\u0129a gi\u1eefa b\u1ed1n d\u00f2ng th\u01a1 tr\u01b0\u1edbc v\u00e0 b\u1ed1n d\u00f2ng th\u01a1 sau l\u00e0 t\u01b0\u01a1ng ph\u1ea3n, \u0111\u1ed1i l\u1eadp.\n", "key": "D", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604430, "lessonId": 0, "a": "\u201c\u0110\u00e1ng ki\u1ebfp\u201d.", "b": "\u201cN\u00f3 ng\u00e3 l\u0103n ra.\u201d.", "c": "\u201cNh\u01b0ng n\u00f3 c\u1ed1 c\u00fai \u0111\u1ea7u xu\u1ed1ng, \u0111\u1ec3 c\u1eafn cho mau.\u201d.", "d": "\u201cNg\u01b0\u1eddi ta m\u00f3c m\u1ed3m n\u00f3, gang h\u1ecdng n\u00f3, qu\u00e0o ch\u1ea3y m\u00e1u c\u1ea3 m\u00e1 n\u00f3.\u201d.", "bookId": 1088792, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cR\u1ed3i ng\u01b0\u1eddi ta gi\u1eef ch\u1eb7t l\u1ea5y n\u00f3. Nh\u01b0ng n\u00f3 c\u1ed1 c\u00fai \u0111\u1ea7u xu\u1ed1ng, \u0111\u1ec3 c\u1eafn cho mau. Ng\u01b0\u1eddi ta gi\u1eb1ng ra. C\u00f2n nh\u1eefng m\u1ed9t g\u00f3c c\u1ee7 n\u1eefa.<br>Ng\u01b0\u1eddi ta m\u00f3c m\u1ed3m n\u00f3, gang h\u1ecdng n\u00f3, qu\u00e0o ch\u1ea3y m\u00e1u c\u1ea3 m\u00e1 n\u00f3. N\u00f3 c\u1ee9 c\u1ed1 gh\u00ec, nh\u1ea5t \u0111\u1ecbnh kh\u00f4ng nh\u1ea3. N\u00f3 ng\u00e3 l\u0103n ra. M\u1ea9u khoai b\u1ecb n\u1eafm ch\u1eb7t, n\u00e1t b\u00e9t trong tay n\u00f3.<br>V\u1eabn ch\u1eedi. V\u1eabn k\u00eau. V\u1eabn \u0111\u1ea5m. V\u1eabn \u0111\u00e1. V\u1eabn th\u1ee5i. V\u1eabn b\u1ecbch. V\u1eabn c\u1eb3ng ch\u00e2n. V\u1eabn c\u1eb3ng tay. V\u1eabn \u0111\u00f2n c\u00e0n. V\u1eabn \u0111\u00f2n g\u00e1nh. \u0110\u00e1ng ki\u1ebfp!\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n C\u00f4ng Hoan, <i>M\u1ed9t b\u1eefa no \u0111\u00f2n</i>, theo <i>Nguy\u1ec5n C\u00f4ng Hoan Truy\u1ec7n ng\u1eafn ch\u1ecdn l\u1ecdc 1</i>, NXB H\u1ed9i Nh\u00e0 v\u0103n, 2005)</div>C\u00e2u n\u00e0o sau \u0111\u00e2y ph\u00e1 v\u1ee1 quy t\u1eafc ng\u00f4n ng\u1eef th\u00f4ng th\u01b0\u1eddng?", "answer": "C\u00e2u \u201c\u0110\u00e1ng ki\u1ebfp!\u201d ph\u00e1 v\u1ee1 quy t\u1eafc ng\u00f4n ng\u1eef th\u00f4ng th\u01b0\u1eddng v\u00ec \u0111\u00e2y l\u00e0 c\u00e2u \u0111\u1eb7c bi\u1ec7t c\u00f3 c\u1ea5u t\u1ea1o l\u00e0 m\u1ed9t t\u1eeb, kh\u00f4ng c\u00f3 \u0111\u1ea7y \u0111\u1ee7 ch\u1ee7 ng\u1eef v\u00e0 v\u1ecb ng\u1eef nh\u01b0 c\u00e2u th\u00f4ng th\u01b0\u1eddng. ", "key": "A", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604438, "lessonId": 0, "a": "\u201cS\u01a1n Tinh ng\u1ed3i b\u1ea1ch h\u1ed5 \u0111i \u0111\u1ea7u\u201d.", "b": "\u201cTay gh\u00ec c\u01b0\u01a1ng h\u1ed5, tay c\u1ea7m lau.\u201d", "c": "\u201cH\u00f9ng V\u01b0\u01a1ng tr\u00ean m\u1eb7t th\u00e0nh li\u1ec5u r\u1ee7\u201d.", "d": "\u201cM\u00e0y ng\u00e0i, m\u1eaft ph\u01b0\u1ee3ng v\u1eabn c\u00f2n t\u01b0\u01a1i.\u201d.", "bookId": 1088793, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cR\u1eebng xanh th\u1ea3 m\u00e2y \u0111\u00e0o man m\u00e1c,<br>S\u01a1n Tinh ng\u1ed3i b\u1ea1ch h\u1ed5 \u0111i \u0111\u1ea7u<br>M\u00ecnh ph\u1ee7 \u00e1o b\u00e0o h\u1ed3ng ng\u1ecdc d\u00e1t,<br>Tay gh\u00ec c\u01b0\u01a1ng h\u1ed5, tay c\u1ea7m lau.<br>Theo sau n\u0103m ch\u1ee5c con voi x\u00e1m<br>H\u1ee5c h\u1eb7c, l\u01b0ng cong ph\u1ee7 g\u1ea5m \u0111i\u1ec1u,<br>T\u1ea3i b\u1ea1c, kim c\u01b0\u01a1ng, v\u00e0ng l\u1ea5p lo\u00e1ng,<br>S\u1eebng t\u00ea, ng\u00e0 voi v\u00e0 s\u1eebng h\u01b0\u01a1u.<br>H\u00f9ng V\u01b0\u01a1ng tr\u00ean m\u1eb7t th\u00e0nh li\u1ec5u r\u1ee7,<br>H\u1edbn h\u1edf th\u1ea7n tr\u00f4ng, tho\u00e1ng n\u1ee5 c\u01b0\u1eddi.<br>Th\u1ea7n su\u1ed1t \u0111\u00eam sao d\u00e0i kh\u00f4ng ng\u1ee7,<br>M\u00e0y ng\u00e0i, m\u1eaft ph\u01b0\u1ee3ng v\u1eabn c\u00f2n t\u01b0\u01a1i.</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Nh\u01b0\u1ee3c Ph\u00e1p, <i>S\u01a1n Tinh, Thu\u1ef7 Tinh</i>, theo <i>nguoihanoi.vn</i>)</div>Chi ti\u1ebft n\u00e0o mi\u00eau t\u1ea3 th\u1ea7n th\u00e1i t\u01b0\u01a1i t\u1eafn, \u0111\u1eb9p \u0111\u1ebd c\u1ee7a S\u01a1n Tinh khi \u0111em l\u1ec5 v\u1eadt \u0111\u1ebfn c\u1ea7u h\u00f4n con g\u00e1i vua H\u00f9ng?", "answer": "Chi ti\u1ebft \u201cM\u00e0y ng\u00e0i, m\u1eaft ph\u01b0\u1ee3ng v\u1eabn c\u00f2n t\u01b0\u01a1i.\u201d tr\u1ef1c ti\u1ebfp mi\u00eau t\u1ea3 th\u1ea7n th\u00e1i t\u01b0\u01a1i t\u1eafn, \u0111\u1eb9p \u0111\u1ebd c\u1ee7a S\u01a1n Tinh khi \u0111em l\u1ec5 v\u1eadt \u0111\u1ebfn c\u1ea7u h\u00f4n con g\u00e1i vua H\u00f9ng.", "key": "D", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604444, "lessonId": 0, "a": "C\u00e2u (1).", "b": "C\u00e2u (2).", "c": "C\u00e2u (3).", "d": "C\u00e2u (4).", "bookId": 1088794, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cS\u1ef1 y\u00ean l\u1eb7ng g\u1ea7n nh\u01b0 tuy\u1ec7t \u0111\u1ed1i bao tr\u00f9m v\u00f9ng \u0111\u1ea5t t\u1ebb ng\u1eaft, c\u00f4 qu\u1ea1nh v\u00e0 l\u1ea1nh l\u1ebdo \u0111\u1ebfn m\u1ee9c l\u00e0m cho \u0111\u1ea7u \u00f3c con ng\u01b0\u1eddi g\u1ea7n nh\u01b0 b\u1ebf t\u1eafc (1). N\u01a1i \u0111\u00e2y ta c\u1ea3m th\u1ea5y mu\u1ed1n c\u01b0\u1eddi, c\u01b0\u1eddi m\u1ed9t c\u00e1ch gh\u00ea s\u1ee3 h\u01a1n c\u1ea3 n\u1ed7i th\u1ea5t v\u1ecdng, c\u01b0\u1eddi m\u00e0 kh\u00f4ng vui nh\u01b0 n\u1ee5 c\u01b0\u1eddi c\u1ee7a con nh\u00e2n s\u01b0 l\u00e3nh \u0111\u1ea1m ch\u1ee9a \u0111\u1ef1ng m\u1ed9t n\u1ed7i cam ph\u1eadn kh\u00f4ng c\u00e1ch n\u00e0o v\u01b0\u1ee3t qua (2). C\u00f3 th\u1ec3 n\u00f3i r\u1eb1ng c\u00e1i c\u00f5i v\u00f4 bi\u00ean h\u1ebft s\u1ee9c m\u00e3nh li\u1ec7t v\u00e0 tr\u00e0n \u0111\u1ea7y th\u00f4ng th\u00e1i, kh\u00f4ng chia s\u1ebb \u0111\u01b0\u1ee3c \u0111\u00e3 t\u1ecf ra nh\u1ea1o b\u00e1ng s\u1ef1 ph\u00f9 phi\u1ebfm c\u1ee7a sinh t\u1ed3n v\u00e0 cu\u1ed9c \u0111\u1ea5u tranh c\u1ee7a n\u00f3 (3). \u0110\u00f3 l\u00e0 v\u00f9ng \u0111\u1ea5t ph\u01b0\u01a1ng B\u1eafc, hoang d\u00e3, t\u00e0n nh\u1eabn, l\u1ea1nh bu\u1ed1t th\u1ea5u tim (4).\u201d</i><br><div style=\"text-align: right;\">(Jack London, <i>Nanh tr\u1eafng</i>, NXB V\u0103n h\u1ecdc, 2006)</div>C\u00e2u v\u0103n n\u00e0o l\u00e0 c\u00e2u ch\u1ee7 \u0111\u1ec1 c\u1ee7a \u0111o\u1ea1n?", "answer": "C\u00e2u (4) l\u00e0 c\u00e2u ch\u1ee7 \u0111\u1ec1 c\u1ee7a \u0111o\u1ea1n v\u0103n, v\u00ec n\u00f3 kh\u00e1i qu\u00e1t n\u1ed9i dung ch\u00ednh c\u1ee7a to\u00e0n b\u1ed9 \u0111o\u1ea1n v\u0103n: mi\u00eau t\u1ea3 v\u00f9ng \u0111\u1ea5t ph\u01b0\u01a1ng B\u1eafc hoang d\u00e3, t\u00e0n nh\u1eabn v\u00e0 l\u1ea1nh l\u1ebdo. C\u00e1c c\u00e2u c\u00f2n l\u1ea1i l\u00e0 c\u00e1c c\u00e2u tri\u1ec3n khai, l\u00e0m r\u00f5 h\u01a1n cho c\u00e2u ch\u1ee7 \u0111\u1ec1.", "key": "D", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604450, "lessonId": 0, "a": "\u00cdch k\u1ec9, h\u1eb9p h\u00f2i.", "b": "T\u1ed1t b\u1ee5ng, r\u1ed9ng r\u00e3i.", "c": "Khoan dung, \u0111\u1ed9 l\u01b0\u1ee3ng.", "d": "Ng\u1ed1c ngh\u1ebfch, ng\u1edd ngh\u1ec7ch.", "bookId": 1088795, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cN\u1ed8I GI\u00c1M: - Ho\u00e0ng th\u01b0\u1ee3ng s\u1eafp \u0111\u1ebfn \u0111\u00e2y. Ng\u00e0i \u0111ang xem \u0111\u00e0i. Ng\u00e0i vui v\u1ebb v\u00e0 khen \u0111\u1eb9p kh\u00f4ng ti\u1ebfc nh\u1eddi. N\u00ean ng\u00e0i c\u00f3 sai t\u00f4i \u0111em \u0111\u1ebfn ban cho \u00f4ng m\u1ed9t l\u1ea1ng v\u00e0ng, hai m\u01b0\u01a1i th\u01b0\u1edbc l\u1ee5a.</i> (L\u1ea5y ra trao cho V\u0169 Nh\u01b0 T\u00f4).<br><i>V\u0168 NH\u01af T\u00d4: - B\u00e1i l\u0129nh. </i>(N\u00f3i v\u1edbi n\u1ed9i gi\u00e1m). <i>C\u1ea3m \u01a1n \u00f4ng.</i> (N\u1ed9i gi\u00e1m ra. N\u00f3i v\u1edbi c\u00e1c b\u1ea1n). <i>T\u00f4i th\u00ec c\u00f3 c\u00f4ng lao g\u00ec m\u00e0 l\u0129nh th\u01b0\u1edfng, c\u00e1c ch\u00fa ch\u1ecbu nhi\u1ec1u ph\u1ea7n kh\u00f3 nh\u1ecdc, m\u1edbi \u0111\u00e1ng l\u0129nh, t\u00f4i xin chia c\u00f9ng c\u00e1c ch\u00fa.<br>PH\u00d3 C\u00d5I: - Sao b\u00e1c l\u1ea1i g\u00e0n th\u1ebf? \u00c2n vua...<br>V\u0168 NH\u01af T\u00d4: - C\u00f3 ch\u00fa g\u00e0n. Anh em ch\u00fang ta c\u00f9ng nhau c\u1ed1 k\u1ebft x\u00e2y \u0111\u00e0i, vui c\u00f9ng nhau chung, nh\u1ee5c c\u00f9ng ch\u1ecbu. Ch\u00fa coi t\u00f4i ra c\u00e1i g\u00ec m\u00e0 kh\u00f4ng ch\u1ecbu h\u01b0\u1edfng chung v\u1edbi t\u00f4i. T\u00f4i c\u00f3 t\u00e1ch b\u1ea1ch ra \u0111\u00e2u?\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Huy T\u01b0\u1edfng, <i>V\u0169 Nh\u01b0 T\u00f4</i>, theo <i>vnu.edu.vn</i>)</div>T\u00ednh c\u00e1ch n\u00e0o c\u1ee7a V\u0169 Nh\u01b0 T\u00f4 \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n qua \u0111o\u1ea1n tr\u00edch?", "answer": "\u0110o\u1ea1n tr\u00edch th\u1ec3 hi\u1ec7n s\u1ef1 t\u1ed1t b\u1ee5ng, r\u1ed9ng r\u00e3i c\u1ee7a V\u0169 Nh\u01b0 T\u00f4 qua h\u00e0nh \u0111\u1ed9ng chia s\u1ebb ph\u1ea7n th\u01b0\u1edfng c\u1ee7a m\u00ecnh cho nh\u1eefng ng\u01b0\u1eddi th\u1ee3 kh\u00e1c. \u00d4ng cho r\u1eb1ng m\u1ecdi ng\u01b0\u1eddi \u0111\u1ec1u c\u00f3 c\u00f4ng s\u1ee9c \u0111\u00f3ng g\u00f3p v\u00e0o vi\u1ec7c x\u00e2y d\u1ef1ng \u0111\u00e0i n\u00ean x\u1ee9ng \u0111\u00e1ng \u0111\u01b0\u1ee3c h\u01b0\u1edfng chung th\u00e0nh qu\u1ea3.", "key": "B", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604454, "lessonId": 0, "a": "B\u1ef1c b\u1ed9i, c\u00e1u k\u1ec9nh.", "b": "\u0110au \u0111\u1edbn, t\u1ee7i c\u1ef1c.", "c": "Gi\u1eadn d\u1eef, tr\u00e1ch m\u1eafng.", "d": "Th\u1ea5u hi\u1ec3u, s\u1ebb chia.", "bookId": 1088796, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cGi\u1edd th\u00ec mi l\u1ea1i s\u1eafp l\u00e0m t\u1ec7 h\u1ea1i h\u01a1n n\u1eefa. Mi s\u1eafp ca ng\u1ee3i c\u00f4ng \u0111\u1ee9c c\u1ee7a nh\u1eefng \u0111\u1ee9a b\u00f3c l\u1ed9t v\u00e0 hi\u1ebfp \u0111\u00e1p d\u00e2n mi. Mi s\u1eafp ph\u00f4 tr\u01b0\u01a1ng s\u1ef1 th\u1ecbnh v\u01b0\u1ee3ng c\u1ee7a \u0111\u1ea5t n\u01b0\u1edbc mi, c\u00e1i th\u1ecbnh v\u01b0\u1ee3ng \u0111\u01b0\u1ee3c s\u1eafp \u0111\u1eb7t \u0111\u00e2u ra \u0111\u1ea5y trong tr\u00ed t\u01b0\u1edfng t\u01b0\u1ee3ng qu\u00e1 gi\u00e0u c\u1ee7a b\u1ecdn b\u00f3c l\u1ed9t. Mi s\u1eafp t\u00e2ng b\u1ed1c c\u00f4ng \u01a1n v\u00f4 ng\u1ea7n v\u00e0 t\u01b0\u1edfng t\u01b0\u1ee3ng c\u1ee7a n\u1ec1n v\u0103n minh \u0111\u00e3 th\u00e2m nh\u1eadp s\u01a1n h\u00e0 x\u00e3 t\u1eafc c\u1ee7a mi b\u1eb1ng m\u0169i nh\u1ecdn c\u1ee7a l\u01b0\u1ee1i l\u00ea v\u00e0 b\u1eb1ng h\u1ecdng s\u00fang ca n\u00f4ng.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u00c1i Qu\u1ed1c, <i>L\u1eddi than v\u00e3n c\u1ee7a b\u00e0 Tr\u01b0ng Tr\u1eafc</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Gi\u1ecdng \u0111i\u1ec7u ch\u00ednh c\u1ee7a \u0111o\u1ea1n v\u0103n tr\u00ean l\u00e0 g\u00ec?", "answer": "\u0110o\u1ea1n v\u0103n s\u1eed d\u1ee5ng nh\u1eefng t\u1eeb ng\u1eef m\u1ea1nh m\u1ebd, mang t\u00ednh t\u1ed1 c\u00e1o cao \u0111\u1ed9 nh\u01b0 \u201ct\u1ec7 h\u1ea1i h\u01a1n n\u1eefa\u201d, \u201cb\u00f3c l\u1ed9t v\u00e0 hi\u1ebfp \u0111\u00e1p\u201d, \u201cph\u00f4 tr\u01b0\u01a1ng s\u1ef1 th\u1ecbnh v\u01b0\u1ee3ng... trong tr\u00ed t\u01b0\u1edfng t\u01b0\u1ee3ng qu\u00e1 gi\u00e0u\u201d, \u201ct\u00e2ng b\u1ed1c c\u00f4ng \u01a1n... b\u1eb1ng m\u0169i nh\u1ecdn c\u1ee7a l\u01b0\u1ee1i l\u00ea v\u00e0 b\u1eb1ng h\u1ecdng s\u00fang ca n\u00f4ng\u201d. Nh\u1eefng t\u1eeb ng\u1eef n\u00e0y th\u1ec3 hi\u1ec7n r\u00f5 s\u1ef1 gi\u1eadn d\u1eef v\u00e0 th\u00e1i \u0111\u1ed9 l\u00ean \u00e1n gay g\u1eaft c\u1ee7a t\u00e1c gi\u1ea3 \u0111\u1ed1i v\u1edbi nh\u1eefng k\u1ebb b\u00f3c l\u1ed9t v\u00e0 hi\u1ebfp \u0111\u00e1p d\u00e2n ch\u00fang.", "key": "C", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604461, "lessonId": 0, "a": "Ng\u00e0y 26 - 5 - 1965.", "b": "\u0110\u1ea1n d\u01b0\u1edbi \u0111\u1ea5t b\u1eafn l\u00ean, bom t\u00ean l\u1eeda tr\u00ean tr\u1eddi gi\u00e1ng xu\u1ed1ng \u00f9ng o\u00e0ng m\u1ecbt m\u00f9 m\u1ed9t v\u00f9ng.", "c": "Trai v\u00e0 g\u00e1i l\u00e0ng Nam Ng\u1ea1n.", "d": "C\u1ea7u H\u00e0m R\u1ed3ng.", "bookId": 1088797, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTr\u1eadn \u0111\u00e1nh ng\u00e0y 26 - 5 - 1965 c\u00f3 l\u1ebd ph\u1ea3i ghi \u0111\u1eadm trong s\u1eed l\u00e0ng l\u1eabn s\u1eed n\u01b0\u1edbc. Hai trung \u0111\u1ed9i d\u00e2n qu\u00e2n trai v\u00e0 g\u00e1i l\u00e0ng Nam Ng\u1ea1n \u0111\u1ec1u \u0111\u01b0\u1ee3c huy \u0111\u1ed9ng v\u00e0o tr\u1eadn \u0111\u00e1nh \u00e1c li\u1ec7t n\u00e0y. H\u00e0ng tr\u0103m l\u01b0\u1ee3t chi\u1ebfc m\u00e1y bay \u0111\u1ee7 lo\u1ea1i thay nhau b\u1ed5 nh\u00e0o \u0111\u00e1nh c\u1ea7u t\u1eeb s\u00e1ng s\u1edbm \u0111\u1ebfn chi\u1ec1u t\u1ed1i. <br>\u0110\u1ea1n d\u01b0\u1edbi \u0111\u1ea5t b\u1eafn l\u00ean, bom t\u00ean l\u1eeda tr\u00ean tr\u1eddi gi\u00e1ng xu\u1ed1ng \u00f9ng o\u00e0ng m\u1ecbt m\u00f9 m\u1ed9t v\u00f9ng. C\u1ee9 ng\u1ee1 nh\u01b0 b\u1ecdn M\u1ef9 h\u1ea1 quy\u1ebft t\u00e2m, trong ng\u00e0y h\u00f4m \u1ea5y ph\u1ea3i thanh to\u00e1n d\u1ee9t \u0111i\u1ec3m c\u00e2y c\u1ea7u huy\u1ec1n tho\u1ea1i H\u00e0m R\u1ed3ng. Hai t\u00e0u h\u1ea3i qu\u00e2n \u1edf m\u1ea1n h\u1ea1 l\u01b0u, m\u1ed9t t\u00e0u th\u01b0\u01a1ng vong n\u1eb7ng.\u201d</i><br><div style=\"text-align: right;\">(Xu\u00e2n Ba, <i>H\u00e0m R\u1ed3ng bi tr\u00e1ng</i>, k\u00ec I, theo <i>tienphong.vn</i>)</div>Chi ti\u1ebft n\u00e0o <b>kh\u00f4ng </b>thu\u1ed9c nh\u00f3m y\u1ebfu t\u1ed1 phi c\u1ea5u trong \u0111o\u1ea1n tr\u00edch?", "answer": "Chi ti\u1ebft \u201c\u0110\u1ea1n d\u01b0\u1edbi \u0111\u1ea5t b\u1eafn l\u00ean, bom t\u00ean l\u1eeda tr\u00ean tr\u1eddi gi\u00e1ng xu\u1ed1ng \u00f9ng o\u00e0ng m\u1ecbt m\u00f9 m\u1ed9t v\u00f9ng.\u201d g\u1ee3i c\u1ea3nh t\u01b0\u1ee3ng d\u1eef d\u1ed9i, kh\u1ed1c li\u1ec7t c\u1ee7a chi\u1ebfn tranh nh\u01b0ng s\u1eed d\u1ee5ng c\u00e1c t\u1eeb ng\u1eef t\u1eeb ng\u1eef nh\u01b0 \u201cgi\u00e1ng xu\u1ed1ng\u201d, \u201c\u00f9ng o\u00e0ng\u201d, \u201cm\u1ecbt m\u00f9 m\u1ed9t v\u00f9ng\u201d mang t\u00ednh g\u1ee3i t\u1ea3, c\u01b0\u1eddng \u0111i\u1ec7u g\u00e2y \u1ea5n t\u01b0\u1ee3ng m\u1ea1nh cho ng\u01b0\u1eddi \u0111\u1ecdc.<br>\n\u2192 \u0110\u00e2y l\u00e0 chi ti\u1ebft h\u01b0 c\u1ea5u.\n", "key": "B", "isVideo": true, "score": 0, "order": 11, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604462, "lessonId": 0, "a": "\u201cChinh ph\u1ee5 ng\u00e2m kh\u00fac\u201d.", "b": "\u201cT u1eddi trong tr\u1ebbo, l\u00e0nh l\u1eb7n, \u0111\u1eb9p \u0111\u1ebd c\u1ee7a nh\u1eefng c\u00e2u th\u01a1 l\u00e3ng m\u1ea1n:<br><i>Ng\u01b0\u1eddi qua r\u1ed3i b\u00f3ng d\u00e1ng c\u1ee9 theo sau<br>Anh l\u00ednh tr\u1ebb b\u1ed7ng quay \u0111\u1ea7u t\u1ee7m t\u1ec9m<br>C\u00e2y \u0111\u00e3 h\u00e9 nh\u1eefng m\u1eaft tr\u00f2n ch\u00fam ch\u00edm<br>\u0110ang th\u1eadp th\u00f2 ngh\u1ecbch ng\u1ee3m nh\u00ecn theo</i><br><div style=\"text-align: right;\"><i>(C\u00e2y x\u1ea5u h\u1ed5)</i></div>Chi\u1ebfn tranh. Bom \u0111\u1ea1n \u0111\u1ea7y tr\u1eddi. Th\u01a1 t\u1ee5ng x\u01b0ng v\u1ebb \u0111\u1eb9p, s\u1ee9c s\u1ed1ng c\u1ee7a c\u1ecf c\u00e2y hoa l\u00e1. Trong th\u01a1 Anh Ng\u1ecdc, h\u00ecnh \u1ea3nh c\u1ecf c\u00e2y hoa l\u00e1 xu\u1ea5t hi\u1ec7n kh\u00e1 nhi\u1ec1u v\u00e0 mang n\u00e9t \u0111\u1eb9p t\u01b0\u01a1i non, thu\u1ea7n khi\u1ebft c\u1ee7a thi\u00ean nhi\u00ean. Theo t\u00f4i, \u0111\u00f3 c\u0169ng l\u00e0 n\u00e9t \u0111\u1eb7c s\u1eafc c\u1ee7a th\u01a1 ch\u1ed1ng M\u1ef9. Ph\u1ea3n \u00e1nh c\u00e1i \u0111\u1ed1i l\u1eadp v\u1edbi s\u1ef1 t\u00e0n ph\u00e1 c\u1ee7a bom \u0111\u1ea1n gi\u1eb7c l\u00e0 kh\u1eb3ng \u0111\u1ecbnh s\u1ee9c s\u1ed1ng m\u00e3nh li\u1ec7t kh\u00f4ng g\u00ec v\u00f9i d\u1eadp \u0111\u01b0\u1ee3c c\u1ee7a thi\u00ean nhi\u00ean, \u0111\u1ea5t n\u01b0\u1edbc, con ng\u01b0\u1eddi Vi\u1ec7t Nam. Trong th\u01a1 c\u1ee7a Anh Ng\u1ecdc c\u00f3 h\u00ecnh \u1ea3nh c\u00e2y m\u00eda \u0111\u01b0a n\u00f4i, nh\u00e0nh phong lan t\u1eb7ng b\u1ea1n, l\u00e1 dong b\u1edd su\u1ed1i xanh m\u00e0u T\u1ebft, nh\u1eefng b\u00f4ng hoa tr\u1ee9ng g\u00e0 r\u01a1i hay ng\u1ecdn lang r\u1eebng leo quanh c\u1ecdc ph\u1ee5... T\u00e2m h\u1ed3n anh \u0111\u00f3n nh\u1ea1n, ho\u00e0 \u0111\u1ed3ng v\u00e0o cu\u1ed9c s\u1ed1ng chi\u1ebfn \u0111\u1ea5u c\u1ee7a nh\u00e2n d\u00e2n, c\u1ee7a \u0111\u1ed3ng \u0111\u1ed9i, \u0111\u1ea7y th\u01a1 m\u1ed9ng, tin c\u1eady. Ng\u01b0\u1eddi l\u00ednh th\u00f4ng tin nh\u00ecn \u0111\u01b0\u1eddng d\u00e2y \u0111i\u1ec7n tho\u1ea1i b\u1eb1ng con m\u1eaft c\u1ee7a thi s\u0129: <i>M\u1ed7i b\u01b0\u1edbc d\u00e2y l\u00ean ph\u00eda tr\u01b0\u1edbc/ l\u00e1t \u0111\u1ea7y nh\u1eefng c\u00e1nh hoa r\u01a1i</i>. M\u1ed9t c\u00e1ch nh\u00ecn th\u1eadt tr\u1ebb v\u00e0 \u0111\u1eb9p, \u0111\u1ea7y s\u1ef1 m\u1eabn c\u1ea3m, y\u00eau d\u1ea5u cu\u1ed9c s\u1ed1ng quanh m\u00ecnh. \u00c2m h\u01b0\u1edfng th\u1eddi \u0111\u1ea1i, \u00e2m h\u01b0\u1edfng thi ca r\u00f5 r\u00e0ng \u0111\u00e3 t\u00e1c \u0111\u1ed9ng v\u00e0o anh t\u1ea1o n\u00ean gi\u1ecdng th\u01a1 h\u0103m h\u1edf, say m\u00ea v\u00e0 c\u00f3 ph\u1ea7n h\u00e0o s\u1ea3ng. <br><div style=\"text-align: right;\">(Nguy\u1ec5n H\u1eefu Qu\u00fd, <i>V\u1edbi nh\u00e0 th\u01a1 Anh Ng\u1ecdc</i> - <i>th\u1ebf gian \u0111\u1eb9p v\u00e0 bu\u1ed3n</i>, theo <i>vannghequandoi.com.vn</i>)</div>", "listQuestion": [{"questionId": 21604513, "lessonId": 0, "a": "Tr\u00e0n \u0111\u1ea7y s\u1ee9c s\u1ed1ng.", "b": "T\u01b0\u01a1i non, thu\u1ea7n khi\u1ebft.", "c": "X\u01a1 x\u00e1c, h\u00e9o \u00faa.", "d": "D\u1eadp n\u00e1t, g\u00e3y g\u1eadp.", "bookId": 1088807, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Theo \u0111o\u1ea1n tr\u00edch, trong th\u01a1 Anh Ng\u1ecdc, h\u00ecnh \u1ea3nh c\u1ecf c\u00e2y hoa l\u00e1 c\u00f3 \u0111\u1eb7c \u0111i\u1ec3m g\u00ec?", "answer": "D\u1ef1a v\u00e0o c\u00e2u v\u0103n: \u201cTrong th\u01a1 Anh Ng\u1ecdc, h\u00ecnh \u1ea3nh c\u1ecf c\u00e2y hoa l\u00e1 xu\u1ea5t hi\u1ec7n kh\u00e1 nhi\u1ec1u v\u00e0 mang n\u00e9t \u0111\u1eb9p t\u01b0\u01a1i non, thu\u1ea7n khi\u1ebft c\u1ee7a thi\u00ean nhi\u00ean.\u201d<br>\n\u2192 Theo \u0111o\u1ea1n tr\u00edch, trong th\u01a1 Anh Ng\u1ecdc, h\u00ecnh \u1ea3nh c\u1ecf c\u00e2y hoa l\u00e1 c\u00f3 \u0111\u1eb7c \u0111i\u1ec3m t\u01b0\u01a1i non, thu\u1ea7n khi\u1ebft.\n", "key": "B", "isVideo": true, "score": 0, "order": 21, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked":         let userAnswers = {}; // Store: { qId: value }
        let isSubmitted = false;
        let examMode = 'practice'; // 'practice' or 'exam'
        let startTime = Date.now();
        let timerInterval;

        // --- INIT ---
        window.onload = function() {
            renderExam();
            startTimer();
            document.getElementById('mode-select').addEventListener('change', (e) => {
                if(isSubmitted) return;
                if(confirm('Đổi chế độ sẽ làm mới lại trạng thái hiển thị (không mất bài làm). Tiếp tục?')) {
                    examMode = e.target.value;
                    renderExam(false); // Re-render without resetting answers
                } else {
                    e.target.value = examMode;
                }
            });
        };

        // --- TIMER LOGIC ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- RENDER ENGINE ---
        function renderExam(reset = false) {
            const container = document.getElementById('exam-content');
            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; // Clear to re-render
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

            let globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                // Render Group Header
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`; // Unique Key for storage
                    const qType = q.normalizedType;
                    
                    // -- Palette Item --
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop
                    palMob.appendChild(palBtn); // Add to Mobile

                    // -- Question Card --

                    qCard.id = `question-${qKey}`;
                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    // Header: Question Number
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    // Interaction Area
                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // === TYPE 0: MCQ ===

                            }

                            // Logic hiển thị kết quả
                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { // Chọn đúng
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { // Đúng nhưng không chọn (hiện đáp án khi nộp)
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { // Chọn sai
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; // Hiện đáp án đúng sau khi nộp dù chưa làm
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // === TYPE 1 & 3: FILL KEY ===
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let inputClass = "w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all font-mono";
                        let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
