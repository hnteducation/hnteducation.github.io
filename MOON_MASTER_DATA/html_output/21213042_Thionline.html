1u ki\u1ec7n \"th\u00eam\".<br><b>\u2705 K\u1ebft lu\u1eadn: Ch\u1ecdn \u0111\u00e1p \u00e1n A.</b><br>", "key": "A", "isVideo": true, "score": 0, "order": 12, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.5, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Ph\u1ea7n 2. C\u00e2u tr\u1eafc nghi\u1ec7m \u0111\u00fang sai\nTh\u00ed sinh tr\u1ea3 l\u1eddi t\u1eeb c\u00e2u 13 \u0111\u1ebfn c\u00e2u 16. Trong m\u1ed7i \u00fd \u1edf m\u1ed7i c\u00e2u, th\u00ed sinh ch\u1ecdn \u0111\u00fang ho\u1eb7c sai.", "content": "", "listQuestion": [{"questionId": 21214152, "lessonId": 0, "a": "", "b": "", "c": "", "d": "", "bookId": 1057261, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 2, "questionText": "Cho t\u1ee9 gi\u00e1c ABCD c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f760e1b7-712e-446f-91db-bc341a15ae3a.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ecdb62ff-19c3-4010-8ef2-67556fc096ab.png\"/> Tr\u00ean tia \u0111\u1ed1i c\u1ee7a tia DA l\u1ea5y \u0111i\u1ec3m E sao cho <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/c31f8e8f-2031-4e8a-ae51-842053685201.png\"/><br><img src=\"https://asset.moon.vn/img/chat/large/2025/9/5c356be8-9607-4fc6-bcd6-ecef081394be.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br>M\u1ed7i ph\u00e1t bi\u1ec3u sau \u0111\u00e2y l\u00e0 \u0111\u00fang hay sai?", "answer": "<b>\ud83d\udcca Ph\u00e2n t\u00edch chung:</b><br>Tr\u01b0\u1edbc khi x\u00e9t t\u1eebng m\u1ec7nh \u0111\u1ec1, ta ch\u1ee9ng minh m\u1ed9t t\u00ednh ch\u1ea5t quan tr\u1ecdng:<br>1. Ta c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/77ae2080-7336-4716-8b53-9734839f9efc.png\"/> th\u1eb3ng h\u00e0ng, n\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ff41f2be-ea17-4334-aafd-403ebececba4.png\"/> (hai g\u00f3c k\u1ec1 b\u00f9).<br>2. Theo gi\u1ea3 thi\u1ebft, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/eb4a287a-67de-4a86-8303-8bf79156cbd8.png\"/>.<br>3. T\u1eeb (1) v\u00e0 (2), suy ra: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/cddaaf5b-b98a-45c6-98d7-ee05d6317bf9.png\"/> (ho\u1eb7c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/8c7c2b79-340e-43f0-886c-55409095b631.png\"/>).<br><b>Ph\u00e1t bi\u1ec3u 1: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7c41761f-d631-4305-9f71-697f0b94f51b.png\"/></b><br><b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>S\u1eed d\u1ee5ng \u0111\u1ecbnh l\u00fd t\u1ed5ng b\u1ed1n g\u00f3c trong m\u1ed9t t\u1ee9 gi\u00e1c.<br><b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>T\u1ed5ng b\u1ed1n g\u00f3c trong t\u1ee9 gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ef7cf9d3-18df-4466-bd59-62ac509a5648.png\"/> l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/24a1d600-a550-47c9-a987-6e9e6cfa078e.png\"/>.<br>Ta c\u00f3: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/02418eba-ea53-4a2d-8a0d-f82dd51d0fd8.png\"/><br>Theo gi\u1ea3 thi\u1ebft, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a8d043d9-0deb-482a-93fa-96a0553cec5e.png\"/>.<br>Thay v\u00e0o, ta \u0111\u01b0\u1ee3c: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/61759bee-fa9d-452c-8c6e-e733bae878cc.png\"/><br>Suy ra: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/586eb77e-e2b9-4c6a-80b1-055ab7bcbcc9.png\"/>.<br><b>\u2705 K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u <b>\u0111\u00fang</ on.vn/img/chat/large/2025/10/ff40ed1f-108f-48e4-bb4b-8749c6cacf6d.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br>\n\n<b>Ph\u00e1t bi\u1ec3u 1:</b> <i><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/69561f40-b90d-4e62-906d-aa0cb1fb7a70.png\"/> l\u00e0 tam gi\u00e1c \u0111\u1ec1u</i><br>\n\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b> S\u1eed d\u1ee5ng gi\u1ea3 thi\u1ebft song song \u0111\u1ec3 ch\u1ee9ng minh t\u1ee9 gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/064177d8-2edb-4b84-912d-7a1676bdcf26.png\"/> l\u00e0 h\u00ecnh b\u00ecnh h\u00e0nh. T\u1eeb \u0111\u00f3 suy ra m\u1ed1i quan h\u1ec7 gi\u1eefa <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/5df207c8-c30b-467d-aa2e-7b4e2ff05a05.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ba919081-9eb3-4696-a2e8-69255fe1e3d7.png\"/>. K\u1ebft h\u1ee3p v\u1edbi gi\u1ea3 thi\u1ebft <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/bca7ffe8-a47a-4796-97a3-0030ee2e9f8a.png\"/> \u0111\u1ec3 x\u00e1c \u0111\u1ecbnh d\u1ea1ng c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/5ff04b65-521a-4201-b583-b955300cab1f.png\"/>.<br>\n\u270d\ufe0f <b>L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nX\u00e9t t\u1ee9 gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/c0498402-ad1d-4633-ae18-19e6d890cc9e.png\"/>, ta c\u00f3: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d055ddcd-2287-4aa7-87b6-36bb622e3d8e.png\"/> (v\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/184fc16a-b0df-494b-830b-ee6a4354c6b1.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/2a92229a-4091-4da2-9db1-4cb0ab1f26eb.png\"/>).<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/266d4a5e-e1d6-405a-a77e-567d0db92208.png\"/> (theo gi\u1ea3 thi\u1ebft).<br>\nDo \u0111\u00f3, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/4f263cdf-72f0-4bbe-b2d1-845296fcbbd6.png\"/> l\u00e0 h\u00ecnh b\u00ecnh h\u00e0nh (t\u1ee9 gi\u00e1c c\u00f3 c\u00e1c c\u1eb7p c\u1ea1nh \u0111\u1ed1i song song).<br>\nV\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/57d95580-765c-420a-a890-e3cd02c8881f.png\"/> l\u00e0 h\u00ecnh b\u00ecnh h\u00e0nh n\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/891b6cf6-fc12-4386-829f-43d8afa011ac.png\"/>.<br>\nTheo gi\u1ea3 thi\u1ebft, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6e65cb26-90b7-4fed-a847-003cc74eab18.png\"/>.<br>\nSuy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ca197280-9d6b-46a4-9bfe-f712705c2112.png\"/>.<br>\nTam gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/27ea45b6-f793-4eb8-8a61-220f45dd1bd7.png\"/> c\u00f3 hai c\u1ea1nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d59c7e60-205c-4791-b1c7-b1947ab338e8.png\"/> n\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f06edce9-f9be-4be8-9e84-2a3e366a5029.png\"/> l\u00e0 tam gi\u00e1c c\u00e2n t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/250429b7-0533-42c9-8f84-05c10b8aa65f.png\"/>.<br>\nKh\u00f4ng c\u00f3 th\u00eam d\u1eef ki\u1ec7n \u0111\u1ec3 ch\u1ee9ng minh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/911c9458-af56-497f-a98a-e57f841cccc2.png\"/>, do \u0111\u00f3 kh\u00f4ng th\u1ec3 k\u1ebft lu\u1eadn \u0111\u00e2y l\u00e0 tam gi\u00e1c \u0111\u1ec1u.<br>\n\u2705 <b>K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u <b>sai</b>.<br>\n\n<b>Ph\u00e1t bi\u1ec3u 2:</b> <i><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/9e4a92a1-c4c5-4249-9748-8dfd01041939.png\"/></i><br>\n\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b> Ph\u00e2n t\u00edch k\u00fd hi\u1ec7u c\u1ee7a hai tam gi\u00e1c \u0111\u01b0\u1ee3c n\u00eau trong ph\u00e1t bi\u1ec3u.<br>\n\u270d\ufe0f <b>L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nPh\u00e1t bi\u1ec3u n\u00e0y so s\u00e1nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/03dda569-3a21-4ce7-8cda-db4d7ba0f552.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/c8c62bf2-bc7b-48e3-94c8-902a2a2191cd.png\"/>.<br>\nG\u00f3c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/e308cb63-ebaa-495c-9493-7f39026cbcdb.png\"/> kh\u00e1c v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/4d42045a-a618-4c96-92c7-26c417674a18.png\"/> n\u00ean hai tam gi\u00e1c kh\u00f4ng b\u1eb1ng nhau.<br>\n\u2705 <b>K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 2 l\u00e0 ph\u00e1t bi\u1ec3u <b>sai</b>.<br>\n\n<b>Ph\u00e1t bi\u1ec3u 3:</b> <i><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/5a99c3b1-84e9-4387-b7dd-4a2a013a9b60.png\"/> l\u00e0 h\u00ecnh thang c\u00e2n</i><br>\n\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b> S\u1eed d\u1ee5ng d\u1ea5u hi\u1ec7u nh\u1eadn bi\u1ebft h\u00ecnh thang c\u00e2n: \"H\u00ecnh thang c\u00f3 hai \u0111\u01b0\u1eddng ch\u00e9o b\u1eb1ng nhau l\u00e0 h\u00ecnh thang c\u00e2n\".<br>\n\u270d\ufe0f <b>L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nTheo gi\u1ea3 thi\u1ebft, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/86545a2c-71f4-4205-9a25-a7ff48eab8e0.png\"/> l\u00e0 h\u00ecnh thang (v\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/77788754-6e72-4b80-a9f1-e5a006eedbe1.png\"/>).<br>\nH\u00ecnh thang n\u00e0y c\u00f3 hai \u0111\u01b0\u1eddng ch\u00e9o l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/234222d2-740f-4e7a-8954-07f6f7b1525a.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ee9a478e-5193-4939-b82a-3ee1caae5047.png\"/> b\u1eb1ng nhau (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/1d7691fd-c8e0-4b63-9881-c4bf947f8c46.png\"/>).<br>\n\u00c1p d\u1ee5ng d\u1ea5u hi\u1ec7u nh\u1eadn bi\u1ebft, h\u00ecnh thang <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/69e083a1-a79d-4fdf-a779-470f114e0d81.png\"/> c\u00f3 hai \u0111\u01b0\u1eddng ch\u00e9o b\u1eb1ng nhau n\u00ean n\u00f3 l\u00e0 h\u00ecnh thang c\u00e2n.<br>\n\u2705 <b>K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 3 l\u00e0 ph\u00e1t bi\u1ec3u <b>\u0111\u00fang</b>.<br>\n\n<b>Ph\u00e1t bi\u1ec3u 4:</b> <i><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/df011394-54e9-4f60-ac55-f23ab4d94e24.png\"/> l\u00e0 h\u00ecnh thang c\u00e2n</i><br>\n\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b> Ch\u1ee9ng minh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/80ea6949-5c7a-4843-bcf6-563a3bb06563.png\"/> l\u00e0 h\u00ecnh b\u00ecnh h\u00e0nh. Sau \u0111\u00f3 ki\u1ec3m tra xem h\u00ecnh b\u00ecnh h\u00e0nh c\u00f3 ph\u1ea3i l\u00e0 h\u00ecnh thang c\u00e2n kh\u00f4ng.<br>\n\u270d\ufe0f <b>L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nNh\u01b0 \u0111\u00e3 ch\u1ee9ng minh \u1edf Ph\u00e1t bi\u1ec3u 1, t\u1ee9 gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ba1e7a1c-b08b-4dd4-a500-ad4824814db8.png\"/> l\u00e0 h\u00ecnh b\u00ecnh h\u00e0nh (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/91d0f3e1-6a9e-4e55-9078-30cb659c7a32.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0958c3e6-5582-4e2c-8aef-637b62ef46f2.png\"/>).<br>\nM\u1ed9t h\u00ecnh b\u00ecnh h\u00e0nh c\u0169ng l\u00e0 m\u1ed9t h\u00ecnh thang (c\u00f3 hai \u0111\u00e1y <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/18ad104d-2a17-418f-abf0-37d057a9e435.png\"/>).<br>\n\u0110\u1ec3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/c1b329fd-f15e-4b3e-8bf3-c8613929568e.png\"/> l\u00e0 h\u00ecnh thang c\u00e2n, c\u1ea7n th\u1ecfa m\u00e3n m\u1ed9t trong hai \u0111i\u1ec1u ki\u1ec7n: hai g\u00f3c k\u1ec1 \u0111\u00e1y b\u1eb1ng nhau (v\u00ed d\u1ee5 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6ccf8365-8f05-4ba9-9f86-71cd4a9fc10a.png\"/>) ho\u1eb7c hai \u0111\u01b0\u1eddng ch\u00e9o b\u1eb1ng nhau (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/10235b71-3947-401e-ac99-9c3b1a7963cd.png\"/>).<br>\nV\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/aef1b1dc-5f7f-4954-af79-74b7fab0e05b.png\"/> l\u00e0 h\u00ecnh b\u00ecnh h\u00e0nh, hai g\u00f3c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/8f01356c-3341-447a-8024-99f2cc79beee.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/9a151f4d-c45a-43a9-ae5f-bbe5f55bb5fd.png\"/> l\u00e0 hai g\u00f3c trong c\u00f9ng ph\u00eda t\u1ea1o b\u1edfi \u0111\u01b0\u1eddng th\u1eb3ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/37b5b753-05fe-41a0-bd78-93160c653ff6.png\"/> c\u1eaft hai \u0111\u01b0\u1eddng th\u1eb3ng song song <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/8f9d9b1c-0a5d-407e-ba80-e1a32b1e2018.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/dc97a4a3-88ee-48e4-b033-41a4f522bd7e.png\"/>, n\u00ean ch\u00fang b\u00f9 nhau (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/cd8a22e1-5194-4768-a0ab-5f71a1c2b75e.png\"/>).<br>\nCh\u00fang ch\u1ec9 b\u1eb1ng nhau khi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ec12f159-1feb-466c-8d24-53d2fe64e0b0.png\"/>, t\u1ee9c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6613a051-78c8-4b24-a9f1-fd6c838869a5.png\"/> l\u00e0 h\u00ecnh ch\u1eef nh\u1eadt. Kh\u00f4ng c\u00f3 d\u1eef ki\u1ec7n \u0111\u1ec3 k\u1ebft lu\u1eadn <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/5ba5334d-413f-4092-a174-df6252e18d8e.png\"/> l\u00e0 h\u00ecnh ch\u1eef nh\u1eadt.<br>\n\u2705 <b>K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 4 l\u00e0 ph\u00e1t bi\u1ec3u <b>sai</b>.<br>\n", "key": " ", "isVideo": true, "score": 0, "order": 14, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.5, "plans": [{"lessonId": 0, "questionId": 21214157, "planId": 21214161, "content": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7d064286-0232-4fab-aa3d-403d61bd5c44.png\"/> l\u00e0 tam gi\u00e1c \u0111\u1ec1u.\t", "key": "0", "planName": " ", "order": 0, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21214157, "planId": 21214158, "content": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/5cddd55e-f6e7-4a80-9935-88548c2a3b9e.png\"/>\t \t \t", "key": "0", "planName": " ", "order": 1, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21214157, "planId": 21214160, "content": "MNPQ l\u00e0 h\u00ecnh thang c\u00e2n.\t ", "key": "1", "planName": " ", "order": 2, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21214157, "planId": 21214159, "content": "MNKP l\u00e0 h\u00ecnh thang c\u00e2n.", "key": "0", "planName": " ", "order": 3, "yourKey": "", "isTested": false}], "answerPlans": [], "normalizedType": "2"}, {"questionId": 21214163, "lessonId": 0, "a": "", "b": "", "c": "", "d": "", "bookId": 1057263, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 2, "questionText": "Cho h\u00ecnh thoi ABCD c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/fd71a6f1-4d4f-40b0-9348-4d98dd8c56e2.png\"/> K\u1ebb <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/1a192072-b9fd-4286-9a11-b90baf3858db.png\"/><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/812e83e9-538d-42a0-b39c-18f6d3c9d2fb.png\"/><br><img src=\"https://asset.moon.vn/img/chat/large/2025/10/66e4fe96-2d21-414b-80d7-bb3e405d5968.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br>M\u1ed7i ph\u00e1t bi\u1ec3u sau \u0111\u00e2y l\u00e0 \u0111\u00fang hay sai?", "answer": "<b>Ph\u00e1t bi\u1ec3u 1:</b> <i><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/23febffc-b356-4731-b121-9e2121ba0d33.png\"/></i><br>\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b> \u0110\u1ec3 ch\u1ee9ng minh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/323070ea-6cf1-439f-80a2-4078db49f1b3.png\"/>, ch\u1ee9ng minh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f70f7410-d48c-447a-8c4a-d2e72e44c8da.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f852012d-435a-4c70-95cd-9d18a5ff60e5.png\"/> l\u00e0 hai tam gi\u00e1c vu\u00f4ng b\u1eb1ng nhau.<br>\u270d\ufe0f <b>L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>V\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/27fd486c-a32f-4cad-af0d-2d52ce3e8803.png\"/> l\u00e0 h\u00ecnh thoi n\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/36e4c01d-7a18-4cf6-a8ed-875be917821e.png\"/>.<br>ABCD c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/cf13256f-9d05-48ec-8302-169dbedd7773.png\"/>, suy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7e65da23-aa17-4316-92c8-cbf7505450f0.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/2edd0c04-b967-48af-8158-185ed32fe89d.png\"/>.<br>H\u00ecnh thoi c\u00f3 \u0111\u01b0\u1eddng ch\u00e9o l\u00e0 ph\u00e2n gi\u00e1c c\u00e1c g\u00f3c, do \u0111\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/daff1637-36e8-42ae-9111-935efb9e729c.png\"/> chia \u0111\u00f4i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/357332d8-ae0b-4996-aa65-03574df12e2b.png\"/>.<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7097883c-02ee-4159-8dd0-eeb57cad2ecd.png\"/>.<br>X\u00e9t <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/8c2a17cf-2a2a-46b8-9f25-e32701c81178.png\"/> (vu\u00f4ng t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/8bb95a9a-f964-4de3-8b9e-84ea461a4951.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/881401ad-58f3-4ea4-a086-33904229d83a.png\"/>) v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7383b27a-cc1a-4f64-96d0-b853c59bf9c0.png\"/> (vu\u00f4ng t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/82345479-fbac-4f41-b14a-e8a106cb14e9.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a3d4c2fb-5526-4326-a0a4-49825d4faf56.png\"/>): c\u1ea1nh huy\u1ec1n <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/42c3a706-aaf1-41cc-8793-ef8da7b38a7e.png\"/> l\u00e0 chung, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/684e47ea-86b5-4929-8300-8c527339044a.png\"/>.<br>Do \u0111\u00f3, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/12d2f3be-e268-4e77-afc7-5ed442b95a8d.png\"/> (c\u1ea1nh huy\u1ec1n - g\u00f3c nh\u1ecdn).<br>Suy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/3ccfe6c5-697d-4cc7-b6ed-b53fd1d5f166.png\"/>.<br>\u2705 <b>K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u <b>\u0111\u00fang</b>.<br><b>Ph\u00e1t bi\u1ec3u 2:</b> <i><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a16e71bf-8e1f-4283-8260-607f62a68c5e.png\"/></i><br>\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b> S\u1eed d\u1ee5ng t\u1ed5ng s\u1ed1 \u0111o c\u00e1c g\u00f3c trong t\u1ee9 gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/1c1f528d-621a-4254-8113-e81e7cb66748.png\"/>.<br>\u270d\ufe0f <b>L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>X\u00e9t t\u1ee9 gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/633b8dd8-80bd-4caa-8d17-a38de8ad5ed0.png\"/>: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/8920c6d3-104e-419c-a68c-133d46971f97.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/088b6e82-12fb-4c67-8e29-5db2d9dfe9df.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/57598883-0709-4b7a-bc33-cf3f22e95730.png\"/>.<br>T\u1ed5ng b\u1ed1n g\u00f3c = <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b2e2cb32-24d9-4eb5-85d6-602b6bf28170.png\"/>.<br>\u2705 <b>K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 2 l\u00e0 ph\u00e1t bi\u1ec3u <b>\u0111\u00fang</b>.<br>\n\n\n<b>Ph\u00e1t bi\u1ec3u 3:</b> <i><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/fa32fdac-a398-4820-acbf-38d95b8e1499.png\"/></i><br>\n\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b> S\u1eed d\u1ee5ng k\u1ebft qu\u1ea3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0284c51f-7fb8-45e0-bd9d-de97392a1dae.png\"/> l\u00e0 tam gi\u00e1c \u0111\u1ec1u (t\u1eeb Ph\u00e1t bi\u1ec3u 4), suy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/71d7f75e-a866-462a-96eb-f241cb49155f.png\"/>. Ti\u1ebfp theo, ch\u1ee9ng minh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d02684ea-1dcd-4ed0-8919-3996473f0b69.png\"/> l\u00e0 tam gi\u00e1c \u0111\u1ec1u. V\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d856f1e7-b225-462a-a8aa-10bed4944e7b.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/8af698b1-bbab-4c06-96d3-d3e3fafd7c79.png\"/> l\u00e0 \u0111\u01b0\u1eddng cao c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/beceacba-360a-4319-8177-1b222f903a51.png\"/>. T\u00ednh \u0111\u1ed9 d\u00e0i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/20884524-be02-4d24-a5b0-fc88c8dd2177.png\"/> theo <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0d4067c7-988c-4aee-9373-2ee66a1ba6e6.png\"/> v\u00e0 so s\u00e1nh.<br>\n\u270d\ufe0f <b>L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nT\u1eeb Ph\u00e1t bi\u1ec3u 4, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/20d08142-9a1b-4b4a-adcf-cc4c2e44bd1d.png\"/> l\u00e0 tam gi\u00e1c \u0111\u1ec1u.<br>\nSuy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/2a27b368-37ff-46f3-a706-dabc507094e7.png\"/>.<br>\nX\u00e9t <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/669796df-b0b3-4e1b-8b1c-07aaf03682a2.png\"/>: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/bdaddfbf-c384-4b98-bb60-08dd0c24c073.png\"/> v\u00ec ABCD l\u00e0 h\u00ecnh thoi, v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/dc9b4fca-3e21-440a-92fc-c533604f226b.png\"/> (gi\u1ea3 thi\u1ebft).<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/601df964-b04c-4e38-b065-05a8c1ab7349.png\"/> l\u00e0 tam gi\u00e1c c\u00e2n t\u1ea1i D c\u00f3 g\u00f3c 60\u00b0 n\u00ean l\u00e0 tam gi\u00e1c \u0111\u1ec1u.<br>\nV\u1eady <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/64a6c434-6c54-450c-9e48-2947a148b8c7.png\"/>.<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/909cc076-e8c4-4e36-afbc-ba563f0ef6d8.png\"/>, do \u0111\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/8298bd25-81d7-438c-b3db-0334b052a2b2.png\"/> l\u00e0 \u0111\u01b0\u1eddng cao c\u1ee7a tam gi\u00e1c \u0111\u1ec1u <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7497bab0-97a7-4386-ac85-4520e81a1d62.png\"/>.<br>\n\u0110\u01b0\u1eddng cao c\u1ee7a tam gi\u00e1c \u0111\u1ec1u c\u1ea1nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a1b252fa-0521-436e-95d3-db3ca4be56b0.png\"/> l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/29a3b7b8-f67d-4ada-bf43-e45f63409128.png\"/>.<br>\nDo \u0111\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/284382bd-fa19-4f5f-ada4-e5e0ec242cba.png\"/>.<br>\nSuy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6fce6bcb-9         function startTimer() {

        }

                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`; // Unique Key for storage
                    const qType = q.normalizedType;
                    
                    // -- Palette Item --
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop
                    palMob.appendChild(palBtn); // Add to Mobile

                    // -- Question Card --
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    // Header: Question Number
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    // Interaction Area
                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // === TYPE 0: MCQ ===
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            // Logic hiển thị kết quả
                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { // Chọn đúng
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { // Đúng nhưng không chọn (hiện đáp án khi nộp)
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { // Chọn sai
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; // Hiện đáp án đúng sau khi nộp dù chưa làm
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // === TYPE 1 & 3: FILL KEY ===
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let inputClass = "w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all font-mono";
                        let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
