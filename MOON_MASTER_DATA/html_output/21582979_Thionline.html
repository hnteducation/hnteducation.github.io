ore": 0, "order": 44, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19873103, "lessonId": 0, "a": "In no way are people prohibited from bringing their phone into the concert arena.", "b": "On no account are people permitted to bring their phones into the concert arena.", "c": "At no time were people permitted to bring their phones into the concert arena.", "d": "Under no circumstances are people prohibited from bringing their phone into the concert \tarena.", "bookId": 746022, "comments": 0, "bookmarks": 7, "likes": 0, "shares": 0, "typeId": 0, "questionText": "People are forbidden to bring their phones into the concert arena. There is no exception whatsoever.", "answer": "<b>T\u1ea1m d\u1ecbch:</b>&nbsp;M\u1ecdi ng\u01b0\u1eddi b\u1ecb c\u1ea5m mang \u0111i\u1ec7n tho\u1ea1i v\u00e0o khu v\u1ef1c bu\u1ed5i h\u00f2a nh\u1ea1c. Kh\u00f4ng c\u00f3 b\u1ea5t k\u1ef3 ngo\u1ea1i l\u1ec7 n\u00e0o<br>A.&nbsp;M\u1ecdi ng\u01b0\u1eddi kh\u00f4ng b\u1ecb c\u1ea5m mang \u0111i\u1ec7n tho\u1ea1i v\u00e0o khu v\u1ef1c bu\u1ed5i h\u00f2a nh\u1ea1c theo b\u1ea5t k\u1ef3 c\u00e1ch n\u00e0o =&gt; <b>Sai </b>v\u00ec tr\u00e1i ng\u01b0\u1ee3c ngh\u0129a v\u1edbi c\u00e2u g\u1ed1c<br><br>B.&nbsp;M\u1ecdi ng\u01b0\u1eddi kh\u00f4ng \u0111\u01b0\u1ee3c ph\u00e9p mang \u0111i\u1ec7n tho\u1ea1i v\u00e0o khu v\u1ef1c bu\u1ed5i h\u00f2a nh\u1ea1c v\u1edbi b\u1ea5t k\u1ef3 l\u00fd do n\u00e0o =&gt; <b>\u0110\u00fang</b><br><br>C.&nbsp;Kh\u00f4ng l\u00fac n\u00e0o m\u1ecdi ng\u01b0\u1eddi \u0111\u01b0\u1ee3c ph\u00e9p mang \u0111i\u1ec7n tho\u1ea1i v\u00e0o khu v\u1ef1c bu\u1ed5i h\u00f2a nh\u1ea1c =&gt; <b>Sai </b>v\u00ec c\u00e2u g\u1ed1c s\u1eed d\u1ee5ng th\u00ec hi\u1ec7n t\u1ea1i \u0111\u01a1n, c\u00e2u n\u00e0y l\u1ea1i d\u00f9ng qu\u00e1 kh\u1ee9 \u0111\u01a1n n\u00ean kh\u00f4ng \u0111\u1ea3m b\u1ea3o ho\u00e0n to\u00e0n t\u01b0\u01a1ng \u0111\u01b0\u01a1ng<br><br>D.&nbsp;M\u1ecdi ng\u01b0\u1eddi kh\u00f4ng b\u1ecb c\u1ea5m mang \u0111i\u1ec7n tho\u1ea1i v\u00e0o khu v\u1ef1c bu\u1ed5i h\u00f2a nh\u1ea1c trong b\u1ea5t k\u1ef3 ho\u00e0n c\u1ea3nh n\u00e0o. =&gt; <b>Sai </b>v\u00ec tr\u00e1i ng\u01b0\u1ee3c ngh\u0129a v\u1edbi c\u00e2u g\u1ed1c<br>=&gt; \u0110\u00e1p \u00e1n B<br><i><strong data-start=\"903\" data-end=\"942\">- On no account + tr\u1ee3 \u0111\u1ed9ng t\u1eeb + S + V</strong>: <span data-start=\"944\" data-end=\"976\">Kh\u00f4ng v\u00ec b\u1ea5t k\u1ef3 l\u00fd do g\u00ec m\u00e0...<br>-&nbsp;</span><strong data-start=\"2195\" data-end=\"2231\">At no time + tr\u1ee3 \u0111\u1ed9ng t\u1eeb + S + V:&nbsp;</strong><span data-start=\"2234\" data-end=\"2255\">Kh\u00f4ng l\u00fac n\u00e0o m\u00e0...<br>-&nbsp;</span><strong data-start=\"2393\" data-end=\"2441\">Under no circumstances + tr\u1ee3 \u0111\u1ed9ng t\u1eeb + S + V:</strong>&nbsp;<span data-start=\"2444\" data-end=\"2485\">D\u01b0\u1edbi b\u1ea5t k\u1ef3 ho\u00e0n c\u1ea3nh n\u00e0o c\u0169ng kh\u00f4ng...</span></i>", "key": "B", "isVideo": false, "score": 0, "order": 45, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 46-52: Read the passage carefully.", "content": "1. With Gen Z\u2019s increased prevalence of mental health struggles, stress, and trauma, there has also been an influx in the conversations surrounding mental health. Gen Z, more than any other generation, is willing to discuss mental health openly, whether to trusted loved ones and friends or on social media for the whole world to see.<br>2. An estimated 87% of Gen Z young adults feel comfortable talking about mental health in general with other people, and 63% feel comfortable opening up about their own mental health struggles. Furthermore, one in three Gen Z young adults has posted about their mental health on their social media profiles. Just open up TikTok and search for a mental health keyword of choice, and you\u2019ll be flooded with tons of videos from Gen Zers ranging from \u201cstory times\u201d to making relatable jokes using trending audios.<br>3. By being so vulnerable and open about <b>their </b>trauma or other conditions, Gen Z individuals are building an online community that might be more inclusive and supportive than ever for mental health. Beyond this, many are using their platforms to support systemic changes and greater accessibility to resources and, <b>ultimately</b>, mental healthcare. This starkly contrasts older generations who grew up with far more of a stigma surrounding mental health conditions and therapy, being told that mental health struggles were to be kept secret.<br>4. Whether Gen Z is honestly opening up about their battles offline or online, doing so is prompting meaningful discussions, making people feel less alone, and hopefully, inspiring people to reach out for help.<br><div style=\"text-align: right;\"><i>(Source: https://www.charliehealth.com/)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21583095, "lessonId": 0, "a": "Gen Z faces more mental health issues than any other generation.", "b": "Gen Z is more open in discussing mental health compared to older generations.", "c": "Social media has caused more mental health problems among Gen Z.", "d": "Older generations are now following Gen Z\u2019s example in mental health discussions.", "bookId": 1086132, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What is the main idea of the passage?", "answer": "<b>\u00dd ch\u00ednh c\u1ee7a \u0111o\u1ea1n v\u0103n l\u00e0 g\u00ec?\n</b><br><b>A.</b> Th\u1ebf h\u1ec7 Z g\u1eb7p nhi\u1ec1u v\u1ea5n \u0111\u1ec1 s\u1ee9c kh\u1ecfe tinh th\u1ea7n h\u01a1n b\u1ea5t k\u1ef3 th\u1ebf h\u1ec7 n\u00e0o kh\u00e1c.\n<br>=&gt; Sai v\u00ec b\u00e0i kh\u00f4ng t\u1eadp trung v\u0  "d": "Older generations posted about mental health on social media.", "bookId": 1086137, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 3, how do older generations differ from Gen Z regarding mental health?", "answer": "<b>Trong \u0111o\u1ea1n 3, c\u00e1c th\u1ebf h\u1ec7 l\u1edbn tu\u1ed5i kh\u00e1c th\u1ebf n\u00e0o so v\u1edbi th\u1ebf h\u1ec7 Z trong vi\u1ec7c nh\u00ecn nh\u1eadn s\u1ee9c kh\u1ecfe tinh th\u1ea7n?\n</b><br><b>A. </b>C\u00e1c th\u1ebf h\u1ec7 l\u1edbn tu\u1ed5i ch\u1ec9 chia s\u1ebb kh\u00f3 kh\u0103n v\u1ec1 s\u1ee9c kh\u1ecfe tinh th\u1ea7n v\u1edbi c\u00e1c th\u00e0nh vi\u00ean trong gia \u0111\u00ecnh.\n<br><b>=&gt; Sai</b>, b\u00e0i n\u00f3i h\u1ecd <b>gi\u1ea5u k\u00edn</b>, kh\u00f4ng chia s\u1ebb.\n\n\n<br><br><b>B.</b> C\u00e1c th\u1ebf h\u1ec7 l\u1edbn tu\u1ed5i \u1ee7ng h\u1ed9 nh\u1eefng thay \u0111\u1ed5i trong ch\u0103m s\u00f3c s\u1ee9c kh\u1ecfe tinh th\u1ea7n.\n<br><b>=&gt; Sai\n\n\n<br></b><br><b>C.</b> C\u00e1c th\u1ebf h\u1ec7 l\u1edbn tu\u1ed5i gi\u1eef k\u00edn c\u00e1c v\u1ea5n \u0111\u1ec1 s\u1ee9c kh\u1ecfe tinh th\u1ea7n c\u1ee7a m\u00ecnh.\n<br><b>=&gt; \u0110\u00fang\n\n\n</b><br><br><b>D. </b>C\u00e1c th\u1ebf h\u1ec7 l\u1edbn tu\u1ed5i \u0111\u0103ng b\u00e0i v\u1ec1 s\u1ee9c kh\u1ecfe tinh th\u1ea7n tr\u00ean m\u1ea1ng x\u00e3 h\u1ed9i.\n<br><b>=&gt; Sai</b>, m\u1ea1ng x\u00e3 h\u1ed9i ch\u01b0a ph\u1ed5 bi\u1ebfn khi \u0111\u00f3. Ng\u01b0\u1ee3c l\u1ea1i Gen Z l\u00e0 ng\u01b0\u1eddi hay \u0111\u0103ng b\u00e0i v\u1ec1 s\u1ee9c kh\u1ecfe tinh th\u1ea7n tr\u00ean m\u1ea1ng x\u00e3 h\u1ed9i.\n\n\n<br><b><br>C\u0103n c\u1ee9 th\u00f4ng tin:</b><br> \u201cThis starkly contrasts older generations who grew up with far more of a stigma surrounding mental health conditions and therapy, being told that mental health struggles were to be kept secret.\u201d \n<br><i>(\u0110i\u1ec1u n\u00e0y tr\u00e1i ng\u01b0\u1ee3c ho\u00e0n to\u00e0n v\u1edbi c\u00e1c th\u1ebf h\u1ec7 tr\u01b0\u1edbc, nh\u1eefng ng\u01b0\u1eddi t\u1eebng s\u1ed1ng trong th\u1eddi k\u1ef3 coi s\u1ee9c kh\u1ecfe tinh th\u1ea7n l\u00e0 \u0111i\u1ec1u x\u1ea5u h\u1ed5 v\u00e0 c\u1ea7n gi\u1ea5u k\u00edn.)</i>", "key": "C", "isVideo": false, "score": 0, "order": 51, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583153, "lessonId": 0, "a": "Gen Z\u2019s openness helps others feel less alone", "b": "Honest sharing can inspire people to seek help", "c": "Offline conversations are less important than online ones", "d": "Mental health discussions can be meaningful", "bookId": 1086138, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Which of the following is NOT mentioned in paragraph 4?", "answer": "<b> \u0110i\u1ec1u n\u00e0o sau \u0111\u00e2y kh\u00f4ng \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp trong \u0111o\u1ea1n 4?\n</b><br><b>A.</b> S\u1ef1 c\u1edfi m\u1edf c\u1ee7a th\u1ebf h\u1ec7 Z gi\u00fap ng\u01b0\u1eddi kh\u00e1c c\u1ea3m th\u1ea5y b\u1edbt c\u00f4 \u0111\u01a1n h\u01a1n.\n<br>=&gt; C\u00f3 \u0111\u1ec1 c\u1eadp \u201cmaking people feel less alone\u201d\n\n\n<br><br><b>B. </b>Vi\u1ec7c chia s\u1ebb trung th\u1ef1c c\u00f3 th\u1ec3 truy\u1ec1n c\u1ea3m h\u1ee9ng cho ng\u01b0\u1eddi kh\u00e1c t\u00ecm ki\u1ebfm s\u1ef1 gi\u00fap \u0111\u1ee1.\n<br>=&gt; C\u00f3 \u0111\u1ec1 c\u1eadp \u201c <b>inspiring people to reach out for help</b>\u201d\n\n\n<br><br><b>C. </b>C\u00e1c cu\u1ed9c tr\u00f2 chuy\u1ec7n ngo\u00e0i \u0111\u1eddi th\u1ef1c \u00edt quan tr\u1ecdng h\u01a1n nh\u1eefng cu\u1ed9c tr\u00f2 chuy\u1ec7n tr\u1ef1c tuy\u1ebfn.\n<br>=&gt; Kh\u00f4ng \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp\n\n\n<br><br><b>D.</b> C\u00e1c cu\u1ed9c th\u1ea3o lu\u1eadn v\u1ec1 s\u1ee9c kh\u1ecfe tinh th\u1ea7n c\u00f3 th\u1ec3 mang \u00fd ngh\u0129a s\u00e2u s\u1eafc.\n<br>=&gt; C\u00f3 \u0111\u1ec1 c\u1eadp \u201c<b>doing so is prompting meaningful discussions</b>\u201d\n\n\n<br><br><b>C\u0103n c\u1ee9 th\u00f4ng tin: </b><br>Whether Gen Z is honestly opening up about their battles offline or online, <b>doing so is prompting meaningful discussions</b>, <b>making people feel less alone</b>, and hopefully, <b>inspiring people to reach out for help</b>.\n<br><i>(D\u00f9 Gen Z \u0111ang chia s\u1ebb th\u1eadt l\u00f2ng tr\u1ef1c tuy\u1ebfn hay ngo\u00e0i \u0111\u1eddi, h\u00e0nh \u0111\u1ed9ng \u0111\u00f3 \u0111ang <u>th\u00fac \u0111\u1ea9y c\u00e1c cu\u1ed9c tr\u00f2 chuy\u1ec7n \u00fd ngh\u0129a</u>, <u>gi\u00fap m\u1ecdi ng\u01b0\u1eddi c\u1ea3m th\u1ea5y b\u1edbt c\u00f4 \u0111\u01a1n</u>, v\u00e0 <u>truy\u1ec1n c\u1ea3m h\u1ee9ng cho h\u1ecd t\u00ecm ki\u1ebfm s\u1ef1 gi\u00fap \u0111\u1ee1 khi c\u1ea7n thi\u1ebft.</u>)\n</i>", "key": "C", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully.", "content": "1. While not a new problem, the emergence of our hyper-networked media ecosystem has accelerated the spread of mis- and disinformation. Prior to the Internet, mobile technologies, and social media platforms, people often relied on widely trusted sources such as local and regional media, national publications, and nightly broadcast news programs to receive information. Today we are hyperconnected. From Snapchat articles that resemble salacious clickbait content to microblogging posts on X, TikTok videos, and Instagram infographics, anyone with a digital device holds the power to disseminate news and information. When consuming information <b>this way</b>, it can be hard to track claims to their original source or <b>verify </b>whether the information is based on fact.<br>2. At the same time, information shared online is often free to consume, unlike fact-based articles and stories that trusted news sources publish. Today people are more reluctant to pay for news, as they can source what they perceive as quality information online. This dynamic has significantly impacted local news outlets\u2014the most trusted source of news across all political affiliations. Partly as a consequence, local news outlets are shutting down, or being bought out by corporate companies.<br>3. Bad actors have leveraged this new information ecosystem by deliberately spreading disinformation to influence public opinion regarding vaccines, the COVID-19 pandemic, international affairs, political candidates, U.S. democracy, and other critical topics. These attempts at sowing distrust in our institutions have fueled vaccine hesitancy and skepticism, leading to major public health challenges. Disinformation has contributed to a rise of hate speech and political violence and initiated a revolving cycle of voter challenges and the introduction of voter suppression laws that have made it harder for voters\u2014particularly older voters, voters of color, and voters with disabilities\u2014to participate in democracy.<br>4. Some experts have warned that the rampant spread of mis- and disinformation has contributed to what they call a \u201cpost-truth\u201d society, defined by Oxford Dictionaries as \u201crelating to or denoting circumstances in which objective facts are less influential in shaping public opinion than appeals to emotion and personal belief.\u201d<br><div style=\"text-align: right;\"><i>(Source: https://www.britannica.com)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21583193, "lessonId": 0, "a": "The Decline of Local News and Public Trust", "b": "The Rise of Disinformation in the Digital Age", "c": "How Social Media Shapes Public Health Responses", "d": "The Evolution of Information Sharing in Traditional Media", "bookId": 1086139, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title of the passage can be ____________.", "answer": "<b>Ti\u00eau \u0111\u1ec1 hay nh\u1ea5t cho \u0111o\u1ea1n v\u0103n c\u00f3 th\u1ec3 l\u00e0 ____________.\n</b><br><b>A.</b> S\u1ef1 suy gi\u1ea3m c\u1ee7a tin t\u1ee9c \u0111\u1ecba ph\u01b0\u01a1ng v\u00e0 ni\u1ec1m tin c\u00f4ng ch\u00fang\n<br><b>=&gt;  Sai</b>, \u0111\u00e2y ch\u1ec9 l\u00e0 m\u1ed9t ph\u1ea7n nh\u1ecf trong \u0111o\u1ea1n 2, kh\u00f4ng bao qu\u00e1t to\u00e0n b\u00e0i.\n\n\n<br><br><b>B.</b> S\u1ef1 tr\u1ed7i d\u1eady c\u1ee7a th\u00f4ng tin sai l\u1ec7ch trong k\u1ef7 nguy\u00ean k\u1ef9 thu\u1eadt s\u1ed1\n<br><b>=&gt; \u0110\u00fang</b>, to\u00e0n b\u00e0i n\u00f3i v\u1ec1 s\u1ef1 lan r\u1ed9ng c\u1ee7a th\u00f4ng tin sai l\u1ec7ch trong th\u1eddi \u0111\u1ea1i k\u1ef9 thu\u1eadt s\u1ed1.\n\n\n<br><br><b>C.</b> C\u00e1ch m\u1ea1ng x\u00e3 h\u1ed9i \u0111\u1ecbnh h\u00ecnh ph\u1ea3n \u1ee9ng y t\u1ebf c\u00f4ng c\u1ed9ng\n<br><b>=&gt; Sai</b>. M\u1eb7c d\u00f9 \u0111o\u1ea1n 3 c\u00f3 nh\u1eafc \u0111\u1ebfn do d\u1ef1 ti\u00eam v\u1eafc-xin v\u00e0 COVID-19, nh\u01b0ng \u0111\u00e2y ch\u1ec9 l\u00e0 m\u1ed9t v\u00ed d\u1ee5 v\u1ec1 h\u1eadu qu\u1ea3 c\u1ee7a th\u00f4ng tin sai l\u1ec7ch, kh\u00f4ng ph\u1ea3i n\u1ed9i dung ch\u00ednh.\n\n\n<br><br><b>D.</b> S\u1ef1 ph\u00e1t tri\u1ec3n c\u1ee7a vi\u1ec7c chia s\u1ebb th\u00f4ng tin trong truy\u1ec1n th\u00f4ng truy\u1ec1n th\u1ed1ng\n<br><b>=&gt; Sai</b>. B\u00e0i kh\u00f4ng t\u1eadp trung v\u00e0o truy\u1ec1n th\u00f4ng truy\u1ec1n th\u1ed1ng m\u00e0 v\u00e0o s\u1ef1 chuy\u1ec3n \u0111\u1ed5i t\u1eeb truy\u1ec1n th\u1ed1ng sang k\u1ef9 thu\u1eadt s\u1ed1, c\u00f9ng v\u1edbi nh\u1eefng t\u00e1c \u0111\u1ed9ng ti\u00eau c\u1ef1c c\u1ee7a th\u00f4ng tin sai l\u1ec7ch.\n\n\n<br><br><b>C\u0103n c\u1ee9 th\u00f4ng tin:</b><br><b>\u0110o\u1ea1n 1:</b> N\u00f3i v\u1ec1 vi\u1ec7c ai c\u0169ng c\u00f3 th\u1ec3 lan truy\u1ec1n tin t\u1ee9c \u2192 kh\u00f3 x\u00e1c minh ngu\u1ed3n tin.\n<br><b>\u0110o\u1ea1n 2:</b> M\u1ecdi ng\u01b0\u1eddi ng\u1ea1i tr\u1ea3 ti\u1ec1n cho tin th\u1eadt \u2192 b\u00e1o \u0111\u1ecba ph\u01b0\u01a1ng suy gi\u1ea3m.\n<br><b>\u0110o\u1ea1n 3:</b> Th\u00f4ng tin sai l\u1ec7ch g\u00e2y h\u1eadu qu\u1ea3 v\u1ec1 v\u1eafc-xin, ch\u00ednh tr\u1ecb, d\u00e2n ch\u1ee7.\n<br><b>\u0110o\u1ea1n 4:</b> K\u1ebft lu\u1eadn v\u1ec1 \u201cx\u00e3 h\u1ed9i h\u1eadu s\u1ef1 th\u1eadt\u201d \u2013 khi c\u1ea3m x\u00fac l\u1ea5n \u00e1t s\u1ef1 th\u1eadt.\n<br><br><b>=&gt; To\u00e0n b\u00e0i n\u00f3i v\u1ec1 s\u1ef1 lan r\u1ed9ng v\u00e0 \u1ea3nh h\u01b0\u1edfng c\u1ee7a th\u00f4ng tin sai l\u1ec7ch trong th\u1eddi \u0111\u1ea1i k\u1ef9 thu\u1eadt s\u1ed1, n\u00ean ch\u1ecdn B.</b>", "key": "B", "isVideo": false, "score": 0, "order": 53, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583208, "lessonId": 0, "a": "People can quickly trace the source of information", "b": "Only professionals can post news online", "c": "Anyone with a digital device can share news", "d": "News is strictly regulated by local officials", "bookId": 1086140, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 1, what is one characteristic of today's media ecosystem?", "answer": "<b>Trong \u0111o\u1ea1n 1, m\u1ed9t \u0111\u1eb7c \u0111i\u1ec3m c\u1ee7a h\u1ec7 sinh th\u00e1i truy\u1ec1n th\u00f4ng ng\u00e0y nay l\u00e0 g\u00ec?\n</b><br><b>A.</b> M\u1ecdi ng\u01b0\u1eddi c\u00f3 th\u1ec3 nhanh ch\u00f3ng truy ra ngu\u1ed3n g\u1ed1c c\u1ee7a th\u00f4ng tin.\n<br><b>\u2192 Sai</b>, b\u00e0i n\u00f3i ng\u01b0\u1ee3c l\u1ea1i:\n<br><u>C\u0103n c\u1ee9</u>: \u201cit can be hard to track claims to their original source.\u201d (th\u1eadt kh\u00f3 \u0111\u1ec3 l\u1ea7n ra ngu\u1ed3n g\u1ed1c ban \u0111\u1ea7u c\u1ee7a c\u00e1c tuy\u00ean b\u1ed1)\n\n\n<br><br><b>B.</b> Ch\u1ec9 c\u00f3 c\u00e1c ore": 0, "order": 60, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}];
        let userAnswers = {}; // Store: { qId: value }

        // --- INIT ---

                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;

                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

                    container.appendChild(gDiv);

                    const qKey = `q_${gIdx}_${qIdx}`; // Unique Key for storage
                    const qType = q.normalizedType;
                    
                    // -- Palette Item --

                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop
                    palMob.appendChild(palBtn); // Add to Mobile

                    // -- Question Card --
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    // Header: Question Number
                    let html = `<div class="flex items-start gap-3 mb-4">

                    if(qType === '0') {

                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";

                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
