0nh qu\u1ea7n r\u1ea5t \u0111\u1eb9p. H\u00ea-ra-cl\u00e9t c\u00f2n c\u00f3 m\u1ed9t th\u1ee9 v\u0169 kh\u00ed n\u1eefa l\u00e0 c\u00e2y chu\u1ef3. \u0110\u00e2y l\u00e0 c\u00e2y chu\u1ef3 g\u1ed7 t\u1ef1 tay ch\u00e0ng l\u00e0m l\u1ea5y tr\u01b0\u1edbc khi \u0111i di\u1ec7t tr\u1eeb \u00e1c th\u00fa \u1edf Xi-t\u00ea-r\u00f4ng.\u201d</i><br><div style=\"text-align: right;\">(Th\u1ea7n tho\u1ea1i Hy L\u1ea1p, <i>H\u00ea-ra-cl\u00e9t \u0111i gi\u1ebft con s\u01b0 t\u1eed \u1edf N\u00ea-m\u00ea</i>, theo<i> V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>Chi ti\u1ebft n\u00e0o trong \u0111o\u1ea1n tr\u00edch kh\u1eafc h\u1ecda s\u1ef1 nham hi\u1ec3m, qu\u1ef7 quy\u1ec7t c\u1ee7a con \u00e1c th\u00fa \u1edf N\u00ea-m\u00ea?", "answer": "Chi ti\u1ebft \u201cCon \u00e1c th\u00fa s\u1ed1ng trong m\u1ed9t c\u00e1i hang c\u00f3 hai l\u1ed1i ra v\u00e0o\u201d cho th\u1ea5y con \u00e1c th\u00fa c\u00f3 ch\u1ed7 \u1ea9n n\u1ea5p thu\u1eadn l\u1ee3i \u0111\u1ec3 t\u1ea5n c\u00f4ng r\u1ed3i r\u00fat lui, d\u1ec5 \u0111\u00e1nh l\u1ea1c h\u01b0\u1edbng \u0111\u1ed1i ph\u01b0\u01a1ng, tr\u00e1nh b\u1ecb d\u1ed3n v\u00e0o \u0111\u01b0\u1eddng c\u00f9ng. \u0110\u00e2y l\u00e0 \u0111\u1eb7c \u0111i\u1ec3m th\u1ec3 hi\u1ec7n s\u1ef1 m\u01b0u m\u00f4, gian x\u1ea3o c\u1ee7a con \u00e1c th\u00fa \u1edf N\u00ea-m\u00ea.<br>\n\u2192 B l\u00e0 \u0111\u00e1p \u00e1n \u0111\u00fang.\n", "key": "B", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604601, "lessonId": 0, "a": "L\u0169 l\u1ee5t.", "b": "N\u00fai l\u1edf.", "c": "H\u1ea1n h\u00e1n.", "d": "M\u01b0a d\u1ea7m.", "bookId": 1088823, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cN\u1eafng c\u1ea3 \u0111\u1ea5t h\u1ebft c\u1ecf 04625, "lessonId": 0, "a": "\u0110\u1ec1.", "b": "Th\u1ef1c.", "c": "Lu\u1eadn.", "d": "K\u1ebft.", "bookId": 1088825, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cC\u00f4ng danh \u0111\u00e3 \u0111\u01b0\u1ee3c h\u1ee3p v\u1ec1 nh\u00e0n<br>L\u00e0nh d\u1eef \u00e2u chi th\u1ebf ngh\u1ecb khen<br>Ao c\u1ea1n v\u1edbt b\u00e8o c\u1ea5y mu\u1ed1ng<br>\u0110\u00eca thanh ph\u00e1t c\u1ecf \u01b0\u01a1ng sen<br>Kho thu phong nguy\u1ec7t \u0111\u1ea7y qua n\u00f3c<br>Thuy\u1ec1n ch\u1edf y\u00ean h\u00e0 n\u1eb7ng v\u1ea1y then<br>Bui c\u00f3 m\u1ed9t l\u00f2ng trung l\u1eabn hi\u1ebfu<br>M\u00e0i ch\u0103ng khuy\u1ebft, nhu\u1ed9m ch\u0103ng \u0111en.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Tr\u00e3i, <i>Thu\u1eadt h\u1ee9ng</i>, b\u00e0i 24, theo <i>Nguy\u1ec5n Tr\u00e3i th\u01a1 v\u00e0 \u0111\u1eddi</i>, NXB V\u0103n h\u1ecdc, 2016)</div>C\u1eb7p c\u00e2u th\u01a1 n\u00e0o b\u1ed9c l\u1ed9 t\u1ea5m l\u00f2ng trung h\u1eadu c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh?", "answer": "C\u1eb7p c\u00e2u k\u1ebft <i>Bui c\u00f3 m\u1ed9t l\u00f2ng trung l\u1eabn hi\u1ebfu/ M\u00e0i ch\u0103ng khuy\u1ebft, nhu\u1ed9m ch\u0103ng \u0111en</i> kh\u1eb3ng \u0111\u1ecbnh t\u1ea5m l\u00f2ng trung th\u00e0nh v\u1edbi vua v\u00e0 l\u00f2ng hi\u1ebfu th\u1ea3o c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh, d\u00f9 tr\u1ea3i qua bao th\u1eed th\u00e1ch c\u0169ng kh\u00f4ng thay \u0111\u1ed5i.", "key": "D", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604635, "lessonId": 0, "a": "S\u00f3ng gi\u00f3 \u1edf c\u1eeda bi\u1ec3n Th\u1ea7n \u0110\u1ea7u n\u1ed5i l\u00ean d\u1eef d\u1ed9i.", "b": "\u0110\u1ea1o s\u0129 s\u1ed1ng m\u1ed9t m\u00ecnh trong am.", "c": "Vua nh\u00e0 L\u00fd mang qu\u00e2n \u0111i \u0111\u00e1nh Chi\u00eam Th\u00e0nh.", "d": "Ra t\u1edbi ngo\u00e0i bi\u1ec3n, s\u00f3ng cao nh\u01b0 n\u00fai, nh\u01b0ng \u0111o\u00e0n thuy\u1ec1n \u0111i \u0111\u1ebfn \u0111\u00e2u th\u00ec s\u00f3ng gi\u00f3 y\u00ean l\u1eb7ng \u0111\u1ebfn \u0111\u00f3.", "bookId": 1088827, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u0110\u1eddi T\u1ed1ng Nh\u00e2n T\u00f4ng , vua nh\u00e0 L\u00fd n\u01b0\u1edbc An Nam t\u1ef1 mang qu\u00e2n thuy\u1ec1n \u0111i \u0111\u00e1nh Chi\u00eam Th\u00e0nh . Khi t\u1edbi c\u1eeda bi\u1ec3n Th\u1ea7n \u0110\u1ea7u , s\u00f3ng gi\u00f3 n\u1ed5i l\u00ean h\u1ebft ng\u00e0y nay sang ng\u00e0y kh\u00e1c, kh\u00f4ng th\u1ec3 v\u01b0\u1ee3t bi\u1ec3n \u0111\u01b0\u1ee3c. Vua nghe n\u00f3i \u1edf n\u00fai g\u1ea7n \u0111\u1ea5y c\u00f3 ng\u01b0\u1eddi \u0111\u1ea1o s\u0129, m\u1ed9t m\u00ecnh s\u1ed1ng trong am, b\u00e8n cho v\u1eddi \u0111\u1ebfn \u0111\u1ec3 kh\u1ea5n c\u1ea7u. \u0110\u1ea1o s\u0129 n\u00f3i:<br>- Vua t\u1ef1 c\u00f3 ph\u00fac l\u1ef1c, th\u1ea7n cam \u0111oan mu\u00f4n m\u1ed9t kh\u00f4ng c\u00f3 g\u00ec \u0111\u00e1ng lo. Ng\u00e0y mai c\u1ee9 vi\u1ec7c l\u00ean \u0111\u01b0\u1eddng ch\u1edb sinh l\u00f2ng nghi ng\u1ea1i!<br>N\u1eeda \u0111\u00eam tr\u1eddi d\u1eebng gi\u00f3. S\u00e1ng s\u1edbm khi ra t\u1edbi ngo\u00e0i bi\u1ec3n, nh\u00ecn xa th\u1ea5y s\u00f3ng cao nh\u01b0 n\u00fai, nh\u01b0ng \u0111o\u00e0n thuy\u1ec1n \u0111i \u0111\u1ebfn \u0111\u00e2u th\u00ec s\u00f3ng gi\u00f3 y\u00ean l\u1eb7ng \u0111\u1ebfn \u0111\u00f3.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Nguy\u00ean Tr\u1eebng, <i>\u00c1p L\u00e3ng  ch\u00e2n nh\u00e2n</i>, theo <i>Nam \u00d4ng m\u1ed9ng l\u1ee5c</i>, NXB V\u0103n h\u1ecdc, 2008)</div>Y\u1ebfu t\u1ed1 k\u00ec \u1ea3o trong \u0111o\u1ea1n tr\u00edch \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n qua chi ti\u1ebft n\u00e0o?", "answer": "Chi ti\u1ebft \u201cKhi ra t\u1edbi ngo\u00e0i bi\u1ec3n, nh\u00ecn xa th\u1ea5y s\u00f3ng cao nh\u01b0 n\u00fai, nh\u01b0ng \u0111o\u00e0n thuy\u1ec1n \u0111i \u0111\u1ebfn \u0111\u00e2u th\u00ec s\u00f3ng gi\u00f3 y\u00ean l\u1eb7ng \u0111\u1ebfn \u0111\u00f3\u201d l\u00e0 y\u1ebfu t\u1ed1 k\u00ec \u1ea3o. Vi\u1ec7c s\u00f3ng gi\u00f3 \u0111ang d\u1eef d\u1ed9i b\u1ed7ng nhi\u00ean y\u00ean l\u1eb7ng khi \u0111o\u00e0n thuy\u1ec1n \u0111i qua l\u00e0 \u0111i\u1ec1u phi th\u1ef1c t\u1ebf, kh\u00f4ng th\u1ec3 gi\u1ea3i th\u00edch b\u1eb1ng quy lu\u1eadt t\u1ef1 nhi\u00ean. N\u00f3 cho th\u1ea5y s\u1ef1 can thi\u1ec7p c\u1ee7a m\u1ed9t th\u1ebf l\u1ef1c si\u00eau nhi\u00ean \u0111\u1ec3 b\u1ea3o v\u1ec7 nh\u00e0 vua.", "key": "D", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604663, "lessonId": 0, "a": "Con g\u00e1i nh\u00e0 d\u00f2ng.", "b": "\u0110ua t\u00e0i bu\u00f4n ch\u00edn b\u00e1n m\u01b0\u1eddi.", "c": "T\u00ednh h\u1ea1nh khoan ho\u00e0.", "d": "M\u1eb7t nh\u1eb5n nh\u1ee5i, ch\u00e2n tay tr\u1eafng tr\u1ebbo.", "bookId": 1088829, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cCon g\u00e1i nh\u00e0 d\u00f2ng , l\u1ea5y ch\u1ed3ng k\u1ebb ch\u1ee3 ,<br>Ti\u1ebfng c\u00f3 mi\u1ebfng kh\u00f4ng, g\u1eb7p ch\u0103ng hay ch\u1edb.<br>M\u1eb7t nh\u1eb5n nh\u1ee5i, ch\u00e2n tay tr\u1eafng tr\u1ebbo, ai d\u00e1m ch\u00ea r\u1eb1ng b\u00e9o r\u1eb1ng g\u1ea7y,<br>Ng\u01b0\u1eddi ung dung, t\u00ednh h\u1ea1nh khoan ho\u00e0, ch\u1ec9 m\u1ed9t n\u1ed7i hay g\u00e0n hay d\u1edf.<br>\u0110\u1ea7u s\u00f4ng b\u00e3i b\u1ebfn, \u0111ua t\u00e0i bu\u00f4n ch\u00edn b\u00e1n m\u01b0\u1eddi,<br>Trong h\u1ecd ngo\u00e0i l\u00e0ng, v\u1ee5ng l\u1ebd ch\u00e0o d\u01a1i n\u00f3i th\u1ee3 .\u201d</i><br><div style=\"text-align: right;\">(Tr\u1ea7n T\u1ebf X\u01b0\u01a1ng, <i>V\u0103n t\u1ebf s\u1ed1ng v\u1ee3</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Chi ti\u1ebft n\u00e0o mi\u00eau t\u1ea3 \u0111\u1ee9c h\u1ea1nh c\u1ee7a nh\u00e2n v\u1eadt ng\u01b0\u1eddi v\u1ee3 trong \u0111o\u1ea1n v\u0103n tr\u00ean?", "answer": "Chi ti\u1ebft \u201ct\u00ednh h\u1ea1nh khoan ho\u00e0\u201d mi\u00eau t\u1ea3 \u0111\u1ee9c h\u1ea1nh, t\u00ednh c\u00e1ch t\u1ed1t \u0111\u1eb9p, hi\u1ec1n l\u00e0nh, d\u1ec5 ch\u1ecbu c\u1ee7a ng\u01b0\u1eddi v\u1ee3.", "key": "C", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604670, "lessonId": 0, "a": "Con ch\u00f3.", "b": "Con m\u00e8o.", "c": "Thi\u00ean nhi\u00ean.", "d": "C\u00e1i c\u00e2y.", "bookId": 1088831, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cQuan s\u00e1t M\u1ef1c h\u1eb1ng ng\u00e0y, \u0110oan m\u1edbi v\u1ee1 l\u1ebd v\u00ec sao con ng\u01b0\u1eddi c\u1ea7n nu\u00f4i con g\u00ec \u0111\u00f3 trong nh\u00e0, v\u00ec sao d\u00e2n th\u00e0nh ph\u1ed1 qu\u00fd ch\u00f3 (ho\u1eb7c m\u00e8o) v\u00e0 hay nh\u00e2n c\u00e1ch h\u00f3a n\u00f3 h\u01a1n d\u00e2n n\u00f4ng th\u00f4n. Ngo\u00e0i vi\u1ec7c c\u00f3 \u00edch, n\u00f3 c\u00f2n k\u00e9o con ng\u01b0\u1eddi ra kh\u1ecfi n\u1ed7i b\u1eadn r\u1ed9n kh\u00f4 kh\u1ed1c c\u1ee7a c\u00f4ng vi\u1ec7c \u0111\u1ec3 \u0111\u01b0a v\u00e0o s\u1ef1 b\u1eadn r\u1ed9n kh\u00e1c, th\u00fa v\u1ecb nh\u01b0 l\u00e0 cu\u1ed9c gi\u1ea3i tr\u00ed b\u1ed5 d\u01b0\u1ee1ng t\u00e2m h\u1ed3n. Tr\u00ean nh\u1eefng l\u1ee3i \u00edch \u0111\u00f3, n\u00f3 l\u00e0 thi\u00ean nhi\u00ean gi\u1eefa m\u00f4i tr\u01b0\u1eddng \u00f4 tr\u1ecdc c\u1ee7a n\u00f3. M\u1ed9t d\u00e2y tr\u1ea7u b\u00e0 b\u00ean c\u1eeda s\u1ed5, m\u1ed9t nh\u00e1nh tr\u01b0\u1eddng sinh trong b\u00ecnh, m\u1ed9t v\u00e0i c\u00e1i b\u00f4ng b\u1ea5t t\u1eed tr\u00ean b\u00e0n, m\u1ed9t con m\u00e8o, m\u1ed9t con ch\u00f3... l\u00e0 s\u1ef1 c\u00f3 m\u1eb7t c\u1ee7a thi\u00ean nhi\u00ean hi\u1ec1n d\u1ecbu, \u0111\u01b0a con ng\u01b0\u1eddi tr\u1edf v\u1ec1 g\u1ea7n v\u1edbi c\u00e1i n\u00f4i c\u1ee7a m\u00ecnh. Theo \u0110oan, n\u00f3 c\u00f2n l\u00e0 m\u1ed9t th\u1ee9 gi\u00e1o c\u1ee5 sinh h\u1ecdc, kh\u00e1m ph\u00e1 n\u00f3 l\u00e0 \u0111\u1ec3 hi\u1ec3u th\u00eam: n\u00f3 l\u00e0 c\u00e1i c\u00e2y, l\u00e0 con v\u1eadt m\u00e0 c\u00f2n v\u1eady, hu\u1ed1ng chi! Kh\u00e1m ph\u00e1 ch\u00fang \u0111\u1ec3 hi\u1ec3u th\u00eam con ng\u01b0\u1eddi, t\u1ef1 h\u00e0o h\u01a1n v\u00e0... c\u00f3 khi c\u0169ng ph\u1ea3i x\u1ea5u h\u1ed5 v\u1edbi ch\u00fang.\u201d</i><b><br><div style=\"text-align: right;\">(D\u1ea1 Ng\u00e2n, <i>Con ch\u00f3 v\u00e0 v\u1ee5 li h\u00f4n</i>, theo <i>baovannghe.vn</i>)</div></b>\u0110o\u1ea1n tr\u00edch t\u00f4 \u0111\u1eadm nh\u1eadn th\u1ee9c c\u1ee7a nh\u00e2n v\u1eadt \u0110oan v\u1ec1 vai tr\u00f2 c\u1ee7a \u0111\u1ed1i t\u01b0\u1ee3ng n\u00e0o sau \u0111\u00e2y v\u1edbi t\u00e2m h\u1ed3n con ng\u01b0\u1eddi?", "answer": "\u0110o\u1ea1n tr\u00edch t\u1eadp trung v\u00e0o quan s\u00e1t v\u00e0 nh\u1eadn th\u1ee9c c\u1ee7a nh\u00e2n v\u1eadt \u0110oan v\u1ec1 con ch\u00f3 M\u1ef1c. Ch\u00ednh vi\u1ec7c quan s\u00e1t v\u00e0 g\u1eafn b\u00f3 v\u1edbi M\u1ef1c \u0111\u00e3 gi\u00fap \u0110oan v\u1ee1 l\u1ebd ra nhi\u1ec1u \u0111i\u1ec1u v\u1ec1 s\u1ef1 g\u1eafn k\u1ebft gi\u1eefa con ng\u01b0\u1eddi v\u1edbi v\u1eadt nu\u00f4i v\u00e0 th\u1ebf gi\u1edbi t\u1ef1 nhi\u00ean.", "key": "C", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604678, "lessonId": 0, "a": "L\u1ed7 th\u1ee7ng tr\u00ean m\u00e1i nh\u00e0.", "b": "Nh\u1eefng h\u1ea1t m\u01b0a.", "c": "Nh\u1eefng h\u1ea1t n\u1eafng.", "d": "S\u1ef1 ch\u1edd \u0111\u1ee3i (con tr\u1edf v\u1ec1) n\u1eb7ng n\u1ec1 c\u1ee7a ng\u01b0\u1eddi m\u1eb9.", "bookId": 1088832, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cKh\u00f4ng c\u00f3 tr\u00e1i bom n\u00e0o r\u01a1i tr\u00fang m\u00e1i nh\u00e0 m\u1eb9,<br>Kh\u00f4ng c\u00f3 vi\u00ean \u0111\u1ea1n n\u00e0o b\u1eafn th\u1ee7ng m\u00e1i nh\u00e0 m\u1eb9<br>Ch\u1ec9 c\u00f3 \u0111\u1ee9a con trai \u0111i xa<br>Ch\u1ec9 c\u00f3 s\u1ef1 ch\u1edd \u0111\u1ee3i n\u1eb7ng n\u1ec1 gi\u1ecdt xu\u1ed1ng<br>\u0110\u00e3 xuy\u00ean th\u1ee7ng m\u00e1i nh\u00e0 th\u00e0nh nh\u1eefng l\u1ed7 to l\u1ed7 nh\u1ecf<br>kh\u00e1c nhau<br>N\u1eafng m\u01b0a l\u1ecdt v\u00e0o sau<br>Xuy\u00ean <br>X\u1ed1i.<br>Nh\u1eefng s\u1ee3i n\u1eafng, nh\u1eefng s\u1ee3i m\u01b0a n\u1ebfu c\u00f3 th\u1ec3 n\u1ed1i <br>c\u0169ng ch\u1ec9 d\u00e0i b\u1eb1ng m\u1ed9t ph\u1ea7n s\u1ef1 mong \u0111\u1ee3i<br>V\u00e0 nh\u1eefng h\u1ea1t n\u1eafng, nh\u1eefng h\u1ea1t m\u01b0a <br>n\u1ebfu \u0111em x\u1ebfp l\u1ea1i, c\u00f3 th\u1ec3 cao h\u01a1n m\u1ecdi tr\u00e1i n\u00fai.\u201d</i><br><div style=\"text-align: right;\">(Ph\u00f9ng Kh\u1eafc B\u1eafc, <i>Ng\u00e0y ho\u00e0 b\u00ecnh \u0111\u1ea7u ti\u00ean</i>, theo <i>nguoihanoi.vn</i>)</div>Theo \u0111o\u1ea1n th\u01a1, \u0111i\u1ec1u g\u00ec c\u00f2n gh\u00ea g\u1edbm h\u01a1n c\u1ea3 bom \u0111\u1ea1n chi\u1ebfn tranh?", "answer": "Theo \u0111o\u1ea1n th\u01a1, \u0111i\u1ec1u gh\u00ea g\u1edbm h\u01a1n c\u1ea3 bom \u0111\u1ea1n chi\u1ebfn tranh l\u00e0 s\u1ef1 ch\u1edd \u0111\u1ee3i (con tr\u1edf v\u1ec1) m\u1ecfi m\u00f2n, n\u1eb7ng n\u1ec1 c\u1ee7a ng\u01b0\u1eddi m\u1eb9. Kh\u00f4ng ph\u1ea3i bom \u0111\u1ea1n m\u00e0 ch\u00ednh s\u1ef1 ch\u1edd \u0111\u1ee3i dai d\u1eb3ng \u1ea5y m\u1edbi l\u00e0 th\u1ee9 \u201cxuy\u00ean th\u1ee7ng\u201d m\u00e1i nh\u00e0, l\u00e0m n\u00f3 r\u00e1ch n\u00e1t, \u0111\u1ec3 n\u1eafng m\u01b0a l\u1ecdt v\u00e0o.", "key": "D", "isVideo": false, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604685, "lessonId": 0, "a": "\u00c2n h\u1eadn.", "b": "Bu\u1ed3n b\u00e3.", "c": "Th\u00f4 t\u1ee5c.", "d": "L\u1ea5y l\u00e0m nh\u1ee5c.", "bookId": 1088833, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cY s\u1ebb m\u1ed9t \u00edt c\u01a1m v\u00e0o c\u00e1i \u0111\u0129a ch\u1eb3ng c\u00f2n h\u01a1i m\u1ed9t ch\u00fat m\u1eafm mu\u1ed1i n\u00e0o, v\u1edd tr\u1ed9n l\u1ea1i. San kho\u00e1i tr\u00e1 v\u00ec c\u00e1i tr\u00f2 cay \u0111\u1ed9c \u1ea5y, \u0111\u1eadp \u0111\u00f4i \u0111\u0169a xu\u1ed1ng \u0111\u00f9i, c\u01b0\u1eddi b\u1eafn c\u1ea3 ra c\u01a1m. L\u0169 tr\u1ebb c\u0169ng c\u01b0\u1eddi, ch\u1ec9 c\u00f3 Oanh l\u00e0 bu\u00f4ng xu\u00f4i m\u1eb7t ch\u1eb3ng n\u00f3i n\u0103ng g\u00ec. Y v\u00e0 v\u1ed9i h\u1ebft b\u00e1t c\u01a1m r\u1ed3i qu\u0103ng b\u00e1t \u0111\u0169a, \u0111\u1ee9ng l\u00ean. San v\u00e0 Th\u1ee9 \u0103n n\u1ed1t ch\u1ed7 c\u01a1m d\u1edf c\u0169ng \u0111\u1ee9ng l\u00ean. Nh\u01b0ng h\u1ecd sai M\u00f4 \u0111i mua ch\u1ee5c b\u00e1nh ch\u01b0ng. R\u1ed3i h\u1ecd l\u00ean gi\u01b0\u1eddng n\u1eb1m ngh\u1ec9 tr\u01b0a. Th\u1ec9nh tho\u1ea3ng San v\u1eabn c\u00f2n r\u00fac r\u00edch c\u01b0\u1eddi. Nh\u01b0ng Th\u1ee9 th\u00ec \u0111\u00e3 b\u1eaft \u0111\u1ea7u th\u1ea5y nh\u01b0 \u00e2n h\u1eadn. C\u00e1i c\u1eed ch\u1ec9 c\u1ee7a y v\u1eeba r\u1ed3i t\u00e0n nh\u1eabn \u0111\u00e3 \u0111\u00e0nh. Nh\u01b0ng n\u00f3 ch\u1ea3 th\u00f4 t\u1ee5c bay sao? Th\u00f4 t\u1ee5c m\u00e0 l\u1ea1i \u0111\u00ea ti\u1ec7n n\u1eefa. N\u00f3 t\u1ecf ra l\u00e0 m\u1ed9t ng\u01b0\u1eddi qu\u00e1 \u0111\u1ec3 \u00fd \u0111\u1ebfn mi\u1ebfng \u0103n. X\u01b0a nay y c\u00f3 ph\u1ea3i l\u00e0 h\u1ea1ng ng\u01b0\u1eddi nh\u01b0 th\u1ebf \u0111\u00e2u? Y c\u00f3 th\u1ec3 k\u00e8n c\u1ef1a, t\u00e8m nh\u00e8m nh\u1ecf nh\u1eb7t \u0111\u1ebfn th\u1ebf \u01b0? Y l\u1ea5y l\u00e0m nh\u1ee5c cho y l\u1eafm. C\u1ea3 bu\u1ed5i chi\u1ec1u h\u00f4m \u1ea5y, y lu\u1ea9n qu\u1ea9n v\u1edbi nh\u1eefng \u00fd bu\u1ed3n b\u00e3 v\u1ec1 nh\u00e2n c\u00e1ch c\u1ee7a y.\u201d</i><br><div style=\"text-align: right;\">(Nam Cao, <i>S\u1ed1ng m\u00f2n</i>, NXB H\u1ed9i Nh\u00e0 v\u0103n, 2006)</div>T\u1eeb ng\u1eef n\u00e0o <b>kh\u00f4ng </b>mi\u00eau t\u1ea3 t\u00e2m tr\u1ea1ng c\u1ee7a Th\u1ee9 khi nh\u1edb l\u1ea1i c\u1eed ch\u1ec9 trong b\u1eefa c\u01a1m tr\u01b0a?", "answer": "Chi ti\u1ebft: \u201cTh\u00f4 t\u1ee5c m\u00e0 l\u1ea1i \u0111\u00ea ti\u1ec7n n\u1eefa.\u201d l\u00e0 nh\u1eadn x\u00e9t, \u0111\u00e1nh gi\u00e1 v\u1ec1 h\u00e0nh \u0111\u1ed9ng, kh\u00f4ng ph\u1ea3i c\u1ea3m x\u00fac c\u1ee7a nh\u00e2n v\u1eadt Th\u1ee9. <br>\n\u2192 T\u1eeb \u201cth\u00f4 t\u1ee5c\u201d kh\u00f4ng mi\u00eau t\u1ea3 t\u00e2m tr\u1ea1ng c\u1ee7a Th\u1ee9 khi nh\u1edb l\u1ea1i c\u1eed ch\u1ec9 trong b\u1eefa c\u01a1m tr\u01b0a.\n", "key": "C", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604691, "lessonId": 0, "a": "\u201ct\u00f4i \u0111\u00e3 l\u00e0 ch\u00f3, anh h\u00e3y coi ch\u1eebng h\u00e0m r\u0103ng nh\u1ecdn c\u1ee7a t\u00f4i\u201d.", "b": "\u201cNg\u00e0i \u0110\u1ea1i th\u1ed1ng l\u0129nh s\u1ebd x\u1eed cho t\u00f4i \u0111\u01b0\u1ee3c.\u201d.", "c": "\u201cT\u00f4i mu\u1ed1n anh l\u00e0m \u0111\u00fang theo kh\u1ebf \u01b0\u1edbc\u201d.", "d": "\u201cT\u00f4i \u0111\u00e3 c\u00f3 l\u1eddi th\u1ec1 l\u00e0 ph\u1ea3i \u0111\u00f2i thanh to\u00e1n cho \u0111\u01b0\u1ee3c c\u00e1i kh\u1ebf \u01b0\u1edbc c\u1ee7a t\u00f4i.\u201d.", "bookId": 1088835, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cANT\u00d4NI\u00d4 - H\u00e3y nghe t\u00f4i n\u00f3i \u0111\u00e3 n\u00e0o, b\u00e1c Sail\u00f4c hi\u1ec1n h\u1eadu.<br>SAIL\u00d4C - T\u00f4i mu\u1ed1n anh l\u00e0m \u0111\u00fang theo kh\u1ebf \u01b0\u1edbc; \u0111\u1eebng c\u00f3 n\u00f3i g\u00ec tr\u00e1i v\u1edbi kh\u1ebf \u01b0\u1edbc. T\u00f4i \u0111\u00e3 c\u00f3 l\u1eddi th\u1ec1 l\u00e0 ph\u1ea3i \u0111\u00f2i thanh to\u00e1n cho \u0111\u01b0\u1ee3c c\u00e1i kh\u1ebf \u01b0\u1edbc c\u1ee7a t\u00f4i. Anh \u0111\u00e3 g\u1ecdi t\u00f4i l\u00e0 ch\u00f3, tr\u01b0\u1edbc khi anh c\u00f3 m\u1ed9t l\u00ed do \u0111\u1ec3 g\u1ecdi t\u00f4i nh\u01b0 v\u1eady, nh\u01b0ng, t\u00f4i \u0111\u00e3 l\u00e0 ch\u00f3, th\u00ec anh h\u00e3y coi ch\u1eebng h\u00e0m r\u0103ng nh\u1ecdn c\u1ee7a t\u00f4i. Ng\u00e0i \u0110\u1ea1i th\u1ed1ng l\u0129nh s\u1ebd x\u1eed cho t\u00f4i \u0111\u01b0\u1ee3c. T\u00ean gi\u00e1m ng\u1ee5c \u00e1c h\u1ea1i, ta l\u1ea5y l\u00e0m l\u1ea1 r\u1eb1ng mi \u0111\u00e3 d\u1ea1i d\u1ed9t nghe l\u1eddi h\u1eafn xin m\u00e0 d\u1eabn h\u1eafn ra ph\u1ed1.\u201d</i><br><div style=\"text-align: right;\">(William Shakespeare, <i>Ng\u01b0\u1eddi l\u00e1i bu\u00f4n th\u00e0nh V\u01a1nid\u01a1</i>, theo <i>Tuy\u1ec3n t\u1eadp t\u00e1c ph\u1ea9m - William Shakespeare</i>, NXB S\u00e2n kh\u1ea5u, 2006)</div>Chi ti\u1ebft n\u00e0o trong l\u1eddi n\u00f3i c\u1ee7a Sail\u00f4c h\u00e0m \u00fd \u0111e do\u1ea1 Ant\u00f4ni\u00f4?", "answer": "Chi ti\u1ebft \u201ct\u00f4i \u0111\u00e3 l\u00e0 ch\u00f3, anh h\u00e3y coi ch\u1eebng h\u00e0m r\u0103ng nh\u1ecdn c\u1ee7a t\u00f4i\u201d cho th\u1ea5y Sail\u1ed1c \u0111ang t\u1ef1 so s\u00e1nh b\u1ea3n th\u00e2n v\u1edbi m\u1ed9t con ch\u00f3 c\u00f3 \u201ch\u00e0m r\u0103ng nh\u1ecdn\u201d v\u1edbi h\u00e0m \u00fd r\u1eb1ng Sail\u1ed1c s\u1ebd d\u00f9ng \u201ch\u00e0m r\u0103ng nh\u1ecdn\u201d (s\u1ee9c m\u1ea1nh, s\u1ef1 t\u00e0n nh\u1eabn) c\u1ee7a m\u00ecnh \u0111\u1ec3 \u201cc\u1eafn x\u00e9\u201d Ant\u00f4ni\u00f4, tr\u1ea3 th\u00f9 cho nh\u1eefng g\u00ec Ant\u00f4ni\u00f4 \u0111\u00e3 g\u00e2y ra cho m\u00ecnh. \u0110\u00e2y l\u00e0 m\u1ed9t l\u1eddi \u0111e d\u1ecda \u0111\u1ea7y hung h\u0103ng c\u1ee7a Sail\u1ed1c.", "key": "A", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604695, "lessonId": 0, "a": "M\u00f9i chu\u1ed9t b\u1ecb hun kh\u00f3i.", "b": "M\u00f9i nh\u00e0 ch\u00e1y.", "c": "M\u00f9i con ng\u01b0\u1eddi b\u1ecb hun ch\u00e1y.", "d": "M\u00f9i nh\u1ef1a ch\u00e1y.", "bookId": 1088837, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cM\u1ed9t ng\u00e0y n\u1ecd, n\u00f3i \u0111\u00fang h\u01a1n l\u00e0 m\u1ed9t \u0111\u00eam n\u1ecd, c\u00e1c b\u00e1c ng\u1eedi th\u1ea5y c\u00f3 c\u00e1i m\u00f9i kh\u00e9t l\u1eb9t tr\u00e0n v\u00e0o ch\u1ed7 n\u00e1u trong l\u00f2ng \u0111\u1ea5t. M\u00f9i kh\u00e9t n\u1eb7ng l\u00ean nhanh v\u00e0 tr\u1edf th\u00e0nh kh\u00f4ng ch\u1ecbu n\u1ed5i. G\u00ec th\u1ebf? Ch\u1eb3ng ai bi\u1ebft... Tr\u1ebb nh\u1ecf th\u00ec kh\u00f3c, \u0111\u00e0n b\u00e0 th\u00ec la, \u0111\u00e0n \u00f4ng th\u00ec ch\u1eedi. Ho\u1ea3ng lo\u1ea1n! Ch\u1ea1y \u0111i \u01b0? Nh\u01b0ng ch\u1ea1y \u0111\u00e2u ch\u1ee9? Kh\u1ee7ng khi\u1ebfp qu\u00e1! Ti\u1ebfng r\u0103ng l\u1eadp c\u1eadp, ti\u1ebfng th\u00e9t x\u00e9 tai, ti\u1ebfng n\u1ea5c, ti\u1ebfng th\u00e2n ng\u01b0\u1eddi \u0111\u1ed5 xu\u1ed1ng, ti\u1ebfng kh\u00f3c \u0111i\u00ean r\u1ed3, l\u00e0m cho c\u00e1i x\u00f3 t\u1ed1i \u00e1m kh\u00f3i \u0111\u00f3 h\u1ec7t nh\u01b0 l\u00e0 m\u1ed9t \u0111\u1ecba ng\u1ee5c.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u00c1i Qu\u1ed1c, <i>Con ng\u01b0\u1eddi bi\u1ebft m\u00f9i hun kh\u00f3i</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>\u201cM\u00f9i kh\u00e9t l\u1eb9t\u201d \u0111\u01b0\u1ee3c nh\u1eafc \u0111\u1ebfn trong \u0111o\u1ea1n v\u0103n l\u00e0 m\u00f9i g\u00ec?", "answer": "\u0110o\u1ea1n tr\u00edch k\u1ec3 l\u1ea1i c\u1ea3nh ho\u1ea3ng lo\u1ea1n khi m\u1ecdi ng\u01b0\u1eddi ng\u1eedi th\u1ea5y m\u00f9i kh\u00e9t trong h\u1ea7m tr\u00fa \u1ea9n v\u00e0o m\u1ed9t \u0111\u00eam n\u1ecd. V\u0103n b\u1ea3n <i>Con ng\u01b0\u1eddi bi\u1ebft m\u00f9i hun kh\u00f3i</i> t\u1ed1 c\u00e1o t\u1ed9i \u00e1c c\u1ee7a th\u1ef1c d\u00e2n: ch\u00fang hun kh\u00f3i v\u00e0o h\u1ea7m tr\u00fa \u1ea9n c\u00f3 ng\u01b0\u1eddi b\u00ean trong, khi\u1ebfn con ng\u01b0\u1eddi ng\u1ea1t th\u1edf, ch\u00e1y x\u00e9m. C\u00e1c chi ti\u1ebft ti\u1ebfp theo nh\u01b0 <i>ho\u1ea3ng lo\u1ea1n, ti\u1ebfng kh\u00f3c \u0111i\u00ean r\u1ed3, ti\u1ebfng th\u00e2n ng\u01b0\u1eddi \u0111\u1ed5 xu\u1ed1ng, c\u00e1i x\u00f3 t\u1ed1i \u00e1m kh\u00f3i h\u1ec7t nh\u01b0 l\u00e0 m\u1ed9t \u0111\u1ecba ng\u1ee5c</i> cho th\u1ea5y \u0111\u1ed1i t\u01b0\u1ee3ng b\u1ecb hun kh\u00f3i ch\u00ednh l\u00e0 con ng\u01b0\u1eddi.<br>\n\u2192 \u201cM\u00f9i kh\u00e9t l\u1eb9t\u201d \u0111\u01b0\u1ee3c nh\u1eafc \u0111\u1ebfn trong \u0111o\u1ea1n v\u0103n l\u00e0 m\u00f9i con ng\u01b0\u1eddi b\u1ecb hun ch\u00e1y.\n", "key": "C", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604697, "lessonId": 0, "a": "T\u00e2m h\u1ed3n nh\u1ea1y c\u1ea3m, gi\u00e0u c\u1ea3m x\u00fac.", "b": "Y\u00eau thi\u00ean nhi\u00ean tha thi\u1ebft.", "c": "T\u00e2m h\u1ed3n m\u1ed9ng m\u01a1.", "d": "T\u00e2m h\u1ed3n trong tr\u1ebbo.", "bookId": 1088839, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cM\u00ecnh \u0111ang r\u1ea5t nh\u1edb...<br>Nh\u1edb d\u00f2ng s\u00f4ng hai b\u00ean b\u1edd m\u1ecdc \u0111\u1ea7y d\u1eeba n\u01b0\u1edbc v\u00e0 ken ch\u1eb7t nh\u1eefng b\u1ee5i \u00f4 r\u00f4. \u0110\u00eam mi\u1ec1n T\u00e2y thanh khi\u1ebft l\u1eafm. N\u1eb1m trong ng\u00f4i nh\u00e0 l\u00e1 ven s\u00f4ng nghe x\u1ea1c x\u00e0o ti\u1ebfng d\u1eeba n\u01b0\u1edbc \u0111ong \u0111\u01b0a, m\u00e1i ch\u00e8o ai khua \u0111\u1ed9ng l\u00e0n n\u01b0\u1edbc, r\u1ed3i th\u1ed5n th\u1ee9c c\u1ea3nh \u201cd\u00e2n ven s\u00f4ng \u0111\u00eam n\u1eb1m nghe \u0111\u1ea5t l\u1edf\u201d. \u0110\u01b0\u01a1ng kh\u00f4ng l\u1ea1i thao th\u1ee9c b\u1edfi chuy\u1ec7n l\u1edf, b\u1ed3i c\u1ee7a hai b\u1edd s\u00f3ng n\u01b0\u1edbc, c\u1ee7a cu\u1ed9c \u0111\u1eddi v\u1ed1n l\u1eadn \u0111\u1eadn, \u0111a \u0111oan.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Th\u1ecb Vi\u1ec7t H\u00e0, <i>\u1ede gi\u1eefa C\u00e0 Mau m\u00e0 l\u1ea1i nh\u1edb C\u00e0 Mau</i>, theo <i>vanvn.vn</i>)</div>Nh\u1eadn x\u00e9t n\u00e0o sau \u0111\u00e2y ph\u1ea3n \u00e1nh \u0111\u00fang \u0111\u1eb7c \u0111i\u1ec3m t\u00e2m h\u1ed3n nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh?", "answer": "Nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh th\u1ec3 hi\u1ec7n n\u1ed7i nh\u1edb c\u1ea3nh v\u1eadt mi\u1ec1n T\u00e2y v\u1edbi h\u00ecnh \u1ea3nh c\u1ee7a d\u00f2ng s\u00f4ng, d\u1eeba n\u01b0\u1edbc, \u00f4 r\u00f4, ti\u1ebfng m\u00e1i ch\u00e8o\u2026 T\u1eeb hi\u1ec7n t\u01b0\u1ee3ng t\u1ef1 nhi\u00ean (l\u1edf, b\u1ed3i c\u1ee7a d\u00f2ng s\u00f4ng) m\u00e0 li\u00ean t\u01b0\u1edfng \u0111\u1ebfn nh\u1eefng tr\u1eafc tr\u1edf, \u0111a \u0111oan c\u1ee7a \u0111\u1eddi ng\u01b0\u1eddi. \u0110i\u1ec1u n\u00e0y cho th\u1ea5y s\u1ef1 rung c\u1ea3m tinh t\u1ebf, s\u00e2u s\u1eafc v\u00e0 t\u00e2m h\u1ed3n nh\u1ea1y c\u1ea3m, d\u1ec5 rung \u0111\u1ed9ng tr\u01b0\u1edbc nh\u1eefng \u0111i\u1ec1u nh\u1ecf b\u00e9 xung quanh c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh.<br>\n\u2192 A l\u00e0 \u0111\u00e1p \u00e1n \u0111\u00fang\n", "key": "A", "isVideo": true, "score": 0, "order": 11, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604698, "lessonId": 0, "a": "\u201cGiang\u201d (B\u1ea3o Ninh).", "b": "\u201cCh\u1eef ng r\u1ecdn cu\u1ed9c \u0111\u1eddi m\u00ecnh cho d\u00e2n t\u1ed9c.\n</b>", "key": "C", "isVideo": true, "score": 0, "order": 19, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604714, "lessonId": 0, "a": "C\u00f4ng t\u00e1c trong ng\u00e0nh y, t\u00f4i bi\u1ebft b\u1ec7nh t\u00ecnh c\u1ee7a b\u1ed1 \u0111\u00e3 v\u00e0o giai \u0111o\u1ea1n cu\u1ed1i.", "b": "C\u00f4ng t\u00e1c trong ng\u00e0nh y d\u00f9 t\u00f4i bi\u1ebft b\u1ec7nh t\u00ecnh c\u1ee7a b\u1ed1 \u0111\u00e3 v\u00e0o giai \u0111o\u1ea1n cu\u1ed1i.", "c": "B\u1edfi c\u00f4ng t\u00e1c trong ng\u00e0nh y, t\u00f4i bi\u1ebft b\u1ec7nh t\u00ecnh c\u1ee7a b\u1ed1 \u0111\u00e3 v\u00e0o giai \u0111o\u1ea1n cu\u1ed1i.", "d": "C\u00f4ng t\u00e1c trong ng\u00e0nh y n\u00ean t\u00f4i bi\u1ebft b\u1ec7nh t\u00ecnh c\u1ee7a b\u1ed1 \u0111\u00e3 v\u00e0o giai \u0111o\u1ea1n cu\u1ed1i.", "bookId": 1088855, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Ch\u1ec9 ra c\u00e2u sai trong c\u00e1c c\u00e2u sau:", "answer": "C\u00e2u \u201cC\u00f4ng t\u00e1c trong ng\u00e0nh y d\u00f9 t\u00f4i bi\u1ebft b\u1ec7nh t\u00ecnh c\u1ee7a b\u1ed1 \u0111\u00e3 v\u00e0o giai \u0111o\u1ea1n cu\u1ed1i.\u201d sai ng\u1eef ph\u00e1p. \u201cD\u00f9\u201d th\u01b0\u1eddng s\u1eed d\u1ee5ng \u0111\u1ec3 n\u1ed1i hai m\u1ec7nh \u0111\u1ec1 c\u00f3 quan h\u1ec7 t\u01b0\u01a1ng ph\u1ea3n. Tuy nhi\u00ean, trong c\u00e2u n\u00e0y, m\u1ec7nh \u0111\u1ec1 \u201cc\u00f4ng t\u00e1c trong ng\u00e0nh y\u201d kh\u00f4ng c\u00f3 quan h\u1ec7 t\u01b0\u01a1ng ph\u1ea3n v\u1edbi m\u1ec7nh \u0111\u1ec1 \u201ct\u00f4i bi\u1ebft b\u1ec7nh t\u00ecnh c\u1ee7a b\u1ed1 \u0111\u00e3 v\u00e0o giai \u0111o\u1ea1n cu\u1ed1i\u201d.", "key": "B", "isVideo": true, "score": 0, "order": 20, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 21 \u0111\u1ebfn 25", "content": "\u201c[...] Trong khi nh\u1eefng s\u1ef1 ki\u1ec7n n\u00e0y d\u01b0\u1eddng nh\u01b0 kh\u00f3 c\u00f3 th\u1ec3 d\u1ef1 \u0111o\u00e1n, c\u00e1c m\u00f4 h\u00ecnh v\u1eadt l\u00ed c\u00f3 th\u1ec3 gi\u00fap ch\u00fang ta hi\u1ec3u \u0111\u01b0\u1ee3c c\u00e1ch c\u00e1c v\u1ee5 gi\u1eabm \u0111\u1ea1p h\u00ecnh th\u00e0nh nh\u01b0 th\u1ebf n\u00e0o, theo Max Bi, ph\u00f3 gi\u00e1o s\u01b0 v\u1eadt l\u00ed \u1edf tr\u01b0\u1eddng \u0111\u1ea1i h\u1ecdc Northeastern. \u201cV\u1eadt l\u00ed \u0111em l\u1ea1i nh\u1eefng c\u00f4ng c\u1ee5 gi\u00e1 tr\u1ecb \u0111\u1ec3 m\u00f4 h\u00ecnh h\u00f3a \u0111\u1ed9ng l\u1ef1c gi\u1eabm \u0111\u1ea1p v\u00e0 ph\u00e2n t\u00edch h\u00e0nh x\u1eed c\u1ee7a \u0111\u00e1m \u0111\u00f4ng, \u0111\u1ec1 xu\u1ea5t nh\u1eefng chi\u1ebfn l\u01b0\u1ee3c h\u00e0nh \u0111\u1ed9ng \u0111\u1ec3 c\u1ea3i thi\u1ec7n s\u1ef1 an to\u00e0n c\u1ee7a c\u00f4ng ch\u00fang\u201d, Bi n\u00f3i.<br>M\u1ed9t s\u1ed1 v\u1ee5 chen l\u1ea5n \u0111\u00e1m \u0111\u00f4ng g\u00e2y ch\u1ebft ch\u00f3c nh\u1ea5t \u1edf th\u1eddi hi\u1ec7n \u0111\u1ea1i \u0111\u00e3 xu\u1ea5t hi\u1ec7n trong l\u1ec5 hajj, cu\u1ed9c h\u00e0nh h\u01b0\u01a1ng \u0111\u1ebfn Mecca, Saudi Arabia c\u1ee7a ng\u01b0\u1eddi theo \u0111\u1ea1o Islamic h\u1eb1ng n\u0103m. V\u00e0o n\u0103m 1990, m\u1ed9t th\u1ea3m h\u1ecda \u0111\u01b0\u1eddng h\u1ea7m d\u00e0nh cho ng\u01b0\u1eddi \u0111i b\u1ed9 l\u00e0m 1.426 ng\u01b0\u1eddi ch\u1ebft, trong khi m\u1ed9t th\u1ea3m h\u1ecda gi\u1eabm \u0111\u1ea1p v\u00e0o n\u0103m 2015 d\u1eabn \u0111\u1ebfn vi\u1ec7c c\u01b0\u1edbp \u0111i m\u1ea1ng s\u1ed1ng c\u1ee7a h\u01a1n 2.400 ng\u01b0\u1eddi.<br>[...]<br><b>L\u00e0m th\u1ebf n\u00e0o \u0111\u1ec3 s\u1ed1ng s\u00f3t kh\u1ecfi m\u1ed9t cu\u1ed9c gi\u1eabm \u0111\u1ea1p?</b><br>Nh\u1eefng c\u00e1ch t\u1ed1i \u0111a c\u01a1 h\u1ed9i s\u1ed1ng s\u00f3t c\u1ee7a m\u1ed9t ng\u01b0\u1eddi trong m\u1ed9t cu\u1ed9c gi\u1eabm \u0111\u1ea1p l\u00e0:<br>- H\u00e3y b\u00ecnh t\u0129nh: s\u1ef1 c\u0103ng th\u1eb3ng khu\u1ebfch \u0111\u1ea1i \u00e1p l\u1ef1c \u0111\u00e1m \u0111\u00f4ng v\u00e0 l\u00e0m m\u1ea5t \u0111i kh\u1ea3 n\u0103ng ki\u1ec3m so\u00e1t c\u00e1 nh\u00e2n.<br>- B\u1ea3o v\u1ec7 ng\u1ef1c b\u1ea1n: d\u00f9ng tay \u0111\u1ec3 t\u1ea1o m\u1ed9t kh\u00f4ng gian an to\u00e0n ph\u00eda tr\u01b0\u1edbc \u0111\u1ec3 ng\u0103n vi\u1ec7c b\u1ecb \u00e9p ng\u1ef1c.<br>- Chuy\u1ec3n \u0111\u1ed9ng v\u1edbi d\u00f2ng ng\u01b0\u1eddi: \u0111\u1eebng c\u1ed1 ng\u01b0\u1ee3c l\u1ea1i v\u1edbi h\u01b0\u1edbng chuy\u1ec3n \u0111\u1ed9ng c\u1ee7a \u0111\u00e1m \u0111\u00f4ng; thay v\u00ec c\u00e1ch \u0111\u00f3, chuy\u1ec3n \u0111\u1ed9ng theo \u0111\u01b0\u1eddng ch\u00e9o \u0111\u1ec3 h\u01b0\u1edbng t\u1edbi c\u00e1c v\u00f9ng r\u00eca.<br>- Tr\u00e1nh c\u00e1c b\u1ee9c t\u01b0\u1eddng v\u00e0 r\u00e0o ch\u1eafn: c\u00e1c \u0111\u1ecba \u0111i\u1ec3m \u0111\u00f3 th\u01b0\u1eddng tr\u1edf th\u00e0nh c\u00e1c v\u00f9ng \u00e1p l\u1ef1c cao, n\u01a1i con ng\u01b0\u1eddi th\u01b0\u1eddng b\u1ecb ghim ch\u1eb7t.<br><b>C\u00f3 th\u1ec3 ph\u00f2ng ng\u1eeba \u0111\u01b0\u1ee3c nh\u1eefng g\u00ec?</b><br>N\u1ebfu b\u1ecb ng\u00e3, Bi n\u00f3i, h\u00e3y b\u1ea3o v\u1ec7 \u0111\u1ea7u v\u00e0 cu\u1ed9n tr\u00f2n theo t\u01b0 th\u1ebf b\u00e0o thai \u0111\u1ec3 gi\u1ea3m thi\u1ec3u kh\u1ea3 n\u0103ng b\u1ecb ch\u1ea5n th\u01b0\u01a1ng. C\u1ed1 g\u1eafng \u0111\u1ee9ng d\u1eady c\u00e0ng s\u1edbm c\u00e0ng t\u1ed1t b\u1eb1ng vi\u1ec7c n\u1eafm v\u1eefng l\u1ea5y m\u1ed9t v\u1eadt th\u1ec3 ho\u1eb7c ng\u01b0\u1eddi.<br>Trong khi m\u1ed7i ng\u01b0\u1eddi c\u00f3 th\u1ec3 c\u00f3 \u0111\u01b0\u1ee3c nh\u1eefng ph\u00f2ng ng\u1eeba cho ri\u00eang m\u00ecnh, Bi n\u00f3i, c\u00e1c nh\u00e0 thi\u1ebft k\u1ebf \u0111\u1ecba \u0111i\u1ec3m, nh\u1eefng ng\u01b0\u1eddi t\u1ed5 ch\u1ee9c s\u1ef1 ki\u1ec7n v\u00e0 c\u1ea3 ch\u00ednh quy\u1ec1n \u0111\u1ec1u \u0111\u00f3ng vai tr\u00f2 quan tr\u1ecdng trong vi\u1ec7c ng\u0103n nh\u1eefng nguy c\u01a1.<br>C\u00e1c nh\u00e0 t\u1ed5 ch\u1ee9c ph\u1ea3i \u0111\u1ea3m b\u1ea3o c\u00e1c l\u1ed1i tho\u00e1t hi\u1ec7u qu\u1ea3 v\u00e0 lo\u1ea1i tr\u1eeb c\u00e1c \u0111i\u1ec3m ngh\u1ebdn. C\u00e1c l\u1ed1i tho\u00e1t r\u1ed9ng r\u00e3i s\u1ebd gi\u00fap ph\u00e2n ph\u1ed1i \u00e1p l\u1ef1c v\u00e0 c\u00f3 c\u00e1c bi\u1ec3n b\u00e1o r\u00f5 r\u00e0ng \u0111\u1ec3 c\u00f3 th\u1ec3 khuy\u1ebfn kh\u00edch s\u1ef1 di chuy\u1ec3n b\u00ecnh t\u0129nh, \u1ed5n \u0111\u1ecbnh. Nh\u1eefng ng\u01b0\u1eddi \u0111\u01b0\u1ee3c t\u1eadp hu\u1ea5n c\u00f3 th\u1ec3 qu\u1ea3n l\u00ed chuy\u1ec3n \u0111\u1ed9ng c\u1ee7a \u0111\u00e1m \u0111\u00f4ng trong khi c\u00e1c ch\u01b0\u1edbng ng\u1ea1i v\u1eadt \u0111\u01b0\u1ee3c s\u1eafp x\u1ebfp m\u1ed9t c\u00e1ch chi\u1ebfn l\u01b0\u1ee3c c\u00f3 th\u1ec3 ph\u00e2n t\u00e1n m\u1eadt \u0111\u1ed9 v\u00e0 h\u01b0\u1edbng d\u1eabn \u0111\u00e1m \u0111\u00f4ng h\u01b0\u1edbng t\u1edbi nh\u1eefng l\u1ed1i tho\u00e1t hi\u1ec3m.<br>Th\u00eam v\u00e0o \u0111\u00f3, vi\u1ec7c \u0111i\u1ec1u ph\u1ed1i s\u1ef1 ti\u1ebfp c\u1eadn nh\u1eefng khu v\u1ef1c c\u00f3 m\u1eadt \u0111\u1ed9 cao c\u00f3 th\u1ec3 ng\u0103n ng\u1eeba kh\u1ea3 n\u0103ng th\u00fac \u0111\u1ea9y c\u00e1c t\u00ecnh hu\u1ed1ng tr\u1edf n\u00ean nguy hi\u1ec3m, qua \u0111\u00f3 giam thi\u1ec3u nguy c\u01a1 gi\u1eabm \u0111\u1ea1p.\u201d<br><div style=\"text-align: right;\">(V\u0169 Nh\u00e0n d\u1ecbch t\u1eeb <i>Northeastern Unieversity</i>, <i>M\u00f4 h\u00ecnh v\u1eadt l\u00ed c\u00f3 th\u1ec3 ng\u0103n ng\u1eeba th\u1ea3m ho\u1ea1 ch\u1ebft ch\u00f3c t\u1ea1i c\u00e1c \u0111\u00e1m \u0111\u00f4ng nh\u01b0 th\u1ebf n\u00e0o?</i>, theo <i>tiasang.com.vn</i>)</div>", "listQuestion": [{"questionId": 21604725, "lessonId": 0, "a": "To\u00e1n h\u1ecdc.", "b": "\u0110\u1ecba l\u00ed.", "c": "V\u1eadt l\u00ed.", "d": "T\u00e 1ea1nh s\u1ef1 t\u01b0\u01a1ng \u0111\u1ed3ng.", "b": "Nh\u1ea5n m\u1ea1nh s\u1ef1 kh\u00e1c bi\u1ec7t.", "c": "Lo\u1ea1i tr\u1eeb.", "d": "B\u1ed5 sung.", "bookId": 1088864, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cTh\u00eam v\u00e0o \u0111\u00f3, vi\u1ec7c \u0111i\u1ec1u ph\u1ed1i s\u1ef1 ti\u1ebfp c\u1eadn nh\u1eefng khu v\u1ef1c c\u00f3 m\u1eadt \u0111\u1ed9 cao c\u00f3 th\u1ec3 ng\u0103n ng\u1eeba kh\u1ea3 n\u0103ng th\u00fac \u0111\u1ea9y c\u00e1c t\u00ecnh hu\u1ed1ng tr\u1edf n\u00ean nguy hi\u1ec3m, qua \u0111\u00f3 giam thi\u1ec3u nguy c\u01a1 gi\u1eabm \u0111\u1ea1p.\u201d<br>C\u1ee5m t\u1eeb \u201cth\u00eam v\u00e0o \u0111\u00f3\u201d mang \u00fd ngh\u0129a n\u00e0o sau \u0111\u00e2y?", "answer": "C\u1ee5m t\u1eeb \u201cth\u00eam v\u00e0o \u0111\u00f3\u201d \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng \u0111\u1ec3 b\u1ed5 sung th\u00eam m\u1ed9t bi\u1ec7n ph\u00e1p ph\u00f2ng ng\u1eeba, ngo\u00e0i nh\u1eefng bi\u1ec7n ph\u00e1p \u0111\u00e3 \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp tr\u01b0\u1edbc \u0111\u00f3.<br>\n\u2192 C\u1ee5m t\u1eeb \u201cth\u00eam v\u00e0o \u0111\u00f3\u201d mang \u00fd ngh\u0129a b\u1ed5 sung.\n", "key": "D", "isVideo": true, "score": 0, "order": 25, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 26 \u0111\u1ebfn 30", "content": "\u201c \u1ede t\u1eebng th\u1eddi k\u00ec, t\u1eebng giai \u0111o\u1ea1n v\u0103n h\u1ecdc, \u0111\u1ec1 t\u00e0i chi\u1ebfn tranh l\u1ea1i \u0111\u01b0\u1ee3c khai th\u00e1c, ti\u1ebfp c\u1eadn v\u00e0 ph\u1ea3n \u00e1nh theo nh\u1eefng g\u00f3c \u0111\u1ed9 v\u00e0 c\u1ea3m h\u1ee9ng kh\u00e1c nhau. V\u0103n xu\u00f4i Vi\u1ec7t Nam tr\u01b0\u1edbc n\u0103m 1975 mang \u00e2m h\u01b0\u1edfng s\u1eed thi v\u1edbi c\u1ea3m h\u1ee9ng ch\u1ee7 \u0111\u1ea1o l\u00e0 ng\u1ee3i ca, n\u00ean nh\u1eefng g\u00ec thu\u1ed9c v\u1ec1 th\u00e2n ph\u1eadn con ng\u01b0\u1eddi d\u01b0\u1eddng nh\u01b0 ch\u01b0a \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp \u0111\u1ebfn ho\u1eb7c n\u1ebfu c\u00f3 c\u0169ng ch\u1ec9 l\u01b0\u1edbt qua v\u00e0 kh\u00e1 m\u1edd nh\u1ea1t. Ng\u01b0\u1ee3c l\u1ea1i, sau n\u0103m 1975, nh\u1eefng t\u00e1c ph\u1ea9m vi\u1ebft v\u1ec1 chi\u1ebfn tranh \u0111\u01b0\u1ee3c ph\u1ea3n \u00e1nh m\u1ed9t c\u00e1ch \u0111a chi\u1ec1u v\u00e0 to\u00e0n di\u1ec7n h\u01a1n. V\u00ed d\u1ee5, trong truy\u1ec7n ng\u1eafn \u201cM\u1ea3nh tr\u0103ng cu\u1ed1i r\u1eebng\u201d, Nguy\u1ec5n Minh Ch\u00e2u \u0111\u00e3 x\u00e2y d\u1ef1ng h\u00ecnh t\u01b0\u1ee3ng ng\u01b0\u1eddi l\u00ednh trong kh\u00f3i bom l\u1eeda \u0111\u1ea1n v\u1eabn lu\u00f4n gi\u1eef \u0111\u01b0\u1ee3c s\u1ef1 h\u00e0o s\u1ea3ng, l\u1ea1c quan v\u00e0 kh\u00ed th\u1ebf qu\u1eadt c\u01b0\u1eddng, nh\u00e0 v\u0103n ca ng\u1ee3i nh\u1eefng chi\u1ebfn c\u00f4ng anh d\u0169ng c\u1ee7a nh\u1eefng con ng\u01b0\u1eddi b\u1ea5t khu\u1ea5t, s\u1eb5n s\u00e0ng hi sinh \u0111\u1ec3 b\u1ea3o v\u1ec7 T\u1ed5 qu\u1ed1c; c\u00f2n trong truy\u1ec7n ng\u1eafn \u201cNg\u01b0\u1eddi s\u00f3t l\u1ea1i c\u1ee7a r\u1eebng c\u01b0\u1eddi\u201d, V\u00f5 Th\u1ecb H\u1ea3o kh\u00f4ng khai th\u00e1c vinh quang m\u00e0 l\u1ea1i cho ch\u00fang ta th\u1ea5y bi k\u1ecbch c\u1ee7a nh\u1eefng ng\u01b0\u1eddi l\u00ednh sau c\u00e1nh r\u1eebng Tr\u01b0\u1eddng S\u01a1n, \u0111\u1eb7c bi\u1ec7t l\u00e0 ng\u01b0\u1eddi l\u00ednh n\u1eef, khi\u1ebfn \u0111\u1ed9c gi\u1ea3 kh\u00f4ng kh\u1ecfi r\u00f9ng m\u00ecnh, \u1edbn l\u1ea1nh tr\u01b0\u1edbc nh\u1eefng \u0111i\u1ec1u kh\u1ee7ng khi\u1ebfp m\u00e0 chi\u1ebfn tranh g\u00e2y ra: N\u00f3 ch\u00e0 \u0111\u1ea1p v\u00e0 t\u01b0\u1edbc \u0111i quy\u1ec1n s\u1ed1ng c\u1ee7a con ng\u01b0\u1eddi.<br>C\u00f9ng l\u00e0 ph\u1ee5 n\u1eef trong chi\u1ebfn tranh, Nguy\u1ec7t v\u00e0 Th\u1ea3o c\u00f3 nh\u1eefng n\u00e9t t\u01b0\u01a1ng \u0111\u1ed3ng, nh\u01b0ng l\u1ea1i c\u00f3 s\u1ed1 ph\u1eadn kh\u00e1c nhau. H\u1ecd \u0111\u1ec1u l\u00e0 nh\u1eefng c\u00f4 g\u00e1i xinh \u0111\u1eb9p, mang trong m\u00ecnh nhi\u1ec7t huy\u1ebft tu\u1ed5i tr\u1ebb v\u00e0 quy\u1ebft t\u00e2m chi\u1ebfn \u0111\u1ea5u v\u00ec \u0111\u1ed9c l\u1eadp t\u1ef1 do c\u1ee7a T\u1ed5 qu\u1ed1c. Nguy\u1ec5n Minh Ch\u00e2u \u0111\u00e3 l\u00e3ng m\u1ea1n h\u00f3a v\u00e0 kh\u1eafc h\u1ecda c\u00e1i \u0111\u1eb9p phi th\u01b0\u1eddng, n\u00e2ng v\u1ebb \u0111\u1eb9p c\u1ee7a Nguy\u1ec7t th\u00e0nh ho\u00e0n m\u0129. M\u1eb7c cho bom \u0111\u1ea1n t\u00e0n ph\u00e1, Nguy\u1ec7t v\u1eabn t\u1ef1 b\u1ed9c l\u1ed9 v\u1ebb \u0111\u1eb9p ng\u1eddi s\u00e1ng trong t\u00e2m h\u1ed3n. C\u00f4 mang \u201cv\u1ebb \u0111\u1eb9p gi\u1ea3n d\u1ecb v\u00e0 m\u00e1t m\u1ebb nh\u01b0 s\u01b0\u01a1ng n\u00fai\u201d. C\u00f4 d\u0169ng c\u1ea3m, d\u00f9 b\u1ecb th\u01b0\u01a1ng c\u0169ng kh\u00f4ng h\u1ec1 nao n\u00fang, v\u1eabn gan g\u00f3c chi\u1ebfn \u0111\u1ea5u \u0111\u1ec3 ho\u00e0n th\u00e0nh nhi\u1ec7m v\u1ee5. Ch\u00ednh v\u00ec th\u1ebf, ch\u00fang ta c\u1ea3m m\u1ebfn v\u00e0 ng\u01b0\u1ee1ng m\u1ed9 Nguy\u1ec7t. C\u00f2n Th\u1ea3o, khi \u0111\u1ecdc \u201cNg\u01b0\u1eddi s\u00f3t l\u1ea1i c\u1ee7a r\u1eebng c\u01b0\u1eddi\u201d, ta c\u1ea3m th\u1ea5y c\u00f3 ch\u00fat g\u00ec t\u01b0ng t\u1ee9c \u1edf trong tim, c\u1ea3m th\u1ea5y chua ch\u00e1t v\u00e0 bu\u1ed3n th\u1ea5u t\u1eadn t\u00e2m can, t\u01b0\u1edfng nh\u01b0 n\u01b0\u1edbc m\u1eaft c\u1ee9 ch\u1ef1c tu\u00f4n tr\u00e0o, kh\u00f3c th\u01b0\u01a1ng cho s\u1ed1 ph\u1eadn \u00e9o le v\u00e0 \u0111\u1ea7y bi k\u1ecbch c\u1ee7a c\u00f4. Th\u1ea3o r\u1ea5t cao th\u01b0\u1ee3ng, c\u00f4 s\u1eb5n s\u00e0ng bu\u00f4ng b\u1ecf v\u00e0 l\u1ef1a ch\u1ecdn c\u00e1ch ra \u0111i \u0111\u1ec3 ng\u01b0\u1eddi m\u00ecnh y\u00eau h\u1ea1nh ph\u00fac, \u0111\u1ec3 Th\u00e0nh m\u00e3i l\u00e0 ch\u00e0ng ho\u00e0ng t\u1eed h\u00e0o hi\u1ec7p c\u1ee7a c\u00f4 v\u00e0 c\u00e1c \u0111\u1ed3ng \u0111\u1ed9i, \u0111\u1ec3 gi\u1eef tr\u1ecdn l\u1eddi h\u1ee9a v\u1edbi ch\u1ecb Th\u1eafm, r\u1eb1ng kh\u00f4ng \u0111\u1ec3 \u0111\u00e0n \u00f4ng th\u01b0\u01a1ng h\u1ea1i. Th\u1ea3o \u0111\u00e3 vi\u1ebft trong l\u00e1 th\u01b0 t\u1ef1 g\u1eedi cho ch\u00ednh m\u00ecnh: \u201cEm l\u00e0 ng\u01b0\u1eddi s\u00f3t l\u1ea1i c\u1ee7a r\u1eebng c\u01b0\u1eddi, nh\u01b0ng h\u1ea1nh ph\u00fac ch\u1eb3ng c\u00f2n s\u00f3t l\u1ea1i n\u01a1i em\u201d. C\u00e2u n\u00f3i \u1ea5y m\u1edbi cay \u0111\u1eafng v\u00e0 x\u00f3t xa l\u00e0m sao!\u201d<br><div style=\"text-align: right;\">(H\u00e0 Thy Linh, <i>\u201cNg\u01b0\u1eddi s\u00f3t l\u1ea1i c\u1ee7a r\u1eebng c\u01b0\u1eddi\u201d v\u00e0 th\u00e2n ph\u1eadn ng\u01b0\u1eddi l\u00ednh n\u1eef trong chi\u1ebfn tranh</i>, theo <i>baovannghe.vn</i>)</div>", "listQuestion": [{"questionId": 21604746, "lessonId": 0, "a": "\u0110\u1ec1 t\u00e0i chi\u1ebfn tranh.", "b": "\u0110\u1ec1 t\u00e0i chi\u1ebfn tranh v\u00e0 h\u00ecnh t\u01b0\u1ee3ng ng\u01b0\u1eddi ph\u1ee5 n\u1eef trong chi\u1ebfn tranh qua v\u0103n h\u1ecdc.", "c": "H\u00ecnh t\u01b0\u1ee3ng ng\u01b0\u1eddi ph\u1ee5 n\u1eef trong chi\u1ebfn tranh.", "d": "S\u1ef1 kh\u1ed1c li\u1ec7t c\u1ee7a chi\u1ebfn tranh.", "bookId": 1088866, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "V\u1ea5n \u0111\u1ec1 ngh\u1ecb lu\u1eadn c\u1ee7a \u0111o\u1ea1n tr\u00edch l\u00e0 g\u00ec?", "answer": "\u0110o\u1ea1n tr\u00edch t\u1eadp trung v\u00e0o vi\u1ec7c ph\u00e2n t\u00edch s\u1ef1 thay \u0111\u1ed5i trong c\u00e1ch ph\u1ea3n \u00e1nh \u0111\u1ec1 t\u00e0i chi\u1ebfn tranh trong v\u0103n h\u1ecdc Vi\u1ec7t Nam sau n\u0103m 1975, \u0111\u1ed3ng th\u1eddi so s\u00e1nh hai h\u00ecnh t\u01b0\u1ee3ng ng\u01b0\u1eddi ph\u1ee5 n\u1eef trong chi\u1ebfn tranh l\u00e0 Nguy\u1ec7t (trong \u201cM\u1ea3nh tr\u0103ng cu\u1ed1i r\u1eebng\u201d) v\u00e0 Th\u1ea3o (trong \u201cNg\u01b0\u1eddi s\u00f3t l\u1ea1i c\u1ee7a r\u1eebng c\u01b0\u1ed                     const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`;
                    const qType = q.normalizedType;

                    // Palette Buttons
                    const btnClass = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    const btnHtml = `<button id="pal_${qKey}" onclick="scrollToQuestion('${qKey}')" class="${btnClass}">${qId}</button>`;
                    
                    palDesk.innerHTML += btnHtml;
                    palMob.innerHTML += btnHtml;

                    // Question Card
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'question-card bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // TYPE 0: MCQ
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { 
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; 
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // TYPE 1 & 3: FILL KEY
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const chars = userVal.split('');
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let boxesHtml = '<div class="flex gap-2 justify-start items-center">';
                        for(let i=0; i<4; i++) {
                            const char = chars[i] || '';
                            boxesHtml += `<input type="text" maxlength="1" 
                                class="char-input" 
                                data-index="${i}" 
                                data-key="${qKey}" 
                                value="${char}" 
                                readonly 
                                onclick="activateNumpad(this, '${qKey}')"
                                ${isSubmitted ? 'disabled' : ''} 
                            />`;
                        }
                        
                        if(examMode === 'practice' && !isSubmitted) {
                             boxesHtml += `<button onclick="checkFillAnswer('${qKey}')" class="ml-2 px-3 py-2 bg-blue-100 text-blue-700 font-bold rounded-lg text-sm hover:bg-blue-200 transition-colors">Kiểm tra</button>`;
                             // Nút xem lời giải cho practice
                             boxesHtml += `<button onclick="toggleSolution('${qKey}')" class="ml-2 px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button>`;
                        }
                        boxesHtml += '</div>';

                        let feedbackHtml = "";
                        if(isSubmitted) {
                             const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                             if(isCorrect) {
                                feedbackHtml = `<div class="mt-2 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                             } else {
                                feedbackHtml = `<div class="mt-2 text-red-600 text-sm">✗ Sai. Đáp án: <span class="font-bold">${correctVal}</span></div>`;
                             }
                        } else if (examMode === 'practice') {
                             feedbackHtml = `<div id="feedback-${qKey}" class="mt-2 text-sm font-bold hidden"></div>`;
                        }

                        html += `
                        <div class="flex flex-col relative">
                            ${boxesHtml}
                            ${feedbackHtml}
                        </div>`;
                    }

                    // TYPE 2: TRUE/FALSE
                    else if(qType === '2') {
                         html += `<div class="overflow-hidden border rounded-lg">
                            <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                                <tr>
                                    <th scope="col" class="px-3 py-3 w-10 text-center">Ý</th>
                                    <th scope="col" class="px-3 py-3">Nội dung</th>
                                    <th scope="col" class="px-3 py-3 w-32 text-center">Chọn Đ/S</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; 
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; 
                                const userChoice = userObj[pIdx]; 
                                
                                let trClass = "bg-white hover:bg-gray-50";
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) trClass = "bg-green-50";
                                    else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
