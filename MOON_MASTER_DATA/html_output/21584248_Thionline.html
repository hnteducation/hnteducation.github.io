gi\u1eef nguy\u00ean th\u00ec \u0111\u1ed9ng t\u1eeb<br>=&gt; <b>hit the sack = go to bed:</b> \u0111i ng\u1ee7<br>=&gt; \u0110\u00e1p \u00e1n \u0111\u00fang<br>C. Trang n\u00f3i n\u1ebfu b\u1ee5ng \u0111\u00f3i m\u00e0 b\u1ecb bao t\u1ea3i \u0111\u1eadp v\u00e0o s\u1ebd kh\u00f3 ng\u1ee7.<br>=&gt; Sai ngh\u0129a<br>D. Trang n\u00f3i r\u1eb1ng n\u1ebfu c\u00f4 \u1ea5y kh\u00f4ng \u0111i ng\u1ee7 v\u1edbi chi\u1ebfc b\u1ee5ng \u0111\u00f3i, c\u00f4 \u1ea5y s\u1ebd d\u1ec5 bu\u1ed3n ng\u1ee7.<br>=&gt; Sai ngh\u0129a v\u00e0 ch\u01b0a l\u00f9i th\u00ec", "key": "B", "isVideo": true, "score": 0, "order": 45, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 46-52: Read the passage carefully.", "content": "Marriage is an ancient religious and legal practice celebrated around the world. However, wedding customs vary from country to country.<br>1. <i>The Wedding Dress</i>: In many countries, it is customary for the bride to wear a white dress as a symbol of purity. The tradition of wearing a special white dress only for the wedding ceremony started around 150 years ago. Before that, most women could not afford to buy a dress that they would only wear once. Now, bridal dresses can be bought in a variety of styles. In some Asian countries and in the Middle East, colors of joy and happiness like red or orange other than white are worn by the bride or used as part of the wedding ceremony.<br>2. <i>The Wedding Rings</i>: In many cultures, couples exchange rings, usually made of gold or silver and worn on the third finger of the left or right hand, during the marriage ceremony. The circular shape of the ring is symbolic of the couple's eternal union. In Brazil, it is traditional to have the rings <b>engraved </b>with the bride's name on the groom\u2019s ring, and vice versa.<br>3. <i>Flowers</i>: Flowers play an important role in most weddings. Roses are said to be the flowers of love, and because they usually bloom in June, this has become the most popular month for weddings in many countries. After the wedding ceremony, in many countries the bride throws her bouquet into a crowd of well-wishers \u2013 usually her single female friends. The person who catches this bouquet will be the next one to marry.<br>4. <i>Gifts</i>: In Chinese cultures, wedding guests give gifts of money to the newly-weds in small red envelopes. Money is also an appropriate gift at Korean and Japanese wedding. In many Western countries, for example in the U.K, wedding guests give the bride and groom household items that <b>they </b>may need for their new home. In Russia, rather than receiving gifts, the bride and groom provide gifts to their guests instead.<br>5. With the continued internationalization of the modern world, wedding customs that originated in one part of the world are crossing national boundaries and have been incorporated into marriage ceremonies in other countries.<br><div style=\"text-align: right;\"><i>(Adapted from Active Skills for Reading 3)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 10467931, "lessonId": 0, "a": "Wedding customs in Asian countries", "b": "Wedding customs by country", "c": "Wedding celebration in different countries", "d": "Wedding preparation across many cultures", "bookId": 289413, "comments": 5, "bookmarks": 6, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Which of the following is the best title of the passage?", "answer": "<b>C\u00e2u h\u1ecfi: Ti\u00eau \u0111\u1ec1 n\u00e0o sau \u0111\u00e2y l\u00e0 ti\u00eau \u0111\u1ec1 hay nh\u1ea5t c\u1ee7a \u0111o\u1ea1n v\u0103n?<br></b>A. Phong t\u1ee5c c\u01b0\u1edbi h\u1ecfi \u1edf c\u00e1c n\u01b0\u1edbc ch\u00e2u \u00c1<br>B. Phong t\u1ee5c \u0111\u00e1m c\u01b0\u1edbi theo qu\u1ed1c gia<br>C. L\u1ec5 c\u01b0\u1edbi \u1edf c\u00e1c n\u01b0\u1edbc kh\u00e1c nhau<br>D. Chu\u1ea9n b\u1ecb \u0111\u00e1m c\u01b0\u1edbi \u1edf nhi\u1ec1u n\u1ec1n v\u0103n h\u00f3a<br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin \u1edf \u0111o\u1ea1n 1:<br></b>Marriage is an ancient religious and legal practice celebrated around the world. However, wedding customs vary from country to country. (<i>H\u00f4n nh\u00e2n l\u00e0 m\u1ed9t phong t\u1ee5c t\u1eadp qu\u00e1n t\u00f4n gi\u00e1o v\u00e0 ph\u00e1p l\u00fd c\u1ed5 x\u01b0a \u0111\u01b0\u1ee3c t\u1ed5 ch\u1ee9c tr\u00ean kh\u1eafp th\u1ebf gi\u1edbi. Tuy nhi\u00ean, phong t\u1ee5c \u0111\u00e1m c\u01b0\u1edbi \u1edf m\u1ed7i n\u01b0\u1edbc c\u00f3 s\u1ef1 kh\u00e1c nhau.</i>)", "key": "B", "isVideo": true, "score": 0, "order": 46, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21584260, "lessonId": 0, "a": "the tradition of wearing a white wedding dress started  about 150 years ago", "b": "brides can now wear dresses in various styles", "c": "wedding dresses are always white in all countries", "d": "brides in some countries wear red or orange dresses instead of white", "bookId": 1086232, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 2, all of the following are true except _____.", "answer": "<b>Theo \u0111o\u1ea1n 2, t\u1ea5t c\u1ea3 c\u00e1c c\u00e2u sau \u0111\u00e2y \u0111\u1ec1u \u0111\u00fang TR\u1eea _____.\n</b><br><b>A.</b> Truy\u1ec1n th\u1ed1ng m\u1eb7c v\u00e1y c\u01b0\u1edbi m\u00e0u tr\u1eafng b\u1eaft \u0111\u1ea7u t\u1eeb kho\u1ea3ng 150 n\u0103m tr\u01b0\u1edbc\n<br><b>B.</b> C\u00f4 d\u00e2u hi\u1ec7n nay c\u00f3 th\u1ec3 m\u1eb7c v\u00e1y theo nhi\u1ec1u ki\u1ec3u d\u00e1ng kh\u00e1c nhau\n<br><b>C.</b> V\u00e1y c\u01b0\u1edbi lu\u00f4n c\u00f3 m\u00e0u tr\u1eafng \u1edf m\u1ecdi qu\u1ed1c gia\n<br><b>D. </b>C\u00f4 d\u00e2u \u1edf m\u1ed9t s\u1ed1 qu\u1ed1c gia m\u1eb7c v\u00e1y m\u00e0u \u0111\u1ecf ho\u1eb7c cam thay v\u00ec v\u00e1y tr\u1eafng\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin sau:\n</b><br>\"In some Asian countries and in the Middle East, colors of joy and happiness like red or orange other than white are worn by the bride or used as part of the wedding ceremony.\" <br><i>(\u1ede m\u1ed9t s\u1ed1 n\u01b0\u1edbc ch\u00e2u \u00c1 v\u00e0 Trung \u0110\u00f4ng, nh\u1eefng m\u00e0u s\u1eafc mang \u00fd ngh\u0129a vui v\u1ebb v\u00e0 h\u1ea1nh ph\u00fac nh\u01b0 \u0111\u1ecf ho\u1eb7c cam, thay v\u00ec tr\u1eafng, th\u01b0\u1eddng \u0111\u01b0\u1ee3c c\u00f4 d\u00e2u m\u1eb7c ho\u1eb7c s\u1eed d\u1ee5ng trong l\u1ec5 c\u01b0\u1edbi.)\n</i><br>\u21d2 Ch\u1ee9ng minh r\u1eb1ng kh\u00f4ng ph\u1ea3i t\u1ea5t c\u1ea3 v\u00e1y c\u01b0\u1edbi \u0111\u1ec1u m\u00e0u tr\u1eafng. V\u00ec v\u1eady, ph\u01b0\u01a1ng \u00e1n C kh\u00f4ng \u0111\u00fang v\u1edbi n\u1ed9i dung \u0111o\u1ea1n v\u0103n.", "key": "C", "isVideo": false, "score": 0, "order": 47, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10467939, "lessonId": 0, "a": "painted", "b": "printed", "c": "stuck", "d": "carved", "bookId": 289415, "comments": 0, "bookmarks": 14, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The word \u201c<b>engraved</b>\" in paragraph 3 is closest in meaning to ___________.", "answer": "<b>C\u00e2u h\u1ecfi: T\u1eeb \u201cengraved\u201d \u1edf \u0111o\u1ea1n 3 g\u1ea7n ngh\u0129a nh\u1ea5t v\u1edbi ___________.<br></b>A. s\u01a1n<br>B. in<br>C. g\u1eafn<br>D. ch\u1ea1m kh\u1eafc<br><b>engraved</b> = <b>carved</b>: ch\u1ea1m kh\u1eafc<br><b>Th\u00f4ng tin \u1edf \u0111o\u1ea1n 3:</b><br>In Brazil, it is traditional to have the rings <b>engraved</b> with the bride's name on the groom\u2019s ring, and vice versa. (<i>\u1ede Brazil, theo truy\u1ec1n th\u1ed1ng, nh\u1eabn c\u00f3 <b>kh\u1eafc</b> t\u00ean c\u00f4 d\u00e2u tr\u00ean nh\u1eabn c\u1ee7a ch\u00fa r\u1ec3 v\u00e0 ng\u01b0\u1ee3c l\u1ea1i.</i>)", "key": "D", "isVideo": true, "score": 0, "order": 48, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21584261, "lessonId": 0, "a": "Roses represent everlasting unity and innocence.", "b": "Roses are commonly presented as gifts during marriage ceremonies.", "c": "The blooming season of roses make June a favored month for weddings.", "d": "In Western traditions, roses are mainly incorporated as decorative elements at weddings.", "bookId": 1086233, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 3, what is mentioned about roses in weddings?", "answer": "<b>Theo \u0111o\u1ea1n 3, \u0111i\u1ec1u g\u00ec \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp \u0111\u1ebfn trong \u0111\u00e1m c\u01b0\u1edbi v\u1ec1 hoa h\u1ed3ng?</b><br><b>A.</b> Hoa h\u1ed3ng t\u01b0\u1ee3ng tr\u01b0ng cho s\u1ef1 th\u1ed1ng nh\u1ea5t v\u00e0 ng\u00e2y th\u01a1 v\u0129nh c\u1eedu.<br><b>B.</b> Hoa h\u1ed3ng th\u01b0\u1eddng \u0111\u01b0\u1ee3c t\u1eb7ng l\u00e0m qu\u00e0 trong c\u00e1c bu\u1ed5i l\u1ec5 c\u01b0\u1edbi.<br><b>C.</b> M\u00f9a hoa h\u1ed3ng n\u1edf r\u1ed9 khi\u1ebfn th\u00e1ng 6 tr\u1edf th\u00e0nh th\u00e1ng \u0111\u01b0\u1ee3c \u01b0a chu\u1ed9ng cho c\u00e1c \u0111\u00e1m c\u01b0\u1edbi.<br><b>D.</b> Trong truy\u1ec1n th\u1ed1ng ph\u01b0\u01a1ng T\u00e2y, hoa h\u1ed3ng ch\u1ee7 y\u1ebfu \u0111\u01b0\u1ee3c k\u1ebft h\u1ee3p l\u00e0m y\u1ebfu t\u1ed1 trang tr\u00ed trong \u0111\u00e1m c\u01b0\u1edbi.<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin sau</b>:<br>\u201cRoses are said to be the flowers of love, and because they usually bloom in June, this has become the most popular month for weddings in many countries.\" <br><i>(Hoa h\u1ed3ng \u0111\u01b0\u1ee3c coi l\u00e0 lo\u00e0i hoa t\u01b0\u1ee3ng tr\u01b0ng cho t\u00ecnh y\u00eau, v\u00e0 v\u00ec ch\u00fang th\u01b0\u1eddng n\u1edf v\u00e0o th\u00e1ng S\u00e1u, \u0111\u00e2y \u0111\u00e3 tr\u1edf th\u00e0nh th\u00e1ng t\u1ed5 ch\u1ee9c \u0111\u00e1m c\u01b0\u1edbi ph\u1ed5 bi\u1ebfn nh\u1ea5t \u1edf nhi\u1ec1u qu\u1ed1c gia.)</i><br><br><b>\u21d2 Ph\u01b0\u01a1ng \u00e1n A sai</b>, v\u00ec \u0111o\u1ea1n v\u0103n kh\u00f4ng nh\u1eafc \u0111\u1ebfn s\u1ef1 g\u1eafn k\u1ebft v\u0129nh c\u1eedu (everlasting unity) hay s\u1ef1 trong tr\u1eafng (innocence).<br><b>\u21d2 Ph\u01b0\u01a1ng \u00e1n B sai</b>, v\u00ec kh\u00f4ng c\u00f3 th\u00f4ng tin n\u00e0o trong \u0111o\u1ea1n v\u0103n n\u00f3i r\u1eb1ng hoa h\u1ed3ng \u0111\u01b0\u1ee3c t\u1eb7ng nh\u01b0 qu\u00e0 c\u01b0\u1edbi.<br><b>\u21d2 Ph\u01b0\u01a1ng \u00e1n D sai</b>, v\u00ec \u0111o\u1ea1n v\u0103n kh\u00f4ng \u0111\u1ec1 c\u1eadp hoa h\u1ed3ng ch\u1ee7 y\u1ebfu \u0111\u01b0\u1ee3c d\u00f9ng \u0111\u1ec3 trang tr\u00ed trong \u0111\u00e1m c\u01b0\u1edbi ph\u01b0\u01a1ng T\u00e2y.", "key": "C", "isVideo": false, "score": 0, "order": 49, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21584263, "lessonId": 0, "a": "Guests present newlyweds with monetary gifts in red envelopes.", "b": "Gifts are often items for the couple's new home.", "c": "The guests do not give gifts at all.", "d": "Guests give the couple flowers as gifts.", "bookId": 1086234, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 5, what does the author imply about wedding gifts in China?", "answer": "<b>Trong \u0111o\u1ea1n 5, t\u00e1c gi\u1ea3 ng\u1ee5 \u00fd g\u00ec v\u1ec1 qu\u00e0 c\u01b0\u1edbi \u1edf Trung Qu\u1ed1c?\n<br>A.</b> Kh\u00e1ch t\u1eb7ng c\u00f4 d\u00e2u ch\u00fa r\u1ec3 nh\u1eefng m\u00f3n qu\u00e0 b\u1eb1ng ti\u1ec1n trong phong bao \u0111\u1ecf.\n<br><b>B.</b> Qu\u00e0 t\u1eb7ng th\u01b0\u1eddng l\u00e0 nh\u1eefng m\u00f3n \u0111\u1ed3 cho ng\u00f4i nh\u00e0 m\u1edbi c\u1ee7a c\u1eb7p \u0111\u00f4i\n<br><b>C. </b>Kh\u00e1ch kh\u00f4ng t\u1eb7ng qu\u00e0 g\u00ec c\u1ea3\n<br><b>D.</b> Kh\u00e1ch t\u1eb7ng hoa cho c\u1eb7p \u0111\u00f4i l\u00e0m qu\u00e0\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin sau:\n</b><br>\"In Chinese cultures, wedding guests give gifts of money to the newly-weds in small red envelopes.\" <br><i>(Trong v\u0103n h\u00f3a Trung Qu\u1ed1c, kh\u00e1ch m\u1eddi t\u1eb7ng ti\u1ec1n cho \u0111\u00f4i v\u1ee3 ch\u1ed3ng m\u1edbi c\u01b0\u1edbi trong nh\u1eefng phong bao l\u00ec x\u00ec \u0111\u1ecf.)\n</i><br><br><b>\u21d2 Ph\u01b0\u01a1ng \u00e1n B sai,</b> v\u00ec \u0111\u00e2y l\u00e0 phong t\u1ee5c \u1edf nhi\u1ec1u n\u01b0\u1edbc ph\u01b0\u01a1ng T\u00e2y nh\u01b0 Anh (UK), kh\u00f4ng ph\u1ea3i \u1edf Trung Qu\u1ed1c.\n<br><b>\u21d2 Ph\u01b0\u01a1ng \u00e1n C sai</b>, v\u00ec \u0111o\u1ea1n v\u0103n \u0111\u1ec1 c\u1eadp kh\u00e1ch m\u1eddi c\u00f3 t\u1eb7ng qu\u00e0, c\u1ee5 th\u1ec3 l\u00e0 ti\u1ec1n trong phong bao l\u00ec x\u00ec \u0111\u1ecf.\n<br><b>\u21d2 Ph\u01b0\u01a1ng \u00e1n D sai</b>, v\u00ec \u0111o\u1ea1n v\u0103n kh\u00f4ng \u0111\u1ec1 c\u1eadp \u0111\u1ebfn vi\u1ec7c t\u1eb7ng hoa l\u00e0m qu\u00e0 c\u01b0\u1edbi \u1edf Trung Qu\u1ed1c.", "key": "A", "isVideo": false, "score": 0, "order": 50, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21584264, "lessonId": 0, "a": "the bride's parents", "b": "married couples in general", "c": "the bride and groom", "d": "wedding guests", "bookId": 1086235, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The word <b>they </b>in paragraph 5 refers to which of the following?", "answer": "<b>T\u1eeb \"they\" trong \u0111o\u1ea1n 4 \u00e1m ch\u1ec9 \u0111\u1ebfn nh\u1eefng ng\u01b0\u1eddi n\u00e0o sau \u0111\u00e2y?\n</b><br><b>A.</b> cha m\u1eb9 c\u00f4 d\u00e2u\n<br><b>B.</b> c\u00e1c c\u1eb7p \u0111\u00f4i \u0111\u00e3 k\u1ebft h\u00f4n n\u00f3i chung\n<br><b>C.</b> c\u00f4 d\u00e2u v\u00e0 ch\u00fa r\u1ec3\n<br><b>D.</b> kh\u00e1ch d\u1ef1 ti\u1ec7c c\u01b0\u1edbi\n<br><br><b>C\u0103n c\u1ee9: </b><br>\u201cIn many Western countries, for example in the U.K, wedding guests give the bride and groom household items that they may need for their new home.\u201d <br><i>(\u1ede nhi\u1ec1u n\u01b0\u1edbc ph\u01b0\u01a1ng T\u00e2y, v\u00ed d\u1ee5 nh\u01b0 \u1edf Anh, kh\u00e1ch m\u1eddi th\u01b0\u1eddng t\u1eb7ng c\u00f4 d\u00e2u ch\u00fa r\u1ec3 nh\u1eefng m\u00f3n \u0111\u1ed3 gia d\u1ee5ng m\u00e0 h\u1ecd c\u00f3 th\u1ec3 c\u1ea7n cho t\u1ed5 \u1ea5m m\u1edbi.)</i>", "key": "C", "isVideo": false, "score": 0, "order": 51, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21584265, "lessonId": 0, "a": "Customs from one culture are increasingly adopted by others.", "b": "The young generation has broken traditional practices regarding weddings.", "c": "Wedding ceremonies are becoming simpler and less formal.", "d": "The exchange of gifts has replaced other traditions globally.", "bookId": 1086236, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Based on paragraph 6, how has the modern world influenced wedding traditions?", "answer": "<b>D\u1ef1a tr\u00ean \u0111o\u1ea1n 6, th\u1ebf gi\u1edbi hi\u1ec7n \u0111\u1ea1i \u0111\u00e3 \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn c\u00e1c truy\u1ec1n th\u1ed1ng \u0111\u00e1m c\u01b0\u1edbi nh\u01b0 th\u1ebf n\u00e0o?\n</b><br><b>A.</b> C\u00e1c phong t\u1ee5c t\u1eeb m\u1ed9t n\u1ec1n v\u0103n h\u00f3a ng\u00e0y c\u00e0ng \u0111\u01b0\u1ee3c c\u00e1c n\u1ec1n v\u0103n h\u00f3a kh\u00e1c \u00e1p d\u1ee5ng.\n<br><b>B.</b> Th\u1ebf h\u1ec7 tr\u1ebb \u0111\u00e3 ph\u00e1 v\u1ee1 c\u00e1c t\u1eadp t\u1ee5c truy\u1ec1n th\u1ed1ng li\u00ean quan \u0111\u1ebfn \u0111\u00e1m c\u01b0\u1edbi.\n<br><b>C.</b> C\u00e1c nghi l\u1ec5 c\u01b0\u1edbi \u0111ang tr\u1edf n\u00ean \u0111\u01a1n gi\u1ea3n h\u01a1n v\u00e0 \u00edt trang tr\u1ecdng h\u01a1n.\n<br><b>D. </b>Vi\u1ec7c trao \u0111\u1ed5i qu\u00e0 t\u1eb7ng \u0111\u00e3 thay th\u1ebf c\u00e1c truy\u1ec1n th\u1ed1ng kh\u00e1c tr\u00ean to\u00e0n c\u1ea7u.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin sau:\n</b><br>\"With the continued internationalization of the modern world, wedding customs that originated in one part of the world are crossing national boundaries and have been incorporated into marriage ceremonies in other countries.\" <br><i>(V\u1edbi s\u1ef1 h\u1ed9i nh\u1eadp qu\u1ed1c t\u1ebf ng\u00e0y c\u00e0ng t\u0103ng c\u1ee7a th\u1ebf gi\u1edbi hi\u1ec7n \u0111\u1ea1i, nh\u1eefng phong t\u1ee5c c\u01b0\u1edbi b\u1eaft ngu\u1ed3n t\u1eeb m\u1ed9t khu v\u1ef1c tr\u00ean th\u1ebf gi\u1edbi \u0111ang v\u01b0\u1ee3t qua ranh gi\u1edbi qu\u1ed1c gia v\u00e0 \u0111\u01b0\u1ee3c k\u1ebft h\u1ee3p v\u00e0o c\u00e1c nghi l\u1ec5 c\u01b0\u1edbi \u1edf c\u00e1c n\u01b0\u1edbc kh\u00e1c.)\n</i><br><br><b>\u21d2 Ph\u01b0\u01a1ng \u00e1n B sai</b>, v\u00ec \u0111o\u1ea1n v\u0103n kh\u00f4ng \u0111\u1ec1 c\u1eadp \u0111\u1ebfn th\u1ebf h\u1ec7 tr\u1ebb t\u1eeb b\u1ecf phong t\u1ee5c truy\u1ec1n th\u1ed1ng m\u00e0 ch\u1ec9 n\u00f3i v\u1ec1 s\u1ef1 giao thoa gi\u1eefa c\u00e1c phong t\u1ee5c c\u01b0\u1edbi c\u1ee7a c\u00e1c n\u1ec1n v\u0103n h\u00f3a kh\u00e1c nhau.\n<br><b>\u21d2 Ph\u01b0\u01a1ng \u00e1n C sai</b>, v\u00ec kh\u00f4ng c\u00f3 th\u00f4ng tin n\u00e0o trong \u0111o\u1ea1n 6 n\u00f3i r\u1eb1ng \u0111\u00e1m c\u01b0\u1edbi ng\u00e0y nay \u0111\u01a1n gi\u1ea3n h\u01a1n hay \u00edt trang tr\u1ecdng h\u01a1n m\u00e0 ch\u1ec9 nh\u1ea5n m\u1ea1nh v\u00e0o s\u1ef1 pha tr\u1ed9n c\u00e1c phong t\u1ee5c c\u01b0\u1edbi gi\u1eefa c\u00e1c qu\u1ed1c gia.\n<br><b>\u21d2 Ph\u01b0\u01a1ng \u00e1n D sai</b>, v\u00ec \u0111o\u1ea1n v\u0103n kh\u00f4ng n\u00f3i r\u1eb1ng t\u1eb7ng qu\u00e0 \u0111\u00e3 thay th\u1ebf t\u1ea5t c\u1ea3 c\u00e1c phong t\u1ee5c c\u01b0\u1edbi kh\u00e1c tr\u00ean to\u00e0n c\u1ea7u.", "key": "A", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully.", "content": "1. Children in developing countries are healthier and more likely to survive past the age of five when their mothers can read and write. Experts in public health accepted this idea decades ago, but until now, no one has been able to show that a woman's ability to read in itself improves her children's chances of survival.<br>2. In 1979, the government of Nicaragua established a number of social programmes, including a National Literacy Crusade. By 1985, about 300,000 illiterate adults from all over the country, many of whom had never attended primary school, had learnt how to read, write and use numbers. During this period, researchers interviewed nearly 3,000 women, some of whom had learnt to read as children, some during the literacy crusade and some who had never learnt at all. The women were asked how many children they had given birth to and how many of them had died in infancy.<br>3. In the late 1970s, the infant mortality rate for the children of illiterate mothers was around 110 deaths per thousand live births. At this point in their lives, those mothers who later went on to learn to read had a similar level of child mortality (105/1000). For women educated in primary school, however, the infant mortality rate was significantly lower, at 80 per thousand.<br>4. In 1985, after the National Literacy Crusade had ended, the infant mortality figures for those who remained illiterate and for those educated in primary school remained more or less unchanged. For those women who learnt to read through the campaign, the infant mortality rate was 84 per thousand, an <b>impressive </b>21 points lower than for those women who were still illiterate.<br>5. The Nicaraguan study may have important implications for governments and aid agencies that need to know where to direct their resources. The results of the study lend support to the World Bank's recommendation that education budgets in developing countries should be increased, not just to help their economies, but also to improve child health. 'We've known for a long time that maternal education is important,' says John Cleland of the London School of Hygiene and Tropical Medicine. 'But we thought that even if we started educating girls today, we'd have to wait a generation for the pay-off. The Nicaraguan study suggests we may be able to bypass <b>that</b>.'<br><div style=\"text-align: right;\"><i>(Source: ieltstutor)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21584267, "lessonId": 0, "a": "How Primary School Education Reduces Infant Mortality", "b": "Maternal Literacy and Child Survival: Evidence from Nicaragua", "c": "The History of the Nicaraguan National Literacy Crusade", "d": "Government Spending on Education in Developing Countries", "bookId": 1086237, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title of the passage can be _______.", "answer": "<b>Ti\u00eau \u0111\u1ec1 hay nh\u1ea5t cho \u0111o\u1ea1n v\u0103n c\u00f3 th\u1ec3 l\u00e0 _______.\n</b><br><b>A.</b> C\u00e1ch gi\u00e1o d\u1ee5c ti\u1ec3u h\u1ecdc l\u00e0m gi\u1ea3m t\u1ef7 l\u1ec7 t\u1eed vong \u1edf tr\u1ebb s\u01a1 sinh\n<br><b>=&gt; Sai</b> v\u00ec \u0111o\u1ea1n v\u0103n kh\u00f4ng ch\u1ec9 n\u00f3i v\u1ec1 gi\u00e1o d\u1ee5c ti\u1ec3u h\u1ecdc, m\u00e0 t\u1eadp trung v\u00e0o kh\u1ea3 n\u0103ng bi\u1ebft \u0111\u1ecdc c\u1ee7a ng\u01b0\u1eddi m\u1eb9\n\n\n<br><br><b>B.</b> Tr\u00ecnh \u0111\u1ed9 bi\u1ebft ch\u1eef c\u1ee7a m\u1eb9 v\u00e0 s\u1ef1 s\u1ed1ng s\u00f3t c\u1ee7a tr\u1ebb em: B\u1eb1ng ch\u1ee9ng t\u1eeb Nicaragua\n<br><b>=&gt; \u0110\u00fang</b> v\u00ec \u0111\u00e2y l\u00e0 <b>\u00fd ch\u00ednh bao qu\u00e1t to\u00e0n b\u00e0i</b>. B\u00e0i vi\u1ebft n\u00f3i v\u1ec1 <b>m\u1ed1i li\u00ean h\u1ec7 gi\u1eefa kh\u1ea3 n\u0103ng \u0111\u1ecdc c\u1ee7a ng\u01b0\u1eddi m\u1eb9 v\u00e0 t\u1ef7 l\u1ec7 s\u1ed1ng s\u00f3t c\u1ee7a tr\u1ebb</b>, d\u1ef1a tr\u00ean <b>nghi\u00ean c\u1ee9u t\u1ea1i Nicaragua</b>.\n\n\n<br><br><b>C. </b>L\u1ecbch s\u1eed c\u1ee7a Cu\u1ed9c v\u1eadn \u0111\u1ed9ng X\u00f3a m\u00f9 ch\u1eef Qu\u1ed1c gia \u1edf Nicaragua\n<br><b>=&gt; Sai</b> v\u00ec b\u00e0i kh\u00f4ng k\u1ec3 l\u1ea1i l\u1ecbch s\u1eed chi ti\u1ebft m\u00e0 ch\u1ec9 nh\u1eafc \u0111\u1ebfn chi\u1ebfn d\u1ecbch n\u00e0y nh\u01b0 m\u1ed9t ph\u1ea7n c\u1ee7a nghi\u00ean c\u1ee9u.\n\n\n<br><br><b>D.</b> Chi ti\u00eau c\u1ee7a ch\u00ednh ph\u1ee7 cho gi\u00e1o d\u1ee5c \u1edf c\u00e1c n\u01b0\u1edbc \u0111ang ph\u00e1t tri\u1ec3n\n<br><b>=&gt; Sai</b> v\u00ec \u0111\u00e2y ch\u1ec9 l\u00e0 h\u1ec7 qu\u1ea3 cu\u1ed1i b\u00e0i ch\u1ee9 kh\u00f4ng ph\u1ea3i tr\u1ecdng t\u00e2m.\n\n<br><br><b>Gi\u1ea3i th\u00edch:\n</b><br><b>\u0110o\u1ea1n 1\u20132:</b> Gi\u1edbi thi\u1ec7u t\u1ea7m quan tr\u1ecdng c\u1ee7a gi\u00e1o d\u1ee5c m\u1eb9 trong vi\u1ec7c gi\u1ea3m t\u1eed vong tr\u1ebb em.\n\n\n<br><b>\u0110o\u1ea1n 3\u20134:</b> Tr\u00ecnh b\u00e0y nghi\u00ean c\u1ee9u t\u1ea1i <b>Nicaragua</b>, so s\u00e1nh t\u1ef7 l\u1ec7 t\u1eed vong tr\u01b0\u1edbc v\u00e0 sau chi\u1ebfn d\u1ecbch x\u00f3a m\u00f9 ch\u1eef.\n\n\n<br><b>\u0110o\u1ea1n 5: </b>Kh\u1eb3ng \u0111\u1ecbnh l\u1ee3i \u00edch r\u00f5 r\u1ec7t c\u1ee7a vi\u1ec7c m\u1eb9 bi\u1ebft ch\u1eef v\u00e0 khuy\u1ebfn ngh\u1ecb ch\u00ednh ph\u1ee7 t\u0103ng \u0111\u1ea7u t\u01b0 cho gi\u00e1o d\u1ee5c.\n<br>=&gt; B\u00e0i t\u1eadp trung v\u00e0o <b>m\u1ed1i li\u00ean h\u1ec7 gi\u1eefa kh\u1ea3 n\u0103ng ore": 0, "order": 54, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21584272, "lessonId": 0, "a": "To reduce infant mortality rates across Nicaragua", "b": "To collect data for a nationwide study on women\u2019s literacy and child health", "c": "To expand primary school enrollment for children", "d": "To provide basic literacy and numeracy skills to adults", "bookId": 1086239, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What was the main objective of the National Literacy Crusade?", "answer": "<b>M\u1ee5c ti\u00eau ch\u00ednh c\u1ee7a Cu\u1ed9c v\u1eadn \u0111\u1ed9ng X\u00f3a m\u00f9 ch\u1eef Qu\u1ed1c gia l\u00e0 g\u00ec?\n</b><br><b>A.</b> Gi\u1ea3m t\u1ef7 l\u1ec7 t\u1eed vong \u1edf tr\u1ebb s\u01a1 sinh tr\u00ean to\u00e0n Nicaragua\n<br><b>=&gt; Sai</b> v\u00ec chi\u1ebfn d\u1ecbch \u0111\u01b0\u1ee3c t\u1ea1o ra \u0111\u1ec3 d\u1ea1y \u0111\u1ecdc v\u00e0 vi\u1ebft, kh\u00f4ng nh\u1eb1m gi\u1ea3m t\u1eed vong tr\u1ebb em\n\n\n<br><br><b>B. </b>Thu th\u1eadp d\u1eef li\u1ec7u cho m\u1ed9t nghi\u00ean c\u1ee9u to\u00e0n qu\u1ed1c v\u1ec1 tr\u00ecnh \u0111\u1ed9 bi\u1ebft ch\u1eef c\u1ee7a ph\u1ee5 n\u1eef v\u00e0 s\u1ee9c kh\u1ecfe tr\u1ebb em\n<br><b>=&gt;  Sai</b>, v\u00ec chi\u1ebfn d\u1ecbch c\u00f3 m\u1ee5c \u0111\u00edch gi\u00e1o d\u1ee5c, kh\u00f4ng ph\u1ea3i nghi\u00ean c\u1ee9u khoa h\u1ecdc.\n\n\n<br><br><b>C.</b> M\u1edf r\u1ed9ng tuy\u1ec3n sinh ti\u1ec3u h\u1ecdc cho tr\u1ebb em\n<br><b>=&gt; Sai</b>, v\u00ec \u0111\u1ed1i t\u01b0\u1ee3ng c\u1ee7a chi\u1ebfn d\u1ecbch l\u00e0 ng\u01b0\u1eddi l\u1edbn m\u00f9 ch\u1eef, kh\u00f4ng ph\u1ea3i tr\u1ebb em ti\u1ec3u h\u1ecdc.\n\n\n<br><br><b>D.</b> Cung c\u1ea5p c\u00e1c k\u1ef9 n\u0103ng \u0111\u1ecdc, vi\u1ebft v\u00e0 t\u00ednh to\u00e1n c\u01a1 b\u1ea3n cho ng\u01b0\u1eddi l\u1edbn\n<br><b>=&gt; \u0110\u00fang\n</b><br><br><b  and for those educated in primary school remained more or less unchanged.\u201d \n<br><i>(\u0110\u1ebfn n\u0103m 1985, sau khi Chi\u1ebfn d\u1ecbch X\u00f3a m\u00f9 ch\u1eef Qu\u1ed1c gia k\u1ebft th\u00fac, t\u1ef7 l\u1ec7 t\u1eed vong tr\u1ebb s\u01a1 sinh c\u1ee7a nh\u1eefng ph\u1ee5 n\u1eef v\u1eabn m\u00f9 ch\u1eef v\u00e0 nh\u1eefng ng\u01b0\u1eddi \u0111\u01b0\u1ee3c gi\u00e1o d\u1ee5c \u1edf ti\u1ec3u h\u1ecdc v\u1eabn g\u1ea7n nh\u01b0 kh\u00f4ng thay \u0111\u1ed5i.)\n\n\n</i><br><br><b>B.</b> T\u1ef7 l\u1ec7 n\u00e0y gi\u1ea3m \u1edf nh\u1eefng ph\u1ee5 n\u1eef tr\u1edf n\u00ean bi\u1ebft ch\u1eef nh\u1edd chi\u1ebfn d\u1ecbch.\n<br><b>=&gt; \u0110\u00fang\n</b><br><b>C\u0103n c\u1ee9 \u0111o\u1ea1n 4: </b><br>For those women who learnt to read through the campaign, the infant mortality rate was 84 per thousand, an impressive 21 points lower than for those women who were still illiterate.\n<br><i>(\u0110\u1ed1i v\u1edbi nh\u1eefng ph\u1ee5 n\u1eef h\u1ecdc \u0111\u1ecdc qua chi\u1ebfn d\u1ecbch n\u00e0y, t\u1ef7 l\u1ec7 t\u1eed vong tr\u1ebb s\u01a1 sinh gi\u1ea3m xu\u1ed1ng c\u00f2n 84 tr\u00ean 1.000, gi\u1ea3m 21 \u0111i\u1ec3m r\u1ea5t \u0111\u00e1ng k\u1ec3 so v\u1edbi nh\u00f3m ph\u1ee5 n\u1eef v\u1eabn c\u00f2n m\u00f9 ch\u1eef.)\n\n</i><br><br><b>C.</b> T\u1ef7 l\u1ec7 n\u00e0y t\u0103ng \u1edf nh\u1eefng ph\u1ee5 n\u1eef \u0111\u00e3 ho\u00e0n th\u00e0nh ch\u01b0\u01a1ng tr\u00ecnh ti\u1ec3u h\u1ecdc.\n<br><b>=&gt; Sai</b>, kh\u00f4ng t\u0103ng\n<br><b>C\u0103n c\u1ee9: </b><br>\u201cIn 1985, after the National Literacy Crusade had ended, the infant mortality figures for those who remained illiterate and for those educated in primary school remained more or less unchanged.\u201d \n<br><i>(\u0110\u1ebfn n\u0103m 1985, sau khi Chi\u1ebfn d\u1ecbch X\u00f3a m\u00f9 ch\u1eef Qu\u1ed1c gia k\u1ebft th\u00fac, t\u1ef7 l\u1ec7 t\u1eed vong tr\u1ebb s\u01a1 sinh c\u1ee7a nh\u1eefng ph\u1ee5 n\u1eef v\u1eabn m\u00f9 ch\u1eef v\u00e0 nh\u1eefng ng\u01b0\u1
