        const EXAM_DATA = [{"title": "", "content": "", "listQuestion": [{"questionId": 21597131, "lessonId": 0, "a": "Tr\u1eddi k\u00e9o m\u00e2y \u00f9n \u00f9n.", "b": "Gi\u00f3 \u00e2m \u00e2m b\u1ed1n b\u00ean.", "c": "Th\u1ea7n S\u1ea5m, th\u1ea7n S\u00e9t th\u00e9t g\u00e0o.", "d": "M\u00e2y k\u00e9o ch\u1ed3ng t\u1eebng m\u1ea3ng.", "bookId": 1088260, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u0110\u1ed3n r\u1eb1ng khi \u0111\u00f3<br>Tr\u1eddi k\u00e9o m\u00e2y \u00f9n \u00f9n<br>Tr\u1eddi \u0111\u00f9n m\u00e2y k\u00ecn k\u00ecn<br>Gi\u00f3 \u00e2m \u00e2m b\u1ed1n b\u00ean<br>M\u00e2y \u00f9n l\u00ean t\u1eebng \u0111\u1ed1ng<br>M\u00e2y k\u00e9o ch\u1ed3ng t\u1eebng m\u1ea3ng<br>M\u01b0a m\u01b0a, m\u00e2y gi\u00f3<br>M\u00e2y \u0111en, m\u00e2y v\u00e0ng<br>Nghe c\u01a1n gi\u00f3 v\u00f9 v\u00f9<br>Nghe \u00f9 \u00f9 c\u01a1n m\u01b0a<br>Ti\u1ebfng th\u1ea7n S\u1ea5m th\u00e9t xu\u1ed1ng<br>N\u1eef th\u1ea7n S\u00e9t xu\u1ed1ng g\u00e0o<br>\u0110\u1ea7u \u0111\u00eam m\u01b0a to b\u1eb1ng h\u1ed9t c\u00e0<br>S\u00e1ng ra m\u01b0a to b\u1eb1ng qu\u1ea3 b\u01b0\u1edfi\u201d</i><br><div style=\"text-align: right;\">(S\u1eed thi d\u00e2n t\u1ed9c M\u01b0\u1eddng, <i>\u0110\u1ebb \u0111\u1ea5t \u0111\u1ebb n\u01b0\u1edbc</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>Chi ti\u1ebft n\u00e0o sau \u0111\u00e2y l\u00e0 chi ti\u1ebft k\u00ec \u1ea3o?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft k\u00ec \u1ea3o trong \u0111o\u1ea1n tr\u00edch l\u00e0 \u201cTh\u1ea7n S\u1ea5m, th\u1ea7n S\u00e9t th\u00e9t g\u00e0o\u201d, v\u00ec \u0111\u00e2y l\u00e0 h\u00ecnh \u1ea3nh nh\u00e2n h\u00f3a hi\u1ec7n t\u01b0\u1ee3ng s\u1ea5m s\u00e9t, g\u00e1n cho n\u00f3 h\u00ecnh \u1ea3nh m\u1ed9t nh\u1eefng v\u1ecb th\u1ea7n \u0111\u1ea7y uy l\u1ef1c nh\u1eb1m gi\u1ea3i th\u00edch hi\u1ec7n t\u01b0\u1ee3ng t\u1ef1 nhi\u00ean.\n", "key": "C", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597133, "lessonId": 0, "a": "Cu\u1ed9c giao tranh c\u1ee7a hai con tr\u00e2u th\u1ea7n.", "b": "Gi\u1edbi thi\u1ec7u nh\u00e2n v\u1eadt Y\u1ebft Ki\u00eau c\u00f9ng s\u1ef1 phi th\u01b0\u1eddng, \u0111\u1eb7c bi\u1ec7t c\u1ee7a \u00f4ng.", "c": "T\u00e1c d\u1ee5ng k\u00ec di\u1ec7u c\u1ee7a nh\u1eefng chi\u1ebfc l\u00f4ng tr\u00e2u.", "d": "S\u1ef1 n\u1ec3 ph\u1ee5c c\u1ee7a m\u1ecdi ng\u01b0\u1eddi \u0111\u1ed1i v\u1edbi Y\u1ebft Ki\u00eau.", "bookId": 1088261, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNg\u00e0y x\u01b0a c\u00f3 m\u1ed9t ng\u01b0\u1eddi t\u00ean l\u00e0 Y\u1ebft Ki\u00eau \u1edf l\u00e0ng H\u1ea1-b\u00ec l\u00e0m ngh\u1ec1 \u0111\u00e1nh c\u00e1.<br>M\u1ed9t h\u00f4m, \u00f4ng ta \u0111i d\u1ecdc theo b\u1edd bi\u1ec3n v\u1ec1 l\u00e0ng b\u1ed7ng th\u1ea5y tr\u00ean b\u00e3i c\u00f3 hai con tr\u00e2u \u0111ang gh\u00ec s\u1eebng h\u00fac nhau d\u01b0\u1edbi b\u00f3ng tr\u0103ng khuya. S\u1eb5n \u0111\u00f2n \u1ed1ng, \u00f4ng c\u1ea7m x\u00f4ng l\u1ea1i phang m\u1ea1nh m\u1ea5y c\u00e1i v\u00e0o m\u00ecnh ch\u00fang n\u00f3. T\u1ef1 d\u01b0ng hai con tr\u00e2u ch\u1ea1y xu\u1ed1ng bi\u1ec3n r\u1ed3i bi\u1ebfn m\u1ea5t. \u00d4ng r\u1ea5t kinh ng\u1ea1c \u0111o\u00e1n bi\u1ebft l\u00e0 tr\u00e2u th\u1ea7n. Khi nh\u00ecn l\u1ea1i \u0111\u00f2n \u1ed1ng th\u00ec th\u1ea5y c\u00f3 m\u1ea5y c\u00e1i l\u00f4ng tr\u00e2u d\u00ednh v\u00e0o \u0111\u1ea5y. \u00d4ng m\u1eebng qu\u00e1 b\u1ecf v\u00e0o mi\u1ec7ng nu\u1ed1t \u0111i.<br>T\u1eeb \u0111\u00f3 s\u1ee9c kh\u1ecfe c\u1ee7a Y\u1ebft Ki\u00eau v\u01b0\u1ee3t h\u1eb3n m\u1ecdi ng\u01b0\u1eddi, kh\u00f4ng m\u1ed9t ai d\u00e1m \u0111\u01b0\u01a1ng \u0111\u1ecbch. \u0110\u1eb7c bi\u1ec7t l\u00e0 c\u00f3 t\u00e0i l\u1ed9i n\u01b0\u1edbc. M\u1ed7i l\u1ea7n \u00f4ng l\u1eb7n xu\u1ed1ng bi\u1ec3n b\u1eaft c\u00e1, ng\u01b0\u1eddi ta c\u1ee9 t\u01b0\u1edfng nh\u01b0 \u00f4ng \u0111i tr\u00ean \u0111\u1ea5t li\u1ec1n. Nhi\u1ec1u khi \u00f4ng s\u1ed1ng \u1edf d\u01b0\u1edbi n\u01b0\u1edbc lu\u00f4n s\u00e1u b\u1ea3y ng\u00e0y m\u1edbi l\u00ean.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u0110\u1ed5ng Chi, <i>Y\u1ebft Ki\u00eau</i>, theo <i>Kho t\u00e0ng truy\u1ec7n c\u1ed5 t\u00edch Vi\u1ec7t Nam</i>, t\u1eadp 1, NXB Gi\u00e1o d\u1ee5c, 2000)</div>N\u1ed9i dung ch\u00ednh c\u1ee7a \u0111o\u1ea1n tr\u00edch tr\u00ean l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch ch\u1ee7 y\u1ebfu t\u1eadp trung gi\u1edbi thi\u1ec7u v\u1ec1 nh\u00e2n v\u1eadt Y\u1ebft Ki\u00eau v\u00e0 nh\u1eefng kh\u1ea3 n\u0103ng phi th\u01b0\u1eddng c\u1ee7a \u00f4ng, \u0111\u1eb7c bi\u1ec7t l\u00e0 t\u00e0i l\u1ed9i n\u01b0\u1edbc.\n", "key": "B", "isVideo": true, "score": 0, "order": 2, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597137, "lessonId": 0, "a": "B\u00e0i th\u01a1 \u0111\u01b0\u1ee3c vi\u1ebft theo th\u1ec3 th\u01a1 th\u1ea5t ng\u00f4n b\u00e1t c\u00fa \u0110\u01b0\u1eddng lu\u1eadt.", "b": "H\u00ecnh t\u01b0\u1ee3ng nh\u00e2n v\u1eadt trong b\u00e0i th\u01a1 l\u00e0 ng\u01b0\u1eddi ph\u1ee5 n\u1eef trong ki\u1ebfp ph\u1eadn chung ch\u1ed3ng.", "c": "Ng\u00f4n ng\u1eef b\u00e0i th\u01a1 trang tr\u1ecdng, c\u1ed5 \u0111i\u1ec3n.", "d": "D\u00f2ng th\u01a1 th\u1ee9 hai mang \u00e2m \u0111i\u1ec7u ph\u1eabn u\u1ea5t.", "bookId": 1088262, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cK\u1ebb \u0111\u1eafp ch\u0103n b\u00f4ng, k\u1ebb l\u1ea1nh l\u00f9ng,<br>Ch\u00e9m cha c\u00e1i ki\u1ebfp l\u1ea5y ch\u1ed3ng chung.<br>N\u0103m th\u00ec m\u01b0\u1eddi ho\u1ea1 hay ch\u0103ng ch\u1edb,<br>M\u1ed9t th\u00e1ng \u0111\u00f4i l\u1ea7n c\u00f3 c\u0169ng kh\u00f4ng.<br>C\u1ed1 \u0111\u1ea5m \u0103n x\u00f4i x\u00f4i l\u1ea1i h\u1ea9m,<br>C\u1ea7m b\u1eb1ng l\u00e0m m\u01b0\u1edbn, m\u01b0\u1edbn kh\u00f4ng c\u00f4ng.<br>Th\u00e2n n\u00e0y v\u00ed bi\u1ebft d\u01b0\u1eddng n\u00e0y nh\u1ec9,<br>Th\u00e0 tr\u01b0\u1edbc th\u00f4i \u0111\u00e0nh \u1edf v\u1eady xong.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Xu\u00e2n H\u01b0\u01a1ng, <i>L\u1ea5y ch\u1ed3ng chung</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Nh\u1eadn \u0111\u1ecbnh n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>\u0111\u00fang v\u1edbi b\u00e0i th\u01a1?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nNg\u00f4n ng\u1eef trong b\u00e0i th\u01a1 \u201cL\u1ea5y ch\u1ed3ng chung\u201d c\u1ee7a H\u1ed3 Xu\u00e2n H\u01b0\u01a1ng r\u1ea5t d\u00e2n d\u00e3, \u0111\u1eddi th\u01b0\u1eddng, g\u1ea7n g\u0169i v\u1edbi ng\u00f4n ng\u1eef giao ti\u1ebfp h\u00e0ng ng\u00e0y. C\u00e1ch d\u00f9ng t\u1eeb ng\u1eef m\u1ed9c m\u1ea1c, mang \u0111\u1eadm t\u00ednh kh\u1ea9u ng\u1eef nh\u01b0 \u201cch\u00e9m cha\u201d, \u201cc\u1ed1 \u0111\u1ea5m \u0103n x\u00f4i\u201d, \u201cm\u01b0\u1edbn kh\u00f4ng c\u00f4ng\u2026 g\u00f3p ph\u1ea7n kh\u1eafc h\u1ecda r\u00f5 n\u00e9t n\u1ed7i kh\u1ed5 c\u1ee7a ng\u01b0\u1eddi ph\u1ee5 n\u1eef trong x\u00e3 h\u1ed9i phong ki\u1ebfn.<br>\n\u2192 Nh\u1eadn \u0111\u1ecbnh kh\u00f4ng \u0111\u00fang v\u1edbi b\u00e0i th\u01a1 l\u00e0: ng\u00f4n ng\u1eef b\u00e0i th\u01a1 trang tr\u1ecdng, c\u1ed5 \u0111i\u1ec3n.\n", "key": "C", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597139, "lessonId": 0, "a": "Vua Tr\u1ea7n l\u00e0m l\u1ec5 c\u1ea7u t\u1ef1.", "b": "Chi\u00eau V\u0103n tr\u1ed5 t\u00e0i n\u0103n xu\u1ea5t ch\u00fang.", "c": "H\u1eadu cung c\u1ee7a Tr\u1ea7n Th\u00e1i V\u01b0\u01a1ng h\u1ea1 sinh qu\u00fd t\u1eed.", "d": "Th\u01b0\u1ee3ng \u0111\u1ebf cho Chi\u00eau V\u0103n \u0111\u1ed3ng t\u1eed gi\u00e1ng sinh l\u00e0m con trai Tr\u1ea7n Th\u00e1i V\u01b0\u01a1ng.", "bookId": 1088263, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u1ede cung Th\u00e1i Thanh x\u1ee9 Giao Ch\u1ec9 c\u00f3 m\u1ed9t \u0111\u1ea1o s\u0129 t\u00ean l\u00e0 \u0110\u1ea1o Th\u1eadm, v\u00e0o kho\u1ea3ng n\u0103m Ch\u00ed Nguy\u00ean \u0111\u1eddi Nguy\u00ean Th\u1ebf T\u1ed5 l\u00e0m l\u1ec5 c\u1ea7u t\u1ef1 cho Tr\u1ea7n Th\u00e1i V\u01b0\u01a1ng. Khi \u0111\u1ecdc s\u1edb xong, \u0110\u1ea1o Th\u1eadm t\u00e2u v\u1edbi vua r\u1eb1ng:<br>- Th\u01b0\u1ee3ng \u0111\u1ebf \u0111\u00e3 ch\u1ea5p nh\u1eadn s\u1edb t\u00e2u, s\u1ebd sai Chi\u00eau V\u0103n \u0111\u1ed3ng t\u1eed gi\u00e1ng sinh n\u01a1i cung vua, \u1edf \u0111\u00e2y b\u1ed1n k\u1ec9 .<br>R\u1ed3i H\u1eadu cung c\u00f3 mang, qu\u1ea3 nhi\u00ean sinh con trai, tr\u00ean c\u00e1nh tay c\u00f3 ch\u1eef \u201cChi\u00eau V\u0103n \u0111\u1ed3ng t\u1eed\u201d, n\u00e9t kh\u00e1 r\u00f5 r\u00e0ng , nh\u00e2n \u0111\u00f3 l\u1ea5y hi\u1ec7u l\u00e0 \u201cChi\u00eau V\u0103n\u201d . Khi tu\u1ed5i \u0111\u00e3 l\u1edbn, n\u00e9t ch\u1eef m\u1edbi m\u1ea5t \u0111i.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Nguy\u00ean Tr\u1eebng, <i>T\u1edd t\u1ea5u Thi\u00ean \u0111\u00ecnh \u1ee9ng nghi\u1ec7m</i>, theo <i>Nam \u00d4ng m\u1ed9ng l\u1ee5c</i>, NXB V\u0103n h\u1ecdc 2008)</div>\u0110o\u1ea1n tr\u00edch tr\u00ean <b>kh\u00f4ng </b>vi\u1ebft v\u1ec1 s\u1ef1 vi\u1ec7c n\u00e0o sau \u0111\u00e2y?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch t\u1eadp trung k\u1ec3 v\u1ec1 c\u00e2u chuy\u1ec7n vua Tr\u1ea7n Th\u00e1i T\u00f4ng l\u00e0m l\u1ec5 c\u1ea7u t\u1ef1 v\u00e0 s\u1ef1 ra \u0111\u1eddi c\u1ee7a con trai m\u00ecnh - Chi\u00eau V\u0103n V\u01b0\u01a1ng Tr\u1ea7n Nh\u1eadt Du\u1eadt. Tuy nhi\u00ean, \u0111o\u1ea1n tr\u00edch ch\u1ec9 d\u1eebng l\u1ea1i \u1edf vi\u1ec7c k\u1ec3 l\u1ea1i c\u00e2u chuy\u1ec7n v\u1ec1 s\u1ef1 ra \u0111\u1eddi k\u00ec l\u1ea1 ch\u1ee9 kh\u00f4ng \u0111\u1ec1 c\u1eadp \u0111\u1ebfn vi\u1ec7c Chi\u00eau V\u0103n tr\u1ed5 t\u00e0i n\u0103ng xu\u1ea5t ch\u00fang.\n", "key": "B", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597145, "lessonId": 0, "a": "\u201cv\u1ea1n t\u1ed9i\u201d.", "b": "\u201cc\u00e1i kh\u00f3\u201d.", "c": "\u201cl\u1ee5c c\u1ef1c\u201d.", "d": "\u201cm\u1ed9t n\u00f3\u201d.", "bookId": 1088264, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cCh\u00e9m cha c\u00e1i kh\u00f3, ch\u00e9m cha c\u00e1i kh\u00f3,<br>Kh\u00f4n kh\u00e9o m\u1ea5y ai, x\u1ea5u xa m\u1ed9t n\u00f3.<br>L\u1ee5c c\u1ef1c  b\u00e0y h\u00e0ng s\u00e1u, r\u00e0nh r\u00e0nh kinh hu\u1ea5n  ch\u1eb3ng sai.<br>V\u1ea1n t\u1ed9i l\u1ea5y l\u00e0m \u0111\u1ea7u, \u1ea5y \u1ea5y ng\u1ea1n ng\u00f4n h\u1eb3n c\u00f3.</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n C\u00f4ng Tr\u1ee9, <i>H\u00e0n nho phong v\u1ecb ph\u00fa</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>T\u1eeb ng\u1eef n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>c\u00f9ng ngh\u0129a v\u1edbi c\u00e1c t\u1eeb ng\u1eef c\u00f2n l\u1ea1i trong \u0111o\u1ea1n tr\u00edch?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nTrong \u0111o\u1ea1n th\u01a1, c\u00e1c t\u1eeb ng\u1eef \u201cc\u00e1i kh\u00f3\u201d, \u201cl\u1ee5c c\u1ef1c\u201d, \u201cm\u1ed9t n\u00f3\u201d \u0111\u1ec1u mang ngh\u0129a li\u00ean quan \u0111\u1ebfn s\u1ef1 c\ i ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch cho th\u1ea5y nh\u00e2n v\u1eadt \u201ct\u00f4i\u201d v\u00e0 ca s\u0129 Linh Tr\u01b0\u1eddng t\u1ea1o ra nh\u1eefng t\u00ecnh hu\u1ed1ng gi\u1ea3 \u0111\u1ec3 t\u1ea1o hi\u1ec7u \u1ee9ng cho kh\u00e1n gi\u1ea3:\n+ Nh\u00e2n v\u1eadt \u201ct\u00f4i\u201d mua hoa ph\u00e1t cho ng\u01b0\u1eddi h\u00e2m m\u1ed9 r\u1ed3i t\u1ed1i \u0111\u1ebfn l\u1ea1i \u0111\u1ea9y h\u1ecd b\u1eafn ra khi h\u1ecd l\u00ean t\u1eb7ng hoa \u2192 h\u00e0nh \u0111\u1ed9ng mang t\u00ednh s\u1eafp \u0111\u1eb7t, d\u00e0n d\u1ef1ng.<br>\n\u2013 Vi\u1ec7c ca s\u0129 Linh Tr\u01b0\u1eddng \u201cb\u1ea5t th\u1ea7n\u201d nh\u1ea3y xu\u1ed1ng giao l\u01b0u c\u00f2n \u201ct\u00f4i\u201d th\u00ec l\u00e0m \u201cl\u00e1 ch\u1eafn\u201d \u2192 cho th\u1ea5y hai ng\u01b0\u1eddi ph\u1ed1i h\u1ee3p theo ki\u1ec3u t\u1ea1o hi\u1ec7u \u1ee9ng gi\u1ea3, g\u00e2y ch\u00fa \u00fd.<br>\n\u2192 Hai h\u00e0nh \u0111\u1ed9ng n\u00e0y kh\u00f4ng ph\u1ea3i nhanh nh\u1eb9n, kh\u00e9o l\u00e9o hay tham lam, m\u00e0 l\u00e0 chi\u00eau tr\u00f2 nh\u1eb1m t\u1ea1o h\u00ecnh \u1ea3nh v\u00e0 t\u1ea1o t\u00ecnh hu\u1ed1ng g\u00e2y ch\u00fa \u00fd cho kh\u00e1n gi\u1ea3.\n", "key": "B", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597224, "lessonId": 0, "a": "Ng\u1ee3i ca v\u1ebb \u0111\u1eb9p c\u1ee7a con ng\u01b0\u1eddi.", "b": "Ng\u1ee3i ca v\u1ebb \u0111\u1eb9p c\u1ee7a thi\u00ean nhi\u00ean.", "c": "Ng\u1ee3i ca s\u1ee9c m\u1ea1nh c\u1ee7a thi\u00ean nhi\u00ean.", "d": "Ng\u1ee3i ca s\u1ef1 giao ho\u00e0 c\u1ee7a con ng\u01b0\u1eddi v\u1edbi thi\u00ean nhi\u00ean.", "bookId": 1088266, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTh\u1ebf k\u1ec9 n\u00e0o gieo m\u1ea7m trong \u0111\u1ea5t<br>H\u00f4m nay c\u00e2y l\u1edbn t\u1ecfa xum xu\u00ea<br>C \u0111\u1eafm, si m\u00ea.", "b": "Y\u00eau th\u01b0\u01a1ng, tr\u00e2n tr\u1ecdng.", "c": "H\u00e2n hoan, vui s\u01b0\u1edbng.", "d": "Ng\u01b0\u1ee1ng m\u1ed9, ng\u1ee3i ca.", "bookId": 1088268, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cCA-PIU-L\u00c9T PHU NH\u00c2N - Con ngh\u0129 sao? Con li\u1ec7u c\u00f3 \u01b0ng ch\u00e0ng qu\u00fd t\u1ed9c n\u00e0y kh\u00f4ng? T\u1ed1i nay, con s\u1ebd th\u1ea5y ch\u00e0ng \u1edf bu\u1ed5i d\u1ea1 y\u1ebfn nh\u00e0 ta. Con h\u00e3y ng\u1eafm nh\u00ecn dung m\u1ea1o c\u1ee7a ch\u00e0ng Pa-r\u00edt tr\u1ebb tu\u1ed5i nh\u01b0 nh\u00ecn v\u00e0o trang s\u00e1ch qu\u00fd, con s\u1ebd th\u1ea5y v\u1ebb thanh tao hi\u1ec7n ra d\u01b0\u1edbi n\u00e9t b\u00fat tuy\u1ec7t tr\u1ea7n. Con h\u00e3y nh\u00ecn k\u0129 t\u1eebng n\u00e9t c\u00e2n \u0111\u1ed1i c\u1ee7a ch\u00e0ng, n\u00e9t n\u1ecd nh\u01b0 l\u00e0m t\u0103ng v\u1ebb \u0111\u1eb9p c\u1ee7a n\u00e9t kia. V\u00e0 n\u1ebfu tr\u00ean trang s\u00e1ch \u0111\u00f3 c\u00f2n n\u00e9t n\u00e0o ch\u01b0a r\u00f5, th\u00ec nh\u01b0 l\u1eddi ch\u00fa ghi b\u00ean l\u1ec1 s\u00e1ch, \u0111\u00f4i m\u1eaft ch\u00e0ng s\u1ebd l\u00e0m s\u00e1ng t\u1ecf. Ch\u00e0ng ch\u01b0a t\u1eebng g\u1eafn b\u00f3 v\u1edbi m\u1ed9t ai, ch\u00e0ng nh\u01b0 m\u1ed9t t\u1eadp t\u00ecnh ca qu\u00fd gi\u00e1 ch\u1ec9 c\u1ea7n m\u1ed9t t\u1ea5m b\u00eca b\u1ecdc l\u1ea1i l\u00e0 n\u00ean thi\u00ean tuy\u1ec7t t\u00e1c! Ch\u00e0ng nh\u01b0 c\u00e1 kia c\u1ea7n v\u1eaby v\u00f9ng n\u01a1i bi\u1ec3n c\u1ea3, v\u00e0 n\u1ebfu v\u1ebb \u0111\u1eb9p b\u00ean trong l\u1ea1i \u0111\u01b0\u1ee3c th\u00eam v\u1ebb \u0111\u1eb9p b\u00ean ngo\u00e0i \u1ea5p \u1ee7 th\u00ec th\u1eadt l\u00e0 c\u1ea3nh tuy\u1ec7t v\u1eddi. Quy\u1ec3n s\u00e1ch c\u0169ng \u0111\u01b0\u1ee3c d\u1ef1 ph\u1ea7n vinh h\u1ea1nh d\u01b0\u1edbi m\u1eaft bao ng\u01b0\u1eddi, khi c\u00e1i m\u00f3c g\u00e0i b\u1eb1ng v\u00e0ng c\u1ee7a n\u00f3 \u0111\u01b0\u1ee3c \u00f4m \u1ea5p nh\u1eefng \u00e1ng v\u0103n ch\u01b0\u01a1ng c\u0169ng qu\u00fd gi\u00e1 nh\u01b0 v\u00e0ng. K\u1ebft duy\u00ean c\u00f9ng ch\u00e0ng, con \u0111\u01b0\u1ee3c chung h\u01b0\u1edfng m\u1ecdi kho t\u00e0ng qu\u00fd b\u00e1u c\u1ee7a ch\u00e0ng, m\u00e0 ri\u00eang ph\u1ea7n con ch\u1eb3ng thi\u1ec7t th\u00f2i s\u00fat k\u00e9m g\u00ec.\u201d</i><br><div style=\"text-align: right;\">(Uy-li-am S\u1ebfch-xpia, <i>R\u00f4-m\u00ea-\u00f4 v\u00e0 Giu-li-\u00e9t </i> - theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 11</i>, NXB \u0110\u1ea1i h\u1ecdc Hu\u1ebf, 2023)</div>Phu nh\u00e2n Ca-piu-l\u00e9t \u0111\u00e3 b\u00e0y t\u1ecf t\u00ecnh c\u1ea3m, th\u00e1i \u0111\u1ed9 n\u00e0o khi n\u00f3i v\u1ec1 ch\u00e0ng qu\u00fd t\u1ed9c Pa-r\u00edt?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nTrong \u0111o\u1ea1n tr\u00edch, Capulet phu nh\u00e2n \u0111ang thuy\u1ebft ph\u1ee5c Giu-li-\u00e9t k\u1ebft h\u00f4n v\u1edbi ch\u00e0ng qu\u00fd t\u1ed9c Pa-r\u00edt, b\u00e0 d\u00f9ng nh\u1eefng l\u1eddi l\u1ebd t\u00e1n d\u01b0\u01a1ng, ca ng\u1ee3i v\u1ebb \u0111\u1eb9p v\u00e0 ph\u1ea9m ch\u1ea5t c\u1ee7a ch\u00e0ng trai n\u00e0y.<br>\n\u2192 Phu nh\u00e2n Ca-piu-l\u00e9t \u0111\u00e3 b\u00e0y t\u1ecf Ng\u01b0\u1ee1ng m\u1ed9, ng\u1ee3i ca v\u1edbi Pa-r\u00edt v\u00e0 mong Giu-li-\u00e9t nh\u1eadn ra gi\u00e1 tr\u1ecb c\u1ee7a ch\u00e0ng\n", "key": "D", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597259, "lessonId": 0, "a": "Gi\u00e3 g\u1ea1o l\u00e0 vi\u1ec7c c\u1ef1c nh\u1ecdc, c\u1ea7n c\u1ed1 g\u1eafng v\u01b0\u1ee3t qua.", "b": "Ki\u00ean tr\u00ec, c\u00f3 \u00fd ch\u00ed, ngh\u1ecb l\u1ef1c v\u01b0\u1ee3t qua gian kh\u1ed5 s\u1ebd gi\u00fap m\u1ed7i ng\u01b0\u1eddi tr\u1edf n\u00ean t\u1ed1t \u0111\u1eb9p.", "c": "Mu\u1ed1n g\u1ea1o tr\u1eafng th\u00ec ph\u1ea3i ki\u00ean tr\u00ec gi\u00e3 g\u1ea1o.", "d": "Ng\u01b0\u1eddi s\u1ed1ng \u1edf \u0111\u1eddi c\u0169ng gi\u1ed1ng nh\u01b0 vi\u1ec7c gi\u00e3 g\u1ea1o.", "bookId": 1088269, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cM\u1ec5 b\u1ecb thung th\u00ec, h\u1ea9n th\u1ed1ng kh\u1ed5,</i><br><i>K\u00ed thung chi h\u1eadu, b\u1ea1ch nh\u01b0 mi\u00ean</i><br><i>Nh\u00e2n sinh t\u1ea1i th\u1ebf d\u00e3 gi\u00e1 d\u1ea1ng,</i><br><i>Kh\u1ed1n nan th\u1ecb nh\u0129 ng\u1ecdc th\u00e0nh thi\u00ean\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh<i style=\"font-style: italic;\">, V\u0103n thung m\u1ec5 thanh</i>)</div><i>\u201cG\u1ea1o khi b\u1ecb gi\u00e3, r\u1ea5t \u0111au kh\u1ed5,<br>Khi gi\u00e3 xong r\u1ed3i, tr\u1eafng nh\u01b0 b\u00f4ng.<br>Ng\u01b0\u1eddi ta s\u1ed1ng \u1edf \u0111\u1eddi, c\u0169ng gi\u1ed1ng nh\u01b0 v\u1eady,<br>Gian tru\u00e2n l\u00e0 l\u00fac trau chu\u1ed1t cho anh th\u00e0nh ng\u1ecdc.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>Nghe ti\u1ebfng gi\u00e3 g\u1ea1o</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Th\u00f4ng \u0111i\u1ec7p t\u1eeb b\u00e0i th\u01a1 tr\u00ean l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nB\u00e0i th\u01a1 s\u1eed d\u1ee5ng h\u00ecnh \u1ea3nh gi\u00e3 g\u1ea1o \u0111\u1ec3 \u1ea9n d\u1ee5 cho cu\u1ed9c \u0111\u1eddi con ng\u01b0\u1eddi. H\u1ea1t g\u1ea1o ph\u1ea3i tr\u1ea3i qua qu\u00e1 tr\u00ecnh gi\u00e3 gi\u1ea7n \u0111\u1ea7y \u0111au kh\u1ed5 m\u1edbi tr\u1edf n\u00ean tr\u1eafng \u0111\u1eb9p. T\u01b0\u01a1ng t\u1ef1, con ng\u01b0\u1eddi c\u0169ng ph\u1ea3i tr\u1ea3i qua gian nan th\u1eed th\u00e1ch m\u1edbi c\u00f3 th\u1ec3 r\u00e8n luy\u1ec7n b\u1ea3n th\u00e2n v\u00e0 \u0111\u1ea1t \u0111\u01b0\u1ee3c th\u00e0nh t\u1ef1u.<br>\n\u2192 Th\u00f4ng \u0111i\u1ec7p t\u1eeb b\u00e0i th\u01a1 l\u00e0: ki\u00ean tr\u00ec, c\u00f3 \         let userAnswers = {}; // Store: { qId: value }
        let isSubmitted = false;
        let examMode = 'practice'; // 'practice' or 'exam'
        let startTime = Date.now();
        let timerInterval;

        // --- INIT ---
        window.onload = function() {
            renderExam();
            startTimer();
            document.getElementById('mode-select').addEventListener('change', (e) => {
                if(isSubmitted) return;
                if(confirm('Đổi chế độ sẽ làm mới lại trạng thái hiển thị (không mất bài làm). Tiếp tục?')) {
                    examMode = e.target.value;
                    renderExam(false); // Re-render without resetting answers
                } else {
                    e.target.value = examMode;
                }
            });
        };

        // --- TIMER LOGIC ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- RENDER ENGINE ---

            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; // Clear to re-render
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`; // Unique Key for storage
                    const qType = q.normalizedType;
                    
                    // -- Palette Item --
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop
                    palMob.appendChild(palBtn); // Add to Mobile

                    // -- Question Card --
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    // Header: Question Number
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>

                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    // Interaction Area
                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // === TYPE 0: MCQ ===
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];

                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;

                            if(isSelected) {

                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            // Logic hiển thị kết quả
                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {

                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { // Đúng nhưng không chọn (hiện đáp án khi nộp)

                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; // Hiện đáp án đúng sau khi nộp dù chưa làm

                                ${feedback}

                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">

                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
