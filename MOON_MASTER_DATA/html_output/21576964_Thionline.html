ntly", "d": "years", "bookId": 1085893, "comments": 0, "bookmarks": 7, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The number of people <u>participating</u> in volunteer work <u>have</u> increased <u>significantly</u> in recent <u>years</u>.", "answer": "<b>Ph\u00e2n t\u00edch ng\u1eef c\u1ea3nh:</b> C\u00e2u n\u00f3i v\u1ec1 s\u1ed1 l\u01b0\u1ee3ng ng\u01b0\u1eddi tham gia c\u00f4ng vi\u1ec7c t\u00ecnh nguy\u1ec7n. \u201cThe number of\u201d l\u00e0 danh t\u1eeb s\u1ed1 \u00edt, n\u00ean \u0111\u1ed9ng t\u1eeb ph\u1ea3i chia s\u1ed1 \u00edt. \u201chave\u201d sai.<br><br><b>S\u1eeda l\u1ed7i:</b> have /h\u00e6v/ \u2192 has /h\u00e6z/: c\u00f3.<br><br><b>T\u1ea1m d\u1ecbch:</b> S\u1ed1 l\u01b0\u1ee3ng ng\u01b0\u1eddi tham gia c\u00f4ng vi\u1ec7c t\u00ecnh nguy\u1ec7n \u0111\u00e3 t\u0103ng \u0111\u00e1ng k\u1ec3 trong nh\u1eefng n\u0103m g\u1ea7n \u0111\u00e2y.", "key": "B", "isVideo": true, "score": 0, "order": 40, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 41-45: Which of the following best restates each of the given sentences? ", "content": "", "listQuestion": [{"questionId": 10470377, "lessonId": 0, "a": "Lan suggested that the room should be cooled.", "b": "Lan remarked that the room is too hot to be inside.", "c": "Lan complained that there is too much heat in the room.", "d": "Lan required that it must have the air conditioner in that room.", "bookId": 290728, "comments": 17, "bookmarks": 23, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<b>\u201cIt\u2019s too hot in this room, isn\u2019t it?\u201d said Lan.</b>", "answer": "<b>T\u1ea1m d\u1ecbch</b>: \u201cTrong ph\u00f2ng n\u00e0y n\u00f3ng qu\u00e1 ph\u1ea3i kh\u00f4ng?\u201d Lan n\u00f3i. <br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n<br></b>A. Lan \u0111\u1ec1 ngh\u1ecb ph\u00f2ng n\u00ean \u0111\u01b0\u1ee3c l\u00e0m m\u00e1t.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. Lan \u0111ang n\u00f3i v\u1ec1 vi\u1ec7c ph\u00f2ng n\u00f3ng, kh\u00f4ng n\u00f3i c\u1ea7n ph\u1ea3i \u0111\u01b0\u1ee3c l\u00e0m m\u00e1t.<br>\u21d2 C\u00e2u \u0111\u1ec1 ngh\u1ecb v\u1edbi \u201csuggest\u201d:<b> Suggest + (that) + S + (should) + V: g\u1ee3i \u00fd, \u0111\u1ec1 ngh\u1ecb</b><br>B. Lan nh\u1eadn x\u00e9t r\u1eb1ng ph\u00f2ng qu\u00e1 n\u00f3ng \u0111\u1ec3 v\u00e0o trong.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. Lan \u0111ang mu\u1ed1n ph\u00f2ng c\u1ea7n \u0111\u01b0\u1ee3c l\u00e0m m\u00e1t thay v\u00ec \u0111\u01b0a ra l\u1eddi nh\u1eadn x\u00e9t \u0111\u01a1n thu\u1ea7n.<br>C. Lan ph\u00e0n n\u00e0n r\u1eb1ng trong ph\u00f2ng c\u00f3 qu\u00e1 nhi\u1ec1u nhi\u1ec7t.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang. Lan \u0111ang ph\u00e0n n\u00e0n v\u00ec ph\u00f2ng n\u00f3ng.<br>D. Lan y\u00eau c\u1ea7u ph\u00f2ng \u0111\u00f3 ph\u1ea3i c\u00f3 \u0111i\u1ec1u h\u00f2a.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. Lan kh\u00f4ng h\u1ec1 \u0111\u1ec1 c\u1eadp \u0111\u1ebfn \u0111i\u1ec1u h\u00f2a.", "key": "C", "isVideo": true, "score": 0, "order": 41, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21576994, "lessonId": 0, "a": "The increase in the number of vehicles does not account for the heavier traffic in the city.", "b": "The worsening traffic congestion in the city might be linked to the growing number of vehicles.", "c": "The rise in vehicle numbers fails to explain the city's worsening traffic issues.", "d": "The rise in vehicles does not adequately relate to the escalating traffic congestion.", "bookId": 1085894, "comments": 2, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<b>The worsening traffic congestion in the city might be attributed to the growing number of vehicles.</b>", "answer": "<b>T\u1ea1m d\u1ecbch:</b> T\u1eafc ngh\u1ebdn giao th\u00f4ng ng\u00e0y c\u00e0ng nghi\u00eam tr\u1ecdng trong th\u00e0nh ph\u1ed1 c\u00f3 th\u1ec3 \u0111\u01b0\u1ee3c cho l\u00e0 do s\u1ed1 l\u01b0\u1ee3ng ph\u01b0\u01a1ng ti\u1ec7n ng\u00e0y c\u00e0ng t\u0103ng.\n\n<br><br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:\n</b><br><b>A</b>. The increase in the number of vehicles does not account for the heavier traffic in the city.\n<br><i>(T\u0103ng s\u1ed1 l\u01b0\u1ee3ng ph\u01b0\u01a1ng ti\u1ec7n kh\u00f4ng gi\u1ea3i th\u00edch \u0111\u01b0\u1ee3c t\u00ecnh tr\u1ea1ng giao th\u00f4ng n\u1eb7ng h\u01a1n trong th\u00e0nh ph\u1ed1.)\n</i><br><b>=&gt; Sai</b>. C\u00e2u g\u1ed1c n\u00f3i s\u1ed1 l\u01b0\u1ee3ng ph\u01b0\u01a1ng ti\u1ec7n c\u00f3 th\u1ec3 l\u00e0 nguy\u00ean nh\u00e2n, c\u00f2n \u0111\u00e1p \u00e1n n\u00e0y ph\u1ee7 \u0111\u1ecbnh \u0111i\u1ec1u \u0111\u00f3.\n\n<br><br><b>B.</b> The worsening traffic congestion in the city might be linked to the growing number of vehicles.\n<br><i>(T\u1eafc ngh\u1ebdn giao th\u00f4ng ng\u00e0y c\u00e0ng nghi\u00eam tr\u1ecdng trong th\u00e0nh ph\u1ed1 c\u00f3 th\u1ec3 li\u00ean quan \u0111\u1ebfn s\u1ed1 l\u01b0\u1ee3ng ph\u01b0\u01a1ng ti\u1ec7n ng\u00e0y c\u00e0ng t\u0103ng.)\n</i><br><b>=&gt; \u0110\u00fang</b>. \n\n<br><br><b>C.</b> The rise in vehicle numbers fails to explain the city's worsening traffic issues.\n<br><i>(S\u1ef1 gia t\u0103ng s\u1ed1 l\u01b0\u1ee3ng ph\u01b0\u01a1ng ti\u1ec7n kh\u00f4ng gi\u1ea3i th\u00edch \u0111\u01b0\u1ee3c v\u1ea5n \u0111\u1ec1 giao th\u00f4ng ng\u00e0y c\u00e0ng nghi\u00eam tr\u1ecdng c\u1ee7a th\u00e0nh ph\u1ed1.)\n</i><br><b>=&gt; Sai</b>. Ph\u1ee7 \u0111\u1ecbnh, thay \u0111\u1ed5i ngh\u0129a so v\u1edbi c\u00e2u g\u1ed1c.\n\n<br><br><b>D.</b> The rise in vehicles does not adequately relate to the escalating traffic congestion.\n<br><i>(S\u1ef1 gia t\u0103ng ph\u01b0\u01a1ng ti\u1ec7n kh\u00f4ng ho\u00e0n to\u00e0n li\u00ean quan \u0111\u1ebfn t\u1eafc ngh\u1ebdn giao th\u00f4ng ng\u00e0y c\u00e0ng t\u0103ng.)\n</i><br><b>=&gt; Sai</b>. \u0110\u00e1p \u00e1n n\u00e0y ph\u1ee7 nh\u1eadn m\u1ed1i li\u00ean h\u1ec7 gi\u1eefa gia t\u0103ng ph\u01b0\u01a1ng ti\u1ec7n c\u00e1 nh\u00e2n v\u00e0 t\u1eafc ngh\u1ebdn giao th\u00f4ng.\n", "key": "B", "isVideo": true, "score": 0, "order": 42, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10470378, "lessonId": 0, "a": "Had I eaten that left-over tacos, I would been experiencing a stomach ache now.", "b": "Had I not eaten that left-over tacos, I wouldn\u2019t have been experiencing a stomach ache now.", "c": "Had I not eaten that left-over tacos, I wouldn\u2019t be experiencing a stomach ache now.", "d": "Had it not been for I ate that left-over tacos, I would not be experiencing a stomach ache now.", "bookId": 290729, "comments": 7, "bookmarks": 43, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<b>I ate that left-over tacos, so I am experiencing a stomach ache now.</b>", "answer": "<b>T\u1ea1m d\u1ecbch</b>: T\u00f4i \u0111\u00e3 \u0103n ph\u1ea7n b\u00e1nh taco th\u1eeba n\u00ean gi\u1edd t\u00f4i \u0111ang b\u1ecb \u0111au b\u1ee5ng. <br>A. N\u1ebfu t\u00f4i \u0103n mi\u1ebfng b\u00e1nh taco c\u00f2n th\u1eeba \u0111\u00f3, b\u00e2y gi\u1edd t\u00f4i s\u1ebd b\u1ecb \u0111au b\u1ee5ng.<br>\u21d2 Sai v\u1ec1 c\u1ea5u tr\u00fac v\u00e0 ngh\u0129a. Ta c\u00f3: <b>would + V(nguy\u00ean th\u1ec3):</b> s\u1ebd l\u00e0m g\u00ec<br>B. N\u1ebfu t\u00f4i kh\u00f4ng \u0103n mi\u1ebfng b\u00e1nh taco c\u00f2n th\u1eeba \u0111\u00f3 th\u00ec b\u00e2y gi\u1edd t\u00f4i \u0111\u00e3 kh\u00f4ng b\u1ecb \u0111au b\u1ee5ng.<br>\u21d2 Sai c\u1ea5u tr\u00fac c\u00e2u \u0111i\u1ec1u ki\u1ec7n h\u1ed7n h\u1ee3p. V\u1ebf c\u00f3 t\u1eeb \u201cnow\u201d ph\u1ea3i chia \u1edf \u0111i\u1ec1u ki\u1ec7n lo\u1ea1i 2.<br>C. N\u1ebfu t\u00f4i kh\u00f4ng \u0103n mi\u1ebfng b\u00e1nh taco c\u00f2n th\u1eeba \u0111\u00f3 th\u00ec b\u00e2y gi\u1edd t\u00f4i \u0111\u00e3 kh\u00f4ng b\u1ecb \u0111au b\u1ee5ng.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang. <br>+ C\u1ea5u tr\u00fac c\u00e2u \u0111i\u1ec1u ki\u1ec7n h\u1ed7n h\u1ee3p<b>: If + S + V + had + Vp2, S + would/could + V</b>: s\u1ef1 vi\u1ec7c s\u1ebd x\u1ea3y ra \u1edf hi\u1ec7n t\u1ea1i n\u1ebfu \u0111i\u1ec1u ki\u1ec7n n\u00f3i t\u1edbi trong qu\u00e1 kh\u1ee9 c\u00f3 th\u1eadt.<br>+ \u0110\u1ea3o \u0111i\u1ec1u ki\u1ec7n lo\u1ea1i 3: <b>Had + S + Vp2, S + would/could/might + have + Vp2</b><br>D. N\u1ebfu kh\u00f4ng ph\u1ea3i v\u00ec t\u00f4i \u0111\u00e3 \u0103n mi\u1ebfng b\u00e1nh taco c\u00f2n th\u1eeba \u0111\u00f3 th\u00ec b\u00e2y gi\u1edd t\u00f4i \u0111\u00e3 kh\u00f4ng b\u1ecb \u0111au b\u1ee5ng.<br>\u21d2 Sai c\u1ea5u tr\u00fac. C\u1ea5u tr\u00fac \u0111\u1ea3o \u0111\u1eb7c bi\u1ec7t c\u00e2u \u0111i\u1ec1u ki\u1ec7n lo\u1ea1i 3:<b> Had it not been for + N, S + would + have + Vp2</b>", "key": "C", "isVideo": true, "score": 0, "order": 43, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19872399, "lessonId": 0, "a": "The other three paintings of landscape are less colourful than this one.", "b": "Compared with the other three landscape paintings, this one is the most colorful.", "c": "One of the four landscape paintings is very colourful to look at.", "d": "Of the four landscape paintings, this one is the least colourful.", "bookId": 746149, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<b>This landscape painting looks colourful, but the other three ones are even more colorful.</b>", "answer": "<b>T\u1ea1m d\u1ecbch:</b>&nbsp;B\u1ee9c tranh phong c\u1ea3nh n\u00e0y tr\u00f4ng \u0111\u1ea7y m\u00e0u s\u1eafc, nh\u01b0ng ba b\u1ee9c c\u00f2n l\u1ea1i th\u1eadm ch\u00ed c\u00f2n nhi\u1ec1u m\u00e0u s\u1eafc h\u01a1n.<br>=&gt; B\u1ee9c tranh n\u00e0y \u00edt m\u00e0u s\u1eafc nh\u1ea5t trong b\u1ed1n b\u1ee9c.<br><br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:<br></b>A.&nbsp;Ba b\u1ee9c tranh phong c\u1ea3nh c\u00f2n l\u1ea1i \u00edt m\u00e0u s\u1eafc h\u01a1n b\u1ee9c n\u00e0y.<br><div>B. So v\u1edbi ba b\u1ee9c tranh phong c\u1ea3nh c\u00f2n l\u1ea1i, b\u1ee9c n\u00e0y l\u00e0 nhi\u1ec1u m\u00e0u s\u1eafc nh\u1ea5t.</div><div>C. M\u1ed9t trong b\u1ed1n b\u1ee9c tranh phong c\u1ea3nh tr\u00f4ng r\u1ea5t nhi\u1ec1u m\u00e0u s\u1eafc.</div><div>D. Trong b\u1ed1n b\u1ee9c tranh phong c\u1ea3nh, b\u1ee9c n\u00e0y l\u00e0 \u00edt m\u00e0u s\u1eafc nh\u1ea5t.<br><br>=&gt; <b>Ch\u1ecdn D</b>.</div>", "key": "D", "isVideo": true, "score": 0, "order": 44, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21576997, "lessonId": 0, "a": "The movie is impressive enough for you to recommend to me last month.", "b": "It was the impressive movie which you recommended to me last month.", "c": "The movie which you recommended to me last month is too impressive to watch.", "d": "The movie that you recommended to me last month impressed me a lot.", "bookId": 1085895, "comments": 2, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<b>I am very impressed with the movie you recommended to me last month.</b>", "answer": "<b>T\u1ea1m d\u1ecbch:</b> T\u00f4i r\u1ea5t \u1ea5n t\u01b0\u1ee3ng v\u1edbi b\u1ed9 phim m\u00e0 b\u1ea1n \u0111\u00e3 gi\u1edbi thi\u1ec7u cho t\u00f4i v\u00e0o th\u00e1ng tr\u01b0\u1edbc.\n\n<br><br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:\n</b><br><b>A.</b> The movie is impressive enough for you to recommend to me last month.\n<br><i>(B\u1ed9 phim \u0111\u1ee7 \u1ea5n t\u01b0\u1ee3ng \u0111\u1ec3 b\u1ea1n gi\u1edbi thi\u1ec7u cho t\u00f4i v\u00e0o th\u00e1ng tr\u01b0\u1edbc.)\n</i><br><b>=&gt; Sai</b>. C\u00e2u g\u1ed1c n\u00f3i t\u00f4i \u1ea5n t\u01b0\u1ee3ng v\u1edbi phim, c\u00f2n c\u00e2u n\u00e0y n\u00f3i b\u1ed9 phim \u0111\u1ee7 \u1ea5n t\u01b0\u1ee3ng \u0111\u1ec3 b\u1ea1n gi\u1edbi thi\u1ec7u.\n\n<br><br><b>B.</b> It was the impressive movie which you recommended to me last month.\n<br><i>(\u0110\u00f3 l\u00e0 b\u1ed9 phim \u1ea5n t\u01b0\u1ee3ng m\u00e0 b\u1ea1n \u0111\u00e3 gi\u1edbi thi\u1ec7u cho t\u00f4i v\u00e0o th\u00e1ng tr\u01b0\u1edbc.)\n</i><br><b>=&gt; Sai</b>. \u201cit was\u201d nh\u1ea5n m\u1ea1nh b\u1ed9 phim \u1ea5n t\u01b0\u1ee3ng, nh\u01b0ng kh\u00f4ng di\u1ec5n t\u1ea3 c\u1ea3m x\u00fac c\u1ee7a ng\u01b0\u1eddi n\u00f3i nh\u01b0 c\u00e2u g\u1ed1c. C\u1ea7n thay \u201cwhich\u201d b\u1eb1ng \u201cthat\u201d.\n\n<br><br><b>C.</b> The movie which you recommended to me last month is too impressive to watch.\n<br><i>(B\u1ed9 phim m\u00e0 b\u1ea1n gi\u1edbi thi\u1ec7u cho t\u00f4i v\u00e0o th\u00e1ng tr\u01b0\u1edbc qu\u00e1 \u1ea5n t\u01b0\u1ee3ng \u0111\u1ec3 xem.)\n</i><br><b>=&gt; Sai</b>. C\u00e2u g\u1ed1c ch\u1ec9 n\u00f3i t\u00f4i r\u1ea5t \u1ea5n t\u01b0\u1ee3ng, kh\u00f4ng ph\u1ea3i b\u1ed9 phim \u1ea5n t\u01b0\u1ee3ng qu\u00e1 m\u1ee9c \u0111\u1ec3 xem. C\u1ea7n thay \u201cwhich\u201d b\u1eb1ng \u201cthat\u201d.\n\n<br><br><b>D.</b> The movie that you recommended to me last month impressed me a lot.\n<br><i>(B\u1ed9 phim m\u00e0 b\u1ea1n gi\u1edbi thi\u1ec7u cho t\u00f4i v\u00e0o th\u00e1ng tr\u01b0\u1edbc l\u00e0m t\u00f4i r\u1ea5t \u1ea5n t\u01b0\u1ee3ng.)\n</i><br><b>=&gt; \u0110\u00fang</b>.\n", "key": "D", "isVideo": true, "score": 0, "order": 45, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 46-52: Read the passage carefully.", "content": "1. The market for tourism in remote areas is booming. Countries are promoting their 'wilderness' regions\u2014mountains, Arctic lands, deserts, islands and wetlands\u2014to high-spending tourists. Wilderness tourism requires little initial investment but has costs. These regions are fragile not only ecologically but also culturally. The most significant fragile environments are deserts, mountains and Arctic areas, marked by seasonality with harsh conditions for many months. Tourism is limited to certain times of the year. Tourists are attracted by the natural landscapes and unique cultures of <b>indigenous </b>people. Poor governments welcome adventure tourists for the hard currency they bring. Tourism has long been the prime source of foreign exchange in Nepal and Bhutan, and <b>it</b> plays a key role in Arctic zones like Lapland and Alaska, and desert areas such as Ayers Rock and Monument Valley.<br>2. Once a location becomes a tourist destination, the effects on local communities are profound. Hill-farmers often earn more as porters for trekkers than from farming, leading to a decline in crop production and reliance on outside food. In Arctic and desert societies, tourism reduces time for collecting wild food, increasing dependence on stores. Wage labour and government handouts have similar effects. The dilemma is what happens if these incomes dry up. Tourism also causes erosion, deforestation and water shortages from providing cooked food and showers. Slow-growing trees and limited water are vulnerable to heavy use.<br>3. Stories of tourism problems are common, but impacts can be minimized. Tourism may even reinvigorate cultures, as seen with the Sherpas and Alpine villages. Some operators now ensure long-term benefits. In the Swiss Alps, limits were imposed on second homes, and communal cheese production revived. Some Arctic communities operate tour businesses themselves, such as a native corporation in Alaska running air tours, meals, and cultural shows. In the American Southwest, native groups profit from handicrafts, pottery, and jewellery.<br>4. Too many fragile-environment communities have lost control of their economies and cultures. Restricting tourism alone cannot solve this. Instead, they must gain greater control of <b>ventures</b>, balancing their needs with tourism demands. A growing number of communities show this is possible. The critical question is whether it becomes the norm rather than the exception.<br><div style=\"text-align: right;\"><i>(Source: izone.edu)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21577005, "lessonId": 0, "a": "a key role", "b": "foreign exchange", "c": "hard currency", "d": "tourism", "bookId": 1085896, "comments": 6, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 1, what does the word <b>it</b> refer to?", "answer": "<b>Trong \u0111o\u1ea1n 1, t\u1eeb \u201cit\u201d \u00e1m ch\u1ec9 \u0111i\u1ec1u g\u00ec?\n</b><br>A. M\u1ed9t vai tr\u00f2 quan tr\u1ecdng\n<br>B. Ngo\u1ea1i t\u1ec7\n<br>C. Ti\u1ec1n t\u1ec7 m\u1ea1nh (hard currency)\n<br>D. Du l\u1ecbch\n\n<br><br><b>T\u1ea1m d\u1ecbch</b>: \u201cTourism has long been the prime source of foreign exchange in Nepal and Bhutan, and it plays a key role in Arctic zones like Lapland and Alaska, and desert areas such as Ayers Rock and Monument Valley.\u201d \n<br><i>(Du l\u1ecbch t\u1eeb l\u00e2u \u0111\u00e3 l\u00e0 ngu\u1ed3n thu ngo\u1ea1i t\u1ec7 ch\u00ednh \u1edf Nepal v\u00e0 Bhutan, \u0111\u1ed3ng th\u1eddi n\u00f3 \u0111\u00f3ng vai tr\u00f2 quan tr\u1ecdng \u1edf c\u00e1c v\u00f9ng B\u1eafc C\u1ef1c nh\u01b0 Lapland v\u00e0 Alaska, c\u0169ng nh\u01b0 \u1edf c\u00e1c khu v\u1ef1c sa m\u1ea1c nh\u01b0 Ayers Rock v\u00e0 Monument Valley.)\n</i><br><br><b>=&gt; \u201cIt\u201d \u00e1m ch\u1ec9 \u201ctourism\u201d (du l\u1ecbch).</b>", "key": "D", "isVideo": false, "score": 0, "order": 46, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577006, "lessonId": 0, "a": "It often takes place in areas where ecosystems are easily disturbed.", "b": "It operates mainly during limited periods because of extreme environmental conditions.", "c": "It requires extensive infrastructure and heavy financial input.", "d": "It attracts visitors interested in nature and indigenous cultures.", "bookId": 1085897, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 1, which of the following is NOT a characteristic of wilderness tourism?", "answer": "<b>Trong \u0111o\u1ea1n 1, \u0111i\u1ec1u n\u00e0o sau \u0111\u00e2y kh\u00f4ng ph\u1ea3i l\u00e0 \u0111\u1eb7c \u0111i\u1ec3m c\u1ee7a du l\u1ecbch v\u00f9ng hoang d\u00e3?\n</b><br><b>A. </b>N\u00f3 th\u01b0\u1eddng di\u1ec5n ra \u1edf nh\u1eefng khu v\u1ef1c c\u00f3 h\u1ec7 sinh th\u00e1i d\u1ec5 b\u1ecb t\u1ed5n th\u01b0\u01a1ng.\n<br><b>=&gt; C\u00f3 \u0111\u1ec1 c\u1eadp\n</b><br><b>C\u0103n c\u1ee9:</b> \u201cThese regions are fragile not only ecologically but also culturally.\u201d (Nh\u1eefng khu v\u1ef1c n\u00e0y mong manh kh\u00f4ng ch\u1ec9 v\u1ec1 m\u1eb7t sinh th\u00e1i m\u00e0 c\u00f2n v\u1ec1 v\u0103n h\u00f3a.)\n\n\n<br><br><b>B.</b> N\u00f3 ch\u1ee7 y\u1ebfu ho\u1ea1t \u0111\u1ed9ng trong nh\u1eefng giai \u0111o\u1ea1n ng\u1eafn do \u0111i\u1ec1u ki\u1ec7n m\u00f4i tr\u01b0\u1eddng kh\u1eafc nghi\u1ec7t.\n<br><b>=&gt; C\u00f3 \u0111\u1ec1 c\u1eadp\n</b><br><b>C\u0103n c\u1ee9:</b>  \u201cThe most significant fragile environments are deserts, mountains and Arctic areas, marked by seasonality with harsh conditions for many months. Tourism is limited to certain times of the year.\u201d (Nh\u1eefng m\u00f4i tr\u01b0\u1eddng d\u1ec5 b\u1ecb t\u1ed5n th\u01b0\u01a1ng \u0111\u00e1ng k\u1ec3 nh\u1ea5t l\u00e0 c\u00e1c v\u00f9ng sa m\u1ea1c, n\u00fai v\u00e0 khu v\u1ef1c B\u1eafc C\u1ef1c, \u0111\u01b0\u1ee3c \u0111\u1eb7c tr\u01b0ng b\u1edfi t\u00ednh m\u00f9a v\u1ee5 v\u1edbi \u0111i\u1ec1u ki\u1ec7n kh\u1eafc nghi\u1ec7t k\u00e9o d\u00e0i trong nhi\u1ec1u th\u00e1ng. Du l\u1ecbch \u1edf nh\u1eefng n\u01a1i n\u00e0y b\u1ecb gi\u1edbi h\u1ea1n v\u00e0o m\u1ed9t s\u1ed1 th\u1eddi \u0111i\u1ec3m nh\u1ea5t \u0111\u1ecbnh trong n\u0103m.)\n\n\n<br><br><b>C.</b> N\u00f3 \u0111\u00f2i h\u1ecfi c\u01a1 s\u1edf h\u1ea1 t\u1ea7ng r\u1ed9ng l\u1edbn v\u00e0 ngu\u1ed3n t\u00e0i ch\u00ednh l\u1edbn.\n<br><b>=&gt; Sai</b>. Du l\u1ecbch v\u00f9ng hoang d\u00e3 \u0111\u00f2i h\u1ecfi v\u1ed1n ban \u0111\u1ea7u th\u1ea5p (little initial investment).\n<br><b>C\u0103n c\u1ee9:</b> \u201cWilderness tourism requires little initial investment but has costs.\u201d (Du l\u1ecbch v\u00f9ng hoang d\u00e3 kh\u00f4ng c\u1ea7n v\u1ed1n \u0111\u1ea7u t\u01b0 ban \u0111\u1ea7u l\u1edbn, nh\u01b0ng l\u1ea1i c\u00f3 nhi\u1ec1u chi ph\u00ed kh\u00e1c.)\n\n\n<br><br><b>D.</b> N\u00f3 thu h\u00fat du kh\u00e1ch quan t\u00e2m \u0111\u1ebfn thi\u00ean nhi\u00ean v\u00e0 c\u00e1c n\u1ec1n v\u0103n h\u00f3a b\u1ea3n \u0111\u1ecba.\n<br><b>=&gt; C\u00f3 \u0111\u1ec1 c\u1eadp\n</b><br><b>C\u0103n c\u1ee9:</b> \u201cTourists are attracted by the natural landscapes and unique cultures of indigenous people.\u201d (Du kh\u00e1ch b\u1ecb thu h\u00fat b\u1edfi c\u1ea3nh quan thi\u00ean nhi\u00ean v\u00e0 v\u0103n h\u00f3a \u0111\u1ed9c \u0111\u00e1o c\u1ee7a ng\u01b0\u1eddi b\u1ea3n \u0111\u1ecba.)", "key": "C", "isVideo": false, "score": 0, "order": 47, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577008, "lessonId": 0, "a": "Because it helps attract international loans and development aid.", "b": "Because it provides an important source of foreign currency.", "c": "Because it reduces their dependence on natural resources.", "d": "Because it stimulates domestic trade between rural regions.", "bookId": 1085898, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Why do many poor governments encourage tourism in remote or fragile regions?", "answer": "<b>T\u1ea1i sao nhi\u1ec1u ch\u00ednh ph\u1ee7 ngh\u00e8o l\u1ea1i khuy\u1ebfn kh\u00edch du l\u1ecbch \u1edf c\u00e1c khu v\u1ef1c xa x\u00f4i ho\u1eb7c mong manh?\n</b><br> A. V\u00ec \u0111i\u1ec1u \u0111\u00f3 gi\u00fap thu h\u00fat c\u00e1c kho\u1ea3n vay qu\u1ed1c t\u1ebf v\u00e0 vi\u1ec7n tr\u1ee3 ph\u00e1t tri\u1ec3n.\n<br> B. V\u00ec n\u00f3 mang l\u1ea1i m\u1ed9t ngu\u1ed3n ngo\u1ea1i t\u1ec7 quan tr\u1ecdng.\n<br> C. V\u00ec n\u00f3 gi\u00fap gi\u1ea3m s\u1ef1 ph\u1ee5 thu\u1ed9c v\u00e0o t\u00e0i nguy\u00ean thi\u00ean nhi\u00ean.\n<br> D. V\u00ec n\u00f3 k\u00edch th\u00edch th\u01b0\u01a1ng m\u1ea1i trong n\u01b0\u1edbc gi\u1eefa c\u00e1c v\u00f9ng n\u00f4ng th\u00f4n.\n\n<br><br><b>C\u0103n c\u1ee9 \u0111o\u1ea1n 1:</b> \u201cPoor governments welcome adventure tourists for the hard currency they bring. Tourism has long been the prime source of foreign exchange in Nepal and Bhutan\u2026\u201d <i>(C\u00e1c ch\u00ednh ph\u1ee7 ngh\u00e8o hoan ngh\u00eanh du kh\u00e1ch \u01b0a phi\u00eau l\u01b0u v\u00ec ngu\u1ed3n ngo\u1ea1i t\u1ec7 m\u1ea1nh m\u00e0 h\u1ecd mang l\u1ea1i. Du l\u1ecbch t\u1eeb l\u00e2u \u0111\u00e3 l\u00e0 ngu\u1ed3n thu ngo\u1ea1i t\u1ec7 ch\u00ednh \u1edf Nepal v\u00e0 Bhutan)\n\n<br></i><br><b>=&gt; V\u0103n b\u1ea3n n\u00eau r\u00f5 ch\u00ednh ph\u1ee7 ngh\u00e8o hoan ngh\u00eanh du kh\u00e1ch v\u00ec ngo\u1ea1i t\u1ec7 m\u1ea1nh (hard currency) m\u00e0 h\u1ecd mang l\u1ea1i; du l\u1ecbch l\u00e0 ngu\u1ed3n thu ngo\u1ea1i t\u1ec7 ch\u00ednh \u1edf nhi\u1ec1u n\u01a1i.\n\n</b>", "key": "B", "isVideo": false, "score": 0, "order": 48, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577011, "lessonId": 0, "a": "heavy reliance on government support", "b": "expansion of traditional hunting practices", "c": "an increase in agricultural output", "d": "dependence on purchased food", "bookId": 1085899, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In Arctic and desert communities, tourism causes _____.", "answer": "<b>\u1ede c\u00e1c c\u1ed9ng \u0111\u1ed3ng v\u00f9ng B\u1eafc C\u1ef1c v\u00e0 sa m\u1ea1c, du l\u1ecbch g\u00e2y ra _______.\n</b><br> A. S\u1ef1 ph\u1ee5 thu\u1ed9c l\u1edbn v\u00e0o h\u1ed7 tr\u1ee3 c\u1ee7a ch\u00ednh ph\u1ee7\n <br>B. S\u1ef1 m\u1edf r\u1ed9ng c\u00e1c ho\u1ea1t \u0111\u1ed9ng s\u0103n b\u1eafn truy\u1ec1n th\u1ed1ng\n<br> C. S\u1ef1 gia t\u0103ng s\u1ea3n l\u01b0\u1ee3ng n\u00f4ng nghi\u1ec7p\n<br> D. S\u1ef1 ph\u1ee5 thu\u1ed9c v\u00e0o th\u1ef1c ph\u1ea9m mua ngo\u00e0i\n\n<br><br><b>C\u0103n c\u1ee9 \u0111o\u1ea1n 2:</b> \u201c\u201cIn Arctic and desert societies, tourism reduces time for collecting wild food, increasing dependence on stores.\u201d <br><i>(\u1ede c\u00e1c x\u00e3 h\u1ed9i v\u00f9ng B\u1eafc C\u1ef1c v\u00e0 sa m\u1ea1c, du l\u1ecbch c\u0169ng khi\u1ebfn ng\u01b0\u1eddi d\u00e2n c\u00f3 \u00edt th\u1eddi gian h\u01a1n \u0111\u1ec3 thu th\u1eadp th\u1ef1c ph\u1ea9m hoang d\u00e3, l\u00e0m t\u0103ng s\u1ef1 ph\u1ee5 thu\u1ed9c v\u00e0o c\u00e1c c\u1eeda h\u00e0ng.)\n</i><br><b><br>=&gt; Ph\u1ee5 thu\u1ed9c v\u00e0o c\u00e1c c\u1eeda h\u00e0ng -&gt; t\u1ee9c l\u00e0 th\u1ef1c ph\u1ea9m mua b\u00ean ngo\u00e0i.</b>", "key": "D", "isVideo": false, "score": 0, "order": 49, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577013, "lessonId": 0, "a": "Tourism income may disappear, leaving communities vulnerable.", "b": "Communities must choose between earning from tourism or preserving traditional food practices.", "c": "Government handouts will compensate for lost tourist income.", "d": "Communities can rely on wage labor instead of tourism if tourists stop coming.", "bookId": 1085900, "comments": 0, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Which statement best reflects the dilemma mentioned in paragraph 2?", "answer": "<b>C\u00e2u n\u00e0o sau \u0111\u00e2y th\u1ec3 hi\u1ec7n r\u00f5 nh\u1ea5t t\u00ecnh th\u1ebf ti\u1ebfn tho\u00e1i l\u01b0\u1ee1ng nan \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp trong \u0111o\u1ea1n 2?\n </b><br>A. Ngu\u1ed3n thu nh\u1eadp t\u1eeb du l\u1ecbch c\u00f3 th\u1ec3 bi\u1ebfn m\u1ea5t, khi\u1ebfn c\u1ed9ng \u0111\u1ed3ng d\u1ec5 b\u1ecb t\u1ed5n th\u01b0\u01a1ng.\n<br><b>=&gt; \u0110\u00fang\n</b><br> B. C\u1ed9ng \u0111\u1ed3ng ph\u1ea3i ch\u1ecdn gi\u1eefa vi\u1ec7c ki\u1ebfm ti\u1ec1n t\u1eeb du l\u1ecbch ho\u1eb7c b\u1ea3o t\u1ed3n c\u00e1c t\u1eadp qu\u00e1n \u1ea9m th\u1ef1c truy\u1ec1n th\u1ed1ng.\n<br> C. C\u00e1c kho\u1ea3n tr\u1ee3 c\u1ea5p c\u1ee7a ch\u00ednh ph\u1ee7 s\u1ebd b\u00f9 \u0111\u1eafp cho thu nh\u1eadp du l\u1ecbch b\u1ecb m\u1ea5t.\n<br> D. C\u1ed9ng \u0111\u1ed3ng c\u00f3 th\u1ec3 d\u1ef1a v\u00e0o lao \u0111\u1ed9ng l\u00e0m thu\u00ea thay v\u00ec du l\u1ecbch n\u1ebfu du kh\u00e1ch ng\u1eebng \u0111\u1ebfn.&nbsp;<br><br><b>C\u0103n c\u1ee9:</b> \u201cWage labour and government handouts have similar effects. The dilemma is what happens if these incomes dry up.\u201d <br><i>(Lao \u0111\u1ed9ng l\u00e0m thu\u00ea v\u00e0 c\u00e1c kho\u1ea3n tr\u1ee3 c\u1ea5p t\u1eeb ch\u00ednh ph\u1ee7 c\u0169ng g\u00e2y ra nh\u1eefng \u1ea3nh h\u01b0\u1edfng t\u01b0\u01a1ng t\u1ef1. T\u00ecnh th\u1ebf kh\u00f3 x\u1eed l\u00e0 chuy\u1ec7n g\u00ec s\u1ebd x\u1ea3y ra n\u1ebfu nh\u1eefng ngu\u1ed3n thu nh\u1eadp n\u00e0y c\u1ea1n ki\u1ec7t.)\n</i><br><br><b>=&gt; Gi\u1ea3i th\u00edch:</b> \u201cThese incomes\u201d \u1edf \u0111\u00e2y ch\u00ednh l\u00e0 thu nh\u1eadp t\u1eeb du l\u1ecbch, vi\u1ec7c l\u00e0m thu\u00ea v\u00e0 tr\u1ee3 c\u1ea5p ch\u00ednh ph\u1ee7. Khi ngu\u1ed3n thu n\u00e0y bi\u1ebfn m\u1ea5t, c\u1ed9ng \u0111\u1ed3ng d\u1ec5 b\u1ecb t\u1ed5n th\u01b0\u01a1ng v\u00ec h\u1ecd \u0111\u00e3 b\u1ecf n\u00f4ng nghi\u1ec7p ho\u1eb7c s\u0103n b\u1eaft truy\u1ec1n th\u1ed1ng.", "key": "A", "isVideo": false, "score": 0, "order": 50, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577015, "lessonId": 0, "a": "By helping revive traditional practices and crafts", "b": "By encouraging new elements into cultural shows", "c": "By replacing old traditions with modern entertainment", "d": "By discouraging local businesses", "bookId": 1085901, "comments": 0, "bookmarks": 4, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 3, how can tourism have a positive effect on local cultures?", "answer": "<b>Theo \u0111o\u1ea1n 3, du l\u1ecbch c\u00f3 th\u1ec3 mang l\u1ea1i t\u00e1c \u0111\u1ed9ng t\u00edch c\u1ef1c n\u00e0o \u0111\u1ed1i v\u1edbi v\u0103n h\u00f3a \u0111\u1ecba ph\u01b0\u01a1ng?\n</b><br>A. Gi\u00fap kh\u00f4i ph\u1ee5c c\u00e1c t\u1eadp t\u1ee5c v\u00e0 ngh\u1ec1 th\u1ee7 c\u00f4ng truy\u1ec1n th\u1ed1ng.\n<br><br>B. Khuy\u1ebfn kh\u00edch th\u00eam nh\u1eefng y\u1ebfu t\u1ed1 m\u1edbi v\u00e0o c\u00e1c bu\u1ed5i bi\u1ec3u di\u1ec5n v\u0103n h\u00f3a. \n<br><b>-&gt; Kh\u00f4ng \u0111\u1ec1 c\u1eadp\n</b><br><br>C. Thay th\u1ebf c\u00e1c truy\u1ec1n th\u1ed1ng c\u0169 b\u1eb1ng h\u00ecnh th\u1ee9c gi\u1ea3i tr\u00ed hi\u1ec7n \u0111\u1ea1i.\n<br>-&gt; Tr\u00e1i ngh\u0129a v\u1edbi \u00fd b\u00e0i: du l\u1ecbch gi\u00fap ph\u1ee5c h\u1ed3i truy\u1ec1n th\u1ed1ng c\u0169, kh\u00f4ng ph\u1ea3i thay th\u1ebf b\u1eb1ng gi\u1ea3i tr\u00ed hi\u1ec7n \u0111\u1ea1i.\n<br><br>D. L\u00e0m gi\u1ea3m \u0111\u1ed9ng l\u1ef1c c\u1ee7a c\u00e1c doanh nghi\u1ec7p \u0111\u1ecba ph\u01b0\u01a1ng.\n<br>-&gt; \u0110o\u1ea1n 3 n\u00eau r\u1eb1ng du l\u1ecbch khuy\u1ebfn kh\u00edch ng\u01b0\u1eddi d\u00e2n t\u1ef1 v\u1eadn h\u00e0nh kinh doanh du l\u1ecbch, nh\u01b0 c\u00e1c c\u00f4ng ty b\u1ea3n \u0111\u1ecba \u1edf Alaska hay nh\u00f3m th\u1ed5 d\u00e2n b\u00e1n \u0111\u1ed3 th\u1ee7 c\u00f4ng. Kh\u00f4ng h\u1ec1 \u201cng\u0103n c\u1ea3n kinh doanh\u201d.\n\n\n<br><br><b>C\u0103n c\u1ee9 th\u00f4ng tin:</b> \u201c...tourism may even reinvigorate cultures, as seen with the Sherpas and Alpine villages. Some operators now ensure long-term benefits\u2026native groups profit from handicrafts, pottery, and jewellery.\u201d \n<br><i>(...du l\u1ecbch c\u00f2n c\u00f3 th\u1ec3 h\u1ed3i sinh v\u0103n h\u00f3a \u0111\u1ecba ph\u01b0\u01a1ng, nh\u01b0 tr\u01b0\u1eddng h\u1ee3p c\u1ee7a ng\u01b0\u1eddi Sherpa v\u00e0 c\u00e1c ng\u00f4i l\u00e0ng v\u00f9ng Alps. M\u1ed9t s\u1ed1 doanh nghi\u1ec7p hi\u1ec7n nay \u0111\u00e3 \u0111\u1ea3m b\u1ea3o l\u1ee3i \u00edch l\u00e2u d\u00e0i cho c\u1ed9ng \u0111\u1ed3ng \u2026 c\u00e1c nh\u00f3m ng\u01b0\u1eddi b\u1ea3n \u0111\u1ecba ki\u1ebfm l\u1ee3i t\u1eeb ngh\u1ec1 th\u1ee7 c\u00f4ng m\u1ef9 ngh\u1ec7, g\u1ed1m s\u1ee9 v\u00e0 trang s\u1ee9c.)\n\n<br></i><br>=&gt; Du l\u1ecbch c\u00f3 th\u1ec3 gi\u00fap kh\u00f4i ph\u1ee5c c\u00e1c ngh\u1ec1 v\u00e0 phong t\u1ee5c truy\u1ec1n th\u1ed1ng nh\u01b0 l\u00e0m ph\u00f4 mai, \u0111\u1ed3 th\u1ee7 c\u00f4ng, g\u1ed1m, trang s\u1ee9c.", "key": "A", "isVideo": false, "score": 0, "order": 51, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577018, "lessonId": 0, "a": "risks", "b": "journeys", "c": "businesses", "d": "experiments", "bookId": 1085902, "comments": 0, "bookmarks": 3, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 4, what is the word <b>ventures</b> closest in meaning to?", "answer": "<b>T\u1eeb \u201cventures\u201d trong \u0111o\u1ea1n 4 c\u00f3 ngh\u0129a g\u1ea7n nh\u1ea5t v\u1edbi ________.\n\n</b><br>A. risks /r\u026asks/ (n): r\u1ee7i ro\n<br>B. journeys /\u02c8d\u0292\u025c\u02d0.niz/ (n): h\u00e0nh tr\u00ecnh\n<br>C. businesses /\u02c8b\u026az.n\u026as.\u026az/ (n): doanh nghi\u1ec7p, ho\u1ea1t \u0111\u1ed9ng kinh doanh\nD. experiments /\u026ak\u02c8sper.\u026a.m\u0259nts/ (n): th\u00ed nghi\u1ec7m\n<br>\n<br><br><b>C\u0103n c\u1ee9 th\u00f4ng tin:</b> \u201cInstead, they must gain greater control of <b><u>ventures</u></b>, balancing their needs with tourism demands.\u201d\n<br><i>(Thay v\u00e0o \u0111\u00f3, h\u1ecd ph\u1ea3i gi\u00e0nh quy\u1ec1n ki\u1ec3m so\u00e1t nhi\u1ec1u h\u01a1n \u0111\u1ed1i v\u1edbi c\u00e1c <b><u>ho\u1ea1t \u0111\u1ed9ng kinh doanh</u></b>, c\u00e2n b\u1eb1ng nhu c\u1ea7u c\u1ee7a h\u1ecd v\u1edbi nhu c\u1ea7u du l\u1ecbch.)</i>", "key": "C", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully.", "content": "1. In recent years, the concept of sustainable living has become a significant part of the global conversation on environmental issues. Sustainable living means making choices that reduce one\u2019s negative impact on the environment by conserving resources, minimizing waste, and promoting practices that protect the planet. This approach not only benefits the environment but also contributes to the health and well-being of individuals and communities.<br>2. One essential aspect of sustainable living is reducing waste, particularly plastic waste. Many people now avoid single-use plastics, like straws and bags, in favor of reusable options. This shift has led to a growing demand for eco-friendly products, such as metal straws, cloth bags, and biodegradable packaging materials. By reducing plastic consumption, people help to decrease the amount of waste that ends up in oceans and landfills, where <b>it</b> can harm wildlife and release harmful chemicals into the environment.<br>3. Another core component of sustainable living is energy conservation. This can involve simple changes, like turning off lights when they are not in use or using energy-efficient appliances. Some individuals and households go further by installing solar panels to generate renewable energy. These efforts reduce dependency on fossil fuels, which are a major contributor to greenhouse gas emissions and global warming. Governments and businesses are also investing in renewable energy sources, such as wind and solar power, to promote a more sustainable energy infrastructure.<br>4. Water conservation is equally important in sustainable living practices. Freshwater resources are limited, yet they are essential for all forms of life. Many people practice water-saving habits, such as taking shorter showers and fixing leaks promptly. Additionally, using drought-resistant plants in landscaping can reduce the need for excessive watering, helping to conserve water in areas where it is <b>scarce</b>.<br>5. Sustainable transportation is another area gaining attention. The use of public transportation, biking, and carpooling are becoming more popular as people look for ways to reduce their carbon footprint. Electric vehicles (EVs) are also gaining popularity as they produce zero emissions, making them a cleaner alternative to traditional gasoline-powered cars. Many cities around the world are developing infrastructure to support EVs, including charging stations, which further encourages people to adopt sustainable travel options.<br>6. In conclusion, sustainable living encompasses various practices aimed at reducing environmental harm and promoting a balanced relationship with the planet. Through simple changes in daily routines, like reducing plastic use, and conserving energy, individuals and communities can contribute to a more sustainable future. This approach not only supports the planet but also encourages a healthier, more balanced lifestyle. Sustainable living reminds us of the importance of protecting our resources for future generations.<br><div style=\"text-align: right;\"><i>(Source: The Real IELTS)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21577036, "lessonId": 0, "a": "Practices of sustainable living", "b": "Pros and cons of sustainable living", "c": "How sustainable living affects our daily life", "d": "The importance of green living", "bookId": 1085903, "comments": 0, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title of the passage can be _____.", "answer": "<b><i>/C\u00e2u h\u1ecfi v\u1ec1 n\u1ed9i dung ch\u00ednh/<br></i></b><br><b>53. Ti\u00eau \u0111\u1ec1 ph\u00f9 h\u1ee3p nh\u1ea5t cho \u0111o\u1ea1n v\u0103n l\u00e0:</b><div>A. Nh\u1eefng th\u1ef1c h\u00e0nh c\u1ee7a l\u1ed1i s\u1ed1ng b\u1ec1n v\u1eefng</div><div>B. \u01afu v\u00e0 nh\u01b0\u1ee3c \u0111i\u1ec3m c\u1ee7a l\u1ed1i s\u1ed1ng b\u1ec1n v\u1eefng</div><div>C. L\u1ed1i s\u1ed1ng b\u1ec1n v\u1eefng \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn cu\u1ed9c s\u1ed1ng h\u00e0ng ng\u00e0y c\u1ee7a ch\u00fang ta nh\u01b0 th\u1ebf n\u00e0o</div><div>D. T\u1ea7m quan tr\u1ecdng c\u1ee7a l\u1ed1i s\u1ed1ng xanh<br><br>\u0110o\u1ea1n v\u0103n t\u1eadp trung v\u00e0o vi\u1ec7c m\u00f4 t\u1ea3 c\u00e1c bi\u1ec7n ph\u00e1p th\u1ef1c t\u1ebf c\u1ee7a l\u1ed1i s\u1ed1ng b\u1ec1n v\u1eefng, bao g\u1ed3m gi\u1ea3m r\u00e1c th\u1ea3i nh\u1ef1a, ti\u1ebft ki\u1ec7m n\u0103ng l\u01b0\u1ee3ng, b\u1ea3o t\u1ed3n n\u01b0\u1edbc v\u00e0 giao th\u00f4ng b\u1ec1n v\u1eefng.&nbsp;<br><br>=&gt; <b>Ch\u1ecdn A</b>.</div>", "key": "A", "isVideo": false, "score": 0, "order": 53, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577039, "lessonId": 0, "a": "Cloth bags", "b": "Metal straws", "c": "Single-use bottles", "d": "Compostable packaging", "bookId": 1085904, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 2, which of the following is NOT mentioned as an alternative                                     else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
