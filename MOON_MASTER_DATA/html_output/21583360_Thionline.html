><br>B. M\u1ea5t v\u00e0i ng\u00e0y leo n\u00fai, ng\u01b0\u1eddi \u0111i b\u1ed9 m\u1edbi c\u00f3 th\u1ec3 l\u00ean t\u1edbi \u0111\u1ec9nh n\u00fai Fanxipan.<br>\u21d2 Sai v\u1ec1 ngh\u0129a.<br>C. Sau v\u00e0i ng\u00e0y leo n\u00fai, nh\u1eefng ng\u01b0\u1eddi \u0111i b\u1ed9 \u0111\u01b0\u1eddng d\u00e0i \u0111\u00e3 c\u00f3 th\u1ec3 l\u00ean t\u1edbi \u0111\u1ec9nh n\u00fai Fanxipan.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang. <br>Ta c\u00f3: <b>managed to V= was/were able to:</b> ch\u1ec9 kh\u1ea3 n\u0103ng c\u00f3 th\u1ec3 l\u00e0m \u0111\u01b0\u1ee3c g\u00ec \u0111\u00f3 trong m\u1ed9t s\u1ed1 tr\u01b0\u1eddng h\u1ee3p \u0111\u1eb7c bi\u1ec7t, \u0111\u00f2i h\u1ecfi n\u1ed7 l\u1ef1c, c\u1ed1 g\u1eafng <br>D. M\u1ea5t v\u00e0i ng\u00e0y leo n\u00fai, nh\u1eefng ng\u01b0\u1eddi \u0111i b\u1ed9 \u0111\u01b0\u1eddng d\u00e0i \u0111\u00e3 th\u00e0nh c\u00f4ng l\u00ean \u0111\u1ebfn \u0111\u1ec9nh n\u00fai Fanxipan.<br>\u21d2 Sai c\u1ea5u tr\u00fac v\u1edbi \u201ctake\u201d. C\u1ea5u tr\u00fac \u0111\u00fang: <b>It takes/took (sb) + time + to do something:</b> Ai \u0111\u00f3 d\u00e0nh/m\u1ea5t bao nhi\u00eau th\u1eddi gian \u0111\u1ec3 l\u00e0m vi\u1ec7c g\u00ec.", "key": "C", "isVideo": true, "score": 0, "order": 42, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10469566, "lessonId": 0, "a": "There are probably better ways of securing your future than becoming a novelist.", "b": "You should try being a novelist to have a more secure career.", "c": "Becoming a novelist must be the most secure option to choose for your career.", "d": "In your decision to be a novelist, you have probably chosen to pursue a career securely.", "bookId": 290322, "comments": 21, "bookmarks": 31, "likes": 0, "shares": 0, "typeId": 0, "questionText": "You could hardly have decided on a less secure career than that of a novelist.", "answer": "<b>T\u1ea1m d\u1ecbch:</b> B\u1ea1n g\u1ea7n nh\u01b0 kh\u00f4ng th\u1ec3 quy\u1ebft \u0111\u1ecbnh ch\u1ecdn m\u1ed9t ngh\u1ec1 k\u00e9m an to\u00e0n h\u01a1n ngh\u1ec1 ti\u1ec3u thuy\u1ebft gia.<br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n: </b><br>A. C\u00f3 l\u1ebd c\u00f3 nhi\u1ec1u c\u00e1ch t\u1ed1t h\u01a1n \u0111\u1ec3 \u0111\u1ea3m b\u1ea3o t\u01b0\u01a1ng lai c\u1ee7a b\u1ea1n h\u01a1n l\u00e0 tr\u1edf th\u00e0nh m\u1ed9t ti\u1ec3u thuy\u1ebft gia.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. <br>B. B\u1ea1n n\u00ean th\u1eed l\u00e0m ti\u1ec3u thuy\u1ebft gia \u0111\u1ec3 c\u00f3 m\u1ed9t s\u1ef1 nghi\u1ec7p \u1ed5n \u0111\u1ecbnh h\u01a1n.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. <br>C. Tr\u1edf th\u00e0nh m\u1ed9t ti\u1ec3u thuy\u1ebft gia ph\u1ea3i l\u00e0 l\u1ef1a ch\u1ecdn an to\u00e0n nh\u1ea5t cho s\u1ef1 nghi\u1ec7p c\u1ee7a b\u1ea1n.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang. C\u1ea5u tr\u00fac: <b>Must be + N/ adj/ Ving:</b> h\u1eb3n l\u00e0, ch\u1eafc l\u00e0 \u2192 s\u1eed d\u1ee5ng \u0111\u1ec3 \u0111\u01b0a ra suy lu\u1eadn \u0111\u01b0\u1ee3c r\u00fat ra d\u1ef1a tr\u00ean nh\u1eefng c\u0103n c\u1ee9 hi\u1ec7n t\u1ea1i, nh\u1eefng g\u00ec \u0111ang ho\u1eb7c \u0111\u00e3 di\u1ec5n ra.<br>D. Khi quy\u1ebft \u0111\u1ecbnh tr\u1edf th\u00e0nh m\u1ed9t ti\u1ec3u thuy\u1ebft gia, c\u00f3 l\u1ebd b\u1ea1n \u0111\u00e3 ch\u1ecdn theo \u0111u\u1ed5i s\u1ef1 nghi\u1ec7p m\u1ed9t c\u00e1ch an to\u00e0n.<br>\u21d2 Sai v\u1ec1 ngh\u0129a, kh\u00f4ng th\u1ec3 hi\u1ec7n \u0111\u01b0\u1ee3c m\u1ee9c \u0111\u1ed9 an to\u00e0n m\u00e0 c\u00e2u g\u1ed1c \u0111\u01b0a ra.", "key": "C", "isVideo": true, "score": 0, "order": 43, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19871459, "lessonId": 0, "a": "To save for their daughter's dowry, the Browns are advised to put their savings in gold.", "b": "It is possible that the Browns will save for their 111\u1ee7 ti\u1ec1n h\u1ed3i m\u00f4n cho con g\u00e1i, h\u1ecd s\u1ebd \u0111\u1ea7u t\u01b0 v\u00e0o v\u00e0ng)</i><br>\u21d2 Kh\u00f4ng s\u00e1t ngh\u0129a v\u1edbi c\u00e2u g\u1ed1c<br>D. To save for their daughter's dowry, the Browns are likely to invest in gold. <br><i>(\u0110\u1ec3 ti\u1ebft ki\u1ec7m c\u1ee7a h\u1ed3i m\u00f4n cho con g\u00e1i, gia \u0111\u00ecnh Brown c\u00f3 th\u1ec3 s\u1ebd \u0111\u1ea7u t\u01b0 v\u00e0o v\u00e0ng.)</i><br>\u21d2 D l\u00e0 \u0111\u00e1p \u00e1n ph\u00f9 h\u1ee3p, ta c\u00f3 c\u1ea5u tr\u00fac:<b> S + to be likely to V</b>: c\u00f3 kh\u1ea3 n\u0103ng s\u1ebd l\u00e0m g\u00ec \u0111\u00f3", "key": "D", "isVideo": true, "score": 0, "order": 44, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10468317, "lessonId": 0, "a": "Mr.Watson said that he couldn't stand in such harsh conditions.", "b": "Mr.Watson said that he couldn't bear working in such harsh conditions.", "c": "Mr.Watson said that he couldn\u2019t help working in such harsh conditions.", "d": "Mr.Watson said that he could work in less harsh conditions.", "bookId": 290263, "comments": 1, "bookmarks": 46, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\"I\u2019m intolerant of working in such harsh conditions,\" Mr.Watson said.", "answer": "<b>T\u1ea1m d\u1ecbch:</b> \u00d4ng Watson n\u00f3i: \u201cT\u00f4i kh\u00f4ng th\u1ec3 ch\u1ecbu \u0111\u1ef1ng l\u00e0m vi\u1ec7c trong nh\u1eefng \u0111i\u1ec1u ki\u1ec7n kh\u1eafc nghi\u1ec7t nh\u01b0 v\u1eady\u201d.<br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:</b><br>A. \u00d4ng Watson cho bi\u1ebft \u00f4ng kh\u00f4ng th\u1ec3 ch\u1ecbu \u0111\u1ef1ng \u0111\u01b0\u1ee3c trong \u0111i\u1ec1u ki\u1ec7n kh\u1eafc nghi\u1ec7t nh\u01b0 v\u1eady.<br>\u21d2 Sai v\u1ec1 c\u00e1ch d\u00f9ng c\u1ea5u tr\u00fac \u201ccan\u2019t stand\u201d. Ta c\u00f3: <b>can\u2019t stand + \u0111\u1ea1i t\u1eeb/danh t\u1eeb/ Ving:</b> kh\u00f4ng th\u1ec3 ch\u1ecbu n\u1ed5i ai/\u0111i\u1ec1u g\u00ec/ vi\u1ec7c g\u00ec<br>B. \u00d4ng Watson n\u00f3i r\u1eb1ng \u00f4ng kh\u00f4ng th\u1ec3 ch\u1ecbu \u0111\u1ef1ng l\u00e0m vi\u1ec7c trong \u0111i\u1ec1u ki\u1ec7n kh\u1eafc nghi\u1ec7t nh\u01b0 v\u1eady.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang. Ta c\u00f3: <b>Can\u2019t stand = can\u2019t bear + V-ing:</b> kh\u00f4ng th\u1ec3 ch\u1ecbu \u0111\u01b0\u1ee3c, c\u1ef1c kh\u00f4ng th\u00edch<br>C. \u00d4ng Watson cho bi\u1ebft \u00f4ng kh\u00f4ng th\u1ec3 kh\u00f4ng l\u00e0m vi\u1ec7c trong \u0111i\u1ec1u ki\u1ec7n kh\u1eafc nghi\u1ec7t nh\u01b0 v\u1eady.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. Ta c\u00f3: <b>Can\u2019t help + V-ing:</b> kh\u00f4ng th\u1ec3 kh\u00f4ng l\u00e0m g\u00ec (r\u1ea5t mu\u1ed1n l\u00e0m g\u00ec)<br>D. \u00d4ng Watson cho bi\u1ebft \u00f4ng c\u00f3 th\u1ec3 l\u00e0m vi\u1ec7c trong \u0111i\u1ec1u ki\u1ec7n \u00edt kh\u1eafc nghi\u1ec7t h\u01a1n.<br>\u21d2 Sai v\u1ec1 ngh\u0129a.", "key": "B", "isVideo": true, "score": 0, "order": 45, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 46-52: Read the passage carefully.", "content": "1. When it comes to ambition, no two people are alike. Every class has its <b>outstanding </b>students, every company has its wonderful employees, and every family has its successful members. Then there is someone who is happy with whatever life brings. So, what makes us different?<br>2. A person's desire to succeed depends on so many factors. He or she may have goals, but without the ambition to get started, they never take the first steps to achieve them. Similarly, those with an ambition but no clear goals tend to begin many projects, but do not ever follow them till the end.<br>3. Although there are not any strict rules about how to 'teach' ambition or what decides it, many successful people do share some things. Most scientists agree that it helps to have parents who encourage their children to try new experiences, praise their successes, and accept their failures. In those families, kids often have much higher confidence levels. They know how to set goals and keep trying until they achieve <b>them</b>. Money also plays an important role. Those who are not very rich often want to earn money. It forces them to work hard all the time to improve their life.<br>4. However, the desire for success can create its own stress. Working too hard to achieve success can lead to illnesses. These days, even teens and young adults are feeling the stress. Trying to get into good colleges and find good jobs has forced high school students to study harder than ever. For many, it is difficult to find the balance. One solution may be to get together with family and friends, and do the things we enjoy. Most would agree that those values are far more important than any wealth or success.<br><div style=\"text-align: right;\"><i>(Adapted from Skillful Reading &amp; Writing by Bixby and Scanlon)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21583406, "lessonId": 0, "a": "The struggle for success", "b": "From failure to achievement", "c": "Differences between ambition and goal", "d": "The desire for success", "bookId": 1086162, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Which of the following is the best title for the passage?", "answer": "<b>Ti\u00eau \u0111\u1ec1 n\u00e0o d\u01b0\u1edbi \u0111\u00e2y ph\u00f9 h\u1ee3p nh\u1ea5t cho \u0111o\u1ea1n v\u0103n?\n</b><br><b>A.</b> Cu\u1ed9c \u0111\u1ea5u tranh \u0111\u1ec3 th\u00e0nh c\u00f4ng <br><b>=&gt; Sai</b> v\u00ec v\u00ec b\u00e0i vi\u1ebft kh\u00f4ng ch\u1ec9 n\u00f3i v\u1ec1 s\u1ef1 \u0111\u1ea5u tranh m\u00e0 c\u00f2n l\u00e0 v\u1ec1 tham v\u1ecdng v\u00e0 c\u00e1ch n\u00f3 \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn con ng\u01b0\u1eddi\n\n<br><b>B.</b> T\u1eeb th\u1ea5t b\u1ea1i \u0111\u1ebfn th\u00e0nh t\u1ef1u <br><b>=&gt; Sai</b> v\u00ec b\u00e0i vi\u1ebft \u0111\u1ec1 c\u1eadp \u0111\u1ebfn tham v\u1ecdng v\u00e0 m\u1ee5c ti\u00eau\n\n<br><b>C.</b> S\u1ef1 kh\u00e1c bi\u1ec7t gi\u1eefa tham v\u1ecdng v\u00e0 m\u1ee5c ti\u00eau <br><b>=&gt; Sai</b> v\u00ec b\u00e0i vi\u1ebft kh\u00f4ng ch\u1ec9 t\u1eadp trung v\u00e0o s\u1ef1 kh\u00e1c bi\u1ec7t n\u00e0y m\u00e0 c\u00f2n n\u00f3i v\u1ec1 c\u00e1c y\u1ebfu t\u1ed1 t\u00e1c \u0111\u1ed9ng kh\u00e1c\n\n<br><b>D.</b> Mong mu\u1ed1n th\u00e0nh c\u00f4ng <br><b>=&gt; \u0110\u00fang\n</b>", "key": "D", "isVideo": false, "score": 0, "order": 46, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10469523, "lessonId": 0, "a": "exceptional", "b": "unusual", "c": "good", "d": "normal", "bookId": 290308, "comments": 2, "bookmarks": 11, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The word \u201c<b>outstanding</b>\" in paragraph 1 is closest in meaning to ________.", "answer": "<b><i>T\u1eeb \u201coutstanding\u201d trong \u0111o\u1ea1n 1 c\u00f3 ngh\u0129a g\u1ea7n nh\u1ea5t v\u1edbi ____:<br></i></b>A exceptional<br>B unusual<br>C good<br>D normal<br><b>C\u0103n c\u1ee9 v\u00e0o ng\u1eef c\u1ea3nh \u0111o\u1ea1n 1:<br></b>Every class has its <b><u>outstanding</u></b> students, every company has its wonderful employees, and every family has its successful members.<br><i>(M\u1ed7i l\u1edbp h\u1ecdc \u0111\u1ec1u c\u00f3 nh\u1eefng h\u1ecdc sinh <b><u>xu\u1ea5t s\u1eafc</u></b>, m\u1ed7i c\u00f4ng ty \u0111\u1ec1u c\u00f3 nh\u1eefng nh\u00e2n vi\u00ean tuy\u1ec7t v\u1eddi v\u00e0 m\u1ed7i gia \u0111\u00ecnh \u0111\u1ec1u c\u00f3 nh\u1eefng th\u00e0nh vi\u00ean th\u00e0nh \u0111\u1ea1t.)<br></i>\u21d2 outstanding /,a\u028at'st\u00e6ndi\u014b/ (adj): xu\u1ea5t s\u1eafc<br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:<br></b>A exceptional /\u026ak\u02c8sep.\u0283\u0259n.\u0259l/ (adj): \u0111\u1eb7c bi\u1ec7t, xu\u1ea5t s\u1eafc<br>B unusual /\u028cn\u02c8ju\u02d0\u0292u\u0259l/ (adj): b\u1ea5t th\u01b0\u1eddng<br>C good /\u0261\u028ad/ (adj): t\u1ed1t<br>D normal /\u02c8n\u0254\u02d0r.m\u0259l/ (adj): b\u00ecnh th\u01b0\u1eddng<br><b>\u21d2 Outstanding = exceptional</b>", "key": "A", "isVideo": true, "score": 0, "order": 47, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583410, "lessonId": 0, "a": "Goals are more important than ambition.", "b": "Ambition without clear goals often leads to incomplete projects.", "c": "People with goals but no ambition achieve success eventually.", "d": "Ambition and goals are unrelated factors in achieving success.", "bookId": 1086163, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 2, what is the relationship between ambition and goals?", "answer": "<b>Theo \u0111o\u1ea1n 2, m\u1ed1i quan h\u1ec7 gi\u1eefa tham v\u1ecdng v\u00e0 m\u1ee5c ti\u00eau l\u00e0 g\u00ec?\n</b><br><b>A.</b> M\u1ee5c ti\u00eau quan tr\u1ecdng h\u01a1n tham v\u1ecdng\n<br><b>B.</b> Tham v\u1ecdng m\u00e0 kh\u00f4ng c\u00f3 m\u1ee5c ti\u00eau r\u00f5 r\u00e0ng th\u01b0\u1eddng d\u1eabn \u0111\u1ebfn c\u00e1c d\u1ef1 \u00e1n ch\u01b0a ho\u00e0n th\u00e0nh\n<br><b>C.</b> Nh\u1eefng ng\u01b0\u1eddi c\u00f3 m\u1ee5c ti\u00eau nh\u01b0ng kh\u00f4ng c\u00f3 tham v\u1ecdng s\u1ebd \u0111\u1ea1t \u0111\u01b0\u1ee3c th\u00e0nh c\u00f4ng cu\u1ed1i c\u00f9ng\n<br><b>D.</b> Tham v\u1ecdng v\u00e0 m\u1ee5c ti\u00eau l\u00e0 c\u00e1c y\u1ebfu t\u1ed1 kh\u00f4ng li\u00ean quan \u0111\u1ebfn nhau trong vi\u1ec7c \u0111\u1ea1t \u0111\u01b0\u1ee3c th\u00e0nh c\u00f4ng\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin:\n</b><br>Those with an ambition but no clear goals tend to begin many projects, but do not ever follow them till the end\n<br><i>(Nh\u1eefng ng\u01b0\u1eddi c\u00f3 tham v\u1ecdng nh\u01b0ng kh\u00f4ng c\u00f3 m\u1ee5c ti\u00eau r\u00f5 r\u00e0ng th\u01b0\u1eddng b\u1eaft \u0111\u1ea7u nhi\u1ec1u d\u1ef1 \u00e1n nh\u01b0ng kh\u00f4ng bao gi\u1edd theo \u0111u\u1ed5i ch\u00fang \u0111\u1ebfn c\u00f9ng.)\n</i>", "key": "B", "isVideo": false, "score": 0, "order": 48, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583412, "lessonId": 0, "a": "Parents who discourage failure tend to raise more ambitious children.", "b": "Supportive parents help their children build confidence.", "c": "Families who set strict rules ensure success for their children.", "d": "Ambition is not influenced by family upbringing.", "bookId": 1086164, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 3, what role does family play in shaping a child's ambition?", "answer": "<b>Trong \u0111o\u1ea1n 3, gia \u0111\u00ecnh \u0111\u00f3ng vai tr\u00f2 g\u00ec trong vi\u1ec7c h\u00ecnh th\u00e0nh tham v\u1ecdng c\u1ee7a tr\u1ebb?\n</b><br><b>A.</b> Cha m\u1eb9 nh\u1eefng ng\u01b0\u1eddi ng\u0103n c\u1ea3n th\u1ea5t b\u1ea1i c\u00f3 xu h\u01b0\u1edbng nu\u00f4i d\u01b0\u1ee1ng nh\u1eefng \u0111\u1ee9a tr\u1ebb tham v\u1ecdng h\u01a1n\n<br><b>B.</b> Cha m\u1eb9 h\u1ed7 tr\u1ee3 gi\u00fap tr\u1ebb x\u00e2y d\u1ef1ng s\u1ef1 t\u1ef1 tin\n<br><b>C</b>. Nh\u1eefng gia \u0111\u00ecnh \u0111\u1eb7t ra c\u00e1c quy t\u1eafc nghi\u00eam ng\u1eb7t \u0111\u1ea3m b\u1ea3o th\u00e0nh c\u00f4ng cho tr\u1ebb\n<br><b>D.</b> Tham v\u1ecdng kh\u00f4ng b\u1ecb \u1ea3nh h\u01b0\u1edfng b\u1edfi s\u1ef1 nu\u00f4i d\u01b0\u1ee1ng trong gia \u0111\u00ecnh\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin:\n</b><br>Most scientists agree that it helps to have parents who encourage their children to try new experiences, praise their successes, and accept their failures.<br><i>(H\u1ea7u h\u1ebft c\u00e1c nh\u00e0 khoa h\u1ecdc \u0111\u1ed3ng \u00fd r\u1eb1ng vi\u1ec7c c\u00f3 cha m\u1eb9 khuy\u1ebfn kh\u00edch con c\u00e1i th\u1eed nh\u1eefng tr\u1ea3i nghi\u1ec7m m\u1edbi, khen ng\u1ee3i th\u00e0nh c\u00f4ng v\u00e0 ch\u1ea5p nh\u1eadn th\u1ea5t b\u1ea1i s\u1ebd gi\u00fap \u00edch.)\n</i>", "key": "B", "isVideo": false, "score": 0, "order": 49, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583416, "lessonId": 0, "a": "experiences", "b": "goals", "c": "confidence", "d": "common things", "bookId": 1086165, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The word <b>them </b>in paragraph 3 refers to_______.", "answer": "<b>T\u1eeb \"them\" trong \u0111o\u1ea1n 3 \u00e1m ch\u1ec9 \u0111i\u1ec1u g\u00ec?\n</b><br><b>A.</b> tr\u1ea3i nghi\u1ec7m.\n<br><b>B.</b> m\u1ee5c ti\u00eau.\n<br><b>C.</b> s\u1ef1 t\u1ef1 tin.\n<br><b>D.</b> nh\u1eefng \u0111i\u1ec1u b\u00ecnh th\u01b0\u1eddng.\n<br><br><b>D\u1ef1a v\u00e0o ng\u1eef c\u1ea3nh c\u1ee7a c\u00e2u</b><br>They know how to set goals and keep trying until they achieve them.<br><i>(Ch\u00fang bi\u1ebft c\u00e1ch \u0111\u1eb7t m\u1ee5c ti\u00eau v\u00e0 ki\u00ean tr\u00ec cho \u0111\u1ebfn khi \u0111\u1ea1t \u0111\u01b0\u1ee3c m\u1ee5c ti\u00eau \u0111\u00f3.)\n</i>", "key": "B", "isVideo": false, "score": 0, "order": 50, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583418, "lessonId": 0, "a": "The desire to succeed can adversely affect human health.", "b": "Ambition alone is not enough to succeed.", "c": "Money is one of the factors affecting success.", "d": "Everyone wants to be more successful in life.", "bookId": 1086166 1ed9c s\u1ed1ng <br><b>=&gt; Sai\n</b>", "key": "D", "isVideo": false, "score": 0, "order": 51, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583422, "lessonId": 0, "a": "Building wealth is the ultimate way to find happiness.", "b": "Prioritizing relationships and enjoyable activities can improve well-being.", "c": "Success depends on sacrificing personal time for family and friends.", "d": "Most people prioritize wealth over spending time with loved ones.", "bookId": 1086167, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to the last paragraph, what can be inferred about the suggested solution to reduce stress?", "answer": "<b>Theo \u0111o\u1ea1n v\u0103n cu\u1ed1i, c\u00f3 th\u1ec3 suy ra \u0111i\u1ec1u g\u00ec v\u1ec1 gi\u1ea3i ph\u00e1p \u0111\u01b0\u1ee3c \u0111\u1ec1 xu\u1ea5t \u0111\u1ec3 gi\u1ea3m c\u0103ng th\u1eb3ng?\n</b><br><b>A.</b> X\u00e2y d\u1ef1ng s\u1ef1 gi\u00e0u c\u00f3 l\u00e0 c\u00e1ch cu\u1ed1i c\u00f9ng \u0111\u1ec3 t\u00ecm ki\u1ebfm h\u1ea1nh ph\u00fac <br><b>=&gt; Sai</b> v\u00ec \u0111o\u1ea1n v\u0103n cu\u1ed1i kh\u00f4ng n\u00f3i r\u1eb1ng s\u1ef1 gi\u00e0u c\u00f3 l\u00e0 y\u1ebfu t\u1ed1 quan tr\u1ecdng nh\u1ea5t, m\u00e0 l\u00e0 c\u00e1c m\u1ed1i quan h\u1ec7 v\u00e0 ho\u1ea1t \u0111\u1ed9ng th\u00fa v\u1ecb\n\n<br><br><b>B.</b> \u01afu ti\u00ean c\u00e1c m\u1ed1i quan h\u1ec7 v\u00e0 ho\u1ea1t \u0111\u1ed9ng th\u00fa v\u1ecb c\u00f3 th\u1ec3 c\u1ea3i thi\u1ec7n s\u1ee9c kh\u1ecfe tinh th\u1ea7n <br><b>=&gt; \u0110\u00fang\n\n</b><br><br><b>C.</b> Th\u00e0nh c\u00f4ng ph\u1ee5 thu\u1ed9c v\u00e0o vi\u1ec7c hy sinh th\u1eddi gian c\u00e1 nh\u00e2n cho gia \u0111\u00ecnh v\u00e0 b\u1ea1n b\u00e8 <br><b>=&gt; Sai</b> v\u00ec \u0111o\u1ea1n v\u0103n kh\u00f4ng n\u00f3i r\u1eb1ng th\u00e0nh c\u00f4ng ph\u1ee5 thu\u1ed9c v\u00e0o s\u1ef1 hy sinh n\u00e0y, m\u00e0 l\u00e0 khuy\u1ebfn kh\u00edch s\u1ef1 c\u00e2n b\u1eb1ng\n\n<br><br><b>D.</b> H\u1ea7u h\u1ebft m\u1ecdi ng\u01b0\u1eddi \u01b0u ti\u00ean s\u1ef1 gi\u00e0u c\u00f3 h\u01a1n l\u00e0 d\u00e0nh th\u1eddi gian cho ng\u01b0\u1eddi th\u00e2n <br><b>=&gt; Sai </b>v\u00ec \u0111o\u1ea1n v\u0103n nh\u1ea5n m\u1ea1nh r\u1eb1ng c\u00e1c gi\u00e1 tr\u1ecb nh\u01b0 gia \u0111\u00ecnh v\u00e0 b\u1ea1n b\u00e8 quan tr\u1ecdng h\u01a1n ti\u1ec1n b\u1ea1c\n", "key": "B", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully.", "content": "1. Urbanization, the process by which an increasing proportion of a population lives in cities and urban areas, has been a defining trend of the 21st century. While it has been associated with economic growth, improved infrastructure, and better access to services, the rapid and often unplanned expansion of cities has also led to significant public health challenges. These challenges are multifaceted, affecting both physical and mental health, and are driven by a complex interplay of factors such as environmental pollution, lifestyle changes, and social inequalities.<br>2. One of the most direct effects of urbanization on health is the increased exposure to environmental pollutants. Cities, especially those in developing countries, often struggle with high levels of air and water pollution. Industrial activities, vehicular emissions, and the burning of fossil fuels contribute to poor air quality, which is a major risk factor for respiratory diseases such as asthma, bronchitis, and chronic obstructive pulmonary disease (COPD). Furthermore, water pollution resulting from <b>inadequate </b>waste management systems can lead to the spread of waterborne diseases such as cholera, dysentery, and typhoid. The concentration of pollutants in urban areas, coupled with the high population density, exacerbates the spread of these diseases, putting a significant strain on public health systems.<br>3. The urban environment also contributes to lifestyle changes that can negatively impact health. The sedentary lifestyle that is common in cities, driven by the widespread use of motor vehicles and the prevalence of desk-bound jobs, is linked to a rise in non-communicable diseases (NCDs) such as obesity, diabetes, and cardiovascular diseases. Urbanization often brings about changes in dietary patterns as well, with a shift towards the consumption of processed foods that are high in fat, sugar, and salt. These dietary changes, combined with reduced physical activity, create a perfect storm for the development of NCDs, which are now the leading cause of death globally.<br>4. In addition to physical health, urbanization has profound effects on mental health. <b>The fast-paced and often stressful nature of city life</b>, along with social isolation and the breakdown of traditional community structures, can lead to a rise in mental health disorders such as depression, anxiety, and substance abuse. The lack of green spaces and recreational areas in many urban environments further exacerbates these issues, as <b>they </b>limit opportunities for physical activity and relaxation, which are crucial for maintaining mental well-being. Moreover, the social inequalities that are often starkly visible in urban areas can contribute to feelings of frustration and hopelessness, particularly among disadvantaged populations.<br><div style=\"text-align: right;\"><i>(Adapted from The Real Ielts)</i></div><i>Choose an option (A, B, C, or D) that best answers each question. </i>", "listQuestion": [{"questionId": 21583432, "lessonId": 0, "a": "The Growth of Urban Areas and Its Benefits", "b": "Urbanization and Its Effects on Health", "c": "The Positive and Negative Effects of Urbanization", "d": "How Cities Are Becoming More Modern", "bookI  occurs in rural communities", "d": "It eliminates public health challenges in cities", "bookId": 1086169, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What is a key characteristic of urbanization mentioned in paragraph 1?", "answer": "<b>M\u1ed9t \u0111\u1eb7c \u0111i\u1ec3m ch\u00ednh c\u1ee7a \u0111\u00f4 th\u1ecb h\u00f3a \u0111\u01b0\u1ee3c nh\u1eafc \u0111\u1ebfn trong \u0111o\u1ea1n 1 l\u00e0 g\u00ec?</b><br>A.&nbsp;N\u00f3 d\u1eabn \u0111\u1ebfn s\u1ef1 suy gi\u1ea3m trong t\u0103ng tr\u01b0\u1edfng d\u00e2n s\u1ed1.<br>B.&nbsp;N\u00f3 li\u00ean quan \u0111\u1ebfn s\u1ef1 gia t\u0103ng s\u1ed1 l\u01b0\u1ee3ng ng\u01b0\u1eddi s\u1ed1ng \u1edf c\u00e1c khu v\u1ef1c \u0111\u00f4 th\u1ecb.<br>C.&nbsp;N\u00f3 ch\u1ee7 y\u1ebfu x\u1ea3y ra \u1edf c\u00e1c c\u1ed9ng \u0111\u1ed3ng n\u00f4ng th\u00f4n.<br>D.&nbsp;N\u00f3 lo\u1ea1i b\u1ecf c\u00e1c th\u00e1ch th\u1ee9c v\u1ec1 s\u1ee9c kh\u1ecfe c\u1ed9ng \u0111\u1ed3ng \u1edf c\u00e1c th\u00e0nh ph\u1ed1.<br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin \u0111o\u1ea1n 1</b><br>Urbanization, the process by which an increasing proportion of a population lives in cities and urban areas<br>(<i>\u0110\u00f4 th\u1ecb h\u00f3a, qu\u00e1 tr\u00ecnh m\u00e0 m\u1ed9t t\u1ef7 l\u1ec7 ng\u00e0y c\u00e0ng t\u0103ng c\u1ee7a d\u00e2n s\u1ed1 s\u1ed1ng \u1edf c\u00e1c th\u00e0nh ph\u1ed1 v\u00e0 khu v\u1ef1c \u0111\u00f4 th\u1ecb</i>)", "key": "B", "isVideo": false, "score": 0, "order": 54, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583443, "lessonId": 0, "a": "insufficient", "b": "immobile", "c": "energetic", "d": "dynamic", "bookId": 1086170, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 2, the word <b>inadequate </b>could be replaced by ________.", "answer": "<b>Trong \u0111o\u1ea1n 2, t\u1eeb \"inade                     const qType = q.normalizedType;

                    // Palette Buttons
                    const btnClass = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    const btnHtml = `<button id="pal_${qKey}" onclick="scrollToQuestion('${qKey}')" class="${btnClass}">${qId}</button>`;
                    
                    palDesk.innerHTML += btnHtml;
                    palMob.innerHTML += btnHtml;

                    // Question Card
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'question-card bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // TYPE 0: MCQ
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { 
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; 
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // TYPE 1 & 3: FILL KEY
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const chars = userVal.split('');
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let boxesHtml = '<div class="flex gap-2 justify-start items-center">';
                        for(let i=0; i<4; i++) {
                            const char = chars[i] || '';
                            boxesHtml += `<input type="text" maxlength="1" 
                                class="char-input" 
                                data-index="${i}" 
                                data-key="${qKey}" 
                                value="${char}" 
                                readonly 
                                onclick="activateNumpad(this, '${qKey}')"
                                ${isSubmitted ? 'disabled' : ''} 
                            />`;
                        }
                        
                        if(examMode === 'practice' && !isSubmitted) {
                             boxesHtml += `<button onclick="checkFillAnswer('${qKey}')" class="ml-2 px-3 py-2 bg-blue-100 text-blue-700 font-bold rounded-lg text-sm hover:bg-blue-200 transition-colors">Kiểm tra</button>`;
                             // Nút xem lời giải cho practice
                             boxesHtml += `<button onclick="toggleSolution('${qKey}')" class="ml-2 px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button>`;
                        }
                        boxesHtml += '</div>';

                        let feedbackHtml = "";
                        if(isSubmitted) {
                             const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                             if(isCorrect) {
                                feedbackHtml = `<div class="mt-2 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                             } else {
                                feedbackHtml = `<div class="mt-2 text-red-600 text-sm">✗ Sai. Đáp án: <span class="font-bold">${correctVal}</span></div>`;
                             }
                        } else if (examMode === 'practice') {
                             feedbackHtml = `<div id="feedback-${qKey}" class="mt-2 text-sm font-bold hidden"></div>`;
                        }

                        html += `
                        <div class="flex flex-col relative">
                            ${boxesHtml}
                            ${feedbackHtml}
                        </div>`;
                    }

                    // TYPE 2: TRUE/FALSE
                    else if(qType === '2') {
                         html += `<div class="overflow-hidden border rounded-lg">
                            <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                                <tr>
                                    <th scope="col" class="px-3 py-3 w-10 text-center">Ý</th>
                                    <th scope="col" class="px-3 py-3">Nội dung</th>
                                    <th scope="col" class="px-3 py-3 w-32 text-center">Chọn Đ/S</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; 
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; 
                                const userChoice = userObj[pIdx]; 
                                
                                let trClass = "bg-white hover:bg-gray-50";
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) trClass = "bg-green-50";
                                    else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
