opene, and vitamins A, C, and E, which protect cells from damage. <b>Following a plant-based diet doesn't mean you need to become a vegetarian</b>, or never have meat or a dessert. It simply means that most of the foods you eat should be minimally processed and come from plants.<br><div style=\"text-align: right;\"><i>(Adapted from https://www.health.harvard.edu)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21584439, "lessonId": 0, "a": "The impact of processed food on health", "b": "How good nutrition promotes longevity", "c": "The importance of vitamins for cell function", "d": "The effects of a plant-based diet on chronic diseases", "bookId": 1086260, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Which title best reflects the main idea of the passage?", "answer": "<b>Ti\u00eau \u0111\u1ec1 n\u00e0o ph\u1ea3n \u00e1nh ch\u00ednh x\u00e1c nh\u1ea5t \u00fd ch\u00ednh c\u1ee7a \u0111o\u1ea1n v\u0103n?\n</b><br><b>A.</b> \u1ea2nh h\u01b0\u1edfng c\u1ee7a th\u1ef1c ph\u1ea9m ch\u1ebf bi\u1ebfn s\u1eb5n \u0111\u1ed1i v\u1edbi s\u1ee9c kh\u1ecfe\n<br><b>B.</b> C\u00e1ch dinh d\u01b0\u1ee1ng t\u1ed1t th\u00fac \u0111\u1ea9y tu\u1ed5i th\u1ecd\n<br><b>C</b>. T\u1ea7m quan tr\u1ecdng c\u1ee7a vitamin \u0111\u1ed1i v\u1edbi ch\u1ee9c n\u0103ng t\u1ebf b\u00e0o\n<br><b>D.</b> \u1ea2nh h\u01b0\u1edfng c\u1ee7a ch\u1ebf \u0111\u1ed9 \u0103n d\u1ef1a tr\u00ean th\u1ef1c v\u1eadt \u0111\u1ed1i v\u1edbi c\u00e1c b\u1ec7nh m\u00e3n t\u00ednh\n\n<br><br><b>=&gt; \u0110o\u1ea1n v\u0103n t\u1eadp trung v\u00e0o m\u1ed1i quan h\u1ec7 gi\u1eefa ch\u1ebf \u0111\u1ed9 \u0103n u\u1ed1ng v\u00e0 tu\u1ed5i th\u1ecd, gi\u1ea3i th\u00edch c\u00e1ch th\u1ef1c ph\u1ea9m l\u00e0nh m\u1ea1nh gi\u00fap t\u1ebf b\u00e0o ho\u1ea1t \u0111\u1ed9ng t\u1ed1t v\u00e0 k\u00e9o d\u00e0i tu\u1ed5i th\u1ecd.\n\n</b>", "key": "B", "isVideo": false, "score": 0, "order": 46, "fillKey": "", "yourKey": "" terranean diet, according to the study mentioned in paragraph 3?", "answer": "<b>L\u1ee3i \u00edch ch\u00ednh c\u1ee7a vi\u1ec7c tu\u00e2n theo ch\u1ebf \u0111\u1ed9 \u0103n \u0110\u1ecba Trung H\u1ea3i d\u1ef1a tr\u00ean th\u1ef1c v\u1eadt, theo nghi\u00ean c\u1ee9u \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp trong \u0111o\u1ea1n 3, l\u00e0 g\u00ec?\n</b><br><b>A.</b> T\u0103ng m\u1ee9c n\u0103ng l\u01b0\u1ee3ng\n<br><b>B.</b> Gi\u1ea3m nguy c\u01a1 t\u1eed vong do b\u1ea5t k\u1ef3 nguy\u00ean nh\u00e2n n\u00e0o\n<br><b>C.</b> C\u1ea3i thi\u1ec7n ch\u1ea5t l\u01b0\u1ee3ng gi\u1ea5c ng\u1ee7\n<br><b>D.</b> Ki\u1ec3m so\u00e1t c\u00e2n n\u1eb7ng t\u1ed1t h\u01a1n\n\n<br><br><b>C\u0103n c\u1ee9 th\u00f4ng tin: </b><br>\"...women who most closely adhered to the plant-based Mediterranean diet ... were <u><b>23% less likely to die from any cause</b></u> than women who did not closely adhere to this dietary pattern\"\n<br><i>(... nh\u1eefng ph\u1ee5 n\u1eef tu\u00e2n theo ch\u1ebf \u0111\u1ed9 \u0103n \u0110\u1ecba Trung H\u1ea3i d\u1ef1a tr\u00ean th\u1ef1c v\u1eadt ch\u1eb7t ch\u1ebd nh\u1ea5t c\u00f3 <u><b>nguy c\u01a1 t\u1eed vong do b\u1ea5t k\u1ef3 nguy\u00ean nh\u00e2n n\u00e0o th\u1ea5p h\u01a1n 23%</b></u> so v\u1edbi nh\u1eefng ng\u01b0\u1eddi kh\u00f4ng tu\u00e2n th\u1ee7 ch\u1ebf \u0111\u1ed9 \u0103n n\u00e0y).</i>", "key": "B", "isVideo": false, "score": 0, "order": 51, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21584498, "lessonId": 0, "a": "A plant-based diet requires complete elimination of meat.", "b": "A plant-based diet still allows some animal products or sweets.", "c": "A plant-based diet excludes all animal products.", "d": "A plant-based diet is strictly vegetarian.", "bookId": 1086266, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What can be inferred about the plant-based diet, based on the statement: \"<b>Following a plant-based diet doesn't mean you need to become a vegetarian</b>\" in paragraph 3?", "answer": "<b>D\u1ef1a tr\u00ean c\u00e2u \"Following a plant-based diet doesn't mean you need to become a vegetarian\", c\u00f3 th\u1ec3 suy ra \u0111i\u1ec1u g\u00ec v\u1ec1 ch\u1ebf \u0111\u1ed9 \u0103n d\u1ef1a tr\u00ean th\u1ef1c v\u1eadt?\n</b><br><b>A</b>. Ch\u1ebf \u0111\u1ed9 \u0103n d\u1ef1a tr\u00ean th\u1ef1c v\u1eadt y\u00eau c\u1ea7u lo\u1ea1i b\u1ecf ho\u00e0n to\u00e0n th\u1ecbt\n<br><b>B. </b>Ch\u1ebf \u0111\u1ed9 \u0103n d\u1ef1a tr\u00ean th\u1ef1c v\u1eadt v\u1eabn cho ph\u00e9p m\u1ed9t s\u1ed1 s\u1ea3n ph\u1ea9m \u0111\u1ed9ng v\u1eadt ho\u1eb7c \u0111\u1ed3 ng\u1ecdt\n<br><b>C. </b>Ch\u1ebf \u0111\u1ed9 \u0103n d\u1ef1a tr\u00ean th\u1ef1c v\u1eadt lo\u1ea1i b\u1ecf ho\u00e0n to\u00e0n t\u1ea5t c\u1ea3 s\u1ea3n ph\u1ea9m t\u1eeb \u0111\u1ed9ng v\u1eadt\n<br><b>D.</b> Ch\u1ebf \u0111\u1ed9 \u0103n d\u1ef1a tr\u00ean th\u1ef1c v\u1eadt l\u00e0 \u0103n chay ho\u00e0n to\u00e0n\n\n<br><br><b>C\u0103n c\u1ee9: </b><br>\"Following a plant-based diet doesn't mean you need to become a vegetarian\"\n<br><i>(Tu\u00e2n theo ch\u1ebf \u0111\u1ed9 \u0103n d\u1ef1a tr\u00ean th\u1ef1c v\u1eadt kh\u00f4ng c\u00f3 ngh\u0129a l\u00e0 b\u1ea1n ph\u1ea3i tr\u1edf th\u00e0nh ng\u01b0\u1eddi \u0103n chay).\n\n<br></i><br>=&gt; M\u1ed9t ch\u1ebf \u0111\u1ed9 \u0103n d\u1ef1a tr\u00ean th\u1ef1c v\u1eadt kh\u00f4ng y\u00eau c\u1ea7u lo\u1ea1i b\u1ecf ho\u00e0n to\u00e0n th\u1ecbt ho\u1eb7c th\u1ef1c ph\u1ea9m c\u00f3 ngu\u1ed3n g\u1ed1c \u0111\u1ed9ng v\u1eadt. B\u1ea1n v\u1eabn c\u00f3 th\u1ec3 \u0103n m\u1ed9t s\u1ed1 s\u1ea3n ph\u1ea9m \u0111\u1ed9ng v\u1eadt ho\u1eb7c \u0111\u1ed3 ng\u1ecdt, nh\u01b0ng ph\u1ea7n l\u1edbn ch\u1ebf \u0111\u1ed9 \u0103n n\u00ean l\u00e0 th\u1ef1c ph\u1ea9m t\u1eeb th\u1ef1c v\u1eadt.", "key": "B", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully.", "content": "1. Mental health issues affect a large portion of the global population. Despite the increasing awareness, many people still find it challenging to discuss their struggles due to the stigma surrounding mental health. <br>2. The causes of mental health issues are complex and multifactorial. <b>They </b>often arise from a combination of biological, psychological, and environmental factors. Genetics play a crucial role in the development of mental health disorders. For instance, having a family history of mental illness can increase the likelihood of developing a similar condition. Additionally, neurotransmitter imbalances in the brain are associated with disorders like depression and schizophrenia. Individuals who have experienced trauma, abuse, or neglect are at a higher risk of developing mental health issues. Childhood experiences, in particular, can have a lasting impact on mental well-being. Stressful life events, such as the loss of a loved one, financial hardship, or relationship breakdown, can contribute to mental health challenges. Social isolation, especially in the modern era, is another significant risk factor.<br>3. While mental health issues are often <b>persistent</b>, various treatments can help individuals manage their symptoms and improve their quality of life. Psychotherapy is also known as \u201ctalk therapy,\u201d psychotherapy involves speaking with a mental health professional to address emotional and psychological challenges. Cognitive-behavioral therapy (CBT) is one of the most widely used methods, helping individuals to reframe negative thought patterns and develop coping skills. In some cases, medication can be prescribed to manage symptoms. Antidepressants, anti-anxiety medications, and antipsychotics are commonly used to treat mental health disorders. These medications can help regulate neurotransmitters in the brain, which are often imbalanced in individuals with mental health issues. Moreover, simple lifestyle changes can have a profound effect on mental health. Regular exercise, a balanced diet, and adequate sleep can improve overall well-being and reduce symptoms. Furthermore, connecting with others who have similar experiences can be invaluable. Support groups offer a space where individuals can share their struggles and learn from one another. Many find comfort and hope in the stories of others who are also navigating mental health issues.<br>4. Reducing the stigma surrounding mental health is essential for improving access to care. Many individuals avoid seeking help because they fear judgment or misunderstanding from society. Mental health advocacy groups play a crucial role in raising awareness, promoting acceptance, and encouraging people to seek the help they need.<br>5. Mental health is just as important as physical health, and both need to be addressed in a holistic manner. By understanding the causes, and treatments of mental health disorders, society can take steps towards supporting those affected and fostering an environment where mental health is openly discussed and prioritized.<br><div style=\"text-align: right;\"><i>(Adapted from: The Real IELTS)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21584512, "lessonId": 0, "a": "The importance of improving physical health", "b": "Psychotherapy and Medication - Effective treatments for mental health", "c": "Mental health disorders - Causes, treatment, and stigma reduction", "d": "Overcoming the stigma of mental health issues", "bookId": 1086267, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title of the passage can be _____.", "answer": "<b>Ti\u00eau \u0111\u1ec1 ph\u00f9 h\u1ee3p nh\u1ea5t cho \u0111o\u1ea1n v\u0103n l\u00e0 __________.\n</b><br><br><b>A.</b> T\u1ea7m quan tr\u1ecdng c\u1ee7a vi\u1ec7c c\u1ea3i thi\u1ec7n s\u1ee9c kh\u1ecfe th\u1ec3 ch\u1ea5t <br><b>=&gt; Sai.</b> V\u00ec \u0111o\u1ea1n v\u0103n ch\u1ee7 y\u1ebfu n\u00f3i v\u1ec1 s\u1ee9c kh\u1ecfe t\u00e2m th\u1ea7n, kh\u00f4ng ph\u1ea3i s\u1ee9c kh\u1ecfe th\u1ec3 ch\u1ea5t\n\n<br><br><b>B.</b> T\u00e2m l\u00fd tr\u1ecb li\u1ec7u v\u00e0 thu\u1ed1c - C\u00e1c ph\u01b0\u01a1ng ph\u00e1p \u0111i\u1ec1u tr\u1ecb hi\u1ec7u qu\u1ea3 cho s\u1ee9c kh\u1ecfe t\u00e2m th\u1ea7n <br><b>=&gt; Sai. </b>\u0110\u00e2y ch\u1ec9 l\u00e0 1 ph\u1ea7n c\u1ee7a b\u00e0i \u0111\u1ecdc, b\u00e0i c\u00f2n \u0111\u1ec1 c\u1eadp \u0111\u1ebfn c\u00e1c nguy\u00ean nh\u00e2n v\u00e0 gi\u1ea3m b\u1edbt s\u1ef1 k\u1ef3 th\u1ecb...\n\n<br><br><b>C. </b>R\u1ed1i lo\u1ea1n s\u1ee9c kh\u1ecfe t\u00e2m th\u1ea7n - Nguy\u00ean nh\u00e2n, \u0111i\u1ec1u tr\u1ecb v\u00e0 gi\u1ea3m b\u1edbt k\u1ef3 th\u1ecb <br><b>=&gt; \u0110\u00fang</b> v\u00ec ph\u1ea3n \u00e1nh ch\u00ednh x\u00e1c ba kh\u00eda c\u1ea1nh ch\u00ednh \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp trong b\u00e0i: nguy\u00ean nh\u00e2n (\u0111o\u1ea1n 2), \u0111i\u1ec1u tr\u1ecb (\u0111o\u1ea1n 3), v\u00e0 gi\u1ea3m k\u1ef3 th\u1ecb (\u0111o\u1ea1n 4)\n\n<br><br><b>D.</b> V\u01b0\u1ee3t qua s\u1ef1 k\u1ef3 th\u1ecb c\u1ee7a c\u00e1c v\u1ea5n \u0111\u1ec1 s\u1ee9c kh\u1ecfe t\u00e2m th\u1ea7n <br><b>=&gt; Sai.</b> \u0110\u00e2y ch\u1ec9 l\u00e0 1 ph\u1ea7n c\u1ee7a b\u00e0i \u0111\u1ecdc, b\u00e0i vi\u1ebft c\u00f2n b\u00e0n v\u1ec1 c\u00e1c nguy\u00ean nh\u00e2n v\u00e0 ph\u01b0\u01a1ng ph\u00e1p \u0111i\u1ec1u tr\u1ecb\n", "key": "C", "isVideo": false, "score": 0, "order": 53, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21584513, "lessonId": 0, "a": "are more likely to face mental health issues later in life", "b": "can manage to improve the quality of life", "c": "will seldom experienc eatments can help individuals manage their symptoms and improve their quality of life\n<br><i>(M\u1eb7c d\u00f9 c\u00e1c v\u1ea5n \u0111\u1ec1 s\u1ee9c kh\u1ecfe t\u00e2m th\u1ea7n th\u01b0\u1eddng k\u00e9o d\u00e0i, nhi\u1ec1u ph\u01b0\u01a1ng ph\u00e1p \u0111i\u1ec1u tr\u1ecb c\u00f3 th\u1ec3 gi\u00fap c\u00e1 nh\u00e2n ki\u1ec3m so\u00e1t tri\u1ec7u ch\u1ee9ng v\u00e0 c\u1ea3i thi\u1ec7n ch\u1ea5t l\u01b0\u1ee3ng cu\u1ed9c s\u1ed1ng.)\n</i><br>=&gt;<b> Persistent</b> /p\u0259r\u02c8s\u026ast\u0259nt/ (adj) <b>k\u00e9o d\u00e0i, dai d\u1eb3ng\n</b>", "key": "B", "isVideo": false, "score": 0, "order": 56, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21584519, "lessonId": 0, "a": "Talk therapy", "b": "CBT", "c": "Hypersomnia", "d": "Communication spaces", "bookId": 1086271, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 3, which of the following is NOT an approach to address mental health disorders?", "answer": "Theo \u0111o\u1ea1n 3, ph\u01b0\u01a1ng ph\u00e1p n\u00e0o sau \u0111\u00e2y KH\u00d4NG ph\u1ea3i l\u00e0 c\u00e1ch \u0111\u1ec3 gi\u1ea3i quy\u1ebft c\u00e1c r\u1ed1i lo\u1ea1n s\u1ee9c kh\u1ecfe t\u00e2m th\u1ea7n?\n<br><b>A.</b> \u201ctr\u1ecb li\u1ec7u tr\u00f2 chuy\u1ec7n\u201d\n<br><b>B.</b> CBT\n<br><b>C.</b> R\u1ed1i lo\u1ea1n gi\u1ea5c ng\u1ee7 qu\u00e1 m\u1ee9c\n<br><b>D.</b> C\u00e1c kh\u00f4ng gian giao ti\u1ebfp\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o c\u00e1c th\u00f4ng tin:</b><br>- Psychotherapy is also known as \u201c<u>talk therapy</u>\u201d <i>(Li\u1ec7u ph\u00e1p t\u00e2m l\u00fd, c\u00f2n \u0111\u01b0\u1ee3c g\u1ecdi l\u00e0 \"<u>tr\u1ecb li\u1ec7u tr\u00f2 chuy\u1ec7n</u>\")\n</i><br>- <u>Cognitive-behavioral therapy</u> (CBT) is one of the most widely used methods <i>(<u>Li\u1ec7u ph\u00e1p nh\u1eadn th\u1ee9c h\u00e0nh vi</u> (CBT) l\u00e0 m\u                     const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
