u2013 \u0110\u00fang. H\u1ec7 c\u00f3 c\u00e0ng nhi\u1ec1u s\u1ed1 mol ch\u1ea5t kh\u00ed th\u00ec m\u1ee9c \u0111\u1ed9 h\u1ed7n lo\u1ea1n c\u1ee7a h\u1ec7 c\u00e0ng t\u0103ng nguy\u00ean do tr\u1ea1ng th\u00e1i kh\u00ed c\u00e1c ph\u00e2n t\u1eed kh\u00f4ng s\u1eafp x\u1ebfp theo tr\u1eadt t\u1ef1 nh\u1ea5t \u0111\u1ecbnh n\u00ean c\u00f3 gi\u00e1 tr\u1ecb entropy cao nh\u1ea5t d\u1eabn \u0111\u1ebfn m\u1ee9c \u0111\u1ed9 h\u1ed7n lo\u1ea1n c\u1ee7a h\u1ec7 t\u0103ng.\n<br> (d) \u2013 Sai. Theo chi\u1ec1u thu\u1eadn, d\u1ef1a v\u00e0o gi\u00e1 tr\u1ecb bi\u1ebfn thi\u00ean entropy c\u1ee7a ph\u1ea3n \u1ee9ng (*) c\u00f3 th\u1ec3 bi\u1ebft m\u1ee9c \u0111\u1ed9 h\u1ed7n lo\u1ea1n c\u1ee7a h\u1ec7 t\u0103ng.\n<br>V\u1edbi bi\u1ebfn thi\u00ean entropy c\u1ee7a ph\u1ea3n \u1ee9ng (*) l\u00e0 75 J/K &gt; 0 \u2192 M\u1ee9c \u0111\u1ed9 h\u1ed7n lo\u1ea1n c\u1ee7a h\u1ec7 t\u0103ng.<br>Ch\u1ec9 c\u00f3 ph\u00e1t bi\u1ec3u (c) \u0111\u00fang.<br><br><b>Ch\u1ecdn \u0111\u00e1p \u00e1n A</b>", "key": "A", "isVideo": true, "score": 0, "order": 105, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 106 \u0111\u1ebfn 108", "content": "\u0110\u1ed9 t\u1eeb th\u1ea9m, k\u00fd hi\u1ec7u l\u00e0 \u03bc, l\u00e0 m\u1ed9t \u0111\u1ea1i l\u01b0\u1ee3ng v\u1eadt l\u00fd \u0111\u1eb7c tr\u01b0ng cho kh\u1ea3 n\u0103ng c\u1ee7a m\u1ed9t v\u1eadt li\u1ec7u cho ph\u00e9p c\u00e1c \u0111\u01b0\u1eddng s\u1ee9c t\u1eeb \u0111i qua n\u00f3. N\u00f3i c\u00e1ch kh\u00e1c, \u0111\u1ed9 t\u1eeb th\u1ea9m cho bi\u1ebft v\u1eadt li\u1ec7u \u0111\u00f3 d\u1ec5 d\u00e0ng \"d\u1eabn\" t\u1eeb tr\u01b0\u1eddng \u0111\u1ebfn m\u1ee9c \u0111\u1ed9 n\u00e0o.<br>\t\u0110\u1ed9 t\u1eeb th\u1ea9m th\u01b0\u1eddng \u0111\u01b0\u1ee3c bi\u1ec3u di\u1ec5n b\u1eb1ng c\u00f4ng th\u1ee9c: \u03bc = \u03bc<sub>r</sub> \u00d7 \u03bc<sub>o</sub><br>\tTrong \u0111\u00f3: \u03bc \u0111\u1ed9 t\u1eeb th\u1ea9m tuy\u1ec7t \u0111\u1ed1i c\u1ee7a v\u1eadt li\u1ec7u (\u0111\u01a1n v\u1ecb: Henry tr\u00ean m\u00e9t - H/m).  \u03bc<sub>r</sub> \u0111\u1ed9 t\u1eeb th\u1ea9m t\u01b0\u01a1ng \u0111\u1ed1i c\u1ee7a v\u1eadt li\u1ec7u (kh\u00f4ng c\u00f3 \u0111\u01a1n v\u1ecb). N\u00f3 cho bi\u1ebft \u0111\u1ed9 t\u1eeb th\u1ea9m c\u1ee7a v\u1eadt li\u1ec7u \u0111\u00f3 l\u1edbn h\u01a1n bao nhi\u00eau l\u1ea7n so v\u1edbi \u0111\u1ed9 t\u1eeb th\u1ea9m c\u1ee7a ch\u00e2n kh\u00f4ng. \u03bc<sub>o</sub> \u0111\u1ed9 t\u1eeb th\u1ea9m c\u1ee7a ch\u00e2n kh\u00f4ng, l\u00e0 m\u1ed9t h\u1eb1ng s\u1ed1 v\u1eadt l\u00fd c\u00f3 gi\u00e1 tr\u1ecb x\u1ea5p x\u1ec9 4 \u00d7\u03c0\u00d710<sup>-7</sup> H/m.<br>\tD\u1ef1a v\u00e0o gi\u00e1 tr\u1ecb c\u1ee7a \u03bc<sub>r</sub>, ng\u01b0\u1eddi ta c\u00f3 th\u1ec3 ph\u00e2n lo\u1ea1i c\u00e1c v\u1eadt li\u1ec7u nh\u01b0 sau:<br>\t\u2022 V\u1eadt li\u1ec7u ngh\u1ecbch t\u1eeb : C\u00f3  \u03bc<sub>r</sub> h\u01a1i nh\u1ecf h\u01a1n 1 (v\u00ed d\u1ee5: n\u01b0\u1edbc, \u0111\u1ed3ng, b\u1ea1c, v\u00e0ng, bismuth). C\u00e1c v\u1eadt li\u1ec7u n\u00e0y h\u01a1i b\u1ecb \u0111\u1ea9y ra kh\u1ecfi t\u1eeb tr\u01b0\u1eddng m\u1ea1nh.<br>\t\u2022 V\u1eadt li\u1ec7u thu\u1eadn t\u1eeb : C\u00f3 \u03bc<sub>r</sub> h\u01a1i l\u1edbn h\u01a1n 1 (v\u00ed d\u1ee5: nh\u00f4m, b\u1ea1ch kim, oxy). C\u00e1c v\u1eadt li\u1ec7u n\u00e0y h\u01a1i b\u1ecb h\u00fat v\u00e0o t\u1eeb tr\u01b0\u1eddng m\u1ea1nh.<br>\t\u2022 V\u1eadt li\u1ec7u s\u1eaft t\u1eeb: C\u00f3 \u03bc<sub>r</sub> r\u1ea5t l\u1edbn, c\u00f3 th\u1ec3 l\u00ean t\u1edbi h\u00e0ng ng\u00e0n ho\u1eb7c h\u00e0ng ch\u1ee5c ng\u00e0n (v\u00ed d\u1ee5: s\u1eaft, niken, coban v\u00e0 c\u00e1c h\u1ee3p kim c\u1ee7a ch\u00fang). \u0110\u00e2y l\u00e0 nh\u1eefng v\u1eadt li\u1ec7u b\u1ecb t\u1eeb h\u00f3a m\u1ea1nh khi \u0111\u1eb7t trong t\u1eeb tr\u01b0\u1eddng v\u00e0 gi\u1 2u t\u1eeb 118 \u0111\u1ebfn 120:", "content": "K\u1ec3 t\u1eeb khi ch\u00ednh th\u1ee9c gia nh\u1eadp WTO, Vi\u1ec7t Nam \u0111\u00e3 ghi nh\u1eadn nh\u1eefng th\u00e0nh t\u1ef1u v\u1ec1 ph\u00e1t tri\u1ec3n kinh t\u1ebf. Vi\u1ec7t Nam tr\u1edf th\u00e0nh n\u1ec1n kinh t\u1ebf c\u00f3 \u0111\u1ed9 m\u1edf cao, t\u1edbi 200% GDP v\u00e0 c\u1ea3i thi\u1ec7n c\u00e1n c\u00e2n th\u01b0\u01a1ng m\u1ea1i h\u00e0ng h\u00f3a, chuy\u1ec3n t\u1eeb nh\u1eadp si\u00eau sang xu\u1ea5t si\u00eau trong giai \u0111o\u1ea1n 2016 \u2013 2020. \u0110\u1ebfn n\u0103m 2020<br>nhi\u1ec1u hi\u1ec7p \u0111\u1ecbnh th\u01b0\u01a1ng m\u1ea1i t\u1ef1 do song ph\u01b0\u01a1ng v\u00e0 \u0111\u00e3 ph\u01b0\u01a1ng \u0111\u00e3 c\u00f3 hi\u1ec7u l\u1ef1c, th\u00fac \u0111\u1ea9y ho\u1ea1t \u0111\u1ed9ng xu\u1ea5t kh\u1ea9u h\u00e0nh h\u00f3a c\u1ee7a n\u01b0\u1edbc ta ng\u00e0y c\u00e0ng m\u1edf r\u1ed9ng. Theo T\u1ed5ng c\u1ee5c Th\u1ed1ng k\u00ea, t\u1eeb n\u0103m 2016 \u0111\u1ebfn n\u0103m 2022, c\u00e1n c\u00e2n th\u01b0\u01a1ng m\u1ea1i c\u1ee7a Vi\u1ec7t Nam lu\u00f4n \u0111\u1ea1t th\u1eb7ng d\u01b0 v\u1edbi m\u1ee9c xu\u1ea5t si\u00eau t\u0103ng d\u1ea7n<br>qua c\u00e1c n\u0103m. N\u0103m 2022, c\u00e1n c\u00e2n th\u01b0\u01a1ng m\u1ea1i xu\u1ea5t si\u00eau \u0111\u1ea1t 12,4 t\u1ef7 USD, l\u00e0 n\u0103m th\u1ee9 7 li\u00ean ti\u1ebfp c\u00e1n c\u00e2n th\u01b0\u01a1ng m\u1ea1i h\u00e0ng h\u00f3a \u1edf m\u1ee9c th\u1eb7ng d\u1ef1 m\u1eb7c d\u00f9 g\u1eb7p nhi\u1ec1u kh\u00f3 kh\u0103n sau \u1ea3nh h\u01b0\u1edfng n\u1eb7ng n\u1ec1 c\u1ee7a d\u1ecbch b\u1ec7nh COVID\u201319. Tr\u1edf th\u00e0nh m\u1ed9t trong 20 n\u1ec1n th\u01b0\u01a1ng m\u1ea1i l\u1edbn nh\u1ea5t th\u1ebf gi\u1edbi.<br><div style=\"text-align: right;\">(Ngu\u1ed3n: <i>B\u00e1o c\u00f4ng th\u01b0\u01a1ng</i>)</div>", "listQuestion": [{"questionId": 19886481, "lessonId": 0, "a": "D\u1ecbch chuy\u1ec3n d\u00f2ng ngo\u1ea1i t\u1ec7 gi\u1eefa c\u00e1c qu\u1ed1c gia tr\u00ean th\u1ebf gi\u1edbi.", "b": "\u0110\u1ea9y m\u1             if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();

                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';

            }
        }

        function typeChar(char) {

            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);

                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
