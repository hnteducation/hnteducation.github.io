 as to make it slimmer.", "c": "Joana always wears clothes that draw in at her waist so that she look slimmer.", "d": "In order to look slimmer, Joana wears clothes that draw in at her waist.", "bookId": 290489, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Joana wears clothes that draw in at her waist to look slimmer.", "answer": "<b>T\u1ea1m d\u1ecbch:</b> Joana m\u1eb7c qu\u1ea7n \u00e1o kho\u00e9t eo \u0111\u1ec3 tr\u00f4ng thon g\u1ecdn h\u01a1n. <br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n<br></b>A. \u0110\u1ec3 tr\u00f4ng thon th\u1ea3 h\u01a1n, Joana m\u1eb7c nh\u1eefng b\u1ed9 \u0111\u1ed3 c\u00f3 \u0111\u01b0\u1eddng kho\u00e9t eo.<br>\u21d2 Sai ng\u1eef ph\u00e1p. Ta c\u00f3 \u201cshe\u201d l\u00e0 ng\u00f4i th\u1ee9 ba s\u1ed1 \u00edt \u2192 \u201cshe looks\u201d<br>B. Joana m\u1eb7c qu\u1ea7n \u00e1o k\u00e9o eo \u0111\u1ec3 tr\u00f4ng thon g\u1ecdn h\u01a1n.<br>\u21d2 Sai v\u1ec1 t\u1eeb v\u1ef1ng. Thi\u1ebfu gi\u1edbi t\u1eeb \u201cin\u201d<br>C. Joana lu\u00f4n m\u1eb7c nh\u1eefng b\u1ed9 qu\u1ea7n \u00e1o c\u00f3 ph\u1ea7n kho\u00e9t eo \u0111\u1ec3 tr\u00f4ng thon g\u1ecdn h\u01a1n.<br>\u21d2 Sai v\u1ec1 ngh\u0129a v\u00e0 ng\u1eef ph\u00e1p. \u0110\u1ec1 b\u00e0i kh\u00f4ng \u0111\u1ec1 c\u1eadp t\u1ea7n su\u1ea5t lu\u00f4n lu\u00f4n. H\u01a1n n\u1eefa, c\u00e2u n\u00e0y m\u1eafc l\u1ed7i chia \u0111\u1ed9ng t\u1eeb v\u1edbi \u201cshe\u201d.<br>D. \u0110\u1ec3 tr\u00f4ng thon th\u1ea3 h\u01a1n, Joana m\u1eb7c nh\u1eefng b\u1ed9 qu\u1ea7n \u00e1o kho\u00e9t eo.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang. Ta c\u00f3:<b> In order to + V(nguy\u00ean th\u1ec3):</b> \u0111\u1ec3 l\u00e0m g\u00ec.", "key": "D", "isVideo": true, "score": 0, "order": 43, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10469642, "lessonId": 0, "a": "It is not generally known that reducing waste is more effective than recycling.", "b": "Using things again is the best way to grab public attention to reduce the amount of rubbish.", "c": "People believe that recycling is not necessarily the best way of reducing waste.", "d": "People are more interested in recovery and reuse than in creating less waste.", "bookId": 290365, "comments": 0, "bookmarks": 7, "likes": 0, "shares": 0, "typeId": 0, "questionText": "While recycling has caught the public imagination, reducing waste has attracted much less attention.", "answer": "<b>T\u1ea1m d\u1ecbch:</b> Trong khi vi\u1ec7c t\u00e1i ch\u1ebf \u0111\u00e3 thu h\u00fat s\u1ef1 ch\u00fa \u00fd c\u1ee7a c\u00f4ng ch\u00fang th\u00ec vi\u1ec7c gi\u1ea3m thi\u1ec3u ch\u1ea5t th\u1ea3i l\u1ea1i nh\u1eadn \u0111\u01b0\u1ee3c \u00edt s\u1ef1 ch\u00fa \u00fd h\u01a1n.<br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:</b><br>A. Ng\u01b0\u1eddi ta th\u01b0\u1eddng kh\u00f4ng bi\u1ebft r\u1eb1ng vi\u1ec7c gi\u1ea3m ch\u1ea5t th\u1ea3i c\u00f3 hi\u1ec7u qu\u1ea3 h\u01a1n vi\u1ec7c t\u00e1i ch\u1ebf.<br>\u21d2 Sai v\u1ec1 ngh\u0129a<br>B. T\u00e1i s\u1eed d\u1ee5ng \u0111\u1ed3 v\u1eadt l\u00e0 c\u00e1ch t\u1ed1t nh\u1ea5t \u0111\u1ec3 thu h\u00fat s\u1ef1 ch\u00fa \u00fd c\u1ee7a c\u00f4ng ch\u00fang nh\u1eb1m gi\u1ea3m l\u01b0\u1ee3ng r\u00e1c th\u1ea3i.<br>\u21d2 Sai v\u1ec1 ngh\u0129a<br>C. M\u1ecdi ng\u01b0\u1eddi tin r\u1eb1ng t\u00e1i ch\u1ebf kh\u00f4ng nh\u1ea5t thi\u1ebft l\u00e0 c\u00e1ch t\u1ed1t nh\u1ea5t \u0111\u1ec3 gi\u1ea3m thi\u1ec3u ch\u1ea5t th\u1ea3i.<br>\u21d2 Sai v\u1ec1 ngh\u0129a<br>D. M\u1ecdi ng\u01b0\u1eddi quan t\u00e2m \u0111\u1ebfn vi\u1ec7c thu h\u1ed3i v\u00e0 t\u00e1i s\u1eed d\u1ee5ng h\u01a1n l\u00e0 t\u1ea1o ra \u00edt ch\u1ea5t th\u1ea3i h\u01a1n.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang. Ta c\u00f3: <b>S + be + interested in + N/V-ing:</b> Ai \u0111\u00f3 th\u00edch th\u00fa, quan t\u00e2m v\u1ec1 \u0111i\u1ec1u g\u00ec/vi\u1ec7c g\u00ec", "key": "D", "isVideo": true, "score": 0, "order": 44, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582806, "lessonId": 0, "a": "It would be a waste of time trying to contact Mark \u2013 he never answers his phone.", "b": "Mark doesn\u2019t answer the phone, but you may try to contact him.", "c": "It\u2019s unlikely you\u2019ll reach Mark, because he\u2019ll always answer his phone.", "d": "You could try contacting Mark, though he never picks up his phone.", "bookId": 1086116, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<b>There\u2019s no point in trying to contact Mark \u2013 he never answers his phone.</b>", "answer": "<b>T\u1ea1m d\u1ecbch:</b> Th\u1eed li\u00ean l\u1ea1c v\u1edbi Mark c\u0169ng v\u00f4 \u00edch \u2013 anh \u1ea5y ch\u1eb3ng bao gi\u1edd nghe \u0111i\u1ec7n tho\u1ea1i.\n\n<br><br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:\n</b><br><b>A.</b> It would be a waste of time trying to contact Mark \u2013 he never answers his phone.\n<br><i>(Th\u1eed li\u00ean l\u1ea1c v\u1edbi Mark s\u1ebd l\u00e0 l\u00e3ng ph\u00ed th\u1eddi gian \u2013 anh \u1ea5y ch\u1eb3ng bao gi\u1edd nghe \u0111i\u1ec7n tho\u1ea1i.)\n</i><br><b>=&gt; \u0110\u00fang. \n\n</b><br><br><b>B.</b> Mark doesn\u2019t answer the phone, but you may try to contact him.\n<br><i>(Mark kh\u00f4ng tr\u1ea3 l\u1eddi \u0111i\u1ec7n tho\u1ea1i, nh\u01b0ng b\u1ea1n c\u00f3 th\u1ec3 th\u1eed li\u00ean l\u1ea1c v\u1edbi anh \u1ea5y.)\n</i><br><b>=&gt; Sai.</b> Thay \u0111\u1ed5i s\u1eafc th\u00e1i, c\u00e2u g\u1ed1c nh\u1ea5n m\u1ea1nh s\u1ef1 v\u00f4 \u00edch, c\u00f2n c\u00e2u n\u00e0y l\u1ea1i khuy\u1ebfn kh\u00edch th\u1eed.\n\n<br><br><b>C.</b> It\u2019s unlikely you\u2019ll reach Mark, because he\u2019ll always answer his phone.\n<br><i>(B\u1ea1n kh\u00f3 c\u00f3 th\u1ec3 li\u00ean l\u1ea1c \u0111\u01b0\u1ee3c v\u1edbi Mark v\u00ec anh \u1ea5y lu\u00f4n tr\u1ea3 l\u1eddi \u0111i\u1ec7n tho\u1ea1i.)\n</i><br><b>=&gt; Sai.</b> C\u00e2u n\u00e0y tr\u00e1i v\u1edbi vi\u1ec7c Mark kh\u00f4ng tr\u1ea3 l\u1eddi \u0111i\u1ec7n tho\u1ea1i\n\n<br><br><b>D.</b> You could try contacting Mark, though he never picks up his phone.\n<br><i>(B\u1ea1n c\u00f3 th\u1ec3 th\u1eed li\u00ean l\u1ea1c v\u1edbi Mark, m\u1eb7c d\u00f9 anh \u1ea5y kh\u00f4ng bao gi\u1edd nghe m\u00e1y.)\n</i><br><b>=&gt; Sai.</b> C\u00e2u g\u1ed1c n\u00f3i kh\u00f4ng c\u1ea7n th\u1eed li\u00ean l\u1ea1c v\u1edbi Mark trong khi c\u00e2u n\u00e0y khuy\u00ean \u0111i\u1ec1u ng\u01b0\u1ee3c l\u1ea1i\n", "key": "A", "isVideo": false, "score": 0, "order": 45, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 46-52: Read the passage carefully. ", "content": "1. The Dien Bien Phu Victory became the sound of thunder that shook the world, tearing through the dark clouds of colonialism and imperialism, bringing a great source of encouragement to oppressed peoples to stand up to regain independence. The three words \u201cVietnam\u201d, \u201cHo Chi Minh\u201d, and \u201cDien Bien Phu\u201d resounded everywhere, becoming the pride and hope for freedom of progressive forces, a symbol of great bravery, and a shining star of the national liberation movement, signalling the collapse of colonialism.<br>2. The Dien Bien Phu Victory is even greater because it is a victory of a fledgling army of a weak nation which defeated a colonialist giant with outnumbering troops and weapons. During the 56 days and nights of the battle, our army eliminated more than 16,000 enemy troops and demolished a group of strongholds regarded by the West as an invincible fortress. It was also the first time in history that a major expeditionary army of a western imperialist country was <b>exterminated </b>in a colonial country.<br>3. Seventy years have passed. The burned-out forests, grey because of bombs, are now covered with the immense green of trees. The modern Muong Thanh Airport has been inaugurated and put into operation. New houses continue to be built. On the hills and fields of death, rice and crops now grow green while flowers bloom again, returning the magical beauty of the Northwest mountains and forests to Dien Bien. The winners of the Dien Bien Phu Campaign in the past have mostly passed away, but <b>their </b>glorious victories will forever be preserved in history.<br><div style=\"text-align: right;\"><i>(Source: https://special.nhandan.vn/)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21582819, "lessonId": 0, "a": "The difficulties the Vietnamese army had during the battle.", "b": "The significance and enduring legacy of the Dien Bien Phu Victory", "c": "The new technology used in the battle", "d": "How other countries reacted to the Dien Bien Phu Victory", "bookId": 1086117, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What is the main idea of the passage?", "answer": "<b>\u00dd ch\u00ednh c\u1ee7a \u0111o\u1ea1n v\u0103n l\u00e0 g\u00ec?\n</b><br><b>A.</b> Nh\u1eefng th\u00e1ch th\u1ee9c m\u00e0 qu\u00e2n \u0111\u1ed9i Vi\u1ec7t Nam ph\u1ea3i \u0111\u1ed1i m\u1eb7t trong tr\u1eadn chi\u1ebfn.\n<br><b>B.</b> \u00dd ngh\u0129a v\u00e0 di s\u1ea3n l\u00e2u d\u00e0i c\u1ee7a Chi\u1ebfn th\u1eafng \u0110i\u1ec7n Bi\u00ean Ph\u1ee7\n<br><b>C.</b> Nh\u1eefng ti\u1ebfn b\u1ed9 c\u00f4ng ngh\u1ec7 \u0111\u1ea1t \u0111\u01b0\u1ee3c trong tr\u1eadn chi\u1ebfn.\n<br><b>D.</b> Ph\u1ea3n \u1ee9ng qu\u1ed1c t\u1ebf \u0111\u1ed1i v\u1edbi Chi\u1ebfn th\u1eafng \u0110i\u1ec7n Bi\u00ean Ph\u1ee7.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o nh\u1eefng th\u00f4ng tin sau: \n</b><br>+) \u201cThe Dien Bien Phu Victory became the sound of thunder that shook the world, tearing through the dark clouds of colonialism and imperialism, bringing a great source of encouragement to oppressed peoples to stand up to regain independence.\u201d\n<br><i>(Chi\u1ebfn th\u1eafng \u0110i\u1ec7n Bi\u00ean Ph\u1ee7 \u0111\u00e3 tr\u1edf th\u00e0nh ti\u1ebfng s\u1ea5m ch\u1ea5n \u0111\u1ed9ng th\u1ebf gi\u1edbi, x\u00e9 to\u1ea1c m\u00e2y \u0111en c\u1ee7a ch\u1ee7 ngh\u0129a th\u1ef1c d\u00e2n v\u00e0 \u0111\u1ebf qu\u1ed1c, mang l\u1ea1i ngu\u1ed3n \u0111\u1ed9ng vi\u00ean to l\u1edbn cho c\u00e1c d\u00e2n t\u1ed9c b\u1ecb \u00e1p b\u1ee9c \u0111\u1ee9ng l\u00ean gi\u00e0nh l\u1ea1i \u0111\u1ed9c l\u1eadp.)\n</i><br><br>+) The Dien Bien Phu Victory is even greater because it is a victory of a fledgling army of a weak nation which defeated a colonialist giant with outnumbering troops and weapons.\n<br><i>(Chi\u1ebfn th\u1eafng \u0110i\u1ec7n Bi\u00ean Ph\u1ee7 c\u00f2n v\u0129 \u0111\u1ea1i h\u01a1n n\u1eefa v\u00ec \u0111\u00f3 l\u00e0 chi\u1ebfn th\u1eafng c\u1ee7a m\u1ed9t \u0111\u1ed9i qu\u00e2n non tr\u1ebb c\u1ee7a m\u1ed9t qu\u1ed1c gia y\u1ebfu \u1edbt \u0111\u00e3 \u0111\u00e1nh b\u1ea1i m\u1ed9t g\u00e3 kh\u1ed5ng l\u1ed3 th\u1ef1c d\u00e2n c\u00f3 qu\u00e2n s\u1ed1 v\u00e0 v\u0169 kh\u00ed v\u01b0\u1ee3t tr\u1ed9i.)\n</i><br><br>+) The winners of the Dien Bien Phu Campaign in the past have mostly passed away, but their glorious victories will forever be preserved in history.\n<br><i>(Nh\u1eefng ng\u01b0\u1eddi chi\u1ebfn th\u1eafng trong Chi\u1ebfn d\u1ecbch \u0110i\u1ec7n Bi\u00ean Ph\u1ee7 n\u0103m x\u01b0a h\u1ea7u h\u1ebft \u0111\u00e3 ra \u0111i, nh\u01b0ng nh\u1eefng chi\u1ebfn c\u00f4ng v\u1ebb vang c\u1ee7a h\u1ecd s\u1ebd m\u00e3i m\u00e3i \u0111\u01b0\u1ee3c l\u01b0u gi\u1eef trong l\u1ecbch s\u1eed.)\n</i><br><br><b>\u21d2 \u0110\u00e1p A sai</b> v\u00ec \u0111o\u1ea1n 2 \u0111\u1ec1 c\u1eadp r\u1eb1ng \u0111\u1ed9i qu\u00e2n Vi\u1ec7t Nam \u0111\u1ed1i m\u1eb7t v\u1edbi m\u1ed9t \"colonialist giant\u201d nh\u01b0ng \u0111\u00e2y ch\u1ec9 l\u00e0 m\u1ed9t ph\u1ea7n nh\u1ecf c\u1ee7a b\u00e0i vi\u1ebft.\n<br  n\u00e0o sau \u0111\u00e2y KH\u00d4NG \u0111\u00fang v\u1ec1 chi\u1ebfn th\u1eafng \u0110i\u1ec7n Bi\u00ean Ph\u1ee7?\n</b><br><b>A.</b> H\u01a1n 16.000 qu\u00e2n \u0111\u1ecbch \u0111\u00e3 b\u1ecb qu\u00e2n \u0111\u1ed9i Vi\u1ec7t Nam \u0111\u00e1nh b\u1ea1i.\n<br><b>B.</b> \u0110\u00f3 l\u00e0 chi\u1ebfn th\u1eafng c\u1ee7a m\u1ed9t \u0111\u1ed9i qu\u00e2n m\u1edbi th\u00e0nh l\u1eadp ch\u1ed1ng l\u1ea1i m\u1ed9t th\u1ebf l\u1ef1c th\u1ef1c d\u00e2n m\u1ea1nh h\u01a1n.\n<br><b>C.</b> Chi\u1ebfn th\u1eafng \u0110i\u1ec7n Bi\u00ean Ph\u1ee7 ngay l\u1eadp t\u1ee9c d\u1eabn \u0111\u1ebfn s\u1ef1 s\u1ee5p \u0111\u1ed5 c\u1ee7a ch\u1ee7 ngh\u0129a th\u1ef1c d\u00e2n.\n<br><b>D.</b> \u0110\u00f3 l\u00e0 l\u1ea7n \u0111\u1ea7u ti\u00ean m\u1ed9t \u0111\u1ed9i qu\u00e2n vi\u1ec5n chinh l\u1edbn c\u1ee7a ph\u01b0\u01a1ng T\u00e2y b\u1ecb \u0111\u00e1nh b\u1ea1i \u1edf m\u1ed9t qu\u1ed1c gia thu\u1ed9c \u0111\u1ecba.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o nh\u1eefng th\u00f4ng tin sau:\n</b><br>+) \u201cDuring the 56 days and nights of the battle, our army eliminated more than 16,000 enemy troops\u201d\n<br><i>(Trong su\u1ed1t 56 ng\u00e0y \u0111\u00eam chi\u1ebfn \u0111\u1ea5u, qu\u00e2n \u0111\u1ed9i ta \u0111\u00e3 ti\u00eau di\u1ec7t h\u01a1n 16.000 qu\u00e2n \u0111\u1ecbch.)\n</i><br><b>\u21d2 \u0110\u00e1p \u00e1n A l\u00e0 \u0111\u00e1p \u00e1n ch\u00ednh x\u00e1c.\n</b><br><br>+) \u201cThe Dien Bien Phu Victory is even greater because it is a victory of a fledgling army of a weak nation which defeated a colonialist giant\u201d\n<br><i>(Chi\u1ebfn th\u1eafng \u0110i\u1ec7n Bi\u00ean Ph\u1ee7 c\u00f2n v\u0129 \u0111\u1ea1i h\u01a1n n\u1eefa v\u00ec \u0111\u00f3 l\u00e0 chi\u1ebfn th\u1eafng c\u1ee7a m\u1ed9t \u0111\u1ed9i qu\u00e2n non tr\u1ebb c\u1ee7a m\u1ed9t qu\u1ed1c gia y\u1ebfu \u1edbt \u0111\u00e3 \u0111\u00e1nh b\u1ea1i m\u1ed9t g\u00e3 kh\u1ed5ng l\u1ed3 th\u1ef1c d\u00e2n.)\n</i><br><b>\u21d2 \u0110\u00e1p \u00e1n B l\u00e0 \u0111\u00fang.\n</b><br><br>+) \ e1n, ph\u00e2n t\u00e1n\n<br><b>D.</b> ignored ( ignore) /\u026a\u0261\u02c8n\u0254\u02d0r/: ph\u1edbt l\u1edd, l\u00e0m ra v\u1ebb kh\u00f4ng bi\u1ebft \u0111\u1ebfn\n<br><br><b>- C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin sau: \n</b><br>\u201c It was also the first time in history that a major expeditionary army of a western imperialist country was <b>exterminated</b> in a colonial country.\u201d\n<br><i>(\u0110\u00e2y c\u0169ng l\u00e0 l\u1ea7n \u0111\u1ea7u ti\u00ean trong l\u1ecbch s\u1eed, m\u1ed9t \u0111\u1ed9i qu\u00e2n vi\u1ec5n chinh l\u1edbn c\u1ee7a m\u1ed9t n\u01b0\u1edbc \u0111\u1ebf qu\u1ed1c ph\u01b0\u01a1ng T\u00e2y <b>b\u1ecb ti\u00eau di\u1ec7t</b> \u1edf m\u1ed9t n\u01b0\u1edbc thu\u1ed9c \u0111\u1ecba.)\n</i><br><br>\u21d2 exterminate /\u026ak\u02c8st\u025c\u02d0rm\u026ane\u026at/ ~ annihilate: ti\u00eau hu\u1ef7 ti\u00eau di\u1ec7t\n<br>\u21d2 Do \u0111\u00f3, \u0111\u00e1p \u00e1n B l\u00e0 ph\u00f9 h\u1ee3p", "key": "B", "isVideo": false, "score": 0, "order": 49, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582906, "lessonId": 0, "a": "The battle only caused small fights and little damage.", "b": "The battle was brutal and destructive.", "c": "The destruction mainly affected only army targets.", "d": "The battle was fairly small and not very serious.", "bookId": 1086121, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 3, what can be inferred about the Dien Bien Phu battle, based on the imagery of  \"The burned-out forests, grey because of bombs\"?", "answer": "<b>Trong \u0111o\u1ea1n 3, c\u00f3 th\u1ec3 suy ra \u0111i\u1ec1u g\u00ec v\u1ec1 tr\u1eadn \u0110i\u1ec7n Bi\u00ean Ph\u1ee7, d\u1ef1a tr\u00ean h\u00ecnh \u1ea3nh \"The burned-out forests, grey because of bombs\"?\n</b><br><b>A. </b>Tr\u1eadn chi\u1ebfn \u0111\u01b0\u1ee3c \u0111\u00e1nh d\u1ea5u b\u1eb1ng nh\u1eefng cu\u1ed9c giao tranh nh\u1ecf v\u00e0 s\u1ef1 t\u00e0n ph\u00e1 h\u1ea1n ch\u1ebf.\n<br><b>B. </b>Tr\u1eadn chi\u1ebfn t\u00e0n kh\u1ed1c v\u00e0 mang t\u00ednh h\u1ee7y di\u1ec7t.\n<br><b>C.</b> S\u1ef1 t\u00e0n ph\u00e1 c\u1ee7a tr\u1eadn chi\u1ebfn ch\u1ee7 y\u1ebfu gi\u1edbi h\u1ea1n \u1edf c\u00e1c m\u1ee5c ti\u00eau qu\u00e2n s\u1ef1.\n<br><b>D.</b> Tr\u1eadn chi\u1ebfn c\u00f3 quy m\u00f4 t\u01b0\u01a1ng \u0111\u1ed1i nh\u1ecf.\n<br><br><b>- C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin sau: \n</b><br>\u201cThe burned-out forests, grey because of bombs, are now covered with the immense green of trees.\u201d\n<br><i>(Nh\u1eefng c\u00e1nh r\u1eebng ch\u00e1y \u0111en, x\u00e1m x\u1ecbt v\u00ec bom \u0111\u1ea1n, gi\u1edd \u0111\u00e2y \u0111\u01b0\u1ee3c ph\u1ee7 xanh b\u1edfi m\u00e0u xanh m\u00eanh m\u00f4ng c\u1ee7a c\u00e2y c\u1ed1i.)\n</i><br>\u21d2 D\u1ef1a v\u00e0o ngh\u0129a c\u1ee7a c\u00e2u n\u00e0y ta c\u00f3 th\u1ec3 th\u1ea5y \u0111\u00e2y l\u00e0 tr\u1eadn chi\u1ebfn t\u00e0n kh\u1ed1c v\u00e0 mang t\u00ednh hu\u1ef7 di\u1ec7t ch\u1ee9 kh\u00f4ng th\u1ec3 l\u00e0 cu\u1ed9c chi\u1ebfn \u0111\u01b0\u1ee3c \u0111\u00e1nh d\u1ea5u b\u1eb1ng nh\u1eefng cu\u1ed9c giao tranh nh\u1ecf hay gi\u1edbi h\u1ea1n b\u1edfi nh\u1eefng m\u1ee5c ti\u00eau qu\u00e2n s\u1ef1. ", "key": "B", "isVideo": false, "score": 0, "order": 50, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582908, "lessonId": 0, "a": "To compare the effects of the victory with the destruction of the region", "b": "To show the difference between the past destruction and the current peaceful life", "c": "To say that the damage after the battle was worse than the victory", "d": "To show that the area has recovered in an important and meaningful way", "bookId": 1086122, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 3, what is the author\u2019s purpose in describing the transformation of Dien Bien after the battle, with \"rice and crops now growing green while flowers bloom again\"?", "answer": "<b>Theo \u0111o\u1ea1n v\u0103n 3, m\u1ee5c \u0111\u00edch c\u1ee7a t\u00e1c gi\u1ea3 khi mi\u00eau t\u1ea3 s\u1ef1 chuy\u1ec3n m\u00ecnh c\u1ee7a \u0110i\u1ec7n Bi\u00ean sau tr\u1eadn chi\u1ebfn, v\u1edbi \"l\u00faa v\u00e0 m\u00f9a m\u00e0ng gi\u1edd \u0111\u00e2y xanh t\u01b0\u01a1i trong khi hoa l\u1ea1i n\u1edf\" l\u00e0 g\u00ec?\n</b><br><b>A.</b> So s\u00e1nh t\u00e1c \u0111\u1ed9ng c\u1ee7a chi\u1ebfn th\u1eafng v\u1edbi s\u1ef1 t\u00e0n ph\u00e1 c\u1ee7a khu v\u1ef1c.\n<br><b>B.</b> \u0110\u1ed1i chi\u1ebfu s\u1ef1 t\u00e0n ph\u00e1 trong qu\u00e1 kh\u1ee9 v\u1edbi s\u1ef1 ph\u00e1t tri\u1ec3n h\u00f2a b\u00ecnh hi\u1ec7n t\u1ea1i.\n<br><b>C.</b> G\u1ee3i \u00fd r\u1eb1ng h\u1eadu qu\u1ea3 c\u1ee7a tr\u1eadn chi\u1ebfn c\u00f2n t\u00e0n kh\u1ed1c h\u01a1n c\u1ea3 chi\u1ebfn th\u1eafng.\n<br><b>D.</b> Minh h\u1ecda r\u1eb1ng s\u1ef1 ph\u1ee5c h\u1ed3i c\u1ee7a khu v\u1ef1c l\u00e0 \u0111\u00e1ng k\u1ec3 ho\u1eb7c c\u00f3 \u00fd ngh\u0129a.\n<br><b><br>- C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin sau: \n</b><br>+) \u201cOn the hills and fields of death, rice and crops now grow green while flowers bloom again, returning the magical beauty of the Northwest mountains and forests to Dien Bien.\u201d\n<br><i>(Tr\u00ean nh\u1eefng ng\u1ecdn \u0111\u1ed3i,nh\u1eefng c\u00e1nh \u0111\u1ed3ng t\u01b0\u1edfng nh\u01b0 \u0111\u00e3 l\u1ee5i t\u00e0n, l\u00faa v\u00e0 hoa m\u00e0u gi\u1edd \u0111\u00e2y xanh t\u01b0\u01a1i, hoa l\u1ea1i n\u1edf, tr\u1ea3 l\u1ea1i v\u1ebb \u0111\u1eb9p k\u1ef3 di\u1ec7u c\u1ee7a n\u00fai r\u1eebng T\u00e2y B\u1eafc cho \u0110i\u1ec7n Bi\u00ean.)\n</i><br>\u21d2\u0110o\u1ea1n n\u00e0y so s\u00e1nh gi\u1eefa h\u00ecnh \u1ea3nh nh\u1eefng qu\u1ea3 \u0111\u1ed3i, c\u00e1nh \u0111\u1ed3ng d\u01b0\u1eddng nh\u01b0 \u0111\u00e3 l\u1ee5i t\u00e0n sau chi\u1ebfn tranh v\u1edbi nh\u1eefng c\u00e1nh \u0111\u1ed3ng l\u00faa v\u00e0 hoa m\u00e0u \u0111\u00e3 xanh t\u01b0\u01a1i, hoa l\u1ea1i n\u1edf.\n<br>\u21d2 Nh\u1eb1m so s\u00e1nh nh\u01b0ng t\u00e0n ph\u00e1 c\u1ee7a chi\u1ebfn tranh trong qu\u00e1 kh\u1ee9 v\u1edbi s\u1ef1 ph\u00e1t tri\u1ec3n c\u1ee7a ho\u00e0 b\u00ecnh hi\u1ec7n t\u1ea1i. \n<br><br><b>+) \u0110\u00e1p \u00e1n A sai</b> v\u00ec \u0111o\u1ea1n n\u00e0y kh\u00f4ng so s\u00e1nh chi\u1ebfn th\u1eafng v\u1edbi s\u1ef1 ph\u00e1 h\u1ee7y.\n<br><b>+) \u0110\u00e1p \u00e1n C sai</b> v\u00ec kh\u00f4ng c\u00f3 \u00fd n\u00f3i h\u1eadu qu\u1ea3 t\u1ed3i t\u1ec7 h\u01a1n chi\u1ebfn th\u1eafng.\n<br><b>+) \u0110\u00e1p \u00e1n D sai</b> v\u00ec \u0111o\u1ea1n m\u00f4 t\u1ea3 s\u1ef1 h\u1ed3i ph\u1ee5c nh\u01b0ng nh\u1ea5n m\u1ea1nh h\u01a1n v\u00e0o vi\u1ec7c so s\u00e1nh nh\u1eefng t\u00e0n ph\u00e1 c\u1ee7a chi\u1ebfn tranh trong qu\u00e1 kh\u1ee9 v\u00e0 h\u00f2a b\u00ecnh hi\u1ec7n t\u1ea1i. \n<br><br><b>\u21d2 \u0110\u00e1p \u00e1n B l\u00e0 \u0111\u00e1p \u00e1n ch\u00ednh x\u00e1c.\n</b>", "key": "B", "isVideo": false, "score": 0, "order": 51, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582911, "lessonId": 0, "a": "the glorious victories of Vietnam", "b": "the winners of the Dien Bien Phu Campaign", "c": "the magical beauty of the Northwest mountains and forests", "d": "the preserved history", "bookId": 1086123, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What does <b>their </b>in paragraph 3 refer to?", "answer": "<b>T\u1eeb \"Their\" trong \u0111o\u1ea1n 3 \u00e1m ch\u1ec9 \u0111i\u1ec1u g\u00ec?\n</b><br><b>A. </b>nh\u1eefng chi\u1ebfn th\u1eafng v\u1ebb vang c\u1ee7a Vi\u1ec7t Nam\n<br><b>B.</b> nh\u1eefng ng\u01b0\u1eddi chi\u1ebfn th\u1eafng trong Chi\u1ebfn d\u1ecbch \u0110i\u1ec7n Bi\u00ean Ph\u1ee7\n<br><b>C.</b> v\u1ebb \u0111\u1eb9p k\u1ef3 di\u1ec7u c\u1ee7a n\u00fai r\u1eebng T\u00e2y B\u1eafc\n<br><b>D.</b> l\u1ecbch s\u1eed \u0111\u01b0\u1ee3c l\u01b0u gi\u1eef\n<br><br><b>- C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin sau: \n</b><br>\u201cThe winners of the Dien Bien Phu Campaign in the past have mostly passed away, but their glorious victories will forever be preserved in history.\u201d\n<br><i>(Nh\u1eefng ng\u01b0\u1eddi chi\u1ebfn th\u1eafng trong Chi\u1ebfn d\u1ecbch \u0110i\u1ec7n Bi\u00ean Ph\u1ee7 tr\u01b0\u1edbc \u0111\u00e2y ph\u1ea7n l\u1edbn \u0111\u00e3 qua \u0111\u1eddi, nh\u01b0ng chi\u1ebfn th\u1eafng v\u1ebb vang c\u1ee7a h\u1ecd s\u1ebd m\u00e3i m\u00e3i \u0111\u01b0\u1ee3c l\u01b0u gi\u1eef trong l\u1ecbch s\u1eed.)\n</i><br>\u21d2Th\u00f4ng tin c\u1ee7a \u0111o\u1ea1n cho th\u1ea5y \u201ctheir\u201d \u1edf \u0111\u00e2y \u00e1m ch\u1ec9 \u0111\u1ebfn nh\u1eefng ng\u01b0\u1eddi chi\u1ebfn th\u1eafng trong Chi\u1ebfn d\u1ecbch \u0110i\u1ec7n Bi\u00ean Ph\u1ee7.\n<br><br><b>\u21d2\u0110\u00e1p \u00e1n B l\u00e0 \u0111\u00e1p \u00e1n ch\u00ednh x\u00e1c.</b>", "key": "B", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully", "content": "1. Economic fluctuations are a significant contributor to unemployment, which acts as a barometer for the health of a job market. During periods of economic downturn or <b>recession</b>, businesses face declining profits, reduced consumer spending, and often diminishing markets. This can lead to cost-cutting measures, including layoffs or hiring freezes, as companies strive to maintain financial stability. Conversely, in times of economic growth or expansion, the increased demand for goods and services often leads to job creation, as businesses need more hands to meet consumer demand. These cyclical changes directly influence the employment rate, making economic fluctuations a fundamental factor in the rise and fall of unemployment levels.<br>2. Technological advancement, while driving progress and efficiency, can lead to structural unemployment. As industries innovate and adopt new technologies, certain jobs become obsolete, and demand for the related skills diminishes. This shift can lead to a mismatch in the job market, where there\u2019s a surplus of workers with skills that are no longer needed and a shortage of workers with in-demand skills. While technological progress also creates new types of jobs and industries, these transitions can be challenging and often leave gaps in employment.<br>3. The globalization of world economic activity means jobs often move to places where labor is cheaper and/or where specific skills are available. We especially see this movement in manufacturing and certain service sectors. This movement benefits some economies and leads to job losses in others. <br>4. Education and training is an enabler that helps people acquire the skills and knowledge necessary to compete in the job market. Without these educational foundations and opportunities for skill development, individuals can struggle to meet the demands of employers or adapt to changing job market requirements, resulting in higher rates of unemployment.<br>5. This issue is particularly <b>acute </b>in areas with limited educational resources, where people may not have opportunities for personal and professional development, or in circumstances where education and training costs are prohibitively high. Addressing this gap is crucial not just for the individuals affected, but also for the broader economy, as a highly skilled workforce is essential for economic growth, innovation, and improved economic mobility.<br>6. Discrimination and bias in the workplace play a significant role in perpetuating unemployment and underemployment for various marginalized groups. Despite having the qualifications and skills for the job, individuals may face barriers to employment based on race, gender, age, disability, sexual orientation, or other personal characteristics. Discrimination not only affects the individuals who are directly impacted, resulting in higher rates of unemployment and underemployment in these groups; <b><u>it</u></b> also harms the economy at large by underutilizing the talent pool and perpetuating social inequalities. <br><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21582965, "lessonId": 0, "a": "The Economic Benefits of Globalization", "b": "The Role of Technology in Modern Workplaces", "c": "Factors Contributing to Unemployment", "d": "Education as a Solution to Job Loss", "bookId": 1086124, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title for the passage can be ________.", "answer": "<b>Ti\u00eau \u0111\u1ec1 hay nh\u1ea5t cho \u0111o\u1ea1n v\u0103n c\u00f3 th\u1ec3 l\u00e0 ________.\n</b><br><b>A.</b> L\u1ee3i \u00edch kinh t\u1ebf c\u1ee7a to\u00e0n c\u1ea7u h\u00f3a\n<br><b>B.</b> Vai tr\u00f2 c\u1ee7a c\u00f4ng ngh\u1ec7 trong n\u01a1i l\u00e0m vi\u1ec7c hi\u1ec7n \u0111\u1ea1i\n<br><b>C. </b>C\u00e1c y\u1ebfu t\u1ed1 g\u00f3p ph\u1ea7n g\u00e2y ra t\u00ecnh tr\u1ea1ng th\u1ea5t nghi\u1ec7p\n<br><b>D.</b> Gi\u00e1o d\u1ee5c nh\u01b0 m\u1ed9t gi\u1ea3i ph\u00e1p cho t\u00ecnh tr\u1ea1ng m\u1ea5t vi\u1ec7c l\u00e0m\n<br><br><b>- C\u0103n c\u1ee9 v\u00e0o nh\u1eefng th\u00f4ng tin sau: \n</b><br>+) \u201cEconomic fluctuations are a significant contributor to unemployment, which acts as a barometer for the health of a job market.\u201d\n<br><i>(Bi\u1ebfn \u0111\u1ed9ng kinh t\u1ebf l\u00e0 m\u1ed9t y\u1ebfu t\u1ed1 l\u1edbn g\u00e2y ra t\u00ecnh tr\u1ea1ng th\u1ea5t nghi\u1ec7p, \u0111\u00f3ng vai tr\u00f2 l\u00e0 th\u01b0\u1edbc \u0111o s\u1ef1 \u1ed5n \u0111\u1ecbnh c\u1ee7a th\u1ecb tr\u01b0\u1eddng vi\u1ec7c l\u00e0m.)\                                     }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
