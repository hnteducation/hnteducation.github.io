0fac: <b>Every day + clause ho\u1eb7c Clause + every day.</b><br>\u21d2 Tr\u01b0\u1edbc danh t\u1eeb \u201cproblems\u201d, ta c\u1ea7n 1 t\u00ednh t\u1eeb b\u1ed5 ngh\u0129a<br>\u21d2 S\u1eeda l\u1ed7i: <b>every day \u21d2 everyday</b><br><b>T\u1ea1m d\u1ecbch</b>: M\u1ed9t trong nh\u1eefng \u0111i\u1ec1u quan tr\u1ecdng nh\u1ea5t m\u00e0 ng\u01b0\u1eddi c\u1ed1 v\u1ea5n c\u1ee7a t\u00f4i \u0111\u00e3 d\u1ea1y t\u00f4i l\u00e0 kh\u00f4ng n\u00ean c\u0103ng th\u1eb3ng v\u00ec nh\u1eefng v\u1ea5n \u0111\u1ec1 nh\u1ecf nh\u1eb7t h\u00e0ng ng\u00e0y.", "key": "D", "isVideo": true, "score": 0, "order": 40, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 41-45: Which of the following best restates each of the given sentences? ", "content": "", "listQuestion": [{"questionId": 21577110, "lessonId": 0, "a": "Scarcely had the meeting started than the fire alarm went off.", "b": "Only when the meeting ended did the fire alarm go off.", "c": "No sooner had the meeting started than the fire alarm went off.", "d": "The fire alarm went off just before the meeting ended.", "bookId": 1085932, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<b>Hardly had the meeting commenced when the fire alarm went off.</b>", "answer": "<b>T\u1ea1m d\u1ecbch:</b> Cu\u1ed9c h\u1ecdp v\u1eeba m\u1edbi b\u1eaft \u0111\u1ea7u th\u00ec chu\u00f4ng b\u00e1o ch\u00e1y reo.\n\n<br><br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:\n</b><br><b>A.</b> Scarcely had the meeting started than the fire alarm went off.\n<br><i>(Cu\u1ed9c h\u1ecdp v\u1eeba m\u1edbi b\u1eaft \u0111\u1ea7u th\u00ec chu\u00f4ng b\u00e1o ch\u00e1y reo.)\n</i><br><b>=&gt; Sai</b>. \u201cscarcely\u2026than\u201d kh\u00f4ng ph\u1ea3i c\u1ea5u tr\u00fac \u0111\u00fang, ph\u1ea3i l\u00e0 \u201cscarcely\u2026when\u201d.\n\n<br><br><b>B.</b> Only when the meeting ended did the fire alarm go off.\n<br><i>(Ch\u1ec9 khi cu\u1ed9c h\u1ecdp k\u1ebft th\u00fac th\u00ec chu\u00f4ng b\u00e1o ch\u00e1y reo.)\n</i><br><b>=&gt; Sai.</b> C\u00e2u g\u1ed1c n\u00f3i cu\u1ed9c h\u1ecdp v\u1eeba b\u1eaft \u0111\u1ea7u th\u00ec chu\u00f4ng reo, c\u00f2n c\u00e2u n\u00e0y n\u00f3i cu\u1ed9c h\u1ecdp ph\u1ea3i k\u1ebft th\u00fac chu\u00f4ng m\u1edbi reo.\n<br>\n<br><b>C.</b> No sooner had the meeting started than the fire alarm went off.\n<br><i>(V\u1eeba m\u1edbi b\u1eaft \u0111\u1ea7u cu\u1ed9c h\u1ecdp th\u00ec chu\u00f4ng b\u00e1o ch\u00e1y reo.)\n</i><br><b>=&gt; \u0110\u00fang. \n\n</b><br><br><b>D.</b> The fire alarm went off just before the meeting ended.\n<br><i>(Chu\u00f4ng b\u00e1o ch\u00e1y reo ngay tr\u01b0\u1edbc khi cu\u1ed9c h\u1ecdp k\u1ebft th\u00fac.)\n</i><br><b>=&gt; Sai.</b> C\u00e2u g\u1ed1c n\u00f3i v\u1eeba b\u1eaft \u0111\u1ea7u th\u00ec chu\u00f4ng reo, c\u00f2n c\u00e2u n\u00e0y n\u00f3i chu\u00f4ng reo ngay tr\u01b0\u1edbc khi  cu\u1ed9c h\u1ecdp k\u1ebft th\u00fac.\n", "key": "C", "isVideo": true, "score": 0, "order": 41, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577111, "lessonId": 0, "a": "Sarah warned that she could be late for the meeting, but she would try her best.", "b": "Sarah told me that she might be late for the meeting, but she\u2019ll try her best.", "c": "Sarah said that she might be late for the meeting, but she would try her best.", "d": "Sarah admitted that she might be late for the meeting, but she would try her best.", "bookId": 1085933, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<b>\u201cI might be late for the meeting, but I\u2019ll try my best,\u201d Sarah said.</b>", "answer": "<b>T\u1ea1m d\u1ecbch:</b> \u201cT\u00f4i c\u00f3 th\u1ec3 \u0111\u1ebfn mu\u1ed9n cu\u1ed9c h\u1ecdp, nh\u01b0ng t\u00f4i s\u1ebd c\u1ed1 g\u1eafng h\u1ebft s\u1ee9c,\u201d Sarah n\u00f3i.<br><br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:</b><br><b>A.</b> Sarah warned that she could be late for the meeting, but she would try her best.<br><i>(Sarah c\u1ea3nh b\u00e1o r\u1eb1ng c\u00f4 \u1ea5y c\u00f3 th\u1ec3 \u0111\u1ebfn mu\u1ed9n cu\u1ed9c h\u1ecdp, nh\u01b0ng s\u1ebd c\u1ed1 g\u1eafng h\u1ebft s\u1ee9c.)</i><br><b>=&gt; Sai.</b> Th\u00eam \u201cwarned\u201d l\u00e0m thay \u0111\u1ed5i s\u1eafc th\u00e1i. C\u00e2u g\u1ed1c ch\u1ec9 th\u00f4ng b\u00e1o kh\u1ea3 n\u0103ng, kh\u00f4ng ph\u1ea3i c\u1ea3nh b\u00e1o.<br><br><b>B.</b> Sarah told me that she might be late for the meeting, but she\u2019ll try her best.<br><i>(Sarah n\u00f3i v\u1edbi t\u00f4i r\u1eb1ng c\u00f4 \u1ea5y c\u00f3 th\u1ec3 \u0111\u1ebfn mu\u1ed9n cu\u1ed9c h\u1ecdp, nh\u01b0ng s\u1ebd c\u1ed1 g\u1eafng h\u1ebft s\u1ee9c.)</i><br><b>=&gt; Sai. </b>\u201cshe\u2019ll\u201d c\u1ea7n l\u00f9i th\u00ec khi chuy\u1ec3n sang gi\u00e1n ti\u1ebfp th\u00e0nh \u201c she would\u201d.<br><br><b>C.</b> Sarah said that she might be late for the meeting, but she would try her best.<br><i>(Sarah n\u00f3i r\u1eb1ng c\u00f4 \u1ea5y c\u00f3 th\u1ec3 \u0111\u1ebfn mu\u1ed9n cu\u1ed9c h\u1ecdp, nh\u01b0ng s\u1ebd c\u1ed1 g\u1eafng h\u1ebft s\u1ee9c.)</i><br><b>=&gt; \u0110\u00fang. </b><br><br><b>D.</b> Sarah admitted that she might be late for the meeting, but she would try her best.<br><i>(Sarah th\u1eeba nh\u1eadn r\u1eb1ng c\u00f4 \u1ea5y c\u00f3 th\u1ec3 \u0111\u1ebfn mu\u1ed9n cu\u1ed9c h\u1ecdp, nh\u01b0ng s\u1ebd c\u1ed1 g\u1eafng h\u1ebft s\u1ee9c.)</i><br><b>=&gt; Sai. </b>Thay \u0111\u1ed5i s\u1eafc th\u00e1i. \u201cadmit\u201d mang ngh\u0129a th\u1eeba nh\u1eadn l\u1ed7i, kh\u00f4ng ph\u1ea3i th\u00f4ng b\u00e1o kh\u1ea3 n\u0103ng.", "key": "C", "isVideo": true, "score": 0, "order": 42, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577112, "lessonId": 0, "a": "You can borrow my laptop whether you return it by tomorrow or not.", "b": "Despite returning it by tomorrow, you\u2019re not allowed to borrow my laptop.", "c": "Unless you return it by tomorrow, you can borrow it.", "d": "Provided you return it by tomorrow, you can borrow my laptop.", "bookId": 1085934, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<b>You can borrow my laptop as long as you return it by tomorrow.</b>", "answer": "<b>T\u1ea1m d\u1ecbch:</b> B\u1ea1n c\u00f3 th\u1ec3 m\u01b0\u1ee3n laptop c\u1ee7a t\u00f4i mi\u1ec5n l\u00e0 b\u1ea1n tr\u1ea3 l\u1ea1i tr\u01b0\u1edbc ng\u00e0y mai.\n\n<br><br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:\n</b><br><b>A.</b> You can borrow my laptop whether you return it by tomorrow or not.\n<br><i>(B\u1ea1n c\u00f3 th\u1ec3 m\u01b0\u1ee3n laptop d\u00f9 b\u1ea1n c\u00f3 tr\u1ea3 l\u1ea1i tr\u01b0\u1edbc ng\u00e0y mai hay kh\u00f4ng.)\n</i><br><b>=&gt; Sai.</b> C\u00e2u n\u00e0y th\u1ec3 hi\u1ec7n r\u1eb1ng vi\u1ec7c b\u1ea1n c\u00f3 tr\u1ea3 hay kh\u00f4ng kh\u00f4ng quan tr\u1ecdng, trong khi c\u00e2u g\u1ed1c nh\u1ea5n m\u1ea1nh \u0111i\u1ec1u ki\u1ec7n b\u1eaft bu\u1ed9c l\u00e0 ph\u1ea3i tr\u1ea3 \u0111\u00fang h\u1ea1n.\n\n<br><br><b>B.</b> Despite returning it by tomorrow, you\u2019re not allowed to borrow my laptop.\n<br><i>(M\u1eb7c d\u00f9 b\u1ea1n tr\u1ea3 l\u1ea1i tr\u01b0\u1edbc ng\u00e0y mai, b\u1ea1n v\u1eabn kh\u00f4ng \u0111\u01b0\u1ee3c m\u01b0\u1ee3n laptop.)\n</i><br><b>=&gt; Sai.</b> C\u00e2u n\u00e0y th\u1ec3 hi\u1ec7n m\u00e2u thu\u1eabn v\u1edbi c\u00e2u g\u1ed1c: ng\u01b0\u1eddi n\u00f3i t\u1eeb ch\u1ed1i cho m\u01b0\u1ee3n, trong khi c\u00e2u g\u1ed1c cho ph\u00e9p m\u01b0\u1ee3n n\u1ebfu \u0111i\u1ec1u ki\u1ec7n \u0111\u01b0\u1ee3c \u0111\u00e1p \u1ee9ng.\n\n<br><br><b>C. </b>Unless you return it by tomorrow, you can borrow it.\n<br><i>(N\u1ebfu b\u1ea1n kh\u00f4ng tr\u1ea3 l\u1ea1i tr\u01b0\u1edbc ng\u00e0y mai, b\u1ea1n c\u00f3 th\u1ec3 m\u01b0\u1ee3n n\u00f3.)\n</i><br><b>=&gt; Sai</b>. Tr\u00e1i ng\u01b0\u1ee3c ngh\u0129a v\u1edbi c\u00e2u g\u1ed1c.\n\n<br><br><b>D.</b> Provided you return it by tomorrow, you can borrow my laptop.\n<br><i>(Mi\u1ec5n l\u00e0 b\u1ea1n tr\u1ea3 l\u1ea1i tr\u01b0\u1edbc ng\u00e0y mai, b\u1ea1n c\u00f3 th\u1ec3 m\u01b0\u1ee3n laptop c\u1ee7a t\u00f4i.)\n</i><br><b>=&gt; \u0110\u00fang</b>. \u201cProvided\u201d th\u1ec3 hi\u1ec7n \u0111i\u1ec1u ki\u1ec7n ch\u1ea5p thu\u1eadn, ngh\u0129a l\u00e0 vi\u1ec7c cho m\u01b0\u1ee3n ch\u1ec9 x\u1ea3y ra n\u1ebfu ng\u01b0\u1eddi nghe \u0111\u00e1p \u1ee9ng \u0111i\u1ec1u ki\u1ec7n.\n", "key": "D", "isVideo": true, "score": 0, "order": 43, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577116, "lessonId": 0, "a": "Susan needed at least two days to prepare the report last week.", "b": "Susan spent nearly two days preparing the report last week.", "c": "Susan required a two day report last week.", "d": "Susan had to prepare the report in two days last week.", "bookId": 1085935, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<b>It took Susan nearly two days to prepare the report last week.</b>", "answer": "<b>T\u1ea1m d\u1ecbch:</b> Susan m\u1ea5t g\u1ea7n hai ng\u00e0y \u0111\u1ec3 chu\u1ea9n b\u1ecb b\u1ea3n b\u00e1o c\u00e1o v\u00e0o tu\u1ea7n tr\u01b0\u1edbc.\n\n<br><br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:\n\n</b><br><b>A.</b> Susan needed at least two days to prepare the report last week.\n<br><i>(Susan c\u1ea7n \u00edt nh\u1ea5t hai ng\u00e0y \u0111\u1ec3 chu\u1ea9n b\u1ecb b\u00e1o c\u00e1o v\u00e0o tu\u1ea7n tr\u01b0\u1edbc.)\n</i><br><b>=&gt; Sai.</b> \u201cAt least\u201d (\u00edt nh\u1ea5t) di\u1ec5n t\u1ea3 nhi\u1ec1u h\u01a1n ho\u1eb7c b\u1eb1ng hai ng\u00e0y, trong khi c\u00e2u g\u1ed1c l\u00e0 g\u1ea7n hai ng\u00e0y.\n\n<br><br><b>B.</b> Susan spent nearly two days preparing the report last week.\n<br><i>(Susan \u0111\u00e3 d\u00e0nh g\u1ea7n hai ng\u00e0y \u0111\u1ec3 chu\u1ea9n b\u1ecb b\u1ea3n b\u00e1o c\u00e1o v\u00e0o tu\u1ea7n tr\u01b0\u1edbc.)\n</i><br><b>=&gt; \u0110\u00fang. \n\n</b><br><br><b>C.</b> Susan required a two day report last week.\n<br><i>(Susan y\u00eau c\u1ea7u m\u1ed9t b\u1ea3n b\u00e1o c\u00e1o hai ng\u00e0y v\u00e0o tu\u1ea7n tr\u01b0\u1edbc.)\n</i><br><b>=&gt; Sai.</b> C\u00e2u g\u1ed1c n\u00f3i Susan chu\u1ea9n b\u1ecb b\u00e1o c\u00e1o, kh\u00f4ng ph\u1ea3i Susan y\u00eau c\u1ea7u b\u00e1o c\u00e1o. C\u1ea7n th\u00eam g\u1ea1ch n\u1ed1i gi\u1eefa \u201ctwo\u201d v\u00e0 \u201cday\u201d \u0111\u1ec3 t\u1ea1o t\u00ednh t\u1eeb gh\u00e9p.\n\n<br><br><b>D.</b> Susan had to prepare the report in two days last week.\n<br><i>(Susan ph\u1ea3i chu\u1ea9n b\u1ecb b\u1ea3n b\u00e1o c\u00e1o trong v\u00f2ng hai ng\u00e0y v\u00e0o tu\u1ea7n tr\u01b0\u1edbc.)\n</i><br><b>=&gt; Sai.</b> \u201cHad to\u201d th\u1ec3 hi\u1ec7n s\u1ef1 b\u1eaft bu\u1ed9c. Ngo\u00e0i ra, \u201cin two days\u201d di\u1ec5n t\u1ea3 th\u1eddi h\u1ea1n ho\u1eb7c kho\u1ea3ng th\u1eddi gian gi\u1edbi h\u1ea1n, kh\u00e1c v\u1edbi th\u1eddi gian th\u1ef1c t\u1ebf \u0111\u1ec3 ho\u00e0n th\u00e0nh.\n", "key": "B", "isVideo": true, "score": 0, "order": 44, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10470372, "lessonId": 0, "a": "He was so naive that all the people around him could easily trick him.", "b": "He now admits that some of the people around him didn\u2019t deserve to be trusted at all.", "c": "The general opinion is that he made the mistake of having so much faith in the people around him.", "d": "Nobody thinks that any of the people around him are honest enough to be trusted.", "bookId": 290725, "comments": 0, "bookmarks": 11, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<b>Everybody believes that he shouldn\u2019t have trusted the people around him so much.</b>", "answer": "<b>T\u1ea1m d\u1ecbch</b>: M\u1ecdi ng\u01b0\u1eddi \u0111\u1ec1u cho r\u1eb1ng l\u1ebd ra anh \u1ea5y kh\u00f4ng n\u00ean qu\u00e1 tin t\u01b0\u1edfng nh\u1eefng ng\u01b0\u1eddi xung quanh. <br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n<br></b>A. Anh \u1ea5y ng\u00e2y th\u01a1 \u0111\u1ebfn m\u1ee9c t\u1ea5t c\u1ea3 nh\u1eefng ng\u01b0\u1eddi xung quanh \u0111\u1ec1u c\u00f3 th\u1ec3 d\u1ec5 d\u00e0ng l\u1eeba \u0111\u01b0\u1ee3c anh \u1ea5y.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. \u0110\u1ec1 b\u00e0i kh\u00f4ng \u0111\u1ec1 c\u1eadp \u0111\u1ebfn anh \u1ea5y l\u00e0 m\u1ed9t con ng\u01b0\u1eddi qu\u00e1 ng\u00e2y th\u01a1.<br>B. B\u00e2y gi\u1edd anh \u1ea5y th\u1eeba nh\u1eadn r\u1eb1ng m\u1ed9t s\u1ed1 ng\u01b0\u1eddi xung quanh anh \u1ea5y kh\u00f4ng \u0111\u00e1ng \u0111\u01b0\u1ee3c tin t\u01b0\u1edfng ch\u00fat n\u00e0o.<br>\u21d2 \u0110\u00e1p \u00e1n sai. \u0110\u1ec1 b\u00e0i ch\u1ec9 n\u00eau \u00fd ki\u1ebfn c\u1ee7a m\u1ecdi ng\u01b0\u1eddi v\u1ec1 anh \u1ea5y, kh\u00f4ng ph\u1ea3i anh \u1ea5y n\u00eau ra.<br>C. \u00dd ki\u1ebfn chung cho r\u1eb1ng anh \u1ea5y \u0111\u00e3 ph\u1ea1m sai l\u1ea7m khi \u0111\u1eb7t qu\u00e1 nhi\u1ec1u ni\u1ec1m tin v\u00e0o nh\u1eefng ng\u01b0\u1eddi xung quanh.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang<br>D. Kh\u00f4ng ai ngh\u0129 r\u1eb1ng nh\u1eefng ng\u01b0\u1eddi xung quanh anh \u1ea5y \u0111\u1ee7 trung th\u1ef1c \u0111\u1ec3 c\u00f3 th\u1ec3 tin c\u1eady \u0111\u01b0\u1ee3c.<br>\u21d2 Sai v\u1ec1 ngh\u0129a.", "key": "C", "isVideo": true, "score": 0, "order": 45, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 46-52: Read the passage carefully.", "content": "<i>Choose an option (A, B, C, or D) that best answers each question.</i><br>1. Social networking sites like Facebook and MySpace do not help you make more genuine close friends, according to a survey by researchers who studied how the websites are changing the nature of friendship networks. Although social networking on the internet helps people to collect hundreds or even thousands of acquaintances, the researchers believe that face to face contact is nearly always necessary to form truly close friendships.<br>2. Previous research has suggested that a person's conventional friendship group consists of around 150 people, with five very close friends but larger numbers of people who we keep in touch with less regularly. This figure is so consistent that scientists have suggested it is determined by the cognitive <b>constraints </b>of keeping up with large numbers of people. But Dr. Reader and his team have found that social networking sites do allow people to stretch this figure. The team asked over 200 people to fill in questionnaires about their online networking, asking for example how many online friends they had, how many of <b>these </b>were close friends and how many they had met face to face. The team found that although the sites allowed contact with hundreds of acquaintances, as with conventional friendship networks, people tend to have around 5 close friends. Also, 90% of contacts that the subjects regarded as close friends were people they had met face to face. \"People see face to face contact as being absolutely imperative in forming close friendships,\" added Dr. Reader. <br>3. But to develop a real friendship we need to see that the other person is trustworthy, said Dr. Reader. \"What we need is to be absolutely sure that a person is really going to invest in us, is really going to be there for us when we need them ... It's very easy to be deceptive on the internet..\"<br><div style=\"text-align: right;\"><i>(Source: https://www.theguardian.com/)</i></div>", "listQuestion": [{"questionId": 10470021, "lessonId": 0, "a": "Can 0e2n l\u00e0 nh\u1eefng ng\u01b0\u1eddi m\u00e0 h\u1ecd \u0111\u00e3 g\u1eb7p m\u1eb7t tr\u1ef1c ti\u1ebfp</u>.)\n</i>", "key": " ", "isVideo": false, "score": 0, "order": 51, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577134, "lessonId": 0, "a": "money is absolutely necessary in friendships", "b": "a friend in need is a friend indeed", "c": "give-and-take is an attitude and approach to a true friendship", "d": "mutual trust between friends is one of the major qualities that a friendship should have", "bookId": 1085941, "comments": 4, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "It is implied in the last paragraph that ______________.", "answer": "<b>\u0110o\u1ea1n cu\u1ed1i c\u00f3 th\u1ec3 suy ra \u0111i\u1ec1u g\u00ec?\n</b><br>A. Ti\u1ec1n b\u1ea1c l\u00e0 \u0111i\u1ec1u c\u1ea7n thi\u1ebft trong t\u00ecnh b\u1ea1n. \n<br>B. M\u1ed9t ng\u01b0\u1eddi b\u1ea1n khi ho\u1ea1n n\u1ea1n m\u1edbi l\u00e0 b\u1ea1n th\u1ef1c s\u1ef1. \n<br>C. Cho v\u00e0 nh\u1eadn l\u00e0 th\u00e1i \u0111\u1ed9 v\u00e0 c\u00e1ch ti\u1ebfp c\u1eadn trong m\u1ed9t t\u00ecnh b\u1ea1n th\u1ef1c s\u1ef1. \n<br>D. S\u1ef1 tin t\u01b0\u1edfng l\u1eabn nhau gi\u1eefa b\u1ea1n b\u00e8 l\u00e0 m\u1ed9t trong nh\u1eefng ph\u1ea9m ch\u1ea5t quan tr\u1ecdng c\u1ee7a t\u00ecnh b\u1ea1n.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin:\n</b><br>to develop a real friendship we need to see that the other person is trustworthy.<br><i>(\u0111\u1ec3 ph\u00e1t tri\u1ec3n m\u1ed9t t\u00ecnh b\u1ea1n th\u1ef1c s\u1ef1, ch\u00fang ta c\u1ea7n ch\u1eafc ch\u1eafn r\u1eb1ng ng\u01b0\u1eddi kia \u0111\u00e1ng tin c\u1eady.)\n</i><br><br>=&gt; \u0110\u1ec3 x\u00e2y d\u1ef1ng t\u00ecnh b\u1ea1n th\u1eadt s\u1ef1, s\u1ef1 tin t\u01b0\u1edfng l\u00e0 c\u1ea7n thi\u1ebft.", "key": " ", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully.", "content": "1. Everyone can feel anxious sometimes, but people with anxiety disorders often experience fear and worry that is both intense and excessive. These feelings are typically accompanied by physical tension and other behavioral and cognitive symptoms. They are difficult to control, cause significant distress and can last a long time if untreated. Anxiety disorders interfere with daily activities and can <b>impair </b>a person\u2019s relationships, social interactions, and performance at work or school.<br>2. Anxiety disorders, like other mental health conditions, result from a complex interaction of social, psychological and biological factors. Anyone can have an anxiety disorder, but people who have lived through abuse, severe losses or other adverse experiences are more likely to develop one.<br>3. Anxiety disorders are closely related to and affected by physical health. Many of the impacts of anxiety (such as physical tension, nervous system hyperactivity or harmful use of alcohol) are also known risk factors for diseases such as cardiovascular disease. In turn, people with these diseases may also find themselves experiencing anxiety disorders due to the difficulties associated with managing their conditions.<br>4. There are several effective treatments for anxiety disorders. Psychological interventions are essential treatments for anxiety disorders and refer primarily to talk therapy with professionals or supervised lay therapists. These interventions can help people learn new ways of thinking, coping or relating to their anxiety, to others or to the world. They can teach people how to face the situations, events, people or places that trigger their anxiety.<br>5. Psychological interventions can be provided to individuals or groups, in person or online. <b>They </b>may also be accessed through self-help manuals, websites and apps. The psychological interventions with the most evidence for treating a range of anxiety disorders are those based on principles of cognitive-behavioral therapy. These include exposure therapy, during which people learn to confront their fears.<br>6. In addition, learning stress management skills, such as relaxation skills and mindfulness skills, can help reduce symptoms of anxiety disorders. Antidepressant medications, such as selective serotonin reuptake inhibitors (SSRIs), can also be useful in treating adults with anxiety disorders. Health-care providers should keep in mind the possible adverse effects associated with antidepressant medication and individual preferences.<br><div style=\"text-align: right;\"><i>(Source: https://www.who.int)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21577140, "lessonId": 0, "a": "Causes and Treatments of Anxiety Disorders", "b": "The History of Anxiety Disorders", "c": "How to Avoid Stress Completely", "d": "Only Medication Can Cure Anxiety", "bookId": 1085942, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title of the passage can be _______.", "answer": "<b>Ti\u00eau \u0111\u1ec1 ph\u00f9 h\u1ee3p nh\u1ea5t cho \u0111o\u1ea1n v\u0103n c\u00f3 th\u1ec3 l\u00e0 _______.\n</b><br><b>A.</b> Nguy\u00ean nh\u00e2n v\u00e0 c\u00e1ch \u0111i\u1ec1u tr\u1ecb c\u00e1c r\u1ed1i lo\u1ea1n lo \u00e2u\n<br><b>=&gt; \u0110\u00fang</b>, bao qu\u00e1t \u00fd to\u00e0n b\u00e0i\n\n\n<br><br><b>B.</b> L\u1ecbch s\u1eed c\u1ee7a c\u00e1c r\u1ed1i lo\u1ea1n lo \u00e2u\n<br><b>=&gt; Kh\u00f4ng n\u00f3i v\u1ec1 l\u1ecbch s\u1eed\n\n\n</b><br><br><b>C. </b>C\u00e1ch \u0111\u1ec3 tr\u00e1nh c\u0103ng th\u1eb3ng ho\u00e0n to\u00e0n\n<br><b>=&gt; Sai</b> v\u00ec b\u00e0i kh\u00f4ng n\u00f3i r\u1eb1ng c\u00f3 th\u1ec3 tr\u00e1nh ho\u00e0n to\u00e0n\n\n\n<br><br><b>D.</b> Ch\u1ec9 thu\u1ed1c men m\u1edbi c\u00f3 th\u1ec3 ch\u1eefa kh\u1ecfi lo \u00e2u\n<br><b>=&gt; Sai</b> v\u00ec thu\u1ed1c ch\u1ec9 l\u00e0 m\u1ed9t ph\u1ea7n h\u1ed7 tr\u1ee3, kh\u00f4ng ph\u1ea3i c\u00e1ch duy nh\u1ea5t.\n\n\n<br><br><b>Gi\u1ea3i th\u00edch:\n</b><br><b>\u0110o\u1ea1n 1:</b> Gi\u1edbi thi\u1ec7u r\u1ed1i lo\u1ea1n lo \u00e2u \u2013 m\u00f4 t\u1ea3 c\u00e1c tri\u1ec7u ch\u1ee9ng, t\u00e1c \u0111\u1ed9ng ti\u00eau c\u1ef1c \u0111\u1ebfn cu\u1ed9c s\u1ed1ng, c\u00f4ng vi\u1ec7c v\u00e0 c\u00e1c m\u1ed1i quan h\u1ec7 n\u1ebfu kh\u00f4ng \u0111\u01b0\u1ee3c \u0111i\u1ec1u tr\u1ecb.\n<br><b>\u0110o\u1ea1n 2:</b> Nguy\u00ean nh\u00e2n c\u1ee7a r\u1ed1i lo\u1ea1n lo \u00e2u \u2013 xu\u1ea5t ph\u00e1t t\u1eeb s\u1ef1 k\u1ebft h\u1ee3p gi\u1eefa c\u00e1c y\u1ebfu t\u1ed1 x\u00e3 h\u1ed9i, t\u00e2m l\u00fd v\u00e0 sinh h\u1ecdc.\n<br><b>\u0110o\u1ea1n 3:</b> M\u1ed1i li\u00ean h\u1ec7 gi\u1eefa r\u1ed1i lo\u1ea1n lo \u00e2u v\u00e0 s\u1ee9c kh\u1ecfe th\u1ec3 ch\u1ea5t \u2013 lo \u00e2u c\u00f3 th\u1ec3 g\u00e2y b\u1ec7nh tim m\u1ea1ch v\u00e0 ng\u01b0\u1ee3c l\u1ea1i, b\u1ec7nh l\u00fd c\u01a1 th\u1ec3 c\u0169ng c\u00f3 th\u1ec3 g\u00e2y lo \u00e2u.\n<br><b>\u0110o\u1ea1n 4:</b> Gi\u1edbi thi\u1ec7u c\u00e1c can thi\u1ec7p t\u00e2m l\u00fd \u2013 gi\u00fap ng\u01b0\u1eddi b\u1ec7nh h\u1ecdc c\u00e1ch suy ngh\u0129 v\u00e0 \u0111\u1ed1i m\u1eb7t v\u1edbi nh\u1eefng t\u00ecnh hu\u1ed1ng g\u00e2y lo \u00e2u.\n<br><b>\u0110o\u1ea1n 5:</b> C\u00e1c h\u00ecnh th\u1ee9c \u0111i\u1ec1u tr\u1ecb \u2013 can thi\u1ec7p t\u00e2m l\u00fd c\u00f3 th\u1ec3 \u00e1p d\u1ee5ng c\u00e1 nh\u00e2n ho\u1eb7c nh\u00f3m, tr\u1ef1c ti\u1ebfp ho\u1eb7c tr\u1ef1c tuy\u1ebfn; li\u1ec7u ph\u00e1p h\u00e0nh vi nh\u1eadn th\u1ee9c (CBT) v\u00e0 li\u1ec7u ph\u00e1p \u0111\u1ed1i m\u1eb7t n\u1ed7i s\u1ee3 l\u00e0 hi\u1ec7u qu\u1ea3 nh\u1ea5t.\n<br><b>\u0110o\u1ea1n 6:</b> Gi\u1edbi thi\u1ec7u th\u00eam c\u00e1c ph\u01b0\u01a1ng ph\u00e1p h\u1ed7 tr\u1ee3 kh\u00e1c nh\u01b0 k\u1ef9 n\                         html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
