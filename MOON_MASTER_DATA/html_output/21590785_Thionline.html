 ngh\u1ec9 m\u1ed9t th\u00e1ng, Xing Nh\u00e3 suy t\u00ednh chuy\u1ec7n \u0111i \u0111\u00f2i c\u00f4ng b\u1eb1ng cho cha m\u1eb9.\u201d</i><br><div style=\"text-align: right;\">(S\u1eed thi Gia Rai, <i>Xing Nh\u00e3</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>Chi ti\u1ebft n\u00e0o mi\u00eau t\u1ea3 s\u1ee9c kho\u1ebb phi th\u01b0\u1eddng c\u1ee7a Xing Nh\u00e3?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:<br></b>Chi ti\u1ebft \u201cXing Nh\u00e3 b\u01b0\u1edbc t\u1edbi, m\u1ed9t tay n\u00e2ng khi\u00ean, m\u1ed9t tay gi\u01a1 l\u00ean \u0111\u1ea7u, \u0111\u1ed9i v\u1ec1 bu\u00f4n\u201d mi\u00eau t\u1ea3 s\u1ee9c kh\u1ecfe phi th\u01b0\u1eddng c\u1ee7a Xing Nh\u00e3. H\u00e0nh \u0111\u1ed9ng n\u00e0y cho th\u1ea5y s\u1ee9c m\u1ea1nh v\u01b0\u1ee3t tr\u1ed9i c\u1ee7a Xing Nh\u00e3, khi c\u00f3 th\u1ec3 n\u00e2ng v\u00e0 mang chi\u1ebfc khi\u00ean n\u1eb7ng nh\u01b0 v\u1eady m\u1ed9t m\u00ecnh.", "key": "D", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.31, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590793, "lessonId": 0, "a": "Th\u00e0nh qu\u00e1ch c\u1ee7a c\u00f4ng ch\u00faa, k\u1ec3 c\u1ea3 cung \u0111i\u1ec7n, nh\u00e0 c\u1eeda, qu\u00e2n gia, s\u00fac v\u1eadt, \u0111\u1ed3 d\u00f9ng \u0111\u1ec1u bay \u0111\u00e2u m\u1ea5t.", "b": "C\u00e1i n\u1ec1n cung c\u1ee7a hai v\u1ee3 ch\u1ed3ng c\u00f4ng ch\u00faa v\u1eabn c\u00f2n.", "c": "Ng\u01b0\u1eddi ta l\u1eadp mi\u1ebfu th\u1edd hai v\u1ee3 ch\u1ed3ng Ch\u1eed \u0110\u1ed3ng T\u1eed.", "d": "\u0110\u1ea7m \u0111\u01b0\u1ee3c g\u1ecdi l\u00e0 \u0111\u1ea7m M\u1ed9t \u0110\u00eam (Nh\u1ea5t D\u1ea1) v\u00e0 c\u00e1i n\u1ec1n \u1ea5y l\u00e0 b\u00e3i T\u1ef1 Nhi\u00ean.", "bookId": 1086581, "comments": 4, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cS\u00e1ng h\u00f4m sau, nh\u00e2n d\u00e2n quanh v\u00f9ng c\u0169ng nh\u01b0 qu\u00e2n \u0111\u1ed9i vua H\u00f9ng \u0111\u1ec1u th\u1ea5y m\u1ed9t s\u1ef1 l\u1ea1 ch\u01b0a t\u1eebng c\u00f3. B\u00e3o \u0111\u00e3 t\u1ea1nh t\u1eeb l\u00e2u, nh\u01b0ng th\u00e0nh qu\u00e1ch c\u1ee7a c\u00f4ng ch\u00faa, k\u1ec3 c\u1ea3 cung \u0111i\u1ec7n, nh\u00e0 c\u1eeda, qu\u00e2n gia, s\u00fac v\u1eadt, \u0111\u1ed3 d\u00f9ng \u0111\u1ec1u bay \u0111\u00e2u m\u1ea5t c\u1ea3 kh\u00f4ng c\u00f2n s\u00f3t m\u1ed9t t\u00ed g\u00ec. Gi\u1eefa \u0111\u00f3 l\u00e0 m\u1ed9t c\u00e1i \u0111\u1ea7m r\u1ed9ng m\u00eanh m\u00f4ng, \u0111\u1ea7y n\u01b0\u1edbc tr\u1eafng x\u00f3a. Duy ch\u1ec9 c\u00f3 c\u00e1i n\u1ec1n cung c\u1ee7a hai v\u1ee3 ch\u1ed3ng c\u00f4ng ch\u00faa th\u00ec v\u1eabn c\u00f2n. Ng\u01b0\u1eddi ta g\u1ecdi c\u00e1i \u0111\u1ea7m \u1ea5y l\u00e0 \u0111\u1ea7m M\u1ed9t \u0110\u00eam (Nh\u1ea5t D\u1ea1) v\u00e0 c\u00e1i n\u1ec1n \u1ea5y l\u00e0 b\u00e3i T\u1ef1 Nhi\u00ean. V\u1ec1 sau tr\u00ean c\u00e1i n\u1ec1n \u1ea5y, ng\u01b0\u1eddi ta c\u00f3 l\u1eadp mi\u1ebfu th\u1edd hai v\u1ee3 ch\u1ed3ng Ch\u1eed \u0110\u1ed3ng T\u1eed.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u0110\u1ed5ng Chi, <i>S\u1ef1 t\u00edch \u0111\u1ea7m Nh\u1ea5t D\u1ea1 v\u00e0 b\u00e3i T\u1ef1 Nhi\u00ean</i>, theo <i>Kho t\u00e0ng truy\u1ec7n c\u1ed5 t\u00edch Vi\u1ec7t Nam</i>, t\u1eadp 1, NXB Gi\u00e1o d\u1ee5c, 2000)</div>Trong \u0111o\u1ea1n v\u0103n tr\u00ean, chi ti\u1ebft n\u00e0o sau \u0111\u00e2y l\u00e0 \u201cs\u1ef1 l\u1ea1 ch\u01b0a t\u1eebng c\u00f3\u201d?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nTrong \u0111o\u1ea1n v\u0103n, chi ti\u1ebft \u201cTh\u00e0nh qu\u00e1ch c\u1ee7a c\u00f4ng ch\u00faa, k\u1ec3 c\u1ea3 cung \u0111i\u1ec7n, nh\u00e0 c\u1eeda, qu\u00e2n gia, s\u00fac v\u1eadt, \u0111\u1ed3 d\u00f9ng \u0111\u1ec1u bay \u0111\u00e2u m\u1ea5t\u201d th\u1ec3 hi\u1ec7n \u201cs\u1ef1 l\u1ea1 ch\u01b0a t\u1eebng c\u00f3\u201d. Chi ti\u1ebft n\u00e0y m\u00f4 t\u1ea3 s\u1ef1 bi\u1ebfn m\u1ea5t \u0111\u1ed9t ng\u1ed9t c\u1ee7a c\u1ea3 cung \u0111i\u1ec7n, th\u00e0nh qu\u00e1ch, qu\u00e2n \u0111\u1ed9i, s\u00fac v\u1eadt, \u0111\u1ed3 d\u00f9ng... ch\u1ec9 sau m\u1ed9t \u0111\u00eam, \u0111i\u1ec1u n\u00e0y th\u1ec3 hi\u1ec7n s\u1ef1 k\u1ef3 \u1ea3o v\u00e0 t\u00ednh ch\u1ea5t huy\u1ec1n b\u00ed c\u1ee7a s\u1ef1 vi\u1ec7c.\n", "key": "A", "isVideo": true, "score": 0, "order": 2, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.31, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590794, "lessonId": 0, "a": "\u201ct\u1ecbch d\u01b0\u01a1ng\u201d.", "b": "\u201c\u0111o\u1ea1n tr\u01b0\u1eddng\u201d.", "c": "\u201cthu th\u1ea3o\u201d.", "d": "\u201cngh\u00ecn n\u0103m\u201d.", "bookId": 1086582, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cT\u1ea1o ho\u00e1 g\u00e2y chi cu\u1ed9c h\u00ed tr\u01b0\u1eddng,<br>\u0110\u1ebfn nay th\u1ea5m tho\u1eaft m\u1ea5y tinh s\u01b0\u01a1ng.<br>L\u1ed1i x\u01b0a xe ng\u1ef1a h\u1ed3n thu th\u1ea3o,<br>N\u1ec1n c\u0169 l\u00e2u \u0111\u00e0i b\u00f3ng t\u1ecbch d\u01b0\u01a1ng.<br>\u0110\u00e1 v\u1eabn tr\u01a1 gan c\u00f9ng tu\u1ebf nguy\u1ec7t,<br>N\u01b0\u1edbc c\u00f2n chau m\u1eb7t v\u1edbi tang th\u01b0\u01a1ng.<br>Ngh\u00ecn n\u0103m g\u01b0\u01a1ng c\u0169 soi kim c\u1ed5,<br>C\u1ea3nh \u0111\u1ea5y ng\u01b0\u1eddi \u0111\u00e2y lu\u1ed1ng \u0111o\u1ea1n tr\u01b0\u1eddng.\u201d</i><br><div style=\"text-align: right;\">(B\u00e0 Huy\u1ec7n Thanh Quan, <i>Th\u0103ng Long th\u00e0nh ho\u00e0i c\u1ed5</i>, theo <i>C\u00e1c nh\u00e0 th\u01a1 n\u1eef Vi\u1ec7t Nam s\u00e1ng t\u00e1c v\u00e0 ph\u00ea b\u00ecnh</i>, NXB Gi\u00e1o d\u1ee5c, 2001)</div>T\u1eeb n\u00e0o trong b\u00e0i th\u01a1 <b>kh\u00f4ng </b>ph\u1ea3i t\u1eeb H\u00e1n Vi\u1ec7t?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:<br></b>\nTrong b\u00e0i th\u01a1 \u201cTh\u0103ng Long th\u00e0nh ho\u00e0i c\u1ed5\u201d c\u1ee7a B\u00e0 Huy\u1ec7n Thanh Quan, T\u1eeb \u201cngh\u00ecn n\u0103m\u201d l\u00e0 t\u1eeb thu\u1ea7n Vi\u1ec7t.<br>\nC\u00e1c t\u1eeb \u201ct\u1ecbch d\u01b0\u01a1ng\u201d, \u201c\u0111o\u1ea1n tr\u01b0\u1eddng\u201d, \u201cthu th\u1ea3o\u201d l\u00e0 t\u1eeb H\u00e1n Vi\u1ec7t.\n", "key": "D", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.31, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590797, "lessonId": 0, "a": "C\u1ea7u c\u00fang th\u00ec th\u1ea5y ph\u00e9p hay.", "b": "Cu\u1ed1i \u0111\u1eddi Tr\u00f9ng Quang nh\u00e0 Tr\u1ea7n.", "c": "Oan h\u1ed3n g\u00f5 c\u1eeda h\u00e0ng c\u01a1m \u0111\u1ec3 ki\u1ebfm mi\u1ebfng \u0103n.", "d": "Oan h\u1ed3n kh\u00f4ng ch\u1ed7 t\u1ef1a n\u01b0\u01a1ng.", "bookId": 1086583, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cCu\u1ed1i \u0111\u1eddi Tr\u00f9ng Quang nh\u00e0 Tr\u1ea7n, ng\u01b0\u1eddi ch\u1ebft ch\u00f3c nhi\u1ec1u, nh\u1eefng oan h\u1ed3n kh\u00f4ng ch\u1ed7 t\u1ef1a n\u01b0\u01a1ng, th\u01b0\u1eddng h\u1ecdp th\u00e0nh t\u1eebng \u0111\u00e0n t\u1eebng l\u0169, ho\u1eb7c g\u00f5 c\u1eeda h\u00e0ng c\u01a1m \u0111\u1ec3 ki\u1ebfm mi\u1ebfng \u0103n, ho\u1eb7c \u0111\u00f3n c\u00f4 g\u00e1i ch\u01a1i \u0111\u1ec3 k\u1ebft duy\u00ean t\u1ea1m, ai va ch\u1ea1m th\u00ec b\u1ec7nh nguy kh\u1ed1n, ai c\u1ea7u c\u00fang th\u00ec th\u1ea5y h\u1ebft ph\u00e9p hay, ho\u00e0nh h\u00e0nh \u1edf \u0111\u1ed3ng n\u1ed9i kh\u00f4ng bi\u1ebft ki\u00eang s\u1ee3 g\u00ec c\u1ea3.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n D\u1eef, <i>Chuy\u1ec7n t\u01b0\u1edbng D\u1ea1 Xoa</i>, theo <i>Truy\u1ec1n k\u00ec m\u1ea1n l\u1ee5c</i>, NXB V\u0103n h\u1ecdc, 2008)</div>Ch\u1ec9 ra y\u1ebfu t\u1ed1 l\u1ecbch s\u1eed trong \u0111o\u1ea1n v\u0103n tr\u00ean.", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nTr\u00f9ng Quang l\u00e0 ni\u00ean hi\u1ec7u c\u1ee7a vua Tr\u00f9ng Quang \u0110\u1ebf (1409-1413), v\u1ecb vua cu\u1ed1i c\u00f9ng c\u1ee7a nh\u00e0 H\u1eadu Tr\u1ea7n. Chi ti\u1ebft \u201ccu\u1ed1i \u0111\u1eddi Tr\u00f9ng Quang nh\u00e0 Tr\u1ea7n\u201d l\u00e0 y\u1ebfu t\u1ed1 l\u1ecbch s\u1eed x\u00e1c \u0111\u1ecbnh th\u1eddi k\u1ef3 x\u1ea3y ra s\u1ef1 ki\u1ec7n trong \u0111o\u1ea1n v\u0103n. <br>\nC\u00e1c \u0111\u00e1p \u00e1n A, C, D \u0111\u1ec1u l\u00e0 nh\u1eefng chi ti\u1ebft mang t\u00ednh ch\u1ea5t k\u1ef3 \u1ea3o, ph\u1ea3n \u00e1nh ni\u1ec1m tin d\u00e2n gian v\u1ec1 h\u1ed3n ma v\u00e0 th\u1ebf gi\u1edbi t\u00e2m linh.\n", "key": "B", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.31, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590799, "lessonId": 0, "a": "\u0110au \u0111\u1edbn, x\u00f3t xa.", "b": "Nu\u1ed1i ti\u1ebfc, oan tr\u00e1i.", "c": "Th\u01b0\u01a1ng x\u00f3t, \u0111au l\u00f2ng.", "d": "B\u1ea5t b\u00ecnh, ph\u1eabn n\u1ed9.", "bookId": 1086584, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cN\u01b0\u01a1ng t\u1eed \u01a1i!<br>Ch\u01b0\u1edbng c\u0103n  \u1ea5y h\u1ecfi v\u00ec \u0111\u00e2u? Oan th\u00e1c \u1ea5y b\u1edfi v\u00ec \u0111\u00e2u? Cho \u0111\u1ebfn n\u1ed7i xu\u00e2n t\u00e0n hoa n\u1ee5, thu l\u1ea9n tr\u0103ng r\u1eb1m .<br>L\u1ea1i c\u00f3 \u0111i\u1ec1u \u0111au \u0111\u1edbn th\u1ebf! Nh\u00e0 huy\u00ean  v\u00ed c\u00f3 n\u0103m c\u00f3 b\u1ea3y m\u00e0 ri\u00eang m\u1ed9t m\u00ecnh n\u00e0ng \u0111eo ph\u1eadn b\u1ea1c, th\u00ec l\u1eeda ngu\u1ed9i n\u01b0\u1edbc v\u01a1i c\u00f2n c\u00f3 l\u1ebd.<br>Th\u01b0\u01a1ng h\u1ea1i thay, hoa c\u00f3 m\u1ed9t c\u00e0nh, tuy\u1ebft c\u00f3 m\u1ed9t \u0111i\u1ec3m, nguy\u1ec7t c\u00f3 m\u1ed9t v\u1ea7ng, m\u00e2y c\u00f3 m\u1ed9t \u0111\u00f3a, th\u00e2n l\u00e0 th\u00e2n hi\u1ebfm hoi ch\u1eebng \u1ea5y, n\u1ee1 n\u00e0o l\u1ea5y \u0111\u00f4i m\u01b0\u01a1i n\u0103m l\u00e0m m\u1ed9t ki\u1ebfp, m\u00e0 ng\u01a1m ng\u1edbm ch\u1ed1n non B\u1ed3ng n\u01b0\u1edbc Nh\u01b0\u1ee3c  \u0111\u1ec9nh  g\u00ec kh\u00f4ng \u0111o\u00e1i c\u00f5i ph\u00f9 sinh?\u201d</i><br><div style=\"text-align: right;\">(Ph\u1ea1m Th\u00e1i, <i>V\u0103n t\u1ebf Tr\u01b0\u01a1ng Qu\u1ef3nh Nh\u01b0</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Ph\u01b0\u01a1ng \u00e1n n\u00e0o <b>kh\u00f4ng </b>n\u00eau \u0111\u00fang gi\u1ecdng \u0111i\u1ec7u c\u1ee7a \u0111o\u1ea1n tr\u00edch?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n v\u0103n tr\u00edch t\u1eeb V\u0103n t\u1ebf Tr\u01b0\u01a1ng Qu\u1ef3nh Nh\u01b0 c\u1ee7a Ph\u1ea1m Th\u00e1i th\u1ec3 hi\u1ec7n t\u00e2m tr\u1ea1ng bi th\u01b0\u01a1ng, \u0111au \u0111\u1edbn v\u00e0 ti\u1ebfc nu\u1ed1i c\u1ee7a ng\u01b0\u1eddi c\u00f2n s\u1ed1ng khi th\u01b0\u01a1ng nh\u1edb ng\u01b0\u1eddi \u0111\u00e3 khu\u1ea5t. C\u00e1c t\u1eeb ng\u1eef nh\u01b0 \u201cch\u01b0\u1edbng c\u0103n\u201d, \u201coan th\u00e1c\u201d, \u201c\u0111au \u0111\u1edbn\u201d, \u201cph\u1eadn b\u1ea1c\u201d, \u201cth\u01b0\u01a1ng h\u1ea1i\u201d th\u1ec3 hi\u1ec7n s\u1ef1  \u0111au x\u00f3t, th\u01b0\u01a1ng c\u1ea3m c\u1ee7a t\u00e1c gi\u1ea3 tr\u01b0\u1edbc s\u1ed1 ph\u1eadn ng\u1eafn ng\u1ee7i c\u1ee7a Tr\u01b0\u01a1ng Qu\u1ef3nh Nh\u01b0.<br>\n\u2192 \u0110o\u1ea1n tr\u00edch kh\u00f4ng mang gi\u1ecdng \u0111i\u1ec7u b\u1ea5t b\u00ecnh hay ph\u1eabn n\u1ed9.\n", "key": "D", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.31, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590800, "lessonId": 0, "a": "\u201cr\u1ea5t th\u00e2n m\u1eadt\u201d.", "b": "\u201cr\u1ea5t quen\u201d.", "c": "\u201cnguy\u00ean v\u1eb9n\u201d.", "d": "\u201clu\u00f4n lu\u00f4n\u201d.", "bookId": 1086585, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cH\u01a1n m\u1ed9t n\u0103m g\u1ea7n \u0111\u00e2y, m\u1ed9t h\u00f4m t\u00f4i \u0111\u00e3 l\u1ea1i g\u1eb7p anh. T\u00f4i th\u1ea5y anh kh\u00f4ng thay \u0111\u1ed5i ch\u00fat n\u00e0o. V\u1eabn c\u00e1i t\u1ea7m v\u00f3c to b\u00e9o, v\u1eabn c\u00e1i m\u1eb7t \u0111\u1ecf gay nh\u01b0 qu\u1ea3 l\u1ef1u r\u00e1m n\u1eafng h\u1ed3ng, da c\u0103ng th\u1eb3ng v\u00e0 b\u00f3ng lo\u00e1ng, trong \u0111\u00f3 hai con m\u1eaft x\u1ebfch v\u00e0 m\u1ed9t m\u00ed long lanh \u0111\u01b0a \u0111i \u0111\u01b0a l\u1ea1i r\u1ea5t nhanh v\u00e0 c\u00e1i mi\u1ec7ng r\u1ed9ng lu\u00f4n lu\u00f4n m\u1edf ra ho\u1eb7c \u0111\u1ec3 n\u00f3i hay \u0111\u1ec3 c\u01b0\u1eddi. T\u1ea5t c\u1ea3 c\u00e1i h\u00ecnh \u1ea3nh r\u1ea5t quen, r\u1ea5t th\u00e2n m\u1eadt th\u1eddi x\u01b0a c\u00f2n gi\u1eef \u0111\u01b0\u1ee3c nguy\u00ean v\u1eb9n. Nguy\u00ean v\u1eb9n, c\u1ea3 c\u1eed ch\u1ec9 v\u00e0 ng\u00f4n ng\u1eef.\u201d</i><br><div style=\"text-align: right;\">(Kh\u00e1i H\u01b0ng, <i>Hai ng\u01b0\u1eddi b\u1ea1n</i>, theo <i>vanvn.vn</i>)</div>T\u1eeb ng\u1eef n\u00e0o trong \u0111o\u1ea1n v\u0103n tr\u00ean c\u00f3 ngh\u0129a l\u00e0 \u201cnh\u01b0 x\u01b0a, kh\u00f4ng thay \u0111\u1ed5i\u201d?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nTrong \u0111o\u1ea1n v\u0103n, \u201cnguy\u00ean v\u1eb9n\u201d \u0111\u01b0\u1ee3c d\u00f9ng v\u1edbi ngh\u0129a gi\u1eef y nh\u01b0 c\u0169, kh\u00f4ng thay \u0111\u1ed5i \u0111\u1ec3 ch\u1ec9 d\u00e1ng v\u1ebb, c\u1eed ch\u1ec9 v\u00e0 l\u1eddi n\u00f3i c\u1ee7a \u201canh\u201d v\u1eabn c\u00f2n y nh\u01b0 tr\u01b0\u1edbc, kh\u00f4ng h\u1ec1 thay \u0111\u1ed5i trong m\u1eaft \u201ct\u00f4i\u201d.\n", "key": "C", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.31, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590801, "lessonId": 0, "a": "\u201cCha \u00f4ng ta nh\u1eafm m\u1eaft\u201d.", "b": "\u201cTruy\u1ec1n ch\u00e1u con kh\u00f4ng bao gi\u1edd chia c\u1eaft\u201d.", "c": "\u201cM\u1ed3 h\u00f4i v\u00e3 b\u00e3i lau th\u00e0nh \u0111\u1ed3ng l\u00faa\u201d.", "d": "\u201cNh\u1eefng t\u00ean \u0111\u1ecdc l\u00ean n\u01b0\u1edbc m\u1eaft \u0111\u1ec1u mu\u1ed1n \u1ee9a\u201d.", "bookId": 1086586, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cN\u00f4ng d\u00e2n Nam B\u1ed9 g\u1ed1i \u0111\u1ea5t n\u1eb1m s\u01b0\u01a1ng<br>M\u1ed3 h\u00f4i v\u00e3 b\u00e3i lau th\u00e0nh \u0111\u1ed3ng l\u00faa<br>Th\u00e0nh nh\u1eefng t\u00ean \u0111\u1ecdc l\u00ean n\u01b0\u1edbc m\u1eaft \u0111\u1ec1u mu\u1ed1n \u1ee9a<br>Nh\u1eefng H\u00e0 Ti\u00ean, Gia \u0110\u1ecbnh, Long Ch\u00e2u<br>Nh\u1eefng G\u00f2 C\u00f4ng, G\u00f2 V\u1ea5p, \u0110\u1ed3ng Th\u00e1p, C\u00e0 Mau<br>Nh\u1eefng m\u1eb7t \u0111\u1ea5t<br>Cha \u00f4ng ta nh\u1eafm m\u1eaft<br>Truy\u1ec1n ch\u00e1u con kh\u00f4ng bao gi\u1edd chia c\u1eaft.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u00ean H\u1ed3ng, <i>C\u1eedu Long giang ta \u01a1i</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>D\u00f2ng th\u01a1 n\u00e0o trong \u0111o\u1ea1n tr\u00ean kh\u1eafc ho\u1ea1 n\u1ed7i v\u1ea5t v\u1ea3, nh\u1ecdc nh\u1eb1n c\u1ee7a ng\u01b0\u1eddi n\u00f4ng d\u00e2n Nam B\u1ed9?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u00e2u th\u01a1 \u201cM\u1ed3 h\u00f4i v\u00e3 b\u00e3i lau th\u00e0nh \u0111\u1ed3ng l\u00faa\u201d kh\u1eafc ho\u1ea1 n\u1ed7i v\u1ea5t v\u1ea3, nh\u1ecdc nh\u1eb1n c\u1ee7a ng\u01b0\u1eddi n\u00f4ng d\u00e2n Nam B\u1ed9. Chi ti\u1ebft n\u00e0y di\u1ec5n t\u1ea3 qu\u00e1 tr\u00ecnh lao \u0111\u1ed9ng c\u1ef1c nh\u1ecdc, \u0111\u1ed5 m\u1ed3 h\u00f4i s\u00f4i n\u01b0\u1edbc m\u1eaft c\u1ee7a ng\u01b0\u1eddi n\u00f4ng d\u00e2n \u0111\u1ec3 khai kh\u1ea9n \u0111\u1ea5t hoang, t\u1ea1o ra nh\u1eefng c\u00e1nh \u0111\u1ed3ng l\u00faa tr\u00f9 ph\u00fa.\n", "key": "C", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.31, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590802, "lessonId": 0, "a": "Tr\u1ebb trung, xinh \u0111\u1eb9p.", "b": "Kh\u00e9o l\u00e9o, tinh t\u1ebf.", "c": "Hi\u1ec1n ho\u00e0, l\u1ec5 \u0111\u1ed9.", "d": "D\u1ecbu d\u00e0ng, n\u1ebft na.", "bookId": 1086587, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u0110\u1eb7c s\u1ea3n nh\u1ea5t, m\u00e0 c\u00f3 l\u1ebd L\u00fd mu\u1ed1n b\u1ed9c l\u1ed9 khi\u1ebfu n\u0103ng, c\u00f9ng t\u1ea5m l\u00f2ng m\u00ecnh nhi\u1ec1u nh\u1ea5t \u1edf \u0111\u00f3, l\u00e0 c\u00e1c m\u00f3n v\u1ecbt t\u1ea7n, v\u00e2y v\u00e0 m\u1ecdc, nh\u1ea5t l\u00e0 m\u00f3n m\u1ecdc. Ch\u1ecb \u0111\u00e3 r\u1ea5t t\u1ec9 m\u1ec9 v\u00e0 k\u0129 t\u00ednh h\u1ebft s\u1ee9c khi ch\u1ebf bi\u1ebfn m\u00f3n n\u00e0y. Mi\u1ebfng th\u0103n \u0111\u01b0\u1ee3c ch\u1ecdn l\u1ef1a, gi\u00e3 th\u1eadt nhuy\u1ec5n nh\u1eeb thay cho gi\u00f2 s\u1ed1ng \u0111\u01b0\u1ee3c ch\u00ednh tay ch\u1ecb tr\u1ed9n v\u1edbi m\u1ed9c nh\u0129, n\u1ea5m h\u01b0\u01a1ng, r\u1ed3i n\u1eb7n th\u00e0nh t\u1eebng vi\u00ean tr\u00f2n tr\u0129nh. N\u1ed3i n\u01b0\u1edbc d\u00f9ng \u0111\u1ea3m b\u1ea3o ph\u1ea3i trong veo. V\u00e0 ch\u00ednh tay ch\u1ecb v\u1edbt, chia \u0111\u1ec1u ra t\u1eebng b\u00e1t nh\u1ecf.\u201d</i><br><div style=\"text-align: right;\">(Ma V\u0103n Kh\u00e1ng, <i>M\u00f9a l\u00e1 r\u1ee5ng trong v\u01b0\u1eddn</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 12</i>, NXB \u0110\u1ea1i h\u1ecdc Hu\u1ebf, 2024)</div>\u0110\u1eb7c \u0111i\u1ec3m n\u00e0o c\u1ee7a nh\u00e2n v\u1eadt L\u00fd \u0111\u01b0\u1ee3c kh\u1eafc ho\u1ea1 trong \u0111o\u1ea1n v\u0103n tr\u00ean?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:<br></b>\n\u0110o\u1ea1n v\u0103n mi\u00eau t\u1ea3 nh\u00e2n v\u1eadt L\u00fd th\u00f4ng qua vi\u1ec7c ch\u1ebf bi\u1ebfn m\u00f3n \u0103n, \u0111\u1eb7c bi\u1ec7t l\u00e0 m\u00f3n m\u1ecdc. C\u00e1c chi ti\u1ebft \u201cr\u1ea5t t\u1ec9 m\u1ec9 v\u00e0 k\u0129 t\u00ednh h\u1ebft s\u1ee9c\u201d, \u201cmi\u1ebfng th\u0103n \u0111\u01b0\u1ee3c ch\u1ecdn l\u1ef1a, gi\u00e3 th\u1eadt nhuy\u1ec5n nh\u1eeb\u201d, \u201cch\u00ednh tay ch\u1ecb tr\u1ed9n v\u1edbi m\u1ed9c nh\u0129, n\u1ea5m h\u01b0\u01a1ng\u201d, \u2018n\u1ed3i n\u01b0\u1edbc d\u00f9ng \u0111\u1ea3m b\u1ea3o ph\u1ea3i trong veo\u201d\u2026 cho th\u1ea5y L\u00fd l\u00e0 m\u1ed9t ng\u01b0\u1eddi ph\u1ee5 n\u1eef \u0111\u1ea3m \u0111ang, kh\u00e9o l\u00e9o v\u00e0 tinh t\u1ebf trong vi\u1ec7c b\u1ebfp n\u00fac.\n", "key": "B", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.31, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590803, "lessonId": 0, "a": "\u201c\u00d4ng quen c\u00e1i th\u00f3i c\u1ee7a l\u00e3o h\u00e0ng th\u1ecbt\u201d.", "b": "\u201c\u00f4ng l\u00fa l\u1eabn v\u00ec m\u00f3n ti\u1ebft canh\u201d.", "c": "\u201c\u00f4ng \u0111\u00e3 \u0103n ph\u1ea3i b\u00f9a c\u1ee7a con m\u1ee5 l\u1eb3ng l\u01a1 \u0111\u00f3\u201d.", "d": "\u201cT\u00f4i \u0111\u1ebfn \u0111i\u00ean \u0111\u1ea7u l\u00ean m\u1ea5t th\u00f4i!\u201d.", "bookId": 1086588, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c<b>V\u1ee3 ng\u01b0\u1eddi h\u00e0ng th\u1ecbt: </b>B\u00e0 kh\u00f4ng cho \u00f4ng \u1ea5y sang, th\u00ec b\u00e0 gi\u1eef l\u1ea5y h\u1ed3n ch\u1ed3ng b\u00e0, tr\u1ea3 th\u00e2n ch\u1ed3ng t\u00f4i cho t\u00f4i mang v\u1ec1!<br><b>H\u1ed3n Tr\u01b0\u01a1ng Ba:</b> Kh\u1ed5 l\u1eafm! </i>(V\u1edbi V\u1ee3 Tr\u01b0\u01a1ng Ba) <i>T\u00f4i van b\u00e0!</i> (V\u1edbi v\u1ee3 ng\u01b0\u1eddi h\u00e0ng th\u1ecbt) <i>C\u00f2n b\u00e0 n\u1eefa, b\u00e0 v\u1ec1 cho t\u00f4i nh\u1edd! V\u00e2ng, r\u1ed3i t\u00f4i xin sang...</i><br>(V\u1ee3 ng\u01b0\u1eddi h\u00e0ng th\u1ecbt h\u1ea7m h\u1ea7m ra v\u1ec1).<br><i><b>V\u1ee3 Tr\u01b0\u01a1ng Ba:</b> \u00d4ng quen c\u00e1i th\u00f3i c\u1ee7a l\u00e3o h\u00e0ng th\u1ecbt, \u00f4ng l\u00fa l\u1eabn v\u00ec m\u00f3n ti\u1ebft canh, hay l\u00e0 \u00f4ng \u0111\u00e3 \u0103n ph\u1ea3i b\u00f9a c\u1ee7a con m\u1ee5 l\u1eb3ng l\u01a1 \u0111\u00f3 r\u1ed3i?</i><br><i><b>H\u1ed3n Tr\u01b0\u01a1ng Ba: </b>L\u1ea1i c\u00e1i gi\u1ecdng \u1ea5y! T\u00f4i \u0111\u1ebfn \u0111i\u00ean \u0111\u1ea7u l\u00ean m\u1ea5t th\u00f4i! </i>(\u00d4m \u0111\u1ea7u ng\u1ed3i ph\u1ecbch xu\u1ed1ng ch\u00f5ng. B\u00e0 V\u1ee3 Tr\u01b0\u01a1ng Ba v\u00f9ng v\u1eb1ng \u0111i ra ngo\u00e0i.)<br><div style=\"text-align: right;\">(L\u01b0u Quang V\u0169, <i>H\u1ed3n Tr\u01b0\u01a1ng Ba, da h\u00e0ng th\u1ecbt,</i> theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 12</i>, NXB \u0110\u1ea1i h\u1ecdc Hu\u1ebf, 2024)</div>L\u1eddi n\u00f3i n\u00e0o trong \u0111o\u1ea1n tr\u00edch ph\u1ea3n \u00e1nh n\u1ed7i h\u1eddn ghen c\u1ee7a V\u1ee3 Tr\u01b0\u01a1ng Ba \u0111\u1ed1i v\u1edbi ch\u1ed3ng (H\u1ed3n Tr\u01b0\u01a1ng Ba)?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nTrong \u0111o\u1ea1n tr\u00edch, chi ti\u1ebft l\u1eddi n\u00f3i ph\u1ea3n \u00e1nh r\u00f5 nh\u1ea5t n\u1ed7i h\u1eddn ghen c\u1ee7a V\u1ee3 Tr\u01b0\u01a1ng Ba \u0111\u1ed1i v\u1edbi ch\u1ed3ng (H\u1ed3n Tr\u01b0\u01a1ng Ba) l\u00e0 \u201c\u00f4ng \u0111\u00e3 \u0103n ph\u1ea3i b\u00f9a c\u1ee7a con m\u1ee5 l\u1eb3ng l\u01a1 \u0111\u00f3\u201d. L\u1eddi tho\u1ea1i n\u00e0y th\u1ec3 hi\u1ec7n s\u1ef1 nghi ng\u1edd v\u00e0 ghen tu\u00f4ng c\u1ee7a b\u00e0 v\u1ee3 khi cho r\u1eb1ng ch\u1ed3ng m\u00ecnh \u0111\u00e3 b\u1ecb \u201ccon m\u1ee5 l\u1eb3ng l\u01a1\u201d (t\u1ee9c v\u1ee3 ng\u01b0\u1eddi h\u00e0ng th\u1ecbt) b\u1ecf b\u00f9a m\u00ea ho\u1eb7c, khi\u1ebfn \u00f4ng thay \u0111\u1ed5i v\u00e0 c\u00f3 nh\u1eefng h\u00e0nh \u0111\u1ed9ng kh\u00e1c th\u01b0\u1eddng.\n", "key": "C", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.31, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590804, "lessonId": 0, "a": "Ng\u01b0\u1eddi t\u00f9 c\u1ed9ng s\u1ea3n.", "b": "Kh\u00e1ch th\u1ea7n ti\u00ean.", "c": "Qu\u1ea3n ng\u1ee5c.", "d": "L\u00ednh canh nh\u00e0 t\u00f9.", "bookId": 1086589, "comments": 3, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNh\u1ecb \u0111i\u1ec3m khai lung ho\u00e1n kh\u00f4ng kh\u00ed,<br>Nh\u00e2n nh\u00e2n ng\u01b0\u1ee1ng kh\u00e1n t\u1ef1 do thi\u00ean.<br>T\u1ef1 do thi\u00ean th\u01b0\u1ee3ng th\u1ea7n ti\u00ean kh\u00e1ch,<br>Tri ph\u1ee7 lung trung d\u00e3 h\u1eefu ti\u00ean?\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>Ng\u1ecd h\u1eadu</i>)</div>D\u1ecbch ngh\u0129a:<br><i>\u201cHai gi\u1edd nh\u00e0 lao m\u1edf c\u1eeda, \u0111\u1ed5i thay kh\u00f4ng kh\u00ed,<br>M\u1ecdi ng\u01b0\u1eddi ng\u1ea9ng l\u00ean ng\u1eafm tr\u1eddi t\u1ef1 do.<br>Kh\u00e1ch th\u1ea7n ti\u00ean tr\u00ean tr\u1eddi t\u1ef1 do,<br>C\u00f3 bi\u1ebft ch\u0103ng trong lao n\u00e0y c\u0169ng c\u00f3 kh\u00e1ch ti\u00ean?\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>Qu\u00e1 tr\u01b0a</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh trong b\u00e0i th\u01a1 l\u00e0 ai?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nNh\u00e2n v\u1eadt tr\u1eef t\u00ecnh trong b\u00e0i th\u01a1 \u201cNg\u1ecd h\u1eadu\u201d (Qu\u00e1 tr\u01b0a) l\u00e0 ng\u01b0\u1eddi t\u00f9 c\u1ed9ng s\u1ea3n H\u1ed3 Ch\u00ed Minh. B\u00e0i th\u01a1 \u0111\u01b0\u1ee3c vi\u1ebft trong ho\u00e0n c\u1ea3nh B\u00e1c b\u1ecb giam c\u1ea7m, cho th\u1ea5y tinh th\u1ea7n ung dung, t\u1ef1 t\u1ea1i c\u1ee7a B\u00e1c ngay c\u1ea3 khi \u1edf trong nh\u00e0 t\u00f9.\n", "key": "A", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.31, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590806, "lessonId": 0, "a": "V\u1ea1ch tr\u1ea7n lu\u1eadn \u0111i\u1ec7u v\u1ec1 c\u00f4ng lao b\u1ea3o h\u1ed9 c\u1ee7a th\u1ef1c d\u00e2n Ph\u00e1p.", "b": "T\u0103ng th\u00eam \u00e2m h\u01b0\u1edfng h\u00f9ng bi\u1ec7n c\u1ee7a b\u1ea3n tuy\u00ean ng\u00f4n: S\u1ee9c m\u1ea1nh c\u1ee7a ch\u00ednh ngh\u0129a bao gi\u1edd c\u0169ng \u0111\u1ed3ng th\u1eddi l\u00e0 s\u1ee9c m\u1ea1nh c\u1ee7a s\u1ef1 th\u1eadt. Kh\u00f4ng c\u00f3 l\u00ed l\u1ebd n\u00e0o c\u00f3 s\u1ee9c thuy\u1ebft ph\u1ee5c cao h\u01a1n l\u00e0 l\u00ed l\u1ebd c\u1ee7a s\u1ef1 th\u1eadt.", "c": "\u0110\u1eadp tan lu\u1eadn \u0111i\u1ec7u x\u1ea3o tr\u00e1 c\u1ee7a k\u1ebb th\u00f9 tr\u01b0\u1edbc d\u01b0 lu\u1eadn th\u1ebf gi\u1edbi. H\u00e3y \u0111\u1ec3 \u201cs\u1ef1 th\u1eadt\u201d l\u00ean ti\u1ebfng b\u00f3c tr\u1ea7n b\u1ed9 m\u1eb7t tr\u01a1 tr\u00e1o c\u1ee7a k\u1ebb \u0111\u1ea7u h\u00e0ng, c\u1ee7a k\u1ebb quay l\u01b0ng l\u1ea1i v\u1edbi \u0110\u1ed3ng minh trong cu\u1ed9c t\u1ea5n c\u00f4ng ch\u1ed1ng phe ph\u00e1t x\u00edt; thuy\u1ebft ph\u1ee5c phe \u0110\u1ed3ng minh, nh\u00e2n d\u00e2n y\u00eau chu\u1ed9ng h\u00f2a b\u00ecnh tr\u00ean th\u1ebf gi\u1edbi \u1ee7ng h\u1ed9 n\u1ec1n \u0111\u1ed9c l\u1eadp c\u1ee7a Vi\u1ec7t Nam.", "d": "V\u1ea1ch tr\u1ea7n lu\u1eadn \u0111i\u1ec7u gi\u1ea3 nh\u00e2n gi\u1ea3 ngh\u0129a c\u1ee7a th\u1ef1c d\u00e2n Ph\u00e1p.", "bookId": 1086590, "comments": 0, "bookmarks": 6, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cS\u1ef1 th\u1eadt l\u00e0 t\u1eeb m\u00f9a thu n\u0103m 1940, n\u01b0\u1edbc ta \u0111\u00e3 th\u00e0nh thu\u1ed9c \u0111\u1ecba c\u1ee7a Nh\u1eadt, ch\u1ee9 kh\u00f4ng ph\u1ea3i thu\u1ed9c \u0111\u1ecba c\u1ee7a Ph\u00e1p n\u1eefa. Khi Nh\u1eadt h\u00e0ng \u0110\u1ed3ng minh th\u00ec nh\u00e2n d\u00e2n c\u1ea3 n\u01b0\u1edbc ta \u0111\u00e3 n\u1ed5i d\u1eady gi\u00e0nh ch\u00ednh quy\u1ec1n, l\u1eadp n\u00ean n\u01b0\u1edbc Vi\u1ec7t Nam D\u00e2n ch\u1ee7 C\u1ed9ng ho\u00e0.\u201d<br>S\u1ef1 th\u1eadt l\u00e0 d\u00e2n ta \u0111\u00e3 l\u1ea5y l\u1ea1i n\u01b0\u1edbc Vi\u1ec7t Nam t\u1eeb tay Nh\u1eadt, ch\u1ee9 kh\u00f4ng ph\u1ea3i t\u1eeb tay Ph\u00e1p.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>Tuy\u00ean ng\u00f4n \u0110\u1ed9c l\u1eadp</i>, theo <i>Ng\u1eef v\u0103n 12</i>, NXB Gi\u00e1o d\u1ee5c Vi\u1ec7t Nam, 2011)</div>\u00dd ngh\u0129a n\u00e0o d\u01b0\u1edbi \u0111\u00e2y <b>kh\u00f4ng </b>ph\u1ea3i l\u00e0 t\u00e1c d\u1ee5ng c\u1ee7a ph\u00e9p \u0111i\u1ec7p c\u1ea5u tr\u00fac \u201cS\u1ef1 th\u1eadt l\u00e0...\u201d?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nPh\u00e9p \u0111i\u1ec7p c\u1ea5u tr\u00fac \u201cS\u1ef1 th\u1eadt l\u00e0...\u201d trong \u0111o\u1ea1n tr\u00edch c\u00f3 t\u00e1c d\u1ee5ng:<br>\n- V\u1ea1ch tr\u1ea7n lu\u1eadn \u0111i\u1ec7u v\u1ec1 c\u00f4ng lao b\u1ea3o h\u1ed9 c\u1ee7a th\u1ef1c d\u00e2n Ph\u00e1p: Ch\u1ec9 ra s\u1ef1 th\u1eadt l\u1ecbch s\u1eed kh\u00f4ng th\u1ec3 ph\u1ee7 nh\u1eadn - t\u1eeb n\u0103m 1940, Vi\u1ec7t Nam l\u00e0 thu\u1ed9c \u0111\u1ecba c\u1ee7a Nh\u1eadt, kh\u00f4ng ph\u1ea3i c\u1ee7a Ph\u00e1p v\u00e0 khi Nh\u1eadt \u0111\u1ea7u h\u00e0ng, nh\u00e2n d\u00e2n Vi\u1ec7t Nam t\u1ef1 \u0111\u1ee9ng l\u00ean gi\u00e0nh ch\u00ednh quy\u1ec1n.<br>\n- T\u0103ng th\u00eam \u00e2m h\u01b0\u1edfng h\u00f9ng bi\u1ec7n c\u1ee7a b\u1ea3n tuy\u00ean ng\u00f4n: S\u1ee9c m\u1ea1nh c\u1ee7a ch\u00ednh ngh\u0129a bao gi\u1edd c\u0169ng \u0111\u1ed3ng th\u1eddi l\u00e0 s\u1ee9c m\u1ea1nh c\u1ee7a s\u1ef1 th\u1eadt. Kh\u00f4ng c\u00f3 l\u00ed l\u1ebd n\u00e0o c\u00f3 s\u1ee9c thuy\u1ebft ph\u1ee5c cao h\u01a1n l\u00e0 l\u00ed l\u1ebd c\u1ee7a s\u1ef1 th\u1eadt.<br>\n- \u0110\u1eadp tan lu\u1eadn \u0111i\u1ec7u x\u1ea3o tr\u00e1 c\u1ee7a k\u1ebb th\u00f9 tr\u01b0\u1edbc d\u01b0 lu\u1eadn th\u1ebf gi\u1edbi. H\u00e3y \u0111\u1ec3 \u201cs\u1ef1 th\u1eadt\u201d l\u00ean ti\u1ebfng b\u00f3c tr\u1ea7n b\u1ed9 m\u1eb7t tr\u01a1 tr\u00e1o c\u1ee7a k\u1ebb \u0111\u1ea7u h\u00e0ng, c\u1ee7a k\u1ebb quay l\u01b0ng l\u1ea1i v\u1edbi \u0110\u1ed3ng minh trong cu\u1ed9c t\u1ea5n c\u00f4ng ch\u1ed1ng phe ph\u00e1t x\u00edt; thuy\u1ebft ph\u1ee5c phe \u0110\u1ed3ng minh, nh\u00e2n d\u00e2n y\u00eau chu\u1ed9ng h\u00f2a b\u00ecnh tr\u00ean th\u1ebf gi\u1edbi \u1ee7ng h\u1ed9 n\u1ec1n \u0111\u1ed9c l\u1eadp c\u1ee7a Vi\u1ec7t Nam.<br>\n\u2192 Ph\u00e9p \u0111i\u1ec7p c\u1ea5u tr\u00fac \u201cS\u1ef1 th\u1eadt l\u00e0...\u201d kh\u00f4ng v\u1ea1ch tr\u1ea7n lu\u1eadn \u0111i\u1ec7u gi\u1ea3 nh\u00e2n gi\u1ea3 ngh\u0129a c\u1ee7a th\u1ef1c d\u00e2n Ph\u00e1p m\u00e0 nh\u1ea5n m\u1ea1nh s\u1ef1 th\u1eadt n\u1ec1n \u0111\u1ed9c l\u1eadp c\u1ee7a d\u00e2n t\u1ed9c Vi\u1ec7t Nam.\n", "key": "D", "isVideo": true, "score": 0, "order": 11, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.31, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590809, "lessonId": 0, "a": "<i>\u0110\u1ebb \u0111\u1ea5t \u0111\u1ebb n\u01b0\u1edbc, Khinh D\u00fa, Ti\u1ec5n d\u1eb7n ng\u01b0\u1eddi y\u00eau.</i>", "b": "<i>I-li-\u00e1t, Xinh Nh\u00e3, Th\u00e1nh Gi\u00f3ng.</i>", "c": "<i>Ma-ha-bra-ha-ta, \u0110\u0103m Noi, T\u1ea5m C\u00e1m.</i>", "d": "<i>Ra-ma-ya-na, \u00d4-\u0111i-x\u00ea, \u0110\u0103m S\u0103n.</i>", "bookId": 1086591, "comments": 0, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "D\u00f2ng n\u00e0o sau \u0111\u00e2y n\u00eau t\u00ean nh\u1eefng t\u00e1c ph\u1ea9m c\u00f9ng th\u1ec3 lo\u1ea1i s\u1eed thi d\u00e2n gian?", "answer": "<b>Gi\u1ea3i  "a": "M\u00f9a kh\u00f4, \u0111\u00e1m tr\u1ebb con r\u1ee7 nhau \u0111i \u0111\u1ed1t s\u1eady hai b\u00ean \u0111\u01b0\u1eddng.", "b": "Con \u0111\u01b0\u1eddng v\u00e0o x\u00f3m l\u00f4ng ch\u00f4ng \u0111\u00e1, l\u1ed5n nh\u1ed5n nh\u1eefng \u1ed5 g\u00e0.", "c": "T\u1eeb h\u1ed3i ch\u1eadp ch\u1eedng v\u00e0o \u0111\u1eddi, con b\u00e9 \u0111\u1ea3 mang s\u1eb3n m\u1eb7c c\u1ea3m t\u1ef1 ti c\u1ee7a \u0111\u1ee9a tr\u1ebb b\u1ecb b\u1ecf r\u01a1i.", "d": "C\u00f4 g\u00e1i chua x\u00f3t nh\u1edb l\u1ea1i nh\u1eefng l\u1ea7n b\u1ecb l\u1eeba d\u1ed1i, ph\u1ea3n tr\u1eafc.", "bookId": 1086593, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "C\u00e2u n\u00e0o d\u01b0\u1edbi \u0111\u00e2y ch\u1ee9a t\u1eeb vi\u1ebft sai ch\u00ednh t\u1ea3?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- C\u00e2u \u201cT\u1eeb h\u1ed3i ch\u1eadp ch\u1eedng v\u00e0o \u0111\u1eddi, con b\u00e9 \u0111\u1ea3 mang s\u1eb3n m\u1eb7c c\u1ea3m t\u1ef1 ti c\u1ee7a \u0111\u1ee9a tr\u1ebb b\u1ecb b\u1ecf r\u01a1i.\u201d ch\u1ee9a c\u00e1c t\u1eeb \u201cch\u1eadp ch\u1eedng\u201d,  \u201c\u0111\u1ea3\u201d, \u201cs\u1eb3n\u201d sai ch\u00ednh t\u1ea3.<br>\n- S\u1eeda l\u1ea1i: T\u1eeb h\u1ed3i ch\u1eadp ch\u1eefng v\u00e0o \u0111\u1eddi, con b\u00e9 \u0111\u00e3 mang s\u1eb5n m\u1eb7c c\u1ea3m t\u1ef1 ti c\u1ee7a \u0111\u1ee9a tr\u1ebb b\u1ecb b\u1ecf r\u01a1i.\n", "key": "C", "isVideo": true, "score": 0, "order": 14, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.31, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590812, "lessonId": 0, "a": "b\u00ean c\u1ea1nh.", "b": "y\u00ean \u1eafng.", "c": "n\u1ec1n g\u1ed7.", "d": "th\u00ecnh th\u1ecbch.", "bookId": 1086594, "comments": 4, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Gi\u1eefa <u>y\u00ean \u1eafng</u>, \u1edf gian <u>b\u00ean c\u1ea1nh</u> vang l\u00ean ti\u1ebfng b\u00faa ch true, "score": 0, "order": 20, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.31, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 21 \u0111\u1ebfn 25", "content": "\u201cCh\u00fang ta \u0111\u1ec1u t\u1eebng quen c\u00e2u n\u00f3i c\u1ee7a v\u0103n h\u00e0o Nga Macxim Gorki: \u201cChi ti\u1ebft nh\u1ecf l\u00e0m n\u00ean nh\u00e0 v\u0103n l\u1edbn\u201d. Qu\u1ea3 v\u1eady! Chi ti\u1ebft trong v\u0103n xu\u00f4i ch\u1ec9 l\u00e0 m\u1ed9t th\u1ee9 nh\u1ecf, r\u1ea5t nh\u1ecf so v\u1edbi c\u1ed1t truy\u1ec7n, t\u00ecnh hu\u1ed1ng truy\u1ec7n, nh\u00e2n v\u1eadt,\u2026<br>Nh\u01b0ng n\u1ebfu \u1edf th\u01a1 c\u00f3 nh\u00e3n t\u1ef1 (ch\u1eef m\u1eaft), c\u00f3 c\u1ea3nh c\u00fa (c\u00e2u hay) th\u00ec trong v\u0103n xu\u00f4i kh\u00f4ng th\u1ec3 thi\u1ebfu chi ti\u1ebft. Chi ti\u1ebft \u0111\u1eaft l\u00e0m cho c\u00e2u chuy\u1ec7n \u0111\u01b0\u1ee3c nh\u1ea5n m\u1ea1nh, n\u00e2ng c\u1ea5p v\u00e0 \u201c\u0111\u00f3ng \u0111inh\u201d v\u00e0o tr\u00ed nh\u1edb ng\u01b0\u1eddi \u0111\u1ecdc. B\u1edfi th\u1ebf m\u00e0 nh\u00e0 v\u0103n khi s\u00e1ng t\u1ea1o t\u00e1c ph\u1ea9m, ngo\u00e0i t\u00ean g\u1ecdi t\u00e1c ph\u1ea9m (nhan \u0111\u1ec1), t\u00ean nh\u00e2n v\u1eadt, t\u00ecnh hu\u1ed1ng truy\u1ec7n, th\u01b0\u1eddng m\u1ea5t nhi\u1ec1u c\u00f4ng phu cho s\u00e1ng t\u1ea1o v\u00e0 s\u1eed d\u1ee5ng chi ti\u1ebft.<br>Trong v\u0103n h\u1ecdc, \u201cchi ti\u1ebft\u201d theo \u0111\u1ecbnh ngh\u0129a c\u1ee7a nh\u00f3m t\u00e1c gi\u1ea3 L\u00ea B\u00e1 H\u00e1n, Tr\u1ea7n \u0110\u00ecnh S\u1eed, Nguy\u1ec5n Kh\u1eafc Phi: \u201cC\u00e1c ti\u1ec3u ti\u1ebft c\u1ee7a t\u00e1c ph\u1ea9m mang s\u1ee9c ch\u1ee9a l\u1edbn v\u1ec1 c\u1ea3m x\u00fac v\u00e0 t\u01b0 t\u01b0\u1edfng\u201d g\u1ecdi chung l\u00e0 chi ti\u1ebft ngh\u1ec7 thu\u1eadt. T\u00f9y theo s\u1ef1 th\u1ec3 hi\u1ec7n c\u1ee5 th\u1ec3, chi ti\u1ebft ngh\u1ec7 thu\u1eadt c\u00f3 kh\u1ea3 n\u0103ng th\u1ec3 hi\u1ec7n, gi\u1ea3i th\u00edch, l\u00e0m minh x\u00e1c c\u1ea5u t\u1ee9 ngh\u1ec7 thu\u1eadt c\u1ee7a nh\u00e0 v\u0103n, tr\u1edf th\u00e0nh ti\u00eau \u0111i\u1ec3m, \u0111i\u1ec3m h\u1ed9i t\u1ee5 c\u1ee7a t\u01b0 t\u01b0\u1edfng t\u00e1c gi\u1ea3 trong t\u00e1c ph\u1ea9m. Chi ti\u1ebft ngh\u1ec7 thu\u1eadt g\u1eafn v\u1edbi \u201cquan ni\u1ec7m ngh\u1ec7 thu\u1eadt\u201d v\u1ec1 th\u1ebf gi\u1edbi con ng\u01b0\u1eddi, v\u1edbi truy\u1ec1n th\u1ed1ng v\u0103n h\u00f3a ngh\u1ec7 thu\u1eadt nh\u1ea5t \u0111\u1ecbnh.\u201d (\u201cT\u1eeb \u0111i\u1ec3n thu\u1eadt ng\u1eef v\u0103n h\u1ecdc\u201d, Nxb \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 1997).<br>Nh\u01b0 v\u1eady, chi ti\u1ebft ngh\u1ec7 thu\u1eadt \u0111\u01b0\u1ee3c xem nh\u01b0 linh h\u1ed3n c\u1ee7a m\u1ed9t v\u0103n b\u1ea3n ngh\u1ec7 thu\u1eadt. Kh\u00e1i ni\u1ec7m chi ti\u1ebft \u0111\u01b0\u1ee3c \u0111\u1eb7t ra nh\u1eb1m ph\u00e2n bi\u1ec7t v\u1edbi t\u1ed5ng th\u1ec3 nh\u01b0ng n\u00f3 kh\u00f4ng t\u00e1ch r\u1eddi t\u1ed5ng th\u1ec3.<br>Trong truy\u1ec7n, nh\u1edd chi ti\u1ebft m\u00e0 c\u1ed1t truy\u1ec7n \u0111\u01b0\u1ee3c tri\u1ec3n khai v\u00e0 ph\u00e1t tri\u1ec3n. Th\u00f4ng qua chi ti\u1ebft m\u00e0 t\u00ecnh hu\u1ed1ng, t\u00ednh c\u00e1ch, t\u00e2m tr\u1ea1ng, s\u1ed1 ph\u1eadn c\u1ee7a nh\u00e2n v\u1eadt \u0111\u01b0\u1ee3c kh\u1eafc h\u1ecda v\u00e0 b\u1ed9c l\u1ed9 \u0111\u1ea7y \u0111\u1ee7. Nhi\u1ec1u chi ti\u1ebft tr\u1edf th\u00e0nh nh\u1eefng \u0111i\u1ec3m s\u00e1ng th\u1ea9m m\u0129 c\u1ee7a t\u00e1c ph\u1ea9m, c\u00f3 v\u1ecb tr\u00ed kh\u00f4ng th\u1ec3 thi\u1ebfu trong s\u1ef1 ph\u00e1t tri\u1ec3n c\u1ee7a c\u1ed1t truy\u1ec7n, g\u1eafn li\u1ec1n v\u1edbi nh\u1eefng b\u01b0\u1edbc ngo\u1eb7t trong cu\u1ed9c \u0111\u1eddi, s\u1ed1 ph\u1eadn nh\u00e2n v\u1eadt. \u1ede g\u00f3c \u0111\u1ed9 ng\u01b0\u1eddi d\u1ea1y v\u0103n trong nh\u00e0 tr\u01b0\u1eddng m\u00e0 x\u00e9t, ": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201c\u1ede g\u00f3c \u0111\u1ed9 ng\u01b0\u1eddi d\u1ea1y v\u0103n trong nh\u00e0 tr\u01b0\u1eddng m\u00e0 x\u00e9t, nh\u1eefng chi ti\u1ebft \u0111\u1eaft gi\u00e1 c\u1ee7a t\u00e1c ph\u1ea9m ch\u00ednh l\u00e0 m\u1ea3nh \u0111\u1ea5t m\u00e0u m\u1ee1 cho c\u00e1c th\u1ea7y c\u00f4 th\u1ea3 s\u1ee9c \u201cd\u1ee5ng v\u0103n\u201d, nh\u1edd th\u1ebf m\u00e0 gi\u1edd d\u1ea1y sinh \u0111\u1ed9ng, cu\u1ed1n h\u00fat h\u1ecdc sinh.\u201d<br>C\u1ee5m t\u1eeb \u201cnh\u1eefng chi ti\u1ebft \u0111\u1eaft gi\u00e1 c\u1ee7a t\u00e1c ph\u1ea9m\u201d trong c\u00e2u tr\u00ean l\u00e0 th\u00e0nh ph\u1ea7n g\u00ec c\u1ee7a c\u00e2u?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u1ee5m t\u1eeb \u201cnh\u1eefng chi ti\u1ebft \u0111\u1eaft gi\u00e1 c\u1ee7a t\u00e1c ph\u1ea9m\u201d trong c\u00e2u tr\u00ean l\u00e0 ch\u1ee7 ng\u1eef. \u0110\u00e2y ch\u00ednh l\u00e0 \u0111\u1ed1i t\u01b0\u1ee3ng \u0111\u01b0\u1ee3c n\u00f3i \u0111\u1ebfn trong c\u00e2u.\n", "key": "A", "isVideo": true, "score": 0, "order": 24, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.31, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21590825, "lessonId": 0, "a": "So s\u00e1nh chi ti\u1ebft v\u1edbi nh\u00e3n t\u1ef1 trong th\u01a1.", "b": "B\u00e0n v\u1ec1 t\u1ea7m quan tr\u1ecdng c\u1ee7a vi\u1ec7c khai th\u00e1c chi ti\u1ebft trong v\u0103n xu\u00f4i.", "c": "B\u00e0n v\u1ec1 vai tr\u00f2 c\u1ee7a chi ti\u1ebft trong t\u00e1c ph\u1ea9m v\u0103n xu\u00f4i.", "d": "So s\u00e1nh chi ti\u1ebft trong t\u01b0\u01a1ng quan v\u1edbi c\u1ed1t truy\u1ec7n, t\u00ecnh hu\u1ed1ng truy\u1ec7n, nh\u00e2n v\u1eadt,...", "bookId": 1086604, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Ch\u1ee7 \u0111\u1ec1 c\u1ee7a \u0111o\u1ea1n tr\u00edch l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\ m\u00f9ng ta? Kh\u00f4ng bao gi\u1edd! Anh cu\u1ed9n m\u00ecnh ng\u1ed3i d\u1eady, l\u1ea7n t\u1edbi. Kh\u00f4ng ph\u1ea3i l\u00e1, m\u1ed9t con nh\u1ec7n r\u1eb1n to t\u01b0\u1edbng v\u1edbi nh\u1eefng ch\u00e2n d\u00e0i v\u00e0 nh\u1eefng khoanh b\u1ee5ng \u00e1nh b\u1ea1c. Nh\u00ecn k\u0129, nh\u1ec7n ta \u0111ang an nhi\u00ean to\u1ea1 th\u1ecb gi\u1eefa c\u00e1i m\u1ea1ng t\u01a1 n\u00f5n m\u1ecfng manh. \u0110\u1ed3 ngu! - Ng\u1eafm ngh\u00eda m\u1ed9t l\u00fac, anh r\u1ee7a th\u1ea7m, n\u1eb1m tr\u1edf l\u1ea1i - R\u00f5 r\u00e0ng ch\u00fa m\u00e0y b\u1ee7a l\u01b0\u1edbi s\u0103n m\u1ed3i. Nh\u01b0ng c\u00f3 g\u00ec trong c\u00e1i m\u00f9ng n\u00e0y m\u00e0 s\u0103n! Ch\u1ee3t nh\u1edb m\u1ed9t b\u1ee9c bi\u1ebfm ho\u1ea1 v\u1ebd m\u1ed9t ng\u01b0\u1eddi c\u00e2u c\u00e1 gi\u1eefa sa m\u1ea1c, anh th\u00edch ch\u00ed c\u01b0\u1eddi ha h\u1ea3.<br>T\u1ed1i \u0111\u1ebfn, sau khi xem xong ch\u01b0\u01a1ng tr\u00ecnh truy\u1ec1n h\u00ecnh, Chi\u1ebfn v\u00e0o gi\u01b0\u1eddng. V\u1eeba ng\u00e3 ng\u01b0\u1eddi nh\u00ecn l\u00ean, anh l\u1ea1i b\u1eaft g\u1eb7p con nh\u1ec7n v\u1edbi c\u00e1i m\u1ea1ng t\u01a1 b\u00f9ng nh\u00f9ng. V\u1eady l\u00e0 ch\u00fa m\u00e0y d\u00e1m ngang nhi\u00ean chung ch\u1ea1 v\u1edbi ta, \u00e1p t\u1eadn \u0111\u1ebfn n\u01a1i ngh\u1ec9 ng\u01a1i. Ng\u1ee9a m\u1eaft, anh mu\u1ed1n b\u1eaft gi\u1ebft ngay con nh\u1ec7n. Nh\u01b0ng ch\u1ee3t ngh\u0129 l\u1ea1i, s\u00e1 g\u00ec m\u1ed9t con v\u1eadt nh\u1ecf nhoi th\u1ebf kia m\u00e0 m\u00ecnh ph\u1ea3i nh\u1ecdc s\u1ee9c. L\u1ea1i n\u1eefa, ph\u1ea3i cho n\u00f3 ch\u1ebft \u0111\u00f3i d\u1ea7n m\u00f2n m\u1edbi x\u1ee9ng v\u1edbi c\u00e1i ngu c\u00f3 m\u1ed9t kh\u00f4ng hai! \u0110\u1ee3i \u0111\u1ea5y! S\u1ed1 m\u00e0y \u0111\u00e3 t\u1eadn, nh\u01b0ng ta th\u1ec1 ch\u1eb3ng bao gi\u1edd \u0111\u1ed9ng th\u1ee7. Anh n\u1eb1m im v\u00e0 kh\u1edfi s\u1ef1 ch\u1edd \u0111\u1ee3i con nh\u1ec7n ch\u1ebft. V\u00e0 m\u1ed7i ng\u00e0y hai b\u1eadn, anh ch\u1edd \u0111\u1ee3i nh\u01b0 th\u             // Ẩn bàn phím khi click ra ngoài
            document.addEventListener('click', (e) => {
                const numpad = document.getElementById('virtual-numpad');
                const isInput = e.target.classList.contains('char-input');
                const isNumpad = numpad.contains(e.target);
                
                if (!isInput && !isNumpad) {
                    numpad.classList.remove('active');
                    activeInput = null;
                }
            });
        };

        // --- TIMER LOGIC ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- SCROLL HELPER (SỬA LỖI MỤC LỤC DESKTOP) ---

                // Scroll native với offset (do header fixed)

                window.scrollTo({top: y, behavior: 'smooth'});

                             // Nút xem lời giải cho practice
                             boxesHtml += `<button onclick="toggleSolution('${qKey}')" class="ml-2 px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button>`;

                        boxesHtml += '</div>';

                        let feedbackHtml = "";

                    }

                    // TYPE 2: TRUE/FALSE
                    else if(qType === '2') {
                         html += `<div class="overflow-hidden border rounded-lg">
                            <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                                <tr>
                                    <th scope="col" class="px-3 py-3 w-10 text-center">Ý</th>
                                    <th scope="col" class="px-3 py-3">Nội dung</th>
                                    <th scope="col" class="px-3 py-3 w-32 text-center">Chọn Đ/S</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; 
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; 
                                const userChoice = userObj[pIdx]; 
                                
                                let trClass = "bg-white hover:bg-gray-50";
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) trClass = "bg-green-50";
                                    else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
