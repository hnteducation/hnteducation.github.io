eddi \u0111\u1ea7u b\u1ea1c h\u1ed9i K\u1ef3 Anh ?<br>\u0110\u00e0 ngo\u00e0i m\u1ecdi vi\u1ec7c , ch\u0103ng c\u00f2n \u01b0\u1edbc,<br>\u01af\u1edbc m\u1ed9t t\u00f4i hi\u1ec1n, ch\u00faa th\u00e1nh minh.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n B\u1ec9nh Khi\u00eam,<i> B\u1ea1ch V\u00e2n qu\u1ed1c ng\u1eef thi t\u1eadp</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 5, <br>NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>B\u00e0i th\u01a1 ph\u00e1 c\u00e1ch \u1edf y\u1ebfu t\u1ed1 n\u00e0o sau \u0111\u00e2y?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nB\u00e0i th\u01a1 vi\u1ebft theo th\u1ec3 th\u1ea5t ng\u00f4n b\u00e1t c\u00fa \u0110\u01b0\u1eddng lu\u1eadt. Theo quy t\u1eafc th\u00f4ng th\u01b0\u1eddng, m\u1ed7i d\u00f2ng th\u01a1 ph\u1ea3i c\u00f3 b\u1ea3y ti\u1ebfng. Tuy nhi\u00ean c\u00e2u th\u01a1 C\u1eeda v\u01b0\u01a1ng nh\u1ec7n, nh\u00e2n v\u00ec v\u1eafng ch\u1ec9 c\u00f3 s\u00e1u ti\u1ebfng. \u0110\u00e2y l\u00e0 s\u1ef1 ph\u00e1 c\u00e1ch v\u1ec1 s\u1ed1 ti\u1ebfng trong d\u00f2ng th\u01a1.\n", "key": "A", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601556, "lessonId": 0, "a": "T\u00ean tu\u1ed5i.", "b": "Lai l\u1ecbch.", "c": "T\u00e2m tr\u1ea1ng.", "d": "T\u00ednh c\u00e1ch n\u1ed5i b\u1eadt.", "bookId": 1088550, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cPh\u1ea1m T\u1eed H\u01b0 qu\u00ea \u1edf C\u1ea9m Gi\u00e0ng, l\u00e0 ng\u01b0\u1eddi tu\u1ea5n ki\u1ec7t kh\u00f4ng \u01b0a ki\u1ec1m th\u00fac. Theo h\u1ecdc nh\u00e0 D\u01b0\u01a1ng Tr\u1ea1m, Tr\u1ea1m th\u01b0\u1eddng r\u0103n T\u1eed H\u01b0 v\u1ec1 c\u00e1i t\u00ednh ki\u00eau c\u0103ng. T\u1eeb \u0111\u1ea5y ch\u00e0ng c\u1ed1 s\u1ee9c s\u1eeda \u0111\u1ed5i, tr\u1edf n\u00ean ng\u01b0\u1eddi c\u00f3 \u0111\u1ee9c t\u00ednh t\u1ed1t.Khi D\u01b0\u01a1ng Tr\u1ea1m ch\u1ebft, c\u00e1c h\u1ecdc tr\u00f2 \u0111\u1ec1u t\u1ea3n di c\u1ea3, duy T\u1eed H\u01b0 l\u00e0m l\u1ec1u \u1edf m\u1ea3 \u0111\u1ec3 ch\u1ea7u ch\u1ef1c, sau ba n\u0103m r\u1ed3i m\u1edbi tr\u1edf v\u1ec1.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n D\u1eef, <i>Chuy\u1ec7n Ph\u1ea1m T\u1eed H\u01b0 l\u00ean ch\u01a1i Thi\u00ean T\u00e0o,</i> theo <i style=\"\">Truy\u1ec1n k\u00ec m\u1ea1n l\u1ee5c</i>, NXB V\u0103n h\u1ecdc, 2008)</div>Th\u00f4ng tin n\u00e0o c\u1ee7a nh\u00e2n v\u1eadt T\u1eed H\u01b0 kh\u00f4ng \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n trong \u0111o\u1ea1n tr\u00edch?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\u0110o\u1ea1n tr\u00edch \u0111\u00e3 gi\u1edbi thi\u1ec7u c\u00e1c th\u00f4ng tin v\u1ec1 nh\u00e2n v\u1eadt Ph\u1ea1m T\u1eed H\u01b0:<br>- T\u00ean tu\u1ed5i: Ph\u1ea1m T\u1eed H\u01b0.<br>- Lai l\u1ecbch: Qu\u00ea \u1edf C\u1ea9m Gi\u00e0ng, h\u1ecdc tr\u00f2 c\u1ee7a D\u01b0\u01a1ng Tr\u1ea1m.<br>- T\u00ednh c\u00e1ch n\u1ed5i b\u1eadt: L\u00e0 ng\u01b0\u1eddi tu\u1ea5n ki\u1ec7t kh\u00f4ng \u01b0a ki\u1ec1m th\u00fac, ki\u00eau c\u0103ng nh\u01b0ng sau s\u1eeda \u0111\u1ed5i n\u00ean c\u00f3 \u0111\u1ee9c t\u00ednh t\u1ed1t.<br>\n\u2192 T\u00e2m l\u00fd c\u1ee7a nh\u00e2n v\u1eadt T\u1eed H\u01b0 kh\u00f4ng \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n trong \u0111o\u1ea1n tr\u00edch.", "key": "C", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601561, "lessonId": 0, "a": "V\u1eadn d\u1ee5ng \u0111i\u1ec3n t\u00edch, \u0111i\u1ec3n c\u1ed1.", "b": "S\u1eed d\u1ee5ng l\u1ed1i v\u0103n bi\u1ec1n ng\u1eabu.", "c": "S\u1eed d\u1ee5ng ph\u00e9p \u0111\u1ed1i.", "d": "T\u00f4 \u0111\u1eadm v\u1ebb t\u00e0i hoa, t\u00e0i t\u1eed c\u1ee7a c\u00e1c nh\u00e2n v\u1eadt \u0111\u01b0\u1ee3c nh\u1eafc \u0111\u1ebfn.", "bookId": 1088551, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u0110\u00f3i rau r\u1eebng, th\u1ea5y th\u00f3c Chu m\u00e0 tr\u1ea3, \u0111\u00e1 Th\u00fa D\u01b0\u01a1ng ch\u01a1m ch\u1edfm, xanh m\u1eaft Di n\u1eb1m t\u00f3t ng\u00e1y o o <br>Kh\u00e1t n\u01b0\u1edbc s\u00f4ng, tr\u00f4ng d\u00f2ng \u0111\u1ee5c kh\u00f4ng v\u1edd , phao V\u1ecb Thu\u1ef7 l\u00eanh \u0111\u00eanh, b\u1ea1c \u0111\u1ea7u L\u00e3 ng\u1ed3i dai ho kh\u1ee5 kh\u1ee5.\u201d</i><br>(Cao B\u00e1 Qu\u00e1t, <i>T\u00e0i t\u1eed \u0111a c\u00f9ng ph\u00fa</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)<br>Nh\u1eadn x\u00e9t n\u00e0o sau \u0111\u00e2y kh\u00f4ng \u0111\u00fang v\u1ec1 \u0111o\u1ea1n tr\u00edch tr\u00ean?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch t\u1eadp trung mi\u00eau t\u1ea3 s\u1ef1 kh\u1ed1n c\u00f9ng, \u0111\u00f3i kh\u00e1t v\u00e0 b\u1ea5t l\u1ef1c c\u1ee7a c\u00e1c nh\u00e2n v\u1eadt l\u1ecbch s\u1eed (B\u00e1 Di, Th\u00fac T\u1ec1, L\u00e3 V\u1ecdng) trong ho\u00e0n c\u1ea3nh kh\u00f3 kh\u0103n.<br>\n\u2192 Nh\u1eadn x\u00e9t kh\u00f4ng \u0111\u00fang v\u1ec1 \u0111o\u1ea1n tr\u00edch l\u00e0: T\u00f4 \u0111\u1eadm v\u1ebb t\u00e0i hoa, t\u00e0i t\u1eed c\u1ee7a c\u00e1c nh\u00e2n v\u1eadt \u0111\u01b0\u1ee3c nh\u1eafc \u0111\u1ebfn.\n", "key": "D", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601565, "lessonId": 0, "a": "Bom \u0111\u1ea1n.", "b": "N\u01b0\u1edbc \u0111\u1ed9c.", "c": "Mu\u1ed7i v\u1eaft.", "d": "S\u1ed1t r\u00e9t r\u1eebng.", "bookId": 1088552, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cM\u1ed9t kho qu\u00e2n nhu v\u00e0 b\u1ed1n c\u00f4 g\u00e1i n\u00e1u m\u00ecnh d\u01b0\u1edbi t\u00e1n c\u00e2y r\u1eebng Tr\u01b0\u1eddng S\u01a1n. B\u1ed1n c\u00f4 g\u00e1i tr\u1ebb m\u0103ng nh\u01b0ng m\u00e1i t\u00f3c ch\u1ec9 c\u00f2n l\u00e0 m\u1ed9t d\u00fam x\u01a1 x\u00e1c. D\u00f2ng n\u01b0\u1edbc khe m\u00e0u xanh \u0111en th\u1edb l\u1ee3 \u0111\u00e3 d\u1ea7n d\u00e0 v\u1eb7t tr\u1ee5i t\u00f3c c\u1ee7a h\u1ecd.<br>H\u00f4m \u0111\u00f3n Th\u1ea3o - c\u00f4 g\u00e1i th\u1ee9 n\u0103m v\u1ec1, b\u1ed1n ng\u01b0\u1eddi c\u0169 m\u1eebng r\u1ee1 khi nh\u00ecn th\u1ea5y m\u00e1i t\u00f3c \u00f3ng m\u01b0\u1ee3t d\u00e0i ch\u1ea5m g\u00f3t c\u1ee7a c\u00f4. H\u1ecd c\u01b0ng Th\u1ea3o nh\u01b0 v\u00e0ng, nh\u1ea5t tr\u00ed r\u1eb1ng kh\u00f4ng th\u1ec3 \u0111\u1ec3 r\u1eebng c\u01b0\u1edbp m\u1ea5t m\u00e1i t\u00f3c \u1ea5y c\u1ee7a h\u1ecd. Nh\u01b0ng r\u1eebng m\u1ea1nh h\u01a1n.\u201d</i><br><div style=\"text-align: right;\">(V\u00f5 Th\u1ecb H\u1ea3o, <i>Ng\u01b0\u1eddi s\u00f3t l\u1ea1i c\u1ee7a R\u1eebng C\u01b0\u1eddi</i>, theo<i> vnexpress.net</i>)</div>\u0110i\u1ec1u g\u00ec khi\u1ebfn m\u00e1i t\u00f3c c\u1ee7a c\u00e1c c\u00f4 g\u00e1i tr\u1edf n\u00ean x\u01a1 x\u00e1c?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nD\u1ef1a v\u00e0o c\u00e2u v\u0103n: \u201c. D\u00f2ng n\u01b0\u1edbc khe m\u00e0u xanh \u0111en th\u1edb l\u1ee3 \u0111\u00e3 d\u1ea7n d\u00e0 v\u1eb7t tr\u1ee5i t\u00f3c c\u1ee7a h\u1ecd.\u201d<br>\n\u2192 N\u01b0\u1edbc \u0111\u1ed9c \u0111\u00e3 khi\u1ebfn m\u00e1i t\u00f3c c\u1ee7a c\u00e1c c\u00f4 g\u00e1i tr\u1edf n\u00ean x\u01a1 x\u00e1c.\n", "key": "B", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601606, "lessonId": 0, "a": "T\u00ecnh y\u00eau l\u1ee9a \u0111\u00f4i.", "b": "N\u1ed7i nh\u1edb c\u01a1n m\u01b0a tu\u1ed5i th\u01a1.", "c": "T\u00ecnh y\u00eau qu\u00ea h\u01b0\u01a1ng \u0111\u1ea5t n\u01b0\u1edbc.", "d": "Khao kh\u00e1t tr\u1edf l\u1ea1i qu\u00ea h\u01b0\u01a1ng.", "bookId": 1088553, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u00d4i c\u01a1n m\u01b0a qu\u00ea h\u01b0\u01a1ng<br>\u0110\u00e3 ru h\u00e1t h\u1ed3n ta thu\u1edf b\u00e9,<br>\u0110\u00e3 th\u1ea5m n\u1eb7ng l\u00f2ng ta nh\u1eefng t\u00ecnh y\u00eau ch\u1edbm h\u00e9<br>Nghe ti\u1ebfng m\u01b0a r\u01a1i tr\u00ean t\u00e0u chu\u1ed1i, b\u1eb9 d\u1eeba,<br>Th\u1ea5y M\u1eb7t Tr\u1eddi l\u00ean khi t\u1ea1nh nh\u1eefng c\u01a1n m\u01b0a.<br>Ta y\u00eau qu\u00e1 nh\u01b0 l\u1ea7n \u0111\u1ea7u m\u1edbi bi\u1ebft<br>Ta y\u00eau m\u01b0a nh\u01b0 y\u00eau g\u00ec th\u00e2n thi\u1ebft<br>Nh\u01b0 tre, d\u1eeba, nh\u01b0 l\u00e0ng x\u00f3m qu\u00ea h\u01b0\u01a1ng<br>Nh\u01b0 nh\u1eefng con ng\u01b0\u1eddi - bi\u1ebft m\u1ea5y y\u00eau th\u01b0\u01a1ng.\u201d</i><br><div style=\"text-align: right;\">(L\u00ea Anh Xu\u00e2n, <i>Nh\u1edb m\u01b0a qu\u00ea h\u01b0\u01a1ng</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 12</i>, NXB \u0110\u1ea1i h\u1ecdc Hu\u1ebf, 2024)</div>C\u1ea3m h\u1ee9ng ch\u1ee7 \u0111\u1ea1o c\u1ee7a \u0111o\u1ea1n tr\u00edch l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n th\u01a1 th\u1ec3 hi\u1ec7n s\u1ef1 g\u1eafn b\u00f3 s\u00e2u s\u1eafc c\u1ee7a t\u00e1c gi\u1ea3 v\u1edbi qu\u00ea h\u01b0\u01a1ng th\u00f4ng qua h\u00ecnh \u1ea3nh c\u01a1n m\u01b0a, m\u1ed9t bi\u1ec3u t\u01b0\u1ee3ng quen thu\u1ed9c g\u1ee3i nh\u1edb v\u1ec1 tu\u1ed5i th\u01a1.<br>\n\u2192 C\u1ea3m h\u1ee9ng ch\u1ee7 \u0111\u1ea1o c\u1ee7a \u0111o\u1ea1n tr\u00edch l\u00e0 t\u00ecnh y\u00eau qu\u00ea h\u01b0\u01a1ng \u0111\u1ea5t n\u01b0\u1edbc.", "key": "C", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601611, "lessonId": 0, "a": "Huy\u1ec1n \u0110\u1ee9c ung dung c\u00fai xu\u1ed1ng nh\u1eb7t \u0111\u0169a v\u00e0 th\u00eca.", "b": "Huy\u1ec1n \u0110\u1ee9c h\u1ecfi T\u00e0o Th\u00e1o: \u201cAi c\u00f3 th\u1ec3 x\u1ee9ng \u0111\u00e1ng \u0111\u01b0\u1ee3c nh\u01b0 th\u1ebf?\u201d.", "c": "Huy\u1ec1n \u0110\u1ee9c nghe n\u00f3i gi\u1eadt n\u1ea3y m\u00ecnh, b\u1ea5t gi\u00e1c th\u00eca, \u0111\u0169a \u0111\u01b0\u01a1ng c\u1ea7m \u1edf tay r\u01a1i c\u1ea3 xu\u1ed1ng \u0111\u1ea5t.", "d": "Huy\u1ec1n \u0110\u1ee9c n\u00f3i l\u1ea3ng: G\u1edbm th\u1eadt! Ti\u1ebfng s\u1ea5m d\u1eef qu\u00e1!\u201d.", "bookId": 1088554, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTh\u00e1o n\u00f3i:<br>- Anh h\u00f9ng l\u00e0 ng\u01b0\u1eddi trong b\u1ee5ng c\u00f3 ch\u00ed l\u1edbn, c\u00f3 m\u01b0u cao, c\u00f3 t\u00e0i bao tr\u00f9m \u0111\u01b0\u1ee3c c\u1ea3 v\u0169 tr\u1ee5, c\u00f3 ch\u00ed nu\u1ed1t c\u1ea3 tr\u1eddi \u0111\u1ea5t kia.<br>Huy\u1ec1n \u0110\u1ee9c m\u1edbi h\u1ecfi:<br>- Ai c\u00f3 th\u1ec3 x\u1ee9ng \u0111\u00e1ng \u0111\u01b0\u1ee3c nh\u01b0 th\u1ebf?<br>T\u00e0o Th\u00e1o l\u1ea5y tay tr\u1ecf v\u00e0o Huy\u1ec1n \u0110\u1ee9c, r\u1ed3i l\u1ea1i tr\u1ecf v\u00e0o m\u00ecnh n\u00f3i r\u1eb1ng:<br>- Anh h\u00f9ng trong thi\u00ean h\u1ea1 b\u00e2y gi\u1edd ch\u1ec9 c\u00f3 s\u1ee9 qu\u00e2n v\u00e0 Th\u00e1o m\u00e0 th\u00f4i.<br>Huy\u1ec1n \u0110\u1ee9c nghe n\u00f3i gi\u1eadt n\u1ea3y m\u00ecnh, b\u1ea5t gi\u00e1c th\u00eca, \u0111\u0169a \u0111\u01b0\u01a1ng c\u1ea7m \u1edf tay r\u01a1i c\u1ea3 xu\u1ed1ng \u0111\u1ea5t. \u0110\u00fang l\u00fac \u1ea5y, c\u01a1n m\u01b0a s\u1eafp \u0111\u1ebfn, c\u00f3 m\u1ed9t ti\u1ebfng s\u1ea5m r\u1ec1n vang. Huy\u1ec1n \u0110\u1ee9c ung dung c\u00fai xu\u1ed1ng nh\u1eb7t \u0111\u0169a v\u00e0 th\u00eca, n\u00f3i l\u1ea3ng r\u1eb1ng:<br>- G\u1edbm th\u1eadt! Ti\u1ebfng s\u1ea5m d\u1eef qu\u00e1!\u201d</i><br><div style=\"text-align: right;\">(La Qu\u00e1n Trung, <i>Tam qu\u1ed1c di\u1ec5n ngh\u0129a</i>, theo <i>Ng\u1eef v\u0103n 10 N\u00e2ng cao</i>, t\u1eadp 2, NXB Gi\u00e1o d\u1ee5c Vi\u1ec7t Nam, 2011)</div>Chi ti\u1ebft n\u00e0o kh\u1eb3ng \u0111\u1ecbnh Huy\u1ec1n \u0110\u1ee9c cho r\u1eb1ng T\u00e0o Th\u00e1o \u0111\u00e3 ph\u00e1t hi\u1ec7n ra ch\u00ed l\u1edbn, m\u01b0u cao c\u1ee7a m\u00ecnh?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft \u201cHuy\u1ec1n \u0110\u1ee9c nghe n\u00f3i gi\u1eadt n\u1ea3y m\u00ecnh, b\u1ea5t gi\u00e1c th\u00eca, \u0111\u0169a \u0111\u01b0\u01a1ng c\u1ea7m \u1edf tay r\u01a1i c\u1ea3 xu\u1ed1ng \u0111\u1ea5t.\u201d cho th\u1ea5y s\u1ef1 kinh ng\u1ea1c, lo s\u1ee3 c\u1ee7a Huy\u1ec1n \u0110\u1ee9c, v\u00ec \u00f4ng hi\u1ec3u r\u1eb1ng T\u00e0o Th\u00e1o \u0111\u00e3 nh\u1eadn ra ch\u00ed l\u1edbn v\u00e0 t\u00e0i n\u0103ng ti\u1ec1m \u1ea9n c\u1ee7a m\u00ecnh.\n", "key": "C", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601623, "lessonId": 0, "a": "L\u1ea5y c\u1ee7a c\u1eady ng\u1ecdn roi.", "b": "Hoa nguy\u1ec7t c\u0169ng quen m\u00f9i.", "c": "S\u1ef1 l\u00ed th\u01b0\u1eddng ph\u00e2n \u1ea9u.", "d": "Quy\u1ec1n tr\u1ecdng ch\u1ed1n nha m\u00f4n.", "bookId": 1088555, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTRI HUY\u1ec6N: </i>(N\u00f3i l\u1ed1i) <br><i>Quy\u1ec1n tr\u1ecdng  ch\u1ed1n nha m\u00f4n <br>B\u1ea3n ch\u1ee9c  x\u01b0ng Tri huy\u1ec7n<br>\u0110\u1ec9nh chung  \u0111\u00e3 \u0111\u1ee7 mi\u1ebfng<br>Hoa nguy\u1ec7t  c\u0169ng quen m\u00f9i<br>L\u1ea5y c\u1ee7a c\u1eady ng\u1ecdn roi<br>L\u00e0m quan nh\u1edd l\u1ed7 kh\u1ea9u <br>S\u1ef1 l\u00ed th\u01b0\u1eddng ph\u00e2n \u1ea9u <br>\u0110\u01b0\u1ee3c thua t\u1ef1 \u0111\u1ed3ng ti\u1ec1n<br>D\u00e2n x\u00e3 n\u1ebfu kh\u00f4ng ki\u00eang <br>B\u1ecf xu\u1ed1ng lao giam k\u0129<br>(m\u1ed9t l\u00e1t, c\u01b0\u1eddi)<br>Quan ch\u1ee9c ngh\u0129 n\u00ean th\u00fa v\u1ecb<br>V\u00e0o ra c\u0169ng ph\u1ea3i chuy\u00ean c\u1ea7n.\u201d</i><br><div style=\"text-align: right;\">(Tu\u1ed3ng c\u1ed5, <i>Ngh\u00eau, S\u00f2, \u1ed0c, H\u1ebfn</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>Chi ti\u1ebft n\u00e0o <b>kh\u00f4ng </b>l\u1eadt t\u1ea9y th\u00f3i h\u01b0 t\u1eadt x\u1ea5u c\u1ee7a Tri huy\u1ec7n?<br>", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft \u201cQuy\u1ec1n tr\u1ecdng ch\u1ed1n nha m\u00f4n\u201d ch\u1ec9 gi\u1edbi thi\u1ec7u v\u1ec1 ch\u1ee9c v\u1ee5 v\u00e0 kh\u1eb3ng \u0111\u1ecbnh quy\u1ec1n l\u1ef1c c\u1ee7a Tri huy\u1ec7n, kh\u00f4ng v\u1ea1ch tr\u1ea7n th\u00f3i h\u01b0 t\u1eadt x\u1ea5u c\u1ee7a \u00f4ng ta.\n", "key": "D", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601629, "lessonId": 0, "a": "B\u1ed9c l\u1ed9 n\u1ed7i nh\u1edb qu\u00ea h\u01b0\u01a1ng, \u0111\u1ea5t n\u01b0\u1edbc trong nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh.", "b": "Ph\u01a1i b\u00e0y th\u1ef1c tr\u1ea1ng th\u1ed1i n\u00e1t c\u1ee7a nh\u00e0 t\u00f9 T\u01b0\u1edfng Gi\u1edbi Th\u1ea1ch.", "c": "Th\u1ec3 hi\u1ec7n t\u1ea5m l\u00f2ng bao dung, nh\u00e2n \u00e1i c\u1ee7a ng\u01b0\u1eddi t\u00f9 c\u1ed9ng s\u1ea3n.", "d": "Gi\u00e3i b\u00e0y v\u00ec nhi\u1ec7m v\u1ee5 sang Trung Qu\u1ed1c v\u00ec m\u1ee5c \u0111\u00edch c\u00e1ch m\u1ea1ng m\u00e0 b\u1ecb b\u1eaft oan.", "bookId": 1088556, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cS\u01a1 l\u1ea1i y\u1ebfu n\u1ea1p nh\u1eadp lung ti\u1ec1n,<br>Ch\u00ed thi\u1ec3u nh\u01b0ng tu ng\u0169 th\u1eadp nguy\u00ean!<br>Th\u1ea3ng nh\u0129 v\u00f4 ti\u1ec1n b\u1ea5t n\u0103ng n\u1ea1p,<br>Nh\u0129 t\u01b0\u01a1ng b\u1ed9 b\u1ed9 b\u00e1nh ma phi\u1ec1n.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>Nh\u1eadp lung ti\u1ec1n</i>)</div>D\u1ecbch ngh\u0129a:<br><i>\u201cNg\u01b0\u1eddi m\u1edbi \u0111\u1ebfn, ph\u1ea3i n\u1ed9p ti\u1ec1n v\u00e0o lao,<br>\u00cdt nh\u1ea5t c\u0169ng ph\u1ea3i n\u0103m m\u01b0\u01a1i \u0111\u1ed3ng b\u1ea1c!<br>N\u1ebfu anh kh\u00f4ng c\u00f3 ti\u1ec1n n\u1ed9p n\u1ed5i,<br>M\u1ed7i b\u01b0\u1edbc \u0111i, anh s\u1ebd g\u1eb7p m\u1ed9t chuy\u1ec7n r\u1eafc r\u1ed1i.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>Ti\u1ec1n v\u00e0o nh\u00e0 lao</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>N\u1ed9i dung ch\u00ednh c\u1ee7a b\u00e0i th\u01a1 l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nB\u00e0i th\u01a1 mi\u00eau t\u1ea3 m\u1ed9t c\u00e1ch ch\u00e2n th\u1ef1c c\u1ea3nh t\u01b0\u1ee3ng tham nh\u0169ng, h\u1ed1i l\u1ed9 tr\u1eafng tr\u1ee3n trong nh\u00e0 t\u00f9 T\u01b0\u1edfng Gi\u1edbi Th\u1ea1ch. Vi\u1ec7c ng\u01b0\u1eddi m\u1edbi \u0111\u1ebfn ph\u1ea3i n\u1ed9p ti\u1ec1n \u0111\u1ec3 \u0111\u01b0\u1ee3c y\u00ean th\u00e2n, n\u1ebfu kh\u00f4ng s\u1ebd b\u1ecb g\u00e2y kh\u00f3 d\u1ec5, cho th\u1ea5y s\u1ef1 th\u1ed1i n\u00e1t v\u00e0 b\u1ea5t c\u00f4ng c\u1ee7a ch\u1ebf \u0111\u1ed9 nh\u00e0 t\u00f9 n\u00e0y.<br>\n\u2192 N\u1ed9i dung ch\u00ednh c\u1ee7a b\u00e0i th\u01a1 l\u00e0 ph\u01a1i b\u00e0y th\u1ef1c tr\u1ea1ng th\u1ed1i n\u00e1t c\u1ee7a nh\u00e0 t\u00f9 T\u01b0\u1edfng Gi\u1edbi Th\u1ea1ch.\n", "key": "B", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601634, "lessonId": 0, "a": "Ba n\u0103m \u0111\u1ea7u v\u1ec1 gi\u1ed7, b\u1ea1n b\u1ecb n\u01b0\u1edbc \u0103n l\u1edf m\u1ea5y kh\u00f3e ch\u00e2n.", "b": "Em ch\u1ed3ng tr\u00fang v\u1ee5 t\u00f4m, c\u1ea5t nh\u00e0 m\u1edbi.", "c": "N\u0103m gi\u1ed7 trong nh\u00e0 m\u1edbi, m\u1eb7t s\u00f4ng m\u1edbi ch\u1ec9 l\u1ea5p l\u00f3 m\u00e9p s\u00e2n.", "d": "M\u1edbi con n\u01b0\u1edbc \u0111\u1ea7u th\u00e1ng m\u00e0 s\u00f3ng v\u1ed7 \u01b0\u1edbt h\u00e0ng ba.", "bookId": 1088557, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cBa n\u0103m \u0111\u1ea7u v\u1ec1 gi\u1ed7, b\u1ea1n b\u1ecb n\u01b0\u1edbc \u0103n l\u1edf m\u1ea5y kh\u00f3e ch\u00e2n, em ch\u1ed3ng n\u00f3i tr\u00fang t\u00f4m th\u00eam ch\u1ee5c ngo\u00e0i con n\u01b0\u1edbc n\u1eefa s\u1ebd c\u1ea5t nh\u00e0 l\u1ea1i, c\u01a1i n\u1ec1n thi\u1ec7t cao, \u201cn\u01b0\u1edbc mu\u1ed1n r\u01b0\u1ee3t theo c\u0169ng kh\u00f3\u201d. Kh\u00e9o d\u00e0nh d\u1ee5m, em c\u0169ng gi\u1eef l\u1eddi h\u1ee9a. N\u0103m \u1ea5y gi\u1ed7 trong nh\u00e0 m\u1edbi, m\u1eb7t s\u00f4ng gi\u1ecfi l\u1eafm l\u00e0 l\u1ea5p l\u00f3 m\u00e9p s\u00e2n. Nh\u01b0ng h\u00f4m r\u1ed3i nghe em ch\u1ed3ng k\u00eau m\u1edbi con n\u01b0\u1edbc \u0111\u1ea7u th\u00e1ng m\u00e0 s\u00f3ng v\u1ed7 \u01b0\u1edbt h\u00e0ng ba. \u201cN\u01b0\u1edbc n\u0103m sau cao h\u01a1n n\u0103m tr\u01b0\u1edbc, ki\u1ec3u n\u00e0y tr\u01b0\u1edbc sau g\u00ec em c\u0169ng s\u1eafm chi\u1ebfc xu\u1ed3ng cho ch\u1ecb Hai b\u01a1i t\u1edbi lui trong nh\u00e0, b\u1eefa v\u1ec1 gi\u1ed7 m\u00e1\u201d, em c\u00e0 r\u1ee1n, gi\u1ecdng t\u1ec9nh kh\u00f4.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Ng\u1ecdc T\u01b0,<i> Kh\u00f4ng g\u00f3i \u0111\u01b0\u1ee3c s\u00f4ng</i>, theo <i>vnexpress.net</i>)</div>Chi ti\u1ebft n\u00e0o ph\u1ea3n \u00e1nh hi\u1ec7n t\u01b0\u1ee3ng tri\u1ec1u c\u01b0\u1eddng n\u01b0\u1edbc d\u00e2ng b\u1ea5t th\u01b0\u1eddng?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft \u201cM\u1edbi con n\u01b0\ {"questionId": 21601675, "lessonId": 0, "a": "T\u00ednh n\u00f3ng n\u1ea3y c\u1ee7a anh th\u00ec ai c\u0169ng ph\u1ea3i gh\u00ea s\u1ee3.", "b": "T\u00ednh n\u00f3ng n\u1ea3y c\u1ee7a anh, ai c\u0169ng ph\u1ea3i gh\u00ea g\u1edbm.", "c": "B\u1edfi anh n\u00f3ng n\u1ea3y n\u00ean ai c\u0169ng gh\u00ea s\u1ee3.", "d": "T\u00ednh n\u00f3ng n\u1ea3y c\u1ee7a anh l\u00e0m ai c\u0169ng ph\u1ea3i gh\u00ea s\u1ee3.", "bookId": 1088566, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Ch\u1ec9 ra c\u00e2u sai trong c\u00e1c c\u00e2u sau:", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u00e2u \u201cT\u00ednh n\u00f3ng n\u1ea3y c\u1ee7a anh, ai c\u0169ng ph\u1ea3i gh\u00ea g\u1edbm.\u201d sai v\u1ec1 ng\u1eef ngh\u0129a. T\u1eeb \u201cgh\u00ea g\u1edbm\u201d th\u01b0\u1eddng d\u00f9ng \u0111\u1ec3 ch\u1ec9 ng\u01b0\u1eddi c\u00f3 t\u00ednh c\u00e1ch d\u1eef d\u1eb1n, kh\u00f4ng ph\u00f9 h\u1ee3p \u0111\u1ec3 ch\u1ec9 ph\u1ea3n \u1ee9ng s\u1ee3 h\u00e3i tr\u01b0\u1edbc t\u00ednh n\u00f3ng n\u1ea3y c\u1ee7a ng\u01b0\u1eddi kh\u00e1c.\n", "key": "B", "isVideo": true, "score": 0, "order": 20, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 21 \u0111\u1ebfn 25", "content": "\u201cNh\u1eefng s\u00e1ng t\u1ea1o ngh\u1ec7 thu\u1eadt, t\u1eeb ng\u00f4n ng\u1eef ngh\u1ec7 thu\u1eadt \u0111\u1ebfn th\u1ebf gi\u1edbi quan nh\u00ecn v\u1ec1 c\u00e1i \u0111\u1eb9p c\u1ee7a Nguy\u1ec5n Minh Ch\u00e2u \u0111\u00e3 t\u00ecm ra s\u1ef1 th\u1ee9c nh\u1eadn c\u1ee7a con ng\u01b0\u1eddi. Nhi\u1ec1u t\u1eadp truy\u1ec7n c\u1ee7a \u00f4ng k\u1ec3 v\u1ec1 con ng\u01b0\u1eddi c\u00f3 nh\u1eefng g\u00f3c khu\u1ea5t th\u1ea7m l\u1eb7ng. Con ng\u01b0\u1eddi hi\u1ec7n l\u00ean nh\u1eefng gi\u00e1 tr\u1ecb tinh th\u1ea7n v\u1edbi chi\u1ec1u s\u00e2u nh\u00e2n b\u1ea3n trong s\u1ef1 h\u00e0i h\u00f2a v\u1edbi thi\u00ean nhi\u00ean t\u1ea1o v\u1eadt. V\u1edbi c\u00e1i \u0111\u1eb9p, Nguy\u1ec5n Minh Ch\u00e2u h\u1eb3n c\u00f3 m\u1ed9t \u0111\u1eddi s\u1ed1ng n\u1ed9i t\u00e2m r\u1ea5t phong ph\u00fa. M\u1ea1ch suy t\u01b0 tr\u1eef t\u00ecnh trong l\u1ed1i vi\u1ebft v\u0103n c\u1ee7a \u00f4ng nh\u01b0 d\u00f2ng s\u00f4ng t\u01b0\u01a1i m\u00e1t ch\u1ea3y v\u1ec1 c\u00e1c ng\u00e1ch s\u00f4ng b\u00ean nh\u1eefng ng\u00f4i l\u00e0ng xanh m\u01b0\u1edbt b\u00e3i d\u00e2u, \u0111\u1ec3 r\u1ed3i c\u00f3 nh\u1eefng c\u00e2u chuy\u1ec7n k\u1ebft \u0111\u1ecdng s\u1eafc c\u1ea3m, th\u1ea5m \u0111\u1eadm t\u00ecnh ng\u01b0\u1eddi: <b>\u201cT\u00f4i bu\u00f4ng b\u00fat, \u0111i ra v\u01b0\u1eddn. S\u00e1ng nay ng\u00f4i v\u01b0\u1eddn sao nhi\u1ec1u gi\u00f3? H\u1eb3n v\u1eabn nh\u1eefng ng\u1ecdn gi\u00f3 n\u00e0y \u0111\u00e3 t\u1eebng th\u1ed5i qua m\u1eb7t b\u00e0 t\u00f4i, th\u1ed5i v\u00e0o cu\u1ed9c \u0111\u1eddi \u0111\u1ea7y \u0111au kh\u1ed5 v\u00e0 c\u00f4 \u0111\u1ed9c c\u1ee7a b\u00e0 t\u00f4i? T\u00f4i \u0111\u1ee9ng quanh ti\u1ebfng l\u00e1 reo \u00e0o \u00e0o. T\u00f4i nh\u00ecn l\u00ean v\u00f2m l\u00e1, mu\u1ed1n h\u1ecfi t\u1eebng c\u00e1i c\u00e2y trong v\u01b0\u1eddn - lo\u00e0i th\u1ea3o m\u1ed9c c\u00f9ng s\u1ed1ng c\u00f9ng th\u1eddi v\u1edbi b\u00e0 t\u00f4i - nh\u1eefng c\u00e2y n\u00e0o \u0111\u00e3 t\u1eebng \u0111\u1ed5 b\u00f3ng xu\u1ed1ng c\u00e1i d\u00e1ng \u0111i \u0111\u1ee9ng m\u1ed9t m\u00ecnh trong v\u01b0\u1eddn c\u1ee7a b\u00e0 t\u00f4i, \u0111\u00e3 t\u1eebng \u0111\u1ec3 r\u01a1i l\u00e1 xanh hay l\u00e1 v\u00e0ng xu\u1ed1ng vai b\u00e0 t\u00f4i?\u201d<i>(M\u1ea3nh \u0111\u1ea5t t\u00ecnh y\u00eau).</i>\u201d</b><br><div style=\"text-align: right;\">(Tr\u1ecbnh V\u0129nh \u0110\u1ee9c, <i>Nguy\u1ec5n Minh Ch\u00e2u t\u01b0 duy ngh\u1ec7 thu\u1eadt v\u1ec1 c\u00e1i \u0111\u1eb9p trong truy\u1ec7n ng\u1eafn sau 1975</i>, theo <i>vanvn.vn</i>)</di         let userAnswers = {}; // Store: { qId: value }
        let isSubmitted = false;

            startTimer();
            document.getElementById('mode-select').addEventListener('change', (e) => {

                    renderExam(false); // Re-render without resetting answers
                } else {
                    e.target.value = examMode;
                }
            });
        };

        // --- TIMER LOGIC ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- RENDER ENGINE ---
        function renderExam(reset = false) {

            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';

            palDesk.innerHTML = '';
            palMob.innerHTML = '';

                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}

                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`; // Unique Key for storage

                    // -- Palette Item --

                    palBtn.innerText = qId;

                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop

                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';

                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { // Chọn đúng
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { // Đúng nhưng không chọn (hiện đáp án khi nộp)
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { // Chọn sai
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; // Hiện đáp án đúng sau khi nộp dù chưa làm
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // === TYPE 1 & 3: FILL KEY ===
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let inputClass = "w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all font-mono";
                        let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
