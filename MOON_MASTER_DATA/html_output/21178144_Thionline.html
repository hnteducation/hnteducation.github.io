298ac978.png\"/> v\u1ec1 ph\u00eda \u0110\u00f4ng r\u1ed3i r\u1ebd tr\u00e1i v\u00e0 \u0111i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a1088daa-0eb7-4610-9b9a-967255325510.png\"/> ti\u1ebfp t\u1ee5c r\u1ebd ph\u1ea3i \u0111i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/59ee20f3-484d-43e0-8559-0ef29f956e70.png\"/> v\u00e0 cu\u1ed1i c\u00f9ng r\u1ebd ph\u1ea3i \u0111i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/e89d79b0-4b66-4ec5-a84d-a712c0d7bc51.png\"/> V\u1eady Qu\u1ef3nh c\u00e1ch v\u1ecb tr\u00ed xu\u1ea5t ph\u00e1t bao xa (t\u00ednh b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/5a54879c-dfd8-489a-b354-14763ede8a2c.png\"/>)?", "answer": "<img src=\"https://asset.moon.vn/img/chat/large/2025/10/5bbc343d-bd0f-4047-96e4-68295043c31b.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br>\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b><br><b>Ph\u01b0\u01a1ng ph\u00e1p:</b> S\u1eed d\u1ee5ng <b>\u0110\u1ecbnh l\u00fd Pytago</b> trong tam gi\u00e1c vu\u00f4ng \u0111\u1ec3 t\u00ednh kho\u1ea3ng c\u00e1ch gi\u1eefa \u0111i\u1ec3m xu\u1ea5t ph\u00e1t v\u00e0 \u0111i\u1ec3m k\u1ebft th\u00fac.<br><b>C\u00e1c b\u01b0\u1edbc h\u01b0\u1edbng d\u1eabn:</b><br>1. V\u1ebd h\u00ecnh m\u00f4 t\u1ea3 h\u00e0nh tr\u00ecnh v\u00e0 x\u00e1c \u0111\u1ecbnh \u0111i\u1ec3m xu\u1ea5t ph\u00e1t (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/dea22a16-5433-4860-aa72-73dc0170f4af.png\"/>) v\u00e0 \u0111i\u1ec3m k\u1ebft th\u00fac (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f2c3131c-fd82-432a-9adf-f1c62715557e.png\"/>).<br>2. T\u1ea1o m\u1ed9t tam gi\u00e1c vu\u00f4ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/3b5cdf0b-c2a2-42e4-951a-d560a96440a1.png\"/> c\u00f3 c\u1ea1nh huy\u1ec1n l\u00e0 \u0111o\u1ea1n n\u1ed1i hai \u0111i\u1ec3m \u0111\u00f3 (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/c354cdc8-c630-4613-953b-d17e4d8b0fa5.png\"/>), trong \u0111\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/114f6d0d-7c40-4241-bf10-dac1e9c20ae1.png\"/> l\u00e0 \u0111i\u1ec3m tr\u00ean \u0111\u01b0\u1eddng th\u1eb3ng \u0111i qua <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d7cb2e51-5ce5-4edc-be52-3cd1dfbc32ee.png\"/> sao cho <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/80dba666-5002-422a-908a-2016340fe3cc.png\"/>.<br>3. T\u00ednh \u0111\u1ed9 d\u00e0i hai c\u1ea1nh g\u00f3c vu\u00f4ng:<br>    \u2022 C\u1ea1nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/aa7789c8-5384-4370-9468-d7793044013c.png\"/> l\u00e0 t\u1ed5ng qu\u00e3ng \u0111\u01b0\u1eddng \u0111i theo chi\u1ec1u <b>\u0110\u00f4ng</b> tr\u1eeb \u0111i qu\u00e3ng \u0111\u01b0\u1eddng \u0111i theo chi\u1ec1u <b>T\u00e2y</b>.<br>    \u2022 C\u1ea1nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/4dafa96c-1afd-40b8-9ad5-da0bc0e6adfd.png\"/> l\u00e0 t\u1ed5ng qu\u00e3ng \u0111\u01b0\u1eddng \u0111i theo chi\u1ec1u <b>Nam</b> tr\u1eeb \u0111i qu\u00e3ng \u0111\u01b0\u1eddng \u0111i theo chi\u1ec1u <b>B\u1eafc</b>.<br>4. \u00c1p d\u1ee5ng \u0110\u1ecbnh l\u00fd Pytago: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/c7e36a4a-a4fe-48e4-b50f-e0230fec453c.png\"/>.<br>\u270d\ufe0f <b>L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>G\u1ecdi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/473071c3-3340-4396-b87e-a2189d8fb0a7.png\"/> l\u00e0 \u0111i\u1ec3m xu\u1ea5t ph\u00e1t. H\u00e0nh tr\u00ecnh c\u1ee7a Qu\u1ef3nh \u0111\u01b0\u1ee3c m\u00f4 t\u1ea3 nh\u01b0 sau (tham kh\u1ea3o h\u00ecnh v\u1ebd):<br><b>B\u01b0\u1edbc 1:</b> \u0110i 15 km v\u1ec1 ph\u00eda \u0110\u00f4ng (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6aa9df42-2032-48d7-9e77-5178d16053e2.png\"/>): <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d2ab43d6-154d-44eb-9f77-f914886ce17a.png\"/> km.<br><b>B\u01b0\u1edbc 2:</b> R\u1ebd tr\u00e1i v\u00e0 \u0111i 4 km (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f11330b3-cb8c-43e2-9c06-9f7cd27b817f.png\"/>): R\u1ebd tr\u00e1i l\u00e0 \u0111i v\u1ec1 ph\u00eda B\u1eafc, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f34a2352-6b8a-4434-be5e-b38b60e039ee.png\"/> km.<br><b>B\u01b0\u1edbc 3:</b> Ti\u1ebfp t\u1ee5c r\u1ebd ph\u1ea3i \u0111i 9 km (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ab2aa72e-3433-4a89-830f-408ebc990479.png\"/>): R\u1ebd ph\u1ea3i l\u00e0 \u0111i v\u1ec1 ph\u00eda \u0110\u00f4ng, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/535e8155-d7a8-451a-87e3-20c46a194f14.png\"/> km.<br><b>B\u01b0\u1edbc 4:</b> Cu\u1ed1i c\u00f9ng r\u1ebd ph\u1ea3i \u0111i 11 km (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0f5a8107-e362-4cc3-bac8-b8f06faa9b33.png\"/>): R\u1ebd ph\u1ea3i l\u00e0 \u0111i v\u1ec1 ph\u00eda Nam, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d16c916f-ce56-4e16-be99-0cbac445058a.png\"/> km.<br>\u0110i\u1ec3m <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b1a0711c-9cca-4f48-a566-e516230efeeb.png\"/> l\u00e0 \u0111i\u1ec3m k\u1ebft th\u00fac. Kho\u1ea3ng c\u00e1ch c\u1ea7n t\u00ecm l\u00e0 \u0111\u1ed9 d\u00e0i \u0111o\u1ea1n <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/48eba743-2b15-46d2-8f24-03123540406a.png\"/>.<br>K\u1ebb <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ac7c15c4-713a-489d-a8b4-6beb27217d42.png\"/> vu\u00f4ng g\u00f3c v\u1edbi \u0111\u01b0\u1eddng th\u1eb3ng \u0111i qua <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/3f0d3d2d-f5e5-4db0-96be-f6ee4c17866c.png\"/> t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/5b47ec1b-32c1-4206-ae96-d29a779849c6.png\"/>. Ta c\u00f3 tam gi\u00e1c vu\u00f4ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b9588b77-9697-4e7d-9fd5-509e02df62b9.png\"/> (vu\u00f4ng t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/48089db3-cd61-4f7e-b7d9-f1d6e4b89833.png\"/>).<br><b>T\u00ednh c\u1ea1nh g\u00f3c vu\u00f4ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/5b654888-ab30-43b4-897c-11bbefba1b2b.png\"/> (theo chi\u1ec1u \u0110\u00f4ng - T\u00e2y):</b><br>Qu\u00e3ng \u0111\u01b0\u1eddng \u0111i v\u1ec1 ph\u00eda \u0110\u00f4ng l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a28d05f9-f9f7-4909-a7a5-43319e6357b3.png\"/> km (qu\u00e3ng \u0111\u01b0\u1eddng \u0111i v\u1ec1 ph\u00eda T\u00e2y l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/54944c1b-b8d6-4adb-9f92-1985ce596b94.png\"/>).<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/2b43e4cc-61f2-4adc-b884-02477e29501e.png\"/> km.<br><b>T\u00ednh c\u1ea1nh g\u00f3c vu\u00f4ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/bea322ca-8449-4dd4-bf97-e418024a6a61.png\"/> (theo chi\u1ec1u B\u1eafc - Nam):</b><br>Qu\u00e3ng \u0111\u01b0\u1eddng \u0111i v\u1ec1 ph\u00eda Nam l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7dbfb491-964e-4058-925f-225fc5a58d41.png\"/> km, c\u00f2n 1i v\u1ec1 ph\u00eda \u0110\u00f4ng 6 km \u0111\u1ebfn \u0111i\u1ec3m D (\u0111i\u1ec3m k\u1ebft th\u00fac) \u2192 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/63244e2f-f58a-458f-995f-7e720652d761.png\"/> km.<br>Ta c\u1ea7n t\u00ednh kho\u1ea3ng c\u00e1ch <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/83316b66-c85e-497d-a091-c20151c72632.png\"/>.<br>K\u1ebb <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7c779cff-d7a0-4244-a8d3-df919e73605a.png\"/> \u0111\u01b0\u1eddng th\u1eb3ng \u0111i qua <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/fad34c89-e316-4350-819a-08286d3f118b.png\"/> t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7a77345d-366c-44c1-b69e-3f1affe571c1.png\"/>, khi \u0111\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/36daaa6a-9e90-43d7-a632-ab7c9005a03f.png\"/> vu\u00f4ng t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/999e40b6-5bc9-45cb-ad3b-3a0c1f06beec.png\"/>.<br>Ta c\u00f3:<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6070b922-f7f4-4101-bb43-040f4f0f9b1f.png\"/> (km) \u2014 kho\u1ea3ng c\u00e1ch theo chi\u1ec1u B\u1eafc \u2013 Nam.<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/48d2a17b-bee3-4d55-93e5-c12a240bbe18.png\"/> (km) \u2014 kho\u1ea3ng c\u00e1ch theo chi\u1ec1u \u0110\u00f4ng \u2013 T\u00e2y.<br>\u00c1p d\u1ee5ng \u0111\u1ecbnh l\u00fd Pytago trong <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/2b53a852-241d-47c6-8504-1ed27a873a33.png\"/>:<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/00f1b113-2546-4345-94ce-e5cca2cf08af.png\"/>.<br>\u21d2 <img style = \"vertical-align:middle\" src= \u1edbng T\u00e2y Nam.", "b": "12 km, h\u01b0\u1edbng \u0110\u00f4ng Nam.", "c": "12 km, h\u01b0\u1edbng \u0110\u00f4ng B\u1eafc.", "d": "10 km, h\u01b0\u1edbng \u0110\u00f4ng B\u1eafc.", "bookId": 1055425, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "M\u1ed9t ng\u01b0\u1eddi \u0111i 4 km v\u1ec1 ph\u00eda \u0110\u00f4ng, r\u1ed3i r\u1ebd tr\u00e1i \u0111i 7 km, sau \u0111\u00f3 \u0111i 10 km v\u1ec1 ph\u00eda T\u00e2y, cu\u1ed1i c\u00f9ng \u0111i 15 km v\u1ec1 ph\u00eda Nam. V\u1eady ng\u01b0\u1eddi \u0111\u00f3 c\u00e1ch \u0111i\u1ec3m xu\u1ea5t ph\u00e1t bao xa v\u00e0 theo h\u01b0\u1edbng n\u00e0o?", "answer": "<img src=\"https://asset.moon.vn/img/chat/large/2025/10/5787b02b-0217-4c92-9a7a-456a06c4a05b.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br>\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b><br>S\u1eed d\u1ee5ng <b>\u0110\u1ecbnh l\u00fd Pytago</b> trong tam gi\u00e1c vu\u00f4ng \u0111\u1ec3 t\u00ednh kho\u1ea3ng c\u00e1ch (\u0111\u01b0\u1eddng chim bay) t\u1eeb \u0111i\u1ec3m xu\u1ea5t ph\u00e1t \u0111\u1ebfn \u0111i\u1ec3m k\u1ebft th\u00fac, \u0111\u1ed3ng th\u1eddi x\u00e1c \u0111\u1ecbnh h\u01b0\u1edbng di chuy\u1ec3n.<br><b>C\u00e1c b\u01b0\u1edbc h\u01b0\u1edbng d\u1eabn:</b><br>1. V\u1ebd h\u00ecnh m\u00f4 t\u1ea3 h\u00e0nh tr\u00ecnh v\u00e0 x\u00e1c \u0111\u1ecbnh \u0111i\u1ec3m xu\u1ea5t ph\u00e1t (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/74a78457-fc4b-4a4d-9882-ec072f3332c0.png\"/>) v\u00e0 \u0111i\u1ec3m k\u1ebft th\u00fac (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/cf4deb58-c21f-4b64-9012-84e8efb5f774.png\"/>).<br>2. T\u1ea1o m\u1ed9t tam gi\u00e1c vu\u00f4ng c\u00f3 c\u1ea1nh huy\u1ec1n l\u00e0 \u0111o\u1ea1n n\u1ed1i hai \u0111i\u1ec3m \u0111\u00f3 (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/1f71985c-d7cd-46f4-9051-50399676ecc9.png\"/>).<br>3. T\u00e         let userAnswers = {}; // Store: { qId: value }
        let isSubmitted = false;
        let examMode = 'practice'; // 'practice' or 'exam'
        let startTime = Date.now();
        let timerInterval;

        // --- INIT ---
        window.onload = function() {
            renderExam();
            startTimer();
            document.getElementById('mode-select').addEventListener('change', (e) => {
                if(isSubmitted) return;
                if(confirm('Đổi chế độ sẽ làm mới lại trạng thái hiển thị (không mất bài làm). Tiếp tục?')) {
                    examMode = e.target.value;
                    renderExam(false); // Re-render without resetting answers
                } else {
                    e.target.value = examMode;
                }
            });
        };

        // --- TIMER LOGIC ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- RENDER ENGINE ---
        function renderExam(reset = false) {
            const container = document.getElementById('exam-content');
            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; // Clear to re-render
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

            let globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                // Render Group Header
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`; // Unique Key for storage
                    const qType = q.normalizedType;
                    
                    // -- Palette Item --
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop
                    palMob.appendChild(palBtn); // Add to Mobile

                    // -- Question Card --
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    // Header: Question Number
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    // Interaction Area
                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // === TYPE 0: MCQ ===
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            // Logic hiển thị kết quả
                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { // Chọn đúng
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { // Đúng nhưng không chọn (hiện đáp án khi nộp)
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { // Chọn sai
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; // Hiện đáp án đúng sau khi nộp dù chưa làm
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // === TYPE 1 & 3: FILL KEY ===
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let inputClass = "w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all font-mono";
                        let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
