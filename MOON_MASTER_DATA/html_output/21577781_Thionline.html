0ean h\u1ecdc \u0111\u1ea1i h\u1ecdc?<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang. Ta c\u00f3<b> sensible /\u02c8sens\u0259bl/ (adj): h\u1ee3p l\u00fd, \u0111\u00fang \u0111\u1eafn</b><br>D. T\u00f4i kh\u00f4ng th\u1ec3 quy\u1ebft \u0111\u1ecbnh n\u00ean ki\u1ebfm vi\u1ec7c l\u00e0m sau khi t\u1ed1t nghi\u1ec7p c\u1ea5p 3 hay h\u1ecdc \u0111\u1ea1i h\u1ecdc?<br>\u21d2 Sai v\u1ec1 ngh\u0129a. C\u00e2u g\u1ed1c \u0111\u1ec1 c\u1eadp t\u1edbi vi\u1ec7c tham kh\u1ea3o \u00fd ki\u1ebfn c\u1ee7a ng\u01b0\u1eddi kh\u00e1c gi\u1eefa hai l\u1ef1a ch\u1ecdn ch\u1ee9 kh\u00f4ng \u0111\u1ec1 c\u1eadp t\u1edbi vi\u1ec7c \u201ckh\u00f4ng th\u1ec3 ch\u1ecdn m\u1ed9t trong hai\u201d.", "key": "C", "isVideo": true, "score": 0, "order": 45, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 46-52: Read the passage carefully.", "content": "1. Desertification is creating additional challenges to the survival of endangered animal species in India, according to a senior wildlife official who attended the 14th Conference of Parties (COP14) to the United Nations Convention to Combat Desertification (UNCCD) in New Delhi. <br>2. A few days earlier, at COP14 in New Delhi, Dr. Chandra had said that the statistics on species extinction have been derived from a database of more than 5.6 million specimens, <b>which </b>have lived across India and the neighbouring countries since before independence. The deteriorating pattern in the species\u2019 distribution in geo-special platforms over the past 100 years clearly highlights the concerning impact of deforestation and desertification. <br>3. Land <b>degradation </b>threatens species like the Great Indian Bustard, which is classified as \u201ccritically endangered\u201d by the International Union for Conservation of Nature (IUCN). The Weather Channel India got in touch with Dr Chandra, who said that less than 150 Great Indian Bustards are alive today. \u201cDesertification and land degradation are among the 20-30 risk factors to the survival of Great Indian Bustards,\u201d Dr Chandra told Weather.com. <br>4. In simple terms, desertification is a process wherein fertile land becomes unusable, typically as a result of a long drought, deforestation, salinisation, intensive agricultural practices, and the excessive usage of insecticides, pesticides and chemicals leads to hazardous effects on not just animals, but also on the food chain and the overall biodiversity\u2014right from microscopic organisms to human beings. Deforestation has affected over 30% of the land in India due to over-cultivation, soil erosion and depletion of wetlands. Along with India, the planet as a whole currently stares at the fast-growing threat of land degradation.<br><div style=\"text-align: right;\"><i>(Source: https://weather.com/)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 10469855, "lessonId": 0, "a": "Effects of deforestation on desertification in India.", "b": "Threats from desertification, land degradation to endangered species.", "c": "Alarming statistics about species extinction.", "d": "The fast-growing threat of land degradation.", "bookId": 290147, "comments": 0, "bookmarks": 4, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What is the reading passage mainly about?", "answer": "<b>C\u00e2u h\u1ecfi: \u0110o\u1ea1n v\u0103n ch\u1ee7 y\u1ebfu n\u00f3i v\u1ec1 \u0111i\u1ec1u g\u00ec? <br></b>A. \u1ea2nh h\u01b0\u1edfng c\u1ee7a n\u1ea1n ph\u00e1 r\u1eebng \u0111\u1ebfn sa m\u1ea1c h\u00f3a \u1edf \u1ea4n \u0110\u1ed9.<br>B. C\u00e1c m\u1ed1i \u0111e d\u1ecda t\u1eeb sa m\u1ea1c h\u00f3a, suy tho\u00e1i \u0111\u1ea5t \u0111\u1ed1i v\u1edbi c\u00e1c lo\u00e0i c\u00f3 nguy c\u01a1 tuy\u1ec7t ch\u1ee7ng.<br>C. S\u1ed1 li\u1ec7u th\u1ed1ng k\u00ea \u0111\u00e1ng b\u00e1o \u0111\u1ed9ng v\u1ec1 s\u1ef1 tuy\u1ec7t ch\u1ee7ng c\u1ee7a lo\u00e0i.<br>D. Nguy c\u01a1 suy tho\u00e1i \u0111\u1ea5t ng\u00e0y c\u00e0ng t\u0103ng nhanh.<br><b>C\u0103n c\u1ee9 v\u00e0o nh\u1eefng th\u00f4ng tin sau:<br></b>- Th\u00f4ng tin \u0111o\u1ea1n 1: Desertification is creating additional challenges to the survival of endangered animal species in India, according to a senior wildlife official who attended the 14th Conference of Parties (COP14) to the United Nations Convention to Combat Desertification (UNCCD) in New Delhi. <br>(<i>Theo m\u1ed9t quan ch\u1ee9c c\u1ea5p cao v\u1ec1 \u0111\u1ed9ng v\u1eadt hoang d\u00e3 tham d\u1ef1 H\u1ed9i ngh\u1ecb c\u00e1c b\u00ean l\u1ea7n th\u1ee9 14 (COP14) c\u1ee7a C\u00f4ng \u01b0\u1edbc Li\u00ean h\u1ee3p qu\u1ed1c v\u1ec1 ch\u1ed1ng sa m\u1ea1c h\u00f3a (UNCCD) \u1edf New Delhi, sa m\u1ea1c h\u00f3a \u0111ang t\u1ea1o ra nh\u1eefng th\u00e1ch th\u1ee9c b\u1ed5 sung \u0111\u1ed1i v\u1edbi s\u1ef1 s\u1ed1ng c\u00f2n c\u1ee7a c\u00e1c lo\u00e0i \u0111\u1ed9ng v\u1eadt c\u00f3 nguy c\u01a1 tuy\u1ec7t ch\u1ee7ng \u1edf \u1ea4n \u0110\u1ed9</i>.)<br>- Th\u00f4ng tin \u0111o\u1ea1n 3: Land degradation threatens species like the Great Indian Bustard, which is classified as \u201ccritically endangered\u201d by the International Union for Conservation of Nature (IUCN). <br>(<i>Suy tho\u00e1i \u0111\u1ea5t \u0111e d\u1ecda c\u00e1c lo\u00e0i nh\u01b0 \u00d4 t\u00e1c \u1ea4n \u0110\u1ed9 v\u0129 \u0111\u1ea1i, \u0111\u01b0\u1ee3c Li\u00ean minh B\u1ea3o t\u1ed3n Thi\u00ean nhi\u00ean Qu\u1ed1c t\u1ebf (IUCN) x\u1ebfp v\u00e0o lo\u1ea1i \u201cc\u1ef1c k\u1ef3 nguy c\u1ea5p\u201d</i>.)", "key": "B", "isVideo": true, "score": 0, "order": 46, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577855, "lessonId": 0, "a": "the statistics on species extinction", "b": "a database", "c": "the neighbouring countries", "d": "more than 5.6 million specimens", "bookId": 1086036, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The word <b>which </b>in paragraph 2 refers to _______.", "answer": "<b>T\u1eeb \"which\" trong \u0111o\u1ea1n 2 \u00e1m ch\u1ec9 __________.\n</b><br><b>A.</b> c\u00e1c s\u1ed1 li\u1ec7u v\u1ec1 s\u1ef1 tuy\u1ec7t ch\u1ee7ng c\u1ee7a c\u00e1c lo\u00e0i\n<br><b>B.</b> m\u1ed9t c\u01a1 s\u1edf d\u1eef li\u1ec7u.\n<br><b>C.</b> c\u00e1c qu\u1ed1c gia l\u00e1ng gi\u1ec1ng.\n<br><b>D.</b> h\u01a1n 5,6 tri\u1ec7u m\u1eabu v\u1eadt.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o ng\u1eef c\u1ea3nh c\u00e2u:\n</b><br>The statistics on species extinction have been derived from a database of more than 5.6 million specimens, which have lived across India and the neighbouring countries since before independence.\n<br><i>(S\u1ed1 li\u1ec7u v\u1ec1 s\u1ef1 tuy\u1ec7t ch\u1ee7ng c\u1ee7a c\u00e1c lo\u00e0i \u0111\u00e3 \u0111\u01b0\u1ee3c thu th\u1eadp t\u1eeb c\u01a1 s\u1edf d\u1eef li\u1ec7u h\u01a1n 5,6 tri\u1ec7u m\u1eabu v\u1eadt, v\u1ed1n \u0111\u00e3 s\u1ed1ng tr\u00ean kh\u1eafp \u1ea4n \u0110\u1ed9 v\u00e0 c\u00e1c qu\u1ed1c gia l\u00e1ng gi\u1ec1ng t\u1eeb tr\u01b0\u1edbc khi \u0111\u1ea5t n\u01b0\u1edbc gi\u00e0nh \u0111\u01b0\u1ee3c \u0111\u1ed9c l\u1eadp.)\n</i><br><br>=&gt; <b>which</b> \u1edf \u0111\u00e2y \u00e1m ch\u1ec9 <b>h\u01a1n 5,6 tri\u1ec7u m\u1eabu v\u1eadt \u0111\u00e3 t\u1eebng s\u1ed1ng kh\u1eafp \u1ea4n \u0110\u1ed9</b>.\n\n", "key": "D", "isVideo": false, "score": 0, "order": 47, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577858, "lessonId": 0, "a": "The expansion of wildlife reserves", "b": "The effects of urbanization", "c": "The effects of deforestation and desertification", "d": "The rise in species migration", "bookId": 1086037, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What does the deteriorating trend in species\u2019 distribution obviously emphasize, according to paragraph 2?", "answer": "<b>Xu h\u01b0\u1edbng suy gi\u1ea3m trong ph\u00e2n b\u1ed1 c\u00e1c lo\u00e0i r\u00f5 r\u00e0ng nh\u1ea5n m\u1ea1nh \u0111i\u1ec1u g\u00ec, theo \u0111o\u1ea1n 2?\n</b><br><b>A.</b> S\u1ef1 m\u1edf r\u1ed9ng c\u00e1c khu b\u1ea3o t\u1ed3n \u0111\u1ed9ng v\u1eadt hoang d\u00e3.\n<br><b>B.</b> T\u00e1c \u0111\u1ed9ng c\u1ee7a s\u1ef1 \u0111\u00f4 th\u1ecb h\u00f3a.\n<br><b>C.</b> T\u00e1c \u0111\u1ed9ng c\u1ee7a n\u1ea1n ph\u00e1 r\u1eebng v\u00e0 sa m\u1ea1c h\u00f3a.\n<br><b>D.</b> S\u1ef1 gia t\u0103ng di c\u01b0 c\u1ee7a c\u00e1c lo\u00e0i.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin:\n</b><br>The deteriorating pattern in the species\u2019 distribution... highlights the concerning impact of deforestation and desertification.\n<br><i>(M\u00f4 h\u00ecnh suy gi\u1ea3m trong ph\u00e2n b\u1ed1 c\u00e1c lo\u00e0i...cho th\u1ea5y t\u00e1c \u0111\u1ed9ng \u0111\u00e1ng lo ng\u1ea1i c\u1ee7a n\u1ea1n ph\u00e1 r\u1eebng v\u00e0 sa m\u1ea1c h\u00f3a.)\n</i><br><br><b>=&gt; Nh\u1ea5n m\u1ea1nh t\u00e1c \u0111\u1ed9ng c\u1ee7a n\u1ea1n ph\u00e1 r\u1eebng v\u00e0 sa m\u1ea1c h\u00f3a \u0111\u1ed1i v\u1edbi s\u1ef1 ph\u00e2n b\u1ed1 c\u1ee7a c\u00e1c lo\u00e0i \u0111\u1ed9ng v\u1eadt.\n</b>", "key": "C", "isVideo": false, "score": 0, "order": 48, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577861, "lessonId": 0, "a": "being rich and fertile", "b": "being eroded", "c": "getting muddy", "d": "being damaged or made worse", "bookId": 1086038, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The word <b>degradation </b>in paragraph 3 is closest in meaning to _______.", "answer": "<b>T\u1eeb \u201cdegradation\u201d trong \u0111o\u1ea1n 3 c\u00f3 ngh\u0129a g\u1ea7n nh\u1ea5t l\u00e0 _________.\n</b><br><b>A.</b> s\u1ef1 m\u00e0u m\u1ee1 v\u00e0 ph\u00ec nhi\u00eau.\n<br><b>B.</b> b\u1ecb x\u00f3i m\u00f2n.\n<br><b>C.</b> b\u1ecb \u0111\u1ee5c ng\u1ea7u.\n<br><b>D.</b> b\u1ecb h\u01b0 h\u1ea1i ho\u1eb7c l\u00e0m t\u1ed3i t\u1ec7 h\u01a1n.\n<br><br><b>D\u1ef1a v\u00e0o ng\u1eef c\u1ea3nh c\u1ee7a c\u00e2u:\n</b><br>Land degradation threatens species like the Great Indian Bustard.\n<br><i>(S\u1ef1 suy tho\u00e1i \u0111\u1ea5t \u0111ai \u0111e d\u1ecda c\u00e1c lo\u00e0i nh\u01b0 \u00d4 t\u00e1c \u0110\u1ea1i \u1ea4n.)\n</i><br><br>=&gt; Degradation (n) c\u00f3 ngh\u0129a l\u00e0 l\u00e0m suy tho\u00e1i ho\u1eb7c l\u00e0m x\u1ea5u \u0111i.\n", "key": "D", "isVideo": false, "score": 0, "order": 49, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577863, "lessonId": 0, "a": "The total number of survivors recorded today is less than 150.", "b": "There are more than 150 individuals found scattered in a few places.", "c": "The statistics on the largest pack of the Great Indian Bustard stands at 150.", "d": "The harsh desert is not suitable for this species.", "bookId": 1086039, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 3, why is the Great Indian Bustard classified as \u201c<i>critically endangered</i>\u201d?", "answer": "<b>Theo \u0111o\u1ea1n 3, t\u1ea1i sao lo\u00e0i \u00d4 t\u00e1c \u0110\u1ea1i \u1ea4n \u0111\u01b0\u1ee3c ph\u00e2n lo\u1ea1i l\u00e0 \u201cc\u1ef1c k\u1ef3 nguy c\u1ea5p\u201d?\n</b><br><b>A.</b> T\u1ed5ng s\u1ed1 c\u00e1 th\u1ec3 c\u00f2n s\u1ed1ng hi\u1ec7n nay \u00edt h\u01a1n 150.\n<br><b>B.</b> C\u00f3 h\u01a1n 150 c\u00e1 th\u1ec3 \u0111\u01b0\u1ee3c t\u00ecm th\u1ea5y r\u1ea3i r\u00e1c \u1edf m\u1ed9t s\u1ed1 n\u01a1i.\n<br><b>C.</b> C\u00e1c s\u1ed1 li\u1ec7u v\u1ec1 \u0111\u00e0n l\u1edbn nh\u1ea5t c\u1ee7a \u0110\u1ea1i nh\u1ea1c l\u1ee5c \u1ea4n \u0110\u1ed9 l\u00e0 150\n<br><b>D.</b> Sa m\u1ea1c kh\u1eafc nghi\u1ec7t kh\u00f4ng ph\u00f9 h\u1ee3p v\u1edbi lo\u00e0i n\u00e0y.\n<br><br><b>D\u1ef1a v\u00e0o th\u00f4ng tin \u0111o\u1ea1n:\n</b><br>Less than 150 Great Indian Bustards are alive today.<br><i>(Hi\u1ec7n nay ch\u1ec9 c\u00f2n \u00edt h\u01a1n 150 con \u00d4 t\u00e1c \u0110\u1ea1i \u1ea4n c\u00f2n s\u1ed1ng.)\n</i>", "key": "A", "isVideo": false, "score": 0, "order": 50, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577864, "lessonId": 0, "a": "lack of rain for a long time", "b": "the overuse of pesticides", "c": "unsustainable agricultural techniques", "d": "high surface temperature due to vegetation cover loss", "bookId": 1086040, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 4, the following are the causes of desertification mentioned, except ______.", "answer": "<b>Theo \u0111o\u1ea1n 4, c\u00e1c nguy\u00ean nh\u00e2n c\u1ee7a sa m\u1ea1c h\u00f3a \u0111\u01b0\u1ee3c nh\u1eafc \u0111\u1ebfn, NGO\u1ea0I TR\u1eea __________.</b><br><b>A.</b> Thi\u1ebfu m\u01b0a trong th\u1eddi gian d\u00e0i. <br><b>B.</b> S\u1eed d\u1ee5ng qu\u00e1 m\u1ee9c thu\u1ed1c tr\u1eeb s\u00e2u.<br><b>C.</b> C\u00e1c k\u1ef9 thu\u1eadt canh t\u00e1c n\u00f4ng nghi\u1ec7p kh\u00f4ng b\u1ec1n v\u1eefng.<br><b>D.</b> Nhi\u1ec7t \u0111\u1ed9 b\u1ec1 m\u1eb7t cao do m\u1ea5t l\u1edbp ph\u1ee7 th\u1ef1c v\u1eadt.<br><br><b>C\u0103n c\u1ee9 v\u00e0o c\u00e1c th\u00f4ng tin:</b><br>- Desertification typically as a result of a long drought <br><i>(Sa m\u1ea1c h\u00f3a th\u01b0\u1eddng l\u00e0 do h\u1ea1n h\u00e1n k\u00e9o d\u00e0i)</i><br><br>- The excessive usage of insecticides, pesticides and chemicals <br><i>(Vi\u1ec7c s\u1eed d\u1ee5ng qu\u00e1 m\u1ee9c thu\u1ed1c tr\u1eeb s\u00e2u, thu\u1ed1c di\u1ec7t c\u00f4n tr\u00f9ng v\u00e0 h\u00f3a ch\u1ea5t.)</i><br><br>- Intensive agricultural practices... <br><i>(C\u00e1c ph\u01b0\u01a1ng ph\u00e1p canh t\u00e1c n\u00f4ng nghi\u1ec7p c\u01b0\u1eddng \u0111\u1ed9 cao)</i><br><br><b>=&gt; \u0110\u00e1p \u00e1n A, B, C \u0111\u1ec1u \u0111\u01b0\u1ee3c nh\u1eafc \u0111\u1ebfn.</b>", "key": "D", "isVideo": false, "score": 0, "order": 51, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577866, "lessonId": 0, "a": "The effects are limited to animals at the top of the food chain.", "b": "Biodiversity is threatened at all levels, from microorganisms to humans.", "c": "Humans are not affected by the excessive use of chemicals.", "d": "Chemical usage primarily affects agricultural crops.", "bookId": 1086041, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 4, what can be inferred about the impact of chemical usage on biodiversity?", "answer": "<b>Theo \u0111o\u1ea1n 4, \u0111i\u1ec1u g\u00ec c\u00f3 th\u1ec3 suy lu\u1eadn v\u1ec1 t\u00e1c \u0111\u1ed9ng c\u1ee7a vi\u1ec7c s\u1eed d\u1ee5ng h\u00f3a ch\u1ea5t \u0111\u1ed1i v\u1edbi s\u1ef1 \u0111a d\u1ea1ng sinh h\u1ecdc?</b><br><b>A.</b> T\u00e1c \u0111\u1ed9ng ch\u1ec9 gi\u1edbi h\u1ea1n \u1edf nh\u1eefng \u0111\u1ed9ng v\u1eadt \u0111\u1ee9ng \u0111\u1ea7u chu\u1ed7i th\u1ee9c \u0103n<br><b>B.</b> S\u1ef1 \u0111a d\u1ea1ng sinh h\u1ecdc b\u1ecb \u0111e d\u1ecda \u1edf t\u1ea5t c\u1ea3 c\u00e1c c\u1ea5p, t\u1eeb vi sinh v\u1eadt \u0111\u1ebfn con ng\u01b0\u1eddi.<br><b>C.</b> Con ng\u01b0\u1eddi kh\u00f4ng b\u1ecb \u1ea3nh h\u01b0\u1edfng b\u1edfi vi\u1ec7c s\u1eed d\u1ee5ng h\u00f3a ch\u1ea5t qu\u00e1 m\u1ee9c.<br><b>D.</b> Vi\u1ec7c s\u1eed d\u1ee5ng h\u00f3a ch\u1ea5t ch\u1ee7 y\u1ebfu \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn c\u00e2y tr\u1ed3ng n\u00f4ng nghi\u1ec7p.<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin:</b><br>The excessive usage of insecticides, pesticides and chemicals leads to hazardous effects on not just animals, but also on the food chain and the overall biodiversity - right from microscopic organisms to human beings.<br><i>(Thu\u1ed1c di\u1ec7t c\u00f4n tr\u00f9ng v\u00e0 h\u00f3a ch\u1ea5t g\u00e2y ra nh\u1eefng t\u00e1c \u0111\u1ed9ng nguy hi\u1ec3m kh\u00f4ng ch\u1ec9 \u0111\u1ed1i v\u1edbi \u0111\u1ed9ng v\u1eadt, m\u00e0 c\u00f2n \u0111\u1ed1i v\u1edbi chu\u1ed7i th\u1ef1c ph\u1ea9m v\u00e0 s\u1ef1 \u0111a d\u1ea1ng sinh h\u1ecdc t\u1ed5ng th\u1ec3 \u2013 t\u1eeb c\u00e1c sinh v\u1eadt si\u00eau nh\u1ecf cho \u0111\u1ebfn con ng\u01b0\u1eddi.)</i><br><br><b>=&gt; Vi\u1ec7c s\u1eed d\u1ee5ng h\u00f3a ch\u1ea5t \u0111e d\u1ecda s\u1ef1 \u0111a d\u1ea1ng sinh h\u1ecdc \u1edf t\u1ea5t c\u1ea3 c\u00e1c c\u1ea5p, t\u1eeb vi sinh v\u1eadt \u0111\u1ebfn con ng\u01b0\u1eddi.</b>", "key": "B", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully.", "content": "<b>1.</b> Air pollution is increasingly becoming the focus of government and citizen concern around the globe. From Mexico City and New York, to Singapore and Tokyo, new solutions to this old problem are being proposed, Mailed and implemented with ever increasing speed. It is feared that unless pollution reduction measures are able to keep pace with the continued pressures of urban growth, air quality in many of the world\u2019s major cities will <b>deteriorate</b> beyond reason.\n<br><br><b>2.</b> Action is being taken along several fronts: through new legislation, improved enforcement and innovative technology. In Los Angeles, state regulations are forcing manufacturers to try to sell ever cleaner cars: their first of the cleanest, titled \u201cZero Emission Vehicles\u2019, have to be available soon, since they are intended to make up 2 percent of sales in 1997. Local authorities in London are campaigning to be allowed to enforce anti-pollution laws themselves; at present only the police have this power. In Singapore, renting out toad space to users is the way of the future.\n<br><br><b>3.</b> When Britain\u2019s Royal Automobile Club monitored the exhausts of 60,000 vehicles, it found that 12 percent of them produced more than half the total pollution. Older cars were the worst offenders; though a sizable number of new cars were also identified as gross polluters, they were simply badly tuned. California has developed a scheme to get these gross polluters off the streets: they offer a flat <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/3f48037a-9185-4ca2-81e8-dde3b6171a35.png\"/>", "listQuestion": [{"questionId": 21580876, "lessonId": 0, "a": "Innovative solutions to global air pollution", "b": "Efforts to improve air quality in major cities", "c": "Challenges of urban growth and environmental concerns", "d": "The rise of electric cars in urban areas", "bookId": 1086042, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title of the passage can be _____.", "answer": "<b>Ti\u00eau \u0111\u1ec1 t\u1ed1t nh\u1ea5t c\u1ee7a \u0111o\u1ea1n v\u0103n c\u00f3 th\u1ec3 l\u00e0 __________.\n</b><br><b>A.</b> C\u00e1c gi\u1ea3i ph\u00e1p s\u00e1ng t\u1ea1o cho \u00f4 nhi\u1ec5m kh\u00f4ng kh\u00ed to\u00e0n c\u1ea7u <br><b>=&gt; Sai</b>. M\u1eb7c d\u00f9 \u0111o\u1ea1n v\u0103n c\u00f3 \u0111\u1ec1 c\u1eadp \u0111\u1ebfn c\u00e1c gi\u1ea3i ph\u00e1p s\u00e1ng t\u1ea1o, nh\u01b0ng kh\u00f4ng ph\u1ea3i t\u1ea5t c\u1ea3 gi\u1ea3i ph\u00e1p \u0111\u1ec1u l\u00e0 s\u00e1ng t\u1ea1o v\u00e0 b\u00e0i vi\u1ebft kh\u00f4ng ch\u1ec9 n\u00f3i v\u1ec1 to\u00e0n c\u1ea7u m\u00e0 ch\u1ee7 y\u1ebfu t\u1eadp trung v\u00e0o c\u00e1c th\u00e0nh ph\u1ed1 l\u1edbn\n\n<br><b rers to try to sell ever cleaner cars. <br><i>(\u1ede Los Angeles, c\u00e1c quy \u0111\u1ecbnh c\u1ee7a bang y\u00eau c\u1ea7u c\u00e1c nh\u00e0 s\u1ea3n xu\u1ea5t \u00f4 t\u00f4 ph\u1ea3i b\u00e1n nh\u1eefng chi\u1ebfc xe s\u1ea1ch h\u01a1n.)\n</i><br>- Local authorities in London are campaigning to be allowed to enforce anti-pollution laws themselves. <br><i>(Ch\u00ednh quy\u1ec1n \u0111\u1ecba ph\u01b0\u01a1ng \u1edf London \u0111ang v\u1eadn \u0111\u1ed9ng \u0111\u1ec3 \u0111\u01b0\u1ee3c ph\u00e9p t\u1ef1 th\u1ef1c thi c\u00e1c lu\u1eadt ch\u1ed1ng \u00f4 nhi\u1ec5m.)\n</i><br>- their first of the cleanest, titled \u201cZero Emission Vehicles\u2019, have to be available soon. <br><i>(chi\u1ebfc xe kh\u00f4ng ph\u00e1t th\u1ea3i \u0111\u1ea7u ti\u00ean, c\u00f3 t\u00ean l\u00e0 \u201cXe kh\u00f4ng ph\u00e1t th\u1ea3i,\u201d ph\u1ea3i c\u00f3 m\u1eb7t s\u1edbm.)\n</i><br><br><b>=&gt; \u00dd A, B, C \u0111\u1ec1u \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp.</b>", "key": "D", "isVideo": false, "score": 0, "order": 55, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21580890, "lessonId": 0, "a": "Older cars were believed to produce less pollution than newer cars.", "b": "Over 50% of the total pollution was caused by just 12% of the vehicles.", "c": "Badly tuned new cars were not considered as polluters.", "d": "California offers a $700 reward for every new car driven into the state.", "bookId": 1086045, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 3, which of the following is true?", "answer": "<b>Trong \u0111o\u1ea1n 3, \u0111i\u1ec1u n\u00e0o sau \u0111\u00e2y l\u00e0 \u0110\u00daNG?\n</b><br><b>A.</b> Nh\u1eefng chi\u1ebfc xe c\u0169 \u0111\u01b0\u1ee3c cho l\u00e0 g\u00e2y \u00edt \u00f4 nhi\u1ec5m h\u01a1n xe m\u1edbi.\n<br><b>B.</b> H\u01a1n 50% t\u1ed5ng l\u01b0\u1ee3ng \u00f4 n                              boxesHtml += `<button onclick="checkFillAnswer('${qKey}')" class="ml-2 px-3 py-2 bg-blue-100 text-blue-700 font-bold rounded-lg text-sm hover:bg-blue-200 transition-colors">Kiểm tra</button>`;
                             // Nút xem lời giải cho practice
                             boxesHtml += `<button onclick="toggleSolution('${qKey}')" class="ml-2 px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button>`;
                        }
                        boxesHtml += '</div>';

                        let feedbackHtml = "";
                        if(isSubmitted) {
                             const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                             if(isCorrect) {
                                feedbackHtml = `<div class="mt-2 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                             } else {
                                feedbackHtml = `<div class="mt-2 text-red-600 text-sm">✗ Sai. Đáp án: <span class="font-bold">${correctVal}</span></div>`;
                             }
                        } else if (examMode === 'practice') {
                             feedbackHtml = `<div id="feedback-${qKey}" class="mt-2 text-sm font-bold hidden"></div>`;
                        }

                        html += `
                        <div class="flex flex-col relative">
                            ${boxesHtml}
                            ${feedbackHtml}
                        </div>`;
                    }

                    // TYPE 2: TRUE/FALSE
                    else if(qType === '2') {
                         html += `<div class="overflow-hidden border rounded-lg">
                            <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                                <tr>
                                    <th scope="col" class="px-3 py-3 w-10 text-center">Ý</th>
                                    <th scope="col" class="px-3 py-3">Nội dung</th>
                                    <th scope="col" class="px-3 py-3 w-32 text-center">Chọn Đ/S</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; 
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; 
                                const userChoice = userObj[pIdx]; 
                                
                                let trClass = "bg-white hover:bg-gray-50";
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) trClass = "bg-green-50";
                                    else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
