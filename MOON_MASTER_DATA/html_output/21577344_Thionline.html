nId": 0, "a": "Susan might have broken the window because she wasn\u2019t here.", "b": "Susan mustn\u2019t have broken the window because she wasn\u2019t here.", "c": "Susan can\u2019t have broken the window because she wasn\u2019t here.", "d": "Susan shouldn\u2019t have broken the window because she wasn\u2019t here.", "bookId": 1085989, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<b>I\u2019m sure that Susan didn\u2019t break the window because she wasn\u2019t even here.</b>", "answer": "<b>T\u1ea1m d\u1ecbch:</b> T\u00f4i ch\u1eafc ch\u1eafn r\u1eb1ng Susan \u0111\u00e3 kh\u00f4ng l\u00e0m v\u1ee1 c\u1eeda s\u1ed5 v\u00ec c\u00f4 \u1ea5y th\u1eadm ch\u00ed c\u00f2n kh\u00f4ng c\u00f3 \u1edf \u0111\u00e2y.\n\n<br><br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:\n</b><br><b>A.</b> Susan might have broken the window because she wasn\u2019t here.\n<br><i>(Susan c\u00f3 th\u1ec3 \u0111\u00e3 l\u00e0m v\u1ee1 c\u1eeda s\u1ed5 v\u00ec c\u00f4 \u1ea5y kh\u00f4ng c\u00f3 \u1edf \u0111\u00e2y.)\n</i><br><b>=&gt; Sai.</b> \u201cmight have\u201d di\u1ec5n t\u1ea3 kh\u1ea3 n\u0103ng, tr\u00e1i ng\u01b0\u1ee3c v\u1edbi s\u1ef1 ch\u1eafc ch\u1eafn c\u1ee7a c\u00e2u g\u1ed1c. Ngo\u00e0i ra, c\u00e2u g\u1ed1c kh\u1eb3ng \u0111\u1ecbnh Susan kh\u00f4ng ph\u1ea3i l\u00e0 ng\u01b0\u1eddi l\u00e0m v\u1ee1 c\u1eeda s\u1ed5, c\u00f2n \u0111\u00e1p \u00e1n n\u00e0y l\u1ea1i n\u00f3i kh\u1ea3 n\u0103ng l\u00e0 c\u00f4 \u1ea5y l\u00e0m.\n\n<br><br><b>B.</b> Susan mustn\u2019t have broken the window because she wasn\u2019t here.\n<br><i>(Susan ch\u1eafc ch\u1eafn kh\u00f4ng l\u00e0m v\u1ee1 c\u1eeda s\u1ed5 v\u00ec c\u00f4 \u1ea5y kh\u00f4ng c\u00f3 \u1edf \u0111\u00e2y.)\n</i><br><b>=&gt; Sai.</b> \u201cmustn\u2019t have\u201d \u00edt d\u00f9ng, kh\u00f4ng \u0111\u01b0\u1ee3c c\u00f4ng nh\u1eadn r\u1ed9ng r\u00e3i. C\u1ea5u tr\u00fac ph\u1ed5 bi\u1ebfn l\u00e0 \u201ccan\u2019t have\u201d / \u201ccouldn\u2019t have\u201d.\n\n<br><br><b>C.</b> Susan can\u2019t have broken the window because she wasn\u2019t here.\n<br><i>(Susan ch\u1eafc ch\u1eafn kh\u00f4ng th\u1ec3 l\u00e0m v\u1ee1 c\u1eeda s\u1ed5 v\u00ec c\u00f4 \u1ea5y kh\u00f4ng c\u00f3 \u1edf \u0111\u00e2y.)\n</i><br><b>=&gt; \u0110\u00fang.</b> \u201ccan\u2019t have\u201d + V3 d\u00f9ng \u0111\u1ec3 di\u1ec5n t\u1ea3 s\u1ef1 vi\u1ec7c ch\u1eafc ch\u1eafn \u0111\u00e3 kh\u00f4ng x\u1ea3y ra trong qu\u00e1 kh\u1ee9.\n\n<br><br><b>D.</b> Susan shouldn\u2019t have broken the window because she wasn\u2019t here.\n<br><i>(Susan kh\u00f4ng n\u00ean l\u00e0m v\u1ee1 c\u1eeda s\u1ed5 v\u00ec c\u00f4 \u1ea5y kh\u00f4ng c\u00f3 \u1edf \u0111\u00e2y.)\n</i><br><b>=&gt; Sai</b>. \u201cshouldn\u2019t have\u201d di\u1ec5n t\u1ea3 h\u00e0nh \u0111\u1ed9ng kh\u00f4ng n\u00ean l\u00e0m, kh\u00f4ng di\u1ec5n t\u1ea3 ch\u1eafc ch\u1eafn vi\u1ec7c \u0111\u00e3 kh\u00f4ng x\u1ea3y ra. \u201chere\u201d kh\u00f4ng \u0111\u00fang, v\u00ec c\u00e2u n\u00f3i v\u1ec1 qu\u00e1 kh\u1ee9, ph\u1ea3i d\u00f9ng \u201cthere\u201d.\n", "key": "C", "isVideo": false, "score": 0, "order": 43, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577360, "lessonId": 0, "a": "He isn\u2019t old enough to understand what is happening.", "b": "He isn\u2019t too old to understand what is happening.", "c": "He is not so young that he understands what is happening.", "d": "He is enough old to understand what is happening.", "bookId": 1085990, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<b>He\u2019s too young to understand what is happening.</b>", "answer": "<b>T\u1ea1m d\u1ecbch:</b> Anh \u1ea5y qu\u00e1 tr\u1ebb \u0111\u1ec3 hi\u1ec3u nh\u1eefng g\u00ec \u0111ang x\u1ea3y ra.\n\n<br><br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:\n</b><br><b>A.</b> He isn\u2019t old enough to understand what is happening.\n<br><i>(Anh \u1ea5y kh\u00f4ng \u0111\u1ee7 l\u1edbn \u0111\u1ec3 hi\u1ec3u nh\u1eefng g\u00ec \u0111ang x\u1ea3y ra.)\n</i><br><b>=&gt; \u0110\u00fang.\n\n</b><br><br><b>B.</b> He isn\u2019t too old to understand what is happening.\n<br><i>(Anh \u1ea5y kh\u00f4ng qu\u00e1 gi\u00e0 \u0111\u1ec3 hi\u1ec3u nh\u1eefng g\u00ec \u0111ang x\u1ea3y ra.)\n</i><br><b>=&gt; Sai.</b> C\u00e2u g\u1ed1c n\u00f3i qu\u00e1 tr\u1ebb, c\u00f2n c\u00e2u n\u00e0y n\u00f3i kh\u00f4ng qu\u00e1 gi\u00e0, l\u00e0m m\u1ea5t \u0111i s\u1eafc th\u00e1i ti\u00eau c\u1ef1c \u1edf c\u00e2u g\u1ed1c.\n\n<br><br><b>C.</b> He is not so young that he understands what is happening.\n<br><i>(Anh \u1ea5y kh\u00f4ng qu\u00e1 tr\u1ebb \u0111\u1ebfn m\u1ee9c hi\u1ec3u nh\u1eefng g\u00ec \u0111ang x\u1ea3y ra.)\n</i><br><b>=&gt; Sai.</b> C\u00e2u n\u00e0y n\u00f3i kh\u00f4ng qu\u00e1 tr\u1ebb n\u00ean hi\u1ec3u \u0111\u01b0\u1ee3c, tr\u00e1i ngh\u0129a v\u1edbi c\u00e2u g\u1ed1c.\n\n<br><br><b>D.</b> He is enough old to understand what is happening.\n<br><i>(Anh \u1ea5y \u0111\u1ee7 l\u1edbn \u0111\u1ec3 hi\u1ec3u nh\u1eefng g\u00ec \u0111ang x\u1ea3y ra.)\n</i><br><b>=&gt; Sai.</b> \u201cenough\u201d ph\u1ea3i \u0111\u1ee9ng sau t\u00ednh t\u1eeb, ph\u1ea3i l\u00e0 \u201cold enough\u201d.\n", "key": "A", "isVideo": false, "score": 0, "order": 44, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577364, "lessonId": 0, "a": "The new employee was promoted to manager last month.", "b": "A better position was offered to the new employee by the manager last month.", "c": "The new employee was offered a better position as the manager last month.", "d": "Last month, the new employee got a job offer from another company.", "bookId": 1085991, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<b>The manager offered the new employee a better position last month.</b>", "answer": "<b>T\u1ea1m d\u1ecbch:</b> Qu\u1ea3n l\u00fd \u0111\u00e3 \u0111\u1ec1 ngh\u1ecb nh\u00e2n vi\u00ean m\u1edbi m\u1ed9t v\u1ecb tr\u00ed t\u1ed1t h\u01a1n v\u00e0o th\u00e1ng tr\u01b0\u1edbc.<br><br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:</b><br><b>A. </b>The new employee was promoted to manager last month.<br><i>(Nh\u00e2n vi\u00ean m\u1edbi \u0111\u01b0\u1ee3c th\u0103ng ch\u1ee9c l\u00e0m qu\u1ea3n l\u00fd v\u00e0o th\u00e1ng tr\u01b0\u1edbc.)</i><br><b>=&gt; Sai.</b> C\u00e2u g\u1ed1c ch\u1ec9 n\u00f3i qu\u1ea3n l\u00fd \u0111\u1ec1 ngh\u1ecb m\u1ed9t v\u1ecb tr\u00ed t\u1ed1t h\u01a1n, kh\u00f4ng ph\u1ea3i th\u0103ng ch\u1ee9c th\u00e0nh qu\u1ea3n l\u00fd.<br><br><b>B. </b>A better position was offered to the new employee by the manager last month.<br><i>(M\u1ed9t v\u1ecb tr\u00ed t\u1ed1t h\u01a1n \u0111\u00e3 \u0111\u01b0\u1ee3c qu\u1ea3n l\u00fd \u0111\u1ec1 ngh\u1ecb cho nh\u00e2n vi\u00ean m\u1edbi v\u00e0o th\u00e1ng tr\u01b0\u1edbc.)</i><br><b>=&gt; \u0110\u00fang. </b><br><br><b>C.</b> The new employee was offered a better position as the manager last month.<br><i>(Nh\u00e2n vi\u00ean m\u1edbi \u0111\u01b0\u1ee3c \u0111\u1ec1 ngh\u1ecb m\u1ed9t v\u1ecb tr\u00ed t\u1ed1t h\u01a1n v\u1edbi t\u01b0 c\u00e1ch l\u00e0 qu\u1ea3n l\u00fd v\u00e0o th\u00e1ng tr\u01b0\u1edbc.)</i><br><b>=&gt; Sai. </b>C\u00e2u g\u1ed1c kh\u00f4ng n\u00f3i nh\u00e2n vi\u00ean \u0111\u01b0\u1ee3c th\u0103ng ch\u1ee9c tr\u1edf th\u00e0nh qu\u1ea3n l\u00fd.<br><br><b>D. </b>Last month, the new employee got a job offer from another company.<br><i>(Th\u00e1ng tr\u01b0\u1edbc, nh\u00e2n vi\u00ean m\u1edbi nh\u1eadn \u0111\u01b0\u1ee3c l\u1eddi m\u1eddi l\u00e0m vi\u1ec7c t\u1eeb c\u00f4ng ty kh\u00e1c.)</i><br><b>=&gt; Sai.</b> C\u00e2u g\u1ed1c n\u00f3i v\u1ec1 qu\u1ea3n l\u00fd \u0111\u1ec1 ngh\u1ecb m\u1ed9t v\u1ecb tr\u00ed m\u1edbi trong c\u00f9ng c\u00f4ng ty, kh\u00f4ng ph\u1ea3i c\u00f4ng ty kh\u00e1c.", "key": "B", "isVideo": false, "score": 0, "order": 45, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 46-52: Read the passage carefully.", "content": "<b>1.</b> Tropical cyclones are one of the biggest threats to life and property, even in the earliest stages of their development. Their life cycles can run their course in as little as 24 hours, others can last as long as a month. Tropical cyclones can often include multiple hazards, such as extreme winds, heavy rainfall, storm surge and flooding, lightning and tornadoes. When these hazards interact, they can significantly increase the danger and threat that a tropical cyclone can pose.\n\n\n<br><br><b>2.</b> Each year, tropical cyclones cause multiple casualties, deaths, and significant damage to property and infrastructure in the immediate term. Over the past 50 years, 1,945 disasters have been attributed to tropical cyclones, <b>which</b> killed 779,324 people and caused US 78 million in damages daily. Tropical cyclones represented 17% of weather-, climate- and water related disasters and were responsible for one third of both deaths (38%) and economic losses (38%) over the 50-year period. In the longer term, such as with 2005\u2019s Hurricane Katrina, Typhoon Haiyan in 2013, Hurricanes Irma and Maria in 2017, and Tropical Cyclone Harold in 2020, the impact can persist for many years, with communities still trying to recover from the destruction and displacement that occurred.\n\n\n<br><br><b>3.</b> Climate change is linked not only to an increased likelihood of major hurricanes, but also to direct increases in their destructive power. Socioeconomic impacts related to tropical cyclones are increasing worldwide due to a <b>rise</b> in coastal physical infrastructure and people living in coastal regions. The increase in the destructive power of a tropical cyclone emphasises the importance of ensuring all people and property are protected by early warning systems.\n\n\n<br><div style=\"text-align: right;\"><i>(Source: World Meteorological Organization)</i></div>", "listQuestion": [{"questionId": 21577422, "lessonId": 0, "a": "The recovery of communities after tropical cyclones", "b": "The growing dangers and impacts of tropical cyclones", "c": "How to build houses that can resist tropical cyclones", "d": "The scientific causes behind every tropical cyclone", "bookId": 1085992, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What is the passage mainly about?", "answer": "<b>\u0110o\u1ea1n v\u0103n ch\u1ee7 y\u1ebfu n\u00f3i v\u1ec1 \u0111i\u1ec1u g\u00ec?</b><br><br><b>A.</b> S\u1ef1 ph\u1ee5c h\u1ed3i c\u1ee7a c\u00e1c c\u1ed9ng \u0111\u1ed3ng sau nh\u1eefng c\u01a1n b\u00e3o nhi\u1ec7t \u0111\u1edbi<br><b>=&gt; Sai</b> v\u00ec: \u0110o\u1ea1n v\u0103n kh\u00f4ng t\u1eadp trung v\u00e0o qu\u00e1 tr\u00ecnh ph\u1ee5c h\u1ed3i ho\u1eb7c c\u00e1c bi\u1ec7n ph\u00e1p ph\u1ee5c h\u1ed3i sau b\u00e3o.<br><br><b>B.</b> M\u1ed1i nguy hi\u1ec3m v\u00e0 t\u00e1c \u0111\u1ed9ng ng\u00e0y c\u00e0ng gia t\u0103ng c\u1ee7a c\u00e1c c\u01a1n b\u00e3o nhi\u1ec7t \u0111\u1edbi<br><b>=&gt; \u0110\u00fang</b> v\u00ec: To\u00e0n b\u1ed9 \u0111o\u1ea1n v\u0103n nh\u1ea5n m\u1ea1nh m\u1ee9c \u0111\u1ed9 \u0111e d\u1ecda, c\u00e1c lo\u1ea1i nguy hi\u1ec3m k\u00e8m theo, s\u1ed1 li\u1ec7u thi\u1ec7t h\u1ea1i qua 50 n\u0103m v\u00e0 vi\u1ec7c s\u1ee9c t\u00e0n ph\u00e1 t\u0103ng l\u00ean do bi\u1ebfn \u0111\u1ed5i kh\u00ed h\u1eadu \u2192 ch\u1ee7 \u0111\u1ec1 chung l\u00e0 m\u1ed1i nguy v\u00e0 t\u00e1c \u0111\u1ed9ng ng\u00e0y c\u00e0ng l\u1edbn c\u1ee7a b\u00e3o nhi\u1ec7t \u0111\u1edbi.<br><br><b>C.</b> C\u00e1ch x\u00e2y d\u1ef1ng nh\u00e0 c\u1eeda c\u00f3 th\u1ec3 ch\u1ed1ng ch\u1ecbu \u0111\u01b0\u1ee3c b\u00e3o nhi\u1ec7t \u0111\u1edbi<br><b>=&gt; Sai</b> v\u00ec: V\u0103n b\u1ea3n kh\u00f4ng \u0111\u01b0a h\u01b0\u1edbng d\u1eabn hay \u0111\u1ec1 ngh\u1ecb k\u1ef9 thu\u1eadt \u0111\u1  hi\u1ec7n c\u00e1c c\u01a1n b\u00e3o l\u1edbn, m\u00e0 c\u00f2n tr\u1ef1c ti\u1ebfp l\u00e0m t\u0103ng s\u1ee9c t\u00e0n ph\u00e1 c\u1ee7a ch\u00fang.)\n</i><br>\u2192 Ngh\u0129a l\u00e0 bi\u1ebfn \u0111\u1ed5i kh\u00ed h\u1eadu khi\u1ebfn b\u00e3o m\u1ea1nh h\u01a1n v\u00e0 c\u00f3 kh\u1ea3 n\u0103ng xu\u1ea5t hi\u1ec7n th\u01b0\u1eddng xuy\u00ean h\u01a1n.\n\n\n<br><br><b>B.</b> T\u1ea7n su\u1ea5t b\u00e3o nhi\u1ec7t \u0111\u1edbi \u0111ang gi\u1ea3m d\u1ea7n theo th\u1eddi gian nh\u1edd c\u00e1c ch\u00ednh s\u00e1ch m\u00f4i tr\u01b0\u1eddng t\u1ed1t h\u01a1n.\n<br><b>=&gt; Sai</b> v\u00ec: \u0110o\u1ea1n 3 n\u00f3i t\u0103ng kh\u1ea3 n\u0103ng xu\u1ea5t hi\u1ec7n b\u00e3o l\u1edbn, kh\u00f4ng ph\u1ea3i gi\u1ea3m.\n<br><u>C\u0103n c\u1ee9:</u> \u201can increased likelihood of major hurricanes\u201d <br><i>(kh\u1ea3 n\u0103ng gia t\u0103ng xu\u1ea5t hi\u1ec7n c\u00e1c c\u01a1n b\u00e3o l\u1edbn)\n\n\n</i><br><br><b>C.</b> B\u00e3o nhi\u1ec7t \u0111\u1edbi c\u00f3 kh\u1ea3 n\u0103ng g\u00e2y \u00edt v\u1ea5n \u0111\u1ec1 v\u1ec1 kinh t\u1ebf \u2013 x\u00e3 h\u1ed9i h\u01a1n v\u00ec nhi\u1ec1u ng\u01b0\u1eddi r\u1eddi kh\u1ecfi c\u00e1c khu v\u1ef1c ven bi\u1ec3n.\n<br><b>=&gt; Sai</b> v\u00ec: \u0110o\u1ea1n 3 n\u00f3i ng\u01b0\u1ee3c l\u1ea1i - ng\u00e0y c\u00e0ng nhi\u1ec1u ng\u01b0\u1eddi s\u1ed1ng \u1edf v\u00f9ng ven bi\u1ec3n, l\u00e0m t\u0103ng t\u00e1c \u0111\u1ed9ng kinh t\u1ebf - x\u00e3 h\u1ed9i.\n<br><u>C\u0103n c\u1ee9:</u> \u201cSocioeconomic impacts related to tropical cyclones are increasing worldwide due to a rise in coastal physical infrastructure and people living in coastal regions.\u201d <br><i>(T\u00e1c \u0111\u1ed9ng kinh t\u1ebf - x\u00e3 h\u1ed9i li\u00ean quan \u0111\u1ebfn b\u00e3o nhi\u1ec7t \u0111\u1edbi \u0111ang gia t\u0103ng tr\u00ean to\u00e0n th\u1ebf gi\u1edbi do s\u1ef1  t\u0103ng l\u00ean c\u1ee7a c\u01a1 s\u1edf h\u1ea1 t\u1ea7ng ven bi\u1ec3n v\u00e0 d\u00e2n c\u01b0 sinh s\u1ed1ng t\u1ea1i c\u00e1c v\u00f9ng n\u00e0y.)\n\n\n ces. Private schools usually have modern classrooms, science laboratories, sports fields, and arts centres, which create a <b>stimulating </b>learning environment. These facilities give students the opportunity to explore talents and interests beyond academics.<br>5. Private schools also have the freedom to employ highly qualified teachers who are specialists in their fields. This means students are taught by experts who can inspire and guide <b>them </b>to achieve their full potential.  Public schools, on the other hand, employ teachers according to governmental standards, which may not always allow for specialised instruction. In addition, private schools often implement their own discipline policies, providing more flexibility in how they manage student behaviour. Public schools must adhere to government regulations, which can limit the ability to customise disciplinary approaches.<br>6. Finally, private schools often encourage a strong sense of community. Parents, teachers, and students work closely together, which helps to build lasting relationships and networks. This sense of belonging plays an important role in a child\u2019s growth and confidence.<br>7. In conclusion, deciding between private and public schooling depends on various factors, including your child\u2019s needs, your family values, and financial considerations. Ultimately, the choice should align with the best fit for your child\u2019s long-term academic and personal growth<br><div style=\"text-align: right;\"><i>(Source: https://www.crawfordinternational)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21577463, "lessonId": 0, "a": "To explain why public schools are becoming less popular", "b": "To compare the advantages of private and public schooling", "c": "To persuade parents to avoid public schools at all costs", "d": "To describe the financial challenges of both school systems", "bookId": 1085999, "comments": 0, "bookmar                         const userVal = userAnswers[qKey] || '';
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let inputClass = "w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all font-mono";
                        let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
