    <script>
        const EXAM_DATA = [{"title": "", "content": "", "listQuestion": [{"questionId": 21596698, "lessonId": 0, "a": "N\u1eef th\u1ea7n Ca-l\u00edp-x\u00f4 gi\u00fap Uy-l\u00edt-x\u01a1 \u0111\u00f3ng b\u00e8 v\u1ec1 qu\u00ea.", "b": "Uy-l\u00edt-x\u01a1 \u0111\u00f3ng b\u00e8 v\u1ec1 qu\u00ea h\u01b0\u01a1ng.", "c": "Uy-l\u00edt-x\u01a1 \u0111\u01b0a b\u00e8 xu\u1ed1ng m\u1eb7t bi\u1ec3n.", "d": "N\u1eef th\u1ea7n Ca-l\u00edp-x\u00f4 \u0111\u00f3ng b\u00e8 cho Uy-l\u00edt-x\u01a1 v\u1ec1 qu\u00ea.", "bookId": 1088210, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cS\u00e1ng h\u00f4m sau, khi n\u00e0ng R\u1ea1ng \u0111\u00f4ng c\u00f3 nh\u1eefng ng\u00f3n tay h\u1ed3ng xu\u1ea5t hi\u1ec7n th\u00ec hai ng\u01b0\u1eddi tr\u1edf d\u1eady. N\u1eef th\u1ea7n Ca-l\u00edp-x\u00f4 ban cho Uy-l\u00edt-x\u01a1 nh\u1eefng d\u1ee5ng c\u1ee5 qu\u00fd b\u00e1u: m\u1ed9t chi\u1ebfc r\u00ecu \u0111\u1ed3ng kh\u00e1 to v\u00e0 m\u1ed9t chi\u1ebfc b\u00faa ch\u1eafc ch\u1eafn. N\u00e0ng d\u1eabn ch\u00e0ng v\u00e0o r\u1eebng \u0111\u1ec3 ch\u1eb7t c\u00e2y v\u00e0 ch\u1ec9 d\u1eabn cho ch\u00e0ng c\u00e1ch \u0111\u00f3ng b\u00e8. Sau \u0111\u00f3, Ca-l\u00edp-x\u00f4 tr\u1edf v\u1ec1 \u0111\u1ed9ng sai gia nh\u00e2n mang khoan \u0111\u1ebfn cho Uy-l\u00edt-x\u01a1. Uy-l\u00edt-x\u01a1 ch\u1eb7t c\u00e2y, \u0111\u1ebdo g\u1ecdt, \u0111\u00f3ng b\u00e8, \u0111\u1ebdo c\u1ed9t bu\u1ed3m, l\u00e0m b\u00e1nh l\u00e1i, l\u00e0m s\u00e0n b\u00e8, b\u1ec7n d\u00e2y,... Ch\u00e0ng l\u00e0m vi\u1ec7c h\u0103ng say v\u00e0 kh\u00e9o l\u00e9o su\u1ed1t b\u1ed1n ng\u00e0y tr\u1eddi. N\u1eef th\u1ea7n Ca-l\u00edp-x\u00f4 kh\u00f4ng qu\u00ean cho ng\u01b0\u1eddi mang v\u1ea3i t\u1edbi \u0111\u1ec3 ch\u00e0ng l\u00e0m bu\u1ed3m. Th\u1ebf l\u00e0 m\u1ecdi vi\u1ec7c xong xu\u00f4i. Uy-l\u00edt-x\u01a1 d\u00f9ng \u0111\u00f2n b\u1ea9y \u0111\u01b0a b\u00e8 xu\u1ed1ng m\u1eb7t bi\u1ec3n.\u201d</i><br><div style=\"text-align: right;\">(S\u1eed thi Hy L\u1ea1p, <i>\u00d4-\u0111i-x\u00ea</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>N\u1ed9i dung ch\u00ednh c\u1ee7a \u0111o\u1ea1n tr\u00edch tr\u00ean l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch t\u1eadp trung mi\u00eau t\u1ea3 qu\u00e1 tr\u00ecnh n\u1eef th\u1ea7n Ca-l\u00edp-x\u00f4 h\u1ed7 tr\u1ee3 Uy-l\u00edt-x\u01a1 \u0111\u00f3ng b\u00e8 \u0111\u1ec3 r\u1eddi kh\u1ecfi \u0111\u1ea3o c\u1ee7a n\u00e0ng v\u00e0 tr\u1edf v\u1ec1 qu\u00ea h\u01b0\u01a1ng. <br>\n\u2192 N\u1ed9i dung ch\u00ednh c\u1ee7a \u0111o\u1ea1n tr\u00edch l\u00e0 n\u1eef th\u1ea7n Ca-l\u00edp-x\u00f4 gi\u00fap Uy-l\u00edt-x\u01a1 \u0111\u00f3ng b\u00e8 v\u1ec1 qu\u00ea.\n", "key": "A", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21596706, "lessonId": 0, "a": "Chi ti\u1ebft nhai l\u1eabn qu\u1ea3 v\u1edbi l\u00e1 c\u00e2y d\u00e2y th\u00ec m\u1ed9t v\u1ecb l\u00e0 l\u1ea1 \u0111\u1ebfn \u1edf \u0111\u1ea7u l\u01b0\u1ee1i: v\u1eeba ngon ng\u1ecdt, v\u1eeba th\u01a1m cay.", "b": "Chi ti\u1ebft vua sai m\u1ed9t ng\u01b0\u1eddi tr\u00e8o c\u00e2y h\u00e1i qu\u1ea3 xu\u1ed1ng n\u1ebfm th\u1eed.", "c": "Nh\u00e2n v\u1eadt vua H\u00f9ng.", "d": "Nh\u00e2n v\u1eadt vi\u00ean quan h\u1ea7u.", "bookId": 1088211, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cH\u00f9ng V\u01b0\u01a1ng c\u00e0ng nghe, kh\u00f4ng ng\u0103n \u0111\u01b0\u1ee3c s\u1ef1 c\u1ea3m \u0111\u1ed9ng. Vua v\u1ea1ch l\u00e1 tr\u00e8o l\u00ean nh\u00ecn kh\u1eafp m\u1ecdi ch\u1ed7. \u0110o\u1ea1n, vua sai m\u1ed9t ng\u01b0\u1eddi tr\u00e8o c\u00e2y h\u00e1i qu\u1ea3 xu\u1ed1ng n\u1ebfm th\u1eed. V\u1ecb ch\u00e1t kh\u00f4ng c\u00f3 g\u00ec l\u1ea1. Nh\u01b0ng khi nhai v\u1edbi l\u00e1 c\u00e2y d\u00e2y th\u00ec m\u1ed9t v\u1ecb l\u00e0 l\u1ea1 \u0111\u1ebfn \u1edf \u0111\u1ea7u l\u01b0\u1ee1i: n\u00f3 v\u1eeba ngon ng\u1ecdt, v\u1eeba th\u01a1m cay.<br>T\u1ef1 nhi\u00ean c\u00f3 m\u1ed9t vi\u00ean quan h\u1ea7u k\u00eau l\u00ean: - \u201cTr\u1eddi \u01a1i! M\u00e1u!\u201d. M\u1ecdi ng\u01b0\u1eddi gi\u00e3n ra kinh ng\u1ea1c. Th\u00ec ra nh\u1eefng b\u00e3i nhai qu\u1ea3 v\u00e0 l\u00e1 c\u1ee7a hai th\u1ee9 c\u00e2y \u0111\u00f3 m\u1ed9t khi nh\u1ed5 xu\u1ed1ng \u0111\u00e1 b\u1ed7ng \u0111\u1ecf \u1ed1i ra nh\u01b0 m\u00e1u. Vua sai l\u1ea5y c\u1ea3 ba th\u1ee9 nhai l\u1eabn v\u1edbi nhau th\u00ec b\u1ed7ng ng\u01b0\u1eddi th\u1ea5y n\u00f3ng b\u1eebng nh\u01b0 c\u00f3 h\u01a1i men, m\u00f4i \u0111\u1ecf t\u01b0\u01a1i, s\u1eafc m\u1eb7t h\u1ed3ng h\u00e0o t\u01b0\u01a1i \u0111\u1eb9p. Vua b\u1ea3o:<br>- Th\u1eadt l\u00e0 linh d\u1ecb! \u0110\u00fang l\u00e0 h\u1ecd r\u1ed3i! T\u00ecnh y\u00eau th\u01b0\u01a1ng c\u1ee7a h\u1ecd th\u1eadt l\u00e0 n\u1ed3ng n\u00e0n th\u1eafm \u0111\u1ecf.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u0110\u1ed5ng Chi, <i>S\u1ef1 t\u00edch tr\u1ea7u, cau v\u00e0 v\u00f4i</i>, theo <i>Kho t\u00e0ng truy\u1ec7n c\u1ed5 t\u00edch Vi\u1ec7t Nam</i>, t\u1eadp 1, NXB Gi\u00e1o d\u1ee5c, 2000)</div>Ch\u1ec9 ra y\u1ebfu t\u1ed1 l\u1ecbch s\u1eed trong \u0111o\u1ea1n tr\u00edch tr\u00ean.", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nH\u00f9ng V\u01b0\u01a1ng l\u00e0 nh\u00e2n v\u1eadt c\u00f3 th\u1eadt trong truy\u1ec1n thuy\u1ebft v\u1ec1 th\u1eddi \u0111\u1ea1i c\u00e1c vua H\u00f9ng d\u1ef1ng n\u01b0\u1edbc V\u0103n Lang, g\u1eafn li\u1ec1n v\u1edbi l\u1ecbch s\u1eed Vi\u1ec7t Nam. S\u1ef1 xu\u1ea5t hi\u1ec7n c\u1ee7a H\u00f9ng V\u01b0\u01a1ng trong \u0111o\u1ea1n tr\u00edch cho th\u1ea5y c\u00e2u chuy\u1ec7n n\u00e0y \u0111\u01b0\u1ee3c x\u00e2y d\u1ef1ng d\u1ef1a tr\u00ean b\u1ed1i c\u1ea3nh l\u1ecbch s\u1eed, g\u1eafn li\u1ec1n v\u1edbi m\u1ed9t giai \u0111o\u1ea1n l\u1ecbch s\u1eed c\u1ee5 th\u1ec3 c\u1ee7a d\u00e2n t\u1ed9c.<br>\n\u2192 Nh\u00e2n v\u1eadt vua H\u00f9ng l\u00e0 y\u1ebfu t\u1ed1 l\u1ecbch s\u1eed trong \u0111o\u1ea1n tr\u00edch.\n", "key": "C", "isVideo": true, "score": 0, "order": 2, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21596785, "lessonId": 0, "a": "\u0110o\u1ea1n th\u01a1 \u0111\u01b0\u1ee3c vi\u1ebft theo th\u1ec3 th\u01a1 th\u1ea5t ng\u00f4n xen l\u1ee5c ng\u00f4n.", "b": "Nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh l\u00e0 m\u1ed9t ti\u00ean \u00f4ng.", "c": "\u0110o\u1ea1n th\u01a1 gieo v\u1ea7n b\u1eb1ng.", "d": "\u0110o\u1ea1n th\u01a1 t\u00e1i hi\u1ec7n cu\u1ed9c s\u1ed1ng gi\u1ea3n d\u1ecb m\u00e0 phong l\u01b0u c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh.", "bookId": 1088212, "comments": 0, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cGi\u00e0u c\u01a1m th\u1ecbt, kh\u00f3 c\u01a1m rau,<br>Y\u00ean ph\u1eadn l\u00e0 ti\u00ean, l\u1ecd  ph\u1ea3i c\u1ea7u.<br>S\u1edbm u\u1ed1ng ch\u00e8 mai  h\u01a1i ng\u1ecdt ng\u1ecdt,<br>H\u00f4m k\u1ec1 hi\u00ean ngu\u1ef5\u1ec7t t\u1ecf l\u00e0u l\u00e0u.<br>Vun th\u00f4ng t\u01b0\u1edbi c\u00fac ba th\u1eb1ng m\u1ecdn<br>Ch\u1edf l\u1eeda, h\u00e2m tr\u00e0 m\u1ed9t m\u1ee5 h\u1ea7u \u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n B\u1ec9nh Khi\u00eam, <i>B\u1ea1ch V\u00e2n qu\u1ed1c ng\u1eef thi t\u1eadp</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 5, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Nh\u1eadn x\u00e9t n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>\u0111\u00fang?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- \u0110o\u1ea1n th\u01a1 \u0111\u01b0\u1ee3c vi\u1ebft theo th\u1ec3 th\u01a1 th\u1ea5t ng\u00f4n xen l\u1ee5c ng\u00f4n.<br>\n- \u0110o\u1ea1n th\u01a1 gieo v\u1ea7n b\u1eb1ng: rau \u2013 c\u1ea7u \u2013 l\u00e0u \u2013 h\u1ea7u.<br>\n- \u0110o\u1ea1n th\u01a1 mi\u00eau t\u1ea3 cu\u1ed9c s\u1ed1ng gi\u1ea3n d\u1ecb nh\u01b0ng phong l\u01b0u c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh: u\u1ed1ng tr\u00e0, ng\u1eafm tr\u0103ng, ch\u0103m s\u00f3c c\u00e2y c\u1ed1i, th\u1ec3 hi\u1ec7n t\u01b0 t\u01b0\u1edfng tri\u1ebft l\u00fd an nh\u00e0n c\u1ee7a Nguy\u1ec5n B\u1ec9nh Khi\u00eam. <br>\n\u2192 Nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh kh\u00f4ng ph\u1ea3i l\u00e0 m\u1ed9t v\u1ecb th\u1ea7n ti\u00ean m\u00e0 l\u00e0 h\u00ecnh \u1ea3nh m\u1ed9t \u1ea9n s\u0129 s\u1ed1ng thanh b\u1ea7n, ung dung t\u1ef1 t\u1ea1i, \u1ea9n d\u1eadt gi\u1eefa thi\u00ean nhi\u00ean.\n", "key": "B", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21596793, "lessonId": 0, "a": "M\u1eb7t hoa, t\u00f3c m\u00e2y, m\u1eaft ch\u00e2u, m\u00f4i \u0111\u00e0o.", "b": "M\u00ecnh cao ch\u00edn th\u01b0\u1edbc, v\u00fa d\u00e0i ba th\u01b0\u1edbc.", "c": "Ch\u00e2n \u0111i m\u1ed9t ng\u00e0y n\u0103m tr\u0103m d\u1eb7m.", "d": "S\u1eafc \u0111\u1eb9p \u0111\u1ed9ng l\u00f2ng ng\u01b0\u1eddi.", "bookId": 1088213, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cB\u00e0 h\u1ecd Tri\u1ec7u, t\u00ean h\u00fay l\u00e0 Trinh, l\u00fac nh\u1ecf c\u00f3 t\u00ean g\u1ecdi l\u00e0 N\u00e0ng \u00c2u, em g\u00e1i Tri\u1ec7u Qu\u1ed1c \u0110\u1ea1t, ng\u01b0\u1eddi \u0111\u1ea5t Trung S\u01a1n, qu\u1eadn C\u1eedu Ch\u00e2n. M\u1eb7t hoa, t\u00f3c m\u00e2y, m\u1eaft ch\u00e2u, m\u00f4i \u0111\u00e0o, m\u0169i h\u1ed5, tr\u00e1n r\u1ed3ng, \u0111\u1ea7u b\u00e1o, h\u00e0m \u00e9n, tay d\u00e0i qu\u00e1 \u0111\u1ea7u g\u1ed1i, ti\u1ebfng nh\u01b0 chu\u00f4ng l\u1edbn, m\u00ecnh cao ch\u00edn th\u01b0\u1edbc, v\u00fa d\u00e0i ba th\u01b0\u1edbc, v\u00f2ng l\u01b0ng r\u1ed9ng m\u01b0\u1eddi \u00f4m, ch\u00e2n \u0111i m\u1ed9t ng\u00e0y n\u0103m tr\u0103m d\u1eb7m, s\u1ee9c c\u00f3 th\u1ec3 khua gi\u00f3 b\u1ea1t c\u00e2y, tay \u0111\u00e1nh ch\u00e2n \u0111\u00e1 nh\u01b0 th\u1ea7n, l\u1ea1i c\u00f3 s\u1eafc \u0111\u1eb9p ph\u1ea3i \u0111\u1ed9ng l\u00f2ng ng\u01b0\u1eddi.\u201d</i><br><div style=\"text-align: right;\">(L\u00fd T\u1ebf Xuy\u00ean, <i>L\u1ec7 H\u1ea3i b\u00e0 V\u01b0\u01a1ng k\u00ed</i>, theo <i>Vi\u1ec7t \u0111i\u1ec7n u linh t\u1eadp</i>, NXB V\u0103n h\u1ecdc, 2008)</div>Chi ti\u1ebft n\u00e0o kh\u1eafc ho\u1ea1 s\u1ee9c m\u1ea1nh phi th\u01b0\u1eddng c\u1ee7a B\u00e0 Tri\u1ec7u?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft kh\u1eafc h\u1ecda s\u1ee9c m\u1ea1nh phi th\u01b0\u1eddng c\u1ee7a B\u00e0 Tri\u1ec7u l\u00e0: \u201cCh\u00e2n \u0111i m\u1ed9t ng\u00e0y n\u0103m tr\u0103m d\u1eb7m\u201d. H\u00ecnh \u1ea3nh n\u00e0y tr\u1ef1c ti\u1ebfp mi\u00eau t\u1ea3 nh\u1eefng kh\u1ea3 n\u0103ng di chuy\u1ec3n v\u01b0\u1ee3t xa kh\u1ea3 n\u0103ng ng\u01b0\u1eddi th\u01b0\u1eddng c\u1ee7a B\u00e0 Tri\u1ec7u.\n", "key": "C", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21596828, "lessonId": 0, "a": "T\u1ee7i ph\u1eadn bi\u00ean manh.", "b": "C\u0103m lo\u00e0i d\u01b0\u01a1ng t\u1eb7c.", "c": "D\u00e2n nh\u1edd vua \u0111\u1eb7ng l\u1ebd s\u1ed1ng vui.", "d": "Ng\u1ee3i c\u00e2u \u00e1n \u0111\u1ed5.", "bookId": 1088214, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cH\u1ee1i \u00f4i!<br>T\u1ee7i ph\u1eadn bi\u00ean manh .<br>C\u0103m lo\u00e0i d\u01b0\u01a1ng t\u1eb7c .<br>Ngo\u00e0i s\u00e1u t\u1ec9nh h\u00e3y ng\u1ee3i c\u00e2u \u00e1n \u0111\u1ed5, d\u00e2n nh\u1edd vua \u0111\u1eb7ng l\u1ebd s\u1ed1ng vui; Trong m\u1ed9t ph\u01b0\u01a1ng sao m\u1eafc ch\u1eef l\u1ee5c tr\u1ea7m, ng\u01b0\u1eddi v\u00ec n\u01b0\u1edbc r\u1ee7 nhau ch\u1ebft ng\u1eb7t.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u0110\u00ecnh Chi\u1ec3u, <i>T\u1ebf L\u1ee5c T\u1ec9nh s\u0129 d\u00e2n tr\u1eadn vong v\u0103n</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 15, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>T\u1eeb ng\u1eef n\u00e0o sau \u0111\u00e2y di\u1ec5n t\u1ea3 l\u00f2ng c\u0103m th\u00f9 gi\u1eb7c s\u00e2u s\u1eafc c\u1ee7a nh\u00e2n d\u00e2n l\u1ee5c t\u1ec9nh?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u201cD\u01b0\u01a1ng t\u1eb7c\u201d l\u00e0 c\u00e1ch g\u1ecdi mang t\u00ednh c\u0103m th\u00f9 \u0111\u1ed1i v\u1edbi gi\u1eb7c x\u00e2m l\u01b0\u1ee3c ph\u01b0\u01a1ng T\u00e2y. C\u1ee5m t\u1eeb \u201cc\u0103m lo\u00e0i d\u01b0\u01a1ng t\u1eb7c\u201d th\u1ec3 hi\u1ec7n s\u1ef1 c\u0103m gh\u00e9t, c\u0103m h\u1eddn s\u00e2u s\u1eafc \u0111\u1ed1i v\u1edbi gi\u1eb7c ngo\u1ea1i x\u00e2m c\u1ee7a nh\u00e2n d\u00e2n l\u1ee5c t\u1ec9nh.\n", "key": "B", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21596858, "lessonId": 0, "a": "Tham lam, \u00edch k\u1ec9.", "b": "X\u1ea3o quy\u1ec7t, th\u1ee7 \u0111o\u1ea1n.", "c": "M\u01b0u m\u00f4, \u0111\u1ed9c \u00e1c.", "d": "L\u1eeba l\u1ecdc, d\u1ed1i tr\u00e1.", "bookId": 1088215, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cT\u00f4i d\u1ecbch \u0111\u01b0\u1ee3c 5 ch\u1ee5c b\u00e0i lu\u1eadn c\u1ee7a t\u00f4i th\u00e0nh 50 c\u00e1i truy\u1ec7n ng\u1eafn. Ch\u01b0a g\u1eedi \u0111i c\u00e1i n\u00e0o \u0111\u0103ng b\u00e1o v\u00ec v\u1eabn c\u00f2n ch\u1edd Kh\u1eafc l\u00ean mang \u0111i \u0111\u0103ng h\u1ed9 nh\u01b0 l\u1eddi h\u1eb9n khi chia tay. Th\u1ebf r\u1ed3i t\u00f4i m\u1eafc b\u1ec7nh tr\u1ecdng, qua \u0111\u1eddi m\u00e0 ch\u1eb3ng k\u1ecbp tr\u0103ng tr\u1ed1i l\u1ea1i g\u00ec cho v\u1ee3 con. V\u1ee3 t\u00f4i l\u00e0 con m\u1eb9 nh\u00e0 qu\u00ea, d\u1ed1t n\u00e1t v\u00ec c\u00f3 \u0111\u01b0\u1ee3c \u0111i h\u1ecdc \u0111\u00e2u. M\u1ee5 gom to\u00e0n b\u1ed9 s\u00e1ch v\u1edf, b\u1ea3n th\u1ea3o c\u1ee7a t\u00f4i bu\u1ed9c th\u00e0nh \u0111\u1ed1ng. T\u00f4i bi\u1ebft t\u00f4i ch\u1ebft \u0111\u01b0\u1ee3c \u00edt l\u00e2u th\u00ec Kh\u1eafc l\u00ean th\u0103m t\u00f4i. Khi bi\u1ebft t\u00f4i ch\u1ebft r\u1ed3i h\u1eafn b\u00f4i m\u1eb7t m\u0169i \u0111\u1ec3 ng\u01b0\u1eddi nh\u00e0 kh\u00f4ng nh\u1eadn ra g\u00e1nh \u0111\u00f4i b\u1ed3 \u0111\u1ebfn nh\u00e0 \u0111i mua gi\u1ea5y v\u1ee5n. M\u1ee5 v\u1ee3 d\u1ed1t n\u00e1t \u0111em b\u00e1n h\u1ebft s\u00e1ch v\u1edf v\u00e0 b\u1ea3n th\u1ea3o c\u1ee7a t\u00f4i. H\u1eafn mang v\u1ec1 xu\u00f4i so\u1ea1n nh\u1eefng b\u00e0i lu\u1eadn t\u00f4i \u0111\u00e3 d\u1ecbch sang ch\u1eef qu\u1ed1c ng\u1eef k\u00ed t\u00ean h\u1eafn v\u00e0 mang \u0111\u1ebfn t\u00f2a b\u00e1o. Th\u1ebf r\u1ed3i h\u1eafn, h\u1eafn n\u1ed5i ti\u1ebfng l\u00e0 m\u1ed9t nh\u00e0 v\u0103n tr\u1ebb \u0111\u1ea7y t\u00e0i n\u0103ng.\u201d</i><br><div style=\"text-align: right;\">(Y Ban, <i>M\u00f3n n\u1ee3 v\u0103n ch\u01b0\u01a1ng</i>, theo <i>tapchisonghuong.com.vn</i>)</div>T\u1eeb ng\u1eef n\u00e0o mi\u00eau t\u1ea3 \u0111\u00fang t\u00ednh c\u00e1ch c\u1ee7a nh\u00e2n v\u1eadt Kh\u1eafc trong \u0111o\u1ea1n tr\u00edch tr\u00ean?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- Lo\u1ea1i A v\u00ec nh\u00e2n v\u1eadt Kh\u1eafc kh\u00f4ng ch\u1ec9 tham lam m\u00e0 c\u00f2n c\u00f3 th\u1ee7 \u0111o\u1ea1n chi\u1ebfm \u0111o\u1ea1t th\u00e0nh qu\u1ea3 c\u1ee7a ng\u01b0\u1eddi kh\u00e1c.<br>\n- Lo\u1ea1i C v\u00ec nh\u00e2n v\u1eadt Kh\u1eafc tuy c\u00f3 m\u01b0u m\u00f4, nh\u01b0ng ch\u01b0a \u0111\u1ebfn m\u1ee9c \u0111\u1ed9c \u00e1c, v\u00ec h\u1eafn kh\u00f4ng g\u00e2y t\u1ed5n h\u1ea1i tr\u1ef1c ti\u1ebfp \u0111\u1ebfn t\u00ednh m\u1ea1ng ng\u01b0\u1eddi kh\u00e1c.<br>\n- Lo\u1ea1i D v\u00ec nh\u00e2n v\u1eadt Kh\u1eafc kh\u00f4ng ch\u1ec9 l\u1eeba d\u1ed1i ng\u01b0\u1eddi nh\u00e0 nh\u00e2n v\u1eadt \u201ct\u00f4i\u201d m\u00e0 c\u00f2n t\u00ednh to\u00e1n, che gi\u1ea5u h\u00e0nh vi chi\u1ebfm \u0111o\u1ea1t th\u00e0nh qu\u1ea3 c\u1ee7a ng\u01b0\u1eddi kh\u00e1c m\u1ed9t c\u00e1ch kh\u00e9o l\u00e9o \u0111\u1ec3 \u0111\u1ea1t m\u1ee5c \u0111\u00edch.<br>\n\u2192 B l\u00e0 \u0111\u00e1p \u00e1n \u0111\u00fang v\u00ec nh\u00e2n v\u1eadt Kh\u1eafc v\u1eeba x\u1ea3o quy\u1ec7t v\u1eeba th\u1ee7 \u0111o\u1ea1n:<br>\n+ X\u1ea3o quy\u1ec7t: Kh\u1eafc th\u1ec3 hi\u1ec7n s\u1ef1 th\u00f4ng minh ranh m\u00e3nh, l\u1eeba d\u1ed1i tinh vi. H\u1eafn \u0111\u00e3 \u201cb\u00f4i m\u1eb7t m\u0169i \u0111\u1ec3 ng\u01b0\u1eddi nh\u00e0 kh\u00f4ng nh\u1eadn ra\u201d v\u00e0 \u0111\u00f3ng gi\u1ea3 th\u00e0nh ng\u01b0\u1eddi \"\u0111i mua gi\u1ea5y v\u1ee5n\" \u0111\u1ec3 ti\u1ebfp c\u1eadn v\u00e0 l\u1ea5y tr\u1ed9m b\u1ea3n th\u1ea3o m\u1ed9t c\u00e1ch k\u00edn \u0111\u00e1o, tr\u00e1nh b\u1ecb ph\u00e1t hi\u1ec7n.<br>\n+ Th\u1ee7 \u0111o\u1ea1n: H\u1eafn th\u1ef1c hi\u1ec7n h\u00e0nh \u0111\u1ed9ng m\u1ed9t c\u00e1ch c\u00f3 m\u1ee5c \u0111\u00edch r\u00f5 r\u00e0ng v\u00e0 c\u00f3 k\u1ebf ho\u1ea1ch (ch\u1edd nh\u00e2n v\u1eadt \u201ct\u00f4i\u201d ch\u1ebft, h\u1eb9n tr\u01b0\u1edbc, \u0111\u00f3ng gi\u1ea3, mua l\u1ea1i b\u1ea3n th\u1ea3o). Sau \u0111\u00f3, h\u1eafn \u201cso\u1ea1n nh\u1eefng b\u00e0i lu\u1eadn t\u00f4i \u0111\u00e3 d\u1ecbch sang ch\u1eef qu\u1ed1c ng\u1eef k\u00ed t\u00ean h\u1eafn\u201d v\u00e0 mang \u0111i \u0111\u0103ng b\u00e1o \u0111\u1ec3 chi\u1ebfm \u0111o\u1ea1t th\u00e0nh qu\u1ea3 lao \u0111\u1ed9ng c\u1ee7a ng\u01b0\u1eddi kh\u00e1c.\n", "key": "B", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21596868, "lessonId": 0, "a": "\u201cKhi t\u00f4i ng\u1ee7, c\u1ecf lim dim\u201d.", "b": "\u201cKhi t\u00f4i \u0103n, c\u1ecf ch\u1edd ngo\u00e0i c\u1ed5ng\u201d.", "c": "\u201cC\u1ecf m\u1eadt hay n\u1eb1m m\u01a1\u201d.", "d": "\u201cC\u1ee9 \u0111an v\u00e0o nhau nh\u01b0 t\u1ed5 chim\u201d.", "bookId": 1088216, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cC\u1ecf v\u00e0 t\u00f4i<br>C\u1ee9 \u0111an v\u00e0o nhau nh\u01b0 t\u1ed5 chim<br>Khi t\u00f4i ng\u1ee7, c\u1ecf lim dim<br>Khi t\u00f4i \u0103n, c\u1ecf ch\u1edd ngo\u00e0i c\u1ed5ng<br>C\u1ecf g\u1ea5u su\u1ed1t \u0111\u1eddi l\u00eau l\u1ed5ng<br>C\u1ecf g\u00e0 kh\u00f4ng bi\u1ebft g\u00e1y bao gi\u1edd<br>C\u1ecf m\u1eadt hay n\u1eb1m m\u01a1<br>\u0110\u1ec3 m\u00f9i h\u01b0\u01a1ng thao th\u1ee9c.\u201d</i><br><div style=\"text-align: right;\">(L\u00ea Th\u1ecb Kim, <i>T\u00f4i v\u00e0 c\u1ecf</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>D\u00f2ng th\u01a1 n\u00e0o th\u1ec3 hi\u1ec7n s\u1ef1 g\u1eafn k\u1ebft gi\u1eefa \u201cc\u1ecf\u201d v\u00e0 \u201ct\u00f4i\u201d?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u00e2u th\u01a1 \u201cC\u1ee9 \u0111an v\u00e0o nhau nh\u01b0 t\u1ed5 chim\u201d th\u1ec3 hi\u1ec7n s\u1ef1 g\u1eafn k\u1ebft m\u1eadt thi\u1ebft gi\u1eefa \u201cc\u1ecf\" v\u00e0 \u201ct\u00f4i\u201d. H\u00ecnh \u1ea3nh t\u1ed5 chim mang \u00fd ngh\u0129a v\u1ec1 s\u1ef1 qu\u1ea5n qu\u00fdt, h\u00f2a quy\u1ec7n, kh\u00f4ng th\u1ec3 t\u00e1ch r\u1eddi.\n", "key": "D", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21596891, "lessonId": 0, "a": "Ai l\u00e0m t\u1ed1t ngh\u0129a v\u1ee5 c\u00f4ng d\u00e2n, \u0111\u1ec1u \u0111\u00e1ng \u0111\u01b0\u1ee3c khen ng\u1ee3i.", "b": "C\u0169ng c\u00f3 ng\u01b0\u1eddi ph\u1ea3n \u0111\u1ed1i ch\u1ecb.", "c": "Ph\u1ea3i \u0111\u1ec3 tr\u1ebb em \u0111\u01b0\u1ee3c b\u00ecnh \u0111\u1eb3ng.", "d": "Kh\u1eafc ph\u1ee5c nh\u1eefng \u1ea5n t\u01b0\u1ee3ng v\u00e0 quan ni\u1ec7m thi\u1ebfu nh\u00e2n \u0111\u1ea1o \u0111\u1ed1i v\u1edbi gia \u0111\u00ecnh ngu\u1ef5 qu\u00e2n, ngu\u1ef5 quy\u1ec1n c\u0169.", "bookId": 1088217, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cM\u1ea5y b\u1eefa tr\u01b0\u1edbc, sau l\u1ea7n g\u1eb7p ch\u00fa T\u01b0 Nh\u01a1n, ch\u1ecb \u0111\u00e3 b\u00e0n v\u1edbi nhi\u1ec1u ng\u01b0\u1eddi v\u1ec1 vi\u1ec7c kh\u1eafc ph\u1ee5c nh\u1eefng \u1ea5n t\u01b0\u1ee3ng v\u00e0 quan ni\u1ec7m thi\u1ebfu nh\u00e2n \u0111\u1ea1o \u0111\u1ed1i v\u1edbi gia \u0111\u00ecnh ngu\u1ef5 qu\u00e2n, ngu\u1ef5 quy\u1ec1n c\u0169, \u0111\u1eb7c bi\u1ec7t \u0111\u1ed1i v\u1edbi v\u1ee3 con nh\u1eefng t\u00ean \u00e1c \u00f4n \u0111\u00e3 b\u1ecb gi\u1ebft ch\u1ebft. \u0110\u00f3 l\u00e0 nh\u1eefng cu\u1ed9c n\u00f3i chuy\u1ec7n c\u0103ng th\u1eb3ng nh\u01b0ng c\u1ea7n thi\u1ebft. C\u00f3 ng\u01b0\u1eddi \u1ee7ng h\u1ed9 ch\u1ecb. C\u00f3 ng\u01b0\u1eddi ph\u1ea3n \u0111\u1ed1i. Ch\u1ecb \u0111\u00e3 n\u00f3i quy\u1ebft li\u1ec7t r\u1eb1ng, trong giai \u0111o\u1ea1n n\u00e0y, huy\u1ec7n u\u1ef7 ch\u1ee7 tr\u01b0\u01a1ng nh\u1eefng ai l\u00e0m t\u1ed1t ngh\u0129a v\u1ee5 c\u00f4ng d\u00e2n, d\u00f9 xu\u1ea5t th\u00e2n t\u1eeb th\u00e0nh ph\u1ea7n n\u00e0o, c\u00f3 qu\u00e1 kh\u1ee9 th\u1ebf n\u00e0o \u0111\u1ec1u \u0111\u00e1ng \u0111\u01b0\u1ee3c khen ng\u1ee3i. Ri\u00eang tr\u1ebb em, ph\u1ea3i \u0111\u1ec3 ch\u00fang \u0111\u01b0\u1ee3c b\u00ecnh \u0111\u1eb3ng nh\u01b0 nhau, b\u1edfi ch\u00fang kh\u00f4ng h\u1ec1 tham d\u1ef1 v\u00e0o t\u1ed9i \u00e1c c\u1ee7a cha m\u1eb9 ch\u00fang v\u00e0 \u0111\u1eebng \u0111\u1ea9y ch\u00fang v\u1ec1 ph\u00eda t\u1ed9i \u00e1c m\u00e0 l\u1ebd ra ch\u00fang c\u00f3 th\u1ec3 xa l\u00e1nh \u0111\u01b0\u1ee3c...\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Tr\u00ed Hu\u00e2n, <i>Chim \u00e9n bay</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 12</i>, NXB \u0110\u1ea1i h\u1ecdc Hu\u1ebf, 2024)</div>Chi ti\u1ebft n\u00e0o trong \u0111o\u1ea1n v\u0103n <b>kh\u00f4ng </b>th\u1ec3 hi\u1ec7n tinh th\u1ea7n ho\u00e0 gi\u1ea3i, ho\u00e0 h\u1ee3p d\u00e2n t\u1ed9c?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n v\u0103n t\u1eadp trung v\u00e0o vi\u1ec7c ch\u1ecb - nh\u00e2n v\u1eadt trung t\u00e2m - v\u00e0 nh\u1eefng ng\u01b0\u1eddi xung quanh b\u00e0n lu\u1eadn v\u1ec1 vi\u1ec7c \u0111\u1ed1i x\u1eed v\u1edbi gia \u0111\u00ecnh ng\u1ee5y qu\u00e2n, ng\u1ee5y quy\u1ec1n c\u0169. Tinh th\u1ea7n h\u00f2a gi\u1ea3i, h\u00f2a h\u1ee3p d\u00e2n t\u1ed9c th\u1ec3 hi\u1ec7n \u1edf s\u1ef1 bao dung, g\u1ea1t b\u1ecf \u0111\u1ecbnh ki\u1ebfn, \u0111\u1ed1i x\u1eed c\u00f4ng b\u1eb1ng v\u1edbi m\u1ecdi ng\u01b0\u1eddi, \u0111\u1eb7c bi\u1ec7t l\u00e0 nh\u1eefng ng\u01b0\u1eddi t\u1eebng thu\u1ed9c ch\u1ebf \u0111\u1ed9 c\u0169 v\u00e0 con c\u00e1i h\u1ecd. Tuy nhi\u00ean, chi ti\u1ebft \u201cC\u0169ng c\u00f3 ng\u01b0\u1eddi ph\u1ea3n \u0111\u1ed1i ch\u1ecb\u201d cho th\u1ea5y v\u1eabn c\u00f2n nh\u1eefng \u00fd ki\u1ebfn tr\u00e1i chi\u1ec1u, kh\u00f4ng \u0111\u1ed3ng t\u00ecnh v\u1edbi quan \u0111i\u1ec3m c\u1ee7a ch\u1ecb. \n", "key": "B", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21596905, "lessonId": 0, "a": "Vi\u1ec7c nh\u1eadn v\u00e0i con ch\u00f3 s\u0103n.", "b": "Vi\u1ec7c nh\u1eadn \u00e1o kho\u00e1c b\u1eb1ng l\u00f4ng th\u00fa.", "c": "Vi\u1ec7c nh\u1eadn h\u1ed1i l\u1ed9.", "d": "Vi\u1ec7c nh\u1eadn kh\u0103n san.", "bookId": 1088218, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cAM-M\u1ed0T PHI-\u00d4-\u0110\u00d4-R\u00d4-V\u00cdCH: \u00d4ng An-t\u00f4n An-t\u00f4-n\u00f4-v\u00edch, \u00f4ng cho th\u1ebf n\u00e0o l\u00e0 t\u1ed9i l\u1ed7i! C\u0169ng n\u0103m b\u1ea3y \u0111\u01b0\u1eddng t\u1ed9i l\u1ed7i ch\u1ee9. T\u00f4i kh\u00f4ng gi\u1ea5u ai l\u00e0 t\u00f4i c\u0169ng c\u00f3 nh\u1eadn c\u1ee7a h\u1ed1i l\u1ed9, nh\u01b0ng c\u1ee7a h\u1ed1i l\u1ed9 \u0111\u00f3 l\u00e0 nh\u1eefng v\u1eadt g\u00ec? Ch\u1eb3ng qua l\u00e0 m\u1ed9t v\u00e0i con ch\u00f3 s\u0103n con m\u00e0 th\u00f4i. Nh\u01b0 th\u1ebf kh\u00e1c ch\u1ee9.<br>TH\u1eca TR\u01af\u1edeNG: N\u00e0y, ch\u00f3 hay v\u1eadt g\u00ec kh\u00e1c c\u0169ng \u0111\u1ec1u l\u00e0 c\u1ee7a h\u1ed1i l\u1ed9 t\u1ea5t.<br>AM-M\u1ed0T PHI-\u00d4-\u0110\u00d4-R\u00d4-V\u00cdCH: \u1ea4y, kh\u00f4ng ph\u1ea3i, \u00f4ng An-t\u00f4n An-t\u00f4-n\u00f4-v\u00edch \u1ea1! \u0110\u00e2y nh\u00e9, th\u00ed d\u1ee5 c\u00f3 k\u1ebb \u0111\u01b0\u1ee3c bi\u1ebfu m\u1ed9t c\u00e1i \u00e1o kho\u00e1c b\u1eb1ng l\u00f4ng th\u00fa \u0111\u00e1ng gi\u00e1 n\u0103m tr\u0103m r\u00fap, th\u00eam c\u00e1i kh\u0103n san cho v\u1ee3 h\u1eafn ta...\u201d</i><br><div style=\"text-align: right;\">(N. G\u00f4-g\u00f4n, <i>Quan thanh tra</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 12</i>, NXB \u0110\u1ea1i h\u1ecdc Hu\u1ebf, 2024)</div>Hai nh\u00e2n v\u1eadt trong \u0111o\u1ea1n tr\u00edch \u0111ang tranh lu\u1eadn v\u1ec1 v\u1ea5n \u0111\u1ec1 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch xoay quanh vi\u1ec7c c\u00e1c nh\u00e2n v\u1eadt tranh lu\u1eadn v\u1ec1 \u0111\u1ecbnh ngh\u0129a v\u00e0 m\u1ee9c \u0111\u1ed9 nghi\u00eam tr\u1ecdng c\u1ee7a vi\u1ec7c nh\u1eadn h\u1ed1i l\u1ed9. Am-m\u1ed1t Phi-\u00f4-\u0111\u00f4-r\u00f4-v\u00edch cho r\u1eb1ng vi\u1ec7c nh\u1eadn m\u1ed9t v\u00e0i con ch\u00f3 s\u0103n kh\u00f4ng ph\u1ea3i l\u00e0 v\u1ea5n \u0111\u1ec1 l\u1edbn, trong khi Th\u1ecb tr\u01b0\u1edfng l\u1ea1i kh\u1eb3ng \u0111\u1ecbnh r\u1eb1ng b\u1ea5t c\u1ee9 v\u1eadt ph\u1ea9m n\u00e0o c\u00f3 gi\u00e1 tr\u1ecb v\u1eadt ch\u1ea5t c\u0169ng \u0111\u1ec1u \u0111\u01b0\u1ee3c coi l\u00e0 h\u1ed1i l\u1ed9.<br>\n\u2192 Hai nh\u00e2n v\u1eadt trong \u0111o\u1ea1n tr\u00edch \u0111ang b\u00e0n v\u1ec1 v\u1ea5n \u0111\u1ec1 nh\u1eadn h\u1ed1i l\u1ed9.\n", "key": "C", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21596913, "lessonId": 0, "a": "\u201cc\u1eady th\u1ebf\u201d.", "b": "\u201ctham lam\u201d.", "c": "\u201c\u00e1p b\u1ee9c\u201d.", "d": "\u201cl\u00e0m t\u00f4i ng\u01b0\u01a1i\u201d.", "bookId": 1088219, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<div style=\"text-align: center;\"><i>\u201cN\u01b0\u1edbc T\u00e0u c\u1eady th\u1ebf \u0111\u00f4ng ng\u01b0\u1eddi,</i></div><i><div style=\"text-align: center;\"><i>K\u00e9o qu\u00e2n \u00e1p b\u1ee9c gi\u1ed1ng n\u00f2i Vi\u1ec7t Nam.</i></div><div style=\"text-align: center;\"><i>Qu\u00e2n T\u00e0u nhi\u1ec1u k\u1ebb tham lam,</i></div><div style=\"text-align: center;\"><i>D\u00e2n ta h\u00e1 d\u1ec5 ch\u1ecbu l\u00e0m t\u00f4i ng\u01b0\u01a1i?\u201d</i></div></i><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>L\u1ecbch s\u1eed n\u01b0\u1edbc ta</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>T\u1eeb ng\u1eef n\u00e0o <b>kh\u00f4ng </b>ph\u01a1i b\u00e0y t\u1ed9i tr\u1ea1ng c\u1ee7a \u201cn\u01b0\u1edbc T\u00e0u\u201d?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u1ee5m t\u1eeb \u201cl\u00e0m t\u00f4i ng\u01b0\u01a1i\u201d d\u00f9ng \u0111\u1ec3 n\u00f3i v\u1ec1 vi\u1ec7c nh\u00e2n d\u00e2n ta t\u1eeb ch\u1ed1i l\u00e0m n\u00f4 l\u1ec7 cho n\u01b0\u1edbc T\u00e0u, kh\u00f4ng tr\u1ef1c ti\u1ebfp ph\u01a1i b\u00e0y t\u1ed9i tr\u1ea1ng c\u1ee7a \u201cn\u01b0\u1edbc T\u00e0u\u201d.<br>\nC\u00e1c t\u1eeb \u201cc\u1eady th\u1ebf\u201d, \u201ctham lam\u201d, \u201c\u00e1p b\u1ee9c\u201d \u0111\u1ec1u ph\u1ea3n \u00e1nh t\u1ed9i tr\u1ea1ng, h\u00e0nh vi x\u1ea5u c\u1ee7a n\u01b0\u1edbc T\u00e0u khi \u1ef7 m\u1ea1nh, hi\u1ebfp y\u1ebfu, d\u00f9ng quy\u1ec1n l\u1ef1c, th\u1ebf l\u1ef1c \u0111\u1ec3 b\u00f3c l\u1ed9t, t\u01b0\u1edbc h\u1ebft m\u1ecdi quy\u1ec1n t\u1ef1 do c\u1ee7a nh\u00e2n d\u00e2n ta.\n", "key": "D", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21596925, "lessonId": 0, "a": "\u201csung s\u01b0\u1edbng\u201d.", "b": "\u201ckhoan kho\u00e1i\u201d.", "c": "\u201cx\u00e8o x\u00e8o\u201d.", "d": "\u201ch\u1ed3i h\u1ed9p\u201d.", "bookId": 1088220, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cC\u00e0ng sung s\u01b0\u1edbng bi\u1ebft bao khi ra ngo\u00e0i c\u1ed5ng tr\u01b0\u1eddng, ng\u1ed3i x\u00fam quanh c\u00e1i ch\u1ea3o m\u1ee1 n\u00f3ng c\u1ee7a b\u00e1c h\u00e0ng b\u00e1nh t\u00f4m b\u1ed1c h\u01a1i tr\u00ean ng\u1ecdn l\u1eeda... R\u1ed3i h\u1ed3i h\u1ed9p ch\u1edd \u0111\u1ee3i b\u00e1c \u0111ong c\u00e1i \u0111\u0129a b\u1ed9t tr\u1eafng, \u0111\u1ec3 l\u00ean tr\u00ean hai ba con t\u00f4m kh\u00f4, \u0111i\u1ec3m th\u00eam m\u1ea5y nh\u00e1t khoai th\u00e1i nh\u1ecf, v\u00e0 d\u00fang v\u00e0o m\u1ee1 x\u00e8o x\u00e8o... Ru\u1ed9t h\u01a1i se l\u1ea1i tr\u01b0\u1edbc, ch\u00fang t\u00f4i nh\u00ecn c\u00e1i b\u00e1nh b\u1ed9t v\u00e0ng d\u1ea7n, v\u00e0ng d\u1ea7n, con t\u00f4m co l\u1ea1i, nh\u00e1t khoai n\u1edf ra, v\u00e0 c\u00e1i b\u00e1nh h\u01a1i cong l\u00ean nh\u01b0 n\u00f3ng n\u1ea3y mu\u1ed1n n\u1eb1m ra \u0111\u0129a. M\u1ed9t m\u00f9i th\u01a1m ng\u1ea5y t\u1ecfa nh\u1eb9 l\u00ean kh\u00f4ng kh\u00ed, m\u00e0 ch\u00fang t\u00f4i h\u00edt m\u1ed9t c\u00e1ch khoan kho\u00e1i c\u00f9ng v\u1edbi c\u01a1n gi\u00f3 l\u1ea1nh ph\u00eda B\u1eafc v\u1ec1...\u201d</i><br><div style=\"text-align: right;\">(Th\u1ea1ch Lam, <i>V\u00e0i th\u1ee9 chuy\u00ean m\u00f4n n\u1eefa</i>, theo <i>H\u00e0 N\u1ed9i b\u0103m s\u00e1u ph\u1ed1 ph\u01b0\u1eddng</i>, NXB H\u1ed9i Nh\u00e0 v\u0103n, 2014)</div>T\u1eeb ng\u1eef n\u00e0o <b>kh\u00f4ng </b>mi\u00eau t\u1ea3 tr\u1ea1ng th\u00e1i c\u1ea3m x\u00fac c\u1ee7a c\u00e1c nh\u00e2n v\u1eadt trong \u0111o\u1ea1n tr\u00edch tr\u00ean?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- x\u00e8o x\u00e8o: l\u00e0 t\u1eeb t\u01b0\u1ee3ng thanh, m\u00f4 t\u1ea3 \u00e2m thanh khi b\u00e1nh t\u00f4m \u0111\u01b0\u1ee3c chi\u00ean trong ch\u1ea3o m\u1ee1 n\u00f3ng.<br>\n- sung s\u01b0\u1edbng/ khoan kho\u00e1i/ h\u1ed3i h\u1ed9p: \u0111\u1ec1u l\u00e0 t\u1eeb ng\u1eef mi\u00eau t\u1ea3 tr\u1ea1ng th\u00e1i c\u1ea3m x\u00fac c\u1ee7a nh\u00e2n v\u1eadt khi ch\u1edd \u0111\u1ee3i v\u00e0 th\u01b0\u1edfng th\u1ee9c m\u00f3n b\u00e1nh t\u00f4m.\n", "key": "C", "isVideo": true, "score": 0, "order": 11, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21596928, "lessonId": 0, "a": "\u201cTh\u1eb1ng g\u00f9 \u1edf nh\u00e0 th\u1edd \u0110\u1ee9c b\u00e0 Pa-ri\u201d (V. Huy-g\u00f4), \u201cCon \u0111\u01b0\u1eddng s\u00e1ng\u201d (Ho\u00e0ng \u0110\u1ea1o), \u201cG\u00e1nh h\u00e0ng hoa\u201d (Nh\u1ea5t Linh &amp; Kh\u00e1i H\u01b0ng).", "b": "\u201cT\u1ea5n tr\u00f2 \u0111\u1eddi\u201d (Ban-d\u1eafc), \u201cNh\u1eefng ng\u01b0\u1eddi kh\u1ed1n kh\u1ed5\u201d (V. Huy-g\u00f4), \u201cTh\u01a1 th\u01a1 (Xu\u00e2n Di\u1ec7u).", "c": "\u201c\u0110o\u1ea1n tuy\u1ec7t\u201d (Nh\u1ea5t Linh), \u201cB\u01b0\u1edbm tr\u1eafng\u201d (Nh\u1ea5t Linh), \u201cGia \u0111\u00ecnh\u201d (Kh\u00e1i H\u01b0ng).", "d": "\u201cT\u01b0\u01a1ng t\u01b0\u201d (Nguy\u1ec5n B\u00ednh), \u201cTi\u1ebfng s\u00e1o thi\u00ean thai\u201d (Th\u1ebf L\u1eef), \u201cCh\u00f9a H\u01b0\u01a1ng\u201d (Nguy\u1ec5n Nh\u01b0\u1ee3c Ph\u00e1p).", "bookId": 1088221, "comments": 0, "bookmarks": 4, "likes": 0, "shares": 0, "typeId": 0, "questionText": "D\u00f2ng n\u00e0o sau \u0111\u00e2y n\u00eau t\u00ean nh\u1eefng t\u00e1c ph\u1ea9m <b>kh\u00f4ng </b>c\u00f9ng phong c\u00e1ch s\u00e1ng t\u00e1c c\u1ee7a tr\u01b0\u1eddng ph\u00e1i v\u0103n h\u1ecdc l\u00e3ng m\u1ea1n?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u201cT\u1ea5n tr\u00f2 \u0111\u1eddi\u201d (Ban-d\u1eafc) l\u00e0 t\u00e1c ph\u1ea9m mang phong c\u00e1ch s\u00e1ng t\u00e1c c\u1ee7a tr\u01b0\u1eddng ph\u00e1i v\u0103n h\u1ecdc hi\u1ec7n th\u1ef1c.<br>\nC\u00e1c t\u00e1c ph\u1ea9m c\u00f2n l\u1ea1i \u0111\u1ec1u c\u00f9ng phong c\u00e1ch s\u00e1ng t\u00e1c c\u1ee7a tr\u01b0\u1eddng ph\u00e1i v\u0103n h\u1ecdc l\u00e3ng m\u1ea1n.<br>\n\u2192 B l\u00e0 \u0111\u00e1p \u00e1n \u0111\u00fang.\n", "key": "B", "isVideo": true, "score": 0, "order": 12, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21596936, "lessonId": 0, "a": "D\u1ea1t d\u00e0o, r\u00ec r\u1ea7m, gi\u1eef g\u00ecn.", "b": "Rung rinh, gi\u00f2n tan, d\u00e0o d\u00e0o.", "c": "Dun d\u1ea9y, r\u00e0nh r\u1ebd, gi\u00f2n r\u1ee5m.", "d": "R\u00e0nh d\u1ecdt, du d\u01b0\u01a1ng, dao k\u00e9o.", "bookId": 1088222, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "D\u00f2ng n\u00e0o d\u01b0\u1edbi \u0111\u00e2y c\u00f3 c\u00e1c t\u1eeb vi\u1ebft \u0111\u00fang ch\u00ednh t\u1ea3?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- D\u00f2ng c\u00f3 c\u00e1c t\u1eeb vi\u1ebft \u0111\u00fang ch\u00ednh t\u1ea3 l\u00e0: D\u1ea1t d\u00e0o, r\u00ec r\u1ea7m, gi\u1eef g\u00ecn.<br>\n- Nh\u1eefng t\u1eeb sai ch\u00ednh t\u1ea3: d\u00e0o d\u00e0o, dun d\u1ea9y, r\u00e0nh d\u1ecdt<br>\n- S\u1eeda l\u1ea1i: r\u00e0o r\u00e0o, run r\u1ea9y, r\u00e0nh r\u1ecdt\n", "key": "A", "isVideo": true, "score": 0, "order": 13, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21596941, "lessonId": 0, "a": "S\u01b0\u01a1ng sa \u01b0\u1edbt \u0111\u1ea7m m\u00e1i nh\u00e0 l\u00e1.", "b": "Ch\u01b0a bao gi\u1edd t\u00f4i th\u1ea5y h\u1ecd c\u1ea7m cu\u1ed1n s\u00e1ch tr\u00ean tay, l\u00fac n\u00e0o t\u00f4i c\u0169ng th\u1ea5y h\u1ecd d\u00ednh v\u1edbi chi\u1ebfc \u0111i\u1ec7n tho\u1ea1i.", "c": "Con b\u00e9 c\u00f3 \u0111\u00f4i m\u1eaft to, \u0111en, h\u00e0ng mi cong r\u1ee3p.", "d": "T\u1eeb l\u00fac nh\u00ecn th\u1ea5y c\u00f4 \u1ea5y, anh tr\u1edf n\u00ean l\u00f3ng ngh\u00f3ng h\u1eb3n, \u0111\u1ee5ng \u0111\u00e2u c\u0169ng \u0111\u1ed5.", "bookId": 1088223, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "C\u00e2u n\u00e0o d\u01b0\u1edbi \u0111\u00e2y ch\u1ee9a t\u1eeb vi\u1ebft sai ch\u00ednh t\u1ea3?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- C\u00e2u \u201cT\u1eeb l\u00fac nh\u00ecn th\u1ea5y c\u00f4 \u1ea5y, anh tr\u1edf n\u00ean l\u00f3ng ngh\u00f3ng h\u1eb3n, \u0111\u1ee5ng \u0111\u00e2u c\u0169ng \u0111\u1ed5.\u201d ch\u1ee9a t\u1eeb \u201cngh\u00f3ng\u201d vi\u1ebft sai ch\u00ednh t\u1ea3.<br>\n- S\u1eeda l\u1ea1i: T\u1eeb l\u00fac nh\u00ecn th\u1ea5y c\u00f4 \u1ea5y, anh tr\u1edf n\u00ean l\u00f3ng ng\u00f3ng h\u1eb3n, \u0111\u1ee5ng \u0111\u00e2u c\u0169ng \u0111\u1ed5.\n", "key": "D", "isVideo": true, "score": 0, "order": 14, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21596945, "lessonId": 0, "a": "ng\u00e0n x\u01b0a.", "b": "r\u1ea5t chi l\u00e0.", "c": "c\u1ed5 \u0111i\u1ec3n.", "d": "\u0111\u u1ebfm l\u00e0 s\u1ef1 s\u1ed1ng tr\u00ean Tr\u00e1i \u0111\u1ea5t \u0111\u00e3 b\u1eaft \u0111\u1ea7u t\u1eeb \u0111\u00e2u.</b><br>D\u01b0\u1edbi \u0111\u00e1y \u0111\u1ea1i d\u01b0\u01a1ng, c\u00e1c mi\u1ec7ng phun th\u1ee7y nhi\u1ec7t - nh\u1eefng c\u1ea5u tr\u00fac gi\u1ed1ng nh\u01b0 mi\u1ec7ng n\u00fai l\u1eeda tr\u00ean \u0111\u1ea5t li\u1ec1n - c\u00f3 th\u1ec3 b\u01a1m ra h\u1ed7n h\u1ee3p ch\u1ea5t h\u1eefu c\u01a1 v\u00e0 v\u00f4 c\u01a1, trong \u0111\u00f3 c\u00f3 s\u1eaft sulfide. C\u00e1c nh\u00e0 khoa h\u1ecdc tin r\u1eb1ng kho\u00e1ng ch\u1ea5t n\u00e0y \u0111\u00e3 th\u00fac \u0111\u1ea9y c\u00e1c ph\u1ea3n \u1ee9ng h\u00f3a h\u1ecdc ban \u0111\u1ea7u t\u1ea1o ra s\u1ef1 s\u1ed1ng.<br>Ng\u01b0\u1eddi ta \u0111\u00e3 t\u00ecm th\u1ea5y nh\u1eefng ch\u1ea5t t\u01b0\u01a1ng t\u1ef1 trong c\u00e1c su\u1ed1i n\u01b0\u1edbc n\u00f3ng ng\u00e0y nay, nh\u01b0 su\u1ed1i Grand Prismatic \u1edf v\u01b0\u1eddn qu\u1ed1c gia Yellowstone (M\u1ef9). Su\u1ed1i n\u01b0\u1edbc n\u00f3ng l\u00e0 c\u00e1c kh\u1ed1i n\u01b0\u1edbc ng\u1ea7m \u0111\u01b0\u1ee3c l\u00e0m n\u00f3ng nh\u1edd ho\u1ea1t \u0111\u1ed9ng c\u1ee7a n\u00fai l\u1eeda d\u01b0\u1edbi b\u1ec1 m\u1eb7t Tr\u00e1i \u0110\u1ea5t.<br>Nghi\u00ean c\u1ee9u m\u1edbi \u201cIron sulfide-catalyzed gaseous CO<sub>2</sub> reduction and prebiotic carbon fixation in terrestrial hot springs\u201d, \u0111\u0103ng tr\u00ean t\u1ea1p ch\u00ed <i>Nature Communications</i>, \u0111\u00e3 b\u1ed5 sung th\u00eam b\u1eb1ng ch\u1ee9ng cho th\u1ea5y c\u00e1c su\u1ed1i n\u01b0\u1edbc n\u00f3ng nguy\u00ean th\u1ee7y c\u00f3 vai tr\u00f2 then ch\u1ed1t trong h\u00ecnh th\u00e0nh s\u1ef1 s\u1ed1ng tr\u00ean Tr\u00e1i \u0111\u1ea5t v\u00e0 thu h\u1eb9p c\u00e1c gi\u1ea3 thuy\u1ebft v\u1ec1 n\u01a1i s\u1ef1 s\u1ed1ng b\u1eaft ngu\u1ed3n.<br><b>T\u1eeb \u0111\u1ecba h\u00f3a h\u1ecdc \u0111\u1ebfn sinh h\u1ecdc</b><br>C\u1ed1 \u0111\u1ecbnh carbon l\u00e0 qu\u00e1 tr\u00ecnh c\u00e1c sinh v\u1eadt s\u1ed1ng chuy\u1ec3n \u0111\u1ed5i kh\u00ed cacbonic trong kh\u00f4ng kh\u00ed ho\u1eb7c n\u01b0\u1edbc th\u00e0nh ph\u00e2n t\u1eed h\u1eefu c\u01a1.<br>Nhi\u1ec1u d\u1ea1ng s\u1ed1ng, bao g\u1ed3m th\u1ef1c v\u1eadt, vi khu\u1ea9n v\u00e0 vi sinh v\u1eadt (c\u1ed5 khu\u1ea9n), th\u1ef1c hi\u1ec7n qu\u00e1 tr\u00ecnh n\u00e0y qua nh\u1eefng c\u00e1ch kh\u00e1c nhau, ch\u1eb3ng h\u1ea1n nh\u01b0 quang h\u1ee3p. M\u1ed7i c\u00e1ch \u0111\u1ec1u c\u1ea7n \u0111\u1ebfn m\u1ed9t lo\u1ea1t enzym v\u00e0 protein l\u00e0m x\u00fac t\u00e1c, trong \u0111\u00f3 c\u00f3 nh\u1eefng lo\u1ea1i c\u00f3 l\u00f5i s\u1eaft v\u00e0 l\u01b0u hu\u1ef3nh.<br>Ch\u00fang ta c\u00f3 th\u1ec3 t\u00ecm th\u1ea5y protein ch\u1ee9a li\u00ean k\u1ebft s\u1eaft - sulfur \u1edf m\u1ecdi d\u1ea1ng th\u1ee9c s\u1ed1ng. Th\u1ef1c t\u1ebf, nhi\u1ec1u nh\u00e0 khoa h\u1ecdc \u0111\u1ec1 xu\u1ea5t r\u1eb1ng c\u00e1c protein n\u00e0y c\u00f3 ni\u00ean \u0111\u1ea1i t\u1eeb T\u1ed5 ti\u00ean chung ph\u1ed5 qu\u00e1t cu\u1ed1i c\u00f9ng (Last Universal Common Ancestor) - m\u1ed9t t\u1ebf b\u00e0o t\u1ed5 ti\u00ean c\u1ed5 \u0111\u1ea1i \u0111\u01b0\u1ee3c cho l\u00e0 ngu\u1ed3n g\u1ed1c c\u1ee7a s\u1ef1 s\u1ed1ng nh\u01b0 ch\u00fang ta c\u00f3 hi\u1ec7n nay.<br>S\u1eaft sulfide l\u00e0 kho\u00e1ng ch\u1ea5t h\u00ecnh th\u00e0nh khi s\u1eaft h\u00f2a tan ph\u1ea3n \u1ee9ng v\u1edbi hydro sunfide - kh\u00ed n\u00fai l\u1eeda khi\u1ebfn su\u1ed1i n\u01b0\u1edbc n\u00f3ng c\u00f3 m\u00f9i tr\u1ee9ng th\u1ed1i.<br>N\u1ebfu nh\u00ecn k\u0129 v\u00e0o c\u1ea5u tr\u00fac c\u1ee7a s\u1eaft sulfide, b\u1ea1n s\u1ebd th\u1ea5y m\u1ed9t s\u1ed1 ph\u00e2n t\u1eed tr\u00f4ng r\u1ea5t gi\u1ed1ng v\u1edbi s\u1eaft sulfur.<br>M\u1ed1i quan h\u1ec7 gi\u1eefa s\u1eaft sulfide v\u00e0 c\u1ed1 \u0111\u1ecbnh carbon khi\u1ebfn m\u1ed9t s\u1ed1 nh\u00e0 khoa h\u1ecdc cho r\u1eb1ng c\u00e1c kho\u00e1ng ch\u1ea5t n\u00e0y \u0111\u00f3ng vai tr\u00f2 quan tr\u1ecdng trong qu\u00e1 tr\u00ecnh chuy\u1ec3n t\u1eeb \u0111\u1ecba h\u00f3a h\u1ecdc s\u01a1 khai sang sinh h\u1ecdc c\u1ee7a Tr\u00e1i \u0111\u1ea5t.<br>Nghi\u00ean c\u1ee9u m\u1edbi \u0111\u01b0\u1ee3c c\u00f4ng b\u1ed1 \u0111\u00e3 \u0111\u00f3ng g\u00f3p cho gi\u1ea3 thuy\u1ebft n\u00e0y qua kh\u1ea3o s\u00e1t ho\u1ea1t \u0111\u1ed9ng h\u00f3a h\u1ecdc c\u1ee7a s\u1eaft sulfide trong c\u00e1c su\u1ed1i n\u01b0\u1edbc n\u00f3ng c\u1ed5, c\u00f3 \u0111\u1ecba h\u00f3a h\u1ecdc t\u01b0\u01a1ng t\u1ef1 v\u1edbi c\u00e1c mi\u1ec7ng phun th\u1ee7y nhi\u1ec7t.\u201d<br><div style=\"text-align: right;\">(Di\u1ec5m Qu\u1ef3nh l\u01b0\u1ee3c d\u1ecbch t\u1eeb <i>UNSW Sydney, Kho\u00e1ng ch\u1ea5t trong su\u1ed1i n\u01b0\u1edbc n\u00f3ng tham gia v\u00e0o ph\u1ea3n \u1ee9ng t\u1ea1o n\u00ean s\u1ef1 s\u1ed1ng, theo tiasang.com.vn</i>)</div>", "listQuestion": [{"questionId": 21596997, "lessonId": 0, "a": "Thu\u1ef7 nhi\u1ec7t.", "b": "H\u1ed7n h\u1ee3p ch\u1ea5t h\u1eefu c\u01a1 v\u00e0 v\u00f4 c\u01a1.", "c": "N\u00fai l\u1eeda.", "d": "S\u1eaft sulfide.", "bookId": 1088230, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cC\u00e1c nh\u00e0 khoa h\u1ecdc tin r\u1eb1ng kho\u00e1ng ch\u1ea5t n\u00e0y \u0111\u00e3 th\u00fac \u0111\u1ea9y c\u00e1c ph\u1ea3n \u1ee9ng h\u00f3a h\u1ecdc ban \u0111\u1ea7u t\u1ea1o ra s\u1ef1 s\u1ed1ng.\u201d<br>C\u1ee5m t\u1eeb \u201ckho\u00e1ng ch\u1ea5t n\u00e0y\u201d trong c\u00e2u tr\u00ean thay th\u1ebf cho \u0111\u1ed1i t\u01b0\u1ee3ng n\u00e0o \u0111\u01b0\u1ee3c di\u1ec5n \u0111\u1ea1t tr\u01b0\u1edbc \u0111\u00f3?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nD\u1ef1a v\u00e0o th\u00f4ng tin trong \u0111o\u1ea1n: \u201cD\u01b0\u1edbi \u0111\u00e1y \u0111\u1ea1i d\u01b0\u01a1ng, c\u00e1c mi\u1ec7ng phun th\u1ee7y nhi\u1ec7t - nh\u1eefng c\u1ea5u tr\u00fac gi\u1ed1ng nh\u01b0 mi\u1ec7ng n\u00fai l\u1eeda tr\u00ean \u0111\u1ea5t li\u1ec1n - c\u00f3 th\u1ec3 b\u01a1m ra h\u1ed7n h\u1ee3p ch\u1ea5t h\u1eefu c\u01a1 v\u00e0 v\u00f4 c\u01a1, trong \u0111\u00f3 c\u00f3 s\u1eaft sulfide. C\u00e1c nh\u00e0 khoa h\u1ecdc tin r\u1eb1ng kho\u00e1ng ch\u1ea5t n\u00e0y \u0111\u00e3 th\u00fac \u0111\u1ea9y c\u00e1c ph\u1ea3n \u1ee9ng h\u00f3a h\u1ecdc ban \u0111\u1ea7u t\u1ea1o ra s\u1ef1 s\u1ed1ng.\u201d<br>\n\u2192 C\u1ee5m t\u1eeb \u201ckho\u00e1ng ch\u1ea5t n\u00e0y\u201d trong c\u00e2u thay th\u1ebf cho s\u1eaft sulfide.\n", "key": "D", "isVideo": true, "score": 0, "order": 21, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597007, "lessonId": 0, "a": "C\u00e1c m\u1eabu s\u1eaft sulfide t\u1ed5ng h\u1ee3p \u0111\u1ec1u t\u1ea1o ra methanol - m\u1ed9t s\u1ea3n ph\u1ea9m sau qu\u00e1 tr\u00ecnh c\u1ed1 \u0111\u1ecbnh carbon.", "b": "Ng\u01b0\u1eddi ta \u0111\u00e3 t\u00ecm th\u1ea5y nh\u1eefng ch\u1ea5t t\u01b0\u01a1ng t\u1ef1 s\u1eaft sulfide trong c\u00e1c su\u1ed1i n\u01b0\u1edbc n\u00f3ng ng\u00e0y nay.", "c": "Nhi\u1ec1u d\u1ea1ng s\u1ed1ng, bao g\u1ed3m th\u1ef1c v\u1eadt, vi khu\u1ea9n v\u00e0 vi sinh v\u1eadt th\u1ef1c hi\u1ec7n qu\u00e1 tr\u00ecnh c\u1ed1 \u0111\u1ecbnh carbon b\u1eb1ng c\u00e1ch quang h\u1ee3p.", "d": "Su\u1ed1i n\u01b0\u1edbc n\u00f3ng nguy\u00ean th\u1ee7y c\u00f3 vai tr\u00f2 then ch\u1ed1t trong h\u00ecnh th\u00e0nh s\u1ef1 s\u1ed1ng tr\u00ean Tr\u00e1i \u0111\u1ea5t.", "bookId": 1088231, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Th\u00f4ng tin n\u00e0o kh\u00f4ng c\u00f3 trong \u0111o\u1ea1n tr\u00edch?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch t\u1eadp trung v\u00e0o vai tr\u00f2 c\u1ee7a s\u1eaft sulfide trong qu\u00e1 tr\u00ecnh h\u00ecnh th\u00e0nh s\u1ef1 s\u1ed1ng v\u00e0 c\u1ed1 \u0111\u1ecbnh carbon, nh\u01b0ng kh\u00f4ng \u0111\u1ec1 c\u1eadp \u0111\u1ebfn vi\u1ec7c t\u1ea1o ra methanol t\u1eeb s\u1eaft sulfide.<br>\nC\u00e1c \u0111\u00e1p \u00e1n c\u00f2n l\u1ea1i \u0111\u1ec1u c\u00f3 trong \u0111o\u1ea1n v\u0103n.\n", "key": "A", "isVideo": true, "score": 0, "order": 22, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597010, "lessonId": 0, "a": "S\u1eaft sulfide.", "b": "Cacbonic.", "c": "Hydro sunfide.", "d": "S\u1eaft sulfur.", "bookId": 1088232, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Theo \u0111o\u1ea1n tr\u00edch, ch\u1ea5t n\u00e0o khi\u1ebfn su\u1ed1i n\u01b0\u1edbc n\u00f3ng c\u00f3 m\u00f9i tr\u1ee9ng th\u1ed1i?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>D\u1ef1a v\u00e0o th\u00f4ng tin trong c\u00e2u: \u201cS\u1eaft sulfide l\u00e0 kho\u00e1ng ch\u1ea5t h\u00ecnh th\u00e0nh khi s\u1eaft h\u00f2a tan ph\u1ea3n \u1ee9ng v\u1edbi hydro sunfide - kh\u00ed n\u00fai l\u1eeda khi\u1ebfn su\u1ed1i n\u01b0\u1edbc n\u00f3ng c\u00f3 m\u00f9i tr\u1ee9ng th\u1ed1i.\u201d<br>\u2192 Hydro sunfide khi\u1ebfn su\u1ed1i n\u01b0\u1edbc n\u00f3ng c\u00f3 m\u00f9i tr\u1ee9ng th\u1ed1i.", "key": "C", "isVideo": true, "score": 0, "order": 23, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597052, "lessonId": 0, "a": "C\u00e2u \u0111\u01a1n.", "b": "C\u00e2u m\u1edf r\u1ed9ng th\u00e0nh ph\u1ea7n ch\u1ee7 ng\u1eef.", "c": "C\u00e2u m\u1edf r\u1ed9ng th\u00e0nh ph\u1ea7n v\u1ecb ng\u1eef.", "d": "C\u00e2u gh\u00e9p.", "bookId": 1088233, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cC\u1ed1 \u0111\u1ecbnh carbon l\u00e0 qu\u00e1 tr\u00ecnh c\u00e1c sinh v\u1eadt s\u1ed1ng chuy\u1ec3n \u0111\u1ed5i kh\u00ed cacbonic trong kh\u00f4ng kh\u00ed ho\u1eb7c n\u01b0\u1edbc th\u00e0nh ph\u00e2n t\u1eed h\u1eefu c\u01a1.\u201d<br>C\u00e2u tr\u00ean thu\u1ed9c ki\u1ec3u c\u00e2u n\u00e0o sau \u0111\u00e2y?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u00e2u \u201cC\u1ed1 \u0111\u1ecbnh carbon l\u00e0 qu\u00e1 tr\u00ecnh c\u00e1c sinh v\u1eadt s\u1ed1ng chuy\u1ec3n \u0111\u1ed5i kh\u00ed cacbonic trong kh\u00f4ng kh\u00ed ho\u1eb7c n\u01b0\u1edbc th\u00e0nh ph\u00e2n t\u1eed h\u1eefu c\u01a1.\u201d l\u00e0 c\u00e2u m\u1edf r\u1ed9ng th\u00e0nh ph\u1ea7n v\u1ecb ng\u1eef. V\u1ecb ng\u1eef \u0111\u01b0\u1ee3c m\u1edf r\u1ed9ng b\u1eb1ng m\u1ed9t c\u1ee5m ch\u1ee7 - v\u1ecb \u201cc\u00e1c sinh v\u1eadt s\u1ed1ng chuy\u1ec3n \u0111\u1ed5i kh\u00ed cacbonic trong kh\u00f4ng kh\u00ed ho\u1eb7c n\u01b0\u1edbc th\u00e0nh ph\u00e2n t\u1eed h\u1eefu c\u01a1.\u201d.", "key": "C", "isVideo": true, "score": 0, "order": 24, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597056, "lessonId": 0, "a": "Ngh\u1ecb lu\u1eadn.", "b": "Th\u00f4ng tin.", "c": "V\u0103n h\u1ecdc.", "d": "T\u1ef1 s\u1ef1.", "bookId": 1088234, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u0110o\u1ea1n tr\u00edch tr\u00ean thu\u1ed9c ki\u1ec3u lo\u1ea1i v\u0103n b\u1ea3n n\u00e0o?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch cung c\u1ea5p th\u00f4ng tin v\u1ec1 s\u1ef1 h\u00ecnh th\u00e0nh s\u1ef1 s\u1ed1ng, vai tr\u00f2 c\u1ee7a s\u1eaft sulfide, v\u00e0 c\u1ed1 \u0111\u1ecbnh carbon.<br>\n\u2192 \u0110o\u1ea1n tr\u00edch thu\u1ed9c ki\u1ec3u v\u0103n b\u1ea3n th\u00f4ng tin.\n", "key": "B", "isVideo": true, "score": 0, "order": 25, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 26 \u0111\u1ebfn 30", "content": "\u201cNh\u01b0ng ch\u1ec9 khi \u0111\u1ebfn tr\u01b0\u1edbc c\u1eeda ch\u1ee3 \u0110\u1ed3ng Xu\u00e2n th\u00ec l\u00e3o Kh\u00fang m\u1edbi c\u1ea3m th\u1ea5y th\u1ef1c s\u1ef1 \u0111\u00e3 \u0111\u1ebfn H\u00e0 N\u1ed9i. L\u00e3o t\u1ee7m t\u1ec9m c\u01b0\u1eddi m\u1ed9t m\u00ecnh trong khi li\u1ebfc qua m\u1ed9t \u0111\u00e1m con g\u00e1i m\u1eb7t hoa da ph\u1ea5n, nh\u01b0ng c\u00e1i ch\u00fang \u0111ang x\u00e1ch tr\u00ean tay th\u00ec v\u1eabn l\u00e0 c\u00e1i qu\u00e1 t\u1ea7m th\u01b0\u1eddng: h\u0169 n\u01b0\u1edbc m\u1eafm, d\u00fam mu\u1ed1i, m\u1edb rau, con c\u00e1... Th\u00ec h\u00f3a ra c\u00e1i \u0111\u00e1m ng\u01b0\u1eddi \u1ebbo l\u1ea3 nh\u01b0 ng\u1ecdn c\u1ecf may n\u00e0y c\u0169ng kh\u00f4ng ph\u1ea3i ch\u1ec9 \u0111i d\u1ea1o, m\u00e0 c\u0169ng ph\u1ea3i \u0103n u\u1ed1ng. \u201c\u1ea4y, ai sinh ra c\u00e1i \u00f4ng tr\u1eddi k\u1ec3 c\u0169ng t\u00e0i th\u1ef1c - l\u00e3o Kh\u00fang v\u1eabn t\u1ee7m t\u1ec9m c\u01b0\u1eddi v\u00e0 b\u1ea5t gi\u00e1c ngh\u0129 - \u00f4ng tr\u1eddi l\u00e0m ra con ng\u01b0\u1eddi \u201cb\u00e1ch nh\u00e2n b\u00e1ch t\u00ednh\u201d nh\u01b0ng \u00f4ng tr\u1eddi l\u1ea1i kh\u00e9o cho con ng\u01b0\u1eddi m\u1ed9t c\u00e1i n\u1ebft m\u00e0 ai c\u0169ng ph\u1ea3i c\u00f3: \u0111\u00f3 l\u00e0 c\u00e1i vi\u1ec7c \u0103n. H\u00f3a ra c\u00e1i anh d\u00e2n H\u00e0 N\u1ed9i n\u00e0y c\u0169ng ph\u1ea3i \u0103n. Cho n\u00ean m\u1edbi sinh ra c\u00e1i ch\u1ee3 \u0110\u1ed3ng Xu\u00e2n n\u00e0y to nh\u01b0 th\u1ebf!\u201d<br>Hai tai l\u00e3o ch\u1eb3ng m\u1ea5y ch\u1ed1c \u0111\u00e3 \u00f9 \u0111\u1eb7c v\u00ec ti\u1ebfng \u1ed3n. M\u1eaft l\u00e3o c\u0169ng hoa l\u00ean v\u00ec tr\u0103m th\u1ee9 h\u00e0ng h\u00f3a ch\u1ea5t \u0111\u1ed1ng. \u0110\u00e3 t\u1eebng leo h\u1ebft qu\u1ea3 n\u00fai n\u00e0y \u0111\u1ebfn qu\u1ea3 n\u00fai kh\u00e1c, v\u1eady m\u00e0 m\u1edbi loanh quanh trong ch\u1ee3, c\u1eb7p gi\u00f2 nh\u01b0 hai c\u00e1i tr\u1ee5c b\u00e1nh xe c\u1ee7a l\u00e3o \u0111\u00e3 m\u1ecfi l\u00e0 sao?<br>\u0110\u1ec3 tr\u00e1nh kh\u1ecfi m\u1ea5t c\u1eafp, \u0110\u1ecbnh b\u1eaft Kh\u00fang trao g\u00f3i ti\u1ec1n cho m\u00ecnh gi\u1eef. Mua th\u1ee9 g\u00ec, anh t\u1ef1 \u0111\u1ebfm ti\u1ec1n tr\u1ea3. M\u00e0 nh\u1eefng th\u1ee9 \u00f4ng ch\u00e1u mu\u1ed1n mua th\u00ec nhi\u1ec1u l\u1eafm. C\u00e1i g\u00ec Kh\u00fang tr\u00f4ng th\u1ea5y, l\u00e0 th\u1ea5y \u1edf nh\u00e0 m\u00ecnh c\u1ea7n. M\u00e0 c\u00e1i g\u00ec c\u0169ng r\u1ebb h\u01a1n \u1edf nh\u00e0 m\u1ed9t gi\u00e1. Th\u1ebf m\u00e0 n\u00e0o l\u00e3o c\u00f3 bi\u1ebft? Su\u1ed1t \u0111\u1eddi l\u00e3o ch\u1ec9 ch\u00fai m\u0169i v\u00e0o h\u00f2n \u0111\u1ea5t.<br>Khi b\u01b0\u1edbc ra tr\u01b0\u1edbc v\u00f2m cu\u1ed1n c\u1eeda ch\u1ee3, hai ch\u00fa ch\u00e1u nh\u00e0 \u1ea5y \u0111\u00e3 y nh\u01b0 hai nh\u00e0 phi c\u00f4ng v\u0169 tr\u1ee5. Th\u1ebf m\u00e0 v\u1eabn th\u1ea5y c\u00f2n m\u1ed9t \u0111\u00e1m ng\u01b0\u1eddi ch\u1ea1y theo d\u00fai v\u00e0o t\u1eadn ng\u1ef1c h\u1ecd \u0111\u1ee7 m\u1ecdi th\u1ee9 khi\u1ebfn l\u00e3o Kh\u00fang c\u1ee9 \u0111\u1ee9ng c\u01b0\u1eddi ng\u1ea5t.<br>Ch\u1ec9 trong m\u1ed9t ng\u00e0y l\u00e3o \u0111\u00e3 khu\u00e2n v\u1ec1 b\u00e0y l\u1ee7ng ng\u1ee7ng kh\u1eafp gian nh\u00e0 \u201ch\u1eb9p b\u1eb1ng c\u00e1i l\u1ed7 m\u0169i\u201d c\u1ee7a \u00f4ng ch\u00fa n\u00e0o v\u00e0nh, khung v\u00e0 l\u1ed1p xe \u0111\u1ea1p, xanh, n\u1ed3i, h\u00e0ng m\u1ea5y y\u1ebfn h\u00e0nh l\u00e0m gi\u1ed1ng, h\u1ea1t c\u00e0 chua v\u00e0 h\u1ea1t b\u1eafp c\u1ea3i gi\u1ed1ng, v\u00e0 qu\u1ea7n \u00e1o cho \u0111\u1ee9a l\u1edbn, \u0111\u1ee9a b\u00e9, cho v\u1ee3...<br>Nh\u01b0ng \u0111\u1ea5y c\u0169ng ch\u1ec9 l\u00e0 m\u1ea5y th\u1ee9 v\u1eb7t. Trong chuy\u1ebfn \u0111i ra Th\u1ee7 \u0111\u00f4 l\u1ea7n n\u00e0y l\u00e3o \u0111\u00e3 r\u1eafp t\u00e2m t\u1eeb \u1edf nh\u00e0 m\u1ed9t \u00fd \u0111\u1ed3 l\u1edbn h\u01a1n nhi\u1ec1u. L\u00e3o s\u1ebd t\u1eadp trung ti\u1ec1n mua m\u1ed9t b\u1ed9 tr\u1ee5c, v\u00e0nh v\u00e0 x\u0103m l\u1ed1p \u00f4 t\u00f4, \u0111\u1ec3 \u201cl\u00ean\u201d m\u1ed                              boxesHtml += `<button onclick="checkFillAnswer('${qKey}')" class="ml-2 px-3 py-2 bg-blue-100 text-blue-700 font-bold rounded-lg text-sm hover:bg-blue-200 transition-colors">Kiểm tra</button>`;
                             // Nút xem lời giải cho practice
                             boxesHtml += `<button onclick="toggleSolution('${qKey}')" class="ml-2 px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button>`;
                        }
                        boxesHtml += '</div>';

                        let feedbackHtml = "";
                        if(isSubmitted) {
                             const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                             if(isCorrect) {
                                feedbackHtml = `<div class="mt-2 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                             } else {
                                feedbackHtml = `<div class="mt-2 text-red-600 text-sm">✗ Sai. Đáp án: <span class="font-bold">${correctVal}</span></div>`;
                             }
                        } else if (examMode === 'practice') {
                             feedbackHtml = `<div id="feedback-${qKey}" class="mt-2 text-sm font-bold hidden"></div>`;
                        }

                        html += `
                        <div class="flex flex-col relative">
                            ${boxesHtml}
                            ${feedbackHtml}
                        </div>`;
                    }

                    // TYPE 2: TRUE/FALSE
                    else if(qType === '2') {
                         html += `<div class="overflow-hidden border rounded-lg">
                            <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                                <tr>
                                    <th scope="col" class="px-3 py-3 w-10 text-center">Ý</th>
                                    <th scope="col" class="px-3 py-3">Nội dung</th>
                                    <th scope="col" class="px-3 py-3 w-32 text-center">Chọn Đ/S</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; 
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; 
                                const userChoice = userObj[pIdx]; 
                                
                                let trClass = "bg-white hover:bg-gray-50";
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) trClass = "bg-green-50";
                                    else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
