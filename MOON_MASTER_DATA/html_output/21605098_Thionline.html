a3 c\u1ea3nh l\u0169 \u1edf s\u00f4ng.", "c": "T\u00e1i hi\u1ec7n c\u1ea3nh t\u01b0\u1ee3ng n\u01b0\u1edbc t\u1eeb th\u01b0\u1ee3ng ngu\u1ed3n \u0111\u1ed5 v\u1ec1 v\u00e0 cu\u1ed1n tr\u00f4i t\u1ea5t c\u1ea3.", "d": "Mi\u00eau t\u1ea3 nh\u1eefng \u0111\u00e0n c\u00e1 tr\u00f4i ra bi\u1ec3n theo con n\u01b0\u1edbc.", "bookId": 1088935, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cB\u1ed1n th\u00e1ng n\u01b0\u1edbc r\u00fat<br><br>B\u1ed1n th\u00e1ng n\u01b0\u1edbc xu\u00f4i<br><br>N\u01b0\u1edbc ch\u00edn \u0111\u1ed3i \u0111\u1ed5 v\u1ec1 m\u1ed9t bi\u1ec3n<br><br>N\u01b0\u1edbc m\u01b0\u1eddi \u0111\u1ed3i \u0111\u1ed5 v\u1ec1 m\u1ed9t s\u00f4ng<br><br>N\u01b0\u1edbc l\u00e0m kh\u00f3 l\u00e0m d\u1ec5<br><br>X\u1edbi \u0111\u1ea5t \u0111en l\u00ean b\u1eb1ng mi\u1ec7ng ang<br><br>X\u1edbi \u0111\u1ea5t v\u00e0ng l\u00ean b\u1eb1ng mi\u1ec7ng th\u00fang<br><br>Tr\u00f4i \u0111\u00e0n cua \u0111\u00e1<br><br>Tr\u00f4i \u0111\u00e0n ba ba \u0111i th\u0103m su\u1ed1i<br><br>Tr\u00f4i \u0111\u00e0n c\u00e1 chu\u1ed1i \u0111i th\u0103m v\u1ef1c<br><br>Tr\u00f4i \u0111\u00e0n n\u00f2ng n\u1ecdc \u0111i th\u0103m \u0111\u1ea7m<br><br>Tr\u00f4i \u0111\u00e0n c\u00e1 c\u01a1m \u0111i ra b\u1ec3 r\u1ed9ng\u201d</i><br><br>(S\u1eed thi d\u00e2n t\u1ed9c M\u01b0\u1eddng, <i>\u0110\u1ebb \u0111\u1ea5t \u0111\u1ebb n\u01b0\u1edbc</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)<br><br>N\u1ed9i dung ch\u00ednh c\u1ee7a \u0111o\u1ea1n tr\u00edch tr\u00ean l\u00e0 g\u00ec?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\n\u0110o\u1ea1n tr\u00edch mi\u00eau t\u1ea3 c\u1ea3nh t\u01b0\u1ee3ng n\u01b0\u1edbc l\u0169 t\u1eeb th\u01b0\u1ee3ng ngu\u1ed3n \u00e0o \u1ea1t tu\u00f4n \u0111\u1ed5, cu\u1ed1n tr\u00f4i m\u1ecdi th\u1ee9 tr\u00ean \u0111\u01b0\u1eddng \u0111i, t\u1eeb \u0111\u1ea5t \u0111ai, c\u00e2y c\u1ed1i \u0111\u1ebfn c\u00e1c lo\u00e0i \u0111\u1ed9ng v\u1eadt (<i>N\u01b0\u1edbc ch\u00edn \u0111\u1ed3i \u0111\u1ed5 v\u1ec1 m\u1ed9t bi\u1ec3n/ N\u01b0\u1edbc m\u01b0\u1eddi \u0111\u1ed3i \u0111\u1ed5 v\u1ec1 m\u1ed9t s\u00f4ng/ Tr\u00f4i \u0111\u00e0n cua \u0111\u00e1/ Tr\u00f4i \u0111\u00e0n ba ba \u0111i th\u0103m su\u1ed1i\u2026</i>).\n", "key": "C", "isVideo": true, "score": 0, "order": 2, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605116, "lessonId": 0, "a": "Ph\u00e9p \u0111\u1ed1i r\u1ea5t ch\u1ec9nh: \u201ctr\u00ean gh\u1ebf - d\u01b0\u1edbi s\u00e2n\u201d, \u201cb\u00e0 \u0111\u1ea7m - \u00f4ng c\u1eed\u201d, \u201cngoi \u0111\u00edt v\u1ecbt - ng\u1ecfng \u0111\u1ea7u r\u1ed3ng\u201d.", "b": "Ch\u1ed1n tr\u01b0\u1eddng thi b\u1ecb m\u1ea5t \u0111i s\u1ef1 uy nghi\u00eam v\u00ec s\u1ef1 xu\u1ea5t hi\u1ec7n c\u1ee7a b\u00e0 \u0111\u1ea7m.", "c": "Ph\u00e9p \u0111\u1ed1i g\u00f3p ph\u1ea7n h\u1ea1 b\u1ec7 h\u00ecnh t\u01b0\u1ee3ng \u00f4ng c\u1eed, khi\u1ebfn \u0111\u1ea5ng nam t\u1eed c\u00f3 ch\u1eef ngh\u0129a tr\u1edf n\u00ean th\u1ea3m h\u1ea1i.", "d": "Ph\u00e9p \u0111\u1ed1i (\u201c\u00f4ng c\u1eed - b\u00e0 \u0111\u1ea7m\u201d) g\u00f3p ph\u1ea7n n\u00e2ng t\u1ea7m v\u1ecb th\u1ebf sang tr\u1ecdng c\u1ee7a \u00f4ng c\u1eed.", "bookId": 1088936, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cM\u1ed9t \u0111\u00e0n th\u1eb1ng h\u1ecfng \u0111\u1ee9ng m\u00e0 tr\u00f4ng,<br><br>N\u00f3 \u0111\u1ed7 khoa n\u00e0y  c\u00f3 s\u01b0\u1edbng kh\u00f4ng!<br><br>Tr\u00ean gh\u1ebf b\u00e0 \u0111\u1ea7m ngoi \u0111\u00edt v\u1ecbt,<br><br>D\u01b0\u1edbi s\u00e2n \u00f4ng c\u1eed ng\u1ecfng \u0111\u1ea7u r\u1ed3ng.\u201d</i><br><div style=\"text-align: right;\">(Tr\u1ea7n T\u1ebf X\u01b0\u01a1ng, <i>Gi\u1ec5u ng\u01b0\u1eddi thi \u0111\u1ed7</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div><br>Nh\u1eadn x\u00e9t n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>\u0111\u00fang v\u1edbi hai c\u00e2u k\u1ebft c\u1ee7a b\u00e0i th\u01a1?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nHai c\u00e2u th\u01a1 s\u1eed d\u1ee5ng ph\u00e9p \u0111\u1ed1i r\u1ea5t ch\u1ec9nh, nh\u01b0ng kh\u00f4ng nh\u1eb1m n\u00e2ng t\u1ea7m v\u1ecb th\u1ebf c\u1ee7a \u00f4ng c\u1eed m\u00e0 \u0111\u1ec3 gi\u1ec5u c\u1ee3t, ch\u00e2m bi\u1ebfm v\u00e0 h\u1ea1 th\u1ea5p h\u00ecnh t\u01b0\u1ee3ng n\u00e0y. \u201cB\u00e0 \u0111\u1ea7m ngoi \u0111\u00edt v\u1ecbt\u201d g\u1ee3i h\u00ecnh \u1ea3nh k\u1ec7ch c\u1ee1m c\u1ee7a b\u00e0 \u0111\u1ea7m v\u00e0 s\u1ef1 xu\u1ea5t hi\u1ec7n kh\u00f4ng \u0111\u00fang n\u01a1i ch\u1ed1n c\u1ee7a b\u00e0 ta (th\u1eddi x\u01b0a, ch\u1ed1n tr\u01b0\u1eddng thi v\u1ed1n l\u00e0 n\u01a1i v\u1ed1n trang nghi\u00eam, kh\u00f4ng ph\u1ea3i n\u01a1i \u0111\u1ec3 \u0111\u00e0n b\u00e0 con g\u00e1i xu\u1ea5t hi\u1ec7n) c\u00f2n \u201c\u1ed5ng c\u1eed ng\u1ecfng \u0111\u1ea7u r\u1ed3ng\u201d l\u1ea1i mang \u00fd m\u1ec9a mai \u00f4ng c\u1eed kh\u00f4ng c\u00f3 phong th\u00e1i \u0111\u0129nh \u0111\u1ea1c m\u00e0 k\u00e9m c\u1ecfi. (\u201c\u00d4ng c\u1eed\u201d - k\u1ebb s\u0129 th\u1eddi phong ki\u1ebfn b\u1ecb \u0111em \u0111\u1ed1i v\u1edbi \u201cb\u00e0 \u0111\u1ea7m\u201d, gh\u00ea g\u1edbm h\u01a1n \u201c\u0111\u1ea7u r\u1ed3ng\u201d \u0111em \u0111\u1ed1i v\u1edbi \u201c\u0111\u00edt v\u1ecbt\u201d, \u0111\u00f3 l\u00e0 c\u00e1ch Tr\u1ea7n T\u1ebf X\u01b0\u01a1ng ph\u01a1i b\u00e0y s\u1ef1 xu\u1ed1ng c\u1ea5p c\u1ee7a n\u1ec1n n\u1ebfp, tr\u1eadt t\u1ef1 x\u00e3 h\u1ed9i phong ki\u1ebfn \u0111\u01b0\u01a1ng th\u1eddi.)\n", "key": "D", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605122, "lessonId": 0, "a": "Ham l\u00e0m ph\u00fac.", "b": "\u0110\u1ea5t b\u1eb1ng ph\u1eb3ng, n\u01b0\u1edbc trong v\u1eaft, c\u00e2y c\u1ed1i t\u01b0\u01a1i t\u1ed1t, phong t\u1ee5c ch\u1ea5t ph\u00e1c.", "c": "Ng\u00e0y \u0111\u00eam \u0111\u1ed1t h\u01b0\u01a1ng ph\u1ee5ng th\u1edd Tr\u1eddi Ph\u1eadt.", "d": "Ch\u0103m l\u00e0m \u0111i\u1ec1u thi\u1ec7n.", "bookId": 1088937, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTh\u00f4n An Th\u00e1i, x\u00e3 V\u00e2n C\u00e1t l\u00e0 m\u1ed9t l\u00e0ng n\u1ed5i ti\u1ebfng \u1edf huy\u1ec7n Thi\u00ean B\u1ea3n . \u0110\u1ea5t b\u1eb1ng ph\u1eb3ng, n\u01b0\u1edbc trong v\u1eaft, c\u00e2y c\u1ed1i t\u01b0\u01a1i t\u1ed1t, phong t\u1ee5c ch\u1ea5t ph\u00e1c. Trong l\u00e0ng \u1ea5y c\u00f3 L\u00ea Th\u00e1i C\u00f4ng ch\u0103m l\u00e0m \u0111i\u1ec1u thi\u1ec7n. Th\u01b0\u1eddng ng\u00e0y \u0111\u00eam \u0111\u1ed1t h\u01b0\u01a1ng ph\u1ee5ng th\u1edd Tr\u1eddi Ph\u1eadt, d\u1ea7u g\u1eb7p khi b\u1eadn vi\u1ec7c, c\u0169ng kh\u00f4ng qu\u00ean nh\u00e3ng vi\u1ec7c l\u1ec5 b\u00e1i. T\u00ednh C\u00f4ng l\u1ea1i ham l\u00e0m ph\u00fac.\u201d</i><br><div style=\"text-align: right;\">(\u0110o\u00e0n Th\u1ecb \u0110i\u1ec3m, <i>Truy\u1ec7n n\u1eef th\u1ea7n \u1edf V\u00e2n C\u00e1t</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 6, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div><br>Chi ti\u1ebft n\u00e0o sau \u0111\u00e2y kh\u00f4ng gi\u1edbi thi\u1ec7u nh\u00e2n v\u1eadt L\u00ea Th\u00e1i C\u00f4ng?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nChi ti\u1ebft \u201c\u0110\u1ea5t b\u1eb1ng ph\u1eb3ng, n\u01b0\u1edbc trong v\u1eaft, c\u00e2y c\u1ed1i t\u01b0\u01a1i t\u1ed1t, phong t\u1ee5c ch\u1ea5t ph\u00e1c\u201d mi\u00eau t\u1ea3 v\u1ec1 l\u00e0ng An Th\u00e1i, n\u01a1i L\u00ea Th\u00e1i C\u00f4ng sinh s\u1ed1ng, kh\u00f4ng ph\u1ea3i gi\u1edbi thi\u1ec7u v\u1ec1 nh\u00e2n v\u1eadt L\u00ea Th\u00e1i C\u00f4ng.\n", "key": "B", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605127, "lessonId": 0, "a": "Th\u1ec3 hi\u1ec7n m\u01a1 \u01b0\u1edbc ngao du s\u01a1n thu\u1ef7, tho\u1ea3 ch\u00ed tang b\u1ed3ng.", "b": "B\u1ed9c l\u1ed9 l\u00f2ng y\u00eau n\u01b0\u1edbc, kh\u00e1t v\u1ecdng t\u1eadn trung v\u1edbi tri\u1ec1u \u0111\u1ea1i.", "c": "N\u1ed7i ti\u1ebfc nu\u1ed1i th\u1eddi gian.", "d": "B\u1ed9c l\u1ed9 ch\u00ed l\u00e0m trai (kh\u00e1t v\u1ecdng l\u00e0m n\u00ean s\u1ef1 nghi\u1ec7p l\u1edbn) c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh.", "bookId": 1088938, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTh\u00f4ng minh nh\u1ea5t nam t\u1eed,<br><br>Y\u1ebfu vi thi\u00ean h\u1ea1 k\u00ec .<br><br>Tr\u00f3t sinh ra th\u1eddi ph\u1ea3i c\u00f3 chi chi,<br><br>Ch\u1eb3ng l\u1ebd ti\u00eau l\u01b0ng ba v\u1ea1n s\u00e1u? \u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n C\u00f4ng Tr\u1ee9, <i>Ch\u00ed nam nhi</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div><br>N\u1ed9i dung ch\u00ednh c\u1ee7a \u0111o\u1ea1n th\u01a1 l\u00e0 g\u00ec?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nB\u00e0i th\u01a1 <i>Ch\u00ed nam nhi</i> c\u1ee7a Nguy\u1ec5n C\u00f4ng Tr\u1ee9 th\u1ec3 hi\u1ec7n t\u01b0 t\u01b0\u1edfng \u201cch\u00ed l\u00e0m trai\u201d, m\u1ed9t quan ni\u1ec7m ph\u1ed5 bi\u1ebfn x\u00e3 h\u1ed9i phong ki\u1ebfn n\u00f3i chung v\u00e0 trong v\u0103n h\u1ecdc trung \u0111\u1ea1i n\u00f3i ri\u00eang, kh\u1eb3ng \u0111\u1ecbnh nam nhi ph\u1ea3i l\u00e0m n\u00ean s\u1ef1 nghi\u1ec7p l\u1edbn, kh\u1eb3ng \u0111\u1ecbnh gi\u00e1 tr\u1ecb b\u1ea3n th\u00e2n \u0111\u1ec3 kh\u00f4ng u\u1ed5ng ph\u00ed cu\u1ed9c \u0111\u1eddi.\n", "key": "D", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605133, "lessonId": 0, "a": "N\u00f3 c\u1ea3m th\u1ea5y m\u00ecnh s\u1eafp ch\u1ebft t\u1edbi n\u01a1i.", "b": "C\u1eadu nh\u1ecf c\u1ea3m th\u1ea5y phi\u1ec1n.", "c": "D\u00ec The h\u00e1t \u1ea7u \u01a1 cho t\u1ee5i b\u00fap b\u00ea n\u1eb1m v\u00f5ng vang c\u1ea3 ph\u1ed1 tr\u01b0a.", "d": "Th\u1eb1ng nh\u1ecf th\u1edf kh\u00f4ng ra h\u01a1i.", "bookId": 1088939, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cC\u1eadu nh\u1ecf c\u1ea3m th\u1ea5y phi\u1ec1n, b\u1edfi ng\u01b0\u1eddi cha di\u1ec5n tr\u00f2 c\u1ea5t v\u00f3 ngo\u00e0i s\u00f4ng, b\u1edfi d\u00ec The h\u00e1t \u1ea7u \u01a1 cho t\u1ee5i b\u00fap b\u00ea n\u1eb1m v\u00f5ng vang c\u1ea3 ph\u1ed1 tr\u01b0a, c\u0169ng l\u00e0 di\u1ec5n \u0111\u1ec3 cho du kh\u00e1ch ch\u1ea1nh l\u00f2ng quay l\u1ea1i ch\u01a1i \u1edf c\u00e1i l\u00e0ng c\u1ed5. Ch\u00e1n ch\u1ebft \u0111\u01b0\u1ee3c khi ng\u00f3 ng\u01b0\u1eddi l\u00e0ng c\u1ea3 ng\u00e0y h\u1edd h\u1eefng, k\u1ec7 kh\u00e1ch l\u1ea1i qua tr\u01b0\u1edbc ti\u1ec7m l\u1ee5a nh\u00e0 m\u00ecnh, n\u1ebfu tay kh\u00f4ng ve v\u1eaby qu\u1ea1t th\u00ec ch\u1eb3ng kh\u00e1c n\u00e0o t\u01b0\u1ee3ng \u0111\u00e1. Ngay nh\u1eefng \u0111\u1ee9a c\u00f9ng trang l\u1ee9a v\u1edbi n\u00f3 nh\u01b0 con H\u01b0\u01a1ng c\u0169ng t\u1ef1 bu\u1ed9c tu\u1ed5i m\u01b0\u1eddi b\u1ed1n v\u00e0o khung d\u1ec7t chi\u1ebfu, ch\u1eafp tr\u00e2n \u0111\u1ed1 c\u00f3 m\u1eafc l\u1ed7i n\u00e0o. Nh\u1eefng tr\u01b0a \u0111i theo c\u00e1i b\u00f3ng c\u1ee7a ch\u00ednh m\u00ecnh d\u1ecdc theo \u0111\u01b0\u1eddng ch\u00ednh c\u1ee7a l\u00e0ng, kh\u00f4ng kh\u00ed \u0111\u1ecdng v\u0169ng \u0111\u1ebfn n\u1ed7i th\u1eb1ng nh\u1ecf th\u1edf kh\u00f4ng ra h\u01a1i. N\u00f3 c\u1ea3m th\u1ea5y m\u00ecnh s\u1eafp ch\u1ebft t\u1edbi n\u01a1i.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Ng\u1ecdc T\u01b0, <i>Ti\u1ec1u tu\u1ef5 v\u00f2ng quanh</i>, theo <i>Kh\u00f4ng ai qua s\u00f4ng</i>, NXB Tr\u1ebb, 2016)</div><br>Chi ti\u1ebft n\u00e0o l\u00e0 c\u1ea3nh di\u1ec5n c\u1ee7a con ng\u01b0\u1eddi \u0111\u1ec3 n\u00edu kh\u00e1ch du l\u1ecbch quay l\u1ea1i ch\u01a1i v\u1edbi l\u00e0ng?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nD\u1ef1a v\u00e0o chi ti\u1ebft: \u201cC\u1eadu nh\u1ecf c\u1ea3m th\u1ea5y phi\u1ec1n, b\u1edfi ng\u01b0\u1eddi cha di\u1ec5n tr\u00f2 c\u1ea5t v\u00f3 ngo\u00e0i s\u00f4ng, b\u1edfi d\u00ec The h\u00e1t \u1ea7u \u01a1 cho t\u1ee5i b\u00fap b\u00ea n\u1eb1m v\u00f5ng vang c\u1ea3 ph\u1ed1 tr\u01b0a, c\u0169ng l\u00e0 di\u1ec5n \u0111\u1ec3 cho du kh\u00e1ch ch\u1ea1nh l\u00f2ng quay l\u1ea1i ch\u01a1i \u1edf c\u00e1i l\u00e0ng c\u1ed5.\u201d<br>\n\u2192 Chi ti\u1ebft \u201cd\u00ec The h\u00e1t \u1ea7u \u01a1 cho t\u1ee5i b\u00fap b\u00ea n\u1eb1m v\u00f5ng vang c\u1ea3 ph\u1ed1 tr\u01b0a\u201d l\u00e0 c\u1ea3nh di\u1ec5n c\u1ee7a con ng\u01b0\u1eddi \u0111\u1ec3 n\u00edu kh\u00e1ch du l\u1ecbch quay l\u1ea1i ch\u01a1i v\u1edbi l\u00e0ng.\n", "key": "C", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605138, "lessonId": 0, "a": "Chi\u1ebfn tranh.", "b": "G\u1eb7p g\u1ee1.", "c": "Chia li.", "d": "Qu\u00ea h\u01b0\u01a1ng.", "bookId": 1088940, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cH\u00f4m nay d\u01b0\u1edbi b\u1ebfn xu\u00f4i \u0111\u00f2<br><br>Th\u01b0\u01a1ng nhau qua c\u1eeda t\u00f2 v\u00f2 nh\u00ecn nhau<br><br>Anh \u0111i \u0111\u1ea5y, anh v\u1ec1 \u0111\u00e2u?<br><br>C\u00e1nh bu\u1ed3m n\u00e2u, c\u00e1nh bu\u1ed3m n\u00e2u, c\u00e1nh bu\u1ed3m...\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n B\u00ednh, <i>Kh\u00f4ng \u0111\u1ec1</i>, theo <i>Nguy\u1ec5n B\u00ednh th\u01a1 v\u00e0 \u0111\u1eddi</i>, NXB V\u0103n h\u1ecdc, 2003)</div><br>B\u00e0i th\u01a1 \u0111\u01b0\u1ee3c vi\u1ebft theo \u0111\u1ec1 t\u00e0i n\u00e0o?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nB\u00e0i th\u01a1 g\u1ee3i l\u00ean khung c\u1ea3nh ti\u1ec5n bi\u1ec7t, b\u1ed9c l\u1ed9 c\u1ea3m x\u00fac bu\u1ed3n th\u01b0\u01a1ng, ti\u1ebfc nu\u1ed1i c\u1ee7a hai ng\u01b0\u1eddi khi ph\u1ea3i xa c\u00e1ch nhau.\n", "key": "C", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605143, "lessonId": 0, "a": "Li\u00ean.", "b": "Mai.", "c": "Huy.", "d": "Ng\u01b0\u1eddi k\u1ec3 chuy\u1ec7n to\u00e0n tri.", "bookId": 1088941, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cLi\u00ean \u0111\u1ee9ng d\u1eady g\u1ecdi Sen l\u1ea5y th\u00eam b\u00e1t \u0111\u0169a, m\u1eddi Mai v\u00e0 Huy c\u00f9ng ng\u1ed3i \u0103n. Hai ch\u1ecb em ch\u1ec9 \u0103n cho xong b\u1eefa, ch\u1ee9 ch\u1eb3ng chuy\u1ec7n tr\u00f2 g\u00ec, v\u00ec h\u00ecnh nh\u01b0 c\u00f3 m\u1ed9t l\u1ea7n kh\u00f4ng kh\u00ed l\u00e3nh \u0111\u1ea1m \u0111\u01b0\u01a1ng bao b\u1ecdc l\u1ea5y c\u00e1i b\u00e0n, Mai ng\u1eafm ba ch\u1ecb em con \u00f4ng Ph\u00e1n t\u1eeb c\u1eed ch\u1ec9 cho ch\u00ed ng\u00f4n ng\u1eef \u0111\u1ed1i v\u1edbi m\u00ecnh kh\u00f4ng c\u00f3 ch\u00fat th\u00e2n m\u1eadt, n\u00ean h\u1ecd h\u1ecfi c\u00e2u n\u00e0o ch\u1ecb tr\u1ea3 l\u1eddi cho qua qu\u00fdt m\u00e0 th\u00f4i. C\u00f2n Huy th\u00ec b\u1ea3n t\u00ednh v\u1eabn vui \u0111\u00f9a \u0111\u1ea5y, nh\u01b0ng l\u1ea7n n\u00e0y tr\u00ed ngh\u0129 b\u1eadn loay hoay \u0111\u1ebfn v\u1ea5n \u0111\u1ec1 ti\u1ec1n \u0103n h\u1ecdc n\u00ean c\u1eadu c\u00f3 v\u1ebb t\u01b0 l\u1ef1 phi\u1ec1n mu\u1ed9n.\u201d</i><br><div style=\"text-align: right;\">(Kh\u00e1i H\u01b0ng, <i>N\u1eeda ch\u1eebng xu\u00e2n</i>, theo <i>Tuy\u1ec3n t\u1eadp T\u1ef1 l\u1ef1c v\u0103n \u0111o\u00e0n</i>, t\u1eadp 2, NXB H\u1ed9i Nh\u00e0 v\u0103n, 2004)</div><br>X\u00e1c \u0111\u1ecbnh ng\u01b0\u1eddi k\u1ec3 chuy\u1ec7n trong \u0111o\u1ea1n tr\u00edch.", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nNg\u01b0\u1eddi k\u1ec3 chuy\u1ec7n trong \u0111o\u1ea1n tr\u00edch kh\u00f4ng ph\u1ea3i l\u00e0 m\u1ed9t nh\u00e2n v\u1eadt trong truy\u1ec7n (Li\u00ean, Mai, Huy) m\u00e0 l\u00e0 m\u1ed9t ng\u01b0\u1eddi \u0111\u1ee9ng ngo\u00e0i quan s\u00e1t, t\u01b0\u1eddng thu\u1eadt l\u1ea1i di\u1ec5n bi\u1ebfn c\u00e2u chuy\u1ec7n.<br>\n\u2192 Ng\u01b0\u1eddi k\u1ec3 chuy\u1ec7n ng\u00f4i th\u1ee9 ba, gi\u1ea5u m\u1eb7t.\n", "key": "D", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605145, "lessonId": 0, "a": "X\u00e3 tr\u01b0\u1edfng.", "b": "Th\u1ecb M\u1ea7u.", "c": "M\u1eb9 \u0110\u1ed1p.", "d": "Ph\u00fa \u00f4ng.", "bookId": 1088942, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cM\u1eb8 \u0110\u1ed0P: - Rao th\u1ebf n\u00e0o \u1ea1?<br><br>X\u00c3 TR\u01af\u1edeNG: - Chi\u1ec1ng l\u00e0ng, chi\u1ec1ng ch\u1ea1<br><br>Th\u01b0\u1ee3ng h\u1ea1, t\u00e2y \u0111\u00f4ng<br><br>Con g\u00e1i ph\u00fa \u00f4ng<br><br>T\u00ean l\u00e0 M\u1ea7u Th\u1ecb<br><br>T\u01b0 t\u00ecnh ngo\u1ea1i \u00fd<br><br>M\u00e3n nguy\u1ec7t c\u00f3 thai<br><br>M\u1eddi gi\u00e0 tr\u1ebb, g\u00e1i trai<br><br>Ra \u0111\u00ecnh m\u00e0 \u0103n kho\u00e1n.\u201d</i><br><div style=\"text-align: right;\">(Ch\u00e8o c\u1ed5, <i>Quan \u00c2m Th\u1ecb K\u00ednh</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div><br>Theo l\u1eddi rao, ng\u01b0\u1eddi n\u00e0o b\u1ecb b\u00eau kh\u1eafp l\u00e0ng?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nTheo l\u1eddi rao, ng\u01b0\u1eddi b\u1ecb b\u00eau kh\u1eafp l\u00e0ng l\u00e0 Th\u1ecb M\u1ea7u v\u1edbi nh\u1eefng l\u1eddi l\u1ebd nh\u01b0 \u201cCon g\u00e1i ph\u00fa \u00f4ng/ T\u00ean l\u00e0 M\u1ea7u Th\u1ecb/ T\u01b0 t\u00ecnh ngo\u1ea1i \u00fd/ M\u00e3n nguy\u1ec7t c\u00f3 thai\u201d.\n", "key": "B", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605150, "lessonId": 0, "a": "V\u1ecb th\u1ef1c d\u00e2n d\u00f9ng roi g\u00e2n b\u00f2 m\u00e0 v\u1ee5t h\u1ecd lia l\u1ecba cho \u0111\u1ebfn l\u00fac h\u1ecd ch\u1ebft ng\u1ea5t.", "b": "Amduni v\u00e0 Ben Benkhia l\u1ea5y tr\u1ed9m v\u00e0i ch\u00f9m nho.", "c": "M\u1ed9t ng\u01b0\u1eddi \u1edf c\u1ea1nh nh\u00e0 ph\u1ea3n \u0111\u1ed1i m\u1edbi th\u00f4i.", "d": "M\u1ed9t v\u1ecb th\u1ef1c d\u00e2n Ph\u00e1p kh\u00e1c c\u00f3 hai anh c\u00f4ng nh\u00e2n b\u1ea3n x\u1ee9 gi\u00fap vi\u1ec7c.", "bookId": 1088943, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cM\u1ed9t v\u1ecb th\u1ef1c d\u00e2n Ph\u00e1p kh\u00e1c c\u00f3 hai anh c\u00f4ng nh\u00e2n b\u1ea3n x\u1ee9 gi\u00fap vi\u1ec7c, t\u00ean l\u00e0 Amduni v\u00e0 Ben Benkhia, hai anh n\u00e0y h\u00ecnh nh\u01b0 \u0111\u00e3 c\u00f3 l\u1ea5y tr\u1ed9m v\u00e0i ch\u00f9m nho. V\u1ecb th\u1ef1c d\u00e2n kia li\u1ec1n cho g\u1ecdi hai ng\u01b0\u1eddi b\u1ea3n x\u1ee9 \u0111\u1ebfn, r\u1ed3i d\u00f9ng roi g\u00e2n b\u00f2 m\u00e0 v\u1ee5t h\u1ecd lia l\u1ecba cho \u0111\u1ebfn l\u00fac h\u1ecd ch\u1ebft ng\u1ea5t. Khi hai ng\u01b0\u1eddi n\u00e0y t\u1ec9nh l\u1ea1i, quan l\u1edbn b\u1ea3o h\u1ed9 c\u1ee7a ch\u00fang ta li\u1ec1n sai tr\u00f3i gi\u1eadt c\u00e1nh khu\u1ef7u l\u1ea1i v\u00e0 treo tay h\u1ecd l\u00ean. D\u00f9 hai ng\u01b0\u1eddi kh\u1ed1n kh\u1ed5 kia \u0111\u00e3 b\u1ea5t t\u1ec9nh nh\u00e2n s\u1ef1, th\u1ebf m\u00e0 cu\u1ed9c h\u00e0nh h\u1ea1 b\u1ec9 \u1ed5i \u0111\u00f3 v\u1eabn c\u1ee9 k\u00e9o d\u00e0i \u0111\u1ebfn b\u1ed1n ti\u1ebfng \u0111\u1ed3ng h\u1ed3, m\u00e3i \u0111\u1ebfn khi c\u00f3 m\u1ed9t ng\u01b0\u1eddi \u1edf c\u1ea1nh nh\u00e0 ph\u1ea3n \u0111\u1ed1i m\u1edbi th\u00f4i.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u00c1i Qu\u1ed1c, <i>V\u1ee5 h\u00e0nh h\u1ea1 Am\u0111uni v\u00e0 Ben Benkhia</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div><br>Chi ti\u1ebft n\u00e0o ph\u1ea3n \u00e1nh s\u1ef1 t\u00e0n \u0111\u1ed9c trong c\u00e1ch \u1ee9ng x\u1eed c\u1ee7a con ng\u01b0\u1eddi?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nChi ti\u1ebft \u201cv\u1ecb th\u1ef1c d\u00e2n d\u00f9ng roi g\u00e2n b\u00f2 m\u00e0 v\u1ee5t h\u1ecd lia l\u1ecba cho \u0111\u1ebfn l\u00fac h\u1ecd ch\u1ebft ng\u1ea5t\u201d m\u00f4 t\u1ea3 h\u00e0nh \u0111\u1ed9ng b\u1ea1o l\u1ef1c d\u00e3 man c\u1ee7a t\u00ean th\u1ef1c d\u00e2n \u0111\u1ed1i v\u1edbi hai c\u00f4ng nh\u00e2n b\u1ea3n x\u1ee9. H\u00e0nh \u0111\u1ed9ng \u0111\u00e1nh \u0111\u1eadp d\u00e3 man, coi th\u01b0\u1eddng t\u00ednh m\u1ea1ng c\u1ee7a ng\u01b0\u1eddi kh\u00e1c cho th\u1ea5y s\u1ef1 t\u00e0n b\u1ea1o, v\u00f4 nh\u00e2n t\u00ednh c\u1ee7a b\u00e8 l\u0169 th\u1ef1c d\u00e2n.\n", "key": "A", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605163, "lessonId": 0, "a": "Th\u1ea5y m\u00ecnh \u0111\u01b0\u1ee3c ti\u1ebfp th\u00eam s\u1ee9c m\u1ea1nh.", "b": "Ti\u1ebfp t\u1ee5c nu\u00f4i nguy\u1ec7n v\u1ecdng \u00e2m \u1ec9 ch\u00e1y b\u1ecfng l\u00e0 quy\u1ebft t\u00e2m v\u01b0\u1ee3t ng\u1ee5c, tho\u00e1t kh\u1ecfi \u0111\u1ecba ng\u1ee5c tr\u1ea7n gian.", "c": "B\u1ecb \u0111\u00e0n \u00e1p tinh vi l\u1 1d.\n", "key": "D", "isVideo": true, "score": 0, "order": 20, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 21 \u0111\u1ebfn 25", "content": "\u201cTh\u1eddi gian qua, nhi\u1ec1u tr\u00e0o l\u01b0u (trend) th\u1ec3 hi\u1ec7n l\u00f2ng y\u00eau n\u01b0\u1edbc c\u1ee7a gi\u1edbi tr\u1ebb \u0111\u01b0\u1ee3c lan t\u1ecfa r\u1ed9ng r\u00e3i tr\u00ean c\u00e1c n\u1ec1n t\u1ea3ng m\u1ea1ng x\u00e3 h\u1ed9i. Ti\u00eau bi\u1ec3u nh\u01b0 tr\u00e0o l\u01b0u \u201c\u0110\u1eebng h\u1ecfi T\u1ed5 qu\u1ed1c \u0111\u00e3 l\u00e0m g\u00ec cho ta\u201d xu\u1ea5t hi\u1ec7n v\u00e0o d\u1ecbp ngh\u1ec9 l\u1ec5 30/4 v\u00e0 1/5/2024. Trong c\u00e1c clip, c\u00e1c b\u1ea1n tr\u1ebb \u0111\u00e3 h\u00f3a th\u00e2n th\u00e0nh nhi\u1ec1u h\u00ecnh t\u01b0\u1ee3ng kh\u00e1c nhau nh\u01b0: b\u1ed9 \u0111\u1ed9i, c\u00f4ng an, ng\u01b0\u1eddi m\u1eb9 Vi\u1ec7t Nam Anh h\u00f9ng, gi\u00e1o vi\u00ean, \u0111o\u00e0n vi\u00ean thanh ni\u00ean... qua \u0111\u00f3 th\u1ec3 hi\u1ec7n ni\u1ec1m t\u1ef1 h\u00e0o, l\u00f2ng y\u00eau n\u01b0\u1edbc v\u00e0 kh\u00e1t khao c\u1ed1ng hi\u1ebfn. C\u00e1c b\u1ea1n tr\u1ebb c\u0169ng b\u00e0y t\u1ecf l\u00f2ng bi\u1ebft \u01a1n \u0111\u1ed1i v\u1edbi c\u00e1c th\u1ebf h\u1ec7 cha \u00f4ng \u0111\u00e3 hi sinh cho n\u1ec1n \u0111\u1ed9c l\u1eadp, t\u1ef1 do c\u1ee7a T\u1ed5 qu\u1ed1c. C\u00e1c video clip s\u1eed d\u1ee5ng l\u1eddi nh\u1ea1c vui t\u01b0\u01a1i v\u00e0 gi\u00e0u c\u1ea3m x\u00fac c\u1ee7a b\u00e0i h\u00e1t \u201cKh\u00e1t v\u1ecdng tu\u1ed5i tr\u1ebb\u201d (nh\u1ea1c s\u0129 V\u0169 Ho\u00e0ng). V\u1edbi trend \u201cT\u00f4i y\u00eau T\u1ed5 qu\u1ed1c t\u00f4i\u201d c\u00f9ng h\u00e1t \u201cQu\u1ed1c ca Vi\u1ec7t Nam\u201d, hay trend \u201cQu\u1ed1c k\u00ec r\u1ef1c s\u00e1ng trong \u00e1nh m\u1eaft\u201d xu\u1ea5t hi\u1ec7n v\u00e0o d\u1ecbp Qu\u1ed1c kh\u00e1nh 2/9, \u0111\u1eb7c t\u1ea3 nh\u1eefng \u0111\u00f4i m\u1eaft s\u00e1ng r\u1ef1c m\u1ea7u c\u1edd \u0111\u1ecf sao v\u00e0ng... khi\u1ebfn b\u1ea5t c\u1ee9 ai l\u01b0\u1edbt qua c\u0169ng c\u1ea3m th\u1ea5y x\u00fac \u0111\u1ed9ng, t\u1ef1 h\u00e0o. V\u1edbi nh\u1eefng c\u00e1ch th\u1ec3 hi\u1ec7n s\u00e1ng t\u1ea1o, trong s\u00e1ng, \u0111\u00fang m\u1ef1c, \u0111\u00e2y \u0111\u1ec1u l\u00e0 nh\u1eefng tr\u00e0o l\u01b0u c\u00f3 \u00fd ngh\u0129a s\u00e2u s\u1eafc, lan t\u1ecfa m\u1ea1nh m\u1ebd th\u00f4ng \u0111i\u1ec7p v\u1ec1 t\u00ecnh y\u00eau n\u01b0\u1edbc v\u00e0 l\u00f2ng bi\u1ebft \u01a1n c\u1ee7a tu\u1ed5i tr\u1ebb \u0111\u1ed1i v\u1edbi th\u1ebf h\u1ec7 cha \u00f4ng \u0111\u00e3 c\u1ed1ng hi\u1ebfn, hi sinh h\u1ebft m\u00ecnh v\u00ec \u0111\u1ea5t n\u01b0\u1edbc, v\u00ec d\u00e2n t\u1ed9c.\u201d<br><div style=\"text-align: right;\">(Minh Anh, <i>Th\u1ec3 hi\u1ec7n l\u00f2ng y\u00eau n\u01b0\u1edbc, t\u1ef1 h\u00e0o d\u00e2n t\u1ed9c \u0111\u00fang \u0111\u1eafn, ph\u00f9 h\u1ee3p</i>, theo <i>nhandan.vn</i>)</div>", "listQuestion": [{"questionId": 21605191, "lessonId": 0, "a": "Tr\u00e0o l\u01b0u s\u1eed d\u1ee5ng m\u1ea1ng x\u00e3 h\u1ed9i c\u1ee7a gi\u1edbi tr\u1ebb.", "b": "Tr\u00e0o l\u01b0u th\u1eddi trang c\u1ee7a gi\u1edbi tr\u1ebb.", "c": "Tr\u00e0o l\u01b0u \u00e2m nh\u1ea1c c\u1ee7a gi\u1edbi tr\u1ebb.", "d": "Tr\u00e0o l\u01b0u th\u1ec3 hi\u1ec7n l\u00f2ng y\u00eau n\u01b0\u1edbc c\u1ee7a gi\u1edbi tr\u1ebb.", "bookId": 1088954, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u0110o\u1ea1n tr\u00edch vi\u1ebft v\u1ec1 n\u1ed9i dung g\u00ec?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\n\u0110o\u1ea1n tr\u00edch b\u00e0n v\u1ec1 c\u00e1c tr\u00e0o l\u01b0u th\u1ec3 hi\u1ec7n l\u00f2ng y\u00eau n\u01b0\u1edbc c\u1ee7a gi\u1edbi tr\u1ebb tr\u00ean m\u1ea1ng x\u00e3 h\u1ed9i hi\u1ec7n n\u00e0y qua c\u00e1c h\u00ecnh th\u1ee9c nh\u01b0 "lessonId": 0, "a": "\u201cb\u00e0y t\u1ecf\u201d.", "b": "\u201cc\u0169ng\u201d.", "c": "\u201chi sinh\u201d.", "d": "\u201ccha \u00f4ng\u201d.", "bookId": 1088957, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cC\u00e1c b\u1ea1n tr\u1ebb c\u0169ng b\u00e0y t\u1ecf l\u00f2ng bi\u1ebft \u01a1n \u0111\u1ed1i v\u1edbi c\u00e1c th\u1ebf h\u1ec7 cha \u00f4ng \u0111\u00e3 hi sinh cho n\u1ec1n \u0111\u1ed9c l\u1eadp, t\u1ef1 do c\u1ee7a T\u1ed5 qu\u1ed1c.\u201d<br><br>T\u1eeb n\u00e0o trong c\u00e2u tr\u00ean c\u00f3 \u00fd ngh\u0129a ti\u1ebfp n\u1ed1i m\u1ea1ch \u00fd \u0111\u01b0\u1ee3c tri\u1ec3n khai \u1edf c\u00e2u tr\u01b0\u1edbc \u0111\u00f3?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nT\u1eeb \u201cc\u0169ng\u201d ch\u1ec9 s\u1ef1 ti\u1ebfp n\u1ed1i, cho th\u1ea5y \u201cb\u00e0y t\u1ecf l\u00f2ng bi\u1ebft \u01a1n\u201d l\u00e0 m\u1ed9t h\u00e0nh \u0111\u1ed9ng b\u1ed5 sung, ti\u1ebfp n\u1ed1i cho nh\u1eefng h\u00e0nh \u0111\u1ed9ng th\u1ec3 hi\u1ec7n l\u00f2ng y\u00eau n\u01b0\u1edbc \u0111\u00e3 \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp tr\u01b0\u1edbc \u0111\u00f3.\n", "key": "B", "isVideo": true, "score": 0, "order": 24, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605199, "lessonId": 0, "a": "Tr\u1ea1ng ng\u1eef.", "b": "Ch\u1ee7 ng\u1eef.", "c": "V\u1ecb ng\u1eef.", "d": "N\u00f2ng c\u1ed1t c\u00e2u.", "bookId": 1088958, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cV\u1edbi nh\u1eefng c\u00e1ch th\u1ec3 hi\u1ec7n s\u00e1ng t\u1ea1o, trong s\u00e1ng, \u0111\u00fang m\u1ef1c, \u0111\u00e2y \u0111\u1ec1u l\u00e0 nh\u1eefng tr\u00e0o l\u01b0u c\u00f3 \u00fd ngh\u0129a s\u00e2u s\u1eafc, lan t\u1ecfa m\u1ea1nh m\u1ebd th\u00f4ng \u0111i\u1ec7p v\u1ec1 t\u00ecnh y\u00eau n\u01b0\u1edbc v\u00e0 l\u00f2ng bi\u1ebft \u01a1n c\u1ee7a tu\u1ed5i tr\u1ebb \u0111\u1ed1i v\u1edbi th\u1ebf h\u1ec7 cha \u00f4ng \u0111\u00e3 c\u1ed1ng hi\u1ebfn, hi sinh h\u1ebft m\u00ecnh v\u00ec \u0111\u1ea5t n\u01b0\u1edbc, v\u00ec d\u00e2n t\u1ed9c.\u201d<br><br>Di\u1ec5n \u0111\u1ea1t \u201cV\u1edbi nh\u1eefng c\u00e1ch th\u1ec3 hi\u1ec7n s\u00e1ng t\u1ea1o, trong s\u00e1ng, \u0111\u00fang m\u1ef1c\u201d l\u00e0 th\u00e0nh ph\u1ea7n n\u00e0o c\u1ee7a c\u00e2u?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nDi\u1ec5n \u0111\u1ea1t \u201cV\u1edbi nh\u1eefng c\u00e1ch th\u1ec3 hi\u1ec7n s\u00e1ng t\u1ea1o, trong s\u00e1ng, \u0111\u00fang m\u1ef1c\u201d l\u00e0 th\u00e0nh ph\u1ea7n tr\u1ea1ng ng\u1eef, b\u1ed5 sung th\u00f4ng tin v\u1ec1 c\u00e1ch th\u1ee9c th\u1ef1c hi\u1ec7n h\u00e0nh \u0111\u1ed9ng.\n", "key": "A", "isVideo": true, "score": 0, "order": 25, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 26 \u0111\u1ebfn 30", "content": "\u201c\u0110\u00f3 l\u00e0 m\u1ed9t ng\u00f4i tr\u01b0\u1eddng c\u00f3 v\u1ecb tr\u00ed r\u1ea5t \u0111\u1eb9p, nh\u00ecn ra h\u01b0\u1edbng \u0110\u00f4ng, ph\u00eda tr\u01b0\u1edbc l\u00e0 qu\u1ed1c l\u1ed9 1 qua kho\u1ea3ng c\u00e1ch c\u1ee7a m\u1ed9t l\u1ed1i v\u00e0o in b\u00f3ng h\u00e0ng d\u1eeba, tr\u00e1nh \u0111\u01b0\u1ee3c ti\u1ebfng \u1ed3n c\u1ee7a xe c\u1ed9. Tr\u01b0\u1eddng c\u00e1ch th\u1ecb tr\u1ea5n \u0110\u1ed3ng C\u00e1t ch\u1ec9 h\u01a1n m\u1ed9t c\u00e2y s\u1ed1, t\u00ean l\u00e0 Tr\u01b0\u1eddng ti\u1ec3u h\u1ecdc \u0110\u1ee9c Vinh, ng\u00e0y nay \u0111\u1ed5i th\u00e0nh Tr\u01b0\u1eddng ti\u1ec3u h\u1ecdc th\u1ecb tr\u1ea5n M\u1ed9 \u0110\u1ee9c (t\u1ec9nh Qu\u1ea3ng Ng\u00e3i). Khi l\u00ean Trung h\u1ecdc \u0111\u1ec7 nh\u1ea5t c\u1ea5p (t\u1ee9c Trung h\u1ecdc c\u01a1 s\u1edf), t\u00f4i \u0111\u00e3 l\u01b0u l\u1ea1i t\u00ean tr\u01b0\u1eddng \u0111\u00f3 v\u1edbi h\u00ecnh \u1ea3nh h\u01b0 c\u1ea5u v\u1ec1 m\u1ed9t c\u00f4 gi\u00e1o d\u00e0nh t\u00ecnh th\u01b0\u01a1ng y\u00eau cho h\u1ecdc tr\u00f2 trong truy\u1ec7n ng\u1eafn \u0111\u1ea7u tay \u0111\u0103ng tr\u00ean b\u00e1n nguy\u1ec7t san \u201cTu\u1ed5i Hoa\u201d n\u0103m 1970.<br>L\u00ean l\u1edbp T\u01b0 (t\u1ee9c l\u1edbp Hai ng\u00e0y nay), ch\u00fang t\u00f4i \u0111\u01b0\u1ee3c h\u1ecdc v\u1edbi m\u1ed9t th\u1ea7y gi\u00e1o \u0111\u1eb9p trai, l\u1ecbch l\u00e3m, d\u00e1ng ng\u01b0\u1eddi thanh m\u1ea3nh, khu\u00f4n m\u1eb7t c\u00f3 n\u00e9t T\u00e2y ph\u01b0\u01a1ng. N\u0103m tr\u01b0\u1edbc h\u1ecdc v\u1edbi c\u00f4 Minh Nguy\u1ec7t hi\u1ec1n d\u1ecbu, n\u00ean bu\u1ed5i \u0111\u1ea7u ti\u00ean h\u1ecdc v\u1edbi th\u1ea7y, c\u1ea3 l\u1edbp h\u01a1i lo l\u1eafng. May m\u1eafn cho ch\u00fang t\u00f4i, th\u1ea7y c\u0169ng hi\u1ec1n kh\u00f4ng k\u00e9m, lu\u00f4n n\u1edf n\u1ee5 c\u01b0\u1eddi, c\u1ea3 n\u0103m kh\u00f4ng h\u1ec1 r\u1ea7y la h\u1ecdc tr\u00f2. N\u1ebfu c\u00f3 d\u1ecbp \u0111\u1ecdc nh\u1eefng d\u00f2ng n\u00e0y, ch\u1eafc nhi\u1ec1u b\u1ea1n l\u1edbp t\u00f4i \u0111\u1ebfn nay c\u0169ng kh\u00f4ng th\u1ec3 qu\u00ean th\u1ea7y, c\u00f2n v\u00ec m\u1ed9t l\u00ed do n\u1eefa: th\u1ea7y c\u00f3 c\u00e1i t\u00ean r\u1ea5t \u0111\u1ed9c \u0111\u00e1o.<br>Nh\u00e0 th\u1ea7y \u1edf th\u1ecb tr\u1ea5n S\u00f4ng V\u1ec7, b\u00ean b\u1edd b\u1eafc c\u1ee7a con s\u00f4ng c\u00f9ng t\u00ean l\u00e0m ranh gi\u1edbi gi\u1eefa hai qu\u1eadn M\u1ed9 \u0110\u1ee9c v\u00e0 T\u01b0 Ngh\u0129a. H\u1ed3i \u0111\u00f3, n\u1eeda \u0111\u1ea7u nh\u1eefng n\u0103m 1960, chi\u1ebfn tranh ch\u01b0a lan r\u1ed9ng v\u00e0 kh\u1ed1c li\u1ec7t, \u0111o\u1ea1n \u0111\u01b0\u1eddng h\u01a1n 10 c\u00e2y s\u1ed1 t\u1eeb nh\u00e0 th\u1ea7y \u0111\u1ebfn tr\u01b0\u1eddng t\u00f4i c\u00f2n b\u00ecnh y\u00ean, ch\u1ee9 kh\u00f4ng nh\u01b0 sau n\u00e0y lu\u00f4n x\u1ea3y ra nh\u1eefng tr\u1eadn \u0111\u00e1nh l\u00e0m nhi\u1ec1u ng\u01b0\u1eddi d\u00e2n th\u01b0\u1eddng ch\u1ebft v\u00e0 b\u1ecb th\u01b0\u01a1ng. M\u1ed7i s\u00e1ng th\u1ea7y \u0111i xe m\u00e1y \u0111\u1ebfn tr\u01b0\u1eddng, bu\u1ed5i chi\u1ec1u l\u1ea1i v\u1ec1 nh\u00e0.<br><i>(L\u01b0\u1ee3c m\u1ed9t \u0111o\u1ea1n: Th\u1ea7y gi\u00e1o c\u00f3 t\u00ean l\u00e0 L\u01b0\u01a1ng B\u00e1 B\u1ea3. Th\u1ea7y c\u00f3 m\u1ed9t hi\u1ec7u s\u00e1ch tr\u00ean ph\u1ed1. M\u1ed9t l\u1ea7n theo m\u1eb9 l\u00ean ph\u1ed1, \u201ct\u00f4i\u201d v\u00e0 m\u1eb9 \u0111\u00e3 g\u1eb7p th\u1ea7y \u1edf hi\u1ec7u s\u00e1ch. Th\u1ea7y m\u1eddi m\u1eb9 c\u1ee7a \u201ct\u00f4i\u201d ng\u1ed3i v\u00e0 h\u1ecfi chuy\u1ec7n gia \u0111\u00ecnh.)</i><br>Ng\u1ea1i ng\u1ed3i l\u00e2u l\u00e0m phi\u1ec1n th\u1ea7y v\u00e0 kh\u00f4ng k\u1ecbp mua h\u00e0ng, m\u1eb9 t\u00f4i \u0111\u1ee9ng l\u00ean ch\u00e0o th\u1ea7y. Th\u1ea7y nh\u00ecn t\u00f4i, b\u1ea3o: \u201cEm ch\u1edd th\u1ea7y m\u1ed9t ch\u00fat\u201d. R\u1ed3i th\u1ea7y \u0111\u1ebfn k\u1ec7 s\u00e1ch l\u1ea5y xu\u1ed1ng m\u1ed9t cu\u1ed1n truy\u1ec7n v\u00e0 m\u1ed9t cu\u1ed1n s\u1ed5 tay b\u00eca xanh, b\u1ecf v\u00e0o bao ni-l\u00f4ng trao cho t\u00f4i. Th\u1ea7y n\u00f3i: \u201cTh\u1ea7y t\u1eb7ng em cu\u1ed1n s\u1ed5 n\u00e0y \u0111\u1ec3 em vi\u1ebft nh\u1eefng g\u00ec c\u1ea7n ghi nh\u1edb, c\u00f2n \u0111\u00e2y l\u00e0 cu\u1ed1n truy\u1ec7n \u201cD\u1ebf m\u00e8n phi\u00eau l\u01b0u k\u00ed\u201d c\u1ee7a T\u00f4 Ho\u00e0i, hay l\u1eafm, em \u0111\u1ecdc s\u1ebd th\u00edch\u201d. T\u00f4i l\u00ed nh\u00ed c\u1ea3m \u01a1n th\u1ea7y. Th\u1ea7y c\u00f2n n\u00f3i th\u00eam: \u201cC\u1eeda h\u00e0ng ch\u1ec9 c\u00f2n hai t\u1eadp truy\u1ec7n n\u00e0y, em \u0111\u1ecdc xong, cho b\u1ea1n m\u01b0\u1ee3n \u0111\u1ecdc \u0111\u1ec3 c\u00f9ng bi\u1ebft. \u00c0, m\u00e0 tu\u1ea7n t\u1edbi l\u1edbp m\u00ecnh li\u00ean hoan t\u1ea5t ni\u00ean, th\u1ea7y s\u1ebd n\u00f3i m\u1ed7i b\u1ea1n \u0111em \u0111\u1ebfn l\u1edbp m\u1ed9t m\u00f3n qu\u00e0 r\u1ed3i trao \u0111\u1ed5i v\u1edbi nhau b\u1eb1         let examMode = 'practice'; // 'practice' or 'exam'
        let startTime = Date.now();
        let timerInterval;

        // --- INIT ---
        window.onload = function() {
            renderExam();
            startTimer();
            document.getElementById('mode-select').addEventListener('change', (e) => {
                if(isSubmitted) return;
                if(confirm('Đổi chế độ sẽ làm mới lại trạng thái hiển thị (không mất bài làm). Tiếp tục?')) {
                    examMode = e.target.value;
                    renderExam(false); // Re-render without resetting answers
                } else {
                    e.target.value = examMode;
                }
            });
        };

        // --- TIMER LOGIC ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- RENDER ENGINE ---
        function renderExam(reset = false) {
            const container = document.getElementById('exam-content');
            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; // Clear to re-render
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

            let globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                // Render Group Header
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`; // Unique Key for storage
                    const qType = q.normalizedType;
                    
                    // -- Palette Item --
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop
                    palMob.appendChild(palBtn); // Add to Mobile

                    // -- Question Card --
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    // Header: Question Number
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    // Interaction Area
                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // === TYPE 0: MCQ ===
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            // Logic hiển thị kết quả
                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { // Chọn đúng
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { // Đúng nhưng không chọn (hiện đáp án khi nộp)
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { // Chọn sai
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; // Hiện đáp án đúng sau khi nộp dù chưa làm
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // === TYPE 1 & 3: FILL KEY ===
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let inputClass = "w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all font-mono";
                        let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
