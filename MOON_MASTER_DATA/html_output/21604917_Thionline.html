    <script>
        const EXAM_DATA = [{"title": "", "content": "", "listQuestion": [{"questionId": 21604923, "lessonId": 0, "a": "Tr\u1eadn m\u01b0a \u0111\u00e1 \u00e0o \u00e0o \u0111\u1ed5 xu\u1ed1ng \u0111\u1ea7u l\u0169 c\u01b0\u1edbp \u1edf v\u00f9ng \u0111\u1ea5t Li-guy-ri.", "b": "V\u00f9ng \u0111\u1ea5t Li-guy-ri c\u00f3 to\u00e1n t\u00ean c\u01b0\u1edbp \u0111\u00f4ng nh\u01b0 ki\u1ebfn c\u1ecf.", "c": "Th\u1ea7n D\u1edbt t\u1ea1o n\u00ean v\u00f9ng \u0111\u1ea5t Li-quy-ri v\u1edbi nh\u1eefng t\u1ea3ng \u0111\u00e1 kh\u1ed5ng l\u1ed3.", "d": "Nh\u1eefng t\u1ea3ng \u0111\u00e1 ng\u1ed5n ngang tr\u00ean c\u00e1nh \u0111\u1ed3ng Cr\u01a1 bao quang v\u00f9ng M\u00e1c-x\u00e2y n\u01b0\u1edbc Ph\u00e1p ng\u00e0y nay.", "bookId": 1088904, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cC\u00f3 l\u1ea7n ch\u00e0ng \u0111i qua \u0111\u1ea5t Li-guy-ri (mi\u1ec1n Pr\u00f4-v\u0103ng-x\u01a1, n\u01b0\u1edbc Ph\u00e1p ng\u00e0y nay) th\u00ec b\u1ecb m\u1ed9t to\u00e1n c\u01b0\u1edbp \u0111\u00f4ng ngh\u1ecbt k\u00e9o \u0111\u1ebfn bao v\u00e2y. H\u00ea-ra-cl\u00e9t ph\u1ea3i ch\u1ed1ng \u0111\u1ee1 v\u1ea5t v\u1ea3 l\u1eafm m\u1edbi b\u1ea3o v\u1ec7 \u0111\u01b0\u1ee3c \u0111\u00e0n b\u00f2. Ch\u00e0ng d\u00f9ng cung b\u1eafn ch\u00fang ch\u1ebft nh\u01b0 r\u1ea1. Nh\u01b0ng ch\u00fang \u0111\u00f4ng nh\u01b0 ki\u1ebfn c\u1ecf, t\u00ean n\u00e0y ch\u1ebft t\u00ean kh\u00e1c l\u1ea1i l\u0103n v\u00e0o, \u0111\u1ebfn n\u1ed7i H\u00ea-ra-cl\u00e9t b\u1eafn \u0111\u00e3 g\u1ea7n h\u1ebft t\u00ean, m\u1ecfi nh\u1eeb c\u1ea3 tay m\u00e0 ch\u00fang v\u1eabn c\u1ee9 b\u00e2u t\u1edbi. Kh\u00f4ng bi\u1ebft d\u00f9ng c\u00e1ch g\u00ec \u0111\u1ed1i ph\u00f3, H\u00ea-ra-cl\u00e9t li\u1ec1n kh\u1ea5n th\u1ea7n D\u1edbt. T\u1ee9c th\u00ec m\u1ed9t tr\u1eadn m\u01b0a \u0111\u00e1 \u00e0o \u00e0o \u0111\u1ed5 xu\u1ed1ng \u0111\u1ea7u l\u0169 c\u01b0\u1edbp, nh\u1eefng h\u00f2n \u0111\u00e1 to nh\u01b0 c\u00e1i b\u00ecnh, c\u00e1i v\u1ea1i c\u1ee7a ng\u01b0\u1eddi Hy L\u1ea1p gi\u00e1ng xu\u1ed1ng l\u00e0m l\u0169 c\u01b0\u1edbp qu\u00e8 ch\u00e2n, g\u00e3y tay, v\u1ee1 \u0111\u1ea7u, tan x\u01b0\u01a1ng n\u00e1t th\u1ecbt, ph\u00fat ch\u1ed1c tan r\u00e3 h\u1ebft. D\u1ea5u v\u1ebft c\u1ee7a tr\u1eadn m\u01b0a \u0111\u00e1 \u0111\u00f3 ng\u00e0y nay c\u00f2n l\u1ea1i tr\u00ean c\u00e1nh \u0111\u1ed3ng Cr\u01a1 bao quanh v\u00f9ng M\u00e1c-x\u00e2y n\u01b0\u1edbc Ph\u00e1p. Ch\u00ednh nh\u1eefng t\u1ea3ng \u0111\u00e1 l\u1edbn nh\u1ecf ng\u1ed5n ngang tr\u00ean c\u00e1nh \u0111\u1ed3ng \u0111\u00f3 l\u00e0 x\u01b0a kia do tr\u1eadn m\u01b0a c\u1ee7a Th\u1ea7n D\u1edbt gi\u00e1ng xu\u1ed1ng \u0111\u1ec3 gi\u1ea3i nguy cho \u0111\u1ee9a con c\u1ee7a m\u00ecnh.\u201d</i><br><div style=\"text-align: right;\">(Th\u1ea7n tho\u1ea1i Hy L\u1ea1p, <i>H\u00ea-ra-cl\u00e9t \u0111i \u0111o\u1ea1t \u0111\u00e0n b\u00f2 c\u1ee7a G\u00ea-ri-\u00f4ng</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div><br>\u0110o\u1ea1n tr\u00edch tr\u00ean gi\u1ea3i th\u00edch cho hi\u1ec7n t\u01b0\u1ee3ng t\u1ef1 nhi\u00ean n\u00e0o?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\n\u0110o\u1ea1n tr\u00edch k\u1ec3 v\u1ec1 chi\u1ebfn c\u00f4ng c\u1ee7a H\u00ea-ra-cl\u00e9t khi \u0111i \u0111o\u1ea1t \u0111\u00e0n b\u00f2 c\u1ee7a G\u00ea-ri-\u00f4ng, trong \u0111\u00f3 n\u1ed5i b\u1eadt l\u00e0 cu\u1ed9c giao chi\u1ebfn gi\u1eefa H\u00ea-ra-cl\u00e9t v\u1edbi to\u00e1n c\u01b0\u1edbp \u1edf \u0111\u1ea5t Li-guy-ri v\u00e0 s\u1ef1 tr\u1ee3 gi\u00fap c\u1ee7a th\u1ea7n D\u1edbt (gi\u00e1ng m\u01b0a \u0111\u00e1) \u0111\u1ec3 gi\u00fap ch\u00e0ng v\u01b0\u1ee3t qua nguy hi\u1ec3m, \u0111\u1ed3ng th\u1eddi gi\u1ea3i th\u00edch ngu\u1ed3n g\u1ed1c nh\u1eefng t\u1ea3ng \u0111\u00e1 ng\u1ed5n ngang tr\u00ean c\u00e1nh \u0111\u1ed3ng Cr\u01a1 ng\u00e0y nay.<br>\n\u2192 \u0110o\u1ea1n tr\u00edch gi\u1ea3i th\u00edch cho hi\u1ec7n t\u01b0\u1ee3ng nbh\u1eefng t\u1ea3ng \u0111\u00e1 ng\u1ed5n ngang tr\u00ean c\u00e1nh \u0111\u1ed3ng Cr\u01a1 bao quang v\u00f9ng M\u00e1c-x\u00e2y n\u01b0\u1edbc Ph\u00e1p ng\u00e0y nay.", "key": "D", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604925, "lessonId": 0, "a": "Ph\u00f3ng kho\u00e1ng.", "b": "C\u1ea9n tr\u1ecdng.", "c": "Gan d\u1ea1, d\u0169ng c\u1ea3m.", "d": "Tr\u00ed tu\u1ec7 kh\u00f4n ngoan.", "bookId": 1088905, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cT\u00ea-l\u00ea-m\u00e1c ch\u1eadm r\u00e3i \u0111\u00e1p:<br><br>- Cha th\u00e2n y\u00eau, vi\u1ec7c n\u00e0y xin \u0111\u1ec3 tu\u1ef3 cha \u0111\u1ecbnh li\u1ec7u, v\u00ec x\u01b0a nay cha v\u1eabn l\u00e0 ng\u01b0\u1eddi n\u1ed5i ti\u1ebfng kh\u00f4n ngoan, kh\u00f4ng m\u1ed9t k\u1ebb ph\u00e0m tr\u1ea7n n\u00e0o s\u00e1nh k\u1ecbp. V\u1ec1 ph\u1ea7n ch\u00fang con, ch\u00fang con s\u1ebd h\u1ebft l\u00f2ng h\u0103ng h\u00e1i ph\u00f9 t\u00e1 cha, v\u00e0 xin cha tin r\u1eb1ng ch\u1ec9 n\u00f3i trong ph\u1ea1m vi s\u1ee9c l\u1ef1c c\u1ee7a con, con c\u0169ng kh\u00f4ng ph\u1ea3i l\u00e0 ng\u01b0\u1eddi k\u00e9m gan d\u1ea1.\u201d</i><br><div style=\"text-align: right;\">(S\u1eed thi Hy L\u1ea1p, <i>Uy-l\u00edt-x\u01a1 tr\u1edf v\u1ec1</i>, theo <i>Ng\u1eef v\u0103n 10 N\u00e2ng cao</i>, t\u1eadp 2, NXB Gi\u00e1o d\u1ee5c Vi\u1ec7t Nam, 2011)</div><br>T\u00ednh c\u00e1ch n\u00e0o c\u1ee7a Uy-l\u00edt-x\u01a1 hi\u1ec7n l\u00ean qua l\u1eddi n\u00f3i c\u1ee7a T\u00ea-l\u00ea-m\u00e1c?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nD\u1ef1a v\u00e0o chi ti\u1ebft: \u201cCha th\u00e2n y\u00eau, vi\u1ec7c n\u00e0y xin \u0111\u1ec3 tu\u1ef3 cha \u0111\u1ecbnh li\u1ec7u, v\u00ec x\u01b0a nay cha v\u1eabn l\u00e0 ng\u01b0\u1eddi n\u1ed5i ti\u1ebfng kh\u00f4n ngoan, kh\u00f4ng m\u1ed9t k\u1  "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nC\u00e2u th\u01a1 \u201cC\u00f3 ch\u1ed3ng h\u1edd h\u1eefng c\u0169ng nh\u01b0 kh\u00f4ng.\u201d ch\u00ednh l\u00e0 l\u1eddi t\u1ef1 ph\u1ee7 nh\u1eadn b\u1ea3n th\u00e2n, th\u1ec3 hi\u1ec7n s\u1ef1 x\u1ea5u h\u1ed5 v\u00e0 t\u1ef1 \u00fd th\u1ee9c c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh - ng\u01b0\u1eddi ch\u1ed3ng - v\u1ec1 s\u1ef1 v\u00f4 d\u1ee5ng, kh\u00f4ng gi\u00fap \u0111\u1ee1 g\u00ec cho v\u1ee3, \u0111\u1ec3 v\u1ee3 ph\u1ea3i g\u00e1nh v\u00e1c m\u1ecdi chuy\u1ec7n trong gia \u0111\u00ecnh.\n", "key": "C", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604935, "lessonId": 0, "a": "M\u01b0\u1ee3n con m\u00e8o m\u1eb7t ng\u1ecdc c\u1ee7a Ng\u1ecdc Ho\u00e0ng th\u01b0\u1ee3ng \u0111\u1ebf.", "b": "L\u1ea5y h\u01b0\u01a1ng vi\u1ebft v\u00e0o gi\u1ea5y hai \u0111\u1ea1o b\u00f9a, sai \u0111em d\u00e1n v\u00e0o l\u01b0ng hai ng\u01b0\u1eddi.", "c": "Ki\u1ec7n \u0111\u1ebfn Bao C\u00f4ng, nh\u1edd Bao C\u00f4ng x\u1eed.", "d": "Ph\u00f9 ph\u00e9p.", "bookId": 1088907, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTa b\u00e8n sai \u0111\u1ed1t h\u01b0\u01a1ng c\u1ea7u kh\u1ea5n Ph\u00f9 \u0110\u1ed5ng Thi\u00ean V\u01b0\u01a1ng. H\u01b0\u01a1ng v\u1eeba m\u1edbi th\u1eafp l\u00ean, th\u00e1nh Ph\u00f9 \u0110\u1ed5ng \u1ee9ng v\u00e0o con \u0111\u1ed3ng t\u00e2u v\u1edbi ta r\u1eb1ng:<br><br>- \u0110\u00f3 l\u00e0 con chu\u1ed9t th\u00e0nh tinh, m\u1ed9t con chu\u1ed9t gi\u00e0, l\u00e2u nay \u0103n nhi\u1ec1u tinh hoa c\u1ee7a m\u1ecdi v\u1eadt m\u00e0 th\u00e0nh y\u00eau qu\u00e1i. N\u01b0\u1edbc, l\u1eeda c\u0169ng kh\u00f4ng th\u1ec3 gi\u1ebft \u0111\u01b0\u1ee3c n\u00f3, ph\u00f9 ph\u00e9p c\u0169ng kh\u00f4ng tr\u1eeb \u0111\u01b0\u1ee3c n\u00f3. Th\u1eadt l\u00e0 m\u1ed9t con tinh c\u00f3 t\u00e0i bi\u1ebfn h\u00f3a v\u00e0o b\u1eadc nh\u1ea5t t\u1eeb x\u01b0a \u0111\u1ebfn nay. Th\u1eddi T\u1ed1ng Nh\u00e2n T\u00f4ng, c\u00f3 l\u00fac n\u00f3 \u0111\u00e3 l\u00e0m Nh\u00e2n T\u00f4ng gi\u1ea3. Bao C\u00f4ng x\u1eed \u00e1n n\u00e0y cu\u1ed1i c\u00f9ng c\u0169ng ph\u1ea3i b\u00f3 tay, ph\u1ea3i c\u1ea7u \u0111\u1ebfn Ng\u1ecdc Ho\u00e0ng th\u01b0\u1ee3ng \u0111\u1ebf m\u01b0\u1ee3n \u0111\u01b0\u1ee3c con m\u00e8o m\u1eb7t ng\u1ecdc, l\u00fac \u0111\u00f3 n\u00f3 m\u1edbi kh\u00f4ng t\u00e0ng h\u00ecnh \u0111\u01b0\u1ee3c n\u1eefa, l\u1ed9 r\u00f5 ch\u00e2n t\u01b0\u1edbng, b\u1ecb m\u00e8o gi\u1ebft ch\u1ebft. Hi\u1ec7n nay \u1edf kho s\u00e1ch Thi\u00ean \u0111\u00ecnh qu\u00e1 nhi\u1ec1u, kh\u00f4ng th\u1ec3 m\u01b0\u1ee3n \u0111\u01b0\u1ee3c m\u00e8o nh\u00e0 tr\u1eddi. Th\u1ea7n xin v\u00ec b\u1ec7 h\u1ea1 m\u00e0 \u0111em kh\u00ed g\u01b0\u01a1m thi\u00eang soi xu\u1ed1ng \u0111\u1ec3 tr\u1eeb y\u00eau. B\u00e8n l\u1ea5y h\u01b0\u01a1ng vi\u1ebft v\u00e0o gi\u1ea5y hai \u0111\u1ea1o b\u00f9a, sai \u0111em d\u00e1n v\u00e0o l\u01b0ng hai ng\u01b0\u1eddi \u0111\u00f3. Lo\u00e0i y\u00eau qu\u00e1i c\u00f3 mu\u1ed1n ch\u1ea1y tho\u00e1t c\u0169ng kh\u00f4ng \u0111\u01b0\u1ee3c.\u201d</i><br><div style=\"text-align: right;\">(L\u00ea Th\u00e1nh T\u00f4ng, <i>Con chu\u1ed9t th\u00e0nh tinh</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 4, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div><br>Theo \u0111o\u1ea1n tr\u00edch, th\u00e1nh Ph\u00f9 \u0110\u1ed5ng \u0111\u00e3 gi\u00fap nh\u00e0 vua tr\u1eeb y\u00eau nh\u01b0 th\u1ebf n\u00e0o?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nD\u1ef1a v\u00e0o chi ti\u1ebft: \u201cTh\u1ea7n xin v\u00ec b\u1ec7 h\u1ea1 m\u00e0 \u0111em kh\u00ed g\u01b0\u01a1m thi\u00eang soi xu\u1ed1ng \u0111\u1ec3 tr\u1eeb y\u00eau. B\u00e8n l\u1ea5y h\u01b0\u01a1ng vi\u1ebft v\u00e0o gi\u1ea5y hai \u0111\u1ea1o b\u00f9a, sai \u0111em d\u00e1n v\u00e0o l\u01b0ng hai ng\u01b0\u1eddi \u0111\u00f3. Lo\u00e0i y\u00eau qu\u00e1i c\u00f3 mu\u1ed1n ch\u1ea1y tho\u00e1t c\u0169ng kh\u00f4ng \u0111\u01b0\u1ee3c.\u201d<br>\n\u2192 Theo \u0111o\u1ea1n tr\u00edch, th\u00e1nh Ph\u00f9 \u0110\u1ed5ng \u0111\u00e3 gi\u00fap nh\u00e0 vua tr\u1eeb y\u00eau b\u1eb1ng c\u00e1ch l\u1ea5y h\u01b0\u01a1ng vi\u1ebft v\u00e0o gi\u1ea5y hai \u0111\u1ea1o b\u00f9a, sai \u0111em d\u00e1n v\u00e0o l\u01b0ng hai ng\u01b0\u1eddi.\n", "key": "B", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604944, "lessonId": 0, "a": "\u201cCh\u1ec9 h\u1eefu s\u1ea5u t\u00edch, v\u00f4 sung ph\u00ec.\u201d (Ch\u1ec9 th\u1ea5y ng\u01b0\u1eddi g\u00e0y g\u00f2, ch\u1eb3ng th\u1ea5y ai b\u00e9o t\u1ed1t!).", "b": "\u201cTr\u1ea7n ai c\u1ed5n c\u1ed5n \u00f4 nh\u00e2n y.\u201d (Th\u00e0nh qu\u00e1ch nh\u01b0 x\u01b0a, nh\u00e2n d\u00e2n \u0111\u00e3 \u0111\u1ed5i kh\u00e1c.).", "c": "\u201cXu\u1ea5t gi\u1ea3 khu xa, nh\u1eadp c\u1ee9 t\u1ecda,/ T\u1ecda \u0111\u00e0m l\u1eadp ngh\u1ecb giai Cao, Qu\u1ef3!\u201d (C\u00f2n ng\u01b0\u1eddi ta \u0111i ra th\u00ec xe ng\u1ef1a ngh\u00eanh ngang, v\u00e0o th\u00ec ng\u1ed3i ch\u1ec5m ch\u1ec7, m\u1eb7t v\u00eanh v\u00e1c./ \u0110\u1ee9ng ng\u1ed3i b\u00e0n lu\u1eadn nh\u01b0 Cao, Qu\u1ef3).", "d": "\u201cB\u1ea5t l\u1ed9 tr\u1ea3o nha d\u1eef gi\u00e1c \u0111\u1ed9c,/ Gi\u1ea3o t\u01b0\u1edbc nh\u00e2n nh\u1ee5c cam nh\u01b0 di!\u201d (Kh\u00f4ng \u0111\u1ec3 l\u1ed9 nanh vu\u1ed1t s\u1eebng nh\u1ecdn v\u00e0 ng\u00f2i \u0111\u1ed9c,/ Nh\u01b0ng nhai th\u1ecbt ng\u01b0\u1eddi c\u1ee9 ng\u1ecdt x\u1edbt.).", "bookId": 1088908, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTh\u00e0nh qu\u00e1ch do th\u1ecb, nh\u00e2n d\u00e2n phi.<br><br>Tr\u1ea7n ai c\u1ed5n c\u1ed5n \u00f4 nh\u00e2n y.<br><br>Xu\u1ea5t gi\u1ea3 khu xa, nh\u1eadp c\u1ee9 t\u1ecda,<br><br>T\u1ecda \u0111\u00e0m l\u1eadp ngh\u1ecb giai Cao, Qu\u1ef3!<br><br>B\u1ea5t l\u1ed9 tr\u1ea3o nha d\u1eef gi\u00e1c \u0111\u1ed9c,<br><br>Gi\u1ea3o t\u01b0\u1edbc nh\u00e2n nh\u1ee5c cam nh\u01b0 di!<br><br>Qu\u00e2n b\u1ea5t ki\u1ebfn H\u1ed3 Nam s\u1ed5 b\u00e1ch ch\u00e2u,<br><br>Ch\u1ec9 h\u1eefu s\u1ea5u t\u00edch, v\u00f4 sung ph\u00ec.\u201d</i><br><br>D\u1ecbch ngh\u0129a:<br><i><br>\u201cTh\u00e0nh qu\u00e1ch nh\u01b0 x\u01b0a, nh\u00e2n d\u00e2n \u0111\u00e3 \u0111\u1ed5i kh\u00e1c.<br><br>B\u1ee5i bay m\u00f9 m\u1ecbt l\u00e0m \u00e1o qu\u1ea7n m\u00ecnh lem lu\u1ed1c,<br><br>C\u00f2n ng\u01b0\u1eddi ta \u0111i ra th\u00ec xe ng\u1ef1a ngh\u00eanh ngang, v\u00e0o th\u00ec ng\u1ed3i ch\u1ec5m ch\u1ec7, m\u1eb7t v\u00eanh v\u00e1c.<br><br>\u0110\u1ee9ng ng\u1ed3i b\u00e0n lu\u1eadn nh\u01b0 Cao, Qu\u1ef3 <br><br>Kh\u00f4ng \u0111\u1ec3 l\u1ed9 nanh vu\u1ed1t s\u1eebng nh\u1ecdn v\u00e0 ng\u00f2i \u0111\u1ed9c,<br><br>Nh\u01b0ng nhai th\u1ecbt ng\u01b0\u1eddi c\u1ee9 ng\u1ecdt x\u1edbt.<br><br>H\u1ed3n ch\u1eb3ng th\u1ea5y m\u1ea5y tr\u0103m ch\u00e2u \u1edf H\u1ed3 Nam,<br><br>Ch\u1ec9 th\u1ea5y ng\u01b0\u1eddi g\u00e0y g\u00f2, ch\u1eb3ng th\u1ea5y ai b\u00e9o t\u1ed1t!\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Du, <i>Ph\u1ea3n Chi\u00eau h\u1ed3n</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div><br>Nh\u1eefng d\u00f2ng th\u01a1 n\u00e0o t\u00f4 \u0111\u1eadm s\u1ef1 nham hi\u1ec3m, t\u00e0n \u0111\u1ed9c c\u1ee7a \u0111\u00e1m ng\u01b0\u1eddi xe ng\u1ef1a ngh\u00eanh ngang?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nHai d\u00f2ng th\u01a1 \u201cB\u1ea5t l\u1ed9 tr\u1ea3o nha d\u1eef gi\u00e1c \u0111\u1ed9c,/ Gi\u1ea3o t\u01b0\u1edbc nh\u00e2n nh\u1ee5c cam nh\u01b0 di!\u201d (Kh\u00f4ng \u0111\u1ec3 l\u1ed9 nanh vu\u1ed1t s\u1eebng nh\u1ecdn v\u00e0 ng\u00f2i \u0111\u1ed9c,/ Nh\u01b0ng nhai th\u1ecbt ng\u01b0\u1eddi c\u1ee9 ng\u1ecdt x\u1edbt.) l\u1ed9t t\u1ea3 s\u1ef1 nham hi\u1ec3m, t\u00e0n \u0111\u1ed9c c\u1ee7a \u0111\u00e1m ng\u01b0\u1eddi xe ng\u1ef1a ngh\u00eanh ngang. Nh\u1eefng h\u00ecnh \u1ea3nh \u1ea9n d\u1ee5 \u201cnanh vu\u1ed1t\u201d, \u201cs\u1eebng nh\u1ecdn\u201d, \u201cng\u00f2i \u0111\u1ed9c\u201d, \u201cnhai th\u1ecbt ng\u01b0\u1eddi\u201d cho th\u1ea5y b\u1ea3n ch\u1ea5t t\u00e0n \u00e1c, nham hi\u1ec3m \u1ea9n sau v\u1ebb ngo\u00e0i \u0111\u1ea1o m\u1ea1o c\u1ee7a \u0111\u00e1m ng\u01b0\u1eddi n\u00e0y. H\u1ecd kh\u00f4ng l\u1ed9 ra v\u1ebb t\u00e0n b\u1ea1o b\u00ean ngo\u00e0i, kh\u00f4ng d\u00f9ng v\u0169 l\u1ef1c th\u00f4 b\u1ea1o m\u00e0 \u00e2m th\u1ea7m, l\u1eb7ng l\u1ebd b\u00f3c l\u1ed9t, v\u01a1 v\u00e9t c\u1ee7a c\u1ea3i c\u1ee7a ng\u01b0\u1eddi d\u00e2n, xem n\u1ed7i \u0111au kh\u1ed5 c\u1ee7a ng\u01b0\u1eddi kh\u00e1c nh\u01b0 m\u1ed9t th\u1ee9 \u201cm\u1eadt ng\u1ecdt\u201d \u0111\u1ec3 t\u1eadn h\u01b0\u1edfng.\n", "key": "D", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604949, "lessonId": 0, "a": "\u00d4ng t\u00f4i nh\u1eb7t con h\u1ebfn tr\u1eafng b\u1ecf v\u00e0o c\u00e1i ch\u1eadu s\u00e0nh.", "b": "\u00d4ng t\u00f4i c\u0169ng l\u00e0m ngh\u1ec1 ch\u00e0i l\u01b0\u1edbi.", "c": "Quan \u0111\u1ebfn \u0111\u00f2i thu l\u1ea1i c\u00e1i l\u1ecd v\u00e0ng.", "d": "\u0110\u00eam \u0111\u00eam, con h\u1ebfn tr\u1eafng t\u1eeb t\u1eeb m\u1edf mi\u1ec7ng v\u00e0 h\u00e1t; ai thu\u1ed9c \u0111\u01b0\u1ee3c c\u00e2u h\u00e1t th\u00ec tr\u1ebb m\u00e3i.", "bookId": 1088909, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c[...] ng\u00e0y x\u01b0a \u00f4ng t\u00f4i c\u0169ng l\u00e0m ngh\u1ec1 ch\u00e0i l\u01b0\u1edbi. M\u1ed9t h\u00f4m \u00f4ng th\u1ea3 l\u01b0\u1edbi v\u1edbt c\u00e1i l\u1ecd v\u00e0ng. L\u1eddi \u0111\u1ed3n \u0111\u1ebfn tai quan. Quan \u0111\u1ebfn \u0111\u00f2i thu l\u1ea1i c\u00e1i l\u1ecd. \u00d4ng t\u00f4i ph\u1ea3i n\u1ed9p cho quan. Quan c\u1ea7m c\u00e1i l\u1ecd d\u1ed1c ng\u01b0\u1ee3c \u0111\u1ec3 \u0111\u1ed5 ch\u00fat n\u01b0\u1edbc s\u00f4ng c\u00f2n \u0111\u1ecdng trong l\u1ecd ra. T\u1eeb trong l\u1ecd m\u1ed9t con h\u1ebfn tr\u1eafng r\u01a1i xu\u1ed1ng c\u00e1t. \u00d4ng t\u00f4i nh\u1eb7t con h\u1ebfn tr\u1eafng b\u1ecf v\u00e0o c\u00e1i ch\u1eadu s\u00e0nh. \u0110\u00eam \u0111\u00eam, khi \u00f4ng t\u00f4i \u0111i ng\u1ee7 th\u00ec con h\u1ebfn tr\u1eafng t\u1eeb t\u1eeb m\u1edf mi\u1ec7ng v\u00e0 h\u00e1t. \u00d4ng t\u00f4i thu\u1ed9c c\u00e2u h\u00e1t \u1ea5y, truy\u1ec1n l\u1ea1i cho b\u1ed1 t\u00f4i. Ai thu\u1ed9c \u0111\u01b0\u1ee3c c\u00e2u h\u00e1t th\u00ec tr\u1ebb m\u00e3i.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Quang Thi\u1ec1u, <i>D\u00f2ng s\u00f4ng v\u1eabn ng\u00e2n nga kh\u00fac h\u00e1t</i>, theo <i>vanvn.vn</i>)</div><br>X\u00e1c \u0111\u1ecbnh y\u1ebfu t\u1ed1 k\u00ec \u1ea3o trong \u0111o\u1ea1n tr\u00edch.", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nC\u00e1c chi ti\u1ebft <i>\u0110\u00eam \u0111\u00eam, con h\u1ebfn tr\u1eafng t\u1eeb t\u1eeb m\u1edf mi\u1ec7ng v\u00e0 h\u00e1t; ai thu\u1ed9c \u0111\u01b0\u1ee3c c\u00e2u h\u00e1t th\u00ec tr\u1ebb m\u00e3i</i> l\u00e0 nh\u1eefng y\u1ebfu t\u1ed1 k\u00ec \u1ea3o, mang m\u00e0u s\u1eafc huy\u1ec1n b\u00ed, kh\u00f4ng th\u1ec3 x\u1ea3y ra trong \u0111\u1eddi th\u1ef1c.\n", "key": "D", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604957, "lessonId": 0, "a": "\u201cEm\u201d th\u1eb9n th\u00f9ng che m\u00e1.", "b": "\u201cEm\u201d h\u00e1t \u0111\u1eafm say.", "c": "N\u01b0\u1edbc m\u1eaft \u201cem\u201d r\u01a1i ngay c\u1ea3 khi \u0111ang h\u00e1t.", "d": "\u201cEm\u201d h\u00e1t nh\u01b0 th\u1ec3 cu\u1ed9c \u0111\u1eddi to\u00e0n nh\u00e0n h\u1ea1.", "bookId": 1088910, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<b>H\u1ed9i Lim<br><br>(V\u0169 \u0110\u00ecnh Minh)</b><br><i><br>T\u00f4i tr\u00f3t bi\u1ebft \u0111\u1eddi ri\u00eang em tr\u1eafc tr\u1edf, <br><br>N\u00ean h\u1ed9i n\u00e0y em h\u00e1t ch\u1eb3ng v\u00f4 t\u01b0! <br><br>N\u00f3n th\u00fang quai thao em th\u1eb9n th\u00f9ng che m\u00e1, <br><br>H\u00e1t \u0111\u1eafm say cho \u0111\u1ee9t ru\u1ed9t gan ng\u01b0\u1eddi. <br><br>H\u00e1t nh\u01b0 th\u1ec3 cu\u1ed9c \u0111\u1eddi to\u00e0n nh\u00e0n h\u1ea1, <br><br>Ch\u1ec9 \u0111\u1ec3 y\u00eau, \u0111\u1ec3 nh\u1edb, \u0111\u1ec3 th\u01b0\u01a1ng th\u00f4i. <br><br>Xin gi\u00f3 l\u1ea1nh \u0111\u1eebng l\u1eadt nghi\u00eang v\u00e0nh n\u00f3n, <br><br>K\u1ebbo t\u00f4i nh\u00ecn th\u1ea5y n\u01b0\u1edbc m\u1eaft em r\u01a1i...</i><br><div style=\"text-align: right;\">(Theo <i>sggp.org.vn</i>)</div><br>Chi ti\u1ebft n\u00e0o trong b\u00e0i th\u01a1 ch\u1ee9ng t\u1ecf \u201c\u0111\u1eddi ri\u00eang em tr\u1eafc tr\u1edf\u201d?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nChi ti\u1ebft <i>n\u01b0\u1edbc m\u1eaft \u201cem\u201d r\u01a1i</i> ngay c\u1ea3 khi \u0111ang h\u00e1t ch\u1ee9ng t\u1ecf n\u1ed7i bu\u1ed3n s\u00e2u k\u00edn trong l\u00f2ng \u201cem\u201d, h\u00e9 l\u1ed9 cu\u1ed9c \u0111\u1eddi ri\u00eang \u0111\u1ea7y tr\u1eafc tr\u1edf c\u1ee7a \u201cem\u201d.", "key": "C", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604964, "lessonId": 0, "a": "Nhung c\u1ea5t ti\u1ebfng khen m\u1ea5y b\u00f4ng hoa c\u1eafm trong b\u00ecnh.", "b": "Nhung tr\u00e1nh sang m\u1ed9t b\u00ean \u0111\u1ee9ng l\u1ea9n trong b\u00f3ng c\u00e1i b\u00ecnh hoa \u0111\u1eb7t c\u1ea1nh \u0111\u00e8n \u0111\u1ec3 \u0111\u01b0\u1ee3c t\u1ef1 do nh\u00ecn Ngh\u0129a.", "c": "Nhung g\u01b0\u1ee3ng nh\u1eb9 x\u1ebfp \u0111\u1eb7t m\u1ea5y c\u00e1i c\u1ed1c chung quanh ria b\u00e0n.", "d": "Ngo\u00e0i nh\u00e0 \u0111\u00e3 l\u00ean \u0111\u00e8n.", "bookId": 1088911, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNgo\u00e0i nh\u00e0 \u0111\u00e3 l\u00ean \u0111\u00e8n. Nhung g\u01b0\u1ee3ng nh\u1eb9 x\u1ebfp \u0111\u1eb7t m\u1ea5y c\u00e1i c\u1ed1c chung quanh ria b\u00e0n. Tr\u00ean tay n\u00e0ng, \u00e1nh \u0111\u00e8n xanh chi\u1ebfu xu\u1ed1ng v\u00e0nh c\u1ed1c th\u1ee7y tinh trong l\u00e0m l\u1ea5p l\u00e1nh nh\u1eefng tia s\u00e1ng. Nhung tr\u00e1nh sang m\u1ed9t b\u00ean \u0111\u1ee9ng l\u1ea9n trong b\u00f3ng c\u00e1i b\u00ecnh hoa \u0111\u1eb7t c\u1ea1nh \u0111\u00e8n \u0111\u1ec3 \u0111\u01b0\u1ee3c t\u1ef1 do nh\u00ecn Ngh\u0129a.<br><br>Th\u1ea5y Ngh\u0129a \u0111\u01b0\u01a1ng m\u1ea3i n\u00f3i chuy\u1ec7n v\u1edbi L\u1ecbch, Nhung c\u1ea5t ti\u1ebfng khen m\u1ea5y b\u00f4ng hoa c\u1eafm trong b\u00ecnh: c\u1ed1t \u00fd c\u1ee7a n\u00e0ng l\u00e0 \u0111\u1ec3 cho Ngh\u0129a nh\u00ecn \u0111\u1ebfn m\u00ecnh.\u201d</i><br><div style=\"text-align: right;\">(Nh\u1ea5t Linh, <i>L\u1ea1nh l\u00f9ng</i>, theo <i>Tuy\u1ec3n t\u1eadp T\u1ef1 l\u1ef1c v\u0103n \u0111o\u00e0n</i>, t\u1eadp 1, NXB H\u1ed9i Nh\u00e0 v\u0103n, 2004)</div><br>Chi ti\u1ebft n\u00e0o kh\u1eafc ho\u1ea1 t\u00ecnh c\u1ea3m Nhung d\u00e0nh cho ngh\u0129a?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nChi ti\u1ebft \u201cNhung tr\u00e1nh sang m\u1ed9t b\u00ean \u0111\u1ee9ng l\u1ea9n trong b\u00f3ng c\u00e1i b\u00ecnh hoa \u0111\u1eb7t c\u1ea1nh \u0111\u00e8n \u0111\u1ec3 \u0111\u01b0\u1ee3c t\u1ef1 do nh\u00ecn Ngh\u0129a\u201d cho th\u1ea5y Nhung \u0111\u00e3 t\u00ecm c\u00e1ch \u0111\u1ec3 \u0111\u01b0\u1ee3c quan s\u00e1t Ngh\u0129a m\u00e0 kh\u00f4ng b\u1ecb ph\u00e1t hi\u1ec7n. H\u00e0nh \u0111\u1ed9ng n\u00e0y cho th\u1ea5y t\u00ecnh c\u1ea3m th\u1ea7m k\u00edn c\u1ee7a Nhung d\u00e0nh cho Ngh\u0129a, c\u00f4 mong \u0111\u01b0\u1ee3c nh\u00ecn ng\u01b0\u1eddi m\u00ecnh th\u00edch nh\u01b0ng l\u1ea1i ng\u1ea1i ng\u00f9ng, kh\u00f4ng d\u00e1m th\u1ec3 hi\u1ec7n tr\u1ef1c ti\u1ebfp.", "key": "B", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604968, "lessonId": 0, "a": "H\u1ed3n Ma \u1ed1m b\u1ec7nh m\u00e0 ch\u1ebft.", "b": "Hamlet.", "c": "Ho\u00e0ng h\u1eadu.", "d": "Em trai ru\u1ed9t H\u1ed3n Ma, ch\u00fa ru\u1ed9t Hamlet.", "bookId": 1088912, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cHAMLET - \u00d4i t\u00e2m h\u1ed3n ti\u00ean tri c\u1ee7a ta! Ch\u00fa ru\u1ed9t ta!<br><br>H\u1ed2N MA - Ch\u00ednh n\u00f3, ch\u00ednh th\u1eb1ng s\u00fac sinh lo\u1ea1n lu\u00e2n, gian d\u00e2m \u1ea5y \u0111\u00e3 \u0111em t\u00e0i c\u00e1m d\u1ed7, \u0111em nh\u1eefng t\u1eb7ng v\u1eadt l\u1eeba d\u1ed1i - \u00f4i, t\u00e0i \u0111\u1ed9c \u00e1c v\u00e0 t\u1eb7ng v\u1eadt gh\u00ea g\u1edbm \u0111\u00e3 quy\u1ebfn r\u0169 l\u00f2ng ng\u01b0\u1eddi! - \u0111\u1ec3 l\u00f4i cu\u1ed1n v\u00e0o v\u00f2ng d\u00e2m \u00f4 b\u1ec9 \u1ed5i ho\u00e0ng h\u1eadu c\u1ee7a ta, ng\u01b0\u1eddi m\u00e0 x\u01b0a kia ai c\u0169ng t\u01b0\u1edfng l\u00e0 \u0111\u1ee9c h\u1ea1nh nh\u1ea5t tr\u1ea7n \u0111\u1eddi. Hamlet \u01a1i, th\u1eadt l\u00e0 sa \u0111\u1ecda! M\u1eb9 con \u0111\u00e3 b\u1ecf ta trong khi ta v\u1eabn \u0111\u01b0\u1eddng \u0111\u01b0\u1eddng ch\u00ednh ch\u00ednh th\u01b0\u01a1ng y\u00eau m\u1eb9 con th\u1ee7y chung nh\u01b0 l\u1eddi th\u1ec1 ng\u00e0y h\u00f4n l\u1ec5, \u0111\u1ec3 ng\u1ea3 v\u00e0o tay th\u1eb1ng kh\u1ed1n n\u1ea1n \u1ea5y, b\u1ea9m sinh t\u00e0i \u0111\u1ee9c v\u1ed1n ch\u1eb3ng th\u1ec3 s\u00e1nh n\u1ed5i v\u1edbi ta. Song ni\u1ec1m \u0111\u1ee9c h\u1ea1nh th\u00ec d\u00f9 s\u1ef1 b\u1ea5t ch\u00ednh c\u00f3 kho\u00e1c \u00e1o th\u1ea7n ti\u00ean m\u00e0 ve v\u00e3n c\u0169ng kh\u00f4ng th\u1ec3 lay chuy\u1ec3n n\u1ed5i, c\u00f2n th\u00f3i d\u00e2m \u00f4 th\u00ec d\u00f9 c\u00f3 t\u1eafm trong \u00e1nh s\u00e1ng huy ho\u00e0ng c\u1ee7a long s\u00e0ng c\u0169ng ch\u1ec9 c\u00f3 th\u1ec3 th\u1ecfa m\u00e3n trong \u00f4 u\u1ebf m\u00e0 th\u00f4i.\u201d</i><br><div style=\"text-align: right;\">(William Shakespeare, <i>Hamlet</i>, theo <i>Tuy\u1ec3n t\u1eadp t\u00e1c ph\u1ea9m - William Shakespeare</i>, NXB S\u00e2n kh\u1ea5u, 2006)</div><br>Theo \u0111o\u1ea1n tr\u00edch, ai l\u00e0 ng\u01b0\u1eddi \u0111\u00e3 gi\u1ebft h\u1ea1i H\u1ed3n Ma?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nTrong \u0111o\u1ea1n tr\u00edch, H\u1ed3n Ma ti\u1ebft l\u1ed9 v\u1edbi Hamlet - con trai m\u00ecnh - r\u1eb1ng ng\u01b0\u1eddi \u0111\u00e3 s\u00e1t h\u1ea1i \u00f4ng ch\u00ednh l\u00e0 em trai ru\u1ed9t c\u1ee7a m\u00ecnh \u2013 t\u1ee9c l\u00e0 vua Claudius, \u0111\u1ed3ng th\u1eddi c\u0169ng l\u00e0 ch\u00fa ru\u1ed9t c\u1ee7a Hamlet.\n", "key": "D", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604975, "lessonId": 0, "a": "\u0110\u01b0\u1eddng s\u1eaft t\u1eeb Vinh \u0111\u1ebfn \u0110\u00f4ng H\u00e0 v\u00e0 b\u1ed1n h\u1ec7 th\u1ed1ng \u0111\u1ea1i th\u1ee7y n\u00f4ng.", "b": "\u0110\u01b0\u1eddng c\u00e1i v\u00e0 dinh th\u1ef1.", "c": "Dinh th\u1ef1 v\u00e0 c\u00f4ng s\u1edf cho c\u00f4ng ch\u1ee9c.", "d": "Nh\u1eefng \u0111\u01b0\u1eddng \u00f4 t\u00f4 ch\u1ea1y m\u00e0 tr\u00ean \u0111\u00f3 kh\u00f4ng h\u1ec1 l\u01b0u th\u00f4ng \u0111\u01b0\u1ee3c l\u1ea5y m\u1ed9t t\u1ea5n h\u00e0ng ho\u00e1.", "bookId": 1088913, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cC\u00e1ch \u0111\u00e2y m\u01b0\u1eddi n\u0103m, \u00f4ng Xar\u00f4  c\u00f3 \u0111\u01b0a th\u00f4ng qua m\u1ed9t ch\u01b0\u01a1ng tr\u00ecnh ki\u1ebfn thi\u1ebft bao g\u1ed3m vi\u1ec7c x\u00e2y d\u1ef1ng con \u0111\u01b0\u1eddng s\u1eaft t\u1eeb Vinh \u0111\u1ebfn \u0110\u00f4ng H\u00e0 v\u00e0 b\u1ed1n h\u1ec7 th\u1ed1ng \u0111\u1ea1i th\u1ee7y n\u00f4ng; t\u1ea5t c\u1ea3 nh\u1eefng c\u00f4ng tr\u00ecnh \u0111\u00f3 \u0111\u1ec1u \u0111\u00e3 ng\u1eebng t\u1eeb h\u01a1n n\u0103m n\u0103m nay, l\u1ea5y c\u1edb l\u00e0 kh\u00f4ng c\u00f3 kinh ph\u00ed. Nh\u01b0ng c\u0169ng trong th\u1eddi gian \u0111\u00f3, x\u1ee9 \u0110\u00f4ng D\u01b0\u01a1ng \u0111\u00e3 d\u00e0nh ra 65 tri\u1ec7u \u0111\u1ed3ng, 450 tri\u1ec7u fr\u0103ng \u0111\u1ec3 x\u00e2y d\u1ef1ng \u0111\u01b0\u1eddng c\u00e1i v\u00e0 dinh th\u1ef1. M\u1eddi \u00f4ng Phagi\u00ea h\u00e3y suy ngh\u0129 v\u1ec1 nh\u1eefng con s\u1ed1 \u0111\u00f3 xem! G\u1ea7n m\u1ed9t n\u1eeda t\u1ec9 \u0111\u00e3 chi ph\u00ed \u0111\u1ec3 x\u00e2y d\u1ef1ng nh\u1eefng \u0111\u01b0\u1eddng \u00f4 t\u00f4 ch\u1ea1y m\u00e0 tr\u00ean \u0111\u00f3 kh\u00f4ng h\u1ec1 l\u01b0u th\u00f4ng \u0111\u01b0\u1ee3c l\u1ea5y m\u1ed9t t\u1ea5n h\u00e0ng ho\u00e1 n\u00e0o; \u0111\u1ec3 d\u1ef1ng nh\u1eefng dinh th\u1ef1 v\u00e0 c\u00f4ng s\u1edf cho h\u1eb1ng h\u00e0 sa s\u1ed1 c\u00f4ng ch\u1ee9c \u0111ang sinh s\u00f4i n\u1ea3y n\u1edf nh\u01b0 c\u00e2y c\u1ed1i sum s\u00ea v\u00f9ng nhi\u1ec7t \u0111\u1edbi; trong khi \u1ea5y th\u00ec nh\u1eefng c\u00f4ng tr\u00ecnh \u0111\u00e3 \u0111\u01b0\u1ee3c th\u1eeba nh\u1eadn l\u00e0 t\u1ed1i c\u1ea7n thi\u1ebft v\u00e0 \u0111\u00e3 \u0111\u01b0\u1ee3c Ngh\u1ecb vi\u1ec7n th\u00f4ng qua r\u1ed3i, l\u1ea1i b\u1ecb b\u1ecf r\u01a1i!\u201d</i><br><br>(Nguy\u1ec5n \u00c1i Qu\u1ed1c, <i>S\u1ef1 th\u1ecbnh v\u01b0\u1ee3ng c\u1ee7a \u0110\u00f4ng D\u01b0\u01a1ng d\u01b0\u1edbi tri\u1ec1u \u0111\u1ea1i M. L\u00f4ng</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)<br><br>Theo \u0111o\u1ea1n tr\u00edch, x\u1ee9 \u0110\u00f4ng D\u01b0\u01a1ng \u0111\u00e3 <b>kh\u00f4ng </b>d\u00e0nh ti\u1ec1n \u0111\u1ec3 x\u00e2y d\u1ef1ng g\u00ec?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nD\u1ef1a v\u00e0o chi ti\u1ebft: \u201cC\u00e1ch \u0111\u00e2y m\u01b0\u1eddi n\u0103m, \u00f4ng Xar\u00f4 c\u00f3 \u0111\u01b0a th\u00f4ng qua m\u1ed9t ch\u01b0\u01a1ng tr\u00ecnh ki\u1ebfn thi\u1ebft bao g\u1ed3m vi\u1ec7c x\u00e2y d\u1ef1ng con \u0111\u01b0\u1eddng s\u1eaft t\u1eeb Vinh \u0111\u1ebfn \u0110\u00f4ng H\u00e0 v\u00e0 b\u1ed1n h\u1ec7 th\u1ed1ng \u0111\u1ea1i th\u1ee7y n\u00f4ng; t\u1ea5t c\u1ea3 nh\u1eefng c\u00f4ng tr\u00ecnh \u0111\u00f3 \u0111\u1ec1u \u0111\u00e3 ng\u1eebng t\u1eeb h\u01a1n n\u0103m n\u0103m nay, l\u1ea5y c\u1edb l\u00e0 kh\u00f4ng c\u00f3 kinh ph\u00ed.\u201d<br>\n\u2192 Theo \u0111o\u1ea1n tr\u00edch, x\u1ee9 \u0110\u00f4ng D\u01b0\u01a1ng \u0111\u00e3 kh\u00f4ng d\u00e0nh ti\u1ec1n \u0111\u1ec3 x\u00e2y d\u1ef1ng \u0111\u01b0\u1eddng s\u1eaft t\u1eeb Vinh \u0111\u1ebfn \u0110\u00f4ng H\u00e0 v\u00e0 b\u1ed1n h\u1ec7 th\u1ed1ng \u0111\u1ea1i th\u1ee7y n\u00f4ng.\n", "key": "A", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604980, "lessonId": 0, "a": "Th\u1ea7y t\u00f4i l\u00e0m cai ng\u1ee5c.", "b": "Con m\u1ed9t nh\u00e0 bu\u00f4n b\u00e1n rau \u0111\u1eadu, tr\u1ea7u cau l\u1ea7n h\u1ed3i \u1edf c\u00e1c ch\u1ee3 v\u00e0 tr\u00ean \u0111\u01b0\u1eddng s\u00f4ng Nam \u0110\u1ecbnh - H\u1ea3i Ph\u00f2ng.", "c": "Kho\u1ea3ng m\u01b0\u1eddi l\u0103m tu\u1ed5i.", "d": "M\u1ed9t b\u00ean s\u1ee3 nguy hi\u1ec3m gi\u1eef con g\u00e1i \u0111\u1eb9p \u0111\u1ebfn th\u00ec \u1edf trong nh\u00e0.", "bookId": 1088914, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c... Th\u1ea7y t\u00f4i l\u00e0m cai ng\u1ee5c. M\u1eb9 t\u00f4i l\u00e0 con m\u1ed9t nh\u00e0 bu\u00f4n b\u00e1n rau \u0111\u1eadu, tr\u1ea7u cau l\u1ea7n h\u1ed3i \u1edf c\u00e1c ch\u1ee3 v\u00e0 tr\u00ean \u0111\u01b0\u1eddng s\u00f4ng Nam \u0110\u1ecbnh - H\u1ea3i Ph\u00f2ng. Tu\u1ed5i th\u1ea7y t\u00f4i h\u01a1n ba m\u01b0\u01a1i, g\u1ea5p \u0111\u00f4i tu\u1ed5i m\u1eb9 t\u00f4i. Hai th\u00e2n t\u00f4i l\u1ea5y nhau kh\u00f4ng ph\u1ea3i v\u00ec quen bi\u1ebft nhau l\u00e2u m\u00e0 th\u01b0\u01a1ng y\u00eau nhau. Ch\u1ec9 v\u00ec hai b\u00ean cha m\u1eb9, m\u1ed9t b\u00ean hi\u1ebfm hoi mu\u1ed9n ch\u00e1u v\u00e0 c\u00f3 c\u1ee7a; m\u1ed9t b\u00ean s\u1ee3 nguy hi\u1ec3m gi\u1eef con g\u00e1i \u0111\u1eb9p \u0111\u1ebfn th\u00ec \u1edf trong nh\u00e0 v\u00e0 mu\u1ed1n cho ng\u01b0\u1eddi con \u1ea5y c\u00f3 ch\u1ed7 n\u01b0\u01a1ng t\u1ef1a ch\u1eafc ch\u1eafn, \u0111\u01b0\u1ee3c c\u1ea3 m\u1ed9t d\u00f2ng h\u1ecd tr\u1ecdng \u0111\u00e3i n\u1ebfu m\u1eafn con.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u00ean H\u1ed3ng, <i>Nh\u1eefng ng\u00e0y th\u01a1 \u1ea5u</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 33, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div><br>Chi ti\u1ebft n\u00e0o g\u1ee3i t\u1ea3 nhan s\u1eafc c\u1ee7a \u201cm\u1eb9\u201d t\u00f4i?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nChi ti\u1ebft \u201cM\u1ed9t b\u00ean s\u1ee3 nguy hi\u1ec3m gi\u1eef con g\u00e1i \u0111\u1eb9p \u0111\u1ebfn th\u00ec \u1edf trong nh\u00e0\u201d g\u1ee3i t\u1ea3 nhan s\u1eafc c\u1ee7a m\u1eb9 t\u00f4i th\u00f4ng qua c\u1ee5m t\u1eeb \u201ccon g\u00e1i \u0111\u1eb9p \u0111\u1ebfn th\u00ec\u201d. Chi ti\u1ebft n\u00e0y cho th\u1ea5y m\u1eb9 c\u1ee7a nh\u00e2n v\u1eadt \u201ct\u00f4i\u201d l\u00e0 m\u1ed9t c\u00f4 g\u00e1i \u0111\u1eb9p, \u0111\u1ebfn tu\u1ed5i tr\u01b0\u1edfng th\u00e0nh v\u00e0 \u0111\u01b0\u1ee3c gia \u0111\u00ecnh b\u1ea3o v\u1ec7 k\u1ef9 l\u01b0\u1ee1ng.\n", "key": "D", "isVideo": true, "score": 0, "order": 11, "fillKey": "", "yourKey": "", "isTeste u00e9p nh\u01b0ng ch\u1ec9 \u0111\u1ee7 cho b\u1ed1 m\u1eb9 t\u1ed5 ch\u1ee9c xong \u0111\u00e1m c\u01b0\u1edbi l\u00e0 l\u00ean \u0111\u01b0\u1eddng.", "c": "G\u1ecdi l\u00e0 ngh\u1ec9 ph\u00e9p song ch\u1ec9 \u0111\u1ee7 cho b\u1ed1 m\u1eb9 t\u1ed5 ch\u1ee9c xong \u0111\u00e1m c\u01b0\u1edbi l\u00e0 l\u00ean \u0111\u01b0\u1eddng.", "d": "G\u1ecdi l\u00e0 ngh\u1ec9 ph\u00e9p v\u1eady nh\u01b0ng ch\u1ec9 \u0111\u1ee7 cho b\u1ed1 m\u1eb9 t\u1ed5 ch\u1ee9c xong \u0111\u00e1m c\u01b0\u1edbi l\u00e0 l\u00ean \u0111\u01b0\u1eddng.", "bookId": 1088923, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Ch\u1ec9 ra c\u00e2u sai trong c\u00e1c c\u00e2u sau:", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nC\u00e2u \u201cG\u1ecdi l\u00e0 ngh\u1ec9 ph\u00e9p do ch\u1ec9 \u0111\u1ee7 cho b\u1ed1 m\u1eb9 t\u1ed5 ch\u1ee9c xong \u0111\u00e1m c\u01b0\u1edbi l\u00e0 l\u00ean \u0111\u01b0\u1eddng.\u201d s\u1eed d\u1ee5ng sai quan h\u1ec7 t\u1eeb \u201cdo\u201d. \u201cDo\u201d th\u01b0\u1eddng d\u00f9ng \u0111\u1ec3 ch\u1ec9 nguy\u00ean nh\u00e2n, l\u00fd do tuy nhi\u00ean hai m\u1ec7nh \u0111\u1ec1 trong c\u00e2u c\u00f3 m\u1ed1i quan h\u1ec7 t\u01b0\u01a1ng ph\u1ea3n, \u0111\u1ed1i l\u1eadp ch\u1ee9 kh\u00f4ng ph\u1ea3i quan h\u1ec7 nh\u00e2n qu\u1ea3 n\u00ean s\u1eed d\u1ee5ng t\u1eeb \u201cdo\u201d l\u00e0 kh\u00f4ng ch\u00ednh x\u00e1c.\n", "key": "A", "isVideo": true, "score": 0, "order": 20, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 21 \u0111\u1ebfn 25", "content": "\u201cS\u00f4ng C\u1eedu Long \u0111\u01b0\u1ee3c nh\u1eadn di\u1ec7n l\u00e0 m\u1ed9t trong nh\u1eefng ngu\u1ed3n \u0111\u00f3ng g\u00f3p v\u00e0o \u00f4 nhi\u1ec5m nh\u1ef1a bi\u1ec3n, \u01b0\u1edbc t\u00ednh t\u1ea3i l\u01b0\u1ee3ng 37.000 t\u1ea5n/n\u0103m. H\u1ec7 qu\u1ea3 c\u1ee7a \u00f4 nhi\u1ec5m nh\u1ef1a tr\u00ean s\u00f4ng C\u1eedu Long c\u00f3 th\u1ec3 s\u1ebd nghi\u00eam tr\u1ecdng do \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn h\u1ec7 sinh th\u00e1i \u0110\u1ed3ng b\u1eb1ng s\u00f4ng C\u1eedu Long v\u00e0 sinh k\u1ebf c\u1ee7a h\u00e0ng tri\u1ec7u ng\u01b0\u1eddi. Tuy nhi\u00ean t\u1eeb tr\u01b0\u1edbc \u0111\u1ebfn nay, c\u00f3 r\u1ea5t \u00edt nghi\u00ean c\u1ee9u v\u1ec1 m\u1ee9c \u0111\u1ed9 vi nh\u1ef1a \u1edf s\u00f4ng C\u1eedu Long \u1edf ph\u1ea7n ch\u1ea3y qua Campuchia v\u00e0 Vi\u1ec7t Nam. Do \u0111\u00f3, nh\u00f3m t\u00e1c gi\u1ea3 cho r\u1eb1ng c\u1ea7n ph\u1ea3i c\u00f3 nh\u1eefng quan s\u00e1t v\u1ec1 v\u1eadn chuy\u1ec3n vi nh\u1ef1a tr\u00ean s\u00f4ng, ch\u1ee7 y\u1ebfu tr\u1ea3 l\u1eddi hai c\u00e2u h\u1ecfi: i) n\u1ed3ng \u0111\u1ed9 vi nh\u1ef1a cao nh\u1ea5t \u1edf n\u01a1i n\u00e0o? ii) \u0111\u00e2u l\u00e0 \u0111i\u1ec3m \u0111\u1ea1i di\u1ec7n trong c\u1ed9t n\u01b0\u1edbc \u0111\u01b0\u1ee3c l\u1ea5y m\u1eabu; c\u00e1ch ti\u1ebfp c\u1eadn l\u1ea5y m\u1eabu b\u1ec1 m\u1eb7t c\u00f3 th\u1ec3 \u00e1p d\u1ee5ng cho c\u00e1c h\u1ec7 th\u1ed1ng s\u00f4ng l\u1edbn kh\u00f4ng?<br>\u0110\u1ec3 th\u1ef1c hi\u1ec7n nghi\u00ean c\u1ee9u, nh\u00f3m t\u00e1c gi\u1ea3 l\u1ea5y m\u1eabu 8 \u0111\u1ecba \u0111i\u1ec3m t\u1eeb Campuchia \u0111\u1ebfn Vi\u1ec7t Nam v\u00e0o th\u00e1ng 7/2019, bao g\u1ed3m ph\u1ea7n ch\u1ea3y qua th\u1ecb tr\u1ea5n Kratie, th\u1ee7 \u0111\u00f4 Phnom Penh, s\u00f4ng Tonle Sap, s\u00f4ng Ba S\u1eb7c, C\u1ea7n Th\u01a1.<br>K\u1ebft qu\u1ea3 ph\u00e2n t\u00edch cho th\u1ea5y, t\u1ea5t c\u1ea3 c\u00e1c m\u1eabu \u0111\u1ec1u ch\u1ee9a vi nh\u1ef1a v\u00e0 c\u00f3 s\u1ef1 kh\u00e1c bi\u1ec7t \u0111\u00e1ng k\u1ec3 v\u1ec1 n\u1ed3ng \u0111\u1ed9 vi nh\u1ef1a gi\u1eefa c\u00e1c \u0111\u1ecba \u0111i\u1ec3m, trong \u0111\u00f3 th\u1ea5p nh\u1ea5t l\u00e0 Kampi, Kratie v\u00e0 cao nh\u1ea5t l\u00e0 Phnom Penh (40 vi nh\u1ef1a/m<sup>3</sup>) v\u00e0 C\u1ea7n Th\u01a1 (64 vi nh\u1ef1a/m<sup>3</sup>). N\u1ed3ng \u0111\u1ed9 trung b\u00ecnh \u1edf c\u00e1c \u0111\u1ecba \u0111i\u1ec3m l\u00e0 24 vi nh\u1ef1a/m<sup>3</sup>. C\u00e1c m\u1ee9c vi nh\u1ef1a tr\u00ean s\u00f4ng C\u1eedu Long c\u0169ng t\u01b0\u01a1ng t\u1ef1 nh\u01b0 nhi\u1ec1u con s\u00f4ng l\u1edbn kh\u00e1c tr\u00ean th\u1ebf gi\u1edbi nh\u01b0 s\u00f4ng B\u1eafc Saskatchewan (Canada), s\u00f4ng H\u1eb1ng (\u1ea4n \u0110\u1ed9), s\u00f4ng Amazon (Brazil) v\u00e0 th\u1ea5p h\u01a1n so v\u1edbi nhi\u1ec1u con s\u00f4ng kh\u00e1c \u1edf Vi\u1ec7t Nam, \u0111\u0103c bi\u1ec7t l\u00e0 s\u00f4ng T\u00f4 L\u1ecbch (2.522 vi nh\u1ef1a/m<sup>3</sup>).<br>C\u00e1c nh\u00e0 nghi\u00ean c\u1ee9u cho bi\u1ebft, c\u1ea7n ph\u1ea3i x\u00e1c \u0111\u1ecbnh \u0111\u01b0\u1ee3c c\u00e1c ngu\u1ed3n ch\u00ednh c\u1ee7a \u00f4 nhi\u1ec5m vi nh\u1ef1a \u0111\u1ec3 l\u1ea5y \u0111\u00f3 l\u00e0m c\u01a1 s\u1edf cho c\u00e1c quy\u1ebft \u0111\u1ecbnh qu\u1ea3n l\u00ed v\u00e0 ng\u0103n ch\u1eb7n ch\u00fang x\u00e2m nh\u1eadp v\u00e0o m\u00f4i tr\u01b0\u1eddng. Ngo\u00e0i ra, h\u1ecd c\u0169ng mong mu\u1ed1n x\u00e1c \u0111\u1ecbnh xem c\u00e1c ngu\u1ed3n n\u00e0y c\u00f3 nh\u1ea5t qu\u00e1n tr\u00ean c\u00e1c khu v\u1ef1c \u0111\u1ecba l\u00ed kh\u00e1c nhau hay kh\u00f4ng. Khi nh\u00ecn v\u00e0o c\u00e1c m\u1eabu thu th\u1eadp \u0111\u01b0\u1ee3c, h\u1ecd nh\u1eadn th\u1ea5y ph\u1ea7n l\u1edbn vi nh\u1ef1a \u0111\u1ec1u \u1edf d\u1ea1ng s\u1ee3i (53%), ti\u1ebfp theo l\u00e0 m\u1ea3nh (44%) v\u00e0 m\u00e0ng m\u1ecfng (3%), t\u01b0\u01a1ng t\u1ef1 nh\u01b0 k\u1ebft qu\u1ea3 \u1edf s\u00f4ng Amazon v\u00e0 c\u00e1c nh\u00e1nh c\u1ee7a n\u00f3. S\u1ee3i c\u0169ng l\u00e0 lo\u1ea1i ph\u1ed5 bi\u1ebfn nh\u1ea5t \u0111\u01b0\u1ee3c t\u00ecm th\u1ea5y \u1edf c\u00e1c con s\u00f4ng tr\u00ean to\u00e0n th\u1ebf gi\u1edbi, c\u00f9ng v\u1edbi c\u00e1c khu v\u1ef1c ph\u00eda b\u1eafc c\u1ee7a \u0110\u1ed3ng b\u1eb1ng s\u00f4ng C\u1eedu Long.<br>Khi ki\u1ec3m tra s\u1ef1 bi\u1ebfn thi\u00ean c\u1ee7a vi nh\u1ef1a gi\u1eefa c\u00e1c \u0111\u1ecba \u0111i\u1ec3m l\u1ea5y m\u1eabu, nh\u00f3m nghi\u00ean c\u1ee9u nh\u1eadn th\u1ea5y d\u1ea1ng s\u1ee3i chi\u1ebfm ph\u1ea7n l\u1edbn n\u1ed3ng \u0111\u1ed9 t\u1ed5ng th\u1ec3 t\u1ea1i Kampi, Kratie, s\u00f4ng H\u1eadu, trong khi d\u1ea1ng s\u1ee3i v\u00e0 d\u1ea1ng m\u1ea3nh ph\u1ed5 bi\u1ebfn t\u1ea1i s\u00f4ng Tonle Sap Phnom Penh, s\u00f4ng C\u1ea7n Th\u01a1, s\u00f4ng H\u1eadu... B\u00ean c\u1ea1nh \u0111\u00f3, v\u1ec1 th\u00e0nh ph\u1ea7n vi nh\u1ef1a th\u00ec h\u1ea7u h\u1ebft \u0111\u1ec1u l\u00e0 nh\u1ef1a PET 35%, ho\u1eb7c c\u00e1c lo\u1ea1i nh\u1ef1a kh\u00e1c chi\u1ebfm 34%, bao g\u1ed3m polyacrylonitrile (PAN) ho\u1eb7c polyacrylate. Nh\u1ef1a PET th\u01b0\u1eddng \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong bao b\u00ec \u0111\u1ef1ng th\u1ef1c ph\u1ea9m, bao b\u00ec \u0111\u1ef1ng \u0111\u1ed3 u\u1ed1ng v\u00e0 c\u00f3 th\u1ec3 ph\u00e2n h\u1ee7y th\u00e0nh c\u00e1c m\u1ea3nh trong khi s\u1ee3i PET ho\u1eb7c polyester, PAN v\u00e0 polyacrylate th\u01b0\u1eddng \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong qu\u1ea7n \u00e1o v\u00e0 h\u00e0ng d\u1ec7t may.\u201d<div style=\"text-align: right;\">(Thanh H\u01b0\u01a1ng, <i>S\u00f4ng C\u1eedu Long: \u00d4 nhi\u1ec5m vi nh\u1ef1a ch\u1ee7 y\u1ebfu t\u1eeb n\u01b0\u1edbc th\u1ea3i sinh ho\u1ea1t</i>, theo <i>tiasang.com.vn</i>)</div>", "listQuestion": [{"questionId": 21605018, "lessonId": 0, "a": "6.", "b": "7.", "c": "8.", "d": "9.", "bookId": 1088924, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Theo \u0111o\u1ea1n tr\u00edch, \u0111\u1ec3 th\u1ef1c hi\u1ec7n nghi\u00ean c\u1ee9u v\u1ec1 m\u1ee9c \u0111\u1ed9 vi nh\u1ef1a \u1edf s\u00f4ng C\u1eedu Long \u1edf ph\u1ea7n ch\u1ea3y qua Campuchia v\u00e0 Vi\u1ec7t Nam, nh\u00f3m nghi\u00ean c\u1ee9u \u0111\u00e3 l\u1ea5y m\u1eabu \u1edf bao nhi\u00eau \u0111\u1ecba \u0111i\u1ec3m?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nD\u1ef1a v\u00e0o t 11o\u00e1n cho c\u00e2u?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nT\u1eeb \u201cc\u00f3 th\u1ec3\u201d di\u1ec5n t\u1ea3 s\u1ef1 ph\u1ecfng \u0111o\u00e1n, kh\u00f4ng ch\u1eafc ch\u1eafn v\u1ec1 m\u1ee9c \u0111\u1ed9 nghi\u00eam tr\u1ecdng c\u1ee7a \u00f4 nhi\u1ec5m.\n", "key": "B", "isVideo": true, "score": 0, "order": 25, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 26 \u0111\u1ebfn 30", "content": "\u201cT\u1eeb cu\u1ed1i th\u1ebf k\u1ec9 19 \u0111\u1ea7u th\u1ebf k\u1ec9 20, ng\u01b0\u1eddi Ph\u00e1p b\u1eaft \u0111\u1ea7u cho x\u00e2y d\u1ef1ng ch\u1ee3 \u0110\u1ed3ng Xu\u00e2n. M\u1ed9t h\u00ecnh th\u00e1i mua b\u00e1n t\u1eadp trung ng\u0103n n\u1eafp c\u00f3 quy m\u00f4 l\u1edbn. Ch\u1ee3 \u0111\u01b0\u1ee3c x\u00e2y d\u1ef1ng theo k\u1ebft c\u1ea5u v\u00ec k\u00e8o th\u00e9p t\u00e1n \u0111inh nh\u01b0 c\u1ea7u Long Bi\u00ean do ch\u00ednh b\u00e0n tay nh\u1eefng ng\u01b0\u1eddi th\u1ee3 l\u00e0m c\u1ea7u \u1edf ph\u1ed1 L\u00f2 R\u00e8n thi c\u00f4ng. K\u1ebft c\u1ea5u v\u00ec k\u00e8o th\u00e9p l\u00e0 k\u0129 thu\u1eadt ti\u00ean ti\u1ebfn nh\u1ea5t th\u1ebf gi\u1edbi l\u00fac b\u1ea5y gi\u1edd ch\u1ee9 kh\u00f4ng ch\u1ec9 \u1edf Vi\u1ec7t Nam. Nh\u1eefng gian ch\u1ee3 r\u1ed9ng r\u00e3i m\u00eanh m\u00f4ng v\u00e0 cao r\u00e1o. L\u0169 tr\u1ebb \u0111\u1ebfn ch\u1ee3 th\u01b0\u1eddng m\u00ea m\u1ea9n ng\u01b0\u1edbc m\u1eaft l\u00ean nh\u00ecn nh\u1eefng khung th\u00e9p t\u00e1n \u0111inh riv\u00ea v\u00f4 c\u00f9ng ph\u1ee9c t\u1ea1p k\u00ec v\u0129.<br>Ch\u1ee3 \u0110\u1ed3ng Xu\u00e2n c\u00f3 ph\u1ea7n k\u00e9o d\u00e0i ra ph\u00eda \u0111\u00ea s\u00f4ng H\u1ed3ng g\u1ecdi l\u00e0 ch\u1ee3 B\u1eafc Qua. V\u1ec1 sau ng\u01b0\u1eddi ta g\u1ecdi g\u1ed9p l\u1ea1i l\u00e0 ch\u1ee3 \u0110\u1ed3ng Xu\u00e2n - B\u1eafc Qua. B\u00ean ch\u1ee3 \u0110\u1ed3ng Xu\u00e2n b\u00e1n h\u00e0ng kh\u00f4, qu\u1ea7n \u00e1o v\u1ea3i v\u00f3c, h\u00e0ng m\u0129 ngh\u1ec7, kim kh\u00ed gia d\u1ee5ng.<br>Kho\u1ea3ng gi\u1eefa ch\u1ee3 \u0110\u1ed3ng Xu\u00e2n v\u00e0 B\u1eafc Qua l\u00e0 n\u01a1i l\u0169 tr\u1ebb th\u00edch th\u00fa nh\u1ea5t. \u1ede \u0111\u1ea5y b\u00e0y b\u00e1n chim, c\u00e2y, c\u00e1 c\u1ea3nh. Th\u00fa v\u1eadt nu\u00f4i v\u00e0 hoang d\u00e3 r\u1ea5t nhi\u1ec1u. Tr\u1ebb con H\u00e0 N\u1ed9i coi \u0111\u00f3 nh\u01b0 m\u1ed9t v\u01b0\u1eddn b\u00e1ch th\u00fa thu nh\u1ecf ngay g\u1ea7n nh\u00e0 m\u00ecnh. G\u1ea7n nh\u01b0 tu\u1ea7n n\u00e0o c\u0169ng ph\u1ea3i nh\u1ea3y t\u00e0u \u0111i\u1ec7n l\u00ean th\u0103m m\u1ed9t l\u1ea7n. M\u00e8o nh\u1ecf, ch\u00f3 con, th\u1ecf tr\u1eafng, chu\u1ed9t lang tha h\u1ed3 b\u1ebf \u1eb5m. C\u00e1 ch\u1ecdi gi\u01b0\u01a1ng v\u00e2y \u00f3ng \u00e1nh s\u1eafc m\u00e0u, c\u00e1 th\u1ea7n ti\u00ean th\u01b0\u1edbt tha b\u1ed9 r\u00e2u d\u00e0i \u0111\u1ee7ng \u0111\u1ec9nh trong b\u1ec3 k\u00ednh. Con m\u00e3 gi\u00e1p r\u1ef1c r\u1ee1 \u0111\u1ed1m sao b\u1ea3y s\u1eafc. Con h\u1ed3ng t\u1eed k\u00ec trong veo nh\u01b0 mi\u1ebfng th\u1ea1ch h\u1ed3ng ho\u1eafng hu\u00fdt b\u01a1i. Con c\u00e1 ki\u1ebfm chu sa m\u1eaft \u0111\u1ecf nh\u01b0 hai h\u00f2n than nh\u1ecf x\u00edu... C\u1ea3 m\u1ed9t th\u1ebf gi\u1edbi th\u1ee7y cung th\u1ea7n ti\u00ean xem su\u1ed1t ng\u00e0y kh\u00f4ng ch\u00e1n m\u1eaft.<br>H\u00e0ng b\u00e1n chim r\u1ed9n r\u00e3 ti\u1ebfng h\u1ecda mi, ch\u00edch ch\u00f2e, kh\u01b0\u1edbu. Nh\u1eefng con chim khuy\u00ean l\u00f4ng v\u00e0ng r\u01b0\u1ee3i nh\u01b0 chu\u1ed1i b\u00f3c nh\u1ea3y nh\u00f3t kh\u00f4ng ng\u1eebng. Con y\u1ec3ng kh\u1ec1 kh\u00e0 b\u1eaft ch\u01b0\u1edbc gi\u1ecdng ng\u01b0\u1eddi rao b\u00e1n l\u1ea1c rang. Con s\u00e1o m\u1ecf ng\u00e0 c\u1ea5t gi\u1ecdng \u00e2m vang nh\u01b0 t\u1eeb tr\u00ean v\u00e1ch \u0111\u00e1 v\u1ecdng xu\u1ed1ng. Con d\u1ebb c\u00f9i l\u01b0\u1edbt th\u01b0\u1edbt chi\u1ebfc \u0111u\u00f4i d\u00e0i s\u1eb7c s\u1ee1. Con v\u1eb9t xanh \u0111eo chi\u1ebfc x\u00edch b\u1ea1c \u0111\u1ee9ng im l\u00ecm tr\u00ean c\u00e0nh g\u1ed7 l\u0169a nh\u01b0 pho t\u01b0\u1ee3ng s\u1ed1ng. V\u00e0 chim y\u1ebfn, chim s\u01a1n ca c\u1ea5t gi\u1ecdng h\u00f3t t\u1eebng tr\u00e0ng d\u00e0i b\u1ea5t t\u1eadn.\u201d<br><div style=\"text-align: right;\">(\u0110\u1ed7 Ph\u1ea5n, <i>Ch\u1ee3 H\u00e0 N\u1ed9i t\u00ecm trong k\u00ed \u1ee9c</i>, theo <i>vanvn.vn</i>)</div>", "listQuestion": [{"questionId": 21605057, "lessonId": 0, "a": "T\u1eeb cu\u1ed1i th\u1ebf k\u1ec9 18 \u0111\u1ea7u th\u1ebf k\u1ec9 19.", "b": "\u0110\u1ea7u th\u1ebf k\u1ec9 19.", "c": "Cu\u1ed1i th\u1ebf k\u1ec9 20.", "d": "T\u1eeb cu\u1ed1i th\u1ebf k\u1ec9 19 \u0111\u1ea7u th\u1ebf k\u1ec9 20.", "bookId": 1088929, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Ng\u01b0\u1eddi Ph\u00e1p b\u1eaft \u0111\u1ea7u cho x\u00e2y d\u1ef1ng ch\u1ee3 \u0110\u1ed3ng Xu\u00e2n khi n\u00e0o?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nD\u1ef1a v\u00e0o th\u00f4ng tin trong c\u00e2u: \u201cT\u1eeb cu\u1ed1i th\u1ebf k\u1ec9 19 \u0111\u1ea7u th\u1ebf k\u1ec9 20, ng\u01b0\u1eddi Ph\u00e1p b\u1eaft \u0111\u1ea7u cho x\u00e2y d\u1ef1ng ch\u1ee3 \u0110\u1ed3ng Xu\u00e2n.\u201d<br>\n\u2192 Ng\u01b0\u1eddi Ph\u00e1p b\u1eaft \u0111\u1ea7u cho x\u00e2y d\u1ef1ng ch\u1ee3 \u0110\u1ed3ng Xu\u00e2n t\u1eeb cu\u1ed1i th\u1ebf k\u1ec9 19 \u0111\u1ea7u th\u1ebf k\u1ec9 20.\n", "key": "D", "isVideo": true, "score": 0, "order": 26, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605059, "lessonId": 0, "a": "Qu\u1ea7n \u00e1o, v\u1ea3i v\u00f3c.", "b": "Th\u00fa, v\u1eadt nu\u00f4i hoang d\u00e3.", "c": "C\u00e2y.", "d": "C\u00e1 c\u1ea3nh.", "bookId": 1088930, "comments": 0, "bookmarks": 0, "likes": 0             timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- SCROLL HELPER (SỬA LỖI MỤC LỤC DESKTOP) ---
        function scrollToQuestion(qKey) {
            const el = document.getElementById(`question-${qKey}`);
            if (el) {
                // Scroll native với offset (do header fixed)
                // Sử dụng phương pháp cũ nhưng chắc chắn hoạt động hơn scrollIntoView trên container cuộn
                // Lấy tọa độ tương đối so với viewport
                const yOffset = -80; // Trừ header
                const y = el.getBoundingClientRect().top + window.pageYOffset + yOffset;
                
                window.scrollTo({top: y, behavior: 'smooth'});
                
                // Highlight hiệu ứng
                el.classList.add('ring-2', 'ring-moon', 'ring-offset-2');
                setTimeout(() => el.classList.remove('ring-2', 'ring-moon', 'ring-offset-2'), 1500);
            }
            // Đóng mobile palette nếu đang mở
            document.getElementById('mobile-palette').classList.add('hidden');
        }

        // --- RENDER ENGINE ---
        function renderExam(reset = false) {
            const container = document.getElementById('exam-content');
            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; 
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

            let globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`;
                    const qType = q.normalizedType;
                    
                    // -- Palette Item (FIX ONCLICK SCOPE) --
                    // Sử dụng arrow function trong JS string template cẩn thận
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    
                    // Gán sự kiện click trực tiếp thay vì chuỗi string HTML để tránh lỗi scope
                    palBtn.addEventListener('click', function() { scrollToQuestion(qKey); });
                    
                    palDesk.appendChild(palBtn.cloneNode(true)); // Desktop clone cần gán lại event nếu cloneNode ko copy event
                    // Clone node không copy event listener. Phải tạo 2 nút riêng hoặc gán lại.
                    // Cách tốt nhất: tạo chuỗi HTML hoặc append element.
                    // Ở đây để đơn giản ta gán onclick bằng attribute string cho chắc ăn
                    palBtn.setAttribute('onclick', `scrollToQuestion('${qKey}')`);
                    
                    // Sau khi set attribute, append lại
                    palDesk.innerHTML = palDesk.innerHTML; // Reset để xoá nút cũ? Không nên.
                    // Code cũ append child.
                    
                    // Fix triệt để: Tạo string HTML cho palette
                    // (Đã sửa ở dưới)
                });
            });
            
            // Render lại từ đầu để tối ưu
            palDesk.innerHTML = '';
            palMob.innerHTML = '';
            container.innerHTML = '';
            globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`;
                    const qType = q.normalizedType;

                    // Palette Buttons
                    const btnClass = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    const btnHtml = `<button id="pal_${qKey}" onclick="scrollToQuestion('${qKey}')" class="${btnClass}">${qId}</button>`;
                    
                    palDesk.innerHTML += btnHtml;
                    palMob.innerHTML += btnHtml;

                    // Question Card
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'question-card bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // TYPE 0: MCQ
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { 
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; 
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // TYPE 1 & 3: FILL KEY
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const chars = userVal.split('');
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let boxesHtml = '<div class="flex gap-2 justify-start items-center">';
                        for(let i=0; i<4; i++) {
                            const char = chars[i] || '';
                            boxesHtml += `<input type="text" maxlength="1" 
                                class="char-input" 
                                data-index="${i}" 
                                data-key="${qKey}" 
                                value="${char}" 
                                readonly 
                                onclick="activateNumpad(this, '${qKey}')"
                                ${isSubmitted ? 'disabled' : ''} 
                            />`;
                        }
                        
                        if(examMode === 'practice' && !isSubmitted) {
                             boxesHtml += `<button onclick="checkFillAnswer('${qKey}')" class="ml-2 px-3 py-2 bg-blue-100 text-blue-700 font-bold rounded-lg text-sm hover:bg-blue-200 transition-colors">Kiểm tra</button>`;
                             // Nút xem lời giải cho practice
                             boxesHtml += `<button onclick="toggleSolution('${qKey}')" class="ml-2 px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button>`;
                        }
                        boxesHtml += '</div>';

                        let feedbackHtml = "";
                        if(isSubmitted) {
                             const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                             if(isCorrect) {
                                feedbackHtml = `<div class="mt-2 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                             } else {
                                feedbackHtml = `<div class="mt-2 text-red-600 text-sm">✗ Sai. Đáp án: <span class="font-bold">${correctVal}</span></div>`;
                             }
                        } else if (examMode === 'practice') {
                             feedbackHtml = `<div id="feedback-${qKey}" class="mt-2 text-sm font-bold hidden"></div>`;
                        }

                        html += `
                        <div class="flex flex-col relative">
                            ${boxesHtml}
                            ${feedbackHtml}
                        </div>`;
                    }

                    // TYPE 2: TRUE/FALSE
                    else if(qType === '2') {
                         html += `<div class="overflow-hidden border rounded-lg">
                            <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                                <tr>
                                    <th scope="col" class="px-3 py-3 w-10 text-center">Ý</th>
                                    <th scope="col" class="px-3 py-3">Nội dung</th>
                                    <th scope="col" class="px-3 py-3 w-32 text-center">Chọn Đ/S</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; 
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; 
                                const userChoice = userObj[pIdx]; 
                                
                                let trClass = "bg-white hover:bg-gray-50";
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) trClass = "bg-green-50";
                                    else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
