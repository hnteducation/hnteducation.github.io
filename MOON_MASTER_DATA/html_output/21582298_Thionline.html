 \u0111i\u1ec1u m\u00ecnh n\u00f3i.<br>\u21d2 Sai v\u1ec1 ngh\u0129a.<br>D. Ph\u00e1t ng\u00f4n vi\u00ean n\u00f3i qu\u00e1 ch\u1eadm \u0111\u1ec3 ch\u00fang ta c\u00f3 th\u1ec3 hi\u1ec3u \u0111\u01b0\u1ee3c nh\u1eefng g\u00ec anh \u1ea5y n\u00f3i.<br>\u21d2 Sai v\u1ec1 ngh\u0129a v\u00e0 c\u00e1ch s\u1eed d\u1ee5ng \u201ctoo\u201d. C\u1ea5u tr\u00fac<b> S + V + too + adv + (for somebody) + to V </b>d\u00f9ng \u0111\u1ec3 ch\u1ec9 c\u00e1i g\u00ec \u0111\u00f3 qu\u00e1 \u0111\u00e1ng \u0111\u1ebfn n\u1ed7i m\u00e0 ai \u0111\u00f3 kh\u00f4ng th\u1ec3 l\u00e0m g\u00ec.", "key": "A", "isVideo": true, "score": 0, "order": 41, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19871995, "lessonId": 0, "a": "Alex is as creative as all the other children in his class.", "b": "All the other children in Alex\u2019s class are certainly not as creative as him.", "c": "Other children are creative, but Alex is more creative than most of them.", "d": "It is likely that Alex is the most creative of all the children in his class.", "bookId": 743890, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Alex seems to be more creative than all the other children in his class.", "answer": "<div><b>Ki\u1ebfn th\u1ee9c v\u1ec1 di\u1ec5n \u0111\u1ea1t c\u00e2u - c\u00e2u \u0111\u1ed3ng ngh\u0129a:&nbsp;</b></div><div><b>T\u1ea1m d\u1ecbch c\u00e2u g\u1ed1c:</b> Alex c\u00f3 v\u1ebb s\u00e1ng t\u1ea1o h\u01a1n t\u1ea5t c\u1ea3 nh\u1eefng \u0111\u1ee9a tr\u1ebb kh\u00e1c trong l\u1edbp.</div><div><b>X\u00e9t 4 \u0111\u00e1p \u00e1n:&nbsp;</b></div><div>+) A. Alex is as creative as all the other children in his class.</div><div><i>(Alex c\u0169ng s\u00e1ng t\u1ea1o nh\u01b0 nh\u1eefng \u0111\u1ee9a tr\u1ebb kh\u00e1c trong l\u1edbp.)</i></div><div>\u21d2 <b>Sai ngh\u0129a</b> v\u00ec c\u00e2u n\u00e0y n\u00f3i Alex ch\u1ec9 ngang b\  "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19872793, "lessonId": 0, "a": "The Great Gatsby stands out as my favorite book because of its complex characters.", "b": "I enjoy all the books I\u2019ve read, but The Great Gatsby has the most complex characters.", "c": "The intricate plot of The Great Gatsby makes it my favorite book.", "d": "I consider The Great Gatsby my favorite book because of its protagonist.", "bookId": 746077, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Of all the books I\u2019ve read, I enjoyed The Great Gatsby the most for its complex characters.", "answer": "<b>C\u00e2u g\u1ed1c:</b> Trong t\u1ea5t c\u1ea3 nh\u1eefng cu\u1ed1n s\u00e1ch t\u00f4i \u0111\u00e3 \u0111\u1ecdc, t\u00f4i th\u00edch <strong data-start=\"111\" data-end=\"131\">The Great Gatsby</strong> nh\u1ea5t v\u00ec tuy\u1ebfn nh\u00e2n v\u1eadt ph\u1ee9c t\u1ea1p c\u1ee7a n\u00f3<br><span data-start=\"200\" data-end=\"206\" style=\"\">A.</span> <span data-start=\"207\" data-end=\"225\" style=\"\">The Great Gatsby</span> <span data-start=\"226\" data-end=\"301\" style=\"\">n\u1ed5i b\u1eadt l\u00e0 cu\u1ed1n s\u00e1ch y\u00eau th\u00edch c\u1ee7a t\u00f4i v\u00ec c\u00e1c nh\u00e2n v\u1eadt ph\u1ee9c t\u1ea1p c\u1ee7a n\u00f3.</span>&nbsp;=&gt; <b>\u0110\u00fang</b><br><br data-start=\"303\" data-end=\"306\"><span data-start=\"306\" data-end=\"312\" style=\"\">B.</span> T\u00f4i th\u00edch t\u1ea5t c\u1ea3 c\u00e1c cu\u1ed1n s\u00e1ch t\u00f4i \u0111\u00e3 \u0111\u1ecdc, nh\u01b0ng <span data-start=\"362\" data-end=\"380\" style=\"\">The Great Gatsby</span> c\u00f3 c\u00e1c nh\u00e2n v\u1eadt ph\u1ee9c t\u1ea1p nh\u1ea5t. =&gt; <b>Sai </b>v\u00ec c\u00e2u n\u00e0y ch\u1ec9 t\u1eadp trung v\u00e0o vi\u1ec7c n\u00f3 c\u00f3 nh\u00e2n v\u1eadt ph\u1ee9c t\u1ea1p nh\u1ea5t, kh\u00f4ng nh\u1ea5n m\u1ea1nh r\u1eb1ng \u0111\u00e2y l\u00e0 <strong data-start=\"1386\" data-end=\"1414\">cu\u1ed1n s\u00e1ch y\u00eau th\u00edch nh\u1ea5t</strong> c\u1ee7a ng\u01b0\u1eddi n\u00f3i<br><br data-start=\"413\" data-end=\"416\"><span data-start=\"416\" data-end=\"422\" style=\"\">C.</span> C\u1ed1t truy\u1ec7n ph\u1ee9c t\u1ea1p c\u1ee7a <span data-start=\"447\" data-end=\"465\" style=\"\">The Great Gatsby</span> khi\u1ebfn n\u00f3 tr\u1edf th\u00e0nh cu\u1ed1n s\u00e1ch y\u00eau th\u00edch c\u1ee7a t\u00f4i. =&gt; <b>Sai </b>v\u00ec c\u00e2u g\u1ed1c nh\u1ea5n m\u1ea1nh v\u00e0o tuy\u1ebfn nh\u00e2n v\u1eadt, kh\u00f4ng ph\u1ea3i c\u1ed1t truy\u1ec7n<br><br data-start=\"515\" data-end=\"518\"><span data-start=\"518\" data-end=\"524\" data-is-only-node=\"\" style=\"\">D.</span> T\u00f4i coi <span data-start=\"533\" data-end=\"551\" style=\"\">The Great Gatsby</span> l\u00e0 cu\u1ed1n s\u00e1ch y\u00eau th\u00edch c\u1ee7a m\u00ecnh v\u00ec nh\u00e2n v\u1eadt ch\u00ednh c\u1ee7a n\u00f3. =&gt; Sai v\u00ec c\u00e2u g\u1ed1c n\u00f3i v\u1ec1 <span data-start=\"1905\" data-end=\"1932\" style=\"\">nhi\u1ec1u nh\u00e2n v\u1eadt ph\u1ee9c t\u1ea1p</span>, c\u00f2n c\u00e2u n\u00e0y ch\u1ec9 nh\u1eafc \u0111\u1ebfn <span data-start=\"1959\" data-end=\"1977\" style=\"\">nh\u00e2n v\u1eadt ch\u00ednh<br>=&gt; \u0110\u00e1p \u00e1n A</span>", "key": "A", "isVideo": false, "score": 0, "order": 43, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10470002, "lessonId": 0, "a": "They knew what he wanted to do, so they refused his money.", "b": "They agreed with his wishes because they were glad to have his money.", "c": "They didn\u2019t know his plans and never took money from him.", "d": "They took the money he offered them without realizing his purpose.", "bookId": 290547, "comments": 0, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "They would never have accepted his money if they had known his plans.", "answer": "<b>T\u1ea1m d\u1ecbch</b>: H\u1ecd s\u1ebd kh\u00f4ng bao gi\u1edd nh\u1eadn ti\u1ec1n c\u1ee7a anh ta n\u1ebfu h\u1ecd bi\u1ebft k\u1ebf ho\u1ea1ch c\u1ee7a anh \u1ea5y. <br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n<br></b>A. H\u1ecd bi\u1ebft anh \u1ea5y mu\u1ed1n l\u00e0m g\u00ec n\u00ean h\u1ecd t\u1eeb ch\u1ed1i ti\u1ec1n c\u1ee7a anh \u1ea5y.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. H\u1ecd kh\u00f4ng h\u1ec1 bi\u1ebft v\u00e0 v\u1eabn nh\u1eadn ti\u1ec1n.<br>B. H\u1ecd \u0111\u1ed3ng \u00fd v\u1edbi mong mu\u1ed1n c\u1ee7a anh \u1ea5y v\u00ec h\u1ecd r\u1ea5t vui khi c\u00f3 \u0111\u01b0\u1ee3c ti\u1ec1n c\u1ee7a anh \u1ea5y.<br>\u21d2 Sai v\u1ec1 ngh\u0129a<br>C. H\u1ecd kh\u00f4ng bi\u1ebft k\u1ebf ho\u1ea1ch c\u1ee7a anh \u1ea5y v\u00e0 kh\u00f4ng bao gi\u1edd l\u1ea5y ti\u1ec1n c\u1ee7a anh \u1ea5y.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. H\u1ecd \u0111\u00e3 l\u1ea5y ti\u1ec1n r\u1ed3i<br>D. H\u1ecd \u0111\u00e3 l\u1ea5y s\u1ed1 ti\u1ec1n anh ta \u0111\u01b0a cho h\u1ecd m\u00e0 kh\u00f4ng nh\u1eadn ra m\u1ee5c \u0111\u00edch c\u1ee7a anh ta.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang. Ta c\u00f3 <b>\u201cwithout +V-ing\u201d</b>: kh\u00f4ng l\u00e0m g\u00ec", "key": "D", "isVideo": true, "score": 0, "order": 44, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19873106, "lessonId": 0, "a": "If you didn\u2019t provide such comprehensive feedback, I wouldn\u2019t understand my mistakes.", "b": "I wish you would provide comprehensive feedback on my project.", "c": "I appreciate you providing such comprehensive feedback on my project.", "d": "You are considerate enough to provide such comprehensive feedback on my project.", "bookId": 746023, "comments": 0, "bookmarks": 6, "likes": 0, "shares": 0, "typeId": 0, "questionText": "It's considerate of you to provide such comprehensive feedback on my project.", "answer": "<b>T\u1ea1m d\u1ecbch:</b>&nbsp;B\u1ea1n th\u1eadt chu \u0111\u00e1o khi \u0111\u01b0a ra ph\u1ea3n h\u1ed3i chi ti\u1ebft v\u1ec1 d\u1ef1 \u00e1n c\u1ee7a t\u00f4i.<br>A.&nbsp;N\u1ebfu b\u1ea1n kh\u00f4ng \u0111\u01b0a ra ph\u1ea3n h\u1ed3i chi ti\u1ebft nh\u01b0 v\u1eady, t\u00f4i s\u1ebd kh\u00f4ng hi\u1ec3u \u0111\u01b0\u1ee3c l\u1ed7i c\u1ee7a m\u00ecnh. =&gt; <b>Sai </b>v\u00ec c\u00e2u g\u1ed1c nh\u1ea5n m\u1ea1nh s\u1ef1 <span data-start=\"528\" data-end=\"562\" style=\"\">chu \u0111\u00e1o c\u1ee7a ng\u01b0\u1eddi \u0111\u01b0a ph\u1ea3n h\u1ed3i</span>, trong khi c\u00e2u n\u00e0y ch\u1ec9 n\u00f3i v\u1ec1 t\u00e1c \u0111\u1ed9ng c\u1ee7a ph\u1ea3n h\u1ed3i m\u00e0 kh\u00f4ng \u0111\u1ec1 c\u1eadp \u0111\u1ebfn s\u1ef1 <span data-start=\"638\" data-end=\"653\" style=\"\">chu \u0111\u00e1o<br></span><br>B.T\u00f4i \u01b0\u1edbc g\u00ec b\u1ea1n c\u00f3 th\u1ec3 \u0111\u01b0a ra ph\u1ea3n h\u1ed3i chi ti\u1ebft v\u1ec1 d\u1ef1 \u00e1n c\u1ee7a t\u00f4i =&gt; <b>Sai </b>v\u00ec c\u00e2u g\u1ed1c kh\u1eb3ng \u0111\u1ecbnh r\u1eb1ng ng\u01b0\u1eddi kia <span data-start=\"1024\" data-end=\"1046\">\u0111\u00e3 \u0111\u01b0a ra ph\u1ea3n h\u1ed3i<br></span><br>C.&nbsp;T\u00f4i tr\u00e2n tr\u1ecdng vi\u1ec7c b\u1ea1n \u0111\u01b0a ra ph\u1ea3n h\u1ed3i chi ti\u1ebft v\u1ec1 d\u1ef1 \u00e1n c\u1ee7a t\u00f4i. =&gt; <b>\u0110\u00fang</b><br><br>D.&nbsp;B\u1ea1n \u0111\u1ee7 chu \u0111\u00e1o \u0111\u1ec3 \u0111\u01b0a ra ph\u1ea3n h\u1ed3i chi ti\u1ebft v\u1ec1 d\u1ef1 \u00e1n c\u1ee7a t\u00f4i. =&gt; <b>Sai </b>v\u00ec c\u00e2u g\u1ed1c kh\u00f4ng mang s\u1eafc th\u00e1i \u0111\u00e1nh gi\u00e1 m\u1ee9c \u0111\u1ed9 chu \u0111\u00e1o<br>=&gt; \u0110\u00e1p \u00e1n C<br><i>-&nbsp;<strong data-start=\"2490\" data-end=\"2526\">I appreciate + (someone) + Ving:&nbsp;</strong><span data-start=\"2529\" data-end=\"2563\">T\u00f4i tr\u00e2n tr\u1ecdng vi\u1ec7c ai \u0111\u00f3 l\u00e0m g\u00ec<br></span>-&nbsp;<strong data-start=\"2294\" data-end=\"2334\">It's considerate of + someone + to V:&nbsp;</strong><span data-start=\"2337\" data-end=\"2368\">Ai \u0111\u00f3 th\u1eadt chu \u0111\u00e1o khi l\u00e0m g\u00ec</span></i><br><br>", "key": "C", "isVideo": false, "score": 0, "order": 45, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 46-52: Read the passage carefully.", "content": "<div style=\"text-align: center;\"><b>CAN ANIMALS TALK?</b></div><br>1. In 1977, a young Harvard graduate named Irene Pepperberg brought a one-year-old African gray parrot into her lab and attempted something very unusual. At a time when her fellow scientists thought that animals could only communicate on a very basic level, Irene set out to discover what was on a creature's mind by talking to it. The bird, named Alex, proved to be a very good pupil.<br>2. Scientists at the time believed that animals were incapable of any thought. They believed that animals only reacted to things because <b>they </b>were programmed by nature to react that way, not because they had the ability to think or feel. Any pet owner would probably disagree. Pepperberg disagreed, too, and started her work with Alex to prove them wrong.<br>3. Pepperberg bought Alex in a pet store. She let the store's assistant pick him out because she didn't want other scientists saying later that she'd deliberately chosen an especially smart bird for her work. Most researchers thought that Pepperberg's attempt to communicate with Alex would end in failure.<br>4. However, Pepperberg's experiment did not fail. In fact, over the next few years, Alex learned to imitate almost one hundred and fifty English words, and was even able to <b>reason </b>and use those words on a basic level to communicate. For example, when Alex was shown an object and was asked about its shape, color, or material, he could label it correctly. He could understand that a key was a key no matter what its size or color, and could figure out how the key was different from others.<br>5. Pepperberg was careful not to exaggerate Alex's success and abilities. She did not claim that Alex could actually \u201cuse\u201d language. Instead, she said that Alex had learned to use a two-way communication code. Alex seemed to understand the turn-taking pattern of communication.<br><div style=\"text-align: right;\"><i>(Source: Oxford University Press, Second Edition Intermediate Chapter 4 Test)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21582330, "lessonId": 0, "a": "the way animals communicate with humans", "b": "a graduate\u2019s successful attempt to communicate with a bird", "c": "reasons why parrots are more intelligent than other animals", "d": "successful efforts of a Harvard graduate to prove her fellow scientists wrong", "bookId": 1086081, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The reading passage is mainly about __________.", "answer": "<b>\u0110o\u1ea1n v\u0103n \u0111\u1ecdc ch\u1ee7 y\u1ebfu n\u00f3i v\u1ec1 __________.\n</b><br><b>A. </b>c\u00e1ch \u0111\u1ed9ng v\u1eadt giao ti\u1ebfp v\u1edbi con ng\u01b0\u1eddi\n<br><b>B.</b> n\u1ed7 l\u1ef1c giao ti\u1ebfp th\u00e0nh c\u00f4ng c\u1ee7a m\u1ed9t sinh vi\u00ean t\u1ed1t nghi\u1ec7p v\u1edbi m\u1ed9t lo\u00e0i chim\n<br><b>C. </b>l\u00fd do t\u1ea1i sao v\u1eb9t th\u00f4ng minh h\u01a1n c\u00e1c lo\u00e0i \u0111\u1ed9ng v\u1eadt kh\u00e1c\n<br><b>D.</b> n\u1ed7 l\u1ef1c th\u00e0nh c\u00f4ng c\u1ee7a m\u1ed9t sinh vi\u00ean t\u1ed1t nghi\u1ec7p Harvard \u0111\u1ec3 ch\u1ee9ng minh c\u00e1c nh\u00e0 khoa h\u1ecdc \u0111\u1ed3ng nghi\u1ec7p c\u1ee7a c\u00f4 \u1ea5y \u0111\u00e3 sai\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o nh\u1eefng th\u00f4ng tin sau: \n</b><br>+) \u201cIn 1977, a young Harvard graduate named Irene Pepperberg brought a one-year-old African gray parrot into her lab and attempted something very unusual. \n<br><i>(N\u0103m 1977, m\u1ed9t sinh vi\u00ean m\u1edbi t\u1ed1t nghi\u1ec7p Harvard t\u00ean l\u00e0 Irene Pepperberg \u0111\u00e3 mang m\u1ed9t ch\u00fa v\u1eb9t x\u00e1m Ch\u00e2u Phi m\u1ed9t tu\u1ed5i v\u00e0o ph\u00f2ng th\u00ed nghi\u1ec7m c\u1ee7a m\u00ecnh v\u00e0 th\u1eed m\u1ed9t \u0111i\u1ec1u r\u1ea5t kh\u00e1c th\u01b0\u1eddng.) \n</i><br><br>+) \u201cAt a time when her fellow scientists thought that animals could only communicate on a very basic level, Irene set out to discover what was on a creature's mind by talking to it. The bird, named Alex, proved to be a very good pupil.\u201d\n<br><i>(V\u00e0o th\u1eddi \u0111i\u1ec3m m\u00e0 c\u00e1c nh\u00e0 khoa h\u1ecdc \u0111\u1ed3ng nghi\u1ec7p c\u1ee7a c\u00f4 ngh\u0129 r\u1eb1ng \u0111\u1ed9ng v\u1eadt ch\u1ec9 c\u00f3 th\u1ec3 giao ti\u1ebfp \u1edf m\u1ee9c \u0111\u1ed9 r\u1ea5t c\u01a1 b\u1ea3n, Irene \u0111\u00e3 b\u1eaft \u0111\u1ea7u kh\u00e1m ph\u00e1 nh\u1eefng g\u00ec trong t\u00e2m tr\u00ed c\u1ee7a m\u1ed9t sinh v\u1eadt b\u1eb1ng c\u00e1ch n\u00f3i chuy\u1ec7n v\u1edbi n\u00f3. Con chim t\u00ean l\u00e0 Alex \u0111\u00e3 ch\u1ee9ng t\u1ecf m\u00ecnh l\u00e0 m\u1ed9t h\u1ecdc tr\u00f2 r\u1ea5t gi\u1ecfi.)\n</i><br><br>+) \u201cHowever, Pepperberg's experiment did not fail. In fact, over the next few years, Alex learned to imitate almost one hundred and fifty English words, and was even able to reason and use those words on a basic level to communicate.\u201d\n<br><i>(Tuy nhi\u00ean, th\u00ed nghi\u1ec7m c\u1ee7a Pepperberg \u0111\u00e3 kh\u00f4ng th\u1ea5t b\u1ea1i. Tr\u00ean th\u1ef1c t\u1ebf, trong v\u00e0i n\u0103m ti\u1ebfp theo, Alex \u0111\u00e3 h\u1ecdc c\u00e1ch b\u1eaft ch\u01b0\u1edbc g\u1ea7n m\u1ed9t tr\u0103m n\u0103m m\u01b0\u01a1i t\u1eeb ti\u1ebfng Anh v\u00e0 th\u1eadm ch\u00ed c\u00f3 th\u1ec3 l\u00fd lu\u1eadn v\u00e0 s\u1eed d\u1ee5ng nh\u1eefng t\u1eeb \u0111\u00f3 \u1edf m\u1ee9c c\u01a1 b\u1ea3n \u0111\u1ec3 giao ti\u1ebfp.)\n\n</i><br><br>+) \u0110\u00e1p \u00e1n A sai v\u00ec b\u00e0i vi\u1ebft kh\u00f4ng n\u00f3i chung v\u1ec1 c\u00e1ch \u0111\u1ed9ng v\u1eadt giao ti\u1ebfp v\u1edbi con ng\u01b0\u1eddi m\u00e0 t\u1eadp trung v\u00e0o tr\u01b0\u1eddng h\u1ee3p c\u1ee7a Alex.\n<br><br>+) \u0110\u00e1p \u00e1n C sai v\u00ec kh\u00f4ng c\u00f3 s\u1ef1 so s\u00e1nh n\u00e0o gi\u1eefa v\u1eb9t v\u00e0 c\u00e1c lo\u00e0i \u0111\u1ed9ng v\u1eadt kh\u00e1c.\n<br><br>+) \u0110\u00e1p \u00e1n D sai v\u00ec b\u00e0i vi\u1ebft nh\u1ea5n m\u1ea1nh n\u1ed7 l\u1ef1c giao ti\u1ebfp v\u1edbi Alex h\u01a1n l\u00e0 vi\u1ec7c ch\u1ee9ng minh c\u00e1c nh\u00e0 khoa h\u1ecdc kh\u00e1c sai, chi ti\u1ebft ch\u1ec9 l\u00e0 m\u1ed9t chi ti\u1ebft r\u1ea5t nh\u1ecf trong \u0111o\u1ea1n 2.<br><br><b>=&gt; \u0110\u00e1p \u00e1n B \u0111\u00fang.</b>", "key": "B", "isVideo": false, "score": 0, "order": 46, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582332, "lessonId": 0, "a": "animals", "b": "scientists", "c": "pet owners", "d": "reactions", "bookId": 1086082, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The word <b>they </b>in paragraph 2 refers to ____________.", "answer": "<b>T\u1eeb \"they\" trong \u0111o\u1ea1n 2 \u00e1m ch\u1ec9 ____________.\n</b><br><b>A.</b> animals (animal) /\u02c8\u00e6n\u026aml/: \u0111\u1ed9ng v\u1eadt\n<br><b>B.</b> scientists ( scientist) /\u02c8sa\u026a\u0259nt\u026ast/: nh\u00e0 khoa h\u1ecdc\n<br><b>C</b>. pet owners (pet owner) /pet \u02c8\u0259\u028an\u0259r /: ch\u1ee7 v\u1eadt nu\u00f4i\n<br><b>D.</b> reaction: /ri\u02c8\u00e6k\u0283n/: ph\u1ea3n \u1ee9ng\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o nh\u1eefng th\u00f4ng tin sau: \n</b><br>+) \u201cScientists at the time believed that <b>animals</b> were incapable of any thought. They believed that animals only reacted to things because <b>they</b> were programmed by nature to react that way, not because they had the ability to think or feel.\u201d\n<br><i>(C\u00e1c nh\u00e0 khoa h\u1ecdc th\u1eddi \u0111\u00f3 tin r\u1eb1ng <b>\u0111\u1ed9ng v\u1eadt</b> kh\u00f4ng c\u00f3 kh\u1ea3 n\u0103ng suy ngh\u0129. H\u1ecd tin r\u1eb1ng \u0111\u1ed9ng v\u1eadt ch\u1ec9 ph\u1ea3n \u1ee9ng v\u1edbi m\u1ecdi th\u1ee9 v\u00ec <b>ch\u00fang</b> \u0111\u01b0\u1ee3c l\u1eadp tr\u00ecnh theo b\u1ea3n ch\u1ea5t \u0111\u1ec3 ph\u1ea3n \u1ee9ng theo c\u00e1ch \u0111\u00f3, ch\u1ee9 kh\u00f4ng ph\u1ea3i v\u00ec ch\u00fang c\u00f3 kh\u1ea3 n\u0103ng suy ngh\u0129 ho\u1eb7c c\u1ea3m nh\u1eadn.)\n<br></i><br>\u21d2Do \u0111\u00f3, t\u1eeb \u201c<b>they</b>\u201d trong \u0111o\u1ea1n \u00e1m ch\u1ec9 \u0111\u1ebfn <b>animal</b> /\u02c8\u00e6n\u026aml/: <b>\u0111\u1ed9ng v\u1eadt.</b>", "key": "A", "isVideo": false, "score": 0, "order": 47, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582333, "lessonId": 0, "a": "She thought the assistant could pick the best bird.", "b": "She wanted to avoid accusations of choosing an especially smart bird.", "c": "The assistant was an expert in parrot behavior.", "d": "The assistant was conducting a related experiment.", "bookId": 1086083, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 3, why did Pepperberg let the store assistant choose Alex?", "answer": "<b>Theo \u0111o\u1ea1n 3, t\u1ea1i sao Pepperberg \u0111\u1ec3 nh\u00e2n vi\u00ean b\u00e1n h\u00e0ng ch\u1ecdn Alex?\n</b><br><b>A.</b> C\u00f4 \u1ea5y ngh\u0129 r\u1eb1ng nh\u00e2n vi\u00ean b\u00e1n h\u00e0ng c\u00f3 th\u1ec3 ch\u1ecdn \u0111\u01b0\u1ee3c ch\u00fa chim \u0111\u1eb9p nh\u1ea5t.\n<br><b>B.</b> C\u00f4 \u1ea5y mu\u1ed1n tr\u00e1nh b\u1ecb bu\u1ed9c t\u1ed9i ch\u1ecdn m\u1ed9t ch\u00fa chim \u0111\u1eb7c bi\u1ec7t th\u00f4ng minh.\n<br><b>C.</b> Nh\u00e2n vi\u00ean b\u00e1n h\u00e0ng l\u00e0 chuy\u00ean gia v\u1ec1 s ability to reason?", "answer": "<b>Theo \u0111o\u1ea1n 4, v\u00ed d\u1ee5 n\u00e0o cho th\u1ea5y kh\u1ea3 n\u0103ng l\u00fd lu\u1eadn c\u1ee7a Alex?\n</b><br><b>A.</b> Kh\u1ea3 n\u0103ng b\u1eaft ch\u01b0\u1edbc m\u1ed9t tr\u0103m n\u0103m m\u01b0\u01a1i t\u1eeb\n<br><b>B.</b> K\u1ef9 n\u0103ng nh\u1eadn d\u1ea1ng m\u00e0u s\u1eafc, h\u00ecnh d\u1ea1ng ho\u1eb7c ch\u1ea5t li\u1ec7u c\u1ee7a m\u1ed9t v\u1eadt th\u1ec3\n<br><b>C.</b> S\u1ef1 hi\u1ec3u bi\u1ebft c\u1ee7a anh \u1ea5y v\u1ec1 c\u00e1ch b\u1eaft ch\u01b0\u1edbc c\u00e1c m\u1eabu l\u1eddi n\u00f3i c\u1ee7a con ng\u01b0\u1eddi\n<br><b>D.</b> Kh\u1ea3 n\u0103ng h\u1ecdc t\u1eeb m\u1edbi nhanh ch\u00f3ng c\u1ee7a anh \u1ea5y\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin sau: \n</b><br>\"However, Pepperberg's experiment did not fail. In fact, over the next few years, Alex learned <b>to imitate almost one hundred and fifty English words</b>, and was even able to reason and use those words on a basic level to communicate. For example, when Alex was shown an object and was asked about its shape, color, or material, he could label it correctly. He could understand that a key was a key <b>no matter what its size or color</b>, and could figure out how the key was different from others.\u201d\n<br><i>(Tuy nhi\u00ean, th\u00ed nghi\u1ec7m c\u1ee7a Pepperberg \u0111\u00e3 kh\u00f4ng th\u1ea5t b\u1ea1i. Tr\u00ean th\u1ef1c t\u1ebf, trong v\u00e0i n\u0103m ti\u1ebfp theo, Alex \u0111\u00e3 h\u1ecdc c\u00e1ch <b>b\u1eaft ch\u01b0\u1edbc g\u1ea7n m\u1ed9t tr\u0103m n\u0103m m\u01b0\u01a1i t\u1eeb ti\u1ebfng Anh</b>, v\u00e0 th\u1eadm ch\u00ed c\u00f3 th\u1ec3 <b>l\u00fd lu\u1eadn v\u00e0 s\u1eed d\u1ee5ng nh\u1eefng t\u1eeb \u0111\u00f3 \u1edf m\u1ee9c c\u01a1 b\u1ea3n \u0111\u1ec3 giao ti\u1ebfp</b>. V\u00ed d\u1ee5, khi Alex \u0111\u01b0\u1ee3c cho xem m\u1ed9t v\u1eadt th\u1ec3 v\u00e0 \u0111\u01b0\u1ee3c <b>h\u1ecfi v\u1ec1 h\u00ecnh d\u1ea1ng, m\u00e0u s\u1eafc ho\u1eb7c ch\u1ea5t li\u1ec7u c\u1ee7a n\u00f3</b>, c\u1eadu b\u00e9 c\u00f3 th\u1ec3 d\u00e1n nh\u00e3n ch\u00ednh x\u00e1c cho n\u00f3. C\u1eadu b\u00e9 c\u00f3 th\u1ec3 hi\u1ec3u r\u1eb1ng ch\u00eca kh\u00f3a l\u00e0 ch\u00eca kh\u00f3a <b>b\u1ea5t k\u1ec3 k\u00edch th\u01b0\u1edbc hay m\u00e0u s\u1eafc</b> c\u1ee7a n\u00f3 nh\u01b0 th\u1ebf n\u00e0o, v\u00e0 c\u00f3 th\u1ec3 t\u00ecm ra ch\u00eca kh\u00f3a kh\u00e1c v\u1edbi nh\u1eefng ch\u00eca kh\u00f3a kh\u00e1c nh\u01b0 th\u1ebf n\u00e0o.)\n</i><br><br>\u21d2 Kh\u1ea3 n\u0103ng nh\u1eadn bi\u1ebft h\u00ecnh d\u1ea1ng, m\u00e0u s\u1eafc, v\u00e0 ch\u1ea5t li\u1ec7u c\u1ee7a Alex ch\u1ee9ng minh r\u1eb1ng n\u00f3 c\u00f3 kh\u1ea3 n\u0103ng suy lu\u1eadn.\n<br><br><b>\u21d2 \u0110\u00e1p \u00e1n B l\u00e0 \u0111\u00e1p \u00e1n ch\u00ednh x\u00e1c.\n</b><br><b>+) \u0110\u00e1p \u00e1n A sai</b> v\u00ec vi\u1ec7c b\u1eaft ch\u01b0\u1edbc 150 t\u1eeb kh\u00f4ng ph\u1ea3i l\u00e0 v\u00ed d\u1ee5 v\u1ec1 kh\u1ea3 n\u0103ng suy lu\u1eadn.\n<br><b>+) \u0110\u00e1p \u00e1n C sai</b> v\u00ec b\u1eaft ch\u01b0\u1edbc c\u00e1c m\u1eabu l\u1eddi n\u00f3i c\u1ee7a con ng\u01b0\u1eddi kh\u00f4ng li\u00ean quan \u0111\u1ebfn kh\u1ea3 n\u0103ng suy lu\u1eadn.\n<br><b>+) \u0110\u00e1p \u00e1n D sai</b> v\u00ec vi\u1ec7c h\u1ecdc t\u1eeb kh\u00f4ng ph\u1ea3i l\u00e0 b\u1eb1ng ch\u1ee9ng c\u1ee5 th\u1ec3 v\u1ec1 kh\u1ea3 n\u0103ng suy lu\u1eadn.", "key": "B", "isVideo": false, "score": 0, "order": 49, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582337, "lessonId": 0, "a": "It began in 1977 with a parrot named Alex.", "b": "It aimed to prove that animals could reason and communicate.", "c": "It was initially considered a likely failure by other scientists.", "d": "It attempted to show that parrots naturally understand human language.", "bookId": 1086085, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Which of the following is NOT mentioned about Irene Pepperberg\u2019s experiment?", "answer": "<div><b>T\u1ea5t c\u1ea3 nh\u1eefng \u0111i\u1ec1u sau \u0111\u00e2y \u0111\u1ec1u \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp \u0111\u1ebfn th\u00ed nghi\u1ec7m c\u1ee7a Irene Pepperberg TR\u1eea:</b></div><div>A. Th\u00ed nghi\u1ec7m b\u1eaft \u0111\u1ea7u v\u00e0o n\u0103m 1977 v\u1edbi m\u1ed9t con v\u1eb9t t\u00ean l\u00e0 Alex.</div><div>B. Th\u00ed nghi\u1ec7m nh\u1eb1m m\u1ee5c \u0111\u00edch ch\u1ee9ng minh r\u1eb1ng \u0111\u1ed9ng v\u1eadt c\u00f3 th\u1ec3 l\u00fd lu\u1eadn v\u00e0 giao ti\u1ebfp.</div><div>C. Ban \u0111\u1ea7u, c\u00e1c nh\u00e0 khoa h\u1ecdc kh\u00e1c coi \u0111\u00e2y l\u00e0 m\u1ed9t th\u1ea5t b\u1ea1i c\u00f3 th\u1ec3 x\u1ea3y ra.</div><div>D. N\u00f3 c\u1ed1 g\u1eafng ch\u1ee9ng minh r\u1eb1ng v\u1eb9t c\u00f3 kh\u1ea3 n\u0103ng hi\u1ec3u ng\u00f4n ng\u1eef con ng\u01b0\u1eddi m\u1ed9t c\u00e1ch t\u1ef1 nhi\u00ean.</div><div><b>C\u0103n c\u1ee9 v\u00e0o nh\u1eefng th\u00f4ng tin sau:&nbsp;</b></div><div>+) \u201c<b>In 1977</b>, a young Harvard graduate named Irene Pepperberg <b>brought a one-year-old African gray parrot into her lab</b> and attempted something very unusual.\u201d</div><div>(<b>N\u0103m 1977</b>, m\u1ed9t sinh vi\u00ean tr\u1ebb m\u1edbi t\u1ed1t nghi\u1ec7p Harvard t\u00ean l\u00e0 Irene Pepperberg <b>\u0111\u00e3 mang m\u1ed9t ch\u00fa v\u1eb9t x\u00e1m Ch\u00e2u Phi m\u1ed9t tu\u1ed5i v\u00e0o ph\u00f2ng th\u00ed nghi\u1ec7m c\u1ee7 a m\u00ecnh</b> v\u00e0 th\u1eed m\u1ed9t \u0111i\u1ec1u r\u1ea5t kh\u00e1c th\u01b0\u1eddng.)</div><div><b>\u21d2 \u0110\u00e1p \u00e1n A \u0111\u00e3 \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp \u0111\u1ebfn</b></div><div>+) \u201cIn 1977, a young Harvard graduate named Irene Pepperberg brought a one-year-old African gray parrot <b>into her lab</b> and attempted something very unusual. At a time when her fellow scientists thought that animals could only communicate on a very basic level, Irene set out to discover what was on a creature's mind by talking to it.\u201d</div><div><i>(N\u0103m 1977, m\u1ed9t sinh vi\u00ean tr\u1ebb t\u1ed1t nghi\u1ec7p Harvard t\u00ean l\u00e0 Irene Pepperberg \u0111\u00e3 mang m\u1ed9t con v\u1eb9t x\u00e1m ch\u00e2u Phi m\u1ed9t tu\u1ed5i <b>v\u00e0o ph\u00f2ng th\u00ed nghi\u1ec7m c\u1ee7a m\u00ecnh</b> v\u00e0 th\u1eed m\u1ed9t \u0111i\u1ec1u r\u1ea5t kh\u00e1c th\u01b0\u1eddng. V\u00e0o th\u1eddi \u0111i\u1ec3m m\u00e0 c\u00e1c nh\u00e0 khoa h\u1ecdc \u0111\u1ed3ng nghi\u1ec7p c\u1ee7a c\u00f4 ngh\u0129 r\u1eb1ng <b>\u0111\u1ed9ng v\u1eadt ch\u1ec9 c\u00f3 th\u1ec3 giao ti\u1ebfp \u1edf m\u1ee9c \u0111\u1ed9 r\u1ea5t c\u01a1 b\u1ea3n</b>, Irene \u0111\u00e3 <b>b\u1eaft \u0111\u1ea7u kh\u00e1m ph\u00e1 nh\u1eefng g\u00ec trong t\u00e2m tr\u00ed c\u1ee7a m\u1ed9t sinh v\u1eadt b\u1eb1ng c\u00e1ch n\u00f3i chuy\u1ec7n v\u1edbi n\u00f3.</b>)</i></div><div><b>\u21d2 \u0110\u00e1p \u00e1n B \u0111\u00e3 \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp \u0111\u1ebfn</b></div><div>+) \u201cMost researchers thought that <b>Pepperberg's attempt to communicate with Alex</b> would end in failure.\u201d</div><div><i>(H\u1ea7u h\u1ebft c\u00e1c nh\u00e0 nghi\u00ean c\u1ee9u \u0111\u1ec1u ngh\u0129 r\u1eb1ng <b>n\u1ed7 l\u1ef1c giao ti\u1ebfp v\u1edbi Alex c\u1ee7a Pepperberg</b> s\u1ebd th\u1ea5t b\u1ea1i.)</i></div><div><b>\u21d2 \u0110\u00e1p \u00e1n C \u0111\u00e3 \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp \u0111\u1ebfn</b></div><div>+) B\u00e0i vi\u1ebft kh\u00f4ng n\u00f3i r\u1eb1ng Pepperberg c\u1ed1 g\u1eafng ch\u1ee9ng minh v\u1eb9t hi\u1ec3u ng\u00f4n ng\u1eef con ng\u01b0\u1eddi m\u1ed9t c\u00e1ch t\u1ef1 nhi\u00ean (<b><i>naturally understand human language</i></b>). Thay v\u00e0o \u0111\u00f3, c\u00f4 \u1ea5y ch\u1ec9 ra r\u1eb1ng Alex h\u1ecdc c\u00e1ch s\u1eed d\u1ee5ng m\u1ed9t \"<b>h\u1ec7 th\u1ed1ng giao ti\u1ebfp hai chi\u1ec1u</b>\" (<b><i>a two-way communication code</i></b>).</div><div><b>\u21d2 \u0110\u00e1p \u00e1n D kh\u00f4ng \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp \u0111\u1ebfn</b></div>", "key": "D", "isVideo": false, "score": 0, "order": 50, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582340, "lessonId": 0, "a": "analyze", "b": "repeat", "c": "debate", "d": "describe", "bookId": 1086086, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 4, <b>reason </b>is closest in meaning to _________.", "answer": "<div><b><i>Trong \u0111o\u1ea1n 4, \"reason\" c\u00f3 ngh\u0129a g\u1ea7n nh\u1ea5t v\u1edbi _________.</i></b></div><div>A. analyze /\u02c8\u00e6n\u0259la\u026az/:&nbsp; ph\u00e2n t\u00edch, di\u1ec5n gi\u1ea3i</div><div>B. repeat /r\u026a\u02c8pi\u02d0t/:&nbsp; l\u1eb7p l\u1ea1i, nh\u1eafc l\u1ea1i&nbsp;</div><div>C. debate /d\u026a\u02c8be\u026at/: tranh lu\u1eadn</div><div>D. describe /d\u026a\u02c8skra\u026ab/:&nbsp; m\u00f4 t\u1ea3, mi\u00eau t\u1ea3</div><div><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin sau:&nbsp;</b></div><div>+) \u201cAlex learned to imitate almost one hundred and fifty English words, and was even able to <b>reason </b>and use those words on a basic level to communicate.\u201d</div><div><i>(Alex \u0111\u00e3 h\u1ecdc c\u00e1ch b\u1eaft ch\u01b0\u1edbc g\u1ea7n m\u1ed9t tr\u0103m n\u0103m m\u01b0\u01a1i t\u1eeb ti\u1ebfng Anh v\u00e0 th\u1eadm ch\u00ed c\u00f3 th\u1ec3 <b>l\u00fd lu\u1eadn</b> v\u00e0 s\u1eed d\u1ee5ng nh\u1eefng t\u1eeb \u0111\u00f3 \u1edf m\u1ee9c \u0111\u1ed9 c\u01a1 b\u1ea3n \u0111\u1ec3 giao ti\u1ebfp.)</i></div><div>\u21d2Do \u0111\u00f3 reason (v) /\u02c8ri\u02d0zn/ ~ analyze: ph\u00e2n t\u00edch, di\u1ec5n gi\u1ea3i.", "key": "A", "isVideo": false, "score": 0, "order": 51, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21582342, "lessonId": 0, "a": "overstate Alex\u2019s abilities in order to gain public attention.", "b": "present Alex\u2019s success as an example of animal intelligence.", "c": "avoid claiming that Alex had human-like language skills.", "d": "let others interpret Alex\u2019s abilities however they saw fit.", "bookId": 1086087, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Based on paragraph 5, it can be inferred that Pepperberg was careful to _____.", "answer": "<b><i>Trong \u0111o\u1ea1n 4, \"reason\" c\u00f3 ngh\u0129a g\u1ea7n nh\u1ea5t v\u1edbi _________.</i></b></div><div>A. analyze /\u02c8\u00e6n\u0259la\u026az/:&nbsp; ph\u00e2n t\u00edch, di\u1ec5n gi\u1ea3i</div><div>B. repeat /r\u026a\u02c8pi\u02d0t/:&nbsp; l\u1eb7p l\u1ea1i, nh\u1eafc l\u1ea1i&nbsp;</div><div>C. debate /d\u026a\u02c8be\u026at/: tranh lu\u1eadn</div><div>D. describe /d\u026a\u02c8skra\u026ab/:&nbsp; m\u00f4 t\u1ea3, mi\u00eau t\u1ea3</div><div><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin sau:&nbsp;</b></div><div>+) \u201cAlex learned to imitate almost one hundred and fifty English words, and was even able to <b>reason </b>and use those words on a basic level to communicate.\u201d</div><div><i>(Alex \u0111\u00e3 h\u1ecdc c\u00e1ch b\u1eaft ch\u01b0\u1edbc g\u1ea7n m\u1ed9t tr\u0103m n\u0103m m\u01b0\u01a1i t\u1eeb ti\u1ebfng Anh v\u00e0 th\u1eadm ch\u00ed c\u00f3 th\u1ec3 <b>l\u00fd lu\u1eadn</b> v\u00e0 s\u1eed d\u1ee5ng nh\u1eefng t\u1eeb \u0111\u00f3 \u1edf m\u1ee9c \u0111\u1ed9 c\u01a1 b\u1ea3n \u0111\u1ec3 giao ti\u1ebfp.)</i></div><div>\u21d2Do \u0111\u00f3 reason (v) /\u02c8ri\u02d0zn/ ~ analyze: ph\u00e2n t\u00edch, di\u1ec5n gi\u1ea3i.", "key": "C", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully.", "content": "1. Discovered in the early 1800s and named \u2018nicotianine\u2019, the oily essence now called nicotine is the main active ingredient of tobacco. Nicotine, however, is only a small component of cigarette smoke, which contains more than 4,700 chemical compounds, including 43 cancer-causing substances. In recent times, scientific research has been providing evidence that years of cigarette smoking vastly increase the risk of developing fatal medical conditions.<br>2. In addition to being responsible for more than 85 percent of lung cancers, smoking is associated with cancers of, amongst others, the mouth, stomach and kidneys, and is thought to cause about 14 percent of leukemia and cervical cancers. In 1990, smoking caused more than 84,000 deaths, mainly resulting from such problems as pneumonia, bronchitis and influenza. Smoking, it is believed, is responsible for 30 percent of all deaths from cancer and clearly represents the most important preventable cause of cancer in countries like the United States today.<br>3. <b>Passive smoking</b>, the breathing in of the side-stream smoke from the burning of tobacco between puffs or of the smoke exhaled by a smoker, also causes a serious health risk. A report published in 1992 by the US Environmental Protection Agency (EPA) emphasized the health dangers, especially from side-stream smoke. This type of smoke contains more smaller particles and is therefore more likely to be deposited deep in the lungs. On the basis of this report, the EPA has classified environmental tobacco smoke in the highest risk category for causing cancer.<br>4. As an illustration of the health risks, in the case of a married couple where one partner is a smoker and one a non-smoker, the latter is believed to have a 30 per cent higher risk of death from heart disease because of passive smoking. The risk of lung cancer also increases over the years of exposure and the figure jumps to 80 per cent if the spouse has been smoking four packs a day for 20 years. It has been calculated that 17 per cent of cases of lung cancer can be attributed to high levels of exposure to second-hand tobacco smoke during childhood and adolescence.<br>5. A more recent study by researchers at the University of California at San Francisco (UCSF) has shown that second-hand cigarette smoke does more harm to non-smokers than to smokers. Leaving aside the philosophical question of whether anyone should have to breathe someone else\u2019s cigarette smoke, the report suggests that the smoke experienced by many people in their daily lives is enough to produce substantial adverse effects on a person\u2019s heart and lungs.<br>6. The report, published in the Journal of the American Medical Association (AMA), was based on the researchers\u2019 own earlier research but also includes a review of studies over the past few years. The American Medical Association represents about half of all US doctors and is a strong opponent of smoking. The study suggests that people who smoke cigarettes are continually damaging their cardiovascular system, which adapts in order to <b>compensate for</b> the effects of smoking. It further states that people who do not smoke do not have the benefit of their system adapting to the smoke inhalation. Consequently, the effects of passive smoking are far greater on non-smokers than on smokers.<br><div style=\"text-align: right;\"><i>(Source: https://www.ieltsreading.info/blog/)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21582396, "lessonId": 0, "a": "The Chemistry of Nicotine", "b": "The Risks of Cigarette Smoke", "c": "The Rise of Passive Smoking Awareness", "d": "Nicotine as the Main Cause of Cancer", "bookId": 1086088, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title for the passage can be ________.", "answer": "<div><b>Ti\u00eau \u0111\u1ec1 hay nh\u1ea5t cho \u0111o\u1ea1n v\u0103n c\u00f3 th\u1ec3 l\u00e0 ________.             document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
