    <script>
        const EXAM_DATA = [{"title": "", "content": "", "listQuestion": [{"questionId": 21597482, "lessonId": 0, "a": "Mi\u00eau t\u1ea3 c\u00e1i nh\u00ecn \u00e2u y\u1ebfm P\u00ea-n\u00ea-l\u1ed1p d\u00e0nh cho ch\u1ed3ng.", "b": "T\u00f4 \u0111\u1eadm ni\u1ec1m h\u1ea1nh ph\u00fac b\u1ea5t t\u1eadn, nh\u01b0 th\u1ec3 \u0111\u01b0\u1ee3c t\u00e1i sinh c\u1ee7a P\u00ea-n\u00ea-l\u1ed1p khi g\u1eb7p l\u1ea1i ch\u1ed3ng.", "c": "Mi\u00eau t\u1ea3 \u0111\u00f4i c\u00e1nh tay tuy\u1ec7t \u0111\u1eb9p c\u1ee7a P\u00ea-n\u00ea-l\u1ed1p.", "d": "T\u00f4 \u0111\u1eadm ni\u1ec1m h\u1ea1nh ph\u00fac c\u1ee7a nh\u1eefng ng\u01b0\u1eddi s\u1ed1ng s\u00f3t sau tr\u1eadn cu\u1ed3ng phong do P\u00f4-d\u00ea-i-\u0111\u00f4ng g\u00e2y n\u00ean.", "bookId": 1088290, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cD\u1ecbu hi\u1ec1n thay m\u1eb7t \u0111\u1ea5t, khi n\u00f3 hi\u1ec7n l\u00ean tr\u01b0\u1edbc m\u1eaft nh\u1eefng ng\u01b0\u1eddi \u0111i bi\u1ec3n b\u1ecb P\u00f4-d\u00ea-i-\u0111\u00f4ng  \u0111\u00e1nh tan thuy\u1ec1n trong s\u00f3ng c\u1ea3 gi\u00f3 to, h\u1ecd b\u01a1i, nh\u01b0ng r\u1ea5t \u00edt ng\u01b0\u1eddi tho\u00e1t kh\u1ecfi bi\u1ec3n kh\u01a1i tr\u1eafng xo\u00e1 m\u00e0 v\u00e0o \u0111\u01b0\u1ee3c \u0111\u1ebfn b\u1edd; m\u00ecnh \u0111\u1ea7y b\u1ecdt n\u01b0\u1edbc, nh\u1eefng ng\u01b0\u1eddi s\u1ed1ng s\u00f3t m\u1eebng r\u1ee1 b\u01b0\u1edbc l\u00ean \u0111\u1ea5t li\u1ec1n mong \u0111\u1ee3i; P\u00ea-n\u00ea-l\u1ed1p c\u0169ng v\u1eady, \u0111\u01b0\u1ee3c g\u1eb7p l\u1ea1i ch\u1ed3ng, n\u00e0ng sung s\u01b0\u1edbng xi\u1ebft bao, n\u00e0ng nh\u00ecn ch\u1ed3ng kh\u00f4ng ch\u00e1n m\u1eaft v\u00e0 hai c\u00e1nh tay tr\u1eafng mu\u1ed1t c\u1ee7a n\u00e0ng c\u1ee9 \u00f4m l\u1ea5y c\u1ed5 ch\u1ed3ng kh\u00f4ng n\u1ee1 bu\u00f4ng r\u1eddi.\u201d</i><br><div style=\"text-align: right;\">(S\u1eed thi Hy L\u1ea1p, <i>\u00d4-\u0111i-x\u00ea</i>, theo <i>Ng\u1eef v\u0103n 10</i>, t\u1eadp 1, NXB Gi\u00e1o d\u1ee5c Vi\u1ec7t Nam, 2011)</div>Ch\u1ec9 ra t\u00e1c d\u1ee5ng c\u1ee7a ph\u00e9p so s\u00e1nh \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong c\u00e2u v\u0103n.", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u00e2u v\u0103n s\u1eed d\u1ee5ng ph\u00e9p so s\u00e1nh gi\u1eefa ni\u1ec1m vui c\u1ee7a nh\u1eefng ng\u01b0\u1eddi \u0111i bi\u1ec3n khi tho\u00e1t kh\u1ecfi c\u01a1n b\u00e3o v\u1edbi ni\u1ec1m vui c\u1ee7a P\u00ea-n\u00ea-l\u1ed1p khi g\u1eb7p l\u1ea1i \u00d4-\u0111i-x\u00ea. C\u00e1ch so s\u00e1nh v\u1edbi nh\u1eefng ng\u01b0\u1eddi b\u1ecb \u0111\u1eafm thuy\u1ec1n nh\u01b0ng may m\u1eafn tho\u00e1t n\u1ea1n nh\u1ea5n m\u1ea1nh c\u1ea3m gi\u00e1c t\u00e1i sinh, nh\u01b0 th\u1ec3 P\u00ea-n\u00ea-l\u1ed1p \u0111\u00e3 ch\u1edd \u0111\u1ee3i t\u1eeb r\u1ea5t l\u00e2u v\u00e0 gi\u1edd \u0111\u00e2y m\u1edbi \u0111\u01b0\u1ee3c \u0111o\u00e0n t\u1ee5 v\u1edbi ch\u1ed3ng.<br>\n\u2192 Ph\u00e9p so s\u00e1nh t\u00f4 \u0111\u1eadm ni\u1ec1m h\u1ea1nh ph\u00fac b\u1ea5t t\u1eadn, nh\u01b0 th\u1ec3 \u0111\u01b0\u1ee3c t\u00e1i sinh c\u1ee7a P\u00ea-n\u00ea-l\u1ed1p khi g\u1eb7p l\u1ea1i ch\u1ed3ng.\n", "key": "B", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597487, "lessonId": 0, "a": "Gi\u1ea3i th\u00edch c\u00e1i ch\u1ebft c\u1ee7a hai anh em thu\u1ed3ng lu\u1ed3ng.", "b": "Gi\u1ea3i th\u00edch g\u1ed1c t\u00edch \u0111\u1ea7m M\u1ef1c.", "c": "L\u00ed gi\u1ea3i g\u1ed1c t\u00edch c\u1ee7a \u0111\u1ea7m M\u1ef1c, mi\u1ebfu G\u00e0n v\u00e0 nguy\u00ean do l\u00e0ng T\u1ea3 Thanh Toai c\u00f3 nhi\u1ec1u ng\u01b0\u1eddi h\u1ecdc h\u00e0nh \u0111\u1ed7 \u0111\u1ea1t.", "d": "Th\u00e0nh c\u00f4ng c\u1ee7a t\u00e1c gi\u1ea3 trong vi\u1ec7c s\u1eed d\u1ee5ng y\u1ebfu t\u1ed1 k\u00ec \u1ea3o.", "bookId": 1088291, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cC\u00e1i nghi\u00ean m\u1ef1c c\u1ee7a c\u1ee5 \u0111\u1ed3 Chu An sau \u0111\u00f3 tr\u00f4i v\u1ec1 l\u00e0ng Qu\u1ef3nh \u0110\u00f4 l\u00e0m \u0111en c\u1ea3 n\u01b0\u1edbc \u0111\u1ea7m \u1ea5y, ng\u00e0y nay ng\u01b0\u1eddi ta v\u1eabn quen g\u1ecdi l\u00e0 \u0111\u1ea7m M\u1ef1c. C\u00f2n qu\u1ea3n b\u00fat th\u00ec l\u1ea1i tr\u00f4i v\u1ec1 l\u00e0ng T\u00f3 cho n\u00ean c\u00e1c c\u1ee5 th\u01b0\u1eddng truy\u1ec1n r\u1eb1ng nh\u1edd th\u1ebf l\u00e0ng T\u00f3 t\u1ee9c l\u00e0 l\u00e0ng T\u1ea3 Thanh Oai b\u00e2y gi\u1edd, c\u00f3 l\u1eafm ng\u01b0\u1eddi h\u1ecdc h\u00e0nh \u0111\u1ed7 \u0111\u1ea1t. C\u00f2n ch\u1ed7 ng\u00f4i m\u1ed9 hai con qu\u00e1i v\u1eadt t\u1ee9c l\u00e0 hai anh em thu\u1ed3ng lu\u1ed3ng sau \u0111\u00f3 ng\u01b0\u1eddi ta l\u1eadp mi\u1ebfu th\u1edd, ng\u00e0y nay v\u1eabn c\u00f2n c\u00f3 t\u00ean l\u00e0 mi\u1ebfu G\u00e0n.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u0110\u1ed5ng Chi, <i>S\u1ef1 t\u00edch \u0111\u1ea7m M\u1ef1c</i>, theo <i>Kho t\u00e0ng truy\u1ec7n c\u1ed5 t\u00edch Vi\u1ec7t Nam</i>, t\u1eadp 1, NXB Gi\u00e1o d\u1ee5c, 2000)</div>N\u1ed9i dung ch\u00ednh c\u1ee7a \u0111o\u1ea1n tr\u00edch l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch gi\u1ea3i th\u00edch ngu\u1ed3n g\u1ed1c c\u1ee7a c\u00e1c \u0111\u1ecba danh \u0111\u1ea7m M\u1ef1c, mi\u1ebfu G\u00e0n v\u00e0 l\u00fd do l\u00e0ng T\u1ea3 Thanh Oai c\u00f3 nhi\u1ec1u ng\u01b0\u1eddi h\u1ecdc h\u00e0nh \u0111\u1ed7 \u0111\u1ea1t.<br>\n\u2192 N\u1ed9i dung ch\u00ednh c\u1ee7a \u0111o\u1ea1n tr\u00edch l\u00e0 l\u00ed gi\u1ea3i g\u1ed1c t\u00edch c\u1ee7a \u0111\u1ea7m M\u1ef1c, mi\u1ebfu G\u00e0n v\u00e0 nguy\u00ean do l\u00e0ng T\u1ea3 Thanh Toai c\u00f3 nhi\u1ec1u ng\u01b0\u1eddi h\u1ecdc h\u00e0nh \u0111\u1ed7 \u0111\u1ea1t.\n", "key": "C", "isVideo": true, "score": 0, "order": 2, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597496, "lessonId": 0, "a": "Hai c\u00e2u \u0111\u1ec1.", "b": "Hai c\u00e2u th\u1ef1c.", "c": "Hai c\u00e2u lu\u1eadn.", "d": "Hai c\u00e2u k\u1ebft.", "bookId": 1088292, "comments": 0, "bookmarks": 3, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u0110\u1ee7ng \u0111\u1ec9nh chi\u1ec1u h\u00f4m d\u1eaft tay,<br>Trong th\u1ebf gi\u1edbi ph\u00fat chim bay.<br>Non cao non th\u1ea5p m\u00e2y thu\u1ed9c,<br>C\u00e2y c\u1ee9ng c\u00e2y m\u1ec1m gi\u00f3 hay.<br>N\u01b0\u1edbc m\u1ea5y tr\u0103m thu c\u00f2n v\u1eady,<br>Nguy\u1ec7t bao nhi\u00eau ki\u1ebfp nh\u1eabn nay .<br>Ngo\u00e0i ch\u01b0ng m\u1ecdi ch\u1ed1n \u0111\u1ec1u th\u00f4ng h\u1ebft,<br>Bui m\u1ed9t l\u00f2ng ng\u01b0\u1eddi c\u1ef1c hi\u1ec3m thay.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Tr\u00e3i, <i>M\u1ea1n thu\u1eadt</i>, b\u00e0i 4, theo <i>Nguy\u1ec5n Tr\u00e3i th\u01a1 v\u00e0 \u0111\u1eddi</i>, NXB V\u0103n h\u1ecdc, 2016)</div>C\u1eb7p c\u00e2u th\u01a1 n\u00e0o ch\u1ee9a \u0111\u1ef1ng th\u00f4ng \u0111i\u1ec7p c\u1ed1t l\u00f5i c\u1ee7a b\u00e0i th\u01a1?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nB\u00e0i th\u01a1 \u0111\u01b0\u1ee3c chia l\u00e0m b\u1ed1n ph\u1ea7n:<br>\n- \u0110\u1ec1 (c\u00e2u 1-2): T\u00e2m th\u1ebf ung dung, nh\u00e0n t\u1ea3ng c\u1ee7a Nguy\u1ec5n Tr\u00e3i.<br>\n- Th\u1ef1c (c\u00e2u 3-4): S\u1ef1 v\u1eadn \u0111\u1ed9ng c\u1ee7a thi\u00ean nhi\u00ean, \u0111\u1ea5t tr\u1eddi.<br>\n- Lu\u1eadn (c\u00e2u 5-6): Quy lu\u1eadt v\u1eadn \u0111\u1ed9ng c\u1ee7a t\u1ef1 nhi\u00ean.<br>\n- K\u1ebft (c\u00e2u 7-8): Chi\u00eam nghi\u1ec7m c\u1ee7a Nguy\u1ec5n Tr\u00e3i v\u1ec1 cu\u1ed9c \u0111\u1eddi v\u00e0 con ng\u01b0\u1eddi.<br>\n\u2192 Hai c\u00e2u k\u1ebft ch\u1ee9a \u0111\u1ef1ng th\u00f4ng \u0111i\u1ec7p c\u1ed1t l\u00f5i c\u1ee7a b\u00e0i th\u01a1: Trong v\u0169 tr\u1ee5, m\u1ecdi th\u1ee9 \u0111\u1ec1u c\u00f3 quy lu\u1eadt, ch\u1ec9 c\u00f3 l\u00f2ng ng\u01b0\u1eddi l\u00e0 kh\u00f3 \u0111o\u00e1n, kh\u00f3 ki\u1ec3m so\u00e1t v\u00e0 \u0111\u1ea7y r\u1eaby nh\u1eefng hi\u1ec3m nguy.\n", "key": "D", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597507, "lessonId": 0, "a": "B\u00ecnh lu\u1eadn.", "b": "Ph\u00e2n t\u00edch.", "c": "Ch\u1ee9ng minh.", "d": "So s\u00e1nh.", "bookId": 1088293, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cL\u1eddi b\u00e0n c\u1ee7a S\u01a1n Nam Th\u00fac:<br>Hai Ph\u1eadt c\u00e3i nhau l\u00e0 vi\u1ec7c l\u1ea1, Th\u00edch Ca b\u1ebb l\u1ea1i hai Ph\u1eadt, c\u00e0ng th\u00eam l\u1ea1. K\u1ec3 ra, Ph\u1eadt \u0111\u1ea5t Ph\u1eadt g\u1ed7 \u0111\u1ec1u v\u00f4 b\u1ed5, l\u1ea1i c\u00f2n ph\u00e2n ra k\u1ebb ng\u1ed3i tr\u00ean ng\u1ed3i d\u01b0\u1edbi \u0111\u1ec3 h\u01b0\u1edfng l\u1ed9c nhi\u1ec1u l\u1ed9c \u00edt, tranh nhau, n\u00ean Th\u00edch Ca ch\u00ea l\u00e0 ph\u1ea3i. Nh\u01b0ng tay Th\u00edch Ca l\u1ea1i x\u00e1ch b\u1ea7u r\u01b0\u1ee3u, \u0111ang say l\u1ea3o \u0111\u1ea3o, th\u00ec c\u00f3 c\u00f4ng g\u00ec v\u1edbi d\u00e2n? Ch\u1eb3ng qua, c\u0169ng nh\u01b0 hai Ph\u1eadt kia th\u00f4i. \u0110\u1ee9c vua c\u00f3 b\u1eadc th\u00e1nh n\u00e0y h\u1eb3n ng\u1ee5 \u00fd mu\u1ed1n n\u00f3i l\u00e0: C\u1ea7n ch\u1ed1ng nh\u1eefng vi\u1ec7c l\u00e0m l\u1ec7ch, n\u00ean c\u00f3 b\u00e0i v\u0103n d\u1ee5 n\u00e0y, v\u1edbi l\u1eddi l\u1ebd s\u00e2u s\u1eafc. Ch\u1eb3ng nh\u1eefng k\u1ebb ng\u1ed3i kh\u00f4ng \u0103n l\u1ed9c \u0111\u1ecdc \u0111\u1ebfn ph\u1ea3i to\u00e1t m\u1ed3 h\u00f4i tr\u00e1n, m\u00e0 c\u1ea3 nh\u1eefng ng\u01b0\u1eddi xu\u1ea5t gia \u0111\u1ecdc \u0111\u1ebfn, c\u0169ng t\u1ef1 bi\u1ebft tr\u1edf l\u1ea1i \u0111\u01b0\u1eddng ngay, kh\u00f4ng ai l\u00f4i k\u00e9o v\u00e0o nh\u1eefng l\u1ed1i ngang \u0111\u01b0\u1eddng t\u1eaft. Th\u1ef1c l\u00e0: \u201c\u0110\u1ea7u \u0111\u1ec1 tuy nho nh\u1ecf, nh\u01b0ng v\u0103n ch\u01b0\u01a1ng l\u1ea1i l\u1edbn lao\u201d.</i><br><div style=\"text-align: right;\">(L\u00ea Th\u00e1nh T\u00f4ng, <i>Hai Ph\u1eadt c\u00e3i nhau</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 4, NXB Khoa h\u1ecdc x\u00e3 h\u1ed9i, 2000)</div>Thao t\u00e1c l\u00e2\u0323p lu\u1eadn ch\u00ednh \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong \u0111o\u1ea1n tr\u00ean l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n v\u0103n l\u00e0 l\u1eddi b\u00ecnh c\u1ee7a S\u01a1n Nam Th\u00fac v\u1ec1 c\u00e2u chuy\u1ec7n \u201cHai Ph\u1eadt c\u00e3i nhau\u201d c\u1ee7a L\u00ea Th\u00e1nh T\u00f4ng. \u00d4ng b\u00e0y t\u1ecf quan \u0111i\u1ec3m v\u1ec1 h\u00ecnh t\u01b0\u1ee3ng hai Ph\u1eadt tranh c\u00e3i v\u00e0 Th\u00edch Ca xu\u1ea5t hi\u1ec7n, b\u00e0n v\u1ec1 \u00fd ngh\u0129a ph\u00ea ph\u00e1n c\u1ee7a b\u00e0i v\u0103n d\u1ee5 \u0111\u1ed3ng th\u1eddi \u0111\u00e1nh gi\u00e1 t\u00e0i n\u0103ng v\u00e0 d\u1ee5ng \u00fd s\u00e2u s\u1eafc c\u1ee7a L\u00ea Th\u00e1nh T\u00f4ng.<br>\n\u2192 Thao t\u00e1c l\u00e2\u0323p lu\u1eadn ch\u00ednh \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong \u0111o\u1ea1n tr\u00ean l\u00e0 b\u00ecnh lu\u1eadn.\n", "key": "A", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597519, "lessonId": 0, "a": "Ng\u00f4n ng\u1eef trang nh\u00e3.", "b": "\u0110o\u1ea1n v\u0103n kh\u1eafc ho\u1ea1 v\u1ebb \u0111\u1eb9p ch\u00e2n dung h\u00ecnh t\u01b0\u1ee3ng nh\u00e2n v\u1eadt: dung m\u1ea1o thanh sang, c\u00f3 h\u1ecdc, t\u00e0i hoa, \u0111\u1ee9c \u0111\u1ed9,...", "c": "Nh\u00e2n v\u1eadt \u0111\u01b0\u1ee3c kh\u1eafc ho\u1ea1 l\u00e0 con nh\u00e0 quy\u1ec1n qu\u00fd, t\u1eeb nh\u1ecf \u0111\u00e3 \u0111\u01b0\u1ee3c n\u00e2ng niu, chi\u1ec1u chu\u1ed9ng.", "d": "\u0110o\u1ea1n tr\u00edch s\u1eed d\u1ee5ng th\u00e0nh c\u00f4ng ngh\u1ec7 thu\u1eadt \u0111\u1ed1i.", "bookId": 1088294, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cC\u00f3 m\u1ed9t ng\u01b0\u1eddi:<br>Kh\u1ed5 d\u1ea1ng tr\u00e2m anh <br>N\u1ebft na ch\u01b0\u01a1ng ph\u1ee7 <br>H\u01a1i mi\u1ec7ng s\u1eefa tu\u1ed5i c\u00f2n gi\u1ecdt m\u00e1u, n\u00e9t h\u00e0o hoa ch\u1eebng n\u00e1 T\u00e2n , D\u01b0\u01a1ng <br>Ch\u00f2m t\u00f3c xanh v\u1eeba ch\u1ea5m ngang vai, l\u1eddi kh\u00ed kh\u00e1i h\u1eb9n h\u00f2 Y , Ph\u00f3 \u201d</i><br><div style=\"text-align: right;\">(Cao B\u00e1 Qu\u00e1t, <i>T\u00e0i t\u1eed \u0111a c\u00f9ng ph\u00fa</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Nh\u1eadn x\u00e9t n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>\u0111\u00fang v\u1ec1 \u0111o\u1ea1n v\u0103n tr\u00ean?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n v\u0103n mi\u00eau t\u1ea3 m\u1ed9t nh\u00e2n v\u1eadt c\u00f3 dung m\u1ea1o thanh sang, t\u00e0i hoa, h\u1ecdc v\u1ea5n, v\u00e0 c\u00f3 kh\u00ed ph\u00e1ch, ch\u00ed h\u01b0\u1edbng l\u1edbn. C\u00e2u th\u01a1 \u201cKh\u1ed5 d\u1ea1ng tr\u00e2m anh\u201d ch\u1ec9 xu\u1ea5t th\u00e2n cao qu\u00fd, nh\u01b0ng kh\u00f4ng kh\u1eb3ng \u0111\u1ecbnh r\u1eb1ng nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh \u0111\u01b0\u1ee3c n\u00e2ng niu, chi\u1ec1u chu\u1ed9ng. <br>\n\u2192 Nh\u1eadn x\u00e9t kh\u00f4ng \u0111\u00fang v\u1ec1 \u0111o\u1ea1n v\u0103n l\u00e0: Nh\u00e2n v\u1eadt \u0111\u01b0\u1ee3c kh\u1eafc ho\u1ea1 l\u00e0 con nh\u00e0 quy\u1ec1n qu\u00fd, t\u1eeb nh\u1ecf \u0111\u00e3 \u0111\u01b0\u1ee3c n\u00e2ng niu, chi\u1ec1u chu\u1ed9ng.\n", "key": "C", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597536, "lessonId": 0, "a": "Con \u0111\u01b0\u1eddng v\u00e0ng nh\u1ea1t, m\u1ecfng, s\u1eafc, v\u1ea9n nh\u1eefng h\u1ea1t b\u1ee5i li ti.", "b": "Nh\u1eefng h\u00e0ng c\u00e2y l\u1eadp l\u1edd b\u1ed3ng b\u1ec1nh.", "c": "Tr\u0103ng \u0111\u1ee9ng gi\u1eefa tr\u1eddi, tr\u00f2n v\u1ea1nh nh\u01b0ng kh\u00f4ng t\u1ecfa r\u1ea1ng.", "d": "D\u00e1ng ng\u01b0\u1eddi l\u00ednh x\u01b0\u01a1ng x\u01b0\u01a1ng, \u0111\u00f4i m\u00e0y r\u1eadm \u0111\u1ed5 b\u00f3ng xu\u1ed1ng h\u1ed1c m\u1eaft th\u00e0nh m\u1ed9t qu\u1ea7ng t\u1ed1i \u1ea3m \u0111\u1ea1m.", "bookId": 1088295, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNh\u1eefng h\u00e0ng c\u00e2y l\u1eadp l\u1edd b\u1ed3ng b\u1ec1nh. \u0110\u00f4i ba c\u0103n nh\u00e0 h\u01b0 \u1ea3o, ma qu\u00e1i r\u1ea3i r\u00e1c trong b\u00f3ng t\u1ed1i ngai ng\u00e1i. Tr\u0103ng \u0111\u1ee9ng gi\u1eefa tr\u1eddi, tr\u00f2n v\u1ea1nh nh\u01b0ng kh\u00f4ng t\u1ecfa r\u1ea1ng. Ch\u1ec9 m\u1ed9t \u00e1nh tr\u0103ng duy nh\u1ea5t chi\u1ebfu th\u1eb3ng xu\u1ed1ng \u0111\u1ea5t l\u00e0m th\u00e0nh con \u0111\u01b0\u1eddng v\u00e0ng nh\u1ea1t, m\u1ecfng, s\u1eafc, v\u1ea9n nh\u1eefng h\u1ea1t b\u1ee5i li ti. Ng\u01b0\u1eddi l\u00ednh l\u1ea7m l\u0169i \u0111i tr\u00ean v\u1ec7t s\u00e1ng \u0111\u00f3, chi\u1ebfc ba l\u00f4 sau l\u01b0ng anh r\u1ed9p l\u00ean nh\u01b0 c\u00e1i b\u01b0\u1edbu kh\u1ed5ng l\u1ed3, kh\u1ea9u AK kho\u00e1c ch\u00e9o, n\u00f2ng s\u00fang h\u1edd h\u1eefng nh\u00f4 kh\u1ecfi vai ph\u1ea3i. D\u00e1ng ng\u01b0\u1eddi l\u00ednh x\u01b0\u01a1ng x\u01b0\u01a1ng, \u0111\u00f4i m\u00e0y r\u1eadm \u0111\u1ed5 b\u00f3ng xu\u1ed1ng h\u1ed1c m\u1eaft th\u00e0nh m\u1ed9t qu\u1ea7ng t\u1ed1i \u1ea3m \u0111\u1ea1m.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n B\u00ecnh Ph\u01b0\u01a1ng, <i>\u0110i</i>, theo <i>baovannghe.vn</i>)</div>Chi ti\u1ebft n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>c\u00f9ng n\u1ed9i dung mi\u00eau t\u1ea3 v\u1edbi c\u00e1c chi ti\u1ebft c\u00f2n l\u1ea1i?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft \u201cD\u00e1ng ng\u01b0\u1eddi l\u00ednh x\u01b0\u01a1ng x\u01b0\u01a1ng, \u0111\u00f4i m\u00e0y r\u1eadm \u0111\u1ed5 b\u00f3ng xu\u1ed1ng h\u1ed1c m\u1eaft th\u00e0nh m\u1ed9t qu\u1ea7ng t\u1ed1i \u1ea3m \u0111\u1ea1m.\u201d mi\u00eau t\u1ea3 v\u1ec1 h\u00ecnh d\u00e1ng, \u0111\u1eb7c \u0111i\u1ec3m c\u1ee7a nh\u00e2n v\u1eadt.<br>\nC\u00e1c \u0111\u00e1p \u00e1n c\u00f2n l\u1ea1i l\u00e0 nh\u1eefng chi ti\u1ebft m\u00f4 t\u1ea3 kh\u00f4ng gian.<br>\n\u2192 D l\u00e0 \u0111\u00e1p \u00e1n \u0111\u00fang\n", "key": "D", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597542, "lessonId": 0, "a": "\u201cTh\u1eb9n th\u00f9ng n\u00e9p sau c\u00e1nh c\u1eeda\u201d.", "b": "\u201c\u0110\u00f4i tay n\u00f3ng b\u1ecfng\u201d.", "c": "\u201cKh\u00fac kh\u00edch c\u01b0\u1eddi\u201d.", "d": "\u201cB\u00e0n tay nh\u1ecf nh\u1eafn\u201d.", "bookId": 1088296, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cHo\u00e0 b\u00ecnh t\u00f4i tr\u1edf v\u1ec1 \u0111\u00e2y<br>V\u1edbi m\u00e1i tr\u01b0\u1eddng x\u01b0a, b\u00e3i m\u00eda, lu\u1ed1ng c\u00e0y<br>L\u1ea1i g\u1eb7p em<br>Th\u1eb9n th\u00f9ng n\u00e9p sau c\u00e1nh c\u1eeda...<br>V\u1eabn kh\u00fac kh\u00edch c\u01b0\u1eddi khi t\u00f4i h\u1ecfi nh\u1ecf<br>- Chuy\u1ec7n ch\u1ed3ng con (kh\u00f3 n\u00f3i l\u1eafm anh \u01a1i!)<br>T\u00f4i n\u1eafm b\u00e0n tay nh\u1ecf nh\u1eafn ng\u1eadm ng\u00f9i<br>Em v\u1eabn \u0111\u1ec3 y\u00ean trong tay t\u00f4i n\u00f3ng b\u1ecfng...\u201d</i><br><div style=\"text-align: right;\">(Giang Nam, <i>Qu\u00ea h\u01b0\u01a1ng</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>Trong \u0111o\u1ea1n th\u01a1, chi ti\u1ebft n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>kh\u1eafc ho\u1ea1 h\u00ecnh t\u01b0\u1ee3ng \u201cem\u201d?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:<br></b>\nChi ti\u1ebft \u201c\u0110\u00f4i tay n\u00f3ng b\u1ecfng\u201d m\u00f4 t\u1ea3 \u0111\u00f4i b\u00e0n tay c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh \u201ct\u00f4i\u201d, kh\u00f4ng kh\u1eafc ho\u1ea1 h\u00ecnh t\u01b0\u1ee3ng \u201cem\u201d.\n", "key": "B", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597546, "lessonId": 0, "a": "Ngo\u1ea1i h\u00ecnh.", "b": "L\u1eddi n\u00f3i.", "c": "C\u1eed ch\u1ec9, h\u00e0nh \u0111\u1ed9ng.", "d": "N\u1ed9i t\u00e2m.", "bookId": 1088297, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cGi\u1eefa tr\u01b0a n\u1eafng g\u1eaft. M\u00e1y bay mo-ranh, m\u1ed9t lo\u1ea1i m\u00e1y bay trinh s\u00e1t c\u1ee7a M\u1ef9 c\u00f3 ti\u1ebfng k\u00eau \u0111\u1ec1u \u0111\u1ec1u c\u1ee9 b\u00e1m ri\u1ebft l\u1ea5y ch\u00fang t\u00f4i, m\u1eb7c d\u00f9 ch\u00fang t\u00f4i \u0111\u00e3 c\u1ed1 t\u00ecnh l\u00e0m ng\u01a1, kh\u00f4ng \u0111\u1ec3 \u00fd t\u1edbi ch\u00fang. Nh\u01b0ng s\u1ef1 dai d\u1eb3ng c\u1ee7a ch\u00fang, th\u00eam n\u1eefa, tr\u01b0a nay ch\u00fang bay hai chi\u1ebfc, chi\u1ebfc n\u00e0y v\u00f2ng l\u00ean, chi\u1ebfc kia chao xu\u1ed1ng bu\u1ed9c ch\u00fang t\u00f4i ph\u1ea3i c\u1ea3nh gi\u00e1c. Th\u1eb1ng M\u1ef9 Kon-l\u01a1 bu\u00f4ng n\u1eafp h\u0103ng-g\u00f4, t\u00f4i th\u1ea5y n\u1eeda con cua v\u1eabn c\u00f2n nguy\u00ean. H\u1eafn li\u1ebfc r\u1ea5t nhanh qua c\u00e1i ca US c\u1ee7a Bin r\u1ed3i x\u00e9 \u0111\u00f4i, b\u1ecf v\u00e0o \u0111\u00f3 m\u1ed9t n\u1eeda. Bin x\u00fac th\u00eam m\u1ed9t x\u00eau s\u1eafn \u0111\u00e3 \u0111\u01b0\u1ee3c \u0111\u00e1nh nhuy\u1ec5n v\u1edbi canh v\u00e0 c\u00e0 \u0111\u1eafng, th\u00e0nh m\u1ed9t th\u1ee9 s\u1ec1n s\u1ec7t cho v\u00e0o m\u1ed3m, \u0111o\u1ea1n bu\u00f4ng th\u00eca, ch\u1ea5m c\u1ea3 ng\u00f3n tay v\u00e0o mu\u1ed1i, m\u00fat, r\u1ed3i c\u1ea7m mi\u1ebfng cua, x\u00e9 nh\u1ecf l\u00ean \u0103n. C\u1eadu \u0103n ch\u1eadm r\u00e3i nh\u01b0ng th\u1eadt ngon l\u00e0nh.\u201d</i><br><div style=\"text-align: right;\">(Trung Trung \u0110\u1ec9nh, <i>L\u1ea1c r\u1eebng</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 12</i>, NXB \u0110\u1ea1i h\u1ecdc Hu\u1ebf, 2024)</div>C\u00e1c nh\u00e2n v\u1eadt trong \u0111o\u1ea1n tr\u00edch ch\u1ee7 y\u1ebfu \u0111\u01b0\u1ee3c kh\u1eafc ho\u1ea1 qua ph\u01b0\u01a1ng di\u1ec7n n\u00e0o?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nTrong \u0111o\u1ea1n tr\u00edch, c\u00e1c nh\u00e2n v\u1eadt ch\u1ee7 y\u1ebfu \u0111\u01b0\u1ee3c kh\u1eafc h\u1ecda qua c\u1eed ch\u1ec9, h\u00e0nh \u0111\u1ed9ng, th\u1ec3 hi\u1ec7n qua nh\u1eefng chi ti\u1ebft: Th\u1eb1ng M\u1ef9 Kon-l\u01a1 bu\u00f4ng n\u1eafp h\u0103ng-g\u00f4, li\u1ebfc r\u1ea5t nhanh qua c\u00e1i ca US c\u1ee7a Bin r\u1ed3i x\u00e9 \u0111\u00f4i, b\u1ecf v\u00e0o \u0111\u00f3 m\u1ed9t n\u1eeda; Bin x\u00fac th\u00eam m\u1ed9t x\u00eau s\u1eafn, cho v\u00e0o m\u1ed3m, bu\u00f4ng th\u00eca, ch\u1ea5m c\u1ea3 ng\u00f3n tay v\u00e0o mu\u1ed1i, m\u00fat, r\u1ed3i c\u1ea7m mi\u1ebfng cua, x\u00e9 nh\u1ecf l\u00ean \u0103n\u2026\n", "key": "C", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597552, "lessonId": 0, "a": "V\u00ec V\u0169 Nh\u01b0 T\u00f4 th\u01b0\u01a1ng y\u00eau v\u1ee3 con.", "b": "V\u00ec V\u0169 Nh\u01b0 T\u00f4 c\u00f3 t\u00e0i ki\u1ebfn tr\u00fac.", "c": "V\u00ec V\u0169 Nh\u01b0 T\u00f4 kh\u00f4ng ch\u1ecbu khu\u1ea5t ph\u1ee5c nh\u00e0 vua.", "d": "V\u00ec V\u0169 Nh\u01b0 T\u00f4 c\u00f3 t\u00e0i ki\u1ebfn tr\u00fac, m\u1ed9t l\u00f2ng theo, coi vi\u1ec7c theo ngh\u1ec1 nh\u01b0 m\u1ed9t \u201cc\u00e1i n\u1ee3 t\u00e0i hoa\u201d, b\u1ea5t ch\u1ea5p bao kh\u00f3 kh\u0103n, tr\u1edf l\u1ef1c.", "bookId": 1088298, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c<b>V\u0169 Nh\u01b0 T\u00f4</b> - T\u00f4i b\u1ea9m sinh c\u00f3 khi\u1ebfu v\u1ec1 ki\u1ebfn tr\u00fac. T\u00f4i \u0111\u00e3 v\u00e0o h\u1ecdc v\u0103n, sau b\u1ecf v\u0103n t\u1eadp ngh\u1ec1, nh\u01b0ng t\u1eadp th\u00ec t\u1eadp, v\u1eabn lo n\u01a1m n\u1edbp, ch\u1ec9 s\u1ee3 tri\u1ec1u \u0111\u00ecnh bi\u1ebft, th\u00ec v\u1ee3 con \u1edf nh\u00e0 nheo nh\u00f3c, m\u00e0 m\u00ecnh c\u0169ng kh\u00f4ng bi\u1ebft bao gi\u1edd \u0111\u01b0\u1ee3c th\u00e1o c\u0169i, s\u1ed5 l\u1ed3ng. Vua H\u1ed3ng Thu\u1eadn  ng\u00e0y nay c\u00e0ng khinh r\u1ebb ch\u00fang t\u00f4i, c\u00e1ch \u0111\u1ed1i \u0111\u00e3i l\u1ea1i b\u1ea1c \u00e1c. Ch\u1eb3ng qua l\u00e0 c\u00e1i n\u1ee3 t\u00e0i hoa, ch\u1ee9 th\u1ef1c ra theo ngh\u1ec1 \u1edf ta l\u1ee3i ch\u1eb3ng c\u00f3 m\u00e0 nh\u1ee5c th\u00ec nhi\u1ec1u.<br><b>\u0110an Thi\u1ec1m</b> - Ch\u00ednh v\u00ec th\u1ebf m\u00e0 \u00f4ng c\u00e0ng \u0111\u00e1ng tr\u1ecdng.\u201d</i><br>(Nguy\u1ec5n Huy T\u01b0\u1edfng, <i>V\u0169 Nh\u01b0 T\u00f4</i>  - theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 11</i>, NXB \u0110\u1ea1i h\u1ecdc Hu\u1ebf, 2023)<br>Theo \u0111o\u1ea1n tr\u00edch, v\u00ec sao \u0110an Thi\u1ec1m cho r\u1eb1ng V\u0169 Nh\u01b0 T\u00f4 l\u00e0 ng\u01b0\u1eddi \u201c\u0111\u00e1ng tr\u1ecdng\u201d?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110an Thi\u1ec1m \u0111\u00e1nh gi\u00e1 V\u0169 Nh\u01b0 T\u00f4 l\u00e0 ng\u01b0\u1eddi \u201c\u0111\u00e1ng tr\u1ecdng\u201d kh\u00f4ng ch\u1ec9 v\u00ec t\u00e0i n\u0103ng ki\u1ebfn tr\u00fac c\u1ee7a \u00f4ng m , t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>V\u00ec sao em b\u00e9 v\u00e0 m\u1eb9 ph\u1ea3i v\u00e0o nh\u00e0 lao?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch n\u00f3i v\u1ec1 ho\u00e0n c\u1ea3nh c\u1ee7a em b\u00e9 v\u00e0 m\u1eb9 ph\u1ea3i v\u00e0o nh\u00e0 lao. Nguy\u00ean nh\u00e2n l\u00e0 v\u00ec cha c\u1ee7a em b\u00e9 tr\u1ed1n \u0111i l\u00ednh v\u00e0 \u0111\u00e3 \u0111\u1ec3 cho m\u1eb9 v\u00e0 em b\u1ecb ch\u00ednh quy\u1ec1n T\u01b0\u1edfng Gi\u1edbi Th\u1ea1ch b\u1eaft giam thay cho cha.\n", "key": "B", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597567, "lessonId": 0, "a": "D\u1ecbu d\u00e0ng, n\u1eef t\u00ednh.", "b": "Nh\u1ea1y c\u1ea3m, gi\u00e0u t\u00ecnh y\u00eau th\u01b0\u01a1ng.", "c": "B\u1ea3n l\u0129nh, d\u0169ng c\u1ea3m.", "d": "Hi\u1ec1n h\u1eadu, bao dung.", "bookId": 1088300, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c8.4 [69]<br>\u201c\u0110\u1ecbch c\u00e0n v\u00e0o g\u1ea7n \u0111\u1ebfn m\u00e1ng n\u01b0\u1edbc. C\u00f2n m\u1ed9t ch\u00fat x\u00edu n\u1eefa l\u00e0 c\u01a1 \u0111\u1ed3 c\u1ee7a b\u1ec7nh x\u00e1 tan hoang. Bi\u1ebft \u0111\u1ecbch g\u1ea7n s\u00e1t b\u00ean n\u00e1ch m\u00e0 sao m\u00ecnh b\u00ecnh t\u0129nh l\u1ea1 l\u00f9ng. Sau khi \u0111\u01b0a th\u01b0\u01a1ng binh \u0111\u1ebfn ch\u1ed7 tr\u1ed1n r\u1ed3i m\u00ecnh quay l\u1ea1i \u0111\u1ee9ng trong ph\u00f2ng m\u1ed5. M\u00ecnh mu\u1ed1n th\u1eed xem n\u1ebfu \u0111\u1ecbch v\u00e0o \u0111\u1ebfn \u0111\u00e2y m\u00ecnh c\u00f3 \u0111\u1ee7 can \u0111\u1ea3m v\u00e0 linh ho\u1ea1t gi\u1ea3i quy\u1ebft nh\u01b0 nh\u1eefng ng\u01b0\u1eddi th\u01b0\u1eddng hay \u1edf l\u1ea1i hay kh\u00f4ng. Cu\u1ed1i c\u00f9ng \u0111\u1ecbch kh\u00f4ng v\u00e0o v\u00e0 \u0111\u00eam \u0111\u00f3 m\u00ecnh l\u1ea1i ng\u1ee7 ngon l\u00e0nh trong c\u0103n ph\u00f2ng tr\u1ed1ng tr\u1ea3i, l\u1ed9n x\u1ed9n gi\u1eefa c\u1ea3nh ch\u1ea1y c\u00e0n.\u201d</i><br><div style=\"text-align: right;\">(<i>Nh\u1eadt k\u00ed \u0110\u1eb7ng Thu\u1ef3 Tr\u00e2m</i>, NXB H\u1ed9i Nh\u00e0 v\u0103n, 2020)</div>V\u1ebb \u0111\u1eb9p n\u00e0o c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh \u0111\u01b0\u1ee3c kh\u1eafc ho\u1ea1 trong \u0111o\u1ea1n tr\u00edch?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\u0110o\u1ea1n nh\u1eadt k\u00fd ghi l\u1ea1i m\u1ed9t t\u00ecnh hu\u1ed1ng nguy hi\u1ec3m khi \u0111\u1ecbch c\u00e0n qu\u00e9t s\u00e1t b\u1ec7nh x\u00e1. Trong t\u00ecnh hu\u1ed1ng n\u00e0y, nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh v\u1eabn gi\u1eef \u0111\u01b0\u1ee3c s\u1ef1 b\u00ecnh t\u0129nh, can \u0111\u1ea3m khi \u0111\u1ed1i di\u1ec7n v\u1edbi nguy hi\u1ec3m. C\u00f4 kh\u00f4ng ho\u1ea3ng lo\u1ea1n m\u00e0 c\u00f2n suy ngh\u0129 v\u1ec1 vi\u1ec7c n\u1ebfu \u0111\u1ecbch v\u00e0o, c\u00f4 s\u1ebd gi\u1ea3i quy\u1ebft t\u00ecnh hu\u1ed1ng ra sao th\u1eadm ch\u00ed c\u00f2n ng\u1ee7 ngon l\u00e0nh trong ho\u00e0n c\u1ea3nh hi\u1ec3m nguy.<br>\u2192 \u0110o\u1ea1n tr\u00edch \u0111\u00e3 kh\u1eafc ho\u1ea1 b\u1ea3n l\u0129nh v\u00e0 s\u1ef1 d\u0169ng c\u1ea3m c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh.", "key": "C", "isVideo": true, "score": 0, "order": 11, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597577, "lessonId": 0, "a": "\u201cM\u1ea3nh tr\u0103ng cu\u1ed1i r\u1eebng\u201d (Nguy\u1ec5n Minh Ch\u00e2u), \u201cM\u1ed9t ng\u01b0\u1eddi H\u00e0 N\u1ed9i\u201d (Nguy\u1ec5n Kh\u1ea3i), \u201c\u0110\u1ea5t\u201d (Anh \u0110\u1ee9c).", "b": "\u201cHai ng\u01b0\u1eddi \u0111\u00e0n b\u00e0 x\u00f3m Tr\u1ea1i (Nguy\u1ec5n Quang Thi\u1ec1u), \u201cB\u1ebfn kh\u00f4ng ch\u1ed3ng\u201d (D\u01b0\u01a1ng H\u01b0\u1edbng),  "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597583, "lessonId": 0, "a": "b\u1ea5t t\u1eadn.", "b": "b\u00f4ng hoa.", "c": "nh\u1ecf xinh.", "d": "\u0110i\u1ec3m xuy\u1ebfn.", "bookId": 1088304, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<u>\u0110i\u1ec3m xuy\u1ebfn</u> tr\u00ean n\u1ec1n xanh <u>b\u1ea5t t\u1eadn</u> l\u00e0 m\u1ed9t v\u00e0i <u>b\u00f4ng hoa</u> v\u00e0ng <u>nh\u1ecf xinh</u>, t\u01b0\u01a1i t\u1eafn.<br>T\u1eeb n\u00e0o b\u1ecb d\u00f9ng sai trong c\u00e2u tr\u00ean?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- T\u1eeb \u201c\u0111i\u1ec3m xuy\u1ebfn\u201d sai ch\u00ednh t\u1ea3.<br>\n- S\u1eeda l\u1ea1i: \u0110i\u1ec3m xuy\u1ebft tr\u00ean n\u1ec1n xanh b\u1ea5t t\u1eadn l\u00e0 m\u1ed9t v\u00e0i b\u00f4ng hoa v\u00e0ng nh\u1ecf xinh, t\u01b0\u01a1i t\u1eafn.\n", "key": "D", "isVideo": true, "score": 0, "order": 15, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21597593, "lessonId": 0, "a": "Sai v\u1ec1 d\u00f9ng t\u1eeb.", "b": "Sai ng\u1eef ph\u00e1p.", "c": "Sai quy chi\u1ebfu.", "d": "Sai logic.", "bookId": 1088305, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Ch\u00e0ng trai m\u1eb7c \u00e1o xanh \u0111ang ng\u1eafm nh\u00ecn c\u00f4 g\u00e1i m\u1eaft n\u00e2u c\u00f3 n\u1ee5 c\u01b0\u1eddi m\u00ea h\u1ed3n.<br>X\u00e1c \u0111\u1ecbnh l\u1ed7i sai trong c\u00e2u tr\u00ean.", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n- C\u00e2u m\u1eafc l\u1ed7i sai quy chi\u1ebfu. C\u1ee5m t\u1eeb \u201cn\u1ee5 c\u01b0\u1eddi m\u00ea h\u1ed3n\u201d kh\u00f4ng x\u00e1c \u0111\u1ecbnh r\u00f5 l\u00e0 b\u1ed5 ngh\u0129a cho \u0111\u1ed1i t\u01b0\u1ee3ng n\u00e0o, khi\u1ebfn c\u00e2u c\u0  n\u00e0o l\u1ea1i c\u00f3 th\u1ec3 khi\u1ebfn th\u1eb1ng b\u00e9 ch\u0103m ch\u1ec9 h\u1ecdc \u0111\u1ebfn nh\u01b0 v\u1eady?", "bookId": 1088309, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Ch\u1ec9 ra c\u00e2u sai trong c\u00e1c c\u00e2u sau:", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u00e2u \u201cT\u00f4i kh\u00f4ng bi\u1ebft \u0111\u1ed9ng l\u1ef1c n\u00e0o l\u1ea1i c\u00f3 th\u1ec3 khi\u1ebfn th\u1eb1ng b\u00e9 ch\u0103m ch\u1ec9 h\u1ecdc \u0111\u1ebfn nh\u01b0 v\u1eady?\u201d l\u00e0 c\u00e2u tr\u1ea7n thu\u1eadt, v\u00ec th\u1ebf s\u1eed d\u1ee5ng d\u1ea5u ch\u1ea5m h\u1ecfi l\u00e0 kh\u00f4ng ch\u00ednh x\u00e1c.<br>\n\u2192 C\u00e2u m\u1eafc l\u1ed7i d\u1ea5u c\u00e2u.\n", "key": "D", "isVideo": true, "score": 0, "order": 20, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 21 \u0111\u1ebfn 25", "content": "\u201cV\u00e0o ng\u00e0y 9/5/1889, ng\u00e0y danh h\u1ecda H\u00e0 Lan Vincent van Gogh chuy\u1ec3n v\u00e0o d\u01b0\u1ee1ng tr\u00ed vi\u1ec7n \u1edf Saint-R\u00e9my, \u00f4ng b\u1eaft \u0111\u1ea7u b\u1ecb m\u1ea3nh v\u01b0\u1eddn nh\u1ecf \u1edf \u0111\u00f3 thu h\u00fat. T\u1eeb c\u1eeda s\u1ed5 c\u0103n ph\u00f2ng \u00f4ng \u1edf c\u00f3 th\u1ec3 ph\u00f3ng ra m\u1ed9t g\u00f3c nh\u00ecn kh\u00f4ng th\u1ec3 \u0111\u1eb9p h\u01a1n v\u1ec1 m\u1ed9t c\u00e1nh \u0111\u1ed3ng l\u00faa m\u00ec, nh\u1eefng g\u1ed1c \u00f4 liu, nh\u1eefng ng\u1ecdn b\u00e1ch s\u1eabm l\u1ea1i tr\u00ean n\u1ec1n tr\u1eddi g\u1ea7n ng\u1ecdn \u0111\u1ed3i \u1edf Les Alpilles v\u00e0 g\u1ea7n h\u01a1n l\u00e0 nh\u1eefng \u0111\u00f3a hoa di\u00ean v\u0129, poppy, t\u1eed \u0111inh h\u01b0\u01a1ng l\u1ebb loi ngay s\u00e1t c\u1eeda s\u1ed5. <br>Ng\u01b0\u1eddi ta n\u00f3i r\u1eb1ng ngay sau khi t\u1edbi d\u01b0\u1ee1ng tr\u00ed vi\u1ec7n, Van Gogh \u0111\u00e3 nh\u1eadn th\u1ea5y m\u1ed9t s\u1ed1 b\u1ee5i di\u00ean v\u0129 \u0111\u00e3 b\u1eaft \u0111\u1ea7u n\u1edf r\u1ed9 v\u00e0 c\u1ea3m th\u1ea5y h\u00e1o h\u1ee9c \u0111\u01b0\u1ee3c v\u1ebd nh\u1eefng b\u00f4ng hoa trong khu v\u01b0\u1eddn nh\u1ecf v\u1edbi h\u00e0ng r\u00e0o bao quanh n\u00e0y. M\u1ed9t trong nh\u1eefng b\u1ee9c h\u1ecda \u0111\u1ea7u ti\u00ean c\u1ee7a \u00f4ng l\u00e0 kh\u1eafc h\u1ecda c\u00e1c b\u00f4ng di\u00ean v\u0129 mang h\u01b0\u01a1ng th\u01a1m c\u1ee7a m\u00f9a xu\u00e2n, thu l\u1ea5y v\u1ebb \u0111\u1eb9p tho\u00e1ng qua c\u1ee7a nh\u1eefng c\u00e1nh hoa r\u1ef1c r\u1ee1, v\u1edbi m\u1ed9t b\u00f4ng m\u00e0u tr\u1eafng b\u1eebng n\u1edf gi\u1eefa m\u1ed9t bi\u1ec3n nh\u1eefng b\u00f4ng m\u00e0u t\u00edm s\u1eabm. B\u00ean d\u01b0\u1edbi nh\u1eefng \u0111\u00f3a hoa k\u00ec di\u1ec7u n\u00e0y l\u00e0 nh\u1eefng d\u1ea3i xo\u1eafn k\u00ec di\u1ec7u c\u1ee7a nh\u1eefng chi\u1ebfc l\u00e1 d\u00e0i m\u00e0u ng\u1ecdc lam v\u00e0 ph\u00eda xa xa l\u00e0 nh\u1eefng \u0111\u00f3a hoa b\u1ed3 c\u00f4ng anh m\u00e0u v\u00e0ng cam. Van Gogh y\u00eau th\u00edch c\u00e1ch c\u00e1c m\u00e0u s\u1eafc b\u1ed5 sung cho nhau.<br>Ch\u1ec9 v\u00e0i gi\u1edd sau khi t\u1edbi d\u01b0\u1ee1ng tr\u00ed vi\u1ec7n, Van Gogh \u0111\u00e3 c\u00f3 \u0111\u01b0\u1ee3c s\u1ef1 tin c\u1eady c\u1ee7a Gi\u00e1m \u0111\u1ed1c Th\u00e9ophile Peyron, v\u00e0 \u0111\u01b0\u1ee3c ph\u00e9p v\u1ebd. Sau b\u1ee9c \u0111\u1ea7u ti\u00ean, Th\u00e9ophile Peyron ng\u1ea1c nhi\u00ean tr\u01b0\u1edbc t\u00e0i n\u0103ng c\u1ee7a Van Gogh n\u00ean mu\u1ed1n \u00f4ng ti\u1ebfp t\u1ee5c v\u1ebd. D\u1eabu nh\u1eefng b\u1ee9c tr\u01b0\u1edbc c\u1ee7a Van Gogh thu\u1ed9c ch\u1ee7 ngh\u0129a Ti\u00ean phong (avant-garde) c\u00f2n g\u00e2y tranh c\u00e3i th\u00ec nh\u1eefng b\u1ee9c n\u00e0y l\u1ea1i t\u01b0\u01a1i m\u1edbi v\u00e0 tr\u1ef1c quan n\u00ean Th\u00e9ophile Peyron l\u1ea1i c\u00e0ng tin t\u01b0\u1edfng v\u00e0o ti\u1ec1m n\u0103ng ti\u1ebfn tri\u1ec3n c\u1ee7a \u0111i\u1ec1u tr\u1ecb.<br>Cu\u1ed9c s\u1ed1ng \u1edf d\u01b0\u1ee1ng tr\u00ed vi\u1ec7n th\u01b0\u1eddng t\u1ebb nh\u1ea1t n\u00ean vi\u1ec7c xu\u1ea5t hi\u1ec7n m\u1ed9t b\u1ec7nh nh\u00e2n, \u0111\u1ed3ng th\u1eddi l\u00e0 m\u1ed9t ngh\u1ec7 s\u0129 n\u01b0\u1edbc ngo\u00e0i nh\u01b0 Van Gogh c\u0169ng l\u00e0m b\u1ea7u kh\u00f4ng kh\u00ed n\u01a1i \u0111\u00e2y x\u00e1o \u0111\u1ed9ng. \u201cH\u1ecd \u0111\u1ebfn, v\u00e2y quanh anh \u0111\u1ec3 xem anh l\u00e0m vi\u1ec7c nh\u01b0 th\u1ebf n\u00e0o khi anh v\u1ebd \u1edf trong v\u01b0\u1eddn\u201d, Vincent vi\u1ebft trong b\u1ee9c th\u01b0 g\u1eedi em trai Theo. \u201cS\u1ef1 s\u1ed1ng ch\u1ea3y tr\u00e0n trong khu v\u01b0\u1eddn, kh\u00f4ng c\u00f2n t\u00e2m tr\u00ed n\u00e0o \u0111\u1ec3 bu\u1ed3n n\u1eefa\u201d.<br>D\u01b0\u1eddng nh\u01b0 Van Gogh kh\u00f4ng c\u1ea3m th\u1ea5y b\u1ecb l\u00e0m phi\u1ec1n b\u1edfi nh\u1eefng \u0111\u00f3a di\u00ean v\u0129 \u0111ang \u0111\u1ed9 \u0111\u1eb9p nh\u1ea5t n\u00e0y kh\u00f4ng ch\u1ec9 g\u1ee3i cho \u00f4ng c\u1ea3m gi\u00e1c chia s\u1ebb v\u00e0 qu\u00ean \u0111i s\u1ef1 c\u00f4 l\u1eadp gi\u1eefa nh\u1eefng b\u1ee9c t\u01b0\u1eddng d\u01b0\u1ee1ng tr\u00ed vi\u1ec7n m\u00e0 c\u00f2n g\u1ee3i v\u1ec1 nh\u1eefng b\u1ee9c h\u1ecda Nh\u1eadt B\u1ea3n \u00f4ng t\u1eebng ng\u01b0\u1ee1ng m\u1ed9. C\u00e1c h\u1ecda s\u0129 Nh\u1eadt B\u1ea3n c\u0169ng y\u00eau th\u00edch ch\u1ee7 \u0111\u1ec1 hoa di\u00ean v\u0129 v\u00e0 Van Gogh c\u0169ng c\u00f3 nh\u1eefng b\u1ea3n in t\u00e1c ph\u1ea9m c\u1ee7a Utagawa Hiroshige, <i>Horikiri Iris Garden</i> (v\u1ebd v\u00e0o nh\u1eefng n\u0103m 1850), th\u1eadm ch\u00ed c\u00f3 th\u1ec3 c\u1ea3 <i>Irises v\u00e0 Grasshopper</i> (v\u1ebd v\u00e0o cu\u1ed1i nh\u1eefng n\u0103m 1820) c\u1ee7a Hokusai.<br>\u00d4ng vi\u1ebft th\u01b0 cho em trai r\u1eb1ng s\u1ebd c\u00f3 hai b\u1ee9c h\u1ecda s\u1ebd ho\u00e0n th\u00e0nh, m\u1ed9t l\u00e0 b\u1ee9c v\u1ec1 b\u1ee5i 7c bi\u1ec7t l\u00e0 ng\u01b0\u1eddi ngh\u1ec7 s\u0129.<br>\n\u2192 Th\u00f4ng \u0111i\u1ec7p t\u1eeb \u0111o\u1ea1n tr\u00edch l\u00e0: Thi\u00ean nhi\u00ean c\u00f3 kh\u1ea3 n\u0103ng ch\u1eefa l\u00e0nh cho con ng\u01b0\u1eddi v\u00e0 kh\u01a1i ngu\u1ed3n c\u1ea3m h\u1ee9ng s\u00e1ng t\u1ea1o cho ng\u01b0\u1eddi ngh\u1ec7 s\u0129.\n", "key": "D", "isVideo": true, "score": 0, "order": 25, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 26 \u0111\u1ebfn 30", "content": "\u201cB\u00e0 sinh cha \u0111\u00fang n\u0103m \u0111\u00f3i b\u1ed1n b\u1ed1n. Hai n\u0103m sau sinh ti\u1ebfp ch\u00fa t\u00f4i. B\u00e0 k\u1ec3, ch\u00fa ch\u01b0a \u0111\u1ea7y tu\u1ed5i, b\u00e0 b\u1ecb b\u1eaft v\u00e0o \u0111\u1ed3n T\u00e2y v\u00ec t\u1ed9i c\u00f3 ch\u1ed3ng \u0111i b\u1ed9 \u0111\u1ed9i, \u0111ang ngo\u00e0i \u0111\u1ed3ng kh\u00f4ng k\u1ecbp g\u1eedi con. \u1ede nh\u00e0 \u0111\u00f3i cha l\u00ea ra b\u1ebfn, c\u1ee9 th\u1ebf b\u1ed1c \u0111\u1ea5t s\u00e9t \u0103n, r\u1ed3i ng\u1ee7 qu\u00ean ngo\u00e0i b\u1edd tre. Hai h\u00f4m sau b\u00e0 h\u1edbt h\u1ea3i ch\u1ea1y v\u1ec1, g\u1eb7p cha v\u1eabn \u0103n \u0111\u1ea5t th\u1ebf. Ch\u00fa th\u00ec \u0111\u01b0\u1ee3c b\u00e0 h\u00e0ng x\u00f3m b\u1ebf \u0111i xin s\u1eefa, nh\u01b0ng v\u1eafng h\u01a1i m\u1eb9, c\u1ee9 kh\u00f3c l\u1ea1c c\u1ea3 ti\u1ebfng, h\u00f4m sau n\u1eefa l\u00ean c\u01a1n s\u1ed1t, \u0111\u01b0\u1ee3c ba ng\u00e0y th\u00ec m\u1ea5t. B\u00e0 b\u1ea3o kh\u00f4ng bi\u1ebft cha t\u00f4i ph\u1ea3i m\u1ec7nh \u0111\u1ea5t kh\u00f4ng m\u00e0 h\u1ec5 \u0111\u00f3i th\u00ec \u0103n \u0111\u1ea5t b\u00f9 c\u01a1m, l\u1edbn r\u1ed3i h\u1ec5 m\u1ee5n nh\u1ecdt hay \u0111\u1ee9t tay \u0111\u1ee9t ch\u00e2n b\u1edbi \u0111\u1ea5t \u0111\u1eafp v\u00e0o, c\u0169ng l\u00e0nh, ch\u1ea3 c\u1ea7n thu\u1ed1c thang. R\u1ed3i b\u00e0 th\u1ee7ng th\u1ec9nh: \u201c\u0110\u1ea5t thi\u00eang l\u1eafm, nh\u1ea5t l\u00e0 \u0111\u1ea5t m\u1ed3 \u0111\u1ea5t t\u1ed5 nh\u01b0 l\u00e0ng ta\u201d. T\u00f4i ngh\u0129 th\u1ea7m, h\u00e8n g\u00ec c\u00e1i nh\u00e0 t\u00f4i \u1edf ph\u00ean l\u00e0 ph\u00ean \u0111\u1ea5t c\u00e1i b\u1ebfp b\u1eb1ng \u0111\u1ea5t, c\u00e1i n\u1ed3i b\u1eb1ng \u0111\u1ea5t, c\u00e1i c\u1ed1c ngo\u00e1y tr\u1ea7u c\u1ee7a b\u00e0 c\u0169ng b\u1eb1ng \u0111\u1ea5t. M\u1ed9t bu\u1ed5i ng\u1ed3i trong g\u00f3c l\u1edbp v\u1ee1 l\u00f2ng, t\u00f4i c\u1ea1y \u0111\u1ea5t \u1edf tr\u01b0\u1eddng l\u1edbp cho v\u00e0o mi\u1ec7ng, \u00f4ng gi\u00e1o Kho\u00e1 nh\u00ecn th\u1ea5y, \u00f4ng ph\u1ea1t t\u00f4i \u0111\u1ee9ng \u00fap m\u1eb7t sau l\u1edbp h\u1ebft bu\u1ed5i h\u00f4m \u0111\u00f3, t\u1ed1i v\u1ec1 t\u00f4i c\u00f2n b\u1ecb m\u1eb9 ph\u1ebft ba roi v\u00e0o m\u00f4ng. T\u00f4i kh\u00f3c v\u00ec \u0111au th\u00ec \u00edt m\u00e0 v\u00ec t\u1ee7i th\u00e2n th\u00ec nhi\u1ec1u.\u201d<br><div style=\"text-align: right;\">(Tr\u1ea7n Thanh H\u00e0, <i>S\u00f4ng \u01a1i</i>, theo <i>S\u00f4ng H\u01b0\u01a1ng V\u0103n (1983 - 2003) tuy\u1ec3n ch\u1ecdn</i>, NXB V\u0103n ho\u00e1 Th\u00f4ng tin, 2003)</div>", "listQuestion": [{"questionId": 21597647, "lessonId": 0, "a": "\u201cT\u00f4i\u201d.", "b": "\u00d4ng gi\u00e1o Kho\u00e1.", "c": "B\u00e0.", "d": "M\u1eb9.", "bookId": 1088315, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Ng\u01b0\u1eddi k\u1ec3 chuy\u1ec7n trong \u0111o\u1ea1n tr\u00edch l\u00e0 ai?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nTrong \u0111o\u1ea1n tr\u00edch, ng\u01b0\u1eddi k\u1ec3 chuy\u1ec7n \u1edf ng\u00f4i th\u1ee9 nh\u1ea5t s\u1eed d\u1ee5ng \u0111\u1ea1i t\u1eeb \u201ct\u00f4i\u201d \u0111\u1ec3 k\u1ec3 v\u1ec1 nh\u1eefng k\u1ef7 ni\u1ec7m v\u1edbi gia \u0111\u00ecnh v\u00e0 nh\u1eefng c\u00e2u chuy\u1ec7n trong qu\u00e1 kh\u1ee9.\n", "k                                 let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
