, "shares": 0, "typeId": 0, "questionText": "The explorers ventured <u>into</u> the <u>dessert</u> without enough water, <u>which</u> made their journey <u>extremely</u> perilous.", "answer": "<b><i>Ki\u1ebfn th\u1ee9c T\u1eeb d\u1ec5 g\u00e2y nh\u1ea7m l\u1eabn</i></b><br>Ta c\u00f3:&nbsp;<b>dessert&nbsp;</b>/d\u026a\u02c8z\u025c\u02d0rt/ (n) m\u00f3n tr\u00e1ng mi\u1ec7ng =&gt; D\u1ef1a v\u00e0o ng\u1eef c\u1ea3nh c\u00e2u: c\u00e1c nh\u00e0 th\u00e1m hi\u1ec3m \u0111\u00e3 m\u1ea1o hi\u1ec3m v\u00e0o m\u00f3n tr\u00e1ng mi\u1ec7ng =&gt; T\u1eeb <b>dessert </b>kh\u00f4ng ph\u00f9 h\u1ee3p<br>=&gt; \u0110\u00e1p \u00e1n B<br>=&gt; S\u1eeda&nbsp;<b>dessert </b>th\u00e0nh&nbsp;<b>desert&nbsp;</b>/\u02c8dez\u0259rt/ (n) sa m\u1ea1c<br><b>T\u1ea1m d\u1ecbch:&nbsp;</b>Nh\u1eefng nh\u00e0 th\u00e1m hi\u1ec3m \u0111\u00e3 m\u1ea1o hi\u1ec3m v\u00e0o sa m\u1ea1c m\u00e0 kh\u00f4ng c\u00f3 \u0111\u1ee7 n\u01b0\u1edbc, \u0111i\u1ec1u n\u00e0y l\u00e0m cho chuy\u1ebfn \u0111i c\u1ee7a h\u1ecd tr\u1edf n\u00ean c\u1ef1c k\u1ef3 nguy hi\u1ec3m<br><br>", "key": "B", "isVideo": false, "score": 0, "order": 37, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10469668, "lessonId": 0, "a": "a Maths club", "b": "most of them", "c": "passionate about", "d": "mathematics", "bookId": 290380, "comments": 0, "bookmarks": 53, "likes": 0, "shares": 0, "typeId": 0, "questionText": "My son joined <u>a Maths club</u> in his school, <u>most of them</u> are <u>passionate about</u> pursuing their career in <u>mathematics</u> in the future.", "answer": "<b>Ki\u1ebfn th\u1ee9c v\u1ec1 \u0110\u1ea1i t\u1eeb:</b><br>C\u1ee5m t\u1eeb ch\u1ec9 s\u1ed1 l\u01b0\u1ee3ng \u0111\u1ee9ng tr\u01b0\u1edbc \u0111\u1ea1i t\u1eeb. Ch\u1ec9 d\u00f9ng whom, which, whose<br>\u0110\u1ea1i t\u1eeb d\u00f9ng \u0111\u1ec3 x\u01b0ng h\u00f4 hay d\u00f9ng \u0111\u1ec3 thay th\u1ebf c\u00e1c danh t\u1eeb, \u0111\u1ed9ng t\u1eeb, t\u00ednh t\u1eeb ho\u1eb7c c\u1ee5m danh t\u1eeb, c\u1ee5m \u0111\u1ed9ng t\u1eeb, c\u1ee5m t\u00ednh t\u1eeb trong c\u00e2u, v\u1edbi m\u1ee5c \u0111\u00edch tr\u00e1nh l\u1eb7p l\u1ea1i c\u00e1c t\u1eeb ng\u1eef nhi\u1ec1u l\u1ea7n. <br>\u21d2 Trong b\u00e0i, \u201ca Maths club\u201d l\u00e0 danh t\u1eeb s\u1ed1 \u00edt n\u00ean \u0111\u1ea1i t\u1eeb th\u00edch h\u1ee3p thay th\u1ebf cho n\u00f3 l\u00e0 \u201cit\u201d.<br>\u21d2 Ta l\u1ea1i c\u00f3: Most of + the/ my, your, our, his, her, their/ its... + N: h\u1ea7u h\u1ebft \u2026. \u21d2 khi n\u00f3i v\u1ec1 th\u00e0nh vi\u00ean c\u1ee7a c\u00e2u l\u1ea1c b\u1ed9 To\u00e1n \u0111\u00f3, ta d\u00f9ng \u201cmost of its members\u201d<br>\u21d2 S\u1eeda l\u1ed7i: <b>most of them \u2192 most of its members</b><br><b>T\u1ea1m d\u1ecbch:</b> Con trai t\u00f4i tham gia c\u00e2u l\u1ea1c b\u1ed9 To\u00e1n \u1edf tr\u01b0\u1eddng, h\u1ea7u h\u1ebft c\u00e1c em \u0111\u1ec1u \u0111am m\u00ea theo \u0111u\u1ed5i s\u1ef1 nghi\u1ec7p to\u00e1n h\u1ecdc trong t\u01b0\u01a1ng lai.", "key": "B", "isVideo": true, "score": 0, "order": 38, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10470312, "lessonId": 0, "a": "is situated", "b": "over", "c": "one of the", "d": "deserts", "bookId": 290684, "comments": 3, "bookmarks": 18, "likes": 0, "shares": 0, "typeId": 0, "questionText": "It <u>is situated</u> in a narrow mountain valley 1,800m <u>over</u> sea level and is <u>one of the</u> highest <u>deserts</u> in the world.", "answer": "<b><i>Ki\u1ebfn th\u1ee9c v\u1ec1 Gi\u1edbi t\u1eeb </i><br></b>Ph\u00e2n bi\u1ec7t \u201cover\u201d v\u00e0 \u201cabove\u201d<br>- Khi \u0111o l\u01b0\u1eddng v\u1ec1 nhi\u1ec7t \u0111\u1ed9 v\u00e0 chi\u1ec1u cao, ta ch\u1ec9 d\u00f9ng \u201cabove\u201d<br>- Khi mi\u00eau t\u1ea3 s\u1ef1 di chuy\u1ec3n, ta ch\u1ec9 d\u00f9ng \u201cover\u201d<br>S\u1eeda l\u1ed7i:<b> over \u21d2 above</b><br><b>T\u1ea1m d\u1ecbch</b>: N\u00f3 n\u1eb1m trong m\u1ed9t thung l\u0169ng n\u00fai h\u1eb9p cao 1.800m so v\u1edbi m\u1ef1c n\u01b0\u1edbc bi\u1ec3n v\u00e0 l\u00e0 m\u1ed9t trong nh\u1eefng sa m\u1ea1c cao nh\u1ea5t th\u1ebf gi\u1edbi.", "key": "B", "isVideo": true, "score": 0, "order": 39, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19872573, "lessonId": 0, "a": "to live", "b": "such", "c": "to move", "d": "quieter", "bookId": 746113, "comments": 0, "bookmarks": 8, "likes": 0, "shares": 0, "typeId": 0, "questionText": "They can\u2019t bear <u>to live</u> in <u>such</u> a noisy neighborhood, so they\u2019re planning <u>to move</u> to a <u>quieter</u> area soon.", "answer": "<b><i>Ki\u1ebfn th\u1ee9c v\u1ec1 \u0111\u1ed9ng t\u1eeb \u0111i k\u00e8m to V ho\u1eb7c V-ing<br></i></b>C\u1ea3 \"bear to V\" v\u00e0 \"bear V-ing\" \u0111\u1ec1u c\u00f3 th\u1ec3 d\u00f9ng \u0111\u1ec3 di\u1ec5n t\u1ea3 s\u1ef1 ch\u1ecbu \u0111\u1ef1ng m\u1ed9t h\u00e0nh \u0111\u1ed9ng n\u00e0o \u0111\u00f3, nh\u01b0ng c\u00f3 s\u1ef1 kh\u00e1c bi\u1ec7t nh\u1eb9 v\u1ec1 s\u1eafc th\u00e1i \u00fd ngh\u0129a v\u00e0 c\u00e1ch s\u1eed d\u1ee5ng.<br>- <b><i>bear + to V</i></b>:<br>+ N\u00f3i v\u1ec1 m\u1ed9t h\u00e0nh \u0111\u1ed9ng c\u1ee5 th\u1ec3, m\u1ed9t tr\u1ea3i nghi\u1ec7m c\u00e1 nh\u00e2n m\u00e0 ai \u0111\u00f3 c\u1ea3m th\u1ea5y kh\u00f3 ch\u1ecbu khi l\u00e0m ho\u1eb7c ch\u1ee9ng ki\u1ebfn.<br>+ C\u00f3 th\u1ec3 n\u00f3i v\u1ec1 m\u1ed9t quy\u1ebft \u0111\u1ecbnh, l\u1ef1a ch\u1ecdn trong t\u01b0\u01a1ng lai.<br>- <i><b>bear + V-ing</b></i>:&nbsp;<br>+ N\u00f3i v\u1ec1 m\u1ed9t t\u00ecnh hu\u1ed1ng k\u00e9o d\u00e0i ho\u1eb7c \u0111ang di\u1ec5n ra m\u00e0 ai \u0111\u00f3 c\u1ea3m th\u1ea5y kh\u00f3 ch\u1ecbu ho\u1eb7c kh\u00f4ng th\u1ec3 ch\u1ecbu \u0111\u1ef1ng \u0111\u01b0\u1ee3c.<br>+&nbsp;Th\u01b0\u1eddng s\u1eed d\u1ee5ng v\u1edbi c\u1ea3m x\u00fac, th\u00f3i quen ho\u1eb7c nh\u1eefng \u0111i\u1ec1u \u0111\u00e3 v\u00e0 \u0111ang x\u1ea3y ra.<br><br><b>T\u1ea1m d\u1ecbch:</b>&nbsp;H\u1ecd kh\u00f4ng th\u1ec3 ch\u1ecbu \u0111\u01b0\u1ee3c vi\u1ec7c s\u1ed1ng trong m\u1ed9t khu ph\u1ed1 \u1ed3n \u00e0o nh\u01b0 v\u1eady, v\u00ec th\u1ebf h\u1ecd d\u1ef1 \u0111\u1ecbnh s\u1ebd s\u1edbm chuy\u1ec3n \u0111\u1ebfn m\u1ed9t khu v\u1ef1c y\u00ean t\u0129nh h\u01a1n.<br><br>=&gt; Vi\u1ec7c h\u1ecd s\u1ed1ng \u1edf m\u1ed9t khu ph\u1ed1 \u1ed3n \u00e0o l\u00e0&nbsp;m\u1ed9t tr\u1ea1ng th\u00e1i k\u00e9o d\u00e0i (h\u1ecd \u0111\u00e3 s\u1ed1ng \u1edf \u0111\u00f3 m\u1ed9t th\u1eddi gian v\u00e0 kh\u00f4ng ch\u1ecbu n\u1ed5i n\u1eefa). Nh\u01b0 v\u1eady, V-ing s\u1ebd h\u1ee3p l\u00fd h\u01a1n trong tr\u01b0\u1eddng h\u1ee3p n\u00e0y.<br><br>=&gt; <b>Ch\u1ecdn A. to live =&gt; living</b>", "key": "A", "isVideo": false, "score": 0, "order": 40, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 41-45: Which of the following best restates each of the given sentences? ", "content": "", "listQuestion": [{"questionId": 10469671, "lessonId": 0, "a": "I\u2019d rather you did not interrupt me when I\u2019m studying.", "b": "You have better not interrupt me when I\u2019m studying.", "c": "I would not rather you interrupt me when I\u2019m studying.", "d": "When I\u2019m studying, I should haven\u2019t been interrupted.", "bookId": 290383, "comments": 0, "bookmarks": 31, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Please don\u2019t interrupt me when I\u2019m studying.", "answer": "<b>T\u1ea1m d\u1ecbch:</b> Xin \u0111\u1eebng l\u00e0m phi\u1ec1n t\u00f4i khi t\u00f4i \u0111ang h\u1ecdc.<br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:</b><br>A. T\u00f4i mu\u1ed1n b\u1ea1n \u0111\u1eebng l\u00e0m phi\u1ec1n t\u00f4i khi t\u00f4 ll-being.<br>3. When we move from labour market participation to women\u2019s representation in decision-making positions, the gender gaps are exacerbated. Even in countries in which women participate in the labour market in high numbers, only a minority make it to the highest positions.<br>4. However, the beneficial effects of gender equality and diversity are even clearer when we concentrate on decision-making positions. Having both men and women involved in decision-making broadens the perspectives, increases creativity and innovation, diversifies the pool of talents and competences, and may better represent the firm\u2019s various shareholders. Moreover, a better corporate image emerges when the leadership is gender balanced. The female leadership style also contributes to the benefits of diversity: women are better able to deal with difficult personal relationships, they pay closer attention to people\u2019s needs, they are inclined towards the prevention and solution of conflicts and they monitor and give feedback more intensively.<br><div style=\"text-align: right;\"><i>(Source: https://www.intereconomics.eu/)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21583267, "lessonId": 0, "a": "the negative impacts of inequality on economic growth", "b": "the benefits of increasing women's participation in the workforce and leadership roles", "c": "the reasons for the lack of women in decision-making positions", "d": "the influence of women\u2019s leadership style on workplace relationships", "bookId": 1086147, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The passage primarily discusses ______.", "answer": "<b>\u0110o\u1ea1n v\u0103n ch\u1ee7 y\u1ebfu n\u00f3i v\u1ec1 __________.</b><br><b>A.</b>&nbsp;Nh\u1eefng t\u00e1c \u0111\u1ed9ng ti\u00eau c\u1ef1c c\u1ee7a s\u1ef1 b\u1ea5t b\u00ecnh \u0111\u1eb3ng \u0111\u1ed1i v\u1edbi t\u0103ng tr\u01b0\u1edfng kinh  growth and stability.", "d": "It helps men improve their productivity.", "bookId": 1086148, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 1, why is gender equality a priority?", "answer": "<b>Theo \u0111o\u1ea1n 1, t\u1ea1i sao b\u00ecnh \u0111\u1eb3ng gi\u1edbi l\u1ea1i l\u00e0 m\u1ed9t \u01b0u ti\u00ean?</b><br><b>A.</b>&nbsp;N\u00f3 t\u1ea1o ra c\u01a1 h\u1ed9i vi\u1ec7c l\u00e0m b\u00ecnh \u0111\u1eb3ng cho nam v\u00e0 n\u1eef.<br><b>B.</b>&nbsp;N\u00f3 ch\u1ec9 l\u00e0 m\u1ed9t m\u1ee5c ti\u00eau ph\u00e1t tri\u1ec3n \u0111\u1ea1o \u0111\u1ee9c.<br><b>C.</b>&nbsp;N\u00f3 th\u00fac \u0111\u1ea9y c\u1ea3 t\u0103ng tr\u01b0\u1edfng kinh t\u1ebf v\u00e0 \u1ed5n \u0111\u1ecbnh.<br><b>D.</b>&nbsp;N\u00f3 gi\u00fap nam gi\u1edbi c\u1ea3i thi\u1ec7n n\u0103ng su\u1ea5t c\u1ee7a h\u1ecd.<br><b><br>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin \u0111o\u1ea1n</b><br>Gender equality is a top priority, not only because equality between men and women is itself an important development goal, but also because women\u2019s economic participation is \u2018a part of the growth and stability equation<br>(<i>B\u00ecnh \u0111\u1eb3ng gi\u1edbi l\u00e0 m\u1ed9t \u01b0u ti\u00ean h\u00e0ng \u0111\u1ea7u, kh\u00f4ng ch\u1ec9 v\u00ec b\u00ecnh \u0111\u1eb3ng gi\u1eefa nam v\u00e0 n\u1eef l\u00e0 m\u1ed9t m\u1ee5c ti\u00eau ph\u00e1t tri\u1ec3n quan tr\u1ecdng m\u00e0 c\u00f2n v\u00ec s\u1ef1 tham gia c\u1ee7a ph\u1ee5 n\u1eef v\u00e0o n\u1ec1n kinh t\u1ebf l\u00e0 \u201cm\u1ed9t ph\u1ea7n c\u1ee7a ph\u01b0\u01a1ng tr\u00ecnh t\u0103ng tr\u01b0\u1edfng v\u00e0 \u1ed5n \u0111\u1ecbnh\u201d</i>) <br>=&gt;&nbsp;b\u00ecnh \u0111\u1eb3ng gi\u1edbi th\u00fac \u0111\u1ea9y t\u0103ng tr\u01b0\u1edfng v\u00e0 \u1ed5n \u0111\u1ecbnh kinh t\u1ebf<br>", "key": "C", "isVideo": false, "score": 0, "order": 47, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583278, "lessonId": 0, "a": "closely connected", "b": "seldom related", "c": "hardly linked", "d": "completely separate", "bookId": 1086149, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What does the word <b>intertwined </b>in paragraph 2 most likely mean?", "answer": "<b>T\u1eeb \"intertwined\" trong \u0111o\u1ea1n 2 c\u00f3 th\u1ec3 c\u00f3 ngh\u0129a l\u00e0 g\u00ec?</b><br><b>A.</b> closely connected: li\u00ean k\u1ebft ch\u1eb7t ch\u1ebd<br><b>B.</b> seldom related: \u00edt li\u00ean quan<br><b>C.</b> hardly linked: h\u1ea7u nh\u01b0 kh\u00f4ng li\u00ean quan<br><b>D.</b>&nbsp;completely separate: ho\u00e0n to\u00e0n t\u00e1ch bi\u1ec7t<br><b><br>D\u1ef1a v\u00e0o ng\u1eef c\u1ea3nh c\u1ee7a c\u00e2u</b><br>&nbsp;In developing countries, gender equality and development are&nbsp;<b>intertwined </b>(<i>\u1ede c\u00e1c qu\u1ed1c gia \u0111ang ph\u00e1t tri\u1ec3n, b\u00ecnh \u0111\u1eb3ng gi\u1edbi v\u00e0 ph\u00e1t tri\u1ec3n c\u00f3 s\u1ef1&nbsp;<b>li\u00ean k\u1ebft ch\u1eb7t ch\u1ebd</b></i>)<br>=&gt;&nbsp;<b>intertwined&nbsp;</b>c\u00f3 ngh\u0129a l\u00e0 c\u00e1c y\u1ebfu t\u1ed1 li\u00ean k\u1ebft ch\u1eb7t ch\u1ebd<br><br><br>", "key": "A", "isVideo": false, "score": 0, "order": 48, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583282, "lessonId": 0, "a": "men", "b": "developed countries", "c": "women", "d": "economies", "bookId": 1086150, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What does the word <b>they </b>in paragraph 2 refer to?", "answer": "<b>T\u1eeb \u201cthey\u201d trong \u0111o\u1ea1n 2 \u00e1m ch\u1ec9 ai?</b><br><b>A.</b> Nam gi\u1edbi<br><b>B.</b> C\u00e1c qu\u1ed1c gia ph\u00e1t tri\u1ec3n<br><b>C.</b> Ph\u1ee5 n\u1eef<br><b>D.</b> N\u1ec1n kinh t\u1ebf<br><br><b>D\u1ef1a v\u00e0o ng\u1eef c\u1ea3nh c\u00e2u:</b><br>In developed countries, women are typically more educated than men,&nbsp;<b>they&nbsp;</b>represent a crucial positive value for the economy and they contribute substantially to economic growth<br>(<i>\u1ede c\u00e1c qu\u1ed1c gia ph\u00e1t tri\u1ec3n, ph\u1ee5 n\u1eef th\u01b0\u1eddng c\u00f3 tr\u00ecnh \u0111\u1ed9 h\u1ecdc v\u1ea5n cao h\u01a1n nam gi\u1edbi,&nbsp;<b>h\u1ecd&nbsp;</b>\u0111\u1ea1i di\u1ec7n cho m\u1ed9t gi\u00e1 tr\u1ecb t\u00edch c\u1ef1c quan tr\u1ecdng \u0111\u1ed1i v\u1edbi n\u1ec1n kinh t\u1ebf v\u00e0 \u0111\u00f3ng g\u00f3p \u0111\u00e1ng k\u1ec3 v\u00e0o t\u0103ng tr\u01b0\u1edfng kinh t\u1ebf)&nbsp;<br>=&gt;&nbsp;</i>\"<b>they</b>\" \u00e1m ch\u1ec9 \"<b>ph\u1ee5 n\u1eef</b>\"<br>", "key": "C", "isVideo": false, "score": 0, "order": 49, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583284, "lessonId": 0, "a": "The majority of women occupy leadership positions.", "b": "Many women advance to senior decision-making roles.", "c": "Only a small proportion of women attain top-tier positions.", "d": "Women tend to avoid pursuing high-level roles.", "bookId": 1086151, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What does the passage suggest about women\u2019s advancement in countries with  high labour market involvement?", "answer": "<b>\u0110o\u1ea1n v\u0103n g\u1ee3i \u00fd g\u00ec v\u1ec1 s\u1ef1 th\u0103ng ti\u1ebfn c\u1ee7a ph\u1ee5 n\u1eef \u1edf c\u00e1c qu\u1ed1c gia c\u00f3 m\u1ee9c \u0111\u1ed9 tham gia cao v\u00e0o th\u1ecb tr\u01b0\u1eddng lao \u0111\u1ed9ng?</b><br><b>A.</b>&nbsp;Ph\u1ea7n l\u1edbn ph\u1ee5 n\u1eef chi\u1ebfm c\u00e1c v\u1ecb tr\u00ed l\u00e3nh \u0111\u1ea1o.<br><b>B.</b>&nbsp;Nhi\u1ec1u ph\u1ee5 n\u1eef th\u0103ng ti\u1ebfn v\u00e0o c\u00e1c vai tr\u00f2 ra quy\u1ebft \u0111\u1ecbnh c\u1ea5p cao.<br><b>C.</b>&nbsp;Ch\u1ec9 m\u1ed9t t\u1ef7 l\u1ec7 nh\u1ecf ph\u1ee5 n\u1eef \u0111\u1ea1t c\u00e1c v\u1ecb tr\u00ed h\u00e0ng \u0111\u1ea7u.<br><b>D.</b>&nbsp;Ph\u1ee5 n\u1eef c\u00f3 xu h\u01b0\u1edbng tr\u00e1nh theo \u0111u\u1ed5i c\u00e1c vai tr\u00f2 c\u1ea5p cao.<br><b><br>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin \u0111o\u1ea1n:</b><br>Even in countries in which women participate in the labour market in high numbers, only a minority make it to the highest positions.<br>(<i>Ngay c\u1ea3 \u1edf nh\u1eefng qu\u1ed1c gia m\u00e0 ph\u1ee5 n\u1eef tham gia v\u00e0o th\u1ecb tr\u01b0\u1eddng lao \u0111\u1ed9ng v\u1edbi t\u1ef7 l\u1ec7 cao, ch\u1ec9 m\u1ed9t thi\u1ec3u s\u1ed1 \u0111\u1ea1t \u0111\u01b0\u1ee3c c\u00e1c v\u1ecb tr\u00ed cao nh\u1ea5t.</i>)<br><br>", "key": "C", "isVideo": false, "score": 0, "order": 50, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583286, "lessonId": 0, "a": "Women in leadership are less focused on resolving conflicts.", "b": "Women bring a more empathetic approach and tactful solutions to address conflicts.", "c": "Women's leadership styles are more likely to create interpersonal challenges.", "d": "Women avoid giving feedback and prefer to let conflicts resolve on their own.", "bookId": 1086152, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 4, what can be inferred about the benefits of women\u2019s participation in decision-making positions?", "answer": "<b>Trong \u0111o\u1ea1n 4, c\u00f3 th\u1ec3 suy ra \u0111i\u1ec1u g\u00ec v\u1ec1 l\u1ee3i \u00edch c\u1ee7a vi\u1ec7c ph\u1ee5 n\u1eef tham gia v\u00e0o c\u00e1c v\u1ecb tr\u00ed ra quy\u1ebft \u0111\u1ecbnh?</b><br><b>A.</b>&nbsp;Ph\u1ee5 n\u1eef trong l\u00e3nh \u0111\u1ea1o \u00edt t\u1eadp trung v\u00e0o vi\u1ec7c gi\u1ea3i quy\u1ebft xung \u0111\u1ed9t. =&gt; <b>Sai</b>. V\u00ec trong \u0111o\u1ea1n 4 c\u00f3 th\u00f4ng tin \"they are inclined towards the prevention and solution of conflicts\" (<i>h\u1ecd c\u00f3 xu h\u01b0\u1edbng ph\u00f2ng ng\u1eeba v\u00e0 gi\u1ea3i quy\u1ebft xung \u0111\u1ed9t)</i>&nbsp;<br><br><b>B.&nbsp;</b>Ph\u1ee5 n\u1eef mang \u0111\u1ebfn ph\u01b0\u01a1ng ph\u00e1p c\u1ea3m th\u00f4ng h\u01a1n v\u00e0 gi\u1ea3i ph\u00e1p kh\u00e9o l\u00e9o \u0111\u1ec3 gi\u1ea3i quy\u1ebft xung \u0111\u1ed9t =&gt; <b>\u0110\u00fang</b><br><br><b>C.&nbsp;</b>Phong c\u00e1ch l\u00e3nh \u0111\u1ea1o c\u1ee7a ph\u1ee5 n\u1eef d\u1ec5 t\u1ea1o ra c\u00e1c th\u00e1ch th\u1ee9c trong quan h\u1ec7 c\u00e1 nh\u00e2n =&gt; <b>Sai</b>. V\u00ec trong \u0111o\u1ea1n 4 c\u00f3 th\u00f4ng tin \"women are better able to deal with difficult personal relationships\" (<i>ph\u1ee5 n\u1eef c\u00f3 kh\u1ea3 n\u0103ng x\u1eed l\u00fd c\u00e1c m\u1ed1i quan h\u1ec7 c\u00e1 nh\u00e2n kh\u00f3 kh\u0103n t\u1ed1t h\u01a1n</i>)<br><br><b>D.&nbsp;</b>Ph\u1ee5 n\u1eef tr\u00e1nh \u0111\u01b0a ra ph\u1ea3n h\u1ed3i v\u00e0 th\u00edch \u0111\u1ec3 xung \u0111\u1ed9t t\u1ef1 gi\u1ea3i quy\u1ebft =&gt; <b>Sai</b>. V\u00ec \u0111o\u1ea1n 4 c\u00f3 th\u00f4ng tin \"they monitor and give feedback more intensively.\" (<i>h\u1ecd theo d\u00f5i v\u00e0 cung c\u1ea5p ph\u1ea3n h\u1ed3i m\u1ed9t c\u00e1ch ch\u1eb7t ch\u1ebd h\u01a1n.</i>)<br>", "key": "B", "isVideo": false, "score": 0, "order": 51, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583288, "lessonId": 0, "a": "Preventing and addressing interpersonal disputes.", "b": "Paying attention to the needs and welfare of individuals.", "c": "Monitoring and providing feedback intensively.", "d": "Guaranteeing faster promotions for employees.", "bookId": 1086153, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 4, which of the following is NOT mentioned as a characteristic of female leadership?", "answer": "<b>Theo \u0111o\u1ea1n 4, \u0111i\u1ec1u n\u00e0o sau \u0111\u00e2y KH\u00d4NG \u0111\u01b0\u1ee3c nh\u1eafc \u0111\u1ebfn nh\u01b0 m\u1ed9t \u0111\u1eb7c \u0111i\u1ec3m c\u1ee7a phong c\u00e1ch l\u00e3nh \u0111\u1ea1o n\u1eef?</b><br><b>A.</b>&nbsp;Ph\u00f2ng ng\u1eeba v\u00e0 gi\u1ea3i quy\u1ebft c\u00e1c tranh ch\u1ea5p trong quan h\u1ec7 c\u00e1 nh\u00e2n.<br><b>B.</b>&nbsp;Ch\u00fa \u00fd \u0111\u1ebfn nhu c\u1ea7u v\u00e0 ph\u00fac l\u1ee3i c\u1ee7a c\u00e1 nh\u00e2n.<br><b>C.</b>&nbsp;Theo d\u00f5i v\u00e0 cung c\u1ea5p ph\u1ea3n h\u1ed3i m\u1ed9t c\u00e1ch ch\u1eb7t ch\u1ebd.<br><b>D.</b>&nbsp;\u0110\u1ea3m b\u1ea3o vi\u1ec7c th\u0103ng ti\u1ebfn nhanh ch\u00f3ng cho nh\u00e2n vi\u00ean.<br><b><br>C\u0103n c\u1ee9 v\u00e0o c\u00e1c th\u00f4ng tin:</b><br>-&nbsp;they are inclined towards the prevention and solution of conflicts\u2026 (<i>h\u1ecd c\u00f3 xu h\u01b0\u1edbng ph\u00f2ng ng\u1eeba v\u00e0 gi\u1ea3i quy\u1ebft xung \u0111\u1ed9t</i>)<br>- they pay closer attention to people\u2019s needs\u2026 (<i>h\u1ecd ch\u00fa \u00fd nhi\u1ec1u h\u01a1n \u0111\u1ebfn nhu c\u1ea7u c\u1ee7a m\u1ecdi ng\u01b0\u1eddi</i>)<br>-&nbsp;they monitor and give feedback more intensively (<i>h\u1ecd theo d\u00f5i v\u00e0 cung c\u1ea5p ph\u1ea3n h\u1ed3i m\u1ed9t c\u00e1ch ch\u1eb7t ch\u1ebd h\u01a1n</i>)<br>=&gt; A, B, C \u0111\u1ec1u \u0111\u01b0\u1ee3c nh\u1eafc \u0111\u1ebfn<br>", "key": "D", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully.", "content": "1. The process of economic globalization has been a driving force in reshaping local cultures around the world. As national economies become increasingly interconnected through trade, investment, and the movement of labor, cultural norms and practices are inevitably influenced. This economic integration has brought about both opportunities and challenges for local communities, often leading to significant cultural transformations.<br>2. One of the most profound impacts of economic globalization on local cultures is the changing nature of work and lifestyle. <b>Multinational corporations</b> have established operations in diverse locations, bringing with them not only jobs but also corporate cultures that can differ significantly from local traditions. This has led to the adoption of new work practices, dress codes, and even social norms in many communities.<br>3. The influx of foreign goods and services has also played a crucial role in altering local consumption patterns and cultural preferences. Traditional markets are increasingly replaced by supermarkets and shopping malls, offering a wide array of international products. This availability of global brands and products has influenced everything from dietary habits to fashion choices, often at the expense of local alternatives.<br>4. However, economic globalization has also created opportunities for local cultures to reach global markets. Artisanal crafts, traditional textiles, and indigenous art forms have found new audiences and markets through e-commerce platforms and international trade fairs. This global exposure has, in some cases, led to a renewed appreciation and <b>revival </b>of local cultural practices and products.<br>5. The tourism industry, a significant aspect of economic globalization, has had a particularly complex impact on local cultures. While <b>it</b> has brought economic benefits to many communities, it has also led to the commodification of cultural practices and traditions. Festivals, rituals, and traditional performances are often adapted or staged for tourist consumption, raising questions about authenticity and cultural preservation.<br>6. Another significant cultural implication of economic globalization is the increasing mobility of people. Labor migration, both within and across national borders, has led to the formation of diverse, multicultural communities in many parts of the world. This mixing of cultures has resulted in new hybrid cultural forms and practices, challenging traditional notions of cultural identity and belonging.<br>7. As economic globalization continues to shape our world, it is crucial to consider its cultural implications carefully. While it has undoubtedly brought many benefits, including increased cultural exchange and economic opportunities, it also poses challenges to cultural diversity and local traditions. Finding ways to harness the positive aspects of globalization while mitigating its negative impacts on local cultures remains an important global challenge.<br><div style=\"text-align: right;\"><i>(Source: https://www.ielts.net)</i></div><i>Choose an option (A, B, C, or D) that best answers each question. </i>", "listQuestion": [{"questionId": 21583304, "lessonId": 0, "a": "The Economic and Cultural Dimensions of Globalization", "b": "Economic Globalization and Its Cultural Implications", "c": "The Role of Trade in Preserving Local Traditions", "d": "Cultural Identity in a Globalized World", "bookId": 1086154, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title of the passage can be ________.", "answer": "<b>Ti\u00eau \u0111\u1ec1 hay nh\u1ea5t c\u1ee7a \u0111o\u1ea1n v\u0103n c\u00f3 th\u1ec3 l\u00e0 ________.</b><br>A. To\u00e0n c\u1ea7u h\u00f3a \u0111\u1ecbnh h\u00ecnh c\u1ea3 n\u1ec1n kinh t\u1ebf v\u00e0 v\u0103n h\u00f3a tr\u00ean to\u00e0n th\u1ebf gi\u1edbi nh\u01b0 th\u1ebf n\u00e0o<br>B. To\u00e0n c\u1ea7u h\u00f3a kinh t\u1ebf v\u00e0 nh\u1eefng t\u00e1c \u0111\u1ed9ng v\u0103n h\u00f3a c\u1ee7a n\u00f3<br>C. T\u00e1c \u0111\u1ed9ng c\u1ee7a th\u01b0\u01a1ng m\u1ea1i to\u00e0n c\u1ea7u \u0111\u1ed1i v\u1edbi vi\u1ec7c duy tr\u00ec c\u00e1c t\u1eadp qu\u00e1n truy\u1ec1n th\u1ed1ng<br>D. To\u00e0n c\u1ea7u h\u00f3a th\u00e1ch th\u1ee9c v\u00e0 bi\u1ebfn \u0111\u1ed5i b\u1ea3n s\u1eafc v\u0103n h\u00f3a nh\u01b0 th\u1ebf n\u00e0o<br><b>C\u0103n c\u1ee9 v\u00e0o n\u1ed9i dung ch\u00ednh c\u1ee7a t\u1eebng \u0111o\u1ea1n:<br>\u0110o\u1ea1n 1:</b> To\u00e0n c\u1ea7u h\u00f3a kinh t\u1ebf khi\u1ebfn c\u00e1c n\u1ec1n kinh t\u1ebf li\u00ean k\u1ebft ch\u1eb7t ch\u1ebd, \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn v\u0103n h\u00f3a \u0111\u1ecba ph\u01b0\u01a1ng.<br><b>\u0110o\u1ea1n 2:</b> C\u00e1c t\u1eadp \u0111o\u00e0n \u0111a qu\u1ed1c gia mang v\u0103n h\u00f3a l\u00e0m vi\u1ec7c v\u00e0 phong c\u00e1ch m\u1edbi v\u00e0o \u0111\u1ecba ph\u01b0\u01a1ng.<br><b>\u0110o\u1ea1n 3: </b>H\u00e0ng h\u00f3a qu\u1ed1c t\u1ebf thay \u0111\u1ed5i th\u00f3i quen ti\u00eau d\u00f9ng, d\u1ea7n thay th\u1ebf ch\u1ee3 truy\u1ec1n th\u1ed1ng.<br><b>\u0110o\u1ea1n 4: </b>To\u00e0n c\u1ea7u h\u00f3a gi\u00fap v\u0103n h\u00f3a \u0111\u1ecba ph\u01b0\u01a1ng ti\u1ebfp c\u1eadn th\u1ecb tr\u01b0\u1eddng th\u1ebf gi\u1edbi, ph\u1ee5c h\u1ed3i c\u00e1c gi\u00e1 tr\u1ecb truy\u1ec1n th\u1ed1ng.<br><b>\u0110o\u1ea1n 5: </b>Du l\u1ecbch mang l\u1ea1i l\u1ee3i \u00edch kinh t\u1ebf nh\u01b0ng l\u00e0m v\u0103n h\u00f3a b\u1ecb th\u01b0\u01a1ng m\u1ea1i h\u00f3a, m\u1ea5t t\u00ednh nguy\u00ean b\u1ea3n.<br><b>\u0110o\u1ea1n 6: </b>Di c\u01b0 lao \u0111\u1ed9ng t\u1ea1o ra c\u1ed9ng \u0111\u1ed3ng \u0111a v\u0103n h\u00f3a, thay \u0111\u1ed5i b\u1ea3n s\u1eafc truy\u1ec1n th\u1ed1ng.<br><b>\u0110o\u1ea1n 7</b>: To\u00e0n c\u1ea7u h\u00f3a c\u00f3 c\u1ea3 l\u1ee3i \u00edch v\u00e0 th\u00e1ch th\u1ee9c cho v\u0103n h\u00f3a, c\u1ea7n c\u00e2n b\u1eb1ng \u0111\u1ec3 b\u1ea3o t\u1ed3n \u0111a d\u1ea1ng v\u0103n h\u00f3a.<br>\u21d2 b\u00e0i n\u00f3i v\u1ec1 to\u00e0n c\u1ea7u h\u00f3a kinh t\u1ebf v\u00e0 t\u00e1c \u0111\u1ed9ng c\u1ee7a n\u00f3 \u0111\u1ebfn v\u0103n h\u00f3a \u0111\u1ecba ph\u01b0\u01a1ng <br>", "key": "B", "isVideo": false, "score": 0, "order": 53, "fillKey": "", "yourKey": ""                 if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`; // Unique Key for storage
                    const qType = q.normalizedType;
                    
                    // -- Palette Item --
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop
                    palMob.appendChild(palBtn); // Add to Mobile

                    // -- Question Card --
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    // Header: Question Number
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    // Interaction Area
                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // === TYPE 0: MCQ ===
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            // Logic hiển thị kết quả
                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { // Chọn đúng
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { // Đúng nhưng không chọn (hiện đáp án khi nộp)
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { // Chọn sai
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; // Hiện đáp án đúng sau khi nộp dù chưa làm
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // === TYPE 1 & 3: FILL KEY ===
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let inputClass = "w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all font-mono";
                        let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
