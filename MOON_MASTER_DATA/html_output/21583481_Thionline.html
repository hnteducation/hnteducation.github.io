fat n\u1eefa.<br>\u21d2 Sai. Th\u00f4ng tin c\u1ee5 th\u1ec3 \u201ctrong m\u1ed9t ph\u00fat n\u1eefa\u201d l\u00e0 kh\u00f4ng c\u0103n c\u1ee9. <br>C. Ch\u00fang t\u00f4i bi\u1ebft r\u1eb1ng xe bu\u00fdt lu\u00f4n \u1edf tr\u1ea1m xe bu\u00fdt n\u00e0y b\u1ea5t c\u1ee9 l\u00fac n\u00e0o.<br>\u21d2 Sai v\u1ec1 ngh\u0129a.<br>D. D\u1ef1 ki\u1ebfn xe bu\u00fdt s\u1ebd s\u1edbm \u0111\u1ebfn b\u1ebfn xe bu\u00fdt n\u00e0y.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang. Ta c\u00f3<b> \u201cshould be = be expected to\u201d</b>", "key": "D", "isVideo": true, "score": 0, "order": 45, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 46-52: Read the passage carefully.", "content": "1. Air pollution is contamination of the indoor or outdoor environment by any chemical, physical or biological agent <b>that </b>modifies the natural characteristics of the atmosphere.<br>2. Household combustion devices, motor vehicles, industrial facilities and forest fires are common sources of air pollution. Pollutants of major public health concern include particulate matter, carbon monoxide, ozone, nitrogen dioxide and sulfur dioxide. Outdoor and indoor air pollution cause respiratory and other diseases and are important sources of morbidity and mortality. <br>3. WHO data show that almost all of the global population (99%) breathe air that exceeds WHO guideline limits and contains high levels of pollutants, with low- and middle-income countries suffering from the highest exposures.<br>4. Air quality is closely linked to the earth\u2019s climate and ecosystems globally. <b>Many of the drivers of air pollution (i.e. combustion of fossil fuels) are also sources of greenhouse gas emissions</b>. Policies to reduce air pollution, therefore, offer a win-win strategy for both climate and health, lowering the burden of disease attributable to air pollution, as well as contributing to the near- and long-term mitigation of climate change.<br>5. From smog hanging over cities to smoke inside the home, air pollution poses a major threat to health and climate. Ambient (outdoor) air pollution in both cities and rural areas is causing fine particulate matter which result in strokes, heart diseases, lung cancer, acute and chronic respiratory diseases.  <br>6. Additionally, around 2.4 billion people are exposed to dangerous levels of household air pollution, while using polluting open fires or simple stoves for cooking fuelled by kerosene, biomass (wood, animal dung and crop waste) and coal.<br>7. The combined effects of ambient air pollution and household air pollution is associated with 7 million premature deaths annually. Sources of air pollution are <b>multiple </b>and context specific. The major outdoor pollution sources include residential energy for cooking and heating, vehicles, power generation, agriculture/waste incineration, and industry. Policies and investments that support sustainable land use, cleaner household energy and transport, energy-efficient housing, power generation, industry, and better municipal waste management can effectively reduce key sources of ambient air pollution.<br><div style=\"text-align: right;\"><i>(Adapted from: https://www.who.int/)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21583518, "lessonId": 0, "a": "The global impact of air pollution on health and climate", "b": "Major sources of air pollution and their effects on ecosystems", "c": "Air quality policies for reducing household and ambient pollution", "d": "Combating the risks of indoor and outdoor air pollution globally", "bookId": 1086176, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title of the passage can be ________.", "answer": "<b>Ti\u00eau \u0111\u1ec1 hay nh\u1ea5t cho \u0111o\u1ea1n v\u0103n c\u00f3 th\u1ec3 l\u00e0 ________.\n</b><br><b>A. </b>T\u00e1c \u0111\u1ed9ng to\u00e0n c\u1ea7u c\u1ee7a \u00f4 nhi\u1ec5m kh\u00f4ng kh\u00ed \u0111\u1ed1i v\u1edbi s\u1ee9c kh\u1ecfe v\u00e0 kh\u00ed h\u1eadu <br><b>=&gt; \u0110\u00fang\n\n</b><br><br><b>B. </b>C\u00e1c ngu\u1ed3n \u00f4 nhi\u1ec5m kh\u00f4ng kh\u00ed ch\u00ednh v\u00e0 \u1ea3nh h\u01b0\u1edfng c\u1ee7a ch\u00fang \u0111\u1ed1i v\u1edbi h\u1ec7 sinh th\u00e1i <br><b>=&gt; Sai</b> v\u00ec b\u00e0i vi\u1ebft kh\u00f4ng t\u1eadp trung v\u00e0o h\u1ec7 sinh th\u00e1i m\u00e0 ch\u1ee7 y\u1ebfu n\u00f3i v\u1ec1 s\u1ee9c kh\u1ecfe v\u00e0 bi\u1ebfn \u0111\u1ed5i kh\u00ed h\u1eadu\n\n<br><br><b>C. </b>C\u00e1c ch\u00ednh s\u00e1ch v\u1ec1 ch\u1ea5t l\u01b0\u1ee3ng kh\u00f4ng kh\u00ed \u0111\u1ec3 gi\u1ea3m \u00f4 nhi\u1ec5m trong nh\u00e0 v\u00e0 m\u00f4i tr\u01b0\u1eddng <br><b>=&gt; Sai</b> v\u00ec b\u00e0i vi\u1ebft ch\u1ec9 \u0111\u1ec1 c\u1eadp \u0111\u1ebfn ch\u00ednh s\u00e1ch \u1edf cu\u1ed1i b\u00e0i, kh\u00f4ng ph\u1ea3i tr\u1ecdng t\u00e2m ch\u00ednh\n\n<br><br><b>D.</b> \u0110\u1ed1i ph\u00f3 v\u1edbi r\u1ee7i ro \u00f4 nhi\u1ec5m kh\u00f4ng kh\u00ed trong nh\u00e0 v\u00e0 ngo\u00e0i tr\u1eddi tr\u00ean to\u00e0n c\u1ea7u <br><b>=&gt; Sai </b>v\u00ec b\u00e0i vi\u1ebft kh\u00f4ng ch\u1ec9 n\u00f3i v\u1ec1 \"\u0111\u1ed1i ph\u00f3\" m\u00e0 c\u00f2n \u0111\u1ec1 c\u1eadp \u0111\u1ebfn t\u00e1c \u0111\u1ed9ng v\u00e0 nguy\u00ean nh\u00e2n c\u1ee7a \u00f4 nhi\u1ec5m kh\u00f4ng kh\u00ed\n<br><br>=&gt; \u0110o\u1ea1n 2, 5 v\u00e0 7 \u0111\u1ec1 c\u1eadp \u0111\u1ebfn c\u00e1c b\u1ec7nh h\u00f4 h\u1ea5p, tim m\u1ea1ch, ung th\u01b0 ph\u1ed5i v\u00e0 7 tri\u1ec7u ca t\u1eed vong s\u1edbm h\u00e0ng n\u0103m do \u00f4 nhi\u1ec5m kh\u00f4ng kh\u00ed... \u0110o\u1ea1n 4 nh\u1ea5n m\u1ea1nh t\u00e1c \u0111\u1ed9ng \u0111\u1ebfn kh\u00ed h\u1eadu. \n<br>=&gt; B\u00e0i \u0111\u1ecdc \u0111\u1ec1 c\u1eadp \u0111\u1ebfn c\u1ea3 s\u1ee9c kh\u1ecfe v\u00e0 kh\u00ed h\u1eadu.\n", "key": "A", "isVideo": false, "score": 0, "order": 46, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583523, "lessonId": 0, "a": "air pollution", "b": "indoor or outdoor environment", "c": "chemical, physical, or biological agent", "d": "contamination", "bookId": 1086177, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The word <b>that </b>in paragraph 1 refers to ______.", "answer": "<b>T\u1eeb \u201cthat\u201d trong \u0111o\u1ea1n 1 \u0111\u1ec1 c\u1eadp \u0111\u1ebfn ________.\n</b><br><b>A.</b> \u00d4 nhi\u1ec5m kh\u00f4ng kh\u00ed\n<br><b>B.</b> M\u00f4i tr\u01b0\u1eddng trong nh\u00e0 ho\u1eb7c ngo\u00e0i tr\u1eddi\n<br><b>C.</b> T\u00e1c nh\u00e2n h\u00f3a h\u1ecdc, v\u1eadt l\u00fd ho\u1eb7c sinh h\u1ecdc\n<br><b>D. </b>S\u1ef1 nhi\u1ec5m b\u1ea9n\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o ng\u1eef c\u1ea3nh:\n</b><br>Air pollution is contamination of the indoor or outdoor environment by any chemical, physical or biological agent <b>that </b>modifies the natural characteristics of the atmosphere\n<br><i>(\u00d4 nhi\u1ec5m kh\u00f4ng kh\u00ed l\u00e0 s\u1ef1 nhi\u1ec5m b\u1ea9n c\u1ee7a m\u00f4i tr\u01b0\u1eddng trong nh\u00e0 ho\u1eb7c ngo\u00e0i tr\u1eddi b\u1edfi b\u1ea5t k\u1ef3 t\u00e1c nh\u00e2n h\u00f3a h\u1ecdc, v\u1eadt l\u00fd ho\u1eb7c sinh h\u1ecdc n\u00e0o, <b>th\u1ee9</b> l\u00e0m thay \u0111\u1ed5i c\u00e1c \u0111\u1eb7c t\u00ednh t\u1ef1 nhi\u00ean c\u1ee7a kh\u00ed quy\u1ec3n.)\n</i><br>=&gt; T\u1eeb <b>\"that\"</b> thay th\u1ebf cho danh t\u1eeb ngay tr\u01b0\u1edbc \u0111\u00f3, l\u00e0 <b>\"chemical, physical, or biological agent\"</b> (t\u00e1c nh\u00e2n h\u00f3a h\u1ecdc, v\u1eadt l\u00fd ho\u1eb7c sinh h\u1ecdc)\n", "key": "C", "isVideo": false, "score": 0, "order": 47, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583526, "lessonId": 0, "a": "It leads to economic hardship and job loss.", "b": "It is a significant cause of illness and death.", "c": "It results in the decline in biodiversity.", "d": "It is mainly associated with respiratory diseases.", "bookId": 1086178, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 2, what does the passage suggest about the effects of air pollution?", "answer": "<b>Trong \u0111o\u1ea1n 2, b\u00e0i \u0111\u1ecdc g\u1ee3i \u00fd \u0111i\u1ec1u g\u00ec v\u1ec1 t\u00e1c \u0111\u1ed9ng c\u1ee7a \u00f4 nhi\u1ec5m kh\u00f4ng kh\u00ed?\n</b><br><b>A.</b> N\u00f3 d\u1eabn \u0111\u1ebfn kh\u00f3 kh\u0103n kinh t\u1ebf v\u00e0 m\u1ea5t vi\u1ec7c l\u00e0m.\n<br><b>B.</b> N\u00f3 l\u00e0 nguy\u00ean nh\u00e2n ch\u00ednh g\u00e2y b\u1ec7nh t\u1eadt v\u00e0 t\u1eed vong.\n<br><b>C.</b> N\u00f3 d\u1eabn \u0111\u1ebfn s\u1ef1 suy gi\u1ea3m \u0111a d\u1ea1ng sinh h\u1ecdc.\n<br><b>D. </b>N\u00f3 ch\u1ee7 y\u1ebfu li\u00ean quan \u0111\u1ebfn c\u00e1c b\u1ec7nh v\u1ec1 h\u00f4 h\u1ea5p.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin:</b><br>Outdoor and indoor air pollution cause respiratory and other diseases and are important sources of morbidity and mortality\n<br><i>(\u00d4 nhi\u1ec5m kh\u00f4ng kh\u00ed ngo\u00e0i tr\u1eddi v\u00e0 trong nh\u00e0 g\u00e2y ra c\u00e1c b\u1ec7nh v\u1ec1 h\u00f4 h\u1ea5p v\u00e0 nh\u1eefng b\u1ec7nh kh\u00e1c, \u0111\u1ed3ng th\u1eddi l\u00e0 ngu\u1ed3n quan tr\u1ecdng g\u00e2y ra t\u1ef7 l\u1ec7 m\u1eafc b\u1ec7nh v\u00e0 t\u1eed vong.)\n<br></i><br>=&gt; \u00d4 nhi\u1ec5m kh\u00f4ng kh\u00ed kh\u00f4ng ch\u1ec9 g\u00e2y <b>b\u1ec7nh</b> m\u00e0 c\u00f2n d\u1eabn \u0111\u1ebfn <b>t\u1eed vong s\u1edbm.</b>", "key": "B", "isVideo": false, "score": 0, "order": 48, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583529, "lessonId": 0, "a": "It is only a problem in industrialized countries.", "b": "Most of the population is exposed to unhealthy levels of air pollution.", "c": "Only a small portion of the global population is affected.", "d": "Air pollution is not a significant issue for public health.", "bookId": 1086179, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 3, what does the WHO data suggest about air pollution worldwide?", "answer": "<b>Trong \u0111o\u1ea1n 3, d\u1eef li\u1ec7u c\u1ee7a WHO cho th\u1ea5y \u0111i\u1ec1u g\u00ec v\u1ec1 \u00f4 nhi\u1ec5m kh\u00f4ng kh\u00ed tr\u00ean to\u00e0n th\u1ebf gi\u1edbi?\n</b><br><b>A.</b> Ch\u1ec9 l\u00e0 v\u1ea5n \u0111\u1ec1 c\u1ee7a c\u00e1c qu\u1ed1c gia c\u00f4ng nghi\u1ec7p h\u00f3a.\n<br><b>B. </b>Ph\u1ea7n l\u1edbn d\u00e2n s\u1ed1 b\u1ecb ph\u01a1i nhi\u1ec5m v\u1edbi m\u1ee9c \u0111\u1ed9 \u00f4 nhi\u1ec5m kh\u00f4ng kh\u00ed kh\u00f4ng an to\u00e0n.\n<br><b>C.</b> Ch\u1ec9 m\u1ed9t ph\u1ea7n nh\u1ecf d\u00e2n s\u1ed1 to\u00e0n c\u1ea7u b\u1ecb \u1ea3nh h\u01b0\u1edfng.\n<br><b>D.</b> \u00d4 nhi\u1ec5m kh\u00f4ng kh\u00ed kh\u00f4ng ph\u1ea3i l\u00e0 v\u1ea5n \u0111\u1ec1 nghi\u00eam tr\u1ecdng \u0111\u1ed1i v\u1edbi s\u1ee9c kh\u1ecfe c\u1ed9ng \u0111\u1ed3ng.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin:</b><br>WHO data show that <b>almost all of the global population</b> (99%) breathe air that exceeds WHO guideline limits and contains high levels of pollutants.<br><i>(D\u1eef li\u1ec7u c\u1ee7a WHO cho th\u1ea5y <b>g\u1ea7n nh\u01b0 to\u00e0n b\u1ed9 d\u00e2n s\u1ed1 th\u1ebf gi\u1edbi</b> (99%) h\u00edt th\u1edf b\u1ea7u kh\u00f4ng kh\u00ed c\u00f3 m\u1ee9c \u0111\u1ed9 \u00f4 nhi\u1ec5m v\u01b0\u1ee3t qu\u00e1 gi\u1edbi h\u1ea1n h\u01b0\u1edbng d\u1eabn c\u1ee7a WHO.)\n</i><br>=&gt; \u00d4 nhi\u1ec5m kh\u00f4ng kh\u00ed \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn \u0111a s\u1ed1 m\u1ecdi ng\u01b0\u1eddi.", "key": "B", "isVideo": false, "score": 0, "order": 49, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583534, "lessonId": 0, "a": "striking", "b": "numerous", "c": "intricate", "d": "several", "bookId": 1086180, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The word <b>multiple </b>in paragraph 7 is closest in meaning to _______.", "answer": "<b>M\u1ee5c \u0111\u00edch c\u1ee7a t\u00e1c gi\u1ea3 khi n\u00eau r\u1eb1ng \"Nhi\u1ec1u nguy\u00ean nh\u00e2n g\u00e2y \u00f4 nhi\u1ec5m kh\u00f4ng kh\u00ed (v\u00ed d\u1ee5: \u0111\u1ed1t nhi\u00ean li\u1ec7u h\u00f3a th\u1ea1ch) c\u0169ng l\u00e0 ngu\u1ed3n ph\u00e1t th\u1ea3i kh\u00ed nh\u00e0 k\u00ednh\" l\u00e0 g\u00ec?\n</b><br><b>A.</b> Nh\u1ea5n m\u1ea1nh r\u1eb1ng \u00f4 nhi\u1ec5m kh\u00f4ng kh\u00ed v\u00e0 bi\u1ebfn \u0111\u1ed5i kh\u00ed h\u1eadu l\u00e0 nh\u1eefng v\u1ea5n \u0111\u1ec1 quan tr\u1ecdng.\n<br><b>B.</b> Ch\u1ec9 ra m\u1ed1i li\u00ean h\u1ec7 gi\u1eefa \u00f4 nhi\u1ec5m kh\u00f4ng kh\u00ed v\u00e0 bi\u1ebfn \u0111\u1ed5i kh\u00ed h\u1eadu.\n<br><b>C.</b> Gi\u1ea3i th\u00edch t\u00e1c \u0111\u1ed9ng c\u1ee7a nhi\u00ean li\u1ec7u h\u00f3a th\u1ea1ch \u0111\u1ed1i v\u1edbi m\u00f4i tr\u01b0\u1eddng.\n<br><b>D.</b> L\u1eadp lu\u1eadn r\u1eb1ng c\u00e1c ch\u00ednh s\u00e1ch gi\u1ea3m \u00f4 nhi\u1ec5m kh\u00f4ng kh\u00ed s\u1ebd kh\u00f4ng \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn bi\u1ebfn \u0111\u1ed5i kh\u00ed h\u1eadu.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o ng\u1eef c\u1ea3nh \u0111o\u1ea1n 4: <br></b>Sau khi n\u00eau ra ngu\u1ed3n ph\u00e1t th\u1ea3i kh\u00ed nh\u00e0 k\u00ednh l\u00e0 nguy\u00ean nh\u00e2n g\u00e2y ra \u00f4 nhi\u1ec5m, t\u00e1c gi\u1ea3 k\u1ebft lu\u1eadn r\u1eb7ng \"Policies to reduce air pollution, therefore, offer a win-win strategy for both climate and health\" <i>(Do \u0111\u00f3, c\u00e1c ch\u00ednh s\u00e1ch gi\u1ea3m thi\u1ec3u \u00f4 nhi\u1ec5m kh\u00f4ng kh\u00ed mang l\u1ea1i l\u1ee3i \u00edch k\u00e9p cho c\u1ea3 kh\u00ed h\u1eadu v\u00e0 s\u1ee9c kh\u1ecfe)\n</i><br>=&gt; \u00d4 nhi\u1ec5m kh\u00f4ng kh\u00ed v\u00e0 bi\u1ebfn \u0111\u1ed5i kh\u00ed h\u1eadu c\u00f3 chung m\u1ed9t nguy\u00ean nh\u00e2n, \u0111\u00f3 l\u00e0 \u0111\u1ed1t nhi\u00ean li\u1ec7u h\u00f3a th\u1ea1ch\n", "key": "B", "isVideo": false, "score": 0, "order": 50, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583539, "lessonId": 0, "a": "To emphasize that air pollution and climate change are vital issues", "b": "To show the connection between air pollution and climate change", "c": "To explain the effects of fossil fuels on the environment", "d": "To argue that policies for reducing air pollution would not affect climate change", "bookId": 1086181, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What is the author's purpose in stating that \"<b>Many of the drivers of air pollution (i.e. combustion of fossil fuels) are also sources of greenhouse gas emissions</b>\"?", "answer": "<b>Theo \u0111o\u1ea1n 6, \u0111i\u1ec1u n\u00e0o sau \u0111\u00e2y \u0111\u01b0\u1ee3c x\u00e1c \u0111\u1ecbnh l\u00e0 y\u1ebfu t\u1ed1 g\u00f3p ph\u1ea7n g\u00e2y \u00f4 nhi\u1ec5m kh\u00f4ng kh\u00ed trong nh\u00e0?\n</b><br><b>A.</b> S\u1eed d\u1ee5ng d\u1ea7u h\u1ecfa l\u00e0m ngu\u1ed3n s\u00e1ng.\n<br><b>B.</b> S\u1eed d\u1ee5ng b\u1ebfp l\u1eeda m\u1edf \u0111\u1ec3 n\u1ea5u \u0103n.\n<br><b>C. </b>S\u1ea3n xu\u1ea5t sinh kh\u1ed1i \u1edf v\u00f9ng n\u00f4ng th\u00f4n.\n<br><b>D.</b> \u0110\u1ed1t r\u00e1c g\u1ea7n c\u00e1c h\u1ed9 gia \u0111\u00ecnh \u0111\u00f4 th\u1ecb.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin:</b><br>Around 2.4 billion people are exposed to dangerous levels of household air pollution, while using polluting open fires or simple stoves for cooking.<br><i>(kho\u1ea3ng 2,4 t\u1ef7 ng\u01b0\u1eddi \u0111ang ti\u1ebfp x\u00fac v\u1edbi m\u1ee9c \u0111\u1ed9 \u00f4 nhi\u1ec5m kh\u00f4ng kh\u00ed trong nh\u00e0 nguy hi\u1ec3m khi s\u1eed d\u1ee5ng b\u1ebfp l\u1eeda \u0111\u01a1n gi\u1ea3n ho\u1eb7c b\u1ebfp m\u1edf \u0111\u1ec3 n\u1ea5u \u0103n.)\n</i>", "key": "B", "isVideo": false, "score": 0, "order": 51, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21583542, "lessonId": 0, "a": "The use of kerosene as a lighting source", "b": "The reliance on open fires for cooking purposes", "c": "The production of biomass in rural areas", "d": "Waste incineration near urban households", "bookId": 1086182, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "According to paragraph 6, which of the following is identified as a contributor to household air pollution?", "answer": "<b>T\u1eeb \u201cmultiple\u201d trong \u0111o\u1ea1n 7 c\u00f3 ngh\u0129a g\u1ea7n nh\u1ea5t v\u1edbi ________.\n</b><br><b>A.</b> N\u1ed5i b\u1eadt\n<br><b>B.</b> Nhi\u1ec1u\n<br><b>C.</b> Ph\u1ee9c t\u1ea1p\n<br><b>D.</b> M\u1ed9t s\u1ed1\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o ng\u1eef c\u1ea3nh c\u1ee7a c\u00e2u:\n</b><br>Sources of air pollution are multiple and context specific.<br><i>(C\u00e1c ngu\u1ed3n g\u00e2y \u00f4 nhi\u1ec5m kh\u00f4ng kh\u00ed r\u1ea5t \u0111a d\u1ea1ng v\u00e0 ph\u1ee5 thu\u1ed9c v\u00e0o t\u1eebng b\u1ed1i c\u1ea3nh c\u1ee5 th\u1ec3.)\n</i>", "key": "B", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully.", "content": "1. Social justice, a fundamental principle within modern societies, advocates for fairness, equality, and equity across social, economic, and political spheres. Social justice addresses inequalities within areas such as income distribution, access to education and healthcare, housing, and the criminal justice system. The goal is to ensure that everyone, regardless of their background, has equal opportunities and rights.<br>2. One key component of social justice is economic equality. Economic inequalities often arise from <b>systemic issues</b>, including wage gaps, wealth disparities, and a lack of access to quality jobs. These economic imbalances can hinder individuals and communities from achieving financial stability. For instance, the wage gap between men and women persists in many societies, with women typically earning less than men for the same work. Similarly, racial disparities can affect income levels, as some minority groups face greater obstacles in securing high-paying positions.<br>3. Another aspect of social justice is access to quality education. Education is widely recognized as a pathway to personal and professional advancement. However, not all individuals have equal access to quality education. In many cases, children from low-income families or rural communities may attend underfunded schools, limiting their educational opportunities. This educational inequality can create long-term disadvantages, affecting students\u2019 abilities to pursue higher education or secure well-paying jobs.<br>4. Healthcare access also plays a significant role in social justice. Many people around the world lack adequate healthcare due to the high costs of medical services or an absence of facilities in their areas. This often results in health disparities, with marginalized groups experiencing higher rates of illness and reduced life expectancy. For example, in countries without universal healthcare, low-income individuals may delay or forgo medical treatments because <b>they </b>cannot afford them.<br>5. Social justice issues extend to the housing sector as well. Safe, affordable housing is a basic need, but homelessness and housing instability remain significant problems worldwide. Rising real estate prices and inadequate housing policies have led to shortages of affordable homes in major cities. These issues disproportionately affect low-income families, often forcing them to live in substandard conditions or unsafe areas.<br>6. The criminal justice system also plays a central role in the pursuit of social justice. Many activists argue that marginalized groups are more likely to face harsh penalties and incarceration rates compared to others, even when committing similar offenses. Studies have shown that systemic biases within law enforcement and the judiciary can result in unequal treatment of individuals from certain racial or socioeconomic backgrounds. This can perpetuate cycles of disadvantage and hinder individuals\u2019 abilities <b>to reintegrate into society</b> after serving their sentences.<br><div style=\"text-align: right;\"><i>(Adapted from the real ielts)</i></div><i>Choose an option (A, B, C, or D) that best answers each question. </i>", "listQuestion": [{"questionId": 21583556, "lessonId": 0, "a": "Barriers to Equality and Social Justice", "b": "How Social Justice Shapes Our Future", "c": "The Fight Against Inequality in Modern Societies", "d": "The Importance of Equal Rights and Opportunities", "bookId": 1086183, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title of the passage can be ________.", "answer": "<b>Ti\u00eau \u0111\u1ec1 t\u1ed1t nh\u1ea5t c\u1ee7a \u0111o\u1ea1n v\u0103n c\u00f3 th\u1ec3 l\u00e0 __________.\n</b><br><b>A. </b>C\u00e1c r\u00e0o c\u1ea3n \u0111\u1ed1i v\u1edbi b\u00ecnh \u0111\u1eb3ng v\u00e0 c\u00f4ng l\u00fd x\u00e3 h\u1ed9i <br><b>=&gt; \u0110\u00fang</b>. \u0110o\u1ea1n v\u0103n t\u1eadp trung v\u00e0o nh\u1eefng v\u1ea5n \u0111\u1ec1 c\u00f4ng l\u00fd x\u00e3 h\u1ed9i, bao g\u1ed3m b\u1ea5t b\u00ecnh \u0111\u1eb3ng kinh t\u1ebf, gi\u00e1o d\u1ee5c, ch\u0103m                         let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
