\u01b0\u1eddng \u0111\u1ed9 d\u00f2ng \u0111i\u1ec7n ch\u1ea1y qua l\u1ed3ng.", "c": "b\u1eb1ng 0.", "d": "t\u1ec9 l\u1ec7 ngh\u1ecbch v\u1edbi c\u01b0\u1eddng \u0111\u1ed9 d\u00f2ng \u0111i\u1ec7n ch\u1ea1y qua l\u1ed3ng.", "bookId": 753007, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Khi c\u00f3 tia s\u00e9t ch\u1ea1y qua l\u1ed3ng Faraday th\u00ec c\u01b0\u1eddng \u0111\u1ed9 \u0111i\u1ec7n tr\u01b0\u1eddng b\u00ean trong l\u1ed3ng s\u1ebd", "answer": "Khi c\u00f3 tia s\u00e9t ch\u1ea1y qua l\u1ed3ng Faraday th\u00ec c\u01b0\u1eddng \u0111\u1ed9 \u0111i\u1ec7n tr\u01b0\u1eddng b\u00ean trong l\u1ed3ng s\u1ebd b\u1eb1ng 0 v\u00ec khi tia s\u00e9t t\u00e1c \u0111\u1ed9ng l\u00ean l\u1ed3ng Faraday, c\u00e1c \u0111i\u1ec7n t\u00edch tr\u00ean b\u1ec1 m\u1eb7t c\u1ee7a l\u1ed3ng s\u1ebd ph\u00e2n b\u1ed1 l\u1ea1i sao cho \u0111i\u1ec7n tr\u01b0\u1eddng b\u00ean trong l\u1ed3ng b\u1ecb tri\u1ec7t ti\u00eau ho\u00e0n to\u00e0n. <br><B>Ch\u1ecdn C", "key": "C", "isVideo": true, "score": 0, "order": 108, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u h\u1ecfi t\u1eeb 109 \u0111\u1ebfn 111", "content": "Trong m\u1ed9t th\u00ed nghi\u1ec7m, m\u1ed9t nh\u00e0 khoa h\u1ecdc \u0111\u00e3 t\u00e1ch v\u00e0 nu\u00f4i m\u1ed9t t\u1ebf b\u00e0o th\u1ea7n kinh (neuron) trong m\u1ed9t m\u00f4i tr\u01b0\u1eddng nu\u00f4i ti\u00eau chu\u1ea9n. \u00d4ng \u1ea5y \u0111\u00e3 \u0111o \u0111i\u1ec7n th\u1ebf ngh\u1ec9 c\u1ee7a s\u1ee3i tr\u1ee5c, sau \u0111\u00f3 k\u00edch th\u00edch s\u1ee3i tr\u1ee5c v\u00e0 \u0111o \u0111i\u1ec7n t\u1ebf ho\u1ea1t \u0111\u1ed9ng c\u1ee7a n\u00f3 (K\u1ebft qu\u1ea3 1).<br>Ti\u1ebfp theo, \u00f4ng \u1ea5y \u0111\u00e3 l\u00e0m l\u1ea1i th\u00ed nghi\u1ec7m m\u1ed9t s\u1ed1 l\u1ea7n, m\u1ed7i l\u1ea7n v\u1edbi m\u1ed9t m\u00f4i tr\u01b0\u1eddng nu\u00f4i ti\u00eau chu\u1ea9n c\u00f3 thay \u0111\u1ed5i m\u1ed9t s\u1ed1 th\u00e0nh ph\u1ea7n kh\u00e1c nhau v\u00e0 ghi l\u1ea1i \u0111\u01b0\u1ee3c c\u00e1c k\u1ebft qu\u1eb3 2, 3, 4 v\u00e0 5.<br>K\u1ebft qu\u1ea3 c\u1ee7a c\u00e1c th\u00ed nghi\u1ec7m \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n \u1edf b\u1ea3ng sau:<br><img src=\"https://asset.moon.vn/img/chat/large/2025/11/a57acbe3-775e-44e3-a9d1-644e2976dca9.jpg\" data-filename=\"\" style=\"width: 100%; max-width: 600px;\">", "listQuestion": [{"questionId": 19867485, "lessonId": 0, "a": "N\u1ed3ng \u0111\u1ed9 ion Na<sup>+</sup> hai b\u00ean m\u00e0ng t\u1ebf b\u00e0o.", "b": "N\u1ed3ng \u0111\u1ed9 ion K<sup>+</sup> hai b\u00ean m\u00e0ng t\u1ebf b\u00e0o.", "c": "S\u1ef1 ph\u00e2n b\u1ed1 c\u1ee7a ion Na<sup>+</sup> v\u00e0 K<sup>+</sup> hai b\u00ean m\u00e0ng t\u1ebf b\u00e0o.", "d": "S\u1ef1 bi\u1ec7n di\u1ec7n c\u1ee7a neurotransmitter trong synapse.", "bookId": 741001, "comments": 6, "bookmarks": 21, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Y\u1ebfu t\u1ed1 n\u00e0o ch\u1ee7 y\u1ebfu \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn s\u1ef1 h\u00ecnh th\u00e0nh \u0111i\u1ec7n th\u1ebf ngh\u1ec9?", "answer": "<b>\u0110\u00e1p \u00e1n: C<br>L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>M\u00e0ng t\u1ebf b\u00e0o neuron c\u00f3 nhi\u1ec1u k\u00eanh ion kh\u00e1c nhau cho ph\u00e9p c\u00e1c ion \u0111i qua, bao g\u1ed3m k\u00eanh Na\u207a (Natri) v\u00e0 k\u00eanh K\u207a (Kalium). Trong tr\u1ea1ng th\u00e1i ngh\u1ec9, k\u00eanh K\u207a th\u01b0\u1eddng m\u1edf h\u01a1n, cho ph\u00e9p K\u207a di chuy\u1ec3n ra ngo\u00e0i t\u1ebf b\u00e0o. Do \u0111\u00f3, n\u1ed3ng \u0111\u1ed9 K\u207a b\u00ean trong t\u1ebf b\u00e0o gi\u1ea3m, l\u00e0m cho \u0111i\u1ec7n th\u1ebf b\u00ean trong t\u1ebf b\u00e0o tr\u1edf n\u00ean \u00e2m h\u01a1n.<br>\u0110i\u1ec7n th\u1ebf ngh\u1ec9 ch\u1ee7 y\u1ebfu ph\u1ee5 thu\u1ed9c v\u00e0o s\u1ef1 ph\u00e2n b\u1ed1 c\u1ee7a c\u00e1c ion Na\u207a v\u00e0 K\u207a qua m\u00e0ng t\u1ebf b\u00e0o, b\u1edfi v\u00ec s\u1ef1 ch\u00eanh l\u1ec7ch n\u1ed3ng \u0111\u1ed9 c\u1ee7a c\u00e1c ion n\u00e0y s\u1ebd \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn \u0111i\u1ec7n th\u1ebf m\u00e0ng. Khi c\u00f3 s\u1ef1 thay \u0111\u1ed5i trong n\u1ed3ng \u0111\u1ed9 ho\u1eb7c ho\u1ea1t \u0111\u1ed9ng c\u1ee7a c\u00e1c ion n\u00e0y, \u0111i\u1ec7n th\u1ebf ngh\u1ec9 c\u00f3 th\u1ec3 b\u1ecb thay \u0111\u1ed5i, \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn kh\u1ea3 n\u0103ng k\u00edch th\u00edch c\u1ee7a neuron.", "key": "C", "isVideo": true, "score": 0, "order": 109, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19867489, "lessonId": 0, "a": "K\u1ebft qu\u1ea3 2.", "b": "K\u1ebft qu\u1ea3 3.", "c": "K\u1ebft qu\u1ea3 4.", "d": "K\u1ebft qu\u1ea3 5.", "bookId": 741004, "comments": 0, "bookmarks": 11, "likes": 0, "shares": 0, "typeId": 0, "questionText": "N\u1ebfu m\u00f4i tr\u01b0\u1eddng ti\u00eau chu\u1ea9n c\u00f3 n\u1ed3ng \u0111\u1ed9 ion Na<sup>+</sup> th\u1ea5p h\u01a1n b\u00ecnh th\u01b0\u1eddng th\u00ec \u0111i\u1ec7n th\u1ebf neuron \u0111\u01b0\u1ee3c ghi \u1edf k\u1ebft qu\u1ea3 n\u00e0o?", "answer": "<b>\u0110\u00e1p \u00e1n: C<br>L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>N\u1ebfu trong m\u00f4i tr\u01b0\u1eddng ti\u00eau chu\u1ea9n c\u00f3 n\u1ed3ng \u0111\u1ed9 Na<sup>+</sup> th\u1ea5p h\u01a1n b\u00ecnh th\u01b0\u1eddng, khi c\u00f3 k\u00edch th\u00edch th\u00ec l\u01b0\u1ee3ng ion Na<sup>+</sup> \u0111i v\u00e0o ph\u00eda trong m\u00e0ng \u00edt h\u01a1n b\u00ecnh th\u01b0\u1eddng, g\u00e2y kh\u1eed c\u1ef1c \u00edt h\u01a1n b\u00ecnh th\u01b0\u1eddng, do \u0111\u00f3 gi\u00e1 tr\u1ecb \u0111i\u1ec7n th\u1ebf ho\u1ea1t \u0111\u1ed9ng th\u1ea5p h\u01a1n b\u00ecnh th\u01b0\u1eddng ( +30 mV so v\u1edbi + 40 mV).<br>K\u1ebft qu\u1ea3 2: T\u0103ng t\u00ednh th\u1ea5m c\u1ee7a m\u00e0ng \u0111\u1ed1i v\u1edbi ion K<sup>+</sup>.<br>K\u1ebft qu\u1ea3 3: N\u1ebfu m\u00f4i tr\u01b0\u1eddng ti\u00eau chu\u1ea9n c\u00f3 n\u1ed3ng \u0111\u1ed9 K<sup>+</sup> cao h\u01a1n b\u00ecnh th\u01b0\u1eddng.<br>K\u1ebft qu\u1ea3 5: N\u1ebfu m\u00f4i tr\u01b0\u1eddng ch\u1ee9a ch\u1ea5t t\u0103ng t\u00ednh th\u1ea5m c\u1ee7a m\u00e0ng nh\u01b0 Cl<sup>-</sup>.", "key": "C", "isVideo": true, "score": 0, "order": 110, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19867493, "lessonId": 0, "a": "K\u00edch th\u00edch \u0111i\u1ec7n k\u00edch th\u00edch k\u00eanh ion Na\u207a m\u1edf ra, cho ph\u00e9p Na\u207a \u0111i v\u00e0o t\u1ebf b\u00e0o v\u00e0 t\u1ea1o ra \u0111i\u1ec7n th\u1ebf ho\u1ea1t \u0111\u1ed9ng.", "b": "K\u00edch th\u00edch \u0111i\u1ec7n l\u00e0m t\u0103ng n\u1ed3ng \u0111\u1ed9 ion K\u207a b\u00ean trong neuron, gi\u00fap duy tr\u00ec \u0111i\u1ec7n th\u1ebf ngh\u1ec9 \u00e2m h\u01a1n.", "c": "K\u00edch th\u00edch \u0111i\u1ec7n l\u00e0m gi\u1ea3m t\u00ednh th\u1ea5m c\u1ee7a m\u00e0ng neuron \u0111\u1ed1i v\u1edbi Na\u207a, l\u00e0m gi\u1ea3m kh\u1ea3 n\u0103ng k\u00edch th\u00edch \u0111i\u1ec7n.", "d": "K\u00edch th\u00edch \u0111i\u1ec7n c\u00f3 th\u1ec3 l\u00e0m cho \u0111i\u1ec7n th\u1ebf ho\u1ea1t \u0111\u1ed9ng tr\u1edf n\u00ean d\u01b0\u01a1ng h\u01a1n m\u00e0 kh\u00f4ng \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn \u0111i\u1ec7n th\u1ebf ngh\u1ec9.", "bookId": 741007, "comments": 6, "bookmarks": 5, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Trong \u0111i\u1ec1u tr\u1ecb b\u1ec7nh li\u00ean quan \u0111\u1ebfn t\u1ed5n th\u01b0\u01a1ng neuron, ph\u01b0\u01a1ng ph\u00e1p can thi\u1ec7p \u0111i\u1ec7n (electrical stimulation therapy) th\u01b0\u1eddng \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng \u0111\u1ec3 c\u1ea3i thi\u1ec7n ch\u1ee9c n\u0103ng th\u1ea7n kinh. \u0110\u00e2u l\u00e0  t\u00e1c \u0111\u1ed9ng c\u00f3 th\u1ec3 x\u1ea3y ra khi s\u1eed d\u1ee5ng ph\u01b0\u01a1ng ph\u00e1p n\u00e0y.", "answer": "<b>\u0110\u00e1p \u00e1n: A<br>L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>A: Sai, k\u00edch th\u00edch \u0111i\u1ec7n kh\u00f4ng l\u00e0m t\u0103ng n\u1ed3ng \u0111\u1ed9 ion K\u207a b\u00ean trong neuron; ng\u01b0\u1ee3c l\u1ea1i, n\u00f3 c\u00f3 th\u1ec3 l\u00e0m cho K\u207a ra ngo\u00e0i h\u01a1n.<br>B: \u0110\u00fang, k\u00edch th\u00edch \u0111i\u1ec7n m\u1edf k\u00eanh ion Na\u207a, cho ph\u00e9p Na\u207a v\u00e0o t\u1ebf b\u00e0o, d\u1eabn \u0111\u1ebfn s\u1ef1 thay \u0111\u1ed5i \u0111i\u1ec7n th\u1ebf v\u00e0 t\u1ea1o ra \u0111i\u1ec7n th\u1ebf ho\u1ea1t \u0111\u1ed9ng.<br>C: Sai, k\u00edch th\u00edch \u0111i\u1ec7n th\u1ef1c ra l\u00e0m t\u0103ng t\u00ednh th\u1ea5m c\u1ee7a m\u00e0ng neuron \u0111\u1ed1i v\u1edbi Na\u207a, kh\u00f4ng l\u00e0m gi\u1ea3m kh\u1ea3 n\u0103ng k\u00edch th\u00edch.<br>D: Sai, k\u00edch th\u00edch \u0111i\u1ec7n kh\u00f4ng l\u00e0m cho \u0111i\u1ec7n th\u1ebf ho\u1ea1t \u0111\u1ed9ng tr\u1edf n\u00ean d\u01b0\u01a1ng h\u01a1n m\u00e0 kh\u00f4ng \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn \u0111i\u1ec7n th\u1ebf ngh\u1ec9; hai y\u1ebfu t\u1ed1 n\u00e0y c\u00f3 s\u1ef1 li\u00ean h\u1ec7 m\u1eadt thi\u1ebft.", "key": "A", "isVideo": true, "score": 0, "order": 111, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u h\u1ecfi t\u1eeb 112 \u0111\u1ebfn 114", "content": "T\u1ef7 s\u1ed1 gi\u1edbi t\u00ednh c\u1ee7a d\u00e2n s\u1ed1 l\u00e0 99,2 nam/100 n\u1eef. Trong \u0111\u00f3, t\u1ef7 s\u1ed1 gi\u1edbi t\u00ednh khu v\u1ef1c th\u00e0nh th\u1ecb l\u00e0 96,7 nam/100 n\u1eef, khu v\u1ef1c n\u00f4ng th\u00f4n l\u00e0 100,7 nam/100 n\u1eef. T\u1ef7 s\u1ed1 gi\u1edbi t\u00ednh c\u00f3 s\u1ef1 kh\u00e1c bi\u1ec7t t 0 n\u1eef \u2192 nam nhi\u1ec1u h\u01a1n.<br>\n\u25cf\tTh\u00e0nh th\u1ecb: 96,7 nam/100 n\u1eef \u2192 n\u1eef nhi\u1ec1u h\u01a1n.\n", "key": "A", "isVideo": false, "score": 0, "order": 113, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21587907, "lessonId": 0, "a": "Do t\u00ecnh tr\u1ea1ng m\u1ea5t c\u00e2n b\u1eb1ng gi\u1edbi t\u00ednh khi sinh v\u1eabn t\u1ed3n t\u1ea1i \u1edf m\u1ed9t s\u1ed1 \u0111\u1ecba ph\u01b0\u01a1ng.", "b": "Do tr\u1ebb em nam c\u00f3 t\u1ef7 l\u1ec7 t\u1eed vong cao h\u01a1n tr\u1ebb em n\u1eef.", "c": "Do ph\u1ee5 n\u1eef sinh con mu\u1ed9n h\u01a1n, \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn t\u1ef7 l\u1ec7 gi\u1edbi t\u00ednh.", "d": "Do nam gi\u1edbi nh\u1eadp c\u01b0 nhi\u1ec1u v\u00e0o nh\u00f3m tu\u1ed5i nh\u1ecf.", "bookId": 1086534, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "V\u00ec sao t\u1ef7 s\u1ed1 gi\u1edbi t\u00ednh \u1edf nh\u00f3m tu\u1ed5i 0\u201310 cao h\u01a1n \u0111\u00e1ng k\u1ec3 (110,2 nam/100 n\u1eef) so v\u1edbi m\u1ee9c chung c\u1ee7a c\u1ea3 n\u01b0\u1edbc?", "answer": "T\u1ef7 s\u1ed1 gi\u1edbi t\u00ednh > 105 nam/100 n\u1eef \u1edf nh\u00f3m tr\u1ebb em \u2192 bi\u1ec3u hi\u1ec7n m\u1ea5t c\u00e2n b\u1eb1ng khi sinh, nguy\u00ean nh\u00e2n ch\u1ee7 y\u1ebfu do t\u01b0 t\u01b0\u1edfng tr\u1ecdng nam v\u00e0 ch\u1ecdn l\u1ecdc gi\u1edbi t\u00ednh tr\u01b0\u1edbc sinh \u1edf m\u1ed9t s\u1ed1 v\u00f9ng.", "key": "A", "isVideo": false, "score": 0, "order": 114, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 115 \u0111\u1ebfn 117:", "content": "<i>\u201cVua Quang Trung nh\u00e0 T\u00e2y S\u01a1n l\u00e0 \u00f4ng vua anh d\u0169ng, l\u1ea5y v\u00f5 l\u01b0\u1ee3c m\u00e0 d\u1ef1ng nghi\u1ec7p, nh\u01b0ng ng\u00e0i c\u00f3 \u0111\u1ed9 l\u01b0\u1ee3ng, r\u1ea5t am hi\u1ec3u vi\u1ec7c tr\u1ecb n\u01b0\u1edbc, bi\u1ebft tr\u1ecdng nh\u1eefng ng\u01b0\u1eddi hi\u1ec1n t\u00e0i v\u0103n h\u1ecdc. Khi ng\u00e0i l\u1ea5y B\u1eafc H\u00e0 </i>[\u0110\u00e0ng Ngo\u00e0i \u2013 v\u00f9ng l\u00e3nh th\u1ed5 ph\u00eda b\u1eafc s\u00f4ng Gianh v\u00e0o th\u1ebf k\u1ef7 17 v\u00e0 th\u1ebf k\u1ef7 18 do ch\u00faa Tr\u1ecbnh ki\u1ec3m so\u00e1t]<i>, nh\u1eefng ng\u01b0\u1eddi nh\u01b0 Ng\u00f4 Th\u00ec Nh\u1eadm, Phan Huy \u00cdch \u0111\u1ec1u \u0111\u01b0\u1ee3c tr\u1ecdng d\u1ee5ng v\u00e0 nh\u1ea5t l\u00e0 \u0111\u1ed1i v\u1edbi m\u1ed9t ng\u01b0\u1eddi x\u1eed s\u0129 </i>[ng\u01b0\u1eddi c\u00f3 h\u1ecdc nh\u01b0ng ch\u1ec9 \u1edf nh\u00e0, kh\u00f4ng ch\u1ecbu ra l\u00e0m quan]<i> nh\u01b0 Nguy\u1ec5n Thi\u1ebfp th\u00ec th\u1eadt l\u00e0 kh\u00e1c th\u01b0\u1eddng.<br>\u00d4ng Nguy\u1ec5n Thi\u1ebfp </i>[\u2026]<i> ng\u01b0\u1eddi ta g\u1ecdi l\u00e0 L\u1ee5c Ni\u00ean ti\u00ean sinh, hay l\u00e0 La S\u01a1n phu t\u1eed. Vua Quang Trung t\u1eeb khi \u0111em qu\u00e2n ra \u0111\u00e1nh B\u1eafc H\u00e0, bi\u1ebft ti\u1ebfng Nguy\u1ec5n Thi\u1ebfp, \u0111\u00e3 m\u1ea5y l\u1ea7n cho ng\u01b0\u1eddi \u0111em l\u1ec5 v\u1eadt m\u1eddi \u00f4ng ra gi\u00fap, \u00f4ng kh\u00f4ng nh\u1eadn l\u1ec5 v\u00e0 c\u0169ng t\u1eeb ch\u1ed1i kh\u00f4ng ra. \u0110\u1ebfn khi ng\u00e0i \u0111\u00e3 \u0111\u0103ng c\u1ef1c </i>[l\u00ean ng\u00f4i ho\u00e0ng \u0111\u1ebf]<i> l\u1ea1i m\u1ea5y l\u1ea7n cho ng\u01b0\u1eddi \u0111\u1ebfn m\u1eddi \u00f4ng, \u00f4ng c\u00f3 \u0111\u1ebfn b\u00e1i y\u1ebft </i>[y\u1ebft ki\u1ebfn theo nghi l\u1ec5, th\u1ec3 hi\u1ec7n s\u1ef1 cung k\u00ednh] v\u00e0 khuy\u00ean vua n\u00ean l\u1ea5y nh\u00e2n ngh\u0129a m\u00e0 tr\u1ecb d\u00e2n tr\u1ecb n\u01b0\u1edbc, r\u1ed3i l\u1ea1i xin v\u00ea. Vua Quang Trung tuy kh\u00f4ng d\u00f9ng \u0111\u01b0\u1ee3c \u00f4ng, nh\u01b0ng bao gi\u1edd c\u0169ng t\u00f4n k\u00ednh \u00f4ng nh\u01b0 b\u1eadc th\u1ea7y, v\u00e0 vi\u1ec7c ch\u00ednh tr\u1ecb trong n\u01b0\u1edbc th\u01b0\u1eddng theo \u00fd ngh\u0129a c\u1ee7a \u00f4ng \u0111\u00e3 tr\u00ecnh b\u00e0y\u201d. <br><div style=\"text-align: right;\">(Tr\u1ea7n Tr\u1ecdng Kim, <i>Vi\u1ec7t Nam s\u1eed l\u01b0\u1ee3c</i>, NXB V\u0103n h\u1ecdc, H\u00e0 N\u1ed9i, 2022, tr. 422 \u2013 423)</div>", "listQuestion": [{"questionId": 19898117, "lessonId": 0, "a": "Ch\u00ednh s\u00e1ch tr\u1ecdng d\u1ee5ng hi\u1ec1n t\u00e0i c\u1ee7a vua Quang Trung.", "b": "Vi\u1ec7c tr\u1ecb qu\u1ed1c c\u1ee7a vua Quang Trung v\u00e0o th\u1eddi T\u00e2y S\u01a1n.", "c": "Vai tr\u00f2 c\u1ee7a Nguy\u1ec5n Hu\u1ec7 - Quang Trung trong l\u1ecbch s\u1eed.", "d": "Vua Quang Trung \u0111\u1ea1i ph\u00e1 qu\u00e2n Xi\u00eam v\u00e0 qu\u00e2n Thanh.", "bookId": 758805, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "N\u1ed9i dung n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>\u0111\u01b0\u1ee3c nh\u1eafc t\u1edbi trong \u0111o\u1ea1n tr\u00edch tr\u00ean?", "answer": "", "key": "D", "isVideo": false, "score": 0, "order": 115, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19898119, "lessonId": 0, "a": "Vua Quang Trung \u0111\u1ec1 cao ng\u01b0\u1eddi c\u00f3 h\u1ecdc th\u1ee9c.", "b": "Ch\u00ednh s\u00e1ch \u0111\u1ed1i ngo\u1ea1i c\u1ee7a V\u01b0\u01a1ng tri\u1ec1u T\u00e2y S\u01a1n.", "c": "T\u00ecnh h\u00ecnh l\u1ecbch s\u1eed Vi\u1ec7t Nam cu\u1ed1i th\u1ebf k\u1ec9 XVIII.", "d": "Vi\u1ec7c tr\u1ecdng d\u1ee5ng nh\u00e2n t\u00e0i c\u1ee7a vua Quang Trung.", "bookId": 758808, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "N\u1ed9i dung n\u00e0o sau \u0111\u00e2y ph\u1ea3n \u00e1nh <b>kh\u00f4ng </b>\u0111\u00fang v\u1ec1 th\u00f4ng tin c\u1ee7                 const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
