1c gi\u00e1 tr\u1ecb 79, 83, 85, 87, 89, 92 v\u00e0 96. P ng\u1ed3i th\u1ee9 ba ph\u00eda b\u00ean ph\u1ea3i ng\u01b0\u1eddi n\u1eb7ng nh\u1ea5t. Ng\u01b0\u1eddi nh\u1eb9 nh\u1ea5t ng\u1ed3i \u1edf ngo\u00e0i c\u00f9ng v\u00e0 ch\u00ednh gi\u1eefa ng\u01b0\u1eddi nh\u1eb9 nh\u1ea5t v\u00e0 b\u1ea1n R l\u00e0 ng\u01b0\u1eddi n\u1eb7ng nh\u1ea5t. Ng\u01b0\u1eddi nh\u1eb9 th\u1ee9 ba ng\u1ed3i c\u1ea1nh R v\u00e0 ng\u01b0\u1eddi \u0111\u00f3 kh\u00f4ng ph\u1ea3i l\u00e0 P c\u0169ng kh\u00f4ng ng\u1ed3i c\u1ea1nh P. Q ng\u1ed3i th\u1ee9 ba ph\u00eda b\u00ean tr\u00e1i c\u1ee7a ng\u01b0\u1eddi m\u00e0 c\u00f3 c\u00e2n n\u1eb7ng cao h\u01a1n ngay tr\u00ean R. C\u00e2n n\u1eb7ng c\u1ee7a R kh\u00f4ng ph\u1ea3i l\u00e0 87 kg. C\u00e2n n\u1eb7ng c\u1ee7a P kh\u00f4ng ph\u1ea3i l\u00e0 92 kg hay 79 kg. T n\u1eb7ng 83 kg. S n\u1eb7ng h\u01a1n V nh\u01b0ng kh\u00f4ng ph\u1ea3i l\u00e0 ng\u01b0\u1eddi n\u1eb7ng nh\u1ea5t.", "listQuestion": [{"questionId": 10467077, "lessonId": 0, "a": "P.", "b": "Q.", "c": "R.", "d": "S.", "bookId": 289267, "comments": 51, "bookmarks": 57, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Ai l\u00e0 ng\u01b0\u1eddi nh\u1eb9 th\u1ee9 ba?", "answer": "<b>D\u1ef1a v\u00e0o c\u00e1c gi\u1ea3 thi\u1ebft \u0111\u1ec3 suy lu\u1eadn:</b><br>\u2022\tB\u1ea3y b\u1ea1n ng\u1ed3i tr\u00ean chi\u1ebfc gh\u1ebf d\u00e0i c\u00f9ng quay m\u1eb7t v\u1ec1 ph\u00eda b\u1eafc <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2024/9/ad5a4619-6be4-49bc-baee-0ab7415d8cf4.png\"/> B\u1ea3y b\u1ea1n \u0111\u1ec1u nh\u00ecn l\u00ean tr\u00ean.<br>Gi\u1ea3 s\u1eed, c\u00e1c b\u1ea1n ng\u1ed3i theo th\u1ee9 t\u1eeb tr\u00e1i qua ph\u1ea3i nh\u01b0 sau:<br><img src=\"https://asset.moon.vn/img/ai/Teachers/haquanghung/m154.png\" alt=\"m154.png\" width=\"642\" height=\"98\" border=\"0\"><br> \u2022\tP ng\u1ed3i th\u1ee9 ba ph\u00eda b\u00ean ph\u1ea3i ng\u01b0\u1eddi n\u1eb7ng nh\u1ea5t <br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2024/9/152a0884-e3b7-4939-ab6a-291400b16362.png\"/> Ng\u01b0\u1eddi n\u1eb7ng nh\u1ea5t (96kg) c\u00f3 th\u1ec3 ng\u1ed3i \u1edf v\u1ecb tr\u00ed s\u1ed1 1, 2, 3 ho\u1eb7c 4 v\u00e0 P c\u00f3 c\u00f3 th\u1ec3 \u1edf v\u1ecb tr\u00ed s\u1ed1 4, 5, 6 ho\u1eb7c 7. (1)<br>\u2022\tNg\u01b0\u1eddi nh\u1eb9 nh\u1ea5t ng\u1ed3i \u1edf ngo\u00e0i c\u00f9ng v\u00e0 ch\u00ednh gi\u1eefa ng\u01b0\u1eddi nh\u1eb9 nh\u1ea5t v\u00e0 b\u1ea1n R l\u00e0 ng\u01b0\u1eddi n\u1eb7ng nh\u1ea5t <br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2024/9/32bc1cb3-0fdd-4e11-b4d3-892dcb2459c0.png\"/> Ng\u01b0\u1eddi nh\u1eb9 nh\u1ea5t (79 kg) ng\u1ed3i \u1edf v\u1ecb tr\u00ed s\u1ed1 1 v\u00e0 b\u1ea1n R c\u00f3 th\u1ec3 ng\u1ed3i \u1edf v\u1ecb tr\u1ecb s\u1ed1 3, 5 ho\u1eb7c 7 (ph\u1ee5 thu\u1ed9c v\u00e0o ng\u01b0\u1eddi n\u1eb7ng nh\u1ea5t) (suy lu\u1eadn t\u01b0\u01a1ng t\u1ef1 n\u1ebfu ng\u1ed3i t\u1eeb ph\u1ea3i sang tr\u00e1i). (2) <br>K\u1ebft h\u1ee3p (1) v\u00e0 (2) <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2024/9/fdd9ab26-4ca5-491d-9c48-8dfe5bf638e2.png\"/> Ng\u01b0\u1eddi n\u1eb7ng nh\u1ea5t (96kg) kh\u00f4ng th\u1ec3 ng\u1ed3i \u1edf v\u1ecb tr\u00ed 1. <br>\u2022\tC\u00e2n n\u1eb7ng c\u1ee7a P kh\u00f4ng ph\u1ea3i l\u00e0 92 kg hay 79 kg <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2024/9/b8e18a5b-0f25-4cb3-81fc-2703fd15a3b3.png\"/> P kh\u00f4ng ph\u1ea3i ng\u01b0\u1eddi nh\u1eb9 nh\u1ea5t.<br><b>D\u1ef1a v\u00e0o d\u1eef ki\u1ec7n:</b> Ng\u01b0\u1eddi nh\u1eb9 th\u1ee9 ba (85kg)  ng\u1ed3i c\u1ea1nh R v\u00e0 ng\u01b0\u1eddi \u0111\u00f3 kh\u00f4ng ph\u1ea3i l\u00e0 P c\u0169ng kh\u00f4ng ng\u1ed3i c\u1ea1nh P ta c\u00f3 c\u00e1c tr\u01b0\u1eddng h\u1ee3p sau: <br><b>TH1:</b> Ng\u01b0\u1eddi nh\u1eb9 nh\u1ea5t ng\u1ed3i \u1edf v\u1ecb tr\u00ed s\u1ed1 1, R ng\u1ed3i \u1edf v\u1ecb tr\u00ed s\u1ed1 3.<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2024/9/bfa24fdd-28cc-4db0-905c-7f1751cc9cf5.png\"/> M\u00e2u thu\u1eabn v\u1edbi d\u1eef ki\u1ec7n \u201cNg\u01b0\u1eddi nh\u1eb9 nh\u1ea5t ng\u1ed3i \u1edf ngo\u00e0i c\u00f9ng v\u00e0 ch\u00ednh gi\u1eefa ng\u01b0\u1eddi nh\u1eb9 nh\u1ea5t v\u00e0 b\u1ea1n R l\u00e0 ng\u01b0\u1eddi n\u1eb7ng nh\u1ea5t\u201d ho\u1eb7c m\u00e2u thu\u1eabn v\u1edbi d\u1eef ki\u1ec7n \u201cNg\u01b0\u1eddi nh\u1eb9 th\u1ee9 ba ng\u1ed3i c\u1ea1nh R v\u00e0 ng\u01b0\u1eddi \u0111\u00f3 kh\u00f4ng ph\u1ea3i l\u00e0 P c\u0169ng kh\u00f4ng ng\u1ed3i c\u1ea1nh P\u201d. (Tr\u01b0\u1eddng h\u1ee3p n\u00e0y kh\u00f4ng th\u1ecfa m\u00e3n).<br><img src=\"https://asset.moon.vn/img/ai/Teachers/haquanghung/m155.png\" alt=\"m155.png\" width=\"628\" height=\"100\" border=\"0\"><br> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2024/9/fd2c965f-2ee1-44c5-aee2-c40fc4ab0c6f.png\"/> R kh\u00f4ng th\u1ec3 ng\u1ed3i \u1edf v\u1ecb tr\u00ed s\u1ed1 3 <br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2024/9/8f1828be-736f-4911-bdaa-38bdfb16bd4d.png\"/> R c\u00f3 th\u1ec3 ng\u1ed3i \u1edf v\u1ecb tr\u1ecb s\u1ed1 5 ho\u1eb7c 7.<br><b>TH2: </b>Ng\u01b0\u1eddi nh\u1eb9 nh\u1ea5t ng\u1ed3i \u1edf v\u1ecb tr\u00ed s\u1ed1 1, R ng\u1ed3i \u1edf v\u1ecb tr\u00ed s\u1ed1 7.<br><img src=\"https://asset.moon.vn/img/ai/Teachers/haquanghung/m156.png\" alt=\"m156.png\" width=\"633\" height=\"96\" border=\"0\"><br> V\u00ec \u201cNg\u01b0\u1eddi nh\u1eb9 nh\u1ea5t (79kg) ng\u1ed3i \u1edf v\u1ecb tr\u00ed s\u1ed1 1 v\u00e0 ch\u00ednh gi\u1eefa ng\u01b0\u1eddi nh\u1eb9 nh\u1ea5t v\u00e0 b\u1ea1n R l\u00e0 ng\u01b0\u1eddi n\u1eb7ng nh\u1ea5t\u201d <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2024/9/7593ec2d-420d-4d0c-a7b8-1659881abc85.png\"/> Ng\u01b0\u1eddi n\u1eb7ng nh\u1ea5t (96kg) ng\u1ed3i \u1edf v\u1ecb tr\u00ed s\u1ed1 4. <br>M\u00e0 \u201cP ng\u1ed3i th\u1ee9 ba ph\u00eda b\u00ean ph\u1ea3i ng\u01b0\u1eddi n\u1eb7ng nh\u1ea5t\u201d<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2024/9/8012df41-cab5-4ccc-9c71-71e6252588c6.png\"/> P ng\u1ed3i \u1edf v\u1ecb tr\u1ecb s\u1ed1 7.P v\u1edbi R c\u00f9ng ng\u1ed3i v\u1ecb tr\u00ed s\u1ed1 7 (Tr\u01b0\u1eddng h\u1ee3p n\u00e0y kh\u00f4ng th\u1ecfa m\u00e3n). <br><b>TH3: </b>Ng\u01b0\u1eddi nh\u1eb9 nh\u1ea5t ng\u1ed3i \u1edf v\u1ecb tr\u00ed s\u1ed1 1, R ng\u1ed3i \u1edf v\u1ecb tr\u00ed s\u1ed1 5.<br><img src=\"https://asset.moon.vn/img/ai/Teachers/haquanghung/m157.png\" alt=\"m157.png\" width=\"629\" height=\"101\" border=\"0\"><br> V\u00ec \u201cNg\u01b0\u1eddi nh\u1eb9 nh\u1ea5t (79kg) ng\u1ed3i \u1edf v\u1ecb tr\u00ed s\u1ed1 1 v\u00e0 ch\u00ednh gi\u1eefa ng\u01b0\u1eddi nh\u1eb9 nh\u1ea5t v\u00e0 b\u1ea1n R l\u00e0 ng\u01b0\u1eddi n\u1eb7ng nh\u1ea5t\u201d <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2024/9/dfb62fe9-418c-4c22-828f-b9d22403a615.png\"/> Ng\u01b0\u1eddi n\u1eb7ng nh\u1ea5t (96kg) ng\u1ed3i \u1edf v\u1ecb tr\u00ed 3. <br>Do \u201cP ng\u1ed3i th\u1ee9 ba ph\u00eda b\u00ean ph\u1ea3i ng\u01b0\u1eddi n\u1eb7ng nh\u1ea5t\u201d <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2024/9/fc02d90c-143a-478c-9a0b-e8e41d28b55f.png\"/>P ng\u1ed3i v\u1ecb s\u1ed1 6.M\u00e0 \u201cNg\u01b0\u1eddi nh\u1eb9 th\u1ee9 ba ng\u1ed3i c\u1ea1nh R v\u00e0 ng\u01b0\u1eddi \u0111\u00f3 kh\u00f4ng ph\u1ea3i l\u00e0 P c\u0169ng kh\u00f4ng ng\u1ed3i c\u1ea1nh P\u201d <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2024/9/a21e984d-d8bc-4a0a-ac20-7e400f201a06.png\"/>ng\u01b0\u1eddi nh\u1eb9 th\u1ee9 ba (85kg) ng\u1ed3i \u1edf v\u1ecb tr\u00ed s\u1ed1 4.Tr\u01b0\u1eddng n\u00e0y th\u1ecfa m\u00e3n d\u1eef ki\u1ec7n \u0111\u1ec1 b\u00e0i cho. <br>X\u00e9t v\u1edbi tr\u01b0\u1eddng h\u1ee3p:<br><img src=\"https://asset.moon.vn/img/ai/Teachers/haquanghung/m158.png\" alt=\"m158.png\" width=\"637\" height=\"100\" border=\"0\"><br> K\u1ebft h\u1ee3p v\u1edbi d\u1eef ki\u1ec7n \u201cC\u00e2n n\u1eb7ng c\u1ee7a R kh\u00f4ng ph\u1ea3i l\u00e0 87 kg\u201d v\u00e0 \u201cT n\u1eb7ng 83 kg\u201d <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2024/9/29fd28d4-48cc-4e9d-a459-89c6210d4ead.png\"/> R n\u1eb7ng 89 ho\u1eb7c 92kg. <br><b>TH3.1: </b>R n\u1eb7ng 92 kg.<br><img src=\"https://asset.moon.vn/img/ai/Teachers/haquanghung/m159.png\" alt=\"m159.png\" width=\"649\" height=\"99\" border=\"0\"><br> M\u00e2u thu\u1eabn d\u1eef ki\u1ec7n \u201cQ ng\u1ed3i th\u1ee9 ba ph\u00eda b\u00ean tr\u00e1i c\u1ee7a ng\u01b0\u1eddi m\u00e0 c\u00f3 c\u00e2n n\u1eb7ng cao h\u01a1n ngay tr\u00ean R\u201d v\u00ec cao h\u01a1n R l\u00e0 ng\u01b0\u1eddi n\u1eb7ng nh\u1ea5t (96kg) m\u00e0 kh\u00f4ng c\u00f2n v\u1ecb tr\u00ed th\u1ee9 3 b\u00ean tr\u00e1i ng\u01b0\u1eddi n\u1eb7ng nh\u1ea5t cho Q ng\u1ed3i (Tr\u01b0\u1eddng h\u1ee3p n\u00e0y kh\u00f4ng th\u1ecfa m\u00e3n). <br><b>TH3.2: </b>R n\u1eb7ng 89 kg.<br><img src=\"https://asset.moon.vn/img/ai/Teachers/haquanghung/m160.png\" alt=\"m160.png\" width=\"623\" height=\"103\" border=\"0\"><br> D\u1ef1a v\u00e0o d\u1eef ki\u1ec7n: Q ng\u1ed3i th\u1ee9 ba ph\u00eda b\u00ean tr\u00e1i c\u1ee7a ng\u01b0\u1eddi m\u00e0 c\u00f3 c\u00e2n n\u1eb7ng cao h\u01a1n ngay tr\u00ean R. M\u00e0 c\u00e2n n\u1eb7ng cao h\u01a1n R c\u00f3 2 ng\u01b0\u1eddi l\u00e0 96 kg ho\u1eb7c 92 kg.Tr\u01b0\u1eddng h\u1ee3p Q ng\u1ed3i th\u1ee9 ba ph\u00eda b\u00ean tr\u00e1i ng\u01b0\u1eddi c\u00f3 c\u00e2n n\u1eb7ng 96 kg (lo\u1ea1i) v\u00ec t\u01b0\u01a1ng t\u1ef1 tr\u01b0\u1eddng h\u1ee3p TH3.1. <br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2024/9/6c458dc5-3dec-4ffc-a4c0-778f57fbcada.png\"/> Q ng\u1ed3i b\u00ean ph\u00eda b\u00ean tr\u00e1i ng\u01b0\u1eddi c\u00f3 c\u00e2n n\u1eb7ng 92 kg. <br>K\u1ebft h\u1ee3p v\u1edbi d\u1eef ki\u1ec7n \u201cC\u00e2n n\u1eb7ng c\u1ee7a P kh\u00f4ng ph\u1ea3i l\u00e0 92 kg hay 79 kg\u201d                                     <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
