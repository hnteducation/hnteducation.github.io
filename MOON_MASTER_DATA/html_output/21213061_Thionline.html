dd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\nS\u1eed d\u1ee5ng t\u00ednh ch\u1ea5t \u0111\u01b0\u1eddng ph\u00e2n gi\u00e1c trong tam gi\u00e1c.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>\nTheo \u0111\u1ec1 b\u00e0i, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/bb18be68-18fa-4121-bc9d-039cb1d3e122.png\"/> l\u00e0 \u0111\u01b0\u1eddng ph\u00e2n gi\u00e1c c\u1ee7a g\u00f3c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/48f7e5a1-2a3b-42b9-a0e3-5b19f4e49fc9.png\"/> (v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/73a125fd-ef56-44d7-9667-72675b451e4f.png\"/>).<br>\n\u00c1p d\u1ee5ng t\u00ednh ch\u1ea5t \u0111\u01b0\u1eddng ph\u00e2n gi\u00e1c v\u00e0o <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/bc480ce5-3670-4bb2-954c-15434fb112f2.png\"/>, ta c\u00f3 t\u1ec9 s\u1ed1 gi\u1eefa hai \u0111o\u1ea1n th\u1eb3ng tr\u00ean c\u1ea1nh \u0111\u1ed1i di\u1ec7n b\u1eb1ng t\u1ec9 s\u1ed1 gi\u1eefa hai c\u1ea1nh k\u1ec1 v\u1edbi hai \u0111o\u1ea1n th\u1eb3ng \u0111\u00f3:<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/913d2787-2036-4b1b-b463-9688a9d254a6.png\"/><br>\nBi\u1ec3u th\u1ee9c n\u00e0y ho\u00e0n to\u00e0n tr\u00f9ng kh\u1edbp v\u1edbi ph\u00e1t bi\u1ec3u.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u \u0111\u00fang.</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 2:</b> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/76e203bc-eb0a-48ea-a8aa-98b9006383ba.png\"/><br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\nS\u1eed d\u1ee5ng t\u00ednh ch\u1ea5t \u0111\u01b0\u1eddng ph\u00e2n gi\u00e1c v\u00e0 so s\u00e1nh.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>\nTheo \u0111\u1ec1 b\u00e0i, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/cdb59ef4-93cc-4371-92de-bc0775e2b2b8.png\"/> l\u00e0 \u0111\u01b0\u1eddng ph\u00e2n gi\u00e1c c\u1ee7a g\u00f3c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/d9a4d27e-8aeb-41ee-ba1b-68f97294180b.png\"/> (v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/5ce2a6c3-83bc-4e8d-83a5-43cd5a5c185d.png\"/>).<br>\n\u00c1p d\u1ee5ng t\u00ednh ch\u1ea5t \u0111\u01b0\u1eddng ph\u00e2n gi\u00e1c, ta c\u00f3:<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/94861b41-61a2-47ba-b942-24eb944843d6.png\"/><br>\nV\u00ec tam gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/090428b6-9315-485c-8c35-a5c22b2dad82.png\"/> c\u00e2n t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/438459d0-3059-419e-ba96-017f38ef2c6f.png\"/> n\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/afa121ff-4ec1-45bb-ab58-3d85be8cf069.png\"/>. Thay v\u00e0o bi\u1ec3u th\u1ee9c tr\u00ean ta \u0111\u01b0\u1ee3c: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7b71101b-4489-4154-86b5-c845a3a50273.png\"/>.<br>\nSo s\u00e1nh v\u1edbi ph\u00e1t bi\u1ec3u \u0111\u1ec1 b\u00e0i (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/09dd500b-1e12-43c4-9745-1d5545e77b98.png\"/>), ta th\u1ea5y v\u1ebf ph\u1ea3i kh\u00e1c nhau (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/9c706fff-7153-4140-86c7-434e85443d65.png\"/> kh\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/a637b19b-5012-4bb8-8f60-5703f2abfb04.png\"/>, c\u1ea1nh \u0111\u00e1y tam gi\u00e1c th\u01b0\u1eddng kh\u00f4ng b\u1eb1ng \u0111\u01b0\u1eddng ph\u00e2n gi\u00e1c).<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 2 l\u00e0 ph\u00e1t bi\u1ec3u sai.</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 3:</b> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/ae335394-362c-46ec-b011-a23dc6b93e1e.png\"/><br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\nS\u1eed d\u1ee5ng \u0111\u1ecbnh l\u00fd Thal\u00e8s \u0111\u1ea3o.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>\nT\u1eeb hai \u0111\u01b0\u1eddng ph\u00e2n gi\u00e1c trong tam gi\u00e1c c\u00e2n <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/b9694dd8-aaef-4842-95f9-31f763d99192.png\"/> (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/3052f252-6fcc-4563-b01c-ce6faa26f574.png\"/>), ta c\u00f3:<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/bdadbb03-8958-47c3-b8c3-a5bae5ce54f4.png\"/> (do <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/d0d7caa9-4969-41f5-a99d-edb35954025d.png\"/> l\u00e0 ph\u00e2n gi\u00e1c)<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/c378d07c-2f64-4c44-824c-bd65d527d30d.png\"/> (do <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/0665d023-c131-4b37-9569-af8c51444864.png\"/> l\u00e0 ph\u00e2n gi\u00e1c)<br>\nV\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/bf7b25a8-ad1d-4ff9-bc3e-6ecdb44e06fe.png\"/> n\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/1df37b61-4419-4e92-8ec1-ccc6c6fb2e16.png\"/>.<br>\nSuy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7045d0b3-1752-41a8-9086-c4a0eb6fde9b.png\"/>.<br>\nTheo \u0111\u1ecbnh l\u00fd Thal\u00e8s \u0111\u1ea3o, khi hai \u0111o\u1ea1n th\u1eb3ng t\u01b0\u01a1ng \u1ee9ng t\u1ec9 l\u1ec7 tr\u00ean hai c\u1ea1nh b\u00ean th\u00ec \u0111\u01b0\u1eddng th\u1eb3ng n\u1ed1i ch\u00fang song song v\u1edbi c\u1e                             } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
