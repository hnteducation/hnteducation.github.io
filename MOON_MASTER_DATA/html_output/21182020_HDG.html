        <style>
            @import url('https://fonts.googleapis.com/css2?family=Times+New+Roman&display=swap');
            @page { size: A4; margin: 1.5cm; }
            body { 
                font-family: 'Times New Roman', serif; 
                font-size: 13pt; 
                line-height: 1.4; 
                margin: 0; 
                text-align: justify;
                background-color: #fff;
            }
            
            .exam-header { text-align: center; border-bottom: 2px solid #000; margin-bottom: 20px; padding-bottom: 10px; }
            .exam-title { font-size: 16pt; font-weight: bold; text-transform: uppercase; }
            .exam-sub { font-size: 11pt; font-style: italic; color: #555; margin-top: 5px;}

            .group-context { 
                background-color: #f9f9f9; 
                border-left: 4px solid #0d47a1; 
                padding: 10px; 
                margin: 15px 0; 
                font-style: italic;
                page-break-inside: avoid;
            }
            .group-title { font-weight: bold; margin-bottom: 5px; color: #333; }
            
            .question-item { margin-bottom: 15px; clear: both; page-break-inside: avoid; }
            .q-num { font-weight: bold; float: left; margin-right: 5px; }
            .q-text { display: inline; }
            
            /* Xử lý ảnh và công thức toán */
            img { max-width: 100%; height: auto !important; vertical-align: middle; }
            img[src*="latex"] { zoom: 0.4; margin: 0 2px; vertical-align: middle; }
            img[src*="equation"] { zoom: 0.4; margin: 0 2px; vertical-align: middle; }
            img[src*="img/chat"], img[src*="asset.moon.vn/img"] { display: block; margin: 10px auto; zoom: 0.7; }
            
            /* Type 0: Lưới trắc nghiệm */
            .options-grid { display: flex; flex-wrap: wrap; margin-top: 5px; margin-left: 20px; }
            .opt { width: 50%; box-sizing: border-box; padding-right: 10px; margin-bottom: 5px; }
            
            /* Type 2: Bảng đúng sai */
            .tf-table { width: 100%; border-collapse: collapse; margin-top: 8px; margin-bottom: 8px; font-size: 13pt;}
            .tf-table td, .tf-table th { border: 1px solid #333; padding: 4px 8px; }
            .tf-header { background: #eee; text-align: center; font-weight: bold; }
            
            /* Type 1: Hộp điền đáp án dòng (Cho dạng tự luận dài) */
            .short-ans-line { 
                border: 1px solid #333; padding: 8px; width: 300px; 
                margin: 10px 0 10px 20px; min-height: 25px;
            }

            /* Type 1 & 3: Hộp điền đáp án ô vuông (Cho dạng trả lời ngắn) */
            .ans-box-container { 
                display: flex; align-items: center; gap: 5px; 
                margin-top: 10px; margin-left: 20px;
            }
            .ans-box-label { font-weight: bold; margin-right: 10px;}
            .ans-square { 
                width: 32px; height: 32px; border: 1px solid #000; 
                display: flex; align-items: center; justify-content: center;
                background: #fff;
            }

            /* Lời giải */
            .solution-block { 
                margin-top: 10px; padding: 10px; border: 1px dashed #d32f2f; 
                background: #fff5f5; display: block; font-size: 12pt;
            }
            .sol-label { font-weight: bold; color: #d32f2f; text-decoration: underline; }
            
            /* Bảng đáp án cuối trang */
            .ans-page-break { page-break-before: always; }
            .ans-section-title { font-weight: bold; margin-top: 20px; margin-bottom: 10px; border-bottom: 1px solid #ccc; }
            .ans-table { width: 100%; border-collapse: collapse; border: 2px solid #000; font-size: 12pt; text-align: center; }
            .ans-table td { border: 1px solid #000; padding: 5px; }
            
            @media print {
                .solution-block { display: block; }
            }
        </style>
