    <script>
        const EXAM_DATA = [{"title": "", "content": "", "listQuestion": [{"questionId": 21604782, "lessonId": 0, "a": "Hi\u1ec7n t\u01b0\u1ee3ng M\u1eb7t Tr\u1eddi l\u00ean cao, xu\u1ed1ng th\u1ea5p.", "b": "Hi\u1ec7n t\u01b0\u1ee3ng m\u00f9a xu\u00e2n d\u00e0i, m\u00f9a h\u00e8 ng\u1eafn.", "c": "Hi\u1ec7n t\u01b0\u1ee3ng ng\u00e0y d\u00e0i, ng\u00e0y ng\u1eafn.", "d": "Hi\u1ec7n t\u01b0\u1ee3ng M\u1eb7t Tr\u1eddi s\u00e1ng, t\u1ed1i.", "bookId": 1088667, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cVua tre\u0302n tr\u01a1\u0300i la\u0300 Ngo\u0323c Hoa\u0300ng co\u0301 hai co\u0302 con ga\u0301i \u0111e\u0323p. Ngo\u0323c Hoa\u0300ng ye\u0302u quy\u0301 hai na\u0300ng ne\u0302n cho ca\u0301c na\u0300ng h\u0103\u0300ng nga\u0300y lua\u0302n phie\u0302n nhau \u0111i xem xe\u0301t mo\u0323i vi\u1eb9\u0302c cu\u0309a ha\u0323 gi\u01a1\u0301i \u0111\u00ea\u0309 ba\u0301o la\u0323i cho nha\u0300 Tr\u01a1\u0300i. Co\u0302 ga\u0301i \u0111\u00e2\u0300u te\u0302n la\u0300 M\u1ea1\u0306t Tr\u01a1\u0300i \u0111u\u031b\u01a1\u0323c ng\u00f4\u0300i ki\u1eb9\u0302u hoa co\u0301 b\u00f4\u0301n ngu\u031b\u01a1\u0300i khie\u0302ng. B\u00f4\u0301n ngu\u031b\u01a1\u0300i na\u0300y chia la\u0300m hai t\u00f4\u0301p: m\u1ecd\u0302t t\u00f4\u0301p gia\u0300 va\u0300 m\u1ecd\u0302t t\u00f4\u0301p tre\u0309. T\u00f4\u0301p ca\u0301c cu\u0323 gia\u0300 khie\u0302ng ki\u1eb9\u0302u luo\u0302n luo\u0302n lo la\u0300m tro\u0323n ph\u1ea1\u0302n s\u01b0\u0323, cha\u0306m chi\u0309 va\u0300o co\u0302ng vi\u1eb9\u0302c ne\u0302n co\u0302 M\u1ea1\u0306t Tr\u01a1\u0300i thu\u031b\u01a1\u0300ng \u0111i m\u1ecd\u0302t vo\u0300ng r\u00e2\u0301t nhanh. Co\u0300n t\u00f4\u0301p tre\u0309 ba\u0309n ti\u0301nh la ca\u0300 ne\u0302n nh\u01b0\u0303ng l\u00e2\u0300n \u0111u\u031b\u01a1\u0323c pha\u0302n co\u0302ng khie\u0302ng ki\u1eb9\u0302u thu\u031b\u01a1\u0300ng v\u00ea\u0300 mu\u1ecd\u0302n. Vi\u0300 th\u00ea\u0301, m\u00f4\u0303i l\u00e2\u0300n M\u1ea1\u0306t Tr\u01a1\u0300i \u0111i v\u01a1\u0301i t\u00f4\u0301p tre\u0309 thi\u0300 nga\u0300y da\u0300i va\u0300 \u0111i v\u01a1\u0301i t\u00f4\u0301p gia\u0300 thi\u0300 nga\u0300y la\u0323i ng\u0103\u0301n.\u201d</i><br><div style=\"text-align: right;\">(Th\u1ea7n tho\u1ea1i Vi\u1ec7t Nam,<i> N\u1eef th\u1ea7n M\u1eb7t Tr\u1eddi v\u00e0 M\u1eb7t Tr\u0103ng</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, <br>NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>\u0110o\u1ea1n tr\u00edch l\u00ed gi\u1ea3i hi\u1ec7n t\u01b0\u1ee3ng n\u00e0o trong t\u1ef1 nhi\u00ean?", "answer": "\u0110o\u1ea1n tr\u00edch gi\u1ea3i th\u00edch hi\u1ec7n t\u01b0\u1ee3ng ng\u00e0y d\u00e0i, ng\u00e0y ng\u1eafn th\u00f4ng qua h\u00ecnh \u1ea3nh c\u00f4 con g\u00e1i c\u1ee7a Ng\u1ecdc Ho\u00e0ng l\u00e0 M\u1eb7t Tr\u1eddi v\u00e0 hai t\u1ed1p ng\u01b0\u1eddi khi\u00eang ki\u1ec7u. Khi t\u1ed1p ng\u01b0\u1eddi gi\u00e0 c\u1ea7n c\u00f9 khi\u00eang ki\u1ec7u, M\u1eb7t Tr\u1eddi di chuy\u1ec3n nhanh, ng\u00e0y ng\u1eafn l\u1ea1i. Ng\u01b0\u1ee3c l\u1ea1i, khi t\u1ed1p ng\u01b0\u1eddi tr\u1ebb l\u01b0\u1eddi bi\u1ebfng khi\u00eang ki\u1ec7u, M\u1eb7t Tr\u1eddi di chuy\u1ec3n ch\u1eadm, ng\u00e0y d\u00e0i ra.", "key": "C", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604784, "lessonId": 0, "a": "\u0110\u01b0\u1ee3c hai m\u1eb9 con ti\u1ebfp \u0111\u00e3i r\u1ea5t h\u1eadu.", "b": "Ngh\u0129: \u201cChu\u00f4ng kh\u00e1nh c\u00f2n ch\u1eb3ng \u0103n ai, n\u1eefa l\u00e0 m\u1ea3nh ch\u00ednh v\u1ee9t ngo\u00e0i b\u1edd tre\u201d.", "c": "\u0110\u1ed3ng \u00fd cho hai m\u1eb9 con \u0111i theo m\u00ecnh \u0111\u1ec3 \u0111\u01b0\u1ee3c \u0111\u1eafc \u0111\u1ea1o.", "d": "T\u00ecm v\u00e0o m\u1ed9t ng\u00f4i nh\u00e0 h\u1ebbo l\u00e1nh d\u1ecdc \u0111\u01b0\u1eddng \u0111\u1ec3 ngh\u1ec9 ch\u00e2n.", "bookId": 1088668, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cM\u1ed9t h\u00f4m, sau khi v\u01b0\u1ee3t qua m\u1ed9t tr\u00e1i n\u00fai, s\u01b0 n\u1eef t\u00ecm v\u00e0o m\u1ed9t ng\u00f4i nh\u00e0 h\u1ebbo l\u00e1nh d\u1ecdc \u0111\u01b0\u1eddng \u0111\u1ec3 ngh\u1ec9 ch\u00e2n. Hai m\u1eb9 con ch\u1ee7 nh\u00e2n tuy ng\u01b0\u1eddi r\u1eebng n\u00fai qu\u00ea m\u00f9a nh\u01b0ng v\u1ed1n l\u00e0 k\u1ebb \u0103n chay ni\u1ec7m Ph\u1eadt, n\u00ean th\u1ea5y kh\u00e1ch l\u00e0 nh\u00e0 tu h\u00e0nh th\u00ec ti\u1ebfp \u0111\u00e3i r\u1ea5t h\u1eadu. Khi \u0111\u01b0\u1ee3c nghe k\u1ec3 c\u00f4ng tr\u00ecnh tu luy\u1ec7n c\u1ee7a s\u01b0 n\u1eef h\u1ecd c\u00e0ng cung k\u00ednh, coi nh\u01b0 b\u1eadc th\u1ea7y. V\u00e0 khi bi\u1ebft r\u00f5 \u00fd \u0111\u1ecbnh c\u1ee7a s\u01b0 n\u1eef th\u00ec h\u1ecd c\u0169ng xin ph\u00e9p b\u1ecf nh\u00e0 b\u1ecf c\u1eeda \u0111i theo th\u1ea7y \u0111\u1ec3 mong \u0111\u01b0\u1ee3c \u0111\u1eafc \u0111\u1ea1o. Nghe h\u1ecd c\u1ea7u kh\u1ea9n, s\u01b0 n\u1eef c\u01b0\u1eddi:<br>- Hai m\u1eb9 con nh\u00e0 n\u00e0y c\u0169ng mu\u1ed1n th\u00e0nh Ph\u1eadt \u01b0? \u0110\u01b0\u1ee3c, c\u1ee9 \u0111i theo ta!<br>Nh\u01b0ng b\u1ee5ng n\u00e0ng b\u1ea3o d\u1ea1: \u201cChu\u00f4ng kh\u00e1nh c\u00f2n ch\u1eb3ng \u0103n ai, n\u1eefa l\u00e0 m\u1ea3nh ch\u00ednh v\u1ee9t ngo\u00e0i b\u1edd tre\u201d.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u0110\u1ed5ng Chi, <i>S\u1ef1 t\u00edch \u00d4ng B\u00ecnh v\u00f4i</i>, theo <i>Kho t\u00e0ng truy\u1ec7n c\u1ed5 t\u00edch Vi\u1ec7t Nam</i>, t\u1eadp 1, NXB Gi\u00e1o d\u1ee5c, 2000)</div>Chi ti\u1ebft n\u00e0o kh\u1eafc ho\u1ea1 s\u1ef1 b\u1ea5t thi\u1ec7n c\u1ee7a s\u01b0 n\u1eef?<br>", "answer": "Chi ti\u1ebft S\u01b0 n\u1eef ngh\u0129: \u201cChu\u00f4ng kh\u00e1nh c\u00f2n ch\u1eb3ng \u0103n ai, n\u1eefa l\u00e0 m\u1ea3nh ch\u00ednh v\u1ee9t ngo\u00e0i b\u1edd tre\u201d cho th\u1ea5y s\u1ef1 b\u1ea5t thi\u1ec7n c\u1ee7a s\u01b0 n\u1eef. B\u1ec1 ngo\u00e0i, s\u01b0 n\u1eef \u0111\u1ed3ng \u00fd cho hai m\u1eb9 con theo h\u1ecdc \u0111\u1ea1o, nh\u01b0ng trong l\u00f2ng l\u1ea1i khinh mi\u1ec7t, coi th\u01b0\u1eddng h\u1ecd, xem h\u1ecd kh\u00f4ng \u0111\u00e1ng gi\u00e1, ch\u1eb3ng c\u00f3 kh\u1ea3 n\u0103ng \u0111\u1eafc \u0111\u1ea1o, v\u00ed h\u1ecd nh\u01b0 m\u1ea3nh s\u00e0nh v\u1ee9t ngo\u00e0i b\u1edd tre - nh\u1eefng th\u1ee9 v\u00f4 d\u1ee5ng, kh\u00f4ng c\u00f3 gi\u00e1 tr\u1ecb.", "key": "B", "isVideo": true, "score": 0, "order": 2, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604788, "lessonId": 0, "a": "Hai c\u00e2u \u0111\u1ec1.", "b": "Hai c\u00e2u th\u1ef1c.", "c": "Hai c\u00e2u lu\u1eadn.", "d": "Hai c\u00e2u k\u1ebft.", "bookId": 1088669, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cAm tr\u00fac hi\u00ean mai  ng\u00e0y th\u00e1ng qua,<br>Th\u1ecb phi  n\u00e0o \u0111\u1ebfn c\u00f5i y\u00ean h\u00e0 .<br>B\u1eefa \u0103n d\u00f9 c\u00f3 d\u01b0a mu\u1ed1i<br>\u00c1o m\u1eb7c n\u00e0i chi g\u1ea5m l\u00e0 .<br>N\u01b0\u1edbc d\u01b0\u1ee1ng  cho thanh \u0111\u00eca  th\u01b0\u1edfng nguy\u1ec7t,<br>\u0110\u1ea5t c\u00e0y ng\u00f5 \u1ea3i  l\u1ea3nh  \u01b0\u01a1ng hoa.<br>Trong khi h\u1ee9ng \u0111\u1ed9ng  v\u1eeba \u0111\u00eam tuy\u1ebft<br>Ng\u00e2m \u0111\u01b0\u1ee3c c\u00e2u th\u1ea7n d\u1eafng d\u1eafng  ca.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Tr\u00e3i, <i>Ng\u00f4n ch\u00ed,</i> b\u00e0i 3, theo <i>Nguy\u1ec5n Tr\u00e3i th\u01a1 v\u00e0 \u0111\u1eddi,</i> NXB V\u0103n h\u1ecdc, 2016)</div>C\u1eb7p c\u00e2u th\u01a1 n\u00e0o di\u1ec5n t\u1ea3 cu\u1ed9c s\u1ed1ng thanh \u0111\u1ea1m c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh?", "answer": "Hai c\u00e2u th\u01a1 <i>B\u1eefa \u0103n d\u00f9 c\u00f3 d\u01b0a mu\u1ed1i/\u00c1o m\u1eb7c n\u00e0i chi g\u1ea5m</i> l\u00e0 mi\u00eau t\u1ea3 cu\u1ed9c s\u1ed1ng thanh \u0111\u1ea1m, gi\u1ea3n d\u1ecb c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh. B\u1eefa \u0103n ch\u1ec9 c\u00f3 d\u01b0a mu\u1ed1i \u0111\u1ea1m b\u1ea1c, \u00e1o m\u1eb7c kh\u00f4ng c\u1ea7u k\u00ec g\u1ea5m v\u00f3c, d\u00f9 v\u1eady nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh v\u1eabn c\u1ea3m th\u1ea5y h\u00e0i l\u00f2ng, an nhi\u00ean.", "key": "B", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604793, "lessonId": 0, "a": "Treo m\u0169 t\u1eeb quan, tr\u1edf v\u1ec1 v\u1edbi v\u01b0\u1eddn ru\u1ed9ng.", "b": "Nhi\u1ec1u l\u1ea7n can ng\u0103n nh\u00e0 vua kh\u00f4ng nghe, l\u1ea1i d\u00e2ng s\u1edb xin ch\u00e9m b\u1ea3y t\u00ean gian th\u1ea7n.", "c": "Ng\u01b0\u1eddi \u0111i\u1ec1m \u0111\u1ea1m, \u00edt ham mu\u1ed1n, kh\u00f4ng \u0111i thi.", "d": "L\u00e0m ch\u1ee9c T\u1ebf t\u1eedu nh\u00e0 Th\u00e1i h\u1ecdc.", "bookId": 1088670, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cChu An l\u00e0 ng\u01b0\u1eddi \u0111i\u1ec1m \u0111\u1ea1m, \u00edt ham mu\u1ed1n, kh\u00f4ng \u0111i thi. Kho\u1ea3ng n\u0103m Ch\u00ed Nguy\u00ean , Tr\u1ea7n Minh V\u01b0\u01a1ng  c\u00f3 v\u1eddi \u00f4ng \u0111\u1ebfn Kinh \u0110\u00f4 trao cho ch\u1ee9c Qu\u1ed1c t\u1eed T\u01b0 nghi\u1ec7p, gi\u1ea3ng s\u00e1ch cho Th\u1ebf t\u1eed . \u0110\u01b0\u1ee3c \u00edt l\u00e2u chuy\u1ec3n l\u00e0m ch\u1ee9c T\u1ebf t\u1eedu nh\u00e0 Th\u00e1i h\u1ecdc. \u0110\u1ebfn khi Minh V\u01b0\u01a1ng m\u1ea5t, con l\u00e0 D\u1ee5 V\u01b0\u01a1ng  hay ch\u01a1i b\u1eddi, b\u1ecf vi\u1ec7c n\u01b0\u1edbc, b\u1ecdn quy\u1ec1n th\u1ea7n d\u1ea7n d\u1ea7n l\u00e0m nhi\u1ec1u \u0111i\u1ec1u tr\u00e1i ph\u00e9p, Chu An nhi\u1ec1u l\u1ea7n can ng\u0103n nh\u00e0 vua kh\u00f4ng nghe, l\u1ea1i d\u00e2ng s\u1edb xin ch\u00e9m b\u1ea3y t\u00ean gian th\u1ea7n \u0111\u1ec1u l\u00e0 h\u1ea1ng quy\u1ec1n th\u1ebf c\u1ea3, ng\u01b0\u1eddi \u0111\u01b0\u01a1ng th\u1eddi g\u1ecdi \u0111\u00f3 l\u00e0 \u201cTh\u1ea5t tr\u1ea3m s\u1edb\u201d. T\u1edd s\u1edb d\u00e2ng l\u00ean nh\u01b0ng kh\u00f4ng \u0111\u01b0\u1ee3c tr\u1ea3 l\u1eddi, Chu An b\u00e8n treo m\u0169 t\u1eeb quan, tr\u1edf v\u1ec1 v\u1edbi v\u01b0\u1eddn ru\u1ed9ng.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Nguy\u00ean Tr\u1eebng,<i> V\u0103n Trinh c\u1ee9ng c\u1ecfi v\u00e0 ngay th\u1eb3ng</i>, theo <i>Nam \u00d4ng m\u1ed9ng l\u1ee5c</i>, NXB V\u0103n h\u1ecdc, 2008)</div>Chi ti\u1ebft n\u00e0o t\u00f4 \u0111\u1eadm t\u00ednh c\u00e1ch c\u01b0\u01a1ng tr\u1ef1c, th\u1eb3ng th\u1eafn, th\u1ea5y tai ch\u01b0\u1edbng th\u00ec kh\u00f4ng ch\u1ecbu n\u1ed5i c\u1ee7a Chu An?<br>", "answer": "Chi ti\u1ebft nhi\u1ec1u l\u1ea7n can ng\u0103n nh\u00e0 vua kh\u00f4ng nghe, l\u1ea1i d\u00e2ng s\u1edb xin ch\u00e9m b\u1ea3y t\u00ean gian th\u1ea7n t\u00f4 \u0111\u1eadm t\u00ednh c\u00e1ch c\u01b0\u01a1ng tr\u1ef1c, th\u1eb3ng th\u1eafn c\u1ee7a Chu An. H\u00e0nh \u0111\u1ed9ng d\u00e2ng s\u1edb xin ch\u00e9m b\u1ea3y t\u00ean gian th\u1ea7n, b\u1ea5t ch\u1ea5p nguy hi\u1ec3m \u0111\u1ebfn b\u1ea3n th\u00e2n, cho th\u1ea5y \u00f4ng l\u00e0 ng\u01b0\u1eddi kh\u00f4ng s\u1ee3 quy\u1ec1n th\u1ebf, quy\u1ebft tr\u1eeb gian di\u1ec7t b\u1ea1o v\u00e0 kh\u00f4ng th\u1ec3 im l\u1eb7ng tr\u01b0\u1edbc nh\u1eefng h\u00e0nh vi sai tr\u00e1i, g\u00e2y h\u1ea1i cho \u0111\u1ea5t n\u01b0\u1edbc.", "key": "B", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604798, "lessonId": 0, "a": "N\u00f3i m\u1ec9a, n\u00f3i qu\u00e1.", "b": "So s\u00e1nh, \u1ea9n d\u1ee5.", "c": "Ngh\u1ecbch ng\u1eef, ph\u00e9p \u0111i\u1ec7p.", "d": "Li\u1ec7t k\u00ea, ph\u00e9p \u0111\u1ed1i.", "bookId": 1088671, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cC\u00f3 m\u1ed9t c\u00f4 l\u00e1i,<br>Nu\u00f4i m\u1ed9t th\u1ea7y \u0111\u1ed3,<br>Qu\u1ea7n \u00e1o r\u00e1ch r\u01b0\u1edbi,<br>\u0102n u\u1ed1ng x\u00f4 b\u1ed3,<br>C\u01a1m hai b\u1eefa: c\u00e1 kho, rau mu\u1ed1ng;<br>Qu\u00e0 m\u1ed9t chi\u1ec1u: khoai lang, l\u00faa ng\u00f4.\u201d</i><br><div style=\"text-align: right;\">(Tr\u1ea7n T\u1ebf X\u01b0\u01a1ng, <i>Ph\u00fa th\u1ea7y \u0111\u1ed3 d\u1ea1y h\u1ecdc, b\u00e0i 2</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>C\u00e1c bi\u1ec7n ph\u00e1p tu t\u1eeb n\u00e0o \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong \u0111o\u1ea1n th\u01a1 tr\u00ean?", "answer": "C\u00e1c bi\u1ec7n ph\u00e1p tu t\u1eeb \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong \u0111o\u1ea1n th\u01a1 l\u00e0:<br>\n- Li\u1ec7t k\u00ea: c\u00e1c chi ti\u1ebft li\u1ec7t k\u00ea v\u1ec1 sinh ho\u1ea1t, ho\u00e0n c\u1ea3nh s\u1ed1ng c\u1ee7a th\u1ea7y \u0111\u1ed3 nh\u01b0 <i>qu\u1ea7n \u00e1o r\u00e1ch r\u01b0\u1edbi, \u0103n u\u1ed1ng x\u00f4 b\u1ed3, c\u01a1m hai b\u1eefa\u2026</i><br>\n- Ph\u00e9p \u0111\u1ed1i: <i>C\u01a1m hai b\u1eefa: c\u00e1 kho, rau mu\u1ed1ng </i>\u0111\u1ed1i v\u1edbi <i>Qu\u00e0 m\u1ed9t chi\u1ec1u: khoai lang, l\u00faa ng\u00f4</i> t\u1ea1o n\u00ean s\u1ef1 c\u00e2n x\u1ee9ng, nh\u1ecbp nh\u00e0ng cho c\u00e2u th\u01a1, \u0111\u1ed3ng th\u1eddi nh\u1ea5n m\u1ea1nh \u0111\u1eddi s\u1ed1ng \u0111\u1ee7 \u0111\u00e2y c\u1ee7a th\u1ea7y \u0111\u1ed3.\n", "key": "D", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604804, "lessonId": 0, "a": "Ch\u00e0ng th\u1ea5y nh\u1eefng \u0111\u00e1m m\u00e2y l\u01a1 l\u1eedng c\u00f2n cao h\u01a1n s\u00e1ng nay.", "b": "Qua m\u1ea5y \u0111\u00e1m m\u00e2y, ch\u00e0ng c\u00f3 th\u1ec3 th\u1ea5y nh\u1eefng kho\u1ea3ng kh\u00f4ng v\u00f4 t\u1eadn m\u00e0u xanh ng\u1eaft.", "c": "D\u00f9 kh\u00f4ng quay \u0111\u1ea7u l\u1ea1i v\u00e0 kh\u00f4ng tr\u00f4ng th\u1ea5y ng\u01b0\u1eddi nh\u01b0ng c\u00f3 th\u1ec3 \u0111o\u00e1n bi\u1ebft ti\u1ebfng v\u00f3 ng\u1ef1a v\u00e0 ti\u1ebfng n\u00f3i \u0111ang \u0111i v\u1ec1 ph\u00eda m\u00ecnh.", "d": "Ch\u00e0ng m\u1edf m\u1eaft ra, nh\u00ecn l\u00ean b\u1ea7u tr\u1eddi cao.", "bookId": 1088672, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cCh\u00e0ng b\u1eaft \u0111\u1ea7u l\u1eafng tai nghe ng\u00f3ng, v\u00e0 c\u00f3 th\u1ea5y ti\u1ebfng ng\u1ef1a \u0111ang \u0111i l\u1ea1i g\u1ea7n v\u00e0 ti\u1ebfng ng\u01b0\u1eddi n\u00f3i b\u1eb1ng ti\u1ebfng Ph\u00e1p. Ch\u00e0ng m\u1edf m\u1eaft ra. \u1ede tr\u00ean \u0111\u1ea7u, ch\u00e0ng th\u1ea5y l\u1ea1i b\u1ea7u tr\u1eddi cao, v\u1eabn b\u1ea7u tr\u1eddi \u1ea5y v\u00e0 nh\u1eefng \u0111\u00e1m m\u00e2y l\u01a1 l\u1eedng c\u00f2n cao h\u01a1n s\u00e1ng nay. Qua m\u1ea5y \u0111\u00e1m m\u00e2y \u1ea5y c\u00f3 th\u1ec3 th\u1ea5y nh\u1eefng kho\u1ea3ng kh\u00f4ng v\u00f4 t\u1eadn m\u00e0u xanh ng\u1eaft. Ch\u00e0ng kh\u00f4ng quay \u0111\u1ea7u l\u1ea1i v\u00e0 kh\u00f4ng tr\u00f4ng th\u1ea5y ng\u01b0\u1eddi m\u00e0 c\u1ee9 nghe ti\u1ebfng v\u00f3 ng\u1ef1a v\u00e0 ti\u1ebfng n\u00f3i c\u00f3 th\u1ec3 \u0111o\u00e1n bi\u1ebft l\u00e0 \u0111ang \u0111i v\u1ec1 ph\u00eda ch\u00e0ng.\u201d</i><br><div style=\"text-align: right;\">(L\u00e9p T\u00f4n-xt\u00f4i, <i>Chi\u1ebfn tranh v\u00e0 ho\u00e0 b\u00ecnh</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 12</i>, NXB \u0110\u1ea1i h\u1ecdc Hu\u1ebf, 2024)</div>Chi ti\u1ebft n\u00e0o <b>kh\u00f4ng </b>nh\u1eb1m mi\u00eau t\u1ea3 t\u00e2m h\u1ed3n tinh t\u1ebf, nh\u1ea1y c\u1ea3m c\u1ee7a nh\u00e2n v\u1eadt?<br>", "answer": "Chi ti\u1ebft \u201cCh\u00e0ng m\u1edf m\u1eaft ra, nh\u00ecn l\u00ean b\u1ea7u tr\u1eddi cao.\u201d ch\u1ec9 m\u00f4 t\u1ea3 h\u00e0nh \u0111\u1ed9ng ng\u1eafm nh\u00ecn b\u1ea7u tr\u1eddi, kh\u00f4ng th\u1ec3 hi\u1ec7n t\u00e2m h\u1ed3n tinh t\u1ebf, nh\u1ea1y c\u1ea3m c\u1ee7a nh\u00e2n v\u1eadt.", "key": "D", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604809, "lessonId": 0, "a": "G\u1ee3i c\u1ea3m nh\u1eadn v\u1ec1 t\u00ecnh y\u00eau b\u00e9 m\u1ecdn, t\u1ea7m th\u01b0\u1eddng.", "b": "Di\u1ec5n t\u1ea3 s\u1ef1 \u0111eo b\u00e1m c\u1ee7a ch\u00e0ng trai \u0111\u1ec3 gi\u00e0nh \u0111\u01b0\u1ee3c t\u00ecnh y\u00eau c\u1ee7a c\u00f4 g\u00e1i.", "c": "G\u1ee3i nh\u1eefng tr\u1eafc tr\u1edf trong t\u00ecnh y\u00eau.", "d": "Di\u1ec5n t\u1ea3 t\u00ecnh y\u00eau gi\u1ea3n d\u1ecb, m\u1ed9c m\u1ea1c m\u00e0 n\u1ed3ng n\u00e0n, s\u00e2u s\u1eafc \u201canh\u201d d\u00e0nh cho \u201cem\u201d.", "bookId": 1088673, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cH\u1ed3n anh nh\u01b0 hoa c\u1ecf may<br>M\u1ed9t chi\u1ec1u c\u1ea3 gi\u00f3 b\u00e1m \u0111\u1ea7y \u00e1o em.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n B\u00ednh, <i>Hoa c\u1ecf may,</i> theo <i>Nguy\u1ec5n B\u00ednh th\u01a1 v\u00e0 \u0111\u1eddi</i>, NXB V\u0103n h\u1ecdc, 2003)</div>Ph\u00e9p so s\u00e1nh trong l\u1eddi th\u01a1 c\u00f3 t\u00e1c d\u1ee5ng g\u00ec?", "answer": "C\u00e2u th\u01a1 so s\u00e1nh \u201ch\u1ed3n anh\u201d (t\u00ecnh y\u00eau c\u1ee7a ch\u00e0ng trai) v\u1edbi \u201choa c\u1ecf may\u201d \u2013 lo\u00e0i c\u1ecf nh\u1ecf b\u00e9, m\u1ed9c m\u1ea1c, c\u00f3 \u0111\u1eb7c t\u00ednh b\u00e1m ch\u1eb7t v\u00e0o qu\u1ea7n \u00e1o, kh\u00f3 g\u1ee1 b\u1ecf. Ph\u00e9p so s\u00e1nh n\u00e0y cho th\u1ea5y t\u00ecnh y\u00eau gi\u1ea3n d\u1ecb, m\u1ed9c m\u1ea1c nh\u01b0ng ch\u00e2n th\u00e0nh,  nguy\u1ec7n, ch\u1ecb van xin, tr\u1ea3 l\u1eddi l\u00e0 t\u1eebng c\u01a1n \u0111au x\u00e9 ru\u1ed9t.\u201d</i><br><div style=\"text-align: right;\">(M\u1ea1c Ng\u00f4n,<i style=\"\"> B\u00e1u v\u1eadt c\u1ee7a \u0111\u1eddi,</i> NXB V\u0103n ngh\u1ec7 Th\u00e0nh ph\u1ed1 H\u1ed3 Ch\u00ed Minh, 2001)</div>\u0110o\u1ea1n v\u0103n mi\u00eau t\u1ea3 t\u00e2m tr\u1ea1ng n\u00e0o c\u1ee7a nh\u00e2n v\u1eadt \u201cch\u1ecb\u201d?", "answer": "\u0110o\u1ea1n v\u0103n mi\u00eau t\u1ea3 t\u00e2m tr\u1ea1ng c\u1ee7a ng\u01b0\u1eddi m\u1eb9 tr\u01b0\u1edbc ng\u00e0y sinh n\u1edf:<br>\n- Nh\u1eefng gi\u1ea5c m\u01a1 k\u00ec l\u1ea1 v\u1ec1 c\u00e1i b\u1ee5ng ch\u1eeda \u0111\u1ea7y s\u1eaft th\u00e9p ho\u1eb7c c\u00f3c cho th\u1ea5y s\u1ef1 b\u1ea5t an, lo l\u1eafng c\u1ee7a ng\u01b0\u1eddi m\u1eb9.<br>\n- L\u1eddi c\u1ea7u nguy\u1ec7n \u201cgi\u00fap con sinh \u0111\u01b0\u1ee3c m\u1ed9t ch\u00e1u trai \u0111\u1ee7 tai \u0111\u1ee7 m\u1eaft\u201d th\u1ec3 hi\u1ec7n mong mu\u1ed1n \u0111\u1ee9a con sinh ra kh\u1ecfe m\u1ea1nh, l\u00e0nh l\u1eb7n.<br>\n\u2192 \u0110o\u1ea1n v\u0103n mi\u00eau t\u1ea3 t\u00e2m tr\u1ea1ng th\u1ea5p th\u1ecfm, nhi\u1ec1u \u00e2u lo c\u1ee7a ng\u01b0\u1eddi m\u1eb9 tr\u01b0\u1edbc ng\u00e0y sinh n\u1edf v\u00e0 mong \u01b0\u1edbc \u201cm\u1eb9 tr\u00f2n con vu\u00f4ng\u201d.\n", "key": "B", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604815, "lessonId": 0, "a": "Bi\u1ebft \u0111\u1ea1o l\u00e0m con, \u0111\u1ed9i tr\u00f2n ch\u1eef hi\u1ebfu.", "b": "\u0110\u1eb7t ch\u1eef \u201chi\u1ebfu\u201d l\u00ean tr\u01b0\u1edbc ch\u1eef \u201ctrung\u201d.", "c": "\u0110\u1eb7t ch\u1eef \u201ctrung\u201d l\u00ean tr\u01b0\u1edbc ch\u1eef \u201chi\u1ebfu\u201d.", "d": "Tho\u00e1i ch\u00ed gi\u1eef th\u00e2n m\u00ecnh.", "bookId": 1088675, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cKIM L\u00c2N (N\u00f3i)<br>(D\u1ea1, tr\u0103m l\u1ea1y m\u1eb9, s\u00e1 \u0111\u1ed7i: lo\u00e0i c\u00f4n tr\u00f9ng do tri ph\u1ee5 m\u1eabu chi t\u00ecnh thay; hu\u1ed1ng chi, nh\u00e2n sinh v\u1ea1n v\u1eadt t\u1ed1i linh, h\u00e0 nh\u1eabn kh\u00ed sinh th\u00e0nh chi \u0111\u1ea1i ngh\u0129a .)<br>Con d\u00f9 b\u1ecf m\u1eb9<br>Sao ph\u1ea3i \u0111\u1ea1o con<br>Ch\u00e2n \u0111\u1ea1p vu\u00f4ng \u0111\u1ea7u h\u00e3y \u0111\u1ed9i tr\u00f2n<br>M\u1ea5t th\u1ea3o \u1ea5y sao r\u1eb1ng hi\u1ebfu t\u1eed ?<br>\u0110\u1ed4NG M\u1eaaU (N\u00f3i)<br>(Con!)<br>Tr\u01b0\u1ee3ng phu \u0111\u1eebng tho\u00e1i ch\u00ed<br>Tho\u00e1i ch\u00ed b\u1ea5t tr\u01b0\u1ee3ng phu<br>Con h\u00e3y ngay c\u00f9ng n\u01b0\u1edbc c\u00f9ng vua<br>\u1ea4y l\u00e0 th\u1ea3o v\u1edbi cha v\u1edbi m\u1eb9<br>H\u00e3y ph\u00f2 an nghi\u1ec7p ch\u00faa<br>Cho r\u1ea1ng ti\u1ebft nh\u00e2n th\u1ea7n<br>L\u1ea5y ch\u1eef trung ch\u1eef hi\u1ebfu con c\u00e2n.<br>(C\u00f3 ph\u1ea3i)<br>Ch\u1eef trung \u1ea5y n\u1eb7ng h\u01a1n ch\u1eef hi\u1ebfu (\u0111\u00f3 con).\u201d</i><br><div style=\"text-align: right;\">(<i>S\u01a1n H\u1eadu,</i> theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10,</i> NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div>\u0110\u1ed5ng M\u1eabu khuy\u00ean con trai Kim L\u00e2n \u0111i\u1ec1u g\u00ec?", "answer": "D\u1ef1a v\u00e0o c\u00e1c d\u00f2ng th\u01a1: <i>L\u1ea5y ch\u1eef trung ch\u1eef hi\u1ebfu con c\u00e2n./Ch\u1eef trung \u1ea5y n\u1eb7ng h\u01a1n ch\u1eef hi\u1ebfu (\u0111\u00f3 con).</i><br>\n\u2192 \u0110\u1ed5ng M\u1eabu khuy\u00ean con trai Kim L\u00e2n ph\u1ea3i \u0111\u1eb7t ch\u1eef \u201ctrung\u201d l\u00ean tr\u01b0\u1edbc ch\u1eef \u201chi\u1ebfu\u201d, coi vi\u1ec7c ph\u1ee5ng s\u1ef1 \u0111\u1ea5t n\u01b0\u1edbc (trung v\u1edbi vua) tr\u01b0\u1edbc c\u1ea3 l\u00f2ng hi\u1ebfu th\u1ea3o v\u1edbi cha m\u1eb9.\n", "key": "C", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604817, "lessonId": 0, "a": "H\u00ecnh t\u01b0\u1ee3ng ngh\u1ec7 thu\u1eadt trang nh\u00e3.", "b": "H\u00ecnh t\u01b0\u1ee3ng thi\u00ean nhi\u00ean k\u00ec v\u0129, l\u1edbn lao.", "c": "H\u00ecnh t\u01b0\u1ee3ng ngh\u1ec7 thu\u1eadt h\u01b0\u1edbng t\u1edbi \u00e1nh s\u00e1ng, c\u00e1i \u0111\u1eb9p.", "d": "H\u00ecnh t\u01b0\u1ee3ng ngh\u1ec7 thu\u1eadt l\u00e3ng m\u1ea1n, th\u01a1 m\u1ed9ng.", "bookId": 1088676, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cL\u1ee5c nguy\u1ec7t nh\u1ecb th\u1eadp t\u1ee9,<br>Th\u01b0\u1edbng \u0111\u00e1o th\u1eed s\u01a1n lai.<br>C\u1eed \u0111\u1ea7u h\u1ed3ng nh\u1eadt c\u1eadn,<br>\u0110\u1ed1i ng\u1ea1n nh\u1ea5t chi mai.\u201d</i><br>L\u0169ng D\u00e8, 1942<br><div style=\"text-align: right;\"><i>(</i>H\u1ed3 Ch\u00ed Minh<i>, Th\u01b0\u1edbng s\u01a1n)</i></div>D\u1ecbch ngh\u0129a:<br><i>\u201cNg\u00e0y hai m\u01b0\u01a1i b\u1ed1n th\u00e1ng s\u00e1u,<br>Tr\u00e8o l\u00ean tr\u00ean n\u00fai n\u00e0y.<br>Ng\u1ea9ng \u0111\u1ea7u th\u1ea5y g\u1ea7n m\u1eb7t tr\u1eddi \u0111\u1ecf,<br>B\u1edd b\u00ean kia, c\u00f3 m\u1ed9t nh\u00e0nh mai.\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh,<i> L\u00ean n\u00fai</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Nh\u1eadn \u0111\u1ecbnh n\u00e0o sau \u0111\u00e2y nh\u1eadn x\u00e9t \u0111\u00fang v\u1edbi \u0111\u1eb7c \u0111i\u1ec3m c\u1ee7a h\u00ecnh t\u01b0\u1ee3ng ngh\u1ec7 thu\u1eadt trong b\u00e0i th\u01a1?<br>", "answer": "H\u00ecnh t\u01b0\u1ee3ng ngh\u1ec7 thu\u1eadt trong b\u00e0i th\u01a1 h\u01b0\u1edbng t\u1edbi \u00e1nh s\u00e1ng, c\u00e1i \u0111\u1eb9p:<br>\n+ Hai c\u00e2u th\u01a1 \u0111\u1ea7u: Mi\u00eau t\u1ea3 h\u00e0nh tr\u00ecnh leo n\u00fai, g\u1ee3i s\u1ef1 v\u1ea5t v\u1ea3, ki\u00ean tr\u00ec nh\u01b0ng c\u0169ng \u0111\u1ea7y quy\u1ebft t\u00e2m.<br>\n+ Hai c\u00e2u th\u01a1 sau: Nh\u1eafc t\u1edbi h\u00ecnh \u1ea3nh \u201cm\u1eb7t tr\u1eddi \u0111\u1ecf\u201d t\u01b0\u1ee3ng tr\u01b0ng cho \u00e1nh s\u00e1ng, l\u00fd t\u01b0\u1edfng c\u00e1ch m\u1ea1ng, ni\u1ec1m tin v\u00e0o t\u01b0\u01a1ng lai t\u01b0\u01a1i s\u00e1ng v\u00e0 \u201cnh\u00e0nh mai\u201d - bi\u1ec3u t\u01b0\u1ee3ng c\u1ee7a v\u1ebb \u0111\u1eb9p thanh khi\u1ebft.\n", "key": "C", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604821, "lessonId": 0, "a": "L\u00e0ng qu\u00ea.", "b": "Th\u00e0nh ph\u1ed1.", "c": "Mi\u1ec1n n\u00fai.", "d": "Mi\u1ec1n duy\u00ean h\u1ea3i.", "bookId": 1088677, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNh\u01b0ng ch\u1ec9 b\u1eefa sau \u0111\u00e1m c\u01b0\u1edbi, c\u00f4 d\u00e2u m\u1edbi \u0111\u00e3 ph\u1ea3i xo\u1eafn tay \u00e1o h\u00ec h\u1ee5i t\u00e1t n\u01b0\u1edbc, k\u00ea cao nh\u1eefng v\u1eadt d\u1ee5ng trong nh\u00e0. Sau tr\u1eadn m\u01b0a khuya \u0111\u01b0\u1eddng s\u00e1 bi\u1ebfn th\u00e0nh s\u00f4ng, n\u01b0\u1edbc tr\u00e0n v\u00e0o l\u00f2ng nh\u1eefng c\u0103n nh\u00e0 th\u1ea5p h\u1ec7t thung l\u0169ng, sau m\u1ea5y b\u1eadn ng\u01b0\u1eddi ta c\u01a1i cao m\u1eb7t \u0111\u01b0\u1eddng ch\u1ed1ng ng\u1eadp. N\u01b0\u1edbc m\u01b0a v\u00e0 tri\u1ec1u c\u01b0\u1eddng c\u1ee9 d\u00f9ng d\u1eb1ng m\u00e3i tr\u00ean \u0111\u01b0\u1eddng kh\u00f4ng ch\u1ecbu r\u00fat. C\u00f4 th\u1ea5y c\u00e1i c\u1ea3nh m\u00ecnh xo\u1eafn qu\u1ea7n l\u1ed9i l\u00f2 d\u00f2 \u0111i gi\u1eefa r\u00e1c r\u01b0\u1edfi v\u00e0 n\u01b0\u1edbc c\u1ed1ng r\u00e3nh \u0111en ng\u00f2m, c\u00f3 kh\u00e1c g\u00ec \u1edf qu\u00ea nh\u1eefng ng\u00e0y l\u1ee5t. Th\u00e0nh ph\u1ed1 cu\u1ed1i n\u0103m, nh\u1eefng b\u1eefa ti\u1ec7c n\u01b0\u1edbc kh\u00f4ng mong \u0111\u1ee3i c\u1ee9 theo gi\u00f3 ch\u01b0\u1edbng m\u00e0 v\u1ec1.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Ng\u1ecdc T\u01b0, <i>B\u00f3ng c\u1ee7a th\u00e0nh ph\u1ed1,</i> NXB Tr\u1ebb, 2020)</div>\u0110o\u1ea1n v\u0103n t\u00e1i hi\u1ec7n hi\u1ec7n t\u01b0\u1ee3ng tri\u1ec1u c\u01b0\u1eddng, n\u01b0\u1edbc d\u00e2ng \u1edf \u0111\u00e2u?", "answer": "\u0110o\u1ea1n v\u0103n mi\u00eau t\u1ea3 hi\u1ec7n t\u01b0\u1ee3ng tri\u1ec1u c\u01b0\u1eddng, n\u01b0\u1edbc d\u00e2ng \u1edf th\u00e0nh ph\u1ed1, \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n qua c\u00e1c chi ti\u1ebft sau: <i>sau m\u1ea5y b\u1eadn ng\u01b0\u1eddi ta c\u01a1i cao m\u1eb7t \u0111\u01b0\u1eddng ch\u1ed1ng ng\u1eadp, n\u01b0\u1edbc c\u1ed1ng r\u00e3nh \u0111en ng\u00f2m, th\u00e0nh ph\u1ed1 cu\u1ed1i n\u0103m, nh\u1eefng b\u1eefa ti\u1ec7c n\u01b0\u1edbc kh\u00f4ng mong \u0111\u1ee3i c\u1ee9 theo gi\u00f3 ch\u01b0\u1edbng m\u00e0 v\u1ec1, c\u00f4 th\u1ea5y c\u00e1i c\u1ea3nh m\u00ecnh xo\u1eafn qu\u1ea7n l\u1ed9i l\u00f2 d\u00f2 \u0111i gi\u1eefa r\u00e1c r\u01b0\u1edfi.</i>", "key": "B", "isVideo": true, "score": 0, "order": 11, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604825, "lessonId": 0, "a": "\u201cH\u1ea3i ngo\u1ea1i huy\u1ebft th\u01b0\u201d.", "b": "\u201cNg\u1ee5c trung nh\u1eadt k\u00ed\u201d.", "c": "\u201cThu\u1ebf m\u00e1u\u201d.", "d": "\u201cTuy\u00ean ng\u00f4n \u0110\u1ed9c l\u1eadp\u201d.", "bookId": 1088678, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "D\u00f2ng n\u00e0o sau \u0111\u00e2y n\u00eau t\u00ean t\u00e1c ph\u1ea9m <b>kh\u00f4ng </b>do t\u00e1c gia Nguy\u1ec5n \u00c1i Qu\u1ed1c - H\u1ed3 Ch\u00ed Minh vi\u1ebft?", "answer": "<i>H\u1ea3i ngo\u1ea1i huy\u1ebft th\u01b0</i> l\u00e0 b\u00e0i th i\u1ec7u m\u1edbi l\u00e0m x\u00fac \u0111\u1ed9ng l\u00f2ng ng\u01b0\u1eddi - <i>giai \u0111i\u1ec7u c\u1ee7a t\u00ecnh m\u1eabu t\u1eed.</i> Kh\u1ea3o s\u00e1t 194 b\u00e0i th\u01a1 trong 6 t\u1eadp th\u01a1 c\u1ee7a L\u00e2m Th\u1ecb M\u1ef9 D\u1ea1, ch\u00fang t\u00f4i th\u1ea5y c\u00f3 21 b\u00e0i th\u01a1 vi\u1ebft v\u1ec1 \u0111\u1ec1 t\u00e0i n\u00e0y, chi\u1ebfm t\u1ec9 l\u1ec7 10,82%. Ph\u1ea7n l\u1edbn c\u00e1c b\u00e0i th\u01a1 n\u00e0y \u0111\u00e3 \u0111\u01b0\u1ee3c ch\u1ecb t\u1eadp h\u1ee3p l\u1ea1i trong t\u1eadp th\u01a1 <i>M\u1eb9 v\u00e0 con</i>, in chung c\u00f9ng con g\u00e1i Ho\u00e0ng D\u1ea1 Thi, m\u1ed9t s\u1ed1 b\u00e0i c\u00f2n l\u1ea1i \u0111\u01b0\u1ee3c in r\u1ea3i r\u00e1c trong c\u00e1c t\u1eadp th\u01a1 <i>\u0110\u1ec1 t\u1eb7ng m\u1ed9t gi\u1ea5c m\u01a1, H\u1ed3n \u0111\u1ea7y hoa c\u00fac d\u1ea1i</i>... T\u00ecnh m\u1eabu t\u1eed l\u00e0 t\u00ecnh c\u1ea3m thi\u00eang li\u00eang, s\u00e2u n\u1eb7ng c\u1ee7a con ng\u01b0\u1eddi, th\u1ee9 t\u00ecnh c\u1ea3m m\u00e1u m\u1ee7, ru\u1ed9t r\u00e0, s\u00e2u n\u1eb7ng \u1ea5y th\u1eadt kh\u00f4ng d\u1ec5 di\u1ec5n \u0111\u1ea1t b\u1eb1ng l\u1eddi, \u1ea5y th\u1ebf m\u00e0 L\u00e2m Th\u1ecb M\u1ef9 D\u1ea1 \u0111\u00e3 th\u1eadt kh\u00e9o l\u00e9o chuy\u1ec3n t\u1ea3i nh\u1eefng t\u00ecnh c\u1ea3m thi\u00eang li\u00eang \u1ea5y v\u00e0o trong nh\u1eefng v\u1ea7n th\u01a1 c\u1ee7a m\u00ecnh. Ch\u1ecb \u0111\u00e3 l\u00e0m tr\u00f2n b\u1ed5n ph\u1eadn c\u1ee7a m\u1ed9t c\u00e1i t\u00f4i tr\u1eef t\u00ecnh bi\u1ec7n ch\u1ee9ng, \u0111\u00fang v\u1edbi quy lu\u1eadt cu\u1ed9c \u0111\u1eddi - c\u00e1i t\u00f4i tr\u1eef t\u00ecnh \u1ea5y khi \u0111\u00f3ng vai l\u00e0 m\u1ed9t ng\u01b0\u1eddi m\u1eb9, khi l\u1ea1i \u0111\u00f3ng vai l\u00e0 m\u1ed9t ng\u01b0\u1eddi con. Ch\u00ednh v\u00ec th\u1ebf, t\u00ecnh m\u1eabu t\u1eed trong th\u01a1 L\u00e2m Th\u1ecb M\u1ef9 D\u1ea1 l\u00e0 th\u1ee9 t\u00ecnh c\u1ea3m to\u00e0n di\u1ec7n, tr\u1ecdn v\u1eb9n, ch\u00e2n th\u00e0nh, th\u1eafm thi\u1ebft, l\u00e0 m\u00f3n qu\u00e0 v\u00f4 gi\u00e1 m\u00e0 ch\u1ecb \u0111\u00e3 mang t\u1eb7ng cho ng\u01b0\u1eddi m\u1eb9 k\u00ednh y\u00eau v\u00e0 nh\u1eefng \u0111\u1ee9a con th\u01a1 y\u00eau d\u1ea5u c\u1ee7a m\u00ecnh. Nh\u1eefng ai \u0111\u00e3, \u0111ang v\u00e0 s\u1ebd l\u00e0m v\u1ee3, l\u00e0m m\u1eb9 s\u1ebd kh\u00f4ng kh\u1ecfi b\u00f9i ng\u00f9i, x\u00fac \u0111\u1ed9ng tr\u01b0\u1edbc nh\u1eefng v\u1ea7n th\u01a1 ch\u00e2n th\u00e0nh, tha thi\u1ebft c\u1ee7a ch\u1ecb. Nh\u1eefng v\u1ea7n th\u01a1 \u0111\u01b0\u1ee3c v\u1ecdng l\u00ean t\u1eeb c\u00f5i l\u00f2ng c\u1ee7a m\u1ed9t ng\u01b0\u1eddi m\u1eb9 hi\u1ec1n, m\u1ed9t ng\u01b0\u1eddi con th\u1ea3o, c\u00f5i l\u00f2ng c\u1ee7a m\u1ed9t con ng\u01b0\u1eddi lu\u00f4n tr\u00e2n tr\u1ecdng \u0111\u1ec1 cao t\u00ecnh m\u1eabu t\u1eed h\u01a1n b\u1ea5t c\u1ee9 th\u1ee9 t\u00ecnh c\u1ea3m n\u00e0o trong cu\u1ed9c \u0111\u1eddi m\u00ecnh.<br><div style=\"text-align: right;\">(Ph\u1ea1m Th\u1ecb Thu\u00fd Vinh, <i>T\u00ecnh m\u1eabu t\u1eed trong th\u01a1 L\u00e2m Th\u1ecb M\u1ef9 D\u1ea1</i>, theo <i>tapchisonghuong.com.vn</i>)</div>", "listQuestion": [{"questionId": 21604861, "lessonId": 0, "a": "Nh\u00e0 th\u01a1 L\u00e2m Th\u1ecb M\u1ef9 D\u1ea1.", "b": "Th\u01a1 vi\u1ebft v\u1ec1 t\u00ecnh m\u1eabu t\u1eed c\u1ee7a L\u00e2m Th\u1ecb M\u1ef9 D\u1ea1.", "c": "Th\u01a1 L\u00e2m Th\u1ecb M\u1ef9 D\u1ea1.", "d": "Nh\u1eefng b\u00e0i th\u01a1 mang \u00e2m h\u01b0\u1edfng s\u1eed thi c\u1ee7a L\u00e2m Th\u1ecb M\u1ef9 D\u1ea1.", "bookId": 1088687, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u0110\u1ed1i t\u01b0\u1ee3ng ngh\u1ecb lu\u1eadn c\u1ee7a \u0111o\u1ea1n tr\u00edch l\u00e0 g\u00ec?", "answer": "\u0110o\u1ea1n tr\u00edch t\u1eadp trung b\u00e0n lu\u1eadn v\u1ec1 \u0111\u1ec1 t\u00e0i t\u00ecnh m\u1eabu t\u1eed trong th\u01a1 L\u00e2m Th\u1ecb M\u1ef9 D\u1ea1.<br>\n\u2192 \u0110\u1ed1i t\u01b0\u1ee3ng ngh\u1ecb lu\u1eadn c\u1ee7a \u0111o\u1ea1n tr\u00edch l\u00e0 th\  \u0111\u00f3ng vai l\u00e0 m\u1ed9t ng\u01b0\u1eddi m\u1eb9, khi l\u1ea1i \u0111\u00f3ng vai l\u00e0 m\u1ed9t ng\u01b0\u1eddi con.\n", "key": "D", "isVideo": true, "score": 0, "order": 24, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604873, "lessonId": 0, "a": "\u201cL\u00e2m Th\u1ecb M\u1ef9 D\u1ea1 l\u00e0 m\u1ed9t nh\u00e0 th\u01a1 tr\u01b0\u1edfng th\u00e0nh trong phong tr\u00e0o ch\u1ed1ng M\u1ef9.\u201d.", "b": "\u201cCh\u00ednh v\u00ec th\u1ebf, t\u00ecnh m\u1eabu t\u1eed trong th\u01a1 L\u00e2m Th\u1ecb M\u1ef9 D\u1ea1 l\u00e0 th\u1ee9 t\u00ecnh c\u1ea3m to\u00e0n di\u1ec7n, tr\u1ecdn v\u1eb9n, ch\u00e2n th\u00e0nh, th\u1eafm thi\u1ebft, l\u00e0 m\u00f3n qu\u00e0 v\u00f4 gi\u00e1 m\u00e0 ch\u1ecb \u0111\u00e3 mang t\u1eb7ng cho ng\u01b0\u1eddi m\u1eb9 k\u00ednh y\u00eau v\u00e0 nh\u1eefng \u0111\u1ee9a con th\u01a1 y\u00eau d\u1ea5u c\u1ee7a m\u00ecnh.\u201d.", "c": "\u201cTr\u00ean h\u00e0nh tr\u00ecnh thi ca c\u1ee7a m\u00ecnh, ch\u1ecb \u0111\u00e3 kh\u00f4ng d\u1eebng l\u1ea1i \u1edf nh\u1eefng b\u00e0i th\u01a1 l\u00e0m r\u1ea1ng danh m\u1ed9t th\u1eddi \u1ea5y.\u201d.", "d": "\u201cNh\u1eefng v\u1ea7n th\u01a1 \u0111\u01b0\u1ee3c v\u1ecdng l\u00ean t\u1eeb c\u00f5i l\u00f2ng c\u1ee7a m\u1ed9t ng\u01b0\u1eddi m\u1eb9 hi\u1ec1n, m\u1ed9t ng\u01b0\u1eddi con th\u1ea3o,c\u00f5i l\u00f2ng c\u1ee7a m\u1ed9t con ng\u01b0\u1eddi lu\u00f4n tr\u00e2n tr\u1ecdng \u0111\u1ec1 cao t\u00ecnh m\u1eabu t\u1eed h\u01a1n b\u1ea5t c\u1ee9 th\u1ee9 t\u00ecnh c\u1ea3m n\u00e0o trong cu\u1ed9c \u0111\u1eddi m\u00ecnh.\u201d.", "bookId": 1088691, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "C\u00e2u v\u0103n n\u00e0o sau \u0111\u00e2y mang t\u00ednh ph\u1ee7 \u0111\u1ecbnh?", "answer": "C\u00e2u v\u0103n \u201cTr\u00ean h\u00e0nh tr\u00ecnh thi ca c\u1ee7a m\u00ecnh, ch\u1ecb \u0111\u00e3 kh\u00f4ng d\u1eebng l\u1ea1i \u1edf nh\u1eefng b\u00e0i th\u01a1 l\u00e0m r\u1ea1ng danh m\u1ed9t th\u1eddi \u1ea5y.\u201d s\u1eed d\u1ee5ng t\u1eeb \u201ckh\u00f4ng\u201d \u0111\u1ec3 ph\u1ee7 \u0111\u1ecbnh h\u00e0nh \u0111\u1ed9ng \"d\u1eebng l\u1ea1i\u201d, th\u1ec3 hi\u1ec7n \u00fd ngh\u0129a ph\u1ee7 \u0111\u1ecbnh.", "key": "C", "isVideo": true, "score": 0, "order": 25, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 26 \u0111\u1ebfn 30", "content": "<div style=\"text-align: center;\"><b>T\u1ed5 \u1ea5m</b></div><b><div style=\"text-align: center;\"><b>(P\u1edd S\u1ea3o M\u00ecn)</b></div></b><div style=\"text-align: left;\">Nhi\u1ec1u b\u1ea1n h\u1ecfi: T\u1ed5 \u1ea5m anh \u1edf \u0111\u00e2u?</div><div style=\"text-align: left;\">T\u00f4i g\u1eadt \u0111\u1ea7u, m\u1ec9m c\u01b0\u1eddi \u0111\u00e1p l\u1ea1i</div><div style=\"text-align: left;\">T\u1ed5 \u1ea5m c\u1ee7a t\u00f4i tr\u00ean \u0111\u1ea5t m\u1eb9 x\u1ee9 M\u01b0\u1eddng y\u00eau d\u1ea5u</div><div style=\"text-align: left;\">M\u1ed9t ch\u1ea5m \u0111\u1ecf tr\u00ean b\u1ea3n \u0111\u1ed3 T\u1ed5 qu\u1ed1c</div><div style=\"text-align: left;\">Cu\u1ed9c \u0111\u1eddi t\u00f4i lu\u00f4n h\u1eb1ng mong \u01b0\u1edbc</div><div style=\"text-align: left;\">N\u00f3i v\u1edbi anh v\u1edbi b\u1ea1n ng\u00e0n ph\u01b0\u01a1ng</div><div style=\"text-align: left;\">T\u1ed5 \u1ea5m t\u00f4i tr\u00ean \u0111\u1ea5t m\u1eb9 M\u01b0\u1eddng Kh\u01b0\u01a1ng</div><div style=\"text-align: left;\"><br></div><div style=\"text-align: left;\">\u0110\u1eb1ng sau t\u1ed5 \u1ea5m t\u00f4i</div><div style=\"text-align: left;\">D\u00e3y n\u00fai C\u00f4 Ti\u00ean hi\u1ec1n h\u00f2a</div><div style=\"text-align: left;\">Su\u1ed1t ng\u00e0y b\u1ea7y h\u1ecda mi xanh h\u00f3t ca</div><         let userAnswers = {}; // Store: { qId: value }

                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;

                    palBtn.innerText = qId;

                        const subLabels = ['a', 'b', 'c', 'd'];

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {

            userAnswers[qKey] = value;
            updatePalette(qKey);

                 renderExam(false);

                renderExam(false);

            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
