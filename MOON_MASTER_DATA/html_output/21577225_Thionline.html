        .virtual-numpad {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; border-top: 1px solid #e5e7eb;
            padding: 10px; z-index: 100;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
            transform: translateY(100%);
        }
        .virtual-numpad.active { transform: translateY(0); }
        .numpad-key {

            height: 48px; display: flex; align-items: center; justify-content: center;

3: <b>by the end of + th\u1eddi gian trong t\u01b0\u01a1ng lai l\u00e0 d\u1ea5u hi\u1ec7u th\u00ec t\u01b0\u01a1ng lai ho\u00e0n th\u00e0nh.</b><br>\u21d2 C\u1ea5u tr\u00fac th\u00ec t\u01b0\u01a1ng lai ho\u00e0n th\u00e0nh: <b>S + will + have + Vp2.</b><br><b>T\u1ea1m d\u1ecbch</b>: \u1ee6y ban c\u1ee7a ch\u00fang t\u00f4i \u0111ang c\u1ed1 g\u1eafng quy\u00ean g\u00f3p ti\u1ec1n \u0111\u1ec3 mua m\u1ed9t chi\u1ebfc xu\u1ed3ng c\u1ee9u sinh m\u1edbi. \u0110\u1ebfn cu\u1ed1i n\u0103m, ch\u00fang t\u00f4i s\u1ebd g\u1eedi \u0111i \u0111\u01b0\u1ee3c 5.000 l\u00e1 th\u01b0 k\u00eau g\u1ecdi \u0111\u00f3ng g\u00f3p.", "key": "D", "isVideo": true, "score": 0, "order": 35, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 36-40: Each of the following sentences has one error (A, B, C, or D). Find it and blacken your choice on your answer sheet.", "content": "", "listQuestion": [{"questionId": 10469940, "lessonId": 0, "a": "cut", "b": "needn\u2019t", "c": "cutting for", "d": "another", "bookId": 290484, "comments": 7, "bookmarks": 41, "likes": 0, "shares": 0, "typeId": 0, "questionText": "I get my hair <u>cut</u> today, hence my hair <u>needn\u2019t</u> <u>cutting for</u> at least <u>another</u> month.", "answer": "<b><i>Ki\u1ebfn th\u1ee9c v\u1ec1 c\u00e2u b\u1ecb \u0111\u1ed9ng </i><br></b>D\u1ea1ng b\u1ecb \u0111\u1ed9ng v\u1edbi need: <b>need + V-ing/ to be Vp2: </b>c\u1ea7n \u0111\u01b0\u1ee3c l\u00e0m g\u00ec.<br>\u21d2 d\u1ea1ng ph\u1ee7 \u0111\u1ecbnh: <b>do / does not need + V-ing/ to be Vp2</b><br>\u21d2 S\u1eeda l\u1ed7i: <b>needn\u2019t \u21d2 doesn\u2019t need</b><br><b>T\u1ea1m d\u1ecbch:</b> H\u00f4m nay t\u00f4i \u0111i c\u1eaft t\u00f3c, do \u0111\u00f3 t\u00f3c c\u1ee7a t\u00f4i s\u1ebd kh\u00f4ng c\u1ea7n c\u1eaft trong \u00edt nh\u1ea5t m\u1ed9t th\u00e1ng n\u1eefa. <br><b>*Note: </b>NEED v\u1eeba l\u00e0 \u0110\u1ed8NG T\u1eea TH\u01af\u1edcNG, v\u1eeba l\u00e0 \u0110\u1ed8NG T\u1eea KHUY\u1ebeT THI\u1ebeU, nh\u01b0ng n\u1ebfu theo sau NEED l\u00e0 m\u1ed9t N/NP/V-ing phrase th\u00ec NEED ph\u1ea3i \u0111\u01b0\u1ee3c d\u00f9ng nh\u01b0 m\u1ed9t \u0110\u1ed8NG T\u1eea TH\u01af\u1edcNG<br>=&gt; Khi \u0111\u00f3 d\u1ea1ng ph\u1ee7 \u0111\u1ecbnh c\u1ea7n m\u01b0\u1ee3n tr\u1ee3 \u0111\u1ed9ng t\u1eeb nh\u01b0 ch\u1ee9c n\u0103ng c\u1ee7a m\u1ed9t \u0111\u1ed9ng t\u1eeb th\u01b0\u1eddng<br><br><i> (C\u00e1c em s\u1eeda l\u1ea1i \u0111\u1ec1 gi\u00fap th\u1ea7y nh\u00e9!) </i>", "key": "B", "isVideo": true, "score": 0, "order": 36, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10470046, "lessonId": 0, "a": "had done", "b": "proper", "c": "wouldn\u2019t have had", "d": "with", "bookId": 290602, "comments": 0, "bookmarks": 4, "likes": 0, "shares": 0, "typeId": 0, "questionText": "If the mechanic <u>had done</u> the work <u>proper</u>, you <u>wouldn\u2019t have had</u> trouble <u>with</u> the car.", "answer": "<b><i>Ki\u1ebfn th\u1ee9c v\u1ec1 T\u1eeb lo\u1ea1i  </i><br></b>Ta d\u00f9ng tr\u1ea1ng t\u1eeb \u0111\u1ec3 b\u1ed5 sung \u00fd ngh\u0129a cho \u0111\u1ed9ng t\u1eeb<br>\u21d2 Ta th\u00eam \u0111u\u00f4i \u201cly\u201d v\u00e0o h\u1ea7u h\u1ebft c\u00e1c t\u00ednh t\u1eeb \u0111\u1ec3 chuy\u1ec3n th\u00e0nh tr\u1ea1ng t\u1eeb.<br>\u21d2 S\u1eeda l\u1ed7i: <b>proper \u21d2 properly</b><br><b>T\u1ea1m d\u1ecbch</b>: N\u1ebfu ng\u01b0\u1eddi th\u1ee3 s\u1eeda xe l\u00e0m \u0111\u00fang c\u00f4ng vi\u1ec7c th\u00ec b\u1ea1n \u0111\u00e3 kh\u00f4ng g\u1eb7p r\u1eafc r\u1ed1i v\u1edbi chi\u1ebfc xe.", "key": "B", "isVideo": true, "score": 0, "order": 37, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577247, "lessonId": 0, "a": "will study", "b": "harder", "c": "pass", "d": "easily", "bookId": 1085969, "comments": 2, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "If she <u>will study</u> <u>harder</u>, she can <u>pass</u> the exam <u>easily</u>.", "answer": "<b>Ph\u00e2n t\u00edch ng\u1eef c\u1ea3nh: </b><br>C\u00e2u n\u00e0y n\u00f3i v\u1ec1 kh\u1ea3 n\u0103ng x\u1ea3y ra trong t\u01b0\u01a1ng lai, l\u00e0 c\u00e2u \u0111i\u1ec1u ki\u1ec7n lo\u1ea1i 1. Trong c\u00e2u \u0111i\u1ec1u ki\u1ec7n lo\u1ea1i 1, m\u1ec7nh \u0111\u1ec1 \u0111i\u1ec1u ki\u1ec7n ph\u1ea3i d\u00f9ng th\u00ec hi\u1ec7n t\u1ea1i \u0111\u01a1n, kh\u00f4ng d\u00f9ng t\u01b0\u01a1ng lai \u0111\u01a1n \u201cwill\u201d.\n\n\n\n<br><br><b>S\u1eeda l\u1ed7i:</b> will study /w\u026al \u02c8st\u028cdi/: s\u1ebd h\u1ecdc (t\u01b0\u01a1ng lai \u0111\u01a1n) \u2192 study /\u02c8st\u028cdi/: h\u1ecdc (hi\u1ec7n t\u1ea1i \u0111\u01a1n).\n\n<br><br><b>T\u1ea1m d\u1ecbch: </b>N\u1ebfu c\u00f4 \u1ea5y h\u1ecdc ch\u0103m h\u01a1n, c\u00f4 \u1ea5y c\u00f3 th\u1ec3 v\u01b0\u1ee3t qua k\u1ef3 thi m\u1ed9t c\u00e1ch d\u1ec5 d\u00e0ng.", "key": "A", "isVideo": false, "score": 0, "order": 38, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10469845, "lessonId": 0, "a": "sorry", "b": "to borrow", "c": "promise", "d": "to return", "bookId": 290138, "comments": 0, "bookmarks": 22, "likes": 0, "shares": 0, "typeId": 0, "questionText": "I\u2019m <u>sorry</u> that I forgot <u>to borrow</u> that book from you, but I <u>promise</u> <u>to return</u> it to you tomorrow.", "answer": "<b><i>Ki\u1ebfn th\u1ee9c v\u1ec1 Danh \u0111\u1ed9ng t\u1eeb/\u0110\u1ed9ng t\u1eeb nguy\u00ean m\u1eabu </i><br></b>Ph\u00e2n bi\u1ec7t hai c\u1ea5u tr\u00fac v\u1edbi \u201c<b>forget</b>\u201d:<br>-<b> forget to V: </b>qu\u00ean l\u00e0m g\u00ec (ch\u01b0a l\u00e0m)<br>- <b>forget Ving</b>: qu\u00ean \u0111\ he given sentences? ", "content": "", "listQuestion": [{"questionId": 19872797, "lessonId": 0, "a": "Many people were saved in the fire, but the rescue team's arrival was not timely.", "b": "The rescue team could not prevent the loss of many people's lives due to the untimely arrival.", "c": "The timely arrival of the rescue team did not help save people in the fire.", "d": "The rescue team's timely arrival stopped the loss of many people's lives in the fire.", "bookId": 746082, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "If not for the timely arrival of the rescue team, many people would have been dead in the fire.", "answer": "<b>C\u00e2u g\u1ed1c:</b>&nbsp;N\u1ebfu kh\u00f4ng c\u00f3 s\u1ef1 \u0111\u1ebfn k\u1ecbp th\u1eddi c\u1ee7a \u0111\u1ed9i c\u1ee9u h\u1ed9, nhi\u1ec1u ng\u01b0\u1eddi \u0111\u00e3 thi\u1ec7t m\u1ea1ng trong \u0111\u00e1m ch\u00e1y<br><span data-start=\"177\" data-end=\"183\" style=\"\">A.</span> Nhi\u1ec1u ng\u01b0\u1eddi \u0111\u00e3 \u0111\u01b0\u1ee3c c\u1ee9u trong \u0111\u00e1m ch\u00e1y, nh\u01b0ng \u0111\u1ed9i c\u1ee9u h\u1ed9 \u0111\u1ebfn kh\u00f4ng k\u1ecbp th\u1eddi. =&gt; <b>Sai</b>. C\u00e2u n\u00e0y n\u00f3i r\u1eb1ng <strong data-start=\"1237\" data-end=\"1270\">\u0111\u1ed9i c\u1ee9u h\u1ed9 \u0111\u1ebfn kh\u00f4ng k\u1ecbp th\u1eddi</strong>, nh\u01b0ng c\u00e2u g\u1ed1c l\u1ea1i kh\u1eb3ng \u0111\u1ecbnh r\u1eb1ng <strong data-start=\"1306\" data-end=\"1348\">h\u1ecd \u0111\u1ebfn k\u1ecbp l\u00fac v\u00e0 c\u1ee9u \u0111\u01b0\u1ee3c nhi\u1ec1u ng\u01b0\u1eddi</strong><br><br data-start=\"262\" data-end=\"265\"><span data-start=\"265\" data-end=\"271\" style=\"\">B.</span> \u0110\u1ed9i c\u1ee9u h\u1ed9 kh\u00f4ng th\u1ec3 ng\u0103n ch\u1eb7n s\u1ef1 m\u1ea5t m\u00e1t c\u1ee7a nhi\u1ec1u ng\u01b0\u1eddi do \u0111\u1ebfn kh\u00f4ng k\u1ecbp th\u1eddi. =&gt; <b>Sai </b>v\u00ec tr\u00e1i ngh\u0129a v\u1edbi c\u00e2u g\u1ed1c<br><br data-start=\"354\" data-end=\"357\"><span data-start=\"357\" data-end=\"363\" style=\"\">C.</span> S\u1ef1 \u0111\u1ebfn k\u1ecbp th\u1eddi c\u1ee7a \u0111\u1ed9i c\u1ee9u h\u1ed9 \u0111\u00e3 kh\u00f4ng gi\u00fap c\u1ee9u ng\u01b0\u1eddi trong \u0111\u00e1m ch\u00e1y. =&gt; <b>Sai </b>v\u00ec c\u00e2u g\u1ed1c n\u00f3i \u0111\u00e3 c\u1ee9u \u0111\u01b0\u1ee3c nhi\u1ec1u ng\u01b0\u1eddi<br><br data-start=\"436\" data-end=\"439\"><span data-start=\"439\" data-end=\"445\" style=\"\">D.</span> S\u1ef1 \u0111\u1ebfn k\u1ecbp th\u1eddi c\u1ee7a \u0111\u1ed9i c\u1ee9u h\u1ed9 \u0111\u00e3 ng\u0103n ch\u1eb7n s\u1ef1 m\u1ea5t m\u00e1t c\u1ee7a nhi\u1ec1u ng\u01b0\u1eddi trong \u0111\u00e1m ch\u00e1y. =&gt; <b>\u0110\u00fang</b><br>=&gt; \u0110\u00e1p \u00e1n D", "key": "D", "isVideo": false, "score": 0, "order": 41, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10469974, "lessonId": 0, "a": "She got up and left when everyone was talking.", "b": "Everyone stood up and left so that they could hear her boring speech.", "c": "No one stayed to listen to her because her speech was so boring.", "d": "Her speech was too boring for everyone to stand up and leave.", "bookId": 290186, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Her speech was boring, so everyone got up and left.", "answer": "<b>T\u1ea1m d\u1ecbch:</b> B\u00e0i ph\u00e1t bi\u1ec3u c\u1ee7a c\u00f4 \u1ea5y nh\u00e0m ch\u00e1n n\u00ean m\u1ecdi ng\u01b0\u1eddi \u0111\u1ec1u \u0111\u1ee9ng d\u1eady v\u00e0 r\u1eddi \u0111i.<br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n<br></b>A. C\u00f4 \u0111\u1ee9ng d\u1eady v\u00e0 r\u1eddi \u0111i khi m\u1ecdi ng\u01b0\u1eddi \u0111ang n\u00f3i chuy\u1ec7n.<br>\u21d2 Sai v\u1ec1 ngh\u0129a.<br>B. M\u1ecdi ng\u01b0\u1eddi \u0111\u1ec1u \u0111\u1ee9ng d\u1eady v\u00e0 r\u1eddi \u0111i \u0111\u1ec3 c\u00f3 th\u1ec3 nghe \u0111\u01b0\u1ee3c b\u00e0i ph\u00e1t bi\u1ec3u nh\u00e0m ch\u00e1n c\u1ee7a c\u00f4.<br>\u21d2 Sai v\u1ec1 ngh\u0129a: Do b\u00e0i ph\u00e1t bi\u1ec3u nh\u00e0m ch\u00e1n n\u00ean m\u1ecdi ng\u01b0\u1eddi m\u1edbi r\u1eddi \u0111i.<br>C. Kh\u00f4ng ai \u1edf l\u1ea1i nghe c\u00f4 gi\u1ea3ng v\u00ec b\u00e0i ph\u00e1t bi\u1ec3u c\u1ee7a c\u00f4 qu\u00e1 nh\u00e0m ch\u00e1n.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang<br>D. B\u00e0i ph\u00e1t bi\u1ec3u c\u1ee7a c\u00f4 qu\u00e1 nh\u00e0m ch\u00e1n \u0111\u1ebfn n\u1ed7i m\u1ecdi ng\u01b0\u1eddi kh\u00f4ng th\u1ec3 \u0111\u1ee9ng d\u1eady v\u00e0 r\u1eddi \u0111i.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. C\u1ea5u tr\u00fac <b>too + adj + for + sb + to + V</b>: qu\u00e1 \u0111\u1ebfn n\u1ed7i kh\u00f4ng th\u1ec3 l\u00e0m g\u00ec.", "key": "C", "isVideo": true, "score": 0, "order": 42, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10470051, "lessonId": 0, "a": "Unless you set an alarm clock, you won\u2019t oversleep.", "b": "If you don't set an alarm clock, you will oversleep.", "c": "Should you set an alarm clock, you will oversleep.", "d": "Set an alarm clock or you won\u2019t oversleep.", "bookId": 290605, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Unless you set an alarm clock, you will oversleep.", "answer": "<b>T\u1ea1m d\u1ecbch: N\u1ebfu b\u1ea1n kh\u00f4ng \u0111\u1eb7t \u0111\u1ed3ng h\u1ed3 b\u00e1o th\u1ee9c, b\u1ea1n s\u1ebd ng\u1ee7 qu\u00ean. <br>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n<br></b>A. N\u1ebfu b\u1ea1n kh\u00f4ng \u0111\u1eb7t \u0111\u1ed3ng h\u1ed3 b\u00e1o th\u1ee9c, b\u1ea1n s\u1ebd kh\u00f4ng ng\u1ee7 qu\u00ean \u0111\u01b0\u1ee3c.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. C\u1ea5u tr\u00fac unless c\u00f3 ngh\u0129a t\u01b0\u01a1ng \u0111\u01b0\u01a1ng v\u1edbi If not: <b>Unless + S + V (simple present), S + will/can/shall + V</b><br>B. N\u1ebfu b\u1ea1n kh\u00f4ng \u0111\u1eb7t \u0111\u1ed3ng h\u1ed3 b\u00e1o th\u1ee9c, b\u1ea1n s\u1ebd ng\u1ee7 qu\u00ean.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang. C\u1ea5u tr\u00fac \u0111i\u1ec1u ki\u1ec7n lo\u1ea1i 1: <b>If + S + V(HT\u0110), S + will + V(nguy\u00ean th\u1ec3)</b><br>C. N\u1ebfu b\u1ea1n \u0111\u1eb7t \u0111\u1ed3ng h\u1ed3 b\u00e1o th\u1ee9c, b\u1ea1n s\u1ebd ng\u1ee7 qu\u00ean.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. C\u1ea5u tr\u00fac \u0111\u1ea3o \u0111i\u1ec1u ki\u1ec7n lo\u1ea1i 1:<b> Should + S + V(nguy\u00ean th\u1ec3), S + will + V(nguy\u00ean th\u1ec3)</b><br>D. \u0110\u1eb7t \u0111\u1ed3ng h\u1ed3 b\u00e1o th\u1ee9c n\u1ebfu kh\u00f4ng b\u1ea1n s\u1ebd kh\u00f4ng ng\u1ee7 qu\u00ean.<br>\u21d2 Sai v\u1ec1 ngh\u0129a", "key": "B", "isVideo": true, "score": 0, "order": 43, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 10469849, "lessonId": 0, "a": "John continued to smoke regardless of our advice to quit tobacco.", "b": "It didn\u2019t matter how we advised him to quit, John continued to smoke.", "c": "Advice as we may, John couldn\u2019t quit smoking.", "d": "In spite of being told not to smoke, John kept the habit of smoking.", "bookId": 290142, "comments": 1, "bookmarks": 28, "likes": 0, "shares": 0, "typeId": 0, "questionText": "John continued to smoke even though we had advised him to quit.", "answer": "<b>T\u1ea1m d\u1ecbch</b>: John ti\u1ebfp t\u1ee5c h\u00fat thu\u1ed1c m\u1eb7c d\u00f9 ch\u00fang t\u00f4i \u0111\u00e3 khuy\u00ean anh \u1ea5y b\u1ecf thu\u1ed1c.<br><b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n <br></b>A. John ti\u1ebfp t\u1ee5c h\u00fat thu\u1ed1c b\u1ea5t ch\u1ea5p l\u1eddi khuy\u00ean b\u1ecf thu\u1ed1c l\u00e1 c\u1ee7a ch\u00fang t\u00f4i.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. Ta th\u1ea5y John c\u00f3 th\u1ec3 h\u00fat \u2018tobacco\u201d v\u00e0 nhi\u1ec1u lo\u1ea1i kh\u00e1c.<br>B. D\u00f9 ch\u00fang t\u00f4i c\u00f3 khuy\u00ean anh \u1ea5y b\u1ecf thu\u1ed1c nh\u01b0 th\u1ebf n\u00e0o th\u00ec John v\u1eabn ti\u1ebfp t\u1ee5c h\u00fat thu\u1ed1c.<br>\u21d2 Sai c\u1ea5u tr\u00fac. Ta c\u00f3: <b>No matter how + adj/adv + S + V</b>,\u2026: d\u00f9 th\u1ebf n\u00e0o \u0111i ch\u0103ng n\u1eefa.<br>\u2192 c\u00e2u B thi\u1ebfu 1 tr\u1ea1ng t\u1eeb<br>C. D\u00f9 c\u00f3 l\u1eddi khuy\u00ean nh\u01b0ng John v\u1eabn kh\u00f4ng th\u1ec3 b\u1ecf thu\u1ed1c l\u00e1.<br>\u21d2 Sai v\u1ec1 ng\u1eef ph\u00e1p. <b>\u0110\u1ea3o ng\u1eef v\u1edbi \u201cas\u201d: Adj/Adv as + S1 + V1, S2 + V2</b>: m\u1eb7c d\u00f9D. M\u1eb7c d\u00f9 \u0111\u01b0\u1ee3c d\u1eb7n kh\u00f4ng \u0111\u01b0\u1ee3c h\u00fat thu\u1ed1c nh\u01b0ng John v\u1eabn gi\u1eef th\u00f3i quen thu\u1ed1c.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang. Ta c\u00f3: <b>In spite of + N/V-ing, S + V + \u2026: m\u1eb7c d\u00f9</b>", "key": "D", "isVideo": true, "score": 0, "order": 44, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19873008, "lessonId": 0, "a": "I felt a great deal of fulfillment before completing my internship.", "b": "I was incredibly proud of what I achieved with my internship.", "c": "The end result of my internship resulted in immense satisfaction for me.", "d": "Completing my internship gives me a deep feeling of success.", "bookId": 746048, "comments": 1, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The end result of my internship granted me a profound sense of accomplishment.", "answer": "<b>C\u00e2u g\u1ed1c:&nbsp;</b>K\u1ebft qu\u1ea3 cu\u1ed1i c\u00f9ng c\u1ee7a k\u1ef3 th\u1ef1c t\u1eadp c\u1ee7a t\u00f4i \u0111\u00e3 mang l\u1ea1i cho t\u00f4i m\u1ed9t c\u1ea3m gi\u00e1c s\u00e2u s\u1eafc v\u1ec1 s\u1ef1 th\u00e0nh t\u1ef1u<br>A. T\u00f4i c\u1ea3m th\u1ea5y m\u1ed9t c\u1ea3m gi\u00e1c th\u1ecfa m\u00e3n l\u1edbn tr\u01b0\u1edbc khi ho\u00e0n th\u00e0nh k\u1ef3 th\u1ef1c t\u1eadp =&gt; <b>Sai </b>ngh\u0129a v\u00ec c\u00e2u g\u1ed1c&nbsp;n\u00f3i v\u1ec1 c\u1ea3m gi\u00e1c th\u00e0nh t\u1ef1u <b>sau </b>khi k\u1ef3 th\u1ef1c t\u1eadp k\u1ebft th\u00fac<br><br data-start=\"242\" data-end=\"245\">B. T\u00f4i v\u00f4 c\u00f9ng t\u1ef1 h\u00e0o v\u1ec1 nh\u1eefng g\u00ec t\u00f4i \u0111\u1ea1t \u0111\u01b0\u1ee3c trong k\u1ef3 th\u1ef1c t\u1eadp c\u1ee7a m\u00ecnh. =&gt; <b>Sai</b>. C\u00e2u g\u1ed1c kh\u00f4ng \u0111\u1ec1 c\u1eadp \u0111\u1ebfn ni\u1ec1m t\u1ef1 h\u00e0o m\u00e0 ch\u1ec9 n\u00f3i v\u1ec1 c\u1ea3m gi\u00e1c th\u00e0nh t\u1ef1u<br><br data-start=\"319\" data-end=\"322\">C. K\u1ebft qu\u1ea3 cu\u1ed1i c\u00f9ng c\u1ee7a k\u1ef3 th\u1ef1c t\u1eadp \u0111\u00e3 mang l\u1ea1i cho t\u00f4i m\u1ed9t s\u1ef1 h\u00e0i l\u00f2ng to l\u1edbn. =&gt; <b>\u0110\u00fang</b><br><br data-start=\"402\" data-end=\"405\">D. Ho\u00e0n th\u00e0nh k\u1ef3 th\u1ef1c t\u1eadp mang l\u1ea1i cho t\u00f4i m\u1ed9t c\u1ea3m gi\u00e1c s\u00e2u s\u1eafc v\u1ec1 th\u00e0nh c\u00f4ng. =&gt; <b>Sai </b>v\u1ec1 th\u1eddi gian, \u00fd D s\u1eed d\u1ee5ng hi\u1ec7n t\u1ea1i \u0111\u01a1n \"gives\" trong khi c\u00e2u g\u1ed1c n\u00f3i v\u1ec1 qu\u00e1 kh\u1ee9<br>=&gt; \u0110\u00e1p \u00e1n C", "key": "C", "isVideo": false, "score": 0, "order": 45, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 46-52: Read the passage carefully.", "content": "<i>Choose an option (A, B, C, or D) that best answers each question.</i><br>1. The future energy mix will require an all-of-the-above approach, with efficiency profiles, transport limitations and supply chain considerations shunting demand centres to different energy sources. Many key clean technologies (electric vehicles, heat pumps and water heaters, to name a few) will draw <b>their</b> energy from the grid \u2014 with those electrons produced from zero-carbon sources \u2014 while others will need to rely on clean fuels, such as biofuel, hydrogen and others. Each one of these resources lends itself to particular use cases. This raises the stakes of the allocation question.<br>2. For example, hydrogen, a promising clean energy carrier, relies on water and clean power as feedstock. And, with climate change destabilizing global weather patterns \u2014 drought can threaten hydropower and nuclear power installations, for instance, while rising global temperatures are forecast to reduce wind speed around the world \u2014 the availability of renewable energy sources for hydrogen production alongside electricity generation is not guaranteed. Regions, such as the south of Spain, facing water shortages, highlight the need for a nuanced approach to utilize available resources to make hydrogen efficiently.<br>3. The dilemma of allocating green power to hydrogen production or directly greening the grid has become a contentious element of transition debates. The answer will be contingent on the existing energy mix, with a key factor being the current carbon intensity of the grid. Striking the right balance is <b>imperative</b> for an effective energy transition.<br><div style=\"text-align: right;\"><i>(Adapted from: https://www.weforum.org/)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21577261, "lessonId": 0, "a": "The advantages of using hydrogen over other renewable energy sources", "b": "The challenges and strategies for creating a balanced green energy mix", "c": "The future dominance of biofuels in the global energy market", "d": "The role of traditional fuels in combating climate change", "bookId": 1085970, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What is the topic of the passage?", "answer": "<b>Ch\u1ee7 \u0111\u1ec1 c\u1ee7a \u0111o\u1ea1n v\u0103n l\u00e0 g\u00ec?\n</b><br><b>A.</b> Nh\u1eefng l\u1ee3i \u00edch c\u1ee7a vi\u1ec7c s\u1eed d\u1ee5ng hydro so v\u1edbi c\u00e1c ngu\u1ed3n n\u0103ng l\u01b0\u1ee3ng t\u00e1i t\u1ea1o kh\u00e1c. <b>=&gt; Sai.</b> \u0110o\u1ea1n v\u0103n kh\u00f4ng ch\u1ec9 t\u1eadp trung v\u00e0o hydro m\u00e0 c\u00f2n \u0111\u1ec1 c\u1eadp \u0111\u1ebfn nhi\u1ec1u ngu\u1ed3n n\u0103ng l\u01b0\u1ee3ng kh\u00e1c\n\n<br><b>B.</b> Nh\u1eefng th\u00e1ch th\u1ee9c v\u00e0 chi\u1ebfn l\u01b0\u1ee3c \u0111\u1ec3 t\u1ea1o ra m\u1ed9t h\u1ed7n h\u1ee3p n\u0103ng l\u01b0\u1ee3ng xanh c\u00e2n b\u1eb1ng. <b>=&gt; \u0110\u00fang\n\n</b><br><b>C.</b> S\u1ef1 th\u1ed1ng tr\u1ecb c\u1ee7a nhi\u00ean li\u1ec7u sinh h\u1ecdc trong th\u1ecb tr\u01b0\u1eddng n\u0103ng l\u01b0\u1ee3ng to\u00e0n c\u1ea7u. <b>=&gt; Sai.</b> Kh\u00f4ng c\u00f3 th\u00f4ng tin n\u00e0o cho th\u1ea5y nhi\u00ean li\u1ec7u sinh h\u1ecdc s\u1ebd chi\u1ebfm \u01b0u th\u1ebf\n\n<br><b>D.</b> Vai tr\u00f2 c\u1ee7a nhi\u00ean li\u1ec7u truy\u1ec1n th\u1ed1ng trong vi\u1ec7c ch\u1ed1ng bi\u1ebfn \u0111\u1ed5i kh\u00ed h\u1eadu. <b>=&gt; Sai.</b> Kh\u00f4ng \u0111\u1ec1 c\u1eadp \u0111\u1ebfn vai tr\u00f2 c\u1ee7a nhi\u00ean li\u1ec7u truy\u1ec1n th\u1ed1ng trong vi\u1ec7c ch\u1ed1ng bi\u1ebfn \u0111\u1ed5i kh\u00ed h\u1eadu\n", "key": "B", "isVideo": false, "score": 0, "order": 46, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577263, "lessonId": 0, "a": "Biofuel-powered vehicles", "b": "Electric vehicles", "c": "Hydrogen storage systems", "d": "Natural gas heaters", "bookId": 1085971, "comments": 2, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Which technology is mentioned in paragraph 2 as being powered by electricity from the grid?", "answer": "<b>C\u00f4ng ngh\u1ec7 n\u00e0o \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp trong \u0111o\u1ea1n 1 l\u00e0 s\u1eed d\u1ee5ng \u0111i\u1ec7n t\u1eeb l\u01b0\u1edbi \u0111i\u1ec7n?\n</b><br><b>A.</b> Xe ch\u1ea1y b\u1eb1ng nhi\u00ean li\u1ec7u sinh h\u1ecdc.\n<br><b>B.</b> Xe \u0111i\u1ec7n.\n<br><b>C.</b> H\u1ec7 th\u1ed1ng l\u01b0u tr\u1eef hydro.\n<br><b>D.</b> M\u00e1y s\u01b0\u1edfi d\u00f9ng kh\u00ed t\u1ef1 nhi\u00ean.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin \u0111o\u1ea1n v\u0103n:</b><br>Many key clean technologies (electric vehicles, heat pumps and water heaters, to name a few) will draw their energy from the grid.\n<br><i>(Nhi\u1ec1u c\u00f4ng ngh\u1ec7 s\u1ea1ch quan tr\u1ecdng (xe \u0111i\u1ec7n, m\u00e1y b\u01a1m nhi\u1ec7t v\u00e0 m\u00e1y n\u01b0\u1edbc n\u00f3ng) s\u1ebd l\u1ea5y n\u0103ng l\u01b0\u1ee3ng t\u1eeb l\u01b0\u1edbi \u0111i\u1ec7n.)\n</i>", "key": "B", "isVideo": false, "score": 0, "order": 47, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577264, "lessonId": 0, "a": "electric vehicles", "b": "clean fuels", "c": "key clean technologies", "d": "zero-carbon sources", "bookId": 1085972, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The word <b>their </b>in paragraph 1 refers to which of the following?", "answer": "<b>T\u1eeb \"their\" trong \u0111o\u1ea1n 1 \u0111\u1ec1 c\u1eadp \u0111\u1ebfn t\u1eeb n\u00e0o?\n</b><br><b>A.</b> Xe \u0111i\u1ec7n.\n<br><b>B.</b> Nhi\u00ean li\u1ec7u s\u1ea1ch.\n<br><b>C.</b> C\u00e1c c\u00f4ng ngh\u1ec7 s\u1ea1ch quan tr\u1ecdng.\n<br><b>D.</b> C\u00e1c ngu\u1ed3n kh\u00f4ng ph\u00e1t th\u1ea3i carbon.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o ng\u1eef c\u1ea3nh:\n</b><br>Many key clean technologies (electric vehicles, heat pumps and water heaters, to name a few) will draw their energy from the grid.\n<br><i>(Nhi\u1ec1u c\u00f4ng ngh\u1ec7 s\u1ea1ch quan tr\u1ecdng (ch\u1eb3ng h\u1ea1n nh\u01b0 xe \u0111i\u1ec7n, m\u00e1y b\u01a1m nhi\u1ec7t v\u00e0 m\u00e1y n\u01b0\u1edbc n\u00f3ng) s\u1ebd l\u1ea5y n\u0103ng l\u01b0\u1ee3ng c\u1ee7a ch\u00fang t\u1eeb l\u01b0\u1edbi \u0111i\u1ec7n.)\n<br></i><br>=&gt; T\u1eeb \"<b>their</b>\" ch\u1ec9 \u0111\u1ebfn \"<b>n\u0103ng l\u01b0\u1ee3ng c\u1ee7a c\u00e1c c\u00f4ng ngh\u1ec7 s\u1ea1ch n\u00e0y</b>\"\n", "key": "C", "isVideo": false, "score": 0, "order": 48, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577265, "lessonId": 0, "a": "It depends on water and clean energy sources.", "b": "It is a potential clean energy source.", "c": "It depends on the use of fossil fuels.", "d": "It is affected by climate change.", "bookId": 1085973, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Which of the following is NOT described as a feature of hydrogen production in paragraph 2?", "answer": "<b>\u0110i\u1ec1u n\u00e0o sau \u0111\u00e2y KH\u00d4NG \u0111\u01b0\u1ee3c m\u00f4 t\u1ea3 l\u00e0 m\u1ed9t \u0111\u1eb7c \u0111i\u1ec3m c\u1ee7a s\u1ea3n xu\u1ea5t hydro trong \u0111o\u1ea1n 2?\n</b><br><b>A.</b> N\u00f3 ph\u1ee5 thu\u1ed9c v\u00e0o n\u01b0\u1edbc v\u00e0 ngu\u1ed3n n\u0103ng l\u01b0\u1ee3ng s\u1ea1ch.\n<br><b>B.</b> N\u00f3 l\u00e0 m\u1ed9t ngu\u1ed3n n\u0103ng l\u01b0\u1ee3ng s\u1ea1ch ti\u1ec1m n\u0103ng.\n<br><b>C.</b> N\u00f3 ph\u1ee5 thu\u1ed9c v\u00e0o vi\u1ec7c s\u1eed d\u1ee5ng nhi\u00ean li\u1ec7u h\u00f3a th\u1ea1ch.\n<br><b>D.</b> N\u00f3 b\u1ecb \u1ea3nh h\u01b0\u1edfng b\u1edfi bi\u1ebfn \u0111\u1ed5i kh\u00ed h\u1eadu.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin:\n</b><br>Hydrogen, a promising clean energy carrier, relies on <u>water</u> and <u>clean power</u> as feedstock.<br><i>(Hydro, m\u1ed9t d\u1ea1ng n\u0103ng l\u01b0\u1ee3ng s\u1ea1ch \u0111\u1ea7y tri\u1ec3n v\u1ecdng, ph\u1ee5 thu\u1ed9c v\u00e0o <u>n\u01b0\u1edbc</u> v\u00e0 <u>\u0111i\u1ec7n s\u1ea1ch</u> l\u00e0m nguy\u00ean li\u1ec7u \u0111\u1ea7u v\u00e0o.)\n</i><br><br><b>=&gt; Hydro kh\u00f4ng ph\u1ee5 thu\u1ed9c v\u00e0o vi\u1ec7c s\u1eed d\u1ee5ng nhi\u00ean li\u1ec7u h\u00f3a th\u1ea1ch, m\u00e0 d\u1ef1a v\u00e0o n\u01b0\u1edbc v\u00e0 \u0111i\u1ec7n s\u1ea1ch.</b>", "key": "C", "isVideo": false, "score": 0, "order": 49, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577267, "lessonId": 0, "a": "The need for more hydrogen technologies", "b": "The need for a cautious strategy to harness available resources", "c": "The importance of increasing wind energy production", "d": "The requirement for more biofuel sources", "bookId": 1085974, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 2, what does the situation in regions like the south of Spain emphasize for efficient hydrogen production?", "answer": "<b>\u1ede \u0111o\u1ea1n 2, t\u00ecnh tr\u1ea1ng \u1edf c\u00e1c khu v\u1ef1c nh\u01b0 mi\u1ec1n nam T\u00e2y Ban Nha nh\u1ea5n m\u1ea1nh \u0111i\u1ec1u g\u00ec \u0111\u1ed1i v\u1edbi vi\u1ec7c s\u1ea3n xu\u1ea5t hydro hi\u1ec7u qu\u1ea3?\n</b><br><b>A.</b> S\u1ef1 c\u1ea7n thi\u1ebft ph\u1ea3i c\u00f3 th\u00eam c\u00e1c c\u00f4ng ngh\u1ec7 hydro.\n<br><b>B.</b> S\u1ef1 c\u1ea7n thi\u1ebft c\u1ee7a m\u1ed9t chi\u1ebfn l\u01b0\u1ee3c th\u1eadn tr\u1ecdng \u0111\u1ec3 khai th\u00e1c c\u00e1c ngu\u1ed3n t\u00e0i nguy\u00ean s\u1eb5n c\u00f3.\n<br><b>C.</b> T\u1ea7m quan tr\u1ecdng c\u1ee7a vi\u1ec7c t\u0103ng c\u01b0\u1eddng s\u1ea3n xu\u1ea5t n\u0103ng l\u01b0\u1ee3ng gi\u00f3.\n<br><b>D.</b> Y\u00eau c\u1ea7u c\u1ea7n c\u00f3 nhi\u1ec1u ngu\u1ed3n nhi\u00ean li\u1ec7u sinh h\u1ecdc h\u01a1n.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin:</b><br>Regions, such as the south of Spain, facing water shortages, highlight the need for a nuanced approach to utilize available resources to make hydrogen efficiently.<br><i>(C\u00e1c khu v\u1ef1c nh\u01b0 mi\u1ec1n nam T\u00e2y Ban Nha, n\u01a1i \u0111ang \u0111\u1ed1i m\u1eb7t v\u1edbi t\u00ecnh tr\u1ea1ng thi\u1ebfu n\u01b0\u1edbc, nh\u1ea5n m\u1ea1nh s\u1ef1 c\u1ea7n thi\u1ebft <u>ph\u1ea3i c\u00f3 m\u1ed9t c\u00e1ch ti\u1ebfp c\u1eadn</u> tinh t\u1ebf \u0111\u1ec3 <u>t\u1eadn d\u1ee5ng c\u00e1c ngu\u1ed3n t\u00e0i nguy\u00ean s\u1eb5n c\u00f3 nh\u1eb1m s\u1ea3n xu\u1ea5t hydro m\u1ed9t c\u00e1ch hi\u1ec7u qu\u1ea3</u>.)\n</i><br><br><b>=&gt; C\u1ea7n ph\u1ea3i c\u00f3 m\u1ed9t chi\u1ebfn l\u01b0\u1ee3c \u0111\u1ec3 khai th\u00e1c c\u00e1c ngu\u1ed3n t\u00e0i nguy\u00ean s\u1eb5n c\u00f3.\n</b>", "key": "B", "isVideo": false, "score": 0, "order": 50, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577269, "lessonId": 0, "a": "It is unanimously agreed on how to allocate green power.", "b": "It is a complex issue with different opinions.", "c": "It is clear that hydrogen production should take priority over greening the grid.", "d": "It has already been resolved in favor of hydrogen production.", "bookId": 1085975, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What can be inferred from the distribution of green power to hydrogen production or directly greening the grid?", "answer": "<span><b>C\u00f3 th\u1ec3 suy ra \u0111i\u1ec1u g\u00ec t\u1eeb vi\u1ec7c ph\u00e2n b\u1ed5 n\u0103ng l\u01b0\u1ee3ng xanh cho s\u1ea3n xu\u1ea5t hydro ho\u1eb7c l\u00e0m xanh l\u01b0\u1edbi \u0111i\u1ec7n?\n</b><br><b>A.</b> M\u1ecdi ng\u01b0\u1eddi \u0111\u1ec1u \u0111\u1ed3ng thu\u1eadn v\u1ec1 c\u00e1ch ph\u00e2n b\u1ed5 n\u0103ng l\u01b0\u1ee3ng xanh. <b>=&gt; Sai.</b> \u0110o\u1ea1n v\u0103n n\u00f3i r\u00f5 l\u00e0 c\u00f3 tranh c\u00e3i.<br><b>B.</b> \u0110\u00e2y l\u00e0 m\u1ed9t v\u1ea5n \u0111\u1ec1 ph\u1ee9c t\u1ea1p v\u1edbi nhi\u1ec1u \u00fd ki\u1ebfn kh\u00e1c nhau.<b> =&gt; \u0110\u00fang\n\n</b><br><b>C.</b> R\u00f5 r\u00e0ng hydro n\u00ean \u0111\u01b0\u1ee3c \u01b0u ti\u00ean h\u01a1n vi\u1ec7c l\u00e0m xanh l\u01b0\u1edbi \u0111i\u1ec7n. <b>=&gt; Sai.</b> Kh\u00f4ng c\u00f3 th\u00f4ng tin cho th\u1ea5y s\u1ea3n xu\u1ea5t hydrogen n\u00ean \u0111\u01b0\u1ee3c \u01b0u ti\u00ean h\u01a1n.<br><b>D.</b> V\u1ea5n \u0111\u1ec1 n\u00e0y \u0111\u00e3 \u0111\u01b0\u1ee3c gi\u1ea3i quy\u1ebft theo h\u01b0\u1edbng \u01b0u ti\u00ean s\u1ea3n xu\u1ea5t hydro. <b>=&gt; Sai.</b> \u0110o\u1ea1n v\u0103n kh\u00f4ng n\u00f3i v\u1ea5n \u0111\u1ec1 \u0111\u00e3 \u0111\u01b0\u1ee3c gi\u1ea3i quy\u1ebft, m\u00e0 ng\u01b0\u1ee3c l\u1ea1i c\u00f2n \u0111ang l\u00e0 \"dilemma\" (t\u00ecnh th\u1ebf kh\u00f3 x\u1eed).<br><br><b>C\u0103n c\u1ee9 v\u00e0o th\u00f4ng tin:\n</b><br>The dilemma of allocating green power to hydrogen production or directly greening the grid has become <u>a contentious element</u> of transition debates.<br><i>(Vi\u1ec7c ph\u00e2n b\u1ed5 n\u0103ng l\u01b0\u1ee3ng xanh cho s\u1ea3n xu\u1ea5t hydro hay s\u1eed d\u1ee5ng \u0111\u1ec3 l\u00e0m xanh l\u01b0\u1edbi \u0111i\u1ec7n \u0111\u00e3 tr\u1edf th\u00e0nh m\u1ed9t </i><u>y</u><i><u>\u1ebfu t\u1ed1 g\u00e2y tranh c\u00e3i</u> trong c\u00e1c cu\u1ed9c th\u1ea3o lu\u1eadn v\u1ec1 chuy\u1ec3n \u0111\u1ed5i n\u0103ng l\u01b0\u1ee3ng.)\n\n</i></span>", "key": "B", "isVideo": false, "score": 0, "order": 51, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577272, "lessonId": 0, "a": "unnecessary", "b": "critical", "c": "optional", "d": "challenging", "bookId": 1085976, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The word <b>imperative </b>in paragraph 3 could best be replaced by _____.", "answer": "<b>T\u1eeb \"imperative\" trong \u0111o\u1ea1n 3 c\u00f3 th\u1ec3 \u0111\u01b0\u1ee3c thay th\u1ebf b\u1eb1ng t\u1eeb n\u00e0o?\n</b><br><b>A.</b> Kh\u00f4ng c\u1ea7n thi\u1ebft.\n<br><b>B.</b> Quan tr\u1ecdng, thi\u1ebft y\u1ebfu.\n<br><b>C.</b> T\u00f9y ch\u1ecdn.\n<br><b>D.</b> Th\u00e1ch th\u1ee9c.\n<br><br><b>C\u0103n c\u1ee9 v\u00e0o ng\u1eef c\u1ea3nh:</b><br>Striking the right balance is <b><u>imperative</u></b> for an effective energy transition.<br><i>(\u0110\u1ea1t \u0111\u01b0\u1ee3c s\u1ef1 c\u00e2n b\u1eb1ng ph\u00f9 h\u1ee3p l\u00e0 <u><b>\u0111i\u1ec1u b\u1eaft bu\u1ed9c</b></u> \u0111\u1ec3 chuy\u1ec3n \u0111\u1ed5i n\u0103ng l\u01b0\u1ee3ng hi\u1ec7u qu\u1ea3.)\n</i><br><br>=&gt; imperative /\u026am\u02c8per\u0259t\u026av/ (adj) c\u1ea7n thi\u1ebft, thi\u1ebft y\u1ebfu.", "key": "B", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully.", "content": "1. For many hundreds of thousands of people worldwide, online networking has become <b>enmeshed </b>in our daily lives. However, it is a decades-old insight from a study of traditional social networks that best illuminates one of the most important aspects of today\u2019s online networking. In 1973 sociologist Mark Granovetter showed how the loose acquaintances, or weak ties, in our social network exert a disproportionate influence over our behavior and choices. Granovetter\u2019s research showed that a significant percentage of people get their jobs as a result of recommendations or advice provided by a weak tie. Today our number of weak-tie contacts has exploded via online social networking.<br>2. The explosion of weak ties could have profound consequences for our social structures too, according to Judith Donath of the Berkman Center for Internet and Society at Harvard University. '<b>We\u2019re already seeing changes</b>.' she says. For example, many people now turn to their online social networks ahead of sources such as newspapers and television for trusted and relevant news or information. What they hear could well be inaccurate, but the change is happening. If these huge 'supernets' - some of them numbering up to 5, 000 people - continue to thrive and grow, <b>they </b>could fundamentally change the way we share information and transform our notions of relationships.<br>3. Robin Dunbar, an evolutionary anthropologist at the University of Oxford, believes that our primate brains place a cap on the number of genuine social relationships we can actually cope with: roughly 150. According to Dunbar, online social networking appears to be very good for 'servicing' relationships, but not for establishing them. <br>4. Nonetheless, there is evidence that online networking can transform our daily interactions. In an experiment at Cornell University, psychologist Jeff Hancock asked participants to try to encourage other participants to like them via instant messaging conversation. Beforehand, some members of the trial were allowed to view the Facebook profile of the person they were trying to win over. He found that those with Facebook access asked questions to which they already knew the answers or raised things they had in common, and as result were much more successful in their social relationships. <br>5. Online social networking may also have tangible effects on our well-being. Nicole Ellison of Michigan State University found that the frequency of networking site use correlates with greater self- esteem. 'Asking your close friends for help or advice is nothing new, but we are seeing a lowering of barriers among acquaintances, ' Ellison says. People are readily sharing personal feelings and experiences to a wider circle than they might once have done. The things that befall us are often due to a lack of social support. There\u2019s more of a safety net now.'<br><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21577284, "lessonId": 0, "a": "How online social networking affects self-esteem", "b": "Evolution of friendship in the digital age", "c": "Impacts of online networking on relationships and society", "d": "The psychological impact of online social networking", "bookId": 1085977, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The most suitable title of the passage can be _____.", "answer": "<b>Ti\u00eau \u0111\u1ec1 ph\u00f9 h\u1ee3p nh\u1ea5t cho \u0111o\u1ea1n v\u0103n l\u00e0 g\u00ec?\n</b><br><b>A.</b> C\u00e1ch m\u1ea1ng x\u00e3 h\u1ed9i tr\u1ef1c tuy\u1ebfn \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn s\u1ef1 t\u1ef1 tin nh\u01b0 th\u1ebf n\u00e0o. <b>=&gt; Sai</b> v\u00ec l\u00f2ng t\u1ef1 tr\u1ecdng ch\u1ec9 \u0111\u1ec1 c\u1eadp trong \u0111o\u1ea1n 5\n\n<br><b>B.</b> S\u1ef1 ph\u00e1t tri\u1ec3n c\u1ee7a t\u00ecnh b\u1ea1n trong th\u1eddi \u0111\u1ea1i k\u1ef9 thu\u1eadt s\u1ed1. <b>=&gt; Sai</b> v\u00ec \u0111o\u1ea1n v\u0103n c\u00f2n n\u00f3i \u0111\u1ebfn nhi\u1ec1u m\u1ed1i quan h\u1ec7 kh\u00e1c\n\n<br><b>C.</b> T\u00e1c \u0111\u1ed9ng c\u1ee7a m\u1ea1ng x\u00e3 h\u1ed9i tr\u1ef1c tuy\u1ebfn \u0111\u1ed1i v\u1edbi c\u00e1c m\u1ed1i quan h\u1ec7 v\u00e0 x\u00e3 h\u1ed9i. <b>=&gt; \u0110\u00fang\n\n</b><br><b>D.</b> \u1ea2nh h\u01b0\u1edfng t\u00e2m l\u00fd c\u1ee7a m\u1ea1ng x\u00e3 h\u1ed9i tr\u1ef1c tuy\u1ebfn. <b>=&gt; Sai</b> v\u00ec \u00fd n\u00e0y ch\u1ec9 t\u1eadp trung v\u00e0o t\u00e2m l\u00fd nh\u01b0ng l\u1ea1i b\u1ecf qua c\u00e1c kh\u00eda c\u1ea1nh x\u00e3 h\u1ed9i kh\u00e1c\n\n<br><br><b>Gi\u1ea3i th\u00edch:\n</b><br>- <b>\u0110o\u1ea1n 1:</b> \u0110\u1ec1 c\u1eadp \u0111\u1ebfn m\u1ed1i quan h\u1ec7 y\u1ebfu (weak ties) v\u00e0 c\u00e1ch m\u1ea1ng x\u00e3 h\u1ed9i m\u1edf r\u1ed9ng s\u1ed1 l\u01b0\u1ee3ng m\u1ed1i quan h\u1ec7 y\u1ebfu.<br>- <b>\u0110o\u1ea1n 2:</b> N\u00f3i v\u1ec1 t\u00e1c \u0111\u1ed9ng x\u00e3 h\u1ed9i, v\u00ed d\u1ee5 nh\u01b0 c\u00e1ch m\u1ecdi ng\u01b0\u1eddi t\u00ecm ki\u1ebfm th\u00f4ng tin t\u1eeb m\u1ea1ng x\u                             const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { 
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; 
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // TYPE 1 & 3: FILL KEY
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const chars = userVal.split('');
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let boxesHtml = '<div class="flex gap-2 justify-start items-center">';
                        for(let i=0; i<4; i++) {
                            const char = chars[i] || '';
                            boxesHtml += `<input type="text" maxlength="1" 
                                class="char-input" 
                                data-index="${i}" 
                                data-key="${qKey}" 
                                value="${char}" 
                                readonly 
                                onclick="activateNumpad(this, '${qKey}')"
                                ${isSubmitted ? 'disabled' : ''} 
                            />`;
                        }
                        
                        if(examMode === 'practice' && !isSubmitted) {
                             boxesHtml += `<button onclick="checkFillAnswer('${qKey}')" class="ml-2 px-3 py-2 bg-blue-100 text-blue-700 font-bold rounded-lg text-sm hover:bg-blue-200 transition-colors">Kiểm tra</button>`;
                             // Nút xem lời giải cho practice
                             boxesHtml += `<button onclick="toggleSolution('${qKey}')" class="ml-2 px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button>`;
                        }
                        boxesHtml += '</div>';

                        let feedbackHtml = "";
                        if(isSubmitted) {
                             const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                             if(isCorrect) {
                                feedbackHtml = `<div class="mt-2 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                             } else {
                                feedbackHtml = `<div class="mt-2 text-red-600 text-sm">✗ Sai. Đáp án: <span class="font-bold">${correctVal}</span></div>`;
                             }
                        } else if (examMode === 'practice') {
                             feedbackHtml = `<div id="feedback-${qKey}" class="mt-2 text-sm font-bold hidden"></div>`;
                        }

                        html += `
                        <div class="flex flex-col relative">
                            ${boxesHtml}
                            ${feedbackHtml}
                        </div>`;
                    }

                    // TYPE 2: TRUE/FALSE
                    else if(qType === '2') {
                         html += `<div class="overflow-hidden border rounded-lg">
                            <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                                <tr>
                                    <th scope="col" class="px-3 py-3 w-10 text-center">Ý</th>
                                    <th scope="col" class="px-3 py-3">Nội dung</th>
                                    <th scope="col" class="px-3 py-3 w-32 text-center">Chọn Đ/S</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; 
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; 
                                const userChoice = userObj[pIdx]; 
                                
                                let trClass = "bg-white hover:bg-gray-50";
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) trClass = "bg-green-50";
                                    else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
