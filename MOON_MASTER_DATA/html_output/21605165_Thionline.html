 theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam,</i> t\u1eadp 4, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>X\u00e1c \u0111\u1ecbnh y\u1ebfu t\u1ed1 k\u00ec \u1ea3o trong \u0111o\u1ea1n v\u0103n?", "answer": "<b>\u0110\u00e1p \u00e1n: C\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>Trong \u0111o\u1ea1n v\u0103n, chi ti\u1ebft \u201ctrong c\u01a1n m\u01b0a u \u00e1m, ph\u1ea3ng ph\u1ea5t c\u00f3 ti\u1ebfng kh\u00f3c than th\u1ea3m thi\u1ebft\u201d, l\u00fac nghe th\u1ea5y l\u00fac kh\u00f4ng, ph\u1ee5 thu\u1ed9c v\u00e0o gi\u00f3 m\u01b0a l\u00e0 y\u1ebfu t\u1ed1 k\u00ec \u1ea3o mang m\u00e0u s\u1eafc huy\u1ec1n b\u00ed, kh\u00f4ng x\u1ea3y ra trong \u0111\u1eddi s\u1ed1ng th\u1ef1c t\u1ebf.\n", "key": "C", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605192, "lessonId": 0, "a": "Trang nh\u00e3, c\u1ed5 \u0111i\u1ec3n, quy ph\u1ea1m.", "b": "\u01af\u1edbc l\u1ec7, t\u01b0\u1ee3ng tr\u01b0ng.", "c": "C\u00f3 ngu\u1ed3n g\u1ed1c t\u1eeb thi li\u1ec7u, v\u0103n li\u1ec7u H\u00e1n v\u0103n.", "d": "G\u1ea7n g\u0169i, m\u1ed9c m\u1ea1c, gi\u1ea3n d\u1ecb, \u0111\u1eddi th\u01b0\u1eddng, qu\u00ea ki\u1ec3ng.", "bookId": 1088761, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u0110\u1ee1 m\u1ed3 h\u00f4i: v\u00f5ng l\u00e1c qu\u1ea1t mo,<br>Ch\u1ed1ng h\u01a1i \u0111\u1ea5t: d\u00e9p da, gu\u1ed1c g\u1ed7.<br>Mi\u1ebfng \u0103n s\u1eb5n, c\u00e0 non m\u01b0\u1edbp lu\u1ed9c, ngon kh\u00e9o l\u00e0 ngon!<br>\u0110\u1ed3 ch\u01a1i nhi\u1ec1u, qu\u1ea1t s\u1eady \u0111i\u1ebfu tre, c\u1ee7a \u0111\u00e2u nh\u1eefng c\u1ee7a!\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n C\u00f4ng Tr\u1ee9,<i> H\u00e0n nho phong v\u1ecb ph\u00fa</i>, theo<i> T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam, t\u1eadp 14, </i>NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Nh\u1eadn x\u00e9t n\u00e0o \u0111\u00fang v\u1edbi \u0111\u1eb7c \u0111i\u1ec3m c\u00e1c h\u00ecnh \u1ea3nh trong \u0111o\u1ea1n tr\u00edch?", "answer": "<b>\u0110\u00e1p \u00e1n: D\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>C\u00e1c h\u00ecnh \u1ea3nh \u201cv\u00f5ng l\u00e1c qu\u1ea1t mo\u201d, \u201cd\u00e9p da gu\u1ed1c g\u1ed7\u201d, \u201cc\u00e0 non m\u01b0\u1edbp lu\u1ed9c\u201d, \u201cqu\u1ea1t s\u1eady \u0111i\u1ebfu tre\u201d \u0111\u1ec1u l\u00e0 nh\u1eefng v\u1eadt d\u1ee5ng, m\u00f3n \u0103n quen thu\u1ed9c, g\u1ea7n g\u0169i v\u1edbi \u0111\u1eddi s\u1ed1ng sinh ho\u1ea1t h\u00e0ng ng\u00e0y c\u1ee7a ng\u01b0\u1eddi d\u00e2n lao \u0111\u1ed9ng. Ch\u00fang mang \u0111\u1eadm n\u00e9t m\u1ed9c m\u1ea1c, gi\u1ea3n d\u1ecb, kh\u00f4ng c\u1ea7u k\u1ef3, hoa m\u1ef9, ph\u1ea3n \u00e1nh ch\u00e2n th\u1ef1c cu\u1ed9c s\u1ed1ng \u0111\u1eddi th\u01b0\u1eddng.\n<br>\u2192 C\u00e1c h\u00ecnh \u1ea3nh trong \u0111o\u1ea1n tr\u00edch g\u1ea7n g\u0169i, m\u1ed9c m\u1ea1c, gi\u1ea3n d\u1ecb, \u0111\u1eddi th\u01b0\u1eddng, qu\u00ea ki\u1ec3ng.\n", "key": "D", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605194, "lessonId": 0, "a": "Ng\u01b0\u1eddi m\u1eb9 kh\u00f4ng bi\u1ebft con th\u01b0\u1eddng xuy\u00ean v\u1ec1 mu\u1ed9n v\u00ec ch\u1ecb c\u00f2n v\u1ec1 mu\u1ed9n h\u01a1n con.", "b": "Ng\u01b0\u1eddi m\u1eb9 h\u1ed3i h\u1ed9p \u0111\u1ee3i con v\u1ec1 nh\u01b0 ch\u1edd ng\u01b0\u1eddi t\u00ecnh h\u00f2 h\u1eb9n.", "c": "Ng\u01b0\u1eddi m\u1eb9 kh\u00f4ng bi\u1ebft l\u00ed do con v\u1ec1 khuya.", "d": "L\u00f2ng ng\u01b0\u1eddi m\u1eb9 nh\u01b0 l\u1eeda \u0111\u1ed1t.", "bookId": 1088762, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cM\u01b0\u1eddi m\u1ed9t gi\u1edd. \u0110\u1ed3ng h\u1ed3 nh\u00e0 h\u00e0ng x\u00f3m \u0111ong \u0111\u01b0a th\u1ea3 nh\u1ecbp. Con g\u00e1i v\u1eabn ch\u01b0a v\u1ec1. Th\u00ec ra l\u00e2u nay n\u00f3 \u0111\u00e3 \u0111i v\u00e0 th\u01b0\u1eddng xuy\u00ean v\u1ec1 mu\u1ed9n. T\u00f4i l\u1ea1i kh\u00f4ng h\u1ec1 bi\u1ebft v\u00ec t\u00f4i c\u0169ng th\u01b0\u1eddng v\u1ec1 mu\u1ed9n sau n\u00f3. L\u00f2ng t\u00f4i n\u00f3ng nh\u01b0 l\u1eeda \u0111\u1ed1t. Ch\u1eb3ng c\u00f3 m\u1ed9t l\u00ed do g\u00ec \u0111\u1ec3 n\u00f3 c\u00f3 th\u1ec3 v\u1ec1 khuya \u0111\u1ebfn nh\u01b0 v\u1eady \u0111\u01b0\u1ee3c. Sinh nh\u1eadt t\u1eeb chi\u1ec1u c\u01a1 m\u00e0. Xung quanh h\u00e0ng x\u00f3m ng\u1ee7 im thin th\u00edt. \u0110\u01b0\u1eddng v\u1eafng hoe ho\u1eaft. T\u00f4i quay v\u00e0o nh\u00e0. \u0110\u1ebfn g\u1ea7n b\u00e0n h\u1ecdc c\u1ee7a con g\u00e1i, \u0111\u1ecbnh ng\u1ed3i xu\u1ed1ng nh\u01b0ng t\u1ef1 nhi\u00ean c\u1ea3m th\u1ea5y h\u00e3i h\u00e3i tr\u01b0\u1edbc nh\u1eefng g\u00ec con ghi trong s\u1ed5. Th\u00f4i, th\u00e0 kh\u00f4ng \u0111\u1ecdc n\u1eefa c\u00f2n h\u01a1n l\u00e0 ph\u1ea3i bi\u1ebft nh\u1eefng g\u00ec kh\u1ee7ng khi\u1ebfp \u0111ang x\u1ea3y ra v\u1edbi con m\u00ecnh. T\u00f4i h\u1ed3i h\u1ed9p \u0111\u1ee3i n\u00f3 v\u1ec1 g\u1ea7n nh\u01b0 h\u1ed3i h\u1ed9p ch\u1edd ng\u01b0\u1eddi t\u00ecnh gi\u1edd h\u00f2 h\u1eb9n.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Th\u1ecb Thu Hu\u1ec7,<i> H\u1eadu thi\u00ean \u0111\u01b0\u1eddng,</i> theo<i> vanvn.vn</i>)</div>Chi ti\u1ebft n\u00e0o trong \u0111o\u1ea1n tr\u00edch t\u00f4 \u0111\u1eadm s\u1ef1 v\u00f4 t\u00e2m c\u1ee7a ng\u01b0\u1eddi m\u1eb9?", "answer": "<b>\u0110\u00e1p \u00e1n: A\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>Chi ti\u1ebft \u201cNg\u01b0\u1eddi m\u1eb9 kh\u00f4ng bi\u1ebft con th\u01b0\u1eddng xuy\u00ean v\u1ec1 mu\u1ed9n v\u00ec ch\u1ecb c\u00f2n v\u1ec1 mu\u1ed9n h\u01a1n con.\u201d cho th\u1ea5y s\u1ef1 v\u00f4 t\u00e2m c\u1ee7a ng\u01b0\u1eddi m\u1eb9. V\u00ec qu\u00e1 b\u1eadn r\u1ed9n v\u1edbi c\u00f4ng vi\u1ec7c v\u00e0 cu\u1ed9c s\u1ed1ng ri\u00eang n\u00ean ng\u01b0\u1eddi m\u1eb9 kh\u00f4ng \u0111\u1ec3 \u00fd \u0111\u1ebfn con g\u00e1i. \n", "key": "A", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605197, "lessonId": 0, "a": "\u201cEm v\u1ea5n \u0111\u1ea7u soi g\u01b0\u01a1ng.\u201d.", "b": "\u201cEm \u0111eo d\u1ea3i y\u1ebfm \u0111\u00e0o\u201d.", "c": "\u201cTay c\u1ea7m n\u00f3n quai thao.\u201d.", "d": "\u201cHoa c\u1ecf m\u1edd h\u01a1i s\u01b0\u01a1ng\u201d.", "bookId": 1088763, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cH\u00f4m nay \u0111i Ch\u00f9a H\u01b0\u01a1ng,<br>Hoa c\u1ecf m\u1edd h\u01a1i s\u01b0\u01a1ng.<br>C\u00f9ng th\u1ea7y me em d\u1eady,<br>Em v\u1ea5n \u0111\u1ea7u soi g\u01b0\u01a1ng.<br> <br>Kh\u0103n nh\u1ecf, \u0111u\u00f4i g\u00e0 cao,<br>Em \u0111eo d\u1ea3i y\u1ebfm \u0111\u00e0o;<br>Qu\u1ea7n l\u0129nh, \u00e1o the m\u1edbi,<br>Tay c\u1ea7m n\u00f3n quai thao.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Nh\u01b0\u1ee3c Ph\u00e1p,<i> Ch\u00f9a H\u01b0\u01a1ng</i>, theo <i>nhandan.vn</i>)</div>Chi ti\u1ebft n\u00e0o g\u1ee3i t\u1ea3 b\u1ed1i c\u1ea3nh kh\u00f4ng gian trong \u0111o\u1ea1n th\u01a1?<br>", "answer": "<b>\u0110\u00e1p \u00e1n: D\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>Chi ti\u1ebft \u201cHoa c\u1ecf m\u1edd h\u01a1i s\u01b0\u01a1ng\u201d g\u1ee3i t\u1ea3 khung c\u1ea3nh thi\u00ean nhi\u00ean bu\u1ed5i s\u1edbm v\u1edbi kh\u00f4ng gian m\u1edd \u1ea3o ph\u1ee7 \u0111\u1ea7y s\u01b0\u01a1ng. \u0110\u00e2y c\u0169ng l\u00e0 b\u1ed1i c\u1ea3nh kh\u00f4ng gian \u0111\u1eb7c tr\u01b0ng c\u1ee7a v\u00f9ng n\u00fai ch\u00f9a H\u01b0\u01a1ng.\n", "key": "D", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605213, "lessonId": 0, "a": "B\u1ea3o Thoa hi\u1ec7n l\u00ean qua l\u0103ng k\u00ednh c\u1ee7a B\u1ea3o Ng\u1ecdc.", "b": "B\u1ea3o Thoa c\u00f3 v\u1ebb b\u1ec1 ngo\u00e0i gi\u1ea3n d\u1ecb, k\u00edn \u0111\u00e1o.", "c": "B\u1ea3o Thoa th\u00e2m tr\u1ea7m, s\u1eafc s\u1ea3o, kh\u00f3 \u0111o\u00e1n.", "d": "B\u1ea3o Thoa \u0111\u01b0\u1ee3c kh\u1eafc ho\u1ea1 qua c\u00e1c chi ti\u1ebft v\u1ec1 ngo\u1ea1i h\u00ecnh, h\u00e0nh \u0111\u1ed9ng.", "bookId": 1088764, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cB\u1ea3o Ng\u1ecdc v\u1ed9i \u0111i v\u00e0o nh\u00e0 trong, th\u1ea5y c\u1eeda treo m\u1ed9t b\u1ee9c r\u00e8m the \u0111\u1ecf h\u01a1i c\u0169. B\u1ea3o Ng\u1ecdc v\u00e9n r\u00e8m v\u00e0o, th\u1ea5y B\u1ea3o Thoa \u0111\u01b0\u01a1ng ng\u1ed3i tr\u00ean gi\u01b0\u1eddng th\u00eau kim tuy\u1ebfn, \u0111\u1ea7u v\u00e9n, t\u00f3c \u0111en nh\u00e1nh, m\u1eb7c \u00e1o b\u00f4ng m\u00e0u g\u1ee5, kh\u0103n kho\u00e1c vai m\u00e0u t\u00edm nh\u1ea1t vi\u1ec1n kim ng\u00e2n tuy\u1ebfn, qu\u1ea7n l\u1ee5a b\u00f4ng l\u00f3t m\u00e0u v\u00e0ng, nh\u00ecn kh\u00f4ng c\u00f3 v\u1ebb xa hoa m\u00e0 l\u1ea1i nh\u0169n nh\u1eb7n, m\u00f4i kh\u00f4ng t\u00f4 m\u00e0 \u0111\u1ecf, m\u00e0y kh\u00f4ng k\u1ebb m\u00e0 v\u1eabn xanh, m\u1eaft s\u00e1ng long lanh, \u0111i\u1ec1m \u0111\u1ea1m \u00edt l\u1eddi, c\u00f3 ng\u01b0\u1eddi cho l\u00e0 gi\u1ea3 kh\u1edd d\u1ea1i, t\u00f9y th\u1eddi \u0111\u1ed1i x\u1eed, m\u00ecnh ch\u1ec9 bi\u1ebft ph\u1eadn m\u00ecnh.\u201d</i><br><div style=\"text-align: right;\">(T\u00e0o Tuy\u1ebft C\u1ea7n, <i>H\u1ed3ng l\u00e2u m\u1ed9ng,</i> NXB V\u0103n h\u1ecdc, 1998)</div>Nh\u1eadn x\u00e9t n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>\u0111\u00fang v\u1edbi h\u00ecnh t\u01b0\u1ee3ng nh\u00e2n v\u1eadt B\u1ea3o Thoa trong \u0111o\u1ea1n tr\u00edch?", "answer": "<b>\u0110\u00e1p \u00e1n: C\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>- B\u1ea3o Thoa hi\u1ec7n l\u00ean qua l\u0103ng k\u00ednh c\u1ee7a B\u1ea3o Ng\u1ecdc: trong \u0111o\u1ea1n tr\u00edch, B\u1ea3o Ng\u1ecdc l\u00e0 ng\u01b0\u1eddi v\u00e9n r\u00e8m b\u01b0\u1edbc v\u00e0o, t\u1eadn m\u1eaft nh\u00ecn th\u1ea5y B\u1ea3o Thoa v\u00e0 quan s\u00e1t nhan s\u1eafc, trang ph\u1ee5c c\u0169ng nh\u01b0 phong th\u00e1i c\u1ee7a n\u00e0ng. \n<br>- B\u1ea3o Thoa c\u00f3 v\u1ebb b\u1ec1 ngo\u00e0i gi\u1ea3n d\u1ecb, k\u00edn \u0111\u00e1o: \u201cm\u1eb7c \u00e1o b\u00f4ng m\u00e0u g\u1ee5, kh\u0103n kho\u00e1c vai m\u00e0u t\u00edm nh\u1ea1t vi\u1ec1n kim ng\u00e2n tuy\u1ebfn, qu\u1ea7n l\u1ee5a b\u00f4ng l\u00f3t m\u00e0u v\u00e0ng, nh\u00ecn kh\u00f4ng c\u00f3 v\u1ebb xa hoa m\u00e0 l\u1ea1i nh\u0169n nh\u1eb7n\u201d\n<br>- B\u1ea3o Thoa \u0111\u01b0\u1ee3c kh\u1eafc ho\u1ea1 qua c\u00e1c chi ti\u1ebft v\u1ec1 ngo\u1ea1i h\u00ecnh, h\u00e0nh \u0111\u1ed9ng: B\u1ea3o Thoa \u0111\u01b0\u1ee3c m\u00f4 ta qua c\u00e1ch \u0103n m\u1eb7c, dung m\u1ea1o xinh \u0111\u1eb9p v\u00e0 h\u00e0nh \u0111\u1ed9ng \u201cth\u00eau kim tuy\u1ebfn\u201d.\n<br>\u2192 C l\u00e0 \u0111\u00e1p \u00e1n \u0111\u00fang.\n", "key": "C", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605216, "lessonId": 0, "a": "M\u00e1y m\u00f3c, r\u1eadp khu\u00f4n theo nguy\u00ean t\u1eafc.", "b": "B\u1ea3o th\u1ee7, tr\u00ec tr\u1ec7.", "c": "Linh ho\u1ea1t, \u0111\u1ec1 cao hi\u1ec7u qu\u1ea3 c\u00f4ng vi\u1ec7c.", "d": "T\u1ef1 tung t\u1ef1 t\u00e1c, ph\u00e1ch l\u1ed1i.", "bookId": 1088765, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cB\u00c0 TR\u01af\u1edeNG PH\u00d2NG T\u00c0I V\u1ee4 - Nh\u01b0ng th\u01b0a \u0111\u1ed3ng ch\u00ed Gi\u00e1m \u0111\u1ed1c, c\u00e1c nguy\u00ean t\u1eafc \u1ea5y d\u1ef1a tr\u00ean v\u0103n b\u1ea3n n\u00e0o v\u1eady?<br>HO\u00c0NG VI\u1ec6T - V\u0103n b\u1ea3n do t\u00f4i v\u00e0 c\u00e1c \u0111\u1ed3ng ch\u00ed th\u1ea3o ra.<br>B\u00c0 TR\u01af\u1edeNG PH\u00d2NG T\u00c0I V\u1ee4 - Th\u1eadt ra ch\u01b0a h\u1ec1 c\u00f3 c\u00e1c nguy\u00ean t\u1eafc nh\u01b0 th\u1ebf, ch\u01b0a h\u1ec1 c\u00f3.<br>HO\u00c0NG VI\u1ec6T - Th\u00ec b\u00e2y gi\u1edd ch\u00fang ta s\u1ebd \u0111\u1eb7t ra, c\u00f3 sao \u0111\u00e2u! Mi\u1ec5n l\u00e0 n\u00f3 gi\u00fap ch\u00fang ta l\u00e0m th\u00eam \u0111\u01b0\u1ee3c nhi\u1ec1u s\u1ea3n ph\u1ea9m. T\u1ea5t c\u1ea3 ph\u1ea3i t\u1ea1o m\u1ecdi thu\u1eadn l\u1ee3i cho ng\u01b0\u1eddi tr\u1ef1c ti\u1ebfp s\u1ea3n xu\u1ea5t. S\u1ed1 c\u00e1n b\u1ed9 nh\u00e2n vi\u00ean gi\u00e1n ti\u1ebfp ph\u1ea3i gi\u1ea3m t\u1edbi m\u1ee9c t\u1ed1i thi\u1ec3u.\u201d</i><br><div style=\"text-align: right;\">(L\u01b0u Quang V\u0169,<i> T\u00f4i v\u00e0 ch\u00fang ta,</i> theo <i>Ng\u1eef v\u0103n 9, t\u1eadp 2, </i>NXB Gi\u00e1o d\u1ee5c Vi\u1ec7t Nam, 2013)</div>L\u1eddi \u0111\u1ed1i tho\u1ea1i c\u1ee7a Ho\u00e0ng Vi\u1ec7t cho th\u1ea5y \u0111\u1eb7c \u0111i\u1ec3m n\u00e0o trong phong c\u00e1ch l\u00e0m vi\u1ec7c c\u1ee7a nh\u00e2n v\u1eadt?", "answer": "<b>\u0110\u00e1p \u00e1n: C\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>L\u1eddi \u0111\u1ed1i tho\u1ea1i c\u1ee7a Ho\u00e0ng Vi\u1ec7t th\u1ec3 hi\u1ec7n s\u1ef1 linh ho\u1ea1t khi s\u1eb5n s\u00e0ng \u0111\u1eb7t ra c\u00e1c nguy\u00ean t\u1eafc m\u1edbi \u0111\u1ec3 ph\u00f9 h\u1ee3p v\u1edbi t\u00ecnh h\u00ecnh th\u1ef1c t\u1ebf, mi\u1ec5n l\u00e0 n\u00f3 mang l\u1ea1i hi\u1ec7u qu\u1ea3 c\u00f4ng vi\u1ec7c cao h\u01a1n.\n", "key": "C", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605218, "lessonId": 0, "a": "\u0110o\u00e1 hoa.", "b": "C\u00e1i b\u00f4ng.", "c": "S\u1ee3i ch\u1ec9.", "d": "S\u1ee3i d\u1ecdc, s\u1ee3i ngang.", "bookId": 1088766, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<div style=\"text-align: center;\"><i>\u201cM\u1eb9 t\u00f4i l\u00e0 m\u1ed9t \u0111o\u00e1 hoa,</i></div><i><div style=\"text-align: center;\"><i>Th\u00e2n t\u00f4i trong s\u1ea1ch, t\u00f4i l\u00e0 c\u00e1i b\u00f4ng.</i></div><div style=\"text-align: center;\"><i>X\u01b0a t\u00f4i y\u1ebfu \u1edbt v\u00f4 c\u00f9ng,</i></div><div style=\"text-align: center;\"><i>Ai v\u00f2 c\u0169ng \u0111\u1ee9t, ai rung c\u0169ng r\u1eddi.</i></div><div style=\"text-align: center;\"><i>Khi t\u00f4i \u0111\u00e3 th\u00e0nh ch\u1ec9 r\u1ed3i,</i></div><div style=\"text-align: center;\"><i>C\u0169ng c\u00f2n y\u1ebfu l\u1eafm, \u0103n ng\u1ed3i kh\u00f4ng an.</i></div><div style=\"text-align: center;\"><i>[...]</i></div><div style=\"text-align: center;\"><i>Nh\u1edd t\u00f4i c\u00f3 l\u1eafm \u0111\u1ed3ng bang,</i></div><div style=\"text-align: center;\"><i>H\u1ecdp nhau s\u1ee3i d\u1ecdc, s\u1ee3i ngang r\u1ea5t nhi\u1ec1u. [...]\u201d</i></div></i><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>Ca s\u1ee3i ch\u1ec9</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam, t\u1eadp 38,</i> NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Nh\u00e2n v\u1eadt \u201ct\u00f4i\u201d l\u00e0 ho\u00e1 th\u00e2n c\u1ee7a s\u1ef1 v\u1eadt n\u00e0o sau \u0111\u00e2y?<br>", "answer": "<b>\u0110\u00e1p \u00e1n: B\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>D\u1ef1a v\u00e0o c\u00e2u th\u01a1: \u201cTh\u00e2n t\u00f4i trong s\u1ea1ch, t\u00f4i l\u00e0 c\u00e1i b\u00f4ng.\u201d\n<br>\u2192 Nh\u00e2n v\u1eadt \u201ct\u00f4i\u201d l\u00e0 ho\u00e1 th\u00e2n c\u1ee7a c\u00e1i b\u00f4ng.\n", "key": "B", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605221, "lessonId": 0, "a": "\u1ea8n d\u1ee5.", "b": "N\u00f3i qu\u00e1.", "c": "Nh\u00e2n ho\u00e1.", "d": "Ho\u00e1n d\u1ee5.", "bookId": 1088767, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cKh\u00e1c v\u1edbi c\u00e1c lo\u1ea1i s\u00f3ng tr\u00ean m\u1eb7t bi\u1ec3n, s\u00f3ng l\u1eebng l\u00e0 m\u1ed9t s\u00e1t th\u1ee7 c\u00f4 \u0111\u1ed9c, th\u1ea7m l\u1eb7ng, b\u1ea5t ng\u1edd, ra tay ch\u1edbp nho\u00e1ng v\u00e0 bi\u1ebfn m\u1ea5t kh\u00f4ng \u0111\u1ec3 l\u1ea1i d\u1ea5u v\u1ebft. Cho \u0111\u1ebfn nay, ng\u01b0\u1eddi ta v\u1eabn ch\u01b0a x\u00e1c \u0111\u1ecbnh ch\u00ednh x\u00e1c lai l\u1ecbch, h\u00e0nh tung, b\u1edfi h\u1ea7u nh\u01b0 kh\u00f4ng th\u1ec3 theo d\u00f5i, d\u1ef1 b\u00e1o hay \u0111i\u1ec1u tra tr\u01b0\u1edbc, trong v\u00e0 sau khi n\u00f3 xu\u1ea5t hi\u1ec7n.<b> Ti\u1ebfng l\u1ee5c b\u1ee5c d\u01b0\u1edbi th\u00e2n t\u00e0u n\u00e0y, c\u00f3 th\u1ec3 l\u00e0 m\u1ed9t con s\u00f3ng con \u0111ang \u0111i t\u00ecm m\u1eb9, h\u1ee3p b\u1ea7y l\u00e0m n\u00ean s\u00f3ng l\u1eebng. </b>C\u0169ng c\u00f3 th\u1ec3, \u0111\u00f3 ch\u1ec9 l\u00e0 ti\u1ebfng th\u1edf nh\u1eb9 trong \u00e2m u tr\u00ean h\u00e0nh tr\u00ecnh v\u1ea1n d\u1eb7m c\u1ee7a g\u00e3 s\u00e1t th\u1ee7 bi\u1ec3n s\u00e2u.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Thanh T\u00e2m, <i>Th\u00e9p gi\u1eefa tr\u00f9ng kh\u01a1i, </i>theo <i>vannghequandoi.com.vn</i>)</div>Bi\u1ec7n ph\u00e1p tu t\u1eeb n\u00e0o \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng trong c\u00e2u v\u0103n in \u0111\u1eadm?", "answer": "<b>\u0110\u00e1p \u00e1n: C\n<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:\n</b><br>C\u00e2u v\u0103n in \u0111\u1eadm s\u1eed d\u1ee5ng bi\u1ec7n ph\u00e1p nh\u00e2n h\u00f3a, g\u00e1n cho s\u00f3ng nh\u1eefng \u0111\u1eb7c \u0111i\u1ec3m v\u00e0 h\u00e0nh \u0111\u1ed9ng c\u1ee7a con ng\u01b0\u1eddi (con s\u00f3ng con, \u0111i t\u00ecm m\u1eb9, h\u1ee3p b\u1ea7y). \u0110i\u1ec1u n\u00e0y l\u00e0m cho s\u00f3ng tr\u1edf n\u00 \u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 21 \u0111\u1ebfn 25", "content": "\u201cTheo m\u1ed9t nghi\u00ean c\u1ee9u m\u1edbi c\u1ee7a c\u00e1c nh\u00e0 khoa h\u1ecdc \u1edf Ph\u00f2ng th\u00ed nghi\u1ec7m L\u1ef1c \u0111\u1ea9y ph\u1ea3n l\u1ef1c (JPL) thu\u1ed9c NASA, \u1edf Nam California, ba ph\u1ea7n t\u01b0 khu v\u1ef1c ven bi\u1ec3n tr\u00ean to\u00e0n th\u1ebf gi\u1edbi s\u1ebd b\u1ecb nhi\u1ec5m m\u1eb7n v\u00e0o n\u0103m 2100. Ngo\u00e0i vi\u1ec7c khi\u1ebfn m\u1ed9t s\u1ed1 t\u1ea7ng ch\u1ee9a n\u01b0\u1edbc ven bi\u1ec3n kh\u00f4ng th\u1ec3 d\u00f9ng \u0111\u1ec3 u\u1ed1ng hay t\u01b0\u1edbi ti\u00eau, \u0111i\u1ec1u n\u00e0y c\u00f2n g\u00e2y h\u1ea1i cho h\u1ec7 sinh th\u00e1i v\u00e0 \u0103n m\u00f2n c\u01a1 s\u1edf h\u1ea1 t\u1ea7ng. <br>S\u1ef1 x\u00e2m nh\u1eadp m\u1eb7n s\u1ebd x\u1ea3y ra b\u00ean d\u01b0\u1edbi b\u1edd bi\u1ec3n, n\u01a1i hai kh\u1ed1i n\u01b0\u1edbc gi\u1eb1ng co l\u1eabn nhau. L\u01b0\u1ee3ng m\u01b0a tr\u00ean \u0111\u1ea5t li\u1ec1n b\u1ed5 sung n\u01b0\u1edbc ng\u1ecdt cho c\u00e1c t\u1ea7ng ch\u1ee9a n\u01b0\u1edbc ven bi\u1ec3n (\u0111\u00e1 v\u00e0 \u0111\u1ea5t ng\u1ea7m ch\u1ee9a n\u01b0\u1edbc), ch\u1ea3y d\u01b0\u1edbi l\u00f2ng \u0111\u1ea5t h\u01b0\u1edbng v\u1ec1 \u0111\u1ea1i d\u01b0\u01a1ng. Trong khi \u0111\u00f3, d\u01b0\u1edbi \u00e1p su\u1ea5t c\u1ee7a \u0111\u1ea1i d\u01b0\u01a1ng, n\u01b0\u1edbc bi\u1ec3n c\u00f3 xu h\u01b0\u1edbng \u0111\u1ea9y v\u00e0o \u0111\u1ea5t li\u1ec1n. D\u00f9 c\u00f3 s\u1ef1 pha tr\u1ed9n trong v\u00f9ng chuy\u1ec3n ti\u1ebfp n\u01a1i hai b\u00ean g\u1eb7p nhau, nh\u01b0ng s\u1ef1 c\u00e2n b\u1eb1ng c\u1ee7a c\u00e1c l\u1ef1c \u0111\u1ed1i l\u1eadp gi\u1eef n\u01b0\u1edbc ng\u1ecdt v\u00e0 n\u01b0\u1edbc m\u1eb7n \u1edf hai ph\u00eda t\u00e1ch bi\u1ec7t.<br>Gi\u1edd \u0111\u00e2y, t\u00e1c \u0111\u1ed9ng c\u1ee7a bi\u1ebfn \u0111\u1ed5i kh\u00ed h\u1eadu \u0111ang nghi\u00eang c\u00e1n c\u00e2n v\u1ec1 ph\u00eda n\u01b0\u1edbc m\u1eb7n. Khi Tr\u00e1i \u0111\u1ea5t n\u00f3ng l\u00ean, m\u1ef1c n\u01b0\u1edbc bi\u1ec3n d\u00e2ng cao khi\u1ebfn b\u1edd bi\u1ec3n l\u00f9i d\u1ea7n v\u00e0o n\u1ed9i \u0111\u1ecba, \u0111\u1ed3ng th\u1eddi khi\u1ebfn n\u01b0\u1edbc m\u1eb7n ti\u1ebfn s\u00e2u h\u01a1n v\u00e0o \u0111\u1ea5t li\u1ec1n. B\u00ean c\u1ea1nh \u0111\u00f3, qu\u00e1 tr\u00ecnh b\u1ed5 sung n\u01b0\u1edbc ng\u1ea7m ch\u1eadm h\u01a1n - do l\u01b0\u1ee3ng m\u01b0a \u00edt h\u01a1n v\u00e0 th\u1eddi ti\u1ebft \u1ea5m h\u01a1n - \u0111ang l\u00e0m suy gi\u1ea3m l\u1ef1c \u0111\u1ea9y c\u1ee7a n\u01b0\u1edbc ng\u1ea7m \u1edf m\u1ed9t s\u1ed1 khu v\u1ef1c. <br>Nh\u00f3m nghi\u00ean c\u1ee9u \u0111\u00e3 c\u00f4ng b\u1ed1 k\u1ebft qu\u1ea3 tr\u00ean t\u1ea1p ch\u00ed <i>Geophysical Research Letters</i> v\u00e0o th\u00e1ng 11. H\u1ecd \u0111\u00e3 nghi\u00ean c\u1ee9u h\u01a1n 60.000 l\u01b0u v\u1ef1c ven bi\u1ec3n tr\u00ean kh\u1eafp th\u1ebf gi\u1edbi, l\u1eadp b\u1ea3n \u0111\u1ed3 v\u1ec1 t\u00e1c \u0111\u1ed9ng c\u1ee7a s\u1ef1 suy gi\u1ea3m n\u01b0\u1edbc ng\u1ea7m v\u00e0 n\u01b0\u1edbc bi\u1ec3n d\u00e2ng \u0111\u1ebfn qu\u00e1 tr\u00ecnh x\u00e2m nh\u1eadp m\u1eb7n, \u0111\u1ed3ng th\u1eddi \u0111\u00e1nh gi\u00e1 \u1ea3nh h\u01b0\u1edfng c\u1ee7a ch\u00fang. <br>Th\u00f4ng qua vi\u1ec7c xem x\u00e9t c\u00e1c y\u1ebfu t\u1ed1 n\u00e0y, nh\u00f3m nghi\u00ean c\u1ee9u nh\u1eadn th\u1ea5y \u0111\u1ebfn n\u0103m 2100, t\u00ecnh tr\u1ea1ng n\u01b0\u1edbc bi\u1ec3n d\u00e2ng l\u00e0m gia t\u0103ng x\u00e2m nh\u1eadp m\u1eb7n trong \u0111\u1ea5t li\u1ec1n s\u1ebd x\u1ea3y ra \u1edf 82% l\u01b0u v\u1ef1c \u0111\u01b0\u1ee3c nghi\u00ean c\u1ee9u. V\u00f9ng chuy\u1ec3n ti\u1ebfp \u1edf nh\u1eefng n\u01a1i \u0111\u00f3 s\u1ebd d\u1ecbch chuy\u1ec3n kh\u00f4ng qu\u00e1 200m so v\u1edbi v\u1ecb tr\u00ed hi\u1ec7n t\u1ea1i. C\u00e1c khu v\u1ef1c d\u1ec5 b\u1ecb t\u1ed5n th\u01b0\u01a1ng bao g\u1ed3m c\u00e1c v\u00f9ng \u0111\u1ea5t th\u1ea5p nh\u01b0 \u0110\u00f4ng Nam \u00c1, b\u1edd bi\u1ec3n quanh V\u1ecbnh Mexico v\u00e0 ph\u1ea7n l\u1edbn b\u1edd \u0110\u00f4ng n\u01b0\u1edbc M\u1ef9. <br>Trong khi \u0111\u00f3, qu\u00e1 tr\u00ecnh b\u1ed5 sung n\u01b0\u1edbc ng\u1ea7m ch\u1eadm h\u01a1n d\u1eabn \u0111\u1ebfn x\u00e2m nh\u1eadp m\u1eb7n \u1edf 45% khu v\u1ef1c ven bi\u1ec3n trong nghi\u00ean c\u1ee9u. \u1ede nh\u1eefng khu v\u1ef1c n\u00e0y, v\u00f9ng chuy\u1ec3n ti\u1ebfp s\u1ebd di chuy\u1ec3n s\u00e2u h\u01a1n v\u00e0o \u0111\u1ea5t li\u1ec1n so v\u1edbi m\u1ef1c n\u01b0\u1edbc bi\u1ec3n d\u00e2ng - kho\u1ea3ng 1200m \u1edf m\u1ed9t s\u1ed1 n\u01a1i. C\u00e1c khu v\u1ef1c b\u1ecb \u1ea3nh h\u01b0\u1edfng nhi\u1ec1u nh\u1ea5t bao g\u1ed3m b\u00e1n \u0111\u1ea3o \u1ea2 R\u1eadp, T\u00e2y \u00dac v\u00e0 b\u00e1n \u0111\u1ea3o Baja California c\u1ee7a Mexico. B\u00ean c\u1ea1nh \u0111\u00f3, qu\u00e1 tr\u00ecnh b\u1ed5 sung n\u01b0\u1edbc ng\u1ea7m t\u0103ng l\u00ean \u1edf 42% c\u00e1c l\u01b0u ven bi\u1ec3n, \u0111\u1ea9y l\u00f9i v\u00f9ng chuy\u1ec3n ti\u1ebfp v\u1ec1 ph\u00eda \u0111\u1ea1i d\u01b0\u01a1ng, v\u00e0 \u1edf m\u1ed9t s\u1ed1 khu v\u1ef1c s\u1ebd kh\u1eafc ph\u1ee5c \u0111\u01b0\u1ee3c t\u00e1c \u0111\u1ed9ng c\u1ee7a x\u00e2m nh\u1eadp m\u1eb7n do n\u01b0\u1edbc bi\u1ec3n d\u00e2ng. <br>Nh\u00ecn chung, nghi\u00ean c\u1ee9u cho th\u1ea5y t\u00ecnh tr\u1ea1ng x\u00e2m nh\u1eadp m\u1eb7n s\u1ebd x\u1ea3y ra \u1edf 77% l\u01b0u v\u1ef1c ven bi\u1ec3n v\u00e0o cu\u1ed1i th\u1ebf k\u1ec9 n\u00e0y do t\u00e1c \u0111\u1ed9ng k\u1ebft h\u1ee3p c\u1ee7a nh\u1eefng thay \u0111\u1ed5i v\u1ec1 m\u1ef1c n\u01b0\u1edbc bi\u1ec3n v\u00e0 l\u01b0\u1ee3ng n\u01b0\u1edbc ng\u1ea7m b\u1ed5 sung.<br>Trong \u0111\u00f3, t\u1ed1c \u0111\u1ed9 b\u1ed5 sung n\u01b0\u1edbc ng\u1ea7m ch\u1eadm h\u01a1n s\u1ebd th\u00fac \u0111\u1ea9y m\u1ee9c \u0111\u1ed9 x\u00e2m nh\u1eadp m\u1eb7n v\u00e0o \u0111\u1ea5t li\u1ec1n, c\u00f2n m\u1ef1c n\u01b0\u1edbc bi\u1ec3n d\u00e2ng s\u1ebd t\u00e1c \u0111\u1ed9ng \u0111\u1ebfn s\u1ef1 lan r\u1ed9ng c\u1ee7a t\u00ecnh tr\u1ea1ng x\u00e2m Key": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 26 \u0111\u1ebfn 30", "content": "<div style=\"text-align: center;\"><b>Nh\u1edb</b></div><b><div style=\"text-align: center;\"><b>(Nguy\u1ec5n B\u00ednh)</b></div></b><div style=\"text-align: left;\">V\u00ed ch\u0103ng nh\u1edb c\u00f3 nh\u01b0 t\u01a1 nh\u1ec9</div><div style=\"text-align: left;\">Em th\u1eed quay xem \u0111\u01b0\u1ee3c m\u1ea5y v\u00f2ng</div><div style=\"text-align: left;\">V\u00ed ch\u0103ng nh\u1edb c\u00f3 nh\u01b0 v\u1eebng nh\u1ec9</div><div style=\"text-align: left;\">Em th\u1eed l\u00e0o xem \u0111\u01b0\u1ee3c m\u1ea5y th\u01b0ng!</div><div style=\"text-align: left;\"><br></div><div style=\"text-align: left;\">Anh \u01a1i! Em nh\u1edb em kh\u00f4ng n\u00f3i</div><div style=\"text-align: left;\">Nh\u1edb c\u1ee9 \u0111\u1ea7y l\u00ean c\u1ee9 r\u1ed1i l\u00ean</div><div style=\"text-align: left;\">T\u1eeb \u0111\u1ea5y v\u1ec1 \u0111\u00e2y xa qu\u00e1 \u0111\u1ed7i</div><div style=\"text-align: left;\">\u0110\u01b0\u1eddng \u0111i b\u1eb1ng ng\u1ef1a hay b\u1eb1ng thuy\u1ec1n?</div><div style=\"text-align: left;\"><br></div><div style=\"text-align: left;\">Gieo thoi gieo thoi l\u1ea1i gieo thoi</div><div style=\"text-align: left;\">Nh\u1edb nh\u1edb mong mong m\u00e3i m\u00e3i r\u1ed3i</div><div style=\"text-align: left;\">Thoi \u1ea1 l\u00e0m sao thoi l\u1ea1i c\u1ee9</div><div style=\"text-align: left;\">\u0110i v\u1ec1 gi\u0103ng m\u1eafc \u0111\u1ec3 tr\u00eau t\u00f4i?</div><div style=\"text-align: left;\"><br></div><div style=\"text-align: left;\">H\u00f4m qua chim kh\u00e1ch \u0111\u1eadu tr\u00ean c\u00e0nh</div><div style=\"text-align: left;\">K\u00eau m\u00e3i l\u00e0m em c\u1ee9 t\u01b0\u1edfng anh</div><div style=\"text-align: left;\">N\u1ed9i nh\u1eadt h\u00f4m qua v\u1ec1 t\u1edbi b\u1ebfn</div><div style=\"text-align: left;\">Ai ng\u1edd chim kh\u00e1ch c\u0169ng kh\u00f4ng linh!</div><div style=\"text-align: left;\"><br></div><div style=\"text-align: left;\">Anh b\u1ed1n m\u00f9a hoa em m\u1ed9t b\u1ec1</div><div style=\"text-align: left;\">Anh mu\u00f4n qu\u00e1n tr\u1ecd, em th\u00e2m khu\u00ea</div><div style=\"text-align: left;\">May c\u00f2n h\u01a1n \u0111\u01b0\u1ee3c ai s\u01b0\u01a1ng ph\u1ee5</div><div style=\"text-align: left;\">L\u00e0 nh\u1edb ng\u01b0\u1eddi \u0111i c\u00f3 th\u1ec3 v\u1ec1.</div><div style=\"text-align: left;\">1936</div><div style=\"text-align: right;\">(Theo <i>Nguy\u1ec5n B\u00ednh th\u01a1 v\u00e0 \u0111\u1eddi, </i>NXB V\u0103n h\u1ecdc, 2003)</div>", "listQuestion": [{"questionId": 21605255, "lessonId": 0, "a": "N\u1ed7i nh\u1edb.", "b": "Ni\u1ec1m ti\u1ebfc nu\u1ed1i.", "c": "N\u1ed7i x\u00f3t xa.", "d": "N\u1ed7i cay \u0111\u1eafng.", "bookId": 1088782, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "C\u1ea3m h\u1ee9ng ch\u1ee7 \u0111\u1ea1o trong b\u00e0i th\u01a1 l\u00e0 g\u00ec?", "answer": "<b>\u0110\u00e1p \u00e1n: A<br>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>B\u00e0i th\u01a1 b\u1ed9c l\u1ed9 n\u1ed7i nh\u1edb nhung da di\u1ebft, kh\u1eafc kho\u1ea3i c\u1ee7a ng\u01b0\u1eddi con g\u00e1i d\u00e0nh cho ng\u01b0\u1eddi m\u00ecnh y\u00eau.<br>\u2192 C\u1ea3m h\u1ee9ng ch\u1ee7 \u0111\u1ea1o trong b\u00e0i th\u01a1 l\u00e0 n\u1ed7i nh\u1edb.", "key": "A", "isVideo": true, "score": 0, "order": 26, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605256, "lessonId": 0, "a": "B\u0103n kho\u0103n, t\u00ednh to\u00e1n.", "b": "Ph\u00e2n v\u00e2n, ch\u1edd \u0111\u1ee3i.", "c": "\u00c2u lo, th\u1ea5p th\u1ecfm.", "d": "Mong ng\u00f3ng, ch\u1edd tr\u00f4ng, c\u00f3 ph\u1ea7n s\u1ed1t ru\u1e                                 if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
