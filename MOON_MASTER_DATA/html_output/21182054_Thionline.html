    <script>
        const EXAM_DATA = [{"title": "", "content": "", "listQuestion": [{"questionId": 21205203, "lessonId": 0, "a": "", "b": "", "c": "", "d": "", "bookId": 1056428, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 2, "questionText": "M\u1ed7i ph\u00e1t bi\u1ec3u sau \u0111\u00e2y l\u00e0 \u0111\u00fang hay sai?", "answer": "<b>Ph\u00e1t bi\u1ec3u 1:</b> Hai tam gi\u00e1c \u0111\u1ed3ng d\u1ea1ng th\u00ec t\u1ec9 s\u1ed1 c\u00e1c c\u1ea1nh t\u01b0\u01a1ng \u1ee9ng b\u1eb1ng nhau.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\nD\u1ef1a v\u00e0o \u0111\u1ecbnh ngh\u0129a hai tam gi\u00e1c \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>\nTheo \u0111\u1ecbnh ngh\u0129a, khi hai tam gi\u00e1c \u0111\u1ed3ng d\u1ea1ng v\u1edbi nhau, c\u00e1c c\u1ea1nh t\u01b0\u01a1ng \u1ee9ng c\u1ee7a ch\u00fang s\u1ebd t\u1ec9 l\u1ec7 v\u1edbi nhau.<br>\nT\u1ee9c l\u00e0: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/2e963bbe-d7ca-4b04-a249-fa0e5e418232.png\"/> (v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/b62bc64e-af9a-42a1-94f3-12bc9c7300d2.png\"/> l\u00e0 t\u1ec9 s\u1ed1 \u0111\u1ed3ng d\u1ea1ng).<br>\n\u0110i\u1ec1u n\u00e0y kh\u1eb3ng \u0111\u1ecbnh t\u1ec9 s\u1ed1 gi\u1eefa c\u00e1c c\u1eb7p c\u1ea1nh t\u01b0\u01a1ng \u1ee9ng l\u00e0 b\u1eb1ng nhau.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u \u0110\u00daNG</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 2:</b> Hai tam gi\u00e1c \u0111\u1ed3ng d\u1ea1ng th\u00ec b\u1eb1ng nhau.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\nPh\u00e2n bi\u1ec7t kh\u00e1i ni\u1ec7m \"\u0111\u1ed3ng d\u1ea1ng\" v\u00e0 \"b\u1eb1ng nhau\".<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>\n\"\u0110\u1ed3ng d\u1ea1ng\" ngh\u0129a l\u00e0 c\u00f3 c\u00f9ng h\u00ecnh d\u00e1ng nh\u01b0ng k\u00edch th\u01b0\u1edbc c\u00f3 th\u1ec3 kh\u00e1c nhau (ph\u00f3ng to ho\u1eb7c thu nh\u1ecf).<br>\n\"B\u1eb1ng nhau\" ngh\u0129a l\u00e0 ph\u1ea3i gi\u1ed1ng nhau ho\u00e0n to\u00e0n c\u1ea3 v\u1ec1 h\u00ecnh d\u00e1ng l\u1eabn k\u00edch th\u01b0\u1edbc (t\u1ec9 s\u1ed1 \u0111\u1ed3ng d\u1ea1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/d958e48d-cefe-4ef8-a5b2-806006159865.png\"/> b\u1eaft bu\u1ed9c ph\u1ea3i b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/8d77e42d-6e4c-4812-9ec6-b155bc6eebdb.png\"/>).<br>\nV\u00ec v\u1eady, hai tam gi\u00e1c \u0111\u1ed3ng d\u1ea1ng ch\u01b0a ch\u1eafc \u0111\u00e3 b\u1eb1ng nhau (v\u00ed d\u1ee5 m\u1ed9t tam gi\u00e1c nh\u1ecf v\u00e0 m\u1ed9t tam gi\u00e1c to c\u00f3 c\u00f9ng h\u00ecnh d\u00e1ng).<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 2 l\u00e0 ph\u00e1t bi\u1ec3u SAI</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 3:</b> Hai tam gi\u00e1c c\u00f3 c\u00e1c g\u00f3c t\u01b0\u01a1ng \u1ee9ng b\u1eb1ng nhau th\u00ec \u0111\u1ed3ng d\u1ea1ng v\u1edbi nhau.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\nS\u1eed d\u1ee5ng tr\u01b0\u1eddng h\u1ee3p \u0111\u1ed3ng d\u1ea1ng g\u00f3c - g\u00f3c (g.g).<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>\n\u0110\u00e2y l\u00e0 n\u1ed9i dung c\u1ee7a m\u1ed9t \u0111\u1ecbnh l\u00fd quan tr\u1ecdng: N\u1ebfu hai tam gi\u00e1c c\u00f3 c\u00e1c g\u00f3c t\u01b0\u01a1ng \u1ee9ng b\u1eb1ng nhau (ch\u1ec9 c\u1ea7n 2 c\u1eb7p g\u00f3c l\u00e0 \u0111\u1ee7, v\u00ec g\u00f3c th\u1ee9 3 \u0111\u01b0\u01a1ng nhi\u00ean s\u1ebd b\u1eb1ng nhau) th\u00ec hai tam gi\u00e1c \u0111\u00f3 \u0111\u1ed3ng d\u1ea1ng.<br>\nKhi c\u00e1c g\u00f3c b\u1eb1ng nhau, h\u00ecnh d\u00e1ng c\u1ee7a hai tam gi\u00e1c s\u1ebd y h\u1ec7t nhau.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 3 l\u00e0 ph\u00e1t bi\u1ec3u \u0110\u00daNG</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 4:</b> Hai tam gi\u00e1c \u0111\u1ed3ng d\u1ea1ng th\u00ec t\u1ec9 s\u1ed1 c\u00e1c \u0111\u01b0\u p v\u1edbi \u0111\u1ecbnh l\u00fd n\u00e0y.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u \u0110\u00daNG</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 2:</b> N\u1ebfu hai tam gi\u00e1c c\u00f3 ba c\u1ea1nh t\u01b0\u01a1ng \u1ee9ng t\u1ec9 l\u1ec7 th\u00ec ch\u00fang \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\nD\u1ef1a v\u00e0o tr\u01b0\u1eddng h\u1ee3p \u0111\u1ed3ng d\u1ea1ng th\u1ee9 nh\u1ea5t c\u1ee7a tam gi\u00e1c (C\u1ea1nh - C\u1ea1nh - C\u1ea1nh).<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>\nTheo \u0111\u1ecbnh l\u00fd v\u1ec1 tr\u01b0\u1eddng h\u1ee3p \u0111\u1ed3ng d\u1ea1ng th\u1ee9 nh\u1ea5t: N\u1ebfu ba c\u1ea1nh c\u1ee7a tam gi\u00e1c n\u00e0y t\u1ec9 l\u1ec7 v\u1edbi ba c\u1ea1nh c\u1ee7a tam gi\u00e1c kia th\u00ec hai tam gi\u00e1c \u0111\u00f3 \u0111\u1ed3ng d\u1ea1ng. \u0110\u00e2y l\u00e0 d\u1ea5u hi\u1ec7u nh\u1eadn bi\u1ebft c\u01a1 b\u1ea3n nh\u1ea5t c\u1ee7a hai tam gi\u00e1c \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 2 l\u00e0 ph\u00e1t bi\u1ec3u \u0110\u00daNG</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 3:</b> N\u1ebfu hai tam gi\u00e1c c\u00f3 m\u1ed9t c\u1ea1nh t\u01b0\u01a1ng \u1ee9ng b\u1eb1ng nhau v\u00e0 m\u1ed9t g\u00f3c t\u01b0\u01a1ng \u1ee9ng b\u1eb1ng nhau th\u00ec ch\u00fang \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\nKi\u1ec3m tra c\u00e1c \u0111i\u1ec1u ki\u1ec7n t\u1ed1i thi\u1ec3u \u0111\u1ec3 x\u00e1c \u0111\u1ecbnh hai tam gi\u00e1c \u0111\u1ed3ng d\u1ea1ng (g.g, c.g.c, c.c.c).<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>\n\u0110\u1ec3 k\u1ebft lu\u1eadn hai tam gi\u00e1c \u0111\u1ed3ng d\u1ea1ng, ta c\u1ea7n \u00edt nh\u1ea5t:<br>\n- Hai c\u1eb7p g\u00f3c b\u1eb1ng nhau (tr\u01b0\u1eddng h\u1ee3p g.g).<br>\n- Ho\u1eb7c hai c\u1eb7p c\u1ea1nh t\u1ec9 l\u1ec7 v\u00e0 g\u00f3c xen gi\u1eefa b\u1eb1ng nhau (tr\u01b0\u1eddng h\u1ee3p c.g.c).<br>\n- Ho\u1eb7c ba c\ ddle\" src= \"https://asset.moon.vn/new-latex/2025/12/ca1fe02d-c9ff-431a-9a10-da573a7c9cfa.png\"/>.<br>\nX\u00e9t hai tam gi\u00e1c \u0111\u1ec1u b\u1ea5t k\u1ef3, ch\u00fang lu\u00f4n c\u00f3 c\u00e1c g\u00f3c t\u01b0\u01a1ng \u1ee9ng b\u1eb1ng nhau (c\u00f9ng b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/21ac6d36-7522-4f24-86ff-d5b0d204308f.png\"/>).<br>\nDo \u0111\u00f3, theo tr\u01b0\u1eddng h\u1ee3p \u0111\u1ed3ng d\u1ea1ng g\u00f3c - g\u00f3c, ch\u00fang lu\u00f4n \u0111\u1ed3ng d\u1ea1ng v\u1edbi nhau.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u \u0110\u00daNG</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 2:</b> Hai tam gi\u00e1c vu\u00f4ng c\u00f3 hai g\u00f3c nh\u1ecdn b\u1eb1ng nhau th\u00ec \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\nS\u1eed d\u1ee5ng tr\u01b0\u1eddng h\u1ee3p \u0111\u1ed3ng d\u1ea1ng \u0111\u1eb7c bi\u1ec7t c\u1ee7a tam gi\u00e1c vu\u00f4ng (ho\u1eb7c tr\u01b0\u1eddng h\u1ee3p G\u00f3c - G\u00f3c).<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>\nTam gi\u00e1c vu\u00f4ng lu\u00f4n c\u00f3 m\u1ed9t g\u00f3c b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/eb2f767f-fb6f-4fcf-9991-c6f184480996.png\"/>.<br>\nN\u1ebfu hai tam gi\u00e1c vu\u00f4ng c\u00f3 th\u00eam m\u1ed9t c\u1eb7p g\u00f3c nh\u1ecdn b\u1eb1ng nhau n\u1eefa, th\u00ec c\u1eb7p g\u00f3c nh\u1ecdn c\u00f2n l\u1ea1i \u0111\u01b0\u01a1ng nhi\u00ean c\u0169ng s\u1ebd b\u1eb1ng nhau (v\u00ec t\u1ed5ng ba g\u00f3c l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/e193ee46-3f8e-4df0-bba1-d3075221e574.png\"/>).<br>\nKhi \u0111\u00f3, hai tam gi\u00e1c vu\u00f4ng n\u00e0y c\u00f3 \u0111\u1ea7y \u0111\u1ee7 c\u00e1c g\u00f3c t\u01b0\u01a1ng \u1ee9ng b\u1eb1ng nhau n\u00ean ch\u00fang \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 2 l\u00e0 ph\u00e1t bi\u1ec3u \u0110\u00daNG</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 3:</b> Trong tam gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/99c504b6-4938-46b9-a19d-5dcaeaba3234.png\"/>, k\u1ebb \u0111\u01b0\u1eddng ph\u00e2n gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/be1ab7c2-78d2-49fb-bbb8-64f179df256b.png\"/> (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/3b762756-f21d-4caf-947c-0ae371afcdd1.png\"/> thu\u1ed9c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/f48c95f0-42aa-4034-bba0-41f07db72b3e.png\"/>). N\u1ebfu <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7c8ed1d0-c205-4e0c-95a3-6a22684d519e.png\"/> th\u00ec tam gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/f1454896-19cb-4812-a671-304e54991389.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/c6219e15-b506-4388-aaca-8aabd31c35f1.png\"/> \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\nPh\u00e2n bi\u1ec7t gi\u1eefa \u0111\u1ecbnh l\u00fd \u0111\u01b0\u1eddng ph\u00e2n gi\u00e1c v\u00e0 \u0111i\u1ec1u ki\u1ec7n hai tam gi\u00e1c \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>\n\u0110\u1eb3ng th\u1ee9c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/ac2fe74a-1944-443f-8ad8-7b849e6b1f93.png\"/> ch\u00ednh l\u00e0 n\u1ed9i dung c\u1ee7a <b>\u0110\u1ecbnh l\u00fd \u0111\u01b0\u1eddng ph\u00e2n gi\u00e1c</b> trong tam gi\u00e1c. \u0110i\u1ec1u n\u00e0y lu\u00f4n \u0111\u00fang khi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/adad5bd0-5b41-459f-afe2-4ab1cdd2698e.png\"/> l\u00e0 ph\u00e2n gi\u00e1c, b\u1ea5t k\u1ec3 h\u00ecnh d\u1ea1ng tam gi\u00e1c nh\u01b0 th\u1ebf n\u00e0o.<br>\nTuy nhi\u00ean, \u0111\u1ec3 hai tam gi\u00e1c nh\u1ecf <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/d12a0ae6-682f-4514-9950-3d3d7357b522.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/fe36c103-d436-4387-bbf1-a2c07ff407d6.png\"/> \u0111\u1ed3ng d\u1ea1ng v\u1edbi nhau, ch\u00fang c\u1ea7n c\u00f3 c\u00e1c g\u00f3c t\u01b0\u01a1ng \u1ee9ng b\u1eb1ng nhau (v\u00ed d\u1ee5 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/554e72fe-0f86-46dc-99fa-74a2535c9a5c.png\"/> ho\u1eb7c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/f47d1f76-5867-4f22-bd3d-ccb37509a988.png\"/>).<br>\nTrong tr\u01b0\u1eddng h\u1ee3p tam gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/948a1100-7290-47a1-ad35-c8f5078f2ce8.png\"/> th\u01b0\u1eddng, hai tam gi\u00e1c nh\u1ecf n\u00e0y c\u00f3 h\u00ecnh d\u1ea1ng kh\u00e1c nhau ho\u00e0n to\u00e0n v\u00e0 kh\u00f4ng \u0111\u1ed3ng d\u1ea1ng.<br>\nVi\u1ec7c \u0111\u1eb3ng th\u1ee9c t\u1ec9 l\u1ec7 c\u1ea1nh x\u1ea3y ra kh\u00f4ng suy ra \u0111\u01b0\u1ee3c hai tam gi\u00e1c \u0111\u00f3 \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 3 l\u00e0 ph\u00e1t bi\u1ec3u SAI</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 4:</b> Trong tam gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/e7b1e4a4-ab85-44ce-8191-f76e386c6fc4.png\"/>, k\u1ebb trung tuy\u1ebfn <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/63de1c33-4f28-40df-ad73-40a777077184.png\"/> (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/0e773fcc-b658-42b1-a3bf-228798e837b8.png\"/> l\u00e0 trung \u0111i\u1ec3m <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/f1d4f209-c201-4277-bdb0-82163178baad.png\"/>). Khi \u0111\u00f3, tam gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/c7f38f95-a580-4784-8975-3a91f2cc2c2b.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/6bea0381-dfaa-42b0-a109-8f7e5f183320.png\"/> lu\u00f4n \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\nD\u1ef1a v\u00e0o t\u00ednh ch\u1ea5t \u0111\u01b0\u1eddng trung tuy\u1ebfn v\u00e0 \u0111\u1ecbnh ngh\u0129a \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>\n\u0110\u01b0\u1eddng trung tuy\u1ebfn <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7f8f167e-e2d0-42bb-9baa-3f6c93063a2b.png\"/> chia tam gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/45995e6f-293b-491a-b394-25e3514b50ca.png\"/> th\u00e0nh hai tam gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/132f6aca-6495-4733-88ec-bc3eeacfced9.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/b495d67f-efc5-4eb7-9b9a-6dd51fad0b19.png\"/> c\u00f3 di\u1ec7n t\u00edch b\u1eb1ng nhau (v\u00ec chung chi\u1ec1u cao v\u00e0 \u0111\u00e1y <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/e399e5df-5ef8-4ef0-8659-8a518f181a87.png\"/>), nh\u01b0ng h\u00ecnh d\u1ea1ng c\u1ee7a ch\u00fang th\u01b0\u1eddng kh\u00e1c nhau.<br>\nV\u00ed d\u1ee5: N\u1ebfu tam gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/fec254c2-f8b2-47c2-a957-68813a35de0b.png\"/> vu\u00f4ng t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/30a57cfb-645a-4884-a048-971d70e0ab3f.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/fd28a5f7-bddc-4a14-b9fa-bcc196b70885.png\"/>, th\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/af80da28-1a9f-4d97-910f-cdc81921bd90.png\"/> c\u00f3 th\u1ec3 l\u00e0 tam gi\u00e1c t\u00f9, trong khi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/350fea55-a88e-4d82-9a0e-26f6d09c502a.png\"/> l\u00e0 tam gi\u00e1c nh\u1ecdn.<br>\nC\u00e1c g\u00f3c v\u00e0 t\u1ec9 l\u1ec7 c\u1ea1nh c\u1ee7a ch\u00fang kh\u00f4ng t\u01b0\u01a1ng \u1ee9ng b\u1eb1ng nhau. Ch\u00fang ch\u1ec9 \u0111\u1ed3ng d\u1ea1ng trong tr\u01b0\u1eddng h\u1ee3p \u0111\u1eb7c bi\u1ec7t (v\u00ed d\u1ee5 tam gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/18854227-a6f0-4657-a94b-5ef29d5f66a8.png\"/> c\u00e2n t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/e4ac2865-c1cb-4665-8ee9-953fe510ed4f.png\"/>), kh\u00f4ng ph\u1ea3i \u201clu\u00f4n \u0111\u1ed3ng d\u1ea1ng\u201d.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 4 l\u00e0 ph\u00e1t bi\u1ec3u SAI</b>\n", "key": " ", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 1, "plans": [{"lessonId": 0, "questionId": 21205214, "planId": 21205215, "content": "Hai tam gi\u00e1c \u0111\u1ec1u b\u1ea5t k\u1ef3 lu\u00f4n \u0111\u1ed3ng d\u1ea1ng v\u1edbi nhau.", "key": "1", "planName": " ", "order": 0, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21205214, "planId": 21205216, "content": "Hai tam gi\u00e1c vu\u00f4ng c\u00f3 hai g\u00f3c nh\u1ecdn b\u1eb1ng nhau th\u00ec \u0111\u1ed3ng d\u1ea1ng.", "key": "1", "planName": " ", "order": 1, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21205214, "planId": 21205217, "content": "Trong tam gi\u00e1c ABC, k\u1ebb \u0111\u01b0\u1eddng ph\u00e2n gi\u00e1c AD (D thu\u1ed9c BC). N\u1ebfu <img style = \"vertical-align:middle\" src= \"https://asset.moon. x\u00e1c l\u00e0 n\u1ed9i dung c\u1ee7a \u0111\u1ecbnh l\u00fd.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u \u0110\u00daNG</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 2:</b> Hai tam gi\u00e1c vu\u00f4ng c\u00f3 c\u00e1c c\u1ea1nh g\u00f3c vu\u00f4ng t\u1ec9 l\u1ec7 v\u1edbi nhau th\u00ec hai tam gi\u00e1c \u0111\u00f3 \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\n\u00c1p d\u1ee5ng tr\u01b0\u1eddng h\u1ee3p \u0111\u1ed3ng d\u1ea1ng \u0111\u1eb7c bi\u1ec7t c\u1ee7a tam gi\u00e1c vu\u00f4ng (ho\u1eb7c tr\u01b0\u1eddng h\u1ee3p c.g.c).<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>\nX\u00e9t hai tam gi\u00e1c vu\u00f4ng, g\u00f3c xen gi\u1eefa hai c\u1ea1nh g\u00f3c vu\u00f4ng lu\u00f4n lu\u00f4n b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/47ecafb5-b044-4ed1-a883-44a56e14288f.png\"/>.<br>\nV\u00ec v\u1eady, n\u1ebfu hai c\u1ea1nh g\u00f3c vu\u00f4ng c\u1ee7a tam gi\u00e1c n\u00e0y t\u1ec9 l\u1ec7 v\u1edbi hai c\u1ea1nh g\u00f3c vu\u00f4ng c\u1ee7a tam gi\u00e1c kia, ta \u0111\u00e3 c\u00f3 \u0111\u1ee7 hai y\u1ebfu t\u1ed1:<br>\n1. Hai c\u1ea1nh t\u01b0\u01a1ng \u1ee9ng t\u1ec9 l\u1ec7.<br>\n2. G\u00f3c xen gi\u1eefa b\u1eb1ng nhau (c\u00f9ng b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/1df230d3-171f-4326-9cbf-dcd54ea49607.png\"/>).<br>\nDo \u0111\u00f3, hai tam gi\u00e1c vu\u00f4ng n\u00e0y \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 2 l\u00e0 ph\u00e1t bi\u1ec3u \u0110\u00daNG</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 3:</b> Trong tam gi\u00e1c vu\u00f4ng, n\u1ebfu m\u1ed9t g\u00f3c nh\u1ecdn b\u1eb1ng m\u1ed9t g\u00f3c nh\u1ecdn c\u1ee7a tam gi\u00e1c vu\u00f4ng kh\u00e1c th\u00ec hai tam gi\u00e1c \u0111\u00f3 \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\nS\u1eed d\u1ee5ng tr\u01b0\u1eddng h\u1ee3p \u0111\u1ed3ng d\u1e  n\u1ebfu hai c\u1eb7p c\u1ea1nh t\u01b0\u01a1ng \u1ee9ng t\u1ec9 l\u1ec7 v\u00e0 g\u00f3c xen gi\u1eefa b\u1eb1ng nhau th\u00ec ch\u00fang \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\nD\u1ef1a v\u00e0o tr\u01b0\u1eddng h\u1ee3p \u0111\u1ed3ng d\u1ea1ng th\u1ee9 hai c\u1ee7a tam gi\u00e1c: C\u1ea1nh - G\u00f3c - C\u1ea1nh (c.g.c).<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>\nN\u1ed9i dung ph\u00e1t bi\u1ec3u n\u00e0y ch\u00ednh x\u00e1c l\u00e0 \u0111\u1ecbnh l\u00fd c\u1ee7a tr\u01b0\u1eddng h\u1ee3p \u0111\u1ed3ng d\u1ea1ng c.g.c.<br>\n\u0110\u1ec3 hai tam gi\u00e1c \u0111\u1ed3ng d\u1ea1ng, ta c\u1ea7n hai \u0111i\u1ec1u ki\u1ec7n:<br>\n1. T\u1ec9 s\u1ed1 gi\u1eefa hai c\u1eb7p c\u1ea1nh t\u01b0\u01a1ng \u1ee9ng b\u1eb1ng nhau.<br>\n2. G\u00f3c n\u1eb1m gi\u1eefa (xen gi\u1eefa) hai c\u1eb7p c\u1ea1nh \u0111\u00f3 ph\u1ea3i b\u1eb1ng nhau.<br>\nPh\u00e1t bi\u1ec3u \u0111\u00e3 n\u00eau \u0111\u1ea7y \u0111\u1ee7 c\u1ea3 hai \u0111i\u1ec1u ki\u1ec7n n\u00e0y.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u \u0110\u00daNG</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 2:</b> Trong h\u00ecnh vu\u00f4ng, hai tam gi\u00e1c t\u1ea1o b\u1edfi m\u1ed9t \u0111\u01b0\u1eddng ch\u00e9o lu\u00f4n \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\nS\u1eed d\u1ee5ng t\u00ednh ch\u1ea5t c\u1ee7a h\u00ecnh vu\u00f4ng v\u00e0 \u0111\u01b0\u1eddng ch\u00e9o.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>\n\u0110\u01b0\u1eddng ch\u00e9o chia h\u00ecnh vu\u00f4ng th\u00e0nh hai tam gi\u00e1c vu\u00f4ng c\u00e2n b\u1eb1ng nhau (hai tam gi\u00e1c vu\u00f4ng c\u00f3 hai c\u1ea1nh g\u00f3c vu\u00f4ng b\u1eb1ng nhau).<br>\nV\u00ec hai tam gi\u00e1c n\u00e0y b\u1eb1ng nhau (congruent), n\u00ean ch\u1eafc ch\u1eafn ch\u00fang \u0111\u1ed3ng d\u1ea1ng v\u1edbi t\u1ec9 s\u1ed1 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/173fc719-2178-47ed-81a5-51ecc113510b.png\"/>.<br>\nH\u01a1n n\u1eefa, c\u1ea3 hai \u0111\u1ec1u l\u00e0 tam gi\u00e1c vu\u00f4ng c\u00e2n (c\u00f3 g\u00f3c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/bc114552-7e14-412e-a91d-ae085b9580da.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/737bb919-8722-4290-a8ac-5971417a511d.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/2f8952d2-0e8a-4c66-9ec1-290a1cfe92e9.png\"/>) n\u00ean h\u00ecnh d\u1ea1ng ho\u00e0n to\u00e0n gi\u1ed1ng nhau.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 2 l\u00e0 ph\u00e1t bi\u1ec3u \u0110\u00daNG</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 3:</b> Hai tam gi\u00e1c c\u00e2n b\u1ea5t k\u1ef3 lu\u00f4n \u0111\u1ed3ng d\u1ea1ng v\u1edbi nhau.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\nS\u1eed d\u1ee5ng ph\u1ea3n ch\u1ee9ng ho\u1eb7c \u0111\u1ecbnh ngh\u0129a \u0111\u1ed3ng d\u1ea1ng cho tam gi\u00e1c c\u00e2n.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>\nTam gi\u00e1c c\u00e2n l\u00e0 tam gi\u00e1c c\u00f3 2 c\u1ea1nh b\u1eb1ng nhau, nh\u01b0ng g\u00f3c \u1edf \u0111\u1ec9nh c\u00f3 th\u1ec3 thay \u0111\u1ed5i t\u00f9y \u00fd.<br>\nV\u00ed d\u1ee5:<br>\nTam gi\u00e1c c\u00e2n th\u1ee9 nh\u1ea5t c\u00f3 g\u00f3c \u1edf \u0111\u1ec9nh l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/2c891c42-41a7-4d3d-9964-a168d263bc15.png\"/> (hai g\u00f3c \u0111\u00e1y l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/ca5528a5-2742-44da-b513-da36d98a8e02.png\"/>).<br>\nTam gi\u00e1c c\u00e2n th\u1ee9 hai c\u00f3 g\u00f3c \u1edf \u0111\u1ec9nh l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/e96b40fb-cf7f-437e-818e-1a276d30aaaa.png\"/> (hai g\u00f3c \u0111\u00e1y l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/f6bfd9c7-0d00-4459-8116-d766b27b0d09.png\"/>).<br>\nR\u00f5 r\u00e0ng c\u00e1c g\u00f3c t\u01b0\u01a1ng \u1ee9ng c\u1ee7a hai tam gi\u00e1c n\u00e0y kh\u00f4ng b\u1eb1ng nhau, n\u00ean ch\u00fang kh\u00f4ng th\u1ec3 \u0111\u1ed3ng d\u1ea1ng. Ch\u00fang ch\u1ec9 \u0111\u1ed3ng d\u1ea1ng khi c\u00f3 th\u00eam \u0111i\u1ec1u ki\u1ec7n g\u00f3c b\u1eb1ng nhau.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 3 l\u00e0 ph\u00e1t bi\u1ec3u SAI</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 4:</b> Hai tam gi\u00e1c c\u00f3 m\u1ed9t c\u1ea1nh b\u1eb1ng nhau v\u00e0 hai g\u00f3c k\u1ec1 c\u1ea1nh \u0111\u00f3 t\u01b0\u01a1ng \u1ee9ng b\u1eb1ng nhau th\u00ec \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p</b><br>\nS\u1eed d\u1ee5ng tr\u01b0\u1eddng h\u1ee3p b\u1eb1ng nhau G\u00f3c - C\u1ea1nh - G\u00f3c (g.c.g) v\u00e0 m\u1ed1i quan h\u1ec7 gi\u1eefa \u201cb\u1eb1ng nhau\u201d v\u00e0 \u201c\u0111\u1ed3ng d\u1ea1ng\u201d.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft</b><br>\nN\u1ebfu hai tam gi\u00e1c c\u00f3 m\u1ed9t c\u1ea1nh b\u1eb1ng nhau v\u00e0 hai g\u00f3c k\u1ec1 c\u1ea1nh \u0111\u00f3 b\u1eb1ng nhau, theo tr\u01b0\u1eddng h\u1ee3p b\u1eb1ng nhau g.c.g, hai tam gi\u00e1c n\u00e0y <b>b\u1eb1ng nhau</b>.<br>\nTrong h\u00ecnh h\u1ecdc, n\u1ebfu hai h\u00ecnh b\u1eb1ng nhau th\u00ec ch\u00fang ch\u1eafc ch\u1eafn <b>\u0111\u1ed3ng d\u1ea1ng</b> (v\u1edbi t\u1ec9 s\u1ed1 \u0111\u1ed3ng d\u1ea1ng l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/ab8dba7b-a97b-4b4b-b39a-573070856ea2.png\"/>).<br>\nNgo\u00e0i ra, ch\u1ec9 c\u1ea7n d\u1eef ki\u1ec7n \u201chai g\u00f3c b\u1eb1ng nhau\u201d l\u00e0 \u0111\u00e3 \u0111\u1ee7 \u0111\u1ec3 k\u1ebft lu\u1eadn ch\u00fang \u0111\u1ed3ng d\u1ea1ng (theo tr\u01b0\u1eddng h\u1ee3p g.g).<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 4 l\u00e0 ph\u00e1t bi\u1ec3u \u0110\u00daNG</b>\n", "key": " ", "isVideo": true, "score": 0, "orde 9 l\u1ec7 th\u00ec \u0111\u1ed3ng d\u1ea1ng.<br>\n\ud83d\udc49 <b>\u0110\u00fang</b>. \u0110\u00e2y l\u00e0 tr\u01b0\u1eddng h\u1ee3p \u0111\u1ed3ng d\u1ea1ng th\u1ee9 nh\u1ea5t (C\u1ea1nh - C\u1ea1nh - C\u1ea1nh).<br>\n<b>M\u1ec7nh \u0111\u1ec1 4:</b> Hai tam gi\u00e1c vu\u00f4ng c\u00f3 m\u1ed9t g\u00f3c nh\u1ecdn b\u1eb1ng nhau th\u00ec \u0111\u1ed3ng d\u1ea1ng.<br>\n\ud83d\udc49 <b>\u0110\u00fang</b>. V\u00ec tam gi\u00e1c vu\u00f4ng \u0111\u00e3 c\u00f3 s\u1eb5n m\u1ed9t g\u00f3c b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7a7f4836-cdf8-4331-8ba9-396e8a5fe0d3.png\"/>. N\u1ebfu c\u00f3 th\u00eam m\u1ed9t g\u00f3c nh\u1ecdn b\u1eb1ng nhau n\u1eefa th\u00ec hai tam gi\u00e1c \u0111\u00f3 s\u1ebd c\u00f3 hai g\u00f3c b\u1eb1ng nhau, n\u00ean \u0111\u1ed3ng d\u1ea1ng theo tr\u01b0\u1eddng h\u1ee3p G\u00f3c - G\u00f3c.<br>\n<br>\n\u0110i\u1ec1n v\u00e0o ch\u1ed7 tr\u1ed1ng nh\u01b0 sau: \"Trong c\u00e1c ph\u00e1t bi\u1ec3u tr\u00ean, c\u00f3 <b>3</b> ph\u00e1t bi\u1ec3u \u0111\u00fang v\u00e0 <b>1</b> ph\u00e1t bi\u1ec3u sai.\"<br>\n<b>\u2705 K\u1ebft lu\u1eadn:</b><br>\n<b>\u0110\u00e1p \u00e1n k\u00e9o th\u1ea3 \u00f4 th\u1ee9 1 l\u00e0:</b> 3<br>\n<b>\u0110\u00e1p \u00e1n k\u00e9o th\u1ea3 \u00f4 th\u1ee9 2 l\u00e0:</b> 1\n", "key": " ", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 1, "plans": [{"lessonId": 0, "questionId": 21205237, "planId": 21205238, "content": "0", "key": "0", "planName": " ", "order": 0, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21205237, "planId": 21205239, "content": "1", "key": "1", "planName": " ", "order": 1, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21205237, "planId": 21205240, "content": "2", "key": "0", "planName": " ", "order": 2, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21205237, "planId": 21205241, "content": "3", \u00e1c \u0111\u1ed3ng d\u1ea1ng</b> gh\u00e9p v\u1edbi: N\u1ebfu m\u1ed9t \u0111\u01b0\u1eddng th\u1eb3ng c\u1eaft hai c\u1ea1nh c\u1ee7a tam gi\u00e1c v\u00e0 song song v\u1edbi c\u1ea1nh c\u00f2n l\u1ea1i th\u00ec n\u00f3 t\u1ea1o th\u00e0nh m\u1ed9t tam gi\u00e1c m\u1edbi \u0111\u1ed3ng d\u1ea1ng v\u1edbi tam gi\u00e1c \u0111\u00e3 cho. (\u00d4 th\u1ee9 2 b\u00ean ph\u1ea3i)<br>\n4. <b>Tr\u01b0\u1eddng h\u1ee3p \u0111\u1ed3ng d\u1ea1ng th\u1ee9 nh\u1ea5t c\u1ee7a tam gi\u00e1c</b> (c.c.c) gh\u00e9p v\u1edbi: N\u1ebfu ba c\u1ea1nh c\u1ee7a tam gi\u00e1c n\u00e0y t\u1ec9 l\u1ec7 v\u1edbi ba c\u1ea1nh c\u1ee7a tam gi\u00e1c kia th\u00ec hai tam gi\u00e1c \u0111\u00f3 \u0111\u1ed3ng d\u1ea1ng. (\u00d4 th\u1ee9 1 b\u00ean ph\u1ea3i)<br>\n5. <b>Tr\u01b0\u1eddng h\u1ee3p \u0111\u1ed3ng d\u1ea1ng th\u1ee9 hai c\u1ee7a tam gi\u00e1c</b> (c.g.c) gh\u00e9p v\u1edbi: N\u1ebfu hai c\u1ea1nh c\u1ee7a tam gi\u00e1c n\u00e0y t\u1ec9 l\u1ec7 v\u1edbi hai c\u1ea1nh c\u1ee7a tam gi\u00e1c kia v\u00e0 hai g\u00f3c t\u1ea1o b\u1edfi c\u00e1c c\u1eb7p c\u1ea1nh \u0111\u00f3 b\u1eb1ng nhau th\u00ec hai tam gi\u00e1c \u0111\u00f3 \u0111\u1ed3ng d\u1ea1ng. (\u00d4 th\u1ee9 8 b\u00ean ph\u1ea3i)<br>\n6. <b>Tr\u01b0\u1eddng h\u1ee3p \u0111\u1ed3ng d\u1ea1ng th\u1ee9 ba c\u1ee7a tam gi\u00e1c</b> (g.g) gh\u00e9p v\u1edbi: N\u1ebfu hai g\u00f3c c\u1ee7a tam gi\u00e1c n\u00e0y b\u1eb1ng hai g\u00f3c c\u1ee7a tam gi\u00e1c kia th\u00ec hai tam gi\u00e1c \u0111\u00f3 \u0111\u1ed3ng d\u1ea1ng v\u1edbi nhau. (\u00d4 th\u1ee9 5 b\u00ean ph\u1ea3i)<br>\n7. <b>Tr\u01b0\u1eddng h\u1ee3p \u0111\u1ed3ng d\u1ea1ng th\u1ee9 nh\u1ea5t c\u1ee7a tam gi\u00e1c vu\u00f4ng</b> (hai c\u1ea1nh g\u00f3c vu\u00f4ng) gh\u00e9p v\u1edbi: N\u1ebfu hai c\u1ea1nh g\u00f3c vu\u00f4ng c\u1ee7a tam gi\u00e1c vu\u00f4ng n\u00e0y t\u1ec9 l\u1ec7 v\u1edbi hai c\u1ea1nh g\u00f3c vu\u00f4ng c\u1ee7a tam gi\u00e1c vu\u00f4ng kia th\u00ec hai tam gi\u00e1c vu\u00f4ng \u0111\u00f3 \u0111\u1ed3ng d\u1ea1ng. (\u00d4 th\u1ee9 3 b\u00ean ph\u1ea3i)<br>\n8. <b>Tr\u01b0\u1eddng h\u1ee3p \u0111\u1ed3ng d\u1ea1ng th\u1ee9 hai c\u1ee7a tam gi\u00e1c vu\u00f4ng</b> (g\u00f3c nh\u1ecdn) gh\u00e9p v\u1edbi: N\u1ebfu tam gi\u00e1c vu\u00f4ng n\u00e0y c\u00f3 m\u1ed9t g\u00f3c nh\u1ecdn b\u1eb1ng g\u00f3c nh\u1ecdn c\u1ee7a tam gi\u00e1c vu\u00f4ng kia th\u00ec hai tam gi\u00e1c vu\u00f4ng \u0111\u00f3 \u0111\u1ed3ng d\u1ea1ng v\u1edbi nhau. (\u00d4 th\u1ee9 6 b\u00ean ph\u1ea3i)<br>\n9. <b>Tr\u01b0\u1eddng h\u1ee3p \u0111\u1ed3ng d\u1ea1ng th\u1ee9 ba c\u1ee7a tam gi\u00e1c vu\u00f4ng</b> (c\u1ea1nh huy\u1ec1n - c\u1ea1nh g\u00f3c vu\u00f4ng) gh\u00e9p v\u1edbi: N\u1ebfu c\u1ea1nh huy\u1ec1n v\u00e0 m\u1ed9t c\u1ea1nh g\u00f3c vu\u00f4ng c\u1ee7a tam gi\u00e1c vu\u00f4ng n\u00e0y t\u1ec9 l\u1ec7 v\u1edbi c\u1ea1nh huy\u1ec1n v\u00e0 m\u1ed9t c\u1ea1nh g\u00f3c vu\u00f4ng c\u1ee7a tam gi\u00e1c vu\u00f4ng kia th\u00ec hai tam gi\u00e1c vu\u00f4ng \u0111\u00f3 \u0111\u1ed3ng d\u1ea1ng. (\u00d4 th\u1ee9 4 b\u00ean ph\u1ea3i)<br>\n\n<b>\u2705 K\u1ebft lu\u1eadn:</b><br>\nN\u1ed1i \u00f4 th\u1ee9 1 \u1edf c\u1ed9t 1 v\u1edbi \u00f4 th\u1ee9 7 \u1edf c\u1ed9t 2.<br>\nN\u1ed1i \u00f4 th\u1ee9 2 \u1edf c\u1ed9t 1 v\u1edbi \u00f4 th\u1ee9 9 \u1edf c\u1ed9t 2.<br>\nN\u1ed1i \u00f4 th\u1ee9 3 \u1edf c\u1ed9t 1 v\u1edbi \u00f4 th\u1ee9 2 \u1edf c\u1ed9t 2.<br>\nN\u1ed1i \u00f4 th\u1ee9 4 \u1edf c\u1ed9t 1 v\u1edbi \u00f4 th\u1ee9 1 \u1edf c\u1ed9t 2.<br>\nN\u1ed1i \u00f4 th\u1ee9 5 \u1edf c\u1ed9t 1 v\u1edbi \u00f4 th\u1ee9 8 \u1edf c\u1ed9t 2.<br>\nN\u1ed1i \u00f4 th\u1ee9 6 \u1edf c\u1ed9t 1 v\u1edbi \u00f4 th\u1ee9 5 \u1edf c\u1ed9t 2.<br>\nN\u1ed1i \u00f4 th\u1ee9 7 \u1edf c\u1ed9t 1 v\u1edbi \u00f4 th\u1ee9 3 \u1edf c\u1ed9t 2.<br>\nN\u1ed1i \u00f4 th\u1ee9 8 \u1edf c\u1ed9t 1 v\u1edbi \u00f4 th\u1ee9 6 \u1edf c\u1ed9t 2.<br>\nN\u1ed1i \u00f4 th\u1ee9 9 \u1edf c\u1ed9t 1 v\u1edbi \u00f4 th\u1ee9 4 \u1edf c\u1ed9t 2.\n", "key": " ", "isVideo": false, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTes bft \u0111\u1ec1 b\u00e0i, ta c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/5be34ed1-1c7c-466c-b2ae-a60f26a35306.png\"/>.<br>\nSuy ra c\u00e1c c\u1eb7p c\u1ea1nh t\u01b0\u01a1ng \u1ee9ng t\u1ec9 l\u1ec7 v\u1edbi nhau: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/adf04c71-160a-4c3d-a88f-a8ea618ec0df.png\"/>.<br>\nThay c\u00e1c gi\u00e1 tr\u1ecb \u0111\u00e3 cho v\u00e0o bi\u1ec3u th\u1ee9c (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/b9c1f4e5-0f55-40ad-92af-c85031d9443d.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/917bb7fb-3bf1-4455-a953-33d07e1d1226.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/d9ef6d75-ca94-46a5-b21e-e175d4787b7b.png\"/>), ta c\u00f3: <br>\n <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/2b290b4b-a39f-435b-bd46-b87d8907d4ff.png\"/>.<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/db70c8ee-7bc5-4e3d-aadd-7c1c164e9c82.png\"/>.<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/39f920dd-a1bf-4dcd-a2e7-cf91b1905842.png\"/>.<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/96654c0c-7335-46f1-82f1-0de8a9524682.png\"/>.<br>\nV\u1eady \u0111\u1ed9 d\u00e0i c\u1ee7a kh\u00fac s\u00f4ng l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/8d9a705d-8965-46e6-8c53-d411cf15b554.png\"/>.<br>\n\n<b>\u2705 K\u1ebft lu\u1eadn:</b> \u0110i\u1ec1n \u0111\u00e1p \u00e1n: <b>20</b>\n", "key": " ", "isVideo": true, "score": 0, "order": 9, "fillKey": "20", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 1, "plans": [], "answerPlans": [], "normalizedType": "1"}, {"questionId": 21205253, "lessonId": 0, "a":                     }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
