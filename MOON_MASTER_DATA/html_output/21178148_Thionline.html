nText": "Theo quy \u0111\u1ecbnh c\u1ee7a khu ph\u1ed1, m\u1ed7i gia \u0111\u00ecnh s\u1eed d\u1ee5ng b\u1eadc tam c\u1ea5p di \u0111\u1ed9ng \u0111\u1ec3 d\u1eaft xe v\u00e0o nh\u00e0 kh\u00f4ng \u0111\u01b0\u1ee3c l\u1ea5n chi\u1ebfm v\u1ec9a h\u00e8 qu\u00e1 85 cm ra ph\u00eda v\u1ec9a h\u00e8. Bi\u1ebft r\u1eb1ng nh\u00e0 b\u1ea1n Nam c\u00f3 n\u1ec1n cao 60 cm so v\u1edbi v\u1ec9a h\u00e8 v\u00e0 c\u00f3 chi\u1ec1u d\u00e0i b\u1eadc tam c\u1ea5p l\u00e0 1 m. Theo em nh\u00e0 b\u1ea1n Nam c\u00f3 th\u1ef1c hi\u1ec7n \u0111\u00fang quy \u0111\u1ecbnh c\u1ee7a khu ph\u1ed1 kh\u00f4ng? V\u00ec sao?<br><img src=\"https://asset.moon.vn/img/chat/large/2025/10/d550e4a8-2404-4777-92db-40d88e21dcf7.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\">", "answer": "<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6aab79b7-a8ab-41d3-aa0a-2e4bdb14933a.png\"/>ABC vu\u00f4ng t\u1ea1i A theo \u0111\u1ecbnh l\u00fd Pythagore ta c\u00f3:<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/453dd794-b954-481e-8fc6-573c86fb0d96.png\"/> AC<sup>2</sup> = BC<sup>2</sup> \u2013 AB<sup>2</sup> = 100<sup>2</sup> \u2013 60<sup>2</sup> = 6400.<br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7c35a98b-650b-4275-880f-392628c355cf.png\"/><br>V\u1eady nh\u00e0 b\u1ea1n Nam \u0111\u00e3 th\u1ef1c hi\u1ec7n \u0111\u00fang quy \u0111\u1ecbnh c\u1ee7a khu ph\u1ed1.", "key": " ", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.5, "plans": [], "answerPlans": [], "normalizedType": "1"}, {"questionId": 21185285, "lessonId": 0, "a": "", "b": "", "c": "", "d": "", "bookId": 1055442, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 1, "questionText": "\u0110\u1ec3 ch\u1ea1y xe t\u1eeb s\u00e2n l\u00ean nh\u00e0, ng\u01b0\u1eddi ta l\u00e0m m\u1ed9t b\u1eadc tam c\u1ea5p nh\u01b0 h\u00ecnh v\u1ebd. Bi\u1ebft \u0111\u1ed9 cao c\u1ee7a b\u1eadc th\u00eam <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/fce8d655-edce-4125-9068-3d493aaed1b2.png\"/> chi\u1ec1u d\u00e0i t\u1eeb ch\u00e2n b\u1eadc th\u1ec1m t\u1edbi \u0111i\u1ec3m \u0111\u1eb7t c\u00f2n l\u1ea1i c\u1ee7a b\u1eadc tam c\u1ea5p l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/024607b3-671d-40bd-9b3c-ac45386a06ee.png\"/> T\u00ednh chi\u1ec1u d\u00e0i c\u1ee7a b\u1eadc tam c\u1ea5p (<i>k\u1ebft qu\u1ea3 l\u00e0m tr\u00f2n \u0111\u1ebfn h\u00e0ng ph\u1ea7n m\u01b0\u1eddi</i>).<br><img src=\"https://asset.moon.vn/img/chat/large/2025/9/21adf3ab-075d-4c4c-8edc-3dc94ca33d2a.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\">", "answer": "<img src=\"https://asset.moon.vn/img/chat/large/2025/10/77d588e2-c755-471e-a67a-de88b097efb4.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br>\n\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nM\u1ee5c ti\u00eau: T\u00ednh chi\u1ec1u d\u00e0i b\u1eadc tam c\u1ea5p <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/eee2f68c-0ad5-4d98-a4c1-5e73192357a1.png\"/>.<br>\nB\u01b0\u1edbc 1: X\u00e1c \u0111\u1ecbnh tam gi\u00e1c vu\u00f4ng v\u00e0 hai c\u1ea1nh g\u00f3c vu\u00f4ng \u0111\u00e3 bi\u1ebft (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/69d36f41-2b42-4524-b2ce-d668978eef52.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f6205f07-e0bc-4b52-9d4f-115e1de3fc40.png\"/>).<br>\nB\u01b0\u1edbc 2: \u00c1p d\u1ee5ng \u0111\u1ecbnh l\u00fd Py-ta-go: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/074949f8-4f78-4396-9de2-195349a0f785.png\"/>.<br>\nB\u01b0\u1edbc 3: L\u00e0m tr\u00f2n k\u1ebft qu\u1ea3 \u0111\u1ebfn h\u00e0ng ph\u1ea7n m\u01b0\u1eddi theo y\u00eau c\u1ea7u \u0111\u1ec1 b\u00e0i.<br>\n\n\u270d\ufe0f <b>L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nX\u00e9t tam gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/304a8991-2a71-42ee-80a2-75a316c7d336.png\"/> vu\u00f4ng t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b083b02d-9cff-42ea-9e76-de7f09acfd8c.png\"/>.<br>\n\u0110\u00e3 bi\u1ebft: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/3529cd31-3a88-4b18-bc6c-f1f1abf73fa0.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/73c3f78d-0f79-43e9-8315-92682bbcd71c.png\"/>.<br>\n\u00c1p d\u1ee5ng \u0111\u1ecbnh l\u00fd Py-ta-go: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/23af15bf-6088-4d73-9abf-f0391fabdd45.png\"/>.<br>\nThay s\u1ed1: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/c4edfb47-ac93-439f-90e0-4a21904efc00.png\"/>.<br>\nSuy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/8c91faff-0be8-4ab8-9afe-2abfc1b66677.png\"/>.<br>\nL\u00e0m tr\u00f2n \u0111\u1ebfn h\u00e0ng ph\u1ea7n m\u01b0\u1eddi: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/dff6ca58-115b-473e-906e-f4caa3003fe6.png\"/>.<br>\n\n\u2705 <b>K\u1ebft lu\u1eadn:</b> Chi\u1ec1u d\u00e0i c\u1ee7a b\u1eadc tam c\u1ea5p l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a9ff2b6e-01ab-468e-a525-1ea5baaac1f3.png\"/>.<br>", "key": " ", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.5, "plans": [], "answerPlans": [], "normalizedType": "1"}, {"questionId": 10173800, "lessonId": 0, "a": "", "b": "", "c": "", "d": "", "bookId": 185894, "comments": 2, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 1, "questionText": "H\u00ecnh \u1ea3nh b\u00ean d\u01b0\u1edbi l\u00e0 m\u1ed9t thi\u1ebft k\u1ebf ng\u00f4i nh\u00e0 h\u00ecnh tam gi\u00e1c c\u00e2n \u0111ang l\u00e0 xu th\u1ebf m\u1edbi tr\u00ean kh\u1eafp th\u1ebf gi\u1edbi \u1edf ph\u00e2n kh\u00fac nh\u00e0 nh\u1ecf. \u0110\u00e2y l\u00e0 nh\u1eefng thi\u1ebft k\u1ebf c\u01a1 \u0111\u1ed9ng, c\u00f3 th\u1ec3 thi c\u00f4ng l\u1eafp d\u1ef1ng nhanh c\u00f3 chi ph\u00ed r\u1ebb. Tr\u01b0\u1edbc ng\u00f4i nh\u00e0 c\u00f3 l\u1eafp m\u1ed9t t\u1ea5m k\u00ednh ch\u1ed1ng v\u1ee1 c\u00f3 d\u1ea1ng tam gi\u00e1c c\u00e2n. Bi\u1ebft c\u1ea1nh \u0111\u00e1y, c\u1ea1nh b\u00ean c\u1ee7a mi\u1ebfng k\u00ednh n\u00e0y l\u1ea7n l\u01b0\u1ee3t c\u00f3 \u0111\u1ed9 d\u00e0i l\u00e0 8m v\u00e0 10m. T\u00ednh chi\u1ec1u cao c\u1ee7a t\u1ea5m k\u00ednh tam gi\u00e1c c\u00e2n n\u00e0y (<i>l\u00e0m tr\u00f2n k\u1ebft qu\u1ea3 \u0111\u1ebfn h\u00e0ng ph\u1ea7n m\u01b0\u1eddi</i>)?<br><img src=\"https://asset.moon.vn/img/ai/Teachers/smoonvn/TOAN/24/282.PNG\" alt=\"282.PNG\" width=\"272\" height=\"221\" align=\"absmiddle\" border=\"0\">", "answer": "Gi\u1ea3 s\u1eed t\u1ea5m k\u00ednh ch\u1ed1ng v\u1ee1 c\u00f3 d\u1ea1ng tam gi\u00e1c c\u00e2n c\u00f3 \u0111\u1ec9nh l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/c2322dc0-fbc1-4395-86ab-b2893247d95f.png\"/> c\u00e1c c\u1ea1nh b\u00ean l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0ecaffa3-18a6-448a-ac58-c5f892e35ae9.png\"/> l\u00e0 \u0111\u01b0\u1eddng cao c\u1ee7a tam gi\u00e1c. (nh\u01b0 h\u00ecnh v\u1ebd)<br><img src=\"https://asset.moon.vn/img/ai/Teachers/levantuan/l%C6%A1p%208/m1.png\" alt=\"m1.png\" width=\"172\" height=\"209\" border=\"0\"><br>Tam gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/1984b372-4fca-466e-a0e1-6e03b87e140f.png\"/> c\u00e2n n\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/2be5844d-6200-47f7-a895-a197f3d8c622.png\"/> v\u1eeba l\u00e0 \u0111\u01b0\u1eddng cao v\u1eeba l\u00e0 \u0111\u01b0\u1eddng trung tuy\u1ebfn <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/eaffe91c-0afd-4a08-9b76-2dae43b22c32.png\"/><br>\u00c1p d\u1ee5ng \u0111\u1ecbnh l\u00fd Py-ta-go cho tam gi\u00e1c vu\u00f4ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6179b6ef-db85-439e-bb1c-1352a86c9bc8.png\"/> ta c\u00f3: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/1fc16bf3-9ba9-427b-ae50-c0dce605c010.png\"/> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f8eff618-b754-4623-bf4a-7dffa33b591c.png\"/><br>V\u1eady chi\u1ec1u cao c\u1ee7a t\u1ea5m k\u00ednh tam gi\u00e1c c\u00e2n n\u00e0y x\u1ea5p x\u1ec9 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7d246af5-4f87-45a6-ad5b-f01e2d34fba6.png\"/>", "key": " ", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.5, "plans": [], "answerPlans": [], "normalizedType": "1"}, {"questionId": 10224257, "lessonId": 0, "a": "", "b": "", "c": "", "d": "", "bookId": 188885, "comments": 7, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 1, "questionText": "H\u00ecnh v\u1ebd m\u00f4 t\u1ea3 m\u1eb7t c\u1eaft \u0111\u1ee9ng c\u1ee7a m\u1ed9t s\u00e2n kh\u1ea5u ngo\u00e0i tr\u1eddi c\u00f3 m\u00e1i che. Chi\u1ec1u cao c\u1ee7a khung ph\u00eda tr\u01b0\u1edbc kho\u1ea3ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/3192c270-1e1d-4283-8d90-7f0d550ff8bb.png\"/> chi\u1ec1u cao c\u1ee7a khung ph\u00eda sau l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/064b162a-5a0d-4542-8430-f31a8aece49c.png\"/> hai khung c\u00e1ch nhau m\u1ed9t kho\u1ea3ng l\u00e0 <img style = \"vert -filename=\"\" style=\"max-width: 600px; height: auto;\"><br>\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b><br>S\u1eed d\u1ee5ng \u0111\u1ecbnh l\u00fd Pytago trong tam gi\u00e1c vu\u00f4ng.<br>B\u01b0\u1edbc 1: V\u1ebd th\u00eam \u0111\u01b0\u1eddng ph\u1ee5 \u0111\u1ec3 t\u1ea1o th\u00e0nh m\u1ed9t tam gi\u00e1c vu\u00f4ng c\u00f3 c\u1ea1nh huy\u1ec1n l\u00e0 \u0111o\u1ea1n <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/e4e5dc13-058b-4d33-bda6-c96da8168723.png\"/> (kho\u1ea3ng c\u00e1ch c\u1ea7n t\u00ecm).<br>B\u01b0\u1edbc 2: T\u00ednh \u0111\u1ed9 d\u00e0i hai c\u1ea1nh g\u00f3c vu\u00f4ng c\u1ee7a tam gi\u00e1c v\u1eeba t\u1ea1o: m\u1ed9t c\u1ea1nh l\u00e0 kho\u1ea3ng c\u00e1ch gi\u1eefa hai t\u00f2a nh\u00e0, c\u1ea1nh c\u00f2n l\u1ea1i l\u00e0 hi\u1ec7u s\u1ed1 \u0111\u1ed9 cao c\u1ee7a hai t\u00f2a nh\u00e0.<br>B\u01b0\u1edbc 3: \u00c1p d\u1ee5ng c\u00f4ng th\u1ee9c \u0111\u1ecbnh l\u00fd Pytago \u0111\u1ec3 t\u00ednh c\u1ea1nh huy\u1ec1n <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/2383d17f-3a71-4974-9104-0ffc64f8cf2c.png\"/>: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f275d444-5b2f-4344-92d4-78676fe3c44c.png\"/>.<br>\u270d\ufe0f <b>L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br><img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/9d258d62-161f-457d-bccb-ec4b255df430.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6ab37bf6-247f-4afc-8ed8-2af5f524cef0.png\"/> l\u1ea7n l\u01b0\u1ee3t l\u00e0 \u0111\u1ec9nh c\u1ee7a hai t\u00f2a nh\u00e0.<br>Chi\u1ec1u cao t\u00f2a nh\u00e0 1: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/2d69968d-0a1c-4e75-8854-cbe2f8602679.png\"/>.<br>Chi\u1ec1u cao t\u00f2a nh\u00e0 2: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/afbb4f02-d08a-43af-a5fc-3acb94         let userAnswers = {}; // Store: { qId: value }
        let isSubmitted = false;
        let examMode = 'practice'; // 'practice' or 'exam'
        let startTime = Date.now();
        let timerInterval;

        // --- INIT ---
        window.onload = function() {
            renderExam();
            startTimer();
            document.getElementById('mode-select').addEventListener('change', (e) => {
                if(isSubmitted) return;
                if(confirm('Đổi chế độ sẽ làm mới lại trạng thái hiển thị (không mất bài làm). Tiếp tục?')) {
                    examMode = e.target.value;
                    renderExam(false); // Re-render without resetting answers
                } else {
                    e.target.value = examMode;
                }
            });
        };

        // --- TIMER LOGIC ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- RENDER ENGINE ---
        function renderExam(reset = false) {
            const container = document.getElementById('exam-content');
            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; // Clear to re-render
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

            let globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                // Render Group Header
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`; // Unique Key for storage
                    const qType = q.normalizedType;
                    
                    // -- Palette Item --
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop
                    palMob.appendChild(palBtn); // Add to Mobile

                    // -- Question Card --
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    // Header: Question Number
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    // Interaction Area
                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // === TYPE 0: MCQ ===
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            // Logic hiển thị kết quả
                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { // Chọn đúng
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { // Đúng nhưng không chọn (hiện đáp án khi nộp)
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { // Chọn sai
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; // Hiện đáp án đúng sau khi nộp dù chưa làm
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // === TYPE 1 & 3: FILL KEY ===
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let inputClass = "w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all font-mono";
                        let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
