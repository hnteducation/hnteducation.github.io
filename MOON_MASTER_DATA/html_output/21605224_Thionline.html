ng, d\u1eabn \u0111\u1ebfn h\u1eadu qu\u1ea3 m\u1ea5t \u0111i s\u1ef1 linh nghi\u1ec7m c\u1ee7a ph\u00e9p thu\u1eadt.\n", "key": "D", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605244, "lessonId": 0, "a": "Hai d\u00f2ng \u0111\u1ea7u - s\u00e1u d\u00f2ng sau.", "b": "Ba d\u00f2ng \u0111\u1ea7u - n\u0103m d\u00f2ng sau.", "c": "B\u1ed1n d\u00f2ng \u0111\u1ea7u - b\u1ed1n d\u00f2ng sau.", "d": "N\u0103m d\u00f2ng \u0111\u1ea7u - ba d\u00f2ng sau.", "bookId": 1088968, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cH\u1ea1t m\u01b0a  \u0111\u00e3 l\u1ecdt mi\u1ec1n \u0111\u00e0i c\u00e1c,<br><br>Nh\u1eefng m\u1eebng th\u1ea7m c\u00e1 n\u01b0\u1edbc  duy\u00ean may.<br><br>C\u00e0ng l\u00e2u c\u00e0ng l\u1eafm m\u00e0n hay,<br><br>Cho cam c\u00f4ng k\u1ebb nh\u00fang tay th\u00f9ng ch\u00e0m .<br><br>Ai ng\u1edd b\u1ed7ng m\u1ed9t n\u0103m m\u1ed9t nh\u1ea1t,<br><br>Ngu\u1ed3n \u01a1n kia kh\u00f4ng t\u00e1t m\u00e0 v\u01a1i ,<br><br>Suy di  \u0111\u00e2u bi\u1ebft c\u01a1 tr\u1eddi <br><br>B\u1ed7ng kh\u00f4ng m\u00e0 h\u00f3a ra ng\u01b0\u1eddi v\u1ecb vong !</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Gia Thi\u1ec1u, <i>Cung o\u00e1n ng\u00e2m kh\u00fac</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 13, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div><br>X\u00e1c \u0111\u1ecbnh b\u1ed1 c\u1ee5c h\u1ee3p l\u00ed c\u1ee7a \u0111o\u1ea1n th\u01a1.", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nB\u1ed1 c\u1ee5c c\u1ee7a \u0111o\u1ea1n th\u01a1 l\u00e0:<br>\n- B\u1ed1n d\u00f2ng \u0111\u1ea7u: Ni\u1ec1m vui s\u01b0\u1edbng, h\u1ea1nh ph\u00fac khi \u0111\u01b0\u1ee3c nh\u00e0 vua s\u1ee7ng \u00e1i.<br>\n- B\u1ed1n d\u00f2ng sau: N\u1ed7i th\u1ea5t v\u1ecdng, \u0111au kh\u1ed5 khi b\u1ecb nh\u00e0 vua ru\u1ed3ng b\u1ecf.\n", "key": "C", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605247, "lessonId": 0, "a": "Gian kh\u1ed5.", "b": "C\u00f4 \u0111\u1ed9c.", "c": "C\u00f4ng vi\u1ec7c n\u1eb7ng nh\u1ecdc.", "d": "Kh\u00f4ng s\u1ea3n xu\u1ea5t ra l\u01b0\u01a1ng th\u1ef1c, th\u1ef1c ph\u1ea9m cho anh em \u0111\u1ed3ng \u0111\u1ed9i.", "bookId": 1088969, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c- C\u01a1 ng\u01a1i c\u1ee7a Y Nua l\u1edbn d\u1ea7n l\u00ean nh\u01b0ng gian kh\u1ed5 c\u00f2n l\u1edbn mau h\u01a1n. Nh\u01b0ng n\u1eb7ng n\u1ec1 nh\u1ea5t, kh\u1ed5 nh\u1ea5t l\u00e0 c\u1ea3nh c\u00f4 \u0111\u1ed9c. Th\u1ef1c v\u1eady. C\u00f4 \u0111\u1ed9c kinh ng\u01b0\u1eddi gi\u1eefa b\u1ed1n b\u1ec1 r\u1eebng gi\u00e0 v\u00e2y b\u1ecdc. S\u1ebd quen th\u00f4i. Nh\u01b0ng \u0111\u00e2u ph\u1ea3i ch\u1ec9 v\u00e0i n\u0103m l\u00e0 quen n\u1ed5i. C\u00f3 th\u1eddi k\u00ec h\u00e0ng n\u0103m ch\u1eb3ng ma n\u00e0o lai v\u00e3ng t\u1edbi giang s\u01a1n u \u00e1m c\u1ee7a anh em t\u00f4i. Nh\u01b0ng c\u00f3 sao \u0111\u00e2u \u0111i\u1ec1u \u0111\u00f3. Ch\u00fang t\u00f4i l\u00e0 l\u00ednh t\u0103ng gia B3 m\u00e0 anh. Ch\u00fang t\u00f4i ch\u1ec9 bi\u1ebft l\u00e0m l\u1ee5ng, l\u00e0m l\u1ee5ng c\u1eadt l\u1ef1c \u0111\u1ec3 c\u00f3 l\u01b0\u01a1ng th\u1ef1c, l\u01b0\u01a1ng th\u1ef1c th\u1eadt nhi\u1ec1u, kh\u00f4ng ph\u1ea3i cho b\u1ea3n th\u00e2n m\u00ecnh m\u00e0 cho anh em \u0111\u1ed3ng \u0111\u1ed9i \u0111ang chi\u1ebfn \u0111\u1ea5u \u1edf nh\u1eefng \u0111\u00e2u \u0111\u00f3 xa t\u00edt m\u00f9 t\u1eafp b\u00ean kia \u0111\u1ea1i ng\u00e0n.\u201d</i><br><div style=\"text-align: right;\">(B\u1ea3o Ninh, <i>Tr\u1ea1i \u201cb\u1ea3y ch\u00fa l\u00f9n\u201d</i>, theo <i>Nh\u1eefng truy\u1ec7n ng\u1eafn</i>, NXB Tr\u1ebb, 2021)</div><br>N\u1ed7i kh\u1ed5 l\u1edbn nh\u1ea5t \u0111\u1ed1i v\u1edbi nh\u1eefng ng\u01b0\u1eddi l\u00ednh t\u0103ng gia B3 l\u00e0 g\u00ec?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nD\u1ef1a v\u00e0o chi ti\u1ebft: \u201cNh\u01b0ng n\u1eb7ng n\u1ec1 nh\u1ea5t, kh\u1ed5 nh\u1ea5t l\u00e0 c\u1ea3nh c\u00f4 \u0111\u1ed9c. Th\u1ef1c v\u1eady. C\u00f4 \u0111\u1ed9c kinh ng\u01b0\u1eddi gi\u1eefa b\u1ed1n b\u1ec1 r\u1eebng gi\u00e0 v\u00e2y b\u1ecdc.\u201d<br>\n\u2192 N\u1ed7i kh\u1ed5 l\u1edbn nh\u1ea5t \u0111\u1ed1i v\u1edbi nh\u1eefng ng\u01b0\u1eddi l\u00ednh t\u0103ng gia B3 l\u00e0 c\u00f4 \u0111\u1ed9c.\n", "key": "B", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605250, "lessonId": 0, "a": "\u201cTh\u1eddi gian nh\u01b0 l\u00e0 gi\u00f3/ M\u00f9a \u0111i c\u00f9ng th\u00e1ng n\u0103m\u201d.", "b": "\u201cTu\u1ed5i theo m\u00f9a \u0111i m\u00e3i/ Ch\u1ec9 c\u00f2n anh v\u00e0 em\u201d.", "c": "\u201cCh\u1ec9 c\u00f2n anh v\u00e0 em/ C\u00f9ng t\u00ecnh y\u00eau \u1edf l\u1ea1i...\u201d.", "d": "\u201c- K\u00eca bao ng\u01b0\u1eddi y\u00eau m\u1edbi/ \u0110i qua c\u00f9ng heo may.\u201d.", "bookId": 1088970, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTh\u1eddi gian nh\u01b0 l\u00e0 gi\u00f3<br><br>M\u00f9a \u0111i c\u00f9ng th\u00e1ng n\u0103m<br><br>Tu\u1ed5i theo m\u00f9a \u0111i m\u00e3i<br><br>Ch\u1ec9 c\u00f2n anh v\u00e0 em<br><br><br><br>Ch\u1ec9 c\u00f2n anh v\u00e0 em<br><br>C\u00f9ng t\u00ecnh y\u00eau \u1edf l\u1ea1i...<br><br>- K\u00eca bao ng\u01b0\u1eddi y\u00eau m\u1edbi<br><br>\u0110i qua c\u00f9ng heo may.\u201d</i><br><div style=\"text-align: right;\">(Xu\u00e2n Qu\u1ef3nh, <i>Th\u01a1 t\u00ecnh cu\u1ed1i m\u00f9a thu</i>, theo <i>Xu\u00e2n Qu\u1ef3nh th\u01a1 v\u00e0 \u0111\u1eddi</i>, NXB V\u0103n ho\u00e1, 1993)</div><br>Nh\u1eefng d\u00f2ng th\u01a1 n\u00e0o di\u1ec5n t\u1ea3 t\u00ecnh y\u00eau thu\u1ef7 chung, b\u1ea5t bi\u1ebfn gi\u1eefa v\u1ea1n bi\u1ebfn c\u1ee7a \u201canh v\u00e0 em\u201d?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nHai d\u00f2ng th\u01a1 \u201cCh\u1ec9 c\u00f2n anh v\u00e0 em/ C\u00f9ng t\u00ecnh y\u00eau \u1edf l\u1ea1i...\u201d kh\u1eb3ng \u0111\u1ecbnh t\u00ecnh y\u00eau c\u1ee7a \u201canh v\u00e0 em\u201d l\u00e0 b\u1ea5t bi\u1ebfn, b\u1ea5t ch\u1ea5p m\u1ecdi s\u1ef1 thay \u0111\u1ed5i c\u1ee7a cu\u1ed9c \u0111\u1eddi. \u0110\u00f3 l\u00e0 m\u1ed9t t\u00ecnh y\u00eau th\u1ee7y chung, tr\u01b0\u1eddng t\u1ed3n theo n\u0103m th\u00e1ng c\u1ee7a \u201canh v\u00e0 em\u201d.\n", "key": "C", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605253, "lessonId": 0, "a": "Mi\u00eau t\u1ea3.", "b": "T\u1ef1 s\u1ef1.", "c": "Ngh\u1ecb lu\u1eadn.", "d": "Thuy\u1ebft minh.", "bookId": 1088971, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cSau m\u1ea5y r\u1eb7ng xoan th\u01b0a l\u00e1, d\u00f2ng s\u00f4ng Nh\u1ecb th\u1ea5p tho\u00e1ng nh\u01b0 m\u1ed9t d\u1ea3i l\u1ee5c \u0111\u00e0o. B\u00ean kia s\u00f4ng, gi\u00f3 th\u1ed5i c\u00e1t \u1edf b\u00e3i tung l\u00ean tr\u00f4ng t\u1ef1a m\u1ed9t \u0111\u00e1m s\u01b0\u01a1ng v\u00e0ng lan ra che m\u1edd m\u00e2y c\u00e1i l\u00e0ng con \u1edf ch\u00e2n tr\u1eddi. Xa n\u1eefa l\u00e0 d\u00e3y n\u00fai Tam \u0110\u1ea3o m\u00e0u lam nh\u1ea1t, \u0111\u1ee9ng s\u1eebng s\u1eefng to t\u00e1t nguy nga, ng\u1ecdn n\u00fai m\u00f9 m\u00f9 l\u1eabn trong ng\u00e0n m\u00e2y x\u00e1m.\u201d</i><br><div style=\"text-align: right;\">(Nh\u1ea5t Linh, <i>\u0110o\u1ea1n tuy\u1ec7t</i>, theo <i>Tuy\u1ec3n t\u1eadp T\u1ef1 l\u1ef1c v\u0103n \u0111o\u00e0n</i>, t\u1eadp 1, NXB H\u1ed9i Nh\u00e0 v\u0103n, 2004)</div><br>Ph\u01b0\u01a1ng th\u1ee9c bi\u1ec3u \u0111\u1ea1t ch\u00ednh c\u1ee7a \u0111o\u1ea1n v\u0103n tr\u00ean l\u00e0 g\u00ec?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\n\u0110o\u1ea1n v\u0103n t\u00e1i hi\u1ec7n khung c\u1ea3nh thi\u00ean nhi\u00ean ven s\u00f4ng Nh\u1ecb qua c\u00e1c h\u00ecnh \u1ea3nh d\u00f2ng s\u00f4ng, gi\u00f3 c\u00e1t, n\u00fai non,\u2026<br>\n\u2192 Ph\u01b0\u01a1ng th\u1ee9c bi\u1ec3u \u0111\u1ea1t ch\u00ednh c\u1ee7a \u0111o\u1ea1n v\u0103n l\u00e0 mi\u00eau t\u1ea3.\n", "key": "A", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605261, "lessonId": 0, "a": "B\u1ea5t b\u00ecnh, m\u1eafng m\u1ecf.", "b": "Ph\u1eabn n\u1ed9, tr\u00e1ch c\u1ee9.", "c": "\u0110\u1ed3ng c\u1ea3m, s\u1ebb chia.", "d": "D\u1eedng d\u01b0ng, v\u00f4 c\u1ea3m.", "bookId": 1088972, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u00d4N \u0110\u00ccNH:</i> (N\u00f3i)<br><br>(N\u00f3i thi\u1ec7t)<br><i><br>B\u1eb1ng ch\u1ea5p n\u00ea  g\u00e1nh v\u00e1c T\u1ec1 tri\u1ec1u<br><br>Ni\u1ec1m m\u1eabu t\u1eed \u1eaft l\u00e0 b\u1ecb h\u1ea1i</i> <i>(ch\u1edb ch\u1eb3ng ch\u01a1i).</i><br><i><br>\u0110\u1ed2NG M\u1eaaU:</i> (N\u00f3i)<br><i><b><br>Th\u1ea5y n\u00f3i b\u1eebng b\u1eebng l\u1eeda d\u1eady<br><br>Nghe th\u00f4i s\u00f9ng s\u1ee5c d\u1ea7u s\u00f4i.<br><br>(Tao h\u1ecfi, qu\u1ea3i tai  m\u00e0 nghe. C\u00f3 ph\u1ea3i?)<br><br>\u00d4ng cha mi h\u01b0\u1edfng l\u1ed9c T\u1ec1 qu\u00e2n <br><br>Anh em g\u00e3 c\u01b0\u1edbp ng\u00f4i Thi\u1ec7n \u0111\u1ebf<br><br>(Mi c\u00f3 h\u1ecdc m\u00e0!)</b></i><br><i><br>K\u00eca \u0110\u01b0\u1eddng th\u1ea5t Ho\u00e0ng S\u00e0o kh\u1edfi ngu\u1ef5, ch\u1ebft ch\u1eb3ng to\u00e0n thi<br><br>N\u1ecd H\u00e1n gia V\u01b0\u01a1ng M\u00e3ng khi qu\u00e2n, t\u1eed v\u00f4 t\u00e1ng \u0111\u1ecba <br><br>(C\u00f3 ph\u1ea3i ch\u0103ng?)<br><br>Hu\u1ed1ng con m\u1ee5; Hi\u1ec3n nh\u00e2n  x\u1eed th\u1ebf<br><br>Minh ti\u1ebft b\u1ea3o th\u00e2n <br><br>\u0110\u00e2u theo \u0111\u1ea3ng gian th\u1ea7n<br><br>M\u00e0 \u0111\u1ea7u lo\u00e0i s\u1ee7ng n\u1ecbnh.\u201d</i><br><div style=\"text-align: right;\">(<i>S\u01a1n H\u1eadu</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 10</i>, NXB \u0110\u1ea1i h\u1ecdc Qu\u1ed1c gia H\u00e0 N\u1ed9i, 2022)</div><br>Nh\u1eefng d\u00f2ng in \u0111\u1eadm th\u1ec3 hi\u1ec7n th\u00e1i \u0111\u1ed9 n\u00e0o c\u1ee7a \u0110\u1ed5ng M\u1eabu tr\u01b0\u1edbc l\u1eddi n\u00f3i c\u1ee7a \u00d4n \u0110\u00ecnh?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nNh\u1eefng d\u00f2ng in \u0111\u1eadm th\u1ec3 hi\u1ec7n s\u1ef1 ph\u1eabn n\u1ed9 v\u00e0 tr\u00e1ch c\u1ee9 c\u1ee7a \u0110\u1ed5ng M\u1eabu tr\u01b0\u1edbc l\u1eddi n\u00f3i c\u1ee7a \u00d4n \u0110\u00ecnh. C\u00e1c chi ti\u1ebft \u201cb\u1eebng b\u1eebng l\u1eeda d\u1eady\u201d, \u201cs\u00f9ng s\u1ee5c d\u1ea7u s\u00f4i\u201d \u0111\u00e3 di\u1ec5n t\u1ea3 t\u00e2m tr\u1ea1ng ph\u1eabn u\u1ea5t, b\u1ee9c x\u00fac v\u00e0 l\u00ean \u00e1n vi\u1ec7c \u00d4n \u0110\u00ecnh theo phe gian th\u1ea7n, ph\u1ea3n b\u1ed9i ch\u00ednh ngh\u0129a c\u1ee7a \u0110\u1ed5ng M\u1eabu.\n", "key": "B", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605263, "lessonId": 0, "a": "\u201cb\u00e0 c\u1ee5 ng\u01b0\u1eddi Vi\u1ec7t Nam\u201d.", "b": "\u201cb\u00e0 c\u1ee5 th\u1ee3 mu\u1ed1i\u201d.", "c": "\u201cb\u00e0 c\u1ee5 gi\u00e0 \u0111\u00e1ng th\u01b0\u01a1ng\u201d.", "d": "\u201cb\u00e0 c\u1ee5\u201d.", "bookId": 1088973, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cM\u1ed9t b\u00e0 c\u1ee5 ng\u01b0\u1eddi Vi\u1ec7t Nam, c\u0169ng l\u00e0m ngh\u1ec1 g\u00e1nh mu\u1ed1i, v\u00ec b\u1ecb kh\u1ea5u l\u01b0\u01a1ng n\u00ean c\u00e3i nhau v\u1edbi m\u1ee5 cai. M\u1ee5 cai \u0111\u1ebfn th\u01b0a v\u1edbi vi\u00ean \u0111oan. Vi\u00ean n\u00e0y ch\u1eb3ng x\u00e9t x\u1eed g\u00ec c\u1ea3, t\u00e1t b\u00e0 c\u1ee5 th\u1ee3 mu\u1ed1i hai c\u00e1i th\u1eadt m\u1ea1nh, v\u00e0 khi b\u00e0 c\u1ee5 gi\u00e0 \u0111\u00e1ng th\u01b0\u01a1ng c\u00fai xu\u1ed1ng \u0111\u1ec3 nh\u1eb7t n\u00f3n, th\u00ec v\u1ecb \u0111i khai h\u00f3a \u1ea5y, ch\u01b0a v\u1eeba l\u00f2ng v\u1edbi tr\u1eadn b\u1ea1t tai m\u00e0 h\u1eafn v\u1eeba tr\u1eebng ph\u1ea1t b\u00e0 c\u1ee5, li\u1ec1n \u0111\u00e1 m\u1ed9t c\u00e1i r\u1ea5t m\u1ea1nh v\u00e0o b\u1ee5ng b\u00e0 c\u1ee5, khi\u1ebfn cho m\u00e1u \u1ed9c ngay ra l\u00eanh l\u00e1ng.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u00c1i Qu\u1ed1c, <i>Nh\u1eefng k\u1ebb \u0111i khai ho\u00e1</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div><br>C\u1ee5m t\u1eeb n\u00e0o cho th\u1ea5y n\u1ed7i th\u01b0\u01a1ng c\u1ea3m c\u1ee7a ng\u01b0\u1eddi vi\u1ebft \u0111\u1ed1i v\u1edbi nh\u00e2n v\u1eadt b\u00e0 c\u1ee5?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nC\u1ee5m t\u1eeb \u201cb\u00e0 c\u1ee5 gi\u00e0 \u0111\u00e1ng th\u01b0\u01a1ng\u201d th\u1ec3 hi\u1ec7n n\u1ed7i th\u01b0\u01a1ng c\u1ea3m c\u1ee7a ng\u01b0\u1eddi vi\u1ebft \u0111\u1ed1i v\u1edbi s\u1ed1 ph\u1eadn b\u1ea5t h\u1ea1nh, b\u1ecb \u00e1p b\u1ee9c c\u1ee7a b\u00e0 c\u1ee5. T\u1eeb \u201c\u0111\u00e1ng th\u01b0\u01a1ng\u201d tr\u1ef1c ti\u1ebfp b\u1ed9c l\u1ed9 s\u1ef1 x\u00f3t xa, \u0111\u1ed3ng c\u1ea3m c\u1ee7a t\u00e1c gi\u1ea3 tr\u01b0\u1edbc ho\u00e0n c\u1ea3nh kh\u1ed5 \u0111au c\u1ee7a b\u00e0 c\u1ee5.\n", "key": "C", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605268, "lessonId": 0, "a": "\u201ctr\u1ea7m u\u1ea5t\u201d.", "b": "\u201cu ho\u00e0i\u201d.", "c": "\u201c\u1ea3m \u0111\u1ea1m\u201d.", "d": "\u201cl\u1ea5p l\u00e1nh\u201d.", "bookId": 1088974, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cM\u00f9a xu\u00e2n v\u1ec1, m\u1eb7t \u0111\u1ea5t c\u00f4ng vi\u00ean s\u00e1ng b\u1eebng l\u00ean b\u1edfi ng\u00e0n v\u1ea1n b\u00f4ng c\u1ecf t\u00edm, m\u1ed7i b\u00f4ng c\u1ecf l\u1ea1i ng\u1eadm trong l\u00f2ng m\u1ed9t h\u1ea1t s\u01b0\u01a1ng mai khi\u1ebfn v\u00e0o bu\u1ed5i s\u00e1ng s\u1edbm, c\u1ecf \u1edf ven s\u00f4ng H\u01b0\u01a1ng l\u1ea5p l\u00e1nh nh\u01b0 nh\u1eefng h\u1ea1t ng\u1ecdc. Nh\u1eefng c\u00f4 sinh n\u1eef t\u1eebng r\u1ee7 nhau ra \u0111\u1ea5y ng\u1ed3i ch\u01a1i tr\u00ean v\u1ea1t c\u1ecf; l\u00e2u ng\u00e0y t\u00e2m h\u1ed3n h\u1ecd nhi\u1ec5m ph\u1ea3i c\u0103n b\u1ec7nh tr\u1ea7m u\u1ea5t, sinh ra b\u1edfi nh\u1eefng b\u1ee5i ph\u1ea5n t\u00edm c\u1ee7a b\u00f4ng c\u1ecf m\u00f9a xu\u00e2n. M\u1ed9t ch\u00fat u ho\u00e0i \u0111\u00e3 k\u1ebft tinh trong \u0111\u00f4i m\u1eaft khi\u1ebfn t\u1eeb \u0111\u00f3 h\u1ecd tr\u1edf n\u00ean d\u00e8 ch\u1eebng v\u1edbi nh\u1eefng cu\u1ed9c vui trong \u0111\u1eddi, v\u00e0 d\u01b0\u1edbi m\u1eaft h\u1ecd, nh\u1eefng tr\u00f2 quy\u1ebfn r\u0169 \u0111\u1ed1i v\u1edbi th\u1ebf nh\u00e2n t\u1ef1 nhi\u00ean nhu\u1ed1m ch\u00fat m\u00e0u \u1ea3m \u0111\u1ea1m c\u1ee7a c\u00e1i m\u00e0 b\u00e0 Huy\u1ec7n Thanh Quan khi x\u01b0a g\u1ecdi l\u00e0 \u201ch\u00fd tr\u01b0\u1eddng\u201d.\u201d</i><br><div style=\"text-align: right;\">(Ho\u00e0ng Ph\u1ee7 Ng\u1ecdc T\u01b0\u1eddng, <i>Mi\u1ec1n c\u1ecf th\u01a1m</i>, theo <i>nongnghiep.vn</i>)</div><br>T\u1eeb n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>c\u00f9ng nh\u00f3m v\u1edbi c\u00e1c t\u1eeb c\u00f2n l\u1ea1i?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\n- <i>Tr\u1ea7m u\u1ea5t/ u ho\u00e0i/ \u1ea3m \u0111\u1ea3m</i>: \u0111\u1ec1u l\u00e0 nh\u1eefng t\u1eeb ng\u1eef mi\u00eau t\u1ea3 t\u00e2m tr\u1ea1ng bu\u1ed3n b\u00e3, ti\u00eau c\u1ef1c.<br>\n- <i>L\u1ea5p l\u00e1nh</i>: l\u00e0 t\u1eeb ng\u1eef mi\u00eau t\u1ea3 \u00e1nh s\u00e1ng, mang s\u1eafc th\u00e1i r\u1ef1c r\u1ee1, t\u01b0\u01a1i s\u00e1ng.\n", "key": "D", "isVideo": true, "score": 0, "order": 11, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605272, "lessonId": 0, "a": "\u201cS\u1ed1 \u0111\u1ecf\u201d (V\u0169 Tr\u1ecdng Ph\u1ee5ng), \u201cM\u1ed9t tr\u1eadn b\u00e3o cu\u1ed1i n\u0103m\u201d (B\u00f9i Hi\u1ec3n), \u201cS\u1ee3i t\u00f3c\u201d (Th\u1ea1ch Lam).", "b": "\u201cT\u1eaft \u0111\u00e8n\u201d (Ng\u00f4 T\u1ea5t T\u1ed1), \u201cB\u01b0\u1edbc \u0111\u01b0\u1eddng c\u00f9ng\u201d (Nguy\u1ec5n C\u00f4ng Hoan), \u201cCh\u00ed Ph\u00e8o\u201d (Nam Cao).", "c": "\u201c\u0110\u1eddi m\u01b0a gi\u00f3\u201d (Kh\u00e1i H\u01b0ng), \u201cL\u1ea1nh l\u00f9ng\u201d (Nh\u1ea5t Linh), \u201cCon \u0111\u01b0\u1eddng s\u00e1ng\u201d (Ho\u00e0ng \u0110\u1ea1o).", "d": "\u201cC\u1ecf lau\u201d (Nguy\u1ec5n Minh Ch\u00e2u), \u201cB\u1ebfn kh\u00f4ng ch\u1ed3ng\u201d (D\u01b0\u01a1ng H\u01b0\u1edbng), \u201cM\u00f9a l\u00e1 r\u1ee5ng trong v\u01b0\u1eddn\u201d (Ma v\u0103n Kh\u00e1ng).", "bookId": 1088975, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "D\u00f2ng n\u00e0o sau \u0111\u00e2y n\u00eau t\u00ean c\u00e1c t\u00e1c ph\u1ea9m c\u00f9ng vi\u1ebft v\u1ec1 \u0111\u1ec1 t\u00e0i ng\u01b0\u1eddi n\u00f4ng d\u00e2n ngh\u00e8o?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nC\u00e1c t\u00e1c ph\u1ea9m <i>T\u1eaft \u0111\u00e8n</i> (Ng\u00f4 T\u1ea5t T\u1ed1), <i>B\u01b0\u1edbc \u0111\u01b0\u1eddng c\u00f9ng</i> (Nguy\u1ec5n C\u00f4ng Hoan), <i>Ch\u00ed Ph\u00e8o</i> (Nam Cao) \u0111\u1ec1u vi\u1ebft v\u1ec1 ng\u01b0\u1eddi n\u00f4ng d\u00e2 u00e1c.\n", "key": "C", "isVideo": true, "score": 0, "order": 20, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 21 \u0111\u1ebfn 25", "content": "\u201cTuy nhi\u00ean hi\u1ec7n nay vai tr\u00f2 c\u1ee7a doanh nghi\u1ec7p v\u0103n h\u00f3a ch\u01b0a \u0111\u01b0\u1ee3c nh\u00ecn nh\u1eadn \u0111\u00fang v\u1edbi s\u1ef1 \u0111\u00f3ng g\u00f3p c\u1ee7a m\u00ecnh trong khi v\u1eabn ph\u1ea3i \u0111\u1ed1i m\u1eb7t v\u1edbi nhi\u1ec1u r\u00e0o c\u1ea3n, th\u00e1ch th\u1ee9c. \u00d0\u1ea7u ti\u00ean l\u00e0 nh\u1eefng kh\u00f3 kh\u0103n v\u1ec1 t\u00e0i ch\u00ednh. Nhi\u1ec1u doanh nghi\u1ec7p s\u00e1ng t\u1ea1o g\u1eb7p tr\u1edf ng\u1ea1i trong vi\u1ec7c huy \u0111\u1ed9ng v\u1ed1n do c\u00e1c ngu\u1ed3n t\u00e0i tr\u1ee3 v\u00e0 \u0111\u1ea7u t\u01b0 cho l\u0129nh v\u1ef1c ngh\u1ec7 thu\u1eadt th\u01b0\u1eddng kh\u00f4ng \u1ed5n \u0111\u1ecbnh, kh\u00f3 ti\u1ebfp c\u1eadn. C\u00f3 th\u1ec3 th\u1ea5y r\u00f5 th\u1ef1c tr\u1ea1ng n\u00e0y trong l\u0129nh v\u1ef1c \u0111i\u1ec7n \u1ea3nh. <br>C\u00e1c nh\u00e0 s\u1ea3n xu\u1ea5t \u0111i\u1ec7n \u1ea3nh Vi\u1ec7t Nam lu\u00f4n trong t\u00ecnh tr\u1ea1ng \u201c\u0111\u00f3i v\u1ed1n\u201d, kh\u00f4ng \u0111\u1ee7 t\u00e0i ch\u00ednh \u0111\u1ec3 s\u1ea3n xu\u1ea5t phim m\u1ed7i n\u0103m cho n\u00ean ch\u1ec9 c\u00f3 c\u00e1ch \u201cl\u1ea5y ng\u1eafn nu\u00f4i d\u00e0i\u201d l\u00e0 l\u00e0m ch\u01b0\u01a1ng tr\u00ecnh truy\u1ec1n h\u00ecnh, t\u1ed5 ch\u1ee9c s\u1ef1 ki\u1ec7n ho\u1eb7c v\u00e0i ba c\u00f4ng ty chung tay c\u00f9ng l\u00e0m. <br>C\u00e1c doanh nghi\u1ec7p t\u01b0 nh\u00e2n, c\u00e1c c\u00e1 nh\u00e2n l\u00e0m phim l\u00e2u nay v\u1eabn lu\u00f4n mong m\u1ecfi nh\u1eefng ch\u00ednh s\u00e1ch \u01b0u \u0111\u00e3i v\u1ec1 vay v\u1ed1n, kh\u01a1i th\u00f4ng ngu\u1ed3n v\u1ed1n ng\u00e2n h\u00e0ng, l\u00e0m sao \u0111\u1ec3 c\u00e1c b\u1ed9 phim d\u00f9 kh\u00f4ng ph\u1ea3i l\u00e0 t\u00e0i s\u1ea3n h\u1eefu h\u00ecnh nh\u01b0ng v\u1eabn c\u00f3 th\u1ec3 \u0111i vay \u0111\u1ec3 s\u1ea3n xu\u1ea5t. T\u01b0\u01a1ng t\u1ef1, c\u00e1c kh\u00f4ng gian v\u0103n h\u00f3a s\u00e1ng t\u1ea1o c\u0169ng g\u1eb7p nhi\u1ec1u kh\u00f3 kh\u0103n \u0111\u1ec3 duy tr\u00ec ho\u1ea1t \u0111\u1ed9ng b\u1edfi ch\u01b0a c\u00f3 nh\u1eefng \u01b0u \u0111\u00e3i, h\u1ed7 tr\u1ee3 v\u1ec1 thu\u1ebf, ch\u00ednh s\u00e1ch... <br>Sau nh\u1eefng kh\u00f3 kh\u0103n v\u1ec1 v\u1ed1n l\u00e0 kh\u00f3 kh\u0103n v\u1ec1 vi\u1ec7c thi\u1ebfu kh\u00f4ng gian v\u00e0 c\u01a1 s\u1edf h\u1ea1 t\u1ea7ng \u0111\u1ec3 c\u00e1c doanh nghi\u1ec7p t\u1ed5 ch\u1ee9c s\u1ef1 ki\u1ec7n v\u00e0 tri\u1ec3n khai c\u00e1c ho\u1ea1t \u0111\u1ed9ng s\u00e1ng t\u1ea1o. Hi\u1ec7n c\u00e1c doanh nghi\u1ec7p t\u01b0 nh\u00e2n g\u1eb7p nhi\u1ec1u v\u01b0\u1edbng m\u1eafc v\u1ec1 gi\u1ea5y t\u1edd, th\u1ee7 t\u1ee5c khi mu\u1ed1n s\u1eed d\u1ee5ng c\u00e1c thi\u1ebft ch\u1ebf v\u0103n h\u00f3a thu\u1ed9c s\u1edf h\u1eefu Nh\u00e0 n\u01b0\u1edbc.<br>\u00d0\u00e2y c\u0169ng l\u00e0 m\u1ed9t ngh\u1ecbch l\u00ed khi nhi\u1ec1u thi\u1ebft ch\u1ebf v\u0103n h\u00f3a do Nh\u00e0 n\u01b0\u1edbc \u0111\u1ea7u t\u01b0 b\u1ecf kh\u00f4ng, ch\u01b0a \u0111\u01b0\u1ee3c v\u1eadn h\u00e0nh hi\u1ec7u qu\u1ea3, g\u00e2y l\u00e3ng ph\u00ed. Th\u00eam v\u00e0o \u0111\u00f3, c\u00e1c ch\u00ednh s\u00e1ch v\u00e0 quy \u0111\u1ecbnh h\u1ed7 tr\u1ee3 cho ng\u00e0nh s\u00e1ng t\u1ea1o ch\u01b0a \u0111\u01b0\u1ee3c \u0111\u1ecbnh h\u00ecnh r\u00f5 r\u00e0ng v\u00e0 hi\u1ec7u qu\u1ea3, th\u1ee7 t\u1ee5c h\u00e0nh ch\u00ednh c\u00f2n ph\u1ee9c t\u1ea1p, thi\u1ebfu s\u1ef1 h\u1ed7 tr\u1ee3 c\u1ee5 th\u1ec3 t\u1eeb ph\u00eda c\u00e1c c\u01a1 quan ch\u1ee9c n\u0103ng. <br>Nh\u1ea1c s\u0129 Qu\u1ed1c Trung th\u1eb3ng th\u1eafn cho r\u1eb1ng, ch\u00ednh s\u1ef1 ph\u00e2n bi\u1ec7t v\u1ec1 ch\u00ednh s\u00e1ch gi\u1eefa c\u00e1c doanh nghi\u1ec7p trong v\u00e0 ngo\u00e0i khu v\u1ef1c nh\u00e0 n\u01b0\u1edbc, nh\u1ea5t l\u00e0 trong vi\u1ec7c s\u1eed d\u1ee5ng thi\u1ebft ch\u1ebf v\u0103n h\u00f3a c\u00f4ng \u0111\u00e3 h\u1ea1n ch\u1ebf s\u1ef1 \u0111\u00f3ng g\u00f3p c\u1ee7a kh\u1ed1i t\u01b0 nh\u00e2n l\u00e0m c\u00f4ng nghi\u1ec7p s\u00e1ng t\u1ea1o v\u00e0o qu\u00e1 tr\u00ecnh ph\u00e1t tri\u1ec3n c\u00f4ng nghi\u1ec7p v\u0103n h\u00f3a, h\u1ea1n ch\u1ebf s\u1ee9c s\u00e1ng t\u1ea1o, s\u1ef1 c\u1ea1nh tranh l\u00e0nh m\u1ea1nh gi\u1eefa c\u00e1c l\u1ef1c l\u01b0\u1ee3ng s\u00e1ng t\u1ea1o. <br>Nh\u00ecn t\u1ed5ng th\u1ec3 c\u00e1c ch\u00ednh s\u00e1ch \u01b0u \u0111\u00e3i v\u1ec1 \u0111\u1ea7u t\u01b0, v\u1ec1 h\u1ed7 tr\u1ee3 cho c\u00e1c doanh nghi\u1ec7p ho\u1ea1t \u0111\u1ed9ng trong l\u0129nh v\u1ef1c c\u00f4ng nghi\u1ec7p v\u0103n h\u00f3a \u1edf n\u01b0\u1edbc ta so v\u1edbi c\u00e1c qu\u1ed1c gia ph\u00e1t tri\u1ec3n \u0111ang c\u00f3 m\u1ed9t kho\u1ea3ng c\u00e1ch l\u1edbn v\u00e0 ch\u01b0a ph\u1ea3i l\u00e0 \u201cc\u1ea7n c\u00e2u\u201d \u0111\u1ec3 kh\u1ed1i t\u01b0 nh\u00e2n c\u00f3 th\u1ec3 s\u1eed d\u1ee5ng t\u1ea1o ra b\u01b0\u1edbc nh\u1ea3y v\u1ecdt.\u201d<br><div style=\"text-align: right;\">(Minh Anh, <i>Nh\u00ecn r\u00f5 \u0111\u1ec3 th\u00e1o g\u1ee1 n\u00fat th\u1eaft</i>, theo <i>nhandan.vn</i>)</div>", "listQuestion": [{"questionId": 21605294, "lessonId": 0, "a": "\u00c2m nh\u1ea1c.", "b": "\u0110i\u1ec7n \u1ea3nh.", "c": "H\u1ed9i ho\u1ea1.", "d": "\u0110i\u00eau kh\u1eafc.", "bookId": 1088984, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cNhi\u1ec1u doanh nghi\u1ec7p s\u00e1ng t\u1ea1o g\u1eb7p tr\u1edf ng\u1ea1i trong vi\u1ec7c huy \u0111\u1ed9ng v\u1ed1n do c\u00e1c ngu\u1ed3n t\u00e0i tr\u1ee3 v\u00e0 \u0111\u1ea7u t\u01b0 cho l\u0129nh v\u1ef1c ngh\u1ec7 thu\u1eadt th\u01b0\u1eddng kh\u00f4ng \u1ed5n \u0111\u1ecbnh, kh\u00f3 ti\u1ebfp c\u1eadn.\u201d<br>Th\u1ef1c tr\u1ea1ng n\u00e0y \u0111\u01b normalizedType": "0"}, {"questionId": 21605299, "lessonId": 0, "a": "\u201cTh\u00eam v\u00e0o \u0111\u00f3\u201d.", "b": "\u201ch\u1ed7 tr\u1ee3\u201d.", "c": "\u201cc\u00f2n ph\u1ee9c t\u1ea1p\u201d.", "d": "\u201cc\u01a1 quan ch\u1ee9c n\u0103ng\u201d.", "bookId": 1088987, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cTh\u00eam v\u00e0o \u0111\u00f3, c\u00e1c ch\u00ednh s\u00e1ch v\u00e0 quy \u0111\u1ecbnh h\u1ed7 tr\u1ee3 cho ng\u00e0nh s\u00e1ng t\u1ea1o ch\u01b0a \u0111\u01b0\u1ee3c \u0111\u1ecbnh h\u00ecnh r\u00f5 r\u00e0ng v\u00e0 hi\u1ec7u qu\u1ea3, th\u1ee7 t\u1ee5c h\u00e0nh ch\u00ednh c\u00f2n ph\u1ee9c t\u1ea1p, thi\u1ebfu s\u1ef1 h\u1ed7 tr\u1ee3 c\u1ee5 th\u1ec3 t\u1eeb ph\u00eda c\u00e1c c\u01a1 quan ch\u1ee9c n\u0103ng.\u201d<br><br>C\u1ee5m t\u1eeb n\u00e0o c\u00f3 \u00fd ngh\u0129a b\u1ed5 sung th\u00f4ng tin cho c\u00e2u v\u0103n tr\u01b0\u1edbc \u0111\u00f3?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\nC\u1ee5m t\u1eeb \u201cTh\u00eam v\u00e0o \u0111\u00f3\u201d b\u1ed5 sung th\u00eam th\u00f4ng tin c\u1ee7a v\u1ea5n \u0111\u1ec1 \u0111ang \u0111\u01b0\u1ee3c \u0111\u1ec1 c\u1eadp,  l\u00e0m r\u00f5 th\u00eam nh\u1eefng kh\u00f3 kh\u0103n trong ch\u00ednh s\u00e1ch h\u1ed7 tr\u1ee3 ng\u00e0nh s\u00e1ng t\u1ea1o.\n", "key": "A", "isVideo": true, "score": 0, "order": 24, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605302, "lessonId": 0, "a": "Ph\u00e2n t\u00edch.", "b": "Gi\u1ea3i th\u00edch.", "c": "So s\u00e1nh.", "d": "B\u00e1c b\u1ecf.", "bookId": 1088988, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cNh\u00ecn t\u1ed5ng th\u1ec3 c\u00e1c ch\u00ednh s\u00e1ch \u01b0u \u0111\u00e3i v\u1ec1 \u0111\u1ea7u t\u01b0, v\u1ec1 h\u1ed7 tr\u1ee3 cho c\u00e1c doanh nghi\u1ec7p ho\u1ea1t \u0111\u1ed9ng trong l\u0129nh v\u r\u01b0\u01a1ng Ba</b>: <i>(M\u1ed9t m\u00ecnh)</i> L\u00f4i th\u00f4i r\u1eafc r\u1ed1i qu\u00e1! N\u00fap trong h\u00ecnh v\u00f3c ng\u01b0\u1eddi kh\u00e1c, th\u1ef1c ch\u1eb3ng d\u1ec5 d\u00e0ng g\u00ec... S\u1ed1ng v\u1edbi nhau h\u01a1n n\u0103m m\u01b0\u01a1i n\u0103m, c\u00f3 bao gi\u1edd v\u1ee3 ch\u1ed3ng nghi k\u1ecb n\u1eb7ng l\u1eddi v\u1edbi nhau nh\u01b0 b\u00e2y gi\u1edd... <i>(Sau m\u1ed9t l\u00e1t) </i>B\u00e0 nh\u00e0 m\u00ecnh gi\u1eadn d\u1ed7i, tr\u00e1ch m\u00f3c k\u1ec3 c\u0169ng c\u00f3 l\u00ed... Nh\u01b0ng t\u00ecnh c\u1ea3nh ch\u1ecb v\u1ee3 anh h\u00e0ng th\u1ecbt, ng\u1eabm c\u0169ng th\u01b0\u01a1ng... <i>(M\u1ed9t l\u00e1t) </i>M\u00e0 m\u00ecnh c\u0169ng ch\u1eb3ng hi\u1ec3u sao n\u1eefa, khi \u1edf trong c\u00e1i nh\u00e0 n\u00e0y, b\u00ean v\u01b0\u1eddn t\u01b0\u1ee3c c\u00e2y c\u1ed1i th\u00e2n thi\u1ebft, m\u00ecnh th\u1ea5y t\u00e2m h\u1ed3n th\u1eadt thanh khi\u1ebft, vui s\u01b0\u1edbng. C\u00f2n m\u1ed7i l\u00fac sang nh\u00e0 anh h\u00e0ng th\u1ecbt, l\u00f2ng m\u00ecnh ng\u1ee1 ng\u00e0ng, nh\u01b0ng ch\u00e2n tay m\u00ecnh l\u1ea1i b\u1ed7ng lanh l\u1ee3i ho\u1ea1t b\u00e1t h\u1eafn l\u00ean. Nh\u1ea5t l\u00e0 h\u00f4m qua, l\u00fac... l\u00fac \u0111\u1ee9ng g\u1ea7n ch\u1ecb v\u1ee3 anh h\u00e0ng th\u1ecbt, ch\u00e2n tay m\u00ecnh b\u1ed7ng n\u00f3ng ran c\u1ea3 l\u00ean... M\u00ecnh... Nh\u01b0ng m\u00ecnh ngh\u0129 g\u00ec th\u1ebf n\u00e0y? \u0110\u00e2u ph\u1ea3i ch\u00e2n tay m\u00ecnh, ch\u00e2n tay ng\u01b0\u1eddi h\u00e0ng th\u1ecbt \u0111\u1ea5y ch\u1ee9! <i>(S\u1ee3 h\u00e3i \u0111\u1ee9ng d\u1eady \u0111i \u0111i l\u1ea1i l\u1ea1i. C\u00f3 ti\u1ebfng \u1ed3n \u00e0o ngo\u00e0i c\u1eeda).</i>\u201d<br><div style=\"text-align: right;\">(L\u01b0u Quang V\u0169, <i>H\u1ed3n Tr\u01b0\u01a1ng Ba, da h\u00e0ng th\u1ecbt</i>, theo <i>V\u0103n b\u1ea3n \u0111\u1ecdc hi\u1ec3u Ng\u1eef v\u0103n 12</i>, NXB \u0110\u1ea1i h\u1ecdc Hu\u1ebf, 2024)</div>", "listQuestion": [{"questionId": 21605313, "lessonId": 0, "a": "\u201cS\u1ee3 h\u00e3i \u0111\u1ee9ng d\u1eady \u0111i \u0111i l\u1ea1i l\u1ea1i. C\u00f3 ti\u1ebfng \u1ed3n \u00e0o ngo\u00e0i c\u1eeda.\u201d.", "b": "\u201cSau m\u1ed9t l\u00e1t.\u201d.", "c": "\u201cL\u1ea1i c\u00e1i gi\u1ecdng \u1ea5y! T\u00f4i \u0111\u1ebfn \u0111i\u00ean \u0111\u1ea7u l\u00ean m\u1ea5t th\u00f4i!\u201d.", "d": "\u201c\u00d4m \u0111\u1ea7u ng\u1ed3i ph\u1ecbch xu\u1ed1ng ch\u00f5ng. B\u00e0 V\u1ee3 Tr\u01b0\u01a1ng Ba v\u00f9ng v\u1eb1ng \u0111i ra ngo\u00e0i.\u201d.", "bookId": 1088989, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Ph\u01b0\u01a1ng \u00e1n n\u00e0o <b>kh\u00f4ng </b>ph\u1ea3i l\u00e0 ch\u1ec9 d\u1eabn s\u00e2n kh\u1ea5u trong \u0111o\u1ea1n tr\u00edch tr\u00ean?", "answer": "Gi\u1ea3i th\u00edch chi ti\u1ebft:<br>\u201cL\u1ea1i c\u00e1i gi\u1ecdng \u1ea5y! T\u00f4i \u0111\u1ebfn \u0111i\u00ean \u0111\u1ea7u l\u00ean m\u1ea5t th\u00f4i!\u201d l\u00e0 l\u1eddi tho\u1ea1i c\u1ee7a nh\u00e2n v\u1eadt H\u1ed3n Tr\u01b0\u01a1ng Ba, kh\u00f4ng ph\u1ea3i l\u00e0 ch\u1ec9 d\u1eabn s\u00e2n kh\u1ea5u trong \u0111o\u1ea1n tr\u00edch.", "key": "C", "isVideo": true, "score": 0, "order": 26, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21605316, "lessonId": 0, "a": "\u201cC\u00f2n m\u1ed7i l\u00fac sang nh\u00e0 anh h\u00e0ng th\u1ecbt, l\u00f2ng m\u00ecnh ng\u1ee1 ng\u00e0ng, nh\u01b0ng ch\u00e2n tay m\u00ecnh l\u1ea1i b\u1ed7ng lanh l\u1ee3i ho\u1ea1t b\u00e1t h\u1eafn l\u00ean.\u201d", "b": "\u201cN\u00fap trong h\u00ecnh v\u00f3c ng\u01b0\u1eddi kh\u00e1c, th\u1ef1c ch\u1eb3ng d\u1ec5 d\u00e0ng g\u00ec...\u201d.", "c": "\u201cT\u00f4i \u0111\u1ebfn \u0111i\u00ean \u0111\u1ea7u l\u00ean m\u1ea5t th\u00f4i!\u201d.", "d": "\u201cM\u00e0 m\u00ecnh c\u0169ng ch\u1eb3ng hi\u1ec3u sao n\u1eefa, khi \u1edf trong c\u00e1i nh\u00e0 n\u00e0y, b\u00ean v\u01b0\u1eddn t\u01b0\u1ee                             const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
