00ecnh b\u00ean d\u01b0\u1edbi). H\u1ecfi k\u00edch th\u01b0\u1edbc c\u1ee7a H\u00ecnh 2 l\u00e0 bao nhi\u00eau, bi\u1ebft r\u1eb1ng k\u00edch th\u01b0\u1edbc c\u1ee7a H\u00ecnh 1 l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/4a889fc4-57d2-45bd-85d9-2aa9f3e0e3e7.png\"/><br><img src=\"https://asset.moon.vn/img/chat/large/2025/10/ee2747aa-899f-4ff1-b903-c9326ac07cf2.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\">", "answer": "<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nKhi ph\u00f3ng to m\u1ed9t h\u00ecnh \u1ea3nh theo t\u1ec9 s\u1ed1 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/5803a6b2-40df-4402-a1a2-eebf5cf6c8ec.png\"/>, k\u00edch th\u01b0\u1edbc c\u00e1c c\u1ea1nh c\u1ee7a h\u00ecnh \u1ea3nh m\u1edbi s\u1ebd b\u1eb1ng k\u00edch th\u01b0\u1edbc c\u1ea1nh t\u01b0\u01a1ng \u1ee9ng c\u1ee7a h\u00ecnh \u1ea3nh c\u0169 nh\u00e2n v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/2254cec9-7ac0-41a1-a135-ad927abd9cbf.png\"/>.<br>\nC\u00f4ng th\u1ee9c: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/491dbf41-34ec-4190-939d-080941699278.png\"/>.<br>\n\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nTheo \u0111\u1ec1 b\u00e0i, k\u00edch th\u01b0\u1edbc c\u1ee7a H\u00ecnh 1 l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/a40d6142-2f31-4be2-925a-54c987c992e9.png\"/> v\u00e0 t\u1ec9 s\u1ed1 ph\u00f3ng to l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/09779b9f-71b2-4a0a-b563-b1a89e882334.png\"/>.<br>\nTa t\u00ednh k\u00edch th\u01b0\u1edbc c\u1ee7a H\u00ecnh 2 b\u1eb1ng c\u00e1ch nh\u00e2n t\u1eebng c\u1ea1nh c\u1ee7a H\u00ecnh 1 v\u1edbi 1,5:<br>\nC\u1ea1nh th\u1ee9 nh\u1ea5t: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/ef7d3ccb-36f7-4274-aa4f-96ece226e2cc.png\"/>.<br>\nC\u1ea1nh th\u1ee9 hai: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/0218fbf6-6b17-4e94-926e-857216460ccc.png\"/>.<br>\nDo \u0111\u00f3, k\u00edch th\u01b0\u1edbc c\u1ee7a H\u00ecnh 2 l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/443bd28b-fa19-40cc-813a-dfd6f5ecc26b.png\"/>.<br>\n\n<b>\u2705 K\u1ebft lu\u1eadn: Ch\u1ecdn \u0111\u00e1p \u00e1n D.</b>\n", "key": "D", "isVideo": false, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 1, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21196710, "lessonId": 0, "a": "", "b": "", "c": "", "d": "", "bookId": 1056199, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 2, "questionText": "M\u1ed7i ph\u00e1t bi\u1ec3u sau \u0111\u00e2y l\u00e0 \u0111\u00fang hay sai?", "answer": "<b>Ph\u00e1t bi\u1ec3u 1:</b> Hai tam gi\u00e1c c\u00e2n c\u00f3 m\u1ed9t c\u1eb7p g\u00f3c b\u1eb1ng nhau th\u00ec \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nX\u00e9t c\u00e1c tr\u01b0\u1eddng h\u1ee3p v\u1ecb tr\u00ed c\u1ee7a g\u00f3c b\u1eb1ng nhau trong tam gi\u00e1c c\u00e2n (g\u00f3c \u1edf \u0111\u1ec9nh ho\u1eb7c g\u00f3c \u1edf \u0111\u00e1y).<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nHai tam gi\u00e1c c\u00e2n \u0111\u1ed3ng d\u1ea1ng khi g\u00f3c \u1edf \u0111\u1ec9nh c\u1ee7a tam gi\u00e1c n\u00e0y b\u1eb1ng g\u00f3c \u1edf \u0111\u1ec9nh c\u1ee7a tam gi\u00e1c kia, ho\u1eb7c g\u00f3c \u1edf \u0111\u00e1y c\u1ee7a tam gi\u00e1c n\u00e0y b\u1eb1ng g\u00f3c \u1edf \u0111\u00e1y c\u1ee7a tam gi\u00e1c kia.<br>\nTuy nhi\u00ean, n\u1ebfu \u201cm\u1ed9t c\u1eb7p g\u00f3c b\u1eb1ng nhau\u201d n\u1eb1m \u1edf v\u1ecb tr\u00ed l\u1ec7ch nhau (v\u00ed d\u1ee5: g\u00f3c \u1edf \u0111\u1ec9nh c\u1ee7a tam gi\u00e1c n\u00e0y b\u1eb1ng g\u00f3c \u1edf \u0111\u00e1y c\u1ee7a tam gi\u00e1c kia) th\u00ec ch\u00fang kh\u00f4ng \u0111\u1ed3ng d\u1ea1ng.<br>\nV\u00ed d\u1ee5 ph\u1ea3n ch\u1ee9ng: Tam gi\u00e1c c\u00e2n A c\u00f3 g\u00f3c \u1edf \u0111\u1ec9nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/218d8dea-aa2c-4bb6-a0c9-aa2f20bdb989.png\"/> n\u00ean hai g\u00f3c \u0111\u00e1y <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/5eeeafe1-7357-4c80-a66e-d2b739d0cf60.png\"/>; tam gi\u00e1c c\u00e2n B c\u00f3 g\u00f3c \u1edf \u0111\u1ec9nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/1d301f14-05eb-437b-a026-6a3d9386171d.png\"/> n\u00ean hai g\u00f3c \u0111\u00e1y <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/a501f223-e712-4f16-bda8-d2ef577f80e2.png\"/>. Hai tam gi\u00e1c n\u00e0y c\u00f3 m\u1ed9t c\u1eb7p g\u00f3c b\u1eb1ng nhau (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/d247dbf7-2dd5-4462-88d1-1dd685067e67.png\"/>) nh\u01b0ng c\u00e1c g\u00f3c c\u00f2n l\u1ea1i kh\u00e1c nhau n\u00ean kh\u00f4ng \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u SAI.</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 2:</b> Hai tam gi\u00e1c \u0111\u1ec1u b\u1ea5t k\u00ec lu\u00f4n \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nS\u1eed d\u1ee5ng t\u00ednh ch\u1ea5t g\u00f3c c\u1ee7a tam gi\u00e1c \u0111\u1ec1u.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nM\u1ecdi tam gi\u00e1c \u0111\u1ec1u \u0111\u1ec1u c\u00f3 3 g\u00f3c b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/6730538f-eb81-49eb-b7a8-dd5b880e3571.png\"/>. Do \u0111\u00f3, hai tam gi\u00e1c \u0111\u1ec1u b\u1ea5t k\u00ec lu\u00f4n c\u00f3 c\u00e1c g\u00f3c t\u01b0\u01a1ng \u1ee9ng b\u1eb1ng nhau. Theo tr\u01b0\u1eddng h\u1ee3p g\u00f3c \u2013 g\u00f3c (g.g), ch\u00fang lu\u00f4n \u0111\u1ed3ng d\u1ea1ng v\u1edbi nhau.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 2 l\u00e0 ph\u00e1t bi\u1ec3u \u0110\u00daNG.</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 3:</b> Hai tam gi\u00e1c \u0111\u1ec1u b\u1ea5t k\u00ec lu\u00f4n \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nPh\u00e2n bi\u1ec7t gi\u1eefa \u201c\u0111\u1ed3ng d\u1ea1ng\u201d v\u00e0 \u201c\u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh (v\u1ecb t\u1ef1)\u201d.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nHai h\u00ecnh \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh l\u00e0 hai h\u00ecnh \u0111\u1ed3ng d\u1ea1ng v\u00e0 c\u00e1c \u0111\u01b0\u1eddng n\u1ed1i c\u00e1c \u0111i\u1ec3m t\u01b0\u01a1ng \u1ee9ng c\u00f9ng \u0111i qua m\u1ed9t \u0111i\u1ec3m (t\u00e2m ph\u1ed1i c\u1ea3nh). Hai tam gi\u00e1c \u0111\u1ec1u b\u1ea5t k\u00ec lu\u00f4n \u0111\u1ed3ng d\u1ea1ng, nh\u01b0ng \u0111\u1ec3 \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh th\u00ec ch\u00fang ph\u1ea3i \u0111\u01b0\u1ee3c \u0111\u1eb7t \u1edf v\u1ecb tr\u00ed sao cho c\u00e1c c\u1ea1nh t\u01b0\u01a1ng \u1ee9ng song song. N\u1ebfu hai tam gi\u00e1c \u0111\u1ec1u n\u1eb1m l\u1ec7ch nhau (xoay), ch\u00fang kh\u00f4ng \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh. T\u1eeb \u201cb\u1ea5t k\u00ec\u201d h\u00e0m \u00fd v\u1ecb tr\u00ed t\u1ef1 do n\u00ean kh\u00f4ng th\u1ecfa m\u00e3n \u0111i\u1ec1u ki\u1ec7n ph\u1ed1i c\u1ea3nh.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 3 l\u00e0 ph\u00e1t bi\u1ec3u SAI.</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 4:</b> Hai l\u1ee5c gi\u00e1c \u0111\u1ec1u b\u1ea5t k\u00ec lu\u00f4n \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nT\u01b0\u01a1ng t\u1ef1 nh\u01b0 ph\u00e1t bi\u1ec3u 3.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nHai l\u1ee5c gi\u00e1c \u0111\u1ec1u lu\u00f4n \u0111\u1ed3ng d\u1ea1ng v\u1edbi nhau (v\u00ec c\u00f9ng h\u00ecnh d\u1ea1ng), nh\u01b0ng kh\u00f4ng ph\u1ea3i l\u00fac n\u00e0o c\u0169ng \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh. \u0110\u1ec3 \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh, ch\u00fang ph\u1ea3i \u0111\u01b0\u1ee3c s\u1eafp x\u1ebfp sao cho t\u00e2m v\u00e0 c\u00e1c \u0111\u1ec9nh t\u01b0\u01a1ng \u1ee9ng n\u1eb1m tr\u00ean c\u00e1c \u0111\u01b0\u1eddng song song ho\u1eb7c \u0111\u1ed3ng quy. Khi hai l\u1ee5c gi\u00e1c \u0111\u1ec1u n\u1eb1m ng\u1eabu nhi\u00ean, \u0111i\u1ec1u n\u00e0y kh\u00f4ng x\u1ea3y ra.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 4 l\u00e0 ph\u00e1t bi\u1ec3u SAI.</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 5:</b> Hai h\u00ecnh vu\u00f4ng b\u1ea5t k\u00ec lu\u00f4n \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nD\u1ef1a v\u00e0o \u0111\u1ecbnh ngh\u0129a \u0111\u1ed3ng d\u1ea1ng c\u1ee7a \u0111a gi\u00e1c \u0111\u1ec1u.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nH\u00ecnh vu\u00f4ng l\u00e0 t\u1ee9 gi\u00e1c \u0111\u1ec1u, m\u1ecdi h\u00ecnh vu\u00f4ng \u0111\u1ec1u c\u00f3 4 g\u00f3c b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/1419d20c-a99d-4ed4-acba-64c2278d906e.png\"/> v\u00e0 4 c\u1ea1nh b\u1eb1ng nhau. T\u1ec9 s\u1ed1 gi\u1eefa c\u00e1c c\u1ea1nh t\u01b0\u01a1ng \u1ee9ng lu\u00f4n l\u00e0 h\u1eb1ng s\u1ed1 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/87066545-3c74-405c-bf50-1d5b4d32fbf1.png\"/>. V\u00ec v\u1eady, hai h\u00ecnh vu\u00f4ng b\u1ea5t k\u00ec lu\u00f4n c\u00f3 h\u00ecnh d\u00e1ng gi\u1ed1ng nhau, ch\u1ec9 kh\u00e1c k\u00edch th\u01b0\u1edbc.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 5 l\u00e0 ph\u00e1t bi\u1ec3u \u0110\u00daNG.</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 6:</b> Hai h\u00ecnh b\u00ecnh h\u00e0nh b\u1ea5t k\u00ec lu\u00f4n \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nT\u00ecm ph\u1ea3n v\u00ed d\u1ee5 v\u1ec1 g\u00f3c ho\u1eb7c t\u1ec9 l\u1ec7 c\u1ea1nh.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nH\u00ecnh b\u00ecnh h\u00e0nh \u0111\u01b0\u1ee3c x\u00e1c \u0111\u1ecbnh b\u1edfi \u0111\u1ed9 l\u1edbn g\u00f3c v\u00e0 t\u1ec9 l\u1ec7 gi\u1eefa hai c\u1ea1nh k\u1ec1 nhau. V\u00ed d\u1ee5 ph\u1ea3n ch\u1ee9ng: H\u00ecnh b\u00ecnh h\u00e0nh A l\u00e0 h\u00ecnh ch\u1eef nh\u1eadt (c\u00f3 g\u00f3c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/1ffdab64-8877-4a39-938d-682210e6ae58.png\"/>), h\u00ecnh b\u00ecnh h\u00e0nh B c\u00f3 g\u00f3c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/c0f7bf7f-2455-43af-ae5e-daca55a58673.png\"/>. H\u00ecnh d\u00e1ng c\u1ee7a ch\u00fang kh\u00e1c nhau n\u00ean kh\u00f4ng \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 6 l\u00e0 ph\u00e1t bi\u1ec3u SAI.</b>\n", "key": " ", "isVideo": false, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 1, "plans": [{"lessonId": 0, "questionId": 21196710, "planId": 21196711, "content": "Hai tam gi\u00e1c c\u00e2n c\u00f3 m\u1ed9t c\u1eb7p g\u00f3c b\u1eb1ng nhau th\u00ec \u0111\u1ed3ng d\u1ea1ng.", "key": "0", "planName": " ", "order": 0, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21196710, "planId": 21196716, "content": "Hai tam gi\u00e1c \u0111\u1ec1u b\u1ea5t k\u00ec lu\u00f4n \u0111\u1ed3ng d\u1ea1ng.", "key": "1", "planName": " ", "order": 1, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21196710, "planId": 21196714, "content": "Hai tam gi\u00e1c \u0111\u1ec1u b\u1ea5t k\u00ec lu\u00f4n \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh.", "key": "0", "planName": " ", "order": 2, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21196710, "planId": 21196712, "content": "Hai l\u1ee5c gi\u00e1c \u0111\u1ec1u b\u1ea5t k\u00ec lu\u00 tr\u00ed l\u1ec7ch nhau (xoay ho\u1eb7c kh\u00f4ng th\u1eb3ng h\u00e0ng v\u1edbi t\u00e2m), ch\u00fang s\u1ebd kh\u00f4ng t\u1ea1o th\u00e0nh h\u00ecnh \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 1 l\u00e0 SAI.</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 2 (b):</b> Hai h\u00ecnh \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh v\u1edbi nhau th\u00ec \u0111\u1ed3ng d\u1ea1ng v\u1edbi nhau.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nD\u1ef1a v\u00e0o \u0111\u1ecbnh ngh\u0129a c\u1ee7a \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\n\u0110\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh l\u00e0 m\u1ed9t tr\u01b0\u1eddng h\u1ee3p \u0111\u1eb7c bi\u1ec7t c\u1ee7a \u0111\u1ed3ng d\u1ea1ng. Khi hai h\u00ecnh l\u00e0 \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh, ch\u00fang ch\u1eafc ch\u1eafn ph\u1ea3i c\u00f3 c\u00f9ng h\u00ecnh d\u1ea1ng (ch\u1ec9 kh\u00e1c k\u00edch th\u01b0\u1edbc v\u00e0 v\u1ecb tr\u00ed). Do \u0111\u00f3, ch\u00fang th\u1ecfa m\u00e3n \u0111i\u1ec1u ki\u1ec7n c\u1ee7a hai h\u00ecnh \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 2 l\u00e0 \u0110\u00daNG.</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 3 (c):</b> Hai h\u00ecnh b\u1eb1ng nhau th\u00ec \u0111\u1ed3ng d\u1ea1ng v\u1edbi nhau.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nM\u1ed1i quan h\u1ec7 gi\u1eefa b\u1eb1ng nhau v\u00e0 \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nHai h\u00ecnh b\u1eb1ng nhau \u0111\u01b0\u1ee3c xem l\u00e0 hai h\u00ecnh \u0111\u1ed3ng d\u1ea1ng v\u1edbi t\u1ec9 s\u1ed1 \u0111\u1ed3ng d\u1ea1ng \u0111\u1eb7c bi\u1ec7t <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/bbfd9394-c78f-4d10-b2fb-7f74518fd247.png\"/>. V\u00ec v\u1eady, m\u1ecdi h\u00ecnh b\u1eb1ng nhau \u0111\u1ec1u l\u00e0 h\u00ecnh \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 3 l\u00e0 \u0110\u00daNG.</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 4 (d):</b> Hai h\u00ecnh c\u00f9ng \u0111\u1ed3ng d\u1ea1ng v\u1edbi m\u1ed9t h\u00ecnh kh\u00e1c th\u00ec \u0111\u1ed3ng d\u1ea1ng v\u1edbi nhau.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nT\u00ednh ch\u1ea5t b\u1eafc c\u1ea7u c\u1ee7a quan h\u1ec7 \u0111\u1ed3ng d\u1ea1ng.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nN\u1ebfu h\u00ecnh A \u0111\u1ed3ng d\u1ea1ng v\u1edbi h\u00ecnh B v\u00e0 h\u00ecnh C c\u0169ng \u0111\u1ed3ng d\u1ea1ng v\u1edbi h\u00ecnh B, th\u00ec h\u00ecnh A v\u00e0 h\u00ecnh C s\u1ebd c\u00f3 c\u00f9ng h\u00ecnh d\u1ea1ng. Do \u0111\u00f3, h\u00ecnh A v\u00e0 h\u00ecnh C \u0111\u1ed3ng d\u1ea1ng v\u1edbi nhau.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 4 l\u00e0 \u0110\u00daNG.</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 5 (e):</b> Hai h\u00ecnh c\u00f9ng l\u00e0 ph\u00f3ng to c\u1ee7a m\u1ed9t h\u00ecnh th\u00ec b\u1eb1ng nhau.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nXem x\u00e9t t\u1ec9 s\u1ed1 ph\u00f3ng to (t\u1ec9 s\u1ed1 \u0111\u1ed3ng d\u1ea1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/3ce30f77-e7d4-403d-b7a0-b11725ace726.png\"/>).<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\n\u201cPh\u00f3ng to\u201d ngh\u0129a l\u00e0 t\u1ea1o ra m\u1ed9t h\u00ecnh \u0111\u1ed3ng d\u1ea1ng v\u1edbi k\u00edch th\u01b0\u1edbc l\u1edbn h\u01a1n h\u00ecnh g\u1ed1c. Tuy nhi\u00ean, m\u1ee9c \u0111\u1ed9 ph\u00f3ng to c\u00f3 th\u1ec3 kh\u00e1c nhau. V\u00ed d\u1ee5: H\u00ecnh 1 ph\u00f3ng to g\u1ea5p 2 l\u1ea7n h\u00ecnh g\u1ed1c (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/63ec31cb-2749-413e-b661-bd0a84e659d9.png\"/>), H\u00ecnh 2 ph\u00f3ng to g\u1ea5p 3 l\u1ea7n h\u00ecnh g\u1ed1c (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/6de3d3c3-b8fc-4ac2-81fd-cf1f3074c790.png\"/>). a2-b72d-448cc8e67af6.png\"/>, ch\u00fang ch\u1eafc ch\u1eafn c\u00f3 c\u00f9ng h\u00ecnh d\u1ea1ng (ch\u1ec9 kh\u00e1c k\u00edch th\u01b0\u1edbc v\u00e0 v\u1ecb tr\u00ed), do \u0111\u00f3 ch\u00fang l\u00e0 hai h\u00ecnh \u0111\u1ed3ng d\u1ea1ng. Vi\u1ec7c kh\u1eb3ng \u0111\u1ecbnh ch\u00fang \u201ckh\u00f4ng l\u00e0\u201d hai h\u00ecnh \u0111\u1ed3ng d\u1ea1ng l\u00e0 sai v\u00ec \u0111\u00e3 ph\u1ee7 nh\u1eadn m\u1ed1i quan h\u1ec7 bao h\u00e0m n\u00e0y.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u SAI.</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 2:</b> N\u1ebfu \u0111i\u1ec3m <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/d5ec6a00-c266-43fd-8369-707b9953a3fc.png\"/> l\u00e0 t\u00e2m \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh c\u1ee7a hai \u0111o\u1ea1n th\u1eb3ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/72f72bb7-2640-4ef4-8127-4e36e9eec50b.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/8af9ec12-508d-4b02-a6ed-3ae0f2357929.png\"/> \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh th\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/0c56199b-a0b1-4680-9aa8-c539b4c2b57b.png\"/>.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nS\u1eed d\u1ee5ng t\u00ednh ch\u1ea5t c\u1ee7a ph\u00e9p v\u1ecb t\u1ef1 (\u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh) \u0111\u1ed1i v\u1edbi \u0111\u01b0\u1eddng th\u1eb3ng v\u00e0 \u0111o\u1ea1n th\u1eb3ng.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nT\u00ednh ch\u1ea5t c\u01a1 b\u1ea3n c\u1ee7a ph\u00e9p v\u1ecb t\u1ef1 t\u00e2m <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/402799a3-fe06-4b9c-8182-a290f7d97a4f.png\"/> l\u00e0 bi\u1ebfn m\u1ed9t \u0111\u01b0\u1eddng th\u1eb3ng th\u00e0nh m\u1ed9t \u0111\u01b0\u1eddng th\u1eb3ng song song ho\u1eb7c tr\u00f9ng v\u1edbi n\u00f3. Trong tr\u01b0\u1eddng h\u1ee3p <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/19fd9f17-8fd6-4899-816c-80d080061706.png\"/> kh\u00f4ng thu\u1ed9c \u0111\u01b0\u1eddng th\u1eb3ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/af3623f3-e365-4039-a975-112c639e6a58.png\"/>, \u0111o\u1ea1n <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/4cd7ec61-dc3f-4e46-872e-72d7bf656948.png\"/> s\u1ebd song song v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7fffb380-570c-482c-accf-25349179a1b2.png\"/>. \u0110\u00e2y l\u00e0 \u0111\u1eb7c \u0111i\u1ec3m \u0111\u1eb7c tr\u01b0ng c\u1ee7a h\u00ecnh \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 2 l\u00e0 ph\u00e1t bi\u1ec3u \u0110\u00daNG.</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 3:</b> H\u00ecnh g\u1ecdi l\u00e0 \u0111\u1ed3ng d\u1ea1ng v\u1edbi h\u00ecnh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/73c4cf99-fe7c-46a5-9c3b-ec7eddbc6cb3.png\"/> b\u1eb1ng m\u1ed9t h\u00ecnh n\u00e0o \u0111\u00f3 \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh v\u1edbi h\u00ecnh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/b2d43332-8055-4210-9f75-c9c09284782b.png\"/>.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nD\u1ef1a v\u00e0o \u0111\u1ecbnh ngh\u0129a c\u1ee7a \u201chai h\u00ecnh \u0111\u1ed3ng d\u1ea1ng\u201d trong ch\u01b0\u01a1ng tr\u00ecnh h\u00ecnh h\u1ecdc hi\u1ec7n h\u00e0nh.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nTheo \u0111\u1ecbnh ngh\u0129a: M\u1ed9t h\u00ecnh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/911ee0bd-d31e-40da-adb8-ae9aca518ef6.png\"/> \u0111\u01b0\u1ee3c g\u1ecdi l\u00e0 \u0111\u1ed3ng d\u1ea1ng v\u1edbi h\u00ecnh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/611a5207-608f-43d9-aa71-3508843374ff.png\"/> n\u1ebfu <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/be91553a-710b-466a-bcba-ca4fe55ce385.png\"/> b\u1eb1ng (tr\u00f9ng kh\u00edt) v\u1edbi m\u1ed9t h\u00ecnh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/d622546d-b395-459c-9ff9-b4ef6c916372.png\"/> n\u00e0o \u0111\u00f3 m\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/71acabf7-b292-48f7-a185-d26fcf81ce3d.png\"/> \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/1eeb6ffc-3efb-47a6-8d2f-16accedb50cc.png\"/>. N\u00f3i c\u00e1ch kh\u00e1c, \u0111\u1ed3ng d\u1ea1ng l\u00e0 quan h\u1ec7 bao g\u1ed3m c\u1ea3 ph\u00e9p b\u1eb1ng nhau v\u00e0 ph\u00e9p v\u1ecb t\u1ef1 (ph\u00f3ng to ho\u1eb7c thu nh\u1ecf). Ph\u00e1t bi\u1ec3u n\u00e0y di\u1ec5n \u0111\u1ea1t \u0111\u00fang n\u1ed9i dung c\u1ee7a \u0111\u1ecbnh ngh\u0129a \u0111\u00f3.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 3 l\u00e0 ph\u00e1t bi\u1ec3u \u0110\u00daNG.</b>\n", "key": " ", "isVideo": false, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 1, "plans": [{"lessonId": 0, "questionId": 21196724, "planId": 21196725, "content": "Hai h\u00ecnh \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh (hay v\u1ecb t\u1ef1) kh\u00f4ng l\u00e0 hai h\u00ecnh \u0111\u1ed3ng d\u1ea1ng.", "key": "0", "planName": " ", "order": 0, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21196724, "planId": 21196726, "content": "N\u1ebfu \u0111i\u1ec3m <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/2d6cbca9-dbb9-43e1-bfca-b1f44e0343e5.png\"/> l\u00e0 t\u00e2m \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh c\u1ee7a hai \u0111o\u1ea1n th\u1eb3ng AB v\u00e 83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nKi\u1ec3m tra \u0111i\u1ec1u ki\u1ec7n v\u1ec1 t\u00e2m ph\u1ed1i c\u1ea3nh: C\u00e1c \u0111\u01b0\u1eddng th\u1eb3ng n\u1ed1i c\u00e1c \u0111i\u1ec3m t\u01b0\u01a1ng \u1ee9ng ph\u1ea3i \u0111\u1ed3ng quy t\u1ea1i m\u1ed9t \u0111i\u1ec3m. S\u1eed d\u1ee5ng t\u00ednh ch\u1ea5t \u0111\u01b0\u1eddng trung b\u00ecnh c\u1ee7a tam gi\u00e1c.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nTheo \u0111\u1ec1 b\u00e0i: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/aa3baf48-2240-4f34-88a4-54cb7fe50dc0.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/c91c68ce-9f52-4c45-9408-798d0b5e521c.png\"/>. Do \u0111\u00f3, \u0111\u01b0\u1eddng th\u1eb3ng n\u1ed1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/31a9f2ce-c4a3-4b18-8e13-e9577c08300c.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/0f2279ee-a23d-4bba-87e2-b1d784e9f33e.png\"/> ch\u00ednh l\u00e0 c\u1ea1nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/8c168d4f-be88-4b45-8a97-3e4addcad01a.png\"/> (\u0111i qua <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/bb8f93b6-ef68-438c-b83d-d2226f1e6364.png\"/>), \u0111\u01b0\u1eddng th\u1eb3ng n\u1ed1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/fc54d83c-caf3-4d83-b987-989daad70d40.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/ba6dc621-f9ae-46d9-8caa-a4d8d661a36e.png\"/> ch\u00ednh l\u00e0 c\u1ea1nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7ff64fa2-6a62-4a0b-99df-303bce8a9972.png\"/> (\u0111i qua <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/148e05e8-d4f7-4042-b175-d0eb8dadb8e6.png\"/>). Hai \u0111\u01b0\u1eddng th\u1eb3ng n\u1ed1i c\u00e1c c\u1eb7p \u0111i\u1ec3m t\u01b0\u01a1ng \u1ee9ng (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/fa32c977-b86b-46a5-99ce-ba922af40c98.png\"/> v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/c00dd470-7e5f-4c65-b6ec-15b2aab52fee.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/f78d5b91-5f9d-46a4-81f7-4484f84bbac0.png\"/> v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/818bd538-5ba0-44c2-8d82-130ed89b5197.png\"/>) c\u1eaft nhau t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/95ab6a86-4293-402d-931c-ca177bf5c2e8.png\"/>.<br>\nM\u1eb7t kh\u00e1c, v\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/c9ecf8d5-2b05-4eac-a5d8-effce0e8f165.png\"/> l\u00e0 trung \u0111i\u1ec3m n\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/3fd0525c-c828-4275-b1cf-d657c84d9c9e.png\"/>.<br>\nDo \u0111\u00f3, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/40766845-b537-43cf-88c4-9ba8d457b9e8.png\"/> \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/4663ed27-2c29-4db8-8d90-2d5d47e735af.png\"/> (hay \u0111o\u1ea1n <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/3ca338bd-f115-4250-aef2-e97f8a91b4d6.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/658c0105-1f12-4a68-9472-8e20f048e68c.png\"/>) v\u1edbi t\u00e2m ph\u1ed1i c\u1ea3nh l\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/87e02032-ce97-4a62-9e92-1a6b02d3317c.png\"/>.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u \u0110\u00daNG.</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 2 (b):</b> Hai \u0111o\u1ea1n th\u1eb3ng MP v\u00e0 AE \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh, \u0111i\u1ec3m B l\u00e0 t\u00e2m \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/cb653c52-c397-480d-9397-54258dee4b22.png\"/>.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nKi\u1ec3m tra t\u00ednh th\u1eb3ng h\u00e0ng v\u1edbi t\u00e2m <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/28e3145b-b54e-41fa-b47f-6e9a692a224d.png\"/> v\u00e0 t\u00ednh to\u00e1n l\u1ea1i t\u1ec9 s\u1ed1 \u0111o\u1ea1n th\u1eb3ng d\u1ef1a tr\u00ean d\u1eef ki\u1ec7n \u0111\u1ec1 b\u00e0i cho (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7b5f865e-7462-4227-a69a-a72cecd1e1b8.png\"/>).<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nV\u1ec1 t\u00e2m ph\u1ed1i c\u1ea3nh: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/897412d6-b47e-40a9-a7ea-31d8ff686386.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/c4dffcfb-c5fe-4027-b781-0928db9d08b0.png\"/>, n\u00ean c\u00e1c \u0111\u01b0\u1eddng th\u1eb3ng n\u1ed1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/1bb3ded7-9599-4903-a2e6-8b22e8c26343.png\"/> v\u00e0 n\u1ed1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7f64a3a3-68c6-4775-b8d8-ee8f1b7d7749.png\"/> \u0111\u1ec1u \u0111i qua <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/e9bae6c5-5bce-4e68-b429-26fcbf9851a0.png\"/>. N\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/4834e3ec-47bf-4af9-a868-09aec382e66b.png\"/> l\u00e0 t\u00e2m ph\u1ed1i c\u1ea3nh.<br>\nV\u1ec1 t\u1ec9 s\u1ed1: Theo \u0111\u1ec1 b\u00e0i ta c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/b0dbf269-5b71-4333-9ed9-94c46fb30037.png\"/>. Suy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/e5bf30b8-8298-4ee7-a1a4-f2749bd76553.png\"/>.<br>\nSo s\u00e1nh v\u1edbi gi\u00e1 tr\u1ecb trong ph\u00e1t bi\u1ec3u: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/4a428dda-1701-4455-89c0-83342d2901a9.png\"/>, c\u00f2n <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7cc7ca09-0df5-4dd6-ab08-b2e19c8537a3.png\"/>. Hai gi\u00e1 tr\u1ecb n\u00e0y kh\u00e1c nhau. N\u00ean ph\u00e1t bi\u1ec3u kh\u00f4ng ch\u00ednh x\u00e1c.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 2 l\u00e0 ph\u00e1t bi\u1ec3u SAI.</b><br>\n\n<b>Ph\u00e1t bi\u1ec3u 3 (c):</b> Hai \u0111o\u1ea1n th\u1eb3ng PR v\u00e0 BF \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh, \u0111i\u1ec3m E l\u00e0 t\u00e2m \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh.<br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nX\u00e1c \u0111\u1ecbnh giao \u0111i\u1ec3m c\u1ee7a c\u00e1c \u0111\u01b0\u1eddng th\u1eb3ng n\u1ed1i \u0111i\u1ec3m t\u01b0\u01a1ng \u1ee9ng v\u00e0 so s\u00e1nh t\u1ec9 s\u1ed1 v\u1ecb t\u1ef1.<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nV\u1ec1 t\u00e2m ph\u1ed1i c\u1ea3nh: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/20c9fe3b-89b9-4779-ba8a-5679ae0f1fa4.png\"/> n\u1eb1m tr\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/612ee48e-40ae-4fbe-8fd5-1c24705b9a53.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/b71674d3-331c-4d29-926a-66e6bb49f6c8.png\"/> n\u1eb1m tr\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/6f150d81-1cfb-4179-845e-bd64e3d021b6.png\"/>. C\u00e1c \u0111\u01b0\u1eddng th\u1eb3ng n\u1ed1i c\u00e1c c\u1eb7p \u0111i\u1ec3m t\u01b0\u01a1ng \u1ee9ng (<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/c089f541-b73c-4214-884b-649adbfae630.png\"/> v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/dd4ffdfa-b812-4c3b-ae60-0c13de9886a4.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/72b75814-dcee-4300-9393-22a5c6eae305.png\"/> v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/dcd42374-651f-4389-b7ec-ca433f7d8d6e.png\"/>) l\u00e0 \u0111\u01b0\u1eddng th\u1eb3ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/bdcf418e-2752-44fe-a2e3-f8e20562b316.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/8d695f28-10e6-4df4-8a1f-c04e0ee1ac22.png\"/>. Ch\u00fang c\u1eaft nhau t\u1ea1i <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/bdf3c2fd-9547-4ec3-824e-e4f931e2afae.png\"/>. N\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/8a30837c-cc57-41ae-b5d5-62f40ebe54a2.png\"/> l\u00e0 t\u00e2m ph\u1ed1i c\u1ea3nh.<br>\nV\u1ec1 t\u1ec9 s\u1ed1: T\u1eeb gi\u1ea3 thi\u1ebft <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/beef351f-710d-46c0-8b40-ffb0ef2d7a4b.png\"/>, suy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/b913a117-87d2-410e-88fb-8f2241e4e599.png\"/>. T\u01b0\u01a1ng t\u1ef1, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/deb33b82-39b7-46f7-9995-d816d9777586.png\"/> n\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/8bb7a58c-cf84-43f7-bd23-dbc5ea9c65c5.png\"/>.<br>\nV\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/20d9351e-c93e-4809-aeab-a56377b1d436.png\"/> n\u00ean hai \u0111o\u1ea1n th\u1eb3ng n\u00e0y \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh t\u1ea1i t\u00e2m <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/7cbb319a-d11b-4a96-ac00-d0544908b51f.png\"/>.<br>\n<b>\u2705 K\u1ebft lu\u1eadn: Ph\u00e1t bi\u1ec3u 3 l\u00e0 ph\u00e1t bi\u1ec3u \u0110\u00daNG.</b>\n", "key": " ", "isVideo": false, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 1, "plans": [{"lessonId": 0, "questionId": 21196730, "planId": 21196731, "content": "Hai \u0111o\u1ea1n th\u1eb3ng EF v\u00e0 AB \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh, \u0111i\u1ec3m C l\u00e0 t\u00e2m \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh.", "key": "1", "planName": " ", "order": 0, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21196730, "planId": 21196732, "content": "Hai \u0111o\u1ea1n th\u1eb3ng MP v\u00e0 AE \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh, \u0111i\u1ec3m B l\u00e0 t\u00e2m \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/12/b030cc81-3bef-4249-b888-1b668cfc4ced.png\"/>", "key": "0", "planName": " ", "order": 1, "yourKey": "", "isTested": false}, {"lessonId": 0, "questionId": 21196730, "planId": 21196733, "content": "Hai \u0111o\u1ea1n th\u1eb3ng PR v\u00e0 BF \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh, \u0111i\u1ec3m E l\u00e0 t\u00e2m \u0111\u1ed3ng d\u1ea1ng ph\u1ed1i c\u1ea3nh.", "key": "1", "planName": " ", "order": 2, "yourKey": "", "isTested": false}], "answerPlans": [], "normalizedType": "2"}]}];
        let userAnswers = {}; // Store: { qId: value }
        let isSubmitted = false;
        let examMode = 'practice'; // 'practice' or 'exam'
        let startTime = Date.now();
        let timerInterval;

        // --- INIT ---
        window.onload = function() {
            renderExam();
            startTimer();
            document.getElementById('mode-select').addEventListener('change', (e) => {
                if(isSubmitted) return;
                if(confirm('Đổi chế độ sẽ làm mới lại trạng thái hiển thị (không mất bài làm). Tiếp tục?')) {
                    examMode = e.target.value;
                    renderExam(false); // Re-render without resetting answers
                } else {
                    e.target.value = examMode;
                }
            });
        };

        // --- TIMER LOGIC ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- RENDER ENGINE ---
        function renderExam(reset = false) {
            const container = document.getElementById('exam-content');
            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; // Clear to re-render
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

            let globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                // Render Group Header
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {
                    const gDiv = document.createElement('div');
                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';
                    gDiv.innerHTML = `
                        ${group.title ? `<h3 class="font-bold text-gray-800 text-lg mb-2">${group.title}</h3>` : ''}
                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);
                }

                group.listQuestion.forEach((q, qIdx) => {
                    globalIdx++;
                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`; // Unique Key for storage
                    const qType = q.normalizedType;
                    
                    // -- Palette Item --
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    palBtn.onclick = () => document.getElementById(`question-${qKey}`).scrollIntoView({behavior: 'smooth', block: 'center'});
                    palDesk.appendChild(palBtn.cloneNode(true)); // Add to Desktop
                    palMob.appendChild(palBtn); // Add to Mobile

                    // -- Question Card --
                    const qCard = document.createElement('div');
                    qCard.id = `question-${qKey}`;
                    qCard.className = 'bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md';
                    
                    // Header: Question Number
                    let html = `<div class="flex items-start gap-3 mb-4">
                        <span class="flex-none bg-moon text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">${qId}</span>
                        <div class="flex-1">
                            <div class="q-content text-gray-800 text-base leading-relaxed">${q.questionText}</div>
                        </div>
                    </div>`;

                    // Interaction Area
                    html += `<div class="ml-0 md:ml-11 mt-4 space-y-3" id="interaction-${qKey}">`;
                    
                    // === TYPE 0: MCQ ===
                    if(qType === '0') {
                        ['a', 'b', 'c', 'd'].forEach(opt => {
                            const val = q[opt];
                            if(!val) return;
                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";
                            let icon = `<div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:border-blue-400">${opt.toUpperCase()}</div>`;
                            let feedback = "";

                            if(isSelected) {
                                btnClass = "w-full text-left p-3 rounded-lg border-2 bg-blue-50 border-blue-400 text-blue-800 flex items-start gap-3 cursor-pointer";
                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            // Logic hiển thị kết quả
                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { // Chọn đúng
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { // Đúng nhưng không chọn (hiện đáp án khi nộp)
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }
                                } else {
                                    if(isSelected) { // Chọn sai
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-red-600 font-bold text-sm">Sai rồi</span>`;
                                    }
                                }
                            } else if (isSubmitted && isCorrect) {
                                 btnClass += " bg-green-50 border-green-400"; // Hiện đáp án đúng sau khi nộp dù chưa làm
                            }

                            html += `
                            <div onclick="handleSelect('${qKey}', '${opt.toUpperCase()}', '0')" class="${btnClass}">
                                ${icon}
                                <div class="flex-1">${val}</div>
                                ${feedback}
                            </div>`;
                        });
                    }

                    // === TYPE 1 & 3: FILL KEY ===
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let inputClass = "w-full p-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-200 transition-all font-mono";
                        let feedbackHtml = "";

                        if((isSubmitted || (examMode === 'practice' && userVal))) {
                            const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                            if(isCorrect) {
                                inputClass = "w-full p-3 border-2 border-green-500 bg-green-50 text-green-800 rounded-lg font-bold";
                                feedbackHtml = `<div class="mt-1 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                            } else {
                                inputClass = "w-full p-3 border-2 border-red-500 bg-red-50 text-red-800 rounded-lg";
                                feedbackHtml = `<div class="mt-1 text-red-600 text-sm">
                                    ✗ Sai. Đáp án đúng: <span class="font-bold text-green-700">${correctVal}</span>
                                </div>`;
                            }
                        }

                        html += `
                        <div>
                            <input type="text" 
                                value="${userVal}" 
                                placeholder="Nhập câu trả lời của bạn..." 
                                onblur="handleSelect('${qKey}', this.value, '1')" 
                                class="${inputClass}"
                                ${isSubmitted ? 'disabled' : ''}
                            />
                            ${feedbackHtml}
                        </div>`;
                    }

                    // === TYPE 2: TRUE/FALSE ===
                    else if(qType === '2') {
                         html += `<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500 border rounded-lg overflow-hidden">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                <tr>
                                    <th scope="col" class="px-4 py-3 w-16 text-center">Ý</th>
                                    <th scope="col" class="px-4 py-3">Nội dung</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Đúng</th>
                                    <th scope="col" class="px-4 py-3 w-24 text-center">Sai</th>
                                </tr>
                            </thead>
                            <tbody>`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; // {0: true, 1: false}
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
