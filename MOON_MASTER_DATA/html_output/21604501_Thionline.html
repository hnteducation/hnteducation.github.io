    <script>
        const EXAM_DATA = [{"title": "", "content": "", "listQuestion": [{"questionId": 21604512, "lessonId": 0, "a": "Gi\u1ea3i th\u00edch t\u1ee5c x\u0103m m\u00ecnh c\u1ee7a ng\u01b0\u1eddi L\u1ea1c Vi\u1ec7t.", "b": "Gi\u1ea3i th\u00edch ngu\u1ed3n g\u1ed1c c\u1ee7a ng\u01b0\u1eddi L\u1ea1c Vi\u1ec7t.", "c": "Gi\u1ea3i th\u00edch quan h\u1ec7 h\u1ecd h\u00e0ng c\u1ee7a ng\u01b0\u1eddi L\u1ea1c Vi\u1ec7t v\u1edbi gi\u1ed1ng r\u1ed3ng.", "d": "Ph\u1ea3n \u00e1nh hi\u1ec7n t\u01b0\u1ee3ng d\u00e2n ch\u00fang th\u01b0\u1eddng b\u1ecb c\u00e1c gi\u1ed1ng thu\u1ef7 t\u1ed9c nh\u01b0 thu\u1ed3ng lu\u1ed3ng, c\u00e1 s\u1ea5u l\u00e0m h\u1ea1i.", "bookId": 1088637, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTrong x\u1ee9 c\u00f3 nhi\u1ec1u ao, \u0111\u1ea7m, h\u1ed3, s\u00f4ng v\u00e0 ti\u1ebfp gi\u00e1p bi\u1ec3n, d\u00e2n ch\u00fang sinh ho\u1ea1t v\u1ec1 ngh\u1ec1 ch\u00e0i l\u01b0\u1edbi th\u01b0\u1eddng b\u1ecb c\u00e1c gi\u1ed1ng th\u1ee7y t\u1ed9c nh\u01b0 thu\u1ed3ng lu\u1ed3ng, c\u00e1 s\u1ea5u l\u00e0m h\u1ea1i. H\u00f9ng V\u01b0\u01a1ng nghe nh\u1eefng tai n\u1ea1n d\u00e2n s\u1ef1 hay g\u1eb7p ph\u1ea3i m\u1edbi b\u1ea3o r\u1eb1ng:<br>- Ta c\u00f9ng c\u00e1c anh em ta v\u1ed1n thu\u1ed9c gi\u1ed1ng r\u1ed3ng. R\u1ed3ng th\u01b0\u1eddng \u01b0a \u0111\u1ed3ng lo\u1ea1i m\u00e0 gh\u00e9t d\u1ecb lo\u1ea1i, v\u1eady n\u00ean d\u00f9ng ch\u00e0m v\u1ebd h\u00ecnh r\u1ed3ng v\u00e0o ng\u01b0\u1eddi, \u0111\u1ec3 khi l\u1eb7n xu\u1ed1ng c\u00e1c em ta nh\u1eadn ra \u0111\u1ed3ng lo\u1ea1i, m\u00e0 kh\u00f4ng l\u00e0m h\u1ea1i n\u1eefa.<br>Do \u0111\u00f3 m\u00e0 ng\u01b0\u1eddi L\u1ea1c Vi\u1ec7t c\u00f3 t\u1ee5c x\u0103m m\u00ecnh v\u00e0 tin r\u1eb1ng m\u00ecnh l\u00e0 ch\u00e1u giao long. N\u01b0\u1edbc c\u1ee7a H\u00f9ng V\u01b0\u01a1ng c\u0169ng v\u00ec th\u1ebf m\u00e0 g\u1ecdi t\u00ean l\u00e0 V\u0103n Lang.\u201d</i><br><div style=\"text-align: right;\">(Th\u1ea7n tho\u1ea1i Vi\u1ec7t Nam, <i>H\u00f9ng V\u01b0\u01a1ng</i>, NXB S\u00e1ng t\u1ea1o, 1970)</div>N\u1ed9i dung ch\u00ednh c\u1ee7a v\u0103n b\u1ea3n l\u00e0 g\u00ec?", "answer": "\u0110o\u1ea1n tr\u00edch gi\u1ea3i th\u00edch ngu\u1ed3n g\u1ed1c c\u1ee7a t\u1ee5c x\u0103m m\u00ecnh \u1edf ng\u01b0\u1eddi L\u1ea1c Vi\u1ec7t. Theo \u0111\u00f3, vua H\u00f9ng V\u01b0\u01a1ng \u0111\u00e3 \u0111\u01b0a ra l\u1eddi khuy\u00ean cho d\u00e2n ch\u00fang v\u1ec1 vi\u1ec7c x\u0103m h\u00ecnh r\u1ed3ng l\u00ean ng\u01b0\u1eddi \u0111\u1ec3 tr\u00e1nh b\u1ecb c\u00e1c lo\u00e0i th\u1ee7y t\u1ed9c l\u00e0m h\u1ea1i.<br>\n\u2192 N\u1ed9i dung ch\u00ednh c\u1ee7a v\u0103n b\u1ea3n l\u00e0 gi\u1ea3i th\u00edch t\u1ee5c x\u0103m m\u00ecnh c\u1ee7a ng\u01b0\u1eddi L\u1ea1c Vi\u1ec7t.\n", "key": "A", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604521, "lessonId": 0, "a": "D\u0169ng c\u1ea3m, trung tr\u1ef1c.", "b": "Ch\u00ed kh\u00ed anh h\u00f9ng.", "c": "Trung qu\u00e2n \u00e1i qu\u1ed1c.", "d": "C\u01b0\u01a1ng c\u01b0\u1eddng, c\u1ee9ng c\u1ecfi.", "bookId": 1088638, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cM\u1ed9t h\u00f4m th\u1ea7y \u0111i \u0111\u00e1m, c\u00f3 cho C\u1ea7u v\u00e0 Tr\u1ecdng c\u00f9ng theo. L\u00fac v\u1ec1, nh\u00e0 \u0111\u00e1m bi\u1ebfu th\u1ea7y m\u1ed9t c\u00e1i th\u1ee7 l\u1ee3n. Hai ng\u01b0\u1eddi ganh t\u1ecb nhau kh\u00f4ng ch\u1ecbu x\u00e1ch.<br>Th\u1ea7y li\u1ec1n ra m\u1ed9t c\u00e2u \u0111\u1ed1i: Hu\u1ec1 tr\u01b0 th\u1ee7 ngh\u0129a l\u00e0 \u201cx\u00e1ch \u0111\u1ea7u l\u1ee3n\u201d, b\u1ea3o ai \u0111\u1ed1i hay th\u00ec \u0111\u01b0\u1ee3c mi\u1ec5n. Tr\u1ecdng \u0111\u1ed1i l\u1ea1i l\u00e0 Phan long l\u00e2n ngh\u0129a l\u00e0 \u201cvin v\u1ea9y r\u1ed3ng\u201d. C\u00f2n C\u1ea7u th\u00ec \u0111\u1ed1i l\u00e0 Ph\u00e1 T\u1ea7n di\u1ec7t S\u1edf. Th\u1ea7y g\u00f5 m\u1ed9t gi\u00e1o qu\u1ea1t v\u00e0o \u0111\u1ea7u C\u1ea7u, ch\u00ea C\u1ea7u \u0111\u1ed1i g\u00ec m\u00e0 l\u1ea1i th\u1eeba ch\u1eef. Nh\u01b0ng C\u1ea7u c\u1ed1 c\u00e3i:<br>- T\u00f4i d\u1ea7u \u0111\u1ed1i sai, nh\u01b0ng t\u00f4i kh\u00f4ng mu\u1ed1n vin v\u1ea9y r\u1ed3ng m\u00e0 l\u00f3c v\u1ea9y r\u1ed3ng kia!<br>Th\u1ea7y m\u1eafng:<br>- Th\u1ebf th\u00ec t\u1ed9i to \u0111\u1ea5y, kh\u00f4ng ph\u1ea3i ch\u01a1i \u0111\u00e2u, con \u1ea1! Cu\u1ed1i c\u00f9ng, ch\u00e0ng b\u1ecb th\u1ea7y b\u1eaft ph\u1ea3i x\u00e1ch th\u1ee7 l\u1ee3n v\u1ec1 nh\u00e0.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n \u0110\u1ed5ng Chi, <i>Qu\u1eadn He</i>, theo <i>Kho t\u00e0ng truy\u1ec7n c\u1ed5 t\u00edch Vi\u1ec7t Nam</i>, t\u1eadp 1, NXB Gi\u00e1o d\u1ee5c, 2000)</div>C\u00e2u \u0111\u1ed1i c\u1ee7a C\u1ea7u kh\u1eafc ho\u1ea1 ph\u1ea9m c\u00e1ch n\u00e0o trong nh\u00e2n v\u1eadt?", "answer": "C\u00e2u \u0111\u1ed1i c\u1ee7a C\u1ea7u \u0111\u00e3 kh\u1eafc ho\u1ea1 ch\u00ed kh\u00ed anh h\u00f9ng c\u1ee7a nh\u00e2n v\u1eadt n\u00e0y. \u201cPh\u00e1 T\u1ea7n di\u1ec7t S\u1edf\u201d tuy kh\u00f4ng chu\u1ea9n v\u1ec1 h\u00ecnh th\u1ee9c, \u201cth\u1eeba ch\u1eef\u201d nh\u01b0ng l\u1ea1i s\u1eed d\u1ee5ng h\u00ecnh \u1ea3nh c\u1ee7a hai n\u01b0\u1edbc T\u1ea7n, S\u1edf \u0111\u1ec1u l\u00e0 nh\u1eefng qu\u1ed1c gia h\u00f9ng m\u1ea1nh th\u1eddi Xu\u00e2n Thu Chi\u1ebfn Qu\u1ed1c. Vi\u1ec7c d\u00f9ng c\u00e1c \u0111\u1ed9ng t\u1eeb m\u1ea1nh \u201cph\u00e1\u201d, \u201cdi\u1ec7t\u201d tr\u01b0\u1edbc nh\u1eefng th\u1ebf l\u1ef1c l\u1edbn \u1ea5y \u0111\u00e3 h\u00e0m \u00fd kh\u00e1t v\u1ecdng l\u1eadp c\u00f4ng l\u1edbn, d\u00e1m \u0111\u1ed1i \u0111\u1ea7u v\u1edbi th\u1ebf l\u1ef1c l\u1edbn v\u00e0 \u0111\u1ed3ng th\u1eddi th\u1ec3 hi\u1ec7n kh\u00ed ph\u00e1ch c\u1ee7a k\u1ebb u\u00f4i ch\u00ed l\u00e0m vi\u1ec7c l\u1edbn.", "key": "B", "isVideo": true, "score": 0, "order": 2, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604533, "lessonId": 0, "a": "B\u00e0i th\u01a1 ch\u1ea5t ch\u1ee9a t\u00e2m tr\u1ea1ng u u\u1ea5t, bu\u1ed3n kh\u1ed5 c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh.", "b": "B\u00e0i th\u01a1 b\u1ed9c l\u1ed9 t\u00ecnh y\u00eau thi\u00ean nhi\u00ean, t\u00e2m h\u1ed3n ngh\u1ec7 s\u0129 c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh.", "c": "B\u00e0i th\u01a1 \u0111\u01b0\u1ee3c s\u00e1ng t\u00e1c theo th\u1ec3 th\u01a1 th\u1ea5t ng\u00f4n b\u00e1t c\u00fa \u0110\u01b0\u1eddng lu\u1eadt xen l\u1ee5c ng\u00f4n.", "d": "Thi\u00ean nhi\u00ean g\u1ea7n g\u0169i, th\u00e2n thu\u1ed9c, qu\u00e2y qu\u1ea7n, qu\u1ea5n qu\u00fdt v\u1edbi con ng\u01b0\u1eddi.", "bookId": 1088639, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cD\u1ea5u ng\u01b0\u1eddi \u0111i la \u0111\u00e1  m\u00f2n,<br>\u0110\u01b0\u1eddng hoa v\u1eafng v\u1eaft  tr\u00fac lu\u1ed3n.<br>C\u1eeda song gi\u1ea1i  x\u00e2m h\u01a1i n\u1eafng,<br>Ti\u1ebfng v\u01b0\u1ee3n k\u00eau vang c\u00e1ch non.<br>C\u00e2y r\u1ee3p t\u00e1n che am m\u00e1t,<br>H\u1ed3 thanh nguy\u1ec7t hi\u1ec7n b\u00f3ng tr\u00f2n.<br>R\u00f9a n\u1eb1m h\u1ea1c l\u1ea9n n\u00ean b\u1ea7y b\u1ea1n,<br>\u1ee6 \u1ea5p c\u00f9ng ta l\u00e0m c\u00e1i con.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Tr\u00e3i,<i> Ng\u00f4n ch\u00ed,</i> b\u00e0i 20, theo <i>Nguy\u1ec5n Tr\u00e3i th\u01a1 v\u00e0 \u0111\u1eddi</i>, NXB V\u0103n h\u1ecdc, 2016)</div>Nh\u1eadn \u0111\u1ecbnh n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>\u0111\u00fang v\u1ec1 b\u00e0i th\u01a1?", "answer": "B\u00e0i th\u01a1 \u0111\u01b0\u1ee3c s\u00e1ng t\u00e1c theo th\u1ec3 th\u01a1 th\u1ea5t ng\u00f4n b\u00e1t c\u00fa \u0110\u01b0\u1eddng lu\u1eadt xen l\u1ee5c ng\u00f4n. Nh\u1eefng h\u00ecnh \u1ea3nh nh\u01b0 \u201cc\u00e2y r\u1ee3p t\u00e1n che am m\u00e1t\u201d, \u201ch\u1ed3 thanh nguy\u1ec7t hi\u1ec7n b\u00f3ng tr\u00f2n\u201d, \u201cr\u00f9a n\u1eb1m, h\u1ea1c l\u1ea9n n\u00ean b\u1ea7y b\u1ea1n\u201d\u2026 cho th\u1ea5y s\u1ef1 h\u00f2a h\u1ee3p, g\u1eafn b\u00f3 gi\u1eefa thi\u00ean nhi\u00ean v\u00e0 con ng\u01b0\u1eddi. Qua \u0111\u00f3 b\u1ed9c l\u1ed9 t\u00ecnh y\u00eau thi\u00ean nhi\u00ean v\u00e0 t\u00e2m h\u1ed3n ngh\u1ec7 s\u0129 c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh.<br>\n\u2192  Nh\u1eadn \u0111\u1ecbnh \u201cB\u00e0i th\u01a1 ch\u1ea5t ch\u1ee9a t\u00e2m tr\u1ea1ng u u\u1ea5t, bu\u1ed3n kh\u1ed5 c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh.\u201d l\u00e0 kh\u00f4ng ch\u00ednh x\u00e1c.\n", "key": "A", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604538, "lessonId": 0, "a": "C\u00f3 ch\u1ed7 linh thi\u00eang th\u00e0nh y\u00eau.", "b": "Huy\u1ec7n V\u0129nh L\u1ea1i, H\u1ed3ng Ch\u00e2u.", "c": "C\u00f3 nhi\u1ec1u gi\u1ed1ng thu\u1ef7 t\u1ed9c.", "d": "C\u1ea7u t\u1ea1nh \u0111\u1ea3o m\u01b0a r\u1ea5t linh \u1ee9ng.", "bookId": 1088640, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cX\u01b0a \u1edf huy\u1ec7n V\u0129nh L\u1ea1i, H\u1ed3ng Ch\u00e2u c\u00f3 nhi\u1ec1u gi\u1ed1ng th\u1ee7y t\u1ed9c. Ven s\u00f4ng ng\u01b0\u1eddi ta l\u1eadp \u0111\u1ec1n th\u1edd \u0111\u1ebfn h\u01a1n ch\u1ee5c n\u01a1i. N\u0103m th\u00e1ng d\u1ea7n l\u00e2u, c\u00f3 ch\u1ed7 linh thi\u00eang th\u00e0nh y\u00eau, song c\u1ea7u t\u1ea1nh \u0111\u1ea3o m\u01b0a r\u1ea5t linh \u1ee9ng, n\u00ean h\u01b0\u01a1ng l\u1eeda nghi ng\u00fat, ng\u01b0\u1eddi \u0111\u1eddi c\u00e0ng k\u00ednh s\u1ee3.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n D\u1eef, <i>Chuy\u1ec7n \u0111\u1ed1i t\u1ee5ng \u1edf long cung</i>, theo <i>Truy\u1ec1n k\u00ec m\u1ea1n l\u1ee5c</i>, NXB V\u0103n h\u1ecdc, 2008)</div>Ch\u1ec9 ra y\u1ebfu t\u1ed1 hi\u1ec7n th\u1ef1c trong \u0111o\u1ea1n tr\u00edch.", "answer": "Chi ti\u1ebft \u201cHuy\u1ec7n V\u0129nh L\u1ea1i, H\u1ed3ng Ch\u00e2u\u201d l\u00e0 \u0111\u1ecba danh c\u00f3 th\u1eadt trong l\u1ecbch s\u1eed Vi\u1ec7t Nam, l\u00e0 m\u1ed9t y\u1ebfu t\u1ed1 hi\u1ec7n th\u1ef1c.", "key": "B", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604549, "lessonId": 0, "a": "X\u00f3t xa, ti\u1ebfc nu\u1ed1i.", "b": "H\u1ee5t h\u1eabng, tr\u1ed1ng tr\u1ea3i.", "c": "Nh\u1edb th\u01b0\u01a1ng, mong ng\u00f3ng.", "d": "Tuy\u1ec7t v\u1ecdng, bi k\u1ecbch.", "bookId": 1088641, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cKhi b\u00f3ng tr\u0103ng, l\u00e1 in l\u1ea5p l\u00e1nh,<br>Ng\u1ee1 t\u00e0n v\u00e0ng nh\u1edb c\u1ea3nh ng\u1ef1 ch\u01a1i.<br>V\u1ed9i v\u00e0ng d\u1ea1o b\u01b0\u1edbc t\u1edbi n\u01a1i,<br>Th\u01b0\u01a1ng \u00f4i, v\u1eafng v\u1ebb gi\u1eefa tr\u1eddi tuy\u1ebft sa !<br>T\u01b0\u1edfng phong th\u1ec3  x\u00f3t xa \u0111\u00f2i \u0111o\u1ea1n,<br>M\u1eb7t r\u1ed3ng  sao c\u00e1ch gi\u00e1n l\u00e2u nay!<br>C\u00f3 ai ch\u1ed1n \u1ea5y v\u1ec1 \u0111\u00e2y,<br>Ngu\u1ed3n c\u01a1n xin ng\u1ecf cho hay \u0111\u01b0\u1ee3c \u0111\u00e0nh?\u201d</i><br><div style=\"text-align: right;\">(L\u00ea Ng\u1ecdc H\u00e2n, <i>Ai t\u01b0 v\u00e3n, </i>theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 13, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>T\u00e2m tr\u1ea1ng n\u00e0o <b>kh\u00f4ng </b>c\u00f3 trong n\u1ed9i t\u00e2m nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh \u1edf \u0111o\u1ea1n tr\u00edch tr\u00ean?", "answer": "T\u00e1c ph\u1ea9m <i>Ai t\u01b0 v\u00e3n</i> c\u1ee7a L\u00ea Ng\u1ecdc H\u00e2n th\u1ec3 hi\u1ec7n t\u00e2m tr\u1ea1ng \u0111au bu\u1ed3n, th\u01b0\u01a1ng ti\u1ebfc c\u1ee7a b\u00e0 d\u00e0nh cho ch\u1ed3ng l\u00e0 vua Quang Trung. Trong \u0111o\u1ea1n tr\u00edch, nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh \u0111\u00e3 th\u1ec3 hi\u1ec7n r\u00f5 n\u1ed7i nh\u1edb th\u01b0\u01a1ng s\u00e2u s\u1eafc, x\u00f3t xa v\u00e0 h\u1ee5t h\u1eabng c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh tr\u01b0\u1edbc c\u1ea3nh v\u1eafng v\u1ebb, l\u1ea1nh l\u1ebdo:<br>\n+ C\u00e1c h\u00ecnh \u1ea3nh nh\u01b0 \u201cng\u1ee1 t\u00e0n v\u00e0ng nh\u1edb c\u1ea3nh ng\u1ef1 ch\u01a1i\u201d, \u201cv\u1eafng v\u1ebb gi\u1eefa tr\u1eddi tuy\u1ebft sa\u201d g\u1ee3i s\u1ef1 tr\u1ed1ng tr\u1ea3i, h\u1ee5t h\u1eabng, c\u1ea3nh v\u1eadt \u0111\u1ed1i l\u1eadp v\u1edbi qu\u00e1 kh\u1ee9 \u1ea5m \u00e1p.<br>\n+ C\u00e2u \u201cM\u1eb7t r\u1ed3ng sao c\u00e1ch gi\u00e1n l\u00e2u nay!\u201d v\u00e0 \u201cC\u00f3 ai ch\u1ed1n \u1ea5y v\u1ec1 \u0111\u00e2y\u201d cho th\u1ea5y n\u1ed7i nh\u1edb th\u01b0\u01a1ng da di\u1ebft, s\u1ef1 mong ng\u00f3ng tin t\u1ee9c c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh.<br>\n+ Nh\u1eefng t\u1eeb ng\u1eef nh\u01b0 \u201cth\u01b0\u01a1ng \u00f4i\u201d, \u201cx\u00f3t xa\u201d bi\u1ec3u hi\u1ec7n r\u00f5 ni\u1ec1m \u0111au, s\u1ef1 ti\u1ebfc nu\u1ed1i v\u00e0 bu\u1ed3n th\u01b0\u01a1ng.<br>\n\u2192 T\u00e2m tr\u1ea1ng n\u00e0o kh\u00f4ng xu\u1ea5t hi\u1ec7n \u1edf nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh trong \u0111o\u1ea1n tr\u00edch l\u00e0: tuy\u1ec7t v\u1ecdng, bi k\u1ecbch.\n", "key": "D", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604562, "lessonId": 0, "a": "\u201cd\u1ef1ng \u0111\u1ee9ng\u201d.", "b": "\u201ccheo leo\u201d.", "c": "\u201cch\u1eb1ng ch\u1ecbt\u201d.", "d": "\u201cxoai xo\u1ea3i\u201d.", "bookId": 1088642, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cT\u1eeb N\u00e0-l\u00f4\u1ed9c l\u00ean P\u00e1-p\u1ea7u n\u1eeda ng\u00e0y \u0111\u01b0\u1eddng. L\u1ed1i \u0111i xoai xo\u1ea3i d\u01b0\u1edbi ch\u00e2n r\u1ed3i c\u00e0ng cao c\u00e0ng d\u1ef1ng \u0111\u1ee9ng. Qua r\u1eaby s\u00e0n c\u1ee7a b\u1ea3n N\u00e0-l\u00f4\u1ed9c \u0111\u1ebfn d\u1ed1c r\u1eebng tre, \u0111\u1ed9c r\u1eebng tre r\u1ed3i r\u1eebng gianh, r\u1ed3i l\u1ea1i d\u1ed1c, l\u1ea1i d\u1ed1c r\u1eebng tre n\u1eefa. B\u1ed7ng T\u01b0 tr\u00f4ng th\u1ea5y m\u1ed9t c\u00e1i r\u1eaby l\u00faa ch\u00edn v\u00e0ng nu\u1ed9t b\u00ean s\u01b0\u1eddn n\u00fai. T\u01b0 h\u01a1i ng\u1ea1c nhi\u00ean v\u00ec s\u1ef1 \u0111\u1ed9t ng\u1ed9t g\u1eb7p \u0111\u01b0\u1ee3c c\u00f4ng cu\u1ed9c l\u00e0m \u0103n c\u1ea5y h\u00e1i \u1edf m\u1ed9t n\u01a1i cheo leo th\u1ebf n\u00e0y. R\u1eebng n\u00fai m\u00eanh mang m\u00e0 ch\u1ed7 n\u00e0o c\u0169ng c\u00f3 l\u1ed1i, l\u1ed1i \u0111i ch\u1eb1ng ch\u1ecbt nh\u01b0 m\u1ea1ch m\u00e1u tr\u00ean th\u00e2n ng\u01b0\u1eddi.\u201d</i><br><div style=\"text-align: right;\">(T\u00f4 Ho\u00e0i, <i>T\u00e0o L\u01b0\u1eddng</i>, theo <i>baovannghe.vn</i>)</div>T\u1eeb n\u00e0o trong \u0111o\u1ea1n tr\u00edch kh\u00f4ng ph\u1ea3i l\u00e0 t\u1eeb l\u00e1y?<br>", "answer": "T\u1eeb \u201cd\u1ef1ng \u0111\u1ee9ng\u201d trong \u0111o\u1ea1n tr\u00edch l\u00e0 t\u1eeb gh\u00e9p. C\u00e1c t\u1eeb c\u00f2n l\u1ea1i t\u1eeb l\u00e1y.", "key": "A", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604570, "lessonId": 0, "a": "\u201cQu\u1ea7n em d\u1ec7t k\u00edn c\u1ecf may\u201d.", "b": "\u201c\u00c1o t\u00f4i \u0111\u1ee9t c\u00fac, m\u1ef1c d\u00e2y t\u00edm b\u1ea7m\u201d.", "c": "\u201cC\u00f2n em l\u00ean b\u1ea3y, theo t\u00f4i c\u1ea3 ng\u00e0y\u201d.", "d": "\u201cT\u1eeb trong l\u1ea5m l\u00e1p em th\u1ea7m l\u1edbn l\u00ean\u201d.", "bookId": 1088643, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cThu\u1edf \u1ea5y t\u00f4i m\u1edbi l\u00ean m\u01b0\u1eddi<br>C\u00f2n em l\u00ean b\u1ea3y, theo t\u00f4i c\u1ea3 ng\u00e0y<br>Qu\u1ea7n em d\u1ec7t k\u00edn c\u1ecf may<br>\u00c1o t\u00f4i \u0111\u1ee9t c\u00fac, m\u1ef1c d\u00e2y t\u00edm b\u1ea7m<br>Tu\u1ed5i th\u01a1 ch\u00e2n \u0111\u1ea5t \u0111\u1ea7u tr\u1ea7n<br>T\u1eeb trong l\u1ea5m l\u00e1p em th\u1ea7m l\u1edbn l\u00ean\u201d</i><br><div style=\"text-align: right;\">(Ph\u1ea1m C\u00f4ng Tr\u1ee9, <i>L\u1eddi th\u1ec1 c\u1ecf may</i>, theo<i> nhandan.vn</i>)</div>D\u00f2ng th\u01a1 n\u00e0o th\u1ec3 hi\u1ec7n s\u1ef1 qu\u1ea5n qu\u00fdt, g\u1eafn b\u00f3 c\u1ee7a \u201ct\u00f4i\u201d v\u00e0 \u201cem\u201d thu\u1edf b\u00e9 th\u01a1?", "answer": "Chi ti\u1ebft \u201cEm l\u00ean b\u1ea3y, theo t\u00f4i c\u1ea3 ng\u00e0y\u201d th\u1ec3 hi\u1ec7n s\u1ef1 qu\u1ea5n qu\u00fdt, g\u1eafn b\u00f3 kh\u00f4ng r\u1eddi c\u1ee7a hai nh\u00e2n v\u1eadt \u201ct\u00f4i\u201d v\u00e0 \u201cem\u201d trong nh\u1eefng n\u0103m th\u00e1ng tu\u1ed5i th\u01a1. ", "key": "C", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604574, "lessonId": 0, "a": "N\u00e0ng kh\u00f4ng thi\u1ebft \u0103n u\u1ed1ng, ch\u1ec9 ng\u1ed3i kh\u00f3c l\u00f3c t\u1eebng h\u1ed3i, t\u1eebng tr\u1eadn.", "b": "B\u1ecdn th\u1ecb n\u1eef x\u00fam quanh n\u00e0ng khuy\u00ean gi\u1ea3i.", "c": "N\u1ed7i \u0111au kh\u1ed5 trong n\u00e0ng qu\u00e1 l\u1edbn.", "d": "N\u00e0ng nh\u01b0 m\u1ed9t ng\u01b0\u1eddi m\u1ea5t h\u1ed3n, l\u1eafm l\u00fac nh\u01b0 \u0111i\u00ean nh\u01b0 d\u1ea1i.", "bookId": 1088644, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cQu\u1ef3nh Hoa nh\u01b0 m\u1ed9t ng\u01b0\u1eddi m\u1ea5t h\u1ed3n, l\u1eafm l\u00fac n\u00e0ng nh\u01b0 \u0111i\u00ean nh\u01b0 d\u1ea1i. L\u1ea1i v\u1eeba l\u00fac qu\u1ed1c m\u1eabu v\u1ec1 th\u0103m qu\u00ea ngo\u1ea1i t\u1eadn Thanh H\u00f3a. T\u00ecm ch\u00faa th\u00ec kh\u00f4ng sao g\u1eb7p \u0111\u01b0\u1ee3c. Nh\u1eefng cung t\u1ea7n th\u1ecb n\u1eef ch\u1ec9 bi\u1ebft \u00e1i ng\u1ea1i cho n\u00e0ng, nh\u01b0ng kh\u00f4ng th\u1ec3 gi\u00fap \u0111\u01b0\u1ee3c g\u00ec c\u1ea3. N\u1ed7i \u0111au kh\u1ed5 qu\u00e1 l\u1edbn m\u00e0 ng\u01b0\u1eddi n\u00e0ng nh\u1ecf b\u00e9, linh h\u1ed3n y\u1ebfu \u1edbt. N\u00e0ng kh\u00f4ng thi\u1ebft \u0103n u\u1ed1ng, ch\u1ec9 ng\u1ed3i kh\u00f3c l\u00f3c t\u1eebng h\u1ed3i, t\u1eebng tr\u1eadn, kh\u00f3c \u0111\u1ebfn n\u1ed7i b\u1ecdn th\u1ecb n\u1eef t\u01b0\u1edfng nh\u01b0 h\u1ebft c\u01a1n th\u00ec n\u00e0ng s\u1ebd ch\u1ebft. H\u1ecd x\u00fam quanh n\u00e0ng khuy\u00ean gi\u1ea3i. V\u00ec \u0111\u1ed9ng l\u00f2ng th\u01b0\u01a1ng ch\u1ee7, ch\u00fang c\u0169ng kh\u00f3c. Cung qu\u1eadn ch\u00faa th\u00e0nh m\u1ed9t ph\u00f2ng tang kh\u00f4ng ng\u01b0\u1eddi ch\u1ebft.\u201d</i><br><div style=\"text-align: right;\">(Nguy\u1ec5n Huy T\u01b0\u1edfng,<i> \u0110\u00eam h\u1ed9i Long Tr\u00ec,</i> theo <i>vnu.edu.vn</i>)</div>Chi ti\u1ebft n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>mi\u00eau t\u1ea3 t\u00e2m tr\u1ea1ng c\u1ee7a qu\u1eadn ch\u00faa Qu\u1ef3nh Hoa?", "answer": "Chi ti\u1ebft \u201cB\u1ecdn th\u1ecb n\u1eef x\u00fam quanh n\u00e0ng khuy\u00ean gi\u1ea3i\u201d mi\u00eau t\u1ea3 h\u00e0nh \u0111\u1ed9ng c\u1ee7a b\u1ecdn th\u1ecb n\u1eef, kh\u00f4ng n\u00f3i v\u1ec1 t\u00e2m tr\u1ea1ng c\u1ee7a Qu\u1ef3nh Hoa.", "key": "B", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604586, "lessonId": 0, "a": "H\u00e0o ph\u00f3ng, d\u1ec5 g\u1ea7n.", "b": "Ngu d\u1ed1t, h\u1ecdc \u0111\u00f2i.", "c": "H\u00e1o danh, \u01b0a ph\u1ec9nh n\u1ecbnh.", "d": "Quan c\u00e1ch, k\u1ec7ch c\u1ee1m.", "bookId": 1088645, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTH\u1ee2 PH\u1ee4 - B\u1ea9m, \u00f4ng l\u1edbn \u1ea1.<br>\u00d4NG GIU\u1ed0C-\u0110ANH - \u201c\u00d4ng l\u1edbn\u201d \u01b0? \u1ea4y \u0111\u1ea5y, \u0103n m\u1eb7c theo l\u1ed1i qu\u00fd ph\u00e1i th\u00ec th\u1ebf \u0111\u1ea5y! C\u00f2n c\u1ee9 bo bo gi\u1eef ki\u1ec3u \u00e1o qu\u1ea7n tr\u01b0\u1edfng gi\u1ea3 th\u00ec \u0111\u1eddi n\u00e0o \u0111\u01b0\u1ee3c g\u1ecdi l\u00e0 \u201c\u00f4ng l\u1edbn\u201d. \u0110\u00e2y, ta th\u01b0\u1edfng v\u1ec1 ti\u1ebfng \u201c\u00f4ng l\u1edbn\u201d \u0111\u00e2y n\u00e0y !<br>TH\u1ee2 PH\u1ee4 - B\u1ea9m c\u1ee5 l\u1edbn, anh em ch\u00fang t\u00f4i \u0111\u1ed9i \u01a1n c\u1ee5 l\u1edbn l\u1eafm l\u1eafm.<br>\u00d4NG GIU\u1ed0C-\u0110ANH - \u201cC\u1ee5 l\u1edbn\u201d, \u1ed3, \u1ed3, c\u1ee5 l\u1edbn! Ch\u00fa m\u00e0y thong th\u1ea3 t\u00ed \u0111\u00e3. C\u00e1i ti\u1ebfng \u201cc\u1ee5 l\u1edbn\u201d \u0111\u00e1ng th\u01b0\u1edfng l\u1eafm. \u201cC\u1ee5 l\u1edbn\u201d kh\u00f4ng ph\u1ea3i l\u00e0 m\u1ed9t ti\u1ebfng t\u1ea7m th\u01b0\u1eddng \u0111\u00e2u nh\u00e9. N\u00e0y, c\u1ee5 l\u1edbn th\u01b0\u1edfng cho c\u00e1c ch\u00fa \u0111\u00e2y.\u201d</i><br><div style=\"text-align: right;\">(M\u00f4-li-e, <i>Tr\u01b0\u1edfng gi\u1ea3 h\u1ecdc l\u00e0m sang</i>, theo<i> Ng\u1eef v\u0103n 8, t\u1eadp 2</i>, NXB Gi\u00e1o d\u1ee5c Vi\u1ec7t Nam, 2013)</div>T\u00ednh c\u00e1ch n\u00e0o c\u1ee7a \u00f4ng Giu\u1ed1c-\u0111anh \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n trong \u0111o\u1ea1n v\u0103n tr\u00ean?", "answer": "Trong \u0111o\u1ea1n tr\u00edch, \u00f4ng Giu\u1ed1c-\u0111anh b\u1ed9c l\u1ed9 r\u00f5 b\u1ea3n ch\u1ea5t c\u1ee7a m\u00ecnh qua c\u00e1ch ph\u1ea3n \u1ee9ng v\u1edbi l\u1eddi g\u1ecdi c\u1ee7a ng\u01b0\u1eddi th\u1ee3 ph\u1ee5:<br>\n- H\u00e1o danh: \u00d4ng Giu\u1ed1c-\u0111anh r\u1ea5t th\u00edch \u0111\u01b0\u1ee3c g\u1ecdi b\u1eb1ng nh\u1eefng danh x\u01b0ng cao qu\u00fd nh\u01b0 \u201c\u00f4ng l\u1edb  "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Ch\u1ec9 ra c\u00e2u sai trong c\u00e1c c\u00e2u sau:", "answer": "C\u00e2u \u201cCh\u00fang t\u00f4i kh\u00f4ng bi\u1ebft c\u01a1 s\u1edf hai ng\u01b0\u1eddi \u1ea5y gi\u1eadn nhau.\u201d sai ng\u1eef ngh\u0129a. T\u1eeb \u201cc\u01a1 s\u1edf\u201d ch\u1ec9 c\u00e1i l\u00e0m n\u1ec1n t\u1ea3ng, c\u0103n c\u1ee9, \u0111i\u1ec1u ki\u1ec7n \u0111\u1ec3 m\u1ed9t s\u1ef1 vi\u1ec7c x\u1ea3y ra, kh\u00f4ng ph\u00f9 h\u1ee3p \u0111\u1ec3 ch\u1ec9 nguy\u00ean nh\u00e2n c\u1ee7a m\u1ed9t s\u1ef1 vi\u1ec7c nh\u01b0 \u201chai ng\u01b0\u1eddi \u1ea5y gi\u1eadn nhau\u201d.", "key": "D", "isVideo": true, "score": 0, "order": 20, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 21 \u0111\u1ebfn 25", "content": "\u201cTrong b\u1ed1i c\u1ea3nh c\u00e1c ph\u01b0\u01a1ng ti\u1ec7n truy\u1ec1n th\u00f4ng \u0111\u1ea1i ch\u00fang v\u00e0 m\u1ea1ng x\u00e3 h\u1ed9i tr\u00e0n ng\u1eadp nh\u1eefng khu\u00f4n m\u1eabu v\u1ec1 v\u1ebb \u0111\u1eb9p l\u00ed t\u01b0\u1edfng, s\u1ef1 b\u1eadn t\u00e2m v\u1ec1 ngo\u1ea1i h\u00ecnh kh\u00f4ng ch\u1ec9 d\u1ea5y n\u00ean n\u1ed7i bu\u1ed3n hay t\u1ee7i th\u00e2n tho\u00e1ng qua m\u00e0 c\u00f2n t\u1ea1o ra nh\u1eefng \u1ea3nh h\u01b0\u1edfng kh\u00f4ng t\u1ed1t \u0111\u1ebfn s\u1ee9c kh\u1ecfe th\u1ec3 ch\u1ea5t v\u00e0 tinh th\u1ea7n.<br>S\u1ef1 b\u1eadn t\u00e2m v\u1ec1 ngo\u1ea1i h\u00ecnh ho\u1eb7c \u00e1m \u1ea3nh ngo\u1ea1i h\u00ecnh l\u00e0 s\u1ef1 \u0111\u1ec3 \u00fd v\u00e0 kh\u00f4ng h\u00e0i l\u00f2ng v\u1edbi ngo\u1ea1i h\u00ecnh, g\u1ed3m h\u00ecnh d\u00e1ng, c\u00e2n n\u1eb7ng v\u00e0 nhi\u1ec1u \u0111\u1eb7c \u0111i\u1ec3m c\u01a1 th\u1ec3 kh\u00e1c. M\u1eb7c d\u00f9 vi\u1ec7c b\u1eadn t\u00e2m v\u1ec1 ngo\u1ea1i h\u00ecnh c\u0169ng c\u00f3 t\u00e1c \u0111\u1ed9ng t\u00edch c\u1ef1c nh\u01b0 th\u00fac \u0111\u1ea9y h\u00e0nh vi ch\u0103m s\u00f3c ngo\u1ea1i h\u00ecnh, c\u1ea3i thi\u1ec7n s\u1ee9c kh\u1ecfe nh\u01b0ng n\u00f3 c\u0169ng c\u00f3 th\u1ec3 d\u1eabn \u0111\u1ebfn nh\u1eefng t\u00ecnh hu\u1ed1ng t\u1ed3i t\u1ec7. <br>M\u1ed9t nghi\u00ean c\u1ee9u t\u1ed5ng quan t\u1ed5ng h\u1ee3p k\u1ebft qu\u1ea3 t\u1eeb 212 nghi\u00ean c\u1ee9u h\u1ecdc thu\u1eadt \u0111\u1ea3m b\u1ea3o ch\u1ea5t l\u01b0\u1ee3ng trong su\u1ed1t 20 n\u0103m t\u1eeb 2004 \u0111\u01b0\u1ee3c l\u01b0u tr\u1eef tr\u00ean PubMed, Scopus, Embase, Science Direct, Sports Discuss, ResearchGate v\u00e0 Web of Science \u0111\u00e3 kh\u00e1i qu\u00e1t c\u00e1c nh\u00f3m \u1ea3nh h\u01b0\u1edfng ti\u00eau c\u1ef1c c\u1ee7a n\u1ed7i b\u1eadn t\u00e2m v\u1ec1 ngo\u1ea1i h\u00ecnh \u0111\u1ebfn s\u1ee9c kh\u1ecfe tinh th\u1ea7n c\u00e1 nh\u00e2n, l\u00e0m gi\u1ea3m ch\u1ea5t l\u01b0\u1ee3ng cu\u1ed9c s\u1ed1ng (Merino &amp; cs, 2024). Trong \u0111\u00f3, n\u1ed7i b\u1eadn t\u00e2m v\u1ec1 ngo\u1ea1i h\u00ecnh kh\u00f4ng ch\u1ec9 l\u00e0m gia t\u0103ng c\u00e1c h\u00e0nh vi v\u00e0 c\u1ea3m x\u00fac ti\u00eau c\u1ef1c. C\u1ee5 th\u1ec3, nh\u1eefng ng\u01b0\u1eddi n\u00e0y c\u00f3 th\u1ec3 \u0103n ki\u00eang c\u1ef1c \u0111oan, t\u1eadp th\u1ec3 d\u1ee5c qu\u00e1 m\u1ee9c \u0111\u1ec3 theo \u0111u\u1ed5i v\u1ebb \u0111\u1eb9p ngo\u1ea1i h\u00ecnh l\u00ed t\u01b0\u1edfng. H\u1ecd c\u0169ng c\u00f3 th\u1ec3 tr\u1ea3i nghi\u1ec7m nhi\u1ec1u h\u01a1n nh\u1eefng c\u1ea3m x\u00fac bu\u1ed3n ch\u00e1n dai d\u1eb3ng, h\u1ea1 th\u1ea5p l\u00f2ng t\u1ef1 tr\u1ecdng c\u1ee7a m\u00ecnh. Nhi\u1ec1u ng\u01b0\u1eddi c\u00f3 th\u1ec3 n\u00e9 tr\u00e1nh t\u01b0\u01a1ng t\u00e1c x\u00e3 h\u1ed9i \u0111\u1ec3 tr\u00e1nh ph\u1ea3i \u0111\u1ed1i di\u1ec7n v\u1edbi s\u1ef1 so s\u00e1nh ngo\u1ea1i h\u00ecnh, t\u1eeb \u0111\u00f3 c\u00e0ng c\u1ea3m th\u1ea5y c\u00f4 \u0111\u01a1n v\u00e0 c\u00e0ng mu\u1ed1n c\u00f4 l\u1eadp m\u00ecnh kh\u1ecfi x\u00e3 h\u1ed9i. \u1ede m\u1ee9c \u0111\u1ed9 nghi\u00eam tr\u1ecdng h\u01a1n, nh\u1eefng c\u1ea3m x\u00fac n\u00e0y c\u00f3 th\u1ec3 ph\u00e1t tri\u1ec3n th\u00e0nh c\u00e1c r\u1ed1i lo\u1ea1n \u0103n u\u1ed1ng nh\u01b0 ch\u00e1n \u0103n t\u00e2m l\u00ed ho\u1eb7c \u0103n v\u00f4 \u0111\u1ed9 kh\u00f4ng ki\u1ec3m so\u00e1t n\u1ed5i, \u0103n \u00f3i (c\u00f3 h\u00e0nh vi m\u00f3c h\u1ecdng, g\u00e2y n\u00f4n m\u1eeda sau khi \u0103n xong). \u0110\u1eb7c bi\u1ec7t, m\u1ed9t t\u1ec9 l\u1ec7 nh\u1ecf c\u00f3 th\u1ec3 b\u1ecb d\u1eabn \u0111\u1ebfn r\u1ed1i lo\u1ea1n m\u1eb7c c\u1ea3m ngo\u1ea1i h\u00ecnh (Body Dysmorphic Disorder). \u0110\u00e2y l\u00e0 r\u1ed1i lo\u1ea1n v\u1ec1 nh\u1eadn th\u1ee9c b\u1ea3n th\u00e2n v\u1ec1 kh\u00eda c\u1ea1nh c\u01a1 th\u1ec3. Ng\u01b0\u1eddi m\u1eafc r\u1ed1i lo\u1ea1n n\u00e0y b\u1ecb \u00e1m \u1ea3nh v\u1ec1 ngo\u1ea1i h\u00ecnh ho\u00e0n h\u1ea3o. Theo \u0111\u00f3, h\u1ecd kh\u00f4ng h\u00e0i l\u00f2ng v\u1edbi khuy\u1ebft \u0111i\u1ec3m d\u00f9 r\u1ea5t nh\u1ecf tr\u00ean c\u01a1 th\u1ec3 m\u00ecnh. T\u1ec9 l\u1ec7 m\u1eafc r\u1ed1i lo\u1ea1n n\u00e0y kho\u1ea3ng 0,7-2,4% d\u00e2n s\u1ed1 n\u00f3i chung, t\u1ec9 l\u1ec7 l\u1edbn h\u01a1n trong nh\u00f3m nh\u1eefng ng\u01b0\u1eddi th\u01b0\u1eddng xuy\u00ean s\u1eed d\u1ee5ng c\u00e1c ph\u01b0\u01a1ng ph\u00e1p can thi\u1ec7p th\u1ea9m m\u1ef9. Tr\u00ean kh\u00f4ng gian m\u1ea1ng x\u00e3 h\u1ed9i, t\u00ednh \u1ea9n danh v\u00e0 d\u01b0 lu\u1eadn \u1ea3o c\u00f3 th\u1ec3 d\u1eabn \u0111\u1ebfn b\u1eaft n\u1ea1t v\u00e0 ch\u1ebf gi\u1ec5u ngo\u1ea1i h\u00ecnh tr\u00ean m\u1ea1ng, l\u00e0m tr\u1ea7m tr\u1ecdng th\u00eam t\u00e1c \u0111\u1ed9ng ti\u00eau c\u1ef1c \u0111\u1ebfn h\u00ecnh \u1ea3nh c\u01a1 th\u1ec3 v\u00e0 s\u1ee9c kh\u1ecfe tinh th\u1ea7n.<br>Nh\u1eefng t\u00e1c \u0111\u1ed9ng ti\u00eau c\u1ef1c n\u00f3i tr\u00ean d\u1ec5 x\u1ea3y ra h\u01a1n \u1edf nh\u1eefng nh\u00f3m: v\u1ecb th\u00e0nh ni\u00ean, ng\u01b0\u1eddi tr\u01b0\u1edfng th\u00e0nh tr\u1ebb tu\u1ed5i, ng adp.", "d": "Nh\u00e2n - qu\u1ea3.", "bookId": 1088660, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cM\u1eb7c d\u00f9 ph\u1ea7n l\u1edbn c\u00e1c nghi\u00ean c\u1ee9u quan t\u00e2m \u0111\u1ebfn nh\u1eefng \u1ea3nh h\u01b0\u1edfng d\u1ec5 t\u1ed5n th\u01b0\u01a1ng \u1edf ph\u1ee5 n\u1eef, nh\u01b0ng ng\u00e0y c\u00e0ng c\u00f3 c\u00e1c nghi\u00ean c\u1ee9u ch\u1ec9 ra r\u1eb1ng s\u1ef1 b\u1eadn t\u00e2m v\u1ec1 ngo\u1ea1i h\u00ecnh c\u0169ng \u0111ang g\u00e2y \u00e1p l\u1ef1c l\u00ean nam gi\u1edbi.\u201d<br>X\u00e1c \u0111\u1ecbnh quan h\u1ec7 \u00fd ngh\u0129a gi\u1eefa c\u00e1c v\u1ebf trong c\u00e2u tr\u00ean.", "answer": "Hai v\u1ebf c\u00e2u th\u1ec3 hi\u1ec7n m\u1ed1i quan h\u1ec7 \u0111\u1ed1i l\u1eadp:<br>\n- V\u1ebf th\u1ee9 nh\u1ea5t n\u00f3i v\u1ec1 s\u1ef1 quan t\u00e2m ch\u1ee7 y\u1ebfu \u0111\u1ebfn ph\u1ee5 n\u1eef.<br>\n- V\u1ebf th\u1ee9 hai n\u00f3i v\u1ec1 s\u1ef1 \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn nam gi\u1edbi.\n", "key": "C", "isVideo": true, "score": 0, "order": 24, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604668, "lessonId": 0, "a": "Tr\u1ea1ng ng\u1eef.", "b": "Ch\u1ee7 ng\u1eef.", "c": "V\u1ecb ng\u1eef.", "d": "N\u00f2ng c\u1ed1t c\u00e2u.", "bookId": 1088661, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u201cTr\u00ean kh\u00f4ng gian m\u1ea1ng x\u00e3 h\u1ed9i, t\u00ednh \u1ea9n danh v\u00e0 d\u01b0 lu\u1eadn \u1ea3o c\u00f3 th\u1ec3 d\u1eabn \u0111\u1ebfn b\u1eaft n\u1ea1t v\u00e0 ch\u1ebf gi\u1ec5u ngo\u1ea1i h\u00ecnh tr\u00ean m\u1ea1ng, l\u00e0m tr\u1ea7m tr\u1ecdng th\u00eam t\u00e1c \u0111\u1ed9ng ti\u00eau c\u1ef1c \u0111\u1ebfn h\u00ecnh \u1ea3nh c\u01a1 th\u1ec3 v\u00e0 s\u1ee9c kh\u1ecfe tinh th\u1ea7n.\u201d<br>C\u1ee5m t\u1eeb \u201ctr\u00ean kh\u00f4ng gian m\u1ea1ng x\u00e3 h\u1ed9i\u201d l\u00e0 th\u00e0nh ph\u1ea7n n\u00e0o c\u1ee7a c\u00e2u?", "answer": "C\u1ee5m t\u1eeb \u201ctr\u00ean kh\u00f4ng gian m\u1ea1ng x\u00e3 h\u1ed9i\u201d l\u00e0 tr\u1ea1ng ng\u1eef ch\u1ec9 n\u01a1i ch\u1ed1n.", "key": "A", "isVideo": true, "score": 0, "order": 25, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 26 \u0111\u1ebfn 30", "content": "<div style=\"text-align: center;\"><b>Hoa dong ri\u1ec1ng</b></div><b><div style=\"text-align: center;\"><b>(Nguy\u1ec5n \u0110\u1ee9c M\u1eadu)</b></div></b><div style=\"text-align: left;\">Hoa dong ri\u1ec1ng ch\u1ee3t b\u1eebng l\u00ean s\u1eafc \u0111\u1ecf</div><div style=\"text-align: left;\">khi t\u00f4i v\u1ec1 th\u0103m l\u1ea1i m\u1ea3nh v\u01b0\u1eddn x\u01b0a</div><div style=\"text-align: left;\"><br></div><div style=\"text-align: left;\">Hoa nh\u01b0 th\u1ea7m nh\u1eafc cho t\u00f4i nh\u1edb</div><div style=\"text-align: left;\">ng\u00e0y x\u01b0a l\u00f9i xa nh\u01b0 v\u1ec7t kh\u00f3i xa m\u1edd</div><div style=\"text-align: left;\">c\u1ee7 dong ri\u1ec1ng m\u1eb9 lu\u1ed9c</div><div style=\"text-align: left;\">c\u01a1n \u0111\u00f3i x\u00f3t l\u00f2ng tr\u0169ng m\u1eaft v\u00e0ng da</div><div style=\"text-align: left;\">t\u1eeb t\u00f4i v\u1ec1 tu\u1ed5i th\u01a1</div><div style=\"text-align: left;\">g\u1ea7n h\u1ebft m\u1ed9t \u0111\u1eddi ng\u01b0\u1eddi</div><div style=\"text-align: left;\">m\u00e0 ch\u1edbp m\u1eaft \u0111\u00e3 th\u00e0nh d\u0129 v\u00e3ng</div><div style=\"text-align: left;\">t\u1eeb t\u00f4i v\u1ec1 tu\u1ed5i th\u01a1</div><div style=\"text-align: left;\">d\u00e0i h\u01a1n hai cu\u1ed9c chi\u1ebfn</div><div style=\"text-align: left;\">t\u00f4i \u0111\u00e3 \u0111i qua nh\u1eefng d\u00f2ng s\u00f4ng \u0111\u1ec9nh n\u00fai c\u00e1nh r\u1eebng</div><div style=\"text-align: left;\">b\u00e0n ch\u00e2n \u0111\u1ea1p \u0111\u00e1 tai m\u00e8o v\u00e0 s\u1eafc nh\u1ecdn m\u1ea3nh bom</div><div style=\"text-align: left;\">b\u00e0n ch\u00e2n l\u1ed9i qua \u0111\u1ea7m l\u1ea7y, c\u00e1i ch\u1ebft</div><div style=\"text-align: left;\">thi tho\u1ea3ng t\u00f4i v\u1eabn g\u1eb7p</div><div style=\"text-align: left;\">dong ri\u1ec1ng \u0111\u1ecf hoa trong gi\u1ea5c t\u00f4i m\u01a1, tr\u00ean nh\u1eefng tri\u1ec1n \u0111\u1ed3i</div><div style=\"text-align: left;\">m\u00e0u hoa t\u1ef1a c\u00e1nh chu\u1ed3n \u1edbt \u0111\u1ecf</div><div style=\"text-align: left;\">d\u1ecdc \u0111\u01b0\u1eddng t\u00f4i \u0111i t\u1eebng ch\u1ea5m nh\u1ecf xa v\u1eddi</div><div style=\"text-align: left;\"><br></div><div style=\"text-align: left;\">Hoa dong ri\u1ec1ng s\u00f3t l\u1ea1i ch\u1edd t\u00f4i</div><div style=\"text-align: left;\">\u01a1i m\u00e0u hoa thu\u1edf \u0111\u00f3i ngh\u00e8o kham kh\u1ed5</div><div style=\"text-align: left;\">m\u00ecnh tho\u00e1ng ch\u1ed1c \u0111\u00e3 th\u00e0nh x\u01b0a c\u0169</div><div style=\"text-align: left;\">m\u00e0u hoa tu\u1ed5i th\u01a1 \u0111\u1ecf \u0111\u1ebfn b\u00e2y gi\u1edd.</div><div style=\"text-align: right;\">(Theo<i> vannghequandoi.com.vn</i>)</div>", "listQuestion": [{"questionId": 21604675, "lessonId": 0, "a": "\u201cHoa nh\u01b0 th\u1ea7m nh\u1eafc cho t\u00f4i nh\u1edb\u201d.", "b": "\u201c\u01a1i m\u00e0u hoa thu\u1edf \u0111\u00f3i ngh\u00e8o kham kh\u1ed5\u201d.", "c": "\u201cHoa dong ri\u1ec1ng s\u00f3t l\u1ea1i ch\u1edd t\u00f4i\u201d.", "d": "\u201cHoa dong ri\u1ec1ng ch\u1ee3t b\u1eebng l\u00ean s\u1eafc \u0111\u1ecf\u201d.", "bookId": 1088662, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Chi ti\u1ebft n\u00e0o sau \u0111\u00e2y kh\u1eafc ho\u1ea1 h\u00ecnh \u1ea3nh hoa dong ri\u1ec1ng trong qu\u00e1 kh\u1ee9?", "answer": "Chi ti\u1ebft n\u00e0o sau \u0111\u00e2y kh\u1eafc ho\u1ea1 h\u00ecnh \u1ea3nh hoa dong ri\u1ec1ng trong qu\u00e1 kh\u1ee9 l\u00e0 \u201c\u01a1i m\u00e0u hoa thu\u1edf \u0111\u00f3i ngh\u00e8o kham kh\u1ed5\u201d. C\u1ee5m t\u1eeb \u201cthu\u1edf \u0111\u00f3i ngh\u00e8o kham kh\u1ed5\u201d x\u00e1c \u0111\u1ecbnh r\u00f5 m\u1ed1c th\u1eddi gian qu\u00e1 kh\u1ee9, g\u1eafn h\u00ecnh \u1ea3nh hoa dong ri\u1ec1ng v\u1edbi nh\u1eefng n\u0103m th\u00e1ng thi\u1ebfu th\u1ed1n c\u1ee7a tu\u1ed5i th\u01a1.", "key": "B", "isVideo": true, "score": 0, "order": 26, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604679, "lessonId": 0, "a": "Qu\u00e1 kh\u1ee9.", "b": "Hi\u1ec7n t\u1ea1i.", "c": "T\u1eeb qu\u00e1 kh\u1ee9 tu\u1ed5i th\u01a1, qua hai cu\u1ed9c kh\u00e1ng chi\u1ebfn, \u0111\u1ebfn hi\u1ec7n t\u1ea1i.", "d": "Nh\u1eefng n\u0103m th\u00e1ng kh\u00e1ng chi\u1ebfn.", "bookId": 1088663, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Trong b\u00e0i th\u01a1, h\u00ecnh \u1ea3nh hoa rong ri\u1ec1ng g\u1eafn v\u1edbi th\u1eddi gian n\u00e0o?", "answer": "Trong b\u00e0i th\u01a1, h\u00ecnh \u1ea3nh hoa dong ri\u1ec1ng g\u1ee3i nh\u1edb v\u1ec1 tu\u1ed5i th\u01a1 ngh\u00e8o kh\u00f3, qua nh\u1eefng n\u0103m th\u00e1ng chi\u1ebfn tranh gian kh\u1ed5 v\u00e0 c\u1ea3 c\u1ea3m x\u00fac c\u1ee7a nh\u00e2n v\u1eadt tr\u1eef t\u00ecnh \u1edf hi\u1ec7n t\u1ea1i khi nh\u00ecn l\u1ea1i qu\u00e1 kh\u1ee9.", "key": "C", "isVideo": true, "score": 0, "order": 27, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21604686, "lessonId": 0, "a": "C\u01a1n \u0111\u00f3i x\u00f3t l\u00f2ng tr\u0169ng m\u1eaft v\u00e0ng da.", "b": "Nh\u1eefng d\u00f2ng s\u00f4ng \u0111\u1ec9nh n\u00fai c\u00e1nh r\u1eebng.", "c": "\u0110\u00e1 tai m\u00e8o, m\u1ea3nh bom s\u1eafc nh\u1ecdn.", "d": "M\u1ea3nh v\u01                          <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
