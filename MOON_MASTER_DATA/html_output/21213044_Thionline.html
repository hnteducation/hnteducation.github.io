    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f3f4f6; }
        
        /* === QUY TẮC HIỂN THỊ HÌNH ẢNH (ĐỒNG BỘ ZOOM VỚI FILE ĐỀ BÀI) === */
        
        img { max-width: 100%; height: auto; }

        img[src*="latex"], img[src*="equation"] { 
            display: inline-block; vertical-align: middle; zoom: 0.4; margin: 0 2px;
        }

        .q-content img:not([src*="latex"]):not([src*="equation"]), 
        .sol-content img:not([src*="latex"]):not([src*="equation"]),
        img[src*="img/chat"], img[src*="asset.moon.vn/img"] {
            display: block; margin: 15px auto; border-radius: 4px;

        }

        /* UX MỚI CHO TRẢ LỜI NGẮN (4 Ô) */
        .char-input {
            width: 45px; height: 45px; 
            border: 2px solid #e5e7eb; border-radius: 8px; 
            text-align: center; font-size: 20px; font-weight: bold;
            color: #1f2937; background: #fff; transition: all 0.2s;
            caret-color: transparent; /* Ẩn con trỏ để dùng bàn phím ảo */
        }
        .char-input:focus {
            border-color: #3b82f6; outline: none; 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); transform: scale(1.05);
        }
        .char-input:disabled { background-color: #f3f4f6; color: #9ca3af; }

        /* SCROLL MARGIN ĐỂ TRÁNH HEADER CHE KHI BẤM MỤC LỤC */
        .question-card { scroll-margin-top: 100px; }

        /* CÁC STYLE KHÁC */
        .feedback-correct { background-color: #d1fae5; border-color: #10b981; color: #065f46; }
        .feedback-wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; }
        .selected-opt { background-color: #eff6ff; border-color: #3b82f6; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* BÀN PHÍM ẢO */
        .virtual-numpad {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; border-top: 1px solid #e5e7eb;
            padding: 10px; z-index: 100;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
            transform: translateY(100%);
        }
        .virtual-numpad.active { transform: translateY(0); }
        .numpad-key {
            background: #f3f4f6; border-radius: 8px;
            height: 48px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; color: #374151;
            cursor: pointer; user-select: none;
        }
        .numpad-key:active { background: #d1d5db; }
        .numpad-key.del { background: #fee2e2; color: #dc2626; }
        
        /* Responsive adjustments */
        @media (min-width: 768px) {
            /* Trên desktop, bàn phím ảo nhỏ hơn và nằm dưới ô nhập */
            .virtual-numpad {
                position: absolute; bottom: auto; left: auto; right: auto;
                width: 200px; border: 1px solid #e5e7eb; border-radius: 12px;

                display: none; /* Mặc định ẩn, hiện bằng JS ngay dưới input */
            }
            .virtual-numpad.active { display: grid; transform: none; }
        }

    <script>
        const EXAM_DATA = [{"title": " I. TR\u1eaeC NGHI\u1ec6M\n Ph\u1ea7n 1: C\u00e2u tr\u1eafc nghi\u1ec7m nhi\u1ec1u ph\u01b0\u01a1ng \u00e1n l\u1ef1a ch\u1ecdn\nTh\u00ed sinh tr\u1ea3 l\u1eddi t\u1eeb c\u00e2u 1 \u0111\u1ebfn c\u00e2u 12. M\u1ed7i c\u00e2u h\u1ecfi th\u00ed sinh ch\u1ec9 ch\u1ecdn m\u1ed9t ph\u01b0\u01a1ng \u00e1n.", "content": "", "listQuestion": [{"questionId": 21214183, "lessonId": 0, "a": "T\u1ee9 gi\u00e1c l\u1ed3i l\u00e0 t\u1ee9 gi\u00e1c lu\u00f4n n\u1eb1m trong m\u1ed9t n\u1eeda m\u1eb7t ph\u1eb3ng c\u00f3 b\u1edd l\u00e0 \u0111\u01b0\u1eddng th\u1eb3ng ch\u1ee9a b\u1ea5t              \tk\u1ef3 c\u1ea1nh n\u00e0o c\u1ee7a t\u1ee9 gi\u00e1c.", "b": "T\u1ed5ng c\u00e1c g\u00f3c c\u1ee7a m\u1ed9t t\u1ee9 gi\u00e1c b\u1eb1ng 180\u00b0.", "c": "T\u1ed5ng c\u00e1c g\u00f3c c\u1ee7a m\u1ed9t t\u1ee9 gi\u00e1c b\u1eb1ng 360\u00b0.", "d": "T\u1ee9 gi\u00e1c ABCD l\u00e0 h\u00ecnh g\u1ed3m c\u00e1c \u0111o\u1ea1n th\u1eb3ng AB, BC, CD, DA, trong \u0111\u00f3 b\u1ea5t k\u00ec hai \u0111o\u1ea1n th\u1eb3ng \tn\u00e0o c\u0169ng kh\u00f4ng n\u1eb1m tr\u00ean m\u1ed9t \u0111\u01b0\u1eddng th\u1eb3ng.", "bookId": 1057269, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "H\u00e3y ch\u1ecdn kh\u1eb3ng \u0111\u1ecbnh<b> sai</b> trong c\u00e1c c\u00e2u sau.", "answer": "\ud83d\udd0d <b>Ph\u01b0\u01a1ng ph\u00e1p:</b><br>\nPh\u00e2n t\u00edch t\u1eebng kh\u1eb3ng \u0111\u1ecbnh (A, B, C, D) \u0111\u1ec3 \u0111\u1ed1i chi\u1ebfu v\u1edbi c\u00e1c \u0111\u1ecbnh ngh\u0129a v\u00e0 \u0111\u1ecbnh l\u00fd c\u01a1 b\u1ea3n v\u1ec1 t\u1ee9 gi\u00e1c trong ch\u01b0\u01a1ng tr\u00ecnh H\u00ecnh h\u1ecdc l\u1edbp 8.<br>\n\n\u270d\ufe0f <b>L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\n<b>A.</b> <i>T\u1ee9 gi\u00e1c l\u1ed3i l\u00e0 t\u1ee9 gi\u00e1c lu\u00f4n n\u1eb1m trong m\u1ed9t n\u1eeda m\u1eb7t ph\u1eb3ng c\u00f3 b\u1edd l\u00e0 \u0111\u01b0\u1eddng th\u1eb3ng ch\u1ee9a b\u1ea5t k\u1ef3 c\u1ea1nh n\u00e0o c\u1ee7a t\u1ee9 gi\u00e1c.</i><br>\nSuy ra \u0110\u00e2y l\u00e0 \u0111\u1ecbnh ngh\u0129a ch\u00ednh x\u00e1c c\u1ee7a t\u1ee9 gi\u00e1c l\u1ed3i. Kh\u1eb3ng \u0111\u1ecbnh n\u00e0y <b>\u0110\u00fang</b>.<br>\n\n<b>B.</b> <i>T\u1ed5ng c\u00e1c g\u00f3c c\u1ee7a m\u1ed9t t\u1ee9 gi\u00e1c b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/4717fe05-4d95-4f3c-9d0b-78b386649212.png\"/>.</i><br>\nSuy ra T\u1ed5ng c\u00e1c g\u00f3c c\u1ee7a m\u1ed9t <i>tam gi\u00e1c</i> m\u1edbi b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f2da1b13-9238-473e-8f2c-8a67594030a7.png\"/>. T\u1ed5ng c\u00e1c g\u00f3c c\u1ee7a m\u1ed9t t\u1ee9 gi\u00e1c b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b63a7375-1bc7-40f0-990a-9c09d4369475.png\"/>. Kh\u1eb3ng \u0111\u1ecbnh n\u00e0y <b>Sai</b>.<br>\n\n<b>C.</b> <i>T\u1ed5ng c\u00e1c g\u00f3c c\u1ee7a m\u1ed9t t\u1ee9 gi\u00e1c b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/88c6f283-434d-4bba-b6da-252bd5cc3530.png\"/>.</i><br>\nSuy ra \u0110\u00e2y l\u00e0 \u0111\u1ecbnh l\u00fd ch\u00ednh x\u00e1c v\u1ec1 t\u1ed5ng c\u00e1c g\u00f3c c\u1ee7a m\u1ed9t t\u1ee9 gi\u00e1c. Kh\u1eb3ng \u0111\u1ecbnh n\u00e0y <b>\u0110\u00fang</b>.<br>\n\n<b>D.</b> <i>T\u1ee9 gi\u00e1c ABCD l\u00e0 h\u00ecnh g\u1ed3m c\u00e1c \u0111o\u1ea1n th\u1eb3ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/095652a3-7f90-40c8-9344-0f6aa480b02a.png\"/>, trong \u0111\u00f3 b\u1ea5t k\u00ec hai \u0111o\u1ea1n th\u1eb3ng n\u00e0o c\u0169ng kh\u00f4ng n\u1eb1m tr\u00ean m\u1ed9t \u0111\u01b0\u1eddng th\u1eb3ng.</i><br>\nSuy ra \u0110\u00e2y l\u00e0 \u0111\u1ecbnh ngh\u0129a ch\u00ednh x\u00e1c c\u1ee7a m\u1ed9t t\u1ee9 gi\u00e1c. Kh\u1eb3ng \u0111\u1ecbnh n\u00e0y <b>\u0110\u00fang</b>.<br>\n\n\u2705 <b>K\u1ebft lu\u1eadn: Ch\u1ecdn \u0111\u00e1p \u00e1n B</b>.<br>\n", "key": c11290e8-43bc-496c-9c1b-dba755d3d346.png\"/>). Ta c\u1ea7n t\u00ecm xem \u0111i\u1ec1u ki\u1ec7n b\u1ed5 sung n\u00e0o trong c\u00e1c \u0111\u00e1p \u00e1n (A, B, C, D) khi k\u1ebft h\u1ee3p v\u1edbi \u0111i\u1ec1u ki\u1ec7n \u0111\u00e3 cho s\u1ebd t\u1ea1o th\u00e0nh m\u1ed9t d\u1ea5u hi\u1ec7u nh\u1eadn bi\u1ebft h\u00ecnh b\u00ecnh h\u00e0nh ho\u00e0n ch\u1ec9nh.<br>\n\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\n<b>D\u1ea5u hi\u1ec7u nh\u1eadn bi\u1ebft c\u01a1 b\u1ea3n:</b> M\u1ed9t t\u1ee9 gi\u00e1c l\u00e0 h\u00ecnh b\u00ecnh h\u00e0nh n\u1ebfu n\u00f3 c\u00f3 m\u1ed9t c\u1eb7p c\u1ea1nh \u0111\u1ed1i v\u1eeba <i>song song</i> v\u1eeba <i>b\u1eb1ng nhau</i>.<br>\n<b>\u0110i\u1ec1u ki\u1ec7n \u0111\u00e3 cho:</b> T\u1ee9 gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/3ab463d3-7ff4-4ae3-98af-61ea3b4ec871.png\"/> c\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/edb8c6b8-475b-45f2-9f66-dd63a6187409.png\"/> (m\u1ed9t c\u1eb7p c\u1ea1nh \u0111\u1ed1i b\u1eb1ng nhau).<br>\n<b>X\u00e9t c\u00e1c \u0111\u00e1p \u00e1n:</b><br>\n<b>A.</b> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b63135bc-0ce2-4f38-8a1c-4d68fc075fb6.png\"/>: D\u1ea5u hi\u1ec7u nh\u1eadn bi\u1ebft l\u00e0 \"c\u00e1c g\u00f3c \u0111\u1ed1i b\u1eb1ng nhau\", t\u1ee9c l\u00e0 c\u1ea7n c\u1ea3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/e5526781-9207-4b0c-bc2c-0f2a26abad94.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/28a91b24-24ba-425f-bc7d-735ed16f5854.png\"/>. Ch\u1ec9 m\u1ed9t c\u1eb7p g\u00f3c b\u1eb1ng nhau l\u00e0 kh\u00f4ng \u0111\u1ee7.<br>\n<b>B.</b> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7f688e44-d4ec-4689-82a2-22005615ef39.png\"/>: T\u01b0\u01a1ng t\u1ef1 nh\u01b0 \u0111\u00e1p \u00e1n A, \u0111i\u1ec1u 0c6-389e-405b-910c-dcf83ff387e9.png\"/>.<br>\n<b>\u2705 K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u <b>sai</b>.<br>\n<br>\n\n<b>Ph\u00e1t bi\u1ec3u 2:</b> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/18c620f4-6675-46f7-b04f-4b00c7c1dc48.png\"/><br>\n<b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b> Ch\u1ee9ng minh hai tam gi\u00e1c b\u1eb1ng nhau theo tr\u01b0\u1eddng h\u1ee3p G\u00f3c \u2013 C\u1ea1nh \u2013 G\u00f3c (g.c.g).<br>\n<b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>\nX\u00e9t hai tam gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/bd90c811-dee2-49e0-b0a9-a9f3a8f7dcb9.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/3eca12d2-9247-400a-a4c8-f65b9edc13f5.png\"/> c\u00f3:<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/cff0e3e7-8c5b-4ea2-a791-54d4d3101346.png\"/> (v\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/517c078d-b09a-44ab-ba94-1adac1b7784d.png\"/> l\u00e0 ph\u00e2n gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f3445746-c9f2-47c9-91eb-afb9a1e1b7f1.png\"/>).<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/f959bf72-7615-45b4-8394-c73622f4a181.png\"/> l\u00e0 c\u1ea1nh chung.<br>\n<img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/e647f421-0979-4a0c-bb82-142909c09351.png\"/> (v\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ae5f9c75-4b0b-4a7b-894e-511dcadf7a26.png\"/> l\u00e0 ph\u00e2n gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d7313719-1e90-4e48-89b9-28cdb95580d8.png\"/>).<br>\nDo \u0111\u00f3, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-l /10/239f8ed3-dd71-4dab-a81d-65a8da3f1b57.png\"/>.<br>Hai g\u00f3c n\u00e0y \u1edf v\u1ecb tr\u00ed so le trong b\u1eb1ng nhau n\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/4858ba8d-4c1f-4354-a0ea-e7ab2a52736f.png\"/>.<br>Do \u0111\u00f3, t\u1ee9 gi\u00e1c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/230561a1-96c4-4bfb-89d5-8e7a08f70a53.png\"/> l\u00e0 h\u00ecnh thang.<br>2. <b>Ch\u1ee9ng minh h\u00ecnh thang c\u00e2n :</b><br>Ta c\u1ea7n ch\u1ee9ng minh hai \u0111\u01b0\u1eddng ch\u00e9o <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7e133583-c000-4be8-9545-352bb41a3130.png\"/> (ho\u1eb7c hai c\u1ea1nh b\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/61242479-3773-41c0-abcf-6ca24ef5ddcc.png\"/>).<br>Theo logic \u1ea3nh 3: <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d1fad91f-5abd-49a4-aa1c-31c1f9274145.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/dade6896-a873-4992-bb6c-6744ec51893a.png\"/>.<br>V\u00ec <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/39047955-71e4-400d-b58f-58b007179821.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/af9ec4d7-da44-4c86-8e57-694b3216215b.png\"/>, n\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7b0baca4-14b2-4878-bed7-09931461e72c.png\"/>.<br>H\u00ecnh thang <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/8fc370b7-d75f-416b-9d93-df19c974e55f.png\"/> c\u00f3 hai \u0111\u01b0\u1eddng ch\u00e9o b\u1eb1ng nhau n\u00ean l\u00e0 h\u00ecnh thang c\u00e2n.<br>\u2705 <b>K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u <b>\u0111\u00fang</b>.<br><b>Ph\u00e1t bi\u1ec3u 2:</b> T\u1e da.png\"/> (hai g\u00f3c \u0111\u1ed1i).<br>Do \u0111\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/c984c8ea-96b6-4831-b404-52f65e8fd5cd.png\"/>, hay <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/ec03bada-3ca1-406a-b434-8ff5f45421d7.png\"/>.<br><b>\u2705 K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 1 l\u00e0 ph\u00e1t bi\u1ec3u <b>\u0111\u00fang</b>.<br><b>Ph\u00e1t bi\u1ec3u 2:</b> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7a8d1bf8-deb1-441c-93bc-a09f476b9401.png\"/><br><b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b> \u0110\u1ed1i chi\u1ebfu v\u1edbi l\u1eddi gi\u1ea3i.<br><b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>To\u00e0n b\u1ed9 l\u1eddi gi\u1ea3i \u0111\u00e3 cho kh\u00f4ng \u0111\u1ec1 c\u1eadp \u0111\u1ebfn \u0111i\u1ec3m <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/41e4b510-4f47-455f-b73f-ce281c73353a.png\"/> trong m\u1ed1i quan h\u1ec7 v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/3797fa3e-f0dc-4245-9c50-3168f1b2677c.png\"/> (t\u1ee9c l\u00e0 kh\u00f4ng x\u00e9t <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6a43ecbb-6108-4a61-8ef9-5b07acb123ae.png\"/> hay g\u00f3c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/e5a714b6-ff49-4566-b87a-ee9ea4b73a4b.png\"/>).<br>Do \u0111\u00f3 ph\u00e1t bi\u1ec3u n\u00e0y kh\u00f4ng \u0111\u01b0\u1ee3c suy ra t\u1eeb l\u1eddi gi\u1ea3i v\u00e0 kh\u00f4ng c\u00f3 c\u01a1 s\u1edf.<br><b>\u2705 K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 2 l\u00e0 ph\u00e1t bi\u1ec3u <b>sai</b>.<br><b>Ph\u00e1t bi\u1ec3u 3:</b> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7c797d9a-5781-4558-bcbf-16e576840af7.png\"/><br><b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b> \u0110\u1ed1i chi\u1ebfu v\u1edbi l\u1eddi gi\u1ea3i.<br><b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>T\u01b0\u01a1ng t\u1ef1 nh\u01b0 ph\u00e1t bi\u1ec3u (b), l\u1eddi gi\u1ea3i \u0111\u00e3 cho kh\u00f4ng ph\u00e2n t\u00edch <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/53900a94-8606-4904-8ca5-a9e416c88f0e.png\"/> hay g\u00f3c <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/57515850-2f51-4f77-8adc-e8b0635425ec.png\"/>.<br>(M\u1eb7c d\u00f9 ta c\u00f3 th\u1ec3 t\u1ef1 ch\u1ee9ng minh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b2acdf76-ce47-466b-b559-0a47bc44cba4.png\"/> c\u00e2n t\u1ea1i A <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/1ee32da3-4994-441a-853a-e30d575902d8.png\"/>, nh\u01b0ng d\u1ef1a tr\u00ean l\u1eddi gi\u1ea3i \u0111\u01b0\u1ee3c cung c\u1ea5p, kh\u00f4ng c\u00f3 th\u00f4ng tin n\u00e0o h\u1ed7 tr\u1ee3 ph\u00e1t bi\u1ec3u n\u00e0y).<br><b>\u2705 K\u1ebft lu\u1eadn:</b> Ph\u00e1t bi\u1ec3u 3 l\u00e0 ph\u00e1t bi\u1ec3u <b>sai</b>.<br><b>Ph\u00e1t bi\u1ec3u 4:</b> <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/0f3c9d49-e5b8-445f-ad9e-7253d4a8087b.png\"/><br><b>\ud83d\udd0d Ph\u01b0\u01a1ng ph\u00e1p:</b> S\u1eed d\u1ee5ng t\u00ednh ch\u1ea5t c\u1ee7a h\u00ecnh thoi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d3dc8289-fe19-4d7d-a504-15211694bea5.png\"/> (\u0111\u00e3 ch\u1ee9ng minh \u1edf ph\u1ea7n a) v\u00e0 h\u00ecnh b\u00ecnh h\u00e0nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/bd983f8b-aeb5-4781-8bfa-606b910c1387.png\"/>.<br><b>\u270d\ufe0f L\u1eddi gi\u1ea3i chi ti\u1ebft:</b><br>1. Theo ph\u1ea7n (a), <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/52787bef-878a-49a8-ab7c-5064ee963d70.png\"/> l\u00e0 h\u00ecnh thoi.<br>2. Trong h\u00ecnh thoi, h new-latex/2025/10/d41e8298-e0ab-4a6b-83ab-abf119adb3bc.png\"/> ph\u1ea3i n\u1eb1m tr\u00ean <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/bc914f42-140e-4533-8ba1-7d184fa5b9a3.png\"/>.<br>\n<b>c)</b> S\u1eed d\u1ee5ng t\u00ednh ch\u1ea5t \u0111\u01b0\u1eddng trung tuy\u1ebfn v\u00e0 tr\u1ecdng t\u00e2m trong tam gi\u00e1c.<br>\n\u2022 Ch\u1ee9ng minh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/b39e47c9-db58-4b1b-ab35-ab52158fdaf7.png\"/> l\u00e0 tr\u1ecdng t\u00e2m c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/dd095591-4430-48e0-9b77-0dbe81c50a8a.png\"/> (l\u00e0 giao c\u1ee7a hai trung tuy\u1ebfn <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/54933550-bdc2-4ea6-ab59-fb1350aa4960.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/3184b0a7-6d8a-4e60-8f78-0833780da144.png\"/>).<br>\n\u2022 Ch\u1ee9ng minh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/d4471713-f92c-4f80-8ee3-234b6004865b.png\"/> l\u00e0 tr\u1ecdng t\u00e2m c\u1ee7a <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/6ecd11ad-323c-4bb8-8bbc-fe0c9714a802.png\"/> (l\u00e0 giao c\u1ee7a hai trung tuy\u1ebfn <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/91883e1b-e087-48ea-8a6d-2fad13d6a7a5.png\"/> v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/858d7aeb-de93-48a0-9898-5ae9fb412b1f.png\"/>).<br>\n\u2022 \u00c1p d\u1ee5ng t\u00ednh ch\u1ea5t tr\u1ecdng t\u00e2m (chia trung tuy\u1ebfn theo t\u1ec9 l\u1ec7 2:1) cho <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/2d370898-7a8c-47fe-81d3-2ebf1f7f8370.png\"/> (theo <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/1617f24c-64da-4934-93a8-769bf51d659d.png\"/>) v\u00e0 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/da4169a2-cc3d-46d4-a707-1ed9eb4c0768.png\"/> (theo <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/9f5f1b96-cacf-4083-9e1f-2a2911ee1ba6.png\"/>). K\u1ebft h\u1ee3p v\u1edbi <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/2e1d5c3a-bde8-427a-9243-653ced63614a.png\"/> \u0111\u1ec3 suy ra <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/78eb1ff2-9454-4594-8e0d-e3ca59bddd8c.png\"/>, t\u1eeb \u0111\u00f3 <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/a4e7d470-6ee4-4ed3-875f-15d3c0566fe8.png\"/> c\u0169ng b\u1eb1ng <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/80f9ede4-ecfc-4c22-92db-e503ed8f301b.png\"/>.<br>\n<b>d)</b> S\u1eed d\u1ee5ng k\u1ebft qu\u1ea3 c\u1ee7a c\u00e2u (a) v\u00e0 c\u00e2u (c):<br>\n1. T\u1eeb (a), <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/54b97351-e1ee-4bcd-90c8-519f1ecfd2f2.png\"/> l\u00e0 h\u00ecnh b\u00ecnh h\u00e0nh <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/7ec1c427-db8b-456a-a793-13fd7eadae95.png\"/> (c\u1ea1nh \u0111\u1ed1i).<br>\n2. T\u1eeb (c), <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/594d2233-0aae-4635-aa78-58aa81cb4773.png\"/> l\u00e0 tr\u1ecdng t\u00e2m <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/715449a4-ebc6-4dab-95cb-d7f8a0e92260.png\"/>, <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/fd0c36c9-a229-4a53-ae1c-c89f58aac9eb.png\"/> l\u00e0 trung tuy\u1ebfn <img style = \"vertical-align:middle\" src= \"https://asset.moon.vn/new-latex/2025/10/1ea670b6-38b0-4bdb-80ad-8e3c19e20afd.png\"/>.<br>\n3. K\u1ebft h\u1ee         let userAnswers = {}; // Store: { qId: value }
        let isSubmitted = false;
        let examMode = 'practice'; // 'practice' or 'exam'
        let startTime = Date.now();

        let activeInput = null; // Track input đang focus để bàn phím ảo nhập vào

            document.addEventListener('click', (e) => {
                const numpad = document.getElementById('virtual-numpad');
                const isInput = e.target.classList.contains('char-input');
                const isNumpad = numpad.contains(e.target);
                
                if (!isInput && !isNumpad) {
                    numpad.classList.remove('active');
                    activeInput = null;
                }
            });
        };

        // --- TIMER LOGIC ---
        function startTimer() {
            timerInterval = setInterval(() => {
                if(isSubmitted) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                document.getElementById('time-display').innerText = timeStr;
                document.getElementById('timer-mobile').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- SCROLL HELPER (SỬA LỖI MỤC LỤC DESKTOP) ---
        function scrollToQuestion(qKey) {
            const el = document.getElementById(`question-${qKey}`);
            if (el) {
                // Scroll native với offset (do header fixed)
                // Sử dụng phương pháp cũ nhưng chắc chắn hoạt động hơn scrollIntoView trên container cuộn
                // Lấy tọa độ tương đối so với viewport
                const yOffset = -80; // Trừ header
                const y = el.getBoundingClientRect().top + window.pageYOffset + yOffset;
                
                window.scrollTo({top: y, behavior: 'smooth'});
                
                // Highlight hiệu ứng
                el.classList.add('ring-2', 'ring-moon', 'ring-offset-2');
                setTimeout(() => el.classList.remove('ring-2', 'ring-moon', 'ring-offset-2'), 1500);
            }
            // Đóng mobile palette nếu đang mở
            document.getElementById('mobile-palette').classList.add('hidden');
        }

        // --- RENDER ENGINE ---
        function renderExam(reset = false) {
            const container = document.getElementById('exam-content');
            const palDesk = document.getElementById('palette-desktop');
            const palMob = document.getElementById('palette-mobile');
            
            if(reset) container.innerHTML = '';
            else container.innerHTML = ''; 
            
            palDesk.innerHTML = '';
            palMob.innerHTML = '';

            let globalIdx = 0;

            EXAM_DATA.forEach((group, gIdx) => {
                if(group.title && group.title.toLowerCase() !== 'danh sách câu hỏi' || group.content) {

                    gDiv.className = 'bg-white p-4 rounded-lg shadow-sm border-l-4 border-moon mb-4';

                        ${group.content ? `<div class="text-gray-600 italic text-sm">${group.content}</div>` : ''}
                    `;
                    container.appendChild(gDiv);

                group.listQuestion.forEach((q, qIdx) => {

                    const qId = q.order || q.Order || globalIdx;
                    const qKey = `q_${gIdx}_${qIdx}`;
                    const qType = q.normalizedType;
                    
                    // -- Palette Item (FIX ONCLICK SCOPE) --
                    // Sử dụng arrow function trong JS string template cẩn thận
                    const palBtn = document.createElement('button');
                    palBtn.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${userAnswers[qKey] ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`;
                    palBtn.innerText = qId;
                    palBtn.id = `pal_${qKey}`;
                    
                    // Gán sự kiện click trực tiếp thay vì chuỗi string HTML để tránh lỗi scope
                    palBtn.addEventListener('click', function() { scrollToQuestion(qKey); });
                    
                    palDesk.appendChild(palBtn.cloneNode(true)); // Desktop clone cần gán lại event nếu cloneNode ko copy event

                    // Cách tốt nhất: tạo chuỗi HTML hoặc append element.
                    // Ở đây để đơn giản ta gán onclick bằng attribute string cho chắc ăn
                    palBtn.setAttribute('onclick', `scrollToQuestion('${qKey}')`);
                    
                    // Sau khi set attribute, append lại
                    palDesk.innerHTML = palDesk.innerHTML; // Reset để xoá nút cũ? Không nên.
                    // Code cũ append child.
                    
                    // Fix triệt để: Tạo string HTML cho palette
                    // (Đã sửa ở dưới)
                });
            });
            
            // Render lại từ đầu để tối ưu
            palDesk.innerHTML = '';
            palMob.innerHTML = '';
            container.innerHTML = '';
            globalIdx = 0;

                    // Question Card

                    if(qType === '0') {

                            const isSelected = userAnswers[qKey] === opt.toUpperCase();
                            const isCorrect = q.key && q.key.toUpperCase() === opt.toUpperCase();
                            
                            let btnClass = "w-full text-left p-3 rounded-lg border-2 border-gray-100 hover:bg-gray-50 transition-all flex items-start gap-3 group cursor-pointer";

                            let feedback = "";

                            if(isSelected) {

                                icon = `<div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">✓</div>`;
                            }

                            if((isSubmitted || examMode === 'practice') && userAnswers[qKey]) {
                                if(isCorrect) {
                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-green-50 border-green-500 text-green-800 flex items-start gap-3";
                                        feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Chính xác</span>`;
                                    } else if (isSubmitted) { 
                                         btnClass += " ring-2 ring-green-400 ring-offset-1";
                                         feedback = `<span class="ml-auto text-green-600 font-bold text-sm">Đáp án đúng</span>`;
                                    }

                                    if(isSelected) { 
                                        btnClass = "w-full text-left p-3 rounded-lg border-2 bg-red-50 border-red-400 text-red-800 flex items-start gap-3";

                        });
                    }

                    // TYPE 1 & 3: FILL KEY
                    else if(qType === '1' || qType === '3') {
                        const userVal = userAnswers[qKey] || '';
                        const chars = userVal.split('');
                        const correctVal = q.fillKey ? q.fillKey.trim() : '';
                        
                        let boxesHtml = '<div class="flex gap-2 justify-start items-center">';
                        for(let i=0; i<4; i++) {

                            boxesHtml += `<input type="text" maxlength="1" 
                                class="char-input"

                                onclick="activateNumpad(this, '${qKey}')"
                                ${isSubmitted ? 'disabled' : ''} 
                            />`;
                        }
                        
                        if(examMode === 'practice' && !isSubmitted) {
                             boxesHtml += `<button onclick="checkFillAnswer('${qKey}')" class="ml-2 px-3 py-2 bg-blue-100 text-blue-700 font-bold rounded-lg text-sm hover:bg-blue-200 transition-colors">Kiểm tra</button>`;
                             // Nút xem lời giải cho practice
                             boxesHtml += `<button onclick="toggleSolution('${qKey}')" class="ml-2 px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button>`;

                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
