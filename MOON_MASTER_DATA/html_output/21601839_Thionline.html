    <script>
        const EXAM_DATA = [{"title": "", "content": "", "listQuestion": [{"questionId": 21601850, "lessonId": 0, "a": "Kh\u1eb3ng \u0111\u1ecbnh ngu\u1ed3n g\u1ed1c con ng\u01b0\u1eddi \u0111\u01b0\u1ee3c t\u1ea1o n\u00ean t\u1eeb \u0111\u1ea5t.", "b": "N\u00eau l\u00ed do t\u01b0\u1ee3ng ng\u01b0\u1eddi n\u1eb7n \u0111\u1ec1u b\u1ecb ph\u00e1.", "c": "N\u00eau l\u00ed do Th\u01b0\u1ee3ng \u0110\u1ebf v\u00e0 Ga Gie t\u1ea1o ra con ng\u01b0\u1eddi.", "d": "Gi\u1ea3i th\u00edch tu\u1ed5i th\u1ecd trung b\u00ecnh c\u1ee7a con ng\u01b0\u1eddi.", "bookId": 1088577, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cK\u1ebft D\u01a1 (Th\u01b0\u1ee3ng \u0110\u1ebf) t\u1ea1o ra tr\u1eddi tr\u1eafng v\u00e0 \u0111\u1ea5t \u0111en v\u00e0 c\u00f9ng Ga Gie l\u1ea5y \u0111\u1ea5t t\u1eeb ph\u01b0\u01a1ng T\u00e2y qua ph\u01b0\u01a1ng \u0110\u00f4ng \u0111\u1ec3 l\u00e0m ra ng\u01b0\u1eddi, nh\u01b0ng c\u00f4ng vi\u1ec7c c\u00f2n d\u1edf dang th\u00ec tr\u1eddi t\u1ed1i. Qua ng\u00e0y sau h\u1ecd th\u1ea5y t\u01b0\u1ee3ng n\u1eb7n h\u00f4m qua \u0111\u00e3 b\u1ecb ai ph\u00e1, v\u00e0 hai \u0111\u00eam li\u1ec1n \u0111\u1ec1u nh\u01b0 th\u1ebf. H\u1ecd n\u1eb7n \u0111\u1ebfn l\u1ea7n th\u1ee9 ba r\u1ed3i \u0111\u1ec3 \u00fd coi ch\u1eebng. \u0110\u1ebfn n\u1eeda \u0111\u00eam Th\u1ea7n \u0110\u1ea5t l\u1ea1i. Th\u1ea5y h\u1ecd Th\u1ea7n \u0110\u1ea5t b\u1ea3o: \u201c\u0110\u1ea5t n\u00e0y l\u00e0 c\u1ee7a t\u00f4i, n\u1ebfu c\u00e1c ng\u01b0\u1eddi m\u01b0\u1ee3n \u0111\u1ec3 n\u1eb7n con ng\u01b0\u1eddi th\u00ec trong bao nhi\u00eau n\u0103m s\u1ebd ho\u00e0n l\u1ea1i?\u201d.<br>H\u1ecd \u0111\u00e1p: \u201cTrong v\u00f2ng s\u00e1u m\u01b0\u01a1i n\u0103m ch\u00fang t\u00f4i s\u1ebd tr\u1ea3.\u201d<br>Do \u0111\u00f3 con ng\u01b0\u1eddi ch\u1ec9 s\u1ed1ng trong kho\u1ea3ng s\u00e1u m\u01b0\u01a1i n\u0103m r\u1ed3i ph\u1ea3i ch\u1ebft \u0111\u1ec3 tr\u1ea3 h\u00ecnh h\u00e0i l\u1ea1i cho \u0111\u1ea5t.\u201d</i><br><div style=\"text-align: right;\">(Th\u1ea7n tho\u1ea1i L\u00f4 L\u00f4, <i>S\u00e1ng t\u1ea1o lo\u00e0i ng\u01b0\u1eddi,</i> theo NXB S\u00e1ng t\u1ea1o, 1970)</div>N\u1ed9i dung ch\u00ednh c\u1ee7a v\u0103n b\u1ea3n l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nV\u0103n b\u1ea3n k\u1ec3 v\u1ec1 qu\u00e1 tr\u00ecnh Th\u01b0\u1ee3ng \u0110\u1ebf v\u00e0 Ga Gie t\u1ea1o ra con ng\u01b0\u1eddi t\u1eeb \u0111\u1ea5t v\u00e0 gi\u1ea3i th\u00edch l\u00fd do con ng\u01b0\u1eddi ch\u1ec9 s\u1ed1ng kho\u1ea3ng s\u00e1u m\u01b0\u01a1i n\u0103m.<br>\n\u2192 N\u1ed9i dung ch\u00ednh c\u1ee7a v\u0103n b\u1ea3n l\u00e0 gi\u1ea3i th\u00edch tu\u1ed5i th\u1ecd trung b\u00ecnh c\u1ee7a con ng\u01b0\u1eddi.\n", "key": "D", "isVideo": true, "score": 0, "order": 1, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601856, "lessonId": 0, "a": "V\u00ec Qu\u1ef7 kh\u00f4ng th\u00edch \u0103n khoai lang.", "b": "V\u00ec Ng\u01b0\u1eddi thi\u1ebfu khoai lang \u0111\u1ec3 \u0103n.", "c": "V\u00ec tr\u1ed3ng khoai, Ng\u01b0\u1eddi s\u1ebd thu \u0111\u01b0\u1ee3c c\u1ee7 khoai (g\u1ed1c), ph\u1ea7n d\u00e2y v\u00e0 l\u00e1 (ng\u1ecdn) tr\u1ea3 cho Qu\u1ef7.", "d": "V\u00ec Ph\u1eadt c\u00f3 s\u1eb5n gi\u1ed1ng khoai lang \u0111\u1ec3 cho Ng\u01b0\u1eddi.", "bookId": 1088578, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cPh\u1eadt t\u1eeb ph\u01b0\u01a1ng T\u00e2y l\u1ea1i, c\u00f3 \u00fd \u0111\u1ecbnh gi\u00fap Ng\u01b0\u1eddi ch\u1ed1ng l\u1ea1i s\u1ef1 b\u00f3c l\u1ed9t t\u00e0n nh\u1eabn c\u1ee7a Qu\u1ef7. Sau m\u00f9a \u0111\u00f3, Ph\u1eadt b\u1ea3o Ng\u01b0\u1eddi \u0111\u1eebng tr\u1ed3ng l\u00faa m\u00e0 c\u00e0o \u0111\u1ea5t th\u00e0nh lu\u1ed1ng tr\u1ed3ng khoai lang. Ng\u01b0\u1eddi c\u1ee9 y l\u1eddi l\u00e0m \u0111\u00fang nh\u01b0 Ph\u1eadt d\u1eb7n. Qu\u1ef7 kh\u00f4ng ng\u1edd Ng\u01b0\u1eddi \u0111\u00e3 b\u1eaft \u0111\u1ea7u c\u00f3 m\u01b0u k\u1ebf m\u1edbi ch\u1ed1ng l\u1ea1i m\u00ecnh n\u00ean c\u1ee9 n\u00eau \u0111\u00fang th\u1ec3 l\u1ec7 nh\u01b0 m\u00f9a tr\u01b0\u1edbc: \u201c\u0102n ng\u1ecdn cho g\u1ed1c\u201d.\u201d</i><br>(Nguy\u1ec5n \u0110\u1ed5ng Chi, <i>S\u1ef1 t\u00edch c\u00e2y n\u00eau ng\u00e0y T\u1ebft</i>, theo <i>Kho t\u00e0ng truy\u1ec7n c\u1ed5 t\u00edch Vi\u1ec7t Nam</i>, t\u1eadp 1, NXB Gi\u00e1o d\u1ee5c, 2000)<br>V\u00ec sao Ph\u1eadt b\u1ea3o Ng\u01b0\u1eddi tr\u1ed3ng khoai lang?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nPh\u1eadt b\u1ea3o Ng\u01b0\u1eddi tr\u1ed3ng khoai lang v\u00ec khoai lang l\u00e0 lo\u1ea1i c\u00e2y m\u00e0 ph\u1ea7n c\u1ee7 (g\u1ed1c) n\u1eb1m d\u01b0\u1edbi \u0111\u1ea5t, c\u00f2n ph\u1ea7n d\u00e2y v\u00e0 l\u00e1 (ng\u1ecdn) n\u1eb1m tr\u00ean m\u1eb7t \u0111\u1ea5t. Do \u0111\u00f3, Ng\u01b0\u1eddi s\u1ebd thu \u0111\u01b0\u1ee3c ph\u1ea7n c\u1ee7 (g\u1ed1c) \u0111\u1ec3 \u0103n, c\u00f2n ph\u1ea7n d\u00e2y v\u00e0 l\u00e1 (ng\u1ecdn) c\u00f3 th\u1ec3 tr\u1ea3 cho Qu\u1ef7 theo \u0111\u00fang lu\u1eadt.\n", "key": "C", "isVideo": true, "score": 0, "order": 2, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601864, "lessonId": 0, "a": "S\u1eed d\u1ee5ng nhi\u1ec1u t\u1eeb H\u00e1n Vi\u1ec7t.", "b": "Ng\u00f4n ng\u1eef trang tr\u1ecdng, c\u1ed5 \u0111i\u1ec3n.", "c": "S\u1eed d\u1ee5ng thi li\u1ec7u H\u00e1n v\u0103n.", "d": "Ng\u00f4n ng\u1eef b\u00ecnh d\u00e2n, m\u1ed9c m\u1ea1c.", "bookId": 1088579, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTr\u1eddi chi\u1ec1u b\u1ea3ng l\u1ea3ng b\u00f3ng ho\u00e0ng h\u00f4n,<br>Ti\u1ebfng \u1ed1c  xa \u0111\u01b0a v\u1eb3ng tr\u1ed1ng \u0111\u1ed3n.<br>G\u00e1c m\u00e1i, ng\u01b0 \u00f4ng v\u1ec1 vi\u1ec5n ph\u1ed1 ,<br>G\u00f5 s\u1eebng m\u1ee5c t\u1eed  l\u1ea1i c\u00f4 th\u00f4n.<br>Ng\u00e0n mai gi\u00f3 cu\u1ed1n chim bay m\u1ecfi,<br>D\u1eb7m li\u1ec5u  s\u01b0\u01a1ng sa kh\u00e1ch b\u01b0\u1edbc d\u1ed3n.<br>K\u1ebb ch\u1ed1n Ch\u01b0\u01a1ng \u0110\u00e0i , ng\u01b0\u1eddi l\u1eef th\u1ee9,<br>L\u1ea5y ai m\u00e0 k\u1ec3 n\u1ed7i h\u00e0n \u00f4n.\u201d</i><br><div style=\"text-align: right;\">(B\u00e0 Huy\u1ec7n Thanh Quan, <i>Chi\u1ec1u h\u00f4m nh\u1edb nh\u00e0, </i>theo<i> T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam, </i>t\u1eadp 14, <br>NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Nh\u1eadn x\u00e9t n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>\u0111\u00fang v\u1ec1 ng\u00f4n ng\u1eef c\u1ee7a b\u00e0i th\u01a1.", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nB\u00e0i th\u01a1 \u201cChi\u1ec1u h\u00f4m nh\u1edb nh\u00e0\u201d c\u1ee7a B\u00e0 Huy\u1ec7n Thanh Quan s\u1eed d\u1ee5ng ng\u00f4n ng\u1eef trang tr\u1ecdng, c\u1ed5 \u0111i\u1ec3n, v\u1edbi nhi\u1ec1u t\u1eeb H\u00e1n Vi\u1ec7t v\u00e0 thi li\u1ec7u H\u00e1n v\u0103n.<br>\n\u2192 Ng\u00f4n ng\u1eef b\u00ecnh d\u00e2n, m\u1ed9c m\u1ea1c l\u00e0 nh\u1eadn x\u00e9t kh\u00f4ng \u0111\u00fang v\u1ec1 ng\u00f4n ng\u1eef c\u1ee7a b\u00e0i th\u01a1.\n", "key": "D", "isVideo": true, "score": 0, "order": 3, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601868, "lessonId": 0, "a": "Ch\u00fa kh\u00e1ch t\u1ed1n bao c\u00f4ng c\u1ee7a m\u1edbi t\u00ecm ra ng\u00f4i huy\u1ec7t \u0111\u1ebf v\u01b0\u01a1ng.", "b": "Ng\u1ef1a \u0111\u00e1 d\u01b0\u1edbi \u0111\u1ea7m h\u00e1 mi\u1ec7ng, nu\u1ed1t ch\u1eedng m\u1edb c\u1ecf non b\u1ecdc b\u00ean trong g\u00f3i x\u01b0\u01a1ng.", "c": "\u0110inh m\u1ed7 l\u1ea5y g\u00f3i x\u01b0\u01a1ng \u1edf g\u00e1c b\u1ebfp \u0111em xu\u1ed1ng qu\u1ea5n m\u1edb c\u1ecf non b\u00ean ngo\u00e0i.", "d": "\u0110inh m\u1ed7 \u00edt tu\u1ed5i nh\u01b0ng th\u00f4ng minh kh\u00e1c th\u01b0\u1eddng.", "bookId": 1088580, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cS\u1ef1 th\u1ef1c th\u00ec l\u00fac \u1ea5y \u0110inh m\u1ed7 d\u1eabu c\u00f2n \u00edt tu\u1ed5i nh\u01b0ng l\u1ea1i th\u00f4ng minh kh\u00e1c th\u01b0\u1eddng. Nay nghe ch\u00fa kh\u00e1ch l\u1ea9m nh\u1ea9m nh\u01b0 v\u1eady th\u00ec \u00f4ng hi\u1ec3u ngay l\u00e0 huy\u1ec7t \u1edf trong m\u1ed3m ng\u1ef1a, ch\u1eb3ng c\u00f2n h\u1ed3 nghi g\u00ec n\u1eefa, cho n\u00ean sau khi ch\u00fa kh\u00e1ch \u0111i r\u1ed3i, \u00f4ng b\u00e8n l\u1ea5y ngay g\u00f3i x\u01b0\u01a1ng \u1edf g\u00e1c b\u1ebfp \u0111em xu\u1ed1ng qu\u1ea5n m\u1edb c\u1ecf non b\u00ean ngo\u00e0i, r\u1ed3i \u00f4m v\u00e0o \u0111\u1ea7m l\u1eb7n xu\u1ed1ng ch\u1ed7 ng\u1ef1a \u0111\u00e1, c\u0169ng l\u00e0m theo nh\u01b0 m\u1ecdi h\u00f4m, n\u00f3 v\u1eeba h\u00e1 mi\u1ec7ng \u00f4ng b\u00e8n n\u1ea1p c\u1ea3 g\u00f3i \u1ea5y v\u00e0o trong, \u0111\u1ee3i khi n\u00f3 nu\u1ed1t ch\u1eedng r\u1ed3i \u00f4ng m\u1edbi y\u00ean tr\u00ed ngoi l\u00ean. Th\u1ebf l\u00e0 ng\u00f4i huy\u1ec7t \u0111\u1ebf v\u01b0\u01a1ng m\u00e0 ch\u00fa kh\u00e1ch kia \u0111\u00e3 t\u1ed1n bi\u1ebft bao c\u00f4ng c\u1ee7a m\u1edbi t\u00ecm ra \u0111\u01b0\u1ee3c, ng\u00e0y nay l\u1ea1i b\u1ecb \u00f4ng ph\u1ed7ng tay tr\u00ean m\u1ea5t r\u1ed3i.\u201d</i><br><div style=\"text-align: right;\">(V\u0169 Ph\u01b0\u01a1ng \u0110\u1ec1, <i>T\u00e1ng m\u1ed9 v\u00e0o con th\u1ea7n m\u00e3, h\u1ecd \u0110inh th\u1eafng tr\u1eadn th\u1ed1ng nh\u1ea5t non s\u00f4ng</i>, theo<i> T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam</i>, t\u1eadp 6, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Chi ti\u1ebft n\u00e0o sau \u0111\u00e2y l\u00e0 chi ti\u1ebft k\u00ec \u1ea3o?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft \u201cNg\u1ef1a \u0111\u00e1 d\u01b0\u1edbi \u0111\u1ea7m h\u00e1 mi\u1ec7ng, nu\u1ed1t ch\u1eedng m\u1edb c\u1ecf non b\u1ecdc b\u00ean trong g\u00f3i x\u01b0\u01a1ng.\u201d l\u00e0 y\u1ebfu t\u1ed1 k\u1ef3 \u1ea3o v\u01b0\u1ee3t ra kh\u1ecfi nh\u1eefng g\u00ec c\u00f3 th\u1ec3 x\u1ea3y ra trong \u0111\u1eddi th\u01b0\u1eddng.\n", "key": "B", "isVideo": true, "score": 0, "order": 4, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601872, "lessonId": 0, "a": "T\u1ef1 tr\u00e0o.", "b": "Ch\u00e2m bi\u1ebfm.", "c": "\u0110\u1ea3 k\u00edch.", "d": "B\u1ea5t b\u00ecnh.", "bookId": 1088581, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTh\u1ea7y \u0111\u1ed3 th\u1ea7y \u0111\u1ea1c,<br>D\u1ea1y h\u1ecdc d\u1ea1y h\u00e0nh.<br>V\u00e0i quy\u1ec3n s\u00e1ch n\u00e1t,<br>D\u0103m th\u1eb1ng tr\u1ebb ranh.<br>V\u0103n c\u00f3 hay \u0111\u00e3 \u0111\u1ed7 l\u00e0m quan, v\u00f5ng \u0111i\u1ec1u v\u00f5ng t\u00eda,<br>V\u00f5 c\u00f3 gi\u1ecfi \u0111\u00e3 ra gi\u00fap n\u01b0\u1edbc, kh\u1ed1 \u0111\u1ecf kh\u1ed1 xanh .<br>\u00dd h\u1eb3n th\u1ea7y v\u0103n d\u1ed1t v\u0169 d\u00e1t,<br>L\u1ea1i v\u1eeba g\u00e0n v\u1eeba d\u1edf, cho n\u00ean th\u1ea7y lu\u1ea9n qu\u1ea9n loanh quanh.\u201d</i><br><div style=\"text-align: right;\">(Tr\u1ea7n T\u1ebf X\u01b0\u01a1ng, <i>Ph\u00fa th\u1ea7y \u0111\u1ed3 d\u1ea1y h\u1ecdc</i>, b\u00e0i 1, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam,</i> t\u1eadp 14, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Gi\u1ecdng \u0111i\u1ec7u ch\u1ee7 \u0111\u1ea1o c\u1ee7a \u0111o\u1ea1n tr\u00edch tr\u00ean l\u00e0 g\u00ec?<br>", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch ch\u1ebf gi\u1ec5u h\u00ecnh \u1ea3nh th\u1ea7y \u0111\u1ed3 d\u1ea1y h\u1ecdc ch\u1ec9 c\u00f3 danh ti\u1ebfng m\u00e0 kh\u00f4ng c\u00f3 th\u1ef1c t\u00e0i trong x\u00e3 h\u1ed9i c\u0169. Kh\u00f4ng ch\u1ec9 c\u01b0\u1eddi \u0111\u1ed1i t\u01b0\u1ee3ng th\u1ea7y \u0111\u1ed3 n\u00f3i chung, m\u00e0 c\u00f2n l\u00e0 ti\u1ebfng c\u01b0\u1eddi quay v\u00e0o ch\u00ednh t\u1ea7ng l\u1edbp nho s\u0129, trong \u0111\u00f3 nh\u00e0 nho c\u0169ng t\u1ef1 \u00fd th\u1ee9c th\u00e2n ph\u1eadn m\u00ecnh trong x\u00e3 h\u1ed9i bu\u1ed5i giao th\u1eddi. Qua \u0111\u00f3, nh\u00e0 th\u01a1 v\u1eeba th\u1ec3 hi\u1ec7n n\u1ed7i \u0111\u1eafng cay v\u1eeba t\u1ef1 gi\u1ec5u ch\u00ednh th\u00e2n ph\u1eadn nh\u00e0 nho cu\u1ed1i m\u00f9a \u0111\u1ea7y b\u1ebf t\u1eafc v\u00e0 l\u1ea1c l\u00f5ng.<br>\n\u2192 Gi\u1ecdng \u0111i\u1ec7u ch\u1ee7 \u0111\u1ea1o c\u1ee7a \u0111o\u1ea1n tr\u00edch l\u00e0 t\u1ef1 tr\u00e0o.\n", "key": "A", "isVideo": true, "score": 0, "order": 5, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601883, "lessonId": 0, "a": "Ch\u1ee3 huy\u1ec7n.", "b": "Ch\u1ee3 T\u1ebft v\u00f9ng cao.", "c": "Ph\u1ed1 ch\u1ee3.", "d": "Ch\u1ee3 t\u00e0n.", "bookId": 1088582, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cH\u00f4m nay, ng\u00e0y l\u1ebb, ch\u1ee3 l\u1ea1i h\u1ecdp, gi\u00e1p T\u1ebft c\u1ea5t ch\u00e2n xu\u1ed1ng ch\u1ee3 s\u1ebd v\u1ea5p ph\u1ea3i b\u1ea1t ng\u00e0n g\u1eebng, s\u1ea3, m\u0103ng mi\u1ebfn, v\u00f4i ve\u2026 Giang x\u1ebfp \u0111\u00e8 l\u00ean nhau, tr\u0103m \u1ed1ng \u0111\u1ec1u nh\u01b0 m\u1ed9t. Ch\u1ecdn nh\u1eefng \u1ed1ng b\u00e1nh t\u1ebb, b\u1ed1 c\u1ed9t l\u1ea1i \u0111\u1ee7 m\u1ed9t b\u00f3. \u1ede nh\u00e0, m\u1eb9 ch\u00f9i l\u00e1 giong, \u0111\u1ee3i b\u1ed1 mang giang v\u1ec1 s\u1ebd v\u00f3t l\u1ea1t g\u00f3i b\u00e1nh.<br>Ch\u1ed7 t\u00f4i \u0111\u1ee9ng, c\u00f3 v\u00e0i c\u00e1i r\u1ecd \u0111an b\u1eb1ng tre n\u1eb1m s\u00e1t b\u00ec ng\u00f4 t\u1ebb. Ng\u01b0\u1eddi ch\u1ec9 tr\u1ecf xem l\u1ee3n \u0111en, l\u1ee3n tr\u1eafng t\u00ecm gi\u1ed1ng t\u1ed1t. Ng\u01b0\u1eddi n\u1eafn b\u1eafp ng\u00f4 \u0111o\u00e1n h\u1ea1t l\u00e9p, h\u1ea1t \u0111\u1ea7y nh\u1eb7t l\u1ea5y m\u1ed9t n\u1ed3i\u2026\u201d</i><br><div style=\"text-align: right;\">(Trang Thu\u1ef5, <i>M\u00f9a c\u1ecf \u0111\u1eafng</i>, theo vanvn.vn)</div>Khung c\u1ea3nh n\u00e0o \u0111\u01b0\u1ee3c mi\u00eau t\u1ea3 trong \u0111o\u1ea1n tr\u00edch?<br>", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch mi\u00eau t\u1ea3 khung c\u1ea3nh m\u1ed9t phi\u00ean ch\u1ee3 T\u1ebft \u1edf v\u00f9ng cao v\u1edbi nh\u1eefng h\u00ecnh \u1ea3nh \u0111\u1eb7c tr\u01b0ng, phong ph\u00fa v\u00e0 \u0111\u1ee7 \u0111\u1ea7y c\u1ee7a n\u01a1i \u0111\u00e2y: g\u1eebng, s\u1ea3, m\u0103ng mi\u1ebfn, v\u00f4i ve, giang, l\u00e1 rong, ng\u01b0\u1eddi xem l\u1ee3n \u0111en, l\u1ee3n tr\u1eafng \u0111\u1ec3 ch\u1ecdn gi\u1ed1ng, n\u1eafn b\u1eafp ng\u00f4,\u2026\n", "key": "B", "isVideo": true, "score": 0, "order": 6, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601892, "lessonId": 0, "a": "Ni\u1ec1m t\u1ef1 h\u00e0o.", "b": "Ni\u1ec1m vui.", "c": "N\u1ed7i th\u01b0\u01a1ng x\u00f3t.", "d": "N\u1ed7i nh\u1edb.", "bookId": 1088583, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cC\u00e1c anh v\u1ec1 m\u00e1i \u1ea5m nh\u00e0 vui<br><br>Ti\u1ebfng h\u00e1t c\u00e2u c\u01b0\u1eddi<br>R\u1ed9n r\u00e0ng x\u00f3m nh\u1ecf<br>C\u00e1c anh v\u1ec1 t\u01b0ng b\u1eebng tr\u01b0\u1edbc ng\u00f5<br>L\u1edbp \u0111\u00e0n em h\u1edbn h\u1edf theo sau<br>M\u1eb9 gi\u00e0 b\u1ecbn r\u1ecbn \u00e1o n\u00e2u<br>Vui \u0111\u00e0n con nh\u1ecf r\u1eebng s\u00e2u m\u1edbi v\u1ec1\u201d</i><br><div style=\"text-align: right;\">(Ho\u00e0ng Trung Th\u00f4ng, <i>Bao gi\u1edd tr\u1edf l\u1ea1i</i>, theo<i> daidoanket.vn</i>)</div>C\u1ea3m h\u1ee9ng ch\u1ee7 \u0111\u1ea1o c\u1ee7a \u0111o\u1ea1n th\u01a1 l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n th\u01a1 mi\u00eau t\u1ea3 khung c\u1ea3nh tr\u00e0n ng\u1eadp ni\u1ec1m vui sum h\u1ecdp, \u0111o\u00e0n t\u1ee5 c\u1ee7a nh\u1eefng ng\u01b0\u1eddi l\u00ednh tr\u1edf v\u1ec1 sau th\u1eddi gian chi\u1ebfn \u0111\u1ea5u. C\u00e1c h\u00ecnh \u1ea3nh m\u00e1i \u1ea5m nh\u00e0 vui, ti\u1ebfng h\u00e1t c\u00e2u c\u01b0\u1eddi, r\u1ed9n r\u00e0ng x\u00f3m nh\u1ecf, t\u01b0ng b\u1eebng tr\u01b0\u1edbc ng\u00f5, h\u1edbn h\u1edf theo sau, vui \u0111\u00e0n con nh\u1ecf \u0111\u1ec1u th\u1ec3 hi\u1ec7n r\u00f5 ni\u1ec1m vui h\u00e2n hoan, h\u1ea1nh ph\u00fac c\u1ee7a m\u1ecdi ng\u01b0\u1eddi khi nh\u1eefng ng\u01b0\u1eddi l\u00ednh tr\u1edf v\u1ec1.<br>\n\u2192 C\u1ea3m h\u1ee9ng ch\u1ee7 \u0111\u1ea1o c\u1ee7a \u0111o\u1ea1n th\u01a1 l\u00e0 ni\u1ec1m vui.\n", "key": "B", "isVideo": true, "score": 0, "order": 7, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601896, "lessonId": 0, "a": "H\u00e0nh \u0111\u1ed9ng.", "b": "L\u1eddi n\u00f3i.", "c": "V\u1ebb b\u1ec1 ngo\u00e0i.", "d": "N\u1ed9i t\u00e2m.", "bookId": 1088584, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cTr\u00ean thuy\u1ec1n, ti\u1ec3u \u0111\u1ed9i c\u1ee7a T\u1ea1 \u0111ang ng\u1ed3i \u00f4m s\u00fang thu lu. V\u00e0 ng\u01b0\u1eddi ch\u00e8o kh\u00f4ng ai kh\u00e1c ch\u00ednh l\u00e0 c\u00f4 g\u00e1i c\u00f3 t\u00ean l\u00e0 H\u1ed3ng \u0111\u00e3 d\u1ee9t \u0111\u1ee9a b\u00e9 ra kh\u1ecfi v\u00fa m\u1eb9 trong bu\u1ed5i ch\u1ea1y lo\u1ea1n h\u00f4m r\u1ed3i v\u00e0 c\u0169ng l\u00e0 c\u00f4 sinh vi\u00ean \u00e1o tr\u1eafng di\u1ec5n thuy\u1ebft tr\u00ean s\u00e2n tr\u01b0\u1eddng \u0111\u00e3 l\u00e0m cho vi\u00ean Thi\u1ebfu \u00fay bi\u1ec7t \u0111\u1ed9ng d\u00f9 chao \u0111\u1ea3o tr\u01b0\u1edbc \u0111\u00f3. D\u00e1ng c\u00f4 m\u1ec1m m\u1ea1i, nghi\u00eang nghi\u00eang nh\u01b0 \u0111i ra t\u1eeb huy\u1ec1n tho\u1ea1i. Th\u1ec9nh tho\u1ea3ng, \u00e1nh l\u1eeda ph\u00e1o tr\u00e1t l\u00ean ng\u01b0\u1eddi t\u1ea1o cho c\u00f4 m\u1ed9t n\u00e9t \u0111\u1eb9p ki\u00eau h\u00e3nh, m\u1ecfng manh. C\u00f3 nh\u1eefng con thuy\u1ec1n v\u01b0\u1ee3t qua, c\u00f3 nh\u1eefng con thuy\u1ec1n t\u1ee5t l\u1ea1i, l\u1ea1i c\u00f3 nh\u1eefng con thuy\u1ec1n b\u1ecb s\u00f3ng \u0111\u00e1nh tr\u00f2ng tr\u00e0nh mu\u1ed1n \u0111\u1ed5 \u1ee5p.\u201d</i><br><div style=\"text-align: right;\">(Chu Lai, <i>M\u01b0a \u0111\u1ecf</i>, NXB V\u0103n h\u1ecdc, 2019)</div>H\u00ecnh t\u01b0\u1ee3ng nh\u00e2n v\u1eadt H\u1ed3ng trong \u0111o\u1ea1n v\u0103n ch\u1ee7 y\u1ebfu \u0111\u01b0\u1ee3c kh\u1eafc ho\u1ea1 tr\u00ean c\u00e1c ph\u01b0\u01a1ng di\u1ec7n n\u00e0o?<br>", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n v\u0103n t\u1eadp trung mi\u00eau t\u1ea3 d\u00e1ng v\u1ebb, ngo\u1ea1i h\u00ecnh v\u00e0 v\u1ebb \u0111\u1eb9p c\u1ee7a nh\u00e2n v\u1eadt H\u1ed3ng: \u201cc\u00f4 sinh vi\u00ean \u00e1o tr\u1eafng\u201d, \u201cd\u00e1ng c\u00f4 m\u1ec1m m\u1ea1i, nghi\u00eang nghi\u00eang nh\u01b0 \u0111i ra t\u1eeb huy\u1ec1n tho\u1ea1i\u201d, \u201c\u00e1nh l\u1eeda ph\u00e1o tr\u00e1t l\u00ean ng\u01b0\u1eddi t\u1ea1o cho c\u00f4 m\u1ed9t n\u00e9t \u0111\u1eb9p ki\u00eau h\u00e3nh, m\u1ecfng manh\u201d.<br>\n\u2192 H\u00ecnh t\u01b0\u1ee3ng nh\u00e2n v\u1eadt H\u1ed3ng trong \u0111o\u1ea1n v\u0103n ch\u1ee7 y\u1ebfu \u0111\u01b0\u1ee3c kh\u1eafc ho\u1ea1 qua v\u1ebb b\u1ec1 ngo\u00e0i.\n", "key": "C", "isVideo": true, "score": 0, "order": 8, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601912, "lessonId": 0, "a": "\u201cMu\u1ed1n t\u0103ng s\u1ea3n xu\u1ea5t, ph\u1ea3i \u0111\u1ea7u t\u01b0.\u201d.", "b": "\u201ct\u1eeb nay ai c\u00e0ng l\u00e0m \u0111\u01b0\u1ee3c nhi\u1ec1u s\u1ea3n ph\u1ea9m s\u1ebd ph\u1ea3i \u0111\u01b0\u1ee3c h\u01b0\u1edfng l\u01b0\u01a1ng c\u00e0ng cao\u201d.", "c": "\u201cC\u00e1i d\u1edf l\u00e2u nay c\u1ee7a ch\u00fang ta l\u00e0: ng\u01b0\u1eddi ch\u0103m v\u00e0 k\u1ebb l\u01b0\u1eddi \u0111\u01b0\u1ee3c \u0111\u1ed1i x\u1eed nh\u01b0 nhau\u201d.", "d": "\u201cKh\u00e2u c\u1ea7n \u0111\u1ea7u t\u01b0 tr\u01b0\u1edbc ti\u00ean l\u00e0 con ng\u01b0\u1eddi.\u201d.", "bookId": 1088585, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNGUY\u1ec4N CH\u00cdNH - \u0110\u1ed3ng ch\u00ed Gi\u00e1m \u0111\u1ed1c, s\u1ea3n xu\u1ea5t t\u0103ng g\u1ea5p n\u0103m m\u1edbi ch\u1ec9 l\u00e0 tr\u00ean d\u1ef1 t\u00ednh. Ch\u00fang ta ch\u01b0a l\u00e0m \u0111\u01b0\u1ee3c, \u0111\u00e3 v\u1ed9i l\u0129nh l\u01b0\u01a1ng cao sao?<br>HO\u00c0NG VI\u1ec6T - V\u1edbi s\u1ed1 l\u01b0\u01a1ng t\u1ed1i thi\u1ec3u \u1ea5y ng\u01b0\u1eddi c\u00f4ng nh\u00e2n m\u1edbi c\u00f3 th\u1ec3 s\u1ed1ng m\u00e0 kh\u00f4ng ch\u1ebft \u0111\u00f3i, kh\u00f4ng l\u00e0m b\u1eady. Mu\u1ed1n t\u0103ng s\u1ea3n xu\u1ea5t, ph\u1ea3i \u0111\u1ea7u t\u01b0. Kh\u00e2u c\u1ea7n \u0111\u1ea7u t\u01b0 tr\u01b0\u1edbc ti\u00ean l\u00e0 con ng\u01b0\u1eddi. \u0110\u1ebfn c\u00e1i m\u00e1y c\u0169ng ph\u1ea3i c\u00f3 \u0111\u1ee7 nhi\u00ean li\u1ec7u n\u00f3 m\u1edbi l\u00e0m vi\u1ec7c \u0111\u01b0\u1ee3c. (v\u1edbi m\u1ecdi ng\u01b0\u1eddi) V\u00e0 ph\u1ea3i l\u00e0m ra tr\u00f2! C\u00e1i d\u1edf l\u00e2u nay c\u1ee7a ch\u00fang ta l\u00e0: ng\u01b0\u1eddi ch\u0103m v\u00e0 k\u1ebb l\u01b0\u1eddi \u0111\u01b0\u1ee3c \u0111\u1ed1i x\u1eed nh\u01b0 nhau, ng\u01b0\u1eddi t\u00e0i n\u0103ng v\u00e0 k\u1ebb d\u1ed1t n\u00e1t \u0111\u1ec1u h\u01b0\u1edfng chung m\u1ed9t m\u1ee9c quy\u1ec1n l\u1ee3i, th\u1eadm ch\u00ed c\u00f3 nh\u1eefng k\u1ebb kh\u00f4ng l\u00e0m g\u00ec c\u1ea3, ch\u1ec9 ng\u1ed3i ph\u00e1n th\u00f4i, l\u1ea1i \u0111\u01b0\u1ee3c v\u00ec n\u1ec3 h\u01a1n nh\u1eefng ng\u01b0\u1eddi \u0111\u00e3 v\u1ea5t v\u1ea3 c\u1ed1ng hi\u1ebfn. X\u00e3 h\u1ed9i ch\u1ee7 ngh\u0129a g\u00ec m\u00e0 l\u1ea1i l\u1ea1 th\u1ebf? Kh\u00f4ng, t\u1eeb nay ai c\u00e0ng l\u00e0m \u0111\u01b0\u1ee3c nhi\u1ec1u s\u1ea3n ph\u1ea9m s\u1ebd ph\u1ea3i \u0111\u01b0\u1ee3c h\u01b0\u1edfng l\u01b0\u01a1ng c\u00e0ng cao, ai l\u00e0m t\u1ed3i s\u1ebd b\u1ecb ph\u1ea1t b\u1eb1ng ti\u1ec1n, \u0111\u00f3 s\u1ebd l\u00e0 nguy\u00ean t\u1eafc c\u1ee7a x\u00ed nghi\u1ec7p ch\u00fang ta!\u201d</i><br><div style=\"text-align: right;\">(L\u01b0u Quang V\u0169, <i>T\u00f4i v\u00e0 ch\u00fang ta,</i> theo Ng\u1eef v\u0103n 9, t\u1eadp 2, NXB Gi\u00e1o d\u1ee5c Vi\u1ec7t Nam, 2013)</div>Quan \u0111i\u1ec3m coi tr\u1ecdng s\u1ee9c lao \u0111\u1ed9ng c\u1ee7a con ng\u01b0\u1eddi \u1edf nh\u00e2n v\u1eadt Ho\u00e0ng Vi\u1ec7t \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n qua chi ti\u1ebft l\u1eddi n\u00f3i n\u00e0o?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nChi ti\u1ebft \u201cKh\u00e2u c\u1ea7n \u0111\u1ea7u t\u01b0 tr\u01b0\u1edbc ti\u00ean l\u00e0 con ng\u01b0\u1eddi.\u201d tr\u1ef1c ti\u1ebfp nh\u1ea5n m\u1ea1nh t\u1ea7m quan tr\u1ecdng c\u1ee7a con ng\u01b0\u1eddi trong qu\u00e1 tr\u00ecnh lao \u0111\u1ed9ng v\u00e0 s\u1ea3n xu\u1ea5t. Mu\u1ed1n t\u0103ng n\u0103ng su\u1ea5t lao \u0111\u1ed9ng, c\u1ea7n ph\u1ea3i \u0111\u1ea7u t\u01b0 v\u00e0o con ng\u01b0\u1eddi, t\u1ea1o \u0111i\u1ec1u ki\u1ec7n cho h\u1ecd ph\u00e1t huy t\u1ed1i \u0111a n\u0103ng l\u1ef1c c\u1ee7a m\u00ecnh.\n", "key": "D", "isVideo": true, "score": 0, "order": 9, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601917, "lessonId": 0, "a": "D\u00f2ng th\u1ee9 nh\u1ea5t.", "b": "D\u00f2ng th\u1ee9 hai.", "c": "D\u00f2ng th\u1ee9 ba.", "d": "D\u00f2ng th\u1ee9 t\u01b0.", "bookId": 1088586, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201cNh\u1eadp lung y\u1ebfu n\u1ea1p \u0111\u0103ng quang ph\u00ed,<br>Qu\u1ebf t\u1ec7 nh\u00e2n nh\u00e2n c\u00e1c l\u1ee5c nguy\u00ean.<br>B\u1ed9 nh\u1eadp m\u00f4ng lung u \u00e1m \u0111\u1ecba,<br>Quang minh tr\u00ec \u0111\u1eafc l\u1ee5c nguy\u00ean ti\u1ec1n!\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>\u0110\u0103ng quang ph\u00ed</i>)</div><i>\u201cV\u00e0o lao, theo l\u1ec7 ph\u1ea3i n\u1ed9p ti\u1ec1n \u0111\u00e8n,<br>Ti\u1ec1n Qu\u1ea3ng T\u00e2y, m\u1ed7i ng\u01b0\u1eddi l\u00e0 s\u00e1u \u0111\u1ed3ng.<br>B\u01b0\u1edbc v\u00e0o ch\u1ed7 t\u1ed1i t\u0103m m\u00f9 m\u1ecbt,<br>\u00c1nh s\u00e1ng kia \u0111\u00e1ng gi\u00e1 ti\u1ec1n s\u00e1u \u0111\u1ed3ng!\u201d</i><br><div style=\"text-align: right;\">(H\u1ed3 Ch\u00ed Minh, <i>Ti\u1ec1n \u0111\u00e8n</i>, theo <i>T\u1ed5ng t\u1eadp V\u0103n h\u1ecdc Vi\u1ec7t Nam, </i>t\u1eadp 38, NXB Khoa h\u1ecdc X\u00e3 h\u1ed9i, 2000)</div>Gi\u1ecdng \u0111i\u1ec7u m\u1ec9a mai, ch\u00e2m bi\u1ebfm \u0111\u01b0\u1ee3c th\u1ec3 hi\u1ec7n r\u00f5 n\u00e9t trong d\u00f2ng th\u01a1 n\u00e0o?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nD\u00f2ng th\u01a1 \u201c\u00c1nh s\u00e1ng kia \u0111\u00e1ng gi\u00e1 ti\u1ec1n s\u00e1u \u0111\u1ed3ng!\u201d th\u1ec3 hi\u1ec7n r\u00f5 n\u00e9t gi\u1ecdng \u0111i\u1ec7u m\u1ec9a mai, ch\u00e2m bi\u1ebfm c\u1ee7a H\u1ed3 Ch\u00ed Minh. T\u00e1c gi\u1ea3 t\u1ed1 c\u00e1o ch\u1ebf \u0111\u1ed9 nh\u00e0 t\u00f9 h\u00e0 kh\u1eafc, b\u1ea5t c\u00f4ng, n\u01a1i m\u00e0 ngay c\u1ea3 \u00e1nh s\u00e1ng c\u0169ng b\u1ecb mua b\u00e1n, trao \u0111\u1ed5i b\u1eb1ng ti\u1ec1n. C\u00e2u th\u01a1 v\u1eeba th\u1ec3 hi\u1ec7n s\u1ef1 ph\u1eabn n\u1ed9, v\u1eeba th\u1ec3 hi\u1ec7n s\u1ef1 x\u00f3t xa tr\u01b0\u1edbc th\u1ef1c tr\u1ea1ng x\u00e3 h\u1ed9i l\u00fac b\u1ea5y gi\u1edd.\n", "key": "D", "isVideo": true, "score": 0, "order": 10, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21601920, "lessonId": 0, "a": "Nguy\u00ean nh\u00e2n d\u1eabn \u0111\u1ebfn v\u0103n ho\u00e1 nh\u01b0\u1eddng.", "b": "H\u1ec7 lu\u1ef5 c\u1ee7a vi\u1ec7c \u0111\u00e1nh m\u1ea5t v\u0103n ho\u00e1 nh\u01b0\u1eddng.", "c": "Gi\u1ea3i ph\u00e1p tri\u1ec7t ti\u00eau, xo\u00e1 b\u1ecf v\u0103n ho\u00e1 nh\u01b0\u1eddng.", "d": "Th\u1ef1c tr\u1ea1ng v\u0103n ho\u00e1 nh\u01b0\u1eddng.", "bookId": 1088587, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "<i>\u201c\u0110\u00e1nh m\u1ea5t v\u0103n h\u00f3a nh\u01b0\u1eddng m\u00e0 bi\u1ec3u hi\u1ec7n h\u00e0ng ng\u00e0y l\u00e0 s\u1ef1 nh\u01b0\u1eddng nh\u1ecbn, l\u00e0 nguy c\u01a1 l\u1edbn nh\u1ea5t d\u1eabn \u0111\u1ebfn s\u1ef1 kh\u00f4 ki\u1ec7t t\u00ecnh ng\u01b0\u1eddi. N\u00f3 th\u00f4 t\u1ee5c h\u00f3a nh\u1eefng quan h\u1ec7 v\u1ed1n l\u00e0 thi\u00eang li\u00eang nh\u01b0 cha con, anh em, v\u1ee3 ch\u1ed3ng, b\u1eb1ng h\u1eefu, x\u00f3m gi\u1ec1ng... N\u00f3 l\u00e0m n\u1ea3y sinh nh\u1eefng v\u1ea5n \u0111\u1ec1 kh\u00f4ng th\u1ec3 hi\u1ec3u n\u1ed5i m\u00e0 b\u00e1o ch\u00ed \u0111\u0103ng t\u1ea3i h\u00e0ng ng\u00e0y: Cha con l\u00eca b\u1ecf nhau, anh em t\u1ea9m x\u0103ng \u0111\u1ed1t ch\u1ebft nhau v\u00ec chia t\u00e0i s\u1ea3n, h\u00e0ng x\u00f3m quan h\u1ec7 v\u1edbi nhau h\u01a1n k\u1ebb th\u00f9 ch\u1ec9 v\u00ec c\u00e1i r\u1eb7ng r\u00e0o, con ch\u00f3, con g\u00e0, hay v\u00ec m\u1ed9t c\u00e0nh c\u00e2y ch\u1eddm sang \u0111\u1ecba ph\u1eadn...\u201d</i><br><div style=\"text-align: right;\">(T\u1ea1 Duy Anh, <i>Nh\u01b0\u1eddng</i>, theo <i>baogiaothong.vn</i>)</div>Ch\u1ee7 \u0111\u1ec1 c\u1ee7a \u0111o\u1ea1n tr\u00edch tr\u00ean l\u00e0 g\u00ec?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\n\u0110o\u1ea1n tr\u00edch b\u00e0n v\u1ec1 nh\u1eefng h\u1eadu qu\u1ea3 ti\u00eau c\u1ef1c c\u1ee7a vi\u1ec7c \u0111\u00e1nh m\u1ea5t v\u0103n h\u00f3a nh\u01b0\u1eddng nh\u1ecbn trong x\u00e3 h\u1ed9i hi\u1ec7n \u0111\u ormalizedType": "0"}, {"questionId": 21601951, "lessonId": 0, "a": "C\u00f3 l\u1ebd anh kh\u00f4ng kho\u00e1c l\u00e1c \u0111\u00e2u, ch\u00ednh trong b\u1ecdn ch\u00fang t\u00f4i, \u00edt ng\u01b0\u1eddi \u0111\u00e3 tho\u00e1t kh\u1ecfi s\u1ee9c h\u00fat c\u1ee7a c\u00e1i duy\u00ean th\u1ea7m k\u00edn \u1ea5y.", "b": "C\u00f3 l\u1ebd anh kh\u00f4ng kho\u00e1c l\u00e1c \u0111\u00e2u, v\u00ec ch\u00ednh trong b\u1ecdn ch\u00fang t\u00f4i, \u00edt ng\u01b0\u1eddi \u0111\u00e3 tho\u00e1t kh\u1ecfi s\u1ee9c h\u00fat c\u1ee7a c\u00e1i duy\u00ean th\u1ea7m k\u00edn \u1ea5y.", "c": "C\u00f3 l\u1ebd anh kh\u00f4ng kho\u00e1c l\u00e1c \u0111\u00e2u, b\u1edfi ch\u00ednh trong b\u1ecdn ch\u00fang t\u00f4i, \u00edt ng\u01b0\u1eddi \u0111\u00e3 tho\u00e1t kh\u1ecfi s\u1ee9c h\u00fat c\u1ee7a c\u00e1i duy\u00ean th\u1ea7m k\u00edn \u1ea5y.", "d": "C\u00f3 l\u1ebd anh kh\u00f4ng kho\u00e1c l\u00e1c \u0111\u00e2u, gi\u1ea3 th\u1eed b\u1ecdn ch\u00fang t\u00f4i, \u00edt ng\u01b0\u1eddi \u0111\u00e3 tho\u00e1t kh\u1ecfi s\u1ee9c h\u00fat c\u1ee7a c\u00e1i duy\u00ean th\u1ea7m k\u00edn \u1ea5y.", "bookId": 1088596, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Ch\u1ec9 ra c\u00e2u sai trong c\u00e1c c\u00e2u sau:", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nC\u00e2u \u201cC\u00f3 l\u1ebd anh kh\u00f4ng kho\u00e1c l\u00e1c \u0111\u00e2u, gi\u1ea3 th\u1eed b\u1ecdn ch\u00fang t\u00f4i, \u00edt ng\u01b0\u1eddi \u0111\u00e3 tho\u00e1t kh\u1ecfi s\u1ee9c h\u00fat c\u1ee7a c\u00e1i duy\u00ean th\u1ea7m k\u00edn \u1ea5y.\u201d d\u00f9ng sai t\u1eeb \u201cgi\u1ea3 th\u1eed\u201d. \u201cGi\u1ea3 th\u1eed\u201d th\u01b0\u1eddng \u0111\u01b0\u1ee3c d\u00f9ng \u0111\u1ec3 \u0111\u01b0a ra m\u1ed9t gi\u1ea3 \u0111\u1ecbnh, m\u1ed9t t\u00ecnh hu\u1ed1ng ch\u01b0a x\u1ea3y ra. Trong ng\u1eef c\u1ea3nh n\u00e0y, c\u00e2u v\u0103n \u0111ang n\u00f3i v\u1ec1 m\u1ed9t s\u1ef1 vi\u1ec7c \u0111\u00e3 x\u1ea3y ra, v\u00ec th\u1ebf t\u1eeb \u201cgi\u1ea3 th\u1eed\u201d kh\u00f4ng ch\u00ednh x\u00e1c.\n", "key": "D", "isVideo": true, "score": 0, "order": 20, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 21 \u0111\u1ebfn 25", "content": "\u201cDa \u0111ang tr\u1edf th\u00e0nh m\u1ed9t v\u1ea5n \u0111\u1ec1 v\u00ec m\u1ed9t s\u1ed1 ng\u01b0\u1eddi kh\u00f4ng th\u00edch d\u00f9ng da \u0111\u1ed9ng v\u1eadt ho\u1eb7c da t\u1ed5ng h\u1ee3p t\u1eeb d\u1ea7u th\u00f4. Ng\u00e0nh c\u00f4ng nghi\u1ec7p da kh\u1ed5ng l\u1ed3 c\u0169ng l\u00e0 m\u1ed9t trong nh\u1eefng t\u00e1c nh\u00e2n t\u1ed3i t\u1ec7 v\u1edbi m\u00f4i tr\u01b0\u1eddng - b\u1edfi ch\u00fang c\u1ea7n ch\u0103n nu\u00f4i gia s\u00fac tr\u00ean quy m\u00f4 l\u1edbn, c\u00f3 th\u1ec3 d\u1eabn \u0111\u1ebfn n\u1ea1n ph\u00e1 r\u1eebng v\u00e0 ph\u00e1t th\u1ea3i kh\u00ed metan. Qu\u00e1 tr\u00ecnh thu\u1ed9c da c\u0169ng c\u1ea7n s\u1eed d\u1ee5ng t\u1edbi nhi\u1ec1u lo\u1ea1i h\u00f3a ch\u1ea5t \u0111\u1ed9c h\u1ea1i.<br>Nh\u01b0ng b\u00e2y gi\u1edd \u0111\u00e3 c\u00f3 nh\u1eefng lo\u1ea1i da th\u00e2n thi\u1ec7n v\u1edbi m\u00f4i tr\u01b0\u1eddng l\u00e0m t\u1eeb ch\u1ea5t th\u1ea3i n\u00f4ng nghi\u1ec7p. Mycotech Lab (MYCL), c\u00f4ng ty kh\u1edfi nghi\u1ec7p c\u00f4ng ngh\u1ec7 sinh h\u1ecdc c\u00f3 tr\u1ee5 s\u1edf t\u1ea1i Bandung, Indonesia \u0111\u00e3 t\u1ea1o ra m\u1ed9t lo\u1ea1i v\u1eadt li\u1ec7u t\u00ean l\u00e0 <i>Mylea</i>, \u0111\u01b0\u1ee3c h\u00ecnh th\u00e0nh t\u1eeb s\u1ee3i n\u1ea5m (mycelium) - t\u1ee9c ph\u1ea7n r\u1ec5 sinh tr\u01b0\u1edfng c\u1ee7a n\u1ea5m - v\u1edbi \u0111\u1ed9 b\u1ec1n, dai v\u00e0 c\u00f3 th\u1ec3 \u0111i\u1ec1u ch\u1ec9nh \u0111\u1ed9 nh\u00e1m b\u1ec1 m\u1eb7t h\u1ec7t nh\u01b0 c\u00e1c lo\u1ea1i v\u1eadt li\u1ec7u da t\u1ed5ng h\u1ee3p kh\u00e1c.<br>\u201cCh\u00fang c\u00f3 kh\u1ea3 n\u0103ng ch\u1ed1ng m\u00e0i m\u00f2n \u0111\u1ea1t \u0111\u1ebfn 50.000 chu k\u00ec, trong khi [da] th\u00f4ng th\u01b0\u1eddng ch\u1ec9 c\u1ea7n l\u00e0 10.000; v\u00e0 kh\u1ea3 n\u0103ng ch\u1ed1ng g\u1ea5p \u0111\u1ea1t \u0111\u1ebfn 100.000 chu k\u00ec. V\u00ec v\u1eady, khi x\u00e9t v\u1ec1 th\u1ea9m m\u0129, hi\u1ec7u su\u1ea5t v\u00e0 t\u00ednh b\u1ec1n v\u1eefng, <i>Mylea </i>\u0111\u00e1p \u1ee9ng t\u1ea5t c\u1ea3 c\u00e1c ti\u00eau ch\u00ed m\u00e0 c\u00e1c th\u01b0\u01a1ng hi\u1ec7u \u0111ang t\u00ecm ki\u1ebfm\u201d, Adi Reza Nugroho, k\u0129 s\u01b0 sinh h\u1ecdc ph\u00e2n t\u1eed v\u00e0 l\u00e0 \u0111\u1ed3ng s\u00e1ng l\u1eadp c\u1ee7a MYCL n\u00f3i v\u1edbi <i>AFN</i> n\u0103m ngo\u00e1i. Theo anh, v\u1eadt li\u1ec7u da n\u1ea5m n\u00e0y c\u00f3 th\u1ec3 s\u1eed d\u1ee5ng l\u00e0m qu\u1ea7n \u00e1o, t\u00fai x\u00e1ch, gi\u00e0y d\u00e9p, d\u00e2y \u0111eo \u0111\u1ed3ng h\u1ed3, \u1ed1p \u0111i\u1ec7n tho\u1ea1i, b\u1ecdc gh\u1ebf sa-l\u00f4ng v.v v\u00e0 nhi\u1ec1u \u1ee9ng d\u1ee5ng kh\u00e1c.<br>K\u1ec3 t\u1eeb khi th\u00e0nh l\u1eadp v\u00e0o n\u0103m 2015, MYCL \u0111\u00e3 kh\u00f4ng ng\u1eebng c\u1ea3i thi\u1ec7n c\u00f4ng ngh\u1ec7 s\u1ee3i n\u1ea5m, t\u1ea1o ra v\u00f4 s\u1ed1 s\u1ea3n ph\u1ea9m d\u1ef1a tr\u00ean v\u1ea3i da \u0111\u01b0\u1ee3c \u201cnu\u00f4i tr\u1ed3ng\u201d. MYCL ph\u00e1t tri\u1ec3n s\u1ee3i n\u1ea5m trong c\u00e1c ph\u00f2ng th\u00ed nghi\u1ec7m nh\u1ecf, g\u1ea7n c\u00e1c ngu\u1ed3n ch\u1ea5t th\u1ea3i n\u00f4ng nghi\u1ec7p. H\u1ecd t\u1eadn d\u1ee5ng b\u00e3 th\u1eeba t\u1eeb c\u00e1c \u0111\u1ed3n \u0111i\u1ec1n d\u1ea7u c\u1ecd l\u00e0m gi\u00e1 th\u1ec3 \u0111\u1ec3 t\u0103ng th\u00eam l\u1ee3i \u00edch l\u00e0 ng\u0103n c\u00e1c ch\u1ea5t th\u1ea3i n\u00e0y b\u1ecb \u0111\u1ed1t ch\u00e1y v\u00e0 g\u00e2y \u00f4 nhi\u1ec5m.<br>C\u00e1c gi\u00e1 th\u1ec3 n\u00e0y cung c\u1ea5p ch\u1ea5t dinh d\u01b0\u1ee1ng cho s\u1ee3i n\u1ea5m m\u00e0 MYCL \u0111\u01b0a v\u00e0o \u0111\u00f3. S\u1ee3i n\u1ea5m s\u1ebd ph\u00e1t tri\u1ec3n v\u00e0 x\u00e2m chi\u1ebfm ho\u00e0n to\u00e0n gi\u00e1 th\u1ec3 trong kho\u1ea3ng hai tu\u1ea7n. \u0110\u1ec3 t\u1ea1o ra v\u1eadt li\u1ec7u <i>Mylea</i>, h\u1ecd \u0111\u1ec3 n\u00f3 ph\u00e1t tri\u1ec3n trong kho\u1ea3ng n\u0103m \u0111\u1ebfn s\u00e1u tu\u1ea7n. Qu\u00e1 tr\u00ecnh t\u1ea1o <i>Mylea </i>kh\u00f4ng ph\u1ee9c t\u1ea1p l\u1eafm. Tuy nhi\u00ean, vi\u1ec7c tinh ch\u1ec9nh th\u00e0nh ph\u1ea7n gi\u00e1 th\u1ec3 v\u00e0 \u0111i\u1ec1u ki\u1ec7n ph\u00e1t tri\u1ec3n, nh\u01b0 v\u1ec7 sinh, nhi\u1ec7t \u0111\u1ed9, \u0111\u1ed9 \u1ea9m v\u00e0 \u00e1nh s\u00e1ng, l\u00e0 \u0111i\u1ec1u c\u1ea7n thi\u1ebft. Ngh\u0129a l\u00e0 \u0111\u1ed1i v\u1edbi m\u1ed7i quy tr\u00ecnh s\u1ea3n xu\u1ea5t, c\u1ea7n c\u00f3 m\u1ed9t c\u00f4ng th\u1ee9c c\u1ee5 th\u1ec3 \u0111\u1ec3 \u0111\u1ea3m b\u1ea3o ch\u1ea5t l\u01b0\u1ee3ng c\u1ee7a <i>Mylea </i>l\u00e0 nh\u1ea5t qu\u00e1n.\u201d<br><div style=\"text-align: right;\">(Ng\u00f4 Th\u00e0nh, <i>Gi\u1ea3i ph\u00e1p ph\u00e1t tri\u1ec3n v\u1eadt li\u1ec7u da l\u00e0m t\u1eeb s\u1ee3i n\u1ea5m tr\u1ed3ng tr\u00ean ch\u1ea5t th\u1ea3i n\u00f4ng nghi\u1ec7p</i>, theo<i> tiasang.com.vn</i>)</div>", "listQuestion": [{"questionId": 21601962, "lessonId": 0, "a": "V\u00ec ch\u00fang \u0111\u1eaft \u0111\u1ecf.", "b": "V\u00ec ch\u00fang g\u00f3p ph\u1ea7n l\u00e0m \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn m\u00f4i tr\u01b0\u1eddng t\u1ef1 nhi\u00ean.", "c": "V\u00ec ch\u00fang kh\u00f3 ki\u1ebfm.", "d": "V\u00ec ch\u00fang r\u1ebb ti\u1ec1n.", "bookId": 1088597, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Theo \u0111o\u1ea1n tr\u00edch, v\u00ec sao m\u1ed9t s\u1ed1 ng\u01b0\u1eddi kh\u00f4ng th\u00edch d\u00f9ng da \u0111\u1ed9ng v\u1eadt ho\u1eb7c da t\u1ed5ng h\u1ee3p t\u1eeb d\u1ea7u th\u00f4?", "answer": "<b>Gi\u1ea3i th\u00edch chi ti\u1ebft:</b><br>\nD\u1ef1a v\u00e0o th\u00f4ng tin trong \u0111o\u1ea1n: \u201cDa \u0111ang tr\u1edf th\u00e0nh m\u                                 const isTrue = plan.key == "1"; // Dap an he thong
                                const userChoice = userObj[pIdx]; // true/false/undefined
                                
                                let trClass = "bg-white border-b hover:bg-gray-50";
                                let btnTrueClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                let btnFalseClass = "w-6 h-6 rounded border flex items-center justify-center cursor-pointer hover:bg-gray-200";
                                
                                if(userChoice === true) btnTrueClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";
                                if(userChoice === false) btnFalseClass = "w-6 h-6 rounded bg-blue-500 text-white border-blue-600 flex items-center justify-center font-bold";

                                // Logic mau sac
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) {
                                        trClass = "bg-green-50 border-b border-green-200"; // Row dung
                                    } else {
                                        trClass = "bg-red-50 border-b border-red-200"; // Row sai
                                    }
                                }

                                html += `<tr class="${trClass}">
                                    <td class="px-4 py-3 font-bold text-center">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-4 py-3 text-gray-800">${plan.content}</td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="mx-auto ${btnTrueClass}">Đ</div>
                                    </td>
                                    <td class="px-4 py-3 text-center">
                                        <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="mx-auto ${btnFalseClass}">S</div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                    }

                    html += `</div>`; // End Interaction

                    // === SOLUTION (Hidden until submitted or practice & answered) ===
                    if(q.answer && (isSubmitted || (examMode === 'practice' && userAnswers[qKey]))) {
                         html += `
                         <div class="mt-4 pt-4 border-t border-dashed border-gray-300">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>
                         `;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            // Re-render only this card? No, re-render specific parts or whole logic. 
            // For simplicity in this vanilla JS version, we re-render full exam to update UI states.
            // In React/Vue we would bind state. Here we cheat by re-rendering.
            // Optimization: Only re-render if mode is practice (to show instant feedback)
            if(examMode === 'practice') {
                 renderExam(false);
                 // Restore focus for text inputs
                 if(type === '1') setTimeout(() => document.querySelector(`input[onblur*="${qKey}"]`)?.focus(), 50);
            } else {
                // In Exam mode, just visual update selection without full re-render (optional optimization)
                renderExam(false);
            }
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false);
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            if(btnD) {
                btnD.className = "p-2 rounded text-center text-sm font-bold border transition-colors bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
