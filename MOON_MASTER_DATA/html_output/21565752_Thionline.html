>+</sup> + OH<sup>\u2013</sup>.<br><img src=\"https://asset.moon.vn/img/chat/large/2025/4/e6d2bea7-c190-4e6b-a679-63b1b2c88c51.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br>Ph\u00e1t bi\u1ec3u n\u00e0o sau \u0111\u00e2y <b>kh\u00f4ng </b>\u0111\u00fang?<br><b>A.</b> Ph\u1ea3n \u1ee9ng d\u1eabn xu\u1ea5t halogen b\u1eadc 1 t\u00e1c d\u1ee5ng NaOH l\u00e0 ph\u1ea3n \u1ee9ng th\u1ebf.<br><b>B. </b>T\u00e1c nh\u00e2n OH<sup>\u2013</sup> s\u1ebd c\u1ed9ng v\u00e0o C c\u00f3 m\u1eadt \u0111\u1ed9 \u0111i\u1ec7n t\u00edch d\u01b0\u01a1ng cao nh\u1ea5t.<br><b>C. </b>Tr\u1ea1ng th\u00e1i chuy\u1ec3n ti\u1ebfp c\u00f3 s\u1ef1 t\u1ea1o th\u00e0nh 5 li\u00ean k\u1ebft \u03c3.<br><b>D.</b> Tr\u01b0\u1edbc v\u00e0 sau ph\u1ea3n \u1ee9ng, h\u00f3a tr\u1ecb c\u1ee7a nguy\u00ean t\u1eed C kh\u00f4ng thay \u0111\u1ed5i.<br></span><div style=\"text-align: left;\"><b><font color=\"#304ffe\">\u2192 ID video ch\u1eefa c\u00e2u h\u1ecfi: [706014].</font></b></div><br><br>[<b><font color=\"#d50000\">\u0110\u1ec1 11 - Cu\u1ed1n 25 \u0110\u1ec1 V-ACT</font></b>] Trong c\u00e1c ph\u00e1t bi\u1ec3u sau:<br>(a) Trong giai \u0111o\u1ea1n 1, c\u00f3 s\u1ef1 ph\u00e1 v\u1ee1 li\u00ean k\u1ebft \u03c0.<br>(b) Trong giai \u0111o\u1ea1n 2, s\u1ed1 li\u00ean k\u1ebft \u03c3 t\u0103ng th\u00eam 1.<br>(c) Trong giai \u0111o\u1ea1n 3, ph\u00e2n t\u1eed ethanol t\u1ea1o th\u00e0nh c\u00f3 6 li\u00ean k\u1ebft \u03c3.<br>(d) Sau ph\u1ea3n \u1ee9ng, m\u1ed9t nguy\u00ean t\u1eed C trong n\u1ed1i \u0111\u00f4i nh\u1eadn m\u1ed9t nguy\u00ean t\u1eed H v\u00e0 nguy\u00ean t\u1eed C c\u00f2n l\u1ea1i s\u1ebd nh\u1eadn m\u1ed9t nh\u00f3m OH. <br>S\u1ed1 ph\u00e1t bi\u1ec3u \u0111\u00fang l\u00e0<br><b>A. </b>1.\t<br><b>B.</b> 2.\t<br><b>C.</b> 3.\t<br><b>D. </b>4.<br><b><font color=\"#304ffe\">\u2192 ID video ch\u1eefa c\u00e2u h\u1ecfi: [842459].</font></b><span></span>", "answer": "[<b><font color=\"#d50000\">Gi\u1ea3i&nbsp;\u0110\u1ec1 42 - Cu\u1ed1n 50 \u0110\u1ec1 Minh ho\u1ea1 2025</font></b>]<br><b>Ph\u00e2n t\u00edch c\u00e1c \u0111\u00e1p \u00e1n:&nbsp;</b><br>\u2714\ufe0f\u0110\u00fang. A.&nbsp;Ph\u1ea3n \u1ee9ng d\u1eabn xu\u1ea5t halogen b\u1eadc 1 t\u00e1c d\u1ee5ng NaOH l\u00e0 ph\u1ea3n \u1ee9ng th\u1ebf. Ph\u1ea3n \u1ee9ng th\u1ebf x\u1ea3y ra theo c\u01a1 ch\u1ebf S<sub>N</sub>2 \u1edf \u0111\u00e2y Cl \u0111\u00e3 b\u1ecb th\u1ebf b\u1edfi l\u01b0\u1ee1ng ph\u00e2n t\u1eed OH<sup>-</sup>.&nbsp;<br>\u2714\ufe0f\u0110\u00fang. B.&nbsp;T\u00e1c nh\u00e2n OH<sup style=\"\">\u2013</sup>&nbsp;s\u1ebd c\u1ed9ng v\u00e0o C c\u00f3 m\u1eadt \u0111\u1ed9 \u0111i\u1ec7n t\u00edch d\u01b0\u01a1ng cao nh\u1ea5t.<br>\u274cSai. C.&nbsp;Tr\u1ea1ng th\u00e1i chuy\u1ec3n ti\u1ebfp c\u00f3 s\u1ef1 t\u1ea1o th\u00e0nh 2 li\u00ean k\u1ebft \u03c3 gi\u1eefa C-O v\u00e0 O-H.<br>\u2714\ufe0f\u0110\u00fang. D.<b>&nbsp;</b>Tr\u01b0\u1edbc v\u00e0 sau ph\u1ea3n \u1ee9ng, h\u00f3a tr\u1ecb c\u1ee7a nguy\u00ean t\u1eed C kh\u00f4ng thay \u0111\u1ed5i. Trong c\u00e1c h\u1ee3p ch\u1ea5t h\u1eefu c\u01a1 C c\u00f3 4 li\u00ean k\u1ebft v\u00ec C c\u00f3 h\u00f3a tr\u1ecb IV ngo\u00e0i li\u00ean k\u1ebft v\u1edbi c\u00e1c nguy\u00ean t\u1eed kh\u00e1c C c\u00f2n c\u00f3 th\u1ec3 t\u1ef1 li\u00ean k\u1ebft v\u1edbi nhau \u0111\u1ec3 t\u1ea1o th\u00e0nh li\u00ean k\u1ebft carbon.<br><b><font color=\"#d50000\">\u27f9 Ch\u1ecdn \u0111\u00e1p \u00e1n C<br></font></b><br><br>[<b><font color=\"#d50000\">Gi\u1ea3i&nbsp;</font></b><b><font color=\"#d50000\">\u0110\u1ec1 11 - Cu\u1ed1n 25 \u0110\u1ec1 V-ACT</font></b>]<br><b>Ph\u00e2n t\u00edch c\u00e1c ph\u00e1t bi\u1ec3u:</b><br>(a) \u0110\u00fang. Trong giai \u0111o\u1ea1n 1, c\u00f3 s\u1ef1 ph\u00e1 v\u1ee1 li\u00ean k\u1ebft \u03c0 trong li\u00ean k\u1ebft \u0111\u00f4i C=C.<br>Giai \u0111o\u1ea1n 1: Qu\u00e1 tr\u00ecnh proton h\u00f3a li\u00ean k\u1ebft \u0111\u00f4i C=C c\u1ee7a ethylene th\u00e0nh carbocation:<br><img src=\"https://asset.moon.vn/img/chat/large/2025/2/3ac74b61-7423-4993-a24e-86671e6b3a91.jpg\" data-fi eo c\u01a1 ch\u1ebf S<sub>N</sub>1 l\u00e0 ch\u1ee7 y\u1ebfu<br>(CH<sub>3</sub>)<sub>3</sub>C\u2013Cl + NaOH \u27f6 (CH<sub>3</sub>)<sub>3</sub>C\u2013OH + NaCl<br>C\u01a1 ch\u1ebf c\u1ee7a ph\u1ea3n \u1ee9ng nh\u01b0 sau: NaOH \u27f6 Na<sup>+</sup> + OH<sup>\u2013</sup>.<br><img src=\"https://asset.moon.vn/img/chat/large/2025/4/e662607b-1fe4-49be-8252-0339eb358dc7.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br>Ph\u00e1t bi\u1ec3u n\u00e0o sau \u0111\u00e2y<b> kh\u00f4ng </b>\u0111\u00fang?<br><b>A. </b>Cl c\u00f3 \u0111\u1ed9 \u00e2m \u0111i\u1ec7n l\u1edbn n\u00ean s\u1ebd h\u00fat c\u1eb7p electron tr\u00ean li\u00ean k\u1ebft C\u2013Cl.<br><b>B. </b>Giai \u0111o\u1ea1n 1 x\u1ea3y ra qu\u00e1 tr\u00ecnh m\u1ea5t m\u1ed9t li\u00ean k\u1ebft \u03c3.<br><b>C. </b>Ion OH<sup>\u2013</sup> s\u1ebd c\u1ed9ng v\u00e0o carbon n\u0103\u0300m gi\u01b0\u0303a ba nh\u00f3m CH<sub>3</sub>.<br><b>D.</b> Tr\u01b0\u1edbc v\u00e0 sau ph\u1ea3n \u1ee9ng, t\u1ed5ng s\u1ed1 li\u00ean k\u1ebft \u03c3 trong h\u1ee3p ch\u1ea5t h\u1eefu c\u01a1 kh\u00f4ng \u0111\u1ed5i.<br><b><font color=\"#304ffe\">\u2192 ID video ch\u1eefa c\u00e2u h\u1ecfi: [706015].</font></b><br><br><br>[<b><font color=\"#d50000\">\u0110\u1ec1 11 - Cu\u1ed1n 25 \u0110\u1ec1 V-ACT</font></b>]&nbsp;Trong giai \u0111o\u1ea1n 3, t\u1ea1i sao qu\u00e1 tr\u00ecnh t\u00e1ch H<sup>+</sup> c\u00f2n \u0111\u01b0\u1ee3c g\u1ecdi l\u00e0 t\u00e1ch proton?<br><b>A.</b> V\u00ec ion H<sup>+</sup> kh\u00f4ng ch\u1ee9a electron v\u00e0 ch\u1ec9 c\u00f3 proton.<br><b>B.</b> V\u00ec ion H<sup>+</sup> kh\u00f4ng ch\u1ee9a proton v\u00e0 ch\u1ec9 c\u00f3 electron.<br><b>C. </b>V\u00ec h\u1ea1t nh\u00e2n nguy\u00ean t\u1eed O m\u1ea5t proton trong qu\u00e1 tr\u00ecnh t\u00e1ch H<sup>+</sup>.<br><b>D. </b>V\u00ec li\u00ean k\u1ebft \u03c3 b\u1ecb c\u1eaft \u0111\u1ee9t s\u1ebd h\u00ecnh th\u00e0nh th\u00eam h\u1ea1t proton cho ion H<sup>+</sup>.<br><b><font color=\"#304ffe\">\u2192 ID video ch\u1eefa c\u00e2u h\u1ecfi: [842460].</font></b>", "answer": "[<b><font color=\"#d50000\">Gi\u1ea3i&nbsp;\u0110\u1ec1 42 - Cu\u1ed1n 50 \u0110\u1ec1 Minh ho\u1ea1 2025</font></b>]<br><b>Ph\u00e2n t\u00edch c\u00e1c \u0111\u00e1p \u00e1n:&nbsp;</b><br>\u2714\ufe0f\u0110\u00fang. A. Cl c\u00f3 \u0111\u1ed9 \u00e2m \u0111i\u1ec7n l\u1edbn n\u00ean s\u1ebd h\u00fat electron d\u00f9ng chung \u1edf tr\u00ean li\u00ean k\u1ebft C-Cl v\u1ec1 ph\u00eda n\u00f3 l\u00e0m cho li\u00ean k\u1ebft C-Cl ph\u00e2n c\u1ef1c gi\u00fap C d\u1ec5 d\u00e0ng m\u1ea5t \u0111i Cl- \u0111\u1ec3 t\u1ea1o th\u00e0nh carboncation.&nbsp;<br>\u2714\ufe0f\u0110\u00fang. B. Giai \u0111o\u1ea1n 1 l\u00e0 qu\u00e1 tr\u00ecnh c\u1eaft \u0111\u1ee9t li\u00ean k\u1ebft C-Cl m\u00e0 li\u00ean k\u1ebft C-Cl l\u00e0 li\u00ean k\u1ebft \u0111\u01a1n n\u00f3 l\u00e0 m\u1ed9t li\u00ean k\u1ebft&nbsp;\u03c3. Giai \u0111o\u1ea1n 1 x\u1ea3y ra qu\u00e1 tr\u00ecnh m\u1ea5t m\u1ed9t li\u00ean k\u1ebft \u03c3.<br>\u2714\ufe0f\u0110\u00fang. C.&nbsp;Ion OH<sup style=\"\">\u2013</sup>&nbsp;s\u1ebd c\u1ed9ng v\u00e0o carbon n\u0103\u0300m gi\u01b0\u0303a&nbsp;ba nh\u00f3m CH<sub>3</sub> ch\u00ednh l\u00e0 carbon mang \u0111i\u1ec7n t\u00edch d\u01b0\u01a1ng \u0111\u1ec3 t\u00e1i t\u1ea1o l\u1ea1i s\u1ea3n ph\u1ea9m t\u1ea1o th\u00e0nh (CH<sub>3</sub>)<sub>3</sub>C-OH.<br>\u274cSai. D. B\u1ea3n ch\u1ea5t c\u1ee7a ph\u1ea3n \u1ee9ng tr\u00ean l\u00e0 c\u1eaft \u0111\u1ee9t li\u00ean k\u1ebft C-Cl v\u00e0 th\u1ebf li\u00ean k\u1ebft C-OH. Khi c\u1eaft \u0111\u1ee9t li\u00ean k\u1ebft C-Cl l\u00e0 c\u1eaft \u0111\u1ee9t 1 li\u00ean k\u1ebft \u03c3 khi th\u1ebf li\u00ean k\u1ebft C-OH v\u00e0o th\u00ec c\u00f3 th\u00eam 2 li\u00ean k\u1ebft \u03c3 . V\u1eady tr\u01b0\u1edbc v\u00e0 sau ph\u1ea3n \u1ee9ng s\u1ebd c\u00f3 nhi\u1ec1u h\u01a1n 1 li\u00ean k\u1ebft \u03c3.<br><b><font color=\"#d50000\">\u27f9 Ch\u1ecdn \u0111\u00e1p \u00e1n D</font></b><br><br><br>[<b><font color=\"#d50000\">Gi\u1ea3i&nbsp;</font></b><b><font color=\"#d50000\">\u0110 111\u1ed1i x\u1ee9ng nh\u01b0 propene CH<sub>2</sub>=CH\u2013CH<sub>3</sub> c\u1ed9ng H<sub>2</sub>O th\u00ec ph\u1ea3n \u1ee9ng s\u1ebd t\u1ea1o th\u00e0nh hai s\u1ea3n ph\u1ea9m kh\u00e1c nhau:<br><img src=\"https://asset.moon.vn/img/chat/large/2025/4/324cb802-a680-449d-8387-80dcf121625b.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br>Trong c\u01a1 ch\u1ebf c\u1ee7a ph\u1ea3n \u1ee9ng, s\u1ea3n ph\u1ea9m propan-2-ol (h\u01b0\u1edbng 1) \u0111\u01b0\u1ee3c t\u1ea1o ra do h\u00ecnh th\u00e0nh carbocation n\u00e0o sau \u0111\u00e2y?<br><img src=\"https://asset.moon.vn/img/chat/large/2025/4/bf4ccdd4-b838-4c5e-bb43-6d4bc7643921.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br><b><font color=\"#304ffe\">\u2192 ID video ch\u1eefa c\u00e2u h\u1ecfi: [842464].</font></b>", "answer": "[<b><font color=\"#d50000\">Gi\u1ea3i&nbsp;\u0110\u1ec1 42 - Cu\u1ed1n 50 \u0110\u1ec1 Minh ho\u1ea1 2025</font></b>]<br>C\u00e1c d\u1eabn xu\u1ea5t c\u00f3 halogen b\u1eadc 1 s\u1ebd x\u1ea3y ra theo c\u01a1 ch\u1ebf S<sub>N</sub>2.<br>C\u00e1c d\u1eabn xu\u1ea5t c\u00f3 halogen b\u1eadc 3 s\u1ebd x\u1ea3y ra theo c\u01a1 ch\u1ebf S<sub>N</sub>1.<br>C\u00e1c d\u1eabn xu\u1ea5t c\u00f3 halogen b\u1eadc 2 s\u1ebd x\u1ea3y ra theo c\u01a1 ch\u1ebf S<sub>N</sub>1 ho\u1eb7c S<sub>N</sub>2.&nbsp;<br>- B\u1eadc Halogen l\u00e0 b\u1eadc c\u1ee7a nguy\u00ean t\u1eed Carbon li\u00ean k\u1ebft v\u1edbi nguy\u00ean t\u1eed halogen.&nbsp;<br><b>Ph\u00e2n t\u00edch c\u00e1c \u0111\u00e1p \u00e1n:&nbsp;</b><br>\u274cSai. A.&nbsp; Halogen b\u1eadc 1\u27f6 d\u1eabn xu\u1ea5t halogen b\u1eadc 1 x\u1ea3y ra theo c\u01a1 ch\u1ebf S<sub>N</sub>2.&nbsp;<br>\u274cSai. B. Halogen b\u1eadc 1\u27f6 d\u1eabn xu\u1ea5t halogen b\u1eadc 1 x\u1ea3y ra theo c\u01a1 ch\u1ebf S<sub>N</sub>2.&nbsp;<br>\u2714\ufe0f\u0110\u00fang. C. Halogen b\u1eadc 3 \u27f6 d\u1eabn xu\u1ea5t halogen b\u1eadc 3 x\u1ea3y ra theo c\u01a1 ch\u1ebf S<sub>N</sub>1.&nbsp;<br>\u2714\ufe0f\u0110\u00fang. D. Halogen b\u1eadc 3 \u27f6 d\u1eabn xu\u1ea5t halogen b\u1eadc 3&nbsp; x\u1ea3y ra theo c\u01a1 ch\u1ebf S<sub>N</sub>1.&nbsp;<br>C\u00e1c halogen b\u1eadc 3 x\u1ea3y ra theo c\u01a1 ch\u1ebf SN1 s\u1ebd ph\u1ea3n \u1ee9ng v\u1edbi NaOH .&nbsp;<br>C\u00f3 2 ph\u00e1t bi\u1ec3u \u0111\u00fang.&nbsp;<br><b><font color=\"#d50000\">\u27f9 Ch\u1ecdn \u0111\u00e1p \u00e1n B</font></b><br><br><br><br>[<b><font color=\"#d50000\">Gi\u1ea3i&nbsp;</font></b><b><font color=\"#d50000\">\u0110\u1ec1 11 - Cu\u1ed1n 25 \u0110\u1ec1 V-ACT</font></b>]<br>Li\u00ean k\u1ebft \u0111\u00f4i trong propene t\u1ea5n c\u00f4ng H<sup>+</sup>, t\u1ea1o ra carbocation. <br>Theo quy t\u1eafc Markovnikov, H<sup>+</sup> s\u1ebd \u01b0u ti\u00ean c\u1ed9ng v\u00e0o carbon c\u00f3 nhi\u1ec1u hydrogen h\u01a1n (C1), d\u1eabn \u0111\u1ebfn h\u00ecnh th\u00e0nh carbocation b\u1eadc cao h\u01a1n (b\u1eadc 2) \u1edf C2.<br>Khi H<sup>+</sup> t\u1ea5n c\u00f4ng v\u00e0o C1 c\u1ee7a propene, carbocation b\u1eadc 2 (CH<sub>3</sub>C<sup>+</sup>HCH<sub>3</sub>) s\u1ebd h\u00ecnh th\u00e0nh t\u1ea1i C2:<br><img src=\"https://asset.moon.vn/img/chat/large/2025/2/391fc0d5-3ddb-404c-b3b5-10c1a0c13648.jpg\" data-filename=\"\" style=\"max-width: 600px; height: auto;\"><br><b><font color=\"#d50000\">\u21d2 Ch\u1ecdn \u0111\u00e1p \u00e1n A&nbsp;</font></b>", "key": "A", "isVideo": true, "score": 0, "order": 105, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 106 \u0111\u1ebfn 108", "content": "M\u00e1y ph\u00e1t \u0111i\u1ec7n ch\u1ea1y b\u1eb1ng n\u0103ng l\u01b0\u1ee3ng s\u00f3ng bi\u1ec3n l\u00e0 m\u1ed9t lo\u1ea1i c\u00f4ng ngh\u1ec7 n\u0103ng l\u01b0\u1ee3ng t\u00e1i t\u1ea1o t\u1eadn d\u1ee5ng n\u0103ng l\u01b0\u1ee3ng t\u1eeb s\u00f3ng bi\u1ec3n \u0111\u1ec3 t\u1ea lse, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21588020, "lessonId": 0, "a": "T\u0103ng s\u1ea3n l\u01b0\u1ee3ng b\u1eb1ng m\u1ecdi gi\u00e1, k\u1ec3 c\u1ea3 khai th\u00e1c qu\u00e1 m\u1ee9c ngu\u1ed3n l\u1ee3i bi\u1ec3n.", "b": "T\u1eadp trung ph\u00e1t tri\u1ec3n nu\u00f4i tr\u1ed3ng b\u1ec1n v\u1eefng, truy xu\u1ea5t ngu\u1ed3n g\u1ed1c v\u00e0 n\u00e2ng cao ch\u1ea5t l\u01b0\u1ee3ng ch\u1ebf bi\u1ebfn.", "c": "Gi\u1ea3m xu\u1ea5t kh\u1ea9u, chuy\u1ec3n ho\u00e0n to\u00e0n sang ti\u00eau th\u1ee5 n\u1ed9i \u0111\u1ecba \u0111\u1ec3 tr\u00e1nh r\u1ee7i ro.", "d": "Duy tr\u00ec ph\u01b0\u01a1ng th\u1ee9c s\u1ea3n xu\u1ea5t truy\u1ec1n th\u1ed1ng v\u00ec \u0111\u00e3 \u0111\u1ea1t th\u1ee9 h\u1ea1ng cao.", "bookId": 1086546, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "\u0110\u1ec3 t\u1eadn d\u1ee5ng c\u01a1 h\u1ed9i th\u1ecb tr\u01b0\u1eddng ph\u1ee5c h\u1ed3i, ng\u00e0nh th\u1ee7y s\u1ea3n Vi\u1ec7t Nam c\u1ea7n \u01b0u ti\u00ean gi\u1ea3i ph\u00e1p n\u00e0o d\u01b0\u1edbi \u0111\u00e2y?", "answer": "Ph\u00e1t tri\u1ec3n b\u1ec1n v\u1eefng v\u00e0 n\u00e2ng ch\u1ea5t l\u01b0\u1ee3ng l\u00e0 chi\u1ebfn l\u01b0\u1ee3c l\u00e2u d\u00e0i gi\u00fap Vi\u1ec7t Nam gi\u1eef v\u1eefng v\u1ecb th\u1ebf trong top 3 xu\u1ea5t kh\u1ea9u th\u1ee7y s\u1ea3n to\u00e0n c\u1ea7u.", "key": "B", "isVideo": false, "score": 0, "order": 114, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 115 \u0111\u1ebfn 117:", "content": "Trong hai cu\u1ed9c kh\u00e1ng chi\u1ebfn ch\u1ed1ng ngo\u1ea1i x\u00e2m (ch\u1ed1ng Ph\u00e1p v\u00e0 ch\u1ed1ng M\u1ef9 x\u00e2m l\u01b0\u1ee3c), \u0110\u1ea3ng lu\u00f4n coi tr\u1ecdng v\u00e0 x\u00e2y d\u1ef1ng c\u0103n c\u1ee9 \u0111\u1ecba c\u00e1ch m\u1ea1ng, x\u00e2y d\u1ef1ng, c\u1ee7ng c\u1ed1 v\u00e0 m\u1edf r\u1ed9ng h\u1eadu ph\u01b0\u01a1ng.<i><br>\u201c\u0110\u1ea3ng ch\u1ee7 tr\u01b0\u01a1ng x\u00e2y d\u1ef1ng c\u0103n c\u1ee9 \u0111\u1ecba \u1edf c\u1ea3 r\u1eebng n\u00fai v\u00e0 \u0111\u1ed3ng b\u1eb1ng, \u1edf c\u1ea3 ph\u00eda tr\u01b0\u1edbc m\u1eb7t v\u00e0 sau l\u01b0ng qu\u00e2n x\u00e2m l\u01b0\u1ee3c. \u1ede \u0111\u00e2u c\u00f3 qu\u1ea7n ch\u00fang y\u00eau n\u01b0\u1edbc \u0111\u01b0\u1ee3c gi\u00e1c ng\u1ed9, th\u00ec \u1edf \u0111\u00f3 c\u00f3 nh\u00e2n t\u1ed1 h\u1eadu ph\u01b0\u01a1ng. V\u00ec th\u1ebf, \u201ch\u1eadu ph\u01b0\u01a1ng kh\u00f4ng c\u00f2n l\u00e0 \u0111\u1ed1i x\u1ee9ng c\u1ee7a ti\u1ec1n tuy\u1ebfn theo c\u00e1ch hi\u1ec3u c\u1ed5 \u0111i\u1ec3n, c\u0169ng kh\u00f4ng th\u1ec3 x\u00e1c \u0111\u1ecbnh ch\u1ec9 b\u1eb1ng y\u1ebfu t\u1ed1 kh\u00f4ng gian\u201d. \u0110\u00f3 l\u00e0 \u201chi\u1ec7n t\u01b0\u1ee3ng k\u00ec l\u1ea1 c\u1ee7a chi\u1ebfn tranh nh\u00e2n d\u00e2n Vi\u1ec7t Nam.</i><br>[\u2026]<i> L\u00e0m ch\u1ee7 \u0111\u01b0\u1ee3c n\u00f4ng th\u00f4n, c\u00e1ch m\u1ea1ng m\u1edbi c\u00f3 th\u1ec3 \u201chuy \u0111\u1ed9ng \u0111\u01b0\u1ee3c s\u1ee9c ng\u01b0\u1eddi, s\u1ee9c c\u1ee7a \u0111\u1ec3 kh\u00f4ng ng\u1eebng ph\u00e1t tri\u1ec3n l\u1ef1c l\u01b0\u1ee3ng, chi\u1ebfn \u0111\u1ea5u l\u00e2u d\u00e0i, c\u00e0ng \u0111\u00e1nh c\u00e0ng m\u1ea1nh\u201d, \u201ct\u1ea1o n\u00ean m\u1ed9t l\u1ee3i th\u1ebf \u0111\u1ec3 n\u00f4ng th\u00f4n \u0111\u1ed3ng b\u1eb1ng v\u00e0 r\u1eebng n\u00fai tr\u1ee3 l\u1ef1c m\u1ea1nh m\u1ebd cho phong tr\u00e0o c\u00e1ch m\u1ea1ng \u1edf th\u00e0nh th\u1ecb\u201d. N\u00f4ng th\u00f4ng l\u00e0 ch\u1ed7 d\u1ef1a v\u00e0 tr\u1eadn \u0111\u1ecba v\u1eefng ch\u1eafc v\u1ec1 l\u00e2u d\u00e0i c\u1ee7a chi\u1ebfn tranh c\u00e1ch m\u1ea1ng Vi\u1ec7t Nam. D\u1ef1a ch\u1eafc v\u00e0o n\u00f4ng th\u00f4n, x\u00e2y d\u1ef1ng c\u0103n c\u1ee9 \u0111\u1ecba, h\u1eadu ph\u01b0\u01a1ng v\u1eefng m\u1ea1nh \u1edf n\u00f4ng th\u00f4n l\u00e0 m\u00f4t y\u1ebfu t\u1ed1 c\u00f3 t\u00ednh ch\u1ea5t chi\u1ebfn l\u01b0\u1ee3c c\u1ee7a chi\u1ebfn tranh nh\u00e2n d\u00e2n Vi\u1ec7t Nam\u201d. </i><br><div style=\"text-align: right;\">(\u0110\u1ea3ng C\u1ed9ng s\u1ea3n Vi\u1ec7t Nam, <i>V\u0103n ki\u1ec7n \u0110\u1ea3ng to\u00e0n t\u1eadp</i>, T\u1eadp 28, NXB Ch\u00ednh tr\u1ecb qu\u1ed1c gia, H\u00e0 N\u1ed9i, 2003, tr.174 \u2013 175).</div>", "listQuestion": [{"questionId": 19898369, "lessonId": 0, "a": "Th\u1ecb tr\u1ea5n.", "b": "N\u00f4ng th\u00f4n.", "c": "Mi\u1ec1n n\u00fai.", "d": "Ven bi\u1ec3n.", "bookId": 758826, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Theo \u0111o\u1ea1n tr\u00edch, \u0111\u1ecba b\u00e0n n\u00e0o sau \u0111\u00e2y \u0111\u01b0\u1ee3c \u0110\u1ea3ng x\u00e1c \u0111\u1ecbnh l\u00e0 \u0111\u1ecba b\u00e0n chi\u1ebfn l\u01b0\u1ee3c h\u1ebft s\u1ee9c tr\u1ecdng y\u1ebfu trong cu\u1ed9c chi\u1ebfn tranh nh\u00e2n d\u00e2n?", "answer": "", "key": "B", "isVideo": false, "score": 0, "order": 115, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19898371, "lessonId": 0, "a": "kh\u00f3 c\u00f3 th\u1ec3 ph\u00e2n bi\u1ec7t r\u1ea1ch r\u00f2i v\u1edbi ti\u1ec1n tuy\u1ebfn ch\u1ec9 b\u1eb1ng y\u1ebfu t\u1ed1 kh\u00f4ng gian.", "b": "tr\u1ef1c ti\u1ebfp di\u1ec5n ra c\u00e1c cu\u1ed9c \u0111\u1ed1i kh\u00e1ng gi\u1eefa hai b\u00ean tr\u00ean t\u1ea5t c\u1ea3 c\u00e1c m\u1eb7t tr\u1eadn.", "c": "\u0111\u1ed1i x\u1ee9ng v\u1edbi ti\u1ec1n tuy\u1ebfn, l\u00e0 l\u00e3nh th\u1ed5 \u1edf ngo\u00e0i v\u00f9ng chi\u1ebfn s\u1ef1 ph\u00eda sau ti\u1ec1n tuy\u1ebfn.", "d": "\u0111\u01b0\u1ee3c nh\u00e2n d\u00e2n b\u1ea3o v\u1ec7, tuy\u1ec7t \u0111\u1ed1i an to\u00e0n tr\u01b0\u1edbc c\u00e1c cu\u1ed9c t\u1ea5n c\u00f4ng c\u1ee7a qu\u00e2n th\u00f9.", "bookId": 758828, "comments": 0, "bookmarks": 1, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Trong hai cu\u1ed9c chi\u1ebfn tranh gi\u1ea3i ph\u00f3ng v\u00e0 b\u1ea3o v\u1ec7 T\u1ed5 qu\u1ed1c (1945 \u2013 1975) c\u1ee7a Vi\u1ec7t Nam, h\u1eadu ph\u01b0\u01a1ng kh\u00e1ng chi\u1ebfn l\u00e0 n\u01a1i", "answer": "", "key": "A", "isVideo": false, "score": 0, "order": 116, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 19898374, "lessonId": 0, "a": "Ch\u1ec9 g\u1ed3m c\u0103n c\u1ee9 \u0111\u1ecba mi\u1ec1n B\u1eafc v\u00e0 nh\u1eefng n\u01a1i \u0111\u00e3 gi\u1ea3i ph\u00f3ng.", "b": "H\u1eadu ph\u01b0\u01a1ng t\u1ea1i ch\u1ed7 \u0111\u01b0\u1ee3c x\u00e2y d\u1ef1ng ngay \u1edf l\u00f2ng qu\u00e2n \u0111\u1ecbch.", "c": "G\u1ed3m c\u00f3 h\u1eadu ph\u01b0\u01a1ng l\u1edbn mi\u1ec1n B\u1eafc v\u00e0 h\u1eadu ph\u01b0\u01a1ng t\u1ea1i ch\u1ed7.", "d": "Kh\u00f4ng th\u1ec3 ph\u00e2n bi\u1ec7t r\u1ea1ch r\u00f2i ch\u1ec9 b\u1eb1ng y\u1ebfu t\u1ed1 kh\u00f4ng gian.", "bookId": 758830, "comments": 2, "bookmarks": 2, "likes": 0, "shares": 0, "typeId": 0, "questionText": "N\u1ed9i dung n\u00e0o sau \u0111\u00e2y nh\u1eadn \u0111\u1ecbnh <b>kh\u00f4ng </b>\u0111\u00fang v\u1ec1 h\u1eadu ph\u01b0\u01a1ng trong cu\u1ed9c kh\u00e1ng chi\u1ebfn ch\u1ed1ng M\u1ef9, c\u1ee9u n\u01b0\u1edbc (1954 \u2013 1975) c\u1ee7a Vi\u1ec7t Nam?", "answer": "", "key": "A", "isVideo": false, "score": 0, "order": 117, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.56, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "D\u1ef1a v\u00e0o th\u00f4ng tin d\u01b0\u1edbi \u0111\u00e2y \u0111\u1ec3 tr\u1ea3 l\u1eddi c\u00e1c c\u00e2u t\u1eeb 118 \u0111\u1ebfn 120:", "content": "Th\u1ecb tr\u01b0\u1eddng \u0111i\u1ec7n m\u00e1y c\u1ee7a Vi\u1ec7t Nam trong th\u1eddi gian qua \u0111\u00e3 c\u00f3 nh\u1eefng b\u01b0\u1edbc ph\u00e1t tri\u1ec3n                         boxesHtml += '</div>';

                        let feedbackHtml = "";
                        if(isSubmitted) {
                             const isCorrect = userVal.toLowerCase() === correctVal.toLowerCase();
                             if(isCorrect) {
                                feedbackHtml = `<div class="mt-2 text-green-600 text-sm font-bold">✓ Chính xác!</div>`;
                             } else {
                                feedbackHtml = `<div class="mt-2 text-red-600 text-sm">✗ Sai. Đáp án: <span class="font-bold">${correctVal}</span></div>`;
                             }
                        } else if (examMode === 'practice') {
                             feedbackHtml = `<div id="feedback-${qKey}" class="mt-2 text-sm font-bold hidden"></div>`;
                        }

                        html += `
                        <div class="flex flex-col relative">
                            ${boxesHtml}
                            ${feedbackHtml}
                        </div>`;
                    }

                    // TYPE 2: TRUE/FALSE
                    else if(qType === '2') {
                         html += `<div class="overflow-hidden border rounded-lg">
                            <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                                <tr>
                                    <th scope="col" class="px-3 py-3 w-10 text-center">Ý</th>
                                    <th scope="col" class="px-3 py-3">Nội dung</th>
                                    <th scope="col" class="px-3 py-3 w-32 text-center">Chọn Đ/S</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">`;
                        
                        const subLabels = ['a', 'b', 'c', 'd'];
                        const userObj = userAnswers[qKey] || {}; 
                        
                        if(q.plans) {
                            q.plans.forEach((plan, pIdx) => {
                                const isTrue = plan.key == "1"; 
                                const userChoice = userObj[pIdx]; 
                                
                                let trClass = "bg-white hover:bg-gray-50";
                                if((isSubmitted || examMode === 'practice') && userChoice !== undefined) {
                                    if(userChoice === isTrue) trClass = "bg-green-50";
                                    else trClass = "bg-red-50";
                                }

                                const baseBtn = "flex-1 py-2 text-center font-bold border transition-colors cursor-pointer select-none text-xs md:text-sm";
                                const leftBtn = "rounded-l-lg border-r-0";
                                const rightBtn = "rounded-r-lg";
                                
                                let btnT_Class = `${baseBtn} ${leftBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === true) btnT_Class = `${baseBtn} ${leftBtn} border-blue-500 bg-blue-500 text-white`;
                                
                                let btnF_Class = `${baseBtn} ${rightBtn} border-gray-300 bg-white text-gray-400 hover:bg-gray-100`;
                                if(userChoice === false) btnF_Class = `${baseBtn} ${rightBtn} border-blue-500 bg-blue-500 text-white`;

                                html += `<tr class="${trClass}">
                                    <td class="px-3 py-3 font-bold text-center text-gray-800">${subLabels[pIdx] || '-'}</td>
                                    <td class="px-3 py-3 text-gray-800 leading-relaxed">${plan.content}</td>
                                    <td class="px-3 py-3">
                                        <div class="flex w-24 mx-auto shadow-sm">
                                            <div onclick="handleTF('${qKey}', ${pIdx}, true)" class="${btnT_Class}">Đ</div>
                                            <div onclick="handleTF('${qKey}', ${pIdx}, false)" class="${btnF_Class}">S</div>
                                        </div>
                                    </td>
                                </tr>`;
                            });
                        }
                        html += `</tbody></table></div>`;
                        
                        if(examMode === 'practice' && !isSubmitted) {
                            html += `<div class="mt-2"><button onclick="toggleSolution('${qKey}')" class="px-3 py-2 bg-yellow-100 text-yellow-700 font-bold rounded-lg text-sm hover:bg-yellow-200 transition-colors">Xem lời giải</button></div>`;
                        }
                    }

                    html += `</div>`; 

                    // LỜI GIẢI
                    // Mặc định ẩn, chỉ hiện khi đã nộp hoặc khi bấm nút "Xem lời giải" ở chế độ practice
                    // Với MCQ, khi chọn đáp án là hiện lời giải luôn (cơ chế cũ)
                    
                    let showSol = false;
                    if(isSubmitted) showSol = true;
                    else if(examMode === 'practice' && qType === '0' && userAnswers[qKey]) showSol = true;
                    
                    const solClass = showSol ? "block" : "hidden";
                    
                    if(q.answer) {
                         html += `
                         <div id="sol-${qKey}" class="${solClass} mt-4 pt-4 border-t border-dashed border-gray-300 animate-fade-in">
                            <div class="text-sm font-bold text-gray-500 uppercase mb-2">Lời giải chi tiết:</div>
                            <div class="bg-yellow-50 sol-content p-4 rounded-lg text-gray-800 text-sm border border-yellow-200">
                                ${q.answer}
                            </div>
                         </div>`;
                    }

                    qCard.innerHTML = html;
                    container.appendChild(qCard);
                });
            });
        }

        // --- HANDLERS ---
        
        function toggleSolution(qKey) {
            const el = document.getElementById(`sol-${qKey}`);
            if(el) {
                el.classList.toggle('hidden');
                el.classList.toggle('block');
            }
        }

        function activateNumpad(input, qKey) {
            if(isSubmitted) return;
            activeInput = input;
            
            document.querySelectorAll('.char-input').forEach(el => el.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200'));
            input.classList.add('border-blue-500', 'ring-2', 'ring-blue-200');

            const numpad = document.getElementById('virtual-numpad');
            numpad.classList.add('active');
            
            if(window.innerWidth >= 768) {
                const rect = input.getBoundingClientRect();
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                numpad.style.top = (rect.bottom + scrollTop + 5) + 'px';
                numpad.style.left = rect.left + 'px';
            }
        }

        function typeChar(char) {
            if(!activeInput) return;
            const qKey = activeInput.getAttribute('data-key');
            
            if(char === 'DEL') {
                activeInput.value = '';
                const prev = activeInput.previousElementSibling;
                if(prev && prev.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(prev, qKey);
                }
            } else {
                activeInput.value = char;
                const next = activeInput.nextElementSibling;
                if(next && next.tagName === 'INPUT') {
                    activeInput.classList.remove('border-blue-500', 'ring-2', 'ring-blue-200');
                    activateNumpad(next, qKey);
                }
            }
            collectAndSave(qKey);
        }

        function collectAndSave(qKey) {
            const container = document.getElementById(`interaction-${qKey}`);
            const inputs = container.querySelectorAll('input.char-input');
            let fullVal = '';
            inputs.forEach(inp => fullVal += inp.value);
            userAnswers[qKey] = fullVal;
            updatePalette(qKey);
        }

        function checkFillAnswer(qKey) {
            const userVal = userAnswers[qKey] || '';
            let correctVal = '';
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, idx) => {
                    const parts = qKey.split('_');
                    if(parts[1] == EXAM_DATA.indexOf(g) && parts[2] == idx) {
                        correctVal = q.fillKey ? q.fillKey.trim() : '';
                    }
                });
            });

            const feedbackEl = document.getElementById(`feedback-${qKey}`);
            feedbackEl.classList.remove('hidden');
            if(userVal.toLowerCase() === correctVal.toLowerCase()) {
                feedbackEl.innerHTML = `<span class="text-green-600">✓ Chính xác!</span>`;
                feedbackEl.className = "mt-2 text-sm font-bold block";
            } else {
                feedbackEl.innerHTML = `<span class="text-red-600">✗ Sai. Đáp án đúng: ${correctVal}</span>`;
                feedbackEl.className = "mt-2 text-sm block";
            }
        }

        function handleSelect(qKey, value, type) {
            if(isSubmitted) return;
            userAnswers[qKey] = value;
            updatePalette(qKey);
            if(examMode === 'practice' && type === '0') renderExam(false);
        }

        function handleTF(qKey, pIdx, value) {
            if(isSubmitted) return;
            if(!userAnswers[qKey]) userAnswers[qKey] = {};
            userAnswers[qKey][pIdx] = value;
            updatePalette(qKey);
            renderExam(false); 
        }

        function updatePalette(qKey) {
            const btnD = document.getElementById(`pal_${qKey}`);
            const btnM = document.querySelector(`#palette-mobile button[onclick="scrollToQuestion('${qKey}')"]`) || document.querySelector(`#palette-mobile #pal_${qKey}`);
            
            if(btnD || btnM) {
                let isDone = false;
                if(typeof userAnswers[qKey] === 'string') isDone = userAnswers[qKey].length > 0;
                else if(typeof userAnswers[qKey] === 'object') isDone = Object.keys(userAnswers[qKey]).length > 0; 
                
                const activeClass = "bg-blue-100 border-blue-300 text-blue-700 shadow-sm";
                const inactiveClass = "bg-gray-50 border-gray-200 text-gray-500";
                
                if(isDone) {
                    if(btnD) btnD.className = `p-2 rounded text-center text-sm font-bold border transition-colors ${activeClass}`;
                    // if(btnM) btnM.className = ... (Mobile palette re-renders on open usually)
                }
            }
        }

        function submitExam() {
            if(isSubmitted) return alert('Bạn đã nộp bài rồi!');
            if(!confirm('Bạn có chắc chắn muốn nộp bài?')) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            renderExam(false); 
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
