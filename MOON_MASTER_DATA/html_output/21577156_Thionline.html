0\u1ed9i tr\u01b0\u1edfng n\u00f3i r\u1eb1ng n\u1ebfu kh\u00f4ng c\u00f3 tr\u1ecdng t\u00e0i, h\u1ecd c\u00f3 th\u1ec3 \u0111\u00e3 thua tr\u1eadn v\u1eeba qua<br>\u21d2 Sai v\u1ec1 ngh\u0129a<br>B, \u0110\u1ed9i tr\u01b0\u1edfng th\u1eeba nh\u1eadn v\u1edbi tr\u1ecdng t\u00e0i r\u1eb1ng h\u1ecd \u0111\u00e3 thua tr\u1eadn tr\u01b0\u1edbc.<br>\u21d2 Sai v\u1ec1 ngh\u0129a. C\u1ea5u tr\u00fac <b>admit to somebody that\u2026</b>: th\u1eeba nh\u1eadn v\u1edbi ai r\u1eb1ng<br>C, \u0110\u1ed9i tr\u01b0\u1edfng c\u1ee7a \u0111\u1ed9i t\u1eeb ch\u1ed1i n\u00f3i v\u1edbi tr\u1ecdng t\u00e0i v\u1ec1 tr\u1eadn thua c\u1ee7a h\u1ecd \u1edf tr\u1eadn \u0111\u1ea5u v\u1eeba qua.<br>\u21d2 Sai v\u1ec1 ngh\u0129a<br>D, \u0110\u1ed9i tr\u01b0\u1edfng \u0111\u1ed5 l\u1ed7i cho tr\u1ecdng t\u00e0i v\u1ec1 tr\u1eadn thua \u1edf tr\u1eadn v\u1eeba qua.<br>\u21d2 \u0110\u00e1p \u00e1n \u0111\u00fang. C\u00e2u t\u01b0\u1eddng thu\u1eadt l\u1eddi \u0111\u1ed5 l\u1ed7i<br>\u0110\u1ec3 chuy\u1ec3n \u0111\u1ed5i l\u1eddi \u0111\u1ed5 l\u1ed7i t\u1eeb c\u00e2u tr\u1ef1c ti\u1ebfp sang c\u00e2u t\u01b0\u1eddng thu\u1eadt, ch\u00fang ta c\u00f3 th\u1ec3 s\u1eed d\u1ee5ng c\u1ea5u tr\u00fac: <b>blame + S + for + doing something/ something.</b>", "key": "D", "isVideo": true, "score": 0, "order": 45, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Questions 46-52: Read the passage carefully.", "content": "1. With the explosion of visual social media, big data, artificial intelligence, and technological advancements, the internet has become an essential part of our lives. Social media has now become a popular and necessary communication tool, frequently used for communication, networking, and transmitting messages. During this time, people can expose themselves many times and create a self-marketing platform. <b>This </b>can have both direct and indirect impacts on adults and children, bringing both positive and negative effects, such as mental health problems, depression, self-esteem issues, body image concerns, eating problems, and the formation of a unique concept of self. <br>2. Social media is a prevalent and incredibly influential subculture and network that has impacted societies as a whole, causing changes in both physical and psychological conditions. It seems that social media has a wide range of prosperity, advancements, depth, and wealth. Concern for appearance and body image has existed for centuries, but now, with social media, people can expose themselves globally. Social media continues to be popular, fast, and powerful in various cultures. People can expose different aspects of their lives through social media, which can affect the mental health of many individuals. <br>3. Adolescents and children have become central users of social media. Society's obsession with the thin ideal has spread to a myriad of users, influencing their perceptions and cognitions, leading to disordered eating behaviors and attitudes among those who are keen on appearance. When obsession and dissatisfaction with body image increase, it can lead to other mental health problems such as depression, comparison, and envy. At the same time, body image dissatisfaction can also affect one's lived experience and overall mental health. <br>4. Judging one's <b>flaws </b>based on snapshots of so-called friends and strangers who use filters and technology continuously creates unrealistic perceptions. On social media, it is possible to use filters and technology to present a better and idealized image. With the prevalence of fake and false images and videos, individuals spend very little time self-correcting but instead accept and appreciate them.<br><div style=\"text-align: right;\"><i>(Source: aithor.com)</i></div><i>Choose an option (A, B, C, or D) that best answers each question.</i>", "listQuestion": [{"questionId": 21577176, "lessonId": 0, "a": "Networking on social media", "b": "Self-marketing platform", "c": "The use of filters", "d": "Social media as a communication tool", "bookId": 1085954, "comments": 2, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What does the underlined word <b>This </b>in paragraph 1 refer to?", "answer": "<b>T\u1eeb \u0111\u01b0\u1ee3c g\u1ea1ch ch\u00e2n \u201cthis\u201d trong \u0111o\u1ea1n 1 \u00e1m ch\u1ec9 \u0111i\u1ec1u g\u00ec?</b><br>A. K\u1ebft n\u1ed1i m\u1ea1ng x\u00e3 h\u1ed9i<br>B. N\u1ec1n t\u1ea3ng t\u1ef1 qu\u1ea3ng b\u00e1 b\u1ea3n th\u00e2n<br>C. Vi\u1ec7c s\u1eed d\u1ee5ng c\u00e1c b\u1ed9 l\u1ecdc <br>D. M\u1ea1ng x\u00e3 h\u1ed9i nh\u01b0 m\u1ed9t c\u00f4ng c\u1ee5 giao ti\u1ebfp<br><br><b>C\u0103n c\u1ee9 th\u00f4ng tin:</b> <br>\u201cSocial media has now become a popular and necessary communication tool, frequently used for communication, networking, and transmitting messages. During this time, people can expose themselves many times and create a self-marketing platform. This can have both direct and indirect impacts on adults and children\u2026\u201d <br><i>(M\u1ea1ng x\u00e3 h\u1ed9i hi\u1ec7n nay \u0111\u00e3 tr\u1edf th\u00e0nh c\u00f4ng c\u1ee5 giao ti\u1ebfp ph\u1ed5 bi\u1ebfn v\u00e0 c\u1ea7n thi\u1ebft, th\u01b0\u1eddng \u0111\u01b0\u1ee3c s\u1eed d\u1ee5ng \u0111\u1ec3 li\u00ean l\u1ea1c, k\u1ebft n\u1ed1i v\u00e0 truy\u1ec1n t\u1ea3i th\u00f4ng \u0111i\u1ec7p. Trong th\u1eddi \u0111\u1ea1i n\u00e0y, con ng\u01b0\u1eddi c\u00f3 th\u1ec3 nhi\u1ec1u l\u1ea7n \u201cph\u01a1i b\u00e0y b\u1ea3n th\u00e2n\u201d v\u00e0 t\u1ea1o ra m\u1ed9t n\u1ec1n t\u1ea3ng t\u1ef1 qu\u1ea3ng b\u00e1. \u0110i\u1ec1u n\u00e0y c\u00f3 th\u1ec3 g\u00e2y ra c\u1ea3 nh\u1eefng t\u00e1c \u0111\u1ed9ng tr\u1ef1c ti\u1ebfp l\u1eabn gi\u00e1n ti\u1ebfp \u0111\u1ed1i v\u1edbi ng\u01b0\u1eddi l\u1edbn v\u00e0 tr\u1ebb em\u2026)</i><br><br><b>=&gt; \u201cthis\u201d (\u0111i\u1ec1u n\u00e0y) \u00e1m ch\u1ec9 t\u1edbi m\u1ea1ng x\u00e3 h\u1ed9i nh\u01b0 c\u00f4ng c\u1ee5 giao ti\u1ebfp, v\u00ec n\u00f3 c\u00f3 \u1ea3nh h\u01b0\u1edfng l\u00ean c\u1ea3 ng\u01b0\u1eddi l\u1edbn v\u00e0 tr\u1ebb em.</b>", "key": "D", "isVideo": false, "score": 0, "order": 46, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577178, "lessonId": 0, "a": "Body image concerns", "b": "Decreased self-worth", "c": "Environmental awareness", "d": "Disordered eating behaviors", "bookId": 1085955, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "All of the following are mentioned as effects of social media on mental health except ________.", "answer": "<b>T\u1ea5t c\u1ea3 nh\u1eefng \u0111i\u1ec1u sau \u0111\u00e2y \u0111\u1ec1u \u0111\u01b0\u1ee3c nh\u1eafc \u0111\u1ebfn nh\u01b0 l\u00e0 t\u00e1c \u0111\u1ed9ng c\u1ee7a m\u1ea1ng x\u00e3 h\u1ed9i \u0111\u1ed1i v\u1edbi s\u1ee9c kh\u1ecfe tinh th\u1ea7n, ngo\u1ea1i tr\u1eeb ________.</b><br>A. M\u1ed1i lo ng\u1ea1i v\u1ec1 h\u00ecnh th\u1ec3<br>B. S\u1ef1 gi\u1ea3m gi\u00e1 tr\u1ecb b\u1ea3n th\u00e2n<br>C. Nh\u1eadn th\u1ee9c v\u1ec1 m\u00f4i tr\u01b0\u1eddng<br>D. C\u00e1c h\u00e0nh vi r\u1ed1i lo\u1ea1n \u0103n u\u1ed1ng<br><br><b>C\u0103n c\u1ee9 \u0111o\u1ea1n 1: </b><br>\u201cThis can have both direct and indirect impacts on adults and children, bringing both positive and negative effects, such as mental health problems, depression, self-esteem issues, body image concerns, eating problems, and the formation of a unique concept of self.\u201d<br><i>(\u0110i\u1ec1u n\u00e0y c\u00f3 th\u1ec3 g\u00e2y ra c\u1ea3 nh\u1eefng t\u00e1c \u0111\u1ed9ng tr\u1ef1c ti\u1ebfp l\u1eabn gi\u00e1n ti\u1ebfp \u0111\u1ed1i v\u1edbi ng\u01b0\u1eddi l\u1edbn v\u00e0 tr\u1ebb em, mang l\u1ea1i c\u1ea3 \u1ea3nh h\u01b0\u1edfng t\u00edch c\u1ef1c v\u00e0 ti\u00eau c\u1ef1c, ch\u1eb3ng h\u1ea1n nh\u01b0: c\u00e1c v\u1ea5n \u0111\u1ec1 v\u1ec1 s\u1ee9c k 1ec7n giao ti\u1ebfp gi\u1eefa nh\u1eefng ng\u01b0\u1eddi d\u00f9ng tr\u1ebb<br>=&gt; Sai, b\u00e0i n\u00e0y kh\u00f4ng t\u1eadp trung v\u00e0o c\u1ea3i thi\u1ec7n giao ti\u1ebfp.<br><br><b>B.</b> C\u00e1ch m\u00e0 m\u1ea1ng x\u00e3 h\u1ed9i \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn nh\u1eadn th\u1ee9c c\u00e1 nh\u00e2n v\u1ec1 h\u00ecnh \u1ea3nh c\u01a1 th\u1ec3<br>=&gt; <b>\u0110\u00fang v\u00ec</b> to\u00e0n b\u00e0i t\u1eadp trung v\u00e0o <b>c\u00e1ch m\u1ea1ng x\u00e3 h\u1ed9i \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn nh\u1eadn th\u1ee9c c\u00e1 nh\u00e2n v\u1ec1 h\u00ecnh th\u1ec3</b>, \u0111\u1eb7c bi\u1ec7t \u1edf gi\u1edbi tr\u1ebb.<br><br><b>C.</b> Nh\u1eefng c\u00e1ch m\u00e0 m\u1ea1ng x\u00e3 h\u1ed9i \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn vi\u1ec7c t\u1ef1 th\u1ec3 hi\u1ec7n b\u1ea3n th\u00e2n tr\u1ef1c tuy\u1ebfn<br>=&gt; Kh\u00f4ng ph\u1ea3i \u00fd ch\u00ednh<br><br><b>D.</b> C\u00e1c c\u00f4ng c\u1ee5 c\u00f4ng ngh\u1ec7 \u0111\u01b0\u1ee3c d\u00f9ng \u0111\u1ec3 t\u1ea1o ra h\u00ecnh \u1ea3nh \u0111\u00e3 ch\u1ec9nh s\u1eeda v\u00e0 d\u00f9ng b\u1ed9 l\u1ecdc<br>=&gt; \u0110\u00e2y ch\u1ec9 l\u00e0 m\u1ed9t v\u00ed d\u1ee5, kh\u00f4ng ph\u1ea3i ch\u1ee7 \u0111\u1ec1 ch\u00ednh.<br><br><b>Gi\u1ea3i th\u00edch:</b><br><b>\u0110o\u1ea1n 1:</b> Gi\u1edbi thi\u1ec7u vai tr\u00f2 c\u1ee7a m\u1ea1ng x\u00e3 h\u1ed9i trong giao ti\u1ebfp v\u00e0 t\u1ef1 qu\u1ea3ng b\u00e1 b\u1ea3n th\u00e2n.<br><b>\u0110o\u1ea1n 2:</b> Tr\u00ecnh b\u00e0y c\u00e1ch m\u1ea1ng x\u00e3 h\u1ed9i \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn nh\u1eadn th\u1ee9c v\u1ec1 ngo\u1ea1i h\u00ecnh v\u00e0 s\u1ef1 t\u1ef1 tin.<br><b>\u0110o\u1ea1n 3:</b> Nh\u1ea5n m\u1ea1nh h\u1eadu qu\u1ea3 ti\u00eau c\u1ef1c c\u1ee7a m\u1ea1ng x\u00e3 h\u1ed9i \u0111\u1ed1i v\u1edbi s\u1ee9c kh\u1ecfe tinh th\u1ea7n v\u00e0 h\u00ecnh \u1ea3nh c\u01a1 th\u1ec3.<br><b>\u0110o\u1ea1n 4:</b> \u0110\u1ec1 xu\u1ea5t c\u1ea7n nh\u1eadn th\u1ee9c \u0111\u00fang \u0111\u1eafn v\u00e0 s\u1eed d\u1ee5ng m\u1ea1ng x\u00e3 h\u1ed9i m\u1ed9t c\u00e1ch l\u00e0nh m\u1ea1nh \u0111\u1ec3 gi\u1ea3m t\u00e1c \u0111\u1ed9ng ti\u00eau c\u1ef1c l\u00ean s\u1ee9c kh\u1ecfe tinh th\u1ea7n.<br><br><b>=&gt; B\u00e0i vi\u1ebft ph\u00e2n t\u00edch \u1ea3nh h\u01b0\u1edfng c\u1ee7a m\u1ea1ng x\u00e3 h\u1ed9i \u0111\u1ed1i v\u1edbi nh\u1eadn th\u1ee9c v\u1ec1 h\u00ecnh \u1ea3nh c\u01a1 th\u1ec3 v\u00e0 s\u1ee9c kh\u1ecfe tinh th\u1ea7n c\u1ee7a ng\u01b0\u1eddi tr\u1ebb.</b>", "key": "B", "isVideo": false, "score": 0, "order": 49, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577184, "lessonId": 0, "a": "Users are often unaware that these images are unrealistic and may compare themselves negatively.", "b": "Filters and edits help users improve their appearance without affecting self-perception.", "c": "People use filters mostly for entertainment, so they have little impact on mental health.", "d": "Editing images online encourages users to critically evaluate their own flaws.", "bookId": 1085958, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "Based on paragraph 4, what can be inferred about the effect of filters and edited images on social media users?", "answer": "<b>D\u1ef1a v\u00e0o \u0111o\u1ea1n 4, c\u00f3 th\u1ec3 suy ra \u0111i\u1ec1u g\u00ec v\u1ec1 t\u00e1c \u0111\u1ed9ng c\u1ee7a c\u00e1c b\u1ed9 l\u1ecdc v\u00e0 h\u00ecnh \u1ea3nh ch\u1ec9nh s\u1eeda tr\u00ean m\u1ea1ng x\u00e3 h\u1ed9i \u0111\u1ed1i v\u1edbi ng\u01b0\u1eddi d\u00f9ng?\n</b><br><b>A.</b> Ng\u01b0\u1eddi d\u00f9ng th\u01b0\u1eddng kh\u00f4ng nh\u1eadn ra r\u1eb1ng nh\u1eefng h\u00ecnh \u1ea3nh n\u00e0y l\u00e0 phi th\u1ef1c t\u1ebf v\u00e0 c\u00f3 th\u1ec3 so s\u00e1nh b\u1ea3n th\u00e2n m\u1ed9t c\u00e1ch ti\u00eau c\u1ef1c.\n<br><b>=&gt; \u0110\u00fang</b> v\u00ec \u0111o\u1ea1n 4 n\u00f3i ng\u01b0\u1eddi d\u00f9ng kh\u00f4ng nh\u1eadn ra h\u00ecnh \u1ea3nh l\u00e0 phi th\u1ef1c t\u1ebf v\u00e0 ch\u1ea5p nh\u1eadn ch\u00fang, d\u1eabn \u0111\u1ebfn nh\u1eadn th\u1ee9c sai l\u1ec7ch.\n<br><u>C\u0103n c\u1ee9</u>: \u201c...use filters and technology continuously creates unrealistic perceptions\u2026 individuals spend very little time self-correcting but instead accept and appreciate them.\u201d\n<br><i>(... d\u00f9ng b\u1ed9 l\u1ecdc v\u00e0 c\u00f4ng ngh\u1ec7 li\u00ean t\u1ee5c t\u1ea1o ra nh\u1eadn th\u1ee9c kh\u00f4ng th\u1ef1c t\u1ebf \u2026 c\u00e1c c\u00e1 nh\u00e2n d\u00e0nh r\u1ea5t \u00edt th\u1eddi gian \u0111\u1ec3 t\u1ef1 s\u1eeda ch\u1eefa, m\u00e0 thay v\u00e0o \u0111\u00f3 l\u1ea1i d\u1ec5 d\u00e0ng ch\u1ea5p nh\u1eadn v\u00e0 t\u00e1n th\u01b0\u1edfng ch\u00fang.)\n\n\n</i><br><br><b>B.</b> B\u1ed9 l\u1ecdc v\u00e0 ch\u1ec9nh s\u1eeda gi\u00fap ng\u01b0\u1eddi d\u00f9ng c\u1ea3i thi\u1ec7n ngo\u1ea1i h\u00ecnh m\u00e0 kh\u00f4ng \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn nh\u1eadn th\u1ee9c b\u1ea3n th\u00e2n.\n<br><b>=&gt; Sai</b>, v\u00ec b\u00e0i n\u00f3i b\u1ed9 l\u1ecdc t\u1ea1o ra nh\u1eadn th\u1ee9c phi th\u1ef1c t\u1ebf\n<br><u>C\u0103n c\u1ee9</u>: \u201cJudging one's flaws based on snapshots of so-called friends and strangers who use filters and technology continuously creates unrealistic perceptions.\u201d \n<br><i>(Vi\u1ec7c \u0111\u00e1nh gi\u00e1 khuy\u1ebft \u0111i\u1ec3m c\u1ee7a b\u1ea3n th\u00e2n d\u1ef1a tr\u00ean nh\u1eefng b\u1ee9c \u1ea3nh ch\u1ee5p c\u1ee7a nh\u1eefng \u201cng\u01b0\u1eddi b\u1ea1n\u201d hay ng\u01b0\u1eddi l\u1ea1 tr\u00ean m\u1ea1ng \u2013 nh\u1eefng ng\u01b0\u1eddi li\u00ean t\u1ee5c d\u00f9ng b\u1ed9 l\u1ecdc v\u00e0 c\u00f4ng ngh\u1ec7 \u2013 t\u1ea1o ra nh\u1eadn th\u1ee9c kh\u00f4ng th\u1ef1c t\u1ebf.)\n\n\n</i><br><br><b>C.</b> M\u1ecdi ng\u01b0\u1eddi ch\u1ee7 y\u1ebfu s\u1eed d\u1ee5ng b\u1ed9 l\u1ecdc \u0111\u1ec3 gi\u1ea3i tr\u00ed, n\u00ean n\u00f3 h\u1ea7u nh\u01b0 kh\u00f4ng \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn s\u1ee9c kh\u1ecfe tinh th\u1ea7n.\n<br><b>=&gt; Sai</b>, kh\u00f4ng \u0111\u1ec1 c\u1eadp\n\n\n<br><br><b>D.</b> Vi\u1ec7c ch\u1ec9nh s\u1eeda h\u00ecnh \u1ea3nh tr\u1ef1c tuy\u1ebfn khuy\u1ebfn kh\u00edch ng\u01b0\u1eddi d\u00f9ng \u0111\u00e1nh gi\u00e1 ph\u00ea ph\u00e1n nh\u1eefng khuy\u1ebft \u0111i\u1ec3m c\u1ee7a ch\u00ednh m\u00ecnh.\n<br><b>=&gt; Sai</b> v\u00ec \u0111o\u1ea1n 4 n\u00f3i h\u1ecd d\u00e0nh r\u1ea5t \u00edt th\u1eddi gian t\u1ef1 s\u1eeda l\u1ed7i.\n<br><u>C\u0103n c\u1ee9</u>: \u201c...individuals spend very little time self-correcting but instead accept and appreciate them.\u201d <br><i>(...c\u00e1c c\u00e1 nh\u00e2n d\u00e0nh r\u1ea5t \u00edt th\u1eddi gian \u0111\u1ec3 t\u1ef1 s\u1eeda ch\u1eefa, m\u00e0 thay v\u00e0o \u0111\u00f3 l\u1ea1i d\u1ec5 d\u00e0ng ch\u1ea5p nh\u1eadn v\u00e0 t\u00e1n th\u01b0\u1edfng ch\u00fang.)</i>", "key": "A", "isVideo": false, "score": 0, "order": 50, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577185, "lessonId": 0, "a": "faults", "b": "rifts", "c": "memories", "d": "features", "bookId": 1085959, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "In paragraph 4, the word <b>flaws </b>is closest in meaning to ________.", "answer": "<b>Trong \u0111o\u1ea1n 4, t\u1eeb \u201cflaws\u201d g\u1ea7n ngh\u0129a nh\u1ea5t v\u1edbi ________.\n</b><br>A. faults /f\u0254\u02d0lts/ (n): l\u1ed7i, khuy\u1ebft \u0111i\u1ec3m\n<br>B. rifts /r\u026afts/ (n): s\u1ef1 r\u1ea1n n\u1ee9t, chia r\u1ebd\n<br>C. memories /\u02c8mem\u0259riz/ (n): k\u00fd \u1ee9c, h\u1ed3i \u1ee9c\n<br>D. features /\u02c8fi\u02d0t\u0283\u0259rz/ (n): \u0111\u1eb7c \u0111i\u1ec3m, n\u00e9t n\u1ed5i b\u1eadt\n<br><b><br>Ta c\u00f3:\n</b><br>flaws /fl\u0254\u02d0z/ (n): khuy\u1ebft \u0111i\u1ec3m, l\u1ed7i nh\u1ecf = faults\n\n<br><br><b>D\u1eabn ch\u1ee9ng:</b> \u201cJudging one's flaws based on snapshots of so-called friends and strangers who use filters and technology continuously creates unrealistic perceptions.\u201d \n<br><b><br>T\u1ea1m d\u1ecbch:</b> Vi\u1ec7c \u0111\u00e1nh gi\u00e1 khuy\u1ebft \u0111i\u1ec3m c\u1ee7a b\u1ea3n th\u00e2n d\u1ef1a tr\u00ean nh\u1eefng b\u1ee9c \u1ea3nh ch\u1ee5p c\u1ee7a nh\u1eefng \u201cng\u01b0\u1eddi b\u1ea1n\u201d hay ng\u01b0\u1eddi l\u1ea1 tr\u00ean m\u1ea1ng \u2013 nh\u1eefng ng\u01b0\u1eddi li\u00ean t\u1ee5c d\u00f9ng b\u1ed9 l\u1ecdc v\u00e0 c\u00f4ng ngh\u1ec7 \u2013 t\u1ea1o ra nh\u1eadn th\u1ee9c kh\u00f4ng th\u1ef1c t\u1ebf.\n\n", "key": "A", "isVideo": false, "score": 0, "order": 51, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}, {"questionId": 21577187, "lessonId": 0, "a": "Social media may shape young users\u2019 beliefs and expectations about appearance over time.", "b": "Social media mainly helps young users feel more confident and satisfied with themselves.", "c": "Exposure to social media content has little effect on users\u2019 attitudes or mental health.", "d": "Young users are more likely to ignore online images and focus on their real-life appearance.", "bookId": 1085960, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "What can be inferred about the overall influence of social media on young users\u2019 mental health and self-perception?", "answer": "<b>C\u00f3 th\u1ec3 suy ra \u0111i\u1ec1u g\u00ec v\u1ec1 \u1ea3nh h\u01b0\u1edfng t\u1ed5ng th\u1ec3 c\u1ee7a m\u1ea1ng x\u00e3 h\u1ed9i \u0111\u1ed1i v\u1edbi s\u1ee9c kh\u1ecfe tinh th\u1ea7n v\u00e0 nh\u1eadn th\u1ee9c b\u1ea3n th\u00e2n c\u1ee7a ng\u01b0\u1eddi d\u00f9ng tr\u1ebb?\n</b><br><b>A.</b> M\u1ea1ng x\u00e3 h\u1ed9i c\u00f3 th\u1ec3 \u0111\u1ecbnh h\u00ecnh ni\u1ec1m tin v\u00e0 k\u1ef3 v\u1ecdng c\u1ee7a ng\u01b0\u1eddi tr\u1ebb v\u1ec1 ngo\u1ea1i h\u00ecnh theo th\u1eddi gian.\n<br>=&gt;\n\n\n<br><br><b>B.</b> M\u1ea1ng x\u00e3 h\u1ed9i ch\u1ee7 y\u1ebfu gi\u00fap ng\u01b0\u1eddi tr\u1ebb c\u1ea3m th\u1ea5y t\u1ef1 tin v\u00e0 h\u00e0i l\u00f2ng h\u01a1n v\u1edbi b\u1ea3n th\u00e2n.\n<br><b>=&gt; Sai</b>, tr\u00e1i v\u1edbi th\u00f4ng tin b\u00e0i \u0111\u1ecdc. M\u1ea1ng x\u00e3 h\u1ed9i g\u00e2y lo \u00e2u, so s\u00e1nh, ghen t\u1ecb, ch\u1ee9 kh\u00f4ng l\u00e0m h\u1ecd t\u1ef1 tin h\u01a1n.\n<br><u>C\u0103n c\u1ee9 \u0111o\u1ea1n 3:</u> \u201c...mental health problems such as depression, comparison, and envy.\u201d <br><i>(...c\u00e1c v\u1ea5n \u0111\u1ec1 s\u1ee9c kh\u1ecfe tinh th\u1ea7n kh\u00e1c nh\u01b0 tr\u1ea7m c\u1ea3m, so s\u00e1nh b\u1ea3n th\u00e2n v\u00e0 ghen t\u1ecb.) \n\n\n</i><br><br><b>C.</b> Vi\u1ec7c ti\u1ebfp x\u00fac v\u1edbi n\u1ed9i dung m\u1ea1ng x\u00e3 h\u1ed9i h\u1ea7u nh\u01b0 kh\u00f4ng \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn th\u00e1i \u0111\u1ed9 hay s\u1ee9c kh\u1ecfe tinh th\u1ea7n c\u1ee7a ng\u01b0\u1eddi d\u00f9ng.\n<br><b>=&gt; Sai</b> v\u00ec b\u00e0i ch\u1ee9ng minh r\u00f5 r\u00e0ng c\u00f3 \u1ea3nh h\u01b0\u1edfng m\u1ea1nh \u0111\u1ebfn s\u1ee9c kh\u1ecfe tinh th\u1ea7n\n<br><u>C\u0103n c\u1ee9 \u0111o\u1ea1n 1:</u>  \u201c...can have both direct and indirect impacts on adults and children, bringing ... mental health problems, depression, self-esteem issues...\u201d <br><i>(...c\u00f3 th\u1ec3 g\u00e2y ra c\u1ea3 nh\u1eefng t\u00e1c \u0111\u1ed9ng tr\u1ef1c ti\u1ebfp l\u1eabn gi\u00e1n ti\u1ebfp \u0111\u1ed1i v\u1edbi ng\u01b0\u1eddi l\u1edbn v\u00e0 tr\u1ebb em, mang l\u1ea1i\u2026c\u00e1c v\u1ea5n \u0111\u1ec1 v\u1ec1 s\u1ee9c kh\u1ecfe tinh th\u1ea7n, tr\u1ea7m c\u1ea3m, v\u1ea5n \u0111\u1ec1 v\u1ec1 l\u00f2ng t\u1ef1 tr\u1ecdng\u2026)\n\n\n</i><br><br><b>D.</b> Ng\u01b0\u1eddi tr\u1ebb c\u00f3 xu h\u01b0\u1edbng ph\u1edbt l\u1edd h\u00ecnh \u1ea3nh tr\u00ean m\u1ea1ng v\u00e0 t\u1eadp trung v\u00e0o ngo\u1ea1i h\u00ecnh th\u1eadt c\u1ee7a m\u00ecnh ngo\u00e0i \u0111\u1eddi.\n<br><b>=&gt; Sai.</b> \u0111o\u1ea1n 4 n\u00f3i ng\u01b0\u1eddi d\u00f9ng \u201caccept and appreciate\u201d h\u00ecnh \u1ea3nh gi\u1ea3 \u2192 h\u1ecd tin v\u00e0 so s\u00e1nh v\u1edbi \u1ea3nh \u1ea3o, kh\u00f4ng \u201cph\u1edbt l\u1edd\u201d.\n<br><u>C\u0103n c\u1ee9 \u0111o\u1ea1n 4:</u> \u201cWith the prevalence of fake and false images and videos, individuals spend very little time self-correcting but instead accept and appreciate them.\u201d <br><i>(V\u1edbi s\u1ef1 ph\u1ed5 bi\u1ebfn c\u1ee7a nh\u1eefng h\u00ecnh \u1ea3nh v\u00e0 video gi\u1ea3, sai l\u1ec7ch, c\u00e1c c\u00e1 nh\u00e2n d\u00e0nh r\u1ea5t \u00edt th\u1eddi gian \u0111\u1ec3 t\u1ef1 s\u1eeda ch\u1eefa, m\u00e0 thay v\u00e0o \u0111\u00f3 l\u1ea1i d\u1ec5 d\u00e0ng ch\u1ea5p nh\u1eadn v\u00e0 t\u00e1n th\u01b0\u1edfng ch\u00fang.)</i>", "key": "A", "isVideo": false, "score": 0, "order": 52, "fillKey": "", "yourKey": "", "isTested": false, "isBookmark": false, "liked": false, "questionScore": 0.33, "plans": [], "answerPlans": [], "normalizedType": "0"}]}, {"title": "Question 53-60: Read the passage carefully.", "content": "1. The latest World Happiness Report says that prosperity is not the main reason for happiness. If you suffer real hardship, you are unlikely to be happy, but once your basic needs are met, money and material things become less of a necessity. Happiness depends more on recognizing the things you have and appreciating them, rather than getting more things. Yes, money can buy you the latest smartphone, tablet, or fashion item, and you might get a kick out of the ownership of these material objects, but this enjoyment is usually short-lived. Remember all those presents you got for Christmas when you opened them, but not for long. A month later, they were lying abandoned at the bottom of a drawer. And have you forgotten those delicious chocolates that made you feel really happy when you were eating them, but ill after you\u2019d finished them all?<br>2. It seems that deep, long-lasting happiness comes from intangible things rather than things like chocolates and smartphones. One essential factor is human relationships. People who have the support of family members and also have strong relationships are more likely to be happy. Feeling protected and respected and knowing you can trust in the people around you are vital. But <b>happiness means you have to give and take</b>. Performing acts of kindness and generosity on a regular basis, for example, listening to a friend in need or carrying a neighbour\u2019s shopping, will make you feel on the top of the world. Even a simple smile can work wonders. In fact, they say that one smile makes a person feel as good as eating 2,000 bars of chocolate (not at all once, of course).<br>3. It\u2019s not surprising that health is another key contributor to happiness. Poor health will certainly make you feel down in the mouth. But being healthy and staying healthy requires some effort. A healthy diet is crucial and so is regular exercise. Laziness will not make you happy. Exercising for twenty to thirty minutes a day helps to reduce stress and anxiety and makes you feel more positive and optimistic because <b>it</b> releases endorphins (feel-good chemicals). So, if you\u2019ve been <b>feeling blue</b> and worrying too much about your exams, get exercising. You\u2019ll also find that you sleep better.<br>4. Talking of sleep, do you often wake up feeling miserable? If so, it\u2019s probably because you haven\u2019t had enough of it. Teenagers tend to go to bed too late and have to get up early, so many suffer from a lack of sleep. Tiredness will certainly affect your happiness levels and put you in a bad mood. It also affects your ability to concentrate and may slow your growth. So, if you want to be happy and do well at school, try to get at least eight hours a night.<br><div style=\"text-align: right;\"><i>Choose an option (A, B, C, or D) that best answers each question.</i></div>", "listQuestion": [{"questionId": 21577200, "lessonId": 0, "a": "What should society do to make people happy?", "b": "How does chocolate affect your mood?", "c": "What creates true happiness?", "d": "Why do people find it impossible to be happy?", "bookId": 1085961, "comments": 0, "bookmarks": 0, "likes": 0, "shares": 0, "typeId": 0, "questionText": "The best title of the passage can be ________.", "answer": "<b>Ti\u00eau \u0111\u1ec1 ph\u00f9 h\u1ee3p nh\u1ea5t c\u1ee7a \u0111o\u1ea1n v\u0103n c\u00f3 th\u1ec3 l\u00e0 __________.</b><br><span data-start=\"3080\" data-end=\"3134\" style=\"\"><br>A. X\u00e3 h\u1ed9i n\u00ean l\u00e0m g\u00ec \u0111\u1ec3 khi\u1ebfn con ng\u01b0\u1eddi h\u1ea1nh ph\u00fac? =&gt; <b>Sai</b>. V\u00ec \u0111o\u1ea1n v\u0103n \u0111\u1ec1 c\u1eadp \u0111\u1ebfn c\u1ea3 y\u1ebfu t\u1ed1 c\u00e1 nh\u00e2n<br><br></span><span data-start=\"3137\" data-end=\"3197\" style=\"\">B. S\u00f4 c\u00f4 la \u1ea3nh h\u01b0\u1edfng \u0111\u1ebfn t\u00e2m tr\u1ea1ng c\u1ee7a b\u1ea1n nh\u01b0 th\u1ebf n\u00e0o? =&gt; <b>Sai</b>. \u0110\u00e2y ch\u1ec9 l\u00e0 m\u1ed9t v\u00ed d\u1ee5 nh\u1ecf, kh\u00f4ng ph\u1ea3i ch\u1ee7 \u0111\u1ec1 ch\u00ednh<br></span><br data-start=\"3197\" data-end=\"3200\"><span data-start=\"3200\" data-end=\"3241\" style=\"\">C. \u0110i\u1ec1u g\u00ec t\u1ea1o n\u00ean h\u1ea1nh ph\u00fac th\u1ef1c s\u1ef1? =&gt; <b>\u0110\u00fang.&nbsp;</b>B\u00e0i vi\u1ebft t\u1eadp trung v\u00e0o c\u00e1c y\u1ebfu t\u1ed1 t\u1ea1o n\u00ean h\u1ea1nh ph\u00fac th\u1ef1c s\u1ef1, nh\u01b0 m\u1ed1i quan h\u1ec7 con ng\u01b0\u1eddi, s\u1ee9c kh\u1ecfe, gi\u1ea5c ng\u1ee7, v\u00e0 s\u1ef1 bi\u1ebft \u01a1n nh\u1eefng g\u00ec m\u00ecnh c\u00f3<b><br></b></span><br data-start=\"3241\" data-end=\"3244\"><span data-start=\"3244\" data-end=\"3294\" style=\"\">D. T\u1ea1i sao con ng\u01b0\u1eddi th\u1ea5y kh\u00f4ng th\u1ec3 h\u1ea1nh ph\u00fac? =&gt; <b>Sai</b>. V\u00ec \u0111o\u1ea1n v\u0103n kh\u00f4ng n\u00f3i v\u1ec1 vi\u1ec7c kh\u00f4ng th\u1ec3 h\u1ea1nh ph\u00fac, m\u00e0 l\u00e0 c\u00e1ch \u0111\u1ec3 \u0111\             isSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('btn-submit').innerText = "Đã nộp bài";
            document.getElementById('btn-submit').className = "bg-gray-400 text-white px-4 py-2 rounded-lg font-bold shadow cursor-not-allowed text-sm";
            
            // Calculate Score
            let correctCount = 0;
            let totalQ = 0;
            
            EXAM_DATA.forEach(g => {
                g.listQuestion.forEach((q, qIdx) => {
                    totalQ++;
                    const gIdx = EXAM_DATA.indexOf(g);
                    const qKey = `q_${gIdx}_${qIdx}`;
                    
                    if(q.normalizedType === '0') {
                        if(userAnswers[qKey] && q.key && userAnswers[qKey] === q.key.toUpperCase()) correctCount++;
                    }
                    else if(q.normalizedType === '1' || q.normalizedType === '3') {
                        if(userAnswers[qKey] && q.fillKey && userAnswers[qKey].toLowerCase().trim() === q.fillKey.toLowerCase().trim()) correctCount++;
                    }
                    else if(q.normalizedType === '2' && q.plans) {
                        // TF Grading: Must get all rows correct? Or count by rows?
                        // Usually Moon counts by Question. Let's assume strict grading (All correct = 1 point) or partial.
                        // Let's do simple: If all sub-answers match -> correct.
                        const uObj = userAnswers[qKey] || {};
                        let allCorrect = true;
                        q.plans.forEach((p, idx) => {
                            const isTrue = p.key == "1";
                            if(uObj[idx] !== isTrue) allCorrect = false;
                        });
                        if(allCorrect) correctCount++;
                    }
                });
            });

            const score = (correctCount / totalQ) * 10;
            alert(`Kết quả: ${correctCount}/${totalQ} câu đúng.
Điểm: ${score.toFixed(2)}`);
            
            renderExam(false); // Re-render to show all answers and solutions
            window.scrollTo(0,0);
        }

        function toggleMobilePalette() {
            const el = document.getElementById('mobile-palette');
            el.classList.toggle('hidden');
        }
    </script>
</body>
</html>
