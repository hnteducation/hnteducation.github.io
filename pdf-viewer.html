<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Đọc tài liệu - Dạy Toán Thầy Hoàng</title>
    <!-- Tailwind CSS cho giao diện -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome cho icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-800 h-screen flex flex-col font-sans overflow-hidden">

    <!-- Thanh công cụ (Toolbar) cố định ở trên -->
    <div class="bg-gray-900 text-white shadow-md p-3 flex justify-between items-center z-20 border-b border-gray-700">
        <!-- Tiêu đề file -->
        <div class="font-bold text-lg truncate flex items-center max-w-[55%] md:max-w-[70%]">
            <i class="fa-solid fa-file-pdf text-red-500 mr-2 text-xl"></i>
            <span id="doc-title" class="truncate text-gray-200">Đang tải tài liệu...</span>
        </div>
        
        <!-- Các nút tiện ích -->
        <div class="flex items-center space-x-2 md:space-x-4">
            <a id="open-btn" href="#" target="_blank" class="bg-blue-600 hover:bg-blue-500 px-3 py-2 rounded text-sm font-semibold transition flex items-center" title="Mở sang Tab mới để xem toàn màn hình">
                <i class="fa-solid fa-arrow-up-right-from-square md:mr-2"></i> 
                <span class="hidden md:inline">Mở rộng</span>
            </a>
            <a id="download-btn" href="#" download class="bg-green-600 hover:bg-green-500 px-3 py-2 rounded text-sm font-semibold transition flex items-center" title="Tải file về máy">
                <i class="fa-solid fa-download md:mr-2"></i> 
                <span class="hidden md:inline">Tải về</span>
            </a>
        </div>
    </div>

    <!-- Thanh thông báo nhỏ dành riêng cho thiết bị di động -->
    <div id="mobile-notice" class="hidden bg-yellow-100 border-b border-yellow-200 text-yellow-800 text-xs md:text-sm text-center py-1.5 px-2 z-10 shadow-sm">
        <i class="fa-solid fa-mobile-screen mr-1"></i> Đang hiển thị qua trình xem của Google. Nếu bị lỗi trắng màn hình, hãy bấm nút <b>"Mở rộng"</b> ở góc trên.
    </div>

    <!-- Khu vực hiển thị PDF -->
    <div id="viewer-container" class="flex-1 w-full relative bg-gray-600 flex justify-center items-center">
        <!-- Vòng xoay tải dữ liệu -->
        <div id="loading" class="absolute text-white text-center z-0">
            <i class="fa-solid fa-circle-notch fa-spin fa-3x mb-3 text-blue-400"></i>
            <p class="font-medium text-gray-300">Đang xử lý tài liệu...</p>
        </div>
    </div>

    <script>
        // Lấy tên file từ thanh URL (Ví dụ: pdf-viewer.html?file=tailieu.pdf)
        const urlParams = new URLSearchParams(window.location.search);
        let pdfUrl = urlParams.get('file');

        if (!pdfUrl) {
            // Nếu không có link PDF
            document.getElementById('loading').innerHTML = `
                <div class="text-red-400 bg-gray-800 p-6 rounded-lg shadow-lg border border-red-500">
                    <i class="fa-solid fa-triangle-exclamation fa-3x mb-3"></i>
                    <p class="font-bold text-lg">Lỗi: Chưa cung cấp link file PDF</p>
                    <p class="text-sm mt-2 text-gray-300">Vui lòng gắn đuôi ?file=ten-file.pdf vào đường dẫn.</p>
                </div>`;
        } else {
            // Trích xuất tên file và hiển thị lên giao diện
            let fileName = pdfUrl.split('/').pop();
            try { fileName = decodeURIComponent(fileName); } catch(e) {}
            document.getElementById('doc-title').textContent = fileName;

            // Gắn link cho các nút tải về / mở rộng
            document.getElementById('download-btn').href = pdfUrl;
            document.getElementById('open-btn').href = pdfUrl;

            // Kiểm tra xem người dùng đang dùng điện thoại hay máy tính
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            
            // Xây dựng iframe hiển thị
            const container = document.getElementById('viewer-container');
            const iframe = document.createElement('iframe');
            iframe.className = "w-full h-full border-none absolute top-0 left-0 z-10 bg-gray-200";
            iframe.setAttribute('allowfullscreen', 'true');

            // Ẩn chữ "Đang xử lý..." khi iframe tải xong
            iframe.onload = function() {
                document.getElementById('loading').style.display = 'none';
            };

            if (isMobile) {
                // ĐIỆN THOẠI: Dùng Google Drive Viewer
                // Google Docs Viewer yêu cầu phải có một đường dẫn tuyệt đối (bắt đầu bằng https://...)
                const absoluteUrl = new URL(pdfUrl, window.location.href).href;
                
                document.getElementById('mobile-notice').classList.remove('hidden');
                iframe.src = `https://docs.google.com/gview?url=${encodeURIComponent(absoluteUrl)}&embedded=true`;
            } else {
                // MÁY TÍNH: Dùng trình xem gốc của Chrome/Edge (Hiển thị nét 100%, có sẵn bookmark, tìm kiếm nội bộ, in ấn...)
                // Thêm #toolbar=1 để kích hoạt thanh công cụ của trình duyệt
                iframe.src = `${pdfUrl}#toolbar=1&navpanes=1&scrollbar=1&view=FitH`;
            }

            // Nhúng iframe vào HTML
            container.appendChild(iframe);
        }
    </script>
</body>
</html>
